<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Chat{% if condition %} · {{ condition }}{% endif %}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>LLM Chat</h1>
      {% if not condition %}
      <button id="btn-system" title="시스템 프롬프트 변경">⚙ System</button>
      {% endif %}
    </header>

    {% if not condition %}
    <div id="system-panel" class="hidden">
      <textarea id="system-input" rows="4" placeholder="시스템 프롬프트를 입력하세요"></textarea>
      <div class="panel-actions">
        <button id="btn-system-save">저장 &amp; 초기화</button>
        <button id="btn-system-cancel">취소</button>
      </div>
    </div>
    {% endif %}

    <div id="messages"></div>

    <div id="input-area">
      <textarea id="user-input" rows="1" placeholder="메시지 입력... (Shift+Enter 줄바꿈, Enter 전송)"></textarea>
      <button id="btn-send">전송</button>
    </div>
  </div>

  <script>
    const CONDITION = {{ condition | tojson }};

    // condition별 독립 session ID
    const storageKey = CONDITION ? `chat_session_id_${CONDITION}` : "chat_session_id";

    function getOrCreateSessionId() {
      let id = localStorage.getItem(storageKey);
      if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem(storageKey, id);
      }
      return id;
    }

    const SESSION_ID = getOrCreateSessionId();
    let systemPrompt = "You are a helpful assistant.";
    let isStreaming = false;

    // ── boot ──────────────────────────────────────────────────────────────
    async function boot() {
      const body = { session_id: SESSION_ID };
      if (CONDITION) body.condition = CONDITION;

      await fetch("/api/sessions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });

      const res = await fetch(`/api/sessions/${SESSION_ID}/history`);
      const data = await res.json();
      systemPrompt = data.system_prompt;

      if (!CONDITION) {
        document.getElementById("system-input").value = systemPrompt;
      }

      for (const msg of data.messages) {
        if (msg.role === "user") appendUser(msg.content);
        else appendAssistant(msg.content);
      }
      scrollBottom();
    }

    // ── rendering ─────────────────────────────────────────────────────────
    function appendUser(text) {
      const div = document.createElement("div");
      div.className = "msg user";
      div.textContent = text;
      document.getElementById("messages").appendChild(div);
      return div;
    }

    function appendAssistant(text) {
      const wrap = document.createElement("div");
      wrap.className = "msg assistant";

      const content = document.createElement("div");
      content.className = "content";
      content.textContent = text;

      wrap.appendChild(content);
      document.getElementById("messages").appendChild(wrap);
      return { content };
    }

    function scrollBottom() {
      const el = document.getElementById("messages");
      el.scrollTop = el.scrollHeight;
    }

    // ── send ──────────────────────────────────────────────────────────────
    async function sendMessage() {
      if (isStreaming) return;
      const input = document.getElementById("user-input");
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      input.style.height = "auto";
      isStreaming = true;
      document.getElementById("btn-send").disabled = true;

      appendUser(text);
      const { content } = appendAssistant("");
      scrollBottom();

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: SESSION_ID, message: text }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const payload = JSON.parse(line.slice(6));

          if (payload.type === "token") {
            content.textContent += payload.content;
            scrollBottom();
          } else if (payload.type === "error") {
            content.textContent = `[오류] ${payload.content}`;
            content.style.color = "var(--error)";
          }
        }
      }

      isStreaming = false;
      document.getElementById("btn-send").disabled = false;
    }

    // ── system prompt panel (일반 모드 전용) ──────────────────────────────
    if (!CONDITION) {
      document.getElementById("btn-system").addEventListener("click", () => {
        document.getElementById("system-panel").classList.toggle("hidden");
      });

      document.getElementById("btn-system-cancel").addEventListener("click", () => {
        document.getElementById("system-input").value = systemPrompt;
        document.getElementById("system-panel").classList.add("hidden");
      });

      document.getElementById("btn-system-save").addEventListener("click", async () => {
        const newPrompt = document.getElementById("system-input").value.trim();
        if (!newPrompt) return;

        await fetch(`/api/sessions/${SESSION_ID}/system-prompt`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ system_prompt: newPrompt }),
        });

        systemPrompt = newPrompt;
        document.getElementById("messages").innerHTML = "";
        document.getElementById("system-panel").classList.add("hidden");
      });
    }

    // ── input auto-resize ─────────────────────────────────────────────────
    const userInput = document.getElementById("user-input");
    userInput.addEventListener("input", () => {
      userInput.style.height = "auto";
      userInput.style.height = userInput.scrollHeight + "px";
    });

    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.getElementById("btn-send").addEventListener("click", sendMessage);

    boot();
  </script>
</body>
</html>
