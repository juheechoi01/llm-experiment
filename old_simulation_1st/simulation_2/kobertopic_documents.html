 \uc0dd\ubb3c\ud559\uc801\uc73c\ub85c \uc720\uc0ac\ud55c \uc0dd\uba85\uccb4\ub97c \ud1b5\ud574 \uc0c1\ud0dc\ub97c \ubd84\uc11d\ud558\ub294 \ub370 \uc18c\uc911\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \ube44\uc2b7\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc815\ud655\uc131\uc5d0 \ub300\ud55c \uc758\ubb38\uc774 \uc81c\uae30\ub420 \uc218 \uc788\uc9c0\ub9cc, \uc774\ub294 \ub3d9\ubb3c\uc758 \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc774 \uc778\uac04\uacfc \uc720\uc0ac\ud558\uae30\uc5d0 \uacfc\ud559\uc801 \uc720\ud6a8\uc131\uc744 \uac00\uc9d1\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uad00\ucc30\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ube44\ub85d \ub3d9\ubb3c\uacfc \uc778\uac04 \uc0ac\uc774\uc758 \ucc28\uc774\ub85c \uc778\ud574 \uc77c\ubd80 \uacb0\uacfc\uac00 \ub2e4\ub974\uac8c \ub098\ud0c0\ub0a0 \uc218 \uc788\ub354\ub77c\ub3c4, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04\uc5d0\uc11c\uc758 \uc608\uc0c1\uce58 \ubabb\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc774\ud574\ud558\uace0 \uc608\uce21\ud558\ub294 \ub370 \uac00\uc7a5 \uac00\uae4c\uc6b4 \ud604\uc2e4\uc801\uc778 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4 \uc9c8\ud658\uacfc \uc720\uc0ac\ud55c \ubc18\uc751\uc744 \uac80\uc99d\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \ube44\uc2b7\ud55c \uc0dd\ub9ac\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc81c\uacf5\ud558\uc5ec \uc2e4\ud5d8 \uacb0\uacfc\uc758 \uc2e0\ub8b0\ub3c4\ub97c \ub192\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \ud1b5\ud574 \uc9c8\ubcd1\uc758 \uc9c4\ud589\uacfc \uce58\ub8cc \ubc18\uc751\uc744 \uc815\ud655\ud788 \ubaa8\uc0ac\ud558\ub294 \ub370 \uc720\uc6a9\ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc0dd\ub9ac\ud559\uc801 \ucc28\uc774\uac00 \uc874\uc7ac\ud558\uc9c0\ub9cc, \ub9ce\uc740 \uc9c8\ubcd1 \ubaa8\ub378\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ubc18\uc751\uacfc \uc720\uc0ac\ud55c \uacb0\uacfc\ub97c \uc81c\uacf5\ud558\uc5ec \ud6a8\uacfc\uc801\uc778 \ucd08\uae30 \uac80\uc99d\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc2e4\uc2dc\uac04 \uc0dd\uccb4 \ubc18\uc751\uc744 \uad00\ucc30\ud560 \uc218 \uc788\uac8c \ud574\uc90d\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\ub294 \ud544\uc218\uc801\uc778 \uc0dd\uccb4 \ubc18\uc751\uc5d0 \ub300\ud55c \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ube44\ub85d \uc778\uac04\uacfc \ub3d9\ubb3c \uac04 \uc0dd\ub9ac\uc801 \ucc28\uc774\uac00 \uc788\uc9c0\ub9cc, \uc5ec\uc804\ud788 \uac00\uce58 \uc788\ub294 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc2e4\ud5d8 \uc7ac\ub8cc\ub85c\uc11c \ub3d9\ubb3c\uc740 \uc778\uac04\uc758 \uc0dd\ub9ac\uc640 \uac00\uc7a5 \uc720\uc0ac\ud55c \uacb0\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\ub9ac\ud559\uacfc \ub9e4\uc6b0 \uc720\uc0ac\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uac00\uc7a5 \uc798 \ubc18\uc601\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\ubb3c\ud559\uacfc \ub9e4\uc6b0 \uc720\uc0ac\ud55c \ud658\uacbd\uc5d0\uc11c \uc57d\ubb3c\uc758 \uc548\uc804\uc131\uc744 \ud14c\uc2a4\ud2b8\ud560 \uc218 \uc788\uac8c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \uc720\uc804\uc801\uc73c\ub85c, \uc0dd\ub9ac\ud559\uc801\uc73c\ub85c \uc720\uc0ac\ud55c \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \uac00\ub2a5\ud55c \uac00\uc7a5 \ud604\uc2e4\uc801\uc778 \uc0dd\uccb4 \ud658\uacbd\uc744 \uc81c\uacf5\ud558\uc5ec \uc778\uac04 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\uc131\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud575\uc2ec\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc608\uce21\ud558\ub294 \ub370 \uc720\uc6a9\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ucc28\uc774\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \ub2e8\uc11c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc678\ubd80 \uc790\uadf9\uc5d0 \ub300\ud55c \ub2e4\uc591\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ud1b5\ud569\ud558\uc5ec \uad00\ucc30\ud560 \uc218 \uc788\uac8c \ud574\uc90d\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"20_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","20_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"ZZOeQHyzsEDu1ppA5uyeQLgKskCNDadAnoKfQEXknkBgCJ9ATd6eQN0GoEDNy5pAGGyqQAyfnkCSg6ZAupOfQL8zpUCMLrFAkP+YQHkznkBwyp5ATQWeQPaPo0Dm1p5AxmixQEx6rkCUtZhAQlauQE5Ko0A="},"y":{"dtype":"f4","bdata":"lLpQP4d7bT9C3aQ\u002fdkVUP\u002frFvj9\u002fQ7k\u002fedZTPzTAVz8Aqns\u002fzI9SPx5hVz+\u002fmZs\u002fQV1WP9hsVj\u002fGQmg\u002fQRWCP615pD9vvko\u002fU7usP717VT9O\u002fVY\u002fIbJYP9XaRT+U11I\u002fc1C4P2ndQj+jQq8\u002fiRNmP\u002fJ2fz8="},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\ub300\uccb4 \uae30\uc220\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc5f0\uad6c\uc758 \uc694\uad6c\ub97c \ucda9\uc871\uc2dc\ud0a4\uae30\uc5d0 \ \ub2e4","\uae30\uc220\uc758 \ubc1c\uc804\uc774 \ube60\ub974\ub2e4\ub294 \uc810\uc740 \uae0d\uc815\uc801\uc774\uc9c0\ub9cc, \uc644\uc804\ud55c \ub300\uccb4\uac00 \uc774\ub8e8\uc5b4\uc9c8 \ub54c\uae4c\uc9c0\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc744 \uc704\ud55c \ud22c\uc790\uac00 \ud544\uc694\ud558\uc9c0\ub9cc, \uae09\ubc15\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uae30\uc220\uc774 \ubaa8\ub4e0 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc644\ubcbd\ud55c \ud574\ub2f5\uc744 \uc81c\uacf5\ud558\uc9c0\ub294 \ubabb\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0 \ub354 \ub9ce\uc740 \ud22c\uc790\uac00 \ud544\uc694\ud558\uc9c0\ub9cc \uc989\uac01\uc801\uc778 \uc804\ud658\uc740 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \ubabb\ud55c \uc774\uc720\ub294 \uc774\ubbf8 \ub9ce\uc740 \uc5f0\uad6c\uac00 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ud604\uc7ac \uae30\uc220\uc758 \ud55c\uacc4\uac00 \uc874\uc7ac\ud558\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uae30\uc220\uc740 \uc77c\ubd80 \ubd84\uc57c\uc5d0\uc11c \ubc1c\uc804 \uc911\uc774\uc9c0\ub9cc, \ub9e4\uc6b0 \ubcf5\uc7a1\ud55c \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0\uc11c\ub294 \uc5ec\uc804\ud788 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uae30\uc220\uacfc \ubc29\ubc95\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc2e4\ud5d8 \uc2e4\ud604 \uac00\ub2a5\uc131\uc758 \ud55c\uacc4\uac00 \uc5ec\uc804\ud788 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc740 \uc911\uc694\ud558\uc9c0\ub9cc \ud604\uc7ac\uc758 \uc5f0\uad6c \uc694\uad6c\ub97c \ubaa8\ub450 \ucda9\uc871\uc2dc\ud0a4\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc774 \ud604\uc7ac\ub85c\uc120 \ubaa8\ub4e0 \uc5f0\uad6c\ub97c \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc740 \uc911\uc694\ud558\uc9c0\ub9cc \uc544\uc9c1 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uadf9\ubcf5\ub418\uc9c0 \uc54a\uc740 \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub294 \uc0dd\uba85\uc744 \uc704\ud611\ud558\ub294 \uc911\uc99d \uc9c8\ud658\uacfc \uc9c1\uc811 \uad00\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uc5f0\uad6c\ub9cc\uc73c\ub85c\ub294 \ud574\uacb0\ud558\uc9c0 \ubabb\ud558\ub294 \ub9ce\uc740 \ub09c\uc81c\ub97c \uc9c0\uc18d\uc801\uc73c\ub85c \uadf9\ubcf5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \uc989\uac01\uc801\uc778 \ub300\uccb4\ub294 \uc5b4\ub824\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub2e4\uc591\ud55c \ud601\uc2e0\uc801\uc778 \uae30\uc220\uc774 \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\uace0 \uc788\uc9c0\ub9cc, \uc644\uc804\ud55c \ub300\uccb4\ub294 \uc544\uc9c1 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uae30\uc220\uc758 \ubc1c\uc804\uc774 \uc608\uc0c1\ubcf4\ub2e4 \ubbf8\uce58\uc9c0 \ubabb\ud558\ub294 \uc601\uc5ed\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uae30\uc220\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc774\uba70, \ubaa8\ub4e0 \uc5f0\uad6c \ubd84\uc57c\uc5d0 \uc801\uc6a9\ub420 \uc218 \uc788\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\uae30\uc220\uc758 \ubc1c\uc804\uc744 \ud1b5\ud55c \ub300\uc548 \uc81c\uc2dc\ub294 \uac00\uce58\uac00 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc774\ub4e4\uc744 \ubcf4\uc644\uc801\uc778 \ub3c4\uad6c\ub85c \uc0ac\uc6a9\ud558\ub294 \uac83\uc774 \ud604\uc2e4\uc801\uc785\ub2c8\ub2e4","\ud604\uc7ac\uc758 \uae30\uc220\uc801 \ud55c\uacc4\ub97c \uadf9\ubcf5\ud558\uc9c0 \ubabb\ud558\uba74, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c \uc18d\ub3c4\uac00 \ud06c\uac8c \ub2a6\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4",nul 8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\ub2e4\uba74 \uc5f0\uad6c\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\ub2e4\uba74 \uc5f0\uad6c \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc911\uc694\ud55c \uc548\uc804\uc131\uacfc \ud6a8\ub2a5 \uc2dc\ud5d8\uc774 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\uac00 \uc5c6\ub294 \uacbd\uc6b0 \ud2b9\uc815 \uce58\ub8cc\ubc95\uc758 \uac1c\ubc1c\uc774 \uc9c0\uae08\ubcf4\ub2e4 \uba87 \ubc30\ub098 \ub354 \ub290\ub9b4 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\ub294 \uac83\uc740 \uacfc\ud559\uc801 \ud0c0\ub2f9\uc131\uc774 \ubd80\uc871\ud558\ub2e4\ub294 \ubc18\ub860\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc73c\uba74 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc740 \uac70\uc758 \ubd88\uac00\ub2a5\ud574\uc9d1\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub294 \ub9ce\uc740 \uce58\ub8cc\ubc95\uc758 \ubc1c\uc804\uc774 \uc81c\ud55c\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uae08\uc9c0\uac00 \uc5ed\uc124\uc801\uc73c\ub85c \ub354 \ub9ce\uc740 \uc778\uba85 \ud53c\ud574\ub85c \uc774\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub294 \uc0c1\ub2f9\uc218\uc758 \uc911\uc694\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc774 \uc9c0\uc5f0\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uae08\uc9c0\ud558\uba74 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \uc5f0\uad6c\uac00 \uc911\ub2e8\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc911\ub2e8\ud558\uba74 \uc5f0\uad6c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uc728\uc131\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\ub85c\uc11c\ub294 \uba87\uba87 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1 \uce58\ub8cc \uc5f0\uad6c\uc5d0 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \uc644\uc804\ud788 \ucc3e\uae30 \uc5b4\ub824\uc6b4 \uc0c1\ud669\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc73c\uba74, \uc778\uac04\uc5d0\uac8c \uc9c1\uc811\uc801\uc778 \uc704\ud5d8\uc744 \uc218\ubc18\ud558\ub294 \uc2e4\ud5d8 \ub2e8\uacc4\ub97c \ub2e8\ucd95\ud560 \uc218 \uc5c6\uac8c \ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uc758\uc57d\ud488\uc744 \uac1c\ubc1c\ud558\ub294 \uac83\uc740 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc5c8\ub2e4\uba74 \ud604\uc7ac\uc758 \ub9ce\uc740 \uce58\ub8cc\ubc95\uc740 \uc874\uc7ac\ud558\uc9c0 \ubabb\ud588\uc744 \uac83\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \uc81c\uac70\ud558\ub824\ub294 \uc2dc\ub3c4\ub294 \uc5f0\uad6c \uac1c\ubc1c\uc758 \uc18d\ub3c4\ub97c \ub2a6\ucd9c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \ud604\uc7ac\uc640 \uac19\uc740 \uc218\uc900\uc73c\ub85c \uc9c8\ubcd1 \uc5f0\uad6c\uc640 \uce58\ub8cc \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud558\ub294 \uac83\uc740 \uc5b4\ub824\uc6b4 \uc0c1\ud669\uc785\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \ubc1c\uacac \uc5c6\uc774 \ub9ce\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\ub294 \ubd88\uac00\ub2a5\ud588\uc744 \uac83\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc548\uc804\ud55c \uc2e0\uc57d \uac1c\ubc1c\uc740 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\ub9ce\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub294 \uac1c\ubc1c\uc774 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc911\ub2e8\ c758 \uadfc\ubcf8\uc801\uc778 \uc758\ubb34\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc778\ub958\uc758 \ubcf5\uc9c0\ub97c \uc704\ud574 \ud544\uc218\uc801\uc778 \uc724\ub9ac\uc801 \uade0\ud615\uc744 \uc720\uc9c0\ud569\ub2c8\ub2e4","\ud658\uc790 \uc774\uc775 \uc99d\uc9c4\uc740 \uc724\ub9ac\uc801 \uc0b6\uacfc \uc0dd\uba85\uc758 \uc874\uc911\uc744 \ud3ec\ud568\ud569\ub2c8\ub2e4","\uc778\ub958\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\uace0 \uc9c8\ubcd1\uc73c\ub85c\ubd80\ud130 \ubcf4\ud638\ud558\uae30 \uc704\ud55c \uacfc\ud559\uc801 \uc5f0\uad6c\ub294 \uc724\ub9ac\uc801\uc73c\ub85c \ud544\uc694\ud569\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\ub4e4\uc740 \ub9ce\uc740 \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud560 \uac00\ub2a5\uc131\uc774 \uc788\ub294 \ub9cc\ud07c, \uc5f0\uad6c\uc758 \uc9c0\uc18d\uc740 \uc0ac\ud68c\uc801 \ucc45\uc784\uc758 \uc77c\ud658\uc785\ub2c8\ub2e4","\ubaa8\ub4e0 \uc0dd\uba85\uccb4\uc758 \uad8c\ub9ac\ub97c \uc874\uc911\ud558\uba70 \uade0\ud615\uc744 \ucc3e\uc73c\ub824 \ub178\ub825\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub2e4\uc591\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc778\uac04\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \ubcf4\ud638\ud558\ub294 \uac83\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ubaa8\ub4e0 \uc0dd\uba85\uccb4\ub97c \ubcf4\ud638\ud558\ub294 \uac83\uc740 \uc911\uc694\ud558\uc9c0\ub9cc \uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uc6b0\uc120\uc2dc\ud574\uc57c \ud569\ub2c8\ub2e4","\ub2e4\uc591\ud55c \uc0dd\uba85\uc758 \uac00\uce58\ub97c \uc874\uc911\ud558\ub294 \ub3d9\uc2dc\uc5d0 \uc778\ub958\ub97c \uc704\ud55c \ud544\uc218\uc801 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \uade0\ud615\uc744 \uc774\ub8e8\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc740 \ub9ce\uc740 \uc0ac\ub78c\ub4e4\uc758 \uc0dd\uba85\uacfc \uc9c1\uacb0\ub41c \ubb38\uc81c\uc774\uba70, \uadf8 \uce58\ub8cc\ub97c \uc704\ud55c \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0\ub294 \ub2e4\uc591\ud55c \uacfc\ud559\uc801 \ubc29\ubc95\ub860\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc778 \uae30\uc5ec\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc0dd\uba85\uc5d0 \uc911\ub300\ud55c \uc9c8\ubcd1 \uce58\ub8cc\uc81c\uac00 \uac00\ub2a5\ud574\uc9c0\ub3c4\ub85d \ub3d5\uc2b5\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc740 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\uace0 \uc0b6\uc758 \uc9c8\uc744 \ub192\uc774\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc0dd\uba85\uc5d0 \ub300\ud574 \ub17c\ud560 \ub54c \uc778\uac04\uc758 \uc0dd\uba85 \ubcf4\ud638\uc640 \uc724\ub9ac\uc801 \ucc45\uc784\uc758 \uade0\ud615\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc778\uac04 \uc0dd\uba85 \ubcf4\ud638\ub97c \uc704\ud574 \ud544\uc218\uc801\uc785\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"25_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","25_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"em0eQQXyH0EmWx5BvhEfQdDhJEGj1SRBeRofQcnLIUHYrR1BW3geQTP5I0F42iRBEpgjQcVeJUHPPR5BCNMkQcRUHkGXciNBmJ0jQXACIkHlJx5B9vEhQa6DHkEIfR5BtUIkQSN2I0EFXyFB"},"y":{"dtype":"f4","bdata":"iPOBQMGFhkCB84FA8neBQEHbjUBwEY5A1JKBQFdUiUC8vXtAYmSCQDQSjUCGBo5AlB2LQP7khUA69IBAb7+NQOimgUDFwYtAe6eLQFF8h0D+DYJAUniKQKVxgkAGIYJAqFCNQKm7i0B8GIdA"},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\ub610\ud55c, \uacfc\ud559\uc790\ub4e4\uc740 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \uc5f0\uad6c \ud658\uacbd\uc744 \uac1c\uc120\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uacfc \uc0dd\uba85\uccb4\uc5d0 \ub300\ud55c \ucc45\uc784\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uac8c \ub418\ub294 \uc7a0\uc7ac\uc801 \uc758\ud559\uc801 \ud61c\ud0dd\uacfc \uade0\ud615\uc744 \uc774\ub8e8\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\ub294 \uac83\uc774 \ud544\uc218\uc801\uc774\uba70, \uc774\ub294 \uc5f0\uad6c \uae30\uad00\ub4e4\uc774 \uc9c0\ucf1c\uc57c \ud560 \uae30\ubcf8 \ucc45\ubb34\uc785\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900 \uac15\ud654\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud55c \uc5f0\uad6c\uc5d0\uc11c\uc870\ucc28 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uc874\uc911\ud558\ub3c4\ub85d \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud5c8\uc6a9\ud568\uc73c\ub85c\uc368 \uc5f0\uad6c\uc790\ub4e4\uc740 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \ub2e4\ud558\uae30 \uc704\ud574 \ucd5c\uc120\uc744 \ub2e4\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc815\ud655\ud55c \uc724\ub9ac\uc801 \uaddc\ubc94 \ud558\uc5d0 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uadf9\ub300\ud654\ud558\uae30 \uc704\ud55c \ubc29\uc548\ub3c4 \uc9c0\uc18d\uc801\uc73c\ub85c \ud655\uc7a5\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uad8c\ub9ac\uc640 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uc874\uc911\ud558\ub294 \ubc29\ubc95\uc73c\ub85c \uc2e4\ud5d8\uc774 \uc9c4\ud589\ub429\ub2c8\ub2e4","\uc2e4\ud5d8 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uac1c\uc120\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4. '\uc601\uad6d \uc5f0\uad6c \ucc38\uc870\uadf8\ub8f9'(UK Research Reference Group)\uc740 \ub3d9\ubb3c \ubcf5\uc9c0 \uae30\uc900\uc744 \uc5c4\uaca9\ud788 \uc900\uc218\ud558\uba74\uc11c\ub3c4 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \ucd09\uc9c4\ud558\uae30 \uc704\ud55c \ubc29\uc548\uc744 \ub9c8\ub828\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc724\ub9ac\uc801\uc778 \uc2dc\ud5d8 \ud658\uacbd\uc744 \uad6c\ucd95\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \uac10\uc548\ud558\uc5ec, \ub9ce\uc740 \uc5f0\uad6c\uc790\ub4e4\uc774 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\uc7a5\ud558\uae30 \uc704\ud55c \uc9c0\uc18d\uc801 \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc774\ub7ec\ud55c \uc5f0\uad6c\ub4e4\uc740 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\uba74\uc11c \uc2dc\ud589\ub420 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc0ac\uc6a9\uc740 \uacfc\ud559\uc801 \ubc1c\uc804\uacfc \uade0\ud615\uc744 \uc774\ub8f9\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucc45\uc784\uac10 \uc788\uac8c \uc218\ud589\ub420 \ub54c \uc778\uac04\uacfc \ub3d9\ubb3c \ubaa8\ub450\uc758 \ubcf5\uc9c0\ub97c \uace0\ub824\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ub300\uc548\uc744 \uc81c\uc2dc\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub9ce\uc740 \uc5f0\uad6c \uae30\uad00\ub4e4\uc740 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uace0\ub824\ud558\uba74\uc11c \uc2e4\ud5d8\uc744 \uc9c4\ud589\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uacfc\ud559 \uc5f0\uad6c\uc5d0\uc11c\ub294 \ub3d9\ubb3c\uc758 \uc0b6\uc758 \uc9c8\uc5d0 \ub300\ud55c \uae4a\uc740 \uc874\uc911\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc5f0\uad6c\uc758 \ubc29\ud5a5\uc744 \uc0dd\uba85 \uc911\uc2ec\uc73c\ub85c \uc804\ud658\ud558\ub824\ub294 \ub178\ub825\uc740 \uc774\ubbf8 \uc9c4\ud589 \uc911\uc774\uba70, \uc2e4\ud5d8 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uace0\ub824\ud55c \uc724\ub9ac\uc801 \uc811\uadfc\uc774 \ubcd1\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud560 \ub54c \ub192\uc740 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \uac00\uc9c0\uace0 \uc788\uc73c\uba70, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \ubc29\ubc95\uc744 \uc774\ubbf8 \uc801\uc6a9\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\ud55c \uace0\ub824 \uc0ac\ud56d\uc774\uba70, \uc774\ub97c \uc704\ud55c \ub192\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc694\uad6c\ub429\ub2c8\ub2e4","\uc778\uad8c\uacfc \ub3d9\ubb3c \ubcf5\uc9c0 \uc0ac\uc774\uc5d0\uc11c \uc870\ud654\ub85c\uc6b4 \uade0\ud615\uc744 \ucc3e\uae30 \uc704\ud574\uc11c\ub294 \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uce21\uba74\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \uac80\ud1a0\ud558\ub294 \ub3d9\uc2dc\uc5d0 \uacfc\ud559\uc801 \ud604\uc2e4\uc744 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\uc5d0 \ub300\ud55c \ubc30\ub824\ub294 \ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc758 \uc911\uc694\ud55c \uc694\uc18c\uc785\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uac74\uac15\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc704\ud55c \ub178\ub825\uc774 \uc9c4\ud589 \uc911\uc785\ub2c8\ub2e4","\ub05d\uc73c\ub85c, \uc724\ub9ac\uc801 \uae30\uc900\uacfc \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c\uc758 \ub3d9\ubb3c \ubcf5\uc9c0 \uac1c\uc120\uc740 \ub9e4\uc6b0 \uc911\uc694\ud558\uba70, \ubaa8\ub4e0 \ud569\ubc95\uc801 \uc5f0\uad6c\ub294 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud574\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uace0\ucc30\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uacfc\ud559 \uc5f0\uad6c\uc5d0\uc11c \uc2e4\ud5d8 \ub300\uc0c1\uc758 \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\ub294 \uae30\uc900\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc774\ub8e8\uc5b4\uc9c0\ub294 \ub9cc\ud07c, \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uc874\uc911\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"26_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","26_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"Rl1CQVO9REH\u002fQkJBYatHQbtkR0HMJ0VBfoFHQZjvQkHTI0NB5kJAQfm2Q0EeXkJBpxdGQRe2QUF0tkFBYHxAQer0RUHlK0ZB5FQ\u002fQVgSQkEwXkdBKJVGQTKTRUFROEdBUWJEQTtMSUFAXURB"},"y":{"dtype":"f4","bdata":"HE+6QIW\u002fpUDyA7BAaAm1QLzHtUBGVrRAVWWqQMetvEDwabZA7NWwQIG7qEAaPq5AwfWqQFWiuUCkRbBAzEW7QBFUtkDIo7FAeZSuQM15rkAuxKBAigGqQPZ9q0B2K7RA\u002fSCtQO+xqkCfdbBA"},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85 \ubcf4\ud638\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15\uc744 \ubcf4\ud638\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uad6c\ud558\uae30 \uc704\ud574 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85 \ubcf4\ud638\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \ubcf4\ud638\ud558\ub294 \ub370 \uae34\uae09\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc608\uc0c1\uce58 \ubabb\ud55c \ubd80\uc791\uc6a9\uc73c\ub85c\ubd80\ud130 \uc778\uac04\uc744 \ubcf4\ud638\ud558\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uace0\ub824\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85\uc744
