\uc11c\ub3c4 \ub354 \uc724\ub9ac\uc801\uc778 \ubc29\ubc95\uc744 \uacc4\uc18d \uac1c\ubc1c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \ubb38\uc81c\uc5d0 \ub300\ud55c \ub300\uc911\uc758 \uc778\uc2dd\uc740 \uacfc\ud559 \uc5f0\uad6c\uc5d0 \uae0d\uc815\uc801\uc778 \ubcc0\ud654\ub97c \uac00\uc838\uc654\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub530\ub978 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc644\ud654\ud558\uae30 \uc704\ud574 \uc815\ubc00\ud55c \uaddc\uc81c\uc640 \ub300\uccb4 \ubc29\ubc95\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc5f0\uad6c\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc740 \ub04a\uc784\uc5c6\uc774 \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0 \ub300\ud55c \uc790\uc6d0 \ud22c\uc790\uac00 \ud568\uaed8 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uc9c0\uc18d\uc801\uc73c\ub85c \ud3c9\uac00\ub418\uace0 \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uace0\ub824\uc640 \uacfc\ud559\uc801 \ubc1c\uc804\uc740 \ud568\uaed8 \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc644\ud654\ud558\uae30 \uc704\ud55c \uc81c\ub3c4\uac00 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uace0\ub824\ub294 \uc810\uc810 \ub354 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, 3R \uc6d0\uce59\uc740 \ub2e8\uc21c\ud788 \ub3d9\ubb3c \uc0ac\uc6a9\uc744 \uc904\uc774\ub294 \ub370\uc11c \uadf8\uce58\uc9c0 \uc54a\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc2e4\ud589\uc744 \uadfc\ubcf8\uc801\uc73c\ub85c \uac1c\uc120\ud558\ub824\ub294 \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc758 \uc77c\ubd80\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uc744 \uac1c\uc120\ud558\uae30 \uc704\ud55c \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc9c0\uc18d\ud558\uba74\uc11c \uc810\uc9c4\uc801\uc73c\ub85c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uc744 \ub192\uc774\ub294 \ub178\ub825\uc774 \uc694\uad6c\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uac1c\uc120 \ub178\ub825\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \ub3d9\ubb3c \uc2e4\ud5d8 \uae30\uc900\uc744 \uc900\uc218\ud558\uba74\uc11c \uc5f0\uad6c\ub97c \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ud574 \ub098\uac00\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \ub354\uc6b1 \ud5a5\uc0c1\ub41c \uc5f0\uad6c \uacb0\uacfc\ub97c \ub3c4\ucd9c\ud558\ub294 \ub3d9\uc2dc\uc5d0 \uc724\ub9ac\uc801 \ubd80\ub2f4\uc744 \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uacfc\ud559\uacfc \uc724\ub9ac\uc758 \uc870\ud654\ub294 \ubbf8\ub798 \uc5f0\uad6c\uc758 \ud544\uc218 \uc694\uc18c\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \ub178\ub825\uc740 \uc9c0\uc18d\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc601\ud5a5\uc744 \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc724\ub9ac\uc801 \ub300\uc548\uc740 \uafb8\uc900\ud788 \uac1c\ubc1c\ub418\uace0 \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \uc811\uadfc\uc774 \uacc4\uc18d \uac1c\uc120\ub418\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ubaa8\ub4e0 \uc5f0\uad6c\ub294 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \uadfc\uac70\ud558\uc5ec \uc218\ud589\ub429\ub2c8\ub2e4","\uc5f0\uad6c \uc724\ub9ac\uc640 \ub300\uc548 \uae30\uc220\uc740 \ub04a\uc784\uc5c6\uc774 \ubc1c\uc804\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\uace0 \uac1c\uc120\ud574 \ub098\uac00\ub294 \ub178\ub825\ub3c4 \uacc4\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc9c0\uc18d\uc801\uc778 \uc724\ub9ac\uc801 \ub17c\uc758\uc640 \uae30\uc900 \uac15\ud654\ub294 \uacc4\uc18d \uc720\uc9c0\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc5f0\uad6c \uacfc\uc815\uc5d0\uc11c \uc724\ub9ac\uc801\uc778 \uae30\uc900\uacfc \uaddc\uc81c\uac00 \uac15\ud654\ub418\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ube44\uc724\ub9ac\uc801 \uce21\uba74\uc744 \uc644\ud654\ud558\ub294 \ub370 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559\uc801 \uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uc5b4 \uc624\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc744 \uace0\ub824\ud558\uba74\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \ucda9\uc871\uc2dc\ud0a4\ub294 \uac1c\uc120\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \uc5f0\uad6c \uc218\ud589\uc744 \uc704\ud55c \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uacfc\ud559\uc801 \ubc1c\uc804\uacfc \uc724\ub9ac\uc801 \uace0\ub824 \uc0ac\uc774\uc758 \uade0\ud615\uc744 \ub9de\ucd94\ub824\ub294 \uc2dc\ub3c4\uc785\ub2c8\ub2e4","\ub610\ud55c, \uae30\uc220 \ubc1c\uc804\uacfc \uaddc\uc81c \uac15\ud654\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc778\ub3c4\uc801 \uce21\uba74\uc774 \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c\uc758 \uc724\ub9ac\uc131\ub3c4 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc2e4\ud5d8\uc5d0 \uc0ac\uc6a9\ub418\ub294 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uc6b0\uc120\uc2dc\ud558\ub294 \ubc29\ubc95\ub4e4\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud488\uc9c8\uacfc \uaddc\ubc94\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ud5a5\uc0c1\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc778 \uac1c\uc120\uacfc \ubaa8\ub2c8\ud130\ub9c1\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc774\uace0 \ucc45\uc784\uac10 \uc788\ub294 \uc2e4\ud5d8\uc774 \uacfc\ud559\uc801 \uc9c4\ubcf4\uc640 \ud568\uaed8 \ubcd1\ud589\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \uadf9\ubcf5 \uac00\ub2a5\ud55c \ub3c4\uc804 \uacfc\uc81c\uc77c \ubfd0\uc785\ub2c8\ub2e4","\uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ucda9\uc871\ud560 \uc218 \uc788\ub294 \ubc29\uc548\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uc744 \uac1c\uc120\ud558\ub824\ub294 \ub178\ub825\uc774 \uc801\uadf9\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801\uc778 \uc811\uadfc\uc744 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubcf5\uc9c0\ub97c \uac1c\uc120\ud558\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc5f0\uad6c \uacfc\uc815\uc5d0\uc11c \uac00\ub2a5\ud55c \ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uae30 \uc704\ud55c \ud504\ub85c\ud1a0\ucf5c\uc758 \uac15\ud654\ub294 \uace0\ubb34\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559\uc801 \ubc1c\uc804\uc5d0 \uc788\uc5b4\uc11c\ub294 \ub3c4\ub355\uc801 \ucc45\uc784\uacfc \uade0\ud615\uc744 \ub9de\ucd94\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uace0\ubbfc \uc18d\uc5d0\uc11c \uacfc\ud559\uc801 \ubc1c\uc804\uc740 \uc778\ub958 \ubcf5\uc9c0\ub97c \ud06c\uac8c \ud5a5\uc0c1\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uc5b4 \ub354 \uc778\uac04\uc801\uc774\uace0 \uc724\ub9ac\uc801\uc73c\ub85c \uc218\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900 \uac15\ud654\uc640 \ud568\uaed8 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc774 \ubcd1\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\uc5d0 \ub300\ud574 \uc81c\uae30\ub41c \uc6b0\ub824\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc778 \uac1c\uc120 \ub178\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uacfc \uc724\ub9ac\uc801 \uae30\uc900\uc758 \uade0\ud615\uc744 \ucc3e\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc7a5\uae30\uc801\uc73c\ub85c \uc724\ub9ac\uc801 \ub300\uccb4 \ubc29\ubc95\uc744 \ucc3e\ub294 \uc5f0\uad6c\ub294 \uc544\ub08c\uc5c6\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uadf8\ub7fc\uc5d0\ub3c4 \uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ub300\uc548\uc744 \ucc3e\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \ub178\ub825\ud558\uace0 \uc788\uc73c\uba70, \uac19\uc740 \ub9e5\ub77d\uc5d0\uc11c \uc81c\ud55c\ub41c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uad8c\uc7a5\ud569\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"8_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","8_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"Yn44QR+nMkHiNjZBcW47QZ4eMkHqMTxBxVU3Qbl0NEEAojxB3V02QVokPUGRKz5Bu3c+QR\u002fgP0FjfzFB6PY3QWjUN0HgcT1BS\u002fM7QXFSOkEHCTxBucw7QbNbMkGbZjFBtr07Qeb 3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\ub7ec \ub2e8\uacc4\uc758 \uac80\uc99d \uacfc\uc815\uc744 \uac70\uccd0 \uc774\ub8e8\uc5b4\uc9c0\uba70, \uc774\ub294 \uacfc\ud559\uc801 \uc5f0\uad6c\uc758 \uc2e0\ub8b0\uc131\uc744 \ub192\uc774\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \ub355\ubd84\uc5d0 \ub9ce\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\ubc95\uc774 \ubc1c\uacac\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\uc138 \ubc88\uc9f8\ub85c, \uc0dd\uba85\uacfc\ud559 \uc5f0\uad6c\uc758 \ubc1c\uc804\uc744 \uc704\ud574\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ud604\uc7ac\uc758 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\ub294 \uc989\uac01\uc801\uc778 \ud574\uacb0\ucc45\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e4\uc9c8\uc801\uc778 \uac74\uac15 \uac1c\uc120\uacfc \uc0dd\uba85 \uc5f0\uc7a5\uc744 \uac00\ub2a5\ucf00 \ud588\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0 \uc788\uc5b4 \ucd5c\uc120\uc758 \uc815\ud655\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559\uc801 \uc9c4\ubcf4\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\uc815 \uc9c8\ubcd1\uc758 \uc885\ud569\uc801\uc778 \uc774\ud574\ub97c \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uacfc\ud559\uc801 \uc9c4\ubcf4\uc5d0\uc11c \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5f0\uad6c \uacb0\uacfc\ub85c \uc774\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \uc2e0\ub8b0\uc131\uc744 \ub192\uc774\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5 \ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95\uc774 \ube60\ub974\uac8c \uc2dc\uc7a5\uc5d0 \ub098\uc62c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc6b0\ub9ac\ub294 \uc778\uac04\uc758 \uac74\uac15\uc744 \ud5a5\uc0c1\uc2dc\ud0a4\ub294 \ub370 \uc911\uc694\ud55c \ubc1c\uacac\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uc57d\ubb3c\uacfc \uce58\ub8cc\ubc95\uc758 \ubc1c\uacac\uc744 \uc774\ub04c\uc5b4 \uc654\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"9_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","9_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"LurUQDea10DNV9RAgkncQLvg0UCTgdpAALzVQPvv2EAVGdxAsefXQG1g10D1VddA2ajlQI+H1kAU4NpAPXXWQDPa2ECl\u002fNFAI2fYQHv95EDg5NpAN8fbQFmS5EAm+eRAvjnkQNSM0EBa2tNAojzUQIhu5UBKM9dAio\u002feQAMw6UAS3NJABl\u002fVQNM63EBRrtBATCPRQOI21ECd4t5Ad2nmQIlY1UC5+uRA9pzVQKKe4UAxadxAtXzUQLVi3EAIwuNA+6bSQETQ4EATq+lAaZXlQJfo2kA="},"y":{"dtype":"f4","bdata":"4hZ9QCx9cUA1U3tAfbx1QFk8fEATuHFAQRKDQJcceUAISndASe53QDz6dEByhYJAT7SKQHiBgkBUCnlA70J4QOh0dUBMRoZAOjp+QChng0DwsnlAlRN4QKh3hUA1QH5A0v2FQDjBfEA6BnlAB\u002f98QOlohUCjvoBAQEJqQLyciEADCnpAwMqEQPYEeUCaZoBAzAWAQLrmfEDr23xAaHeEQDw0hEBOlIVAT9t8QMddkEDxl3lA48d7QFqadkAScI5A5UR6QGRSk0BJcYhAf6uEQMecgEA="},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc5bb\ub294 \ub370\uc774\ud130\ub294 \uc544\uc9c1 \uacfc\ud559\uc801\uc73c\ub85c \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \ubc1c\uacac\uc758 \uc720\uc77c\ud55c \ub3cc\ud30c\uad6c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\uc778\uac04 \uac74\uac15\uc744 \uc704\ud55c \uacfc\ud559\uc801 \ubc1c\uc804\uc5d0 \ub530\ub77c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc9c0\ub9cc, \uc989\uac01\uc801\uc778 \ud574\uacb0\ucc45\uc774 \ud544\uc694\ud560 \ub54c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc801\uc2dc\uc5d0 \uc720\ud6a8\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\ub2e4\ub294 \uc810\uc5d0\uc11c \ud070 \uac00\uce58\ub97c \uac00\uc9d1\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc5d0 \ud22c\uc790\ud558\ub294 \uac83\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac \uc9c8\ubcd1 \uc5f0\uad6c\uc758 \uae34\uae09\uc131\uc744 \uac10\uc548\ud560 \ub54c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc624\ub79c \uc2dc\uac04\uc5d0 \uac78\uccd0 \uac80\uc99d\ub41c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\ub958\uc5d0 \uc2e4\uc9c8\uc801\uc778 \uce58\ub8cc\uc81c\ub97c \uc81c\uacf5\ud558\ub294 \uc911\ucd94\uc801 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc5ec\uc804\ud788 \uac00\uc7a5 \uc2e4\uc6a9\uc801\uc774\uace0 \ud6a8\uacfc\uc801\uc778 \ubc29\ubc95\uc73c\ub85c \ubcf4\uc7a5\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc5f0\uad6c\uc758 \ubc29\ud5a5\uc131\uc744 \ubcc0\ud654\uc2dc\ud0a4\ub294 \ub3d9\uc548\uc5d0\ub3c4 \uc989\uac01\uc801\uc778 \uac74\uac15 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \ud575\uc2ec \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc758\uc57d \uc5f0\uad6c\uc5d0 \uc911\ucd94\uc801\uc778 \uc5ed\ud560\uc744 \uc218\ud589\ud558\uba70, \ub9ce\uc740 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub113\ud788\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc7a5\uae30\uc801\uc73c\ub85c\ub294 \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc774 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\ub97c \uc9c0\uc6d0\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \uc544\uc9c1 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uac00\uc7a5 \uc815\ud655\ud55c \uc804\uc784\uc0c1 \uc2dc\ud5d8 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc5f0\uad6c\ub294 \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \uc544\uc9c1\uae4c\uc9c0 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \uc785\uc99d\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc911\uc99d \uc9c8\ud658\uc758 \ud574\uacb0\uc744 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uc608\uce21 \ub3c4\uad6c \uc911 \ud558\ub098\ub85c, \ub2e4\ub978 \ubc29\ubc95\ub4e4\uc774 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ubd80\ubd84\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub300\ubd80\ubd84\uc758 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\ubcf4\ub2e4 \ub192\uc740 \uc815\ud655\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uae34\uae09\ud55c \uc758\ud559\uc801 \ud544\uc694\ub97c \ud574\uacb0\ud558\ub294 \uacfc\uc815\uc5d0\uc11c \uc5ec\uc804\ud788 \ubd88\uac00\ud53c\ud569\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uace0\uc720\ud55c \uc0dd\ub9ac\ud559\uc801 \uc870\uc0ac\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc5f0\uad6c\uc758 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\ub85c \uc778\uc2dd\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc911\uc99d \uc9c8\ud658\uc758 \uc548\uc804\uc131 \ubc0f \uc720\ud6a8\uc131\uc744 \ud655\uc778\ud560 \uc218 \uc788\ub294 \uac00\uc7a5 \ubbff\uc744 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc778 \uac80\uc99d \ub2e8\uacc4\ub85c \uae30\ub2a5\ud569\ub2c8\ub2e4","\uc548\uc804\uc131 \ud3c9\uac00 \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc73c\ub85c \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub9ce\uc740 \uc9c8\ubcd1 \ud1f4\uce58\uc758 \ucd5c\uc120\uc758 \ubc29\ubc95\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ud0c0\ub2f9\uc131\uc744 \uc720\uc9c0\ud558\uba74\uc11c\ub3c4 \uc5f0\uad6c\uc758 \uc815\ud655\uc131\uacfc \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1\uae4c\uc9c0 \uc5f0\uad6c\uc758 \uc548\uc804\uc131\uacfc \uc720\ud6a8\uc131\uc744 \uac80\uc99d\ud558\ub294 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud6a8\uacfc\uc131\uacfc \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud558\uae30 \uc704\ud574 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c4 \uacb0\uacfc\ub294 \uc5ec\uc804\ud788 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \ud544\uc218\uc801\uc778 \uae30\ucd08\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uac00\uc7a5 \ud3ec\uad04\uc801\uc778 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc778 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \uacfc\ud559\uc801\uc73c\ub85c \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uc778\uccb4\ub97c \ub300\uc0c1\uc73c\ub85c \ud55c \uc548\uc804\uc131 \uac80\uc99d\uc5d0\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \uc911\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uc548\uc804\uc131 \ud3c9\uac00 \uc218\ub2e8\uc785\ub2c8\ub2e4","\ucd5c\uc120\uc744 \ub2e4\ud574 \uc778\ub958\uc758 \uc9c8\ubcd1 \uce58\ub8cc\ub97c \uc704\ud55c \uc5f0\uad6c\uc5d0 \uc788\uc5b4 \uc6b0\ub9ac\uac00 \uc120\ud0dd\ud560 \uc218 \uc788\ub294 \ub3c4\uad6c\ub4e4 \uc911 \ud558\ub098\ub85c \uc5ec\uc804\ud788 \uaf2d \ud544\uc694\ud55c \uc0c1\ud669\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc815\ud655\ud55c \uc5f0\uad6c \uacb0\uacfc\ub97c \uc5bb\uae30 \uc704\ud55c \ud544\uc218\uc801\uc778 \ub3c4\uad6c\ub85c \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uc5f0\uad6c\uc640 \ud568\uaed8 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uae34\uae09\ud558\uac8c \uc694\uad6c\ub418\ub294 \uc784\uc0c1\uc801 \ub3cc\ud30c\uad6c \ub9c8\ub828\uc5d0 \uc911\ub300\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc8fc\uc694 \uc5f0\uad6c \ubc29\ubc95\uc73c\ub85c \uc778\uc815\ubc1b\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc5ec\uc804\ud788 \uc0c8\ub85c\uc6b4 \uc57d\ubb3c\uc758 \uc7a0\uc7ac\uc801\uc778 \ud6a8\uacfc\uc640 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud560 \uc218 \uc788\ub294 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uc608\uce21 \ub3c4\uad6c\ub85c \uc0ac\uc6a9\ub429\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacf5\uacf5 \uac74\uac15 \ubcf4\ud638\ub97c \uc704\ud574 \uae09\uc18d\ud788 \uc9c4\ud589\ub418\uc5b4\uc57c \ud560 \uc0c1\ud669\uc5d0\uc11c \uc5ec\uc804\ud788 \uac00\uc7a5 \uc0ac\uc6a9 \uac00\ub2a5\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uacfc\ud559\uc801 \ud0c0\ub2f9\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc800\uba85\ud55c \uc5f0\uad6c \uae30\uad00\ub4e4\uc5d0\uc11c \ud544\uc694\ub85c \ud558\ub294 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub9ce\uc740 \uc5f0\uad6c\uae30\uad00\uc740 \uc5ec\uc804\ud788 \uae30\uc874 \ubc29\uc2dd\uc744 \uace0\uc218\ud558\uace0 \uc788\ub2e4\uace0 \ud558\ub354\ub77c\ub3c4, \uadf8 \uc774\uc720\ub294 \ubc14\ub85c \uadf8 \uc2e4\ud5d8 \ubc2 b2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \uc815\ud655\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\uc885\uc801\uc73c\ub85c \uc778\uac04 \ub300\uc0c1 \uc784\uc0c1 \uc2dc\ud5d8\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uc548\uc804\ud55c \uc784\uc0c1 \uc2dc\ud5d8\uc744 \uc704\ud574 \ub3d9\ubb3c \uc5f0\uad6c\ub294 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\uc885 \uc0ac\uc6a9\uc790\uc5d0\uac8c \uc548\uc804\ud55c \uacb0\uacfc\ubb3c\uc744 \uc81c\uacf5\ud558\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \uac80\uc99d\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc744 \ub300\uc0c1\uc73c\ub85c \ud55c \uc784\uc0c1\uc2dc\ud5d8\uc758 \uc548\uc804\uc131\uc744 \ud655\ubcf4\ud558\ub294 \ub370 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uc744 \uac80\uc99d\ud558\ub294 \uac00\uc7a5 \ud6a8\uacfc\uc801\uc778 \uc218\ub2e8\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\ubb3c\ud559\uc801 \uc548\uc804\uc131\uc744 \uc0ac\uc804\uc5d0 \uc810\uac80\ud558\uae30 \uc704\ud574 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \ud544\uc218\uc801\uc778 \ubd80\ubd84\uc73c\ub85c, \uc778\uac04 \uc2e4\ud5d8\uc744 \uc9c1\uc811 \uc218\ud589\ud558\uae30 \uc804\uc5d0 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \uc785\uc99d\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uba3c\uc800, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc815\ud655\uc131\uacfc \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \ub300\uc0c1 \uc2dc\ud5d8 \uc804 \ucd5c\uc885 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc815\ud655\uc131\uacfc \uc2e0\ub8b0\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\uc548\uc804\uc131 \ud655\ubcf4 \uce21\uba74\uc5d0\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubd88\uac00\uacb0\ud569\ub2c8\ub2e4","\uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \ub370 \uc788\uc5b4 \ub3d9\ubb3c \uc2dc\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc784\uc0c1 \uc2dc\ud5d8 \uc804\uc5d0 \uc758\uc57d\ud488\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \uac80\uc99d\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc784\uc0c1 \uc2dc\ud5d8 \uc804 \uc911\uc694\ud55c \uc548\uc804\uc131\uc744 \ud655\uc778\ud558\ub294 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4\uc5d0 \ub300\ud55c \uc9c1\uc811\uc801\uc778 \uc601\ud5a5\uc744 \uc5f0\uad6c\ud558\uae30 \uc804 \ub2e8\uacc4\ub85c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc608\uce21 \ubd88\uac00\ud55c \uc778\uac04 \uc2dc\ud5d8\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4. '\uc874\uc2a4 \ud649\ud0a8\uc2a4 \uc758\uacfc\ub300\ud559'(Johns Hopkins University School of Medicine)\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\uc131\uc744 \uac15\uc870\ud558\uba70, \uc774\ub294 \uc784\uc0c1\uc2dc\ud5d8 \ub2e8\uacc4 \uc774\uc804\uc5d0 \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \uc704\ud5d8\uc744 \uc0ac\uc804\uc5d0 \ud0d0\uc9c0\ud558\uc5ec \uc778\uac04 \ub300\uc0c1 \uc2e4\ud5d8\uc758 \uc548\uc804\uc744 \ub2f4\ubcf4\ud558\ub294 \ub370 \ubc18\ub4dc\uc2dc \ud544\uc694\ud558\ub2e4\uace0 \uc5b8\uae09\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0\uc11c \uc548\uc804\uc131\uc744 \ud655\ubcf4\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc2e4\ud5d8\uc744 \uc2dc\uc791\ud558\uae30 \uc804\uc5d0 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ud3c9\uac00\ud558\ub294 \uc911\uc694\ud55c \uc218\ub2e8\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc784\uc0c1 \uc2dc\ud5d8 \uc804\uc5d0 \uc57d\ubb3c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \ud655\uc2e4\ud558\uac8c \ud655\uc778\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4 \uc548\uc804\uc131 \ud3c9\uac00\uc758 \uc911\uc694\ud55c \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc784\uc0c1 \uc804 \uc5f0\uad6c\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \ubcf4\uc7a5\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc778\uac04 \uc784\uc0c1 \uc2dc\ud5d8 \uc804\uc5d0 \ubc18\ub4dc\uc2dc \uac70\uccd0\uc57c \ud560 \uc548\uc804\uc131 \uac80\uc99d \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4 \uc548\uc804\uc131 \uac80\uc99d\uc758 \uccab \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc774 \ud658\uc790\uc5d0\uac8c \uc801\uc6a9\ub418\uae30 \uc804 \ud544\uc694\ud55c \uc548\uc804\uc131\uacfc \ud6a8\ub2a5 \uac80\uc99d\uc744 \uc81c\uacf5\ud558\ub294 \ud604\uc7ac\uae4c\uc9c0 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \uae30\uad00\uc758 \uc2b9\uc778 \uc808\ucc28\ub97c \ud1b5\uacfc\ud558\uae30 \uc704\ud55c \ud544\uc218 \uc870\uac74\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\uc131 \uac80\uc99d\uc758 \uc911\uc694\ud55c \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc784\uc0c1 \uc2dc\ud5d8 \uc804\uc5d0 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc2e4\ud5d8\ub3d9\ubb3c\uc744 \uc0ac\uc6a9\ud558\ub294 \uac83\uc740 \uc77c\ubc18\uc801\uc73c\ub85c \ud1b5\uc81c\ub41c \ud658\uacbd\uc5d0\uc11c \uc218\ud589\ub418\uba70, \uc774\ub294 \uc5f0\uad6c\uc758 \uc2e0\ub8b0\uc131\uc744 \ub192\uc785\ub2c8\ub2e4","\uc784\uc0c1 \uc2dc\ud5d8 \uc774\uc804 \ub2e8\uacc4\uc758 \uc911\uc694\ud55c \uc548\uc804\uc131 \ud14c\uc2a4\ud2b8\uac00 \uac00\ub2a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc778\uac04 \uc784\uc0c1 \uc2dc\ud5d8\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \uc0ac\uc804\uc5d0 \uac80\uc99d\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc548\uc804\ud558\uac8c \uc778\uac04 \uc784\uc0c1 \uc2dc\ud5d8\uc73c\ub85c \uc9c4\ud589\ud560 \uc218 \uc788\ub294 \uae30\ucd08\uc801\uc778 \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc778\uac04\uc744 \ub300\uc0c1\uc73c\ub85c \ud55c \uc784\uc0c1 \uc2dc\ud5d8\uc744 \uc2dc\uc791\ud558\uae30 \uc804\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc548\uc804\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\uc131\uacfc \uc720\ud6a8\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \ub370 \uc911\ucd94\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \uac80\uc99d\ud558\ub294 \ucd08\uae30 \ub2e8\uacc4\ub294 \uc0ac\ub78c\uc744 \ub300\uc0c1\uc73c\ub85c \ud55c \uc784\uc0c1 \uc2dc\ud5d8 \uc804\uc5d0 \ubc18\ub4dc\uc2dc \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\uc131 \uac80\uc99d\uc758 \ud575\uc2ec \ub2e8\uacc4\uc785\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"11_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","11_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"2468QP3ZxUCNGMdA\u002flu4QKLDx0DI88xAmWC7QLnYvkAbnMJAwIO+QO+Uv0DkqL5AdQbKQI5av0Ay+rdA8bfCQD6Xt0CZwbpA2xu+QD0txkBkEsVAqES8QKiryEBi4LxA+MXBQHkDyEAWOsdAF1C+QK10vkD9fb1Ah+S8QFt\u002fuUBUo8VAZDzGQHH7wEArlL9Aalm8QEC1vkBoRL9A\u002fKjCQIh2vED\u002fPLhAKfPEQHmgx0DUCspAyEjJQF3VuUAanMVAVHa\u002fQKf8wEA="},"y":{"dtype":"f4","bdata":"LLf\u002fvU\u002fckr\u002fU55K\u002fWwgKv+n6kL9pfVG\u002f98VMv3pZZr52b0a\u002fQCPJvc0rnr3LX22\u002ftGSJv7TVZL8knRC\u002f3diBv9rhDr+7Jk+\u002fd+lkv1lijr9GOo6\u002frVrVvlEUkL9r0Vq\u002fL34Cv6rxkL8cSI6\u002fIJhkv1aEHb+wuQ+\u002fpL6QvarSMr8YBJe\u002fwx6Mv52YjL0KxHG\u002f413XvaJQbb9wwQW\u002ftrOAvxfl6L1zpxq\u002fcriZv2G6jr\u002fp9Ym\u002fk8aTv4XHRb94ype\u002fOkpyv+rCRb8="},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\ub458\uc9f8, \uacfc\ud559 \ubc1c\uc804\uc744 \ud1b5\ud574 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\ub294 \ubc29\ubc95\uc774 \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc774 \uc774\ub904\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc740 \uc6b0\ub9ac\uac00 \uac00\ub2a5\ud55c \ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\ub824\ub294 \ubaa9\ud45c\ub97c \uc9c0\ud5a5\ud569\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\uc5ec \uc2e4\ud5d8\uc5d0\uc11c \uace0\ud1b5\uc744 \uc904\uc774\ub294 \ubc29\ubc95\ub4e4\uc774 \uc801\uadf9\uc801\uc73c\ub85c \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559\uacc4\ub294 \ub3d9\ubb3c \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub41c \ubc29\ubc95\uc744 \ucc44\ud0dd\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4. \"\ubbf8\uad6d \uacfc\ud559 \uc7ac\ub2e8(NSF)\"\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220 \uac1c\ubc1c\uc5d0 \uc0c1\ub2f9\ud55c \uc790\uae08\uc744 \uc9c0\uc6d0\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc55e\uc73c\ub85c\uc758 \uacfc\ud559\uc801 \ubc1c\uc804 \ubc29\ud5a5\uc744 \uc81c\uc2dc\ud55c\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud604\uc7ac \ud544\uc694\uc131\uc744 \uc778\uc815\ud558\uba74\uc11c\ub3c4, \uc9c0\uc18d\uc801\uc778 \uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc810\ucc28 \uc904\uc5ec\ub098\uac00\ub294 \ub178\ub825\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \ub354 \ub098\uc740 \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc744 \ub3d9\uc2dc\uc5d0 \uc9c4\ud589\ud558\ub294 \uac83\ub3c4 \uc911\uc694\ud569\ub2c8\ub2e4","\uc2e4\ud5d8 \ub300\uccb4 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc5f0\uad6c\ub3c4 \uafb8\uc900\ud788 \uc9c4\ud589\ub418\uace0 \uc788\uc73c\uba70, \uc7a5\uae30\uc801\uc73c\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \uac83\uc774 \ubaa9\ud45c\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc5d0 \ub300\ud55c \uc9c0\uc18d\uc801\uc778 \uc5f0\uad6c\uc640 \ud22c\uc790\ub97c \ud1b5\ud574 \uc7a5\uae30\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc904\uc5ec\ub098\uac00\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559 \uc5f0\uad6c\uc758 \ubaa9\ud45c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uac00\ub2a5\ud558\uba74 \uc904\uc774\ub294 \uac83\uc785\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uace0 \uc788\uc73c\uba70, \uc7a5\uae30\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud55c \uae30\uc220\uc801 \ubc1c\uc804\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc904\uc774\uae30 \uc704\ud55c \ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c\uc640 \ud22c\uc790\ub294 \uc810\ucc28 \uc99d\uac00\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ube44\ub3d9\ubb3c \uc2e4\ud5d8 \ub300\uc548\uc744 \uc801\uadf9\uc801\uc73c\ub85c \uac1c\ubc1c\ud558\uace0 \uc788\ub2e4\ub294 \uc810\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc0ac\uc6a9\uc744 \uc904\uc774\ub294 \uae0d\uc815\uc801\uc778 \ubc29\ud5a5\uc73c\ub85c \ub098\uc544\uac00\ub294 \uc88b\uc740 \uc608\uc785\ub2c8\ub2e4","\ub610\ud55c, \uacfc\ud559\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uadf8 \ub300\uc548\uc744 \ucc3e\ub294 \ubc29\ud5a5\uc73c\ub85c \uc9c4\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559\uacc4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8 \uc758\uc874\ub3c4\ub97c \uc904\uc774\uae30 \uc704\ud55c \uacc4\ud68d\uc744 \uc218\ub9bd\ud574\uc57c \ud569\ub2c8\ub2e4","\uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c \uc0ac\uc6a9\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ub300\uccb4 \ubc29\ubc95\uc744 \uc801\uadf9\uc801\uc73c\ub85c \ud0d0\uad6c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc9c0\uc18d\uc801\uc778 \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uacfc \ud568\uaed8 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc810\uc9c4\uc801\uc73c\ub85c \uc904\uc774\ub294 \ub178\ub825\uc740 \ubc18\ub4dc\uc2dc \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc774 \uc724\ub9ac\uc801\uc778 \ub300\uc548\uc744 \ubaa8\uc0c9\ud558\ub294 \uc5f0\uad6c\uac00 \ubcd1\ud589\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uace0\ud1b5 \uacbd\uac10\uc744 \uc704\ud55c \uae30\uc220\uc801 \uc9c4\ubcf4\ub294 \ub04a\uc784\uc5c6\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uc5d0 \uc9c0\uc18d\uc801\uc73c\ub85c \ud22c\uc790\ud558\ub294 \uac83\ub3c4 \uc911\uc694\ud55c \uacfc\uc81c\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c\uc5d0 \ub300\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \uacfc\ud559 \ucee4\ubba4\ub2c8\ud2f0\uc758 \ub178\ub825\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uc704\ud55c \ub178\ub825\uc740 \uc9c0\uc18d\ub418\uace0 \uc788\uc73c\uba70, \uc2e4\ud5d8 \uc808\ucc28\uc758 \uac1c\uc120\uc744 \ud1b5\ud574 \uadf8\ub4e4\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc5d0\uac8c \ucd5c\uc18c\ud55c\uc758 \uace0\ud1b5\uc744 \ubd80\uc5ec\ud558\ub294 \ubc29\ubc95\ub4e4\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c \ubd84\uc57c\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc0ac\uc6a9\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559\uc790\ub4e4\uc740 \ub3d9\ubb3c\uc758 \uc0ac\uc6a9\uc744 \uc904\uc774\uace0 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub300\uccb4 \ubc29\ubc95\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \uc5f0\uad6c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc758\uc874\uc744 \uc904\uc774\uae30 \uc704\ud55c \uae00\ub85c\ubc8c \ubc0f \uacfc\ud559\uacc4\uc758 \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc2e4\ud5d8 \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \ub3d9\ubb3c \uc2e4\ud5d8 \uc758\uc874\ub3c4\ub97c \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc2e0\uae30\uc220\uacfc\uc758 \ud1b5\ud569\uc744 \ud1b5\ud55c \uc810\uc9c4\uc801 \uc808\uac10\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\uc5f0\uad6c\uc758 \ud328\ub7ec\ub2e4\uc784 \ubcc0\ud654\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\ub3c4\ub97c \uc904\uc774\ub824\ub294 \ub178\ub825\uc744 \ud3ec\ud568\ud569\ub2c8\ub2e4","\uacfc\ud559 \uc5f0\uad6c\ub294 \uad81\uadf9\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\ub294 \uce58\ub8cc\ubc95 \uac1c\ubc1c \ud658\uacbd\uc744 \ubaa9\ud45c\ub85c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uacfc \ubcd1\ud589\ud558\uc5ec \uc810\ucc28 \uadf8 \ud544\uc694\uc131\uc744 \uc904\uc5ec\uac00\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc9c0\uc591\ud558\ub824\ub294 \ub178\ub825\uacfc \ud568\uaed8, \uc2e4\uc9c8\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud558\ub294 \ub178\ub825\uc758 \uade0\ud615\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc904\uc785\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc73c\ub85c \uc2e4\ud5d8 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\ub824\ub294 \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc704\ud55c \ud22c\uc790\ub294 \uc774\ubbf8 \uc9c4\ud589 \uc911\uc774\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\ub3c4\ub97c \uc904\uc774\ub294 \ubc29\ud5a5\uc73c\ub85c \ub098\uc544\uac00\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ucd94\uad6c\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uac10\uc18c\uc2dc\ud0a4\uace0\uc790 \ud558\ub294 \uacfc\ud559\uacc4\uc758 \uc758\uc9c0\ub97c \ubc18\uc601\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uac10\ucd95\uc744 \uc9c0\ud5a5\ud558\uba74\uc11c\ub3c4 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\uc81c\ub97c \ubc1c\uacac\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4. '\ud30c\ub9c8\uc2dc\uc544 \ucf54\ud37c\ub808\uc774\uc158'(Pharmacia Corporation)\uc740 \uc724\ub9ac\uc801\uc778 \uc2e4\ud5d8 \uae30\uc900\uc744 \uac15\ud654\ud558\uace0 \uc788\uc73c\uba70, \uac00\ub2a5\ud55c \uacbd\uc6b0 \ub300\uccb4 \ubc29\ubc95\uc744 \ubaa8\uc0c9\ud558\uc9c0\ub9cc, \ub9ce\uc740 \uacbd\uc6b0\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uac00\uc7a5 \uc720\ud6a8\ud55c \ubc29\ubc95\uc774\ub77c\uace0 \ubcf4\uace0\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uae30 \uc704\ud55c \uc5f0\uad6c\uac00 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uacfc \ud1b5\ud569\ub418\uc5b4 \uc904\uc5b4\ub4e4\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c \ubc1c\uc0dd\ud558\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \ub354 \ub098\uc740 \ub300\uc548\uc744 \uac1c\ubc1c\ud558\ub824\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c \uace0\ud1b5\uc744 \uac10\uc18c\uc2dc\ud0a4\ub294 \uac83 \ub610\ud55c \ud604\ub300 \uacfc\ud559\uc758 \uc8fc\uc694 \ubaa9\ud45c \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc758 \uad00\uc2ec \uc99d\ub300\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uac10\uc18c\uc2dc\ud0a4\ub824\ub294 \uc138\uacc4\uc801 \ub178\ub825\uc744 \ucd09\uc9c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uace0\ud1b5\uc744 \uacbd\uac10\uc2dc\ud0a4\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \uac1c\uc120\ucc45\uc774 \ub3c4\uc785\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub9ce\uc740 \uc5f0\uad6c \uae30\uad00\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc904\uc774\uace0 \ub300\uccb4 \uae30\uc220\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \uc9d1\uc911\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"12_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","12_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"APsxQbysMkEpVCxBMoAyQdDTMkF6QypBg58qQRxeKEGByypB5vwpQYvZLkFhhipBylQqQY6TK0H2ZCtBuk4uQVO5K0EOkipBqiwtQV8zMkGPIilBsLgzQcWeMkEMjjJBi+otQR8cL0EqIS9BeL8qQQ7EKEF\u002fRC1BwiYsQbboMkHedSpBhE0rQU14KUElFTFBpf8pQVB8KkH+KTBBybsxQdpOKkEkHDJBa3ExQVjJKkGP1TFB2qwqQaGVLUE="},"y":{"dtype":"f4","bdata":"H\u002fjxQM3C8UAcy\u002f5A9wDwQIND80AIZP9As8f+QK9DAUHje\u002f9A4UoAQZ8V\u002f0C79P5AbxQAQW9A\u002fUBBXP9ApRT\u002fQCXU\u002fUBJyf5AlPj6QHiy8UD8LwFBS9LzQHnF70D0wvBAY2X7QP9j90AZXv5ACN3\u002fQBz4AEGZFP9AbKH9QCPV8ECjJwBBx6r\u002fQAHgAEGc+PJA8WAAQUQ7\u002f0A3kutAYB\u002fyQKIyAEEXYfFAHkjxQDKn\u002f0D9D\u002fFAa+X\u002fQFaW+kA="},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \ub17c\ub780\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub  \ud569\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c1\uc811\uc801\uc778 \uc778\ub958\uc758 \uac74\uac15 \uc99d\ub300 \ud6a8\uacfc\ub97c \uc9c0\uc6d0\ud569\ub2c8\ub2e4","\ube44\ub85d \uc724\ub9ac\uc801 \uad00\uc810\uc5d0\uc11c \ub17c\ub780\uc758 \uc5ec\uc9c0\uac00 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uc804\uacfc \uc9c8\ubcd1 \uce58\ub8cc\uc5d0 \uae30\uc5ec\ud568\uc73c\ub85c\uc368 \uc778\ub958 \uc804\uccb4\uc758 \ubcf5\uc9c0\ub97c \uc99d\uc9c4\uc2dc\ud0a4\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15 \uc99d\uc9c4\uc5d0 \ud06c\uac8c \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uacb0\uacfc\ub294 \uc778\ub958\uc758 \uac74\uac15\uacfc \ubcf5\uc9c0\ub97c \uc9c1\uc811\uc801\uc73c\ub85c \uac1c\uc120\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15\uc744 \uc99d\uc9c4\uc2dc\ud0a4\ub294 \ub370 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ub3c4\ucd9c\ub41c \uacb0\uacfc\ub294 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uad6c\ud558\uae30 \uc704\ud55c \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc5d0\uac8c \uc720\uc775\ud55c \uc0dd\uba85\uacf5\ud559 \uc5f0\uad6c\uc758 \ud544\uc218 \uc694\uc18c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85 \uc5f0\uc7a5\uc744 \uc704\ud55c \uc911\ub300\ud55c \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0\uc11c \uc778\ub958\uc5d0\uac8c \uc9c1\uc811\uc801\uc778 \uac74\uac15 \uc774\uc775\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uacfc\ud559 \ubc1c\uc804\uc744 \ud1b5\ud574 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc548\uc804\uc740 \ud06c\uac8c \uac1c\uc120\ub420 \uc218 \uc788\uc73c\uba70, \uc774\ub294 \uc0ac\ud68c \uc804\uccb4\uac00 \ud61c\ud0dd\uc744 \uacf5\uc720\ud558\uac8c \ub418\ub294 \uacb0\uacfc\ub97c \ucd08\ub798\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \ubcf5\uc9c0\uc640 \uc0dd\uc874\uc5d0 \uc9c1\uc811\uc801\uc778 \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubbf8\ub798\uc758 \uc778\ub958 \uac74\uac15 \uc99d\uc9c4\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uac74\uac15\uc744 \uc704\ud55c \uc5f0\uad6c \uc9c4\ud589\uc758 \uac00\uce58\ub97c \uc874\uc911\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15 \uc99d\uc9c4\uacfc \uc0dd\uba85 \uc5f0\uc7a5\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\ub294 \uc2ec\uac01\ud55c \uc9c8\ubcd1 \uce58\ub8cc\uc758 \ubc1c\uc804\uc744 \ud1b5\ud574 \ub418\ub3cc\ub9b4 \uc218 \uc788\ub294 \uc0ac\ud68c\uc801 \uc774\uc775\uc774 \ub530\ub985\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud604\uc7ac\uae4c\uc9c0 \uc778\uac04 \uac74\uac15 \uc99d\uc9c4\uc5d0 \uae30\uc5ec\ud55c \ubc14\ub294 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uac74\uac15 \uac1c\uc120\uc758 \ud575\uc2ec\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15\uc5d0 \uc9c1\uc811\uc801\uc73c\ub85c \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uac74\uac15 \uc99d\uc9c4\uc5d0 \uc911\ub300\ud55c \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc778\uac04 \uac74\uac15\uc5d0 \uc911\uc694\ud55c \uc9c4\uc804\uc744 \uc774\ub8f0 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559\uc801 \uc9c4\ubcf4\ub294 \uc778\ub958 \ubcf5\uc9c0\uc5d0 \uc9c1\uc811\uc801\uc778 \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uc774\uc775\uc740 \uc0ac\ud68c\uc801\uc73c\ub85c \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uc744 \uc774\uc6a9\ud558\uc5ec \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uc5f0\uad6c\ub294 \uc0ac\ud68c \uc804\ubc18\uc5d0 \uac78\uccd0 \ud3ed\ub113\uc740 \uc9c0\uc9c0\ub97c \ubc1b\uc73c\uba70 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uac74\uac15 \ud5a5\uc0c1\uc5d0 \uc911\ub300\ud55c \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\uae30\ucd08 \uc5f0\uad6c\uac00 \uc778\ub958\uc758 \uc0dd\uba85 \uad6c\uc81c\uc5d0 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"14_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","14_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"7tQiQU5CIUFCWB5B9OceQay3HkGGghpBSzceQdZzHkG0sSFBR\u002fAdQd09H0F\u002fchtBJuQeQaJkHkEhNB9BH9wgQW8KIkE5Qh5BJTAdQX+kIEH\u002fXx5BKJ4dQQIBIEHgnCVBXIsjQQNTI0GdHB1BuSchQcWKJUGTgiJBYLEgQajtHUHAJhpBT\u002fUdQarQH0FF+B1BgUMdQW2dHEHofyFBdLAZQb60IEGSjB1BSHggQSZaH0E="},"y":{"dtype":"f4","bdata":"ir47QLuCR0DBb05AcX1LQMJsTUBOcEdAsItOQPnXTkDyrTNADkNSQOd1T0AQKkdAhrZEQFaZVEDms0pA6EtLQBHqR0C7tE9AQZhLQPa8WEBBRE5AlPVNQLQ3TEAINDdAZgw4QEGzNEB5qkxAuGByQF3iOUAP4UJAVMpMQKljTUCu2kJAB0ROQFjfSUDv10lAcHBMQOXySkD73HNAj0tCQBJfWkC0ZUtAV8dtQKrlS0A="},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604 \uc2dc\uc810\uc5d0\uc11c \uc720\uc77c\ud558\uac8c \uac00\ub2a5\ud55c \ub300\uaddc\ubaa8 \uc0dd\uccb4 \ubc18\uc751 \uad00\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \ub300\uccb4 \uc2e4\ud5d8 \uae30\ubc95\uc758 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\ub294 \uac00\uc6b4\ub370\uc5d0\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\uc815 \uc5f0\uad6c\uc5d0\uc11c \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc778 \ub370\uc774\ud130\uc640 \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub9e4\uc6b0 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\uae30 \uc704\ud55c \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc5d0\uac8c \uc704\ud5d8\ud560 \uc218 \uc788\ub294 \ubd80\uc791\uc6a9\uc744 \uc0ac\uc804\uc5d0 \ubc1c\uacac\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\uccb4 \ub0b4 \ud658\uacbd\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804 \uc911\uc5d0\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud3ec\uad04\uc801 \uc5f0\uad6c\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc77c\ubd80 \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \uc0c1\ud638\uc791\uc6a9\uc744 \uc2e4\uc81c\ub85c \uad00\ucc30\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\ub3d9\ubb3c\uacfc \uc778\uac04 \uc0ac\uc774\uc758 \uc0dd\ubb3c\ud559\uc801 \ucc28\uc774\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc720\uc77c\ud558\uac8c \ubcf5\uc7a1\ud55c \uc804\uc2e0 \ubc18\uc751\uc744 \uad00\ucc30\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4 \ubc29\ubc95\ubcf4\ub2e4 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ub354 \uc798 \ubaa8\uc0ac\ud569\ub2c8\ub2e4","\uc778\uacf5\uc9c0\ub2a5\uacfc \ubaa8\ub378\ub9c1 \uae30\uc220\uacfc \uad00\uacc4\uc5c6\uc774, \ud604\uc7ac\uc758 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0\uc11c \uc2e0\ub8b0\uc131\uacfc \uc815\ud655\uc131\uc744 \ud655\ubcf4\ud558\uae30 \uc704\ud574\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubd88\uac00\ud53c\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc758 \uc0c1\ud638\uc791\uc6a9\uc744 \uad11\ubc94\uc704\ud558\uac8c \uc5f0\uad6c\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud568\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc989\uac01\uc801\uc778 \uc778\uac04 \uc801\uc6a9\uc5d0 \ub300\ud55c \uc2e0\ub8b0\uc131\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uc548\uc801 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \ub9ce\uc740 \uac00\ub2a5\uc131\uc744 \uc81c\uc2dc\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \ud544\uc694 \ubd88\uac00\uacb0\ud55c \ub2e8\uacc4\uc784\uc744 \ubcf4\uc5ec\uc90d\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uad00\ucc30\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc73c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\ube44\ub85d \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc720\uc77c\ubb34\uc774\ud55c \uc9c8\ubcd1 \uce58\ub8cc \uac1c\ubc1c \uc5f0\uad6c \ubc29\uc2dd\uc785\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \ub300\uccb4 \ubc29\ubc95\uc774 \uc9c4\ubcf4\ud558\uc600\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \uacfc\ud559\uc801 \ud0c0\ub2f9\uc131\uc744 \ubcf4\uc99d\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1\uae4c\uc9c0 \uc778\uac04\uc758 \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc5d0 \uac00\uc7a5 \uadfc\uc811\ud558\uac8c \uc5f0\uad6c\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ucd5c\ucca8\ub2e8 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \ubaa8\ub378\uc740 \uc5ec\uc804\ud788 \uc5f0\uad6c\uc758 \uae30\ucd08\uc801\uc774\uace0 \ud544\uc218\uc801\uc778 \ubd80\ubd84\uc744 \ub2f4\ub2f9\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc5f0\uad6c\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc9c8\ud658\uc758 \uc9c4\ud654\uc640 \uc9c4\ud589\uc744 \uc7a5\uae30\uc801\uc73c\ub85c \uad00\ucc30\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \ubaa8\ub378\uc740 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ubd84\uc11d\ud558\ub294 \ub370 \uc788\uc5b4 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc0dd\ub9ac\uc5d0 \ub300\ud55c \uc9c1\uc811\uc801\uc778 \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc0dd\ub9ac\ud559\uacfc \uac00\uc7a5 \uc720\uc0ac\ud558\uac8c \uc791\uc6a9\ud558\ub294 \uc694\uc18c\ub85c\uc11c \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc778\uac04 \uc0dd\uba85\uc758 \uc5f0\uc7a5\uc744 \uc704\ud55c \uc720\uc77c\ud55c \uc2e4\uc6a9\uc801 \ubc29\uc548\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\uae30 \uc704\ud55c \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc744 \uac00\uc18d\ud654\ud558\uace0\uc790 \ud558\ub294 \ub178\ub825\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc808\ub300\uc801\uc73c\ub85c \ud544\uc694\ud55c \uc5f0\uad6c \ubc29\ubc95\uc785\ub2c8\ub2e4","\uc624\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574\uc11c\ub9cc \uac80\uc99d \uac00\ub2a5\ud55c \uc0dd\ub9ac\uc801 \ub9e5\ub77d\uc5d0\uc11c\uc758 \uacb0\uacfc \ucc28\uc774\ub97c \ud30c\uc545\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub9ce\uc740 \ud601\uc2e0\uc801\uc778 \uc5f0\uad6c\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \ubaa8\ub378\uc5d0 \uc758\uc874\ud569\ub2c8\ub2e4","\uc810\uc9c4\uc801 \uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ud2b9\uc815 \uc5f0\uad6c \ubd84\uc57c\uc5d0\uc11c\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \ubaa8\ub378\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub370\uc774\ud130\ub97c \uae30\ubc18\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc5f0\uad6c\ub294 \ud604 \uc2dc\uc810\uc5d0\uc11c \uc778\uccb4\uc5d0 \ub300\ud55c \uc720\uc77c\ud55c \uc608\uce21 \uac00\ub2a5\ud55c \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uad00\ucc30\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc774 \uacc4\uc18d \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ucd08\uae30 \ubc1c\uc804 \ub2e8\uacc4\uc5d0\uc11c \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \ubcf4\uc77c \uc218 \uc788\ub294 \ucd5c\uc801\uc758 \ubc29\ubc95\uc73c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uc57d\ubb3c\uc758 \uc548\uc804\uc131\uc744 \ubbf8\ub9ac \uac80\uc99d\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ube44\uc724\ub9ac\uc801 \uce21\uba74\uc744 \uc6b0\ub824\ud558\ub294 \uc758\uacac\uc744 \uc874\uc911\ud558\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uae30\uc220 \ubc1c\uc804 \uc0c1\ud669\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uc5f0\uad6c \ubc29\uc2dd\uc785\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\ub098, \uc5ec\uc804\ud788 \ub3d9\ubb3c \ubaa8\ub378\ub9cc\uc774 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \uc0dd\uccb4 \ubc18\uc751\uacfc \ubcf5\uc7a1\ud55c \uc9c8\ud658\uc758 \uc0c1\ud638\uc791\uc6a9\uc5d0 \ub300\ud55c \ud1b5\ucc30\uc740 \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\uc815 \uc9c8\ud658\uc5d0\uc11c \uc778\uccb4 \ub0b4\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc774\ud574\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \uc218\ub2e8 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"15_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","15_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"mR9mQNWphUARw4ZA55NmQCRFZ0AZp4RAVp2JQOhzZkDM9GZAppZkQMzihEA5uWVA\u002fbGDQGurgUALr2hAGhRvQCF0hUDOYGtAKmeHQNDlZkChqWZAH7eGQD5whkDX5oRAU2FkQGebZkAiNERAo 2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc758 \uac1c\ubc1c\uc5d0 \uc774\ubbf8 \ub9ce\uc740 \ud22c\uc790\uac00 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc744 \uc704\ud574\uc11c\ub294 \uc9c0\uc18d\uc801\uc778 \uc5f0\uad6c\uc640 \ud22c\uc790\uac00 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc744 \uc704\ud55c \ub178\ub825\uc740 \uacc4\uc18d\ub418\uace0 \uc788\uc73c\uba70 \ub2e4\uc591\ud55c \ubd84\uc57c\uc5d0\uc11c \ud22c\uc790\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uad81\uadf9\uc801\uc73c\ub85c \ub2e4\uc591\ud55c \ubc29\ubc95\uacfc \uae30\uc220\uc744 \ubcd1\ud589\ud558\uae30 \uc704\ud55c \ub354 \ub9ce\uc740 \uc5f0\uad6c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uae30\uc220\uc744 \uac1c\ubc1c\ud558\ub294 \ub178\ub825\uc740 \ube60\ub974\uac8c \uc9c4\ud589 \uc911\uc785\ub2c8\ub2e4","\uc9c0\uc18d\uc801\uc778 \ud601\uc2e0\uc744 \uc704\ud55c \ub3d9\ub825\uc740 \uc788\uc73c\uba70, \uc774\ub97c \ud1b5\ud574 \uc7a5\uae30\uc801\uc73c\ub85c \ub300\uccb4 \ubc29\ubc95\uc744 \ucc3e\uace0\uc790 \ud558\ub294 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \uae30\uc220\uc5d0 \ub300\ud55c \ud22c\uc790\ub294 \uafb8\uc900\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uc548\uc801 \uc5f0\uad6c \ubc29\ubc95\ub3c4 \ud568\uaed8 \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uad6d\uc81c\uc801 \ud611\ub825\uacfc \uae30\uc220 \uacf5\uc720\ub97c \ud1b5\ud574 \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uc774 \ub354\uc6b1 \ucd09\uc9c4\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c \ub178\ub825\uc774 \ubcd1\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc815\ubd80\uc640 \uc0b0\uc5c5\uccb4\ub294 \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc744 \uc801\uadf9\uc801\uc73c\ub85c \uc9c0\uc6d0\ud558\ 40 \uc0dd\uccb4 \ub0b4\uc5d0\uc11c \uc57d\ubb3c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uacfc \uc57d\ubb3c\uc758 \uc548\uc804\uc131\uc744 \ud655\uc778\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc57d\ubb3c\uacfc \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d\uc758 \uc548\uc815\uc131\uacfc \ud6a8\uacfc\ub97c \uac80\uc99d\ud558\ub294 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5 \uac80\uc99d\uc5d0 \ud544\uc218\uc801\uc778 \uacfc\uc815\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c \ubc0f \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \uac80\uc99d\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc644\uc804\ud788 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub294 \ub3d9\ubb3c \ubaa8\ub378\uc5d0\uc11c \uac80\uc99d\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d\uc758 \uc548\uc804\uc131\uacfc \uc720\ud6a8\uc131\uc744 \uac80\uc99d\ud558\ub294 \ub370 \uc911\uc694\ud55c \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc911\uc694\ud55c \uc608\ube44 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4. \"\uc601\uad6d \uc57d\ub9ac\ud559\ud68c(British Pharmacological Society)\"\ub294 \ub3d9\ubb3c \ubaa8\ub378\uc744 \ud1b5\ud574 \ucd08\uae30 \uc548\uc804 \ubc0f \uc57d\ubb3c \ub300\uc0ac \uc815\ubcf4\ub97c \ud655\ubcf4\ud568\uc73c\ub85c\uc368 \uc778\uac04 \uc784\uc0c1 \uc2dc\ud5d8\uc758 \uc704\ud5d8\uc744 \uc904\uc77c \uc218 \uc788\ub2e4\uace0 \uc9c4\uc220\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uac1c\ubc1c\ub41c \uc57d\ubb3c\uc758 \uacbd\uc6b0 \uc778\uac04\uc5d0\uc11c \uc608\uc0c1\uce58 \ubabb\ud55c \ubd80\uc791\uc6a9\uc774 \ub098\ud0c0\ub0a0 \uc704\ud5d8\uc774 \uc788\uc73c\uba70, \uc774\ub294 \uc778\uac04\uacfc \ub3d9\ubb3c \ubaa8\ub450\uc758 \uc548\uc804\uc744 \uc704\ud611\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc704\ud5d8\uc744 \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4; \ubbf8\uad6d \uc2dd\ud488\uc758\uc57d\uad6d(Food and Drug Administration)\uc740 \uc0c8\ub85c\uc6b4 \uc57d\ubb3c\uc758 \ud6a8\uacfc\uc640 \uc548\uc804\uc131\uc744 \uac80\uc99d\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud544\uc218 \ub2e8\uacc4\ub85c \uaddc\uc815\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d\uc758 \uc548\uc804\uc131\uacfc \uc720\ud6a8\uc131\uc744 \uac80\uc99d\ud558\ub294 \uc8fc\uc694 \uc218\ub2e8\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc758\uc57d\ud488 \uac1c\ubc1c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc548\uc804\uc131\uacfc \uc7a0\uc7ac\uc801 \ud6a8\uacfc\ub97c \ud3c9\uac00\ud558\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c\uc758 \uc720\ud6a8\uc131\uacfc \uc548\uc804\uc131\uc744 \uac80\uc99d\ud558\uae30 \uc704\ud55c \ud544\uc218 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d \uac1c\ubc1c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ubcf4\uc7a5\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \uc548\uc804\uc131\uc758 \ucd08\uae30 \ub2e8\uacc4\ub97c \uac80\uc99d\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c\uc758 \ucd08\uae30 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc2e0\uc57d \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc548\uc804\uc131 \ud14c\uc2a4\ud2b8 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c\uc758 \uc720\ud6a8\uc131\uc744 \ud655\uc778\ud558\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\uc778\uac04\uc5d0\uac8c \uc548\uc804\ud55c \uc2e0\uc57d \uac1c\ubc1c\uc744 \uc704\ud55c \uc9c1\uc811\uc801\uc778 \uac80\uc99d \uacfc\uc815\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \ubc0f \uc758\uc57d\ud488\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ubcf4\uc7a5\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c\uc758 \uc815\ud655\uc131\uacfc \uc548\uc804\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc2ec\uac01\ud55c \uc9c8\ud658\uc744 \uc77c\uc73c\ud0a4\ub294 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131 \uac80\uc99d\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \uc2ec\uac01\ud55c \ubd80\uc791\uc6a9\uc744 \uc608\uce21\ud558\uace0 \uc608\ubc29\ud558\ub294 \ub370 \ub3c4\uc6c0\uc744 \uc90d\ub2c8\ub2e4. '\ubbf8\uad6d\uc2dd\ud488\uc758\uc57d\uad6d (FDA)'\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub97c \uc758\uc57d\ud488 \uc2b9\uc778 \uacfc\uc815\uc5d0\uc11c \ud544\uc218\uc801\uc73c\ub85c \ud65c\uc6a9\ud55c\ub2e4\uace0 \uba85\uc2dc\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc548\uc804\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc911\ub300\ud55c \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\uc81c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ud655\ub9bd\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d \uac1c\ubc1c\uc758 \uae30\ubcf8\uc801\uc778 \ub2e8\uacc4\ub85c, \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \uac80\uc99d\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d\uc758 \uc548\uc804\uc131 \ud3c9\uac00\uc5d0 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"18_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","18_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"YHLTQPEaz0BjutlAnqrOQNYR1kCqo9JAO3LZQJ1P00CY4tBAEFzQQALd0kAzS9NAco3QQC1T0UA\u002ff9RAnSnTQMAR2UASDNdAk5XUQOlt00AzHtFALUHUQB6l0kBDcNJA4kHeQIvv2EAV+dNAHO7RQDTp00CaGNNAUILPQHNS1ECIndNA8\u002fHSQNjc1ECnqshAI5vSQGOH00A="},"y":{"dtype":"f4","bdata":"cY1kvp0eH7\u002fysi6\u002fNKYHv1OuOb9MrvO+k\u002fMgv9g2Mb4+PBi\u002f0k8AvzzYm76hDxW\u002fTEVlvjXibb7avIC9bFD7vnT1H7+A6Ea\u002f4xz7vs6JGL5jrN2+Df0Rvw1wvL4Iyha\u002fz5IDvzK3Ir9KFAO\u002fNyEWv8RGEb9bgJO+TnxmvqcodL70iMS+rDWGvv9+F7\u002fLPdi+W0kBv2ZJ6L4="},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uadf9\ubcf5\uc744 \uc704\ud55c \uc8fc\uc694\ud55c \uacfc\ud559\uc801 \ubc1c\uacac\uc5d0 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud76c\uadc0 \uc9c8\ud658 \uc5f0\uad6c\uc758 \uc9c4\ucc99\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc758\uc874\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uc548\uc804\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \ub355\ubd84\uc5d0 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uc2e4\uc9c8\uc801\uc774\uace0 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ub370\uc774\ud130\ub97c \ud68d\ub4dd\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc6b0\ub9ac\ub294 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \ub354 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\ub97c \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc778 \uc5f0\uad6c \ub2e8\uacc4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub9ce\uc740 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud574 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95\uc744 \ubc1c\uacac\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc2e4\ud5d8 \ub370\uc774\ud130\ub97c \uc218\uc9d1\ud558\ub294 \uac83\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc5f0\uad6c\ub294 \ubd88\uce58\ubcd1 \uce58\ub8cc\uc758 \ubc1c\uc804\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \ubaa8\ub378\uc740 \uc9c1\uc811\uc801\uc778 \uc784\uc0c1\uc801 \uc2e4\ud5d8\uc744 \uc218\ud589\ud558\uae30 \uc5b4\ub824\uc6b4 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc911\uc694\ud55c \uc790\ub8cc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c \uc911\uc99d \uc9c8\ud658\uc744 \uce58\ub8cc\ud558\uae30 \uc704\ud55c \uac00\uc7a5 \uc2e4\ud589 \uac00\ub2a5\ud55c \ubc29\ubc95 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uae30\uc874\uc758 \uc5f0\uad6c \uc131\uacfc\uac00 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc5d0 \uae30\uc5ec\ud558\ub294 \ud6a8\uacfc\ub97c \ubb34\uc2dc\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc758 \uae30\ubcf8\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ub97c \uc704\ud55c \ud544\uc218\uc801\uc778 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uc2ec\uac01\ud55c \uc9c8\ubcd1 \uce58\ub8cc \uc5f0\uad6c\ub294 \uace0\ub3c4\ub85c \uc815\ud655\ud55c \ub370\uc774\ud130\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \ub300\ud574 \ud544\uc218\uc801\uc778 \uae30\ucd08 \uc790\ub8cc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc5f0\uad6c\ub294 \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\ubc95 \ubc1c\uc804\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc218\ub9ce\uc740 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uc911\uc694\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud574 \uc654\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \ud68d\uae30\uc801\uc778 \ubc1c\uacac\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc758 \uac1c\ubc1c\uc5d0\ub294 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\uc911\ub300\ud55c \uc9c8\ud658\uc758 \uce58\ub8cc\ub97c \uc704\ud574\uc11c\ub294 \uc2e4\ud5d8 \ub3d9\ubb3c\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c4 \uc790\ub8cc\uac00 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \ub300\ud55c \uae30\ucd08 \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ud655\uc7a5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uc774\ud574\uc640 \uce58\ub8cc \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uc9c4\ud589\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud55c \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uc5f0\uad6c \uac1c\ubc1c\uc744 \uc704\ud574\uc11c\ub294 \ub2e4\uc591\ud55c \uc2e4\ud5d8\uc774 \ud544\uc694\ud558\uba70, \ub3d9\ubb3c \ubaa8\ub378\uc740 \uadf8 \uacfc\uc815\uc5d0\uc11c \uadc0\uc911\ud55c \uc5ed\ud560\uc744 \uc218\ud589\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub9ce\uc740 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ud06c\uac8c \uc758\uc874\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\uae30 \uc704\ud574\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"19_\
