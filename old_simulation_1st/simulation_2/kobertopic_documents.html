558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c \uc544\ub798 \uc2dc\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uad00\ub9ac \uc870\uce58\uac00 \uac15\ud654\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\ub294 \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc5d0 \uc758\ud574 \uc5c4\uaca9\ud788 \uaddc\uc81c\ub418\uc5b4 \uc788\uc73c\uba70, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uadf9\ub3c4\uc758 \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0\uc11c \uc218\ud589\ub418\uba70 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc774\ub044\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\ub300\ud55c \uc724\ub9ac\uc801\uc73c\ub85c \uc2e4\uc2dc\ub418\uace0 \uc788\uc73c\uba70 \uc5f0\uad6c\uc790\ub4e4\uc740 \ud56d\uc0c1 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\uace0 \ub178\ub825\ud569\ub2c8\ub2e4","\ubd88\ud544\uc694\ud55c \ub3d9\ubb3c \ud76c\uc0dd\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uc808\ucc28\uac00 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0 \uc218\ud589\ub418\uba70, \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \ubc29\ubc95\uc774 \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\ub3c4 \uace0\ud1b5\uc744 \ub290\ub084 \uc218 \uc788\ub294 \uc0dd\uba85\uccb4\ub77c\ub294 \uc6b0\ub824\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0 \uc218\ud589\ub418\uc5b4 \ub3d9\ubb3c\uc758 \ubd88\ud544\uc694\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\uace0 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\uc5d0 \ub300\ud55c \uc6b0\ub824\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub178\ub825\uc774 \uc774\ubbf8 \uc874\uc7ac\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uaddc\uc81c \uc544\ub798 \uc218\ud589\ub418\uba70, \uc774\ub97c \ud1b5\ud574 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc774 \uacc4\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud558\ub294 \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uae30\uc900\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uad00\ub828 \uc5f0\uad6c\ub294 \uac00\ub2a5\ud558\uba74 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \uc9c4\ud589\ub418\uba70, \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc5c4\uaca9\ud788 \uc801\uc6a9\ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uc774 \uace0\ud1b5\uacfc \uc2a4\ud2b8\ub808\uc2a4\ub97c \ub290\ub084 \uc218 \uc788\ub2e4\ub294 \uc810\uc744 \uc5f0\uad6c\uc790\ub4e4\ub3c4 \uc778\uc9c0\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uc808\ucc28\uac00 \uc5c4\uaca9\ud788 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \ub9ce\uc740 \uae30\uad00\ub4e4\uc774 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uc704\ud574 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc744 \ub530\ub974\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\ub300\uc758 \uc724\ub9ac \uae30\uc900\uc740 \ub3d9\ubb3c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud55c \uacbd\uc6b0\uc5d0\ub3c4 \ucd5c\ub300\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud574\uc57c \ud55c\ub2e4\ub294 \ub178\ub825\uc740 \uba85\ud655\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uc6b0\ub824\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc5c4\uaca9\ud788 \uad00\ub9ac\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc740 \ub3d9\ubb3c \ubcf5\uc9c0 \ud5a5\uc0c1\uc744 \uc704\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ucc98\ub9ac\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uba74\uc11c \uc5f0\uad6c\ub97c \uc9c4\ud589\ud560 \uc218 \uc788\ub3c4\ub85d \ub3c4\uc6c0\uc744 \uc90d\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc774\ubbf8 \uc5c4\uaca9\ud558\uac8c \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub3d9\ubb3c\ub4e4\uc774 \uacaa\ub294 \uace0\ud1b5\uc744 \uac00\ub2a5\ud55c \ud55c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\uacfc \uc808\ucc28\ub97c \ub530\ub985\ub2c8\ub2e4","\uc6b0\ub9ac\ub294 \ucd5c\ub300\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc9c0\ud0a4\uba70 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud558\uc5ec \ucd5c\uc18c\ud654\ub41c \uace0\ud1b5 \uc18d\uc5d0 \uc911\uc694\ud55c \uc5f0\uad6c \uc131\uacfc\ub97c \uc5bb\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900 \uac15\ud654\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud6a8\uacfc\uc131\uacfc \ucc45\uc784\uc131\uc744 \ub3d9\uc2dc\uc5d0 \ub192\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\ub294 \ubc29\uc548\uc774 \uc774\ubbf8 \uc2dc\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uadf9\ub3c4\ub85c \uc81c\ud55c\ub41c \ud658\uacbd\uc5d0\uc11c\ub9cc \ud5c8\uc6a9\ub418\uba70, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc778 \uac1c\uc120\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uac15\ub825\ud55c \uc724\ub9ac \uae30\uc900\uc744 \ud1b5\ud574 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uac10\uc18c\uc2dc\ud0a4\uba74\uc11c\ub3c4 \uc911\uc694\ud55c \uacfc\ud559\uc801 \ubc1c\uacac\uc744 \uac00\ub2a5\ud558\uac8c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uaddc\uc81c\uc640 \uac10\ub3c5\uc744 \ud1b5\ud574 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub3d9\ubb3c\ub4e4\uc5d0\uac8c \uace0\ud1b5\uc744 \uc8fc\uc9c0 \uc54a\ub3c4\ub85d \uc124\uacc4\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \uac83\uc740 \ub9e4\uc6b0 \uc911\uc694\ud558\uba70, \uc724\ub9ac\uc801\uc778 \uace0\ub824\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc2ec\uc5d0 \uc788\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uaddc\uc81c\ub97c \ud1b5\ud574 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\uc640 \uc724\ub9ac\ub97c \ubcf4\uc7a5\ud558\uae30 \uc704\ud55c \uc9c4\uc804\ub41c \uaddc\uc81c\uac00 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559\uc790\ub4e4\uc740 \ub3d9\ubb3c\uc5d0\uac8c \ucd5c\uc18c\ud55c\uc758 \uace0\ud1b5\uc744 \uc8fc\uae30 \uc704\ud574 \uc5c4\uaca9\ud55c \uc9c0\uce68\uc744 \ub530\ub985\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc5d0 \ub530\ub77c \uc5c4\uaca9\ud788 \uad00\ub9ac\ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uacc4\uc18d\ud574\uc11c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc6b0\ub824\ub97c \uc644\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uae30\uc900\uc774 \uc774\ubbf8 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uaddc\uc81c\ub294 \uacc4\uc18d \uac15\ud654\ub418\uc5b4 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c \ud558\uc5d0 \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc778 \ub51c\ub808\ub9c8\uc5d0 \ub300\ud55c \ucd5c\uc120\uc758 \ub300\uc751\ucc45\uc774 \ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucca0\uc800\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798 \uc2dc\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub294 \uc5c4\uaca9\ud788 \ubcf4\ud638\ub418\uba70, \ubaa8\ub4e0 \uc5f0\uad6c\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uc724\ub9ac\uc801 \uc2e4\ud5d8 \uae30\uc900\uc740 \ub04a\uc784\uc5c6\uc774 \uac15\ud654\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc2e4\ud5d8\uacfc\uc815\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ub370 \uc788\uc5b4 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \uaddc\uc815\uc774 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4; \ubbf8\uad6d \ub3d9\ubb3c\ubcf5\uc9c0\ubc95\uc744 \uac10\ub3c5\ud558\ub294 \uae30\uad00\uc778 \ubbf8\uad6d \ub18d\ubb34\ubd80(US Department of Agriculture)\uc5d0\uc11c\ub294 \uc5f0\uad6c \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\uc7a5\ud558\ub3c4\ub85d \uaddc\uc81c\ub97c \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uc5f0\uad6c \uc724\ub9ac\uac00 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \uaddc\uc81c\uc640 \uc9c0\uce68\uc774 \uac15\ud654\ub418\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc218\ud589\uc774 \ubcf4\uc7a5\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uc5d0\uac8c \uac00\ud574\uc9c0\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\uc2dd\uc73c\ub85c \uc2e4\ud5d8\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\uc5d0 \ub530\ub77c \uc9c4\ud589\ub418\uba70, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub178\ub825\uc774 \ubcd1\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\uc5d0 \ub300\ud55c \ud5a5\uc0c1\ub41c \uc9c0\uce68\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \ubcf5\uc9c0 \uae30\uc900\uacfc \uc2e4\ud5d8\uc758 \uc815\ub2f9\uc131\uc5d0 \ub300\ud55c \uc5c4\uaca9\ud55c \uaddc\uc815\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc774 \uc774\ubbf8 \uc874\uc7ac\ud558\uba70 \uc5c4\uaca9\ud788 \ud1b5\uc81c\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c\ub294 \uc5c4\uaca9\ud55c \uaddc\uc81c\uac00 \ub9c8\ub828\ub418\uc5b4 \uc788\uc5b4 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc808\ucc28\uac00 \ucca0\uc800\ud788 \uc900\uc218\ub429\ub2c8\ub2e4","\uc14b\uc9f8, \uaddc\uc815\ub41c \uc724\ub9ac \uae30\uc900\uc744 \ucda9\uc871\ud558\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc774\ub8e8\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc911\uc5d0\ub294 \uc5c4\uaca9\ud55c \uc2ec\uc758\uc640 \uc724\ub9ac \uc704\uc6d0\ud68c\uc758 \ud5c8\uac00\ub97c \ubc1b\uc740 \uacbd\uc6b0\uc5d0\ub9cc \uc2dc\ud589\ub418\uba70, \uc774\ub294 \ub3d9\ubb3c\uc774 \ubc1b\uc744 \uc218 \uc788\ub294 \ubd88\ud544\uc694\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc744 \ud1b5\ud574 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub3c4\ub85d \uc9c4\ud589\ub429\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \uc6b0\ub824\ub97c \ucd5c\uc18c\ud654\ud558\uba74\uc11c\ub3c4 \ud6a8\uacfc\uc801\uc778 \uc5f0\uad6c\ub97c \uc9c0\uc18d\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uac80\ud1a0\uc640 \uc5c4\uaca9\ud55c \uaddc\uc81c\uac00 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc644\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc2dc \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc740 \ud604\uc7ac\ub3c4 \uc5c4\uaca9\ud558\uac8c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub54c\ub54c\ub85c \ub3d9\ubb3c\uc774 \uacaa\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\ub294 \uad00\ub9ac \uc2dc\uc2a4\ud15c\uc744 \ud1b5\ud574 \uc724\ub9ac\uc801 \uace0\ub824\uac00 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uad00\ub828\ud55c \uaddc\uc81c\ub294 \uc5f0\uad6c \uacfc\uc815\uc5d0\uc11c \ubc18\ub4dc\uc2dc \uc9c0\ucf1c\uc57c \ud560 \uc911\uc694\ud55c \uc694\uc18c\ub85c \uc790\ub9ac\uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc904\uc774\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uac8c\ub2e4\uac00, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc815\uacfc \uc9c0\uce68\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900 \ud558\uc5d0 \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\ud558\uc5d0 \uc9c4\ud589\ub418\uba70, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\uace0 \ub178\ub825\ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\ub294 \uac83\uc774 \uacfc\ud559\uc790\ub4e4\uc758 \uc758\ubb34\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucca0\uc800\ud55c \uc724\ub9ac\uc801 \uac80\ud1a0\uc640 \uaddc\uc81c\ub97c \ud1b5\ud574 \uc218\ud589\ub418\uba70 \uac00\uae09\uc801 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub3c4\ub85d \uc124\uacc4\ub429\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \ud2b9\ubcc4\ud55c \uaddc\uc81c\uc640 \uae30\uc900\uc744 \ud1b5\ud574 \ud574\uacb0\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc774 \uc874\uc7ac\ud558\uba70, \uc774\ub7ec\ud55c \uae30\uc900\uc744 \uc900\uc218\ud558\ub294 \uac83\uc774 \uc724\ub9ac\uc801 \uacbd\uacc4\ub97c \uc124\uc815\ud558\ub294 \ub370 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uc724\ub9ac\uc131\uc744 \uac15\ud654\ud558\ub294 \uac10\ub3c5 \uc2dc\uc2a4\ud15c\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\uc744 \ub530\ub974\uba70 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub3c4\ub85d \uc124\uacc4\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \ub3d9\ubb3c \ucde8\uae09 \uae30\uc900\uc774 \uc5c4\uaca9\ud788 \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc644\ud654\ud558\uae30 \uc704\ud574 \ucca0\uc800\ud55c \uaddc\uc81c\uc640 \uc2ec\uc0ac\ub97c \ud1b5\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc218\ud589\ub429\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ub3c4\uc785\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\ub418, \uc774\ub97c \uc644\uc804\ud788 \ubc30\uc81c\ud558\uc9c0 \ub9d0\uc544\uc57c \ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uc5ec \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uad00\ub9ac\uac00 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c\uc758 \ub3d9\ubb3c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc5c4\uc218\ud558\ub294 \uc2dc\ud589 \uc9c0\uce68\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uc744 \ubcf4\uc7a5\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc815\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ub9ce\uc740 \uc5f0\uad6c\uae30\uad00\ub4e4\uc774 \uc5c4\uaca9\ud55c \uc9c0\uce68\uc744 \ub530\ub985\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uace0\ub824\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\ud55c \ubd80\ubd84\uc73c\ub85c, \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uc9c0\uce68\uc744 \ud1b5\ud574 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub17c\ub780\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\uc18c\ud55c\uc758 \uace0\ud1b5\uc73c\ub85c \uc5c4\uaca9\ud788 \uaddc\uc81c\ub429\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"2_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","2_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"RLJLQWTgTEFxqUlBvOhMQa1CS0HvDE1B\u002fTFKQT9vTUGnflFBnspNQX5IS0GDfk1BPJxNQZ8RS0GMDkpBdEJNQc9BSEE2cU1BdUlNQYXxRkFGWUpBGiNNQSwrSkGY4UVBu3xLQdfMS0FKH05Bit1LQQXgS0F1mUlBgkROQTDBS0FSIExB4vJKQSf+TEF96k1BLShOQXeMRkHTHE5BWd5RQaVXTEHLA0tBPI9QQfVxTUFfnE1BwtJRQQ7STUGwGkpBU81GQZQvRkE2VUhBjWNLQTeYTUFGVUZB3ChLQY+dUEEDAE5BczVQQVRdTkHTyE1B5qxLQQJFSEFe\u002fE1BlvxLQWjESUEqp09Bg2FLQcNbUUEwi01BPu5MQSWDTUHnaklBYjRLQZukT0EhmEZB3OFGQdnMTUHKglBBBz1KQblDS0F7BEhBmOhOQVDoS0F5+E9BRYBPQSdjS0HJyU5B6jNMQQ=="},"y":{"dtype":"f4","bdata":"LybjQLZR7EC8gONArivsQI5Q90ByfexAZA\u002faQB737UDRcsNAuJXwQJil4UAl3u5ApkrvQCSU90Alh+BA4JTtQLhDykAkefFAIm7tQOjpzEC0S9xAMiHxQLun1kB0TMtAPBH3QLmH30BmS\u002fBAAD32QFHvzEA2ft9A1lPuQGGR1kB1wdBA7dX3QL3t70CIEvFApFfRQC+wzEDHzvFAtCDHQNY21UDHQuBA5cLKQNZy7UBKYNNACDPFQIJr8UBYttdAkTTKQP54y0CEVMtAx0j2QFVW7kD3QMxA8sXfQA1Ry0CQLu9AE8zEQDim70Bad\u002fFAWpboQJln4EDkmO9A3CzxQJg\u002fwUAGOMxATPPjQBO4x0CHFO9APKfyQGTX7UCwHuJAMlLcQGEXy0D848tAeGHMQIo28UCzW8tAxRvjQPYb5kCUhcxAXNbMQOJY30A818tAE9jKQLPv5UAfufBAzpHfQA=="},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\uc14b\uc9f8, \uc724\ub9ac\uc801 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubbf8\ub798\uc758 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc704\ud574 \uc911\uc694\ud55c \uc790\ub8cc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c4\ubcf4\uc801\uc778 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95\uc758 \ud6a8\uacfc\uc131 \ud3c9\uac00\uc5d0\ub3c4 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uacfc\ud559\uc801 \ud601\uc2e0\uc740 \ub300\uccb4 \uae30\uc220\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc870\ud654\ub85c\uc6b4 \ubc1c\uc804\uc744 \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4. '\uc720\ub7fd \uc758\uc57d\ud488\uccad (EMA)'\uc740 \ucc28\uc138\ub300 \uc5f0\uad6c\uc5d0\uc11c \ub300\uccb4 \ubc29\ubc95\uacfc \ub3d9\ubb3c \uc2e4\ud5d8 \uac04\uc758 \uc0c1\ud638 \ubcf4\uc644\uc801 \uc811\uadfc\uc758 \ud544\uc694\uc131\uc744 \uc778\uc2dd\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc0c8\ub85c\uc6b4 \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uacfc \uac80\uc99d \ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \uae30\uc220\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uade0\ud615 \uc7a1\ud78c \ud22c\uc790\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\uc7a5\uae30\uc801\uc778 \ud574\uacb0\ucc45\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \ud1b5\ud569\uc801 \ud65c\uc6a9\uc5d0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \uae30\uc220\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801 \uad00\uacc4\ub97c \uc774\ub8f9\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \ub3d9\uc2dc\uc5d0 \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\uba3c\uc800, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uc0c8\ub85c\uc6b4 \uae30\uc220\uc740 \ubcf4\uc644\uc801\uc73c\ub85c \uc0ac\uc6a9\ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uacfc \ud65c\uc6a9\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ubcd1\ud589\ud574\uc11c \uc9c4\ud589\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud1a0\ub300\ub97c \ub9c8\ub828\ud568\uc73c\ub85c\uc368 \uc0c8\ub85c\uc6b4 \uc5f0\uad6c \ubc29\ubc95\ub4e4\uc774 \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc9c0\uc6d0\ud558\ub294 \ub2e4\ub9ac \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc810\uc810 \ub354 \uc911\uc694\ud55c \uc5f0\uad6c \ubd84\uc57c\ub85c \ubd80\uc0c1\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacc4\uc18d\ud574\uc11c \uc0c8\ub85c\uc6b4 \ub300\uc548\uc744 \ubaa8\uc0c9\ud558\uba70 \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc704\ud55c \uae30\ucd08 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ube44\ub3d9\ubb3c \uae30\ubc18 \uae30\uc220\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc870\ud654\ub86d\uac8c \ud65c\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub354 \uac15\ub825\ud55c \ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \uc0c1\ud638\ubcf4\uc644\uc801\uc778 \uad00\uacc4\uc5d0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \uae30\uc900\uc810 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ucca8\ub2e8 \uae30\uc220\uc774 \ud568\uaed8 \uc0ac\uc6a9\ub420 \ub54c \uc131\uacf5 \uac00\ub2a5\uc131\uc774 \ub192\uc544\uc9d1\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc5f0\uad6c\ub3c4 \ub3d9\ubb3c \uc5f0\uad6c\uc5d0\uc11c \ubc1c\uc804\ud569\ub2c8\ub2e4","\ud604\uc7ac \ud65c\uc6a9\ub418\ub294 \ubaa8\ub4e0 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc73c\ub85c \uc0ac\uc6a9\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0\ub3c4 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ucca8\ub2e8 \uae30\uc220\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc73c\ub85c \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc5bb\uc740 \uc815\ubcf4\ub294 \uc885\uc885 \ub300\uccb4 \ubaa8\ub378 \uac1c\uc120\uacfc \ubc1c\uc804\uc5d0\ub3c4 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \ud22c\uc790\ub294 \uacc4\uc18d \uc99d\uac00\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc870\uae08\uc529 \ub300\uc2e0\ud560 \uc218 \uc788\ub294 \uac00\ub2a5\uc131\uc744 \uc5f4\uc5b4\uc90d\ub2c8\ub2e4","\ube44\ub3d9\ubb3c \uae30\ubc18 \uc2e4\ud5d8\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c \ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc758\uc874\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ub300\uc548\uc801 \ubc29\ubc95\uc5d0 \ub300\ud55c \ud1b5\ucc30\uc744 \uc5bb\uc2b5\ub2c8\ub2e4; \ub9c9\uc2a4 \ud50c\ub791\ud06c \uc5f0\uad6c\uc18c(Max Planck Institute)\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uc9c0\uc2dd\uc744 \ubc14\ud0d5\uc73c\ub85c \ub300\uc548\uc801 \uc2e4\ud5d8 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \uae30\uc5ec\ud558\uace0 \uc788\uc74c\uc744 \uac15\uc870\ud569\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \uae30\uc220\uc740 \uc0c1\ud638\ubcf4\uc644\uc801\uc774\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc644\uc804\ud788 \ubc30\uc81c\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uc548 \uac1c\ubc1c\uc758 \ud1a0\ub300\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub300\uc548\uc801 \uc5f0\uad6c \ubc29\ubc95\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\uba70 \uc810\ucc28 \uadf8 \ube44\uc911\uc744 \ub354\ud574\uac00\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ucd09\uc9c4\uc81c\ub85c\ub3c4 \uc791\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95 \ubc1c\uc804\uc744 \uc704\ud55c \uc911\uc694\ud55c \ucc38\uace0 \uc790\ub8cc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \ucc3e\uae30 \uc704\ud55c \ud22c\uc790\uc640 \uc5f0\uad6c\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc778 \uad00\uacc4\uc5d0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \ub300\uc548 \uae30\ubc95\uc758 \uac1c\ubc1c\uacfc \uc801\uc6a9\uc740 \uc774\ubbf8 \uc5ec\ub7ec \uae30\uad00\uc5d0\uc11c \ud65c\ubc1c\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ucd5c\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\uc740 \uc624\ud788\ub824 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud6a8\uc728\uc131\uc744 \ub192\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c4 \uacb0\uacfc\ub294 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uc5d0\ub3c4 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub354\ubd88\uc5b4, \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \uc5f0\uad6c\ud558\ub294 \uacfc\uc815 \uc790\uccb4\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc5bb\uc5b4\uc9c4 \ub370\uc774\ud130\uc5d0 \uc758\uc874\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uacfc \ub3d9\ubb3c \uc2e4\ud5d8 \uac04\uc758 \uc0c1\ud638\ubcf4\uc644\uc740 \uae30\uc220 \ubc1c\uc804\uc758 \ud575\uc2ec\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc9c0\uc18d\uc801\uc778 \uacfc\ub3c4\uae30 \ub178\ub825\uc758 \uc77c\ud658\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \ubcd1\ud589\uc740 \uc11c\ub85c\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud558\uace0 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc0c1\ud638\ubcf4\uc644\uc801\uc73c\ub85c \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uc740 \ud65c\ubc1c\ud788 \uc9c4\ud589 \uc911\uc774\uba70, \uc774\ub294 \uad81\uadf9\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\uae30 \uc704\ud55c \uc911\uc694\ud55c \ubaa9\ud45c\uc785\ub2c8\ub2e4","\ud604\uc7ac \uacfc\ud559\uacc4\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud560 \uc218 \uc788\ub294 \ud601\uc2e0\uc801\uc774\uace0 \ub300\uccb4\uc801\uc778 \ubc29\ubc95\ub4e4\uc744 \uac1c\ubc1c\ud558\uae30 \uc704\ud574 \ub9ce\uc740 \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \uae30\uc220\uc740 \ubcd1\ud589\ud574\uc11c \ubc1c\uc804\ud560 \uc218 \uc788\uc73c\uba70, \uc774\ub294 \uad81\uadf9\uc801\uc73c\ub85c \uc778\uac04\uacfc \ub3d9\ubb3c \ubaa8\ub450\uc5d0\uac8c \uc720\uc775\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\uae30 \uc704\ud55c \ub300\uccb4 \uae30\uc220 \uc5f0\uad6c\ub3c4 \ubcd1\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \uc5f0\uad6c\uac00 \uc801\uadf9\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc0c8\ub85c \uac1c\ubc1c\ub41c \ub300\uccb4 \ubc29\ubc95\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ubcd1\ud589\ud558\uc5ec \ucda9\ubd84\ud55c \uac80\uc99d\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0\ub3c4 \ub3c4\uc6c0\uc744 \uc90d\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc81c\uc57d \uc5f0\uad6c \uae30\uad00\ub4e4\uc740 \uc810\ucc28 \ub300\uccb4 \ubc29\ubc95\uc744 \ud1b5\ud569\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0\ub3c4 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \ubc1c\uacac\uc740 \ub2e4\ub978 \ub300\uccb4 \ubc29\ubc95\uc5d0\uc11c\ub3c4 \uad6c\ud604\ud560 \uc218 \uc788\ub3c4\ub85d \uae38\uc744 \ub2e6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c \uc790\uccb4\uac00 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub370\uc774\ud130\ub97c \uae30\ucd08\ub85c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uc548 \uae30\ubc95\uc758 \uac1c\ubc1c\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uc2e4\ud5d8 \uacb0\uacfc\uc758 \uc2e0\ub8b0\uc131\uc744 \ud655\ubcf4\ud558\uae30 \uc704\ud574\uc11c\ub294 \ud604\uc7ac\uc758 \uae30\uc220\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud568\uaed8 \uc0ac\uc6a9\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uae30\uc220\uc758 \uc720\ud6a8\uc131\uc744 \ud3c9\uac00\ud558\uace0 \uac80\uc99d\ud558\ub294 \uae30\uc900\uc810\uc73c\ub85c\ub3c4 \ud65c\uc6a9\ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \ub3d9\uc2dc\uc5d0 \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacf5\uc874\ud558\uba70 \uc0c1\ud638 \ubcf4\uc644\uc801\uc73c\ub85c \uc0ac\uc6a9\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4. '\uad6d\uc81c \uc0dd\uba85\uacfc\ud559\uc5f0\uad6c\uc18c (ILAR)'\ub294 \ud604\ub300 \uc0dd\uba85\uacfc\ud559 \uc5f0\uad6c\uc5d0\uc11c\ub294 \ub2e4\uc591\ud55c \ubc29\ubc95\ub860\uc774 \ud1b5\ud569\ub418\uc5b4\uc57c \ud558\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uadf8\ub7ec\ud55c \ub2e4\uac01\uc801\uc778 \uc811\uadfc\uc758 \ud55c \ucd95\uc73c\ub85c\uc11c \uacc4\uc18d \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\ub2e4\uace0 \ubcf4\uace0\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uc0c8\ub85c\uc6b4 \uc5f0\uad6c \ubc29\ubc95 \uac04\uc758 \uade0\ud615 \uc788\ub294 \ubc1c\uc804\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5f0\uad6c\ub294 \uc9c0\uc18d \uac00\ub2a5\ud55c \ubc29\ubc95\uc758 \ubc1c\uc804\uc744 \uc7a5\ub824\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc740 \ubcf4\uc870 \uc218\ub2e8\uc73c\ub85c \ubc1c\uc804 \uc911\uc774\uba70, \uad81\uadf9\uc801\uc73c\ub85c \ub354 \uc548\uc804\ud55c \uc2e4\ud5d8 \ud658\uacbd\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \ubcd1\ud589 \uc5f0\uad6c\uac00 \ub354\uc6b1 \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc5f0\uad6c\ubc95\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \ud544\uc694\ud55c \ubd84\uc57c\uc640\uc758 \uade0\ud615\uc744 \ub9de\ucd94\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc7a5\uae30\uc801\uc73c\ub85c \ub3d9\ubb3c \ubcf5\uc9c0\uc5d0\ub3c4 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uacfc \ub3d9\ubb3c \ubcf5\uc9c0\ub294 \ubcd1\ud589\ud558\ub294 \uac83\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ubcd1\ud589\ud558\uc5ec \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \ud22c\uc790\ub3c4 \uc801\uadf9\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220 \uac1c\ubc1c\uacfc \ub3d9\uc2dc\uc5d0 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \ub300\uccb4 \ubc29\ubc95\uc744 \uc801\uadf9\uc801\uc73c\ub85c \ud0d0\uad6c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc744 \uc704\ud55c \uae30\ubc18\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub370\uc774\ud130\ub294 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \uae30\uc220\uc744 \uac1c\ubc1c\ud558\uc5ec \ub354 \ub098\uc740 \uacb0\uacfc\ub97c \ub3c4\ucd9c\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uae30\uc220\uc774 \ubc1c\uc804\ud568\uc5d0 \ub530\ub77c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcd1\ud589\ub418\uc5b4 \uac1c\ubc1c\uc758 \uc2e0\ub8b0\uc131\uc744 \ub192\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc644\ub8cc\ub41c \ud6c4 \uc724\ub9ac\uc801\uc778 \uc2e4\ud5d8 \ub300\uccb4 \uae30\uc220\uc744 \uc704\ud55c \uc5f0\uad6c\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \ud65c\ubc1c\ud788 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ube44\ub3d9\ubb3c \ubaa8\ub378 \uac1c\ubc1c\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc778 \uc874\uc7ac\ub85c \ud568\uaed8 \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uc0c8\ub85c\uc6b4 \uae30\uc220\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uc0c8\ub85c\uc6b4 \uae30\uc220\uc758 \ub3d9\uc2dc \ubc1c\uc804\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc778\uac04 \uc911\uc2ec\uc758 \uc5f0\uad6c\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"3_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","3_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"UOHdQAwVskARZN1ArF2zQMHGukA8NbZAi0+zQDwEwEAEt8JAyqzZQPa2vkAeF9pAxzyzQOwww0DL07FA3rqyQLVUsEBUH7FAGsDDQJV4wUDJd7JA0BC\u002fQEZc2kCq8bZAIXXCQD4Us0BPrcFAvTmzQKEwrEB6GcNAYVTcQE2EskCPAMJAtnbdQPJOsEB3H7RAXuSxQOXPrkBsM8NAXbfTQLCXwkCo+9pA\u002f6WuQEuV2kB3zqxAEkPaQGxNxUDbMddAGpOvQFpmxEC3ZMJA1pKuQLqHr0DyO7RAKWe2QFY9xEAAcqZAHzyyQMSVsUDU\u002fK9AaPuxQCK9ukAbU7NA90jaQCiUv0CDpLtAZSLeQFMGsUBiZ9pA5Z26QIvJ4UB729tAuu6vQIsl3EBgmrJAtxW0QIvmukBnjqtA5IPWQOcwwEDCEr1Af8PCQBfUv0A="},"y":{"dtype":"f4","bdata":"R\u002f+dQLU1r0BYQpxAhmewQHubukCoCLNAiou6QAkDukBvA7lAaLehQOULt0BXEaJAENmwQKwet0DTPa5AIXmvQB6gtUDaFK1A+Sy4QO6PuUC2R69AliO2QJzVoECHocFAMuq3QAFfsUDsNLhAYJ2uQLxDuUDcRbhApVqeQPaBsED7orlAKnCbQBmeukD7jrFAQ5OuQPpsu0BltrlAp1SnQH9ptkDcGaBAHGWqQKFnoUCEtrlAtQehQPl+uEAiWKVAh424QPuWuED0RbpAuLS4QF2ttkCtyLFA6kOzQNuPuUAslctAtCayQJrirkDYqKtAe3SwQPoptUBqq69AGo+hQG\u002f7ukBHP7pA4oacQAAHvkCOdaFAsSy7QESgm0DaVaNAony3QJ8JpED7i7FAGnuxQGoOtUBXzrtABsWkQAcGt0Db87ZAszW5QJAVsUA="},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\ud604\ub300\uc758 \uacfc\ud559 \uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc778\uacf5 \uc7a5\uae30\ub098 \uc138\ud3ec \uae30\ubc18 \uc2e4\ud5d8\uc740 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc7ac\ud604\ud558\uae30\uc5d0 \uc544\uc9c1 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\ud604\uc7ac \uae30\uc220\uc740 \ub3d9\ubb3c \ubaa8\ub378\uc774 \uc81c\uacf5\ud558\ub294 \ubaa8\ub4e0 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801, \uc57d\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc778\uac04 \uc138\ud3ec \uc2e4\ud5d8\uacfc \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc73c\ub85c \uc5b8\uae09\ub418\ub294 \uc778\uacf5 \uc7a5\uae30\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \ubd88\uacfc\ud569\ub2c8\ub2e4","\uc778\uac04 \uc138\ud3ec \ubaa8\ub378\uc774\ub098 \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uc740 \ud2b9\uc815 \uc5f0\uad6c \uc601\uc5ed\uc5d0\uc11c\ub294 \uc720\uc6a9\ud558\uc9c0\ub9cc, \uc720\uae30\uccb4 \uc804\uccb4\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\ubcbd\ud788 \uc7ac\ud604\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac\uc758 \ub300\uccb4 \uae30\uc220\ub85c\ub294 \ubaa8\ub4e0 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0 \ud544\uc694\ud55c \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc774\ub098 \uc778\uacf5 \uc7a5\uae30\ub294 \ucd08\uae30 \uc608\uce21 \ub2e8\uacc4\uc5d0\uc11c \uc720\uc6a9\ud558\uc9c0\ub9cc, \uc2e4\uc81c \uc0dd\uba85\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc7ac\ud604\ud558\uae30\uc5d4 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc778\uacf5 \uc7a5\uae30\ub098 \uc138\ud3ec \uae30\ubc18 \uc2e4\ud5d8\uc740 \uc544\uc9c1 \uc790\uc5f0 \uc0dd\ubb3c\ud559\uc801 \ub9e5\ub77d\uc744 \uc644\uc804\ud558\uac8c \uad6c\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc778\uacf5 \uc7a5\uae30\ub098 \uc624\uac00\ub178\uc774\ub4dc\ub294 \uc720\ub9dd\ud55c \ub300\uccb4 \uae30\uc220\uc774\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c \uc774\ub4e4\uc774 \ub3d9\ubb3c \ubaa8\ub378\uc744 \uc644\ubcbd\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ucca8\ub2e8 \uae30\uc220\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uac19\uc740 \uc0dd\ubb3c\uc758 \ubcf5\uc7a1\ud55c \uccb4\uacc4\uc801 \ubc18\uc751\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc2ec\uac01\ud55c \uc9c8\ubcd1 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc694\ud55c \ubcf5\ud569\uc801\uc778 \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\ubcbd\ud558\uac8c \ubaa8\ubc29\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc778\uacf5 \uc7a5\uae30\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc740 \ub3d9\ubb3c\uc758 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud558\uc9c0 \ubabb\ud55c\ub2e4\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uc778\uacf5 \uc7a5\uae30 \ub4f1 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc5ec\uc804\ud788 \uc81c\ud55c\uc801\uc774\uba70, \ubaa8\ub4e0 \uc0dd\uccb4 \ubc18\uc751\uc744 \ud3ec\uad04\uc801\uc73c\ub85c \uc608\uce21\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\ub85c\uc11c\ub294 \uc778\uacf5 \uc870\uc9c1\uc774\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378\uc774 \uc644\ubcbd\ud55c \ub300\uccb4\uc81c\uac00 \ub420 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \ubaa8\ubc29\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc778\uacf5\uc9c0\ub2a5\uacfc \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc740 \ub3d9\ubb3c\uc758 \uc0dd\ub9ac\uc801 \ubc0f \uba74\uc5ed \ubc18\uc751\uc744 \ubcf5\uc81c\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc774 \uac1c\ubc1c\ub418\uace0\ub294 \uc788\uc9c0\ub9cc, \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc644\uc804\ud788 \ubc18\uc601\ud558\uc9c0\ub294 \ubabb\ud569\ub2c8\ub2e4","\uc2e0\uc57d \uac1c\ubc1c\uc5d0\ub294 \uc778\uccb4\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc788\ub294 \ub300\uccb4 \ubc29\ubc95\uc774 \ubd80\uc871\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc778\uacf5\uc801 \ubaa8\ub378\uc774\ub098 \ub300\uccb4 \ubc29\ubc95\uc740 \ubcf5\uc7a1\ud55c \uc0dd\uba85\uccb4\uc758 \uc644\uc804\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc7ac\ud604\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\uc778\uacf5 \uc7a5\uae30\uc640 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc740 \ubcf5\uc7a1\ud55c \uc2dc\uc2a4\ud15c\uc758 \ud2b9\uc815 \uce21\uba74\uc744 \ubd84\uc11d\ud558\ub294 \ub370 \ub3c4\uc6c0\uc774 \ub420 \uc218 \uc788\uc9c0\ub9cc, \uc5ec\uc804\ud788 \uc804\uc2e0 \ubc18\uc751\uc744 \uc644\uc804\ud558\uac8c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uc778\uacf5 \uc7a5\uae30 \uc2e4\ud5d8\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc774\ub4e4\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc624\uac00\ub178\uc774\ub4dc \uae30\uc220\uc740 \uc8fc\ub85c \ub2e8\uc77c \uc870\uc9c1 \uc218\uc900\uc758 \uc2e4\ud5d8\uc5d0 \uc81c\ud55c\ub429\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \ubc1c\uc804 \ub2e8\uacc4\uc5d0\uc11c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ucda9\ubd84\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\ub9cc\uc73c\ub85c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ucda9\ubd84\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc778\uacf5 \uc7a5\uae30\ub098 \uc138\ud3ec \uae30\ubc18 \uc2e4\ud5d8\uc740 \uc544\uc9c1 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ud658\uacbd\uc744 \uc644\ubcbd\ud788 \ubaa8\ubc29\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \ub3d9\ubb3c \uc804\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc7ac\ud604\ud558\ub294 \ub370 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \uc778\uac04\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc815\ud655\ud558\uac8c \ubaa8\uc0ac\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uc138\ud3ec \ubaa8\ub378\uc774\ub098 \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uc740 \ud2b9\uc815 \uc5f0\uad6c \ub2e8\uacc4\uc5d0\uc11c \uc720\uc6a9\ud558\uc9c0\ub9cc, \uc644\uc804\ud55c \uc720\uae30\uccb4\uc758 \ubcf5\uc7a1\uc131\uc744 \uc7ac\ud604\ud558\uac70\ub098 \uc608\uce21\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2dc\ud5d8\ubc95\uc758 \ubc1c\uc804\uc774 \uacc4\uc18d\ub418\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ud604\uc7ac \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubc0f \uc57d\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc815\ud655\ud788 \ubaa8\ubc29\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc740 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc740 \uc911\uc694\ud55c \ubaa9\ud45c\uc774\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc0dd\ub9ac\uc801 \ubc0f \ubcd1\ub9ac\uc801 \ud604\uc0c1\uc744 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4. '\ud558\ubc84\ub4dc \uba54\ub514\uceec \uc2a4\ucfe8'\uc740 \ud604\uc7ac\uc758 \ub300\uccb4 \uae30\uc220\uc774 \uad11\ubc94\uc704\ud55c \uc0dd\uccb4 \ub0b4 \ud658\uacbd\uc744 \uc644\ubcbd\ud788 \ubaa8\uc0ac\ud558\uc9c0 \ubabb\ud55c\ub2e4\uace0 \ud558\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\ud788 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0\uc11c \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc774\ub77c\ub294 \uc810\uc744 \uac15\uc870\ud569\ub2c8\ub2e4","\uae30\uacc4 \ud559\uc2b5\uacfc \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uc740 \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc758 \uc77c\ubd80\ub97c \ubaa8\ub378\ub9c1\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc778\uac04\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud558\uac8c \ubc18\uc601\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ud604\uc7ac \ub300\uc548\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc2e4\uc81c \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ubcf5\uc7a1\uc131\uc744 \ucda9\ubd84\ud788 \ubaa8\uc0ac\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uc2e4\uc81c \uc0dd\uccb4 \ud658\uacbd\uc744 \uc815\ud655\ud788 \ubaa8\ubc29\ud558\ub294 \uac83\uc740 \ud604\uc7ac\uc758 \ub300\uccb4 \uae30\uc220\ub85c\ub294 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uc774\ub098 \uc778\uacf5 \uc870\uc9c1 \uc2e4\ud5d8\ub9cc\uc73c\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ube44\ub85d \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uc138\ud3ec \ubc30\uc591\uacfc \uac19\uc740 \ub300\uccb4 \uae30\uc220\ub4e4\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ubc29\ubc95\ub4e4\uc740 \uc2e4\uc81c \uc0dd\uccb4 \ub0b4 \ud658\uacbd\uc744 \uc644\ubcbd\ud788 \uc2dc\ubbac\ub808\uc774\uc158\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158 \ubc0f \uc904\uae30\uc138\ud3ec \uc2e4\ud5d8\uc740 \uc2e4\uc81c \uc0dd\ubb3c\uacc4\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4\uc640 \uc720\uc0ac\ud55c \ubc18\uc751\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud558\ub294 \ub370 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uc778\uacf5 \uc870\uc9c1 \uc0ac\uc6a9\uc740 \uc720\ub9dd\ud558\uc9c0\ub9cc \uc544\uc9c1 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub2ec\ub9ac \ud604\uc7ac\uc758 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ud604\ub300 \uae30\uc220\ub85c \uc544\uc9c1 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubcf5\ud569\uc131\uc744 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc778\uacf5 \uc9c0\ub2a5 \ubc0f \ubc30\uc591 \uc870\uc9c1 \ub4f1\uc758 \uae30\uc220\uc740 \ubcf4\uc870\uc801\uc778 \uc5ed\ud560\ub85c\uc368 \ud604\uc7ac\uc758 \uc5f0\uad6c\ub97c \uc9c0\uc6d0\ud558\uace0 \uc788\uc9c0\ub9cc, \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\ub294 \ud55c\uacc4\ub97c \uac00\uc9d1\ub2c8\ub2e4","\ub300\uccb4 \uc218\ub2e8\uc774 \ubc1c\uc804\ud558\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc, \uc774\ub294 \ub3d9\ubb3c \uc804\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \uc7ac\ud604\ud558\uae30\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc778\uacf5\uc9c0\ub2a5\uacfc \ube45\ub370\uc774\ud130\ub294 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c\ub294 \uc720\uc6a9\ud558\uc9c0\ub9cc, \uc2e4\uc81c \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \uc608\uce21\ud558\ub294 \ub370\uc5d0\ub294 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc740 \uc77c\ubd80 \uc601\uc5ed\uc5d0\uc11c\ub294 \uc131\uacf5\uc744 \uac70\ub450\uace0 \uc788\uc9c0\ub9cc, \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \ub3d9\ubb3c\uc758 \uc0dd\ub9ac\uc801 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc778\uac04 \uc720\ub798 \uc138\ud3ec\ub098 \uc870\uc9c1 \ubaa8\ub378, \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uc740 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc0dd\uba85\uc758 \uad6c\uc870\uc640 \ubcf5\uc7a1\uc131\uc740 \ub2e8\uc21c\ud788 \uc778\uacf5 \ubaa8\ub378\ub85c \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc778\uacf5 \uc7a5\uae30\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378\uc740 \ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ub300\uccb4 \uae30\uc220\ub85c\ub294 \uc0b4\uc544\uc788\ub294 \uc0dd\ubb3c\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud558\uac8c \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc740 \ub3d9\ubb3c \ubaa8\ub378\uc774 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uba85\uccb4 \uae30\ubc18\uc758 \ubc18\uc751\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc778\uacf5 \uc7a5\uae30\uc640 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc740 \uc720\ub9dd\ud558\uc9c0\ub9cc \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc778\uacf5 \uc7a5\uae30\ub098 \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uc740 \uc544\uc9c1 \uc2e4\ud5d8 \ub3d9\ubb3c\ub9cc\ud07c\uc758 \uc2e0\ub8b0\uc131\uacfc \uc815\ubc00\ub3c4\ub97c \uc81c\uacf5\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc774\ub098 \uc778\uacf5 \uc7a5\uae30\uc640 \uac19\uc740 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc544\uc9c1 \ub3d9\ubb3c \ubaa8\ub378\ub9cc\ud07c \uc815\ud655\ud55c \uacb0\uacfc\ub97c \uc8fc\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub9ce\uc740 \ub300\uccb4 \uae30\uc220\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uc0c1\ud669\uc5d0\uc11c \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \ubaa8\ubc29\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\uc778\uacf5\uc9c0\ub2a5 \uc2dc\ubbac\ub808\uc774\uc158\uc774\ub098 \uc138\ud3ec \ubc30\uc591\uacfc \uac19\uc740 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc7ac\ud604\ud558\ub294 \ub370\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\ub9cc\uc73c\ub85c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\ub4e4\ub85c\ub294 \ubcf5\uc7a1\ud55c \uc57d\ubb3c\uc758 \uc804\uc2e0\uc801 \ubc18\uc751\uc744 \ucda9\ubd84\ud788 \uac80\uc99d\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ud658\uacbd\uc758 \uc7ac\ud604\uc5d0 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ubcf5\ud569\uc801\uc778 \uc0dd\ub9ac\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud558\uae30\uc5d4 \ubd80\uc871\ud569\ub2c8\ub2e4","\ud604\uc7ac \uae30\uc874 \uae30\uc220\ub85c\ub294 \ub3d9\ubb3c\uacfc \uac19\uc740 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ucef4\ud4e8\ud130 \ubaa8\ub378\uacfc 3D \ubc30\uc591 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uc600\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ub300\uccb4 \uae30\uc220\ub9cc\uc73c\ub85c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uba85\uccb4 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \uc608\uce21\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uc778\uacf5 \uc7a5\uae30\ub294 \uc544\uc9c1 \ub3d9\ubb3c\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uc778\uacf5 \uc7a5\uae30\uc758 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ud604\uc7ac \uc774 \uae30\uc220\ub4e4\uc740 \uc804\uccb4 \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\ub4e4\uc774 \ube60\ub974\uac8c \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc0dd\ub9ac\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc7ac\ud604\ud558\uae30\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc0dd\ubb3c \ubaa8\ubc29 \uae30\uc220\uc774\ub098 \uc778\uacf5 \uc7a5\uae30 \ubaa8\ub378\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\ud07c\uc758 \uc2e0\ub8b0\uc131\uc744 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4 \ubc29\ubc95\uc774 \ub3d9\ubb3c \ubaa8\ub378\uc758 \ubcf5\uc7a1\ud55c \uc0dd\uba85 \ud604\uc0c1\uc744 \uc644\ubcbd\ud788 \ubaa8\ubc29\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","3D \uc138\ud3ec \ubaa8\ub378\uacfc \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158 \ub4f1 \ub300\uccb4 \uae30\uc220\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc0dd\ub9ac\ud559\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \uc778\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud5  \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1 \uc5f0\uad6c\uc758 \uc911\uc694\ud55c \uae30\ucd08\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1\uc758 \uc0dd\ub9ac\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud55c \uae30\ucd08 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uc9c8\ubcd1 \uc774\ud574\ub97c \ud655\ub300\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc911\uc694\ud55c \uc774\ud574\ub97c \uc81c\uacf5\ud558\ub294 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc5f0\uad6c\ub294 \uc778\uac04 \uc0dd\ub9ac\ud559\uc5d0 \ub300\ud55c \uc911\uc694\ud55c \uc774\ud574\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c0\ub294 \ub370\uc774\ud130\ub294 \uc9c0\uc18d \uac00\ub2a5\ud55c \uc758\ud559 \ubc1c\uc804\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc0dd\uba85 \uacfc\ud559 \uc804\ubc18\uc5d0 \uac78\uccd0 \uc911\uc694\ud55c \uacfc\ud559\uc801 \uc9c0\uc2dd\uc774 \ucd95\uc801\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc9c0\uc18d\ub418\ub294 \uc774\uc720 \uc911 \ud558\ub098\ub294 \ud0d0\uad6c\ud558\ub294 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\uc131 \ub54c\ubb38\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc758\ud559\uc801 \uc5f0\uad6c\uc758 \uae4a\uc774\ub97c \ub354\ud574\uc90d\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\ubb3c\ud559\uc801 \uba54\ucee4\ub2c8\uc998 \uc774\ud574\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc740 \ud2b9\uc815 \uc9c8\ud658\uc758 \ud2b9\uc131\uacfc \ubcf5\uc7a1\uc131\uc5d0\uc11c \uae30\uc778\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uac74\uac15\uc5d0 \uc9c1\uc811\uc801\uc778 \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4; \uc790\uc5f0\uacfc\ud559\uacc4\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub294 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc784\uc744 \uac15\uc870\ud558\ub294 \uac83\uc740 \ubbf8\uad6d \uad6d\ub9bd\ubcf4\uac74\uc6d0(National Institutes of Health)\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub3d5\uc2b5\ub2c8\ub2e4","\uc9c8\ubcd1\uc758 \uae30\uc804 \uc774\ud574\uc5d0 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ub2f4\ub2f9\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\ud569\uc801\uc778 \uc0dd\ubb3c\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\ub300\ud55c \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcd1\ub9ac\ud559\uc801 \uc774\ud574\ub97c \uc99d\uc9c4\uc2dc\ud0b5\ub2c8\ub2e4","\ub354\ubd88\uc5b4, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uc790\ub8cc\ub294 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub192\uc774\ub294 \ub370 \ud06c\uac8c \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c4 \ub370\uc774\ud130\ub294 \uc778\uac04 \uac74\uac15\uc5d0 \uc9c1\uc811\uc801\uc73c\ub85c \uc751\uc6a9\ub420 \uc218 \uc788\ub294 \uc804\ub2ec\ub825\uc744 \uac00\uc9d1\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\ubb3c\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c4 \ub370\uc774\ud130\ub294 \uc0ac\ub78c \uc0dd\uba85\uacfc \uac74\uac15\uc5d0 \uc9c1\uc811\uc801\uc778 \uc601\ud5a5\ub825 \uc788\ub294 \uacb0\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc774\ud574\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1\uc758 \uadfc\ubcf8 \uc6d0\uc778\uc744 \ucc3e\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub610\ud55c, \uc0dd\uccb4 \ub0b4 \uc5f0\uad6c\ub294 \uc608\uce21\ud560 \uc218 \uc5c6\ub294 \uc778\uac04 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\uc131\uc744 \ud574\uba85\ud558\ub294 \ub370 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uac74\uac15\uc744 \uc704\ud574 \ud544\uc218\uc801\uc778 \uc778\uc2dd\uacfc \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc758 \ubcf5\uc7a1\uc131\uc744 \uc774\ud574\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub294 \uc778\uac04 \uc9c8\ubcd1 \uc774\ud574\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uccb4\uc5d0 \ub300\ud55c \uc911\uc694\ud55c \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4; \uc138\uacc4\ubcf4\uac74\uae30\uad6c(World Health Organization)\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\uac00 \uc778\uac04 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0\uc11c \uc0dd\ubb3c\ud559\uc801 \uae30\ucd08 \uc774\ud574\ub97c \ub192\uc774\ub294 \ub370 \uc911\uc694\ud558\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uccb4\uc758 \ubcf5\uc7a1\uc131\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1\uc758 \ubcd1\ub9ac\ud559\uc801 \uc774\ud574\ub97c \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc885\uc885 \uc778\ub958\uc5d0\uac8c \ud575\uc2ec\uc801\uc778 \uc758\ubbf8\ub97c \uac00\uc9d1\ub2c8\ub2e4","\ub458\uc9f8, \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc758 \ubcf5\uc7a1\uc131\uc744 \uc81c\ub300\ub85c \uc774\ud574\ud558\uae30 \uc704\ud574\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294\ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uc5f0\uad6c \uacb0\uacfc\ub294 \uc608\uce21 \ubd88\uac00\ub2a5\ud55c \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \uae4a\uac8c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1\uc758 \ubcd1\ub9ac\ud559\uc801 \uc774\ud574\ub97c \uae4a\uac8c \ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc9c8\ubcd1 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1\uc758 \uc774\ud574\uc640 \uce58\ub8cc\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1\uc758 \uc774\ud574\ub97c \ucd09\uc9c4\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uac00 \uc9c1\uba74\ud55c \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub192\uc774\ub294 \ub370 \uacb0\uc815\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uacfc\uc815 \uc774\ud574\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uacfc\uc815\uc744 \uc774\ud574\ud558\ub824\uba74 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1 \uce58\ub8cc\uc5d0 \ud544\uc218\uc801\uc778 \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \uc2ec\ud654\uc2dc\ud0a4\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c\uc740 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc5f0\uad6c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uadc0\uc911\ud55c \uc0dd\ubb3c\ud559\uc801 \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ud604 \ub2e8\uacc4\uc5d0\uc11c\ub294 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1\uc758 \ub2e4\ucc28\uc6d0\uc801 \uc5ed\ud559\uc744 \uc5f0\uad6c\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubd88\uac00\uacb0\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uac74\uac15\uc744 \uc704\ud55c \uc911\uc694\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"6_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","6_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"wC3HQEX8xkAqQsZA77S3QByduUD5IbpACJu1QAmvu0Cpw7lAFbXLQBzAz0D9bLhAvxi3QBoDzEAqXsxAjr3MQI7x0kAWArtAVXTGQArUxUB+5t1Abt22QPVtu0CjftNAq7TGQLr2xUAac7dAv1jCQLUht0BMmstArGTRQJuYtkAq99BAZI+2QNT4xkCriMZAQkLSQB9dt0CT5NBAFkLSQHDHs0A7uL9AHHG7QKZSuUCvr7tAO5PHQKjEukDIx8xASZrOQGRPx0BCaM1AYxi3QDODuUBM8s5AJQLOQFNhskBr4cxAOO\u002fEQCRT0UB548NA"},"y":{ 4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\ub294 \uc790\ub8cc\ub294 \uadf8\ub807\uc9c0 \uc54a\uc73c\uba74 \ubd88\uac00\ub2a5\ud55c \ubc1c\uacac\ub4e4\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub9ce\uc740 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ubc1c\uc804\ub418\uc5b4 \uc654\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc218\ub9ce\uc740 \uc778\ub958 \uc9c8\ud658 \uce58\ub8cc\uc81c\ub97c \ubc1c\uacac\ud558\ub294 \uae30\ubc18\uc774 \ub429\ub2c8\ub2e4. '\ub178\ubc14\ud2f0\uc2a4 \uc5f0\uad6c \uc7ac\ub2e8'(Novartis Research Foundation)\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ub2e4\uc218\uc758 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\uc600\uc73c\uba70, \uc774\ub294 \uc778\uac04\uc758 \uc218\uba85\uc744 \uc5f0\uc7a5\ud558\uace0 \uc0b6\uc758 \uc9c8\uc744 \ud5a5\uc0c1\uc2dc\ud0a4\ub294\ub370 \ud06c\uac8c \uae30\uc5ec\ud558\uace0 \uc788\uc74c\uc744 \uac15\uc870\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c \uac00\uc18d\ud654\uc5d0 \ud070 \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\ubcf4\ub2e4 \ub354 \ube60\ub978 \uacb0\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uad81\uadf9\uc801\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc758 \ubc1c\uc804\uc744 \ube60\ub974\uac8c \uc9c4\ud589\uc2dc\ud0a4\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc778\ub958\ub294 \ubcf4\ub2e4 \ub098\uc740 \uce58\ub8cc\ubc95\uc744 \ubc1c\uacac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \ucd08\uae30 \ubc1c\uacac\uc740 \uce58\ub8cc \ud601\uc2e0\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uae30\uc5ec\ub85c \uc778\ud574 \ub9ce\uc740 \uce58\ub8cc\ubc95\uc774 \uac1c\ubc1c\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uacb0\uacfc\ub294 \uc5ec\uc804\ud788 \ub9ce\uc740 \uc9c8\ud658 \uce58\ub8cc\uc5d0 \ud601\uc2e0\uc801\uc778 \uae30\uc5ec\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c \uc18d\ub3c4\ub97c \ub192\uc774\ub294 \ub370 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\ub300\ud55c \uc0dd\uba85 \uacfc\ud559 \ubc1c\uacac\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc73c\ub85c \uac1c\ubc1c\ub41c \uce58\ub8cc\ubc95\uc774 \uc218\ubc31\ub9cc \uba85\uc758 \uc0dd\uba85\uc744 \uad6c\ud574\uc654\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85\uacf5\ud559 \ud601\uc2e0\uc744 \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud68d\uae30\uc801\uc778 \uce58\ub8cc\ubc95\uc774 \uac1c\ubc1c\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uc804\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95\uc758 \ubc1c\uc804\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc774\ub8e8\ub294 \ub370 \uc788\uc5b4 \ud544\uc5f0\uc801\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uc804\uc744 \ucd09\uc9c4\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub9ce\uc740 \uc758\ud559\uc801 \ubc1c\uc804\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc84c\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc758\ud559\uc801 \ud601\uc2e0 \ucd09\uc9c4\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ud604\uc7ac\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uc9c8\ubcd1 \uce58\ub8cc\uc758 \uae38\uc744 \uc5f4\uc5c8\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uacfc\ud559\uc801 \ubc1c\uacac\uc744 \uc704\ud55c \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uacac\uacfc \uc758\ud559 \ubc1c\uc804\uc5d0 \uc911\uc694\ud55c \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uc2e0\uc57d \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \ub355\ubd84\uc5d0 \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uc911\ub300\ud55c \uce58\ub8cc\ubc95\ub4e4\uc774 \uac1c\ubc1c\ub418\uc5c8\uc2b5\ub2c8\ub2e4. \"\uba54\uc774\uc694 \ud074\ub9ac\ub2c9(Mayo Clinic)\"\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc5c8\ub2e4\uba74 \ud604\uc7ac\uc758 \ub9ce\uc740 \uc758\ub8cc \ud601\uc2e0\uacfc \uce58\ub8cc \uc131\uacfc\uac00 \ubd88\uac00\ub2a5\ud588\uc744 \uac83\uc774\ub77c\uace0 \uc9c0\uc801\ud558\uba70, \uc774\ub294 \ub9ce\uc740 \ubaa9\uc228\uc744 \uad6c\ud558\ub294 \ub370 \uae30\uc5ec\ud588\ub2e4\uace0 \uc124\uba85\ud569\ub2c8\ub2e4","\ucd5c\uc2e0 \uacfc\ud559 \uc5f0\uad6c\uc758 \ubc1c\uc804\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc774\ub044\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \ub9ce\uc740 \uce58\ub8cc\ubc95\uc758 \uac1c\ubc1c\uc744 \uac00\ub2a5\ud558\uac8c \ud588\uc73c\uba70 \uadf8 \ub300\uac00\ub85c \uc0dd\uba85\uc744 \uad6c\ud588\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\ub7ec \uc758\ub8cc \ud601\uc2e0\uc758 \ubc11\uac70\ub984\uc774 \ub418\uc5b4\uc654\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud68d\uae30\uc801\uc778 \uc758\ud559\uc801 \ubc1c\uacac\uc758 \uae30\ucd08\uac00 \ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ub97c \uc704\ud55c \ud601\uc2e0\uc801 \uc57d\ubb3c \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uacf5\uac1c \uc18d\ub3c4\ub97c \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\ub9ce\uc740 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uac1c\ubc1c\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uacac\uacfc \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85\uacf5\ud559\uacfc \uc57d\ub9ac\ud559 \ubc1c\uc804\uc758 \uae30\ucd08\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uc804\uc744 \uac00\uc18d\ud654\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uac1c\ubc1c\ub41c \uce58\ub8cc\ubc95\uc740 \uc218\ub9ce\uc740 \uc0dd\uba85\uc744 \uad6c\ud574\uc654\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc218\ub9ce\uc740 \uc0dd\uba85\uc744 \uad6c\ud55c \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95\uc744 \uc804\ub2ec\ud558\ub294 \ub370 \uae30\uc5ec\ud574\uc654\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc758\ud559\uc801 \uc9c4\ubcf4\ub97c \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95\uc774 \uac1c\ubc1c\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc778\ub958\ub294 \uc218\ub9ce\uc740 \uce58\uba85\uc801\uc778 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uce58\ub8cc\ubc95\uc744 \ubc1c\uacac\ud588\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uce58\ub8cc\ubc95\uc758 \ubc1c\uacac\uc744 \uac00\uc18d\ud569\ub2c8\ub2e4","\uc0dd\uba85\uacfc\ud559 \uc5f0\uad6c\uc758 \ubc1c\uc804\uc5d0 \ud070 \uae30\uc5ec\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \ub3cc\ud30c\uad6c\ub97c \uc81c\uacf5\ud588\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d \uac1c\ubc1c\uacfc \uce58\ub8cc\ubc95 \uac80\uc99d\uc758 \uac00\uc18d\ud654\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uacfc\ud559\uc801 \ubc1c\uacac\uacfc \uc758\ub8cc \ud601\uc2e0\uc774 \ucd09\uc9c4\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\ub7ec \uc9c8\ud658 \uce58\ub8cc\uc758 \uc9c4\uc804\uc744 \uac00\ub2a5\ud558\uac8c \ud588\uc2b5\ub2c8\ub2e4","\uc9c8\ubcd1 \uc5f0\uad6c\uc758 \uc9c4\ud654\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uc548 \uae30\uc220\uc758 \uc870\ud654\ub97c \ud1b5\ud574 \ub354\uc6b1 \uac00\uc18d\ud654\ub420 \uac83\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uacac\uc758 \uae30\ubc18\uc744 \ub9c8\ub828\ud569\ub2c8\ub2e4","\ub9ce\uc740 \uacbd\uc6b0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \uae30\ucd08\uac00 \ub418\uc5b4 \uc654\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"7_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","7_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"JanzQAY0AkG9KAxBrQj4QDJQC0HZkPRAwSoHQZRSBUHkxwxBiDkAQfS590CUe\u002f9A+zUJQfhCAkHHUQhBfIEEQTmtAEEJxPRArp8IQQfE9EAaeQdBo23zQM7QA0E24edACaLyQHyFB0HatgBBtUgJQfDT80BuVPFAJF\u002f3QMJhAUECxwlB48fwQD7M8kD1hAlBei4GQZlZBEFquP9AVSP+QA4fB0GOQPhAutT2QBHP9ED3DgpBoksJQVyA\u002fkC95gVBKQILQRh5BEHua\u002fJAo\u002f0IQXzv\u002fUARMwBBMWMIQTPC\u002fkA7dvNARewGQe6wAUE="},"y":{"dtype":"f4","bdata":"bD8ZQHVGDUD6Yfc\u002fYrgbQ
