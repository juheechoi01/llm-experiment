        <script charset="utf-8" src="https://cdn.plot.ly/plotly-3.5.0.min.js" integrity="sha256-fHbNLP+GlIXN+efbQec78UkemUz3NJp7UmfGxC1tNxs=" crossorigin="anonymous"></script>                <div id="1195e50e-6954-4c6f-8212-41773c7ca3d2" class="plotly-graph-div" style="height:750px; width:1200px;"></div>            <script>                window.PLOTLYENV=window.PLOTLYENV || {};                                if (document.getElementById("1195e50e-6954-4c6f-8212-41773c7ca3d2")) {                    Plotly.newPlot(                        "1195e50e-6954-4c6f-8212-41773c7ca3d2",                        [{"hoverinfo":"text","hovertext":["\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \uacb0\uc815\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uc0dd\uba85\uacfc \uc9c1\uacb0\ub41c \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc758 \uac00\uad50 \uc5ed\ud560\uc744 \uc218\ud589\ud569\ub2c8\ub2e4","\uba3c\uc800, \ud604\uc7ac\uc758 \ube44\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\ub9ac\ud559\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \ubc18\uc601\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc740 \uc5f0\uad6c \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uace0\ub824\ud558\ub3c4\ub85d \uac15\ub825\ud788 \uaddc\uc815\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \ub3d9\ubb3c \ubaa8\ub450\uc5d0\uac8c \uc774\ub85c\uc6b4 \uacb0\uacfc\ub97c \ucc3d\ucd9c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc9c1\uc811 \uc2e4\ud5d8\uc744 \uc218\ud589\ud558\ub294 \ubd88\ud655\uc2e4\uc131\uc744 \uc904\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc2e4\uc81c\uc801 \uc720\uc775\uc131\uc740 \uc0c1\ub2f9\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ucd08\uae30 \ubc1c\uacac\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\ub294 \uacb0\uacfc\ub294 \uc9c1\uc811\uc801\uc778 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \ud61c\ud0dd\uc73c\ub85c \uc5f0\uacb0\ub429\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ud601\uc2e0\uc801\uc778 \uc758\uc57d\ud488 \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e4\uc81c \uc784\uc0c1 \ud6a8\uacfc\ub97c \uc608\uce21\ud558\ub294 \ud575\uc2ec \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc7a5\uae30\uc801\uc778 \uce58\ub8cc \ubc1c\uc804\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\ub958\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\uc131\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uae30\ucd08 \uc5f0\uad6c \ub2e8\uacc4\ub97c \ubcf4\uc7a5\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc608\uce21\ud558\ub294 \ub370 \uc788\uc5b4 \ub3c5\ubcf4\uc801\uc778 \uc7a5\uc810\uc744 \uac00\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc778\uacf5\uc9c0\ub2a5 \uc2dc\ubbac\ub808\uc774\uc158\uacfc \uac19\uc740 \ub300\uc548 \ubc29\ubc95\ub4e4\uc740 \ud604\uc7ac \uc2e0\ub8b0\uc131\uacfc \uc608\uce21\ub825\uc5d0 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc0dd\uba85\uacfc\ud559 \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uacfc\ud559\uc801 \uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \uc9c4\ubcf4\uc640 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ub3d9\uc2dc\uc5d0 \ucda9\uc871\uc2dc\ud0a4\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \ud568\uaed8 \ubc1c\uc804\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc9c4\ud589 \uacfc\uc815\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ube44\ub85d \uc724\ub9ac\uc801 \ub51c\ub808\ub9c8\ub97c \ub3d9\ubc18\ud558\uc9c0\ub9cc, \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc624\ub958\ub97c \ucd5c\uc18c\ud654\ud558\ub294 \uae30\ub2a5\uc744 \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\uc7ac\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15\uc744 \uc704\ud574 \ubd88\uac00\ud53c\ud55c \uc120\ud0dd\uc73c\ub85c, \uc774\ub294 \uacc4\uc18d\uc801\uc778 \uc724\ub9ac\uc801 \uac10\uc2dc \ud558\uc5d0 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uacfc \uc0c8\ub85c\uc6b4 \uc5f0\uad6c \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc810\uc9c4\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1\uae4c\uc9c0 \ubaa8\ub4e0 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0 \uc801\uc6a9\ud560 \uc218 \uc788\uc744 \ub9cc\ud07c \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0\ub294 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \uae30\uc900\uacfc \ubcf5\uc9c0 \uaddc\uc815\uc744 \uc5c4\uaca9\ud788 \uc900\uc218\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uba3c\uc800, \uc911\uc99d \uc9c8\ud658\uc758 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370\uc5d0\ub294 \ub3d9\ubb3c \ubaa8\ub378\uc774 \ubc18\ub4dc\uc2dc \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc815\ud655\uc131\uc744 \ub192\uc774\ub294 \uc911\uc694\ud55c \uc694\uc18c\ub85c \ubb34\uc2dc\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uccb4\uc5d0\uc11c \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \ubcf5\uc7a1\ud55c \uc0c1\ud638\uc791\uc6a9\uc744 \ubd84\uc11d\ud558\ub294 \ub370 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub300\uc548\uc801 \ubc29\ubc95\ub4e4\uc774 \uc544\uc9c1 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4; \uc601\uad6d\uc758 \ubbf8\uc0dd\ubb3c\ud559\ud68c(Microbiology Society)\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud604\uc7ac\ub85c\uc11c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc5f0\uad6c\ud558\uae30\uc5d0 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95 \uc911 \ud558\ub098\ub77c\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc744 \ub300\uc0c1\uc73c\ub85c \ud55c \uc2dc\ud589\ucc29\uc624\ub97c \uc904\uc5ec \uc90d\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\uac70\uc5d0 \uc5c6\ub358 \ub3cc\ud30c\uad6c\ub97c \ub9c8\ub828\ud588\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc720\ud6a8\uc131\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\uc815 \uc9c8\ud658\uc5d0 \ub300\ud55c \ud6a8\ub2a5 \uac80\uc99d\uc5d0\uc11c \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud558\uba70 \uc548\uc804\ud55c \uce58\ub8cc\uc81c\ub97c \ube60\ub974\uac8c \uc81c\uacf5\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \ud604\uc7ac \uc778\uac04 \uc9c8\ud658\uc758 \ubcf5\uc7a1\uc131\uc744 \uc5f0\uad6c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc9c8\ubcd1 \ud1f4\uce58\ub97c \uc704\ud55c \uc2e4\uc9c8\uc801\uc778 \uc9c4\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc838 \uc654\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc \ud6a8\uacfc \uac80\uc99d\uc758 \ud544\uc218 \uacfc\uc815\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c\uc640 \ubc31\uc2e0 \uac1c\ubc1c\uc758 \ud575\uc2ec\uc785\ub2c8\ub2e4","\ud604 \uc2dc\uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ube44\ub85d \uc724\ub9ac\uc801\uc778 \ub17c\ub780\uc774 \uc788\uc744 \uc218 \uc788\uc9c0\ub9cc, \ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc740 \uc0c1\ud669\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uc5f0\uad6c\uc5d0 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc77c\ubd80 \uc0ac\ub78c\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uaf2d \ud544\uc694\ud558\uc9c0 \uc54a\ub2e4\uace0 \uc8fc\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud601\uc2e0\uc801\uc774\uace0 \ud6a8\uacfc\uc801\uc778 \uc57d\ubb3c \uac1c\ubc1c\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\ub294 \uc774\uc775\uc740 \ud06c\uace0 \uba85\ud655\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c4 \ub370\uc774\ud130\ub294 \uc778\uac04 \uc784\uc0c1\uc2dc\ud5d8\uc758 \uc131\uacf5 \uac00\ub2a5\uc131\uc744 \ub192\uc785\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uacbd\uacc4 \ub0b4\uc5d0\uc11c \uacfc\ud559 \uc5f0\uad6c\uc758 \ucc45\uc784\uac10\uc744 \uac16\ucd94\uae30 \uc704\ud574, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uacfc \uaddc\uc81c\uac00 \uc874\uc7ac\ud558\uba70 \uc2e4\ud589 \uc911\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\uae30 \uc704\ud55c \uc5f0\uad6c\uac00 \uc9c0\uc18d\uc801\uc73c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud558\uc5ec \uc5bb\uc5b4\ub0b8 \uacb0\uacfc\ub294 \uc6b0\ub9ac\uc5d0\uac8c \uce58\ub8cc\uc81c\uac00 \ub420 \uac00\ub2a5\uc131 \uc788\ub294 \ubb3c\uc9c8\uc744 \uc2e0\uc18d\ud558\uac8c \uc2dd\ubcc4\ud558\ub294 \ub370 \ub3c4\uc6c0\uc744 \uc90d\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud68d\uae30\uc801\uc778 \ub3cc\ud30c\uad6c\ub85c \uc774\uc5b4\uc9c0\ub294 \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc5f0\uad6c\ub294 \ubb34\ubd84\ubcc4\ud55c \ub3d9\ubb3c \uc0ac\uc6a9\uc774 \uc544\ub2cc \uc724\ub9ac\uc801 \uace0\ub824\ub97c \uc911\uc2dc\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uc57d\ubb3c \uac1c\ubc1c\uc758 \uc8fc\uc694 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604 \uc2dc\uc810\uc5d0\uc11c \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \uac00\uc7a5 \uc798 \uc774\ud574\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\uc131\uc744 \ubaa8\uc0ac\ud558\ub294 \ub370 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uad00\ub828\ub41c \uc724\ub9ac\uc801 \uace0\ubbfc\uc744 \ud574\uacb0\ud558\uae30 \uc704\ud55c \ub178\ub825\uc740 \uc774\ubbf8 \uc2dc\uc791\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc5d0\uac8c \uc911\uc694\ud55c \uc758\ud559\uc801 \ub3cc\ud30c\uad6c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uac00\uc7a5 \ud6a8\uc728\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95 \uc911 \ud558\ub098\ub85c \ubc1b\uc544\ub4e4\uc5ec\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c\uc758 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc\uc758 \uc0dd\ub9ac\uc801 \ucc28\uc774\ub97c \uace0\ub824\ud558\uc5ec \uc124\uacc4\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1 \uce58\ub8cc\uc758 \uae30\ubcf8\uc801\uc778 \uc9c4\uc804\uc744 \ub9cc\ub4e4\uc5b4 \ub0c5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85\uc744 \uc704\ud5d8\uc5d0 \ube60\ub728\ub9ac\uc9c0 \uc54a\uace0 \uc5f0\uad6c\ub97c \uc9c4\ud589\ud560 \uc218 \uc788\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud6a8\uacfc\uc801\uc778 \uc57d\ubb3c \uac1c\ubc1c\uc5d0 \uc911\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ud604\uc2e4\uc801\uc778 \uc5f0\uad6c \uc9c4\uc804 \uc18d\ub3c4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc758\ud574 \uc720\uc9c0\ub429\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc \uac00\ub2a5\uc131\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud68d\uae30\uc801\uc73c\ub85c \ud5a5\uc0c1\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ubaa8\ub4e0 \uc0dd\ub9ac\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc124\uba85\ud558\uae30\uc5d0\ub294 \ubd80\uc871\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85 \ubcf4\ud638\uc758 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc6b0\ub9ac\uac00 \uc5bb\uc740 \uc758\ub8cc\uc801 \uc774\uc810\uc740 \uc218\ub9ce\uc740 \uc778\uba85\uad6c\uc870\ub85c \uc774\uc5b4\uc84c\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc5bb\uc740 \ub370\uc774\ud130\ub294 \uc778\uac04 \uc801\uc6a9\uc744 \uc704\ud55c \ud544\uc218\uc801\uc778 \uc804 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uae30\ucd08 \uc5f0\uad6c\uc758 \uc9c4\uc804\uc5d0 \uc788\uc5b4\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc218\ud589\ub418\ub294 \ubaa8\ub4e0 \uc5f0\uad6c\ub294 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uad00\ub9ac\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc904\uc5b4\ub4e4\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc, \uc5ec\uc804\ud788 \uc644\uc804\ud55c \ub300\uc548\uc744 \ud655\ubcf4\ud558\uc9c0 \ubabb\ud55c \uc0c1\ud669\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\ub294 \uc218\ub9ce\uc740 \uc0dd\uba85\uc744 \uad6c\ud574\uc654\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \uace0\ub824\uac00 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uac1c\uc120\uc744 \uc774\ub04c\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ud658 \ubaa8\uc0ac\uc5d0 \uc788\uc5b4 \ud544\uc218\uc801\uc778 \ub3c4\uad6c\ub85c \uc0ac\uc6a9\ub429\ub2c8\ub2e4","\uc784\uc0c1 \uc801\uc6a9 \uac00\ub2a5\uc131\uc744 \ub192\uc774\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8 \ub370\uc774\ud130\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc758 \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ud544\uc218\uc801\uc778 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\ube44\ub3d9\ubb3c\uc801 \ub300\uc548 \uc5f0\uad6c \uc5ed\uc2dc \uc9c0\uc6d0\ub418\uace0 \uc788\uc9c0\ub9cc, \uc2e0\uc57d \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \ud2b9\uc815 \uacb0\uacfc\ub4e4\uc740 \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc73c\ub85c\ub9cc \uc5bb\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uc790\uccb4\uac00 \ub9ce\uc740 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0 \ucda9\ubd84\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\ub294 \ub370 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \ubc0f \ubc31\uc2e0 \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc774 \uacb0\uad6d \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\ub294\ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc9c0\ub9cc, \ud0c1\uc6d4\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc774\ub77c\ub294 \ubaa9\ud45c\ub97c \uc704\ud574\uc11c\ub294 \uc2e4\uc9c8\uc801\uc774\uace0 \uc989\uac01\uc801\uc778 \uac80\uc99d\uc774 \ud544\uc694\ud569\ub2c8\ub2e4. '\ud558\ubc84\ub4dc \uc758\uacfc\ub300\ud559'(Harvard Medical School)\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc0dd\uccb4 \uc5f0\uad6c\uc758 \uc911\uc694\uc131\uc744 \uc778\uc815\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ud604\uc7ac \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \uad6c\uc870\ub97c \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \ubd80\uc871\ud558\uae30 \ub54c\ubb38\uc774\ub77c\uace0 \ubcf4\uace0\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uacfc\ud559\uc801 \uc5f0\uad6c\ub294 \ud568\uaed8 \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub354\uc6b1 \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \ub3d5\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5 \ud655\uc778\uc758 \uac00\uc7a5 \ud655\uc2e4\ud55c \ubc29\ubc95 \uc911 \ud558\ub098\ub85c \uc790\ub9ac\uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uad00\ub9ac\uac00 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4. \"\uc720\ub7fd \ub3d9\ubb3c \uc5f0\uad6c\ud611\ud68c(EARA)\"\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud560 \ub54c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\uc7a5\ud558\uae30 \uc704\ud55c \uad6d\uc81c\uc801\uc778 \ud45c\uc900\uc774 \uc874\uc7ac\ud558\uba70, \uc774\ub294 \uc724\ub9ac\uc801 \ud3c9\uac00\ub97c \ud1b5\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\ub2e4\uace0 \ubc1c\ud45c\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc778\uac04\uc758 \ub3c4\ub355\uc801 \uae30\uc900\uc744 \uc720\uc9c0\ud558\uba74\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubc94\uc704\ub97c \ucd5c\uc18c\ud55c\uc73c\ub85c \uc904\uc774\ub824\ub294 \ub178\ub825\uc774 \ubcd1\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4\uc5d0 \ubbf8\uce60 \uac00\ub2a5\uc131\uc744 \uc608\uce21\ud558\ub294 \ub370 \ub9e4\uc6b0 \uc720\uc6a9\ud569\ub2c8\ub2e4","\uc5f0\uad6c\uc790\ub4e4\uc740 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \ub2e4\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0ac\ub78c\uc744 \ub300\uc0c1\uc73c\ub85c \ud55c \uc2e4\ud5d8\uc758 \uc704\ud5d8\uc131\uc744 \uc904\uc774\ub294 \ub370 \uc788\uc5b4 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \ub300\uc0c1 \uc2e4\ud5d8 \uc804\uc5d0 \uc704\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \uc911\uc694\ud55c \ucd08\uae30 \ub2e8\uacc4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559 \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc774\uba70, \ub9e4\uc6b0 \uad6c\uccb4\uc801\uc774\uace0 \uc5c4\uaca9\ud55c \uaddc\uc81c \uc544\ub798 \uc2e4\uc2dc\ub429\ub2c8\ub2e4","\ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc720\uc804\uc790 \ubc0f \uc138\ud3ec\ub97c \uc0ac\uc6a9\ud558\ub294 \uc2e4\ud5d8\uc5d0\ub294 \uc544\uc9c1 \ud574\uacb0\ub418\uc5b4\uc57c \ud560 \ud55c\uacc4\uc810\uc774 \ub9ce\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d \uac1c\ubc1c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc778\uac04\uc758 \uc0dd\uba85\uacfc \uac74\uac15\uc744 \ubcf4\ud638\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4\uc5d0 \ubbf8\uce60 \uc601\ud5a5\uc744 \uc608\uce21\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc608\uce21 \uac00\ub2a5\ud55c \uacb0\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ubaa8\ub4e0 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc120\ud0dd\ud558\uae30 \uc804\uc5d0 \ub300\uccb4 \uac00\ub2a5\ud55c \ubc29\ubc95\uc744 \uc2e0\uc911\ud788 \uace0\ub824\ud558\ub294 \uacfc\uc815\uc744 \uac70\uce69\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uace0 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc73c\ub85c \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uce58\ub8cc\ubc95\uc774 \uac1c\ubc1c\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uacb0\uacfc\uac00 \ud56d\uc0c1 \uc778\uac04\uc5d0\uac8c \uc801\uc6a9\ub418\ub294 \uac83\uc740 \uc544\ub2c8\uc9c0\ub9cc, \uc5ec\uc804\ud788 \uc911\uc694\ud55c \ucd08\uae30 \ub2e8\uacc4 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\ub294 \uc758\ub8cc\uc801\uc778 \uc774\uc775\uc740 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\uae30 \ub54c\ubb38\uc5d0 \uc724\ub9ac\uc801\uc73c\ub85c \ud0c0\ub2f9\uc131\uc744 \uac16\uc2b5\ub2c8\ub2e4","\uc778\uac04\uacfc \ub3d9\ubb3c \uac04\uc758 \uc0dd\ub9ac\ud559\uc801 \ucc28\uc774\ub294 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1 \uccb4\uacc4\ub97c \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc0dd\uba85 \uc608\uce21\uc758 \uc815\ud655\uc131\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc758\ud574 \ud5a5\uc0c1\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub294 \uc2e4\ud5d8\uc2e4 \uc791\ub3d9 \uc2dc \uc778\uac04\uc5d0\uac8c \ubbf8\uce58\ub294 \uc9c1\uc811\uc801\uc778 \uacb0\uacfc\ub97c \uc608\uce21\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uc778\ub958\uc758 \uac74\uac15 \uc99d\uc9c4\uacfc \ub3d9\ubb3c \ubcf5\uc9c0\ub294 \uc0c1\ud638 \ubc30\ud0c0\uc801\uc778 \uac83\uc774 \uc544\ub2d9\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\uc73c\uba70 \ubaa8\ub4e0 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\ubcbd\ud788 \ubaa8\uc0ac\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ubaa8\ub4e0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud56d\uc0c1 \uc644\ubcbd\ud55c \uac83\uc740 \uc544\ub2c8\uc9c0\ub9cc, \ub2e4\ub978 \ubc29\ubc95\uc73c\ub85c\ub294 \uc5bb\uae30 \uc5b4\ub824\uc6b4 \uacb0\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ud604\ub300 \uacfc\ud559\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc2ec\uac01\ud558\uac8c \uace0\ub824\ud558\uc5ec \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \ubc29\ubc95\uc744 \ub3c4\uc785\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc815\ud655\ud55c \ub370\uc774\ud130\ub294 \uc5f0\uad6c\uc758 \uc131\ud328\ub97c \uc88c\uc6b0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc0dd\uba85 \uacf5\ud559 \ubd84\uc57c\uc758 \uc9c4\ubcf4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ud06c\uac8c \uc758\uc874\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1 \uce58\ub8cc\uc81c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \uac80\uc99d\ud558\ub294 \uc911\uc694\ud55c \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uc138 \ubc88\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\uc885\uc801\uc73c\ub85c \uc778\uac04\uc758 \uace0\ud1b5\uc744 \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc758\ub8cc \ud601\uc2e0\uc5d0 \ud544\uc218\uc801\uc778 \uacfc\uc815\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubaa9\uc801\uc740 \uc778\uac04 \uc0dd\uba85 \ubcf4\ud638\uc640 \uad00\ub828\ub41c \uc911\ub300\ud55c \uacfc\ud559\uc801 \ubc1c\uacac\uc744 \uac00\ub2a5\ucf00 \ud558\ub294 \ub370 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc744 \uac15\ud654\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\ud788 \ucd08\uae30 \uc5f0\uad6c \ub2e8\uacc4\uc5d0\uc11c \uc778\uac04 \uc0dd\uba85\uc5d0 \ub300\ud55c \uc911\uc694\ud55c \ub2e8\uc11c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub354\ubd88\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ud6a8\uacfc\ub97c \uc870\uae30\uc5d0 \uc2dd\ubcc4\ud558\ub294 \ub370\ub3c4 \ub9e4\uc6b0 \uc720\uc6a9\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc0dd\ubb3c\ud559\uc801 \ucc28\uc774\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \ubaa8\ub378\uc740 \uc5ec\uc804\ud788 \uae30\uc874 \ub300\uccb4 \ubc29\ubc95\ubcf4\ub2e4 \ub192\uc740 \uc2e0\ub8b0\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uae30\uc874 \uce58\ub8cc\ubc95\uc758 \ud55c\uacc4\ub97c \uadf9\ubcf5\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc73c\ub85c \ubd80\uc871\ud55c \ubd80\ubd84\uc744 \ubcf4\uc644\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc778\ub958\uc5d0\uac8c \uc2e4\uc81c\uc801\uc778 \ud61c\ud0dd\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\uc131 \ubc0f \ud6a8\uacfc \uac80\uc99d\uc744 \uc704\ud55c \ucd5c\uc120\uc758 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uac1c\uc120\ud558\ub824\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ud658\uc5d0 \ub300\ud55c \ucd08\uae30 \ub2e8\uacc4\ub97c \uc774\ud574\ud558\uace0 \uc778\uac04\uc5d0\uac8c \uc548\uc804\ud55c \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ud6a8\uacfc\ub97c \uc99d\uba85\ud558\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc0dd\ud65c \ud658\uacbd\uacfc \uac19\uc740 \ubcf5\ud569 \uc694\uc778\uc5d0 \ub300\ud55c \uc774\ud574\ub294 \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uac00\uc7a5 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uace0\ub824 \uc0ac\ud56d\uc774 \uac15\ud654\ub418\uace0 \uc788\uc73c\uba70, \uc5f0\uad6c\ub294 \uc810\uc810 \ub354 \uc815\uad50\ud558\uace0 \uc778\ub3c4\uc801\uc778 \ubc29\uc2dd\uc73c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798 \uc2dc\ud589\ub418\uba70, \uc774\ub294 \uacfc\ud559\uc801 \uc5f0\uad6c\uc5d0\uc11c\uc758 \uade0\ud615 \uc7a1\ud78c \uc811\uadfc\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \uac80\uc99d\ud558\ub294\ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub2e4\uc591\ud55c \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uc704\ud574\uc11c\ub294 \ud604\uc7ac\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud558\uba70, \uc774\ub294 \uc778\ub958\uc758 \uc0dd\uba85\uacfc \uac74\uac15\uc744 \uc9c1\uc811\uc801\uc73c\ub85c \uad6c\ud560 \uc218 \uc788\ub294 \uc5f0\uad6c\uc5d0 \uc774\ubc14\uc9c0\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \ub9cc\ud55c \ub300\uc548\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc558\uc73c\uba70, \uc774\ub7ec\ud55c \uc5f0\uad6c \uc5c6\uc774\ub294 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc5d0 \ub300\ud55c \uc815\ubc00\ud55c \ud3c9\uac00\uac00 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uc2e4\ud328 \ud655\ub960\uc774 \uc788\ub2e4\ub294 \uc774\uc720\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubc30\uc81c\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \uc5f0\uad6c \ud65c\ub3d9\uacfc \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uac1c\ubc1c\uc758 \uae34\uae09\uc131\uc740 \uc0c1\ud638 \ubc30\ud0c0\uc801\uc774\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\uac00 \uc778\uac04\uacfc \uc9c1\uc811\uc801\uc73c\ub85c \uc77c\uce58\ud558\uc9c0 \uc54a\ub294 \uacbd\uc6b0\uac00 \uc788\uc9c0\ub9cc, \uc774\ub294 \uc778\uac04 \uc758\uc57d\ud488 \uac1c\ubc1c\uc5d0\uc11c \ucd08\uae30 \uc548\uc804\uc131\uacfc \uae30\ucd08\uc801\uc778 \ud6a8\uacfc\uc131\uc744 \uac80\uc99d\ud558\ub294 \uccab \ub2e8\uacc4\ub85c \uc5ec\uaca8\uc9d1\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uac00\ub2a5\ud558\uac8c \ud558\uba70, \uc774\ub294 \ucd5c\uc885\uc801\uc73c\ub85c \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \uc131\uacfc\ub97c \ub04c\uc5b4\ub0b4\uae30 \uc704\ud55c \uac00\uc7a5 \ud655\uc2e4\ud55c \ub3c4\uad6c\uc774\uba70, \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc608\uce21\ud560 \uc218 \uc5c6\ub294 \uc704\ud5d8\uc744 \uc904\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc608\uce21\ubd88\uac00\ub2a5\ud55c \ubb38\uc81c\uc810\uc744 \ubbf8\ub9ac \uc2dd\ubcc4\ud558\ub294 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc5bb\uc740 \ub370\uc774\ud130\uac00 \uc778\uac04\uc5d0\uac8c \uc801\uc6a9\ub418\ub294 \uac83\uc740 \uacfc\ud559\uc801\uc73c\ub85c \uc785\uc99d\ub41c \ubc14 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc73c\uba74 \ub9ce\uc740 \ubd80\ubd84\uc5d0\uc11c \uc5f0\uad6c\uac00 \uc904\uc5b4\ub4e4 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubd88\uce58\ubcd1\uc758 \uce58\ub8cc \uac00\ub2a5\uc131\uc744 \ub192\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc0dd\uc874\uc728\uc744 \ub192\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04\uc758 \uc0dd\ub9ac\ud559\uacfc \uc720\uc0ac\ud55c \uc810\uc774 \ub9ce\uc544 \uc9c8\ubcd1\uc758 \uc9c4\ud589\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc608\uce21 \uac00\ub2a5\ud55c \uc548\uc804\uc131\uc744 \ud655\uc778\ud560 \uc218 \uc788\ub294 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uac80\uc99d\ub41c \uacb0\uacfc\ub294 \uc0dd\ubb3c\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0c1\ud638 \uc791\uc6a9 \uc18d\uc5d0\uc11c \uc2e0\uc57d\uc774\ub098 \uce58\ub8cc\ubc95\uc758 \uc2e4\uc81c \ud6a8\uacfc\ub97c \uc608\uce21\ud558\ub294 \ub370 \ud06c\uac8c \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud604\uc7ac \uce58\ub8cc\ubc95\uc758 \ud6a8\uacfc\uc640 \uc548\uc804\uc131\uc744 \uac80\uc99d\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc0dd\ub9ac\uc758 \ubcf5\uc7a1\uc131\uc744 \ubaa8\ubc29\ud558\ub294 \ub370 \uc788\uc5b4 \ub3c5\ubcf4\uc801\uc785\ub2c8\ub2e4","\uacfc\ud559\uc801 \ubc1c\uacac\uc744 \uc704\ud55c \uac00\uc7a5 \ud604\uc2e4\uc801\uc778 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\ub294 \ub370\uc774\ud130\ub294 \uc778\uac04\uc5d0\uac8c \uc9c1\uc811\uc801\uc778 \uc774\uc775\uc744 \uc81c\uacf5\ud558\uba70, \uc2e0\uc57d \uac1c\ubc1c\uc758 \uc911\uc694\ud55c \ub2e8\uacc4\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc81c\ud55c\ub41c \uc0c1\ud669\uc5d0\uc11c \ud544\uc218\uc801\uc774\uba70, \uc774\ub294 \uc758\ub8cc \uc5f0\uad6c\uc758 \uae4a\uc774\uc640 \ubc94\uc704\ub97c \ud655\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\ub978 \ubc29\ubc95\ub4e4\uc5d0 \ube44\ud574 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc788\uc5b4 \uc5ec\uc804\ud788 \uac00\uc7a5 \uc2e4\uc9c8\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\uc591\ud55c \uce58\ub8cc\ubc95\uc758 \ud6a8\uacfc\ub97c \ube44\uad50\ud558\uace0 \ud3c9\uac00\ud558\ub294 \ub370 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud558\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4. \"\uc138\uacc4 \ubcf4\uac74 \uae30\uad6c(WHO)\"\ub294 \ud604\uc7ac\uc758 \uacfc\ud559 \uc218\uc900\uc5d0\uc11c\ub294 \ub3d9\ubb3c\uc758 \uc0dd\uccb4 \ub0b4 \ubc18\uc751\uc774 \uc778\uac04 \uc9c8\ubcd1\uc758 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\ub2e4\uace0 \ub9d0\ud569\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0\ub294 \uc2e4\uc9c8\uc801\uc778 \ub370\uc774\ud130\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc8fc\uc694\ud55c \uc2e0\uc57d \uac1c\ubc1c\uc5d0\uc11c \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \uc704\ud5d8\uc744 \uc904\uc774\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uac1c\ubc1c \uc18d\ub3c4\ub97c \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud55c \uc2e4\ud5d8 \ud504\ub85c\ud1a0\ucf5c\uc774 \uc810\uc810 \ub354 \uc5c4\uaca9\ud574\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc778\uccb4\uc5d0 \ub300\ud55c \uc815\ud655\ud55c \uc608\uce21\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud658\uc790\uc5d0\uac8c \uc2e0\uc57d\uc758 \uc548\uc815\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud658\uc790 \ubc0f \uc5f0\uad6c\uc5d0\uc758 \uc774\uc775\uc744 \ubcf4\ud638\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \uc644\uc804\ud788 \uc790\ub9ac\uc7a1\uae30\uae4c\uc9c0 \uc0c1\ub2f9\ud55c \uc2dc\uac04\uc774 \uc18c\uc694\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0\uc11c\ub294 \uc548\uc804\uc131 \uac80\uc99d\uc774 \ubb34\uc5c7\ubcf4\ub2e4 \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uac1c\ubc1c\ub41c \uce58\ub8cc\ubc95\ub3c4 \uc874\uc7ac\ud558\uc9c0\ub9cc, \ubaa8\ub4e0 \uc2e0\uc57d \ubc0f \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \ub2e8\ub3c5\uc73c\ub85c \ubcf4\uc7a5\ud558\uae30\uc5d0\ub294 \ubd80\uc871\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud601\uc2e0\uc801 \uc758\uc57d\ud488 \uac1c\ubc1c\uc744 \uc9c0\uc6d0\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc5d0\ub294 \uc2dc\uac04\uacfc \uac80\uc99d \uacfc\uc815\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \ubcc0\uc218\ub97c \ud1b5\uc81c \uac00\ub2a5\ud558\uac8c \ud558\uc5ec \ubcf4\ub2e4 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uacb0\uacfc\ub97c \ub3c4\ucd9c\ud560 \uc218 \uc788\uac8c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\uace0 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub294 \uc218\ub9ce\uc740 \uc778\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc0dd\ubb3c\ud559\uc801 \ucc28\uc774\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \ud1b5\ucc30\ub825\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc778\ub958\uc5d0\uac8c \uc911\uc694\ud55c \uc758\ud559\uc801 \uc131\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc0dd\uba85 \uc5f0\uc7a5\uc744 \uc704\ud55c \ucd5c\uc120\uc758 \uacfc\ud559\uc801 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc758 \ubc18\uc751\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud575\uc2ec\uc801 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\ud558\uace0 \uc724\ub9ac\uc801\uc778 \uc778\ub958 \uac74\uac15 \uc99d\uc9c4\uc744 \uc704\ud55c \ud14c\uc2a4\ud2b8 \ub2e8\uacc4\ub85c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ud6a8\uc728\uc801\uc778 \uc9c8\ubcd1 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \ubaa8\ub378\uc744 \ud1b5\ud574 \uac00\ub2a5\ud574\uc9d1\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc7a0\uc7ac\uc801\uc73c\ub85c \uc704\ud5d8\ud55c \uce58\ub8cc\ub97c \uba3c\uc800 \ud3c9\uac00\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc0dd\uba85 \uc5f0\uad6c \ubd84\uc57c\uc5d0\uc11c\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc740 \uc5f0\uad6c\uc790\ub4e4\uc5d0\uac8c \ucc45\uc784\uacfc \ud22c\uba85\uc131\uc744 \uc774\ud589\ud558\ub3c4\ub85d \uac15\uc81c\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1\uc744 \uc5f0\uad6c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4 \uc801\uc6a9 \uc5f0\uad6c\uc758 \uc704\ud5d8\uc744 \ucd5c\uc18c\ud654\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud55c \uc724\ub9ac\uc801 \uc2e4\ud5d8\uc774 \uac15\uc870\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uac74\uac15\uc744 \uc704\ud55c \ud68d\uae30\uc801\uc778 \uc758\ud559\uc801 \ubc1c\uacac\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud569\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\uc815\ud55c \uc5f0\uad6c\uc5d0\uc11c \uc778\uac04\uc5d0\uac8c \uc9c1\uc811\uc801\uc778 \uc704\ud5d8\uc744 \ud53c\ud560 \uc218 \uc788\ub3c4\ub85d \ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0 \ub300\ud55c \uc790\uc6d0\uacfc \uc9c0\uc6d0\uc774 \ub354 \ub9ce\uc774 \ud544\uc694\ud558\ub2e4\ub294 \uc810\uc5d0\ub294 \ub3d9\uc758\ud558\ub098, \uc774\ub807\uac8c \ud574\uc11c \uc5bb\uc5b4\uc9c4 \uacb0\uacfc\ub3c4 \uc989\uac01\uc801\uc73c\ub85c \uae30\uc874 \ub370\uc774\ud130\uc758 \uc2e0\ub8b0\uc131\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ube44\ub3d9\ubb3c \uc2e4\ud5d8 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uace0 \uac15\ud654\ud558\ub294 \uac83\uc774 \uacfc\ud559\uacc4\uc758 \uc911\uc694\ud55c \ubaa9\ud45c \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc608\uce21 \uac00\ub2a5\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \uce21\uba74\uc740 \uc911\ub300\ud55c \uace0\ub824 \uc0ac\ud56d\uc774\uba70, \uc774\ub294 \uc5f0\uad6c\uc790\ub4e4\ub85c \ud558\uc5ec\uae08 \ucc45\uc784 \uc788\ub294 \uc2e4\ud5d8 \uc2e4\ud589\uc744 \uacac\uc9c0\ud558\ub3c4\ub85d \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ud6a8\uacfc\ub97c \uac80\uc99d\ud558\ub294 \ub370 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc5f0\uad6c \uc131\uacfc\uc640 \ub3d9\ubb3c \ubcf5\uc9c0\ub294 \uc591\ub9bd \uac00\ub2a5\ud55c \ubaa9\ud45c\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc2dc\ud589\uc744 \uac15\ud654\ud558\uba74\uc11c \uc778\ub958 \uac74\uac15\uc5d0 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \uc5f0\uad6c\uc758 \ud544\uc218\uc801 \ub2e8\uacc4\ub85c, \uc774\ub97c \ud1b5\ud574 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ubbf8\ub9ac \ud3c9\uac00\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc911\uc694\ud55c \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ud604\uc7ac\uc758 \uc5f0\uad6c \ud658\uacbd\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc815\ud655\uc131\uacfc \uc2e0\ub8b0\uc131\uc5d0 \uc758\ud574 \ub9ce\uc740 \uc758\ud559\uc801 \ub3cc\ud30c\uad6c\uac00 \ub9c8\ub828\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc2e4\uc801\uc73c\ub85c \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95 \uac1c\ubc1c\uc5d0\ub294 \uc0c1\ub2f9\ud55c \uc2dc\uac04\uacfc \uc790\uc6d0\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ud6a8\uacfc\uc801\uc778 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uc704\ud574\uc11c\ub294 \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ubb3c\ud559\uc801 \ubaa8\ub378\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uacfc\ud559\uc801 \ubc1c\uc804\uc744 \uc704\ud574 \uac00\uc7a5 \ud604\uc2e4\uc801\uc778 \uc2e4\ud5d8 \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \ubaa8\ub378\ub85c\uc11c\uc758 \uc81c\ud55c\uc801 \uc720\uc0ac\uc131\uc744 \ubcf4\uc644\ud558\ub294 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc778\uac04\uc5d0\uac8c \ubbf8\uce60 \uc7a0\uc7ac\uc801\uc778 \uc704\ud5d8\uc744 \uc904\uc774\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uce58\ub8cc\uc758 \uac00\ub2a5\uc131\uc744 \ub192\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc774\ub77c\ub294 \uc810\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc740 \uc5c4\uaca9\ud788 \uc801\uc6a9\ub429\ub2c8\ub2e4","\uc624\ub79c \uae30\uac04 \uac80\uc99d\ub41c \ub3d9\ubb3c \uc2e4\ud5d8 \uacb0\uacfc\ub294 \uc758\ud559 \ubc1c\uc804\uc758 \uc911\uc694\ud55c \uacc4\uae30\uac00 \ub418\uc5b4 \uc654\uc2b5\ub2c8\ub2e4","\uc2e4\uc9c8\uc801\uc778 \ub300\uc548\uc758 \ube60\ub978 \ucd9c\ud604\uc744 \uc704\ud574 \ub178\ub825\ud55c\ub2e4\uace0 \ud558\ub354\ub77c\ub3c4, \uadf8 \uacfc\uc815\uc5d0\uc11c \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \ud53c\ud574\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \uc77c\uc815\ud55c \uc218\uc900\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc788\ub294 \ud604\uc7ac\uc758 \ubc29\ubc95\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \ud574\ub97c \ub07c\uce58\uae30 \uc804\uc5d0 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uc744 \uc785\uc99d\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc5f0\uad6c \ubd84\uc57c\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ube44\uc724\ub9ac\uc801 \uce21\uba74\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \ub178\ub825\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc804\uc784\uc0c1 \uc5f0\uad6c\uc5d0\uc11c \uc5c6\uc5b4\uc11c\ub294 \uc548 \ub420 \uc694\uc18c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \ubcf5\uc9c0\uc640 \uc0dd\uba85\uad8c\uc744 \uc874\uc911\ud558\ub294 \ub300\uc548\uc744 \ucc3e\uc544\uc57c \ud558\uc9c0\ub9cc, \ub2f9\uc7a5 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95 \uc5f0\uad6c\ub97c \uc704\ud574\uc11c\ub294 \ud544\uc694\ud55c \uc120\ud0dd\uc77c \uc218\ubc16\uc5d0 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ucd08\uae30 \ud3c9\uac00 \ub2e8\uacc4\uc5d0\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc5f0\uad6c\ub294 \uc778\ub958\uac00 \uc9c1\uba74\ud55c \uc2ec\uac01\ud55c \uc9c8\ubcd1\uc758 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud06c\uac8c \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uaddc\uc81c\ub97c \uc810\uc9c4\uc801\uc73c\ub85c \uac1c\uc120\ud558\uace0 \uac15\ud654\ud568\uc73c\ub85c\uc368 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ubd80\ubd84\uc801\uc73c\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uacfc \uc778\uac04 \uac04\uc758 \uc0dd\ub9ac\ud559\uc801 \ucc28\uc774\ub97c \ud1b5\ud574 \uc911\uc694\ud55c \uc815\ubcf4\ub97c \uc5bb\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc758 \ud575\uc2ec \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc774\ub098 \uc57d\ubb3c\uc774 \uc778\uccb4\uc5d0 \ubbf8\uce58\ub294 \uc601\ud5a5\uc744 \uc774\ud574\ud558\uae30 \uc704\ud574 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc758 \uc911\uc694\uc131\uc744 \uac10\uc548\ud560 \ub54c \ud5c8\uc6a9\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc0dd\uba85 \uc724\ub9ac\uc640 \ub300\uccb4 \ubc29\ubc95\uc758 \ubaa8\uc0c9\uc774 \uc911\uc694\ud558\ub2e4\uace0\ub294 \ud558\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ubcf5\uc7a1\ud55c \uc7a5\uae30 \uc2dc\uc2a4\ud15c\uc744 \uac00\uc9c4 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc720\uc77c\ud558\uac8c \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4. '\ubbf8\uad6d \uad6d\ub9bd \ubcf4\uac74\uc6d0'(National Institutes of Health)\uc740 \ud604\uc7ac \uae30\uc220\ub85c\ub294 \uc644\ubcbd\ud55c \ub300\uccb4 \uc2dc\ud5d8\uc774 \uc5c6\uc73c\uba70, \ub3d9\ubb3c \ubaa8\ub378\uc774 \uc0dd\uccb4 \ud658\uacbd\uacfc \uac19\uc740 \ubcf5\uc7a1\ud55c \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub294 \ub370 \uc720\ub9ac\ud558\ub2e4\ub294 \uc810\uc744 \uac15\uc870\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4\uc5d0\uc11c\uc758 \ubc18\uc751\uc744 \uc608\uce21\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \uc77c\ubd80 \uc874\uc7ac\ud558\uae34 \ud558\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc5f0\uad6c \uacfc\uc815\uc5d0 \uc801\uc6a9\ud558\uae30\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc0dd\uba85\uc758 \uc874\uc18d\uc744 \uc704\ud55c \ud601\uc2e0\uc801 \uc5f0\uad6c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\ucca8\ub2e8 \uc758\ud559 \uc5f0\uad6c\uc758 \uc911\uc694\ud55c \uc77c\ubd80\uc785\ub2c8\ub2e4","\uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc5f0\uad6c\ud560 \ub54c \ub3d9\ubb3c \ubaa8\ub378\uc774 \uac00\uc7a5 \uc801\uc808\ud55c \ubc29\uc2dd\uc785\ub2c8\ub2e4. '\ubbf8\uad6d \uc2dd\ud488\uc758\uc57d\uad6d'(FDA)\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\uc81c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc \uac80\uc99d\uc744 \uc704\ud55c \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud55c \uba87\uba87 \uc774\uc720 \uc911 \ud558\ub098\ub85c \uae30\uc220\uc758 \ud55c\uacc4\ub97c \uba85\ud655\ud788 \uc5b8\uae09\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc9c1\uc811\uc801\uc778 \uc5f0\uad6c \ub300\uc2e0 \uc0ac\uc6a9\ud558\ub294 \ud544\uc218\uc801\uc778 \ub300\uccb4 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc0dd\uba85\uacfc \uac74\uac15\uc744 \ud06c\uac8c \ud5a5\uc0c1\uc2dc\ud0ac \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\ud559\uc801 \uc5f0\uad6c \ubc1c\uc804 \uae30\uc5ec\ub294 \ub9c9\ub300\ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\uba74\uc11c\ub3c4 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \ub2ec\uc131\ud558\ub294 \uac83\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud560 \uc218 \uc788\ub3c4\ub85d \ud569\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc815\ud655\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4. \"\ubbf8\uad6d \uc2dd\ud488\uc758\uc57d\uad6d(FDA)\"\uc740 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc77c\ubd80 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc758 \ubc18\uc751\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574\uc11c\ub9cc \uc815\ud655\ud788 \uc774\ud574\ud560 \uc218 \uc788\ub2e4\uace0 \uc124\uba85\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04 \uc9c8\ubcd1\uc758 \uc774\ud574\ub97c \ub192\uc774\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc5d0 \ud544\uc218\uc801\uc778 \uc548\uc804\uc131 \uac80\uc0ac \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uc778\uac04\uacfc \uc0dd\ub9ac\ud559\uc801\uc73c\ub85c \uc720\uc0ac\ud55c \ub3d9\ubb3c\ub4e4\uc740 \uce58\ub8cc \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub3d5\uace0\uc790 \ud558\ub294 \uc778\ub958\uc758 \uc548\uc704\ub97c \uc704\ud55c \ud569\ub9ac\uc801 \uc120\ud0dd\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0ac\ud68c \uc804\ubc18\uc758 \uac74\uac15\uc744 \uc704\ud574 \ud544\uc694\ud569\ub2c8\ub2e4","\ub300\uc548\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc544\uc9c1 \uc644\uc804\ud55c \ub300\uccb4 \uc218\ub2e8\uc774 \ub418\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc758 \uc548\uc804\uc131 \uac80\uc99d\uc5d0 \ubc18\ub4dc\uc2dc \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uc804\uccb4\uc758 \uac74\uac15\uc744 \uc99d\uc9c4\uc2dc\ud0b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ud6a8\uacfc\uc131\uc744 \uc785\uc99d\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uacbd\uc81c\uc801\uc73c\ub85c\ub3c4 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\ub3c4 \uacc4\uc18d \uc5f0\uad6c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1\uc740 \ucd08\uae30 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \ubaa8\ub378\uc740 \uc9c8\ubcd1\uc758 \uc9c4\ud589 \uacfc\uc815\uc744 \uc774\ud574\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc9c1\uc811 \uc801\uc6a9 \uac00\ub2a5\ud55c \uc548\uc804\ud55c \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\uae30 \uc704\ud574 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc784\uc0c1 \uc2dc\ud5d8\uc758 \uc131\uacf5\ub960\uc744 \ub192\uc774\ub294 \ub370 \uacf5\ud5cc\ud569\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uacfc \ubcd1\ud589\ud558\uc5ec \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc774\uba70 \uc724\ub9ac\uc801 \uc5f0\uad6c \ubc29\ubc95\uc744 \ucc3e\uae30 \uc704\ud55c \ub178\ub825\ub3c4 \ub3d9\ubc18\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc548\uc804\ud55c \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc774 \uc5c6\ub294 \uacbd\uc6b0 \uc720\uc77c\ud55c \uc635\uc158\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud55c \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud53c\ud558\ub294 \uac83\uc774 \uc724\ub9ac\uc801\uc73c\ub85c \uc633\ub2e4\uace0 \ud560\uc9c0\ub77c\ub3c4, \ud604\uc7ac \uae30\uc220 \uc218\uc900\uc5d0\uc11c\ub294 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub9cc\uc73c\ub85c\ub294 \ubd88\ucda9\ubd84\ud55c \uacb0\uacfc\ub97c \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc608\uce21 \uac00\ub2a5\ud55c \uce58\ub8cc \uacb0\uacfc\ub97c \ub3c4\ucd9c\ud558\ub294 \ub370 \ub3c4\uc6c0\uc744 \uc90d\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc724\ub9ac\uc801, \uacfc\ud559\uc801 \uade0\ud615\uc744 \uc720\uc9c0\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ube44\uc911\uc744 \uc904\uc774\uace0 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \uac83\uc740 \ub2f9\uc5f0\ud788 \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85\uacf5\ud559 \uc5f0\uad6c\uc758 \ubc1c\uc804\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc77c\ubd80 \uc0ac\ub78c\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ube44\uc724\ub9ac\uc801\uc774\ub77c\uace0 \uc8fc\uc7a5\ud558\uc9c0\ub9cc, \uc554 \uc5f0\uad6c\uc5d0 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uba74\ubc00\ud788 \uaddc\uc81c\ub418\uc5b4 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \ud655\ub9bd\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacbd\uc81c\uc801 \uce21\uba74\uc5d0\uc11c\ub3c4 \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95\uc758 \ud604\uc2e4\uc801 \uc801\uc6a9 \uac00\ub2a5\uc131\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uac74\uac15\uc744 \uc704\ud55c \ud68d\uae30\uc801\uc778 \ubc1c\uacac\uc5d0 \uae30\uc5ec\ud574 \uc654\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ud655\uc0b0\ub418\uace0 \uc788\uc9c0\ub9cc, \ubaa8\ub4e0 \uce58\ub8cc\ubc95\uc758 \ubcf5\uc7a1\uc131\uc744 \ud574\uacb0\ud558\uae30\ub294 \ucda9\ubd84\ud558\uc9c
