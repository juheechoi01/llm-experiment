9c8\uc9c0\ub9c9\uc73c\ub85c, \ube44\ub3d9\ubb3c\uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc5ec\uc804\ud788 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \ud6a8\uacfc\uc801\uc774\uc9c0 \ubabb\ud55c \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \ub300\uc548\uc774 \ud604\uc7ac\ub85c\uc11c\ub294 \ubd88\ucda9\ubd84\ud558\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uc548 \uae30\uc220 \uac1c\ubc1c\uc774 \uc9c4\ud589\ub418\ub354\ub77c\ub3c4 \ud604 \uc2dc\uc810\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud658\uc790\uc5d0\uac8c \uc9c1\uc811\uc801\uc778 \uc601\ud5a5\uc744 \uc904 \uc218 \uc788\ub294 \uba85\ud655\ud55c \uacfc\ud559\uc801 \uacb0\uacfc\ub97c \uc81c\uacf5\ud558\ub294 \uac00\uc7a5 \ud604\uc2e4\uc801 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\uc548\uc740 \uc5f0\uad6c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc218\uc9d1\ud560 \uc218 \uc788\ub294 \uc778\uacfc\uad00\uacc4 \ub370\uc774\ud130\ub97c \uc544\uc9c1 \uc644\uc804\ud788 \ub300\uccb4\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc644\uc804\ud55c \ubc29\ubc95\uc774 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\uc7ac \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\ub4e4\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uae30\uc220\uc774 \uc644\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \uc774\ub974\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uae30\uc220\uc774 \uc544\uc9c1 \ubaa8\ub4e0 \uc5f0\uad6c \uc694\uad6c\ub97c \ucda9\uc871\ud560 \ub9cc\ud07c \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc74c\uc744 \ubcf4\uc5ec\uc90d\ub2c8\ub2e4","\uacfc\ud559\uacfc \uae30\uc220 \ubc1c\uc804\uc758 \uc18d\ub3c4\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4 \uae30\uc220\uc774 \ub530\ub77c\uc7a1\uc9c0 \ubabb\ud55c \uad6c\uccb4\uc801\uc774\uace0 \uc2e4\uc9c8\uc801\uc778 \uac80\uc99d \ubc29\ubc95\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uadf8\ub7ec\ud55c \ub300\uccb4 \uae30\uc220\uc774 \uc644\uc804\ud788 \uc790\ub9ac \uc7a1\uae30 \uc804\uae4c\uc9c0\ub294 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \ud604 \uc2dc\uc810\uc5d0\uc11c\ub294 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uae30\uc220 \uac1c\ubc1c\uc740 \uc911\uc694\ud55c \uacfc\uc81c\uc774\uc9c0\ub9cc, \ud604 \uc2dc\uc810\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc8fc\ub294 \ub370\uc774\ud130\ub97c \uc989\uac01\uc801\uc73c\ub85c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uae30\uc220\uc774 \uc644\uc804\ud788 \uac16\ucdb0\uc9c0\uc9c0 \uc54a\uc740 \uc0c1\ud669\uc5d0\uc11c \uc870\uae30 \ubc1c\uacac \ubc0f \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \ub300\uccb4 \ubc29\ubc95\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ubd88\uc644\uc804\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc2dc\uac04\uc774 \ud544\uc694\ud558\uace0, \uadf8 \ub3d9\uc548 \uc77c\ubd80 \ub2e8\uacc4\uc5d0\uc11c\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud55c \uc2e0\ub8b0\uc131\uc744 \uac16\uc9c0 \ubabb\ud558\uace0 \uc788\uae30 \ub54c\ubb38\uc5d0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\uae4c\uc9c0 \uac00\uc7a5 \uc720\ud6a8\ud558\uace0 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc644\ubcbd\ud55c \ub300\uccb4 \ubc29\ubc95\uc774 \uc874\uc7ac\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc704\ud574 \uc5f0\uad6c\uc640 \ud22c\uc790\ub97c \uac15\ud654\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\ub97c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4. '\ub85c\uc288 \ud640\ub529'(Roche Holding)\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc5f0\uad6c \uac1c\ubc1c\uc758 \uc911\uc694\uc131\uc744 \uc778\uc9c0\ud558\uace0 \uc788\uc73c\uba70, \uadf8\ub7fc\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ud604\uc7ac \uae30\uc220\ub85c\ub294 \uc644\uc804\ud55c \ub300\uccb4\uac00 \ubd88\uac00\ub2a5\ud558\ub2e4\ub294 \uc810\uc744 \uc5ec\ub7ec \ucc28\ub840 \uac15\uc870\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ucd5c\uc885 \ubaa9\ud45c\uac00 \uc544\ub2c8\ub77c\ub294 \uc810\uc5d0\uc11c\ub3c4 \uc5f0\uad6c\ub294 \uacc4\uc18d\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uae30\uc220\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \uacfc\ud559 \uae30\uc220\ub85c\ub294 \uc544\uc9c1 \ubaa8\ub4e0 \uc0c1\ud669\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\ub97c \ub300\uccb4\ud560 \uc218 \uc5c6\ub2e4\ub294 \uac83\uc774 \uba85\ubc31\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uac00\ub2a5\ud55c \ubc29\ubc95\uc774 \uc544\uc9c1 \ubd80\uc871\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc6b0\uc218\ud55c \uacfc\ud559\uc801 \uc815\ud655\uc131\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc740 \uc5ec\uc804\ud788 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc740 \uc544\uc9c1 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \uc54a\uc558\uc73c\uba70, \uc774\ub7ec\ud55c \ub2e8\uacc4\uc5d0\uc11c\ub294 \ub3d9\ubb3c \ubaa8\ub378\uc774 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac\uc758 \uacfc\ud559 \uae30\uc220 \uc218\uc900\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub300\uccb4 \ubd88\uac00\ub2a5\ud558\ub2e4\ub294 \ud604\uc2e4\uc744 \uc9c1\uc2dc\ud574\uc57c \ud569\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ub300\uccb4 \uae30\uc220\uc740 \uc911\uc694\ud55c \ubcf4\uc644 \uc5ed\ud560\uc744 \ud558\uba74\uc11c\ub3c4 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uae30\uc5d0\ub294 \ubd80\uc871\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc740 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc644\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\ube44\ub3d9\ubb3c \uc2e4\ud5d8 \ubaa8\ub378\uc740 \ub354\uc6b1 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1\uc740 \uc77c\ubd80 \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \ubd88\ucda9\ubd84\ud560 \uc218\ubc16\uc5d0 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uae30\uc220\uc774 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \uc644\uc804\ud788 \uc900\ube44\ub420 \ub54c\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5f0\uad6c \ub3c4\uad6c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \uc644\uc804\ud558\uac8c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc774\uc720\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \ucda9\ubd84\ud788 \uad6c\ud604\ud558\uc9c0 \ubabb\ud558\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uae30\uc220\uc774 \ub3c4\uc785\ub418\uae30\uae4c\uc9c0\ub294 \uacfc\ub3c4\uae30\uc801 \ud574\uacb0\ucc45\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc740 \ube60\ub974\uac8c \uc9c4\ud589\ub418\uace0 \uc788\uc73c\ub098, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \ub9cc\ud07c \ucda9\ubd84\ud788 \ub9ce\uace0 \ub2e4\uc591\ud55c \uc9c8\ud658\uc5d0 \ub300\ud574 \uc5f0\uad6c\ud560 \uc218 \uc788\ub294 \uc0c1\ud0dc\ub294 \uc544\ub2d9\ub2c8\ub2e4","\ud601\uc2e0\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\ub3c4 \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud558\uba70, \uadf8\ub3d9\uc548 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\ub2e8\ub420 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc644\ubcbd\ud558\uc9c0 \uc54a\uc73c\ubbc0\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub300\uc548\uc801 \uc5f0\uad6c \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\ubcbd\ud788 \ub300\uccb4\ud560 \ub9cc\ud07c \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uae30\uc5d0 \uc544\uc9c1 \ubd80\uc871\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ud604\uc7ac \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc644\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uba3c\uc800, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uae30\uc220\uc758 \ud55c\uacc4\uac00 \uc788\uc744 \ub54c \uaf2d \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uac10\uc18c\uc2dc\ud0ac \uc218 \uc788\uc9c0\ub9cc, \ud604\uc7ac \ud544\uc694\ud55c \uc5f0\uad6c\uc640 \uc989\uac01\uc801\uc778 \uce58\ub8cc \uac1c\ubc1c\uc744 \ud3ec\uae30\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc774 \uc544\uc9c1 \uc644\uc804\ud788 \uc774\ub8e8\uc5b4\uc9c0\uc9c0 \uc54a\uc558\uae30\uc5d0 \ud544\uc218\uc801\uc778 \uc5f0\uad6c \uc218\ub2e8\uc73c\ub85c \uae30\ub2a5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \ucc3e\uae30 \uc704\ud55c \uc5f0\uad6c\uac00 \uc9c4\ud589\ub418\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\ub098, \uc774\ub294 \uc5ec\uc804\ud788 \uc2dc\uac04\uc774 \uac78\ub9bd\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uace0\ubbfc\uc740 \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\ub2e4\ub294 \uc2e4\uc9c8\uc801 \ud604\uc2e4\uc5d0 \uae30\uc778\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc774 \ubc1c\uc804\ub418\uace0 \uc788\uc9c0\ub9cc, \uc5ec\uc804\ud788 \uae30\ubc18\uc774 \ub418\ub294 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\ub294 \ub370 \uc788\uc5b4\uc11c\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc77c\ubd80 \ub300\uccb4 \uae30\uc220\uc774 \ubd80\uc871\ud55c \ud604\uc7ac \uc0c1\ud669\uc5d0\uc11c \uc720\uc77c\ud55c \uc5f0\uad6c \ubc29\ubc95 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\uae30\uc220\uc774 \ubc1c\uc804\ud588\ub2e4 \ud560\uc9c0\ub77c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ubcf5\ud569\uc801\uc778 \uc0dd\uccb4 \ud658\uacbd\uc758 \ub300\uccb4\ub294 \ub0c9\ucca0\ud55c \uac80\ud1a0\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub3c5\ud2b9\ud55c \uac00\uce58\ub294 \ud604\uc7ac \ub300\uccb4 \uae30\uc220\ub85c\ub294 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub3c4 \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \ubaa8\ubc29\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uc548\uc801 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \ud604\uc7ac\ub85c\uc11c\ub294 \uc77c\ubd80 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc774 \ub3c4\uc785\ub418\ub354\ub77c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc5f0\uad6c\uc758 \uc911\uc694\ud55c \ubd80\ubd84\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc778\uacf5\uc9c0\ub2a5\uacfc \uc904\uae30\uc138\ud3ec \uae30\uc220\uc740 \uc544\uc9c1 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \ub300\uc2e0\ud560 \uc218 \uc788\ub294 \ub300\uc548\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\ub2ec\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubaa8\ub4e0 \uae30\ub2a5\uc744 \uc644\ubcbd\ud788 \ub300\uccb4\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \uc801\uc6a9\ub418\uae30\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc644\ubcbd\ud55c \ubc29\ubc95\uc740 \uc544\uc9c1 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\ub300 \uacfc\ud559\uae30\uc220\uc774 \ube60\ub974\uac8c \ubc1c\uc804\ud558\uace0 \uc788\ub2e4\uace0 \ud574\ub3c4, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub2f9\uc7a5 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc740 \uc544\uc9c1 \ubbf8\ube44\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \uae30\uc874\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc0ac\uc2e4\uc744 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\ub294 \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc9c0\ub9cc, \ud604 \uc2dc\uc810\uc5d0\uc11c\ub294 \uadf8 \uc790\uccb4\ub85c \ubd88\uc644\uc804\ud55c \ub300\uc548\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \ud654\ud569\ubb3c\uc758 \uc548\uc804\uc131 \ud14c\uc2a4\ud2b8\ub294 \ub300\uccb4 \uae30\uc220\uc774 \uc544\uc9c1 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc601\uc5ed\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc740 \ud658\uc601\ud560 \ub9cc\ud55c \uc77c\uc774\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac \uc0ac\uc6a9 \uac00\ub2a5\ud55c \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc815\ubc00\uc131\uacfc \ud655\uc2e4\uc131\uc744 \ub530\ub77c\uc7a1\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub2e4\uc218\uc758 \uad6d\uc81c \uc5f0\uad6c \uae30\uad00\ub4e4\uc774 \ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub85c\ub294 \uc5ec\uc804\ud788 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc548\uc804\uc744 \ubcf4\uc7a5\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc774\ub77c\ub294 \ud604\uc2e4 \ub610\ud55c \uc874\uc7ac\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc2e4\ud5d8 \ub300\uccb4\ubc95 \uac1c\ubc1c\uc740 \uc2dc\uac04\uc774 \ud544\uc694\ud558\uba70, \uadf8\ub3d9\uc548 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\uc131\uacfc \uc720\ud6a8\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\ub824\ub294 \uc5f0\uad6c\uc640 \ub178\ub825\uc774 \uc9c4\ud589 \uc911\uc774\uc9c0\ub9cc, \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc904\uc774\ub294 \ub370 \uae0d\uc815\uc801\uc774\uba70 \uc774\ub294 \uacfc\ud559\uc774 \ucd94\uad6c\ud558\ub294 \ubc29\ud5a5\uc774\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc774\ub97c \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \ubd80\uc7ac\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc740 \uc544\uc9c1\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ub370\uc774\ud130\ub97c \uc644\uc804\ud558\uac8c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub9ce\uc740 \uacfc\ud559\uc790\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uae30\uc220\uc774 \uc544\uc9c1 \uc644\uc804\ud558\uc9c0 \uc54a\ub2e4\uace0 \ud655\uace0\ud788 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559\uc801 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc810\uc9c4\uc801\uc73c\ub85c \ub300\uccb4\ud558\ub824\ub294 \ubc29\ud5a5\uc73c\ub85c \uc9c4\ud654\ud558\uace0 \uc788\uc73c\ub098, \uc544\uc9c1 \uc2e4\ud6a8\uc801 \ub300\uccb4\ubc95\uc774 \uc644\uc804\ud788 \ud655\ubcf4\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uc778\uacf5\uc9c0\ub2a5\uacfc \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1 \uac19\uc740 \ub300\uccb4 \ubc29\ubc95\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ub51c\ub808\ub9c8\ub97c \ud574\uacb0\ud560 \uc218 \uc788\uc9c0\ub9cc, \ud604\uc7ac \uc774 \uae30\uc220\ub4e4\uc740 \uc644\uc804\ud55c \ub300\uc548\uc774 \ub420 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc874\uc758 \ub3d9\ubb3c \uc2e4\ud5d8 \ub300\uccb4 \uc5f0\uad6c\ub294 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc73c\ub85c\ub294 \uc544\uc9c1 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac\uc758 \uacfc\ud559\uae30\uc220\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc774 \uc874\uc7ac\ud55c\ub2e4\uace0 \ud574\ub3c4, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\ud07c\uc758 \ud3ec\uad04\uc801\uc778 \uac80\uc99d\uc744 \uc81c\uacf5\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1 \ub354 \ub9ce\uc740 \uc5f0\uad6c \uc131\uacfc\ub97c \ud544\uc694\ub85c \ud558\ub294 \ubc1c\uc804\ub2e8\uacc4\uc758 \ub300\uccb4 \ubc29\ubc95\uc744 \ubcf4\uc644\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \uc5f0\uad6c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubcf4\uc644\ucc45\uc774 \ub420 \uc218 \uc788\uc9c0\ub9cc, \ub2f9\uc7a5 \ubaa8\ub4e0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc644\uc804\ud55c \ub300\uccb4\ub294 \uc544\uc9c1 \uc2e4\ud604 \uac00\ub2a5\ud558\uc9c0 \uc54a\uc73c\uba70, \uc2e0\uc57d \uac1c\ubc1c\uc5d0\ub294 \ud544\uc218\uc801\uc778 \uc694\uc18c\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220 \uac1c\ubc1c\uc5d0\ub294 \uc0c1\ub2f9\ud55c \uc2dc\uac04\uc774 \ud544\uc694\ud558\uba70, \uadf8\ub3d9\uc548 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\ub294 \uacc4\uc18d\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc740 \uc7a5\uae30\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8 \uc758\uc874\ub3c4\ub97c \uc904\uc77c \uac00\ub2a5\uc131\uc744 \uc5f4\uc5b4\uc8fc\uace0 \uc788\uc9c0\ub9cc, \uc989\uac01\uc801\uc778 \ub300\uccb4\ub294 \ud604\uc2e4\uc801\uc774\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ube44\ub85d \uc0dd\uba85 \uc724\ub9ac\uac00 \uc911\uc694\ud558\ub2e4 \ud558\ub354\ub77c\ub3c4, \ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc774 \ub2f9\uc7a5 \uac1c\ubc1c\ub41c\ub2e4\uace0 \ud574\ub3c4, \uae30\uc874\uc758 \ub3d9\ubb3c \uc2e4\ud5d8 \ub370\uc774\ud130\ub97c \uc5b4\ub5bb\uac8c \ubcf4\uc644\ud558\uace0 \uc5f0\uacb0\ud560 \uac83\uc778\uc9c0\uc5d0 \ub300\ud55c \uc5f0\uad6c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ucd95\uc18c\ub97c \ucd94\uad6c\ud558\ub294 \ub3d9\uc2dc\uc5d0, \ud655\uc2e4\ud558\uace0 \uac80\uc99d\ub41c \ub300\uccb4 \uae30\uc220\uc774 \uc544\uc9c1 \ubaa8\ub4e0 \uc5f0\uad6c \uc694\uad6c\ub97c \ucda9\uc871\ud558\uc9c0 \ubabb\ud558\ub294 \ud604\uc2e4\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubaa8\ub378 \uac1c\ubc1c\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc5f0\uad6c\ub418\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc774\ub7ec\ud55c \ubc29\ubc95\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub2e4\ub294 \uac83\uc774 \ud604\uc2e4\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ubd80\uc871\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc5ec\uc804\ud788 \ub0a8\uae41\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc744 \ub354 \ud0d0\uad6c\ud558\ub824\ub294 \ub178\ub825\uc740 \uc9c0\uc18d\ub418\uace0 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uc2e0\ud560 \uc815\ub3c4\ub85c \ubc1c\uc804\ub41c \uae30\uc220\uc740 \ud604\uc7ac\uc5d0\ub3c4 \ubd80\uc871\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc5f0\uad6c \ubc29\ubc95\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc544\uc9c1\uc740 \ub300\uccb4 \uc2e4\ud5d8\uc774 \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \ucda9\ubd84\ud788 \uc2e4\uc6a9\uc801\uc774\uc9c0 \uc54a\uae30 \ub54c\ubb38\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220\uacfc \ubc29\ubc95\uc758 \uac1c\ubc1c\uc774 \uacc4\uc18d\ub418\ub294 \uac00\uc6b4\ub370, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4\ubc95\uc774 \ud655\ubcf4\ub418\uae30 \uc804\uae4c\uc9c0\ub294 \uc911\ub2e8\ud560 \uc218 \uc5c6\ub294 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ucca8\ub2e8 \uc5f0\uad6c \ubc29\ubc95\ub4e4\uc740 \uc720\ub9dd\ud558\uc9c0\ub9cc \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uc2e0\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc774 \uc544\uc9c1 \uc644\uc804\ud558\uc9c0 \uc54a\ub2e4\ub294 \uc810\uc740 \uc6b0\ub9ac\uc758 \ub3c4\uc804 \uacfc\uc81c\uc785\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ubc1c\uc804\uc5d0 \ub300\ud55c \ud22c\uc790\ub294 \uc2e4\uc81c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc73c\ub098, \ud604\uc7ac \uc0c1\ud0dc\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc989\uc2dc \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc704\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \uc131\uc219\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud55c\ub2e4 \ud558\ub354\ub77c\ub3c4 \uadf8\uac83\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ubaa8\ub4e0 \ub370\uc774\ud130\ub97c \ub3d9\uc77c\ud558\uac8c \uc81c\uacf5\ud558\uc9c0 \ubabb\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559\uc801 \uc9c4\ubcf4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc904\uc5ec\uac00\uace0 \uc788\uc9c0\ub9cc \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc778 \ubd80\ubd84\uc744 \ucc28\uc9c0\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\uae30\uc220\uc774 \ubc1c\uc804\ud558\uba74\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ub2e4\ub978 \ubc29\ubc95\ub4e4\uc774 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ube44\ub85d \ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc73c\ub098, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc8fc\ub294 \uc815\ud655\uc131\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc5f0\uad6c \uac1c\ubc1c\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\uc131\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc644\uc804\ud55c \ud574\ub2f5\uc744 \uc81c\uacf5\ud558\uae30 \uc804\uae4c\uc9c0\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc774 \ubd80\uc871\ud558\uc5ec \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc774 \ud07d\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ud604\uc7ac \ud55c\uacc4\ub85c \uc778\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uae30\uc874 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uc2e0\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\uc2e4\uc801\uc778 \ub300\uc548\uc774 \ubd80\uc871\ud55c \uc0c1\ud0dc\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uac00\uc7a5 \ubbff\uc744 \uc218 \uc788\ub294 \uc5f0\uad6c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \ub300\uc548 \uae30\uc220\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uc548\uc801\uc778 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \uac80\uc99d\ub418\uae30 \uc804\uae4c\uc9c0\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \ud655\ubcf4\ud558\ub294 \uac00\uc7a5 \ud569\ub9ac\uc801\uc778 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc81c\ud55c\ub41c \uc601\uc5ed\uc5d0\uc11c\ub9cc \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uadf8\ub7ec\ub098 \uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc5ec\uc804\ud788 \ub9e4\uc6b0 \uc911\uc694\ud569\ub2c8\ub2e4","\ud604\ub300 \uae30\uc220\uc744 \ud1b5\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\uace0\uc790 \ud558\ub294 \ub178\ub825\uc774 \uc788\ub354\ub77c\ub3c4, \uadf8\uac83\uc774 \uc644\uc804\ud788 \uc131\uc219\ub418\uae30 \uc804\uae4c\uc9c0\ub294 \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uc57d\ubb3c \uac1c\ubc1c\uc744 \uc704\ud55c \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc774 \uc544\ub2c8\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uae30 \uc704\ud574\uc11c\ub294 \uacfc\ud559\uc801 \uae30\uc900\uc744 \ucda9\uc871\uc2dc\ucf1c\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uc548\uc774 \uc5c6\ub294 \uacbd\uc6b0\uc5d0 \ud2b9\ud788 \uc911\uc694\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ubd80\ubd84\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc740 \uc544\uc9c1 \uac1c\ubc1c \ub2e8\uacc4\uc5d0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc644\uc804\ud55c \ub300\uccb4\ub97c \uc774\ub8e8\uae30 \uc704\ud574\uc11c\ub294 \ub354 \ub9ce\uc740 \uc2dc\uac04\uc774 \ud544\uc694\ud558\uba70, \ud604\uc7ac\uc758 \uc911\ub300\ud55c \uc9c8\ubcd1 \uc5f0\uad6c\ub97c \ubc29\ud574\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \uc2e0\ub8b0\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, 3R \uc6d0\uce59\uc758 \uc801\uc6a9\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc989\uc2dc \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc2dc\uc810\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc774 \ubd80\uc871\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc774 \uc644\uc804\ud558\uc9c0 \uc54a\uc740 \uac00\uc6b4\ub370, \ub9ce\uc740 \uc911\uc694\ud55c \uc9c8\ubcd1\ub4e4\uc740 \ub3d9\ubb3c \ubaa8\ub378 \uc5c6\uc774\ub294 \uc81c\ub300\ub85c \uc5f0\uad6c\ub420 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uc548\uc801 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\ub2ec\ub418\uc9c0 \uc54a\uc558\uae30 \ub54c\ubb38\uc5d0 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc874\ud558\ub294 \uacfc\ud559\uc801 \ub300\uc548\uc73c\ub85c\ub294 \ucda9\ubd84\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uc548\uc801 \ubc29\ubc95\uc774 \uc99d\uac00\ud558\uace0 \uc788\uc9c0\ub9cc \uc544\uc9c1 \ubd88\ucda9\ubd84\ud569\ub2c8\ub2e4; \ubbf8\uad6d \ubc14\uc774\uc624\uc0b0\uc5c5\ud611\ud68c(Biotechnology Innovation Organization)\ub294 \ub300\uc548\uc801 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc774 \uc874\uc7ac\ud558\uc9c0\ub9cc, \ud2b9\uc815 \uc0dd\ub9ac\uc801 \ubc18\uc751 \uc5f0\uad6c\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc9c0\uc801\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubcf5\uc7a1\uc131\uacfc \ub2e4\uc591\uc131\uc744 \ubaa8\ub450 \ub300\uccb4\ud558\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \ub300\uc2e0 \uc0ac\uc6a9\ud560 \uc218 \uc788\ub294 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ubaa8\ub4e0 \uc5f0\uad6c \ubd84\uc57c\uc5d0\uc11c \ucda9\ubd84\ud788 \ud6a8\uacfc\uc801\uc774\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc740 \ud604\uc7ac \uc5f0\uad6c\uc758 \ubaa8\ub4e0 \uc601\uc5ed\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc73c\uba70, \ud2b9\ud788 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uacfc \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\ub294 \ub370\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc774 \ub418\uae30\uae4c\uc9c0\ub294 \uc2dc\uac04\uc774 \uc18c\uc694\ub429\ub2c8\ub2e4","\uba3c\uc800, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud56d\uc0c1 \uc778\uac04\uc5d0\uac8c \uc9c1\uc811\uc801\uc73c\ub85c \uc801\uc6a9\ub418\ub294 \uacb0\uacfc\ub97c \ubcf4\uc7a5\ud558\uc9c0\ub294 \uc54a\uc9c0\ub9cc, \ub2e4\ub978 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ub3d9\ub4f1\ud55c \ucc99\ub3c4\uac00 \ub420 \uc218 \uc5c6\ub294 \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucd08\uae30\uc5d0 \ubd88\uacfc\ud558\uba70, \uc644\uc804\ud55c \ub300\uccb4\ub294 \ubd88\uac00\ub2a5\ud55c \uc0c1\ud669\uc785\ub2c8\ub2e4","\uae30\uc874\uc758 \uad00\ud589\uc5d0 \ub300\ud55c \ubcc0\ud654\ub97c \uc9c0\ud5a5\ud558\uba74\uc11c\ub3c4, \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uacfc\ud559\uc801 \uc5c4\uaca9\uc131 \ubc0f \ubcf5\ud569\uc801\uc778 \uc0dd\ub9ac\uc801 \ud0d0\uad6c\uc5d0 \uc801\ud569\ud558\uac8c \ubc1c\uc804\ud560 \ub54c\uae4c\uc9c0\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc758\uc874\ud560 \uc218\ubc16\uc5d0 \uc5c6\ub294 \ud604\uc2e4\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\uac00 \uc874\uc7ac\ud558\uae30\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \ud604 \ub2e8\uacc4\uc5d0\uc11c\ub294 \uc644\uc804\ud55c \ub300\uccb4\uac00 \uc774\ub8e8\uc5b4\uc9c0\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc774 \ud65c\ubc1c\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc9c0\ub9cc, \uc9c0\uae08 \ub2f9\uc7a5 \ubaa8\ub4e0 \uc0c1\ud669\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc740 \ubd80\uc871\ud569\ub2c8\ub2e4","\ud604\uc7ac\uc758 \uacfc\ud559 \uae30\uc220\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc804\uba74 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc81c\ud55c\uc801\uc774\uba70 \uadf8 \ud6a8\uacfc\ub294 \uac80\uc99d\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uacfc \uc801\uc6a9\uc740 \uc2dc\uac04\uc774 \uac78\ub9b4 \uc218 \uc788\uc73c\uba70, \uc774\ub7f0 \uc774\uc720\ub85c \ud604\uc7ac \uc9c4\ud589 \uc911\uc778 \uc5f0\uad6c\uc5d0\uc11c \ud544\uc694\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubd88\uac00\ud53c\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubd80\uc871\uc73c\ub85c \ud544\uc218\uc801\uc778 \uc5f0\uad6c \ub3c4\uad6c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \uc810\uc9c4\uc801\uc73c\ub85c \uac1c\ubc1c\ub418\uace0\ub294 \uc788\uc9c0\ub9cc, \uc774\ub294 \uc544\uc9c1\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \uc774\ub974\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc740 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc73c\uba70, \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc544\ub2cc \ub300\uccb4 \uc5f0\uad6c\ubc95\uc740 \uc7a5\uae30\uc801\uc774\uba74\uc11c\ub3c4 \ube44\uc6a9\uc774 \ub9ce\uc774 \ub4e4\uba70, \uc644\uc804\ud788 \uac80\uc99d\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uadf8\ub9ac\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\uae30 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ub300\uccb4 \uae30\uc220 \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\ub098, \uadf8 \ud6a8\uacfc\ub97c \uac80\uc99d\ud558\uace0 \uc801\uc6a9\ud558\ub294 \ub370\uc5d0\ub294 \uc5ec\uc804\ud788 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ube44\ub3d9\ubb3c\uc801 \ub300\uccb4 \uc5f0\uad6c\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \uc544\uc9c1\uc740 \ubcf4\uc644\uc801 \uc5ed\ud560\uc744 \ub9e1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc2dc\uac04\uc774 \uac78\ub9ac\uace0 \uc788\uc73c\uba70, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc989\uac01\uc801\uc73c\ub85c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\uace0 \uc788\uc9c0\ub9cc \ucda9\ubd84\ud55c \ub300\uccb4 \uae30\uc220\uc774 \uc544\uc9c1 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"0_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","", 8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c\ub41c \ud658\uacbd\uc5d0\uc11c \ub192\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ud1b5\ud574 \uc218\ud589\ub429\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubb34\ubd84\ubcc4\ud558\uac8c \uc9c4\ud589\ub418\uc9c0 \uc54a\uc73c\uba70, \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778 \uc544\ub798 \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uace0\ubbfc\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud558\ub294 \uacfc\uc815\uc5d0\uc11c \ud544\uc218\uc801\uc778 \ubd80\ubd84\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \ud1b5\uc81c\ub97c \ubc1b\uc73c\uba70 \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc744 \uc5c4\uc218\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \uc724\ub9ac\uc131\uc744 \ubcf4\uc7a5\ud558\uae30 \uc704\ud574 \uc5c4\uaca9\ud55c \uac00\uc774\ub4dc\ub77c\uc778\uacfc \uaddc\uc815\uc744 \uc900\uc218\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc0ac\uc6a9\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798 \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc815\ubc00\ud558\uac8c \uc870\uc808\ub41c \ud658\uacbd\uc5d0\uc11c \uc774\ub8e8\uc5b4\uc9c0\uba70, \ub3d9\ubb3c\ub4e4\ub3c4 \ucd5c\ub300\ud55c\uc758 \uc724\ub9ac\uc801 \uace0\ub824\ud558\uc5d0 \uc0ac\uc6a9\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uaddc\uc81c\ub97c \ud1b5\ud574 \uc724\ub9ac\uc801\uc778 \uae30\uc900\uc744 \uc720\uc9c0\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc724\ub9ac\uc801 \uace0\ub824\ub294 \ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c \ud56d\uc0c1 \uc6b0\uc120\uc2dc\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c0\uc18d\uc801\uc778 \uc724\ub9ac\uc801 \uae30\uc900 \uc900\uc218\ub97c \ud1b5\ud574 \uc218\ud589\ub429\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uace0\ubbfc\uc744 \ubc18\uc601\ud558\uc5ec \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c\uc640 \uae30\uc900 \ud558\uc5d0 \uc5c4\uaca9\ud788 \uad00\ub9ac\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uc5ec \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba70 \uc9c4\ud589\ub418\uc5b4\uc57c \ud558\uba70, \ub9ce\uc740 \uacbd\uc6b0 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc720\uc77c\ud55c \uc2e4\ud5d8 \ubc29\ubc95\uc73c\ub85c \ub0a8\uc544\uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc744 \ucca0\uc800\ud788 \uc900\uc218\ud568\uc73c\ub85c\uc368 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud22c\uba85\uc131\uacfc \ucc45\uc784\uc131\uc744 \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c\ub294 \ucd5c\ub300\ud55c\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc801\uc6a9\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc5f0\uad6c\uae30\uad00\uc758 \ucc45\uc784\uc785\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8 \ud504\ub85c\ud1a0\ucf5c\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc744 \uc694\uad6c\ubc1b\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\uc640 \ud568\uaed8 \uc724\ub9ac \uae30\uc900\uc744 \uc5c4\uaca9\ud788 \ub530\ub974\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uc9c0\uce68\uacfc \uaddc\uc81c\ub97c \ud1b5\ud574 \ucca0\uc800\ud788 \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uace0\ub824\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc788\uc5b4 \uc911\uc694\ud55c \ubd80\ubd84\uc785\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uc0ac\uc6a9\uc740 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \ud544\uc694\uc131\uc774 \uc788\uc744 \ub54c\uc5d0\ub9cc \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uace0\ub824\ub97c \ucda9\uc871\ud558\ub824\uba74 \uc5f0\uad6c\uc758 \uc2e0\ub8b0\uc131\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc788\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uc2e4\uc2dc\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uace0\ub824\uc5d0 \ubc14\ud0d5\uc744 \ub450\uace0 \uc2e0\uc911\ud558\uac8c \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc73c\ub85c \ud1b5\uc81c\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4. \"\ubbf8\uad6d \ub3d9\ubb3c \uc5f0\uad6c\ubcf4\ud638\ud611\ud68c(AALAS)\"\ub294 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud558\uace0 \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \uc5c4\uaca9\ud55c \uc9c0\uce68\uacfc \uaddc\uc81c\uac00 \uc874\uc7ac\ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900 \uc544\ub798 \uc218\ud589\ub429\ub2c8\ub2e4","\uacfc\ud559\uc790\ub4e4\uc740 \ud56d\uc0c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c\uc758 \uc911\uc694\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc5d0 \ub530\ub77c \uc874\uc7ac\ud558\uba70 \ub9c8\uc9c0\ub9c9 \uc218\ub2e8\uc73c\ub85c \uc0ac\uc6a9\ub429\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \uc801\uc808\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68 \uc544\ub798 \uc2e4\ud589\ub418\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc5f0\uad6c \uc724\ub9ac\ub97c \uc900\uc218\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc724\ub9ac\uc801\uc778 \uae30\uc900 \ud558\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9e4\uc6b0 \uc5c4\uaca9\ud558\uac8c \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c \uc724\ub9ac \uae30\uc900\uc5d0 \uadfc\uac70\ud558\uc5ec \uc5c4\uaca9\ud558\uac8c \uad00\ub9ac\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uc5c4\uaca9\ud558\uac8c \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud559\ubb38\uc801 \uc724\ub9ac \uae30\uc900\uc5d0 \uc758\ud574 \uaddc\uc81c\ub418\uace0 \uc788\uc73c\uba70 \uc5f0\uad6c\uc758 \ud544\uc218\uc131\uc774 \uc778\uc815\ub41c \uacbd\uc6b0\uc5d0\ub9cc \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucca0\uc800\ud788 \uad00\ub9ac\ud558\uace0 \uc724\ub9ac \uae30\uc900\uc744 \uc5c4\uaca9\ud788 \uc900\uc218\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uaddc\uc81c\ub294 \uad6d\uc81c\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc73c\uba70, \uc5f0\uad6c\uc758 \ud22c\uba85\uc131\uc744 \ub354\uc6b1 \ub192\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uac01\uc885 \uc724\ub9ac \uc9c0\uce68\uc744 \uc900\uc218\ud558\uba70 \uacfc\ud559\uc801 \uc815\ud655\uc131\uc744 \ucd94\uad6c\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \uce21\uba74\uc5d0\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\ub294 \uae30\uc874\uc758 \uc724\ub9ac \uc9c0\uce68\uc774 \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c\uc5d0\uc11c \uc0ac\uc6a9\ub418\ub294 \ub3d9\ubb3c\ub4e4\uc740 \ucca0\uc800\ud55c \uc724\ub9ac\uc801 \uac80\ud1a0\uc640 \uae30\uc900\uc744 \uae30\ubc18\uc73c\ub85c \ubcf4\ud638\ubc1b\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\ub294 \uac83\uc740 \uc5f0\uad6c\uc790\ub4e4\uc758 \uc911\uc694\ud55c \ucc45\uc784\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc778 \uc724\ub9ac\uc801 \uace0\ub824\ub97c \ub3d9\ubc18\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uaddc\ubc94 \uc548\uc5d0\uc11c \uc218\ud589\ub418\uc5b4\uc57c \ud558\uba70, \uac00\ub2a5\ud55c \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uc874\uc7ac\ud560 \ub54c\ub294 \uc774\ub97c \uc6b0\uc120\uc801\uc73c\ub85c \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc778 \uae30\uc900\uc744 \uc900\uc218\ud558\uba70 \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc778 \uc9c0\uce68\uacfc \uac10\ub3c5 \uc544\ub798 \uc2dc\ud589\ub418\uc5b4\uc57c \ud558\uba70, \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uace0\ub824\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uace0\ub824\ud558\uba74\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc774\ub77c\ub294 \uc810\uc740 \ubcc0\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900 \ud558\uc5d0 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba74\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc9c4\ud589\ud558\ub294 \uac83\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uc2e4\uc2dc\ub418\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc774\ubbf8 \uc5c4\uaca9\ud55c \uaddc\uc81c\ub97c \ubc1b\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c\ub41c \ud658\uacbd\uc5d0\uc11c \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900 \ud558\uc5d0 \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uaddc\uc81c\ub97c \ub530\ub985\ub2c8\ub2e4","\uadf8\ub7ec\ub098 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uaddc\uc81c\ub97c \uc900\uc218\ud558\uba74\uc11c \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc774\ubbf8 \uac00\ub2a5\ud55c \ud55c \uc724\ub9ac\uc801\uc73c\ub85c \uc218\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba70 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559 \uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \ucc45\uc784\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uac15\ud654\ub41c \uaddc\uc81c\uc640 \uac10\uc2dc\ub97c \ud1b5\ud574 \uc9c0\ucf1c\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uacfc \uc724\ub9ac\uc758 \uade0\ud615\uc744 \ub9de\ucd94\ub294 \ub370 \uc788\uc5b4 \uc5c4\uaca9\ud55c \uaddc\uc81c\ub97c \ud1b5\ud574 \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9e4\uc6b0 \ub192\uc740 \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798\uc5d0\uc11c \uc9c4\ud589\ub429\ub2c8\ub2e4","\uc778\uac04\uc5d0 \ub300\ud55c \uc9c1\uc811\uc801\uc778 \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc73c\ub85c \ubb38\uc81c\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc740 \uc5c4\uaca9\ud558\uac8c \uaddc\uc81c\ub429\ub2c8\ub2e4","\ubaa8\ub4e0 \uc0dd\uba85\uccb4\uac00 \uace0\uc720\ud55c \uac00\uce58\ub97c \uac00\uc9c4\ub2e4\ub294 \uc810\uc744 \uc874\uc911\ud558\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uacfc \uaddc\uc81c\ub97c \ub530\ub985\ub2c8\ub2e4","\ub3d9\ubb3c\uc744 \ub300\uc0c1\uc73c\ub85c \ud55c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba74\uc11c \ud544\uc218\uc801\uc778 \uc5f0\uad6c \uc778\uc0ac\uc774\ud2b8\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uc758 \uad8c\ub9ac\ub97c \ubcf4\ud638\ud558\uba74\uc11c\ub3c4 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uc5f0\uad6c \uacb0\uacfc\ub97c \uc5bb\uc744 \uc218 \uc788\ub294 \uacf5\uc815\ud55c \uc2e4\ud5d8 \ubc29\ubc95\uc774 \uc774\ubbf8 \uc801\uadf9\uc801\uc73c\ub85c \uc2dc\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uc808\ucc28 \uc544\ub798\uc5d0\uc11c \uc218\ud589\ub429\ub2c8\ub2e4","\uc0dd\uba85\uc724\ub9ac \uaddc\ubc94\uc744 \uc900\uc218\ud558\ub294 \uac00\uc6b4\ub370 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uac00\ub2a5\ud558\uace0 \ud544\uc694\ud55c \uac83\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc5f0\uad6c\ub294 \ubc95\uc801\uc774\uace0 \uc724\ub9ac\uc801\uc778 \uae30\uc900\uc744 \uc900\uc218\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ud1b5\ud574 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \ud1b5\uc81c \ud558\uc5d0 \uc911\uc694\uc131\uacfc \ud544\uc218\uc131\uc744 \uc778\uc815\ubc1b\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778 \ud558\uc5d0 \uc2dc\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc788\uc5b4 \uc724\ub9ac\uc801 \uae30\uc900\uc740 \ucca0\uc800\ud558\uac8c \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc73c\ub85c \uad00\ub9ac\ub418\uba70 \uc5f0\uad6c\uc758 \uacf5\uc815\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798 \uc798 \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc73c\ub85c \uad00\ub9ac\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uae30\uc874\uc758 \uacfc\ud559\uc801 \uae30\uc900\uacfc \uc724\ub9ac\uc801 \uc9c0\uce68 \ud558\uc5d0 \uc5c4\uaca9\ud558\uac8c \ud1b5\uc81c\ub418\uace0 \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\uacfc \uaddc\uc81c\ub97c \ub530\ub985\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc801\uc6a9\ub429\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uc2e4\ud5d8 \uae30\uc900\uc744 \ucca0\uc800\ud788 \uc900\uc218\ud574\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \ubc0f \uc724\ub9ac \uae30\uc900 \ud558\uc5d0 \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uc0dd\uba85\ub3c4 \uc18c\uc911\ud558\ub2e4\ub294 \uc810\uc5d0\uc11c \ud22c\uba85\ud55c \uc2e4\ud5d8 \ud658\uacbd\uacfc \uc724\ub9ac\uc801 \uc0ac\uc6a9\uc744 \ubcf4\uc7a5\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc724\ub9ac\uc801\uc778 \ub3d9\ubb3c \uc2e4\ud5d8 \uad00\ud589\uc740 \uc774\ubbf8 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4. '\ub3d9\ubb3c\uc2e4\ud5d8\uc744\uc704\ud55c\uad6d\uc81c\uc5f0\ud569(International Council for Laboratory Animal Science)'\ub294 \uc724\ub9ac\uc801\uc778 \uae30\uc900\uc744 \uc5c4\uaca9\ud558\uac8c \uc900\uc218\ud558\uace0 \uc788\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc2e0\uc911\ud788 \ud3c9\uac00\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc0dd\uba85\uc724\ub9ac\uac00 \ubaa8\ub4e0 \uc5f0\uad6c\uc758 \uae30\ubcf8\uc774 \ub418\uc5b4\uc57c \ud55c\ub2e4\ub294 \uc810\uc5d0 \ub3d9\uc758\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uc5c4\uaca9\ud788 \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uac00 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\ub3c4\ub85d \uc5c4\uaca9\ud558\uac8c \uaddc\uc81c\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc5d0 \ub530\ub77c \uc2e0\uc911\ud558\uac8c \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc5d0 \ub530\ub77c \uc218\ud589\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc0dd\uba85 \uc874\uc911\uacfc \uc724\ub9ac\uc801 \uc2e4\ud5d8\uc744 \uc704\ud55c \uc5c4\uaca9\ud55c \uac00\uc774\ub4dc\ub77c\uc778\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc778 \uaddc\uc81c \ud558\uc5d0 \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba70 \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \uac15\ud654\ud558\uba70 \ud544\uc218\uc801\uc778 \ubd80\ubd84\uc5d0 \ud55c\uc815\ud558\ub294 \uad00\ub9ac\uac00 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc804 \uc138\uacc4\uc801\uc778 \uaddc\uc81c \uae30\uad00\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc778\uc815\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacbd\uc6b0\uc5d0\ub3c4 \uc724\ub9ac\uc801\uc73c\ub85c \uc5c4\uaca9\ud55c \uae30\uc900\uc744 \uc9c0\ud0a4\uba74\uc11c \uc9c4\ud589\ub429\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \uad00\ub9ac\ub97c \ud1b5\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\ub300\ud55c \ub3d9\ubb3c\uc744 \ubcf4\ud638\ud558\uba70 \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc778 \uc9c0\uce68 \ud558\uc5d0 \uc218\ud589\ub418\uba70, \uc5f0\uad6c\uc790\ub4e4\uc740 \uac00\ub2a5\ud55c \ub300\uccb4 \ubc29\ubc95\uc744 \uba3c\uc800 \uace0\ub824\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubaa8\ub4e0 \uc2e4\ud5d8\uc774 \uc5c4\uaca9\ud788 \uac10\ub3c5\ub418\uace0 \uc788\ub2e4\ub294 \uc0ac\uc2e4\uc740 \ub3d9\ubb3c\uc758 \uad8c\ub9ac\ub97c \ubcf4\uc7a5\ud558\ub294 \ub370 \ub9e4\uc6b0 \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uace0\ub824\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, \uacfc\ud559\uacc4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud55c \uacbd\uc6b0 \ucd5c\uc120\uc744 \ub2e4\ud574 \uc5c4\uaca9\ud788 \uaddc\uc81c\ub41c \ud658\uacbd\uc5d0\uc11c \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub85c \uc778\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc694\ud55c \uacbd\uc6b0\uc5d0\ub9cc \uc0ac\uc6a9\ub418\uc5b4\uc57c \ud558\uba70, \uc774\ub294 \uaddc\uc81c \uae30\uad00\ub4e4\uc774 \uc5c4\uaca9\ud788 \uac10\ub3c5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8 \uaddc\uc815\uc740 \ucd5c\ub300\ud55c \uc5c4\uaca9\ud558\uac8c \uad00\ub9ac\ub429\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"1_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","1_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"h1hYQQ9UVUGROltBTQhbQcMoWkGPZFZBGB1ZQeDEVUGyj1VBgrdNQaVJWkHjnF1B9kFXQUuOWkGg61JBhAFXQR8RT0EC\u002flFBtkZcQXKjUkEnFFpBFUtTQWgAUkFML1tBP\u002fxWQY\u002f0W0E+mU1BWh5bQTpYTEGn51ZBzIROQTfBVkFx2F1BjjhRQQuEUUHDrlpBRgNPQU+1XUGtfVtBFK1bQTTKWkE1rFpBWWFVQTNCUEGbBVNBhRtYQV2xTEHgqE5BvSZXQXwBUkEpClBBtoxQQadmWkFZGFJB2H5ZQa2BWEGB1ltBCNNWQUuaUkG\u002f9lFBnA9VQUNcV0Hh6F1BzHtMQdC5W0HMiFVBmHpOQQAkTkErQVJB2YFTQX53VkH8+05BHmtTQXuYWkE1SFlBdVxSQbagUkH1BFNByOlZQXmCXUFt7VlBBe9WQZusV0Gthk1BVxdWQYO0XUFKqU1B8IBcQTrdW0G4Q1NBN0ZaQXqgXUHC2VZBLhNSQcaJVkF6t11Bje9VQUt9U0EJMlBBMDdRQTptWkEE6VJBSgFbQVu4XEGiE1ZB"},"y":{"dtype":"f4","bdata":"QQypQCfLp0AQkK5AdO+nQHVEsEDbcrdAHPKtQITGqUBD0KRAP9y0QFwmrkAMD7xAGTapQGfor0Ay4ahAP7elQCkYtEA2Eq
