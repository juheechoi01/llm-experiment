}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"t0","marker":{"color":"#636EFA","line":{"color":"white","width":0.5},"opacity":0.8,"size":6},"mode":"markers","name":"\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4","showlegend":true,"text":["\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub458\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ud604\uc7ac \ud55c\uacc4\ub85c \uc778\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \uc2e4\ud5d8 \ub300\uccb4\ubc95 \uac1c\ubc1c\uc740 \uc2dc\uac04\uc774 \ud544\uc694\ud558\uba70, \uadf8\ub3d9\uc548 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\uc131\uacfc \uc720\ud6a8\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \uc801\uc6a9\ub418\uae30\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub300\uccb4 \uae30\uc220\uc740 \uc544\uc9c1\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ub370\uc774\ud130\ub97c \uc644\uc804\ud558\uac8c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub3c4 \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \ubaa8\ubc29\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc774 \uc5f0\uad6c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\uae30\uc220 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\ub294 \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc9c0\ub9cc, \ud604 \uc2dc\uc810\uc5d0\uc11c\ub294 \uadf8 \uc790\uccb4\ub85c \ubd88\uc644\uc804\ud55c \ub300\uc548\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ub300\uccb4 \uae30\uc220\uc740 \ud604\uc7ac \uc5f0\uad6c\uc758 \ubaa8\ub4e0 \uc601\uc5ed\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc73c\uba70, \ud2b9\ud788 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uacfc \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\ub294 \ub370\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\ud5a5\ud6c4 \ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud568\uc5d0 \ub530\ub77c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc774 \uc904\uc5b4\ub4e4 \uac00\ub2a5\uc131\uc740 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \ud604 \uc2dc\uc810\uc5d0\uc11c\ub294 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc644\uc804\ud55c \ubc29\ubc95\uc774 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uc548\uc801 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\ub2ec\ub418\uc9c0 \uc54a\uc558\uae30 \ub54c\ubb38\uc5d0 \ud544\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc14b\uc9f8, \uacfc\ud559\uc801 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc810\uc9c4\uc801\uc73c\ub85c \ub300\uccb4\ud558\ub824\ub294 \ubc29\ud5a5\uc73c\ub85c \uc9c4\ud654\ud558\uace0 \uc788\uc73c\ub098, \uc544\uc9c1 \uc2e4\ud6a8\uc801 \ub300\uccb4\ubc95\uc774 \uc644\uc804\ud788 \ud655\ubcf4\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc774 \uc544\ub2c8\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc uc644\ubcbd\ud558\uac8c \ubc18\uc601\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ub300\uccb4 \uae30\uc220\ub4e4\uc774 \ube60\ub974\uac8c \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc0dd\ub9ac\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc7ac\ud604\ud558\uae30\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uc9c4\ubcf4\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\uc774 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc5d0 \ub300\ud55c \ud1b5\ud569\uc801\uc778 \ubd84\uc11d\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \uc778\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc644\uc804\ud558\uac8c \ubaa8\ubc29\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uc778\uacf5 \uc7a5\uae30 \ub4f1 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc5ec\uc804\ud788 \uc81c\ud55c\uc801\uc774\uba70, \ubaa8\ub4e0 \uc0dd\uccb4 \ubc18\uc751\uc744 \ud3ec\uad04\uc801\uc73c\ub85c \uc608\uce21\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uccab\uc9f8, \uc778\uacf5\uc801 \ubaa8\ub378\uc774\ub098 \ub300\uccb4 \ubc29\ubc95\uc740 \ubcf5\uc7a1\ud55c \uc0dd\uba85\uccb4\uc758 \uc644\uc804\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc7ac\ud604\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \ubc1c\uc804 \ub2e8\uacc4\uc5d0\uc11c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ucda9\ubd84\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc740 \ub3d9\ubb3c \ubaa8\ub378\uc774 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uba85\uccb4 \uae30\ubc18\uc758 \ubc18\uc751\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uc138\ud3ec \ubaa8\ub378\uc774\ub098 \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uc740 \ud2b9\uc815 \uc5f0\uad6c \ub2e8\uacc4\uc5d0\uc11c \uc720\uc6a9\ud558\uc9c0\ub9cc, \uc644\uc804\ud55c \uc720\uae30\uccb4\uc758 \ubcf5\uc7a1\uc131\uc744 \uc7ac\ud604\ud558\uac70\ub098 \uc608\uce21\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uc778\uacf5 \uc9c0\ub2a5 \ubc0f \ubc30\uc591 \uc870\uc9c1 \ub4f1\uc758 \uae30\uc220\uc740 \ubcf4\uc870\uc801\uc778 \uc5ed\ud560\ub85c\uc368 \ud604\uc7ac\uc758 \uc5f0\uad6c\ub97c \uc9c0\uc6d0\ud558\uace0 \uc788\uc9c0\ub9cc, \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\ub294 \ud55c\uacc4\ub97c \uac00","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ub300\uccb4 \uae30\uc220\uc740 \uc77c\ubd80 \uc601\uc5ed\uc5d0\uc11c\ub294 \uc131\uacf5\uc744 \uac70\ub450\uace0 \uc788\uc9c0\ub9cc, \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \ub3d9\ubb3c\uc758 \uc0dd\ub9ac\uc801 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ud604\uc7ac \uae30\uc220\uc740 \ub3d9\ubb3c \ubaa8\ub378\uc774 \uc81c\uacf5\ud558\ub294 \ubaa8\ub4e0 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801, \uc57d\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\uc778\uacf5 \uc7a5\uae30\uc640 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc740 \ubcf5\uc7a1\ud55c \uc2dc\uc2a4\ud15c\uc758 \ud2b9\uc815 \uce21\uba74\uc744 \ubd84\uc11d\ud558\ub294 \ub370 \ub3c4\uc6c0\uc774 \ub420 \uc218 \uc788\uc9c0\ub9cc, \uc5ec\uc804\ud788 \uc804\uc2e0 \ubc18\uc751\uc744 \uc644\uc804\ud558\uac8c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ub9ce\uc740 \ub300\uccb4 \uae30\uc220\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uc0c1\ud669\uc5d0\uc11c \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \ubaa8\ubc29\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ud604\uc7ac\uc758 \ucca8\ub2e8 \uae30\uc220\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uac19\uc740 \uc0dd\ubb3c\uc758 \ubcf5\uc7a1\ud55c \uccb4\uacc4\uc801 \ubc18\uc751\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uc778\uac04 \uc138\ud3ec \uc2e4\ud5d8\uacfc \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \uc778\uac04\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc815\ud655\ud558\uac8c \ubaa8\uc0ac\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ud604\uc7ac \ub300\uc548\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc2e4\uc81c \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ubcf5\uc7a1\uc131\uc744 \ucda9\ubd84\ud788 \ubaa8\uc0ac\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uccab\uc9f8, \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uc774\ub098 \uc778\uacf5 \uc870\uc9c1 \uc2e4\ud5d8\ub9cc\uc73c\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uccab\uc9f8, \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uc778\uacf5 \uc7a5\uae30 \uc2e4\ud5d8\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc774\ub4e4\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \u b\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ubd80\ubd84\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ub300\uccb4 \uae30\uc220\uc774 \uc874\uc7ac\ud55c\ub2e4\uace0 \ud574\ub3c4, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\ud07c\uc758 \ud3ec\uad04\uc801\uc778 \uac80\uc99d\uc744 \uc81c\uacf5\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1 \ub354 \ub9ce\uc740 \uc5f0\uad6c \uc131\uacfc\ub97c \ud544\uc694\ub85c \ud558\ub294 \ubc1c\uc804\ub2e8\uacc4\uc758 \ub300\uccb4 \ubc29\ubc95\uc744 \ubcf4\uc644\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \ub300\uc548 \uae30\uc220\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc774 \uc810\uc9c4\uc801\uc73c\ub85c \uac1c\ubc1c\ub418\uace0\ub294 \uc788\uc9c0\ub9cc, \uc774\ub294 \uc544\uc9c1\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \uc774\ub974\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uacfc\ud559\uacfc \uae30\uc220 \ubc1c\uc804\uc758 \uc18d\ub3c4\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4 \uae30\uc220\uc774 \ub530\ub77c\uc7a1\uc9c0 \ubabb\ud55c \uad6c\uccb4\uc801\uc774\uace0 \uc2e4\uc9c8\uc801\uc778 \uac80\uc99d \ubc29\ubc95\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc774 \uae30\uc874\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc0ac\uc2e4\uc744 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ub458\uc9f8, \ube44\ub85d \ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc73c\ub098, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc8fc\ub294 \uc815\ud655\uc131\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub300\uccb4 \uae30\uc220\uc774 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \ucc3e\uae30 \uc704\ud55c \uc5f0\uad6c\uac00 \uc9c4\ud589\ub418\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\ub098, \uc774\ub294 \uc5ec\uc804\ud788 \uc2dc\uac04\uc774 \uac78\ub9bd\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub3c5\ud2b9\ud55c \uac00\uce58\ub294 \ud604\uc7ac \ub300\uccb4 \uae30\uc220\ub85c\ub294 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc774 \uc544\uc9c1 \uc644\uc804\ud788 \uc774\ub8e8\uc5b4\uc9c0\uc9c0 \uc54a\uc558\uae30\uc5d0 \ud544\uc218\uc801\uc778 \uc5f0\uad6c \uc218\ub2e8\uc73c\ub85c \uae30\ub2a5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub458\uc9f8, \uc2e0\ub8b0\uc131 \uc788\ub294 \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc774 \uc544\uc9c1 \uc644\uc804\ud558\uc9c0 \uc54a\ub2e4\ub294 \uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc720\uc77c\ud55c \uc2e4\uc6a9\uc801\uc778 \uc120\ud0dd\uc9c0\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\uac00 \uc874\uc7ac\ud558\uae30\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc9c0\uc18d\ud574\uc11c \uc9c4\ud589\ub418\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c \uc774\ub4e4\uc774 \ubaa8\ub4e0 \uc5f0\uad6c\uc5d0 \uc801\uc6a9\ub420 \uc218 \uc788\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub458\uc9f8, \ud604\uc7ac \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc644\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ucd5c\uc885 \ubaa9\ud45c\uac00 \uc544\ub2c8\ub77c\ub294 \uc810\uc5d0\uc11c\ub3c4 \uc5f0\uad6c\ub294 \uacc4\uc18d\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc2dc\uac04\uc774 \uac78\ub9ac\uace0 \uc788\uc73c\uba70, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc989\uac01\uc801\uc73c\ub85c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud55c \uc2e0\ub8b0\uc131\uc744 \uac16\uc9c0 \ubabb\ud558\uace0 \uc788\uae30 \ub54c\ubb38\uc5d0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\uae4c\uc9c0 \uac00\uc7a5 \uc720\ud6a8\ud558\uace0 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \ub300\uccb4 \ubc29\ubc95\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ubd88\uc644\uc804\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u 4 \ud544\uc694\ud558\uba70, \uadf8\ub3d9\uc548 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\ub294 \uacc4\uc18d\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \ub300\uc2e0\ud560 \uc218 \uc788\ub294 \ub300\uc548\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\ub2ec\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub300\uccb4 \uc5f0\uad6c \uac1c\ubc1c\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\uc131\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc644\uc804\ud55c \ud574\ub2f5\uc744 \uc81c\uacf5\ud558\uae30 \uc804\uae4c\uc9c0\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc14b\uc9f8, \uacfc\ud559\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uac10\uc18c\uc2dc\ud0ac \uc218 \uc788\uc9c0\ub9cc, \ud604\uc7ac \ud544\uc694\ud55c \uc5f0\uad6c\uc640 \uc989\uac01\uc801\uc778 \uce58\ub8cc \uac1c\ubc1c\uc744 \ud3ec\uae30\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\uae30\uc220\uc774 \ubc1c\uc804\ud558\uba74\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ub2e4\ub978 \ubc29\ubc95\ub4e4\uc774 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc740 \ud658\uc601\ud560 \ub9cc\ud55c \uc77c\uc774\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc6 5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uccab\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\ub824\ub294 \uc5f0\uad6c\uc640 \ub178\ub825\uc774 \uc9c4\ud589 \uc911\uc774\uc9c0\ub9cc, \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucd08\uae30\uc5d0 \ubd88\uacfc\ud558\uba70, \uc644\uc804\ud55c \ub300\uccb4\ub294 \ubd88\uac00\ub2a5\ud55c \uc0c1\ud669\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ub458\uc9f8, 3R \uc6d0\uce59\uc758 \uc801\uc6a9\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc989\uc2dc \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4"],"x":[2.9014406204223633,3.2121798992156982,2.6625092029571533,4.168893814086914,2.570882558822632,3.321702718734741,2.9972455501556396,2.370908498764038,2.30440092086792,2.7399487495422363,2.779496192932129,3.9747815132141113,2.509798526763916,3.048833131790161,2.7232563495635986,2.666024684906006,3.5515551567077637,2.6531002521514893,2.3494110107421875,4.012507915496826,2.6366827487945557,3.9178266525268555,2.8926610946655273,2.505065441131592,2.747802495956421,3.1122896671295166,3.393484115600586,4.045193195343018,2.7002577781677246,2.6484951972961426,2.4320030212402344,2.3128678798675537,4.165087699890137,3.3474080562591553,4.097041130065918,3.230 2e4\ud5d8\uc740 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c \ud558\uc5d0 \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc724\ub9ac\uc801 \uc6b0\ub824\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc5c4\uaca9\ud788 \uad00\ub9ac\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uc724\ub9ac\uc131\uc744 \uac15\ud654\ud558\ub294 \uac10\ub3c5 \uc2dc\uc2a4\ud15c\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900 \ud558\uc5d0 \uc9c4\ud589\ub429\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uadf9\ub3c4\ub85c \uc81c\ud55c\ub41c \ud658\uacbd\uc5d0\uc11c\ub9cc \ud5c8\uc6a9\ub418\uba70, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc778 \uac1c\uc120\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uccab\uc9f8, \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\uc640 \uc724\ub9ac\ub97c \ubcf4\uc7a5\ud558\uae30 \uc704\ud55c \uc9c4\uc804\ub41c \uaddc\uc81c\uac00 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc5d0 \ub530\ub77c \uc5c4\uaca9\ud788 \uad00\ub9ac\ub429\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\ub294 \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc5d0 \uc758\ud574 \uc5c4\uaca9\ud788 \uaddc\uc81c\ub418\uc5b4 \uc788\uc73c\uba70, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\ub429\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud55c \uacbd\uc6b0\uc5d0\ub3c4 \ucd5c\ub300\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud574\uc57c \ud55c\ub2e4\ub294 \ub178\ub825\uc740 \uba85\ud655\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uaddc\uc81c\ub97c \ud1b5\ud574 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\ud558\uc5d0 \uc9c4\ud589\ub418\uba70, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\uace0 \ub178\ub825\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc774 \uc874\uc7ac\ud558\uba70, \uc774\ub7ec\ud55c \uae30\uc900\uc744 \uc900\uc218\ud558\ub294 \uac83\uc774 \uc724\ub9ac\uc801 \uacbd\uacc4\ub97c \uc124\uc815\ud558\ub294 \ub370 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucca0\uc800\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798 \uc2dc\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \ub3d9\ubb3c\uc5d0\uac8c \uac00\ud574\uc9c0\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\uc2dd\uc73c\ub85c \uc2e4\ud5d8\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc774 \uc774\ubbf8 \uc874\uc7ac\ud558\uba70 \uc5c4\uaca9\ud788 \ud1b5\uc81c\ub429\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc0c8\ub85c\uc6b4 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ub3c4\uc785\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\ub418, \uc774\ub97c \uc644\uc804\ud788 \ubc30\uc81c\ud558\uc9c0 \ub9d0\uc544\uc57c \ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uc744 \ubcf4\uc7a5\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc815\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\ubd88\ud544\uc694\ud55c \ub3d9\ubb3c \ud76c\uc0dd\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uc808\ucc28\uac00 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc6b0\ub9ac\ub294 \ucd5c\ub300\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc9c0\ud0a4\uba70 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud558\uc5ec \ucd5c\uc18c\ud654\ub41c \uace0\ud1b5 \uc18d\uc5d0 \uc911\uc694\ud55c \uc5f0\uad6c \uc131\uacfc\ub97c \uc5bb\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc778 \uce21\uba74\uc744 \uace0\ub824\ud558\uc5ec \uac00\ub2a5\ud55c \ud55c \uace0\ud1b5\uc744 \uc904\uc774\ub294 \ubc29\ud5a5\uc73c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uad00\ub9ac\uac00 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub450 \ubc88\uc9f8\ub85c, \ub9ce\uc740 \uae30\uad00\ub4e4\uc774 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uc704\ud574 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc744 \ub530\ub974\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \uaddc\uc815\ub41c \uc724\ub9ac \uae30\uc900\uc744 \ucda9\uc871\ud558\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc774\ub8e8\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc14b\uc9f8, \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc904\uc774\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \ud2b9\ubcc4\ud55c \uaddc\uc81c\uc640 \uae30\uc900\uc744 \ud1b5\ud574 \ud574\uacb0\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \uc724\ub9ac\uc801 \ub3d9\ubb3c \ucde8\uae09 \uae30\uc900\uc774 \uc5c4\uaca9\ud788 \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc6b0\ub824\ub97c \uc644\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uae30\uc900\uc774 \uc774\ubbf8 \uc874\uc7ac\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uc5ec \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uace0\ud1b5 \ucd5c\uc18c\ud654 \ub178\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub3d9\ubb3c\ub4e4\uc5d0\uac8c \uace0\u 20\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ucd09\uc9c4\uc81c\ub85c\ub3c4 \uc791\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uae30\uc220\uc758 \uc720\ud6a8\uc131\uc744 \ud3c9\uac00\ud558\uace0 \uac80\uc99d\ud558\ub294 \uae30\uc900\uc810\uc73c\ub85c\ub3c4 \ud65c\uc6a9\ub429\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0\ub3c4 \uae30\uc5ec\ud569\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc7a5\uae30\uc801\uc778 \ud574\uacb0\ucc45\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \ud1b5\ud569\uc801 \ud65c\uc6a9\uc5d0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \ub3d9\uc2dc\uc5d0 \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \ub3d9\uc2dc\uc5d0 \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uacfc \ub3d9\ubb3c \uc2e4\ud5d8 \uac04\uc758 \uc0c1\ud638\ubcf4\uc644\uc740 \uae30 3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \uc5f0\uad6c\uac00 \uc801\uadf9\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uacfc \ub3d9\ubb3c \ubcf5\uc9c0\ub294 \ubcd1\ud589\ud558\ub294 \uac83\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ube44\ub3d9\ubb3c \ubaa8\ub378 \uac1c\ubc1c\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc778 \uc874\uc7ac\ub85c \ud568\uaed8 \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \ub300\uc548 \uae30\ubc95\uc758 \uac1c\ubc1c\uacfc \uc801\uc6a9\uc740 \uc774\ubbf8 \uc5ec\ub7ec \uae30\uad00\uc5d0\uc11c \ud65c\ubc1c\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\uc0c8\ub85c\uc6b4 \uae30\uc220\uc774 \ubc1c\uc804\ud568\uc5d0 \ub530\ub77c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcd1\ud589\ub418\uc5b4 \uac1c\ubc1c\uc758 \uc2e0\ub8b0\uc131\uc744 \ub192\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uc740 \ud65c\ubc1c\ud788 \uc9c4\ud589 \uc911\uc774\uba70, \uc774\ub294 \uad81\uadf9\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\uae30 \uc704\ud55c \uc911\uc694\ud55c \ubaa9\ud45c\uc785\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \uae30\uc220\uc740 \uc0c1\ud638\ubcf4\uc644\uc801\uc774\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc644\uc804\ud788 \ubc30\uc81c\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uc0c8\ub85c\uc6b4 \uae30\uc220\uc758 \ub3d9\uc2dc \ubc1c\uc804\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \uae30\uc220\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801 \uad00\uacc4\ub97c \uc774\ub8f9\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacf5\uc874\ud558\uba70 \uc0c1\ud638 \ubcf4\uc644\uc801\uc73c\ub85c \uc0ac\uc6a9\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4. '\uad6d\uc81c \uc0dd\uba85\uacfc\ud559\uc5f0\uad6c\uc18c (ILAR)'\ub294 \ud604\ub300 \uc0dd\uba85\uacfc\ud559 \uc5f0\uad6c\uc5d0\uc11c\ub294 \ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uacfc\ud559\uc801 \ud601\uc2e0\uc740 \ub300\uccb4 \uae30\uc220\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc870\ud654\ub85c\uc6b4 \ubc1c\uc804\uc744 \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4. '\uc720\ub7fd \uc758\uc57d\ud488\uccad (EMA)'\uc740 \ucc28\uc138\ub300 \uc5f0\uad6c\uc5d0\uc11c \ub300\uccb4 \ubc29\ubc95\uacfc ","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc9c0\uc18d\uc801\uc778 \uacfc\ub3c4\uae30 \ub178\ub825\uc758 \uc77c\ud658\uc785\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc14b\uc9f8, \uae30\uc220 \uac1c\ubc1c\uacfc \ub3d9\uc2dc\uc5d0 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \ub300\uccb4 \ubc29\ubc95\uc744 \uc801\uadf9\uc801\uc73c\ub85c \ud0d0\uad6c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc740 \ubcf4\uc870 \uc218\ub2e8\uc73c\ub85c \ubc1c\uc804 \uc911\uc774\uba70, \uad81\uadf9\uc801\uc73c\ub85c \ub354 \uc548\uc804\ud55c \uc2e4\ud5d8 \ud658\uacbd\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uba3c\uc800, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uc0c8\ub85c\uc6b4 \uae30\uc220\uc740 \ubcf4\uc644\uc801\uc73c\ub85c \uc0ac\uc6a9\ub429\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\ub610\ud55c, \ub300\uccb4 \uae30\uc220\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uade0\ud615 \uc7a1\ud78c \ud22c\uc790\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc744 \uc704\ud55c \uae30\ubc18\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ub300\uc548\uc801 \uc5f0\uad6c \ubc29\ubc95\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\uba70 \uc810\ucc28 \uadf8 \ube44\uc911\uc744 \ub354\ud574\uac00\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uc548 \uac1c\ubc1c\uc758 \ud1a0\ub300\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc704\ud55c \uae30\ucd08 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ub300\uccb4 \uc5f0\uad6c\ub3c4 \ub3d9\ubb3c \uc5f0\uad6c\uc5d0\uc11c \ubc1c\uc804\ud569\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc9c0\uc6d0\ud558\ub294 \ub2e4\ub9ac \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ub300\uc548\uc801 \ubc29\ubc95\uc5d0 \ub300\ud55c \ud1b5\ucc30\uc744 \uc5bb\uc2b5\ub2c8\ub2e4; \ub9c9\uc2a4 \ud50c\ub791\ud06c \uc5f0\uad6c\uc18c(Max Planck Institute)\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ubcf5\ud569\uc801\uc778 \uc0dd\ub9ac\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud558\uae30\uc5d4 \ubd80\uc871\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ud604\ub300 \uae30\uc220\ub85c \uc544\uc9c1 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubcf5\ud569\uc131\uc744 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ud658\uacbd\uc758 \uc7ac\ud604\uc5d0 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub458\uc9f8, \uc778\uac04 \uc720\ub798 \uc138\ud3ec\ub098 \uc870\uc9c1 \ubaa8\ub378, \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uc740 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \ubaa8\ubc29\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \ub3d9\ubb3c \uc804\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc7ac\ud604\ud558\ub294 \ub370 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub2ec\ub9ac \ud604\uc7ac\uc758 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ub458\uc9f8, \uc778\uacf5 \uc7a5\uae30\uc640 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc740 \uc720\ub9dd\ud558\uc9c0\ub9cc \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uc778\uacf5 \uc7a5\uae30\ub098 \uc138\ud3ec \uae30\ubc18 \uc2e4\ud5d8\uc740 \uc544\uc9c1 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ud658\uacbd\uc744 \uc644\ubcbd\ud788 \ubaa8\ubc29\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc774\ub098 \uc778\uacf5 \uc7a5\uae30\ub294 \ucd08\uae30 \uc608\uce21 \ub2e8\uacc4\uc5d0\uc11c \uc720\uc6a9\ud558\uc9c0\ub9cc, \uc2e4\uc81c \uc0dd\uba85\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc7ac\ud604\ud558\uae30\uc5d4 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uc778\uacf5 \uc7a5\uae30\uc758 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ud604\uc7ac \uc774 \uae30\uc220\ub4e4\uc740 \uc804\uccb4 \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ud604\uc7ac\uc758 \ub300\uccb4 \uae30\uc220\ub85c\ub294 \uc0b4\uc544\uc788\ub294 \uc0dd\ubb3c\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud558\uac8c \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc740 \uc911\uc694\ud55c \ubaa9\ud45c\uc774\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc0dd\ub9ac\uc801 \ubc0f \ubcd1\ub9ac\uc801 \ud604\uc0c1\uc744 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4. '\ud558\ubc84\ub4dc \uba54\ub514\uceec \uc2a4\ucfe8'\uc740 \ud604\uc7ac\uc758 \ub300\uccb4 \uae30\uc220","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc73c\ub85c \uc5b8\uae09\ub418\ub294 \uc778\uacf5 \uc7a5\uae30\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \ubd88\uacfc\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub458\uc9f8, \uc778\uacf5 \uc7a5\uae30\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc740 \ud2b9\uc815 \uc0c1\ud669\uc5d0 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uc778\uacf5 \uc870\uc9c1 \uc0ac\uc6a9\uc740 \uc720\ub9dd\ud558\uc9c0\ub9cc \uc544\uc9c1 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \uae30\uc220\uc758 \uc81c\ud55c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uccab\uc9f8, \uc778\uacf5 \uc7a5\uae30\ub098 \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uc740 \uc544\uc9c1 \uc2e4\ud5d8 \ub3d9\ubb3c\ub9cc\ud07c\uc758 \uc2e0\ub8b0\uc131\uacfc \uc815\ubc00\ub3c4\ub97c \uc81c\uacf5\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4" \ud588\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud68d\uae30\uc801\uc778 \uc758\ud559\uc801 \ubc1c\uacac\uc758 \uae30\ucd08\uac00 \ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\ub9ce\uc740 \ud604\uc7ac\uc758 \uce58\ub8cc\ubc95\uc774 \ub3d9\ubb3c \uc2e4\ud5d8 \ub355\ubd84\uc5d0 \ubc1c\uacac\ub418\uc5c8\uc2b5\ub2c8\ub2e4. \"\uc554 \uc5f0\uad6c\uc18c(Cancer Research UK)\"\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc554\uc744 \ud3ec\ud568\ud55c \uce58\uba85\uc801 \uc9c8\ud658","\u003cb\u003e\ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8 \ub355\ubd84\uc5d0 \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uc911\ub300\ud55c \uce58\ub8cc\ubc95\ub4e4\uc774 \uac1c\ubc1c\ub418\uc5c8\uc2b5\ub2c8\ub2e4. \"\uba54\uc774\uc694 \ud074\ub9ac\ub2c9(Mayo Clinic)\"\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc5c8\ub2e4\uba74 \ud604\uc7ac\uc758 ","\u003cb\u003e\ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucca8\ub2e8 \uacfc\ud559\uc758 \ubc1c\uc804\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4; \ud558\ubc84\ub4dc \uc758\uacfc\ub300\ud559(Harvard Medical School)\uc758 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubc14\uc774\uc624\uba54\ub514\uceec \ubd84\uc57c ","\u003cb\u003e\ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc778\ub958\ub294 \uc911\ub300\ud55c \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uce58\ub8cc\ubc95\uc744 \ubc1c\uacac\ud560 \uc218 \uc788\uc5c8\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95
