        <script charset="utf-8" src="https://cdn.plot.ly/plotly-3.5.0.min.js" integrity="sha256-fHbNLP+GlIXN+efbQec78UkemUz3NJp7UmfGxC1tNxs=" crossorigin="anonymous"></script>                <div id="405baad7-48ec-45a3-81b5-45d3905747e0" class="plotly-graph-div" style="height:750px; width:1200px;"></div>            <script>                window.PLOTLYENV=window.PLOTLYENV || {};                                if (document.getElementById("405baad7-48ec-45a3-81b5-45d3905747e0")) {                    Plotly.newPlot(                        "405baad7-48ec-45a3-81b5-45d3905747e0",                        [{"hoverinfo":"text","hovertext":["\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\ubb3c\ud559\uc801 \uae30\uc804\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc815\ud655\uc131\uc5d0 \ub300\ud55c \uc758\ubb38\uc774 \uc81c\uae30\ub420 \uc218 \uc788\uc9c0\ub9cc, \uc774\ub294 \ub3d9\ubb3c\uc758 \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc774 \uc778\uac04\uacfc \uc720\uc0ac\ud558\uae30\uc5d0 \uacfc\ud559\uc801 \uc720\ud6a8\uc131\uc744 \uac00\uc9d1\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\uc131\uc744 \ubaa8\uc0ac\ud558\ub294 \ub370 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc774 \uacb0\uad6d \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\ub294\ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc9c0\ub9cc, \ud0c1\uc6d4\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc774\ub77c\ub294 \ubaa9\ud45c\ub97c \uc704\ud574\uc11c\ub294 \uc2e4\uc9c8\uc801\uc774\uace0 \uc989\uac01\uc801\uc778 \uac80\uc99d\uc774 \ud544\uc694\ud569\ub2c8\ub2e4. '\ud558\ubc84\ub4dc \uc758\uacfc\ub300\ud559'(Harvard Medical School)\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc0dd\uccb4 \uc5f0\uad6c\uc758 \uc911\uc694\uc131\uc744 \uc778\uc815\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ud604\uc7ac \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \uad6c\uc870\ub97c \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \ubd80\uc871\ud558\uae30 \ub54c\ubb38\uc774\ub77c\uace0 \ubcf4\uace0\ud569\ub2c8\ub2e4","\uacfc\ud559\uacc4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8 \uc758\uc874\ub3c4\ub97c \uc904\uc774\uae30 \uc704\ud55c \uacc4\ud68d\uc744 \uc218\ub9bd\ud574\uc57c \ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95 \ubc1c\uc804\uc744 \uc704\ud55c \uc911\uc694\ud55c \ucc38\uace0 \uc790\ub8cc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \ubaa8\ub378\ub85c\uc11c\uc758 \uc81c\ud55c\uc801 \uc720\uc0ac\uc131\uc744 \ubcf4\uc644\ud558\ub294 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc0dd\uba85\uacfc\ud559 \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc9c4\ud589 \uacfc\uc815\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \ud604\uc7ac \uc778\uac04 \uc9c8\ud658\uc758 \ubcf5\uc7a1\uc131\uc744 \uc5f0\uad6c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04 \uc9c8\ubcd1\uc758 \uc774\ud574\ub97c \ub192\uc774\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ud658\uc790 \uc774\uc775 \uc99d\uc9c4\uc740 \uc724\ub9ac\uc801 \uc0b6\uacfc \uc0dd\uba85\uc758 \uc874\uc911\uc744 \ud3ec\ud568\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uad6d\uc81c\uc801 \ud611\ub825\uacfc \uae30\uc220 \uacf5\uc720\ub97c \ud1b5\ud574 \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uc774 \ub354\uc6b1 \ucd09\uc9c4\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c\uc758 \ud328\ub7ec\ub2e4\uc784 \ubcc0\ud654\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\ub3c4\ub97c \uc904\uc774\ub824\ub294 \ub178\ub825\uc744 \ud3ec\ud568\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4 \uc9c8\ud658\uacfc \uc720\uc0ac\ud55c \ubc18\uc751\uc744 \uac80\uc99d\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc5bb\uc740 \uc815\ubcf4\ub294 \uc885\uc885 \ub300\uccb4 \ubaa8\ub378 \uac1c\uc120\uacfc \ubc1c\uc804\uc5d0\ub3c4 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud658\uc790\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uc2e4\uc9c8\uc801\uc778 \uae30\uc5ec\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \ub300\uccb4 \ubc29\ubc95\uc774 \uc9c4\ubcf4\ud558\uc600\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \uacfc\ud559\uc801 \ud0c0\ub2f9\uc131\uc744 \ubcf4\uc99d\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uccb4 \ub0b4 \ud658\uacbd\uc5d0\uc11c\uc758 \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \ubaa8\ub378\uc740 \uc9c8\ubcd1\uc758 \uc9c4\ud589 \uacfc\uc815\uc744 \uc774\ud574\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \ub3cc\ud30c\uad6c\ub97c \uc81c\uacf5\ud588\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0 \uc788\uc5b4 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ucd5c\ucca8\ub2e8 \uc5f0\uad6c \uacb0\uacfc\ub294 \ub9ce\uc740 \ud658\uc790\ub4e4\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc0dd\ub9ac\uc758 \ubcf5\uc7a1\uc131\uc744 \ubaa8\ubc29\ud558\ub294 \ub370 \uc788\uc5b4 \ub3c5\ubcf4\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubbf8\ub798\uc758 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc704\ud574 \uc911\uc694\ud55c \uc790\ub8cc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1\uc744 \uc5f0\uad6c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ucc3d\uc758\uc801\uc774\uace0 \ud601\uc2e0\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \ubaa8\uc0c9\ub418\uace0 \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucca8\ub2e8 \uacfc\ud559\uc758 \ubc1c\uc804\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4; \ud558\ubc84\ub4dc \uc758\uacfc\ub300\ud559(Harvard Medical School)\uc758 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubc14\uc774\uc624\uba54\ub514\uceec \ubd84\uc57c \ud601\uc2e0\uc744 \ucd09\uc9c4\ud558\ub294 \uc911\uc694\ud55c \uc694\uc18c\ub85c \uc791\uc6a9\ud558\uace0 \uc788\uc74c\uc744 \ubcf4\uc5ec\uc90d\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub294 \uc2e4\ud5d8\uc2e4 \uc791\ub3d9 \uc2dc \uc778\uac04\uc5d0\uac8c \ubbf8\uce58\ub294 \uc9c1\uc811\uc801\uc778 \uacb0\uacfc\ub97c \uc608\uce21\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uacfc\ud559 \uc5f0\uad6c\uc758 \ubaa9\ud45c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uac00\ub2a5\ud558\uba74 \uc904\uc774\ub294 \uac83\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc815\ud655\uc131\uc744 \ub192\uc774\ub294 \uc911\uc694\ud55c \uc694\uc18c\ub85c \ubb34\uc2dc\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc774\ub77c\ub294 \uc810\uc774 \uc911\uc694\ud569\ub2c8\ub2e4",null],"marker":{"color":"#CFD8DC","opacity":0.5,"size":5},"mode":"markers+text","name":"other","showlegend":false,"x":{"dtype":"f4","bdata":"9oUiQQBZmUCGfwxB5sElQdx76EB9YENBX5EzQb2jKkF9egxBRdYMQeB+DEGRLDtBGMjcQE22DkEIl5ZAvTlDQXtlOkFIc5pAvmuXQDAQDEHSfStBXQcNQXlsOkFWwY1AXolCQbNzDEEN6+JAPwwmQSnkL0FTTehAuluaQMvdDEGADQ1B"},"y":{"dtype":"f4","bdata":"FRDAQDJcjT6gzmVAoBSzQKcCJUF\u002fMcdAeNHVQAjk0kDn2GZAtHVlQN\u002fzZkAMnLVAcIx6QJPsskD3IL69Fn3HQPUCt0AO6J4+lFU9vXYMaUCEP8pAWl5kQIZXtUClnCg+NUPGQABlaEAe8I9AiLW2QK7S1EAh+SVBa1+BPhYkZUCaoo9A"},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68 \uc544\ub798 \uc218\ud589\ub429\ub2c8\ub2e4","\ube44\uc724\ub9ac\uc801\uc774\ub77c\ub294 \uc6b0\ub824\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900 \uc544\ub798 \uc9c4\ud589\ub429\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \ub3d9\ubb3c \ucde8\uae09 \uae30\uc900\uc774 \uc5c4\uaca9\ud788 \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucca0\uc800\ud788 \uad00\ub9ac\ud558\uace0 \uc724\ub9ac \uae30\uc900\uc744 \uc5c4\uaca9\ud788 \uc900\uc218\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc778 \uc9c0\uce68 \ud558\uc5d0 \uc218\ud589\ub418\uba70, \uc5f0\uad6c\uc790\ub4e4\uc740 \uac00\ub2a5\ud55c \ub300\uccb4 \ubc29\ubc95\uc744 \uba3c\uc800 \uace0\ub824\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc815\ubc00\ud558\uac8c \uc870\uc808\ub41c \ud658\uacbd\uc5d0\uc11c \uc774\ub8e8\uc5b4\uc9c0\uba70, \ub3d9\ubb3c\ub4e4\ub3c4 \ucd5c\ub300\ud55c\uc758 \uc724\ub9ac\uc801 \uace0\ub824\ud558\uc5d0 \uc0ac\uc6a9\ub429\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \uae30\uc900\uacfc \ubcf5\uc9c0 \uaddc\uc815\uc744 \uc5c4\uaca9\ud788 \uc900\uc218\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\uace0 \uac1c\uc120\ud574 \ub098\uac00\ub294 \ub178\ub825\ub3c4 \uacc4\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubc95\uc801\uc73c\ub85c \ubc0f \uc724\ub9ac\uc801\uc73c\ub85c \uc5c4\uaca9\ud558\uac8c \uaddc\uc81c\ub418\uace0 \uc788\uc73c\uba70, \uc5f0\uad6c \uc808\ucc28\uc5d0\uc11c \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uacc4\uc18d\ud574\uc11c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\ub294 \ubc29\uc548\uc774 \uc774\ubbf8 \uc2dc\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc724\ub9ac\uc801\uc778 \uae30\uc900 \ud558\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9e4\uc6b0 \uc5c4\uaca9\ud558\uac8c \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c \uc724\ub9ac \uae30\uc900\uc5d0 \uadfc\uac70\ud558\uc5ec \uc5c4\uaca9\ud558\uac8c \uad00\ub9ac\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc73c\ub85c \ud1b5\uc81c\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4. \"\ubbf8\uad6d \ub3d9\ubb3c \uc5f0\uad6c\ubcf4\ud638\ud611\ud68c(AALAS)\"\ub294 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud558\uace0 \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \uc5c4\uaca9\ud55c \uc9c0\uce68\uacfc \uaddc\uc81c\uac00 \uc874\uc7ac\ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uc704\ud55c \ub178\ub825\uc740 \uc9c0\uc18d\ub418\uace0 \uc788\uc73c\uba70, \uc2e4\ud5d8 \uc808\ucc28\uc758 \uac1c\uc120\uc744 \ud1b5\ud574 \uadf8\ub4e4\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uacfc\ud559 \ubc1c\uc804\uc744 \ud1b5\ud574 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\ub294 \ubc29\ubc95\uc774 \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uc5c4\uaca9\ud788 \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc644\ud654\ud558\uae30 \uc704\ud574 \ucca0\uc800\ud55c \uaddc\uc81c\uc640 \uc2ec\uc0ac\ub97c \ud1b5\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc740 \uc5c4\uaca9\ud558\uac8c \uaddc\uc81c\ub429\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uc5ec \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uc724\ub9ac\uc801 \uc2e4\ud5d8 \uae30\uc900\uc740 \ub04a\uc784\uc5c6\uc774 \uac15\ud654\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc2e4\ud5d8\uacfc\uc815\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ub370 \uc788\uc5b4 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \uaddc\uc815\uc774 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4; \ubbf8\uad6d \ub3d9\ubb3c\ubcf5\uc9c0\ubc95\uc744 \uac10\ub3c5\ud558\ub294 \uae30\uad00\uc778 \ubbf8\uad6d \ub18d\ubb34\ubd80(US Department of Agriculture)\uc5d0\uc11c\ub294 \uc5f0\uad6c \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\uc7a5\ud558\ub3c4\ub85d \uaddc\uc81c\ub97c \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc624\uc9c1 \ud544\uc694\ud55c \uacbd\uc6b0\uc5d0\ub9cc, \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \ub0b4\uc5d0\uc11c \uc218\ud589\ub418\uc5b4\uc57c \ud558\ub294 \uac83\uc740 \ub9de\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc2dc\ud589\uc744 \uac15\ud654\ud558\uba74\uc11c \uc778\ub958 \uac74\uac15\uc5d0 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uaddc\uc81c\ub97c \ud1b5\ud574 \uc218\ud589\ub418\uba70, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc778\uad8c\uacfc \ub3d9\ubb3c \ubcf5\uc9c0 \uc0ac\uc774\uc5d0\uc11c \uc870\ud654\ub85c\uc6b4 \uade0\ud615\uc744 \ucc3e\uae30 \uc704\ud574\uc11c\ub294 \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uce21\uba74\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \uac80\ud1a0\ud558\ub294 \ub3d9\uc2dc\uc5d0 \uacfc\ud559\uc801 \ud604\uc2e4\uc744 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc744 \ucca0\uc800\ud788 \uc900\uc218\ud568\uc73c\ub85c\uc368 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud22c\uba85\uc131\uacfc \ucc45\uc784\uc131\uc744 \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub9ce\uc740 \uc5f0\uad6c \uae30\uad00\ub4e4\uc740 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uace0\ub824\ud558\uba74\uc11c \uc2e4\ud5d8\uc744 \uc9c4\ud589\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900 \uac15\ud654\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud6a8\uacfc\uc131\uacfc \ucc45\uc784\uc131\uc744 \ub3d9\uc2dc\uc5d0 \ub192\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uace0\ub824\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, \uacfc\ud559\uacc4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud55c \uacbd\uc6b0 \ucd5c\uc120\uc744 \ub2e4\ud574 \uc5c4\uaca9\ud788 \uaddc\uc81c\ub41c \ud658\uacbd\uc5d0\uc11c \uc9c4\ud589\ub429\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\ub294 \uac83\uc740 \uc5f0\uad6c\uc790\ub4e4\uc758 \uc911\uc694\ud55c \ucc45\uc784\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc2e4\ud5d8\uc5d0 \uc0ac\uc6a9\ub418\ub294 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uc6b0\uc120\uc2dc\ud558\ub294 \ubc29\ubc95\ub4e4\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559\uc790\ub4e4\uc740 \ub3d9\ubb3c\uc758 \uc0ac\uc6a9\uc744 \uc904\uc774\uace0 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub300\uccb4 \ubc29\ubc95\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \uc5f0\uad6c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uacfc\ud559\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uadf8 \ub300\uc548\uc744 \ucc3e\ub294 \ubc29\ud5a5\uc73c\ub85c \uc9c4\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc774 \uc774\ub904\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc5f0\uad6c \uacfc\uc815\uc5d0\uc11c \uac00\ub2a5\ud55c \ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uae30 \uc704\ud55c \ud504\ub85c\ud1a0\ucf5c\uc758 \uac15\ud654\ub294 \uace0\ubb34\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ub9ce\uc740 \uc5f0\uad6c\uae30\uad00\ub4e4\uc774 \uc5c4\uaca9\ud55c \uc9c0\uce68\uc744 \ub530\ub985\ub2c8\ub2e4","\uc5f0\uad6c\uc758 \ubc29\ud5a5\uc744 \uc0dd\uba85 \uc911\uc2ec\uc73c\ub85c \uc804\ud658\ud558\ub824\ub294 \ub178\ub825\uc740 \uc774\ubbf8 \uc9c4\ud589 \uc911\uc774\uba70, \uc2e4\ud5d8 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uace0\ub824\ud55c \uc724\ub9ac\uc801 \uc811\uadfc\uc774 \ubcd1\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uac8c\ub2e4\uac00, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc815\uacfc \uc9c0\uce68\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \ubcf5\uc9c0 \uae30\uc900\uacfc \uc2e4\ud5d8\uc758 \uc815\ub2f9\uc131\uc5d0 \ub300\ud55c \uc5c4\uaca9\ud55c \uaddc\uc815\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \ub300\uc548 \ubaa8\uc0c9\uc740 \uc9c0\uc18d\uc801\uc778 \uc5f0\uad6c\uc758 \ub300\uc0c1\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubaa8\ub4e0 \uc2e4\ud5d8\uc774 \uc5c4\uaca9\ud788 \uac10\ub3c5\ub418\uace0 \uc788\ub2e4\ub294 \uc0ac\uc2e4\uc740 \ub3d9\ubb3c\uc758 \uad8c\ub9ac\ub97c \ubcf4\uc7a5\ud558\ub294 \ub370 \ub9e4\uc6b0 \uc911\uc694\ud569\ub2c8\ub2e4","\uc5f0\uad6c \uacfc\uc815\uc5d0\uc11c \uc724\ub9ac\uc801\uc778 \uae30\uc900\uacfc \uaddc\uc81c\uac00 \uac15\ud654\ub418\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ube44\uc724\ub9ac\uc801 \uce21\uba74\uc744 \uc644\ud654\ud558\ub294 \ub370 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c\uc758 \ub3d9\ubb3c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc5c4\uc218\ud558\ub294 \uc2dc\ud589 \uc9c0\uce68\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ucd5c\ub300\ud55c\uc758 \uc778\uac04\uc801\uc774\uace0 \uc724\ub9ac\uc801\uc778 \ubc29\ubc95\uc774 \uacc4\uc18d \uac1c\ubc1c\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uaddc\uc81c\ub97c \ud1b5\ud574 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud559\ubb38\uc801 \uc724\ub9ac \uae30\uc900\uc5d0 \uc758\ud574 \uaddc\uc81c\ub418\uace0 \uc788\uc73c\uba70 \uc5f0\uad6c\uc758 \ud544\uc218\uc131\uc774 \uc778\uc815\ub41c \uacbd\uc6b0\uc5d0\ub9cc \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c\uc758 \uc911\uc694\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud55c \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \ub3d9\ubb3c \uc2e4\ud5d8 \uae30\uc900\uc744 \uc900\uc218\ud558\uba74\uc11c \uc5f0\uad6c\ub97c \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ud574 \ub098\uac00\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801\uc778 \uc811\uadfc\uc744 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubcf5\uc9c0\ub97c \uac1c\uc120\ud558\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0 \uc218\ud589\ub418\uba70, \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \ubc29\ubc95\uc774 \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc6b0\ub824\ub97c \uc644\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uae30\uc900\uc774 \uc774\ubbf8 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba70 \uc9c4\ud589\ub418\uc5b4\uc57c \ud558\uba70, \ub9ce\uc740 \uacbd\uc6b0 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc720\uc77c\ud55c \uc2e4\ud5d8 \ubc29\ubc95\uc73c\ub85c \ub0a8\uc544\uc788\uc2b5\ub2c8\ub2e4","\uc2e4\ud5d8 \uc7ac\ub8cc\ub85c\uc11c \ub3d9\ubb3c\uc740 \uc778\uac04\uc758 \uc0dd\ub9ac\uc640 \uac00\uc7a5 \uc720\uc0ac\ud55c \uacb0\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc774\ub7ec\ud55c \uc5f0\uad6c\ub4e4\uc740 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\uba74\uc11c \uc2dc\ud589\ub420 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uace0\ubbfc\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud558\ub294 \uacfc\uc815\uc5d0\uc11c \ud544\uc218\uc801\uc778 \ubd80\ubd84\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ube44\ub85d \uc724\ub9ac\uc801 \ub51c\ub808\ub9c8\ub97c \ub3d9\ubc18\ud558\uc9c0\ub9cc, \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc624\ub958\ub97c \ucd5c\uc18c\ud654\ud558\ub294 \uae30\ub2a5\uc744 \ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uc6b0\ub824\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc5c4\uaca9\ud788 \uad00\ub9ac\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba74\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc9c4\ud589\ud558\ub294 \uac83\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba70 \uc9c4\ud589\ub429\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uac80\ud1a0\uc640 \uc5c4\uaca9\ud55c \uaddc\uc81c\uac00 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc644\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\ub3c4 \uace0\ud1b5\uc744 \ub290\ub084 \uc218 \uc788\ub294 \uc0dd\uba85\uccb4\ub77c\ub294 \uc6b0\ub824\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0 \uc218\ud589\ub418\uc5b4 \ub3d9\ubb3c\uc758 \ubd88\ud544\uc694\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\uace0 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ucc98\ub9ac\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uba74\uc11c \uc5f0\uad6c\ub97c \uc9c4\ud589\ud560 \uc218 \uc788\ub3c4\ub85d \ub3c4\uc6c0\uc744 \uc90d\ub2c8\ub2e4","\ub458\uc9f8, \uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\uba74\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574\uc11c\ub3c4 \ub354 \uc724\ub9ac\uc801\uc778 \ubc29\ubc95\uc744 \uacc4\uc18d \uac1c\ubc1c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc778 \uaddc\uc81c \ud558\uc5d0 \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559 \uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \ucc45\uc784\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uac15\ud654\ub41c \uaddc\uc81c\uc640 \uac10\uc2dc\ub97c \ud1b5\ud574 \uc9c0\ucf1c\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uace0\ub824\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc788\uc5b4 \uc911\uc694\ud55c \ubd80\ubd84\uc785\ub2c8\ub2e4","\uc724\ub9ac\uc801 \ubb38\uc81c\uc5d0 \ub300\ud55c \ub300\uc911\uc758 \uc778\uc2dd\uc740 \uacfc\ud559 \uc5f0\uad6c\uc5d0 \uae0d\uc815\uc801\uc778 \ubcc0\ud654\ub97c \uac00\uc838\uc654\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\uba74\uc11c\ub3c4 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \ub2ec\uc131\ud558\ub294 \uac83\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\ub610\ud55c, \uacfc\ud559\uc790\ub4e4\uc740 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \uc5f0\uad6c \ud658\uacbd\uc744 \uac1c\uc120\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900 \uc544\ub798 \uc218\ud589\ub429\ub2c8\ub2e4","\uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc774\ub8e8\uc5b4\uc9c0\ub294 \ub9cc\ud07c, \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uc874\uc911\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \ub354 \ub098\uc740 \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc744 \ub3d9\uc2dc\uc5d0 \uc9c4\ud589\ud558\ub294 \uac83\ub3c4 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc774 \uc774\ubbf8 \uc874\uc7ac\ud558\uba70 \uc5c4\uaca9\ud788 \ud1b5\uc81c\ub429\ub2c8\ub2e4","\ubaa8\ub4e0 \uc0dd\uba85\uccb4\uac00 \uace0\uc720\ud55c \uac00\uce58\ub97c \uac00\uc9c4\ub2e4\ub294 \uc810\uc744 \uc874\uc911\ud558\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uacfc \uaddc\uc81c\ub97c \ub530\ub985\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc801\uc6a9\ub429\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \ub9ce\uc740 \uae30\uad00\ub4e4\uc774 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uc704\ud574 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc744 \ub530\ub974\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uace0\ubbfc\uc744 \ud1a0\ub300\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uac1c\uc120\uacfc \uaddc\uc81c \uac15\ud654\uac00 \ubcd1\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc778\uac04\uc758 \ub3c4\ub355\uc801 \uae30\uc900\uc744 \uc720\uc9c0\ud558\uba74\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubc94\uc704\ub97c \ucd5c\uc18c\ud55c\uc73c\ub85c \uc904\uc774\ub824\ub294 \ub178\ub825\uc774 \ubcd1\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc774 \uc874\uc7ac\ud558\uba70, \uc774\ub7ec\ud55c \uae30\uc900\uc744 \uc900\uc218\ud558\ub294 \uac83\uc774 \uc724\ub9ac\uc801 \uacbd\uacc4\ub97c \uc124\uc815\ud558\ub294 \ub370 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uace0 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub3d9\ubb3c\ub4e4\uc5d0\uac8c \uace0\ud1b5\uc744 \uc8fc\uc9c0 \uc54a\ub3c4\ub85d \uc124\uacc4\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc73c\ub85c \uad00\ub9ac\ub418\uba70 \uc5f0\uad6c\uc758 \uacf5\uc815\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\uc5ec \uc2e4\ud5d8\uc5d0\uc11c \uace0\ud1b5\uc744 \uc904\uc774\ub294 \ubc29\ubc95\ub4e4\uc774 \uc801\uadf9\uc801\uc73c\ub85c \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\uc5d0 \ub300\ud55c \uc6b0\ub824\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub178\ub825\uc774 \uc774\ubbf8 \uc874\uc7ac\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc788\uc5b4 \uc724\ub9ac\uc801 \uae30\uc900\uc740 \ucca0\uc800\ud558\uac8c \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc744 \uac15\ud654\ud574\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900 \ud558\uc5d0 \uc9c4\ud589\ub429\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uace0\ub824\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\ud55c \ubd80\ubd84\uc73c\ub85c, \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uc9c0\uce68\uc744 \ud1b5\ud574 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uadf8\ub7ec\ub098 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uaddc\uc81c\ub97c \uc900\uc218\ud558\uba74\uc11c \uc218\ud589\ub429\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uc2e4\uc2dc\ub418\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc774\ubbf8 \uc5c4\uaca9\ud55c \uaddc\uc81c\ub97c \ubc1b\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\ub294 \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc5d0 \uc758\ud574 \uc5c4\uaca9\ud788 \uaddc\uc81c\ub418\uc5b4 \uc788\uc73c\uba70, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uad00\ub828 \uc5f0\uad6c\ub294 \uac00\ub2a5\ud558\uba74 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \uc9c4\ud589\ub418\uba70, \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc5c4\uaca9\ud788 \uc801\uc6a9\ud569\ub2c8\ub2e4","\ubd88\ud544\uc694\ud55c \ub3d9\ubb3c \ud76c\uc0dd\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uc808\ucc28\uac00 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uc778\ub958\uc758 \ubcf5\uc9c0\ub97c \uc704\ud574 \ud544\uc218\uc801\uc778 \uc724\ub9ac\uc801 \uade0\ud615\uc744 \uc720\uc9c0\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \uadf9\ubcf5 \uac00\ub2a5\ud55c \ub3c4\uc804 \uacfc\uc81c\uc77c \ubfd0\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud55c \uc2e4\ud5d8 \ud504\ub85c\ud1a0\ucf5c\uc774 \uc810\uc810 \ub354 \uc5c4\uaca9\ud574\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc5f0\uad6c\ub294 \ubb34\ubd84\ubcc4\ud55c \ub3d9\ubb3c \uc0ac\uc6a9\uc774 \uc544\ub2cc \uc724\ub9ac\uc801 \uace0\ub824\ub97c \uc911\uc2dc\ud569\ub2c8\ub2e4","\uc5f0\uad6c \ubd84\uc57c\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc0ac\uc6a9\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc5d0 \ub530\ub77c \uc5c4\uaca9\ud788 \uad00\ub9ac\ub429\ub2c8\ub2e4","\uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c \uc0ac\uc6a9\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ub300\uccb4 \ubc29\ubc95\uc744 \uc801\uadf9\uc801\uc73c\ub85c \ud0d0\uad6c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc744 \uc5c4\uc218\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c \ud558\uc5d0 \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\uacfc\ud559\uc790\ub4e4\uc740 \ud56d\uc0c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900 \uac15\ud654\uc640 \ud568\uaed8 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc774 \ubcd1\ud589\ub429\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub3d9\ubb3c\ub4e4\uc774 \uacaa\ub294 \uace0\ud1b5\uc744 \uac00\ub2a5\ud55c \ud55c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\uacfc \uc808\ucc28\ub97c \ub530\ub985\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \uae30\uad00\uc758 \uc5c4\uaca9\ud55c \uac10\ub3c5 \uc544\ub798 \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\uc14b\uc9f8, \uc0dd\uba85 \uc5f0\uad6c \ubd84\uc57c\uc5d0\uc11c\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc740 \uc5f0\uad6c\uc790\ub4e4\uc5d0\uac8c \ucc45\uc784\uacfc \ud22c\uba85\uc131\uc744 \uc774\ud589\ud558\ub3c4\ub85d \uac15\uc81c\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc774\ubbf8 \uac00\ub2a5\ud55c \ud55c \uc724\ub9ac\uc801\uc73c\ub85c \uc218\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\uc5d0 \ub530\ub77c \uc9c4\ud589\ub418\uba70, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub178\ub825\uc774 \ubcd1\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uc9c0\uce68\uacfc \uaddc\uc81c\ub97c \ud1b5\ud574 \ucca0\uc800\ud788 \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900 \ud558\uc5d0 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc644\ub8cc\ub41c \ud6c4 \uc724\ub9ac\uc801\uc778 \uc2e4\ud5d8 \ub300\uccb4 \uae30\uc220\uc744 \uc704\ud55c \uc5f0\uad6c\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \ud65c\ubc1c\ud788 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc218\ud589\ub418\ub294 \ubaa8\ub4e0 \uc5f0\uad6c\ub294 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uad00\ub9ac\ub429\ub2c8\ub2e4","\uccab\uc9f8, \uacfc\ud559\uacc4\ub294 \ube44\ub3d9\ubb3c \uc2e4\ud5d8 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub3d9\uc2dc\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c\ub41c \ud658\uacbd\uc5d0\uc11c \ub192\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ud1b5\ud574 \uc218\ud589\ub429\ub2c8\ub2e4","\uc2e4\ud5d8 \ub300\uccb4 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc5f0\uad6c\ub3c4 \uafb8\uc900\ud788 \uc9c4\ud589\ub418\uace0 \uc788\uc73c\uba70, \uc7a5\uae30\uc801\uc73c\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \uac83\uc774 \ubaa9\ud45c\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucca0\uc800\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798 \uc2dc\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ucda9\uc871\ud560 \uc218 \uc788\ub294 \ubc29\uc548\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c\uc790\ub4e4\uc740 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \ub2e4\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uad00\ub9ac \uc870\uce58\uac00 \uac15\ud654\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c \uc131\uacfc\uc640 \ub3d9\ubb3c \ubcf5\uc9c0\ub294 \uc591\ub9bd \uac00\ub2a5\ud55c \ubaa9\ud45c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc5d0 \ub530\ub77c \uc874\uc7ac\ud558\uba70 \ub9c8\uc9c0\ub9c9 \uc218\ub2e8\uc73c\ub85c \uc0ac\uc6a9\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uace0\ud1b5 \uacbd\uac10\uc744 \uc704\ud55c \uae30\uc220\uc801 \uc9c4\ubcf4\ub294 \ub04a\uc784\uc5c6\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \uc724\ub9ac\uc131\uc744 \ubcf4\uc7a5\ud558\uae30 \uc704\ud574 \uc5c4\uaca9\ud55c \uac00\uc774\ub4dc\ub77c\uc778\uacfc \uaddc\uc815\uc744 \uc900\uc218\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc740 \uc5c4\uaca9\ud788 \uc801\uc6a9\ub429\ub2c8\ub2e4","\uc14b\uc9f8, \uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \uce21\uba74\uc740 \uc911\ub300\ud55c \uace0\ub824 \uc0ac\ud56d\uc774\uba70, \uc774\ub294 \uc5f0\uad6c\uc790\ub4e4\ub85c \ud558\uc5ec\uae08 \ucc45\uc784 \uc788\ub294 \uc2e4\ud5d8 \uc2e4\ud589\uc744 \uacac\uc9c0\ud558\ub3c4\ub85d \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ub192\uc774\uae30 \uc704\ud55c \ub178\ub825 \uc774\ubbf8 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\uc5d0 \ub300\ud574 \uc81c\uae30\ub41c \uc6b0\ub824\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc778 \uac1c\uc120 \ub178\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uaddc\uc81c\ub97c \uc810\uc9c4\uc801\uc73c\ub85c \uac1c\uc120\ud558\uace0 \uac15\ud654\ud568\uc73c\ub85c\uc368 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ubd80\ubd84\uc801\uc73c\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc740 \ub04a\uc784\uc5c6\uc774 \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc740 \ub3d9\ubb3c \ubcf5\uc9c0 \ud5a5\uc0c1\uc744 \uc704\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc774 \uace0\ud1b5\uacfc \uc2a4\ud2b8\ub808\uc2a4\ub97c \ub290\ub084 \uc218 \uc788\ub2e4\ub294 \uc810\uc744 \uc5f0\uad6c\uc790\ub4e4\ub3c4 \uc778\uc9c0\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uc808\ucc28\uac00 \uc5c4\uaca9\ud788 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798 \uc2dc\ud589\ub418\uba70, \uc774\ub294 \uacfc\ud559\uc801 \uc5f0\uad6c\uc5d0\uc11c\uc758 \uade0\ud615 \uc7a1\ud78c \uc811\uadfc\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc704\ud55c \ub192\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uaddc\ubc94\uc774 \uc774\ubbf8 \ub9c8\ub828\ub418\uc5b4 \uc788\uc73c\uba70, \uc5f0\uad6c\uc758 \ud544\uc218\uc801\uc778 \ubd80\ubd84\uc73c\ub85c \uc790\ub9ac \uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uaddc\uc81c\ub97c \ub530\ub985\ub2c8\ub2e4","\uc2e4\uc9c8\uc801\uc778 \ub300\uc548\uc758 \ube60\ub978 \ucd9c\ud604\uc744 \uc704\ud574 \ub178\ub825\ud55c\ub2e4\uace0 \ud558\ub354\ub77c\ub3c4, \uadf8 \uacfc\uc815\uc5d0\uc11c \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \ud53c\ud574\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \uc77c\uc815\ud55c \uc218\uc900\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc788\ub294 \ud604\uc7ac\uc758 \ubc29\ubc95\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uc5ec \uc218\ud589\ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\uc7ac\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15\uc744 \uc704\ud574 \ubd88\uac00\ud53c\ud55c \uc120\ud0dd\uc73c\ub85c, \uc774\ub294 \uacc4\uc18d\uc801\uc778 \uc724\ub9ac\uc801 \uac10\uc2dc \ud558\uc5d0 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, 3R \uc6d0\uce59\uc740 \ub2e8\uc21c\ud788 \ub3d9\ubb3c \uc0ac\uc6a9\uc744 \uc904\uc774\ub294 \ub370\uc11c \uadf8\uce58\uc9c0 \uc54a\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc2e4\ud589\uc744 \uadfc\ubcf8\uc801\uc73c\ub85c \uac1c\uc120\ud558\ub824\ub294 \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc758 \uc77c\ubd80\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub54c\ub54c\ub85c \ub3d9\ubb3c\uc774 \uacaa\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\ub294 \uad00\ub9ac \uc2dc\uc2a4\ud15c\uc744 \ud1b5\ud574 \uc724\ub9ac\uc801 \uace0\ub824\uac00 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\uc5d0 \ub300\ud55c \ud5a5\uc0c1\ub41c \uc9c0\uce68\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uaddc\uc815\ub41c \uc724\ub9ac \uae30\uc900\uc744 \ucda9\uc871\ud558\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc774\ub8e8\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub05d\uc73c\ub85c, \uc724\ub9ac\uc801 \uae30\uc900\uacfc \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc5d0 \ub530\ub77c \uc2e0\uc911\ud558\uac8c \uc218\ud589\ub429\ub2c8\ub2e4","\uc5f0\uad6c\uc758 \uc724\ub9ac\uc131\ub3c4 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778 \ud558\uc5d0 \uc2dc\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \uc6b0\ub824\ub97c \ucd5c\uc18c\ud654\ud558\uba74\uc11c\ub3c4 \ud6a8\uacfc\uc801\uc778 \uc5f0\uad6c\ub97c \uc9c0\uc18d\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uc5f0\uad6c \uc724\ub9ac\uac00 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \uad00\ub9ac\ub97c \ud1b5\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\ub300\ud55c \ub3d9\ubb3c\uc744 \ubcf4\ud638\ud558\uba70 \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uad00\ub9ac\uac00 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud55c \uacbd\uc6b0\uc5d0\ub3c4 \ucd5c\ub300\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud574\uc57c \ud55c\ub2e4\ub294 \ub178\ub825\uc740 \uba85\ud655\ud569\ub2c8\ub2e4","\ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8 \uaddc\uc815\uc740 \ucd5c\ub300\ud55c \uc5c4\uaca9\ud558\uac8c \uad00\ub9ac\ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c\uc5d0 \ub300\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \uacfc\ud559 \ucee4\ubba4\ub2c8\ud2f0\uc758 \ub178\ub825\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc5d0\uac8c \ucd5c\uc18c\ud55c\uc758 \uace0\ud1b5\uc744 \ubd80\uc5ec\ud558\ub294 \ubc29\ubc95\ub4e4\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \uc801\uc808\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68 \uc544\ub798 \uc2e4\ud589\ub418\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc5f0\uad6c \uc724\ub9ac\ub97c \uc900\uc218\ud569\ub2c8\ub2e4","\uc7a5\uae30\uc801\uc73c\ub85c \uc724\ub9ac\uc801 \ub300\uccb4 \ubc29\ubc95\uc744 \ucc3e\ub294 \uc5f0\uad6c\ub294 \uc544\ub08c\uc5c6\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc0dd\uba85\uc724\ub9ac \uaddc\ubc94\uc744 \uc900\uc218\ud558\ub294 \uac00\uc6b4\ub370 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uac00\ub2a5\ud558\uace0 \ud544\uc694\ud55c \uac83\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85 \uc724\ub9ac\uc5d0 \ub530\ub77c \uc5c4\uaca9\ud558\uac8c \ud1b5\uc81c\ub418\uc5b4 \uc218\ud589\ub429\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc704\ud55c \ub178\ub825\uc774 \uc9c4\ud589 \uc911\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uace0\ucc30\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uacfc\ud559 \uc5f0\uad6c\uc5d0\uc11c \uc2e4\ud5d8 \ub300\uc0c1\uc758 \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\ub294 \uae30\uc900\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \uc5f0\uad6c \uc218\ud589\uc744 \uc704\ud55c \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uacfc\ud559\uc801 \ubc1c\uc804\uacfc \uc724\ub9ac\uc801 \uace0\ub824 \uc0ac\uc774\uc758 \uade0\ud615\uc744 \ub9de\ucd94\ub824\ub294 \uc2dc\ub3c4\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c \uac15\ud654\ub294 \ube44\uc724\ub9ac\uc801 \ud589\ud0dc\ub97c \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \uac83\uc740 \ub9e4\uc6b0 \uc911\uc694\ud558\uba70, \uc724\ub9ac\uc801\uc778 \uace0\ub824\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc2ec\uc5d0 \uc788\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c0\uc18d\uc801\uc778 \uc724\ub9ac\uc801 \uae30\uc900 \uc900\uc218\ub97c \ud1b5\ud574 \uc218\ud589\ub429\ub2c8\ub2e4","\uc2e4\ud5d8 \uacb0\uacfc\uc758 \uc2e0\ub8b0\uc131\uc744 \ud655\ubcf4\ud558\uae30 \uc704\ud574\uc11c\ub294 \ud604\uc7ac\uc758 \uae30\uc220\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud568\uaed8 \uc0ac\uc6a9\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\uc744 \ub530\ub974\uba70 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub3c4\ub85d \uc124\uacc4\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uba74\ubc00\ud788 \uaddc\uc81c\ub418\uc5b4 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \ud655\ub9bd\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc744 \ub300\uc0c1\uc73c\ub85c \ud55c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba74\uc11c \ud544\uc218\uc801\uc778 \uc5f0\uad6c \uc778\uc0ac\uc774\ud2b8\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uc744 \uac1c\uc120\ud558\uae30 \uc704\ud55c \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud488\uc9c8\uacfc \uaddc\ubc94\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ud5a5\uc0c1\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc5f0\uad6c \ubd84\uc57c\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ube44\uc724\ub9ac\uc801 \uce21\uba74\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \ub178\ub825\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc778 \uc9c0\uce68\uacfc \uac10\ub3c5 \uc544\ub798 \uc2dc\ud589\ub418\uc5b4\uc57c \ud558\uba70, \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uace0\ub824\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \uace0\ub824\uac00 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uac1c\uc120\uc744 \uc774\ub04c\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc2dc \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc740 \ud604\uc7ac\ub3c4 \uc5c4\uaca9\ud558\uac8c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c\uc5d0\uc11c \uc0ac\uc6a9\ub418\ub294 \ub3d9\ubb3c\ub4e4\uc740 \ucca0\uc800\ud55c \uc724\ub9ac\uc801 \uac80\ud1a0\uc640 \uae30\uc900\uc744 \uae30\ubc18\uc73c\ub85c \ubcf4\ud638\ubc1b\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc5d0 \ub530\ub77c \uc218\ud589\ub429\ub2c8\ub2e4","\ud604\ub300\uc758 \uc724\ub9ac \uae30\uc900\uc740 \ub3d9\ubb3c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc0ac\uc6a9\uc740 \uacfc\ud559\uc801 \ubc1c\uc804\uacfc \uade0\ud615\uc744 \uc774\ub8f9\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc774\uace0 \ucc45\uc784\uac10 \uc788\ub294 \uc2e4\ud5d8\uc774 \uacfc\ud559\uc801 \uc9c4\ubcf4\uc640 \ud568\uaed8 \ubcd1\ud589\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc2e4\ud5d8 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uac1c\uc120\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4. '\uc601\uad6d \uc5f0\uad6c \ucc38\uc870\uadf8\ub8f9'(UK Research Reference Group)\uc740 \ub3d9\ubb3c \ubcf5\uc9c0 \uae30\uc900\uc744 \uc5c4\uaca9\ud788 \uc900\uc218\ud558\uba74\uc11c\ub3c4 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \ucd09\uc9c4\ud558\uae30 \uc704\ud55c \ubc29\uc548\uc744 \ub9c8\ub828\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc724\ub9ac\uc801\uc778 \uc2dc\ud5d8 \ud658\uacbd\uc744 \uad6c\ucd95\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\uacfc \uaddc\uc81c\ub97c \ub530\ub985\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub530\ub978 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc644\ud654\ud558\uae30 \uc704\ud574 \uc815\ubc00\ud55c \uaddc\uc81c\uc640 \ub300\uccb4 \ubc29\ubc95\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc5f0\uad6c\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uad00\ub9ac\uac00 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4. \"\uc720\ub7fd \ub3d9\ubb3c \uc5f0\uad6c\ud611\ud68c(EARA)\"\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud560 \ub54c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\uc7a5\ud558\uae30 \uc704\ud55c \uad6d\uc81c\uc801\uc778 \ud45c\uc900\uc774 \uc874\uc7ac\ud558\uba70, \uc774\ub294 \uc724\ub9ac\uc801 \ud3c9\uac00\ub97c \ud1b5\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\ub2e4\uace0 \ubc1c\ud45c\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc744 \ud1b5\ud574 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub3c4\ub85d \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\ud558\uc5d0 \uc9c4\ud589\ub418\uba70, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\uace0 \ub178\ub825\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uacfc \uc0dd\uba85\uccb4\uc5d0 \ub300\ud55c \ucc45\uc784\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uac8c \ub418\ub294 \uc7a0\uc7ac\uc801 \uc758\ud559\uc801 \ud61c\ud0dd\uacfc \uade0\ud615\uc744 \uc774\ub8e8\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\ub294 \uac83\uc774 \uacfc\ud559\uc790\ub4e4\uc758 \uc758\ubb34\uc785\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubb34\ubd84\ubcc4\ud558\uac8c \uc9c4\ud589\ub418\uc9c0 \uc54a\uc73c\uba70, \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778 \uc544\ub798 \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uace0\ub824\uc640 \uacfc\ud559\uc801 \ubc1c\uc804\uc740 \ud568\uaed8 \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559\uacc4\ub294 \ub3d9\ubb3c \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub41c \ubc29\ubc95\uc744 \ucc44\ud0dd\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uc9c0\uc18d\uc801\uc73c\ub85c \ud3c9\uac00\ub418\uace0 \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uacfc \uc724\ub9ac\uc801 \uae30\uc900\uc758 \uade0\ud615\uc744 \ucc3e\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ud604\ub300 \uacfc\ud559\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc2ec\uac01\ud558\uac8c \uace0\ub824\ud558\uc5ec \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \ubc29\ubc95\uc744 \ub3c4\uc785\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559\uacfc \uc724\ub9ac\uc758 \uc870\ud654\ub294 \ubbf8\ub798 \uc5f0\uad6c\uc758 \ud544\uc218 \uc694\uc18c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uad8c\ub9ac\uc640 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uc874\uc911\ud558\ub294 \ubc29\ubc95\uc73c\ub85c \uc2e4\ud5d8\uc774 \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \uac15\ud654\ud558\uba70 \ud544\uc218\uc801\uc778 \ubd80\ubd84\uc5d0 \ud55c\uc815\ud558\ub294 \uad00\ub9ac\uac00 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \ud1b5\uc81c \ud558\uc5d0 \uc911\uc694\uc131\uacfc \ud544\uc218\uc131\uc744 \uc778\uc815\ubc1b\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uae30 \uc704\ud55c \uc5f0\uad6c\uac00 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\uc5d0 \ub300\ud55c \ubc30\ub824\ub294 \ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc758 \uc911\uc694\ud55c \uc694\uc18c\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc904\uc774\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uacbd\uacc4 \ub0b4\uc5d0\uc11c \uacfc\ud559 \uc5f0\uad6c\uc758 \ucc45\uc784\uac10\uc744 \uac16\ucd94\uae30 \uc704\ud574, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uacfc \uaddc\uc81c\uac00 \uc874\uc7ac\ud558\uba70 \uc2e4\ud589 \uc911\uc785\ub2c8\ub2e4","\uc2e4\ud5d8\ub3d9\ubb3c\uc744 \uc0ac\uc6a9\ud558\ub294 \uac83\uc740 \uc77c\ubc18\uc801\uc73c\ub85c \ud1b5\uc81c\ub41c \ud658\uacbd\uc5d0\uc11c \uc218\ud589\ub418\uba70, \uc774\ub294 \uc5f0\uad6c\uc758 \uc2e0\ub8b0\uc131\uc744 \ub192\uc785\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uc2e4\ud5d8 \uae30\uc900\uc744 \ucca0\uc800\ud788 \uc900\uc218\ud574\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uc5d0\uac8c \uac00\ud574\uc9c0\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\uc2dd\uc73c\ub85c \uc2e4\ud5d8\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uc6b0\ub824\ub97c \ud574\uc18c\ud558\ub824\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucca0\uc800\ud55c \uc724\ub9ac\uc801 \uac80\ud1a0\uc640 \uaddc\uc81c\ub97c \ud1b5\ud574 \uc218\ud589\ub418\uba70 \uac00\uae09\uc801 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub3c4\ub85d \uc124\uacc4\ub429\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \ub178\ub825\uc740 \uc9c0\uc18d\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc601\ud5a5\uc744 \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ub3c4\uc785\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\ub418, \uc774\ub97c \uc644\uc804\ud788 \ubc30\uc81c\ud558\uc9c0 \ub9d0\uc544\uc57c \ud569\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uac00 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\ub3c4\ub85d \uc5c4\uaca9\ud558\uac8c \uaddc\uc81c\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, 3R \uc6d0\uce59\uc758 \uc801\uc6a9\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc989\uc2dc \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \ubc0f \uc724\ub9ac \uae30\uc900 \ud558\uc5d0 \uc218\ud589\ub429\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc744 \uace0\ub824\ud558\uba74\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \ucda9\uc871\uc2dc\ud0a4\ub294 \uac1c\uc120\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud560 \ub54c \ub192\uc740 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \uac00\uc9c0\uace0 \uc788\uc73c\uba70, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \ubc29\ubc95\uc744 \uc774\ubbf8 \uc801\uc6a9\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c\uc758 \ub3d9\ubb3c \ubcf5\uc9c0 \uac1c\uc120\uc740 \ub9e4\uc6b0 \uc911\uc694\ud558\uba70, \ubaa8\ub4e0 \ud569\ubc95\uc801 \uc5f0\uad6c\ub294 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud574\uc57c \ud569\ub2c8\ub2e4","\uc778\uac04\uc5d0 \ub300\ud55c \uc9c1\uc811\uc801\uc778 \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc73c\ub85c \ubb38\uc81c\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc0dd\uba85 \uacfc\ud559 \uc5f0\uad6c\uc758 \ubc1c\uc804\uc740 \uc810\uc810 \ub354 \uc724\ub9ac\uc801 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \uc815\uad50\ud568\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uace0\ubbfc \uc18d\uc5d0\uc11c \uacfc\ud559\uc801 \ubc1c\uc804\uc740 \uc778\ub958 \ubcf5\uc9c0\ub97c \ud06c\uac8c \ud5a5\uc0c1\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uc5c4\uaca9\ud558\uac8c \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uadf9\ub3c4\uc758 \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0\uc11c \uc218\ud589\ub418\uba70 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc774\ub044\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc724\ub9ac\uc801\uc778 \ub3d9\ubb3c \uc2e4\ud5d8 \uad00\ud589\uc740 \uc774\ubbf8 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4. '\ub3d9\ubb3c\uc2e4\ud5d8\uc744\uc704\ud55c\uad6d\uc81c\uc5f0\ud569(International Council for Laboratory Animal Science)'\ub294 \uc724\ub9ac\uc801\uc778 \uae30\uc900\uc744 \uc5c4\uaca9\ud558\uac8c \uc900\uc218\ud558\uace0 \uc788\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc2e0\uc911\ud788 \ud3c9\uac00\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798 \uc798 \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud558\ub294 \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uae30\uc900\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \ud2b9\ubcc4\ud55c \uaddc\uc81c\uc640 \uae30\uc900\uc744 \ud1b5\ud574 \ud574\uacb0\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uace0\ub824\ub97c \ucda9\uc871\ud558\ub824\uba74 \uc5f0\uad6c\uc758 \uc2e0\ub8b0\uc131\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc788\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacbd\uc6b0\uc5d0\ub3c4 \uc724\ub9ac\uc801\uc73c\ub85c \uc5c4\uaca9\ud55c \uae30\uc900\uc744 \uc9c0\ud0a4\uba74\uc11c \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c \ubc1c\uc0dd\ud558\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \ub354 \ub098\uc740 \ub300\uc548\uc744 \uac1c\ubc1c\ud558\ub824\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \uce21\uba74\uc5d0\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\ub294 \uae30\uc874\uc758 \uc724\ub9ac \uc9c0\uce68\uc774 \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucc45\uc784\uac10 \uc788\uac8c \uc218\ud589\ub420 \ub54c \uc778\uac04\uacfc \ub3d9\ubb3c \ubaa8\ub450\uc758 \ubcf5\uc9c0\ub97c \uace0\ub824\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\uc640 \ud568\uaed8 \uc724\ub9ac \uae30\uc900\uc744 \uc5c4\uaca9\ud788 \ub530\ub974\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uace0\ub824\ud558\uba74\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc774\ub77c\ub294 \uc810\uc740 \ubcc0\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud55c \uc724\ub9ac\uc801 \uc2e4\ud5d8\uc774 \uac15\uc870\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uac1c\uc120\ud558\ub824\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\ub294 \uac83\uc774 \ud544\uc218\uc801\uc774\uba70, \uc774\ub294 \uc5f0\uad6c \uae30\uad00\ub4e4\uc774 \uc9c0\ucf1c\uc57c \ud560 \uae30\ubcf8 \ucc45\ubb34\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ube44\uc911\uc744 \uc904\uc774\uace0 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \uac83\uc740 \ub2f9\uc5f0\ud788 \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uc0dd\uba85\ub3c4 \uc18c\uc911\ud558\ub2e4\ub294 \uc810\uc5d0\uc11c \ud22c\uba85\ud55c \uc2e4\ud5d8 \ud658\uacbd\uacfc \uc724\ub9ac\uc801 \uc0ac\uc6a9\uc744 \ubcf4\uc7a5\ud574\uc57c \ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc740 \uc5f0\uad6c \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uace0\ub824\ud558\ub3c4\ub85d \uac15\ub825\ud788 \uaddc\uc815\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc0dd\uba85 \uc874\uc911\uacfc \uc724\ub9ac\uc801 \uc2e4\ud5d8\uc744 \uc704\ud55c \uc5c4\uaca9\ud55c \uac00\uc774\ub4dc\ub77c\uc778\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc73c\ub85c \uc2e4\ud5d8 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\ub824\ub294 \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc778 \uac1c\uc120\uacfc \ubaa8\ub2c8\ud130\ub9c1\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ud1b5\ud574 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uc2e4\uc2dc\ub429\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\ud55c \uace0\ub824 \uc0ac\ud56d\uc774\uba70, \uc774\ub97c \uc704\ud55c \ub192\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc694\uad6c\ub429\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uace0\ubbfc\uc744 \ubc18\uc601\ud558\uc5ec \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c\uc640 \uae30\uc900 \ud558\uc5d0 \uc5c4\uaca9\ud788 \uad00\ub9ac\ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uc5b4 \ub354 \uc778\uac04\uc801\uc774\uace0 \uc724\ub9ac\uc801\uc73c\ub85c \uc218\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uac15\ub825\ud55c \uc724\ub9ac \uae30\uc900\uc744 \ud1b5\ud574 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uac10\uc18c\uc2dc\ud0a4\uba74\uc11c\ub3c4 \uc911\uc694\ud55c \uacfc\ud559\uc801 \ubc1c\uacac\uc744 \uac00\ub2a5\ud558\uac8c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\ub9ac\ub294 \ucd5c\ub300\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc9c0\ud0a4\uba70 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud558\uc5ec \ucd5c\uc18c\ud654\ub41c \uace0\ud1b5 \uc18d\uc5d0 \uc911\uc694\ud55c \uc5f0\uad6c \uc131\uacfc\ub97c \uc5bb\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uc724\ub9ac\uc131\uc744 \uac15\ud654\ud558\ub294 \uac10\ub3c5 \uc2dc\uc2a4\ud15c\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uacfc \uc724\ub9ac\uc758 \uade0\ud615\uc744 \ub9de\ucd94\ub294 \ub370 \uc788\uc5b4 \uc5c4\uaca9\ud55c \uaddc\uc81c\ub97c \ud1b5\ud574 \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc0ac\uc6a9\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798 \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc9c0\uc18d\uc801\uc778 \uc724\ub9ac\uc801 \ub17c\uc758\uc640 \uae30\uc900 \uac15\ud654\ub294 \uacc4\uc18d \uc720\uc9c0\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc2e4\ud5d8 \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \ub3d9\ubb3c \uc2e4\ud5d8 \uc758\uc874\ub3c4\ub97c \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucca0\uc800\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc778 \uce21\uba74\uc744 \uace0\ub824\ud558\uc5ec \uac00\ub2a5\ud55c \ud55c \uace0\ud1b5\uc744 \uc904\uc774\ub294 \ubc29\ud5a5\uc73c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba70 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uaddc\uc81c\ub97c \ud1b5\ud574 \uc724\ub9ac\uc801\uc778 \uae30\uc900\uc744 \uc720\uc9c0\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uc744 \ubcf4\uc7a5\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc815\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ube44\ub85d \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub3d9\ubb3c\uc5d0\uac8c \uace0\ud1b5\uc744 \uc904 \uc218 \uc788\ub354\ub77c\ub3c4, \uadf8 \uacfc\uc815\uc744 \ud1b5\ud574 \uc0dd\uae38 \uc218 \uc788\ub294 \uc7a0\uc7ac\uc801\uc778 \uc778\ub958\uc758 \uac74\uac15 \uc774\uc775\uc740 \uc5c4\uccad\ub0a9\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc644\ud654\ud558\uae30 \uc704\ud55c \uc81c\ub3c4\uac00 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \uc811\uadfc\uc774 \uacc4\uc18d \uac1c\uc120\ub418\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ubaa8\ub4e0 \uc5f0\uad6c\ub294 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \uadfc\uac70\ud558\uc5ec \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uace0\ud1b5\uc744 \uacbd\uac10\uc2dc\ud0a4\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \uac1c\uc120\ucc45\uc774 \ub3c4\uc785\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900 \uac15\ud654\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud55c \uc5f0\uad6c\uc5d0\uc11c\uc870\ucc28 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uc874\uc911\ud558\ub3c4\ub85d \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c \uc544\ub798 \uc2dc\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ubaa8\ub4e0 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc120\ud0dd\ud558\uae30 \uc804\uc5d0 \ub300\uccb4 \uac00\ub2a5\ud55c \ubc29\ubc95\uc744 \uc2e0\uc911\ud788 \uace0\ub824\ud558\ub294 \uacfc\uc815\uc744 \uac70\uce69\ub2c8\ub2e4","\ub3d9\ubb3c \uc5f0\uad6c\ub294 \ubc95\uc801\uc774\uace0 \uc724\ub9ac\uc801\uc778 \uae30\uc900\uc744 \uc900\uc218\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc778 \ub51c\ub808\ub9c8\uc5d0 \ub300\ud55c \ucd5c\uc120\uc758 \ub300\uc751\ucc45\uc774 \ub429\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc774\ubbf8 \uc5c4\uaca9\ud558\uac8c \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uad00\ub828\ub41c \uc724\ub9ac\uc801 \uace0\ubbfc\uc744 \ud574\uacb0\ud558\uae30 \uc704\ud55c \ub178\ub825\uc740 \uc774\ubbf8 \uc2dc\uc791\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\uadf8\ub7fc\uc5d0\ub3c4 \uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ub300\uc548\uc744 \ucc3e\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \ub178\ub825\ud558\uace0 \uc788\uc73c\uba70, \uac19\uc740 \ub9e5\ub77d\uc5d0\uc11c \uc81c\ud55c\ub41c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uad8c\uc7a5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uaddc\uc81c\ub294 \uacc4\uc18d \uac15\ud654\ub418\uc5b4 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c\ub294 \uc5c4\uaca9\ud55c \uaddc\uc81c\uac00 \ub9c8\ub828\ub418\uc5b4 \uc788\uc5b4 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc808\ucc28\uac00 \ucca0\uc800\ud788 \uc900\uc218\ub429\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\ub300\ud55c \uc724\ub9ac\uc801\uc73c\ub85c \uc2e4\uc2dc\ub418\uace0 \uc788\uc73c\uba70 \uc5f0\uad6c\uc790\ub4e4\uc740 \ud56d\uc0c1 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\uace0 \ub178\ub825\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c \uace0\ud1b5\uc744 \uac10\uc18c\uc2dc\ud0a4\ub294 \uac83 \ub610\ud55c \ud604\ub300 \uacfc\ud559\uc758 \uc8fc\uc694 \ubaa9\ud45c \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uaddc\uc81c \uc544\ub798 \uc218\ud589\ub418\uba70, \uc774\ub97c \ud1b5\ud574 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc774 \uacc4\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uacfc\ud559\uc801 \uc5f0\uad6c\ub294 \ud568\uaed8 \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc778 \uc724\ub9ac\uc801 \uace0\ub824\ub97c \ub3d9\ubc18\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc815\ud655\ud55c \uc724\ub9ac\uc801 \uaddc\ubc94 \ud558\uc5d0 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uadf9\ub300\ud654\ud558\uae30 \uc704\ud55c \ubc29\uc548\ub3c4 \uc9c0\uc18d\uc801\uc73c\ub85c \ud655\uc7a5\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8 \ud504\ub85c\ud1a0\ucf5c\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc744 \uc694\uad6c\ubc1b\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uc808\ucc28 \uc544\ub798\uc5d0\uc11c \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uac01\uc885 \uc724\ub9ac \uc9c0\uce68\uc744 \uc900\uc218\ud558\uba70 \uacfc\ud559\uc801 \uc815\ud655\uc131\uc744 \ucd94\uad6c\ud569\ub2c8\ub2e4","\uacfc\ud559\uc801 \uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uc5b4 \uc624\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uace0\ub824 \uc0ac\ud56d\uc774 \uac15\ud654\ub418\uace0 \uc788\uc73c\uba70, \uc5f0\uad6c\ub294 \uc810\uc810 \ub354 \uc815\uad50\ud558\uace0 \uc778\ub3c4\uc801\uc778 \ubc29\uc2dd\uc73c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc911\uc5d0\ub294 \uc5c4\uaca9\ud55c \uc2ec\uc758\uc640 \uc724\ub9ac \uc704\uc6d0\ud68c\uc758 \ud5c8\uac00\ub97c \ubc1b\uc740 \uacbd\uc6b0\uc5d0\ub9cc \uc2dc\ud589\ub418\uba70, \uc774\ub294 \ub3d9\ubb3c\uc774 \ubc1b\uc744 \uc218 \uc788\ub294 \ubd88\ud544\uc694\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9e4\uc6b0 \ub192\uc740 \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798\uc5d0\uc11c \uc9c4\ud589\ub429\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uace0\ub824\ub294 \uc810\uc810 \ub354 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uace0\ub824\uc5d0 \ubc14\ud0d5\uc744 \ub450\uace0 \uc2e0\uc911\ud558\uac8c \uc9c4\ud589\ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \ub300\uc548\uc774 \ud604\uc7ac\ub85c\uc11c\ub294 \ubd88\ucda9\ubd84\ud558\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0 \ub300\ud55c \uc790\uc6d0 \ud22c\uc790\uac00 \ud568\uaed8 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc0dd\uba85\uc724\ub9ac\uac00 \ubaa8\ub4e0 \uc5f0\uad6c\uc758 \uae30\ubcf8\uc774 \ub418\uc5b4\uc57c \ud55c\ub2e4\ub294 \uc810\uc5d0 \ub3d9\uc758\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \ub51c\ub808\ub9c8\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucca0\uc800\ud55c \uc724\ub9ac\uc801 \uac80\ud1a0\ub97c \ud1b5\ud574 \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \uac10\uc548\ud558\uc5ec, \ub9ce\uc740 \uc5f0\uad6c\uc790\ub4e4\uc774 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\uc7a5\ud558\uae30 \uc704\ud55c \uc9c0\uc18d\uc801 \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub294 \uc5c4\uaca9\ud788 \ubcf4\ud638\ub418\uba70, \ubaa8\ub4e0 \uc5f0\uad6c\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc73c\ub85c \uad00\ub9ac\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc724\ub9ac\uc801 \ub300\uc548\uc740 \uafb8\uc900\ud788 \uac1c\ubc1c\ub418\uace0 \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uaddc\ubc94 \uc548\uc5d0\uc11c \uc218\ud589\ub418\uc5b4\uc57c \ud558\uba70, \uac00\ub2a5\ud55c \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uc874\uc7ac\ud560 \ub54c\ub294 \uc774\ub97c \uc6b0\uc120\uc801\uc73c\ub85c \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc778 \uae30\uc900\uc744 \uc900\uc218\ud558\uba70 \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c\ub41c \ud658\uacbd\uc5d0\uc11c \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900 \ud558\uc5d0 \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc724\ub9ac\uc801, \uacfc\ud559\uc801 \uade0\ud615\uc744 \uc720\uc9c0\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c\ub294 \ucd5c\ub300\ud55c\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc801\uc6a9\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc5f0\uad6c\uae30\uad00\uc758 \ucc45\uc784\uc785\ub2c8\ub2e4","\uacfc\ud559\uc790\ub4e4\uc740 \ub3d9\ubb3c\uc5d0\uac8c \ucd5c\uc18c\ud55c\uc758 \uace0\ud1b5\uc744 \uc8fc\uae30 \uc704\ud574 \uc5c4\uaca9\ud55c \uc9c0\uce68\uc744 \ub530\ub985\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uac1c\uc120 \ub178\ub825\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"0_3r_uk research_department of","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","",""
