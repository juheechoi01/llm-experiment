"\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d\uc758 \uc548\uc804\uc131 \ud3c9\uac00\uc5d0 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \ubcf5\uc7a1\ud55c \uc778\uac04 \uc9c8\ubcd1\uc758 \uce58\ub8cc\ubc95\uc744 \ucc3e\ub294 \ub370\uc5d0\ub294 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub294 \uc0c1\ub2f9\uc218\uc758 \uc911\uc694\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc774 \uc9c0\uc5f0\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\ubb3c\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1 \uce58\ub8cc\uc758 \uae30\ubcf8\uc801\uc778 \uc9c4\uc804\uc744 \ub9cc\ub4e4\uc5b4 \ub0c5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc778\ub958\ub294 \uc911\ub300\ud55c \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uce58\ub8cc\ubc95\uc744 \ubc1c\uacac\ud560 \uc218 \uc788\uc5c8\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc784\uc0c1 \uc2dc\ud5d8 \uc804 \uc911\uc694\ud55c \uc548\uc804\uc131\uc744 \ud655\uc778\ud558\ub294 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc911\uc694\ud55c \uc774\ud574\ub97c \uc81c\uacf5\ud558\ub294 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\uc885 \uc0ac\uc6a9\uc790\uc5d0\uac8c \uc548\uc804\ud55c \uacb0\uacfc\ubb3c\uc744 \uc81c\uacf5\ud558\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub9ce\uc740 \uc9c8\ubcd1 \ud1f4\uce58\uc758 \ucd5c\uc120\uc758 \ubc29\ubc95\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\uc81c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ud655\ub9bd\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2ec\uac01\ud55c \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc744 \uc9c1\uc811 \uc704\ud5d8\uc5d0 \ub178\ucd9c\ud558\uc9c0 \uc54a\uc73c\uba74\uc11c \ucd08\uae30 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud560 \uc218 \uc788\uac8c \ud574\uc90d\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uc548\uc801\uc778 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \uac80\uc99d\ub418\uae30 \uc804\uae4c\uc9c0\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \ud655\ubcf4\ud558\ub294 \uac00\uc7a5 \ud569\ub9ac\uc801\uc778 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc548\uc804\ud55c \uc2e0\uc57d \uac1c\ubc1c\uc740 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc758 \ubcf5\uc7a1\uc131\uc744 \uc774\ud574\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc73c\ub85c \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uce58\ub8cc\ubc95\uc774 \uac1c\ubc1c\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc784\uc0c1 \uc804 \uc5f0\uad6c\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc778\uac04\uc5d0\uac8c \uc7a0\uc7ac\uc801\uc73c\ub85c \uc704\ud5d8\ud55c \uc57d\ubb3c\uc758 \ud6a8\uacfc\uc640 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud560 \uc218 \uc788\ub294 \ud544\uc218\uc801\uc778 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\uba3c\uc800, \uc778\ub958\uc758 \uac74\uac15\uc744 \uac1c\uc120\ud560 \uc218 \uc788\ub294 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc778 \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\uc885\uc801\uc73c\ub85c \uc778\uac04 \ub300\uc0c1 \uc784\uc0c1 \uc2dc\ud5d8\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud6a8\uacfc\uc801\uc778 \uc57d\ubb3c \uac1c\ubc1c\uc5d0 \uc911\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\uc815 \uc9c8\ud658\uc5d0\uc11c \uc778\uccb4 \ub0b4\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc774\ud574\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \uc218\ub2e8 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\uc644\uc804\ud788 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub294 \ub3d9\ubb3c \ubaa8\ub378\uc5d0\uc11c \uac80\uc99d\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\ub7ec \uc758\ub8cc \ud601\uc2e0\uc758 \ubc11\uac70\ub984\uc774 \ub418\uc5b4\uc654\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc73c\ub85c \uac1c\ubc1c\ub41c \uce58\ub8cc\ubc95\uc774 \uc218\ubc31\ub9cc \uba85\uc758 \uc0dd\uba85\uc744 \uad6c\ud574\uc654\uc2b5\ub2c8\ub2e4","\uc778\uac04\uc744 \ub300\uc0c1\uc73c\ub85c \ud55c \uc784\uc0c1 \uc2dc\ud5d8\uc744 \uc2dc\uc791\ud558\uae30 \uc804\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc548\uc804\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \ud604\uc7ac\uc640 \uac19\uc740 \uc218\uc900\uc73c\ub85c \uc9c8\ubcd1 \uc5f0\uad6c\uc640 \uce58\ub8cc \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud558\ub294 \uac83\uc740 \uc5b4\ub824\uc6b4 \uc0c1\ud669\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc758 \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\ub294 \ub370 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uae4a\uc774\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0\uc11c \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc0ac\ub78c\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\uae30 \uc704\ud574\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \ub9cc\ud55c \ub300\uc548\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc558\uc73c\uba70, \uc774\ub7ec\ud55c \uc5f0\uad6c \uc5c6\uc774\ub294 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc5d0 \ub300\ud55c \uc815\ubc00\ud55c \ud3c9\uac00\uac00 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucca8\ub2e8 \uae30\uc220\uacfc \ubcd1\ud589\ud558\uc5ec \uc0ac\uc6a9\ub418\uba70, \uc778\uac04 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0\uc11c \ud544\uc218\uc801\uc778 \uc804\ud658 \ub2e8\uacc4\ub85c\uc11c\uc758 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ud6a8\uacfc\uc131\uc744 \uc785\uc99d\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \ubcf4\uc7a5\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc9c8\ubcd1 \uc5f0\uad6c\uc758 \uc9c4\ud654\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uc548 \uae30\uc220\uc758 \uc870\ud654\ub97c \ud1b5\ud574 \ub354\uc6b1 \uac00\uc18d\ud654\ub420 \uac83\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc548\uc804\ud55c \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud604\uc7ac \uce58\ub8cc\ubc95\uc758 \ud6a8\uacfc\uc640 \uc548\uc804\uc131\uc744 \uac80\uc99d\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uc548\uc804\uc131 \ud3c9\uac00 \uc218\ub2e8\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c \uac1c\ubc1c \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ud655\uc778\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub9ce\uc740 \ud604\uc7ac\uc758 \uce58\ub8cc\ubc95\uc774 \ub3d9\ubb3c \uc2e4\ud5d8 \ub355\ubd84\uc5d0 \ubc1c\uacac\ub418\uc5c8\uc2b5\ub2c8\ub2e4. \"\uc554 \uc5f0\uad6c\uc18c(Cancer Research UK)\"\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc554\uc744 \ud3ec\ud568\ud55c \uce58\uba85\uc801 \uc9c8\ud658 \uce58\ub8cc\uc5d0 \ud544\uc218\uc801\uc778 \ub370\uc774\ud130 \uc81c\uacf5\uc6d0\uc774\ub77c\uace0 \uc124\uba85\ud558\uba70, \uc774\ub294 \ub9ce\uc740 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uae30\uc5ec\ud588\ub2e4\ub294 \uc810\uc744 \uac15\uc870\ud569\ub2c8\ub2e4","\uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \ub370 \uc788\uc5b4 \ub3d9\ubb3c \uc2dc\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub354\ubd88\uc5b4, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\ub294 \uc2ec\uac01\ud55c \uc9c8\ubcd1 \uce58\ub8cc\uc758 \ubc1c\uc804\uc744 \ud1b5\ud574 \ub418\ub3cc\ub9b4 \uc218 \uc788\ub294 \uc0ac\ud68c\uc801 \uc774\uc775\uc774 \ub530\ub985\ub2c8\ub2e4","\uadf8 \uc678\uc5d0\ub3c4, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ub2e4\uc591\ud55c \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc774\ud574\ub3c4\ub97c \ub192\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc8fc\uc694 \uc9c8\ubcd1 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d\uc758 \uc548\uc804\uc131\uacfc \uc720\ud6a8\uc131\uc744 \uac80\uc99d\ud558\ub294 \uc8fc\uc694 \uc218\ub2e8\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \uc2ec\uac01\ud55c \ubd80\uc791\uc6a9\uc744 \uc608\uce21\ud558\uace0 \uc608\ubc29\ud558\ub294 \ub370 \ub3c4\uc6c0\uc744 \uc90d\ub2c8\ub2e4. '\ubbf8\uad6d\uc2dd\ud488\uc758\uc57d\uad6d (FDA)'\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub97c \uc758\uc57d\ud488 \uc2b9\uc778 \uacfc\uc815\uc5d0\uc11c \ud544\uc218\uc801\uc73c\ub85c \ud65c\uc6a9\ud55c\ub2e4\uace0 \uba85\uc2dc\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc548\uc804\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc911\ub300\ud55c \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc778 \uac80\uc99d \ub2e8\uacc4\ub85c \uae30\ub2a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uc5f0\uad6c \uacb0\uacfc\ub294 \uc608\uce21 \ubd88\uac00\ub2a5\ud55c \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \uae4a\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c \uac00\uc18d\ud654\uc5d0 \ud070 \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \ub370 \ub3c4\uc6c0\uc744 \uc90d\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\ucca8\ub2e8 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \uc5c6\uc5b4\uc11c\ub294 \uc548 \ub420 \ub3c4\uad6c\uc785\ub2c8\ub2e4. '\uad6d\ub9bd \ubcf4\uac74\uc6d0 (NIH)'\uc740 \ub3d9\ubb3c \uc5f0\uad6c\uac00 \uc778\uac04\uc758 \uc2e0\uccb4 \uccb4\uacc4\ub97c \uc774\ud574\ud558\uace0 \uc774\ub97c \uae30\ubc18\uc73c\ub85c \ud55c \ud601\uc2e0\uc801 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud55c\ub2e4\uace0 \ubcf4\uace0\ud569\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \uc911\uc694\ud55c \ub3d9\ub825\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc911\ub2e8\ud558\uba74 \uc5f0\uad6c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uc728\uc131\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc9c1\uc811 \uc801\uc6a9 \uac00\ub2a5\ud55c \uc548\uc804\ud55c \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\uae30 \uc704\ud574 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc608\uce21\ud560 \uc218 \uc5c6\ub294 \uc704\ud5d8\uc744 \uc904\uc785\ub2c8\ub2e4","\uc2e0\uc57d \uac1c\ubc1c\uc758 \uc18d\ub3c4\ub97c \uc904\uc774\uc9c0 \uc54a\uace0 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc774\ub8e8\ub824\uba74 \uc810\uc9c4\uc801\uc778 \uc804\ud658\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uc57d\ubb3c\uc758 \uc548\uc804\uc131\uc744 \ubbf8\ub9ac \uac80\uc99d\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c\uc758 \ucd08\uae30 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud68d\uae30\uc801\uc778 \uce58\ub8cc\ubc95\uc774 \uac1c\ubc1c\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0ac\ub78c\uc744 \ub300\uc0c1\uc73c\ub85c \ud55c \uc2e4\ud5d8\uc758 \uc704\ud5d8\uc131\uc744 \uc904\uc774\ub294 \ub370 \uc788\uc5b4 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ud604\uc7ac\ub85c\uc11c\ub294 \uba87\uba87 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1 \uce58\ub8cc \uc5f0\uad6c\uc5d0 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \uc644\uc804\ud788 \ucc3e\uae30 \uc5b4\ub824\uc6b4 \uc0c1\ud669\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc57d\ubb3c\uacfc \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e4\uc81c \uc784\uc0c1 \ud6a8\uacfc\ub97c \uc608\uce21\ud558\ub294 \ud575\uc2ec \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d \uac1c\ubc1c\uacfc \uce58\ub8cc\ubc95 \uac80\uc99d\uc758 \uac00\uc18d\ud654\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ud604\uc7ac\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uc9c8\ubcd1 \uce58\ub8cc\uc758 \uae38\uc744 \uc5f4\uc5c8\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc778\ub958\ub294 \ubcf4\ub2e4 \ub098\uc740 \uce58\ub8cc\ubc95\uc744 \ubc1c\uacac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uce58\ub8cc\uc758 \uac00\ub2a5\uc131\uc744 \ub192\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c\uc758 \uc815\ud655\uc131\uacfc \uc548\uc804\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c \uc18d\ub3c4\ub97c \ub192\uc774\ub294 \ub370 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\ubb3c\ud559\uc801 \uc548\uc804\uc131\uc744 \uc0ac\uc804\uc5d0 \uc810\uac80\ud558\uae30 \uc704\ud574 \ud544\uc694\ud569\ub2c8\ub2e4","\ub9ce\uc740 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ubc1c\uc804\ub418\uc5b4 \uc654\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc548\uc804\uc131 \uac80\uc0ac\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \uc2ec\ud654\uc2dc\ud0a4\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc2e0\uc57d \uac1c\ubc1c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \uac80\uc99d\ud558\uae30 \uc704\ud574\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc73c\uba74, \uc778\uac04\uc5d0\uac8c \uc9c1\uc811\uc801\uc778 \uc704\ud5d8\uc744 \uc218\ubc18\ud558\ub294 \uc2e4\ud5d8 \ub2e8\uacc4\ub97c \ub2e8\ucd95\ud560 \uc218 \uc5c6\uac8c \ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85\uc744 \uc704\ud5d8\uc5d0 \ube60\ub728\ub9ac\uc9c0 \uc54a\uace0 \uc5f0\uad6c\ub97c \uc9c4\ud589\ud560 \uc218 \uc788\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \uacb0\uc815\uc801\uc785\ub2c8\ub2e4","\uc778\uac04\uacfc \uc0dd\ub9ac\ud559\uc801\uc73c\ub85c \uc720\uc0ac\ud55c \ub3d9\ubb3c\ub4e4\uc740 \uce58\ub8cc \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc758 \ud575\uc2ec \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ud604 \uc2dc\uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \ub355\ubd84\uc5d0 \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uc911\ub300\ud55c \uce58\ub8cc\ubc95\ub4e4\uc774 \uac1c\ubc1c\ub418\uc5c8\uc2b5\ub2c8\ub2e4. \"\uba54\uc774\uc694 \ud074\ub9ac\ub2c9(Mayo Clinic)\"\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc5c8\ub2e4\uba74 \ud604\uc7ac\uc758 \ub9ce\uc740 \uc758\ub8cc \ud601\uc2e0\uacfc \uce58\ub8cc \uc131\uacfc\uac00 \ubd88\uac00\ub2a5\ud588\uc744 \uac83\uc774\ub77c\uace0 \uc9c0\uc801\ud558\uba70, \uc774\ub294 \ub9ce\uc740 \ubaa9\uc228\uc744 \uad6c\ud558\ub294 \ub370 \uae30\uc5ec\ud588\ub2e4\uace0 \uc124\uba85\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uc9c8\ubcd1 \uc774\ud574\ub97c \ud655\ub300\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc548\uc804\ud55c \uc784\uc0c1 \uc2dc\ud5d8\uc744 \uc704\ud574 \ub3d9\ubb3c \uc5f0\uad6c\ub294 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud575\uc2ec\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc5ec\uc804\ud788 \uc0c8\ub85c\uc6b4 \uc57d\ubb3c\uc758 \uc7a0\uc7ac\uc801\uc778 \ud6a8\uacfc\uc640 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud560 \uc218 \uc788\ub294 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uc778\uac04\uc758 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc774\ud574\ud558\ub294 \ub370 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uac00\uc7a5 \uc720\uc6a9\ud55c \ubc29\ubc95\uc73c\ub85c \ud65c\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub294 \uc778\uac04 \uc9c8\ubcd1 \uc774\ud574\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc774\ub098 \uc57d\ubb3c\uc774 \uc778\uccb4\uc5d0 \ubbf8\uce58\ub294 \uc601\ud5a5\uc744 \uc774\ud574\ud558\uae30 \uc704\ud574 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub9ce\uc740 \uacbd\uc6b0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \uae30\ucd08\uac00 \ub418\uc5b4 \uc654\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604 \uc2dc\uc810\uc5d0\uc11c \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \uac00\uc7a5 \uc798 \uc774\ud574\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5 \uac80\uc99d\uc5d0 \ud544\uc218\uc801\uc778 \uacfc\uc815\uc785\ub2c8\ub2e4","\uc778\uccb4\ub97c \ub300\uc0c1\uc73c\ub85c \ud55c \uc548\uc804\uc131 \uac80\uc99d\uc5d0\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \uc911\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uc744 \uac80\uc99d\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1 \uce58\ub8cc\uc5d0 \ud544\uc218\uc801\uc778 \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uc758\uc57d\ud488\uc744 \uac1c\ubc1c\ud558\ub294 \uac83\uc740 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud558\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4. \"\uc138\uacc4 \ubcf4\uac74 \uae30\uad6c(WHO)\"\ub294 \ud604\uc7ac\uc758 \uacfc\ud559 \uc218\uc900\uc5d0\uc11c\ub294 \ub3d9\ubb3c\uc758 \uc0dd\uccb4 \ub0b4 \ubc18\uc751\uc774 \uc778\uac04 \uc9c8\ubcd1\uc758 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\ub2e4\uace0 \ub9d0\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1\uc758 \uc774\ud574\uc640 \uce58\ub8cc\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ucd08\uae30 \ud3c9\uac00 \ub2e8\uacc4\uc5d0\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub354\ubd88\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ud6a8\uacfc\ub97c \uc870\uae30\uc5d0 \uc2dd\ubcc4\ud558\ub294 \ub370\ub3c4 \ub9e4\uc6b0 \uc720\uc6a9\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc774\ud574\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \ucd08\uae30 \ubc1c\uacac\uc740 \uce58\ub8cc \ud601\uc2e0\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc758\uc57d \uc5f0\uad6c\uc5d0 \uc911\ucd94\uc801\uc778 \uc5ed\ud560\uc744 \uc218\ud589\ud558\uba70, \ub9ce\uc740 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub113\ud788\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc81c\ud55c\ub41c \uc0c1\ud669\uc5d0\uc11c \ud544\uc218\uc801\uc774\uba70, \uc774\ub294 \uc758\ub8cc \uc5f0\uad6c\uc758 \uae4a\uc774\uc640 \ubc94\uc704\ub97c \ud655\uc7a5\ud569\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uc57d\ubb3c\uacfc \uce58\ub8cc\ubc95\uc740 \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub294 \ud604\uc2e4\ud654\ub418\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uc548\uc804\uc131 \ud655\ubcf4 \uce21\uba74\uc5d0\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubd88\uac00\uacb0\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uac00 \uc9c1\uba74\ud55c \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub192\uc774\ub294 \ub370 \uacb0\uc815\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub2e4\uc591\ud55c \uc0dd\uba85\uc758 \uac00\uce58\ub97c \uc874\uc911\ud558\ub294 \ub3d9\uc2dc\uc5d0 \uc778\ub958\ub97c \uc704\ud55c \ud544\uc218\uc801 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \uade0\ud615\uc744 \uc774\ub8e8\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uac80\uc99d\ub41c \uacb0\uacfc\ub294 \uc0dd\ubb3c\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0c1\ud638 \uc791\uc6a9 \uc18d\uc5d0\uc11c \uc2e0\uc57d\uc774\ub098 \uce58\ub8cc\ubc95\uc758 \uc2e4\uc81c \ud6a8\uacfc\ub97c \uc608\uce21\ud558\ub294 \ub370 \ud06c\uac8c \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc778\uac04 \uc0dd\uba85 \uad6c\ucd9c\uc758 \uac00\uc7a5 \ube60\ub978 \uae38\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc758\uc57d\ud488 \uac1c\ubc1c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \uc785\uc99d\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d \uac1c\ubc1c\uc758 \uae30\ubcf8\uc801\uc778 \ub2e8\uacc4\ub85c, \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \uac80\uc99d\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\uc815\ud55c \uc5f0\uad6c\uc5d0\uc11c \uc778\uac04\uc5d0\uac8c \uc9c1\uc811\uc801\uc778 \uc704\ud5d8\uc744 \ud53c\ud560 \uc218 \uc788\ub3c4\ub85d \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc911\uc694\ud55c \uc608\ube44 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4. \"\uc601\uad6d \uc57d\ub9ac\ud559\ud68c(British Pharmacological Society)\"\ub294 \ub3d9\ubb3c \ubaa8\ub378\uc744 \ud1b5\ud574 \ucd08\uae30 \uc548\uc804 \ubc0f \uc57d\ubb3c \ub300\uc0ac \uc815\ubcf4\ub97c \ud655\ubcf4\ud568\uc73c\ub85c\uc368 \uc778\uac04 \uc784\uc0c1 \uc2dc\ud5d8\uc758 \uc704\ud5d8\uc744 \uc904\uc77c \uc218 \uc788\ub2e4\uace0 \uc9c4\uc220\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uaddc\ubaa8 \uc784\uc0c1 \uc2dc\ud5d8 \uc804 \uc0ac\uc804 \uac80\uc99d\uc758 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4 \uc548\uc804\uc131 \uac80\uc99d\uc758 \uccab \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\uc131 \uac80\uc99d\uc758 \uc911\uc694\ud55c \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uc778\uac04\uc5d0\uac8c \uc548\uc804\ud55c \uc2e0\uc57d \uac1c\ubc1c\uc744 \uc704\ud55c \uc9c1\uc811\uc801\uc778 \uac80\uc99d \uacfc\uc815\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc0dd\uccb4 \ub0b4 \uc5f0\uad6c\ub294 \uc608\uce21\ud560 \uc218 \uc5c6\ub294 \uc778\uac04 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\uc131\uc744 \ud574\uba85\ud558\ub294 \ub370 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \ud544\uc218\uc801\uc778 \ubd80\ubd84\uc73c\ub85c, \uc778\uac04 \uc2e4\ud5d8\uc744 \uc9c1\uc811 \uc218\ud589\ud558\uae30 \uc804\uc5d0 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \uc785\uc99d\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1 \uc5f0\uad6c\uc758 \uc911\uc694\ud55c \uae30\ucd08\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc2e4\ud5d8\uc744 \uc2dc\uc791\ud558\uae30 \uc804\uc5d0 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ud3c9\uac00\ud558\ub294 \uc911\uc694\ud55c \uc218\ub2e8\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\ub97c \uc704\ud55c \ud544\uc218 \ub2e8\uacc4\uc774\uba70, \uc5ec\ub7ec \uc704\ud5d8\uc744 \uc0ac\uc804\uc5d0 \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\uc131\uc740 \ub9ce\uc740 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \uc5f0\uad6c\ub294 \ud658\uc790\ub4e4\uc5d0\uac8c \uc2e4\uc9c8\uc801\uc778 \uce58\ub8cc \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc7a5\uae30\uc801\uc778 \uce58\ub8cc \ubc1c\uc804\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uce58\ub8cc\ubc95\uc758 \ubc1c\uacac\uc744 \uac00\uc18d\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc608\uce21 \uac00\ub2a5\ud55c \uc548\uc804\uc131\uc744 \ud655\uc778\ud560 \uc218 \uc788\ub294 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uc9c8\ubcd1\uc758 \uae30\uc804 \uc774\ud574\uc5d0 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ub2f4\ub2f9\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uae30\uc5ec\ub85c \uc778\ud574 \ub9ce\uc740 \uce58\ub8cc\ubc95\uc774 \uac1c\ubc1c\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131 \ud3c9\uac00\uc5d0 \uc911\uc694\ud569\ub2c8\ub2e4","\ucd5c\uc120\uc744 \ub2e4\ud574 \uc778\ub958\uc758 \uc9c8\ubcd1 \uce58\ub8cc\ub97c \uc704\ud55c \uc5f0\uad6c\uc5d0 \uc788\uc5b4 \uc6b0\ub9ac\uac00 \uc120\ud0dd\ud560 \uc218 \uc788\ub294 \ub3c4\uad6c\ub4e4 \uc911 \ud558\ub098\ub85c \uc5ec\uc804\ud788 \uaf2d \ud544\uc694\ud55c \uc0c1\ud669\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc9c8\ud658\uc758 \uc9c4\ud654\uc640 \uc9c4\ud589\uc744 \uc7a5\uae30\uc801\uc73c\ub85c \uad00\ucc30\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc5c8\ub2e4\uba74 \ud604\uc7ac\uc758 \ub9ce\uc740 \uce58\ub8cc\ubc95\uc740 \uc874\uc7ac\ud558\uc9c0 \ubabb\ud588\uc744 \uac83\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ucd5c\uc120\uc758 \uce58\ub8cc\ubc95\uc744 \ucc3e\uae30 \uc704\ud55c \uc911\uc694\ud55c \uc5ed\ud560\uc744 \uc218\ud589\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95\uc758 \ud604\uc2e4\uc801 \uc801\uc6a9 \uac00\ub2a5\uc131\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub354\uc6b1 \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \ub3d5\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uac1c\ubc1c\ub41c \uce58\ub8cc\ubc95\ub3c4 \uc874\uc7ac\ud558\uc9c0\ub9cc, \ubaa8\ub4e0 \uc2e0\uc57d \ubc0f \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \ub2e8\ub3c5\uc73c\ub85c \ubcf4\uc7a5\ud558\uae30\uc5d0\ub294 \ubd80\uc871\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\ub978 \ubc29\ubc95\ub4e4\uc5d0 \ube44\ud574 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc788\uc5b4 \uc5ec\uc804\ud788 \uac00\uc7a5 \uc2e4\uc9c8\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0\uc11c \uc778\ub958\uc5d0\uac8c \uc9c1\uc811\uc801\uc778 \uac74\uac15 \uc774\uc775\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \ubc0f \uc758\uc57d\ud488\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ubcf4\uc7a5\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uacf5\uac1c \uc18d\ub3c4\ub97c \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\ub2e4\uba74 \uc5f0\uad6c \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc911\uc694\ud55c \uc548\uc804\uc131\uacfc \ud6a8\ub2a5 \uc2dc\ud5d8\uc774 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\uacfc\ud559 \uc5f0\uad6c\ub294 \uad81\uadf9\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\ub294 \uce58\ub8cc\ubc95 \uac1c\ubc1c \ud658\uacbd\uc744 \ubaa9\ud45c\ub85c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc9c8\ubcd1 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c, \uacb0\uc815\uc801\uc778 \uce58\ub8cc\ubc95 \ubc1c\uacac\uc5d0 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc5ed\ud560\uc744 \uac04\uacfc\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc548\uc804\ud55c \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uc758\uc57d\ud488 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf4\ub2e4 \uc548\uc804\ud55c \uc778\uac04 \uc784\uc0c1 \uc2dc\ud5d8\uc744 \uc704\ud55c \uc911\uc694\ud55c \uc900\ube44 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc \ud6a8\uacfc \uac80\uc99d\uc758 \ud544\uc218 \uacfc\uc815\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc5f0\uad6c\ub294 \ubd88\uce58\ubcd1 \uce58\ub8cc\uc758 \ubc1c\uc804\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\uc131\uacfc \uc720\ud6a8\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \ub370 \uc911\ucd94\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uc9c8\ubcd1\uc758 \uc9c4\ud589 \ubc0f \uce58\ub8cc\uc5d0 \ub300\ud574 \uc2ec\ub3c4 \uc788\ub294 \uc774\ud574\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\ud569\uc801\uc778 \uc0dd\ubb3c\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\ub300\ud55c \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc815\ud655\uc131\uacfc \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4 \uc548\uc804\uc131 \ud3c9\uac00\uc758 \uc911\uc694\ud55c \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc5d0\uac8c \uc704\ud5d8\ud560 \uc218 \uc788\ub294 \ubd80\uc791\uc6a9\uc744 \uc0ac\uc804\uc5d0 \ubc1c\uacac\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c\uc640 \ubc31\uc2e0 \uac1c\ubc1c\uc758 \ud575\uc2ec\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \uc548\uc804\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uae34\uae09\ud55c \uc758\ub8cc \ud544\uc694\ub97c \ud574\uacb0\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uccb4\uc5d0\uc11c \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \ubcf5\uc7a1\ud55c \uc0c1\ud638\uc791\uc6a9\uc744 \ubd84\uc11d\ud558\ub294 \ub370 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc548\uc804\uc131 \ud3c9\uac00 \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub294 \ub9ce\uc740 \uce58\ub8cc\ubc95\uc758 \ubc1c\uc804\uc774 \uc81c\ud55c\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d\uc758 \uc548\uc804\uc131\uacfc \uc720\ud6a8\uc131\uc744 \uac80\uc99d\ud558\ub294 \ub370 \uc911\uc694\ud55c \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uac00\uc7a5 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc744 \uc704\ud574 \ud544\uc694\ud55c \uacfc\ub3c4\uae30\uc801 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubd88\uce58\ubcd1\uc758 \uce58\ub8cc \uac00\ub2a5\uc131\uc744 \ub192\uc785\ub2c8\ub2e4","\uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\ub824\uba74 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc \uac1c\ubc1c\uc774 \ud544\uc218\uc801\uc774\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc774 \uacfc\uc815\uc5d0 \uc911\uc694\ud55c \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\uc591\ud55c \uce58\ub8cc\ubc95\uc758 \ud6a8\uacfc\ub97c \ube44\uad50\ud558\uace0 \ud3c9\uac00\ud558\ub294 \ub370 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uccb4\uc5d0 \ub300\ud55c \uc911\uc694\ud55c \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4; \uc138\uacc4\ubcf4\uac74\uae30\uad6c(World Health Organization)\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\uac00 \uc778\uac04 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0\uc11c \uc0dd\ubb3c\ud559\uc801 \uae30\ucd08 \uc774\ud574\ub97c \ub192\uc774\ub294 \ub370 \uc911\uc694\ud558\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub3d5\uc2b5\ub2c8\ub2e4","\uc624\ub79c \uc2dc\uac04\uc5d0 \uac78\uccd0 \uac80\uc99d\ub41c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\ub958\uc5d0 \uc2e4\uc9c8\uc801\uc778 \uce58\ub8cc\uc81c\ub97c \uc81c\uacf5\ud558\ub294 \uc911\ucd94\uc801 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ud604 \ub2e8\uacc4\uc5d0\uc11c\ub294 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1\uc758 \ub2e4\ucc28\uc6d0\uc801 \uc5ed\ud559\uc744 \uc5f0\uad6c\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubd88\uac00\uacb0\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1\uc758 \uadfc\ubcf8 \uc6d0\uc778\uc744 \ucc3e\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud558\uc5ec \uc5bb\uc5b4\ub0b8 \uacb0\uacfc\ub294 \uc6b0\ub9ac\uc5d0\uac8c \uce58\ub8cc\uc81c\uac00 \ub420 \uac00\ub2a5\uc131 \uc788\ub294 \ubb3c\uc9c8\uc744 \uc2e0\uc18d\ud558\uac8c \uc2dd\ubcc4\ud558\ub294 \ub370 \ub3c4\uc6c0\uc744 \uc90d\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc704\ud5d8\uc744 \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4; \ubbf8\uad6d \uc2dd\ud488\uc758\uc57d\uad6d(Food and Drug Administration)\uc740 \uc0c8\ub85c\uc6b4 \uc57d\ubb3c\uc758 \ud6a8\uacfc\uc640 \uc548\uc804\uc131\uc744 \uac80\uc99d\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud544\uc218 \ub2e8\uacc4\ub85c \uaddc\uc815\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \uac80\uc99d\ud558\ub294 \ucd08\uae30 \ub2e8\uacc4\ub294 \uc0ac\ub78c\uc744 \ub300\uc0c1\uc73c\ub85c \ud55c \uc784\uc0c1 \uc2dc\ud5d8 \uc804\uc5d0 \ubc18\ub4dc\uc2dc \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c4 \ub370\uc774\ud130\ub294 \uc778\uac04 \uc784\uc0c1\uc2dc\ud5d8\uc758 \uc131\uacf5 \uac00\ub2a5\uc131\uc744 \ub192\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1\uae4c\uc9c0 \ub300\uccb4 \uae30\ubc95\ub4e4\uc774 \ud574\uacb0\ud560 \uc218 \uc5c6\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\ubb3c\ud559\uc801 \uba54\ucee4\ub2c8\uc998 \uc774\ud574\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc784\uc0c1 \uc2dc\ud5d8\uc758 \uc131\uacf5\ub960\uc744 \ub192\uc774\ub294 \ub370 \uacf5\ud5cc\ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uc740 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc5f0\uad6c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1\uae4c\uc9c0 \uc5f0\uad6c\uc758 \uc548\uc804\uc131\uacfc \uc720\ud6a8\uc131\uc744 \uac80\uc99d\ud558\ub294 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc608\uce21 \uac00\ub2a5\ud55c \uce58\ub8cc \uacb0\uacfc\ub97c \ub3c4\ucd9c\ud558\ub294 \ub370 \ub3c4\uc6c0\uc744 \uc90d\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ud658 \ubaa8\uc0ac\uc5d0 \uc788\uc5b4 \ud544\uc218\uc801\uc778 \ub3c4\uad6c\ub85c \uc0ac\uc6a9\ub429\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0\ub294 \uc2e4\uc9c8\uc801\uc778 \ub370\uc774\ud130\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uacfc\uc815 \uc774\ud574\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uacac\uacfc \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \ud575\uc2ec \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc73c\uba74 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc740 \uac70\uc758 \ubd88\uac00\ub2a5\ud574\uc9d1\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5 \ud655\uc778\uc758 \uac00\uc7a5 \ud655\uc2e4\ud55c \ubc29\ubc95 \uc911 \ud558\ub098\ub85c \uc790\ub9ac\uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc608\uce21 \ubd88\uac00\ud55c \uc778\uac04 \uc2dc\ud5d8\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4. '\uc874\uc2a4 \ud649\ud0a8\uc2a4 \uc758\uacfc\ub300\ud559'(Johns Hopkins University School of Medicine)\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\uc131\uc744 \uac15\uc870\ud558\uba70, \uc774\ub294 \uc784\uc0c1\uc2dc\ud5d8 \ub2e8\uacc4 \uc774\uc804\uc5d0 \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \uc704\ud5d8\uc744 \uc0ac\uc804\uc5d0 \ud0d0\uc9c0\ud558\uc5ec \uc778\uac04 \ub300\uc0c1 \uc2e4\ud5d8\uc758 \uc548\uc804\uc744 \ub2f4\ubcf4\ud558\ub294 \ub370 \ubc18\ub4dc\uc2dc \ud544\uc694\ud558\ub2e4\uace0 \uc5b8\uae09\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ud6a8\uacfc\ub97c \uc99d\uba85\ud558\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95\uc774 \uac1c\ubc1c\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \uc548\uc804\uc131\uc758 \ucd08\uae30 \ub2e8\uacc4\ub97c \uac80\uc99d\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \ud544\uc218 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uc9c8\ubcd1 \ud1f4\uce58\ub97c \uc704\ud55c \uc2e4\uc9c8\uc801\uc778 \uc9c4\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc838 \uc654\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \uc5f0\uad6c\uc758 \ud544\uc218\uc801 \ub2e8\uacc4\ub85c, \uc774\ub97c \ud1b5\ud574 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ubbf8\ub9ac \ud3c9\uac00\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub9e4\uc6b0 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\uae30 \uc704\ud55c \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcd1\ub9ac\ud559\uc801 \uc774\ud574\ub97c \uc99d\uc9c4\uc2dc\ud0b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uac74\uac15\uc5d0 \uc9c1\uc811\uc801\uc778 \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4; \uc790\uc5f0\uacfc\ud559\uacc4\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub294 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc784\uc744 \uac15\uc870\ud558\ub294 \uac83\uc740 \ubbf8\uad6d \uad6d\ub9bd\ubcf4\uac74\uc6d0(National Institutes of Health)\uc785\ub2c8\ub2e4","\uc2e0\uc57d \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc548\uc804\uc131 \ud14c\uc2a4\ud2b8 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc778\ub958\ub294 \uc218\ub9ce\uc740 \uce58\uba85\uc801\uc778 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uce58\ub8cc\ubc95\uc744 \ubc1c\uacac\ud588\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \ud544\uc218\uc801 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ud6a8\uacfc\ub97c \uac80\uc99d\ud558\ub294 \ub370 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc778\uac04 \uc784\uc0c1 \uc2dc\ud5d8 \uc804\uc5d0 \ubc18\ub4dc\uc2dc \uac70\uccd0\uc57c \ud560 \uc548\uc804\uc131 \uac80\uc99d \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95\uc758 \ubc1c\uc804\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud658\uc790\uc5d0\uac8c \uc2e0\uc57d\uc758 \uc548\uc815\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c \ubc0f \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \uac80\uc99d\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc758 \ud575\uc2ec\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc784\uc0c1 \uc2dc\ud5d8 \uc804\uc5d0 \uc57d\ubb3c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \ud655\uc2e4\ud558\uac8c \ud655\uc778\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1\uc758 \uc774\ud574\ub97c \ucd09\uc9c4\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uc790\ub8cc\ub294 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub192\uc774\ub294 \ub370 \ud06c\uac8c \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \ub3c4\uc6c0\uc744 \uc90d\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uccb4\uc758 \ubcf5\uc7a1\uc131\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub9ce\uc740 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uac1c\ubc1c\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\uac74\uac15\ud558\uace0 \uc548\uc804\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uc704\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud575\uc2ec \uc5ed\ud560\uc740 \ubb34\uc2dc\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \ub300\uc0c1 \uc2dc\ud5d8 \uc804 \ucd5c\uc885 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\uc131 \ubc0f \ud6a8\uacfc \uac80\uc99d\uc744 \uc704\ud55c \ucd5c\uc120\uc758 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud558\uba70 \uc548\uc804\ud55c \uce58\ub8cc\uc81c\ub97c \ube60\ub974\uac8c \uc81c\uacf5\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc778\uac04 \uc784\uc0c1 \uc2dc\ud5d8\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \uc0ac\uc804\uc5d0 \uac80\uc99d\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uadc0\uc911\ud55c \uc0dd\ubb3c\ud559\uc801 \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\ub85c \uc778\ud55c \uc778\ub958\uc758 \uac74\uac15 \uc99d\uc9c4\uc740 \ub2e4\uc591\ud55c \uc0dd\uba85\uccb4\uc758 \uc0b6\uc758 \uc9c8 \ud5a5\uc0c1\uc5d0\ub3c4 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uac10\ucd95\uc744 \uc9c0\ud5a5\ud558\uba74\uc11c\ub3c4 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\uc81c\ub97c \ubc1c\uacac\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4. '\ud30c\ub9c8\uc2dc\uc544 \ucf54\ud37c\ub808\uc774\uc158'(Pharmacia Corporation)\uc740 \uc724\ub9ac\uc801\uc778 \uc2e4\ud5d8 \uae30\uc900\uc744 \uac15\ud654\ud558\uace0 \uc788\uc73c\uba70, \uac00\ub2a5\ud55c \uacbd\uc6b0 \ub300\uccb4 \ubc29\ubc95\uc744 \ubaa8\uc0c9\ud558\uc9c0\ub9cc, \ub9ce\uc740 \uacbd\uc6b0\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uac00\uc7a5 \uc720\ud6a8\ud55c \ubc29\ubc95\uc774\ub77c\uace0 \ubcf4\uace0\ud569\ub2c8\ub2e4","\uba3c\uc800, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \ub300\uc0c1 \uc2e4\ud5d8 \uc804\uc5d0 \uc704\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1 \uce58\ub8cc\ub97c \uc704\ud55c \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c\uc758 \uc720\ud6a8\uc131\uacfc \uc548\uc804\uc131\uc744 \uac80\uc99d\ud558\uae30 \uc704\ud55c \ud544\uc218 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc9c0\uc18d\ub418\ub294 \uc774\uc720 \uc911 \ud558\ub098\ub294 \ud0d0\uad6c\ud558\ub294 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\uc131 \ub54c\ubb38\uc785\ub2c8\ub2e4","\ub2e4\uc591\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uc2e0\uc57d \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc5f0\uad6c\ud560 \ub54c \ub3d9\ubb3c \ubaa8\ub378\uc774 \uac00\uc7a5 \uc801\uc808\ud55c \ubc29\uc2dd\uc785\ub2c8\ub2e4. '\ubbf8\uad6d \uc2dd\ud488\uc758\uc57d\uad6d'(FDA)\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\uc81c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc \uac80\uc99d\uc744 \uc704\ud55c \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud55c \uba87\uba87 \uc774\uc720 \uc911 \ud558\ub098\ub85c \uae30\uc220\uc758 \ud55c\uacc4\ub97c \uba85\ud655\ud788 \uc5b8\uae09\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc0dd\uba85\uc5d0 \uc911\ub300\ud55c \uc9c8\ubcd1 \uce58\ub8cc\uc81c\uac00 \uac00\ub2a5\ud574\uc9c0\ub3c4\ub85d \ub3d5\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc758 \ubc18\uc751\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud575\uc2ec\uc801 \uc5ed\ud56 uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc778\ub958 \uac74\uac15\uc744 \uc704\ud55c \ud68d\uae30\uc801\uc778 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\uae30\uc5d4 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uc548 \uae30\uc220 \uac1c\ubc1c\uc774 \uc9c4\ud589\ub418\ub354\ub77c\ub3c4 \ud604 \uc2dc\uc810\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud658\uc790\uc5d0\uac8c \uc9c1\uc811\uc801\uc778 \uc601\ud5a5\uc744 \uc904 \uc218 \uc788\ub294 \uba85\ud655\ud55c \uacfc\ud559\uc801 \uacb0\uacfc\ub97c \uc81c\uacf5\ud558\ub294 \uac00\uc7a5 \ud604\uc2e4\uc801 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \ucc3e\uae30 \uc704\ud55c \uc5f0\uad6c\uac00 \uc9c4\ud589\ub418\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\ub098, \uc774\ub294 \uc5ec\uc804\ud788 \uc2dc\uac04\uc774 \uac78\ub9bd\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uc911\uc694\ud558\uc9c0\ub9cc, \uc544\uc9c1\uae4c\uc9c0\ub294 \uc758\ub8cc \uc9c4\ubcf4\ub97c \uc774\ub04c \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \ub300\uc548 \uae30\ubc95\uc758 \uac1c\ubc1c\uacfc \uc801\uc6a9\uc740 \uc774\ubbf8 \uc5ec\ub7ec \uae30\uad00\uc5d0\uc11c \ud65c\ubc1c\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc911\ub2e8\ud558\uba74 \uce58\ub8cc\ubc95 \uac1c\ubc1c \uc18d\ub3c4\uac00 \ud06c\uac8c \uc800\ud558\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\uc2e4\uc801\uc778 \ub300\uc548\uc774 \ubd80\uc871\ud55c \uc0c1\ud0dc\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uac00\uc7a5 \ubbff\uc744 \uc218 \uc788\ub294 \uc5f0\uad6c \ubc29\ubc95\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95\uc758 \ubd80\uc791\uc6a9\uc744 \ubbf8\ub9ac \uc2dd\ubcc4\ud558\uace0 \uad00\ub9ac\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc778\ub958\uc758 \uc9c8\ubcd1 \uce58\ub8cc\ub294 \ud604\uc7ac\uae4c\uc9c0 \ub9ce\uc740 \ubd80\ubd84 \ub3d9\ubb3c \uc5f0\uad6c\uc5d0 \uc758\uc874\ud574 \uc654\uace0, \uadf8 \uacfc\uc815\uc5d0\uc11c \ucd95\uc801\ub41c \ub370\uc774\ud130\uc640 \ub178\ud558\uc6b0\ub294 \uc0c8\ub85c\uc6b4 \uce58\ub8cc \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud1a0\ub300\uac00 \ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \ud604 \uc2dc\uc810\uc5d0\uc11c\ub294 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\uc591\ud55c \uc9c0\ud45c\uc5d0\uc11c \uc911\uc694\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\uc874\ud558\ub294 \uae30\uc220\uc740 \ub300\ubd80\ubd84\uc774 \uc778\uccb4\uc758 \uc9c8\ubcd1 \ubcf5\uc7a1\uc131\uc744 \uc644\ubcbd\ud788 \uac80\uc99d\ud558\uae30\uc5d0\ub294 \ubbf8\ud761\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc644\uc804\ud55c \ub300\uccb4\ub97c \uc774\ub8e8\uae30 \uc704\ud574\uc11c\ub294 \ub354 \ub9ce\uc740 \uc2dc\uac04\uc774 \ud544\uc694\ud558\uba70, \ud604\uc7ac\uc758 \uc911\ub300\ud55c \uc9c8\ubcd1 \uc5f0\uad6c\ub97c \ubc29\ud574\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \ub300\uc2e0\ud560 \uc218 \uc788\ub294 \ub300\uc548\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\ub2ec\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5f0\uad6c \uacb0\uacfc\ub85c \uc774\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ud601\uc2e0\uc801\uc774\uace0 \uc724\ub9ac\uc801\uc778 \uc5f0\uad6c \ubc29\ud5a5\uc744 \ubaa8\uc0c9\ud558\uba74\uc11c\ub3c4 \ub3d9\ubb3c \ubaa8\ub378\uc758 \uc911\uc694\uc131\uc740 \uc5f0\uad6c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uaddc\uc81c\uc640 \uac10\ub3c5\uc744 \ud1b5\ud574 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c4 \uacb0\uacfc\ub294 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uc5d0\ub3c4 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc774 \uc544\uc9c1 \uc644\uc804\ud788 \uc774\ub8e8\uc5b4\uc9c0\uc9c0 \uc54a\uc558\uae30\uc5d0 \ud544\uc218\uc801\uc778 \uc5f0\uad6c \uc218\ub2e8\uc73c\ub85c \uae30\ub2a5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc874\uc758 \ub3d9\ubb3c \uc2e4\ud5d8 \ub300\uccb4 \uc5f0\uad6c\ub294 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \uc644\uc804\ud788 \uc900\ube44\ub420 \ub54c\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5f0\uad6c \ub3c4\uad6c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \ud22c\uc790\uac00 \uc99d\uac00\ud558\uace0 \uc788\uc9c0\ub9cc, \uc644\uc804\ud55c \ub300\uccb4\uac00 \ub418\uae30\uae4c\uc9c0\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \ud604\uc7ac\ub85c\uc11c\ub294 \ubd88\ucda9\ubd84\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\uae30 \uc704\ud55c \uc5f0\uad6c\uac00 \uc9c0\uc18d\uc801\uc73c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub2e4\uc218\uc758 \uad6d\uc81c \uc5f0\uad6c \uae30\uad00\ub4e4\uc774 \ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub85c\ub294 \uc5ec\uc804\ud788 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc548\uc804\uc744 \ubcf4\uc7a5\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc774\ub77c\ub294 \ud604\uc2e4 \ub610\ud55c \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \ubaa8\ub378\uc740 \ud2b9\uc815 \uc9c8\ud658\uc758 \ubcd1\ub9ac\ud559\uc801 \uae30\uc804\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub9ce\uc740 \uc8fc\uc694 \uc758\ud559\uc801 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc5f0\uad6c\ub97c \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc84c\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5f0\uad6c\ub294 \uc9c0\uc18d \uac00\ub2a5\ud55c \ubc29\ubc95\uc758 \ubc1c\uc804\uc744 \uc7a5\ub824\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uac80\uc99d\ub41c \uacfc\ud559\uc801 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uc57d\ubb3c\uacfc \uce58\ub8cc\ubc95\uc758 \ubc1c\uacac\uc744 \uc774\ub04c\uc5b4 \uc654\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc77c\ubd80 \uc0dd\uba85\uc744 \uc0b4\ub9ac\uae30 \uc704\ud55c \ub354 \ud070 \ubaa9\uc801\uc744 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubd88\uac00\ud53c\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ucd94\uad6c\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uac10\uc18c\uc2dc\ud0a4\uace0\uc790 \ud558\ub294 \uacfc\ud559\uacc4\uc758 \uc758\uc9c0\ub97c \ubc18\uc601\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \ubcd1\ud589\uc740 \uc11c\ub85c\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud558\uace0 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc5f0\uad6c\ub294 \uacc4\uc18d \uc9c4\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc2e4\uc801\uc778 \uc5f0\uad6c \uc9c4\uc804 \uc18d\ub3c4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc758\ud574 \uc720\uc9c0\ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc644\uc804\ud55c \ubc29\ubc95\uc774 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uae30\uc874 \uce58\ub8cc\ubc95\uc758 \uac1c\uc120\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc6b0\ub9ac\ub294 \uc778\uac04\uc758 \uac74\uac15\uc744 \ud5a5\uc0c1\uc2dc\ud0a4\ub294 \ub370 \uc911\uc694\ud55c \ubc1c\uacac\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uae30\uc220\uc774 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\uc815 \uc9c8\ud658\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc6b0\ub9ac\uac00 \uc5bb\uc740 \uc758\ub8cc\uc801 \uc774\uc810\uc740 \uc218\ub9ce\uc740 \uc778\uba85\uad6c\uc870\ub85c \uc774\uc5b4\uc84c\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ube44\ub3d9\ubb3c \ubaa8\ub378 \uac1c\ubc1c\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc778 \uc874\uc7ac\ub85c \ud568\uaed8 \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \uc720\uc804\uc801\uc73c\ub85c, \uc0dd\ub9ac\ud559\uc801\uc73c\ub85c \uc720\uc0ac\ud55c \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uc804\uc5d0 \uc911\uc694\ud55c \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucda9\ubd84\ud55c \uc2e0\ub8b0\uc131\uc744 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc774 \ubc1c\uc804\ub418\uace0 \uc788\uc9c0\ub9cc, \uc5ec\uc804\ud788 \uae30\ubc18\uc774 \ub418\ub294 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\ub294 \ub370 \uc788\uc5b4\uc11c\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\uc2dc\uc5d0 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \ud22c\uc790\uc640 \uc5f0\uad6c\uac00 \ud65c\ubc1c\ud788 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc2e4\ud5d8 \uc870\uac74\uacfc \uc815\ud655\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559\uc801 \uc9c4\ubcf4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc904\uc5ec\uac00\uace0 \uc788\uc9c0\ub9cc \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc778 \ubd80\ubd84\uc744 \ucc28\uc9c0\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \uc2e0\ub8b0\uc131\uc744 \ub192\uc774\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc758\uc874\uc744 \uc904\uc774\uae30 \uc704\ud55c \uae00\ub85c\ubc8c \ubc0f \uacfc\ud559\uacc4\uc758 \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uce58\ub8cc\ubc95 \ud6a8\ub2a5\uc758 \ud3c9\uac00\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uc740 \ud65c\ubc1c\ud788 \uc9c4\ud589 \uc911\uc774\uba70, \uc774\ub294 \uad81\uadf9\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\uae30 \uc704\ud55c \uc911\uc694\ud55c \ubaa9\ud45c\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e4\uc81c \uc9c8\ubcd1 \uce58\ub8cc\uc5d0 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uacfc \ub3d9\ubb3c \uc2e4\ud5d8 \uac04\uc758 \uc0c1\ud638\ubcf4\uc644\uc740 \uae30\uc220 \ubc1c\uc804\uc758 \ud575\uc2ec\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220 \uac1c\ubc1c\uacfc \ub3d9\uc2dc\uc5d0 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \ub300\uccb4 \ubc29\ubc95\uc744 \uc801\uadf9\uc801\uc73c\ub85c \ud0d0\uad6c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \ubcd1\ud589 \uc5f0\uad6c\uac00 \ub354\uc6b1 \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uac10\uc18c\uc2dc\ud0ac \uc218 \uc788\uc9c0\ub9cc, \ud604\uc7ac \ud544\uc694\ud55c \uc5f0\uad6c\uc640 \uc989\uac01\uc801\uc778 \uce58\ub8cc \uac1c\ubc1c\uc744 \ud3ec\uae30\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\uc815 \uc9c8\ubcd1\uc758 \uc885\ud569\uc801\uc778 \uc774\ud574\ub97c \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc5f0\uad6c \uac1c\ubc1c\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\uc131\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc644\uc804\ud55c \ud574\ub2f5\uc744 \uc81c\uacf5\ud558\uae30 \uc804\uae4c\uc9c0\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \ucd09\uc9c4\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \uc644\uc804\ud55c \ub300\uc548\uc774 \ub418\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \ubaa8\ub378\uc740 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1\uc758 \uc774\ud574\uc640 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\ub7ec \uc9c8\ubcd1 \uce58\ub8cc\uc758 \ud601\uc2e0\uc744 \uac00\ub2a5\ud558\uac8c \ud588\uc73c\uba70 \uc774\ub294 \ud604\uc7ac \uc6b0\ub9ac\uc758 \uac74\uac15\uc744 \uc2e4\uc81c\ub85c \ud5a5\uc0c1\uc2dc\ud0a4\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\ub294 \uce58\ub8cc\ubc95 \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \uc911\uc694\ud55c \uc548\uc804\uc131\uacfc \ud6a8\ub2a5 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc624\ub79c \uae30\uac04 \uac80\uc99d\ub41c \ub3d9\ubb3c \uc2e4\ud5d8 \uacb0\uacfc\ub294 \uc758\ud559 \ubc1c\uc804\uc758 \uc911\uc694\ud55c \uacc4\uae30\uac00 \ub418\uc5b4 \uc654\uc2b5\ub2c8\ub2e4","\uc2e4\ud5d8 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\ub2ec\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\ub7ec \ub2e8\uacc4\uc758 \uac80\uc99d \uacfc\uc815\uc744 \uac70\uccd0 \uc774\ub8e8\uc5b4\uc9c0\uba70, \uc774\ub294 \uacfc\ud559\uc801 \uc5f0\uad6c\uc758 \uc2e0\ub8b0\uc131\uc744 \ub192\uc774\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e4\uc9c8\uc801\uc778 \uac74\uac15 \uac1c\uc120\uacfc \uc0dd\uba85 \uc5f0\uc7a5\uc744 \uac00\ub2a5\ucf00 \ud588\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc644\ubcbd\ud55c \ubc29\ubc95\uc740 \uc544\uc9c1 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \ub3d9\uc2dc\uc5d0 \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub
