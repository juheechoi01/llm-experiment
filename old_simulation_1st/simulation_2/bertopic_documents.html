b4\ub835\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc5f0\uad6c \ubc29\ubc95\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc0dd\uba85 \uc724\ub9ac\uc640 \ub300\uccb4 \ubc29\ubc95\uc758 \ubaa8\uc0c9\uc774 \uc911\uc694\ud558\ub2e4\uace0\ub294 \ud558\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ubcf5\uc7a1\ud55c \uc7a5\uae30 \uc2dc\uc2a4\ud15c\uc744 \uac00\uc9c4 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc720\uc77c\ud558\uac8c \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4. '\ubbf8\uad6d \uad6d\ub9bd \ubcf4\uac74\uc6d0'(National Institutes of Health)\uc740 \ud604\uc7ac \uae30\uc220\ub85c\ub294 \uc644\ubcbd\ud55c \ub300\uccb4 \uc2dc\ud5d8\uc774 \uc5c6\uc73c\uba70, \ub3d9\ubb3c \ubaa8\ub378\uc774 \uc0dd\uccb4 \ud658\uacbd\uacfc \uac19\uc740 \ubcf5\uc7a1\ud55c \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub294 \ub370 \uc720\ub9ac\ud558\ub2e4\ub294 \uc810\uc744 \uac15\uc870\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \uacfc\ud559\uc801\uc73c\ub85c \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uacfc\ud559\uacfc \uae30\uc220 \ubc1c\uc804\uc758 \uc18d\ub3c4\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4 \uae30\uc220\uc774 \ub530\ub77c\uc7a1\uc9c0 \ubabb\ud55c \uad6c\uccb4\uc801\uc774\uace0 \uc2e4\uc9c8\uc801\uc778 \uac80\uc99d \ubc29\ubc95\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uae30\uc220\uc758 \uc720\ud6a8\uc131\uc744 \ud3c9\uac00\ud558\uace0 \uac80\uc99d\ud558\ub294 \uae30\uc900\uc810\uc73c\ub85c\ub3c4 \ud65c\uc6a9\ub429\ub2c8\ub2e4","\uc778\uacf5 \uc7a5\uae30\ub098 \uc138\ud3ec \uae30\ubc18 \uc2e4\ud5d8\uc740 \uc544\uc9c1 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ud658\uacbd\uc744 \uc644\ubcbd\ud788 \ubaa8\ubc29\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc778\uacf5 \uc7a5\uae30\ub098 \uc138\ud3ec \uae30\ubc18 \uc2e4\ud5d8\uc740 \uc544\uc9c1 \uc790\uc5f0 \uc0dd\ubb3c\ud559\uc801 \ub9e5\ub77d\uc744 \uc644\uc804\ud558\uac8c \uad6c\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ucda9\ubd84\ud55c \uc2e0\ub8b0\uc131\uc744 \uac16\uc9c0 \ubabb\ud558\uace0 \uc788\uc73c\uba70, \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uadf8\ub7ec\ub098 \uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc5ec\uc804\ud788 \ub9e4\uc6b0 \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \ubc1c\uacac\uc740 \ub2e4\ub978 \ub300\uccb4 \ubc29\ubc95\uc5d0\uc11c\ub3c4 \uad6c\ud604\ud560 \uc218 \uc788\ub3c4\ub85d \uae38\uc744 \ub2e6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc720\uc804\uc790 \ubc0f \uc138\ud3ec\ub97c \uc0ac\uc6a9\ud558\ub294 \uc2e4\ud5d8\uc5d0\ub294 \uc544\uc9c1 \ud574\uacb0\ub418\uc5b4\uc57c \ud560 \ud55c\uacc4\uc810\uc774 \ub9ce\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uae30\uc220\uc774 \ub3c4\uc785\ub418\uae30\uae4c\uc9c0\ub294 \uacfc\ub3c4\uae30\uc801 \ud574\uacb0\ucc45\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc73c\ub85c\ub294 \uc124\uba85\ud560 \uc218 \uc5c6\ub294 \ubcf5\uc7a1\ud55c \uc778\uccb4 \ubc18\uc751\uc744 \ubaa8\ubc29\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub300\ubd80\ubd84\uc758 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\ubcf4\ub2e4 \ub192\uc740 \uc815\ud655\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \uc2e0\ub8b0\uc131\uc774 \uc5c6\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c\uac00 \uc810\ucc28 \uc724\ub9ac\uc801\uc774\uace0 \ud601\uc2e0\uc801\uc73c\ub85c \ubc1c\uc804\ud558\ub3c4\ub85d \uc0c8\ub85c\uc6b4 \uc790\uc6d0\uc774 \ud22c\uc785\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc9c0\uc18d\uc801\uc778 \uacfc\ub3c4\uae30 \ub178\ub825\uc758 \uc77c\ud658\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ucd5c\ucca8\ub2e8 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \ubaa8\ub378\uc740 \uc5ec\uc804\ud788 \uc5f0\uad6c\uc758 \uae30\ucd08\uc801\uc774\uace0 \ud544\uc218\uc801\uc778 \ubd80\ubd84\uc744 \ub2f4\ub2f9\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc778\uacf5\uc9c0\ub2a5\uacfc \uc904\uae30\uc138\ud3ec \uae30\uc220\uc740 \uc544\uc9c1 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ucd95\uc18c\ub97c \ucd94\uad6c\ud558\ub294 \ub3d9\uc2dc\uc5d0, \ud655\uc2e4\ud558\uace0 \uac80\uc99d\ub41c \ub300\uccb4 \uae30\uc220\uc774 \uc544\uc9c1 \ubaa8\ub4e0 \uc5f0\uad6c \uc694\uad6c\ub97c \ucda9\uc871\ud558\uc9c0 \ubabb\ud558\ub294 \ud604\uc2e4\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc815\ucc45\uc801 \uc9c0\uc6d0\uacfc \uc5f0\uad6c \ud658\uacbd \uac1c\uc120\uc740 \ub300\uc548 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uae30\uc220\uc774 \ubc1c\uc804\ud568\uc5d0 \ub530\ub77c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcd1\ud589\ub418\uc5b4 \uac1c\ubc1c\uc758 \uc2e0\ub8b0\uc131\uc744 \ub192\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ucca8\ub2e8 \uae30\uc220\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc73c\ub85c \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ube44\ub85d \uc0dd\uba85 \uc724\ub9ac\uac00 \uc911\uc694\ud558\ub2e4 \ud558\ub354\ub77c\ub3c4, \ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ube44\ub85d \uc724\ub9ac\uc801\uc778 \ub17c\ub780\uc774 \uc788\uc744 \uc218 \uc788\uc9c0\ub9cc, \ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc740 \uc0c1\ud669\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uc5f0\uad6c\uc5d0 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc0c8\ub85c \uac1c\ubc1c\ub41c \ub300\uccb4 \ubc29\ubc95\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ubcd1\ud589\ud558\uc5ec \ucda9\ubd84\ud55c \uac80\uc99d\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uba3c\uc800, \ud604\uc7ac\uc758 \ube44\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\ub9ac\ud559\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \ubc18\uc601\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc778\uac04 \uc911\uc2ec\uc758 \uc5f0\uad6c\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\ub978 \uc5f0\uad6c \ubc29\ubc95\uc73c\ub85c \ub300\uccb4\ud558\uae30 \uc5b4\ub824\uc6b4 \uc7a5\uc810\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc758 \uc7a0\uc7ac\uc131\uc740 \uc778\uc815\ud558\uc9c0\ub9cc, \uadf8 \uc18d\ub3c4\uac00 \ud658\uc790\uc758 \uae34\uae09\ud55c \ud544\uc694\ub97c \ub530\ub77c\uc7a1\uae30\uc5d0\ub294 \ubd80\uc871\ud569\ub2c8\ub2e4","\ud604\uc7ac\uc758 \uc5f0\uad6c \ud658\uacbd\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc815\ud655\uc131\uacfc \uc2e0\ub8b0\uc131\uc5d0 \uc758\ud574 \ub9ce\uc740 \uc758\ud559\uc801 \ub3cc\ud30c\uad6c\uac00 \ub9c8\ub828\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ub300\uc548\uc801 \ubc29\ubc95\uc5d0 \ub300\ud55c \ud1b5\ucc30\uc744 \uc5bb\uc2b5\ub2c8\ub2e4; \ub9c9\uc2a4 \ud50c\ub791\ud06c \uc5f0\uad6c\uc18c(Max Planck Institute)\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uc9c0\uc2dd\uc744 \ubc14\ud0d5\uc73c\ub85c \ub300\uc548\uc801 \uc2e4\ud5d8 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \uae30\uc5ec\ud558\uace0 \uc788\uc74c\uc744 \uac15\uc870\ud569\ub2c8\ub2e4","\uc2e0\uc57d \uac1c\ubc1c\uc5d0\ub294 \uc778\uccb4\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc788\ub294 \ub300\uccb4 \ubc29\ubc95\uc774 \ubd80\uc871\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ub370\uc774\ud130\uc640 \uc608\uce21 \uac00\ub2a5\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub3c5\ud2b9\ud55c \uac00\uce58\ub294 \ud604\uc7ac \ub300\uccb4 \uae30\uc220\ub85c\ub294 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4 \ubc29\ubc95\uc774 \ub3d9\ubb3c \ubaa8\ub378\uc758 \ubcf5\uc7a1\ud55c \uc0dd\uba85 \ud604\uc0c1\uc744 \uc644\ubcbd\ud788 \ubaa8\ubc29\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc774 \ubc1c\uc804\ud558\uba74\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ub2e4\ub978 \ubc29\ubc95\ub4e4\uc774 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ube44\ub85d \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc720\uc77c\ubb34\uc774\ud55c \uc9c8\ubcd1 \uce58\ub8cc \uac1c\ubc1c \uc5f0\uad6c \ubc29\uc2dd\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub294 \ub9e4\uc6b0 \uc911\uc694\ud558\uace0 \ub300\uccb4 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \ub300\uccb4 \uae30\uc220\ub3c4 \uc724\ub9ac\uc801 \ub3c4\uc804\uc5d0 \uc9c1\uba74\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559\uc801 \ud601\uc2e0\uc740 \ub300\uccb4 \uae30\uc220\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc870\ud654\ub85c\uc6b4 \ubc1c\uc804\uc744 \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4. '\uc720\ub7fd \uc758\uc57d\ud488\uccad (EMA)'\uc740 \ucc28\uc138\ub300 \uc5f0\uad6c\uc5d0\uc11c \ub300\uccb4 \ubc29\ubc95\uacfc \ub3d9\ubb3c \uc2e4\ud5d8 \uac04\uc758 \uc0c1\ud638 \ubcf4\uc644\uc801 \uc811\uadfc\uc758 \ud544\uc694\uc131\uc744 \uc778\uc2dd\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uc0c8\ub85c\uc6b4 \uae30\uc220\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc785\ub2c8\ub2e4","\ubaa8\ub4e0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud56d\uc0c1 \uc644\ubcbd\ud55c \uac83\uc740 \uc544\ub2c8\uc9c0\ub9cc, \ub2e4\ub978 \ubc29\ubc95\uc73c\ub85c\ub294 \uc5bb\uae30 \uc5b4\ub824\uc6b4 \uacb0\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uadf8\ub7ec\ub098 \ud604 \uc2dc\uc810\uc5d0\uc11c \ub300\uccb4 \ubc29\ubc95\ub9cc\uc73c\ub85c \uc804\ud658\ud558\ub294 \uac83\uc740 \uc5f0\uad6c\uc758 \uc815\ud655\uc131\uacfc \uc548\uc804\uc131\uc744 \ub2f4\ubcf4\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\uae30 \uc704\ud55c \ub300\uccb4 \uae30\uc220 \uc5f0\uad6c\ub3c4 \ubcd1\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc815\ud655\ud55c \uc0dd\ub9ac\ud559\uc801 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uae30\uc220\uc774 \uc644\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \uc774\ub974\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\ud601\uc2e0\uc801\uc778 \ub300\uc548 \uac1c\ubc1c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud604\uc7a5\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4; \ubbf8\uad6d \uc554 \uc5f0\uad6c \ud611\ud68c(American Association for Cancer Research)\ub294 \ub3d9\ubb3c \uc2e4\ud5d8 \ub370\uc774\ud130\uac00 \uc2e0\uc57d \uac1c\ubc1c \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc5ed\ud560\uc744 \ud55c\ub2e4\uace0 \ubcf4\uace0\ud569\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub2e4\ub978 \ub300\uc548\uc774 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \uacfc\ud559\uc801 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \uc874\uc7ac\ud558\ub354\ub77c\ub3c4, \uc774\uac83\ub4e4\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \uac80\uc99d\ub418\uc9c0 \uc54a\uc544 \ub300\uaddc\ubaa8\ub85c \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \uc801\uc6a9\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uae30\uc220\uc774 \uc544\uc9c1 \ubaa8\ub4e0 \uc5f0\uad6c \uc694\uad6c\ub97c \ucda9\uc871\ud560 \ub9cc\ud07c \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc74c\uc744 \ubcf4\uc5ec\uc90d\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc804\uc784\uc0c1 \uc5f0\uad6c\uc5d0\uc11c \uc5c6\uc5b4\uc11c\ub294 \uc548 \ub420 \uc694\uc18c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud53c\ud558\ub294 \uac83\uc774 \uc724\ub9ac\uc801\uc73c\ub85c \uc633\ub2e4\uace0 \ud560\uc9c0\ub77c\ub3c4, \ud604\uc7ac \uae30\uc220 \uc218\uc900\uc5d0\uc11c\ub294 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub9cc\uc73c\ub85c\ub294 \ubd88\ucda9\ubd84\ud55c \uacb0\uacfc\ub97c \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc778\uacf5\uc9c0\ub2a5 \uc2dc\ubbac\ub808\uc774\uc158\uacfc \uac19\uc740 \ub300\uc548 \ubc29\ubc95\ub4e4\uc740 \ud604\uc7ac \uc2e0\ub8b0\uc131\uacfc \uc608\uce21\ub825\uc5d0 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uaddc\uc81c\ub294 \uad6d\uc81c\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc73c\uba70, \uc5f0\uad6c\uc758 \ud22c\uba85\uc131\uc744 \ub354\uc6b1 \ub192\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc9c0\uc18d\uc801\uc778 \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uacfc \ud568\uaed8 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc810\uc9c4\uc801\uc73c\ub85c \uc904\uc774\ub294 \ub178\ub825\uc740 \ubc18\ub4dc\uc2dc \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4. \"\ubbf8\uad6d \uacfc\ud559 \uc7ac\ub2e8(NSF)\"\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220 \uac1c\ubc1c\uc5d0 \uc0c1\ub2f9\ud55c \uc790\uae08\uc744 \uc9c0\uc6d0\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc55e\uc73c\ub85c\uc758 \uacfc\ud559\uc801 \ubc1c\uc804 \ubc29\ud5a5\uc744 \uc81c\uc2dc\ud55c\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\ube44\ub85d \uc724\ub9ac\uc801 \uad00\uc810\uc5d0\uc11c \ub17c\ub780\uc758 \uc5ec\uc9c0\uac00 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uc804\uacfc \uc9c8\ubcd1 \uce58\ub8cc\uc5d0 \uae30\uc5ec\ud568\uc73c\ub85c\uc368 \uc778\ub958 \uc804\uccb4\uc758 \ubcf5\uc9c0\ub97c \uc99d\uc9c4\uc2dc\ud0a4\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\uba3c\uc800, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uae30\uc220\uc758 \ud55c\uacc4\uac00 \uc788\uc744 \ub54c \uaf2d \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc644\uc804\ud788 \ub300\uccb4\ub420 \uc218 \uc5c6\ub294 \ud2b9\uc218\ud55c \uc0dd\ubb3c\ud559\uc801 \uc774\ud574\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacc4\uc18d\ud574\uc11c \uc0c8\ub85c\uc6b4 \ub300\uc548\uc744 \ubaa8\uc0c9\ud558\uba70 \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804 \uc911\uc5d0\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud3ec\uad04\uc801 \uc5f0\uad6c\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uadf8\ub7ec\ud55c \ub300\uccb4 \uae30\uc220\uc774 \uc644\uc804\ud788 \uc790\ub9ac \uc7a1\uae30 \uc804\uae4c\uc9c0\ub294 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub300\uc548\uc801 \uc5f0\uad6c \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\ubcbd\ud788 \ub300\uccb4\ud560 \ub9cc\ud07c \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \uae30\uc220\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801 \uad00\uacc4\ub97c \uc774\ub8f9\ub2c8\ub2e4","\uadf8\ub7ec\ub098 \uc7a5\uae30\uc801\uc778 \ud601\uc2e0\uc744 \uc704\ud574 \uc0c8\ub85c\uc6b4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \uc9d1\uc911 \ud22c\uc790\ub294 \ud544\uc694\ud569\ub2c8\ub2e4","\uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc704\ud574\uc11c\ub294 \uc544\uc9c1 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ud604\uc7ac \uacfc\ud559\uacc4\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud560 \uc218 \uc788\ub294 \ud601\uc2e0\uc801\uc774\uace0 \ub300\uccb4\uc801\uc778 \ubc29\ubc95\ub4e4\uc744 \uac1c\ubc1c\ud558\uae30 \uc704\ud574 \ub9ce\uc740 \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ube44\ub3d9\ubb3c \uae30\ubc18 \uae30\uc220\uc740 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc0c8\ub85c\uc6b4 \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uacfc \uac80\uc99d \ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uacbd\uc6b0 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub300\uc548\uc801 \ubc29\ubc95\ub4e4\uc774 \uc544\uc9c1 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4; \uc601\uad6d\uc758 \ubbf8\uc0dd\ubb3c\ud559\ud68c(Microbiology Society)\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud604\uc7ac\ub85c\uc11c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc5f0\uad6c\ud558\uae30\uc5d0 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95 \uc911 \ud558\ub098\ub77c\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uc0dd\uba85\uacfc\ud559 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub294 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \uae30\uc220\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uade0\ud615 \uc7a1\ud78c \ud22c\uc790\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc624\uac00\ub178\uc774\ub4dc \uae30\uc220\uc740 \uc8fc\ub85c \ub2e8\uc77c \uc870\uc9c1 \uc218\uc900\uc758 \uc2e4\ud5d8\uc5d0 \uc81c\ud55c\ub429\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc900\ube44\ub418\uc5b4 \uc788\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uad81\uadf9\uc801\uc73c\ub85c \ub2e4\uc591\ud55c \ubc29\ubc95\uacfc \uae30\uc220\uc744 \ubcd1\ud589\ud558\uae30 \uc704\ud55c \ub354 \ub9ce\uc740 \uc5f0\uad6c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uae30\uc220\uc774 \ubaa8\ub4e0 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc644\ubcbd\ud55c \ud574\ub2f5\uc744 \uc81c\uacf5\ud558\uc9c0\ub294 \ubabb\ud569\ub2c8\ub2e4","\ud604\ub300 \uae30\uc220\ub85c \uc544\uc9c1 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubcf5\ud569\uc131\uc744 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uadf8\ub9ac\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\uae30 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ub300\uccb4 \uae30\uc220 \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\ub098, \uadf8 \ud6a8\uacfc\ub97c \uac80\uc99d\ud558\uace0 \uc801\uc6a9\ud558\ub294 \ub370\uc5d0\ub294 \uc5ec\uc804\ud788 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc0b0\uc5c5\uacfc \uacfc\ud559\uacc4\uc758 \ud611\ub825\uc740 \ud601\uc2e0\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc744 \uac1c\ubc1c\ud560 \uc218 \uc788\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud604\uc7ac \ud544\uc694\uc131\uc744 \uc778\uc815\ud558\uba74\uc11c\ub3c4, \uc9c0\uc18d\uc801\uc778 \uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc810\ucc28 \uc904\uc5ec\ub098\uac00\ub294 \ub178\ub825\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc73c\uba74 \ub9ce\uc740 \ubd80\ubd84\uc5d0\uc11c \uc5f0\uad6c\uac00 \uc904\uc5b4\ub4e4 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc778 \uad00\uacc4\uc5d0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc73c\ub85c\ub294 \uc544\uc9c1 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ud5a5\ud6c4 \ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud568\uc5d0 \ub530\ub77c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc774 \uc904\uc5b4\ub4e4 \uac00\ub2a5\uc131\uc740 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \uac1c\ubc1c\uc740 \uc911\uc694\ud55c \uacfc\uc81c\uc774\uc9c0\ub9cc, \ud604 \uc2dc\uc810\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc8fc\ub294 \ub370\uc774\ud130\ub97c \uc989\uac01\uc801\uc73c\ub85c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \ub300\uaddc\ubaa8 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc5d0 \ub300\ud55c \ud22c\uc790\ub294 \uacc4\uc18d \uc99d\uac00\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uc548\uc801 \uc5f0\uad6c \ubc29\ubc95\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\uba70 \uc810\ucc28 \uadf8 \ube44\uc911\uc744 \ub354\ud574\uac00\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uacfc \ud1b5\ud569\ub418\uc5b4 \uc904\uc5b4\ub4e4\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ud604\uc7ac\uae4c\uc9c0\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \uc644\uc804\ud55c \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ubcf4\uc7a5\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uc815\ucc45\uc801 \ubcc0\ud654\uc640 \uc0ac\ud68c\uc801 \ub178\ub825\uc740 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \ub354\uc6b1 \ucd09\uc9c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc9c0\uc18d\ud574\uc11c \uc9c4\ud589\ub418\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c \uc774\ub4e4\uc774 \ubaa8\ub4e0 \uc5f0\uad6c\uc5d0 \uc801\uc6a9\ub420 \uc218 \uc788\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \ub3c5\ubcf4\uc801\uc778 \uc5f0\uad6c \uc218\ub2e8\uc73c\ub85c \uc778\uc815\ubc1b\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uacfc\ud559\uc801 \uc815\ud655\uc131\uc5d0\uc11c \ud55c\uacc4\ub97c \ubcf4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \ub17c\ub780\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc5f0\uad6c \ub3c4\uad6c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uae30 \uc704\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \uc694\uad6c\ub97c \ucda9\uc871\uc2dc\ud0a4\uae30\uc5d0\ub294 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc644\uc804\ud55c \ub300\uccb4\ub294 \uc544\uc9c1 \uc2e4\ud604 \uac00\ub2a5\ud558\uc9c0 \uc54a\uc73c\uba70, \uc2e0\uc57d \uac1c\ubc1c\uc5d0\ub294 \ud544\uc218\uc801\uc778 \uc694\uc18c\uc785\ub2c8\ub2e4","\ub300\uc548\uc801 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \ub9ce\uc740 \uac00\ub2a5\uc131\uc744 \uc81c\uc2dc\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \ud544\uc694 \ubd88\uac00\uacb0\ud55c \ub2e8\uacc4\uc784\uc744 \ubcf4\uc5ec\uc90d\ub2c8\ub2e4","\ub354\ubd88\uc5b4, \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \uc5f0\uad6c\ud558\ub294 \uacfc\uc815 \uc790\uccb4\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc5bb\uc5b4\uc9c4 \ub370\uc774\ud130\uc5d0 \uc758\uc874\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uacfc \ubcd1\ud589\ud558\uc5ec \uc810\ucc28 \uadf8 \ud544\uc694\uc131\uc744 \uc904\uc5ec\uac00\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uae30\uc220\uc740 \uc77c\ubd80 \ubd84\uc57c\uc5d0\uc11c \ubc1c\uc804 \uc911\uc774\uc9c0\ub9cc, \ub9e4\uc6b0 \ubcf5\uc7a1\ud55c \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0\uc11c\ub294 \uc5ec\uc804\ud788 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc740 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc73c\uba70, \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc81c\uc57d \uc5f0\uad6c \uae30\uad00\ub4e4\uc740 \uc810\ucc28 \ub300\uccb4 \ubc29\ubc95\uc744 \ud1b5\ud569\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \uae30\uc220\uc740 \ub3d9\ubb3c \ubaa8\ub378\uc774 \uc81c\uacf5\ud558\ub294 \ubaa8\ub4e0 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801, \uc57d\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c \uc724\ub9ac\uc640 \ub300\uc548 \uae30\uc220\uc740 \ub04a\uc784\uc5c6\uc774 \ubc1c\uc804\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc5f0\uad6c \uc218\ub2e8\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\ub978 \ubc29\ubc95\uc73c\ub85c \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc815\ud655\ud55c \uacb0\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc904\uc774\uae30 \uc704\ud55c \ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c\uc640 \ud22c\uc790\ub294 \uc810\ucc28 \uc99d\uac00\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc740 \ube60\ub974\uac8c \uc9c4\ud589\ub418\uace0 \uc788\uc73c\ub098, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \ub9cc\ud07c \ucda9\ubd84\ud788 \ub9ce\uace0 \ub2e4\uc591\ud55c \uc9c8\ud658\uc5d0 \ub300\ud574 \uc5f0\uad6c\ud560 \uc218 \uc788\ub294 \uc0c1\ud0dc\ub294 \uc544\ub2d9\ub2c8\ub2e4","\ub2e4\ubc29\uba74\uc73c\ub85c \uc0ac\uc6a9 \uac00\ub2a5\ud55c \ub300\uccb4 \ubc29\ubc95\uc758 \uc815\ud655\uc131\uacfc \ud3ec\uad04\uc131\uc740 \uc5ec\uc804\ud788 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc815\ud655\uc131\uacfc \uc2e0\ub8b0\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\uc778\uacf5 \uc9c0\ub2a5 \ubc0f \ubc30\uc591 \uc870\uc9c1 \ub4f1\uc758 \uae30\uc220\uc740 \ubcf4\uc870\uc801\uc778 \uc5ed\ud560\ub85c\uc368 \ud604\uc7ac\uc758 \uc5f0\uad6c\ub97c \uc9c0\uc6d0\ud558\uace0 \uc788\uc9c0\ub9cc, \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\ub294 \ud55c\uacc4\ub97c \uac00\uc9d1\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uac00\ub2a5\ud55c \ubc29\ubc95\uc774 \uc544\uc9c1 \ubd80\uc871\ud569\ub2c8\ub2e4","\ud604\uc7ac\ub85c\uc11c \ub300\ubd80\ubd84\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uc0ac\uc6a9\uc740 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \ud544\uc694\uc131\uc774 \uc788\uc744 \ub54c\uc5d0\ub9cc \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ub300\uccb4 \uae30\uc220\uc740 \uc911\uc694\ud55c \ubcf4\uc644 \uc5ed\ud560\uc744 \ud558\uba74\uc11c\ub3c4 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uae30\uc5d0\ub294 \ubd80\uc871\ud569\ub2c8\ub2e4","\ud601\uc2e0\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\ub3c4 \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\ub9cc\uc73c\ub85c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub3c4 \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \ubaa8\ubc29\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \ub300\uc548 \ubc29\ubc95\uc73c\ub85c\ub294 \uc81c\uacf5\ud558\uae30 \uc5b4\ub824\uc6b4 \ud544\uc218\uc801\uc778 \uc2e0\ub8b0\uc131\uacfc \uc815\ud655\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc774 \uac1c\ubc1c\ub418\uace0\ub294 \uc788\uc9c0\ub9cc, \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc644\uc804\ud788 \ubc18\uc601\ud558\uc9c0\ub294 \ubabb\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc740 \uc6b0\ub9ac\uac00 \uac00\ub2a5\ud55c \ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\ub824\ub294 \ubaa9\ud45c\ub97c \uc9c0\ud5a5\ud569\ub2c8\ub2e4","\ub9ce\uc740 \uacfc\ud559\uc790\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uae30\uc220\uc774 \uc544\uc9c1 \uc644\uc804\ud558\uc9c0 \uc54a\ub2e4\uace0 \ud655\uace0\ud788 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc778\uccb4\uc758 \ud2b9\uc815 \ubc18\uc751\uc744 \ubd84\uc11d\ud558\uae30 \uc5b4\ub824\uc6b4 \uacbd\uc6b0\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub354 \uac15\ub825\ud55c \ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \uc0c1\ud638\ubcf4\uc644\uc801\uc778 \uad00\uacc4\uc5d0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \uae30\uc900\uc810 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\ub978 \ub300\uccb4 \ubc29\ubc95\uc73c\ub85c\ub294 \uc5bb\uc744 \uc218 \uc5c6\ub294 \ud544\uc218\uc801\uc778 \uc0dd\uccb4 \ubc18\uc751\uc5d0 \ub300\ud55c \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc774 \ub418\uae30\uae4c\uc9c0\ub294 \uc2dc\uac04\uc774 \uc18c\uc694\ub429\ub2c8\ub2e4","\ub300\uc548\uc801 \ubc29\ubc95\uc774 \uc99d\uac00\ud558\uace0 \uc788\uc9c0\ub9cc \uc544\uc9c1 \ubd88\ucda9\ubd84\ud569\ub2c8\ub2e4; \ubbf8\uad6d \ubc14\uc774\uc624\uc0b0\uc5c5\ud611\ud68c(Biotechnology Innovation Organization)\ub294 \ub300\uc548\uc801 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc774 \uc874\uc7ac\ud558\uc9c0\ub9cc, \ud2b9\uc815 \uc0dd\ub9ac\uc801 \ubc18\uc751 \uc5f0\uad6c\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc9c0\uc801\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \uc815\ud655\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub300\uc548 \uc5f0\uad6c \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \uc810\uc9c4\uc801\uc778 \uacfc\uc815\uc744 \uc694\uad6c\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uc548\uc801 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\ub2ec\ub418\uc9c0 \uc54a\uc558\uae30 \ub54c\ubb38\uc5d0 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc608\uce21\ubd88\uac00\ub2a5\ud55c \ubb38\uc81c\uc810\uc744 \ubbf8\ub9ac \uc2dd\ubcc4\ud558\ub294 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ud604\ub300 \uae30\uc220\uc744 \ud1b5\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\uace0\uc790 \ud558\ub294 \ub178\ub825\uc774 \uc788\ub354\ub77c\ub3c4, \uadf8\uac83\uc774 \uc644\uc804\ud788 \uc131\uc219\ub418\uae30 \uc804\uae4c\uc9c0\ub294 \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uc57d\ubb3c \uac1c\ubc1c\uc744 \uc704\ud55c \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2f9\ubd84\uac04 \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc758 \ubcd1\ud589\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc6b0\uc218\ud55c \uacfc\ud559\uc801 \uc815\ud655\uc131\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc740 \uc5ec\uc804\ud788 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\uae30\uc220\uc758 \ubc1c\uc804\uc774 \ube60\ub974\ub2e4\ub294 \uc810\uc740 \uae0d\uc815\uc801\uc774\uc9c0\ub9cc, \uc644\uc804\ud55c \ub300\uccb4\uac00 \uc774\ub8e8\uc5b4\uc9c8 \ub54c\uae4c\uc9c0\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc5f0\uad6c\ub294 \uc544\uc9c1 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \ubc29\ubc95\uc758 \ud558\ub098\ub85c \uc790\ub9ac \uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc774 \uc5c6\ub294 \uacbd\uc6b0 \uc720\uc77c\ud55c \uc635\uc158\uc785\ub2c8\ub2e4","\uc9c0\uc18d\uc801\uc778 \ud601\uc2e0\uc744 \uc704\ud55c \ub3d9\ub825\uc740 \uc788\uc73c\uba70, \uc774\ub97c \ud1b5\ud574 \uc7a5\uae30\uc801\uc73c\ub85c \ub300\uccb4 \ubc29\ubc95\uc744 \ucc3e\uace0\uc790 \ud558\ub294 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc0dd\ud65c \ud658\uacbd\uacfc \uac19\uc740 \ubcf5\ud569 \uc694\uc778\uc5d0 \ub300\ud55c \uc774\ud574\ub294 \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uac00\uc7a5 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ube44\ub3d9\ubb3c\uc801 \ub300\uc548 \uc5f0\uad6c \uc5ed\uc2dc \uc9c0\uc6d0\ub418\uace0 \uc788\uc9c0\ub9cc, \uc2e0\uc57d \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \ud2b9\uc815 \uacb0\uacfc\ub4e4\uc740 \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc73c\ub85c\ub9cc \uc5bb\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uc548\uc801 \uc5f0\uad6c \ubc29\ubc95\ub3c4 \ud568\uaed8 \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc740 \uc7a5\uae30\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8 \uc758\uc874\ub3c4\ub97c \uc904\uc77c \uac00\ub2a5\uc131\uc744 \uc5f4\uc5b4\uc8fc\uace0 \uc788\uc9c0\ub9cc, \uc989\uac01\uc801\uc778 \ub300\uccb4\ub294 \ud604\uc2e4\uc801\uc774\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc758 \ubc1c\uc804\uc744 \ud1b5\ud55c \ub300\uc548 \uc81c\uc2dc\ub294 \uac00\uce58\uac00 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc774\ub4e4\uc744 \ubcf4\uc644\uc801\uc778 \ub3c4\uad6c\ub85c \uc0ac\uc6a9\ud558\ub294 \uac83\uc774 \ud604\uc2e4\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc2e4\ud5d8\uc801 \uae30\ubc18\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ub300\uccb4 \uae30\uc220\ub85c\ub294 \uc0b4\uc544\uc788\ub294 \uc0dd\ubb3c\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud558\uac8c \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uc0c8\ub85c\uc6b4 \uc5f0\uad6c \ubc29\ubc95 \uac04\uc758 \uade0\ud615 \uc788\ub294 \ubc1c\uc804\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub300\uc548\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc544\uc9c1 \uc644\uc804\ud55c \ub300\uccb4 \uc218\ub2e8\uc774 \ub418\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uac00\uc7a5 \ud3ec\uad04\uc801\uc778 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc73c\ub85c \ubd80\uc871\ud55c \ubd80\ubd84\uc744 \ubcf4\uc644\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uc548 \uae30\ubc95\uc758 \uac1c\ubc1c\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95\uc744 \uc801\uadf9\uc801\uc73c\ub85c \ud0d0\uad6c\ud558\uace0 \uac1c\ubc1c\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc785\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc9c0\uc18d\ud558\uba74\uc11c \uc810\uc9c4\uc801\uc73c\ub85c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uc744 \ub192\uc774\ub294 \ub178\ub825\uc774 \uc694\uad6c\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc544\ub2cc \ub300\uccb4 \uc5f0\uad6c\ubc95\uc740 \uc7a5\uae30\uc801\uc774\uba74\uc11c\ub3c4 \ube44\uc6a9\uc774 \ub9ce\uc774 \ub4e4\uba70, \uc644\uc804\ud788 \uac80\uc99d\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95\uc758 \ud6a8\uacfc\uc131 \ud3c9\uac00\uc5d0\ub3c4 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc77c\ubd80 \ub300\uccb4 \uae30\uc220\uc774 \ubd80\uc871\ud55c \ud604\uc7ac \uc0c1\ud669\uc5d0\uc11c \uc720\uc77c\ud55c \uc5f0\uad6c \ubc29\ubc95 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc810\uc810 \ub354 \uc911\uc694\ud55c \uc5f0\uad6c \ubd84\uc57c\ub85c \ubd80\uc0c1\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ud65c\uc6a9\ub418\ub294 \ubaa8\ub4e0 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc73c\ub85c \uc0ac\uc6a9\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc2e0\uae30\uc220\uacfc\uc758 \ud1b5\ud569\uc744 \ud1b5\ud55c \uc810\uc9c4\uc801 \uc808\uac10\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub300\uccb4 \uae30\uc220\ub85c\ub294 \ubd88\uac00\ub2a5\ud55c \uc804\uccb4\uc801 \uc0dd\uccb4 \ubc18\uc751\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uba3c\uc800, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud56d\uc0c1 \uc778\uac04\uc5d0\uac8c \uc9c1\uc811\uc801\uc73c\ub85c \uc801\uc6a9\ub418\ub294 \uacb0\uacfc\ub97c \ubcf4\uc7a5\ud558\uc9c0\ub294 \uc54a\uc9c0\ub9cc, \ub2e4\ub978 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ub3d9\ub4f1\ud55c \ucc99\ub3c4\uac00 \ub420 \uc218 \uc5c6\ub294 \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\ube44\ub3d9\ubb3c\uc801 \ub300\uccb4 \uc5f0\uad6c\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \uc544\uc9c1\uc740 \ubcf4\uc644\uc801 \uc5ed\ud560\uc744 \ub9e1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc5ec\uc804\ud788 \uac00\uc7a5 \uc2e4\uc6a9\uc801\uc774\uace0 \ud6a8\uacfc\uc801\uc778 \ubc29\ubc95\uc73c\ub85c \ubcf4\uc7a5\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uac00\uc7a5 \uc815\ud655\ud55c \uc804\uc784\uc0c1 \uc2dc\ud5d8 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \ud6a8\uacfc\uc801\uc774\uc9c0 \ubabb\ud55c \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\uc2e4\uc81c \uc0dd\uccb4 \ud658\uacbd\uc744 \uc815\ud655\ud788 \ubaa8\ubc29\ud558\ub294 \uac83\uc740 \ud604\uc7ac\uc758 \ub300\uccb4 \uae30\uc220\ub85c\ub294 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\uacfc\ud559 \uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud55c \ub300\uccb4 \ubc29\ubc95\uc758 \ubaa8\uc0c9\uc740 \uc911\ub300\ud55c \uc5f0\uad6c \ubc29\ud5a5\uc785\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ubaa8\ub4e0 \uc0dd\ub9ac\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc124\uba85\ud558\uae30\uc5d0\ub294 \ubd80\uc871\ud569\ub2c8\ub2e4","\ube44\ub3d9\ubb3c \uae30\ubc18 \uae30\uc220\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc870\ud654\ub86d\uac8c \ud65c\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uae30\uc220\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uae30\uc874\uc758 \ub300\uc548\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc73c\ub85c\ub294 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ube44\ub3d9\ubb3c \uc2e4\ud5d8 \ubaa8\ub378\uc740 \ub354\uc6b1 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1\uc740 \uc77c\ubd80 \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \ubd88\ucda9\ubd84\ud560 \uc218\ubc16\uc5d0 \uc5c6\uc2b5\ub2c8\ub2e4","\uc778\uacf5\uc9c0\ub2a5 \uc2dc\ubbac\ub808\uc774\uc158\uc774\ub098 \uc138\ud3ec \ubc30\uc591\uacfc \uac19\uc740 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\uae30\uc220\uc774 \ubc1c\uc804\ud588\ub2e4 \ud560\uc9c0\ub77c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ubcf5\ud569\uc801\uc778 \uc0dd\uccb4 \ud658\uacbd\uc758 \ub300\uccb4\ub294 \ub0c9\ucca0\ud55c \uac80\ud1a0\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\ub294 \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc9c0\ub9cc, \ud604 \uc2dc\uc810\uc5d0\uc11c\ub294 \uadf8 \uc790\uccb4\ub85c \ubd88\uc644\uc804\ud55c \ub300\uc548\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uc2e0\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc774 \uc544\uc9c1 \uc644\uc804\ud558\uc9c0 \uc54a\ub2e4\ub294 \uc810\uc740 \uc6b0\ub9ac\uc758 \ub3c4\uc804 \uacfc\uc81c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \uc5f0\uad6c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud55c \uc2e0\ub8b0\uc131\uc744 \uac16\uc9c0 \ubabb\ud558\uace0 \uc788\uae30 \ub54c\ubb38\uc5d0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\uae4c\uc9c0 \uac00\uc7a5 \uc720\ud6a8\ud558\uace0 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uacfc \uc0c8\ub85c\uc6b4 \uc5f0\uad6c \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc810\uc9c4\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1\uae4c\uc9c0 \ubaa8\ub4e0 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0 \uc801\uc6a9\ud560 \uc218 \uc788\uc744 \ub9cc\ud07c \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0\ub294 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\uc0dd\ubb3c \ubaa8\ubc29 \uae30\uc220\uc774\ub098 \uc778\uacf5 \uc7a5\uae30 \ubaa8\ub378\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\ud07c\uc758 \uc2e0\ub8b0\uc131\uc744 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uc7a5\uae30\uc801\uc778 \ud574\uacb0\ucc45\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \ud1b5\ud569\uc801 \ud65c\uc6a9\uc5d0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\uc758 \uacfc\ud559 \uae30\uc220\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc804\uba74 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uacfc\ud559\uc801 \ubc1c\uacac\uc744 \uc704\ud55c \uac00\uc7a5 \ud604\uc2e4\uc801\uc778 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uae30\uc874\uc758 \uad00\ud589\uc5d0 \ub300\ud55c \ubcc0\ud654\ub97c \uc9c0\ud5a5\ud558\uba74\uc11c\ub3c4, \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uacfc\ud559\uc801 \uc5c4\uaca9\uc131 \ubc0f \ubcf5\ud569\uc801\uc778 \uc0dd\ub9ac\uc801 \ud0d0\uad6c\uc5d0 \uc801\ud569\ud558\uac8c \ubc1c\uc804\ud560 \ub54c\uae4c\uc9c0\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc758\uc874\ud560 \uc218\ubc16\uc5d0 \uc5c6\ub294 \ud604\uc2e4\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc815\ud655\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4. \"\ubbf8\uad6d \uc2dd\ud488\uc758\uc57d\uad6d(FDA)\"\uc740 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc77c\ubd80 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc758 \ubc18\uc751\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574\uc11c\ub9cc \uc815\ud655\ud788 \uc774\ud574\ud560 \uc218 \uc788\ub2e4\uace0 \uc124\uba85\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uc608\uce21 \ub3c4\uad6c\ub85c \uc0ac\uc6a9\ub429\ub2c8\ub2e4","\ucca8\ub2e8 \uc5f0\uad6c \ubc29\ubc95\ub4e4\uc740 \uc720\ub9dd\ud558\uc9c0\ub9cc \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc77c\ubd80 \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \uc0c1\ud638\uc791\uc6a9\uc744 \uc2e4\uc81c\ub85c \uad00\ucc30\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uace0\ubbfc\uc740 \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\ub2e4\ub294 \uc2e4\uc9c8\uc801 \ud604\uc2e4\uc5d0 \uae30\uc778\ud569\ub2c8\ub2e4","\ud604\ub300\uc758 \uacfc\ud559 \uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc778\uacf5 \uc7a5\uae30\ub098 \uc138\ud3ec \uae30\ubc18 \uc2e4\ud5d8\uc740 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc7ac\ud604\ud558\uae30\uc5d0 \uc544\uc9c1 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uc548\uc774 \uc5c6\ub294 \uacbd\uc6b0\uc5d0 \ud2b9\ud788 \uc911\uc694\ud569\ub2c8\ub2e4","\ub9ce\uc740 \uc5f0\uad6c\uae30\uad00\uc740 \uc5ec\uc804\ud788 \uae30\uc874 \ubc29\uc2dd\uc744 \uace0\uc218\ud558\uace0 \uc788\ub2e4\uace0 \ud558\ub354\ub77c\ub3c4, \uadf8 \uc774\uc720\ub294 \ubc14\ub85c \uadf8 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \uacb0\uacfc\uac00 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub2e4\ub294 \uc810\uc5d0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uc548\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc2e4\uc81c \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ubcf5\uc7a1\uc131\uc744 \ucda9\ubd84\ud788 \ubaa8\uc0ac\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub9ce\uc740 \ub300\uccb4 \ubc29\ubc95\uc774 \uc5ec\uc804\ud788 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\uae30\uc874 \ub300\uccb4 \uae30\uc220\uc744 \ubcf4\uc644\ud558\uace0 \uac1c\uc120\ud558\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc874\uc758 \uc2e0\uc57d \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ub300\uccb4 \ubc29\ubc95\uc774 \ubaa8\ub4e0 \uc0c1\ud669\uc744 \uc131\uacf5\uc801\uc73c\ub85c \ub300\uccb4\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uc5f0\uad6c \uacfc\uc815\uc758 \ub300\uc548\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \uae30\uc874 \uae30\uc220\ub85c\ub294 \ub3d9\ubb3c\uacfc \uac19\uc740 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc774 \uc724\ub9ac\uc801\uc778 \ub300\uc548\uc744 \ubaa8\uc0c9\ud558\ub294 \uc5f0\uad6c\uac00 \ubcd1\ud589\ub429\ub2c8\ub2e4","\uc804 \uc138\uacc4\uc801\uc778 \uaddc\uc81c \uae30\uad00\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc778\uc815\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \uacfc\ud559 \uae30\uc220\ub85c\ub294 \uc544\uc9c1 \ubaa8\ub4e0 \uc0c1\ud669\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\ub97c \ub300\uccb4\ud560 \uc218 \uc5c6\ub2e4\ub294 \uac83\uc774 \uba85\ubc31\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\ub4e4\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ub418\uc9c0 \uc54a\uc740 \uc0c1\ud669\uc5d0\uc11c \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\ub824\ub294 \uc5f0\uad6c\uc640 \ub178\ub825\uc774 \uc9c4\ud589 \uc911\uc774\uc9c0\ub9cc, \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc5c6\uc2b5\ub2c8\ub2e4","\uacfc\ud559\uc801 \uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \uc9c4\ubcf4\uc640 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ub3d9\uc2dc\uc5d0 \ucda9\uc871\uc2dc\ud0a4\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \ud568\uaed8 \ubc1c\uc804\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc744 \uc704\ud55c \ud22c\uc790\uc640 \uc5f0\uad6c\uac00 \ud65c\ubc1c\ud788 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4 \ubc29\ubc95\ubcf4\ub2e4 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ub354 \uc798 \ubaa8\uc0ac\ud569\ub2c8\ub2e4","\ud604\uc2e4\uc801\uc73c\ub85c \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95 \uac1c\ubc1c\uc5d0\ub294 \uc0c1\ub2f9\ud55c \uc2dc\uac04\uacfc \uc790\uc6d0\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ube44\uc724\ub9ac\uc801 \uce21\uba74\uc744 \uc6b0\ub824\ud558\ub294 \uc758\uacac\uc744 \uc874\uc911\ud558\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uae30\uc220 \ubc1c\uc804 \uc0c1\ud669\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uc5f0\uad6c \ubc29\uc2dd\uc785\ub2c8\ub2e4","\uba3c\uc800, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uc0c8\ub85c\uc6b4 \uae30\uc220\uc740 \ubcf4\uc644\uc801\uc73c\ub85c \uc0ac\uc6a9\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uae30\uc220\uc774 \uc644\uc804\ud788 \uac16\ucdb0\uc9c0\uc9c0 \uc54a\uc740 \uc0c1\ud669\uc5d0\uc11c \uc870\uae30 \ubc1c\uacac \ubc0f \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \ub300\uc2e0 \uc0ac\uc6a9\ud560 \uc218 \uc788\ub294 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ubaa8\ub4e0 \uc5f0\uad6c \ubd84\uc57c\uc5d0\uc11c \ucda9\ubd84\ud788 \ud6a8\uacfc\uc801\uc774\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \uae30\uc220\uc5d0 \ub300\ud55c \ud22c\uc790\ub294 \uafb8\uc900\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc0dd\uccb4 \ub0b4\uc5d0\uc11c\uc758 \ubcf5\uc7a1\ud55c \ubc18\uc751\uacfc \uc0c1\ud638\uc791\uc6a9\uc744 \uc5f0\uad6c\ud560 \uc218 \uc788\uc73c\uba70, \uc774\ub294 \ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ubd80\ubd84\uc785\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubcf4\uc644\ucc45\uc774 \ub420 \uc218 \uc788\uc9c0\ub9cc, \ub2f9\uc7a5 \ubaa8\ub4e0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc785\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc758 \uad00\uc2ec \uc99d\ub300\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uac10\uc18c\uc2dc\ud0a4\ub824\ub294 \uc138\uacc4\uc801 \ub178\ub825\uc744 \ucd09\uc9c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \ucc3e\uae30 \uc704\ud55c \ud22c\uc790\uc640 \uc5f0\uad6c\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc744 \uac00\uc18d\ud654\ud558\uace0\uc790 \ud558\ub294 \ub178\ub825\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc808\ub300\uc801\uc73c\ub85c \ud544\uc694\ud55c \uc5f0\uad6c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0\ub3c4 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uacfc\ud559\uc801 \ubc1c\uc804\uc744 \uc704\ud574 \uac00\uc7a5 \ud604\uc2e4\uc801\uc778 \uc2e4\ud5d8 \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ud604\uc7ac\uc758 \uae30\uc220\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \uc81c\ud55c\uc801\uc774\uba70 \ubaa8\ub4e0 \uc5f0\uad6c \uc694\uad6c\ub97c \ucda9\uc871\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \ubcc0\uc218\ub97c \ud1b5\uc81c \uac00\ub2a5\ud558\uac8c \ud558\uc5ec \ubcf4\ub2e4 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uacb0\uacfc\ub97c \ub3c4\ucd9c\ud560 \uc218 \uc788\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc0dd\ub9ac\ud559\uc801 \uc5f0\uad6c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ucd5c\ucca8\ub2e8 \uae30\uc220\uacfc\uc758 \ud611\ub825\uc740 \uc624\ud788\ub824 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud6a8\uc728\uc131\uc744 \ub192\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uae30\uc220 \ubc1c\uc804\uacfc \uaddc\uc81c \uac15\ud654\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc778\ub3c4\uc801 \uce21\uba74\uc774 \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9ce\uc740 \uc5f0\uad6c\uc790\ub4e4\uc774 \uc774\ubbf8 \ub300\uccb4 \ubc29\ubc95\uc744 \ubaa8\uc0c9\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc5f0\uad6c \ubc29\ubc95\ub860\uc758 \ubc1c\uc804\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\ube44\ub3d9\ubb3c \uae30\ubc18 \uc2e4\ud5d8\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uc0c8\ub85c\uc6b4 \uae30\uc220\uc758 \ub3d9\uc2dc \ubc1c\uc804\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc544\uc9c1 \uc608\uce21 \uac00\ub2a5\ud55c \uc218\uc900\uc758 \ub300\uccb4 \ubaa8\ub378\uc774 \uc5c6\uae30 \ub54c\ubb38\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc644\ubcbd\ud55c \ub300\uccb4 \ubc29\ubc95\uc774 \uc874\uc7ac\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uae30\uc220\uacfc \ubc29\ubc95\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc2e4\ud5d8 \uc2e4\ud604 \uac00\ub2a5\uc131\uc758 \ud55c\uacc4\uac00 \uc5ec\uc804\ud788 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc810\uc9c4\uc801 \uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ud2b9\uc815 \uc5f0\uad6c \ubd84\uc57c\uc5d0\uc11c\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \ubaa8\ub378\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub9ce\uc740 \ub300\uccb4 \uae30\uc220\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uc0c1\ud669\uc5d0\uc11c \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \ubaa8\ubc29\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc0c1\ud638\ubcf4\uc644\uc801\uc73c\ub85c \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ucca8\ub2e8 \uae30\uc220\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uac19\uc740 \uc0dd\ubb3c\uc758 \ubcf5\uc7a1\ud55c \uccb4\uacc4\uc801 \ubc18\uc751\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc81c\ud55c\uc801\uc774\uba70 \uadf8 \ud6a8\uacfc\ub294 \uac80\uc99d\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uc0dd\uba85 \uc608\uce21\uc758 \uc815\ud655\uc131\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc758\ud574 \ud5a5\uc0c1\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud1a0\ub300\ub97c \ub9c8\ub828\ud568\uc73c\ub85c\uc368 \uc0c8\ub85c\uc6b4 \uc5f0\uad6c \ubc29\ubc95\ub4e4\uc774 \
