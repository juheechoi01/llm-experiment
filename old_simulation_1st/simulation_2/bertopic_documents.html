c6a9\ud558\uae30\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc81c\ud55c\ub41c \uc601\uc5ed\uc5d0\uc11c\ub9cc \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc904\uc774\ub294 \ub370 \uae0d\uc815\uc801\uc774\uba70 \uc774\ub294 \uacfc\ud559\uc774 \ucd94\uad6c\ud558\ub294 \ubc29\ud5a5\uc774\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc774\ub97c \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \ubd80\uc7ac\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc740 \ud604\uc7ac \uc5f0\uad6c\uc758 \ubaa8\ub4e0 \uc601\uc5ed\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc73c\uba70, \ud2b9\ud788 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uacfc \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\ub294 \ub370\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud568\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc989\uac01\uc801\uc778 \uc778\uac04 \uc801\uc6a9\uc5d0 \ub300\ud55c \uc2e0\ub8b0\uc131\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubaa8\ub378\uc758 \ubc1c\uc804\uc740 \uace0\ub3c4\ud654\ub41c \uae30\uc220 \uac1c\ubc1c\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc740 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc9c0\ub9cc, \uc989\uac01\uc801\uc778 \ud574\uacb0\ucc45\uc774 \ud544\uc694\ud560 \ub54c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc801\uc2dc\uc5d0 \uc720\ud6a8\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\ub2e4\ub294 \uc810\uc5d0\uc11c \ud070 \uac00\uce58\ub97c \uac00\uc9d1\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc904\uc785\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ubcf5\ud569\uc801\uc778 \uc0dd\ub9ac\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud558\uae30\uc5d4 \ubd80\uc871\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc740 \uc544\uc9c1\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ub370\uc774\ud130\ub97c \uc644\uc804\ud558\uac8c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790\ub294 \uacc4\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \ubc1c\uc804 \ub2e8\uacc4\uc5d0\uc11c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ucda9\ubd84\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc2ec\uac01\ud55c \uc9c8\ubcd1 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc694\ud55c \ubcf5\ud569\uc801\uc778 \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\ubcbd\ud558\uac8c \ubaa8\ubc29\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \ubc1c\ub2ec\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\ub294 \uac00\uc6b4\ub370\uc5d0\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\uc815 \uc5f0\uad6c\uc5d0\uc11c \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc778 \ub370\uc774\ud130\uc640 \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubaa8\ub378 \uac1c\ubc1c\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc5f0\uad6c\ub418\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc774\ub7ec\ud55c \ubc29\ubc95\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub2e4\ub294 \uac83\uc774 \ud604\uc2e4\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0 \ub300\ud55c \uc790\uc6d0\uacfc \uc9c0\uc6d0\uc774 \ub354 \ub9ce\uc774 \ud544\uc694\ud558\ub2e4\ub294 \uc810\uc5d0\ub294 \ub3d9\uc758\ud558\ub098, \uc774\ub807\uac8c \ud574\uc11c \uc5bb\uc5b4\uc9c4 \uacb0\uacfc\ub3c4 \uc989\uac01\uc801\uc73c\ub85c \uae30\uc874 \ub370\uc774\ud130\uc758 \uc2e0\ub8b0\uc131\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc740 \ubcf4\uc870 \uc218\ub2e8\uc73c\ub85c \ubc1c\uc804 \uc911\uc774\uba70, \uad81\uadf9\uc801\uc73c\ub85c \ub354 \uc548\uc804\ud55c \uc2e4\ud5d8 \ud658\uacbd\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ubd80\ubd84\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uace0 \uc788\uc73c\uba70, \uc7a5\uae30\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud55c \uae30\uc220\uc801 \ubc1c\uc804\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\ub098, \uc5ec\uc804\ud788 \ub3d9\ubb3c \ubaa8\ub378\ub9cc\uc774 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \uc0dd\uccb4 \ubc18\uc751\uacfc \ubcf5\uc7a1\ud55c \uc9c8\ud658\uc758 \uc0c1\ud638\uc791\uc6a9\uc5d0 \ub300\ud55c \ud1b5\ucc30\uc740 \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4\uc640 \uc720\uc0ac\ud55c \ubc18\uc751\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud558\ub294 \ub370 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \uc644\ubcbd\ud558\uc9c0 \uc54a\ub2e4\ub294 \uc810\uc740 \uc911\uc694\ud55c \ubb38\uc81c\uc785\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc740 \ud604\uc7ac\ub85c\uc120 \uc644\uc804\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\ub3c4 \uacc4\uc18d \uc5f0\uad6c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1\uc740 \ucd08\uae30 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc704\ud574 \uc5f0\uad6c\uc640 \ud22c\uc790\ub97c \uac15\ud654\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\ub97c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4. '\ub85c\uc288 \ud640\ub529'(Roche Holding)\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc5f0\uad6c \uac1c\ubc1c\uc758 \uc911\uc694\uc131\uc744 \uc778\uc9c0\ud558\uace0 \uc788\uc73c\uba70, \uadf8\ub7fc\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ud604\uc7ac \uae30\uc220\ub85c\ub294 \uc644\uc804\ud55c \ub300\uccb4\uac00 \ubd88\uac00\ub2a5\ud558\ub2e4\ub294 \uc810\uc744 \uc5ec\ub7ec \ucc28\ub840 \uac15\uc870\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\uace0 \uc788\uc9c0\ub9cc \ucda9\ubd84\ud55c \ub300\uccb4 \uae30\uc220\uc774 \uc544\uc9c1 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uc5f0\uad6c\uc640 \ud568\uaed8 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uae34\uae09\ud558\uac8c \uc694\uad6c\ub418\ub294 \uc784\uc0c1\uc801 \ub3cc\ud30c\uad6c \ub9c8\ub828\uc5d0 \uc911\ub300\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc774 \ubd80\uc871\ud558\uc5ec \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc774 \ud07d\ub2c8\ub2e4","\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \ubaa8\ubc29\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c \ub178\ub825\uc774 \ubcd1\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc774 \ub2f9\uc7a5 \uac1c\ubc1c\ub41c\ub2e4\uace0 \ud574\ub3c4, \uae30\uc874\uc758 \ub3d9\ubb3c \uc2e4\ud5d8 \ub370\uc774\ud130\ub97c \uc5b4\ub5bb\uac8c \ubcf4\uc644\ud558\uace0 \uc5f0\uacb0\ud560 \uac83\uc778\uc9c0\uc5d0 \ub300\ud55c \uc5f0\uad6c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \uc801\uc6a9\ub418\uae30\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uc5f0\uad6c\ub9cc\uc73c\ub85c\ub294 \ud574\uacb0\ud558\uc9c0 \ubabb\ud558\ub294 \ub9ce\uc740 \ub09c\uc81c\ub97c \uc9c0\uc18d\uc801\uc73c\ub85c \uadf9\ubcf5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \uc778\uac04\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc815\ud655\ud558\uac8c \ubaa8\uc0ac\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc2dc\ud5d8\ubc95\uc758 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc774 \ud65c\ubc1c\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc9c0\ub9cc, \uc9c0\uae08 \ub2f9\uc7a5 \ubaa8\ub4e0 \uc0c1\ud669\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc740 \ubd80\uc871\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc744 \uc704\ud55c \ub178\ub825\uc740 \uacc4\uc18d\ub418\uace0 \uc788\uc73c\uba70 \ub2e4\uc591\ud55c \ubd84\uc57c\uc5d0\uc11c \ud22c\uc790\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc740 \uc77c\ubd80 \uc601\uc5ed\uc5d0\uc11c\ub294 \uc131\uacf5\uc744 \uac70\ub450\uace0 \uc788\uc9c0\ub9cc, \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \ub3d9\ubb3c\uc758 \uc0dd\ub9ac\uc801 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc740 \uc644\uc804\ud558\uc9c0 \uc54a\uc544 \ubaa8\ub4e0 \uc5f0\uad6c\uc5d0\uc11c \uc0ac\uc6a9\ub420 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \uc81c\ud55c\uc810\uc740 \uc5ec\uc804\ud788 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uc790\uccb4\uac00 \ub9ce\uc740 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0 \ucda9\ubd84\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\ub294 \ub370 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc744 \ucc3e\uace0 \uc2e4\ud5d8 \ub300\uc0c1\uc744 \ubcf4\ud638\ud558\ub294 \ub178\ub825\uc740 \uafb8\uc900\ud788 \uc774\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc0dd\ub9ac\uc5d0 \ub300\ud55c \uc9c1\uc811\uc801\uc778 \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc5d0 \ud22c\uc790\ud558\ub294 \uac83\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac \uc9c8\ubcd1 \uc5f0\uad6c\uc758 \uae34\uae09\uc131\uc744 \uac10\uc548\ud560 \ub54c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc5d0\ub294 \uc2dc\uac04\uacfc \uac80\uc99d \uacfc\uc815\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc774 \ud604\uc7ac\ub85c\uc120 \ubaa8\ub4e0 \uc5f0\uad6c\ub97c \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\ub9cc\uc73c\ub85c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ucda9\ubd84\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\uc740 \uc778\uc2dd\ub418\uace0 \uc788\uc73c\uba70, \uc774 \ubd84\uc57c\uc5d0 \ub300\ud55c \uc5f0\uad6c\uac00 \uc801\uadf9\uc801\uc73c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacf5\uc874\ud558\uba70 \uc0c1\ud638 \ubcf4\uc644\uc801\uc73c\ub85c \uc0ac\uc6a9\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4. '\uad6d\uc81c \uc0dd\uba85\uacfc\ud559\uc5f0\uad6c\uc18c (ILAR)'\ub294 \ud604\ub300 \uc0dd\uba85\uacfc\ud559 \uc5f0\uad6c\uc5d0\uc11c\ub294 \ub2e4\uc591\ud55c \ubc29\ubc95\ub860\uc774 \ud1b5\ud569\ub418\uc5b4\uc57c \ud558\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uadf8\ub7ec\ud55c \ub2e4\uac01\uc801\uc778 \uc811\uadfc\uc758 \ud55c \ucd95\uc73c\ub85c\uc11c \uacc4\uc18d \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\ub2e4\uace0 \ubcf4\uace0\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc2dc\ud5d8\ubc95\uc758 \ubc1c\uc804\uc774 \uacc4\uc18d\ub418\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ud604\uc7ac \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubc0f \uc57d\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc815\ud655\ud788 \ubaa8\ubc29\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc740 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc744 \uc704\ud574\uc11c\ub294 \uc9c0\uc18d\uc801\uc778 \uc5f0\uad6c\uc640 \ud22c\uc790\uac00 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc9c0\uc18d\uc801\uc778 \uacfc\ud559\uc801 \ubc1c\uc804\uc744 \uc694\uad6c\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub85c \uc778\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc694\ud55c \uacbd\uc6b0\uc5d0\ub9cc \uc0ac\uc6a9\ub418\uc5b4\uc57c \ud558\uba70, \uc774\ub294 \uaddc\uc81c \uae30\uad00\ub4e4\uc774 \uc5c4\uaca9\ud788 \uac10\ub3c5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \uc5b8\uc81c\ub098 \ud6a8\uacfc\uc801\uc778 \uc120\ud0dd\uc9c0\ub294 \uc544\ub2d9\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ubc1c\uc804\uc5d0 \ub300\ud55c \ud22c\uc790\ub294 \uc2e4\uc81c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc73c\ub098, \ud604\uc7ac \uc0c1\ud0dc\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc989\uc2dc \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95 \uac1c\ubc1c\uc758 \uac00\uc18d\ud654\ub294 \uc5f0\uad6c \ucee4\ubba4\ub2c8\ud2f0\uc758 \uc6b0\uc120 \uacfc\uc81c\uac00 \ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \uae30\uc874\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc0ac\uc2e4\uc744 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0\ub294 \uc2dc\uac04\uacfc \uc790\uc6d0\uc774 \ub9ce\uc774 \ud544\uc694\ud558\uba70, \ud604\uc7ac\ub85c\uc11c\ub294 \uadf8\uac83\ub4e4\uc774 \ucda9\ubd84\ud55c \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\ub4e4\ub85c\ub294 \ubcf5\uc7a1\ud55c \uc57d\ubb3c\uc758 \uc804\uc2e0\uc801 \ubc18\uc751\uc744 \ucda9\ubd84\ud788 \uac80\uc99d\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \uc5f0\uad6c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \uc2e0\ub8b0\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \uc5ec\uc804\ud788 \uc5ec\ub7ec \ud55c\uacc4\ub97c \uac00\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud55c\ub2e4 \ud558\ub354\ub77c\ub3c4 \uadf8\uac83\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ubaa8\ub4e0 \ub370\uc774\ud130\ub97c \ub3d9\uc77c\ud558\uac8c \uc81c\uacf5\ud558\uc9c0 \ubabb\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc5f0\uad6c\uc758 \uc694\uad6c\ub97c \ucda9\uc871\uc2dc\ud0a4\uae30\uc5d0 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc744 \uc704\ud55c \ud22c\uc790\uac00 \ud544\uc694\ud558\uc9c0\ub9cc, \uae09\ubc15\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc704\ud55c \ud22c\uc790\ub294 \uc774\ubbf8 \uc9c4\ud589 \uc911\uc774\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\ub3c4\ub97c \uc904\uc774\ub294 \ubc29\ud5a5\uc73c\ub85c \ub098\uc544\uac00\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc774 \ub3c4\uc785\ub418\ub354\ub77c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc5f0\uad6c\uc758 \uc911\uc694\ud55c \ubd80\ubd84\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc740 \ub3d9\ubb3c \ubaa8\ub378\uc774 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uba85\uccb4 \uae30\ubc18\uc758 \ubc18\uc751\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc740 \uc544\uc9c1 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \uc54a\uc558\uc73c\uba70, \uc774\ub7ec\ud55c \ub2e8\uacc4\uc5d0\uc11c\ub294 \ub3d9\ubb3c \ubaa8\ub378\uc774 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub300\uccb4 \uc218\ub2e8\uc774 \ubc1c\uc804\ud558\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc, \uc774\ub294 \ub3d9\ubb3c \uc804\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \uc7ac\ud604\ud558\uae30\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc740 \uc911\uc694\ud55c \ubaa9\ud45c\uc774\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc0dd\ub9ac\uc801 \ubc0f \ubcd1\ub9ac\uc801 \ud604\uc0c1\uc744 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4. '\ud558\ubc84\ub4dc \uba54\ub514\uceec \uc2a4\ucfe8'\uc740 \ud604\uc7ac\uc758 \ub300\uccb4 \uae30\uc220\uc774 \uad11\ubc94\uc704\ud55c \uc0dd\uccb4 \ub0b4 \ud658\uacbd\uc744 \uc644\ubcbd\ud788 \ubaa8\uc0ac\ud558\uc9c0 \ubabb\ud55c\ub2e4\uace0 \ud558\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\ud788 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0\uc11c \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc774\ub77c\ub294 \uc810\uc744 \uac15\uc870\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \uae30\uc220\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc644\uc804\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \uc131\uc219\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uadc0\ud558\uc758 \uc6b0\ub824\uc5d0 \uc9c1\uc811 \ub2f5\ubcc0\ud558\uc790\uba74, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \uc77c\ubd80 \uc0c1\ud669\uc5d0\uc11c \uc720\uc6a9\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc544\uc9c1\ub3c4 \ud55c\uacc4\ub97c \uac00\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \uc548\uc804\uc131\uacfc \ud6a8\uacfc \uac80\uc99d\uc758 \uc911\uc694\uc131\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc5f0\uad6c\ubc95\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \ud544\uc694\ud55c \ubd84\uc57c\uc640\uc758 \uade0\ud615\uc744 \ub9de\ucd94\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc740 \ud658\uc601\ud560 \ub9cc\ud55c \uc77c\uc774\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc5f0\uad6c\uc758 \ud55c\uacc4\ub97c \uc804\uc801\uc73c\ub85c \ubcf4\uc644\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0 \ub354 \ub9ce\uc740 \ud22c\uc790\uac00 \ud544\uc694\ud558\uc9c0\ub9cc \uc989\uac01\uc801\uc778 \uc804\ud658\uc740 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\ub4e4\uc774 \ud604\uc2e4\uc5d0\uc11c \uc801\uc6a9 \uac00\ub2a5\ud55c \uc218\uc900\uc5d0 \uc774\ub974\uae30\uae4c\uc9c0 \uc5ec\uc804\ud788 \ub9ce\uc740 \uc2dc\uac04\uacfc \uc5f0\uad6c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \ud22c\uc790\ub294 \uacc4\uc18d \uc99d\uac00\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc870\uae08\uc529 \ub300\uc2e0\ud560 \uc218 \uc788\ub294 \uac00\ub2a5\uc131\uc744 \uc5f4\uc5b4\uc90d\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\uc73c\uba70 \ubaa8\ub4e0 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\ubcbd\ud788 \ubaa8\uc0ac\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \ubaa8\ub4e0 \uc2e4\ud5d8\uc758 \ud544\uc694\ub97c \ucda9\uc871\ud558\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uacc4\uc18d\ud574\uc11c \ucd94\uc9c4\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc2dc\uac04\uc774 \ud544\uc694\ud558\uace0, \uadf8 \ub3d9\uc548 \uc77c\ubd80 \ub2e8\uacc4\uc5d0\uc11c\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \ubaa8\ub4e0 \uacb0\uacfc\ub97c \ubcf4\uc7a5\ud560 \uc218 \uc5c6\ub294 \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \ud604\uc7ac \uae30\uc220\uc740 \uc2e4\ud5d8\uc758 \ubcf5\uc7a1\uc131\uc744 \ucda9\ubd84\ud788 \ubc18\uc601\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \uacfc\ud559\uacc4\uc758 \uc9c0\uc18d\uc801\uc778 \uc5f0\uad6c\uc640 \ud22c\uc790\ub85c \uac00\ub2a5\ud574\uc9c8 \uac83\uc785\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \uc644\uc804\ud558\uac8c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc774\uc720\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \ucda9\ubd84\ud788 \uad6c\ud604\ud558\uc9c0 \ubabb\ud558\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \uc5f0\uad6c\ud558\ub294 \uac83\uc758 \uc911\uc694\uc131\uc740 \ubd80\uc815\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc774 \uacc4\uc18d \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ucd08\uae30 \ubc1c\uc804 \ub2e8\uacc4\uc5d0\uc11c \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \ubcf4\uc77c \uc218 \uc788\ub294 \ucd5c\uc801\uc758 \ubc29\ubc95\uc73c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc774 \uc874\uc7ac\ud55c\ub2e4\uace0 \ud574\ub3c4, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\ud07c\uc758 \ud3ec\uad04\uc801\uc778 \uac80\uc99d\uc744 \uc81c\uacf5\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"5_roche holding_roche_ilar","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","5_roche holding_roche_ilar"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"U01ZQL73iECJ6n5AFj5+QPdcZ0BvOYtAZnliQLAbckCEJYtAyhWJQPGKjECZuYRAzJJuQAxOjkAK+4BAonSBQFg2iEBCLI1AqfZzQD90Z0AFrnVA7\u002fh9QBANWUAConBAXm+CQGQfikAasXlAFEp1QGjUi0BnvntAe3GGQOxEhEC4oldA0qVXQNXWX0ByAotAANmJQHsvhUBXEYJAaqKAQNE4XUBR+n1AzSmHQI9vb0C\u002f\u002fnhAqJZeQAyIi0C3aWpAv2eMQIRYd0AdDVhA1fZ7QCEHdkA6bItAkWqDQPGIg0B1uG1A11yPQNyogEAn\u002fGxAl1mFQOCSe0AMzGpAX15mQF2VgkDJJVVA1vWGQEJHZkB\u002f+IhAJg9wQHRGgEBHt1hAmaeLQLTIWEB9Z4JARE5YQFXGgUDEqoxACF5qQDhshEAqd45A4GNXQJWOhUDIhYxA3RGJQLZPjUCMMXRAxP1wQGDrc0CUCldArR6HQD34hEAqFI1AQuZ5QG\u002fObUC9WXJAxd5uQBzCe0AQ+3BAmM5yQL2tX0A6b4BAHV5aQEH5dEA6RWlA0zuIQALtVkCR9mFA1uiCQOiFikDeu3tA"},"y":{"dtype":"f4","bdata":"nO\u 1c\ubc1c\uc5d0\ub294 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub9ce\uc740 \uc911\uc99d \uc9c8\ubcd1 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc758\uc874\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub2e4\uc591\ud55c \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uc704\ud574\uc11c\ub294 \ud604\uc7ac\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud558\uba70, \uc774\ub294 \uc778\ub958\uc758 \uc0dd\uba85\uacfc \uac74\uac15\uc744 \uc9c1\uc811\uc801\uc73c\ub85c \uad6c\ud560 \uc218 \uc788\ub294 \uc5f0\uad6c\uc5d0 \uc774\ubc14\uc9c0\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ucd08\uae30 \ubc1c\uacac\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \uae30\ucd08 \uacfc\ud559 \uc5f0\uad6c\uc758 \uae30\ubc18\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uae30\uc874\uc758 \uc5f0\uad6c \uc131\uacfc\uac00 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc5d0 \uae30\uc5ec\ud558\ub294 \ud6a8\uacfc\ub97c \ubb34\uc2dc\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \ub355\ubd84\uc5d0 \ub9ce\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\ubc95\uc774 \ubc1c\uacac\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \ub300\ud55c \uae30\ucd08 \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\ub294 \uac83\uc740 \uacfc\ud559\uc801 \ud0c0\ub2f9\uc131\uc774 \ubd80\uc871\ud558\ub2e4\ub294 \ubc18\ub860\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ub97c \uc704\ud55c \ud544\uc218\uc801\uc778 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uba3c\uc800, \uc911\uc99d \uc9c8\ud658\uc758 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370\uc5d0\ub294 \ub3d9\ubb3c \ubaa8\ub378\uc774 \ubc18\ub4dc\uc2dc \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc218\ub9ce\uc740 \uc778\ub958 \uc9c8\ud658 \uce58\ub8cc\uc81c\ub97c \ubc1c\uacac\ud558\ub294 \uae30\ubc18\uc774 \ub429\ub2c8\ub2e4. '\ub178\ubc14\ud2f0\uc2a4 \uc5f0\uad6c \uc7ac\ub2e8'(Novartis Research Foundation)\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ub2e4\uc218\uc758 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\uc600\uc73c\uba70, \uc774\ub294 \uc778\uac04\uc758 \uc218\uba85\uc744 \uc5f0\uc7a5\ud558\uace0 \uc0b6\uc758 \uc9c8\uc744 \ud5a5\uc0c1\uc2dc\ud0a4\ub294\ub370 \ud06c\uac8c \uae30\uc5ec\ud558\uace0 \uc788\uc74c\uc744 \uac15\uc870\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\ub294 \uc911\uc99d \uc9c8\ud658 \uadf9\ubcf5\uc5d0 \ud544\uc218\uc801\uc778 \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc218\ub9ce\uc740 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uc911\uc694\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud574 \uc654\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc6b0\ub9ac\ub294 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \ub354 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \uc911\uc694\ud55c \ucd08\uae30 \ub2e8\uacc4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ub97c \uc704\ud55c \ud601\uc2e0\uc801 \uc57d\ubb3c \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \ubc1c\uacac\uc758 \uc720\uc77c\ud55c \ub3cc\ud30c\uad6c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uc774\ud574\uc640 \uce58\ub8cc \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc2ec\uac01\ud55c \uc9c8\ud658\uc744 \uc77c\uc73c\ud0a4\ub294 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131 \uac80\uc99d\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uadf9\ubcf5\ub418\uc9c0 \uc54a\uc740 \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub294 \uc0dd\uba85\uc744 \uc704\ud611\ud558\ub294 \uc911\uc99d \uc9c8\ud658\uacfc \uc9c1\uc811 \uad00\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub9ce\uc740 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ud06c\uac8c \uc758\uc874\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uae30\uc220 \uac1c\ubc1c\uacfc \ub354\ubd88\uc5b4 \uc2e4\uc9c8\uc801\uc778 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0 \uc989\uac01 \ud544\uc694\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\ub294 \uac83\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \ub355\ubd84\uc5d0 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uc2e4\uc9c8\uc801\uc774\uace0 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ub370\uc774\ud130\ub97c \ud68d\ub4dd\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc740 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\uace0 \uc0b6\uc758 \uc9c8\uc744 \ub192\uc774\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ud604\uc7ac\uc758 \uae30\uc220\uc801 \ud55c\uacc4\ub97c \uadf9\ubcf5\ud558\uc9c0 \ubabb\ud558\uba74, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c \uc18d\ub3c4\uac00 \ud06c\uac8c \ub2a6\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\ub97c \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc778 \uc5f0\uad6c \ub2e8\uacc4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \ud68d\uae30\uc801\uc778 \ubc1c\uacac\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub9ce\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub294 \uac1c\ubc1c\uc774 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\uc7a5\uae30\uc801\uc73c\ub85c\ub294 \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc774 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\ub97c \uc9c0\uc6d0\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\ub4e4\uc740 \ub9ce\uc740 \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud560 \uac00\ub2a5\uc131\uc774 \uc788\ub294 \ub9cc\ud07c, \uc5f0\uad6c\uc758 \uc9c0\uc18d\uc740 \uc0ac\ud68c\uc801 \ucc45\uc784\uc758 \uc77c\ud658\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc740 \uc544\uc9c1 \uac1c\ubc1c \ub2e8\uacc4\uc5d0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc911\uc99d \uc9c8\ud658\uc758 \uc548\uc804\uc131 \ubc0f \uc720\ud6a8\uc131\uc744 \ud655\uc778\ud560 \uc218 \uc788\ub294 \uac00\uc7a5 \ubbff\uc744 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc5d0 \uc788\uc5b4 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uac83\uc740 \uc6b0\uc120\ub418\ub294 \uac00\uce58\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc758 \uc911\uc694\uc131\uc744 \uac10\uc548\ud560 \ub54c \ud5c8\uc6a9\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\uae30 \uc704\ud574\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc778\ub958\uc758 \uac74\uac15\uc744 \ubcf4\uc7a5\ud558\uace0 \uc911\uc99d \uc9c8\ud658\uc744 \ud6a8\uacfc\uc801\uc73c\ub85c \uce58\ub8cc\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \ubcf5\uc9c0\uc640 \uc0dd\uba85\uad8c\uc744 \uc874\uc911\ud558\ub294 \ub300\uc548\uc744 \ucc3e\uc544\uc57c \ud558\uc9c0\ub9cc, \ub2f9\uc7a5 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95 \uc5f0\uad6c\ub97c \uc704\ud574\uc11c\ub294 \ud544\uc694\ud55c \uc120\ud0dd\uc77c \uc218\ubc16\uc5d0 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc0c8\ub85c\uc6b4 \uae30\uc220 \uac1c\ubc1c\uc744 \uc704\ud55c \ud22c\uc790\uac00 \ud544\uc694\ud558\uc9c0\ub9cc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2f9\uc7a5 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc758 \uc548\uc804\uc131 \uac80\uc99d\uc5d0 \ubc18\ub4dc\uc2dc \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \ub300\ud574 \ud544\uc218\uc801\uc778 \uae30\ucd08 \uc790\ub8cc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uacb0\uacfc\ub294 \uc5ec\uc804\ud788 \ub9ce\uc740 \uc9c8\ud658 \uce58\ub8cc\uc5d0 \ud601\uc2e0\uc801\uc778 \uae30\uc5ec\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uad81\uadf9\uc801\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc758 \ubc1c\uc804\uc744 \ube60\ub974\uac8c \uc9c4\ud589\uc2dc\ud0a4\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ud6a8\uacfc\uc801\uc778 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uc704\ud574\uc11c\ub294 \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ubb3c\ud559\uc801 \ubaa8\ub378\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \ubaa8\ub378\uc740 \uc9c1\uc811\uc801\uc778 \uc784\uc0c1\uc801 \uc2e4\ud5d8\uc744 \uc218\ud589\ud558\uae30 \uc5b4\ub824\uc6b4 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc911\uc694\ud55c \uc790\ub8cc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc \uac00\ub2a5\uc131\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud68d\uae30\uc801\uc73c\ub85c \ud5a5\uc0c1\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uacfc\ud559\uc801 \uac00\uce58\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c \uc911\uc99d \uc9c8\ud658\uc744 \uce58\ub8cc\ud558\uae30 \uc704\ud55c \uac00\uc7a5 \uc2e4\ud5 b2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc744 \ub354 \ud0d0\uad6c\ud558\ub824\ub294 \ub178\ub825\uc740 \uc9c0\uc18d\ub418\uace0 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uc2e0\ud560 \uc815\ub3c4\ub85c \ubc1c\uc804\ub41c \uae30\uc220\uc740 \ud604\uc7ac\uc5d0\ub3c4 \ubd80\uc871\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc774 \uc874\uc7ac\ud558\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ubc29\ubc95\uc740 \uc5ec\uc804\ud788 \uc644\uc804\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc5bb\ub294 \ub370\uc774\ud130\ub294 \uc544\uc9c1 \uacfc\ud559\uc801\uc73c\ub85c \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub2ec\ub9ac \ud604\uc7ac\uc758 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc9c1\uc811\uc801\uc73c\ub85c \uc801\uc6a9\ud558\uae30 \uc5b4\ub824\uc6b4 \uc0c1\ud669\uc5d0\uc11c \uae30\ucd08\uc801\uc778 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc774 \uc644\uc804\ud558\uc9c0 \uc54a\uc740 \uac00\uc6b4\ub370, \ub9ce\uc740 \uc911\uc694\ud55c \uc9c8\ubcd1\ub4e4\uc740 \ub3d9\ubb3c \ubaa8\ub378 \uc5c6\uc774\ub294 \uc81c\ub300\ub85c \uc5f0\uad6c\ub420 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ud655\uc0b0\ub418\uace0 \uc788\uc9c0\ub9cc, \ubaa8\ub4e0 \uce58\ub8cc\ubc95\uc758 \ubcf5\uc7a1\uc131\uc744 \ud574\uacb0\ud558\uae30\ub294 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc774 \uc544\ub2c8\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uae30 \uc704\ud574\uc11c\ub294 \uacfc\ud559\uc801 \uae30\uc900\uc744 \ucda9\uc871\uc2dc\ucf1c\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uadf9\ub3c4\ub85c \uc81c\ud55c\ub41c \ud658\uacbd\uc5d0\uc11c\ub9cc \ud5c8\uc6a9\ub418\uba70, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc778 \uac1c\uc120\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\ub85c, \ubaa8\ub4e0 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc758 \ubcf5\uc7a1\uc131\uc744 \ud574\uacb0\ud560 \uc218 \uc5c6\ub2e4\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\ub978 \ubc29\ubc95\ub4e4\ub85c\ub294 \uc7ac\ud604\ud558\uae30 \uc5b4\ub824\uc6b4 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ud658\uacbd\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uae30\uc5d0 \uc544\uc9c1 \ubd80\uc871\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \ud654\ud569\ubb3c\uc758 \uc548\uc804\uc131 \ud14c\uc2a4\ud2b8\ub294 \ub300\uccb4 \uae30\uc220\uc774 \uc544\uc9c1 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc601\uc5ed\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uae30\uc220\ub9cc\uc73c\ub85c\ub294 \uc544\uc9c1 \ubd88\uc644\uc804\ud55c \ubd80\ubd84\uc774 \ub9ce\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c \uc790\uccb4\uac00 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub370\uc774\ud130\ub97c \uae30\ucd08\ub85c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubd80\uc871\uc73c\ub85c \ud544\uc218\uc801\uc778 \uc5f0\uad6c \ub3c4\uad6c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc778\uac04\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc774\ud574\ud558\ub294 \ub370 \ub300\uccb4 \ubd88\uac00\ud569\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \ud604\uc7ac\ub85c\uc11c\ub294 \uc77c\ubd80 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uae30\uc220 \ubc1c\uc804\uc774 \ube60\ub978 \uc18d\ub3c4\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc9c0\ub9cc, \ub300\uccb4 \ubc29\ubc95\ub9cc\uc73c\ub85c\ub294 \uc544\uc9c1 \ubaa8\ub4e0 \uc2e4\ud5d8 \ubaa9\uc801\uc744 \ucda9\uc871\uc2dc\ud0a4\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \uac00\ub2a5\ud55c \uac00\uc7a5 \ud604\uc2e4\uc801\uc778 \uc0dd\uccb4 \ud658\uacbd\uc744 \uc81c\uacf5\ud558\uc5ec \uc778\uac04 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\uc131\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud575\uc2ec\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc5f0\uad6c\ub294 \ud604 \uc2dc\uc810\uc5d0\uc11c \uc778\uccb4\uc5d0 \ub300\ud55c \uc720\uc77c\ud55c \uc608\uce21 \uac00\ub2a5\ud55c \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uac00\ub2a5\ud55c \uae30\uc220\uc774 \uc644\uc804\ud788 \uad6c\ud604\ub418\uc9c0 \uc54a\uc558\uae30 \ub54c\ubb38\uc5d0 \ud604\uc7ac\ub85c\uc11c\ub294 \ud544\uc694\ud55c \uc5f0\uad6c \ubc29\ubc95\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\uc548\uc740 \uc5f0\uad6c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc218\uc9d1\ud560 \uc218 \uc788\ub294 \uc778\uacfc\uad00\uacc4 \ub370\uc774\ud130\ub97c \uc544\uc9c1 \uc644\uc804\ud788 \ub300\uccb4\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uc9c4\ubcf4\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\uc774 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc5d0 \ub300\ud55c \ud1b5\ud569\uc801\uc778 \ubd84\uc11d\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucd08\uae30\uc5d0 \ubd88\uacfc\ud558\uba70, \uc644\uc804\ud55c \ub300\uccb4\ub294 \ubd88\uac00\ub2a5\ud55c \uc0c1\ud669\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\ub294 \ubcf5\ud569\uc801\uc778 \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ud604\ub300 \uacfc\ud559\uae30\uc220\uc774 \ube60\ub974\uac8c \ubc1c\uc804\ud558\uace0 \uc788\ub2e4\uace0 \ud574\ub3c4, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub2f9\uc7a5 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc740 \uc544\uc9c1 \ubbf8\ube44\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac\uc758 \ub300\uccb4 \uae30\uc220\ub85c\ub294 \ubaa8\ub4e0 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0 \ud544\uc694\ud55c \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ c758 \uac74\uac15 \uac1c\uc120\uc5d0 \uae30\uc5ec\ud560 \uacfc\ud559\uc801 \uc5f0\uad6c \ubc1c\uc804\uc744 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubd88\uac00\ud53c\ud569\ub2c8\ub2e4","\uc778\ub958\uc758 \uac74\uac15 \uc99d\uc9c4\uacfc \ub3d9\ubb3c \ubcf5\uc9c0\ub294 \uc0c1\ud638 \ubc30\ud0c0\uc801\uc778 \uac83\uc774 \uc544\ub2d9\ub2c8\ub2e4","\uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \ubcf4\ud638\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c6\uc5b4\uc11c\ub294 \uc548 \ub418\ub294 \uc5ed\ud560\uc744 \ub9e1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uac74\uac15\uc744 \uc704\ud55c \uc911\uc694\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uacfc\ud559 \ubc1c\uc804\uc744 \ud1b5\ud574 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc548\uc804\uc740 \ud06c\uac8c \uac1c\uc120\ub420 \uc218 \uc788\uc73c\uba70, \uc774\ub294 \uc0ac\ud68c \uc804\uccb4\uac00 \ud61c\ud0dd\uc744 \uacf5\uc720\ud558\uac8c \ub418\ub294 \uacb0\uacfc\ub97c \ucd08\ub798\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uac74\uac15\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud604\uc7ac\uae4c\uc9c0 \uc778\uac04 \uac74\uac15 \uc99d\uc9c4\uc5d0 \uae30\uc5ec\ud55c \ubc14\ub294 \uc911\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\ud558\uace0 \uc724\ub9ac\uc801\uc778 \uc778\ub958 \uac74\uac15 \uc99d\uc9c4\uc744 \uc704\ud55c \ud14c\uc2a4\ud2b8 \ub2e8\uacc4\ub85c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uacb0\uacfc\ub294 \uc778\ub958 \ubcf4\uac74 \ud5a5\uc0c1\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc815\ud655\ud55c \uc5f0\uad6c \uacb0\uacfc \ud655\ubcf4\ub294 \uc778\ub958 \uac74\uac15 \uc99d\uc9c4\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc724\ub9ac\uc801 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uac74\uac15\uc5d0 \ud070 \uc601\u 0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc0dd\uba85\uacfc\ud559 \uc5f0\uad6c\uc758 \ubc1c\uc804\uc5d0 \ud070 \uae30\uc5ec\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc2e4\uc81c\uc801 \uc720\uc775\uc131\uc740 \uc0c1\ub2f9\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85\uacf5\ud559 \uc5f0\uad6c\uc758 \ubc1c\uc804\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc758\ud559 \ubc1c\uc804\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uacac\uacfc \uc758\ud559 \ubc1c\uc804\uc5d0 \uc911\uc694\ud55c \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc758\ud559\uc801 \ud601\uc2e0\uc5d0 \ub300\ud55c \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uc804\uc744 \uac00\uc18d\ud654\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uacfc\ud559\uc801 \ubc1c\uacac\uc744 \uc704\ud55c \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc758\ud559\uc801 \uc5f0\uad6c\uc758 \uae4a\uc774\ub97c \ub354\ud574\uc90d\ub2c8\ub2e4","\uae30\ucd08 \uc5f0\uad6c\uc758 \uc9c4\uc804\uc5d0 \uc788\uc5b4\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc5f0\uad6c\uc758 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\ub85c \uc778\uc2dd\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uc774\uc775\uc740 \uc0ac\ud68c\uc801\uc73c\ub85c \uc911\uc694\ud569\ub2c8\ub2e4","\ucd5c\uc2e0 \uacfc\ud559 \uc5f0\uad6c\uc758 \ubc1c\uc804\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud558\uae30 \uc5b4\ub824\uc6b4 \uc911\uc694\ud55c \uacfc\ud559\uc801 \ubc1c\uacac\uc758 \uc6d0\ucc9c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uacac\uc758 \uae30\ubc18\uc744 \ub9c8\ub828\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacbd\uc81c\uc801 \uce21\uba74\uc5d0\uc11c\ub3c4 \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85\uacf5\ud559\uacfc \uc57d\ub9ac\ud559 \ubc1c\uc804\uc758 \uae30\ucd08\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud68d\uae30\uc801\uc778 \uc758\ud559\uc801 \ubc1c\uacac\uc758 \uae30\ucd08\uac00 \ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c0\ub294 \ub370\uc774\ud130\ub294 \uc9c0\uc18d \uac00\ub2a5\ud55c \uc758\ud559 \ubc1c\uc804\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc774\ub044\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uae34\uae09\ud55c \uc758\ud559\uc801 \ud544\uc694\ub97c \ud574\uacb0\ud558\ub294 \uacfc\uc815\uc5d0\uc11c \uc5ec\uc804\ud788 \ubd88\uac00\ud53c\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559 \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc774\uba70, \ub9e4\uc6b0 \uad6c\uccb4\uc801\uc774\uace0 \uc5c4\uaca9\ud55c \uaddc\uc81c \uc544\ub798 \uc2e4\uc2dc\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\ud559\uc801 \uc5f0\uad6c \ubc1c\uc804 \uae30\uc5ec\ub294 \ub9c9\ub300\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc7a5\uae30\uc801\uc73c\ub85c \ubd24\uc744 \ub54c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uac8c \ub418\ub294 \uc758\ud559\uc801 \uc9c4\ubcf4\ub294 \ub3d9\ubb3c\uacfc \uc778\uac04 \ubaa8\ub450\uc5d0\uac8c \uc720\uc775\uc744 \uc904 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uacfc\ud559\uc801 \ubc1c\uacac\uacfc \uc758\ub8cc \ud601\uc2e0\uc774 \ucd09\uc9c4\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \ucd09\uc9c4\ud569\ub2c8\ub2e4", acfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604 \uc2dc\uc810\uc5d0\uc11c \uc720\uc77c\ud558\uac8c \uac00\ub2a5\ud55c \ub300\uaddc\ubaa8 \uc0dd\uccb4 \ubc18\uc751 \uad00\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1\uae4c\uc9c0 \uc778\uac04\uc758 \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc5d0 \uac00\uc7a5 \uadfc\uc811\ud558\uac8c \uc5f0\uad6c\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uc778\uac04\uacfc \ub3d9\ubb3c \uac04\uc758 \uc0dd\ub9ac\ud559\uc801 \ucc28\uc774\ub294 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1 \uccb4\uacc4\ub97c \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ube44\ub85d \ub3d9\ubb3c\uacfc \uc778\uac04 \uc0ac\uc774\uc5d0 \ucc28\uc774\uac00 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc9c8\ud658\uc5d0 \uad00\ud55c \uc911\uc694\ud55c \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \ub3d9\ubb3c \ubaa8\ub450\uc5d0\uac8c \uc774\ub85c\uc6b4 \uacb0\uacfc\ub97c \ucc3d\ucd9c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc81c\uc57d \ubc0f \uc0dd\uba85\uacf5\ud559 \uc5f0\uad6c\uc758 \uacbd\uc6b0 \uc2dc\uac04\uc774 \uc911\uc694\ud55c\ub370, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc18d\ud55c \uacb0\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uacb0\uacfc\uac00 \ud56d\uc0c1 \uc778\uac04\uc5d0\uac8c \uc801\uc6a9\ub418\ub294 \uac83\uc740 \uc544\ub2c8\uc9c0\ub9cc, \uc5ec\uc804\ud788 \uc911\uc694\ud55c \ucd08\uae30 \ub2e8\uacc4 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uac00\uc7a5 \uc798 \ubc18\uc601\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4\uc640 \uc720\uc0ac\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uad00\ucc30\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc0dd\ub9ac\ud559\uc801 \ucc28\uc774\uac00 \uc874\uc7ac\ud558\uc9c0\ub9cc, \ub9ce\uc740 \uc9c8\ubcd1 \ubaa8\ub378\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ubc18\uc751\uacfc \uc720\uc0ac\ud55c \uacb0\uacfc\ub97c \uc81c\uacf5\ud558\uc5ec \ud6a8\uacfc\uc801\uc778 \ucd08\uae30 \uac80\uc99d\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc2e4\uc2dc\uac04 \uc0dd\uccb4 \ubc18\uc751\uc744 \uad00\ucc30\ud560 \uc218 \uc788\uac8c \ud574\uc90d\ub2c8\ub2e4","\uc0dd\ubb3c\ud559\uc801 \ucc28\uc774\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \ud1b5\ucc30\ub825\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc5f0\uad6c\ub294 \uc778\uac04 \uc0dd\ub9ac\ud559\uc5d0 \ub300\ud55c \uc911\uc694\ud55c \uc774\ud574\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ubb3c\ub860 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\uac00 \ud56d\uc0c1 \uc778\uac04\uc5d0\uac8c \uc77c\uce58\ud558\uc9c0\ub294 \uc54a\uc744 \uc218 \uc788\uc73c\ub098, \uc774\ub294 \uc5f0\uad6c\uc758 \ucd08\uae30\uc5d0 \ub9ac\uc2a4\ud06c\ub97c \uc2dd\ubcc4\ud558\uace0 \uac10\uc18c\uc2dc\ud0a4\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ube44\ub85d \ub3d9\ubb3c\uacfc \uc778\uac04 \uc0ac\uc774\uc758 \ucc28\uc774\ub85c \uc778\ud574 \uc77c\ubd80 \uacb0\uacfc\uac00 \ub2e4\ub974\uac8c \ub098\ud0c0\ub0a0 \uc218 \uc788\ub354\ub77c\ub3c4, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04\uc5d0\uc11c\uc758 \uc608\uc0c1\uce58 \ubabb\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc774\ud574\ud558\uace0 \uc608\uce21\ud558\ub294 \ub370 \uac00\uc7a5 \uac00\uae4c\uc6b4 \ud604\uc2e4\uc801\uc778 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\ubcf4\ub2e4 \ub354 \ube60\ub978 \uacb0\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc608\uce21\ud558\ub294 \ub370 \uc788\uc5b4 \ub3c5\ubcf4\uc801\uc778 \uc7a5\uc810\uc744 \uac00\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\ub9ac\ud559\uacfc \ub9e4\uc6b0 \uc720\uc0ac\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc\uc758 \uc0dd\ub9ac\uc801 \ucc28\uc774\ub97c \uace0\ub824\ud558\uc5ec \uc124\uacc4\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \ube44\uc2b7\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ube44\ub85d \uc778\uac04\uacfc \ub3d9\ubb3c \uac04 \uc0dd\ub9ac\uc801 \ucc28\uc774\uac00 \uc788\uc9c0\ub9cc, \uc5ec\uc804\ud788 \uac00\uce58 \uc788\ub294 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc784\uc0c1 \uc801\uc6a9 \uac00\ub2a5\uc131\uc744 \ub192\uc774\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8 \ub370\uc774\ud130\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uad00\ucc30\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c\uacfc \uc778\uac04 \uc0ac\uc774\uc758 \uc0dd\ubb3c\ud559\uc801 \ucc28\uc774\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc720\uc77c\ud558\uac8c \ubcf5\uc7a1\ud55c \uc804\uc2e0 \ubc18\uc751\uc744 \uad00\ucc30\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uc624\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574\uc11c\ub9cc \uac80\uc99d 9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c \ud56d\uc0c1 \uc6b0\uc120\uc2dc\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uae30\uc874\uc758 \uacfc\ud559\uc801 \uae30\uc900\uacfc \uc724\ub9ac\uc801 \uc9c0\uce68 \ud558\uc5d0 \uc5c4\uaca9\ud558\uac8c \ud1b5\uc81c\ub418\uace0 \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \uae30\uad00\uc758 \uc2b9\uc778 \uc808\ucc28\ub97c \ud1b5\uacfc\ud558\uae30 \uc704\ud55c \ud544\uc218 \uc870\uac74\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ub300\uc548\uc744 \uc81c\uc2dc\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uacfc\ud559 \uc5f0\uad6c\uc5d0\uc11c\ub294 \ub3d9\ubb3c\uc758 \uc0b6\uc758 \uc9c8\uc5d0 \ub300\ud55c \uae4a\uc740 \uc874\uc911\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc774\ub8e8\ub294 \ub370 \uc788\uc5b4 \ud544\uc5f0\uc801\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uae30\uc874 \uce58\ub8cc\ubc95\uc758 \ud55c\uacc4\ub97c \uadf9\ubcf5\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uad00\ub828\ud55c \uaddc\uc81c\ub294 \uc5f0\uad6c \uacfc\uc815\uc5d0\uc11c \ubc18\ub4dc\uc2dc \uc9c0\ucf1c\uc57c \ud560 \uc911\uc694\ud55c \uc694\uc18c\ub85c \uc790\ub9ac\uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uac00\uc7a5 \ud6a8\uc728\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95 \uc911 \ud558\ub098\ub85c \ubc1b\uc544\ub4e4\uc5ec\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \uaddc\uc81c\uc640 \uc9c0\uce68\uc774 \uac15\ud654\ub418\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc218\ud589\uc774 \ubcf4\uc7a5\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uc744 \uac1c\uc120\ud558\ub824\ub294 \ub178\ub825\uc774 \uc801\uadf9\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\ucca8\ub2e8 \uc758\ud559 \uc5f0\uad6c\uc758 \uc911\uc694\ud55c \uc77c\ubd80\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\uace0 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \ubc0f \ubc31\uc2e0 \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\ub294 \ub370\uc774\ud130\ub294 \uc778\uac04\uc5d0\uac8c \uc9c1\uc811\uc801\uc778 \uc774\uc775\uc744 \uc81c\uacf5\ud558\uba70, \uc2e0\uc57d \uac1c\ubc1c\uc758 \uc911\uc694\ud55c \ub2e8\uacc4\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0ac\ud68c \uc804\ubc18\uc758 \uac74\uac15\uc744 \uc704\ud574 \ud544\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc0dd\uba85\uacfc \uac74\uac15\uc744 \ubcf4\ud638\ud558\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2ec\uac01\ud55c \uc9c8\ubcd1\uc73c\ub85c \uace0\ud1b5\ubc1b\ub294 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ube44\ub3d9\ubb3c\uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc5ec\uc804\ud788 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc218\ub9ce\uc740 \uc0dd\uba85\uc744 \uad6c\ud55c \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95\uc744 \uc804\ub2ec\ud558\ub294 \ub370 \uae30\uc5ec\ud574\uc654\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacf5\uacf5 \uac74\uac15 \ubcf4\ud638\ub97c \uc704\ud574 \uae09\uc18d\ud788 \uc9c4\ud589\ub418\uc5b4\uc57c \ud560 \uc0c1\ud669\uc5d0\uc11c \uc5ec\uc804\ud788 \uac00\uc7a5 \uc0ac\uc6a9 \uac00\ub2a5\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ucd09\uc9c4\uc81c\ub85c\ub3c4 \uc791\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85\uacf5\ud559 \ud601\uc2e0\uc744 \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ube44\ub3d9\ubb3c \uc2e4\ud5d8 \ub300\uc548\uc744 \uc801\uadf9\uc801\uc73c\ub85c \uac1c\ubc1c\ud558\uace0 \uc788\ub2e4\ub294 \uc810\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc0ac\uc6a9\uc744 \uc904\uc774\ub294 \uae0d\uc815\uc801\uc778 \ubc29\ud5a5\uc73c\ub85c \ub098\uc544\uac00\ub294 \uc88b\uc740 \uc608\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \ud1b5\uc81c\ub97c \ubc1b\uc73c\uba70 \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uc804\uc744 \ucd09\uc9c4\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"13___","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","13___"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"Q6ISQWpAE0G30A1BHDsPQfYcEkFWTw9BRrgPQSsNEEHTGRBB33QSQYSQEkFCCRJBM9ARQcN2EkGeVw9BAn0PQXILEkHbGxJBZIISQSzZEkEZKBJByCQSQRuAEUGr9w9B\u002fikTQW7eEUGPUBJBnPUSQS4IEkGJrg9Bi4ISQQRtEUE="},"y":{"dtype b300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ube44\ub85d \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uc138\ud3ec \ubc30\uc591\uacfc \uac19\uc740 \ub300\uccb4 \uae30\uc220\ub4e4\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ubc29\ubc95\ub4e4\uc740 \uc2e4\uc81c \uc0dd\uccb4 \ub0b4 \ud658\uacbd\uc744 \uc644\ubcbd\ud788 \uc2dc\ubbac\ub808\uc774\uc158\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc778\uacf5 \uc7a5\uae30\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc740 \ud2b9\uc815 \uc0c1\ud669\uc5d0 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\uc778\uacf5\uc9c0\ub2a5\uacfc \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc740 \ub3d9\ubb3c\uc758 \uc0dd\ub9ac\uc801 \ubc0f \uba74\uc5ed \ubc18\uc751\uc744 \ubcf5\uc81c\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","3D \uc138\ud3ec \ubaa8\ub378\uacfc \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158 \ub4f1 \ub300\uccb4 \uae30\uc220\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc0dd\ub9ac\ud559\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc73c\ub85c \uc5b8\uae09\ub418\ub294 \uc778\uacf5 \uc7a5\uae30\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \ubd88\uacfc\ud569\ub2c8\ub2e4","\uc778\uacf5\uc9c0\ub2a5\uacfc \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1 \uac19\uc740 \ub300\uccb4 \ubc29\ubc95\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ub51c\ub808\ub9c8\ub97c \ud574\uacb0\ud560 \uc218 \uc788\uc9c0\ub9cc, \ud604\uc7ac \uc774 \uae30\uc220\ub4e4\uc740 \uc644\uc804\ud55c \ub300\uc548\uc774 \ub420 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc138\ud3ec \ubaa8\ub378\uc774\ub098 \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uc740 \ud2b9\uc815 \uc5f0\uad6c \ub2e8\uacc4\uc5d0\uc11c \uc720\uc6a9\ud558\uc9c0\ub9cc, \uc644\uc804\ud55c \uc720\uae30\uccb4\uc758 \ubcf5\uc7a1\uc131\uc744 \uc7ac\ud604\ud558\uac70\ub098 \uc608\uce21\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ucef4
