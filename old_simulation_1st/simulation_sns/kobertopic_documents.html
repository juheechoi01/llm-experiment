c2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uae30\uc220 \ubc1c\uc804\uc744 \ud65c\uc6a9\ud574 \uc790\ub140 \ubcf4\ud638 \uae30\ub2a5\uc744 \uac15\ud654\ud560 \uc218 \uc788\uc73c\uba70, \uc774\ub97c \ud1b5\ud574 \ubd80\ubaa8\uac00 \uc790\ub140\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud65c\ub3d9\uc744 \ubcf4\ub2e4","\uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \uac00\uc871\uacfc \ud559\uad50\uc758 \uc9c0\uc6d0 \uccb4\uacc4\ub97c \uac15\ud654\ud568\uc73c\ub85c\uc368 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc720\ud574 \ucf58\ud150\uce20\uc758 \ub178\ucd9c \uc704\ud5d8\uc740 \ubc95\uc801 \uaddc\uc81c\ubcf4\ub2e4 \uac1c\uc778\ud654\ub41c \ud544\ud130\ub9c1\uacfc \ubd80\ubaa8\uc758 \uac10\ub3c5\uc744 \ud1b5\ud574 \ud6a8\uacfc\uc801\uc73c\ub85c \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\ub4e4\uc758 \ucc38\uc5ec\ub97c \ud1b5\ud574 \ubcf4\ub2e4 \uc548\uc804\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud658\uacbd\uc744 \uc870\uc131\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uad50\uc721\uacfc \ubd80\ubaa8\uc758 \uac00\uc774\ub4dc\ub77c\uc778\uc740 \ubbf8\uc131\ub144\uc790\uc758 \uc62c\ubc14\ub978 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc9c0\uc6d0\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0\uc11c\ub294 \ubd80\ubaa8\uc640 \uc790\ub140 \uac04\uc758 \ub300\ud654\uc640 \uad00\ub9ac\uac00 \uc911\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \uc788\uc5b4\uc11c\ub294 \ubd80\ubaa8 \ubc0f \uad50\uc721\uc790\uc640\uc758 \ud611\ub825\uc774 \uac00\uc7a5 \uc911\uc694\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc744 \ud65c\uc6a9\ud55c \ucf58\ud150\uce20 \ud544\ud130\ub9c1 \ub3c4\uad6c\ub098 \ubd80\ubaa8 \uac10\ub3c5 \uae30\ub2a5 \ub4f1\uc744 \ud1b5\ud574 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc758 \ubd80\ub2f4\uc744 \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uae30\uc220\uc801 \ub3c4\uad6c\ub97c \ud65c\uc6a9\ud55c \ubaa8\ub2c8\ud130\ub9c1\uacfc \uac00\uc774\ub4dc\ub77c\uc778\uc744 \uc124\uacc4\ud568\uc73c\ub85c\uc368 \ubd80\ubaa8\ub4e4\uc740 \uc790\ub140\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc801\uc808\ud558\uac8c \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uad50\uc721 \uae30\uad00\uc740 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uad50\uc721\uacfc \uad00\ub9ac \ucc28\uc6d0\uc5d0\uc11c \ub2e4\ub904\uc57c \ud569\ub2c8\ub2e4","\ubd80\ubaa8 \ubc0f \ubcf4\ud638\uc790\uc758 \uc5ed\ud560\uc774 \uac15\ud654\ub418\uc5b4\uc57c \ud558\uba70, \uc774\ub4e4\uc774 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc62c\ubc14\ub85c \uc9c0\ub3c4\ud560 \uc218 \uc788\ub3c4\ub85d \ub3c4\uc640\uc8fc\uc5b4\uc57c \ud569\ub2c8\ub2e4; \ubbf8\uc131\ub144\uc790\uc758 \uc548\uc804\ud55c \uc778\ud130\ub137 \uc0ac\uc6a9\uc744 \uc704\ud55c \uad50\uc721\uc744 \uc7a5\ub824\ud558\ub294 \ubbf8\uc8fc \uc544\uc774\ub4e4\ubcf4\ud638 \ud504\ub85c\uadf8\ub7a8(National Center for Missing & Exploited Children, NCMEC)\uc740 \uc774\uc640 \uac19\uc740 \uc815\ucc45\uc758 \ud544\uc694\uc131\uc744 \uac15\uc870\ud558\uba70 \uac00\uc815 \ub0b4 \uad50\uc721\uc758 \uc911\uc694\uc131\uc744 \uc9c0\uc801\ud569\ub2c8\ub2e4","\ubd80\ubaa8\uac00 \uc124\uc815\ud560 \uc218 \uc788\ub294 \ub2e4\uc591\ud55c \uc0ac\uc6a9\uc790 \uc81c\ud55c \uc124\uc815\uc774\ub098 \uc54c\ub9bc \uae30\ub2a5\uc740 \uac1c\uc778\uc758 \ud544\uc694\uc5d0 \ub530\ub978 \ubcf4\ud638\ub97c \uac00\ub2a5\ucf00 \ud569\ub2c8\ub2e4","Apple Inc.\ub294 \ud559\ubd80\ubaa8\uc640 \uccad\uc18c\ub144\uc744 \uc704\ud574 \ub2e4\uc591\ud55c \uc548\uc804 \ub3c4\uad6c\uc640 \uc815\ubcf4 \uc790\uc6d0\uc744 \uc81c\uacf5\ud568\uc73c\ub85c\uc368, \ubd80\ubaa8\uac00 \uc790\ub140\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ub354 \ud6a8\uacfc\uc801\uc73c\ub85c \uad00\ub9ac\ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\uc6d0\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubd80\ubaa8\uc640 \uc790\ub140 \uac04\uc758 \uacf5\uac10\uc744 \ud615\uc131\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c, \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc774 \uc5ed\ud560 \ubaa8\ub378\uc774 \ub418\uc5b4 \ucc45\uc784 \uc788\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc7a5\ub824\ud568\uc73c\ub85c\uc368, \ubb38\uc81c \uc0c1\ud669\uc5d0 \ub300\ud55c \ub300\ucc98 \ub2a5\ub825\uc744 \ud5a5\uc0c1\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubd80\uc815\uc801 \uc601\ud5a5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574\uc11c\ub294 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\uc815\uc801\uc778 \uc628\ub77c\uc778 \uacbd\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud574\uc11c\ub294 \uad50\uc721\uacfc \ubd80\ubaa8\uc758 \uc5ed\ud560\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc0ac\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4. 'Parenting for a Digital Future'\ub294 \uccad\uc18c\ub144\uc774 \uc628\ub77c\uc778 \ud658\uacbd\uc5d0\uc11c \uae0d\uc815\uc801\uc778 \uacbd\ud5d8\uc744 \ud560 \uc218 \uc788\ub3c4\ub85d \ubd80\ubaa8\uc640 \uad50\uc0ac\uac00 \uc9c0\uc18d\uc801\uc73c\ub85c \uc9c0\ub3c4\ud558\uace0 \uc9c0\uc6d0\ud574\uc57c \ud55c\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\ub610\ud55c, \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc5d0\uac8c\ub294 \ucc45\uc784 \uc788\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \ubc29\ubc95\uc744 \uc9c0\ub3c4\ud560 \uc218 \uc788\ub294 \uc790\uc6d0\uacfc \uc9c0\uc6d0\uc774 \uc8fc\uc5b4\uc9c4\ub2e4\uba74, \uc774\ub4e4\uc740 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \uc218\ud589\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub294 \uc790\ub140\uc640 \uc5f4\ub9b0 \uc18c\ud1b5\uc744 \ud1b5\ud574 \uc62c\ubc14\ub978 \uc0ac\uc6a9 \uc2b5\uad00\uc744 \ud615\uc131\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560\uc744 \uac15\ud654\ud558\uc5ec \ubbf8\uc131\ub144\uc790\uac00 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uac74\uac15\ud558\uac8c \uc0ac\uc6a9\ud558\ub294 \ubc95\uc744 \ubc30\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc9c0\ub098\uce5c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc73c\ub85c \uc778\ud55c \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\uc5d0 \ub300\ud55c \uc6b0\ub824\ub294 \ubd80\ubaa8\uc758 \uc5ed\ud560\uacfc \uad50\uc721\uc744 \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uacfc \uad00\ub828\ub41c \uc704\ud5d8\uc744 \uc644\ud654\ud558\ub294 \ub370 \uc788\uc5b4 \uad50\uc721\uacfc \ubd80\ubaa8\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc740 \ubd80\ubaa8\uc5d0\uac8c \uc790\ub140\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc27d\uac8c \uad00\ub9ac\ud560 \uc218 \uc788\ub294 \ub3c4\uad6c\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uac00 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud65c\ub3d9\uc744 \uc801\uc808\ud788 \uac10\ub3c5\ud560 \uc218 \uc788\ub3c4\ub85d \ub3c4\uc640\uc8fc\ub294 \uc571\uacfc \ub3c4\uad6c\uac00 \uac1c\ubc1c\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4. '\ub0b4\uc154\ub110 PTA(National Parent Teacher Association)'\ub294 \uc774\ub7ec\ud55c \ub3c4\uad6c \uc0ac\uc6a9\uc744 \uc7a5\ub824\ud558\uba70, \uc774\ub97c \ud1b5\ud574 \ubd80\ubaa8\uc640 \uad50\uc0ac\uac00 \ubbf8\uc131\ub144\uc790\uc758 \ub514\uc9c0\ud138 \uc0dd\ud65c\uc744 \ud6a8\uacfc\uc801\uc73c\ub85c \uad00\ub9ac\ud560 \uc218 \uc788\ub3c4\ub85d \uc870\uc5b8\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc778\uc2a4\ud0c0\uadf8\ub7a8(Instagram)\uc740 \ubd80\ubaa8\uc640 \uccad\uc18c\ub144\uc774 \uc124\uc815\ud560 \uc218 \uc788\ub294 \ub2e4\uc591\ud55c \uad00\ub9ac \ub3c4\uad6c\ub97c \uc81c\uacf5\ud558\uc5ec \uc0ac\uc6a9 \uc2dc\uac04\uc744 \uc870\uc808\ud558\uace0 \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\ub97c \ucc28\ub2e8\ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\uc6d0\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubd80\ubaa8\uc640 \uc790\ub140 \uac04\uc758 \uc18c\ud1b5\uc744 \ucd09\uc9c4\ud558\ub294 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ubd80\ubaa8\ub098 \ubcf4\ud638\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud574 \uc790\ub140\uc640\uc758 \uc5f4\ub9b0 \ub300\ud654\ub97c \ud1b5\ud574 \uad00\uc5ec\ud558\ub294 \uac83\uc774 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\ud654\ub294 \uc628\ub77c\uc778\uc5d0\uc11c\uc758 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\uc5d0 \ub9e4\uc6b0 \uc911\uc694\ud569\ub2c8\ub2e4","\uad34\ub86d\ud798\uacfc \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc5d0 \ub300\ud55c \ubb38\uc81c\ub294 \uc62c\ubc14\ub978 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uacfc \ubd80\ubaa8\uc758 \uc9c0\ub3c4 \uac10\ub3c5\uc744 \ud1b5\ud574 \ud6a8\uacfc\uc801\uc73c\ub85c \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubaa8\ub4e0 \ubd80\ubaa8\uac00 \uc790\ub140\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ucca0\uc800\ud788 \uad00\ub9ac\ud558\uae30 \uc5b4\ub824\uc6b4 \uc0c1\ud669\uc5d0\uc11c, \uae30\uc220\uc801 \ub3c4\uad6c\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \uc790\ub140 \uac04\uc758 \uc5f4\ub9b0 \ub300\ud654\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc704\ud5d8\uc131\uc744 \uc904\uc774\ub294 \ub370 \ud070 \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\ub294 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud65c\uc6a9\uc5d0 \uc801\uadf9\uc801\uc73c\ub85c \ucc38\uc5ec\ud574\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubd80\ubaa8\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc9c0\ub3c4\ud560 \uc218 \uc788\ub294 \ub3c4\uad6c\uc640 \uc790\uc6d0\uc744 \uc5bb\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uae30\uc220\uc801 \ub3c4\uad6c\uc640 \ubd80\ubaa8\uc758 \uc9c0\ub3c4\uac00 \uacb0\ud569\ub418\uba74 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub294 \ud658\uacbd\uc744 \uc870\uc131\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uac00 \ubbf8\uc131\ub144\uc790\uc758 \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \uc801\uadf9\uc801\uc73c\ub85c \uac10\ub3c5\ud558\ub294 \uac83\ub3c4 \ubd80\uc815\uc801 \uc601\ud5a5\uc744 \uc904\uc774\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \uc801\uadf9\uc801\uc778 \uac1c\uc785\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \ubd80\uc791\uc6a9\uc744 \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubcf4\ud638\uc790\uc640 \uc790\ub140 \uac04\uc758 \uc18c\ud1b5\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc815\uae30\uc801\uc778 \uac80\ud1a0\uc640 \ud53c\ub4dc\ubc31\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc801\uc808\ud788 \uc0ac\uc6a9\ud558\uace0 \uc788\ub294\uc9c0 \ud655\uc778\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\ub97c \uc704\ud55c \uac10\ub3c5 \ub3c4\uad6c\ub97c \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ubd80\ubaa8\uc640 \uad50\uc0ac\ub294 \uccad\uc18c\ub144\ub4e4\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uad00\ucc30\ud558\uace0 \uc9c0\uc9c0\ud558\ub294 \uc5ed\ud560\uc744 \uc218\ud589\ud558\uba74\uc11c \ub354\uc6b1 \uc548\uc804\ud55c \ud658\uacbd\uc744 \uc870\uc131\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc740 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc801\uc808\ud55c \uc0ac\uc6a9 \uc9c0\uce68\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uac00 \ubbf8\uc131\ub144\uc790\uc758 \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \uc9c0\ub3c4\ud558\uace0 \uac10\uc2dc\ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc801\uc808\ud55c \uc0ac\uc6a9\uc744 \uc704\ud55c \uae30\uc220\uc801 \ubcf4\ud638 \uc7a5\uce58 \ubc0f \ubd80\ubaa8\uc758 \ubaa8\ub2c8\ud130\ub9c1\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc548\uc804\ud55c \uc628\ub77c\uc778 \uc0ac\uc6a9\ubc95\uc744 \uad50\uc721\ud558\uace0 \uac00\uc774\ub4dc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc5d0\uac8c \uad50\uc721\uacfc \uc9c0\uc6d0\uc744 \uc81c\uacf5\ud568\uc73c\ub85c\uc368 \uae30\uc220 \uc0ac\uc6a9 \ub2a5\ub825\uc744 \ud5a5\uc0c1\uc2dc\ucf1c \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc704\ud5d8 \uc694\uc18c\ub97c \ub354 \uc798 \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \ubd80\ubaa8\ub098 \ubcf4\ud638\uc790\uc758 \uc801\uadf9\uc801\uc778 \uc9c0\ub3c4\uac00 \ud568\uaed8\ud560 \ub54c \ub354\uc6b1 \uc548\uc804\ud574\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubd80\ubaa8\uc640 \uc790\ub140 \uac04\uc758 \uc5f4\ub9b0 \ub300\ud654\ub97c \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uc0ac\uc6a9\uc5d0 \ub530\ub978 \ubd80\uc791\uc6a9\uc744 \uc608\ubc29\ud558\ub824\uba74 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uac00 \uc801\uadf9\uc801\uc73c\ub85c \ucc38\uc5ec\ud558\uc5ec \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uae0d\uc815\uc801, \ubd80\uc815\uc801 \uc601\ud5a5\uc744 \uade0\ud615 \uc788\uac8c \uc774\ud574\ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\ub3c4\ud574\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uac00 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc8fc\uae30\uc801\uc73c\ub85c \uc810\uac80\ud558\uace0 \ub300\ud654\ub97c \ud1b5\ud574 \uc9c0\ub3c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc801 \ub3c4\uad6c\uc640 \ubd80\ubaa8\uc758 \ucc38\uc5ec\ub294 \uc704\ud5d8 \uc694\uc18c\ub97c \ud6a8\uacfc\uc801\uc73c\ub85c \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc81c\ud55c \ub300\uc2e0 \ubd80\ubaa8\uc640 \uad50\uc721\uae30\uad00\uc774 \ubbf8\uc131\ub144\uc790\uc758 \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \uc801\uadf9\uc801\uc73c\ub85c \ubaa8\ub2c8\ud130\ub9c1\ud558\uace0 \uc9c0\ub3c4\ud558\ub294 \uac83\uc774 \uc548\uc804\uc744 \ubcf4\uc7a5\ud558\ub294 \ub354 \ub098\uc740 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uc790\ub140 \uac04\uc758 \uac1c\ubc29\uc801 \ub300\ud654\uc640 \uc2e0\ub8b0 \uad6c\ucd95\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ub354\uc6b1 \uc548\uc804\ud558\uac8c \ub9cc\ub4ed\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc740 \uccad\uc18c\ub144\ub4e4\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc9c0\ub3c4\ud560 \ucc45\uc784\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uac1c\uc778\uc815\ubcf4 \ubcf4\ud638\ub098 \uc628\ub77c\uc778 \uad34\ub86d\ud798 \uac19\uc740 \ubb38\uc81c\ub294 \uc801\uc808\ud55c \uad50\uc721\uacfc \ubd80\ubaa8\uc758 \uc9c0\ub3c4\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc758 \ub178\ucd9c\uc740 \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \uc801\uadf9\uc801\uc778 \uac1c\uc785\uacfc \uc9c0\uce68\uc73c\ub85c \ucda9\ubd84\ud788 \ud574\uacb0 \uac00\ub2a5\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uae0d\uc815\uc801\uc778 \uad00\uacc4\ub97c \ud615\uc131\ud560 \uc218 \uc788\uc73c\uba70, \ubbf8\uad6d \ubd80\ubaa8 \uad50\uc0ac \ud611\ud68c(National Parent Teacher Association)\ub294 \ubd80\ubaa8\uc640 \uad50\uc0ac\ub4e4\uc774 \uccad\uc18c\ub144\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubaa8\ub2c8\ud130\ub9c1\ud558\uace0 \uac00\uc774\ub4dc\ub97c \uc81c\uacf5\ud568\uc73c\ub85c\uc368 \ubcf4\ub2e4 \uc548\uc804\ud558\uace0 \uac74\uac15\ud55c \uc628\ub77c\uc778 \uacbd\ud5d8\uc744 \uc870\uc131\ud560 \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uac00\uc871\uacfc\uc758 \ud611\ub825\uc740 \ubbf8\uc131\ub144\uc790\uac00 \uc628\ub77c\uc778\uc5d0\uc11c \ubd80\uc815\uc801\uc778 \uacbd\ud5d8\uc744 \ud68c\ud53c\ud558\ub3c4\ub85d \ub3c4\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\uae30\ubcf4\ub2e4\ub294 \ubd80\ubaa8\uc640 \uad50\uc0ac\uac00 \ubbf8\uc131\ub144\uc790\uc640 \uc9c0\uc18d\uc801\uc73c\ub85c \uc18c\ud1b5\ud558\uc5ec \uadf8\ub4e4\uc758 \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \uc9c0\uc6d0\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc7a5\uc810\uc744 \ucd5c\ub300\ud654\ud558\uace0 \ub2e8\uc810\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uac00\uc815 \ub0b4 \uc9c0\uce68\uc740 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc0ac\ud68c\uc758 \uc5ed\ud560\uc744 \uac15\ud654\ud558\uc5ec \ubd80\ubaa8\ub4e4\uc774 \uc790\ub140\uc758 \uae30\uc220 \uc0ac\uc6a9\uc744 \uc548\uc804\ud558\uac8c \uc9c0\uc6d0\ud560 \uc218 \uc788\ub3c4\ub85d \ub3c4\uc640\uc904 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220 \ud601\uc2e0\uc744 \ud1b5\ud574 \ubd80\ubaa8\ub098 \ubcf4\ud638\uc790\uac00 \ub354 \uc27d\uac8c \uc790\ub140\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubaa8\ub2c8\ud130\ub9c1\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubd80\ubaa8\uc758 \uc5ed\ud560\uacfc \uc801\uadf9\uc801\uc778 \ucc38\uc5ec\ub294 \ubbf8\uc131\ub144\uc790\uc758 \uc548\uc804\ud55c \uc778\ud130\ub137 \uc0ac\uc6a9\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc740 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc548\uc804\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc9c0\ub3c4\ud560 \uc218 \uc788\ub294 \ucda9\ubd84\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uac00 \ubbf8\uc131\ub144\uc790\uc758 \uc218\uba74 \ud328\ud134\uc774\ub098 \ud559\uc5c5 \uc131\ucde8\uc5d0 \ubbf8\uce58\ub294 \uc601\ud5a5\uc740 \ubd80\ubaa8\uc640 \uad50\uc0ac\uc758 \uc801\uc808\ud55c \uc9c0\ub3c4\uc640 \uad00\ub9ac\ub85c \ud6a8\uacfc\uc801\uc73c\ub85c \uc870\uc808\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uae30\uc220\uc801 \ub3c4\uad6c\uc640 \ubd80\ubaa8\uc758 \uc9c0\ub3c4\ub294 \uccad\uc18c\ub144\uc758 \uc548\uc804\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc9c0\uc6d0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\ud1b5\uc758 \uc911\uc694\uc131\uc744 \uac15\uc870\ud558\uc5ec \ubbf8\uc131\ub144\uc790\uc640 \ubd80\ubaa8 \uac04\uc758 \uc5f4\ub9b0 \ub300\ud654\ub97c \uc7a5\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc740 \ubd80\ubaa8\uc640\uc758 \ub300\ud654\ub97c \ud1b5\ud574 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc7a5\ub2e8\uc810\uc744 \uc774\ud574\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uac00\uc9d1\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc81c\ud55c\uc774 \uc544\ub2c8\ub77c \ubd80\ubaa8\uc640 \uc0ac\ud68c\uac00 \ucc38\uc5ec\ud558\ub294 \uacf5\ub3d9\uc758 \uac10\uc2dc\uc640 \uc9c0\uc6d0\uc774 \ud544\uc694\ud569\ub2c8\ub2e4. '\uac00\uc871 \uc628\ub77c\uc778 \uc548\uc804 \uc5f0\uad6c\uc18c'\ub294 \ubd80\ubaa8\uc640\uc758 \ub300\ud654 \ubc0f \uad50\uc721\uc774 \uccad\uc18c\ub144\ub4e4\uc758 \uc628\ub77c\uc778 \uacbd\ud5d8\uc744 \ub354 \uc548\uc804\ud558\uace0 \uae0d\uc815\uc801\uc73c\ub85c \ub9cc\ub4e4 \uc218 \uc788\ub2e4\uace0 \uac15\uc870\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc720\ud574\ud55c \ucf58\ud150\uce20\ub85c\ubd80\ud130\uc758 \ubcf4\ud638\ub294 \ubd80\ubaa8\uc640 \uc790\uc728\uc801 \ud1b5\uc81c \uccb4\uacc4\ub97c \uac15\ud654\ud568\uc73c\ub85c\uc368 \uac00\ub2a5\ud574\uc9d1\ub2c8\ub2e4","The Children's Partnership\ub294 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc5d0 \ucde8\uc57d\ud55c \uac00\uc815\uc744 \uc9c0\uc6d0\ud558\uae30 \uc704\ud574 \uc9c0\uc5ed \uc0ac\ud68c \uae30\ubc18\uc758 \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \ubd80\ubaa8\uc640 \uad50\uc0ac\ub4e4\uc774 \uc5b4\ub9b0\uc774\ub4e4\uc5d0\uac8c \uc801\uc808\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc9c0\uce68\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\ub3c4\ub85d \ub3c4\uc6c0\uc744 \uc904 \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub610\ud55c \uc815\ucc45\uc801\uc73c\ub85c \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub97c \uc704\ud55c \uc815\ubcf4 \uc11c\ube44\uc2a4\uc640 \ud6c8\ub828\uc744 \uac15\ud654\ud558\uc5ec \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubcc0\ud654\ub97c \uc774\ud574\ud558\uace0 \ub300\uc751\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \ud0a4\uc6b0\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc548 \ub300\uc2e0 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc548\uc804\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uacbd\ud5d8\uc744 \ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\uc6d0\ud558\ub294 \uac83\uc740 \ubd80\ubaa8\uc758 \uc9c0\ub3c4 \ubc0f \ud559\uad50\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub300\uc2e0, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721\uacfc \ubd80\ubaa8\uc758 \uc9c0\ub3c4\uc640 \uac19\uc740 \ub300\uc548\uc801 \ubc29\ubc95\uc774 \ub354 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc704\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud574 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\ub4e4\uc740 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uafb8\uc900\ud788 \uad00\ucc30\ud558\uace0 \uc9c0\ub3c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20 \ub178\ucd9c\uc740 \ubd80\ubaa8\uc640 \uad50\uc721\uae30\uad00\uc774 \ud568\uaed8 \ud574\uacb0\ud574\uc57c \ud560 \ubb38\uc81c\uc785\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uccad\uc18c\ub144 \uc0ac\uc774\uc758 \uc5f4\ub9b0 \ub300\ud654\ub294 \uc544\uc8fc \uc911\uc694\ud569\ub2c8\ub2e4","\ubd80\ubaa8\ub098 \ubcf4\ud638\uc790\uc758 \uc5ed\ud560\uc740 \uc801\uadf9\uc801\uc778 \ub300\ud654\ub97c \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc774\ud574\ub825\uc744 \ub192\uc774\uace0 \uc704\ud5d8\uc744 \uc778\uc2dd\ud558\ub294 \ub370 \ub3c4\uc6c0\uc744 \uc8fc\ub294 \uac83\uc785\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc628\ub77c\uc778\uc5d0\uc11c \uc548\uc804\ud558\uac8c \ud65c\ub3d9\ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\ub3c4\ud558\uace0 \uad50\uc721\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c \ubd80\ubaa8\uc640\uc758 \ud569\ub9ac\uc801\uc778 \ub300\ud654\uc640 \uc9c0\uce68\uc774 \ubbf8\uc131\ub144\uc790\uc758 \uc548\uc804\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"1_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","1_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"vUosQH9xG0ACcx1A3mkbQKgsJUCuUyZAu9YpQDS1JUDI uc6d0\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uad50\uc721\uacfc \uc815\uae30\uc801\uc778 \ub300\ud654\ub85c \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub192\uc77c \uc218 \uc788\uc73c\uba70, \uc774\ub294 \ub2e4\uc591\ud55c \uac00\uc815 \ud658\uacbd\uc5d0\uc11c\ub3c4 \uc77c\uad00\ub418\uac8c \uc801\uc6a9\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uad50\uc721\uc801 \ub3c4\uad6c\ub85c\uc11c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud3ed\ub113\uc740 \uc9c0\uc2dd\uc744 \uc2b5\ub4dd\ud560 \uc218 \uc788\uac8c \ud569\ub2c8\ub2e4","\uc778\ud130\ub137\uc740 \uad50\uc721\uc801 \uc790\uc6d0\uc73c\ub85c\uc11c \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \uc790\uc6d0\uacfc\uc758 \uc811\uadfc\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721 \ubc0f \uc815\ubcf4 \uc811\uadfc\uc131\uc5d0 \uae0d\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \ub3c4\uad6c\ub85c\uc11c \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud559\uc2b5\uacfc \ud601\uc2e0\uc758 \uacf5\uac04\uc73c\ub85c \uc791\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ub2e4\uc591\ud55c \uad50\uc721 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud559\uc2b5 \uc790\uc6d0\uc5d0 \ub300\ud55c \uc811\uadfc\uc131\uc744 \uc99d\uac00\uc2dc\ud0b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801\uc778 \ub3c4\uad6c\ub85c \ud65c\uc6a9\ub420 \uc218 \uc788\ub294 \uc911\uc694\ud55c \ud50c\ub7ab\ud3fc\uc785\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \uc790\uc6d0\uc5d0 \ub300\ud55c \uc811\uadfc\uc744 \uc6a9\uc774\ud558\uac8c \ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721 \ubc0f \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \ud1b5\ud574 \uac1c\uc778 \ubc1c\uc804\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \ub3c4\uad6c\ub85c \ud65c\uc6a9\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \uae30\ud68c\ub97c \ud655\ub300\ud558\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud559\uc2b5\uacfc \uad50\uc721\uc758 \ub3c4\uad6c\ub85c \uc0ac\uc6a9\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc778\ud130\ub137\uc744 \ud1b5\ud574 \ub2e4\uc591\ud55c \uc790\ub8cc\uc640 \uc815\ubcf4\ub97c \uc811\ud568\uc73c\ub85c\uc368 \uadf8\ub4e4\uc758 \uc9c0\uc2dd\uacfc \uc0ac\uace0\ub825\uc774 \ud655\uc7a5\ub429\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uac1c\uc778\uc815\ubcf4 \ubcf4\ud638 \uc5ed\uc2dc \uc18c\uc15c \ubbf8\ub514\uc5b4 \uad50\uc721\uc744 \ud1b5\ud574 \uac15\ud654\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uacfc \uc815\ubcf4 \uc218\uc9d1\uc5d0 \uc720\uc6a9\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud65c\uc6a9\ud55c \ud559\uc2b5\uc774 \ud559\uc5c5\uc801 \uc131\uacf5\uc73c\ub85c \uc774\uc5b4\uc9c8 \uc218 \uc788\ub294 \ubc29\ubc95\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \uc790\uc6d0\uc758 \uc811\uadfc\uc131\uc744 \ub192\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc62c\ubc14\ub978 \uc0ac\uc6a9\uc740 \uad50\uc721\uc758 \uc77c\ud658\uc73c\ub85c \uc9c0\ub3c4\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud559\uc0dd\ub4e4\uc774 \uc11c\ub85c \ub2e4\ub978 \uc9c0\uc5ed opment)'\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ub2e4\uc591\ud55c \uad50\uc721 \ucf58\ud150\uce20\uc5d0 \uc27d\uac8c \uc811\uadfc\ud560 \uc218 \uc788\uc5b4 \ud559\uc2b5 \ud3ed\uc744 \ub113\ud790 \uc218 \uc788\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uad50\uc721\uc801\uc778 \uc790\uc6d0\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ub354 \uc27d\uac8c \uc811\uadfc \uac00\ub2a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc758 \ub3c4\uad6c\ub85c \uc0ac\uc6a9\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc815\ubcf4\uc640 \ud559\uc2b5","\ub610\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc815\ubcf4 \uc2b5\ub4dd\uc758 \uc911\uc694\ud55c \ucc3d\uad6c\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc911\uc694\ud55c \uad50\uc721\uc801 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uacfc \ud559\uc5c5 \uac04\uc758 \uade0\ud615\uc744 \uc720\uc9c0\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uad50\uc721\uacfc \uc778\uc2dd \uc81c\uace0 \ud504\ub85c\uadf8\ub7a8\uc740 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721 \ubc0f \uc815\ubcf4 \uc811\uadfc\uc758 \uc8fc\uc694 \uc218\ub2e8\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4; National PTA\ub294 \ud559\uc0dd\ub4e4\uc774 \ud559\uc2b5 \uc790\ub8cc\uc5d0 \uc811\uadfc\ud558\uace0 \uc9c0\uc2dd\uc744 \ub113\ud788\uae30 \uc704\ud574 \uc810\uc810 \ub514\ d6d, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uae00\ub85c\ubc8c \uc0ac\ud68c\uc640 \uc5f0\uacb0\ub418\uace0 \uc131\uc7a5\uc744 \ub3c4\ubaa8\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \uc7a5\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc131\uacfc \uc815\uccb4\uc131 \ud615\uc131\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub294 \uc911\uc694\ud55c \uc758\uc0ac\uc18c\ud1b5 \ubc0f \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uc628\ub77c\uc778\uc5d0\uc11c \ud615\uc131\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc758 \uc0ac\ud68c\uc801 \ubc1c\ub2ec\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc758 \uc0ac\ud68c\uc801 \uad00\uacc4\uc640 \uc790\uae30 \ud45c\ud604 \ub2a5\ub825\uc744 \ud5a5\uc0c1\uc2dc\ud0b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc758 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \ucd09\uc9c4\ud558\ub294 \uc911\uc694\ud55c \ud50c\ub7ab\ud3fc\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc0ac\ud68c\uc801 \uae30\uc220\uacfc \ub124\ud2b8\uc6cc\ud06c \ud615\uc131\uc744 \ucd09\uc9c4\ud558\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc5d0\uac8c\ub294 \uac01\uae30 \ub2e4\ub978 \uad00\uc2ec\uc0ac\uc640 \ucde8\ubbf8\ub97c \uac00\uc9c4 \ucee4\ubba4\ub2c8\ud2f0\uc5d0 \uc811\uadfc\ud560 \uae30\ud68c\ub97c \uc90d\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9 \ub2a5\ub825\uc744 \ud5a5\uc0c1\uc2dc\ud0b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uac00 \uc0ac\ud68c\uc801 \uad00\uacc4\ub9dd\uc744 \ud655\uc7a5\ud558\ub294 \ub370 \uc911\uc694\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc911\uc694\ud55c \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9 \uc218\ub2e8\uc785\ub2c8\ub2e4","\ucee4\ubba4\ub2c8\ud2f0 \ud615\uc131\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \ucd09\uc9c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ub610\ub798\uc640\uc758 \uae0d\uc815\uc801 \uc5ed\ud560 \ubaa8\ub378\uc744 \ud1b5\ud574 \uac74\uac15\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc2b5\uad00\uc744 \ud615\uc131\ud558\ub3c4\ub85d \uaca9\ub824\ubc1b\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uacfc \uad00\uacc4 \ud615\uc131\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ucee4\ubba4\ub2c8\ud2f0\uc640 \uc5f0\uacb0\ub418\uace0 \uc0ac\ud68c\uc801 \uc9c0\uc6d0\uc744 \ubc1b\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc911\uc694\ud55c \uc0ac\ud68c\uc801 \uc5f0\uacb0\uace0\ub9ac \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud544\uc218\uc801\uc778 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9 \ucc44\ub110\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc0ac\ud68c\uc801 \uc9c0\uc6d0\uacfc \uc815\uc2e0\uc801 \uc9c0\uc9c0\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uac00 \uc0ac\ud68c\uc801 \uad00\uacc4\ub97c \ud615\uc131\ud558\uace0 \uc720\uc9c0\ud558\uac8c \ub3c4\uc640\uc90d\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc11c\ub85c \uc5f0\uacb0\ub418\uace0 \ud611\ub825\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc131\uc744 \uac15\ud654\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc0ac\ud68c\uc801 \uad00\uacc4\ub97c \ud655\uc7a5\ud558\uace0 \uc720\uc9c0\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc911\uc694\ud55c \uc758\uc0ac\uc18c\ud1b5 \uc218\ub2e8\uc785\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc628\ub77c\uc778\uc5d0\uc11c \uc0ac\ud68c\uc801 \uc9c0\uc6d0\uc744 \ubc1b\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc911\uc694\ud55c \uc0ac\ud68c\uc801 \uc5f0\uacb0 \uc218\ub2e8\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc18c\uc911\ud55c \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uc99d\uc9c4\uc2dc\ud0b5\ub2c8\ub2e4. '\ubbf8\uad6d \uad6d\ubbfc\uc778\uc815\ucee8\ud37c\ub7f0\uc2a4(National Conference on Citizenship)'\uc5d0\uc11c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4\uac00 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc911\uc694\ud55c \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc81c\uacf5\ud558\uc5ec \uadf8\ub4e4\uc774 \ub354 \ub9ce\uc740 \uad00\uacc4\ub97c \ud615\uc131\ud558\uace0 \uc720\uc9c0\ud560 \uc218 \uc788\uac8c \ud55c\ub2e4\uace0 \uc778\uc815\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc0ac\ud68c\uc801 \uad00\uacc4\ub97c \ud615\uc131\ud558\uace0 \uc720\uc9c0\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uc790\uae30 \ud45c\ud604\uc744 \ud65c\uc131\ud654\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc758 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc911\uc694\ud55c \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \ud559\uc2b5\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc911\uc694\ud55c \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \uccad\uc18c\ub144\uc758 \uc790\uae30 \ud45c\ud604 \ubc0f \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc9c0\uc6d0\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc758 \ud45c\ud604\uc758 \uc790\uc720\ub97c \ubcf4\ud638\ud558\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc911\uc694\ud55c \uc9c0\uc6d0\ub9dd\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc758 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4, \uc774\ub294 \uadf8\ub4e4\uc774 \ub610\ub798\uc640\uc758 \uad00\uacc4\ub97c \uad6c\ucd95\ud558\uace0 \uc720\uc9c0\ud558\uba70, \uc0ac\ud68c\uc801 \uae30\uc220\uc744 \ubc1c\uc804\uc2dc\ud0a4\ub294 \ub370\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc911\uc694\ud55c \uac1c\ubc29\uc801 \uacbd\ud5d8\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc911\uc694\ud55c \uc0ac\ud68c\uc801 \uc5f0\uacb0\uace0\ub9ac\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc911\uc694\ud55c \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790 \uac04\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uac15\ud654\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\ub9dd\uc744 \ud655\uc7a5\uc2dc\ud0a4\uace0 \uc0ac\ud68c\uc801 \uae30\uc220\uc744 \ubc1c\uc804\uc2dc\ud0a4\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ud544\uc218\uc801\uc778 \uc0ac\ud68c\uc801 \uc5f0\uacb0 \ud1b5\ub85c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc911\uc694\ud55c \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc758 \uc790\uae30 \ud45c\ud604\uacfc \uc815\uccb4\uc131 \ud615\uc131\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\u \ub294 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\uac00 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \ud559\uc2b5\uc744 \uc9c0\uc6d0\ud55c\ub2e4\ub294 \uc810\uc740 \ubd84\uba85\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uc911\uc694\ud55c \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uc790\uae30 \ud45c\ud604\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uccad\uc18c\ub144\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc911\uc694\ud55c \uc0ac\ud68c\uc801 \uc5f0\uacb0\ub9dd\uc744 \ud615\uc131\ud569\ub2c8\ub2e4. '\uc804\uad6d\ud559\uad50\uc2ec\ub9ac\ud559\uc790\ud611\ud68c'\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ub610\ub798\uc640\uc758 \uae0d\uc815\uc801\uc778 \uc0c1\ud638\uc791\uc6a9\uc744 \ud1b5\ud574 \uc0ac\ud68c\uc801 \uae30\uc220\uc744 \ubc1c\uc804\uc2dc\ud0a8\ub2e4\uace0 \ubd84\uc11d\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ub798\uc640\uc758 \uc0c1\ud638\uc791\uc6a9\uc740 \uccad\uc18c\ub144 \ubc1c\ub2ec\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc99d\uc9c4\uc2dc\ud0b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud55c \uae0d\uc815\uc801\uc778 \ucee4\ubba4\ub2c8\ud2f0 \ud615\uc131\uc740 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uc911\uc694\ud55c \uc0ac\ud68c\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc815\uc2e0 \uac74\uac15 \uc9c0\uc6d0\uc758 \uc911\uc694\ud55c \uc218\ub2e8\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4; The Jed Foundation\uc740 \uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc815\uc2e0 \uac74\uac15\uc5d0 \ub300\ud55c \uc815\ubcf4\ub97c \uc811\ud558\uace0, \ub3d9\uc77c\ud55c \ubb38\uc81c\ub97c \uacaa\ub294 \uc0ac\ub78c\ub4e4\uacfc \uc18c\ud1b5\ud558\uba70 \uc9c0\uc6d0\uc744 \ubc1b\uc744 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ubc1b\uc744 \uc218 \uc788\ub2e4\uace0 \ubc1d\ud614\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc5f0\uacb0\uc131\uacfc \ucc38\uc5ec\ub97c \uc99d\uc9c4\uc2dc\ud0b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uc9c0\uc6d0\uc758 \ud50c\ub7ab\ud3fc\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4. '\ud2f4\uc2a4\ud3ec\ub7fc(TeensForRum)'\uc774\ub77c\ub294 \ubbf8\uc131\ub144\uc790 \uad8c\uc775 \ubcf4\ud638 \ub2e8\uccb4\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ub3d9\ub8cc\ub4e4\uacfc \uc0c1\ud638 \uc791\uc6a9\ud558\uba70 \uc815\uc11c\uc801 \uc9c0\uc9c0\uc640 \uc0ac\ud68c\uc801 \uae30\uc220\uc744 \ubc30\uc591\ud560 \uc218 \uc788\ub2e4\ub294 \uc810\uc744 \uac15\uc870\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccad\uc18c\ub144\ub4e4\uc740 \ub2e4\uc591\ud55c \uc790\uc6d0\uc744 \ud1b5\ud574 \ud48d\ubd80\ud55c \uc815\ubcf4\uc640 \uc9c0\uc2dd\uc744 \uc2b5\ub4dd\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","(2) \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ub610\ud55c \uccad\uc18c\ub144\uc5d0\uac8c \uae0d\uc815\uc801\uc778 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \ub9cc\ub4e4\uace0 \uc720\uc9c0\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uc9c0\uc6d0\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\ub9dd \ud615\uc131\uacfc \uc758\uc0ac\uc18c\ud1b5 \ub2a5\ub825 \ud5a5\uc0c1\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uccad\uc18c\ub144\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ucc3d\uc758\uc131\uacfc \uc790\uae30 \ud45c\ud604\uc744 \uc5f0\ub9c8\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc774 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uc720\uc9c0\ud560 \uc218 \uc788\ub3c4\ub85d \ub3c4\uc640\uc90d\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \ud604\uc2e4 \uc138\uacc4\uc5d0\uc11c \uacaa\ub294 \ubb38\uc81c\ub4e4\uc744 \ud574\uacb0\ud558\ub294 \ub370 \ub3c4\uc6c0\uc744 \uc904 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc5d0\uac8c \uad50\uc721\uc801 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uc9c0\uc6d0\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4; National 4-H Council\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\uac00 \ud2b9\ud788 \ub18d\ucd0c\uc774\ub098 \uace0\ub9bd\ub41c \uc9c0\uc5ed\uc5d0 \uc0ac\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uce5c\uad6c \ubc0f \uba58\ud1a0\uc640 \uc5f0\uacb0\ub418\ub294 \uc911\uc694\ud55c \ud1b5\ub85c\uac00 \ub420 \uc218 \uc788\uc74c\uc744 \uc778\uc815\ud558\uace0, \uc774\ub97c \uc0ac\uc6a9\ud558\ub294 \uac83\uc744 \uc7a5\ub824\ud569\ub2c8\ub2e4","\ub9ce\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uc720\uc9c0\ud558\uace0 \ubc1c\uc804\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4; \ud398\uc774\uc2a4\ubd81(Facebook)\uc740 \uccad\uc18c\ub144\ub4e4\uc774 \ud50c\ub7ab\ud3fc\uc744 \uc0ac\uc6a9\ud574 \uc804 \uc138\uacc4 \uce5c\uad6c\ub4e4\uacfc \ub124\ud2b8\uc6cc\ud06c\ub97c \ud615\uc131\ud558\uace0 \uc0ac\ud68c\uc801 \ud611\ub825\uc744 \uc99d\uc9c4\uc2dc\ud0a4\ub294 \ubc29\ubc95\uc744 \uc81c\uacf5\ud568\uc73c\ub85c\uc368 \uae0d\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce5c\ub2e4\uace0 \uc8fc\uc7a5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uae30\uc220 \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc790\uc2e0\uc758 \uc758\uacac\uc744 \ud45c\ud604\ud558\uace0 \ucc3d\uc758\ub825\uc744 \ubc1c\ud718\ud560 \uc218 \uc788\ub294 \ud50c\ub7ab\ud3fc\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uc815\uc11c\uc801 \uc9c0\uc6d0\uacfc \uc18c\uc18d\uac10\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uc0ac\ud68c\uc801 \ucc38\uc5ec\uc640 \ud45c\ud604\uc758 \uc7a5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4 \uac04\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \ub3c4\ubaa8\ud558\uba70 \uc815\uc11c\uc801 \uc9c0\uc6d0\uacfc \uc18c\uc18d\uac10\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc790\uc2e0\uc744 \ud45c\ud604\ud558\ub294 \ub370 \ud544\uc694\ud55c \uae30\ud68c\ub97c \ubc15\ud0c8\ud558\uc9c0 \uc54a\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \uccad\uc18c\ub144\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc9c4\ub85c \ud0d0\uc0c9\uacfc \uac19\uc740 \uae0d\uc815\uc801\uc778 \uacbd\ud5d8\uc744 \uc313\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccad\uc18c\ub144\uc758 \uac10\uc815 \ubc1c\ub2ec\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc790\uccb4\uac00 \uc544\ub2c8\ub77c \uc0ac\uc6a9 \ubc29\uc2dd\uc5d0 \ub530\ub77c \uc601\ud5a5\uc744 \ubc1b\uc2b5\ub2c8\ub2e4","\uccad\uc18c\ub144\uc758 \uc790\uc544 \uc815\uccb4\uc131 \ud615\uc131\uacfc \uc0ac\ud68c\uc801 \ud559\uc2b5\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0\uc11c \uae0d\uc815\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c8 \uc218 \u 758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\ub9dd\uc744 \ud655\uc7a5\ud558\uace0 \uac15\ud654\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacc4\ub97c \uc9c0\uc6d0\ud558\ub294 \uc911\uc694\ud55c \ud50c\ub7ab\ud3fc\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc628\ub77c\uc778 \ud50c\ub7ab\ud3fc\uc740 \uccad\uc18c\ub144\uc758 \ucc3d\uc758\uc801 \ud45c\ud604\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc131\uc7a5\uacfc \uc5f0\uacb0\uc131\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uccad\uc18c\ub144\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ub514\uc9c0\ud138 \ubb38\ud574\ub825\uacfc \uc628\ub77c\uc778 \ucee4\ubba4\ub2c8\ucf00\uc774\uc158 \ub2a5\ub825\uc744 \ud0a4\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc5f0\ub300\uc640 \ucc38\uc5ec\ub97c \uc99d\uac00\uc2dc\ud0b5\ub2c8\ub2e4","\uccad\uc18c\ub144\ub4e4\uc758 \uc2ec\ub9ac\uc801, \uc815\uc11c\uc801 \ubc1c\ub2ec\uc5d0 \uc788\uc5b4 \ub2e4\uc591\ud55c \uc18c\uc15c \uacbd\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\uc740 \uc0c1\ud638\uc791\uc6a9\uc744 \ud1b5\ud574 \ud310\ub2e8\ub825\uc744 \ud0a4\uc6cc\uc57c \ud569\ub2c8\ub2e4","\uccad\uc18c\ub144\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0\uc11c \ub610\ub798\ub4e4\uacfc\uc758 \uc0c1\ud638\uc791\uc6a9\uc744 \ud1b5\ud574 \uae0d\uc815\uc801\uc778 \uc0ac\ud68c\uc801 \uad00\uacc4\ub97c \ud615\uc131\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uc2ec\ub9ac\uc801 \uc9c0\uc6d0\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc774 \uccad\uc18c\ub144\uc758 \uc815\uc2e0 \uac74\uac15\uc5d0 \ubbf8\uce58\ub294 \uc601\ud5a5\uc744 \uacfc\uc7a5\ud574\uc11c\ub294 \uc548 \ub429\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ub610\ub798 \uac04\uc758 \uc18c\ud1b5\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\ub610\ud55c, \uccad\uc18c\ub144\uc758 \ucc45\uc784\uc788\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ub3d5\uae30 \uc704\ud55c \ud611\ub825 \ud504\ub85c\uadf8\ub7a8\ub4e4\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uccad\uc18c\ub144\uc758 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \uad11\ubc94\uc704\ud55c \uc0ac\ud68c\uc801 \uc694\uc778\uacfc \uad00\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uc815\ubcf4\uc640 \uad50\uc721 \uc790\uc6d0\uc744 \uc811\uadfc\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc5d0\uac8c \ud544\uc218\uc801\uc778 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uacfc \uc815\uccb4\uc131 \ud655\ub9bd\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4; \ubbf8\uad6d\uccad\uc18c\ub144\uc5f0\uad6c\uc18c(National Institute of Adolescent Studies)\uc5d0\uc11c \uc18c\uc15c \ubbf8\ub514\uc5b4\uac00 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uad00\uacc4 \ud615\uc131\uacfc \uc790\uc874\uac10 \ubc1c\uc804\uc5d0 \uae0d\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce5c\ub2e4\ub294 \uc5f0\uad6c \uacb0\uacfc\ub97c \ubc1c\ud45c\ud55c \ubc14 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc5d0\uac8c \uc815\uc2e0 \uac74\uac15 \uad00\ub828 \uc790\uc6d0\uc744 \ud0d0\uc0c9\ud560 \uc218 \uc788\ub294 \uacbd\ub85c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4; \ub9c8\uc74c\uac74\uac15\uc5f0\uad6c\uc18c(Institute for Mind Health)\ub294 \ud50c\ub7ab\ud3fc\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc774 \uc815\uc2e0 \uac74\uac15 \uc790\ub8cc \ubc0f \uc9c0\uc6d0 \uadf8\ub8f9\uc5d0 \uc27d\uac8c \uc811\uadfc\ud560 \uc218 \uc788\uac8c \ub428\uc73c\ub85c\uc368 \uc624\ud788\ub824 \ub3c4\uc6c0\uc774 \ub420 \uc218 \uc788\ub2e4\uace0 \ubc1c\ud45c\ud588\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc911\uc694\ud55c \ub514\uc9c0\ud138 \uae30\uc220\uc744 \ubc30\uc6b0\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc815\uc2e0 \uac74\uac15\uc5d0 \uae0d\uc815\uc801 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccad\uc18c\ub144\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \uacf5\ub3d9\uccb4\uc758 \uc9c0\uc6d0\uc744 \ud1b5\ud574\uc11c\ub3c4 \uac74\uac15\ud558\uac8c \uad00\ub9ac\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc815\uc11c\uc801 \uc9c0\uc6d0\uc744 \uc704\ud55c \ud50c\ub7ab\ud3fc\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \ubc0f \uc815\uc11c\uc801 \ubc1c\ub2ec\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uac15\ud654\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc790\uc2e0\uc758 \ubaa9\uc18c\ub9ac\ub97c \ucc3e\uc744 \uc218 \uc788\ub3c4\ub85d \ub3c4\uc640\uc90d\ub2c8\ub2e4","\uc14b\uc9f8, \uccad\uc18c\ub144\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \ub514\uc9c0\ud138 \uae30\uc220\uc758 \uc219\ub828\ub3c4\ub97c \ud5a5\uc0c1\uc2dc\ud0a4\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \ubaa9\uc18c\ub9ac\ub97c \uc81c\uacf5\ud558\uba70, \ub354 \ud070 \uc0ac\ud68c \ubb38\uc81c\uc5d0 \ub300\ud55c \ucc38\uc5ec\ub97c \uc7a5\ub824\ud569\ub2c8\ub2e4 778 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc740 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc5d0\uac8c \uc790\ub140\ub97c \ub3d5\ub294 \ub370 \ud544\uc694\ud55c \ub3c4\uad6c\uc640 \uc815\ubcf4\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \ucc38\uc5ec\ub97c \uac15\ud654\ud558\ub294 \uac83\uc774 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ubd80\ubaa8\uc758 \uc9c0\ub3c4\uc640 \uc18c\ud1b5\uc774 \ub354 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \ub354 \ub098\uc740 \uc0ac\uc6a9 \uc2b5\uad00\uc744 \ud615\uc131\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc0ac\ud68c\uc801 \uc9c0\uc6d0 \ub124\ud2b8\uc6cc\ud06c\ub294 \uac00\uc815\uc758 \ub514\uc9c0\ud138 \uaca9\ucc28\ub97c \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8 \ubc0f \ubcf4\ud638\uc790\uc758 \uc5ed\ud560 \uac15\ud654\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uacf5\ub3d9\uccb4\uac00 \ub3c4\uad6c\ub97c \ud65c\uc6a9\ud558\ub3c4\ub85d \ub3d5\ub294 \uc2dc\uc2a4\ud15c\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721 \uae30\uad00\uc758 \ud611\ub825\uc740 \uccad\uc18c\ub144 \ubcf4\ud638\uc5d0\uc11c \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uacf5\ub3d9\uccb4\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ud50c\ub7ab\ud3fc\uacfc \ubd80\ubaa8\uac00 \ud568\uaed8 \ucc45\uc784\uc744 \uc838\uc57c \ud558\uba70, \uc774 \uacfc\uc815\uc5d0\uc11c \ubd80\ubaa8\uc758 \uac1c\uc785\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uad50\uc721\uae30\uad00\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uad50\uc721 \uae30\uad00\uc758 \uc801\uadf9\uc801\uc778 \ucc38\uc5ec\uac00 \uc774\ub7ec\ud55c \ubd80\uc815\uc801 \uc601\ud5a5\uc744 \uc644\ud654\ud558\ub294 \ub370 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uac00\uc815 \ub0b4\uc5d0\uc11c\uc758 \ubd80\ubaa8\uc640\uc758 \ud611\ub825\uc740 \ud6a8\uacfc\uc801\uc778 \ud574\uacb0\ucc45\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc758 \uc801\uc808\ud55c \uc9c0\ub3c4\uac00 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubd80\ubaa8 \ubc0f \ubcf4\uc0b4\ud54c\uc790\ub4e4\uc758 \uc9c0\uc18d\uc801\uc778 \ucc38\uc5ec\uc640 \ubaa8\ub2c8\ud130\ub9c1\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uad50\uc0ac\ub97c \uc704\ud55c \ud6a8\uacfc\uc801\uc778 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc774 \ud544\uc694\ud558\uba70 \uc774\ub294 \ud604\uc2e4\uc801\uc73c\ub85c \uac00\ub2a5\ud569\ub2c8\ub2e4","\uc548\uc804\ub9dd \uad6c\ucd95\uc740 \ubd80\ubaa8\uc640 \uad50\uc721\uae30\uad00\uc758 \ud1b5\ud569\uc801\uc778 \ub178\ub825\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ucee4\ubba4\ub2c8\ud2f0 \uae30\ubc18 \ud504\ub85c\uadf8\ub7a8\uc740 \ubd80\ubaa8\uc640 \uad50\uc0ac\ub97c \uc9c0\uc6d0\ud558\uc5ec \uac10\ub3c5 \uc5ed\ud560\uc744 \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubaa8\ub4e0 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uac00 \ub3d9\uc77c\ud55c \uc9c0\uce68\uc744 \uc81c\uacf5\ud558\uc9c0 \uc54a\ub354\ub77c\ub3c4, \ub2e4\uc591\ud55c \ucee4\ubba4\ub2c8\ud2f0\uc640 \uc628\ub77c\uc778 \ub9ac\uc18c\uc2a4\uac00 \uc774\ub97c \ubcf4\uc644\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uacf5\ub3d9\uccb4 \uae30\ubc18\uc758 \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c\uc744 \ud1b5\ud574 \ubd80\ubaa8\ub098 \ubcf4\ud638\uc790\uc758 \ubd80\ub2f4\uc744 \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubaa8\ub4e0 \ubd80\ubaa8\uac00 \uc790\ub140\uc758 \ub514\uc9c0\ud138 \ud65c\ub3d9\uc744 \uc644\ubcbd\ud558\uac8c \ud1b5\uc81c\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc810\uc744 \uace0\ub824\ud560 \ub54c, \uc0ac\ud68c\uc801 \uc548\uc804\ub9dd\uacfc \uc9c0\uc6d0 \uc11c\ube44\uc2a4\uc758 \ud655\ub300\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubd80\ubaa8\uc758 \uc5ed\ud560\uc740 \ud544\uc218\uc801\uc774\uba70 \ubc95\uc801 \uc81c\uc7ac\ub85c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uac00\uc871\uacfc \ud559\uad50\uc758 \uc801\uadf9\uc801\uc778 \ucc38\uc5ec\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \uac10\ub3c5\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ucee4\ubba4\ub2c8\ud2f0\uc640 \ubd80\ubaa8\uc758 \uc801\uadf9\uc801\uc778 \ucc38\uc5ec\ub294 \ud53c\ud574 \uc608\ubc29\uacfc \uc989\uac01\uc801 \ub300\uc751\uc744 \uc9c0\uc6d0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uad8c\ud55c\uc744 \uac00\uc9c4 \ubcf4\ud638\uc790\uc758 \uc5ed\ud560 \uac15\ud654\uac00 \uc911\uc694\ud569\ub2c8\ub2e4","\ubaa8\ub4e0 \ubd80\ubaa8\ub098 \uad50\uc721\uc790\uac00 \ucc45\uc784\uc744 \ub2e4\ud558\uc9c0 \ubabb\ud560 \uc218 \uc788\ub2e4\ub294 \uc6b0\ub824\ub294 \uc81c\ub3c4\uc801 \uc9c0\uc6d0\uc744 \ud1b5\ud574 \ubcf4\uc644\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub97c \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \uad50\uc721\uacfc \ud6c8\ub828 \ud504\ub85c\uadf8\ub7a8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uc0ac\ud68c\uc758 \uc5ed\ud560\uc744 \uac15\ud654\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ud6a8\uacfc\uc801\uc778 \ud574\uacb0\ucc45\uc740 \uac00\uc871\uacfc \uad50\uc721\uae30\uad00\uc758 \uc9c0\uc6d0 \uccb4\uacc4\ub97c \ud1b5\ud574 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ubaa8\ub4e0 \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uac00 \ucda9\ubd84\ud55c \uad50\uc721\uc744 \uc81c\uacf5\ud560 \uc218 \uc5c6\ub294 \uacbd\uc6b0\uc5d0\ub3c4 \uc0ac\ud68c\uc801 \uc9c0\uc6d0 \ud504\ub85c\uadf8\ub7a8\uc774 \ud574\uacb0\ucc45\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \uc790\ub140 \uac04\uc758 \uc18c\ud1b5\uacfc uc785\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640\uc758 \ud611\ub825\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc138 \ubc88\uc9f8\ub85c, \ubd80\ubaa8\uc640 \ubbf8\uc131\ub144\uc790 \uac04\uc758 \uc0c1\ud638 \uc2e0\ub8b0\ub97c \ubc14\ud0d5\uc73c\ub85c \ud55c \uac1c\uc785\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubd80\ubaa8\uc640\uc758 \ud611\ub825\uc801 \ub300\ud654 \ubc0f \uad00\ub9ac\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ubaa8\ub4e0 \ubd80\ubaa8\ub098 \uad50\uc721\uc790\uac00 \ucda9\ubd84\ud55c \uc9c0\uce68\uc744 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud558\ub294 \uc0c1\ud669\uc5d0\uc11c\ub3c4, \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc5d0\uac8c \uc801\uc808\ud55c \ub3c4\uad6c\uc640 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \uc81c\uacf5\ud558\uc5ec \uadf8\ub4e4\uc774 \ubbf8\uc131\ub144\uc790\ub97c \ud6a8\uacfc\uc801\uc73c\ub85c \uc9c0\ub3c4\ud560 \uc218 \uc788\uac8c \ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \ucc38\uc5ec\ub294 \ub9e4\uc6b0 \uc911\uc694\ud55c \uc694\uc18c\uc785\ub2c8\ub2e4","\ub610\ud55c, \ubd80\ubaa8\uc640 \uc0ac\ud68c\uac00 \ud568\uaed8 \uad6c\ucd95\ud558\ub294 \uc548\uc804\ub9dd\uc740 \uc2e4\uc9c8\uc801\uc778 \ubcf4\ud638\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uacf5\uacf5 \uae30\uad00\uc740 \ubd80\ubaa8 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \ud655\ub300\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\ub97c \uc704\ud55c \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \uac00\uc815 \ub0b4\uc5d0\uc11c\uc758 \ud6a8\uacfc\uc801\uc778 \uac10\uc2dc\uc640 \uc9c0\uc6d0\uc744 \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubaa8\ub4e0 \ubd80\ubaa8\ub098 \uad50\uc0ac\uac00 \uc778\ud130\ub137 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \ucda9\ubd84\ud55c \uc774\ud574\ub97c \uac16\ucd94\uc9c0 \ubabb\ud560 \uc218 \uc788\ub2e4\ub294 \uc810\uc744 \ubcf4\uc644\ud558\uae30 \uc704\ud574, \uc9c0\uc5ed \uc0ac\ud68c\uc640 \uad50\uc721 \uae30\uad00\uc740 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ud559\ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc5d0\uac8c\ub3c4 \uad00\ub9ac \ub3c4\uad6c\ub97c \uc81c\uacf5\ud558\uc5ec \ucc38\uc5ec\ub97c \ub192\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccad\uc18c\ub144 \uc9c0\uc6d0 \ud504\ub85c\uadf8\ub7a8\uacfc \uc9c0\uc5ed \uc0ac\ud68c \uad50\uc721\uc744 \ud1b5\ud574 \ub2e4\uc591\ud55c \ubc30\uacbd\uc744 \uac00\uc9c4 \uac00\uc815\uc5d0\uc11c\ub3c4 \ud544\uc694\ub85c \ud558\ub294 \uc790\uc6d0\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \ucc38\uc5ec\ub294 \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0 \ub354\uc6b1 \uc911\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\ud1b5\uacfc \uac10\ub3c5\uc744 \ud1b5\ud55c \uac00\uc871 \ub0b4\uc758 \uc2e0\ub8b0 \ud615\uc131\uc774 \uacb0\uc815\uc801\uc785\ub2c8\ub2e4","\uad50\uc721\uacfc \ubd80\ubaa8\uc758 \ucc38\uc5ec\uac00 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\ub098 \ubcf4\ud638\uc790\uc758 \uc801\uadf9\uc801\uc778 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubaa8\ub4e0 \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uac00 \ucda9\ubd84\ud55c \uad50\uc721\uc744 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud560 \uc218\ub3c4 \uc788\uc9c0\ub9cc, \uc9c0\uc5ed \uc0ac\ud68c\uc640 \ud559\uad50\ub294 \uc774\ub97c \ubcf4\uc644\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\ud654\ub97c \uc704\ud55c \uc790\uc6d0 \ubc30\ubd84\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8\uc758 \uc5ec\uac74\uc744 \ubcf4\uc644\ud560 \uc218 \uc788\ub294 \uc0ac\ud68c\uc801 \ud611\ub825 \ud544\uc694\uc131\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc801 \ub3c4\uad6c\ub294 \ubd80\ubaa8\ub098 \ubcf4\ud638\uc790\uac00 \uac1c\uc785\ud558\uae30 \uc5b4\ub824\uc6b4 \uc0c1\ud669\uc5d0\uc11c\ub3c4 \uc720\uc6a9\ud55c \uc9c0\uc6d0\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c, \uae30\uc220\uc801 \ub3c4\uad6c\uac00 \ubd80\uc871\ud55c \uac00\uc815\uc5d0\uc11c\ub3c4 \uc678\ubd80 \uc9c0\uc6d0\uc73c\ub85c \ubb38\uc81c\ub97c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ubd80\ubaa8\uc758 \uc5ed\ud560\uc744 \ubcf4\uc644\ud558\uae30 \uc704\ud574 \uc9c0\uc5ed \uc0ac\ud68c \uae30\ubc18\uc758 \uad50\uc721 \uc9c0\uc6d0\uc774 \uac15\ud654\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ubd80\ubaa8\uc758 \ub514\uc9c0\ud138 \uac10\ub3c5 \uc5ed\ub7c9\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uac1c\uc778 \uc815\ubcf4 \ubcf4\ud638\uc758 \uc911\uc694\uc131\uc740 \ubd80\ubaa8\uc640 \uad50\uc0ac\uc758 \uc5ed\ud560\ub85c \uac15\ud654\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc0ac\uac00 \uc801\uadf9\uc801\uc73c\ub85c \ucc38\uc5ec\ud560 \ub54c \ubb38\uc81c \uc608\ubc29\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\ubaa8\ub4e0 \uac00\uc815\uc774\ub098 \uad50\uc721\uc790\uac00 \ub3d9\uc77c\ud55c \uc218\uc900\uc758 \uad50\uc721\uc744 \uc81c\uacf5\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc810\uc744 \uc778\uc815\ud558\ub294 \ub3d9\uc2dc\uc5d0, \uaddc\uc81c\ub294 \uac1c\ubcc4 \uc0c1\ud669\uc758 \ub2e4\uc591\uc131\uc744 \uace0\ub824\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ubaa8\ub4e0 \ubd80\ubaa8\ub098 \uad50\uc721\uae30\uad00\uc774 \ub3d9\uc77c\ud55c \uc5ed\ud560\uc744 \uc218\ud589\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc810\uc5d0\uc11c \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc758 \ub9de\ucda4\ud615 \ubcf4\ud638 \uae30\ub2a5\uc744 \uac15\uc870\ud574\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \uac00\uc815\uc5d0\uc11c \uc81c\uacf5\ud558\uae30 \uc5b4\ub824\uc6b4 \uad50\uc721\uc740 \ud559\uad50\uc640 \uc9c0\uc5ed\uc0ac\ud68c\uc758 \uc9c0\uc6d0\uc73c\ub85c \ubcf4\uc644\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uad50\uc721\uc758 \ud3b8\ucc28\uc5d0 \ub300\ud55c \uc6b0\ub824\ub294 \uac00\uc815\uacfc \ud559\uad50\uc758 \ud611\ub825 \uac15\ud654\ub97c \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"5_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","5_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"3YibP2Ixqz\u002fyk68\u002fxrauP76ckj9MiJ8\u002f\u002fte3P+kXrT9o\u002fqA\u002fxp2cP1nTmj9iurQ\u002fpjqpP9QjoD+MoqA\u002f\u002fI+xPwdSmz8lGpo\u002fFUaYPwCBpT\u002fff4k\u002fJsbEP1FCnj\u002f\u002fiLE\u002fqJ6fP06Ruz+XpJo\u002fnuqhP\u002fnEmT8Kb58\u002f5+eTP0Uknj+CbYtA9h+bP68rkj9U3pQ\u002fwnKYP25eqT85\u002fZQ\u002f1AiYPw8ykT9iB6U\u002frwqkPwy9rz9dL7w\u002fCdOhP5xtmD\u002foiZc\u002fwDyYP3S0oT9vh6o\u002fEAd\u002fPw3ntT\u002fpdqU\u002f6I6gP4C7nz8dbZw\u002f70GUP0zcjz+le7A\u002fXvChP9Urjz9a3pM\u002fZWvQP8oTqj8MTbM\u002fspypP1jB3z\u002fEToc\u002f7qiIP3nzpz8="},"y":{"dtype":"f4","bdata":"BJ2uQOZtt0DJh7dA6zi6QBlmh0AO1r9AMjKyQEaMtEAYb7tA9Pu8QAFitEDJVrBAk\u002fW5QNHDs0ASj71A5u63QO9BsEDEHbBA4viuQAhhn0AaJrBA9aqgQChVuUAQ8bBA+dC9QMV7sEAEa79AEiugQMmOr0AjvLZAm3KtQE8wn0AK4yFB2wyeQM5+rECYHJ1AKSueQPion0BKq61ABxq4QM8\u002fl0CKHrxAhg2+QGZQvEBLr6NA6qi8QDbTsEC+ALBAZFOvQNVLnkB8+LNAEaiYQIVdukCe3L1AggazQDDfvkBHKZ9A7WKwQE4trEDm5aFA7xygQJRlq0A3Yq1AVMW0QOYdtUAVsrFA\u002fkSgQAhYoUB\u002flZhAztOXQNZUsEA="},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\uc14b\uc9f8, \uc0ac\uc804\uc5d0 \uac1d\uad00\uc801 \ub370\uc774\ud130\ub97c \ubc14\ud0d5\uc73c\ub85c \ubc95\uc801 \uc81c\ud55c \uc5ec\ubd80\ub97c \uc870\uc815\ud574\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220 \ud601\uc2e0\uc744 \ud1b5\ud574 \uc548\uc804 \ubb38\uc81c\ub97c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc548\uc804\ud55c \uc778\ud130\ub137 \uc0ac\uc6a9\uc744 \uc704\ud55c \uae30\uc220\uc801 \ub3c4\uad6c\uc758 \uc81c\uacf5\uc740 \uc2e4\uc9c8\uc801\uc778 \ubcf4\ud638\ub97c \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uae30\uc220\uc801 \ub3c4\uad6c\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \ubc1c\uc804\ud558\uba70 \ud544\uc694\uc2dc \uc870\uc815\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub354 \ud6a8\uacfc\uc801\uc73c\ub85c \uc791\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220\uc801 \ubc1c\uc804\uc744 \ud65c\uc6a9\ud55c \ubcf4\ud638 \uc218\ub2e8\uc774 \ub298\uc5b4\ub098\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc815\ubd80 \ubc0f \uae30\uad00\uc758 \uc815\ucc45\uacfc \uae30\uc220\uc801 \ubcf4\ud638 \uc7a5\uce58\uac00 \ub9c8\ub828\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ud50c\ub7ab\ud3fc\uc740 \uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud574 \ub354 \ub098\uc740 \uc548\uc804 \uc870\uce58\ub97c \uc2dc\ud589\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc989\uac01\uc801\uc778 \uc601\ud5a5\uc744 \ucd94\uad6c\ud55c\ub2e4\uba74 \uae30\uc220\uc801 \ud574\uacb0\ucc45\uacfc \ubcf4\uc870\uc7a5\uce58\ub97c \ud1b5\ud574 \ubcf4\ub2e4","\ud6a8\uacfc\uc801\uc778 \ub300\uc548\uc774 \uc874\uc7ac\ud55c\ub2e4\uace0 \ubd05\ub2c8\ub2e4","\uae30\uc220 \ud68c\uc0ac\ub4e4\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uadf8\ub4e4\uc758 \ud50c\ub7ab\ud3fc\uc744 \uc548\uc804\ud558\uac8c \ub9cc\ub4e4\uae30 \uc704\ud55c \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud50c\ub7ab\ud3fc \uae30\uc5c5\uacfc \uc815\ubd80\uc758 \ud611\ub825\uacfc \uac10\uc2dc \uac15\ud654\uac00 \ub354 \uc2e4\uc9c8\uc801\uc778 \uc548\uc804\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc704\ud5d8\uc131\uc744 \uacbd\uac10\ud558\ub294 \ub2e4\uc591\ud55c \uae30\uc220 \uc194\ub8e8\uc158\uc774 \uc2e4\ud6a8\uc131\uc744 \ub192\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc801\uc778 \ub3c4\uad6c\uc640 \uc194\ub8e8\uc158\uc740 \uc628\ub77c\uc778 \ubcf4\ud638\ub97c \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc54c\uace0\ub9ac\uc998\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud55c \ubcf4\ud638 \uc2dc\uc2a4\ud15c\uc774 \ub354\uc6b1 \uc911\uc694\ud569\ub2c8\ub2e4","\ud6a8\uacfc\uc801\uc778 \ubcf4\uc548 \uc870\uce58\ub294 \uad6d\uac00 \uac04\uc758 \ud611\ub825\uc744 \ud1b5\ud55c \uae00\ub85c\ubc8c \uc2a4\ud0e0\ub2e4\ub4dc \uc124\uc815\uc73c\ub85c \uac00\ub2a5\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uae30\uc220\uc801 \ud574\uacb0\ucc45\uc774 \uc548\uc804\ud55c \ud658\uacbd\uc744 \uc870\uc131\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud574 \uc0ac\uc6a9\uc790 \ubcf4\ud638 \uae30\ub2a5\uc744 \ud5a5\uc0c1\uc2dc\ud0a4\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uae30\uc220\uc801\uc778 \ub3c4\uad6c \uc5ed\uc2dc \ubcf4\ud638\uc5d0 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc801\uc778 \ubcf4\ud638 \uc218\ub2e8\uc758 \uac15\ud654\ub97c \ud1b5\ud574 \uc704\ud5d8\uc744 \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc548\uc804 \uae30\ub2a5 \uac15\ud654\uc640 \uad00\ub828\ub41c \uae30\uc220\uc744 \uc801\uadf9 \uac1c\ubc1c\ud558\uc5ec \uc801\uc6a9\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c \ubcf4\uc548 \uae30\ub2a5 \uac15\ud654\uc640 \uac1c\uc778\ud654\ub41c \uc0ac\uc6a9\uc790 \ubcf4\ud638 \uae30\ub2a5\uc774 \uad00\ub828 \ubb38\uc81c\ub97c \uc644\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ud601\uc2e0\uc744 \ud1b5\ud574 \uc0ac\uc6a9\uc790 \uacbd\ud5d8\uc744 \ub9de\ucda4\ud654\ud558\uba74 \ub354 \ud070 \ubcf4\ud638\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uae30\uc220\uc801 \ud574\uacb0\ucc45\uc740 \ub2e4\uc591\ud55c \uc0c1\ud669\uc5d0 \ub9de\ucdb0 \uc720\uc5f0\ud558\uac8c \ub300\uc751\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc801 \ubc1c\uc804\uc740 \ud50c\ub7ab\ud3fc \uc548\uc804 \uae30\ub2a5\uc758 \uac1c\uc120\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uadf8\ub8f9 \ucc28\uc6d0\uc5d0\uc11c \uc0ac\uc6a9\uc790 \uc548\uc804\uc744 \uc704\ud55c \ud45c\uc900\uc744 \ud568\uaed8 \uc124\uc815\ud558\ub294 \uae00\ub85c\ubc8c \ud611\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4; \uc6d4\ub4dc\uc640\uc774\ub4dc\uc6f9 \ucee8\uc18c\uc2dc\uc5c4(W3C)\uc740 \uc804 \uc138\uacc4 \uae30\uc5c5 \ubc0f \uae30\uad00\uacfc\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \uc778\ud130\ub137 \uc0ac\uc6a9\uc758 \uc548\uc804\uc131\uc744 \ub192\uc774\uae30 \uc704\ud55c \ud45c\uc900\uc744 \uc815\ub9bd\ud558\uace0 \uad00\ub9ac\ud558\uba74\uc11c, \ubc95\uc801 \uc81c\ud55c \ub300\uc2e0 \uad6d\uc81c\uc801\uc778 \ud611\ub3d9\uc744 \ud1b5\ud55c \uac1c\uc120\uc744 \ucd94\uad6c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc0dd\uac01\ubcf4\ub2e4","\ud601\uc2e0\uc801\uc778 \uae30\uc220\uc740 \uc774\ubbf8 \uc704\ud5d8 \uc694\uc18c\ub97c \uac10\uc18c\uc2dc\ud0a4\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc801 \uc194\ub8e8\uc158\uc758 \ud55c\uacc4\ub97c \uc778\uc815\ud558\uace0 \uc9c0\uc18d\uc801\uc778 \uac1c\uc120\uc744 \ucd94\uad6c\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub354 \ud6a8\uacfc\uc801\uc778 \uc811\uadfc\ubc95\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ud50c\ub7ab\ud3fc\uc740 \uc9c0\uc18d\uc801\uc778 \uae30\uc220 \ud5a5\uc0c1\uc744 \ud1b5\ud574 \ub354 \ub098\uc740 \ubcf4\ud638 \uae30\ub2a5\uc744 \uc81c\uacf5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ucc45\uc784 \uc788\ub294 \uc18c\ud504\ud2b8\uc6e8\uc5b4 \uac1c\ubc1c\uc744 \ud1b5\ud55c \uc548\uc804\ub9dd \uac15\ud654\uac00 \ub354 \uc2e4\uc9c8\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220\uc744 \ud1b5\ud55c \uc548\uc804 \ub3c4\uad6c\uc640 \uae30\ub2a5\uc774 \uc810\uc810 \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \uae30\uc5c5\uc758 \uc9c0\uc18d\uc801\uc778 \uac1c\ubc1c \ub178\ub825\uc740 \uc704\ud5d8 \uc694\uc18c\ub97c \uc904\uc774\ub294\ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc801 \ub3c4\uad6c\ub97c \uc0ac\uc6a9\ud574 \uc548\uc804\uc744 \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc801 \ub3c4\uad6c\uc640 \ud544\ud130\ub9c1 \uc18c\ud504\ud2b8\uc6e8\uc5b4\ub97c \ud65c\uc6a9\ud55c \ubcf4\ud638 \uc870\uce58\uac00 \uac15\ud654\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc774\ubbf8 \uc874\uc7ac\ud558\ub294 \ud504\ub85c\uadf8\ub7a8\uacfc \uae30\ub2a5\ub4e4\uc740 \uc5c5\ub370\uc774\ud2b8\uc640 \uac1c\uc120\uc744 \ud1b5\ud574 \ub354\uc6b1 \ud6a8\uacfc\uc801\uc73c\ub85c \ubc1c\uc804\ud560 \uc5ec\uc9c0\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc81c\ud55c\uc774 \uc544\ub2cc \uc801\uc808\ud55c \uac00\uc774\ub4dc\ub294 \ubbf8\ub798 \uae30\uc220\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub192\uc785\ub2c8\ub2e4","\uae30\uc220\uc801 \ub3c4\uad6c\uc640 \ubcf4\ud638 \uccb4\uacc4\uc758 \ud65c\uc6a9\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220\uc801 \ud544\ud130\ub9c1\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud558\uae30 \uc704\ud574 \uc5c5\uacc4 \ud45c\uc900\uc744 \uac15\ud654\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ud50c\ub7ab\ud3fc\uc740 \ub354\uc6b1 \uc0ac\uc6a9\uc790 \uce5c\ud654\uc801\uc774\uace0 \uc811\uadfc \uac00\ub2a5\ud55c \ubcf4\ud638 \uae30\ub2a5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uae30\uc220 \ud601\uc2e0\uc744 \ud1b5\ud55c \ubb38\uc81c \ud574\uacb0\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc874\uc758 \uae30\uc220\uc801 \ubcf4\ud638\uc7a5\uce58\ub97c \ub354\uc6b1 \uac15\ud654\ud558\uace0 \ud65c\uc6a9\ud574\uc57c \ud569\ub2c8\ub2e4","\ubd80\uc815\uc801 \uc601\ud5a5\uc740 \ub2e4\uc591\ud55c \ub300\uccb4 \ubc29\ubc95\uc73c\ub85c \uc644\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc5c5\uacc4 \uc804\uccb4\uac00 \ud611\ub825\ud558\uc5ec \uc548\uc804 \ud45c\uc900\uc744 \ud5a5\uc0c1\uc2dc\ucf1c\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220\uc801 \ud601\uc2e0\uc774 \ubb38\uc81c \ud574\uacb0\uc744 \uc704\ud55c \ub354 \ub098\uc740 \uc804\ub7b5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc815\ubd80\uc640 \uae30\uc5c5 \uac04\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \ud50c\ub7ab\ud3fc \uc790\uccb4\uc5d0\uc11c \uc548\uc804\ud55c \ud658\uacbd\uc744 \uc870\uc131\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud574 \ub2e4\uc591\ud55c \ubcf4\ud638 \uc870\uce58\uac00 \uac00\ub2a5\ud574\uc9c8 \uac83\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub2e4\ub978 \uc811\uadfc \ubc29\ubc95\uc73c\ub85c \uade0\ud615\uc744 \ub9de\ucd9c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ud50c\ub7ab\ud3fc\uacfc\uc758 \ud611\ub825\uc740 \ub354 \uc2e0\uc18d\ud558\uace0 \ud6a8\uc728\uc801\uc778 \ubcf4\ud638 \uccb4\uacc4\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uac1c\uc778\uc815\ubcf4 \ubcf4\ud638\ub294 \uae30\uc220\uc801\uc778 \uc9c0\uc6d0\uacfc \uc815\ubcf4 \uc81c\uacf5\uc73c\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc801 \ubcf4\ud638\ub294 \uc810\uc810 \ub354 \uc644\ubcbd\ud574\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc801 \ub3c4\uad6c \ub610\ud55c \ubb38\uc81c \ud574\uacb0\uc758 \uc77c\ud658\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc9c0\uc18d\uc801\uc778 \uae30\uc220 \ubc1c\uc804\uc774 \uc704\ud5d8\uc744 \uc81c\uc5b4\ud558\ub294\ub370 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uae30\uc220\uc744 \ud65c\uc6a9\ud55c \ubcf4\ud638 \uc194\ub8e8\uc158\uc774 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c, \uae30\uc220\uc801 \ub3c4\uad6c\ub97c \ud65c\uc6a9\ud55c \ubcf4\ud638\ub294 \ucd94\uac00\uc801\uc778 \uc548\uc804\ub9dd\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc2e4\uc9c8\uc801\uc778 \ud53c\ud574\ub97c \ubc29\uc9c0\ud558\uae30 \uc704\ud55c \ubc95\uc801 \uc870\uce58\ub97c \uac15\ud654\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubbfc\ucca9\uc131 \uc788\ub294 \ub300\uc751\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uae30\uc220\uc801 \u
