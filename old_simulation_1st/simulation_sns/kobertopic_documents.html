uc804\ud55c \ud658\uacbd\uc744 \uc870\uc131\ud558\uae30 \uc704\ud55c \ud45c\uc900\uc744 \uac15\ud654\ud558\ub294 \uc774\ub2c8\uc154\ud2f0\ube0c\ub97c \ub9c8\ub828\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \ud65c\ub3d9\uc740 \ubc95\uc801 \uaddc\uc81c\uac00 \uc544\ub2cc \uc5c5\uacc4\uc758 \ucc45\uc784 \uc788\ub294 \ud589\ub3d9\uc744 \uac15\uc870\ud574\uc57c \ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uc815\ucc45\uc801 \uac1c\uc785\ubcf4\ub2e4\ub294 \ubd80\uac00\uc801\uc778 \uae30\uc220\uc801 \ub3c4\uad6c \uc81c\uacf5\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc790\uc728\uc801 \uaddc\uc81c\uc640 \ucc45\uc784\uc740 \ud50c\ub7ab\ud3fc\uc774 \uc9c1\uc811 \uac15\ud654\ud560 \uc218 \uc788\ub294 \ubd80\ubd84\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc790\uc728 \uaddc\uc81c\uac00 \ub354 \ud601\uc2e0\uc801\uc778 \ud574\uacb0\ucc45\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uaddc\uc81c \ub300\uc2e0\uc5d0 \uae30\uc220\uc801 \ud574\uacb0\ucc45\uc744 \ud1b5\ud55c \uc548\uc804 \uc7a5\uce58 \ub9c8\ub828\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\uac1c\uc778\uc815\ubcf4 \ubcf4\ud638\ub97c \uc704\ud574\uc11c\ub294 \uaddc\uc81c\ubcf4\ub2e4\ub294 \uae30\uc220\uc801 \ud601\uc2e0\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804 \uc18d\ub3c4\ub294 \ubc95\ubcf4\ub2e4 \ud6e8\uc52c \ube60\ub974\uace0 \uc720\uc5f0\ud569\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \ubc95\uc73c\ub85c \uc81c\ud55c\ud558\uae30\ubcf4\ub2e4\ub294 \uae30\uc220\uc801\uc778 \ub3c4\uad6c\ub97c \ud1b5\ud574 \ubcf4\ud638\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uae30\uc220\uc801 \ubcf4\ud638 \uc7a5\uce58\ub97c \ud65c\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc790\uc728\uc801\uc778 \uaddc\uc81c\ub294 \uae30\uc220\uc758 \ubc1c\uc804 \uc18d\ub3c4\uc5d0 \ub354 \uc801\ud569\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc790\uc728 \uaddc\uc81c\uc758 \uc911\uc694\uc131\uc740 \ubb34\uc2dc\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \ud33d\ucc3d\uc774 \uc544\ub2cc \uae30\uc220\uc801 \ub3c4\uad6c \uc0ac\uc6a9\uc774 \ub354 \uc720\uc5f0\ud55c \uc811\uadfc\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\uac00 \uc544\ub2cc \ud611\uc5c5\uc744 \ud1b5\ud574 \ud50c\ub7ab\ud3fc \uc790\uccb4\uc758 \ucc45\uc784\uc744 \ub192\uc5ec\uc57c \ud569\ub2c8\ub2e4","\uae30\uc220\uc801 \ubc29\uc5b4\ubcbd\uc774 \ubd80\uc871\ud55c \ud50c\ub7ab\ud3fc\uc5d0 \ub300\ud574\uc11c\ub294 \uac15\ub825\ud55c \uc790\uc728 \uaddc\uc81c\uc640 \ud611\uc5c5\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801\uc778 \uc81c\uc7ac\ubcf4\ub2e4\ub294 \uae30\uc220\uc744 \ud65c\uc6a9\ud55c \ubaa8\ub2c8\ud130\ub9c1 \ub3c4\uad6c\uac00 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\uac00 \uc2dc\ud589\ub418\ub294 \ub3d9\uc548\uc5d0\ub3c4 \uae30\uc220\uc740 \uc27d\uac8c \uc6b0\ud68c\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc774 \uc544\ub2cc \uae30\uc220 \ud639\uc740 \ud50c\ub7ab\ud3fc\uc0c1\uc758 \ubcf4\ud638 \uae30\ub2a5\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uae30\uc220\uc801 \ub3c4\uad6c\uc640 \uc790\uc728 \uaddc\uc81c\uc758 \uacb0\ud569\uc774 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uae30\uc220\uc740 \ub610\ud55c \ubcf4\ud638 \uc7a5\uce58\ub85c \ud65c\uc6a9\ub420 \uc218 \uc788\uc73c\uba70, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4 \ub354 \uc720\uc5f0\ud55c \ub300\uc548\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uae30\uc5c5\uacfc \uc815\ubd80 \uac04\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \ub354\uc6b1 \uac15\ub825\ud55c \uc790\uc728 \uaddc\uc81c\ub97c \uc774\ub04c\uc5b4\ub0bc \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc77c\ubc29\uc801\uc778 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uae30\uc220\uc801 \ud574\uacb0 \ubc29\uc548\uc744 \ubaa8\uc0c9\ud574\uc57c \ud569\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uae30\uc220\uc801 \uc548\uc804 \uc7a5\uce58\ub97c \uac1c\ubc1c\ud558\uace0 \ud65c\uc6a9\ud558\ub294 \uac83\uc774 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uae30\uc220 \uae30\uc5c5\uacfc\uc758 \ud611\ub825\uc744 \ud1b5\ud55c \uc790\uc728 \uaddc\uc81c\ub294 \ud604\uc2e4\uc801\uc778 \ud574\uacb0\ucc45\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc81c\ud55c\uc774\ub098 \uae08\uc9c0\ubcf4\ub2e4\ub294 \ud50c\ub7ab\ud3fc \uc218\uc900\uc5d0\uc11c\uc758 \ubb38\uc81c \ud574\uacb0\uc774 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c, \ubc95\uc801 \uc7a5\uce58\uac00 \uc544\ub2cc \uae30\uc220\uc758 \ubc1c\uc804\uc744 \ud1b5\ud574 \uc704\ud5d8 \uc694\uc18c\ub97c \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"22_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","22_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"Ek6WvuC\u002f477vmX2+h1mvvlH9v74h+sK+5Fm5vkSa4b4auKu+ddq1vnfZYb7vF8i+aC\u002fTvnBtnb4LIuG+rpexvmnVsb5xGOO+2u6rvuFapr7xgda+TkDNvjY7rb4+Gve+A9y4vnJeu74="},"y":{"dtype":"f4","bdata":"2J0UQLfaAUBpgBdAo3cTQJ0+8j9VR\u002fQ\u002f0WzrPxqJ+D9VVfM\u002fB2oLQLM+FUD8Lfc\u002fJpEZQO6sFUBvEgFAvv7tP8Mw9T\u002fE3AVA3ibrP0qaE0A8kf4\u002fkMP5P5dJEEDHwghA3mzvPx3mBEA="},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\uacf5\ub3d9\uccb4 \uc911\uc2ec\uc758 \uc9c0\uc6d0\uc740 \ubbf8\uc131\ub144\uc790\uac00 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc548\uc804\ud558\uac8c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub294 \ud658\uacbd\uc744 \uc870\uc131\ud558\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\ud68c\uc640 \uac00\uc815\uc758 \ub2e4\uc591\ud55c \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \ubbf8\uc131\ub144\uc790\uc758 \uc548\uc804\uc744 \ubcf4\uc7a5\ud558\ub294 \ub354 \ud6a8\uacfc\uc801\uc778 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc9c0\uc5ed\uc0ac\ud68c\uac00 \ucc38\uc5ec\ud558\ub294 \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ub354 \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub294 \ud658\uacbd\uc744 \ub9cc\ub4e4 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uacf5\uacf5 \ucea0\ud398\uc778\uacfc \uacf5\ub3d9\uccb4\uc758 \ub178\ub825\uc744 \ud1b5\ud574 \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc9c0\uc5ed \uc0ac\ud68c\uc640 \uae30\uad00\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\uc774 \ub354\uc6b1 \uc548\uc804\ud55c \ud658\uacbd\uc5d0\uc11c \uc131\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\ud68c \uc804\ubc18\uc801\uc778 \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c\uc744 \uac15\ud654\ud568\uc73c\ub85c\uc368 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \ud6a8\uacfc\uc801\uc73c\ub85c \uad6c\ud604\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc9c0\uc5ed \uc0ac\ud68c\uc640\uc758 \ud611\ub825\uc774 \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4; Boys & Girls Clubs of America\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\uc5ed \uc0ac\ud68c\uc640\uc758 \ud611\ub825 \ud504\ub85c\uadf8\ub7a8\uc744 \uc6b4\uc601\ud558\uba70, \uc774\ub7ec\ud55c \ucee4\ubba4\ub2c8\ud2f0 \uae30\ubc18\uc758 \uc811\uadfc\ubc95\uc774 \ubc95\uc801\uc778 \uc81c\ud55c\ubcf4\ub2e4 \ud6a8\uacfc\uc801\uc73c\ub85c \uccad\uc18c\ub144\uc744 \ubcf4\ud638\ud560 \uc218 \uc788\uc74c\uc744 \uac15\uc870\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uacf5\ub3d9\uccb4\uc640\uc758 \ud611\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4. 'Common Sense Media'\ub294 \uc9c0\uc5ed \uc0ac\ud68c\uc640 \ud611\ub825\ud558\uc5ec \uccad\uc18c\ub144\uc758 \ub514\uc9c0\ud138 \uc548\uc804\uc744 \ub192\uc774\ub294 \ud504\ub85c\uadf8\ub7a8\uc744 \uac1c\ubc1c\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \ub178\ub825\uc740 \uccad\uc18c\ub144\ub4e4\uc774 \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud65c\uc6a9\ud560 \uc218 \uc788\ub294 \uae30\ubc18\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc5c5\uacfc \uc815\ubd80, \ube44\uc601\ub9ac\ub2e8\uccb4 \uac04\uc758 \ud611\ub825\uc774 \uccb4\uacc4\uc801\uc778 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ud3ec\uad04\uc801\uc778 \uc0ac\ud68c\uc801 \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c \uad6c\ucd95\uc73c\ub85c \ubbf8\uc131\ub144\uc790\uc758 \uc548\uc804\ub9dd\uc744 \ub9c8\ub828\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc80a\uc740 \uc0ac\uc6a9\uc790\ub4e4\uc5d0\uac8c \uc548\uc804\ub9dd\uacfc \uc9c0\uc6d0 \uccb4\uacc4\ub97c \uc81c\uacf5\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ucee4\ubba4\ub2c8\ud2f0 \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c\uc774 \ubbf8\uc131\ub144\uc790\uc758 \uc815\uc2e0 \uac74\uac15\uc744 \uac1c\uc120\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uccad\uc18c\ub144\ub4e4\uc774 \uc548\uc804\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud658\uacbd\uc744 \uad6c\ucd95\ud558\ub294 \ub370 \ucc38\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc548\uc804\ud55c \uc0ac\uc774\ubc84 \ud658\uacbd\uc744 \uad6c\ucd95\ud558\uae30 \uc704\ud574\uc11c\ub294 \uccad\uc18c\ub144\ub4e4\uacfc\uc758 \uc5f4\ub9b0 \ub300\ud654\uac00 \uc911\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ucc98\ud560 \uc218 \uc788\ub294 \uac10\uc815\uc801 \uc704\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud574, \uacf5\ub3d9\uccb4\uc758 \uc0c1\ud638\uc791\uc6a9\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc548\uc804\uc744 \ub192\uc774\uae30 \uc704\ud574\uc11c\ub294 \uc9c0\uc5ed \uc0ac\ud68c\uc640 \ud559\uad50\uac00 \uc801\uadf9\uc801\uc73c\ub85c \ucc38\uc5ec\ud574\uc57c \ud569\ub2c8\ub2e4","\uc0ac\uac01\uc9c0\ub300\uc5d0 \ub193\uc778 \uccad\uc18c\ub144\uc744 \ubcf4\ud638\ud558\ub824\uba74 \uc9c0\uc5ed \uc0ac\ud68c\uc640 \ubd80\ubaa8 \uc911\uc2ec\uc758 \uac10\uc2dc \uc2dc\uc2a4\ud15c\uc744 \uad6c\ucd95\ud574\uc57c \ud569\ub2c8\ub2e4","\ub610\ud55c \uc0ac\ud68c \uc804\uccb4\uac00 \ubbf8\uc131\ub144\uc790\uc758 \uc548\uc804\uc744 \ub3c4\ubaa8\ud558\ub294 \ub370 \ub3d9\ucc38\ud574\uc57c \ud569\ub2c8\ub2e4","\uc0ac\ud68c\uc801 \uc9c0\uc9c0 \uad6c\uc870\ub97c \uac15\ud654\ud558\uba74 \ubbf8\uc131\ub144\uc790\uc758 \uc815\uc2e0 \uac74\uac15\uc744 \ubcf4\ud638\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ucda9\ubd84\ud55c \uc2ec\ub9ac\uc801 \uc9c0\uc6d0\uc744 \uc81c\uacf5\ud558\ub294 \uc2dc\uc2a4\ud15c\uc744 \uad6c\ucd95\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc9c0\uc5ed \uc0ac\ud68c\uc640 \ud559\uad50\uc758 \ud611\ub825\uc774 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub354\ubd88\uc5b4, \ube44\uc601\ub9ac\ub2e8\uccb4 Family Online Safety Institute\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc2e4\uc81c\ub85c \uad50\uc721 \ubc0f \uc9c0\uc6d0 \ud504\ub85c\uadf8\ub7a8\uc5d0 \uc811\uadfc\ud560 \uc218 \uc788\ub3c4\ub85d \ub2e4\uc591\ud55c \uc0ac\ud68c \ub2e8\uccb4\uc640 \ud611\ub825\ud558\uc5ec \ud65c\ub3d9\uc744 \ud655\uc7a5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\ud68c\uc801 \uc778\uc2dd \uc81c\uace0\ub97c \ud1b5\ud574 \uacf5\ub3d9\uccb4\uac00 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\uc5d0 \ucc38\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uacf5\ub3d9\uccb4\uc640 \ud611\ub825\ud558\uc5ec \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ub9de\ucda4\ud615 \uc9c0\uc6d0\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\ud68c\uc801 \ucc28\uc6d0\uc758 \uc9c0\uc6d0\uacfc \uacf5\ub3d9\uccb4 \uc911\uc2ec\uc758 \uc811\uadfc \ubc29\uc2dd\uc774 \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud558\ub294 \ub370 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"23_\uc5c6\uc74c__","text":["","","","","" 48\uc804\uc744 \ud5a5\uc0c1\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, AI \uae30\ubc18\uc758 \uc790\ub3d9 \ubaa8\ub2c8\ud130\ub9c1 \uc2dc\uc2a4\ud15c\uc740 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \ubd80\ub2f4\uc744 \uc904\uc785\ub2c8\ub2e4. '\ubc14\ud074\ub9ac\uc2a4 \uc0ac\uc774\ubc84 \uc5f0\uad6c\uc18c(Barclays Cyber Research Labs)'\ub294 \uc774\ub7ec\ud55c \uae30\uc220\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\uc758 \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \uc2e4\uc2dc\uac04\uc73c\ub85c \ubd84\uc11d\ud558\uace0 \uc7a0\uc7ac\uc801\uc778 \uc704\ud5d8\uc744 \uac10\uc9c0\ud560 \uc218 \uc788\ub294 \uc194\ub8e8\uc158\uc744 \uc81c\uacf5\ud558\uace0 \uc788\uc5b4 \uc989\uac01\uc801\uc778 \uc608\ubc29 \uc870\uce58\ub97c \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uccad\uc18c\ub144\uc744 \uc704\ud55c \uae30\uc220\uc801 \ubcf4\ud638 \uc7a5\uce58\uc640 \ub3c4\uad6c\uac00 \ub9c8\ub828\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \uc704\ud55c \uc790\uc728 \uaddc\uc81c\ub294 \ub354\uc6b1 \ubc1c\uc804\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub370\uc774\ud130\ub97c \uae30\ubc18\uc73c\ub85c \uccad\uc18c\ub144 \ubcf4\ud638\uc5d0 \ub300\ud55c \ucd5c\uc801\uc758 \uc815\ucc45\uacfc \ud504\ub85c\uadf8\ub7a8\uc744 \uac1c\ubc1c\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc608\ubc29\uc744 \uc704\ud55c \ub2e4\uc591\ud55c \uae30\uc220\uc801 \uc194\ub8e8\uc158\uc774 \uc774\ubbf8 \uc874\uc7ac\ud558\uc5ec \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc548\uc804\uc744 \ub354 \ud6a8\uacfc\uc801\uc73c\ub85c \ubcf4\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc801\uadf9\uc801\uc778 \ucc38\uc5ec\uc640 \uae30\uc220\uc801 \uc548\uc804 \uc7a5\uce58\ub97c \uc0ac\uc6a9\ud558\uc5ec \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \uc2e4\ud604\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \uae30\uc220 \ubc1c\uc804 \uc18d\ub3c4\uc5d0 \ub9de\ucdb0 \uc2e4\uc2dc\uac04\uc73c\ub85c \ubcf4\ud638 \uc7a5\uce58\ub97c \uc5c5\ub370\uc774\ud2b8\ud560 \uc218 \uc788\ub294 \ubbfc\uac04 \uae30\uc5c5\uc758 \uc790\uc728 \uaddc\uc81c \ub2a5\ub825\uc774 \uc911\uc694\ud569\ub2c8\ub2e4; \uc560\ud50c(Apple)\uc740 \ubbf8\uc131\ub144\uc790\ub97c \ud3ec\ud568\ud55c \ubaa8\ub4e0 \uc0ac\uc6a9\uc790\uac00 \uc548\uc804\ud558\uac8c \ub514\uc9c0\ud138 \uae30\uae30\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ub2e4\uc591\ud55c \ubcf4\ud638 \uc7a5\uce58\ub97c \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\ubc1c\ud558\uba70, \uc0ac\uc6a9\uc790 \uacbd\ud5d8\uc744 \ucd5c\ub300\ud55c\uc73c\ub85c \ubcf4\ud638\ud55c\ub2e4\uace0 \uac15\uc870\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc744 \ud65c\uc6a9\ud558\uc5ec \uccad\uc18c\ub144\uc758 \uc548\uc804\uc744 \ud655\ubcf4\ud558\ub294 \ubc29\uc548\uc744 \ub9c8\ub828\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc801 \ubcf4\ud638\uc7a5\uce58\ub294 \uc0ac\uc774\ubc84 \uc704\ud611\uc73c\ub85c\ubd80\ud130 \ubbf8\uc131\ub144\uc790\ub97c \uc2e4\uc9c8\uc801\uc73c\ub85c \ubcf4\ud638\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ud601\uc2e0\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \uac15\ud654\ud558\ub294 \ub370 \uae30\uc5ec\ud558\uace0 \uc788\ub2e4","\ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub294 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \ub2e4\uc591\ud55c \uc811\uadfc \ubc29\uc2dd\uc774 \ud544\uc694\ud558\uba70, \uae30\uc220 \uad50\uc721\uacfc \ubc95\uc801 \uaddc\uc81c\ubcf4\ub2e4 \uae30\uc220\uc801 \uae30\ub2a5 \ud5a5\uc0c1\uc774 \uc989\uac01\uc801\uc774\uace0 \uc2e4\uc9c8\uc801\uc778 \ud6a8\uacfc\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uac1c\uc778\uc815\ubcf4 \ubcf4\ud638\ub294 \uae30\uc220\uc801\uc778 \uc194\ub8e8\uc158\uc744 \ud1b5\ud574 \ucda9\ubd84\ud788 \uac15\ud654\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \uae30\uc5c5\uacfc \ud50c\ub7ab\ud3fc\uc774 \ubcf4\ud638 \ub300\ucc45\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \uc6b0\uc120\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4; Family Online Safety Institute\ub294 \uae30\uc220 \uae30\uc5c5\ub4e4\uc774 \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \ub354 \ub098\uc740 \uc54c\uace0\ub9ac\uc998\uacfc \ub3c4\uad6c\ub97c \uac1c\ubc1c\ud560 \ucc45\uc784\uc774 \uc788\uc73c\uba70, \uc0ac\uc6a9 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc774\ub7ec\ud55c \uae30\uc220\uc801 \uc870\uce58\uac00 \uc6b0\uc120\uc2dc\ub418\uc5b4\uc57c \ud55c\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\ub514\uc9c0\ud138 \ud658\uacbd\uc5d0\uc11c\uc758 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \uac15\ud654\ud558\uae30 \uc704\ud574, \uae30\uc220\uc801 \ub3c4\uad6c\ub97c \ud65c\uc6a9\ud55c \ubaa8\ub2c8\ud130\ub9c1\uacfc \uc870\uc5b8 \uc81c\uacf5 \uc804\ub7b5\uc774 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud574 \ud50c\ub7ab\ud3ec\uba38\ub4e4\uc774 \uccad\uc18c\ub144 \ubcf4\ud638\uc5d0 \ub354 \uc801\uadf9\uc801\uc73c\ub85c \ub098\uc124 \uc218 \uc788\uc2b5\ub2c8\ub2e4. 'Google LLC'\ub294 \uc778\uacf5\uc9c0\ub2a5\uc744 \ud65c\uc6a9\ud55c \uc0c8\ub85c\uc6b4 \uc548\uc804 \ud504\ub85c\uadf8\ub7a8\uc744 \ub3c4\uc785\ud558\uc5ec \ubbf8\uc131\ub144\uc790\ub97c \ud6a8\uacfc\uc801\uc73c\ub85c \ubcf4\ud638\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \uae30\uc220 \ubc1c\uc804\uc740 \uc9c0\uc18d\uc801\uc778 \uac1c\uc120\uc73c\ub85c \uc774\uc5b4\uc9c8 \uac83\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220 \ud68c\uc0ac\ub4e4\uc740 \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud55c \uae30\ub2a5\uc744 \uacc4\uc18d \uac1c\ubc1c\ud558\uace0 \uac1c\uc120\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ud601\uc2e0\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc73c\uba70, \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\uc5d0 \uc788\uc5b4 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220 \uc0b0\uc5c5\uc740 \uc790\uccb4 \uaddc\uc81c\ub97c \ud1b5\ud574 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"26_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","26_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"XzuVQHS3j0DqAZFABJSPQIEnkkC3XI9AYimOQITWk0AOp4xAtj2OQO84l0B\u002fE4xAmVWPQBaokkClYo9Aq6GZQEFqkUBaiIxATReVQDtIjkCWOZBAV8yPQJh9kECO35BA"},"y":{"dtype":"f4","bdata":"1eaEQLf0iUC+JoRA6lWCQLwMhkCGHX5AxDOPQKYHiUD+lIVADiqAQNHWh0A2nG5AoCKJQLxufEDsMIFApHeRQKQwgECgd3JAHOl9QGLMfUDOC4ZAn36BQAsHiEBG2INA"},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ub514\uc9c0\ud138 \ubb38\ud574\ub825\uc744 \ud0a4\uc6b0\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \uc313\uc744 \uae30\ud68c\ub97c \uac00\uc9d1\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \uadf8\ub4e4\uc774 \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0 \uc801\uc751\ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \uadf8\ub4e4\uc758 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc640 \ubbf8\ub798 \uc9c1\uc5c5 \uc900\ube44\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \ubc1c\ub2ec\uc2dc\ud0b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc911\uc694\ud55c \ub514\uc9c0\ud138 \uae30\uc220\uc744 \ubc30\uc6b0\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc544\uc774\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc911\uc694\ud55c \ub514\uc9c0\ud138 \
