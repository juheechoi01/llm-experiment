c \uc2dc\uc2a4\ud15c\uc744 \ub3c4\uc785\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc790\uccb4\uc5d0\uc11c \uc774\ubbf8 \uc548\uc804\ud55c \ud658\uacbd\uc744 \uc870\uc131\ud558\uae30 \uc704\ud55c \uc870\uce58\ub97c \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\ub4e4\uc740 \uc2a4\uc2a4\ub85c\uc758 \uc790\uc728 \uaddc\uc81c\ub97c \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc758 \uc790\uccb4\uc801\uc778 \uc548\uc804 \uae30\ub2a5\uc774 \uc774\ub97c \ubcf4\uc644\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uac1c\uc778\uc815\ubcf4\uc758 \ubcf4\ud638\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\uc758 \ucd5c\uc6b0\uc120 \uacfc\uc81c \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uac1c\uc778\uc815\ubcf4 \ubcf4\ud638\ub294 \uc0ac\uc6a9\uc790 \uc790\uc2e0\uacfc \ud50c\ub7ab\ud3fc\uc758 \ucc45\uc784\uc785\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc774 \ucc45\uc784\uac10\uc744 \uac00\uc9c0\uace0 \ub354\uc6b1 \uac15\ud654\ub41c \uc548\uc804 \ub3c4\uad6c\uc640 \uc81c\uc5b4 \uae30\ub2a5\uc744 \uc81c\uacf5\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub9ce\uc740 \ud50c\ub7ab\ud3fc\uc774 \uc774\ubbf8 \uc548\uc804 \uc7a5\uce58\ub97c \ub9c8\ub828\ud574 \uc720\ud574 \ucf58\ud150\uce20\ub97c \uc904\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc790\uccb4\uc801\uc73c\ub85c \uc548\uc804 \uae30\ub2a5\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc548\uc804\ud55c \ud658\uacbd \uc870\uc131\uc744 \uc704\ud55c \uae30\uc220\uc801 \uc7a5\uce58\ub97c \uacc4\uc18d\ud574\uc11c \ubc1c\uc804\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc774\ubbf8 \uc0ac\uc6a9\uc790 \ubcf4\ud638\ub97c \uc704\ud574 \ub178\ub825\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc628\ub77c\uc778 \uad34\ub86d\ud798\uacfc \uad00\ub828\ud55c \ubb38\uc81c\ub4e4\uc740 \uc774\ubbf8 \ud50c\ub7ab\ud3fc \uc218\uc900\uc5d0\uc11c \uac15\ub825\ud558\uac8c \ub300\uc751\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc548\uc804 \uc7a5\uce58\ub294 \uc774\ubbf8 \ud50c\ub7ab\ud3fc \ub0b4\uc5d0\uc11c \uc81c\uacf5\ub418\ub294 \uac83\uc774 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc790\uccb4\uc801\uc73c\ub85c \ubcf4\ud638 \uc7a5\uce58\ub97c \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\uc740 \uadf8 \uc790\uccb4\ub85c \uc0ac\uc6a9\uc790 \uc548\uc804\uc5d0 \ub300\ud55c \ucc45\uc784\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc810\uc810 \ub354 \ub9ce\uc740 \ubcf4\ud638 \uae30\ub2a5\uacfc \uc0ac\uc6a9\uc790 \ub9de\ucda4\ud615 \uc124\uc815\uc744 \uc81c\uacf5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc720\ud574\ud55c \ucf58\ud150\uce20\uc5d0 \ub300\ud55c \ub178\ucd9c\uc744 \uc81c\ud55c\ud558\ub294 \ub2e4\ub978 \ubc29\ubc95\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc774\ubbf8 \uc548\uc804\uc131\uc744 \ub192\uc774\uae30 \uc704\ud55c \ub9ce\uc740 \ub178\ub825\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc548\uc804 \uae30\ub2a5\uc744 \uac1c\uc120\ud558\uc5ec \uc0ac\uc6a9\uc790 \ubcf4\ud638\ub97c \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc758 \uc0ac\uc6a9\uc790 \ubcf4\ud638 \uae30\ub2a5\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\uc758 \uc548\uc804 \uc7a5\uce58\uac00 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc744 \uc218 \uc788\ub2e4\ub294 \ubb38\uc81c\uc5d0 \ub300\ud55c \ub300\uc548\uc73c\ub85c, \uc0ac\uc6a9\uc790 \ucee4\ubba4\ub2c8\ud2f0 \ubc0f \ubd80\ubaa8\ub4e4\uc758 \ud53c\ub4dc\ubc31\uc744 \ubc14\ud0d5\uc73c\ub85c \uc9c0\uc18d\uc801\uc778 \uac1c\uc120\uc744 \uc694\uad6c\ud558\ub294 \uc18c\ube44\uc790 \uc8fc\uad8c\uc744 \uac15\ud654\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\ub4e4\uacfc\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \uc548\uc804 \uae30\ub2a5\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \ub354 \uc911\uc694\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc548\uc804\ud55c \uc0ac\uc6a9\uc744 \uc704\ud55c \ub3c4\uad6c\uc640 \uc815\ucc45\uc744 \ubc1c\uc804\uc2dc\ud0a4\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\ub4e4\uc774 \uc790\uc728 \uaddc\uc81c\uc640 \ubcf4\ud638\uc870\uce58\ub97c \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\ub4e4\uc740 \uc774\ubbf8 \uc0ac\uc6a9\uc790\uc758 \uc815\uc2e0\uc801 \uc548\uc804\uc131\uc744 \ub192\uc774\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \uae30\ub2a5\uc744 \uac1c\ubc1c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc774\ubbf8 \uc548\uc804\ud55c \uacbd\ud5d8\uc744 \uc704\ud55c \ub3c4\uad6c\ub97c \uc81c\uacf5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\ub4e4\uc740 \uc790\ubc1c\uc801\uc73c\ub85c \ub354\uc6b1 \uac15\ud654\ub41c \ubcf4\ud638 \uc870\uce58\ub97c \ub3c4\uc785\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc801 \ub3c4\uad6c\ub97c \ud65c\uc6a9\ud558\uc5ec \ubcf4\ub2e4 \uc548\uc804\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud658\uacbd\uc744 \uc870\uc131\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubcf4\ud638 \ub3c4\uad6c\ub4e4\uc740 \uae30\uc220 \ubc1c\uc804\uacfc \ud568\uaed8 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\ub4e4\uc740 \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\ub97c \uac78\ub7ec\ub0b4\uae30 \uc704\ud55c \uae30\uc220 \ud601\uc2e0\uc5d0 \uc9c0\uc18d\uc801\uc73c\ub85c \ud22c\uc790\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\ub4e4\uc740 \uc0ac\uc6a9\uc790 \uc548\uc804\uc744 \uc704\ud55c \uc790\ubc1c\uc801 \ub178\ub825\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc774\ubbf8 \uc774\ub7ec\ud55c \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \ub178\ub825\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uae30\uc220\uc758 \ubc1c\uc804\uc740 \uc774\ubbf8 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc5d0\uc11c \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc640 \uad34\ub86d\ud798\uc744 \uc904\uc774\ub294 \ub370\uc5d0 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\ub97c \uc2e0\uace0\ud558\uace0 \ucc28\ub2e8\ud558\ub294 \uc2dc\uc2a4\ud15c\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4. '\uc778\ud130\ub137 \uac10\uc2dc \uc7ac\ub2e8(Internet Watch Foundation)'\uc740 \uc801\uadf9\uc801\uc778 \ud30c\ud2b8\ub108\uc2ed\uc744 \ud1b5\ud574 \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\ub97c \uc2dd\ubcc4\ud558\uace0 \uc0ad\uc81c\ud558\ub294 \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc0ac\uc6a9\uc790\uac00 \ubd88\ucf8c\ud55c \uacbd\ud5d8\uc744 \ud558\uc9c0 \uc54a\ub3c4\ub85d \ub3d5\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc548\uc804 \uae30\ub2a5\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc704\ud5d8 \uc644\ud654 \uae30\ub2a5\uc744 \uac1c\uc120\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uac1c\uc778\uc815\ubcf4 \uc720\ucd9c \ubb38\uc81c\ub294 \uc774\ubbf8 \uae30\uc874\uc758 \uae30\uc220\uc801 \ubcf4\ud638\uc7a5\uce58\uc640 \uaddc\uc815\uc744 \ud1b5\ud574 \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \uba54\ucee4\ub2c8\uc998\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc2a4\uc2a4\ub85c\uac00 \uc8fc\uae30\uc801\uc73c\ub85c \uc548\uc804 \uae30\ub2a5\uc744 \uac15\ud654\ud560 \uc218 \uc788\ub294 \uc790\uc728\uc801 \ucc45\uc784 \uc2dc\uc2a4\ud15c\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc774\ubbf8 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc5d0 \ub300\ud55c \uacbd\uac01\uc2ec\uc744 \ub192\uc774\uace0 \uc548\uc804\uae30\ub2a5\uc744 \uac1c\uc120\ud574 \ub098\uac00\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc790\uccb4\uc758 \ucc45\uc784\uac10 \uc788\uace0 \uc724\ub9ac\uc801\uc778 \uae30\ub2a5 \uac1c\uc120\uc744 \ucd94\uc9c4\ud574\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uadf8\ub4e4 \uc2a4\uc2a4\ub85c \ucc45\uc784 \uc788\ub294 \ud658\uacbd\uc744 \uc870\uc131\ud558\ub3c4\ub85d \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc2a4\uc2a4\ub85c\uac00 \uc0ac\uc6a9\uc790 \ubcf4\ud638\ub97c \uc704\ud55c \uac15\ub825\ud55c \uc815\ucc45\uc744 \uc774\ubbf8 \uc2dc\ud589\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc628\ub77c\uc778\uc5d0\uc11c\uc758 \uc548\uc804\ud55c \ud658\uacbd\uc744 \uc81c\uacf5\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \ub178\ub825\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uba54\ud0c0\uc640 \uac19\uc740 \ub300\ud615 \ud50c\ub7ab\ud3fc\ub4e4\uc740 \uc720\ud574 \ucf58\ud150\uce20\ub97c \uc904\uc774\uae30 \uc704\ud55c \uc2e0\uae30\uc220\uc5d0 \ub9c9\ub300\ud55c \ud22c\uc790\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc758 \uc790\uccb4\uc801\uc778 \ubcf4\ud638 \uc7a5\uce58\uac00 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc548\uc804 \uac15\ud654\ub294 \uae30\uc5c5\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ud560 \uc218 \uc788\ub294 \ubd80\ubd84\uc785\ub2c8\ub2e4","\uc644\ubcbd\ud558\uc9c0 \uc54a\ub354\ub77c\ub3c4 \uae30\uc220 \ud68c\uc0ac\ub4e4\uc740 \uacc4\uc18d\ud574\uc11c \ubcf4\ud638 \uae30\ub2a5\uc744 \uac1c\uc120\ud558\uace0 \uc788\uc73c\uba70, \uc0ac\uc6a9\uc790\uac00 \ubcf4\ub2e4 \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub294 \ud658\uacbd\uc744 \ub9cc\ub4e4\uace0 \uc788\uc2b5\ub2c8\ub2e4","(2) \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc744 \uc608\ubc29\ud558\uace0 \uad00\ub9ac\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \uc218\ud589\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\uc740 \uc548\uc804 \uae30\ub2a5\uacfc \ucf58\ud150\uce20 \uc81c\uc5b4\ub97c \ud1b5\ud574 \uc0ac\uc6a9\uc790 \ubcf4\ud638\uc5d0 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\ub4e4\uc740 \uc0ac\uc6a9\uc790 \ubcf4\ud638\ub97c \uc704\ud574 \uc774\ubbf8 \ub2e4\uc218\uc758 \uc548\uc804 \uc7a5\uce58\ub97c \ub9c8\ub828\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers bbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc720\ub300\uac10\uc744 \ud615\uc131\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc2e4\uc81c \uc0ac\ud68c\uc801 \uacbd\ud5d8\uc744 \ubcf4\uc644\ud560 \uc218 \uc788\ub294 \ud50c\ub7ab\ud3fc\uc785\ub2c8\ub2e4","\uc0ac\ud68c\uc801 \uad00\uacc4\ub97c \ud615\uc131\ud558\uace0 \uc720\uc9c0\ud558\ub294 \ub370 \uc788\uc5b4\uc11c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uacfc \ucee4\ubba4\ub2c8\ucf00\uc774\uc158 \uae30\uc220\uc744 \ubc1c\uc804\uc2dc\ud0a4\ub294 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \uc911\uc694\ud55c \uc18c\ud1b5 \uc218\ub2e8\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc720\ub300\uc640 \uc9c0\uc6d0\uc744 \uad6c\ucd95\ud558\ub294 \ub370 \ub3c4\uc6c0\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uc9c0\uc9c0\ub9dd \ud615\uc131\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \uc911\uc694\ud55c \uc18c\ud1b5 \uc218\ub2e8\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \uc911\uc694\ud55c \uc18c\ud1b5 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\uc0ac\ud68c\uc801 \uc18c\ud1b5\uacfc \uad50\ub958\uc758 \uc911\uc694\ud55c \uae30\ud68c\ub97c \ucc28\ub2e8\ud574\uc11c\ub294 \uc548 \ub429\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uae30\uc220\uc744 \ubc1c\ub2ec\uc2dc\ud0a4\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\uac00 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \ucc45\uc784\uc788\ub294 \uc0ac\uc6a9\uc744 \ucd09\uc9c4\ud558\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \uc790\uc6d0\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uad00\uacc4\ub97c \ud615\uc131\ud558\ub294 \uc911\uc694\ud55c \ud50c\ub7ab\ud3fc\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uc9c0\uc6d0\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc7a5\uc810\uc744 \ud65c\uc6a9\ud558\uc5ec \uae00\ub85c\ubc8c \ud45c\uc900\uc744 \uad6c\ucd95\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc815\uc2e0 \uac74\uac15 \uc9c0\uc6d0\uc758 \uc911\uc694\ud55c \ucc44\ub110\uc774\uae30\ub3c4 \ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0b0\uc5c5\uc740 \uacbd\uc81c \uc131\uc7a5\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc624\ud504\ub77c\uc778 \uc0c1\ud638\uc791\uc6a9\uc744 \ubcf4\uc644\ud558\uace0 \ud655\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud55c \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \uc0ac\ud68c\uc801 \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c \uac15\ud654\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\ud68c\uc801 \uc18c\ud1b5\uc758 \uacbd\ud5d8\uc740 \uc911\uc694\ud55c \uc131\uc7a5 \uacfc\uc815\uc785\ub2c8\ub2e4","\uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9 \uae30\uc220\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ud5a5\uc0c1\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \uc911\uc694\ud55c \ucee4\ubba4\ub2c8\ucf00\uc774\uc158 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ud61c\ud0dd\uc740 \uc704\ud5d8 \uc694\uc18c\ub97c \ub2a5\uac00\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc0ac\ud68c\uc801 \ucc45\uc784\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \ud544\uc218\uc801\uc778 \ucee4\ubba4\ub2c8\ucf00\uc774\uc158 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub610 \ub2e4\ub978 \ub300\uc548\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc640 \uc0c1\ud638\uc791\uc6a9\ud558\ub294 \ubc29\ubc95\uc5d0 \ub300\ud55c \ucee4\ubba4\ub2c8\ud2f0 \uae30\ubc18 \uc811\uadfc\ubc95\uc744 \ud65c\uc6a9\ud558\ub294 \uac83\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc815\ubcf4 \uc811\uadfc\uc744 \ubbfc\uc8fc\ud654\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc758 \ud50c\ub7ab\ud3fc\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc99d\uc9c4\uc2dc\ud0b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ud1b5\ud55c \uae0d\uc815\uc801 \uacbd\ud5d8\uc740 \ubd80\uc815\uc801 \uce21\uba74\uc744 \uc0c1\uc1c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\ud68c\uc801 \uc5f0\uacb0 \ubc0f \uc815\ubcf4 \uc811\uadfc\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\uc5d0 \ub300\ud574 \ud1a0\ub860\ud558\uace0 \ub3c4\uc6c0\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \ud50c\ub7ab\ud3fc\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uae0d\uc815\uc801\uc778 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud55c \ub124\ud2b8\uc6cc\ud0b9\uc740 \uc0ac\ud68c\uc801 \uc5f0\ub300\ub97c \uac15\ud654\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud55c  \uc778\uc2dd\uc744 \uc804\ud658\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc9c0\uc18d\uc801\uc778 \ub300\ud654\uc640 \uad50\uc721\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc62c\ubc14\ub978 \ud310\ub2e8\uc744 \ub3d5\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\uacfc \ubcf4\ud638\uc758 \ud544\uc694\uc131\ubcf4\ub2e4 \uc911\uc694\ud55c \uac83\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc2a4\uc2a4\ub85c \ud658\uacbd\uc5d0 \ub3c4\uc804\ud558\uba70 \uc131\uc7a5\ud560 \uae30\ud68c\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc81c\uc7ac\ubcf4\ub2e4\ub294 \uccad\uc18c\ub144 \uc790\uc2e0\uc774 \uc790\uc8fc\uc801\uc774\uace0 \ucc45\uc784 \uc788\uac8c \uae30\uc220\uc744 \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \uc7a5\ub824\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc5d0\uac8c\ub294 \ube44\ud310\uc801 \uc0ac\uace0 \ub2a5\ub825\uc744 \ud0a4\uc6b0\ub294 \uac83\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ubbf8\uc131\uc219\ud568\uc744 \uace0\ub824\ud558\ub354\ub77c\ub3c4 \uadf8\ub4e4\uc5d0\uac8c \ucc45\uc784\uac10\uc744 \ubd80\uc5ec\ud558\uace0 \uc2a4\uc2a4\ub85c \uc633\uace0 \uadf8\ub984\uc744 \ud310\ub2e8\ud560 \uae30\ud68c\ub97c \uc8fc\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \ud310\ub2e8\ub825 \ubc1c\ub2ec\uc744 \uc704\ud55c \uacbd\ud5d8\uc801 \ud559\uc2b5\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uad50\uc721\uc744 \ud1b5\ud55c \ubbf8\uc131\ub144\uc790\uc758 \uc2a4\uc2a4\ub85c \ubcf4\ud638 \ub2a5\ub825 \ud5a5\uc0c1\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ud6a8\uacfc\uc801\uc778 \uc790\uae30\uc870\uc808 \ub2a5\ub825\uc744 \uae30\ub974\ub294 \uac83\uc740 \uadf8\ub4e4\uc758 \uc131\uc7a5\uc744 \ub3d5\uace0 \uc7a5\uae30\uc801\uc778 \uc720\uc775\uc744 \uac00\uc838\uc635\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub294 \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4 \uac1c\uc778\uc758 \ucc45\uc784\uac10\uacfc \uc790\uc728\uc131\uc744 \uae30\ub974\ub294 \ubc29\ud5a5\uc73c\ub85c \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\uaddc\uc81c\ubcf4\ub2e4\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc2a4\uc2a4\ub85c \uc704\ud5d8\uc744 \uc778\uc2dd\ud558\uace0 \ub300\ucc98\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \uae38\ub7ec\uc8fc\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uc790\uc728\uc131\uc744 \ubd80\uc5ec\ud558\uace0 \uc2a4\uc2a4\ub85c \uc704\ud5d8\uc744 \uc778\uc9c0\ud558\uac8c \ud558\ub294 \uac83\uc774 \uac00\uc7a5 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc9c0\uc6d0 \uad6c\uc870\ub97c \uac15\ud654\ud574\uc57c \ud569\ub2c8\ub2e4. 'The National Center for Missing & Exploited Children'\uc740 \uccad\uc18c\ub144\uc774 \uc9c1\uba74\ud560 \uc218 \uc788\ub294 \uc704\ud5d8 \uc0c1\ud669\uc5d0 \ub300\ud574 \uad6d\uac00\uc801 \ucc28\uc6d0\uc758 \ub300\uc751\uc774 \ud544\uc694\ud558\ub2e4\uace0 \uc8fc\uc7a5\ud558\uba70, \uc774\ub97c \uc704\ud574 \uad6c\uccb4\uc801\uc778 \uad6c\uc81c \uc808\ucc28\uc640 \ubc95\uc801 \ubcf4\ud638 \uc218\ub2e8\uc744 \ub9c8\ub828\ud574\uc57c \ud55c\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\uccad\uc18c\ub144 \ucc38\uc5ec\ub97c \ud1b5\ud574 \ub354 \ub098\uc740 \ubcf4\ud638 \ubc29\uc548\uc744 \ub9c8\ub828\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubbf8\uc131\ub144\uc790\uc758 \uc758\uacac\uacfc \uc0c1\ud669\ub3c4 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ucda9\ub3d9 \uc870\uc808\uc774 \uc5b4\ub824\uc6b4 \ubbf8\uc131\ub144\uc790\ub97c \uc704\ud574 \uae30\uc220\uc801 \ub3c4\uad6c\uac00 \ub9c8\ub828\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uccad\uc18c\ub144\uc758 \uc790\uc728\uc131 \uc99d\uc9c4\uc740 \uc911\uc694\ud569\ub2c8\ub2e4","\ub2e4\uc591\ud55c \ud658\uacbd\uc5d0\uc11c\uc758 \uacbd\ud5d8\uc740 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccad\uc18c\ub144\uc758 \ub3c5\ub9bd\uc131\uacfc \ube44\ud310\uc801 \ub2a5\ub825\uc740 \ubcf4\ud638\ubc1b\uc73c\uba74\uc11c\ub3c4 \uc9c0\uc18d\uc801\uc73c\ub85c \ubc1c\uc804\ud558\ub3c4\ub85d \ud574\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubbf8\uc131\ub144\uc790\uc758 \ub2a5\ub3d9\uc801\uc778 \ucc38\uc5ec\uc640 \ubaa9\uc18c\ub9ac\ub97c \ubc18\uc601\ud558\ub294 \uac83\uc774 \ub354 \ub098\uc740 \uc815\ucc45 \uac1c\ubc1c\ub85c \uc774\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ub3c4\ud55c \ubc95\uc801 \uaddc\uc81c \ub300\uc2e0 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud558\ub294 \uac83\uc774 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc138 \ubc88\uc9f8\ub85c, \uccad\uc18c\ub144 \uc790\uc2e0\uc774 \uc8fc\uccb4\uc801\uc73c\ub85c \uc704\ud5d8 \uc694\uc18c\ub97c \ubd84\ubcc4\ud558\uace0 \ub300\ucc98\ud558\ub3c4\ub85d \ub3d5\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc790\uc728\uc131\uc744 \uc874\uc911\ud558\uba74\uc11c \uc790\uae30\uc870\uc808\uc744 \ubc30\uc6b8 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc8fc\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \ub514\uc9c0\ud138 \ud658\uacbd \ub0b4 \uc790\uc728\uc131\uc744 \uc874\uc911\ud558\uace0 \uc790\uc2e0\ub9cc\uc758 \uae30\uc900\uc744 \ud615\uc131\ud558\ub3c4\ub85d \ub3d5\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubc95\uc801 \uc81c\uc57d\ubcf4\ub2e4\ub294 \ud6a8\uacfc\uc801\uc778 \uc0ac\uc6a9\ubc95\uc744 \uac00\ub974\uce58\ub294 \uac83\uc774 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ub354 \ud070 \uc790\uc728\uc131\uacfc \ucc45\uc784\uac10\uc744 \ubd80\uc5ec\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\ud68c\uc758 \uc774\ub7ec\ud55c \ucc45\uc784\uc740 \ubc95\uc801 \uc81c\ud55c\uc774 \uc544\ub2c8\ub77c \uccad\uc18c\ub144\uc758 \uc790\uc728\uc131\uc744 \uc874\uc911\ud558\uba70 \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\uccad\uc18c\ub144\uc758 \uc790\uae30 \uc870\uc808 \ub2a5\ub825\uc744 \ud0a4\uc6b0\ub294 \uac83\uc740 \uc7a5\uae30\uc801\uc778 \ubcc0\ud654\ub97c \uc774\ub04c\uc5b4\ub0c5\ub2c8\ub2e4","\uccad\uc18c\ub144\ub4e4\uc774 \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0\uc11c \uc790\uc728\uc131\uc744 \uac16\ub3c4\ub85d \ud558\ub294 \uac83\uc740 \uadf8\ub4e4\uc758 \uad8c\ub9ac\ub97c \uc874\uc911\ud558\ub294 \ub3d9\uc2dc\uc5d0 \ucc45\uc784\uac10\uc744 \ubd80\uc5ec\ud569\ub2c8\ub2e4","\uc790\uc728\uc801\uc778 \uc0ac\uc6a9 \ud658\uacbd \uc870\uc131\uc740 \ubbf8\uc131\ub144\uc790\uc758 \ud310\ub2e8\ub825\uc744 \uac15\ud654\ud569\ub2c8\ub2e4","\ubc95\uc801\uc778 \uc81c\ud55c \ub300\uc2e0 \uad50\uc721\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\uc758 \ub514\uc9c0\ud138 \uc548\uc804\uc131\uc744 \ud5a5\uc0c1\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ub9de\ucda4\ud654\ub41c \uc548\uc804 \uc124\uc815\uc744 \uc81c\uacf5\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \ubc1c\ub2ec\uc744 \uc9c0\uc6d0\ud558\ub294 \ud3ec\uad04\uc801\uc778 \uad50\uc721\uc774 \ud544\uc218\uc785\ub2c8\ub2e4","\uccad\uc18c\ub144\uc758 \uc790\uae30 \uacb0\uc815\uad8c\uacfc \uad8c\ub9ac\ub97c \uc874\uc911\ud574\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uccad\uc18c\ub144\uc758 \uc815\uc2e0 \uac74\uac15\uc744 \uc9c0\uc6d0\ud558\uae30 \uc704\ud55c \ubcc4\ub3c4\uc758 \ud504\ub85c\uadf8\ub7a8\uc774 \ub9c8\ub828\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc790\uc728\uc131 \uc788\ub294 \ud658\uacbd\uc5d0\uc11c \ubbf8\uc131\ub144\uc790\ub294 \ucc45\uc784\uac10\uc744 \ubc30\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub294 \uae30\uc220\uc801 \uc9c0\uc2dd\uacfc \ube44\ud310\uc801 \uc0ac\uace0\ub97c \ud0a4\uc6cc \uc704\ud611\uc744 \uc2a4\uc2a4\ub85c \ud310\ub2e8\ud558\uace0 \ub300\uc751\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \uae38\ub7ec\uc918\uc57c \ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc79 ud558\uace0 \ube44\ud310\uc801 \uc0ac\uace0\ub97c \uc7a5\ub824\ud568\uc73c\ub85c\uc368, \uadf8\ub4e4\uc740 \uc2a4\uc2a4\ub85c \uc720\ud574\ud55c \ucf58\ud150\uce20\ub97c \ud53c\ud558\uac70\ub098 \uc0ac\uc774\ubc84 \ubd88\ub9c1\uc5d0 \ub300\ucc98\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \uae30\ub97c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc744 \uc704\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \uac15\ud654\ud558\uba74 \uc804\ubc18\uc801\uc778 \uc778\uc2dd\uacfc \ucc45\uc784\uac10\uc744 \ub192\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc62c\ubc14\ub978 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \ubc29\ubc95\uc744 \uad50\uc721\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uad50\uc721\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\uc758 \ucc45\uc784\uac10 \uc788\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc7a5\ub824\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc548\uc804\ud558\uac8c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \uad50\uc721\uc744 \ubc1b\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc628\ub77c\uc778\uacfc \uc624\ud504\ub77c\uc778 \ud65c\ub3d9 \uc0ac\uc774\uc5d0\uc11c \uade0\ud615\uc744 \ucc3e\ub3c4\ub85d \uad50\uc721\ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc704\ud5d8\uc131\uc744 \ub0ae\ucd94\uae30 \uc704\ud574\uc11c\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ub514\uc9c0\ud138 \uc548\uc804\uc5d0 \ub300\ud55c \uad50\uc721\uacfc \uc62c\ubc14\ub978 \uc0ac\uc6a9 \uc2b5\uad00\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \uac00\ub974\uce58\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub514\uc9c0\ud138 \uad50\uc721\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc548\uc804\ud558\uac8c \uc0ac\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uac00 \uc62c\ubc14\ub974\uac8c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \uac00\uc774\ub4dc\ub77c\uc778\uacfc \uad50\uc721\uc744 \uc81c\uacf5\ud568\uc73c\ub85c\uc368 \uac74\uac15\ud558\uac8c \uc774\uc6a9\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc744 \ubc30\uc6b8 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \uc788\uc5b4 \ucc45\uc784\uac10\uc744 \ubc30\uc6b0\uace0 \uacfc\ub3c4\ud55c \uc0ac\uc6a9\uc744 \ud53c\ud558\ub294 \ubc95\uc744 \ubc30\uc6b8 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ucc45\uc784 \uc788\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\ubc95\uc744 \uad50\uc721\ud558\ub294 \uac83\uc740 \uc7a5\uae30\uc801\uc73c\ub85c \ub354 \ud6a8\uacfc\uc801\uc778 \ud574\uacb0\ucc45\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uad50\uc721\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc548\uc804\ud558\uac8c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\ub3c4\ud574\uc57c \ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc740 \uc2e4\uc81c\ub85c \uc2a4\uc2a4\ub85c\uc758 \uc628\ub77c\uc778 \uacbd\ud5d8\uc744 \uad00\ub9ac\ud558\ub294 \ubc95\uc744 \ubc30\uc6b0\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","Mental Health America\ub294 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\uc5d0 \ub300\ud55c \uc778\uc2dd\uc744 \ub192\uc774\uace0 \uc608\ubc29\ud558\uae30 \uc704\ud574 \uad50\uc721\uacfc \uc811\uadfc\uc131 \ud5a5\uc0c1\uc744 \uac15\uc870\ud558\uba70, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uc62c\ubc14\ub978 \uad50\uc721\uc774 \ubbf8\uc131\ub144\uc790\uc758 \uc548\uc804\uc744 \ud655\ubcf4\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc74c\uc744 \uac15\uc870\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc2a4\uc2a4\ub85c \ucf58\ud150\uce20\ub97c \uc774\ud574\ud558\uace0 \ubd84\ubcc4\ud560 \uc218 \uc788\ub3c4\ub85d \uad50\uc721\ud558\uba74 \uc911\ub3c5\uc131 \ucf58\ud150\uce20\ub098 \uc720\ud574 \uc815\ubcf4\uc5d0 \ub300\ud55c \uba74\uc5ed\ub825\uc744 \ud0a4\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ud6a8\uacfc\uc801\uc73c\ub85c \uc798\ubabb\ub41c \uc815\ubcf4\uc5d0 \ub300\ud55c \uad50\uc721\uc744 \uc81c\uacf5\ud568\uc73c\ub85c\uc368 \ub354 \ud070 \ubcf4\ud638 \ud6a8\uacfc\ub97c \uc5bb\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccad\uc18c\ub144\ub4e4\uc774 \uc720\ud574\ud55c \uc815\ubcf4\uc5d0 \ub178\ucd9c\ub418\ub294 \uac83\uc744 \ubc29\uc9c0\ud558\ub294 \ud6a8\uacfc\uc801\uc778 \ubc29\ubc95\uc740 \ubc95\uc801 \uc5b5\uc81c\uac00 \uc544\ub2c8\ub77c \uad50\uc721\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ucf58\ud150\uce20 \uaddc\uc81c\ubcf4\ub2e4 \ubbf8\uc131\ub144\uc790\ub4e4\uc740 \ube44\ud310\uc801 \uc0ac\uace0 \ub2a5\ub825\uc744 \ud1b5\ud574 \uc815\ubcf4\ub97c \uc2a4\uc2a4\ub85c \ud3c9\uac00\ud558\ub294 \ubc29\ubc95\uc744 \ubc30\uc6cc\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uccad\uc18c\ub144\ub4e4\uc758 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc640 \uac74\uac15\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uad50\uc721\ud558\ub294 \uac83\uc774 \ud6a8\uacfc\uc801\uc778 \ub300\ucc45\uc785\ub2c8\ub2e4. '\uad6d\uc81c\ud559\uad50\ubcf4\uac74\ud559\ud68c'\ub294 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \ucc45\uc784 \uc788\ub294 \uc628\ub77c\uc778 \ud589\ub3d9\uacfc \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \uac00\ub974\uce58\ub294 \ud504\ub85c\uadf8\ub7a8\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubd80\uc791\uc6a9\uc744 \uac10\uc18c\uc2dc\ud0a4\uace0 \uae0d\uc815\uc801\uc778 \uc0ac\uc6a9\uc744 \ucd09\uc9c4\ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc62c\ubc14\ub978 \uc0ac\uc6a9\ubc95\uacfc \uc704\ud5d8\uc131\uc744 \uac00\ub974\uce58\ub294 \uac83\uc774 \uc704\ud5d8 \uad00\ub9ac\uc5d0 \uc788\uc5b4 \uac00\uc7a5 \uc911\uc694\ud55c \uc694\uc18c\uc785\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uac00 \uc2a4\uc2a4\ub85c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc62c\ubc14\ub974\uac8c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ud558\uae30 \uc704\ud574\uc11c\ub294 \uc2e4\uc9c8\uc801\uc778 \ubbf8\ub514\uc5b4 \uad50\uc721\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721\uc744 \ud1b5\ud574 \uc2a4\uc2a4\ub85c\ub97c \ubcf4\ud638\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \uae38\ub7ec\uc57c \ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc644\uc804\ud788 \ucc28\ub2e8\ud558\uac70\ub098 \uc2ec\ud558\uac8c \uc81c\ud55c\ud558\ub294 \ub300\uc2e0, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc9c1\uba74\ud560 \uc218 \uc788\ub294 \ub2e4\uc591\ud55c \uc704\ud5d8\uc5d0 \ub300\ud55c \ucca0\uc800\ud55c \uad50\uc721\uacfc \ub300\ud654\ub97c \ud1b5\ud574 \uc2a4\uc2a4\ub85c \uc548\uc804\uc744 \uc9c0\ud0ac \uc218 \uc788\ub3c4\ub85d \ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uad50\uc721\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc548\uc804\ud558\uac8c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ud574\uc57c \ud569\ub2c8\ub2e4","\uc778\ud130\ub137 \uc548\uc804 \uad50\uc721 \ud611\uc758\ud68c\ub294 \uac10\uc815 \uad00\ub9ac \ubc0f \ucc45\uc784 \uc788\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc704\ud55c \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc774 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc704\ud5d8\uc131\uc744 \uc778\uc2dd\uc2dc\ud0a4\uace0 \uadf8\ub4e4 \uc2a4\uc2a4\ub85c \uc870\uc808\ud558\uac8c \ub9cc\ub4dc\ub294 \ub370 \ud6a8\uacfc\uc801\uc774\ub77c\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \ubc29\ubc95\uc5d0 \ub300\ud55c \uad50\uc721\uacfc \uc8fc\uc758\ub97c \uc900\ub2e4\uba74 \uc911\ub3c5\uc758 \uc704\ud5d8\uc744 \ud06c\uac8c \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc0ac\uc6a9\uc73c\ub85c \uc778\ud55c \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\uc640 \uc0ac\uc0dd\ud65c \uce68\ud574\uc758 \uc704\ud5d8\uc774 \ud06c\ub2e4\ub294 \uc6b0\ub824\uc5d0 \ub300\uc751\ud558\uae30 \uc704\ud574\uc11c\ub294, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc774\ub7ec\ud55c \uc704\ud5d8\uc744 \uc778\uc2dd\ud558\uace0 \uc2a4\uc2a4\ub85c \ub300\ucc98\ud560 \uc218 \uc788\ub3c4\ub85d \uac00\ub974\uce58\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc0ac\uc774\ubc84 \ud658\uacbd\uc5d0\uc11c \uc2a4\uc2a4\ub85c \uc548\uc804\uc744 \uc9c0\ud0a4\ub294 \ub2a5\ub825\uc744 \ud0a4\uc6b0\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \ubbf8\uc131\ub144\uc790\uac00 \uc2a4\uc2a4\ub85c \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc774\uc6a9\ud560 \uc218 \uc788\ub294 \uad50\uc721\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc744 \uc704\ud55c \uc628\ub77c\uc778 \uad50\uc721\uc774 \uc704\ud5d8\uc5d0 \ub300\ud55c \ub300\uc751 \ub2a5\ub825\uc744 \ud0a4\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \ubd80\uc791\uc6a9\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ubd80\ubaa8 \ubc0f \uad50\uc721\uae30\uad00\uacfc\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc62c\ubc14\ub978 \uc0ac\uc6a9 \ubc29\ubc95\uacfc \uc704\ud5d8 \uc694\uc18c\uc5d0 \ub300\ud55c \uc778\uc2dd\uc744 \uac15\ud654\ud574\uc57c \ud569\ub2c8\ub2e4","\uad50\uc721\uc740 \ubbf8\uc131\ub144\uc790\uac00 \uc628\ub77c\uc778\uc5d0\uc11c \uc81c\uacf5\ub418\ub294 \uc815\ubcf4\uc758 \uc2e0\ube59\uc131\uc744 \ud3c9\uac00\ud558\uace0 \ud544\uc694\ud55c \uc815\ubcf4\ub97c \uc120\ud0dd\ud558\ub294 \ub2a5\ub825\uc744 \uae38\ub7ec \uc904 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uad50\uc721\uacfc \uc18c\ud1b5\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uae0d\uc815\uc801\uc774\uace0 \ucc45\uc784 \uc788\ub294 \uc0ac\uc6a9\uc744 \uc775\ud790 \uc218 \uc788\ub3c4\ub85d \ud558\ub294 \uac83\uc774 \ub354 \uc911\uc694\ud569\ub2c8\ub2e4","\uc815\ubcf4 \ucea0\ud398\uc778\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790 \uc790\uc2e0\uc758 \ud589\ub3d9\uc744 \uae0d\uc815\uc801\uc73c\ub85c \uc774\ub04c\uace0, \uc2a4\uc2a4\ub85c \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\ub85c\ubd80\ud130 \ubcf4\ud638\ud560 \uc218 \uc788\uac8c \ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uac1c\uc778\uc815\ubcf4 \uc720\ucd9c \ubb38\uc81c\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc815\ubcf4 \ubcf4\ud638\uc758 \uc911\uc694\uc131\uacfc \uae30\ubcf8\uc801\uc778 \ubcf4\uc548 \uc218\uce59\uc744 \uad50\uc721\ud568\uc73c\ub85c\uc368 \ubcf4\ub2e4 \ud6a8\uacfc\uc801\uc73c\ub85c \uc608\ubc29\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ud559\uad50\uc640 \uc9c0\uc5ed\uc0ac\ud68c\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc548\uc804\ud558\uac8c \uc0ac\uc6a9\ud558\ub294 \ubc29\ubc95\uc744 \uad50\uc721\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \uc7a5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc790\ubc1c\uc801\uc778 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0\uc11c \uc704\ud5d8 \uc694\uc18c\ub97c \uc2dd\ubcc4\ud558\uace0 \uc774\ub97c \uc801\uc808\ud788 \ub300\ucc98\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \uae38\ub7ec\uc57c \ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc740 \ubb38\uc81c\uac00 \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \uc0c1\ud669\uc744 \uc778\uc2dd\ud558\uace0 \ub300\ucc98\ud558\ub294 \ubc29\ubc95\uc744 \ubc30\uc6b8 \uc218 \uc788\uc73c\uba70, \uc774\ub294 \uc7a5\uae30 c\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc790\uccb4\ubcf4\ub2e4\ub294 \uacfc\ub3c4\ud55c \uc0ac\uc6a9\uc73c\ub85c \uc778\ud55c \ubb38\uc81c\uc5d0 \uc9d1\uc911\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc704\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud55c \uad50\uc721\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \uc904\uc774\uae30 \uc704\ud574 \uc0ac\uc6a9\uc790 \uad50\uc721\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc911\ub3c5\uc131\uc744 \uad00\ub9ac\ud558\ub294 \ub370\uc5d0\ub294 \uc790\uae30 \uaddc\uc81c\uac00 \uc911\uc694\ud569\ub2c8\ub2e4","\uc218\uba74 \ubd80\uc871\uc774\ub098 \uc9d1\uc911\ub825 \uc800\ud558 \ubb38\uc81c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uadf8 \uc790\uccb4\ubcf4\ub2e4\ub294 \uc0ac\uc6a9 \uc2b5\uad00\uacfc \uacb0\ubd80\ub41c \ubb38\uc81c\ub85c \uc774\ud574\ud574\uc57c \ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc870\uc808\uc740 \ucc45\uc784\uac10 \uc788\ub294 \ub514\uc9c0\ud138 \uc0dd\ud65c\uc758 \uc77c\ubd80\ub85c \uc790\ub9ac\uc7a1\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc911 \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \uc704\ud5d8 \uc694\uc18c\ub4e4\uc744 \uc774\ud574\ud558\uace0, \ube44\ud310\uc801\uc73c\ub85c \ud3c9\uac00\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \uac16\ucd94\ub294 \uac83\uc774 \uc7a5\uae30\uc801\uc73c\ub85c \uc911\uc694\ud55c \ub300\ucc45\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubd88\uc548\uac10 \uc99d\uac00 \ubb38\uc81c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud65c\uc6a9\ubc95\uacfc \uade0\ud615 \uc7a1\ud78c \uc0dd\ud65c\uc2b5\uad00\uc73c\ub85c \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \uad50\uc721\uc744 \ud1b5\ud574 \uac1c\uc120\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc911\ub3c5\uc744 \ubc29\uc9c0\ud558\uae30 \uc704\ud574 \uac74\uac15\ud55c \uc0ac\uc6a9 \uc2b5\uad00\uc744 \uac00\ub974\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uad00\ub828 \uc911\ub3c5\uc774\ub098 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \ub354 \ub098\uc740 \uad50\uc721\uacfc \uc9c0\ub3c4\ub97c \ud1b5\ud574 \uc608\ubc29\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0 \ub300\ud55c \uad50\uc721\uc744 \ud1b5\ud574 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc704\ud5d8 \uc694\uc18c\uac00 \uc788\uc9c0\ub9cc \uc774\ub97c \ud1b5\ud574 \uc0ac\uc774\ubc84 \uc548\uc804 \uad50\uc721\uc758 \uc911\uc694\uc131\uc744 \uac15\uc870\ud560 \uc218 \uc788\ub294 \uae30\ud68c\uac00 \ub429\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uacfc\ubab0\uc785 \ubb38\uc81c\ub294 \uade0\ud615 \uc7a1\ud78c \uc811\uadfc\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc815\uc2e0 \uac74\uac15\uc5d0 \ub300\ud55c \uc6b0\ub824\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\ubc95\uc5d0 \ub300\ud55c \uad50\uc721\uc744 \uac15\ud654\ud558\uc5ec \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721\uc744 \ud1b5\ud574 \uc704\ud5d8 \uc694\uc18c\ub97c \uc644\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc2ec\ub9ac\uc801 \uc9c0\uc6d0 \uccb4\uacc4\uac00 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \ubd80\uc791\uc6a9\uc744 \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc911\ub3c5 \uac00\ub2a5\uc131\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc790\uccb4\uc758 \ubb38\uc81c\uac00 \uc544\ub2c8\ub77c \uc0ac\uc6a9 \uc2b5\uad00\uc758 \ubb38\uc81c\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc704\ud5d8\uc131\uc744 \uc904\uc774\uae30 \uc704\ud574 \uc608\ubc29 \uad50\uc721\uacfc \uae30\uc220\uc801 \ub3c4\uad6c\ub97c \ud65c\uc6a9\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721\uacfc \uac00\uc774\ub4dc\ub77c\uc778\uc774 \uc911\ub3c5\uc744 \uc608\ubc29\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc73c\ub85c \uc778\ud55c \ubd80\uc791\uc6a9\uc740 \uad50\uc721\uacfc \ubcf4\ud638\ub97c \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uad00\ub9ac \ub3c4\uad6c\ub294 \uc704\ud5d8\uc744 \ud6a8\uacfc\uc801\uc73c\ub85c \uc644\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uac74\uc804\ud55c \uc911\ub3c5 \uc608\ubc29 \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \uac74\uac15\ud55c \uc0ac\uc6a9 \uc2b5\uad00\uc744 \uae30\ub97c \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc704\ud5d8 \uac10\uc9c0\uc640 \ub300\uc751 \uae30\uc220\uc744 \ud0a4\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uac00 \uc815\uc2e0 \uac74\uac15\uc5d0 \ubbf8\uce58\ub294 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \uc904\uc774\uae30 \uc704\ud574\uc11c\ub294 \uad50\uc721\uacfc \uc778\uc2dd \uac1c\uc120\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \uac19\uc740 \ubb38\uc81c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubb38\uc81c\uac00 \uc544\ub2c8\ub77c \uc0ac\uc6a9 \ubc29\uc2dd\uc758 \ubb38\uc81c\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc545\uc6a9\uc73c\ub85c \uc778\ud55c \ubb38\uc81c\ub294 \uad50\uc721\uc744 \ud1b5\ud574 \ucda9\ubd84\ud788 \uc644\ud654\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud1b5\uc81c\uc640 \uc9c0\uce68\uc744 \ud1b5\ud574 \uc911\ub3c5 \uac00\ub2a5\uc131\uc744 \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \uac19\uc740 \ubb38\uc81c\ub294 \uadfc\ubcf8\uc801\uc73c\ub85c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc790\uccb4\uac00 \uc544\ub2c8\ub77c \uc0ac\uc6a9 \ubc29\ubc95\uc758 \ubb38\uc81c\uc785\ub2c8\ub2e4","\ub2e4\uc591\ud55c \ub300\uc548 \ud65c\ub3d9\uc744 \uc7a5\ub824\ud568\uc73c\ub85c\uc368 \uc790\uc5f0\uc2a4\ub7fd\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc870\uc808\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc704\ud5d8\uc131\uc740 \uad50\uc721\uc744 \ud1b5\ud574 \ucda9\ubd84\ud788 \uadf9\ubcf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc2dc \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \ubd80\uc815\uc801 \uc601\ud5a5\uc744 \ubc29\uc9c0\ud558\uae30 \uc704\ud574 \uae30\uc220 \uc790\uccb4\uc758 \ubc1c\uc804\uc744 \ucd09\uc9c4\ud574\uc57c \ud569\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"14_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","14_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"cItmQNxke0BS\u002fWtAuy1YQNvCVkBrMYBASlV9QK7ZYUC85ltAcL1\u002fQGeZd0Aiom9AlP1XQOCzcEA8InxAN3JyQMV9f0AmX31AyvB9QKfieEBKsX1AbKVtQApafkBLp3tAgD9xQE0fWUALwHtAEhp8QNgIb0D+n3JAVcSCQGeAekA6\u002f3xAmoBVQI64XUCXinRA6D5XQDe6c0ACtmBAsnZ6QNbCcEA="},"y":{"dtype":"f4","bdata":"jEWAP4\u002ftZz8EI1Y\u002fddY0PwwnPT9Ybo4\u002foDtNP5CWhj9+QCo\u002fzGiEP15ebj8Pvk8\u002fmdk2P0MbYD9hWGM\u002f90ViP5hqUT83zno\u002fSiNoP3fhaD\u002f3tGE\u002f3OItPxSbUz9THGg\u002f28BePyHEMz8a7XY\u002f0gl2PyEPYT9Wa2Q\u002fh1OXPz2JVj\u002f0klE\u002fz0o0P6E6ij+ke2g\u002fAeszPwLrcD8eV4c\u002fsddjP5CpYT8="},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc790\uccb4\ub294 \uc720\ud574 \ucf58\ud150\uce20\ub97c \ubc29\uc9c0\ud558\uae30 \uc704\ud55c \ub178\ub825\uc744 \uc9c0\uc18d\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4. 'Facebook, Inc.'\ub294 \ub2e4\uc591\ud55c \uc548\uc804 \uc870\uce58\uc640 \ucf58\ud150\uce20 \ud544\ud130\ub9c1 \uae30\uc220\uc744 \ub3c4\uc785\ud558\uc5ec \uccad\uc18c\ub144 \uc0ac\uc6a9\uc790\ub97c \ubcf4\ud638\ud558\ub294 \ub370 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \ubbf8\uc131\ub144\uc790\ub97c \uc704\ud55c \ub9de\ucda4\ud615 \ubcf4\ud638 \ub3c4\uad6c\ub97c \uac1c\ubc1c\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \uac1c\uc120 \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\uacfc\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638 \uae30\ub2a5\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\ub4e4\uc740 \uc774\ubbf8 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \uc704\ud55c \ub2e4\uc591\ud55c \uc548\uc804\uc7a5\uce58\ub97c \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc758 \ucc45\uc784\uc744 \uac15\ud654\ud558\uc5ec \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc548\uc804\ud55c \uc628\ub77c\uc778 \uacf5\uac04\uc744 \uc81c\uacf5\ud574\uc57c \ud569\ub2c8\ub2e4","\ud2f1\ud1a1(TikTok Inc.)\uc740 \uccad\uc18c\ub144 \uc0ac\uc6a9\uc790\uc5d0\uac8c \uc548\uc804\ud55c \uc0ac\uc6a9 \ud658\uacbd\uc744 \uc870\uc131\ud558\uae30 \uc704\ud574 \ubd80\ubaa8 \ud1b5\uc81c \uae30\ub2a5\uacfc \uc0ac\uc6a9 \uc2dc\uac04 \uc81c\ud55c\uc744 \ub3c4\uc785\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \uc811\uadfc \ubc29\uc2dd\uc740 \ubbf8\uc131\ub144\uc790\uc758 \uc790\uc728\uc131\uc744 \ubcf4\ud638\ud558\uba74\uc11c \uc815\uc2e0 \uac74\uac15\uc744 \uc9c0\ud0ac \uc218 \uc788\ub294 \ubc29\ubc95\uc774\ub77c\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc548\uc804\ud558\uac8c \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\ub294 \uae30\uc220\uc801 \ub3c4\uad6c\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ud544\ud130\ub9c1 \ubc0f \uad00\ub9ac \ub3c4\uad6c\ub97c \uc81c\uacf5\ud558\uc5ec \uc548\uc804\ud55c \uc628\ub77c\uc778 \ud658\uacbd\uc744 \uc870\uc131\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc790\uccb4\uc801\uc73c\ub85c \ubbf8\uc131\ub144\uc790\uc758 \uc548\uc804\uc744 \uac15\ud654\ud558\ub294 \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \uc801\uadf9\uc801\uc778 \ucf58\ud150\uce20 \uad00\ub9ac\uc640 \ubaa8\ub2c8\ud130\ub9c1\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\ub4e4\uc774 \uc774\ubbf8 \ucca8\ub2e8 \uae30\uc220\uc744 \ud65c\uc6a9\ud574 \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud558\uace0 \uc788\uc74c\uc744 \uace0\ub824\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uae0d\uc815\uc801 \uce21\uba74\uc744 \uc801\uadf9\uc801\uc73c\ub85c \ud65c\uc6a9\ud558\uba74\uc11c \ub3d9\uc2dc\uc5d0 \ubcf4\ud638\ud558\ub294 \uc804\ub7b5\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub294 \uadf8\ub4e4\ub9cc\uc758 \uc548\uc804\ud55c \uc628\ub77c\uc778 \ucee4\ubba4\ub2c8\ud2f0\ub97c \uad6c\ucd95\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc9c0\uc18d\uc801\uc778 \uae30\uc220 \ubc1c\uc804\uc744 \ud65c\uc6a9\ud574 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc790\uccb4\uc801\uc73c\ub85c \ubbf8\uc131\ub144\uc790 \ubcf4\ud638 \uc2dc\uc2a4\ud15c\uc744 \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub ub9ac\ub97c \ub0b4\uace0 \uc758\uacac\uc744 \ud45c\ud604\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \uc218\ub2e8\uc774\ub77c\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc790\uc720\ub85c\uc6b4 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \uae0d\uc815\uc801 \uc790\uc544 \uc815\uccb4\uc131\uacfc \uc790\uc728\uc131\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ucc3d\uc758\uc801\uc778 \ud45c\ud604\uc758 \uc7a5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ucc3d\uc758\ub825\uc744 \ubc1c\ud718\ud560 \uc218 \uc788\ub294 \uacf5\uac04\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ucc3d\uc758\uc801\uc778 \ud45c\ud604\uc758 \uc7a5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uac1c\uc131\uc744 \ubc1c\uc804\uc2dc\ud0a4\uace0 \ubaa9\uc18c\ub9ac\ub97c \ud45c\ud604\ud560 \uc218 \uc788\ub294 \uae30\ud68c\uac00 \ub429\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc758 \uc790\uae30 \ud45c\ud604\uacfc \uc815\uccb4\uc131 \ubc1c\uc804\uc744 \uc9c0\uc6d0\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ucc3d\uc758\ub825\uc744 \ubc1c\ud718\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \uc7a5\uc774\ub77c\uace0 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub294 \ucc3d\uc758\uc131\uc744 \ubc1c\ud718\ud558\uace0 \ud45c\ud604\ud560 \uae30\ud68c\ub97c \uac16\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ucc3d\uc758\uc131 \ubc1c\ud604\uc758 \uc7a5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ucc3d\uc758\uc801 \ud45c\ud604\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc758 \ucc3d\uc758\uc131\uacfc \uc790\uae30 \ud45c\ud604\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ucc45\uc784\uac10 \uc788\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \ubbf8\uc131\ub144\uc790 \uac1c\uc778\uc758 \uc790\uae30 \ud45c\ud604\uacfc \ucc3d\uc758\uc131 \uc99d\uc9c4\uc744 \uc9c0\uc6d0\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \uadf8\ub4e4\uc758 \ucc3d\uc758\uc131\uacfc \ud45c\ud604\ub825\uc744 \ud5a5\uc0c1\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ud45c\ud604\uc758 \uc790\uc720\uc640 \ucc3d\uc758\uc131\uc744 \ubc1c\ud718\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc758 \ucc3d\uc758\uc801 \ud45c\ud604\uc744 \uc7a5\ub824\ud569\ub2c8\ub2e4","\ub610\ud55c, \ubbf8\uc131\ub144\uc790\ub4e4\uc740 \uc790\uae30 \ud45c\ud604\uacfc \ucc3d\uc758\uc801 \ud65c\ub3d9\uc744 \ud1b5\ud574 \uc628\ub77c\uc778 \uc0c1\uc5d0\uc11c \uae0d\uc815\uc801\uc778 \uacbd\ud5d8\uc744 \uc313\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc790\uc2e0\uc758 \ubaa9\uc18c\ub9ac\ub97c \ud45c\ud604\ud560 \uc218 \uc788\ub294 \ud50c\ub7ab\ud3fc\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uac00 \uc790\uc2e0\uc758 \uad00\uc2ec\uc0ac\uc640 \ucc3d\uc758\uc131\uc744 \ud45c\ud604\ud560 \uc218 \uc788\ub294 \ud50c\ub7ab\ud3fc\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \ucc3d\uc758\ub825 \ubc1c\ub2ec\uacfc \uc790\uae30 \ud45c\ud604\uc758 \uc7a5\uc744 \uc81c\uacf5\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc758 \ucc3d\uc758\uc801\uc778 \ud45c\ud604\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc758 \ucc3d\uc758\uc801 \ud45c\ud604\uacfc \uae30\uc220 \ubc1c\ub2ec\uc744 \ucd09\uc9c4\ud558\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ucc3d\uc758\uc131\uc744 \ubc1c\ud718\ud558\uace0 \ub3c5\ucc3d\uc801\uc778 \ucf58\ud150\uce20\ub97c \uc81c\uc791\ud558\ub294 \ub2a5\ub825\uc744 \uae30\ub97c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ucc3d\uc791\uacfc \ud45c\ud604\uc758 \uae30\ud68c\ub97c \uc90d\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc758 \ucc3d\uc758\ub825\uc744 \uc99d\uc9c4\uc2dc\ud0b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc790\uc2e0\uc758 \uc0dd\uac01\uc744 \ud45c\ud604\ud558\uace0 \ub2e4\uc591\ud55c \uc815\ubcf4\ub97c \uc5bb\uc744 \uc218 \uc788\uc73c\uba70, \uc774\ub294 \uadf8\ub4e4\uc758 \uc131\uc7a5\uacfc \ud559\uc2b5\uc5d0 \uae0d\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce69\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0\uc11c \uc790\uae30 \ud45c\ud604 \ub2a5\ub825\uc744 \ubc1c\uc804\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uae0d\uc815\uc801\uc774\uace0 \ucc3d\uc758\uc801\uc778 \ud45c\ud604\uc758 \uc7a5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4. \"The National Youth Council\"\ub294 \uc628\ub77c\uc778 \ud65c\ub3d9\uc774 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc790\uae30 \ud45c\ud604\uc758 \uae30\ud68c\ub97c \uc8fc\uace0, \ub2e4\ub978 \uc0ac\ub78c\ub4e4\uacfc\uc758 \ub2e4\uc591\ud55c \uc18c\ud1b5\uc744 \ud1b5\ud574 \uc0ac\ud68c\uc801 \uae30\uc220\uc744 \ubc1c\uc804\uc2dc\ud0ac \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud55c\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc790\uae30 \ud45c\ud604\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ucc3d\uc758\ub825\uacfc \uc790\uae30 \ud45c\ud604\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ucc3d\uc758\uc801 \ud45c\ud604\uacfc \uc790\uae30\uacc4\ubc1c\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc790\uae30 \ud45c\ud604\uc758 \uc911\uc694\ud55c \ub3c4\uad6c\ub85c, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc790\uc2e0\uc758 \uc0dd\uac01\uacfc \ucc3d\uc758\uc131\uc744 \ubc1c\ud604\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"18_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","18_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"2nswQSxAMEHk1i9Bc2swQV\u002fgKkEahzBBJgMyQWo1MUHwZy5BP7AxQRpsL0Gl1jBBbEQxQZ8EMUE6pTBBEBMxQT+tLkHxhjFBLJouQbhnMUEmQjBBKk4wQdy6LkEb7DFBKS8rQQeIMEFmZjFBndEuQdd7MUHD2S9BnIswQftOMEH37C9BF0gxQTnWMEHBvzBB9iwwQQ=="},"y":{"dtype":"f4","bdata":"PyuMQOvcj0CiBpBAXciLQBqOgUDJv49Au82LQAecjEDZCYRAeuqOQPPGkkDmpI1AnnGNQC2ijEBamI1ATv2MQHHfhEC45o1AR1SEQC1CjUDZu4xA63aPQFrIhEBVno1AKe9\u002fQIc0jEAShY1AKpWEQBpAjUANhJBAF7qOQFkrjkCcVJBA5F6NQLcejkDVm45AdP+LQA=="},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\uc774\uc81c\ub294 \ub514\uc9c0\ud138\ub85c \uc5f0\uacb0\ub41c \uc138\uacc4\uc5d0\uc11c \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ube44\ub300\uba74 \uad50\uc721\uacfc \uc815\ubcf4 \uc811\uadfc\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uc62c\ubc14\ub978 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \uad50\uc721\ud558\uba74, \uadf8\ub4e4\uc740 \uc815\ubcf4\uc758 \uc9c4\uc704\ub97c \ud310\ub2e8\ud558\uace0 \uc704\ud5d8\ud55c \uc0c1\ud669\uc744 \ubbf8\ub9ac \uac10\uc9c0\ud558\ub294 \ub2a5\ub825\uc744 \ud0a4\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccad\uc18c\ub144 \uc2a4\uc2a4\ub85c \uc8fc\uccb4\uc801\uc73c\ub85c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \ub192\uc77c \uc218 \uc788\ub294 \ud504\ub85c\uadf8\ub7a8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub514\uc9c0\ud138 \uc2dc\ub300\uc758 \uc0ac\ud68c\uc801 \ucc38\uc5ec\ub294 \uc911\uc694\ud55c \ub2a5\ub825\uc73c\ub85c \uc790\ub9ac \uc7a1\uace0 \uc788\uc73c\uba70, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc774\ub97c \ud1b5\ud574 \ub2a5\ub3d9\uc801\uc778 \uc2dc\ubbfc\uc73c\ub85c \uc131\uc7a5\ud560 \uc218 \uc788\uac8c \ud574\uc90d\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc8fc\uccb4\uc801\uc778 \ub514\uc9c0\ud138 \uc2dc\ubbfc \uc758\uc2dd\uc744 \uc2ec\uc5b4\uc90c\uc73c\ub85c\uc368 \uc7a5\uae30\uc801\uc778 \ubcc0\ud654\uac00 \uac00\ub2a5\ud569\ub2c8\ub2e4","\uc544\ub3d9\uc744 \uc704\ud55c \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0\uc11c\uc758 \uc790\uae30 \uc870\uc808 \ub2a5\ub825\uc744 \ud0a4\uc6b0\ub294 \uac83\ub3c4 \ud544\uc218\uc801\uc785\ub2c8\ub2e4; \ubbf8\ub514\uc5b4 \uad50\uc721 \ubc0f \uac1c\ubc1c\uc744 \uc704\ud55c \ube44\uc601\ub9ac \ub2e8\uccb4\uc778 \ucee4\uba3c \uc13c\uc2a4 \ubbf8\ub514\uc5b4(Common Sense Media)\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc2a4\uc2a4\ub85c \ucf58\ud150\uce20\ub97c \ud310\ub2e8\ud558\uace0 \ucc45\uc784 \uc788\uac8c \uc774\uc6a9\ud558\ub3c4\ub85d \ud544\uc694\ud55c \uad50\uc721\uacfc \uc790\ub8cc\ub97c \uc81c\uacf5\ud558\ub294 \uac83\uc774 \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4 \ud6a8\uacfc\uc801\uc774\ub77c\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub294 \ub514\uc9c0\ud138 \uc138\uacc4\uc5d0\uc11c\uc758 \uacbd\ud5d8\uc744 \ud1b5\ud574 \ubbf8\ub798 \uc0ac\ud68c\uc5d0 \ub300\ube44\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \ub2a5\ub825\uc744 \uc2b5\ub4dd\ud558\uac8c \ub429\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub294 \uae30\uc220 \uc0ac\uc6a9\uc744 \ud1b5\ud574 \ubbf8\ub798 \uc0ac\ud68c\uc5d0 \ub300\ube44\ud560 \uae30\ud68c\ub97c \uc5bb\uc5b4\uc57c \ud569\ub2c8\ub2e4. \"Code.org\"\ub294 \uae30\uc220 \ubc0f \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud65c\uc6a9\uc774 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \uc0dd\uc874\uc5d0 \ud544\uc218\uc801\uc778 \uae30\uc220\uc801 \ub2a5\ub825\uc744 \ud0a4\uc6b0\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud55c\ub2e4\uace0 \ubbff\uc73c\uba70, \uc774\ub7ec\ud55c \uae30\ud68c\uc5d0 \ub300\ud55c \ubc95\ub960\uc801 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\uc758 \ubbf8\ub798 \uacbd\uc7c1\ub825\uc744 \uc800\ud574\ud560 \uc218 \uc788\ub2e4\uace0 \ud569\ub2c8\ub2e4","\uccad\uc18c\ub144\ub4e4\uc774 \uc9c1\uc811 \ucc45\uc784\uac10\uc744 \uac00\uc9c0\uace0 \ub514\uc9c0\ud138 \ud658\uacbd\uc744 \ud0d0\uc0c9\ud560 \uae30\ud68c\ub97c \uc918\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\ub3c4 \ub514\uc9c0\ud138 \uacbd\uc81c\uc758 \uc77c\uc6d0\uc774 \ub420 \uae30\ud68c\ub97c \uac00\uc9c8 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc640 \uc548\uc804 \uad50\uc721\uc740 \uc720\ud574\ud55c \ucf58\ud150\uce20\ub85c\ubd80\ud130 \uccad\uc18c\ub144\uc744 \ubcf4\ud638\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc678\ubd80\uc758 \ubd80\uc815\uc801 \uc601\ud5a5\uc73c\ub85c\ubd80\ud130 \uc790\uc2e0\uc744 \uc9c0\ud0ac \uc218 \uc788\ub3c4\ub85d \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \uac00\ub974\uce58\ub294 \uac83\uc740 \uc911\uc694\ud55c \ud574\uacb0\ucc45\uc785\ub2c8\ub2e4","\ub610\ud55c, \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \uad50\uc721\ud558\ub294 \uac83\uc774 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \uc904\uc774\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubbf8\uc131\ub144\uc790\ub4e4\uc740 \ub514\uc9c0\ud138 \uc138\uacc4\uc5d0\uc11c \uc0ac\uc2e4\uc744 \ubd84\ubcc4\ud558\uace0 \uad00\uacc4\ub97c \ub9fa\ub294 \ub2a5\ub825\uc744 \ud559\uc2b5\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uc131\uc219\ud55c \ub514\uc9c0\ud138 \ud658\uacbd \uc0ac\uc6a9\uc790\ub294 \uc608\ubc29\uc744 \ud1b5\ud574 \uae38\ub7ec\uc9d1\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ub514\uc9c0\ud138 \uc2dc\ubbfc \uad50\uc721\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4. '\ub514\uc9c0\ud138\uc2dc\ubbfc\uc5f0\ub9f9(Digital Citizenship Institute)'\uc740 \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0\uc11c\uc758 \ucc45\uc784 \uc788\ub294 \ud589\ub3d9\uc744 \uac00\ub974\uce58\ub294 \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \ud559\uc0dd\ub4e4\uc774 \uc790\uc728\uc801\uc73c\ub85c \uc548\uc804\ud55c \uc778\ud130\ub137 \uc0ac\uc6a9 \uc2b5\uad00\uc744 \ud615\uc131\ud558\ub3c4\ub85d \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \ubbf8\uc131\ub144\uc790\ub97c \uc704\ud55c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721 \uac15\ud654\ub294 \ub354\uc6b1 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uad50\uc721 \uae30\uc220 \ubd84\uc57c\uc758 \uc120\ub450\uc8fc\uc790 EdTechX Holdings\ub294 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uc790\uc728\uc801\uc778 \uc2dc\uac04 \uad00\ub9ac\uc640 \ucc45\uc784 \uc788\ub294 \uc628\ub77c\uc778 \uc0ac\uc6a9\uc744 \uad50\uc721\ud568\uc73c\ub85c\uc368 \uc815\uc11c\uc801 \ubc1c\ub2ec\uacfc \ud559\uc5c5 \uc131\ucde8\ub97c \ub3d5\ub294 \ub2e4\uc591\ud55c \ud504\ub85c\uadf8\ub7a8\uc744 \uac1c\ubc1c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc80a\uc740\uc774\ub4e4\uc774 \ub514\uc9c0\ud138 \uc2dc\ubbfc\uad8c\uc744 \ubc30\uc6b8 \uc218 \uc788\ub3c4\ub85d \ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc801\uc808\ud55c \ub514\uc9c0\ud138 \uad50\uc721\uc740 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc2a4\uc2a4\ub85c \uc815\uc11c\uc801 \ubb38\uc81c\ub97c \uad00\ub9ac\ud558\ub294 \ubc29\ubc95\uc744 \uac00\ub974\uccd0\uc90d\ub2c8\ub2e4","\uc704\ud5d8\uc744 \uc904\uc774\ub294 \uac00\uc7a5 \uc88b\uc740 \ubc29\ubc95\uc740 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uc62c\ubc14\ub978 \ub514\uc9c0\ud138 \uc0ac\uc6a9 \uc2b5\uad00\uc744 \uad50\uc721\ud558\ub294 \uac83\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \ucc45\uc784\uac10 \uc788\ub294 \ub514\uc9c0\ud138 \uc0ac\uc6a9 \uad50\uc721 \ubc29\uc548\uc774 \ub354\uc6b1 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc628\ub77c\uc778 \uc0c1\uc758 \uc704\ud5d8\uc744 \uc608\ubc29\ud558\uace0 \uc548\uc804\ud55c \ub514\uc9c0\ud138 \ud658\uacbd\uc744 \ub9c8\ub828\ud558\uae30 \uc704\ud574\uc11c\ub294 \ubbf8\uc131\ub144\uc790\uc5d0 \ub300\ud55c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\uc740 \uc815\ubcf4\ub97c \uc2a4\uc2a4\ub85c \uc2dd\ubcc4\ud558\uace0 \ud544\ud130\ub9c1\ud558\ub294 \ub2a5\ub825\uc744 \uae30\ub974\uba70 \uc131\uc219\ud574\uc9d1\ub2c8\ub2e4","\ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc740 \ubaa8\ub4e0 \ubbf8\uc131\ub144\uc790\uac00 \uc628\ub77c\uc778 \ud658\uacbd\uc758 \uc704\ud5d8\uc744 \uc778\uc9c0\ud558\uace0 \ub300\ucc98\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \uac16\ucd94\uac8c \ud569\ub2c8\ub2e4","(1) \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc740 \uccad\uc18c\ub144\uc774 \uc704\ud5d8 \uc694\uc18c\ub97c \uc2dd\ubcc4\ud558\uace0 \ub300\ucc98\ud558\ub294 \ub2a5\ub825\uc744 \uae30\ub985\ub2c8\ub2e4","\uc138 \ubc88\uc9f8\ub85c, \uccad\uc18c\ub144\uc758 \uc911\ub3c5 \ubc29\uc9c0\ub97c \uc704\ud55c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccad\uc18c\ub144\uc758 \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc\ub97c \uac15\ud654\ud558\ub294 \uac83\uc774 \uc704\ud5d8\uc744 \uc0ac\uc804\uc5d0 \ucc28\ub2e8\ud558\ub294 \ub354 \ub098\uc740 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub514\uc9c0\ud138 \uc2dc\ub300\uc758 \ud544\uc218\uc801\uc778 \uae30\uc220 \uc2b5\ub4dd\uc744 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uacbd\ud5d8\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub294 \ub514\uc9c0\ud138 \uc2dc\ub300\uc758 \uc77c\uc6d0\uc73c\ub85c \uc131\uc7a5\ud558\uba74\uc11c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \ubc30\uc6cc\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubbf8\uc131\ub144\uc790\ub4e4\uc740 \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0 \ud544\uc218\uc801\uc778 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \uc2b5\ub4dd\ud574\uc57c \ud569\ub2c8\ub2e4","\uad50\uc721\uc801 \uc811\uadfc\uc740 \uc704\ud5d8\uc744 \uc904\uc774\uace0, \ubbf8\uc131\ub144\uc790\uc758 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \ud5a5\uc0c1\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub294 \ud6a8\uacfc\uc801\uc778 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc744 \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uae09\ubcc0\ud558\ub294 \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0\uc11c \uccad\uc18c\ub144\uc758 \ub2a5\ub3d9\uc801\uc778 \uc811\uadfc\uacfc \uc801\uc751\uc774 \ud544\uc694\ud569\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"19_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","19_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"Lka3QINktEBt9MFAPwTQQGp6x0AA+blArWTfQKwi4kBjD8dABGjWQGsts0BvArRAXju0QMZB10AvyrVAF4K7QHhbvECk2L9A\u002fdTPQBmAq0AHfLNARqO5QJfLtUCO1LlApHa1QPQxuUBQcrtAdgyzQFyZ7kB9zN9A01jVQHhbs0BYi7VA5B7KQCgvwkA="},"y":{"dtype":"f4","bdata":"C1xeQG+xW0A7klhAQoFeQEEAYUCQ0F1AQ31wQMWAc0AhrVxAFWRqQCu8WkAN1FxAb6ReQOWF 0\uc6d0\uc774 \uc9c0\uc18d\uc801\uc774\uace0 \uc7a5\uae30\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce69\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc5c5\uc5d0\uac8c \uc555\ubc15\uc744 \uc8fc\uae30\ubcf4\ub2e4\ub294 \uc724\ub9ac\uc801 \ucc45\uc784\uacfc \uac1c\ubc1c \ucc38\uc5ec\ub97c \ub3c5\ub824\ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\uac00 \uc544\ub2cc \ub2e4\uc591\ud55c \ucee4\ubba4\ub2c8\ud2f0 \ub0b4\uc758 \uc790\uc815 \uc791\uc6a9\uc744 \ucd09\uc9c4\uc2dc\ud0ac \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc0ac\ud68c\uc801 \ucc45\uc784\uacfc \uacf5\ub3d9\uccb4 \ub178\ub825\uc758 \uc911\uc694\uc131\uc774 \ud07d\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uaddc\uc81c\uac00 \uc544\ub2cc \uacf5\ub3d9\uccb4 \ud611\ub825\uc774 \uc704\ud5d8 \uc694\uc18c\ub97c \uad00\ub9ac\ud558\ub294 \ub370 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\ubcf4\ub2e4 \ub354 \uc911\uc694\ud55c \uac83\uc740 \uacbd\uac01\uc2ec\uc744 \uc77c\uae68\uc6b0\ub294 \uc0ac\ud68c\uc801 \uc57d\uc18d\uc785\ub2c8\ub2e4","\ud558\ub354\ub77c\ub3c4, \ubc95\uc548\uc744 \ud1b5\ud574 \ud574\uacb0\ud558\uae30\ubcf4\ub2e4\ub294 \uc0ac\ud68c \uc804\uccb4\uc758 \uacf5\ub3d9 \ub178\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc0ac\ud68c\uc801 \uaddc\ubc94 \ud615\uc131\uc774 \ub354 \ub098\uc740 \uc608\ubc29\ucc45\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \ub300\ud654\uc640 \ud611\ub825\uc774 \ub354\uc6b1 \uc9c0\uc18d\uac00\ub2a5\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ubc95\uc801 \uc7a5\uce58\ubcf4\ub2e4 \uc9c0\uc5ed \uae30\ubc18 \uc9c0\uc6d0 \ub124\ud2b8\uc6cc\ud06c\uac00 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc815\ucc45 \ub3c4\uc785\ubcf4\ub2e4\ub294 \ub354 \ub9ce\uc740 \uc5f0\ub300\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ubc95\uc801 \ubcf4\ud638\ubcf4 uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \uc0ac\uac74\uc5d0 \ub300\ud55c \ud6a8\uacfc\uc801\uc778 \ub300\uc751\uc740 \uc2e4\uc9c8\uc801 \uc81c\ub3c4 \uac1c\uc120\uc73c\ub85c\ubd80\ud130 \ub098\uc635\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \uc655\ub530\ub97c \uc608\ubc29\ud558\uace0 \ub300\ucc98\ud558\ub294 \ubc29\ubc95\uc744 \ubc30\uc6b0\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub294 \ub370 \uc788\uc5b4 \uad50\uc721\uacfc \uae30\uc220\uc801 \ud574\uacb0\ucc45\uc774 \uc2e4\ud328\ubcf4\ub2e4 \ub354 \ub098\uc740 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uccb4\uacc4\uc801\uc778 \uad00\ub9ac\ub97c \ud1b5\ud574 \uc7a0\uc7ac\uc801\uc778 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubb38\uc81c\ub97c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc758 \ubb38\uc81c\ub294 \uad50\uc721\uc73c\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubb38\uc81c\ub294 \uc0ac\uc6a9\uc790 \uac04\uc758 \uc724\ub9ac\uc640 \ucc45\uc784\uc758\uc2dd\uc744 \uac15\uc870\ud558\ub294 \uac83\uc73c\ub85c \ucda9\ubd84\ud788 \ub300\uc751\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc774\ub098 \uac1c\uc778\uc815\ubcf4 \uc720\ucd9c\uacfc \uac19\uc740 \ubb38\uc81c\ub294 \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4 \uad50\uc721\uc744 \ud1b5\ud574\uc11c \ub354 \ud6a8\uacfc\uc801\uc73c\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\uc640 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc740 \uad50\uc721\uc744 \ud1b5\ud574 \ud6a8\uacfc\uc801\uc73c\ub85c \ub300\uc751\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc774\ub098 \uc815\ubcf4 \ub178\ucd9c \ub4f1\uc758 \ubb38\uc81c\ub294 \uad50\uc721\uacfc \uc9c0\uce68\uc744 \ud1b5\ud574 \ud6a8\uacfc\uc801\uc73c\ub85c \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5
