        <script charset="utf-8" src="https://cdn.plot.ly/plotly-3.5.0.min.js" integrity="sha256-fHbNLP+GlIXN+efbQec78UkemUz3NJp7UmfGxC1tNxs=" crossorigin="anonymous"></script>                <div id="6071894c-d2d6-4c82-9e65-cb36e1c9b67e" class="plotly-graph-div" style="height:750px; width:1200px;"></div>            <script>                window.PLOTLYENV=window.PLOTLYENV || {};                                if (document.getElementById("6071894c-d2d6-4c82-9e65-cb36e1c9b67e")) {                    Plotly.newPlot(                        "6071894c-d2d6-4c82-9e65-cb36e1c9b67e",                        [{"hoverinfo":"text","hovertext":["\ub192\uc740 \uc218\uc900\uc758 \ud559\ubd80\ubaa8 \ubc0f \uad50\uc0ac \uad50\uc721\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc548\uc804\ud558\uac8c \uc628\ub77c\uc778 \ud658\uacbd\uc744 \ud0d0\uc0c9\ud560 \uc218 \uc788\ub3c4\ub85d \ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc5d0\uac8c\ub294 \ucc45\uc784\uac10 \uc788\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uad8c\ub9ac\uc640 \ub2a5\ub825\uc744 \ubd80\uc5ec\ubc1b\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc778\ud130\ub137 \ud50c\ub7ab\ud3fc\uc740 \uccad\uc18c\ub144\uc758 \ucc3d\uc758\ub825\uacfc \uc790\uae30 \ud45c\ud604\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uad8c\ub9ac\ub97c \uc874\uc911\ud558\ub294 \ub300\uc548\uc801 \ud574\uacb0\ucc45\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c \uc628\ub77c\uc778 \ud50c\ub7ab\ud3fc\uc740 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubc29\uc9c0 \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \uc0ac\uc6a9\uc790\ub4e4\uc774 \uc11c\ub85c\ub97c \ubc30\ub824\ud558\uba74\uc11c \uc774\uc6a9\ud560 \uc218 \uc788\ub294 \ud658\uacbd\uc744 \uc870\uc131\ud569\ub2c8\ub2e4","\ub2a5\ub825\uc744 \ud5a5\uc0c1\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \uc885\ud569\uc801 \uc811\uadfc\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ubc95\uc801\uc778 \ud14c\ub450\ub9ac\ubcf4\ub2e4 \uc720\uc5f0\ud55c \ub300\uc751\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc815\uc2e0 \uac74\uac15\uc740 \uade0\ud615 \uc7a1\ud78c \ub514\uc9c0\ud138 \uc0ac\uc6a9\uacfc \uc2ec\ub9ac\uc801 \uc9c0\uc6d0\uc744 \ud1b5\ud574 \ubcf4\uc7a5\ub429\ub2c8\ub2e4. \u2018Mental Health America\u2019\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uae0d\uc815\uc801 \ud65c\uc6a9\uacfc \ub300\uba74 \uc0c1\ud638\uc791\uc6a9\uc758 \uade0\ud615\uc744 \uc7a1\ub294 \uac83\uc774 \uc2ec\ub9ac\uc801 \uc548\uc815\uc744 \uc720\uc9c0\ud558\ub294 \ub370 \ud544\uc218\uc801\uc774\ub77c\uace0 \uac15\uc870\ud558\uba70, \uc774\ub7ec\ud55c \uc811\uadfc\uc774 \uccad\uc18c\ub144\uc758 \uc804\ubc18\uc801\uc778 \uc815\uc2e0 \uac74\uac15\uc5d0 \uacf5\ud5cc\ud55c\ub2e4\uace0 \ubc1d\ud614\uc2b5\ub2c8\ub2e4","\uac74\uac15\ud55c \uc0ac\uc6a9 \uc2b5\uad00 \ud615\uc131\uc740 \uc5b4\ub9b0 \uc2dc\uc808\ubd80\ud130 \ud615\uc131\ud574\uc57c \ud560 \uac00\uce58\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc544\uc608 \uc81c\ud55c\ud558\ub294 \ub300\uc2e0, \uc62c\ubc14\ub978 \uc0ac\uc6a9\uc744 \uac00\ub974\uce58\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uad50\uc721\uc740 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uacbd\ud5d8\uc744 \ud1b5\ud55c \ubb38\uc81c \ud574\uacb0 \ub2a5\ub825\uc740 \uc2e4\uc9c8\uc801\uc778 \uc131\uc7a5\uc73c\ub85c \uc774\uc5b4\uc9d1\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc7a5\ub824\ud558\uba74\uc11c\ub3c4 \uac74\uac15\ud55c \uc2e0\uccb4 \uc774\ubbf8\uc9c0\uc640 \uc815\uc2e0 \uac74\uac15\uc744 \ucd09\uc9c4\ud558\ub294 \ubc29\ubc95\uc744 \ucc3e\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uad50\uc721\uacfc \ubd80\ubaa8\uc758 \uad00\ub9ac\uac00 \ubb38\uc81c \uc608\ubc29\uc5d0 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \uc0ac\uc6a9\uc790\uc758 \uc120\ud0dd\uacfc \ud0dc\ub3c4\uc5d0 \uc758\ud574 \ub354 \ud070 \uc601\ud5a5\uc744 \ubc1b\uc2b5\ub2c8\ub2e4","\ubaa8\ub4e0 \ubbf8\uc131\ub144\uc790\uac00 \ub3d9\ub4f1\ud55c \uad50\uc721 \uae30\ud68c\ub97c \ubc1b\uc744 \uc218 \uc788\ub3c4\ub85d \ubcf4\uc7a5\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc0ac\ud68c\uc801 \ucea0\ud398\uc778 \ubc0f \ubbf8\ub514\uc5b4 \uad50\uc721\uc744 \ud1b5\ud55c \uc811\uadfc\uc774 \ud655\uc2e4\ud55c \uacb0\uacfc\ub97c \ub0b8\ub2e4\ub294 \uc810\uc5d0\uc11c \uadf8 \uc911\uc694\uc131\uc774 \ub300\ub450\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc120\uc81c\uc801 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc774 \uc7a5\uae30\uc801\uc778 \ud574\uacb0\ucc45\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uacfc\ub3c4\ud55c \uc0ac\uc6a9\uc758 \ubb38\uc81c\ub294 \uc2dc\uac04 \uad00\ub9ac\ub97c \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub530\ub978 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \uc0ac\uc6a9 \uc2dc\uac04\uc758 \uc870\uc808\uc744 \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\ub97c \ub300\uc2e0\ud558\uc5ec \ubcf4\ub2e4 \uc804\ubb38\uc801\uc778 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uacfc \ucee4\ubba4\ub2c8\ucf00\uc774\uc158 \ub2a5\ub825\uc744 \ubc1c\uc804\uc2dc\ud0a4\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \uad34\ub86d\ud798, \uac1c\uc778\uc815\ubcf4 \ubcf4\ud638, \uadf8\ub9ac\uace0 \uc720\ud574 \ucf58\ud150\uce20\uc640 \uad00\ub828\ub41c \uc704\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud574 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uc628\ub77c\uc778 \uc548\uc804 \uad50\uc721\uc744 \uc81c\uacf5\ud558\uace0, \ub2e4\uc591\ud55c \uc0c1\ud669\uc5d0\uc11c \ucde8\ud560 \uc218 \uc788\ub294 \uc62c\ubc14\ub978 \ud589\ub3d9\uacfc \ub300\ucc98 \ubc29\ubc95\uc744 \uac00\ub974\uccd0\uc57c \ud569\ub2c8\ub2e4","\uc790\uc728\uc131\uacfc \ucc45\uc784\uac10\uc744 \uae30\ub974\ub294 \ub370 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\uc790\uc728\uc801 \uc0ac\uc6a9 \uad8c\uc7a5\uc744 \ud1b5\ud55c \ucc45\uc784 \uc758\uc2dd \ud568\uc591\ub3c4 \uc911\uc694\ud569\ub2c8\ub2e4","\uae0d\uc815\uc801\uc774\uace0 \uc548\uc804\ud55c \uc628\ub77c\uc778 \ud658\uacbd\uc744 \uc870\uc131\ud568\uc73c\ub85c\uc368 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc778\ud130\ub137 \uad34\ub86d\ud798\uc740 \uae30\uc220\uc801 \ud574\uacb0\ucc45\uc73c\ub85c \uad00\ub9ac\ud560 \uc218 \uc788\uc73c\uba70, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \ucc45\uc784 \uc788\ub294 \uc0ac\uc6a9\uc744 \ucd09\uc9c4\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4. \u2018Facebook\u2019\uc740 \uccad\uc18c\ub144\uc758 \uc628\ub77c\uc778 \ubcf4\ud638\ub97c \uac15\ud654\ud558\uae30 \uc704\ud55c \uc5ec\ub7ec \ub3c4\uad6c\ub97c \uac1c\ubc1c\ud558\uace0 \uc9c0\uc18d\uc801\uc73c\ub85c \uc5c5\uadf8\ub808\uc774\ub4dc\ud568\uc73c\ub85c\uc368, \uad34\ub86d\ud798 \ubc29\uc9c0 \uae30\ub2a5\uc744 \uac1c\uc120\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ub3c4\ud55c \uc0ac\uc6a9\uc758 \ubd80\uc815\uc801 \uc601\ud5a5\uc744 \uc904\uc774\uae30 \uc704\ud574\uc11c\ub294 \uad50\uc721\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uaddc\uc81c\ud558\ub294 \uc77c\ub960\uc801 \ubc95\uc548\uc774 \uc544\ub2cc, \ubd80\ubaa8\uc640 \uccad\uc18c\ub144 \uc2a4\uc2a4\ub85c \uc120\ud0dd\ud560 \uc218 \uc788\ub294 \ud574\uacb0\ucc45\uc774 \ub354 \uc735\ud1b5\uc131 \uc788\uace0 \uac1c\uac1c\uc778\uc758 \uc0c1\ud669\uc5d0 \ub9de\ub294 \ub300\ucc98\uac00 \uac00\ub2a5\ud569\ub2c8\ub2e4","\uba3c\uc800, \uad50\uc721\uc801 \uce21\uba74\uc5d0\uc11c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \ubc30\uc6b0\uace0 \ub2e4\ub978 \ubb38\ud654\uc640 \uc18c\ud1b5\ud558\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\ub85c \uc791\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub354\ubd88\uc5b4, \uc131\uc219\ud558\uc9c0 \uc54a\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc744 \ubcf4\ud638\ud558\ub824\uba74 \uad50\uc0ac\uc640 \ubd80\ubaa8\uac00 \uafb8\uc900\ud55c \ubaa8\ub2c8\ud130\ub9c1\uacfc \uc0c1\ub2f4\uc744 \ud1b5\ud574 \uc9c0\uc6d0\ud558\ub294 \uac83\uc774 \ud544\uc694\ud558\uba70, \uc774\ub294 \ub2e8\uc21c\ud55c \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4","\ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4 \uae30\uc5c5\uc758 \ucca0\uc800\ud55c \ucf58\ud150\uce20 \ubaa8\ub2c8\ud130\ub9c1\uc774 \ubb38\uc81c \uc608\ubc29\uc5d0 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc5d0\uac8c \uc81c\uacf5\ub418\ub294 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \uac15\ud654\ud558\uba74 \ud6a8\uacfc\uc801\uc778 \uc628\ub77c\uc778 \uc548\uc804 \uad50\uc721\uc744 \ud655\ub300\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccad\uc18c\ub144\ub4e4\uc774 \ub2e4\uc591\ud55c \uc815\ubcf4\uc5d0 \uc811\uadfc\ud558\uba74\uc11c \ube44\ud310\uc801 \uc0ac\uace0 \ub2a5\ub825\uc744 \uae30\ub974\ub3c4\ub85d \ud558\ub294 \uac83\uc774 \uc911\uc694\ud558\uba70, \uc774\ub294 \uad50\uc721\uc744 \ud1b5\ud574 \ucda9\ubd84\ud788 \uac00\ub2a5\ud558\ub2e4\uace0 \ubd05\ub2c8\ub2e4","\uc62c\ubc14\ub978 \uc0ac\uc6a9\uc2b5\uad00\uacfc \uc2dc\uac04 \uad00\ub9ac\ub97c \ud1b5\ud574 \ud559\uc5c5 \uc131\ucde8\ub3c4\uc640 \uc790\uc874\uac10 \ubb38\uc81c\ub97c \uac1c\uc120\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc815\ubd80\uc758 \uc9c1\uc811\uc801\uc778 \uc81c\ud55c\uc774 \uc544\ub2cc, \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uac1c\uc778\uc758 \uc120\ud0dd\uacfc \ucc45\uc784\uc774 \uac15\uc870\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uac1c\uc778 \uc815\ubcf4 \ubcf4\ud638\uc640 \ubcf4\uc548 \uac15\ud654\ub294 \uc81c\uc7ac \ub300\uc2e0 \uc2e4\uc9c8\uc801\uc778 \ub300\uc548\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ubcf4\ub2e4 \ud3ec\uad04\uc801\uc778 \ubcf4\ud638 \uccb4\uacc4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc2a4\uc2a4\ub85c \uc548\uc804\ud55c \uc778\ud130\ub137 \uc0ac\uc6a9 \uc2b5\uad00\uc744 \ubc30\uc591\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ud50c\ub7ab\ud3fc\uc758 \ucc45\uc784 \uac15\ud654\ub294 \uc989\uac01\uc801 \ubcf4\ud638\ub97c \uc81c\uacf5\ud558\uba70 \ubbf8\uc131\ub144\uc790\ub97c \uc704\ud55c \uc548\uc804\ud55c \ud658\uacbd\uc744 \ub9cc\ub4ed\ub2c8\ub2e4","\uc778\ud130\ub137\uc758 \uc548\uc804\ud55c \uc0ac\uc6a9\uc744 \uad50\uc721\ud558\ub294 \uac83\uc740 \uc911\uc694\ud55c \uc608\ubc29\ucc45\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uacf5\uacf5 \uc815\ucc45\uacfc \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \ud655\ub300\ud558\ub294 \uac83\uc774 \ub354 \uc9c0\uc18d \uac00\ub2a5\ud55c \ud574\uacb0\ucc45\uc785\ub2c8\ub2e4","\uac1c\uc778\ud654\ub41c \ud574\uacb0\ucc45\uc744 \uc81c\uc2dc\ud574\uc57c \ud569\ub2c8\ub2e4","\ube44\uc601\ub9ac \uc870\uc9c1 Cyberbullying Research Center\ub294 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \ubbf8\ub9ac \uc608\ubc29 \uad50\uc721\uc744 \uc81c\uacf5\ud568\uc73c\ub85c\uc368 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc758 \uc704\ud5d8\uc744 \uc904\uc774\uace0 \uae0d\uc815\uc801\uc778 \uc628\ub77c\uc778 \ud589\ub3d9\uc744 \uc7a5\ub824\ud560 \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc0ac\ud68c\uc801 \uae30\uc900\uc744 \uc815\ud558\ub294 \uac83\uc740 \uaddc\uc81c \uc5c6\uc774\ub3c4 \uac00\ub2a5\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ube44\uc988\ub2c8\uc2a4 \uacbd\ub825\uc744 \uc870\uae30\uc5d0 \uc2dc\uc791\ud560 \uc218 \uc788\ub294 \uc7a5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uac1c\uc778\uc815\ubcf4 \ubcf4\ud638\uc640 \uad00\ub828\ud558\uc5ec \uc0ac\uc6a9\uc790\uc758 \uc2a4\uc2a4\ub85c \uc548\uc804\uc744 \uc9c0\ud0ac \uc218 \uc788\ub294 \ub3c4\uad6c\uc640 \uc9c0\uc2dd\uc744 \uc81c\uacf5\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uacfc \uc815\ubd80 \uac04\uc758 \ud611\ub825\uc774 \uac15\ud654\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ubc95\uc801 \uc7a5\uce58\ubcf4\ub2e4 \uac1c\uc778\uc758 \ucc45\uc784\uac10\uc744 \uac15\uc870\ud558\ub294 \uad50\uc721\uacfc \uacf5\ub3d9\uccb4\uc758 \ud65c\ub3d9\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ubcf4\ub2e4 \uc790\uc728\uc801\uc774\uace0 \uc131\uc219\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ub3c4\uc640\uc90d\ub2c8\ub2e4","\ud559\uc5c5 \ubc29\ud574 \uc694\uc18c\ub85c \uc9c0\uc801\ub418\ub294 \uc0ac\uc6a9 \ubb38\uc81c\ub294 \ubd80\ubaa8\uc640 \uad50\uc0ac\uc758 \uc9c0\ub3c4\ud558\uc5d0 \uc870\uc808\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uc62c\ubc14\ub978 \uc811\uadfc\uacfc \uad50\uc721\uc740 \uc0ac\uc6a9 \uc81c\ud55c\ubcf4\ub2e4 \ub354 \ub098\uc740 \ud574\uacb0\ucc45\uc785\ub2c8\ub2e4","\uc0ac\ud68c\uc801 \ucc45\uc784\uc744 \ud1b5\ud574 \uae0d\uc815\uc801\uc778 \uc628\ub77c\uc778 \ud658\uacbd\uc744 \uc870\uc131\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0 \ub300\ud55c \uae08\uc9c0\ubcf4\ub2e4\ub294 \ucc45\uc784\uac10 \uc788\ub294 \uc0ac\uc6a9\uc744 \uc7a5\ub824\ud558\ub294 \uac83\uc774 \ub354 \ub9ce\uc740 \ud61c\ud0dd\uc744 \uac00\uc838\uc62c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub514\uc9c0\ud138 \uae30\uc220\uc5d0 \ub300\ud55c \uc870\uae30 \ub178\ucd9c\uc740 21\uc138\uae30 \ud544\uc218 \uae30\uc220\uc744 \ud568\uc591\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4; \uad6d\uc81c\uccad\uc18c\ub144\uae30\uc220\uc9c4\ud765\ud611\ud68c(International Association for Youth Technology Advancement)\ub294 \uccad\uc18c\ub144\uc774 \uc870\uae30\uc5d0 \ub514\uc9c0\ud138 \uae30\uc220\uc744 \uc2b5\ub4dd\ud568\uc73c\ub85c\uc368 \ubbf8\ub798 \uc9c1\uc5c5 \uc2dc\uc7a5\uc758 \uacbd\uc7c1\ub825\uc744 \uac15\ud654\ud560 \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uac1c\ubcc4\uc801\uc778 \ucc45\uc784\uac10\uc744 \uac15\uc870\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc790\uc728\uc131\uc744 \ud1b5\ud574 \ucc45\uc784\uac10\uc744 \ubc30\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud544\uc218\uc801\uc778 \ud604\ub300\uc758 \uad50\uc721 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ud6a8\uacfc\uc801\uc778 \ubaa8\ub2c8\ud130\ub9c1\uc744 \ud1b5\ud574 \uc628\ub77c\uc778 \uc704\ud5d8\uc744 \uac10\uc18c\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub108\ubb34 \ub2e8\uc21c\ud788 \uc811\uadfc\uc744 \ub9c9\ub294 \uac83\ubcf4\ub2e4\ub294 \uac74\uac15\ud55c \uc0ac\uc6a9 \ubc95\uc744 \uac00\ub974\uce58\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccad\uc18c\ub144\uc774 \uc628\ub77c\uc778\uc5d0\uc11c \ucc45\uc784 \uc788\ub294 \ud589\ub3d9\uc744 \ubc30\uc6b0\ub3c4\ub85d \ub3c5\ub824\ud558\ub294 \uac83\uc774 \uaddc\uc81c\ubcf4\ub2e4 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c \uc5c6\uc774\ub3c4 \uc9c0\uc5ed\uc0ac\ud68c\uc640 \ud559\uad50\uc758 \ud611\ub825\uc73c\ub85c \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc2e4\uc9c8\uc801\uc778 \uad50\uc721\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc911\uc694\ud55c \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uacfc \ud559\uc2b5\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud558\uba70, \uc774\ub294 \uadf8\ub4e4\uc774 \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0 \ud544\uc218\uc801\uc778 \uae30\uc220\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uccad\uc18c\ub144\uc744 \uc704\ud55c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \ud504\ub85c\uadf8\ub7a8\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\uc740 \uc885\uc885 \uc5ed\ud6a8\uacfc\ub97c \uac00\uc838\uc62c \uc218 \uc788\uc5b4, \uaddc\uc81c\uac00 \uc544\ub2cc \uad50\uc721\uacfc \ub300\ud654\ub97c \ud1b5\ud574 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub294 \uac83\uc774 \uc62c\ubc14\ub978 \uc811\uadfc\uc785\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc815\ubcf4 \uc811\uadfc\uc758 \ucc3d\uad6c\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uac00 \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub294 \uccb4\uacc4\ub97c \uad6c\ucd95\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \uc790\uc728\uc131\uacfc \uc790\uae30 \ud1b5\uc81c\ub825\uc744 \ubc30\uc6b8 \uae30\ud68c\ub97c \uc90d\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\ubcf4\ub2e4\ub294 \uc0ac\ud68c \uc804\ubc18\uc758 \ud611\ub825\uc774 \uc911\uc694\ud558\ub2e4\ub294 \uc810\uc740 \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0\uc11c\uc758 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\uc758 \ud575\uc2ec\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220 \uc911\ub3c5\uc740 \ub2e4\uc591\ud55c \uc2ec\ub9ac\uc801 \uc694\uc778\uc5d0 \uc758\ud574 \ubcf5\ud569\uc801\uc73c\ub85c \uc720\ubc1c\ub429\ub2c8\ub2e4","\uccad\uc18c\ub144\uc758 \ub514\uc9c0\ud138 \uad8c\ub9ac\ub294 \ub354\uc6b1 \uc911\uc694\ud574\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4; The American Civil Liberties Union\uc740 \ubbf8\uc131\ub144\uc790\ub3c4 \uc790\uc2e0\uc758 \ubaa9\uc18c\ub9ac\ub97c \ub0b4\uace0 \uc758\uacac\uc744 \ud45c\ud604\ud560 \uad8c\ub9ac\uac00 \uc788\uc74c\uc744 \uac15\uc870\ud558\uba70, \uc18c\uc15c \ubbf8\ub514\uc5b4\uac00 \ud2b9\ud788 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uc911\uc694\ud55c \ud45c\ud604\uc758 \uc7a5\uc774 \ub420 \uc218 \uc788\uc74c\uc744 \uc9c0\uc801\ud569\ub2c8\ub2e4","\uae30\uc220\uacfc \ud658\uacbd\uc758 \ube60\ub978 \ubcc0\ud654\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ubbf8\uc131\ub144\uc790\ub4e4\uc744 \uc704\ud55c \uc2e0\uc18d\ud55c \uc9c0\uce68 \uc5c5\ub370\uc774\ud2b8\uc640 \uc628\ub77c\uc778 \uc790\uc6d0\uc744 \ud65c\uc6a9\ud55c \uad50\uc721\uc740 \uc0c8\ub85c\uc6b4 \uc704\ud5d8\uc5d0 \ub300\ud55c \ub300\ucc98 \ub2a5\ub825\uc744 \ud0a4\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc628\ub77c\uc778 \uc548\uc804 \uad50\uc721\uc5d0 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uac00 \uae30\uc220 \ubc0f \ub514\uc9c0\ud138 \ubbf8\ub514\uc5b4\uc5d0 \ub300\ud55c \uc219\ub828\ub3c4\ub97c \ub192\uc77c \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uacfc\ub3c4\ud55c \uc0ac\uc6a9\uc774 \ubb38\uc81c\uac00 \ub420 \uc218 \uc788\uc9c0\ub9cc, \uc774\ub294 \ubd80\ubaa8\ub098 \uad50\uc721\uc790\uc758 \uc9c0\ub3c4 \ud558\uc5d0 \uc62c\ubc14\ub978 \uc2b5\uad00\uc744 \ud615\uc131\ud560 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc815\uc2e0 \uac74\uac15 \uc9c0\uc6d0 \uc790\uc6d0\uc758 \ud6a8\uc728\uc131\uc740 \uc0ac\uc6a9\uc790\uc758 \uc811\uadfc\uc131\uc5d0 \ub2ec\ub824 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uad50\uc721\uacfc \ubc95\uc801 \uc811\uadfc\uc758 \uc870\ud569\ubcf4\ub2e4 \uc790\uc728\uc131\uacfc \ucc45\uc784\uac10\uc744 \uac00\uc9c4 \uc548\uc804\uad50\uc721\uc774 \ub354 \uc2e4\ud6a8\uc131\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uc81c\ud55c\ud558\ub294 \ub300\uc2e0, \uae0d\uc815\uc801\uc774\uace0 \uc548\uc804\ud55c \uc628\ub77c\uc778 \ud658\uacbd\uc744 \uc870\uc131\ud560 \uc218 \uc788\ub294 \uae30\uc220\ub4e4\uc744 \ud65c\uc6a9\ud574\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uac1c\uc778 \uc815\ubcf4 \ubcf4\ud638\uc5d0 \ub300\ud55c \uc2e4\uc9c8\uc801\uc778 \uad50\uc721 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub514\uc9c0\ud138 \uc2dc\ubbfc \uc758\uc2dd\uc740 \uc131\uc7a5\uae30\uc5d0 \uc911\uc694\ud55c \ud559\uc2b5 \uc601\uc5ed\uc785\u c15\ud654\ud558\ub294 \uac83\uc774 \uadfc\ubcf8\uc801\uc778 \ud574\uacb0\ucc45\uc785\ub2c8\ub2e4","\ud2b9\uc815 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \uad50\uc721\uc744 \ud1b5\ud55c \uc62c\ubc14\ub978 \uc0ac\uc6a9 \ubc29\ubc95\uc744 \uc81c\uacf5\ud574\uc57c \ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \uc704\ud55c \uae30\ubcf8\uc801\uc778 \uc548\uc804 \uc870\uce58\ub294 \ucc45\uc784\uac10 \uc788\ub294 \uc0ac\uc6a9\uc744 \ucd09\uc9c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc815\ubcf4\uc758 \ud64d\uc218 \uc18d\uc5d0\uc11c \uc62c\ubc14\ub978 \ud310\ub2e8\uc744 \ub0b4\ub9ac\ub294 \uac83\uc740 \uc9c0\ub3c4\uc640 \uacbd\ud5d8\uc744 \ud1b5\ud574 \ubc1c\uc804\uc2dc\ud0ac \uc218 \uc788\ub294 \ub2a5\ub825\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uad50\uc721\uc801 \uc811\uadfc\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ubc95\uc801 \uae30\uc900\uc774 \uc124\uc815\ub41c\ub2e4\uace0 \ud574\uc11c \ubd80\ubaa8\uc758 \uad00\ub9ac\uac00 \uc790\ub3d9\uc801\uc73c\ub85c \uac15\ud654\ub418\uc9c0\ub294 \uc54a\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uac00 \uc2a4\uc2a4\ub85c \uc704\ud5d8\uc744 \uc778\uc9c0\ud558\uc9c0 \ubabb\ud558\ub294 \uacbd\uc6b0\ub97c \ub300\ube44\ud558\ub824\uba74 \ucee4\ubba4\ub2c8\ud2f0 \ubaa8\ub2c8\ud130\ub9c1\uacfc \ubd80\ubaa8\uc758 \ucc38\uc5ec\ub97c \uc99d\uc9c4\uc2dc\ud0a4\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ud45c\ud604\uc758 \uc790\uc720\ub294 \ubaa8\ub4e0 \uac1c\uc778\uc758 \uae30\ubcf8 \uad8c\ub9ac\uc785\ub2c8\ub2e4","\uac1c\uc778\uc758 \ud45c\ud604\uc758 \uc790\uc720\uc640 \uc815\ubcf4\uc5d0 \ub300\ud55c \uc811\uadfc \uad8c\ub9ac\ub294 \uae30\ubcf8\uc801\uc778 \uc778\uad8c\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uacfc\ub3c4\ud55c \uc0ac\uc6a9\uc73c\ub85c \uc778\ud55c \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc9c0\ub3c4\ub85c\ub3c4 \ucda9\ubd84\ud788 \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccad\uc18c\ub144\ub4e4\uc740 \uc790\uc728 \uaddc\uc81c\ub97c \ud1b5\ud574 \ucc45\uc784 \uc788\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc790\uac00 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uba3c\uc800, \uc911\ub3c5 \ubb38\uc81c\uc640 \uad00\ub828\ud558\uc5ec \uad50\uc721\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc744 \uac15\ud654\ud558\uc5ec \ubb38\uc81c\ub97c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc81c\ud55c \uc5c6\uc774 \uc0ac\uc6a9\ud558\ub3c4\ub85d \ud558\uc5ec \ucc45\uc784\uac10\uc744 \ud0a4\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc80a\uc740\uc774\ub4e4\uc774 \uc790\uc2e0\uc758 \ub514\uc9c0\ud138 \uc815\uccb4\uc131\uc744 \uad00\ub9ac\ud560 \uae30\ud68c\ub97c \uac00\uc9c8 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4; International Society for Technology in Education\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc790\uc2e0\uc758 \uc815\uccb4\uc131\uc744 \uad00\ub9ac\ud558\uace0 \uae0d\uc815\uc801\uc73c\ub85c \ubc1c\uc804\uc2dc\ud0ac \uae30\ud68c\ub97c \uac00\uc9d0\uc73c\ub85c\uc368 \uc624\ud788\ub824 \ub354 \uc548\uc804\ud55c \ud658\uacbd\uc744 \uad6c\ucd95\ud560 \uc218 \uc788\uc73c\uba70, \ubc95\uc801 \uaddc\uc81c\ub294 \uc774\ub7ec\ud55c \ubc1c\uc804 \uac00\ub2a5\uc131\uc744 \uc81c\ud55c\ud560 \uc218 \uc788\ub2e4\uace0 \uacbd\uace0\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \ub3c4\uad6c\ub85c\uc11c \uae30\ub2a5\ud560 \uc218 \uc788\uae30 \ub54c\ubb38\uc5d0 \ubbf8\uc131\ub144\uc790\uc758 \uc811\uadfc\uc744 \uc81c\ud55c\ud574\uc11c\ub294 \uc548 \ub429\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \ud45c\ud604\uc758 \uc790\uc720\uc640 \uc815\ubcf4 \uc811\uadfc \uad8c\ub9ac\ub294 \uc18c\uc911\ud558\uac8c \ubcf4\ud638\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc804\uccb4\uc801\uc778 \uae08\uc9c0\ubcf4\ub2e4\ub294 \ud6a8\uacfc\uc801\uc778 \uc790\uc728 \uaddc\uc81c\uc640 \uc0ac\uc6a9\uc790 \uad50\uc721\uc744 \ud1b5\ud574 \ub354 \ub098\uc740 \uacb0\uacfc\ub97c \uc774\ub04c\uc5b4\ub0bc \uc218 \uc788\uc2b5\ub2c8\ub2e4; \uc778\ud130\ub137\uacfc \uc628\ub77c\uc778 \ubcf4\uc548 \uc804\ubb38 \uae30\uad00\uc778 \uc804\uc790 \ud504\ub860\ud2f0\uc5b4 \uc7ac\ub2e8(Electronic Frontier Foundation, EFF)\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ud1b5\uc81c\ud558\uae30\ubcf4\ub2e4\ub294 \ucc45\uc784 \uc788\ub294 \uc0ac\uc6a9\uc790 \uad50\uc721\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\uc774 \uc2a4\uc2a4\ub85c \uc548\uc804\ud558\uac8c \uc778\ud130\ub137\uc744 \ud0d0\uc0c9\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \uae30\ub974\ub294 \uac83\uc774 \uc911\uc694\ud558\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccad\uc18c\ub144\uc740 \uc628\ub77c\uc778\uc5d0\uc11c \ucc3d\uc758\uc131\uacfc \uc790\uae30 \ud45c\ud604\uc744 \uac1c\ubc1c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub514\uc9c0\ud138 \uae30\uc220\uacfc\uc758 \uc870\uae30 \ub178\ucd9c\uc740 \ubbf8\ub798 \uc9c1\uc5c5 \ub2a5\ub825\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\ub514\uc9c0\ud138 \uc18c\uc678 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \uc815\ubd80\uc640 \ud611\ub825\ud55c \uacf5\uacf5 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \uc6b4\uc601\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc640 \ubb38\uc81c \ud574\uacb0 \ub2a5\ub825\uc744 \ud568\uc591\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ubc95\uc801 \uc81c\uc7ac\uac00 \uc544\ub2cc, \ub2e4\uc591\ud55c \uc0ac\ud68c \uacc4\uce35\uc744 \ub300\uc0c1\uc73c\ub85c \ud55c \ud3ec\uad04\uc801\uc778 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc758 \ud655\ub300\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\uc815\ubcf4\uc758 \uc9c8\uacfc \uc2e0\ub8b0\uc131\uc744 \ud310\ub2e8\ud558\ub294 \ub2a5\ub825\uc740 \uc2dc\uac04\uc774 \ud544\uc694\ud558\uba70 \uacbd\ud5d8\uc744 \ud1b5\ud574 \uae38\ub7ec\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \ucc3d\uc758\ub825 \ubc1c\ud604\uc5d0 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc0ac\ud68c\uc801 \ucc45\uc784\uc758\uc2dd \uace0\ucde8\ub294 \uc7a5\uae30\uc801\uc73c\ub85c \ub354 \ub098\uc740 \ud574\uacb0\ucc45\uc785\ub2c8\ub2e4","\uc911\ub3c5 \uc608\ubc29\uc740 \uad50\uc721\uacfc \ucc38\uc5ec\ub97c \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \ubd80\ubaa8 \uad50\uc721\uc774 \uc120\ud0dd\uc758 \ud3ed\uc744 \ub113\ud790 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c \ub300\uc2e0, \uad50\uc721\uacfc \uc790\uc6d0\uc5d0 \ub300\ud55c \uc811\uadfc\uc131\uc744 \ud5a5\uc0c1\uc2dc\ud0a4\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uac15\ud654\ud569\ub2c8\ub2e4","\uae30\uc220\uacfc \ubc95\uc774 \uc544\ub2cc \uc778\uac04 \uc911\uc2ec\uc758 \ud574\uacb0\ucc45\uc744 \uc911\uc2dc\ud574\uc57c \ud569\ub2c8\ub2e4","\ub2e4\uc591\ud55c \uc0c1\ud669\uc5d0\uc11c\ub3c4 \ube44\ud310\uc801 \uc0ac\uace0\ub97c \uae30\ub97c \uc218 \uc788\ub294 \uc0ac\ud68c\uc801 \uad50\uc721\uacfc \uc9c0\uc5ed \uc0ac\ud68c\uc758 \uc9c0\uc6d0\uc774 \ud568\uaed8 \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \ud544\uc218\uc801\uc778 \uad50\uc721 \ub3c4\uad6c\ub85c \uc790\ub9ac \uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc9c0\ub098\uce5c \uc0ac\uc6a9\uc744 \ubc29\uc9c0\ud558\ub294 \uac00\uc7a5 \ud6a8\uacfc\uc801\uc778 \ubc29\ubc95\uc740 \uc9c0\uc18d\uc801\uc778 \uad50\uc721\uacfc \ucc38\uc5ec\ub97c \ud1b5\ud574 \uccad\uc18c\ub144\uc758 \uc778\uc2dd\uc744 \ub192\uc774\ub294 \uac83\uc785\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ub2e4\uc591\ud55c \uc815\ubcf4\ub97c \uc2b5\ub4dd\ud558\uace0 \uc790\uc2e0\uc758 \uacac\ubb38\uc744 \ub113\ud788\ub294 \ub370 \uc720\uc6a9\ud569\ub2c8\ub2e4","\uccad\uc18c\ub144\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc54c\uace0\ub9ac\uc998\uc5d0 \ub300\ud55c \uad50\uc721\uc744 \ud1b5\ud574 \uadf8 \uc601\ud5a5\uc744 \uc774\ud574\ud558\uace0 \uc2a4\uc2a4\ub85c \ud310\ub2e8\ud560 \uc218 \uc788\uac8c \ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4; \uc804 \uc138\uacc4 \uad50\uc721\uae30\uad6c\uc778 \uc720\ub124\uc2a4\ucf54(UNESCO)\ub294 \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc774 \uccad\uc18c\ub144\uc744 \ubcf4\ud638\ud558\ub294 \ub370 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\ub2e4\uace0 \ubcf4\uace0, \uc774\ub97c \uac15\ud654\ud560 \uac83\uc744 \uad8c\uc7a5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc9c0\ud0a4\ub294 \uac83\uc740 \uc911\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uacbd\ud5d8\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub294 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubb38\uc81c\ub97c \ub300\ucc98\ud558\ub294 \ub2a5\ub825\uc744 \uac1c\ubc1c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub3c4 \uc815\ubcf4\uc5d0 \uc9c1\uc811 \uc811\uadfc\ud560 \uad8c\ub9ac\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub354 \ub098\uc544\uac00 \uc0ac\ud68c\uc801 \ucea0\ud398\uc778\uacfc \uc815\ucc45\uc744 \ud1b5\ud574 \uacf5\uacf5 \uc778\uc2dd\uc744 \ub192\uc774\ub294 \uac83\uc774 \uc7a5\uae30\uc801\uc778 \ud574\uacb0\ucc45\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ub3c4\ud55c \uc0ac\uc6a9\uc73c\ub85c \uc778\ud55c \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \uc2dc\uac04 \uad00\ub9ac\uc640 \uc790\uae30 \uc870\uc808 \ub2a5\ub825\uc744 \ud0a4\uc6b0\ub294 \uad50\uc721\uc744 \ud1b5\ud574 \uac1c\uc120\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uaddc\uc81c\ubcf4\ub2e4\ub294 \ucc45\uc784 \uc788\ub294 \uc0ac\uc6a9 \ubb38\ud654\ub97c \ud655\uc0b0\uc2dc\ud0a4\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ub2e4\uc591\ud55c \uc815\ubcf4\uc5d0 \uc811\uadfc\ud558\uace0 \ud559\uc2b5\ud558\ub294 \uc911\uc694\ud55c \uacbd\ub85c\uc785\ub2c8\ub2e4","\uac1c\uc778\uc758 \uc0ac\uc0dd\ud65c \ubcf4\ud638\uc5d0 \ub300\ud55c \uc778\uc2dd\uc744 \ub192\uc774\ub294 \uac83\uc774 \uc0ac\uc0dd\ud65c \uce68\ud574 \ubb38\uc81c\ub97c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc7a5\uae30\uc801\uc778 \ud6a8\uacfc\ub97c \uace0\ub824\ud560 \ub54c, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uac74\uac15\ud55c \uc0ac\uc6a9 \uc2b5\uad00\uc744 \uae38\ub7ec\uc8fc\ub294 \uac83\uc774 \ub354 \uc9c0\uc18d \uac00\ub2a5\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c \ub300\uc2e0 \ubd80\ubaa8\uc640\uc758 \ud611\ub825\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc801\uc808\ud55c \uaddc\uc81c\ubcf4\ub2e4\ub294 \ubd80\ubaa8\uc758 \uc5ed\ud560 \uac15\ud654\uac00 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \ube44\ud310\uc801 \uc0ac\uace0 \ub2a5\ub825\uc740 \uad50\uc721\uc744 \uac15\ud654\ud568\uc73c\ub85c\uc368 \uacc4\ubc1c\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4. 'Media Literacy Now'\ub294 \uccad\uc18c\ub144\uc774 \ub514\uc9c0\ud138 \ucf58\ud150\uce20\ub97c \uc62c\ubc14\ub974\uac8c \uc774\ud574\ud558\uace0 \ud3c9\uac00\ud558\ub294 \ub2a5\ub825\uc744 \uac16\ucd94\ub3c4\ub85d \uad50\uc721 \uacfc\uc815\uc744 \ud1b5\ud574 \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc\ub97c \uac15\ud654\ud574\uc57c \ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc9c0\ub3c4\uc640 \uc9c0\uc9c0\uac00 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uad6d\ub9bd \uc778\ud130\ub137 \uc548\uc804 \uad50\uc721 \uc7ac\ub2e8\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uaddc\uc81c\ubcf4\ub2e4 \uc7a5\uae30\uc801\uc73c\ub85c \uc9c0\uc18d \uac00\ub2a5\ud55c \uad50\uc721\uacfc \ubd80\ubaa8\uc758 \uc801\uadf9\uc801\uc778 \uac1c\uc785\uc774 \uc544\uc774\ub4e4\uc774 \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud65c\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\ub294\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ubc95\uc801\uc73c\ub85c \uac15\uc81c\ud558\ub294 \ub300\uc2e0 \ubaa8\ub4e0 \uc0ac\uc6a9\uc790\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721 \ubc0f \uc790\uc6d0\uc744 \uc81c\uacf5\ud558\uc5ec \uc790\uc728\uc801\uc774\uace0 \ucc45\uc784\uac10 \uc788\ub294 \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \uad8c\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ud50c\ub7ab\ud3fc\uc740 \ubbf8\uc131\ub144\uc790\uc758 \uc548\uc804\uc744 \uc704\ud574 \ub2e4\uc591\ud55c \ubcf4\ud638 \uc870\uce58\ub97c \uc2e4\uc9c8\uc801\uc73c\ub85c \uc2dc\ud589\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc81c\ud55c\uc801\uc778 \ubc95\uc548 \ub300\uc2e0, \ubd80\ubaa8\uc640 \uad50\uc721 \uae30\uad00\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uac74\uac15\ud558\uac8c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub294 \ud658\uacbd\uc744 \uc870\uc131\ud574\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc815\uc2e0 \uac74\uac15 \uc9c0\uc6d0 \ub124\ud2b8\uc6cc\ud06c\ub97c \ud615\uc131\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uac1c\uc778 \uc815\ubcf4 \ubcf4\ud638\uc640 \uc548\uc804 \ubb38\uc81c\ub294 \uc608\ubc29 \uad50\uc721\uc744 \ud1b5\ud574 \ud574\uacb0 \uac00\ub2a5\ud569\ub2c8\ub2e4","\uacfc\ub3c4\ud55c \uc0ac\uc6a9\uacfc \uc815\uc2e0 \uac74\uac15 \uc545\ud654 \ubb38\uc81c\ub294 \uade0\ud615 \uc7a1\ud78c \uc0ac\uc6a9 \uc2b5\uad00\uc744 \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc911\ub3c5 \ubb38\uc81c\ub294 \ucc45\uc784 \uc788\ub294 \uc0ac\uc6a9 \uad50\uc721\uc73c\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c \uc5c6\uc774\ub3c4 \ubbfc\uac04\uacfc \uacf5\uacf5 \ubd80\ubb38 \uac04\uc758 \ud611\ub825\uc774 \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud558\ub294 \ub370 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\ud68c\uc640 \ubd80\ubaa8\uc758 \uc5ed\ud560\uc740 \uc624\ud788\ub824 \uadf8\ub4e4\uc758 \ub514\uc9c0\ud138 \ud65c\ub3d9\uc744 \uc9c0\ucf1c\ubcf4\uba70 \uc801\uc2dc\uc5d0 \uac1c\uc785\ud558\ub294 \uac83\uc785\ub2c8\ub2e4","\ub514\uc9c0\ud138 \uc548\uc804 \uad50\uc721\uc744 \ud1b5\ud574 \ubd80\uc791\uc6a9\uc744 \uc644\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc81c\ud55c\uc774\ub098 \uae08\uc9c0\ub97c \ud53c\ud558\uace0 \ub300\uc2e0 \uc548\uc804\ud55c \uc628\ub77c\uc778 \ud658\uacbd\uc744 \uad6c\ucd95\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ucee4\ubba4\ub2c8\ud2f0 \uae30\ubc18\uc758 \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c\uc740 \ubc95\uc548 \uc5c6\uc774\ub3c4 \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uad50\uc721\uc744 \ud1b5\ud55c \uc790\uac00 \ubcf4\ud638 \ub2a5\ub825 \ud5a5\uc0c1\uc774 \ub354 \uc911\uc694\ud569\ub2c8\ub2e4","\uad50\uc721\uc744 \ud1b5\ud574 \ube44\ud310\uc801 \uc0ac\uace0\uc640 \uc790\uae30\ud1b5\uc81c \ub2a5\ub825\uc744 \ud0a4\uc6b0\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc62c\ubc14\ub978 \uad50\uc721\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\uc758 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \ud5a5\uc0c1\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4 \ubd80\ubaa8\ub098 \ubcf4\ud638\uc790\uc758 \uc801\uadf9\uc801\uc778 \ucc38\uc5ec\uac00 \ub354 \ud6a8\uacfc\uc801\uc778 \ubcf4\ud638 \uc218\ub2e8\uc785\ub2c8\ub2e4","\uc808\ub300\uc801\uc778 \ubc95\uc801 \uaddc\uc81c\ubcf4\ub2e4\ub294 \uc790\ubc1c\uc801\uc778 \ucc45\uc784\uac10\uc744 \ud0a4\uc6b0\ub294 \uac83\uc774 \uc7a5\uae30\uc801\uc73c\ub85c \ub354 \ubc14\ub78c\uc9c1\ud569\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc740 \ubc95\uc801 \uc81c\ud55c\uc774 \uc544\ub2cc \uae30\uc220\uc801 \ud574\uacb0\ucc45\uc73c\ub85c \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\uc758 \uadfc\ubcf8\uc801\uc778 \ud574\uacb0\ucc45\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\ub294 \uac83\uc774 \uc544\ub2c8\ub77c \uade0\ud615 \uc7a1\ud78c \ubbf8\ub514\uc5b4 \uc2b5\uad00\uacfc \uc815\uc2e0 \uac74\uac15 \uc9c0\uc6d0\uc744 \uc81c\uacf5\ud558\ub294 \uac83\uc785\ub2c8\ub2e4; \ubbf8\uad6d\uc815\uc2e0\uac74\uac15\ud611\ud68c(American Mental Health Association)\uc5d0\uc11c\ub294 \uccad\uc18c\ub144\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc2dc\uac04\uc744 \ud1b5\uc81c\ud558\uae30\ubcf4\ub2e4\ub294 \uac74\uac15\ud55c \uc0ac\uc6a9 \uc2b5\uad00\uc744 \uad50\uc721\ud568\uc73c\ub85c\uc368 \uc815\uc2e0 \uac74\uac15\uc744 \uac1c\uc120\ud560 \uc218 \uc788\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\ub354\ubd88\uc5b4 \ud559\uad50\uc640 \ucee4\ubba4\ub2c8\ud2f0 \uc911\uc2ec\uc758 \ud504\ub85c\uadf8\ub7a8\uc744 \ub9c8\ub828\ud574 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc774 \ubbf8\uc131\ub144\uc790\uc640 \ud568\uaed8 \uc548\uc804\ud55c \uc778\ud130\ub137 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721\uc744 \ubc1b\uc744 \uc218 \uc788\ub3c4\ub85d \uc9c0\uc6d0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc0ac\uc6a9 \uc81c\ud55c\ubcf4\ub2e4\ub294 \ucc45\uc784\uac10 \uc788\ub294 \uc0ac\uc6a9\uc774 \uc7a5\ub824\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc624\ud788\ub824 \ub354 \uc548\uc804\ud55c \uc628\ub77c\uc778 \uc2b5\uad00\uc744 \ubc1c\ub2ec\uc2dc\ud0a4\ub294 \ub370 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc81c\uc7ac\uac00 \uc544\ub2cc \uad50\uc721\uc744 \ud1b5\ud574 \uae0d\uc815\uc801\uc73c\ub85c \ud65c\uc6a9\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc790\uccb4\uc758 \ucc45\uc784 \uac15\ud654\ub294 \ubc95\uc801 \uaddc\uc81c\ubcf4\ub2e4","\uccad\uc18c\ub144 \uc2a4\uc2a4\ub85c \uc628\ub77c\uc778 \uacbd\ud5d8\uc744 \uad00\ub9ac\ud560 \uc218 \uc788\ub294 \uc5ed\ub7c9\uc744 \ud0a4\uc6b0\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc81c\ud55c\ubcf4\ub2e4\ub294 \uad50\uc721\uacfc \uc9c0\ub3c4\uc5d0 \uc911\uc810\uc744 \ub450\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uad50\uc721\uc744 \ud1b5\ud55c \ubb38\uc81c \ud574\uacb0\uc740 \uc7a5\uae30\uc801\uc73c\ub85c \uae0d\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce69\ub2c8\ub2e4","\uccab\uc9f8, \ud45c\ud604\uc758 \uc790\uc720\ub294 \ubaa8\ub4e0 \uc5f0\ub839\ub300\uc758 \uac1c\uc778\uc5d0\uac8c \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560\uc744 \uac15\ud654\ud568\uc73c\ub85c\uc368 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc624\ud788\ub824 \uad50\uc721\uc744 \ud1b5\ud574 \ucc45\uc784 \uc788\ub294 \uc628\ub77c\uc778 \uc0ac\uc6a9 \ubb38\ud654\ub97c \uc870\uc131\ud574\uc57c \ud569\ub2c8\ub2e4","\uc720\ud574\ud55c \ucf58\ud150\uce20\ub85c\ubd80\ud130 \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud574 \ud544\ud130\ub9c1 \uae30\uc220\uc744 \ud65c\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc815\ubcf4\uc5d0 \ub300\ud55c \uc811\uadfc\uc740 \uad50\uc721\uc801\uc73c\ub85c \uc911\uc694\ud55c \uc790\uc6d0\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ucc45\uc784\uac10 \uc788\ub294 \uc778\ud130\ub137 \uc0ac\uc6a9\ubc95\uc744 \uad50\uc721\ud558\ub294 \uac83\uc740 \uc624\ud788\ub824 \uae0d\uc815\uc801\uc778 \uacb0\uacfc\ub97c \uac00\uc838\uc62c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc778\ud130\ub137 \uc0ac\uc6a9\uc758 \uc548\uc804\uc744 \uc704\ud574\uc11c \uacf5\ub3d9\uccb4 \uae30\ubc18\uc758 \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c\uc744 \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc815\ubcf4 \uc811\uadfc\uc131\uc744 \ud655\ub300\ud558\ub294 \uc218\ub2e8\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uc9c0\uc9c0\uc758 \uc911\uc694\ud55c \uc218\ub2e8\uc785\ub2c8\ub2e4","\uc62c\ubc14\ub978 \uc0ac\uc6a9\uc744 \uc704\ud55c \uad50\uc721\uc740 \uc911\ub3c5 \ubb38\uc81c\ub97c \uc644\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uad6c\uae00(Google LLC)\uc740 \ubd80\ubaa8\uc640 \uc790\ub140\uac00 \ud568\uaed8 \ub514\uc9c0\ud138 \uc138\uc0c1\uc744 \ud0d0\uc0c9\ud560 \uc218 \uc788\ub294 \uad50\uc721 \ub9ac\uc18c\uc2a4\ub97c \uc81c\uacf5\ud558\uba70, \uc774\ub294 \uac00\uc871\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uae0d\uc815\uc801 \uc0ac\uc6a9\uc744 \uc790\uc5f0\uc2a4\ub7fd\uac8c \uc2b5\ub4dd\ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc81c\ub3c4\ub97c \ud1b5\ud574 \uc628\ub77c\uc778\uc5d0\uc11c\uc758 \uc548\uc804\uc744 \uac15\ud654\ud558\ub294 \ubc29\ubc95\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc0ac\uc6a9\uc790\uc758 \ucc45\uc784 \uc758\uc2dd\uc744 \ud544\uc694\ub85c \ud558\ub294 \ub514\uc9c0\ud138 \uc2dc\ubbfc \uad50\uc721\uc774 \ubb38\uc81c \ud574\uacb0\uc5d0 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc790\ubc1c\uc801\uc778 \ubb38\uc81c \ud574\uacb0 \ub2a5\ub825\uc740 \uc7a5\uae30\uc801\uc73c\ub85c \ub354 \uc548\uc804\ud569\ub2c8\ub2e4","(3) \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud55c \ub514\uc9c0\ud138 \uae30\uc220 \ud559\uc2b5\uc740 \ub300\uccb4\ubd88\uac00\ud55c \uc2e4\uc2b5 \uacbd\ud5d8\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\uc774 \uc544\ub2c8\ub77c \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uac00 \uad50\uc721\uc801 \uc9c0\ub3c4\ub97c \ud1b5\ud574 \ub354 \ud070 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801\uc778 \uc81c\ud55c\uc774 \uc544\ub2c8\ub77c \uad50\uc721\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\uc774 \uc778\ud130\ub137\uacfc \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ucc45\uc784\uac10 \uc788\uac8c \uc774\uc6a9\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \uac1c\ubc1c\ud574\uc57c \ud569\ub2c8\ub2e4","(1) \ubcf4\ud3b8\uc801 \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc758 \ud655\ub300\ub294 \uc911\uc694\ud55c \ud574\ub2f5\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\ub9dd \uad6c\ucd95 \ubc0f \uc720\uc9c0\uc5d0 \ub3c4\uc6c0\uc744 \uc90d\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uad50\ub958\uc640 \uc815\ubcf4\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4 \ud6a8\uacfc\uc801\uc778 \uc548\uc804\ub9dd\uc740 \uae30\uc220 \uae30\uc5c5\uacfc \uad50\uc721\uae30\uad00\uc774 \ud611\ub825\ud558\uc5ec \ub354 \ub098\uc740 \uc628\ub77c\uc778 \uacbd\ud5d8\uc744 \ub9cc\ub4dc\ub294 \uac83\uc785\ub2c8\ub2e4","\ud50c\ub7ab\ud3fc \uc790\uccb4\uc758 \uac15\ud654\ub41c \uc548\uc804 \uae30\ub2a5\uc740 \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \ubcf4\ud638\ub97c \uc704\ud574 \ud50c\ub7ab\ud3fc \uac04\uc758 \ud611\ub825\uc740 \uc989\uac01\uc801\uc774\uace0 \ud6a8\uacfc\uc801\uc778 \ud574\uacb0\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uc801\uc808\ud55c \uc0ac\uc6a9 \ubc29\ubc95\uacfc \uc704\ud5d8 \uc778\uc2dd \uad50\uc721\uc744 \ud1b5\ud574, \ubbf8\uc131\ub144\uc790\ub4e4\uc740 \uc774\ub7ec\ud55c \ub3c4\uad6c\ub97c \uc548\uc804\ud558\uac8c \ud65c\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uad50\uc721\uc801 \uc811\uadfc\uc740 \uccad\uc18c\ub144\uc5d0\uac8c \ube44\ud310\ c5f0\uacb0\uc744 \uc9c0\uc6d0\ud558\uc5ec \ub610\ub798\uc640\uc758 \uad00\uacc4 \ud615\uc131\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc2dc\uac04\uc740 \ubc95\uc801\uc778 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc790\uae30 \uad00\ub9ac \uae30\uc220\ub85c \uac1c\uc120\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\uac00 \uc544\ub2cc, \ub9de\ucda4\ud615 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc774 \ubcf4\ub2e4 \uc2e4\ud6a8\uc131\uc774 \ub192\uc2b5\ub2c8\ub2e4","\ud6a8\uacfc\uc801\uc778 \uc790\uc728 \uaddc\uc81c\uac00 \uc5c5\uacc4 \ub0b4\uc5d0\uc11c \uc774\ubbf8 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","(3) \ub300\uc548\uc801\uc778 \ub514\uc9c0\ud138 \uad50\uc721 \uacbd\ub85c\ub97c \uc900\ube44\ud558\ub354\ub77c\ub3c4, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud544\uc218\uc801\uc778 \ud604\ub300 \uc0ac\ud68c\uc758 \uc758\uc0ac\uc18c\ud1b5 \ubc0f \ud559\uc2b5 \ub3c4\uad6c\ub85c \uc790\ub9ac\uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc544\uc774\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc804 \uc138\uacc4\uc758 \ub2e4\uc591\ud55c \uc758\uacac\uacfc \ubb38\ud654\ub97c \uc811\ud560 \uc218 \uc788\uc73c\uba70, \uc774\ub294 \uadf8\ub4e4\uc758 \uc0ac\ud68c\uc801 \uc774\ud574\ub825\uacfc \uae00\ub85c\ubc8c \uac10\uac01\uc744 \ud0a4\uc6b0\ub294 \ub370 \ud070 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\uc628\ub77c\uc778 \uc548\uc804\uc740 \uad50\uc721\uc73c\ub85c \uac15\ud654\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc911\uc694\ud55c \uc815\ubcf4 \uc811\uadfc\uacfc \uad50\uc721\uc801 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uaddc\uc81c\ub85c \uc778\ud55c \ub2e8\uae30\uc801 \uc548\uc804\uc131\ubcf4\ub2e4\ub294 \uad50\uc721\uc744 \ud1b5\ud55c \uc7a5\uae30\uc801 \uc5ed\ub7c9 \uac15\ud654\uac00 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ud45c\ud604\uc758 \uc790\uc720\ub294 \uccad\uc18c\ub144\uc744 \ud3ec\ud568\ud55c \ubaa8\ub4e0 \uc0ac\ub78c\uc5d0\uac8c \ubcf4\uc7a5\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uac1c\uc778\uc815\ubcf4 \uc720\ucd9c \ubb38\uc81c\ub294 \ud50c\ub7ab\ud3fc \uaddc\uc815\ubcf4\ub2e4\ub294 \uac1c\uc778\uc758 \uc815\ubcf4 \ubcf4\ud638 \uc778\uc2dd \uad50\uc721\uc744 \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccad\uc18c\ub144\uacfc \ud50c\ub7ab\ud3fc \uac04 \ud611\ub825\uc73c\ub85c \uc548\uc804\ud55c \uc0ac\uc6a9 \ud658\uacbd\uc744 \ud655\ubcf4\ud558\ub294 \uac83\uc774 \uaddc\uc81c\ubcf4\ub2e4 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \ub514\uc9c0\ud138 \uc5ed\ub7c9\uc744 \uac15\ud654\ud558\uc5ec \ucde8\uc5c5 \uae30\ud68c\ub97c \ud655\ub300\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc811\uadfc\uc744 \uae08\uc9c0\ud558\uac70\ub098 \uc81c\ud55c\ud558\ub294 \uac83\ubcf4\ub2e4 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc744 \ud1b5\ud55c \uc811\uadfc\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\ubcf4\ub2e4 \uac00\uc871 \uc911\uc2ec\uc758 \uad00\ub9ac\uc640 \uc9c0\ub3c4\uac00 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub514\uc9c0\ud138 \uc5ed\ub7c9\uc740 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4. '\uc774\ub178\ubca0\uc774\uc158 \uc564\ub4dc \ud14c\ud06c\ub180\ub85c\uc9c0 \uc778\uc2a4\ud2f0\ud29c\ud2b8(Innovation and Technology Institute)'\ub294 \ubbf8\ub798 \uc0ac\ud68c\uc5d0 \ud544\uc694\ud55c \ub514\uc9c0\ud138 \uc5ed\ub7c9\uc744 \uae30\ub974\uae30 \uc704\ud574\uc11c\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc77c\ucc0d\ubd80\ud130 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc640 \uac19\uc740 \ub514\uc9c0\ud138 \ub3c4\uad6c\ub97c \uc0ac\uc6a9\ud558\ub294 \uac83\uc774 \uc911\uc694\ud558\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\uc815\ubcf4\uc5d0 \ub300\ud55c \uc811\uadfc\uc131\uc744 \uc81c\ud55c\ud558\uc9c0 \uc54a\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uac00 \uc9c1\uba74\ud558\ub294 \uc704\ud5d8\uc744 \uad00\ub9ac\ud558\uba74\uc11c\ub3c4 \uc790\uc720\ub85c\uc6b4 \uc0ac\uc6a9\uc744 \ubcf4\uc7a5\ud560 \ubc29\ubc95\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uac01 \uac1c\uc778\uc740 \ub514\uc9c0\ud138 \ubb38\ud574\ub825\uc744 \uc2a4\uc2a4\ub85c \ud0a4\uc6b8 \uae30\ud68c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ubcc0\ud558\ub294 \ubbf8\ub514\uc5b4 \ud658\uacbd\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub192\uc77c \uc218 \uc788\ub3c4\ub85d \uc9c0\uc18d\uc801\uc778 \uad50\uc721\uacfc \uc815\ubcf4 \uc81c\uacf5\uc774 \ud544\uc694\ud558\uba70, \uc774\ub294 \ubc95\uc801 \uc81c\uc7ac\ubcf4\ub2e4","\uadf9\ub2e8\uc801\uc778 \uaddc\uc81c\ubcf4\ub2e4\ub294 \uad50\uc721\uc744 \ud1b5\ud55c \uc811\uadfc\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4; \uad6d\uc81c\uc804\uae30\ud1b5\uc2e0\uc5f0\ud569(ITU)\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc804\uba74\uc801\uc73c\ub85c \uae08\uc9c0\ud558\ub294 \uac83\ubcf4\ub2e4 \uc548\uc804\ud558\uace0 \ucc45\uc784 \uc788\ub294 \uc0ac\uc6a9\uc744 \uac00\ub974\uce58\ub294 \uac83\uc774 \uc7a5\uae30\uc801\uc73c\ub85c \ub354 \uae0d\uc815\uc801\uc778 \uacb0\uacfc\ub97c \uc774\ub04c\uc5b4\ub0bc \uc218 \uc788\ub2e4\uace0 \uad8c\uc7a5\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ucc38\uc5ec\ud558\ub294 \ub514\uc9c0\ud138 \ubb38\ud574\ub825 \ud504\ub85c\uadf8\ub7a8\uc740 \uc628\ub77c\uc778 \ud658\uacbd\uc758 \ubcf5\uc7a1\uc131\uc744 \ud6a8\uacfc\uc801\uc73c\ub85c \uc774\ud574\ud558\ub3c4\ub85d \ub3d5\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\ub4e4\uc740 \uc131\uc778\uc758 \ub3c4\uc6c0\uc744 \ubc1b\uc544 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \ud568\uc591\ud558\uc5ec \uc2a4\uc2a4\ub85c\uc758 \uc628\ub77c\uc778 \ud658\uacbd\uc744 \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uad50\uc721\uacfc \uc9c0\ub3c4\ub85c \uc811\uadfc\ud558\ub294 \uac83\uc774 \ubc95\uc801 \uaddc\uc81c\ubcf4\ub2e4 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc740 \uc0ac\ud68c \uc804\ubc18\uc758 \uc778\uc2dd\uacfc \uacbd\uac01\uc2ec\uc744 \ub192\uc774\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc0ac\ud68c\ub294 \ubaa8\ub4e0 \uc5f0\ub839\uce35\uc774 \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0\uc11c \uc548\uc804\ud558\uac8c \ud65c\ub3d9\ud560 \uc218 \uc788\ub3c4\ub85d \ud3ec\uad04\uc801\uc778 \uc9c0\uce68\uacfc \uad50\uc721\uc744 \uc81c\uacf5\ud574\uc57c \ud569\ub2c8\ub2e4","\uc81c\ud55c \ub300\uc2e0 \uad50\uc721\uacfc \uc790\uc728 \uc870\uc815\uc744 \ud1b5\ud574 \ubd80\uc791\uc6a9\uc744 \uc644\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uae00\ub85c\ubc8c \uc774\uc288\uc5d0 \ub300\ud574 \ub354 \ub113\uc740 \uad00\uc810\uc744 \uac16\uac8c \ub429\ub2c8\ub2e4","\uc628\ub77c\uc778 \uc548\uc804\uc5d0 \ub300\ud55c \uc815\ubcf4 \uacf5\uc720\ub294 \uc704\ud611\uc744 \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc628\ub77c\uc778 \uacf5\uac04\uc5d0\uc11c\uc758 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c \ud574\uacb0\uc744 \uc704\ud55c \uc9c0\uc6d0 \uae30\ub2a5\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ud50c\ub7ab\ud3fc \uc6b4\uc601\uc790\uc758 \uc801\uadf9\uc801 \ucc38\uc5ec\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc2dc\uac04\uc744 \ubc95\uc801\uc73c\ub85c \uc81c\ud55c\ud558\ub294 \uac83\ubcf4\ub2e4 \uae30\uc220\uacfc \ud50c\ub7ab\ud3fc\uc744 \ud1b5\ud55c \uc790\uc728\uc801 \uad00\ub9ac \uae30\ub2a5\uc774 \ub354 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4. '\ud398\uc774\uc2a4\ubd81' \uac19\uc774 \ub9ce\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\uc740 \uc790\uccb4\uc801\uc73c\ub85c \uc0ac\uc6a9 \uc2dc\uac04 \ubaa8\ub2c8\ud130\ub9c1 \ubc0f \uc81c\ud55c \uae30\ub2a5 c\ubcf8 \uc6d0\uc778\uc744 \ud574\uacb0\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc774\ub7ec\ud55c \ubc95\uc548\uc740 \ubbf8\uc131\ub144\uc790\uc758 \uc815\ubcf4 \uc811\uadfc\uacfc \ud45c\ud604\uc758 \uc790\uc720\ub97c \ubd80\ub2f9\ud558\uac8c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uadf8\ub4e4\uc758 \ud45c\ud604\uc758 \uc790\uc720\uc640 \uc815\ubcf4 \uc811\uadfc\uad8c\uc744 \ubd80\ub2f9\ud558\uac8c \uce68\ud574\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub9cc\uc57d \uc815\ubd80\uac00 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubc95\uc801\uc73c\ub85c \uc81c\ud55c\ud55c\ub2e4\uba74, \uae30\uc220\uc801 \ud68c\ud53c \ubc29\ubc95\ub4e4\uc744 \uc0ac\uc6a9\ud558\ub294 \uc0ac\ub840\ub4e4\uc774 \uc99d\uac00\ud560 \uac83\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubc95\uc801 \uaddc\uc81c\ub294 \ucc3d\uc758\ub825\uacfc \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc5b5\uc555\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \ud5a5\uc0c1\uc2dc\ud0a4\ub294 \uae30\ud68c\ub97c \ubc15\ud0c8\ud558\ub294 \uac83\uc740 \ubd80\uc801\uc808\ud569\ub2c8\ub2e4","\ubc95\uc801\uc778 \uac15\uc81c\ub294 \uac1c\uc778\uc758 \uc790\uc720 \uc120\ud0dd\uacfc \ucc45\uc784\uac10 \ubc1c\ub2ec\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uaddc\uc81c\ub97c \uac15\ud654\ud55c\ub2e4\uace0 \ud574\uc11c \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ubc30\uc6b0\ub294 \uae30\ud68c\ub97c \uac10\ucd95\ud558\ub294 \uac83\uc740 \ubc14\ub78c\uc9c1\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubc95\uc801 \uc81c\ud55c\uc774 \uc624\ud788\ub824 \uccad\uc18c\ub144\uc758 \uae0d\uc815\uc801 \ubc1c\ub2ec \uae30\ud68c\ub97c \ub9c9\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\ub294 \ubbf8\uc131\ub144\uc790\uc758 \uad8c\ub9ac\uc640 \ubc1c\uc5b8\uc758 \uc790\uc720\ub97c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","(2) \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uc9c0\uc9c0\uc758 \uae30\ud68c\ub97c \uc904\uc785\ub2c8\ub2e4","\ubc95\uc801 \uc870\uce58\ub294 \uc624\ud788\ub824 \uc81c\ud55c\uc801\uc77c \uc218 \uc788\uc73c\uba70, \ubbf8\uc131\ub144\uc790\uc758 \uc790\uc728\uc131\uacfc \ucc45\uc784\uac10\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ubc95\uc801\uc778 \uc81c\ud55c\uc740 \uc790\uc2e0\uc758 \uc2dc\uac04 \uad00\ub9ac\ub97c \ubc30\uc6b0\uace0 \uc2e4\ucc9c\ud558\ub294 \uccad\uc18c\ub144\uc758 \uc790\uc728\uc131\uc744 \ubc1c\uc804\uc2dc\ud0a4\ub294 \uac83\uc744 \ubc29\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4. '\uccad\uc18c\ub144 \uc790\ubb38 \uc704\uc6d0\ud68c'\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc2a4\uc2a4\ub85c \ud6a8\uacfc\uc801\uc73c\ub85c \uc2dc\uac04\uc744 \uad00\ub9ac\ud558\ub3c4\ub85d \ub3d5\ub294 \uac83\uc774 \uc7a5\uae30\uc801\uc73c\ub85c\ub294 \ub354 \ud070 \uc790\uc728\uc131\uacfc \ucc45\uc784\uac10\uc744 \ubc30\uc591\ud55c\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ud45c\ud604\uc758 \uc790\uc720\ub97c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ubc95\uc548\uc740 \uae30\uc220\uc758 \ube60\ub978 \ubc1c\uc804 \uc18d\ub3c4\ub97c \ub530\ub77c\uc7a1\uc9c0 \ubabb\ud560 \uac83\uc785\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\ub97c \ud1b5\ud574 \ud50c\ub7ab\ud3fc \uc0ac\uc6a9\uc5d0 \uc81c\ud55c\uc744 \ub450\ub294 \uac83\uc740 \uccad\uc18c\ub144\uc758 \uc790\uae30\uc8fc\ub3c4\uc801 \ud559\uc2b5\uacfc \ud0d0\uc0c9\uc758 \uae30\ud68c\ub97c \ube7c\uc557\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4; \uccad\uc18c\ub144\uad8c\uc775\uc704\uc6d0\ud68c(National Youth Rights Committee)\ub294 \uacfc\ub3c4\ud55c \uc81c\uc7ac\uac00 \uccad\uc18c\ub144\uc758 \uc790\uae30 \ud45c\ud604\uacfc \ud0d0\uc0c9\uc744 \uc81c\ud55c\ud558\uc5ec \uc624\ud788\ub824 \ubd80\uc815\uc801\uc778 \uacb0\uacfc\ub97c \ucd08\ub798\ud560 \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc758 \uae30\ud68c\ub97c \uc81c\ud55c\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc644\uc804\ud788 \uae08\uc9c0\ud568\uc73c\ub85c\uc368 \uc624\ud788\ub824 \ubd80\ubaa8\uc640 \uc790\ub140 \uac04\uc758 \ub300\ud654\uac00 \ub2e8\uc808\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \uc77c\uad04\uc801\uc778 \uaddc\uc81c\uac00 \ud6a8\uacfc\uc801\uc774\uc9c0 \uc54a\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uae08\uc9c0\ub294 \uad50\uc721\uc801 \uae30\ud68c\ub97c \uac10\uc18c\uc2dc\ud0a4\uace0 \uacbd\uc81c\uc801 \ubd88\ud3c9\ub4f1\uc744 \uc545\ud654\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\uc7ac\ub294 \uae30\uc220\uacfc \uc0ac\ud68c\uc758 \ube60\ub978 \ubcc0\ud654\uc5d0 \uc801\uc751\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801\uc778 \uaddc\uc81c\ub85c \uc778\ud55c \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc811\uadfc \uc81c\ud55c\uc740 \uccad\uc18c\ub144\uc758 \ucc3d\uc758\uc131\uacfc \uc790\uae30 \ud45c\ud604\uc744 \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uae30\uc220 \ud65c\uc6a9 \ub2a5\ub825\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ud55c\ud3b8, \ubc95\uc801\uc778 \uc81c\ud55c\uc740 \uc624\ud788\ub824 \ubbf8\uc131\ub144\uc790\uac00 \uae30\uc220\uc5d0 \ub300\ud55c \ucc45\uc784\uac10\uc744 \ubc30\uc591\ud560 \uae30\ud68c\ub97c \ubc15\ud0c8\ud569\ub2c8\ub2e4, \uc774\ub294 \uadf8\ub4e4\uc774 \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0 \ud544\uc694\ud55c \uae30\uc220\uc801 \uc18c\uc591\uacfc \ucc45\uc784 \uc788\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\ubc95\uc744 \ubc30\uc6b8 \uc218 \uc788\ub294 \uc911\uc694\ud55c \uc21c\uac04\uc744 \ub193\uce58\uac8c \ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ubc95\uc801 \uc81c\ud55c\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0 \ub300\ud55c \ubd80\uc815\uc801\uc778 \uc778\uc2dd\uc744 \uc2ec\uc5b4\uc904 \uc218 \uc788\uc5b4, \uccad\uc18c\ub144\ub4e4\uc774 \uc774\ub97c \uc720\uc775\ud558\uac8c \uc0ac\uc6a9\ud558\ub294 \ubc29\ubc95\uc744 \ubc30\uc6b0\uc9c0 \ubabb\ud558\uac8c \ub9cc\ub4e4 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\uc740 \uae30\uc220\uc801 \uc801\uc751\ub825\uacfc \ube44\ud310\uc801 \uc0ac\uace0 \ub2a5\ub825\uc744 \uac10\uc18c\uc2dc\ud0b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc9c0\ub098\uce5c \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\ub97c \uc624\ud788\ub824 \ub354 \ucde8\uc57d\ud558\uac8c \ub9cc\ub4e4 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc804\uba74 \uae08\uc9c0\ud558\ub294 \uac83\uc740 \uadf8\ub4e4\uc758 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uccad\uc18c\ub144\uc758 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0 \ubd80\uc871\uc73c\ub85c \uc778\ud574 \uc545\ud654\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc81c\ud55c\uc801\uc778 \uc870\uce58\uac00 \uc548\uc804\ub9dd\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\ub2e4\ub294 \uc8fc\uc7a5\uc740 \uc774\ud574\ud558\uc9c0\ub9cc, \uc9c0\ub098\uce58\uac8c \uc758\uc874\ud560 \uacbd\uc6b0 \uccad\uc18c\ub144\ub4e4\uc774 \uc790\uc728\uc131\uacfc \ub3c5\ub9bd\uc801\uc778 \uc0ac\uace0\ub97c \ubc1c\ub2ec\uc2dc\ud0ac \uae30\ud68c\ub97c \ub193\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uad50\uc721\uc801 \uae30\ud68c\ub97c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc790\uae30 \ud45c\ud604\uacfc \ucc3d\uc758\ub825 \ubc1c\ud718\ub97c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801\uc778 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc815\ubcf4 \uc811\uadfc\uc744 \uc81c\ud55c\ud558\uc5ec \uc5ed\ud6a8\uacfc\ub97c \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uad50\uc721\uc801 \uae30\ud68c\ub97c \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\uc6a9 \uc81c\ud55c\uc740 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccad\uc18c\ub144\ub4e4\uc774 \uac74\uac15\ud558\uc9c0 \uc54a\uc740 \ucf58\ud150\uce20\uc5d0 \ub178\ucd9c\ub420 \uc704\ud5d8\uc774 \ud06c\ub2e4\ub294 \uc8fc\uc7a5\uc740 \ub9de\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ub178\ucd9c\uc744 \uc644\uc804\ud788 \ubc29\uc9c0\ud558\ub294 \uac83\uc740 \ud604\uc2e4\uc801\uc73c\ub85c \uc5b4\ub835\uace0 \uc624\ud788\ub824 \uadf8\ub4e4\uc758 \ud638\uae30\uc2ec\uc744 \ud0a4\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801\uc778 \uc81c\ud55c\uc740 \ub514\uc9c0\ud138 \ub2a5\ub825 \ubc1c\uc804\uc744 \uc800\ud574\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \ubc95\uc801 \uc81c\ud55c\uc740 \uc9c0\uc5ed\uc801 \ubd88\ud3c9\ub4f1\uc744 \uc2ec\ud654\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\uc758 \uad8c\ub9ac\ub97c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc774\ub7f0 \ubc95\uc548\uc740 \ub514\uc9c0\ud138 \uae30\uc220 \ubc1c\uc804\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc774\ub7ec\ud55c \uc81c\ud55c\uc740 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \ubc1c\ub2ec\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc5b5\uc555\uc801\uc778 \ubc95\uc548\uc740 \ubd80\ubaa8\uc640 \uc790\ub140 \uac04\uc758 \uc2e0\ub8b0 \uad00\uacc4\ub97c \ud6fc\uc190\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4. \"Family Online Safety Institute\"\ub294 \ubd80\ubaa8\uc640 \uc790\ub140\uac00 \ud568\uaed8 \uc548\uc804\ud55c \uc628\ub77c\uc778 \uc2b5\uad00\uc744 \uac1c\ubc1c\ud574\uc57c \ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud558\uba70, \ubc95\uc801\uc778 \uc81c\ud55c\uc774 \uc624\ud788\ub824 \uac00\uc871 \ub0b4\uc5d0\uc11c\uc758 \ub300\ud654\uc640 \uad50\uc721\uc758 \uae30\ud68c\ub97c \uac00\ub85c\ub9c9\uc744 \uc218 \uc788\ub2e4\uace0 \ubcf4\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\uc740 \uc5ed\ud6a8\uacfc\ub97c \ucd08\ub798\ud560 \uc218\ub3c4 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uae30\uc220 \ud601\uc2e0\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\uc758 \ud45c\ud604\uc758 \uc790\uc720\uc640 \ucc3d\uc758\uc131\uc744 \uc5b5\uc555\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\uc57d\uc740 \ubb38\uc81c\ub97c \uadfc\ubcf8\uc801\uc73c\ub85c \ud574\uacb0\ud558\uae30\ubcf4\ub2e4 \ub2e8\uc21c\ud788 \ud68c\ud53c\ud558\ub294 \ubc29\ubc95\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc644\uc804\ud788 \ucc28\ub2e8\ud558\ub294 \uac83\uc740 \ud604\uc2e4\uc801\uc774\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\ub294 \uae30\uc220 \ubc1c\uc804\uacfc \ud611\ub825\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uad50\uc721\uc801 \uc790\uc6d0\uc5d0\uc758 \uc811\uadfc\uc131\uc774 \uc81c\ud55c\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\uc740 \uc624\ud788\ub824 \uae30\uc220 \uaca9\ucc28\ub97c \ubc8c\ub9b4 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc81c\ud55c\uc801\uc778 \uc811\uadfc\uc740 \ub514\uc9c0\ud138 \uae30\uc220\uc5d0 \ub300\ud55c \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc774\ud574\ub3c4\ub97c \ub5a8\uc5b4\ub728\ub9b4 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccad\uc18c\ub144\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\uba74 \uc624\ud788\ub824 \uae30\uc220\uc5d0 \ub300\ud55c \uc811\uadfc\uc131\uc774 \ub5a8\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4; \uc815\ubcf4\uae30\uc220\uad50\uc721\uc6d0(Educational Institute for Information Technology)\uc740 \uccad\uc18c\ub144\uc5d0\uac8c \ub514\uc9c0\ud138 \uae30\uc220\uc5d0 \ub300\ud55c \uc811\uadfc\uc744 \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uc624\ud788\ub824 \uc790\uc2e0\uac10\uc744 \uc800\ud558\ud558\uace0 \uc0ac\ud68c\uc801 \uc18c\ud1b5 \ub2a5\ub825\uc744 \uc57d\ud654\uc2dc\ud0ac \uac00\ub2a5\uc131\uc774 \uc788\ub2e4\uace0 \uacbd\uace0\ud569\ub2c8\ub2e4","\uc81c\ud55c \ubc95\uc548\uc740 \ubc14\ub78c\uc9c1\ud55c \uc628\ub77c\uc778 \uc774\uc6a9 \uad50\uc721 \uae30\ud68c\ub97c \ub193\uce60 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \ubd88\ub9c1\uacfc \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20 \ub178\ucd9c\uc740 \uc131\uc778\uacfc \ubbf8\uc131\ub144\uc790 \ubaa8\ub450\uc5d0\uac8c \uc601\ud5a5\uc744 \ubbf8\uce69\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \uacbd\uc81c\uc801 \uae30\ud68c\ub97c \ub193\uce58\uac8c \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \ud6a8\uacfc\uc801\uc778 \ub300\ucc98\ubcf4\ub2e4\ub294 \ud68c\ud53c\ub85c \uc774\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc811\uadfc \uc81c\ud55c\uc740 \uae30\uc220 \uaca9\ucc28\ub97c \uc2ec\ud654\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ub3c4\ud55c \uc81c\ud55c\uc740 \ucc45\uc784 \uc788\ub294 \uc0ac\uc6a9\uc744 \ubc30\uc6b0\ub294 \uae30\ud68c\ub97c \ubc15\ud0c8\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc774\ub7ec\ud55c \ubc95\uc548\uc740 \uccad\uc18c\ub144\uc758 \uc628\ub77c\uc778 \uc548\uc804 \uad50\uc721\ubcf4\ub2e4 \ucc45\uc784\uc744 \ud68c\ud53c\ud558\ub294 \ud589\uc704\uac00 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc811\uadfc\uc131 \uc81c\ud55c\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uae0d\uc815\uc801\uc778 \ud65c\uc6a9 \uae30\ud68c\ub97c \ucc28\ub2e8\ud558\uac8c \ub429\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uaddc\uc81c\ub294 \uc9c0\ub098\uce58\uac8c \uacbd\uc9c1\ub418\uc5b4 \uae09\ubcc0\ud558\ub294 \ub514\uc9c0\ud138 \ud658\uacbd\uc758 \ubcc0\ud654\uc5d0 \ud6a8\uacfc\uc801\uc73c\ub85c \ub300\uc751\ud558\uc9c0 \ubabb\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubc95\uc801 \uc81c\ud55c\uc740 \uace0\ub9bd\ub41c \ubb38\uc81c \ud574\uacb0\ucc45\uc77c \ubfd0\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc81c\ud55c\uc801 \uc811\uadfc\uc740 \ucc3d\uc758\uc131\uacfc \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc5b5\uc81c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uadf8\ub9ac\uace0 \ubc95\uc801 \uaddc\uc81c\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uc815\ubcf4\uc758 \uc790\uc720\ub85c\uc6b4 \ud750\ub984\uc744 \uc81c\ud55c\ud560 \uc218 \uc788\ub294 \ubd80\uc791\uc6a9\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801\uc778 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\uc758 \ub514\uc9c0\ud138 \uae30\uc220 \ubc1c\uc804\uacfc \ucc3d\uc758\ub825\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc778\ud130\ub137 \uc790\uc720\ub97c \uc81c\ud55c\ud558\ub294 \uac83\uc740 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc7a5\uce58\ub294 \uc720\uc5f0\uc131\uc774 \ubd80\uc871\ud558\uc5ec \ubcc0\ud654\ud558\ub294 \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0 \uc989\uac01\uc801\uc778 \ub300\uc751\uc744 \ud558\uc9c0 \ubabb\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc0ac\uc6a9 \uc81c\ud55c\uc740 \ubd80\ubaa8\uc758 \uad50\uc721 \uc5ed\ud560\uc744 \ud574\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\uac00 \ud63c\ud569 \ud615\ud0dc\ub85c \uc6b4\uc601\ub418\ub354\ub77c\ub3c4 \uacb0\uad6d \uc81c\ub3c4\uc801 \ud55c\uacc4\uac00 \ub530\ub985\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc81c\ud55c\ud558\ub294 \uac83\uc740 \ubbf8\uc131\ub144\uc790\uc758 \ud45c\ud604\uc758 \uc790\uc720\ub97c \ubd88\ud544\uc694\ud558\uac8c \uce68\ud574\ud569\ub2c8\ub2e4","\uc624\ud788\ub824 \ubc95\uc801 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc5ed\ud6a8\uacfc\ub97c \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801\uc778 \uae08\uc9c0\ub294 \uccad\uc18c\ub144\uc758 \uc790\uc728\uc131\uacfc \ucc45\uc784\uac10 \ubc1c\ub2ec\uc5d0 \ubd80\uc815\uc801 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0 \ud544\uc218\uc801\uc778 \uae30\uc220\uc744 \ud559\uc2b5\ud560 \uae30\ud68c\ub97c \uc5b5\uc81c\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc774 \uc81c\ud55c\ub418\uba74 \uc815\ubcf4 \uc811\uadfc\uc131\uc774 \ud604\uc800\ud788 \uc904\uc5b4\ub4ed\ub2c8\ub2e4","\uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ud638\uae30\uc2ec\uacfc \ud0d0\uad6c \ub2a5\ub825\uc744 \uc5b5\uc81c\ud560 \uc218 \uc788\uc73c\uba70, \uc624\ud788\ub824 \uae08\uc9c0\ub41c \uac83\uc5d0 \ub300\ud55c \ud0d0\ub2c9\uc744 \uc720\ubc1c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc774 \uc790\uce6b \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ucc3d\uc758\uc131\uacfc \uc790\uae30 \ud45c\ud604\uc744 \uc81c\ud55c\ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801\uc778 \uc81c\ud55c\uc740 \uccad\uc18c\ub144\uc758 \uac1c\uc778\uc801 \uc790\uc720\uc640 \uc131\uc7a5 \uae30\ud68c\ub97c \uacfc\ub3c4\ud558\uac8c \uc5b5\uc555\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc548\uc740 \uae30\uc220\uacfc \uc0ac\ud68c \ubcc0\ud654\uc5d0 \ubbfc\ucca9\ud558\uac8c \ub300\uc751\ud558\uc9c0 \ubabb\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\uc758 \uc8fc\uccb4\uc801\uc778 \uc0ac\uace0\uc640 \ucc45\uc784\uac10\uc744 \uc800\ud574\ud560 \uac00\ub2a5\uc131\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uaddc\uc81c\ub294 \uad50\uc721\uc801 \uaca9\ucc28\ub97c \uc545\ud654\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uaddc\uc81c\ub294 \ubb38\uc81c \ud574\uacb0\ubcf4\ub2e4 \ud68c\ud53c\ub85c \uc774\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc811\uadfc\uc744 \uc81c\ud55c\ud558\uba74 \ud45c\ud604\uc758 \uc790\uc720\uac00 \uce68\ud574\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubc95\uc801 \uc81c\uc7ac\ub97c \ud1b5\ud574 \ubaa8\ub4e0 \uc544\uc774\ub4e4\uc774 \ub3d9\ub4f1\ud55c \ubcf4\ud638\ub97c \ubc1b\uac8c \ud558\ub824\ub294 \uc2dc\ub3c4\ub294 \uc790\uc6d0\uc758 \ubd88\ucda9\ubd84 \ubb38\uc81c\ub85c \uc778\ud574 \uc5ed\uc124\uc801\uc73c\ub85c \ubd88\ud3c9\ub4f1\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud65c\uc6a9\uc5d0\uc11c \uae0d\uc815\uc801\uc778 \uce21\uba74\uc744 \uac04\uacfc\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc548\uc740 \uc624\ud788\ub824 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc811\uadfc\uc744 \uc81c\ud55c\ud568\uc73c\ub85c\uc368 \uadf8\ub4e4\uc774 \ub2e4\ub978 \ube44\uacf5\uc2dd\uc801 \uacbd\ub85c\ub97c \ud1b5\ud574 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0 \uc811\uadfc\ud558\uac8c \ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubc95\uc801 \uc81c\ub3c4\ubcf4\ub2e4","\ub458\uc9f8, \uae30\uc220\uc801 \uc81c\ud55c\uc740 \uccad\uc18c\ub144\uc758 \uc815\ubcf4 \uc811\uadfc\uad8c\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc77c\ub960\uc801\uc778 \ubc95\uc801 \uaddc\uc81c\ub294 \uc624\ud788\ub824 \ubd88\uade0\ud615\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801\uc778 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\uc758 \ucc45\uc784\uac10\uc744 \ubc30\uc591\ud558\ub294 \ub370 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc81c\ud55c\uc801\uc778 \uaddc\uc81c\ub85c\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0 \uac00\ub2a5\uc131\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc800\ud574\ud560 \uc6b0\ub824\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\ub294 \uc624\ud788\ub824 \uae30\uc220\uc758 \ubc1c\uc804\uacfc \uc801\uc751\uc744 \ub2a6\ucd94\uace0, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ud544\uc694\ud55c \uae30\uc220\uc744 \uc2b5\ub4dd\ud560 \uae30\ud68c\ub97c \ub193\uce58\uac8c \ub9cc\ub4ed\ub2c8\ub2e4","\uac10\uae08\uacfc \uac19\uc740 \uc81c\ud55c\uc740 \uc544\uc774\ub4e4\uc758 \uc758\uc874\uc131\uacfc \ubc18\ubc1c\uc2ec\uc744 \uc99d\uac00\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\uc6a9 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud558\uae30\ubcf4\ub2e4\ub294 \uadf8\ub4e4\uc758 \ub514\uc9c0\ud138 \uc774\ud574\uc640 \uc8fc\uccb4\uc131\uc744 \uc800\ud558\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ucc3d\uc758\uc131\uacfc \uc790\uae30 \ud45c\ud604\uc758 \uae30\ud68c\ub97c \ubc15\ud0c8\ub2f9\ud560 \uc6b0\ub824\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc81c\uc7ac\ub294 \uccad\uc18c\ub144\uc758 \uc628\ub77c\uc778 \uacbd\ud5d8\uc744 \uc81c\ud55c\ud560 \uc218 \uc788\uace0 \uc774\ub85c \uc778\ud574 \uadf8\ub4e4\uc758 \ubaa9\uc18c\ub9ac\ub97c \uc5b5\uc555\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\uc740 \uc720\uc5f0\uc131\uc774 \ub5a8\uc5b4\uc9c0\uba70 \ubcc0\ud654\ud558\ub294 \uae30\uc220 \ud658\uacbd\uc5d0 \ubc1c \ube60\ub974\uac8c \ub300\uc751\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uc81c\ud55c\uc801\uc778 \ubc95\uc548\uc740 \uccad\uc18c\ub144\uc758 \uae30\uc220\uc801 \ub2a5\ub825 \ubc1c\uc804\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc77c\ub960\uc801\uc778 \uaddc\uc81c\ub294 \ubb38\ud654\uc801, \uc0ac\ud68c\uc801 \ucc28\uc774\ub97c \uace0\ub824\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc81c\ud55c\uc740 \ud604\uc2e4\uc801\uc73c\ub85c \ubaa8\ub4e0 \ubbf8\uc131\ub144\uc790\uc5d0\
