 \uc9c0\uc6d0 \ud504\ub85c\uadf8\ub7a8\uacfc \uc628\ub77c\uc778 \uad50\uc721 \uc790\uc6d0\uc744 \ud1b5\ud574 \uc5b4\ub290 \uc815\ub3c4 \ud574\uc18c\uac00 \uac00\ub2a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uac00 \uc801\uadf9\uc801\uc73c\ub85c \ucc38\uc5ec\ud558\uc5ec \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubaa8\ub2c8\ud130\ub9c1\ud558\uace0 \uc9c0\ub3c4\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \ucc45\uc784 \uc788\ub294 \uc628\ub77c\uc778 \ud589\ub3d9\uc744 \uc7a5\ub824\ud558\uace0 \ub2e4\uc591\ud55c \uc790\uc6d0\uc744 \uc81c\uacf5\ud558\ub294 \ucee4\ubba4\ub2c8\ud2f0\ub97c \uc870\uc131\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uae30\uc220\uc801 \uc81c\ud55c\uacfc \ubd80\ubaa8\uc758 \uc5ed\ud560\uc744 \uac15\ud654\ud558\uc5ec, \uccad\uc18c\ub144\ub4e4\uc774 \uc548\uc804\ud55c \ud658\uacbd\uc5d0\uc11c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\uc6d0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc80a\uc740 \uc138\ub300\uc5d0\uac8c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \uac00\ub974\uce58\ub294 \uae30\ud68c\uac00 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc0ac\uc758 \uc5ed\ud560\uc744 \uac15\ud654\ud558\uc5ec \uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc62c\ubc14\ub974\uac8c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\ub3c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uc2e0\uc5d0 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc801\uc808\ud55c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc744 \uc81c\uacf5\ud574\uc57c \ud569\ub2c8\ub2e4","\uc790\uc728\uc801\uc778 \uc0ac\uc6a9 \ud658\uacbd\uc5d0\uc11c \uccad\uc18c\ub144\uc758 \uc2a4\uc2a4\ub85c \ud310\ub2e8\ub825\uacfc \ucc45\uc784\uac10\uc744 \uae30\ub974\ub294 \uac83\uc774 \uc7a5\uae30\uc801\uc73c\ub85c \uc548\uc804\ud55c \uc778\ud130\ub137 \uc0ac\uc6a9 \ubb38\ud654\ub97c \uc870\uc131\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uad50\uc721\uacfc \uc815\ubcf4 \uc81c\uacf5\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc704\ud5d8\uc131\uc744 \uc778\uc2dd\ud558\uace0 \uc62c\ubc14\ub974\uac8c \uc0ac\uc6a9\ud558\ub294 \ubc29\ubc95\uc744 \ubc30\uc6b0\ub3c4\ub85d \uc9c0\uc6d0\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uac00 \uc790\ub140\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uac10\ub3c5\ud558\uba74\uc11c \uad50\uc721\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc904 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c \ub300\uc2e0 \ub514\uc9c0\ud138 \ubb38\ud574\ub825\uc744 \ub192\uc774\ub294 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \uc0ac\uc6a9\uc790\ub294 \uc2a4\uc2a4\ub85c \ucc45\uc784 \uc788\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubc30\uc6cc\uc57c \ud569\ub2c8\ub2e4. [\uc18c\uc15c \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc\ub97c \ud64d\ubcf4\ud558\ub294] \ucee4\uba3c \uc13c\uc2a4 \ubbf8\ub514\uc5b4\ub294 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uacfc \ubd80\ubaa8\uc758 \uc9c0\uce68\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc774 \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\ub294 \uac83\uc774 \ud544\uc694\ud558\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc758 \ud655\ub300\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \ub514\uc9c0\ud138 \uae30\uc220 \uc2b5\ub4dd\uc740 \ubbf8\ub798\uc758 \uc9c1\uc5c5 \uc900\ube44\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ud544\uc218\uc801\uc778 \ub514\uc9c0\ud138 \uc2dc\ubbfc\uc758\uc2dd\uacfc \ucc45\uc784\uac10\uc744 \ubc30\uc6b8 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud574\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubcf4\ud638\uc790\ub098 \uc131\uc778\uc758 \uac10\ub3c5\uc744 \uac15\ud654\ud560 \uc218 \uc788\ub294 \uc194\ub8e8\uc158\uc774 \ud6a8\uacfc\uc801\uc774\uba70 \ud604\uc2e4\uc801\uc785\ub2c8\ub2e4. [\uc628\ub77c\uc778 \ubcf4\uc548 \uc18c\ud504\ud2b8\uc6e8\uc5b4 \uac1c\ubc1c \ud68c\uc0ac \ub9e5\uc544\ud53c]\ub294 \ubd80\ubaa8\ub4e4\uc774 \uc790\ub140\uc758 \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \ubaa8\ub2c8\ud130\ub9c1\ud558\uace0 \uad00\ub9ac\ud560 \uc218 \uc788\ub294 \ub2e4\uc591\ud55c \uae30\ub2a5\uc744 \uc81c\uacf5\ud558\ub294 \uc18c\ud504\ud2b8\uc6e8\uc5b4\ub97c \uac1c\ubc1c\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub97c \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc774 \uc7a0\uc7ac\uc801\uc778 \uc704\ud5d8 \uc694\uc18c\uc5d0 \ub178\ucd9c\ub418\uc9c0 \uc54a\ub3c4\ub85d \uc801\uadf9\uc801 \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \uc704\ud55c \ub178\ub825\uc740 \uad50\uc721\uc744 \ud1b5\ud55c \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc \uc99d\uc9c4\uc73c\ub85c\ub3c4 \uc774\ub8e8\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4. [\uccad\uc18c\ub144 \ubbf8\ub514\uc5b4 \uad50\uc721\uc744 \uc9c0\uc6d0\ud558\ub294] \uc720\ud29c\ube0c\ub294 \uad50\uc721 \uc790\ub8cc\uc640 \ud234\uc744 \uc81c\uacf5\ud558\uc5ec \uccad\uc18c\ub144\uacfc \uad50\uc721\uc790\uac00 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc704\ud5d8\uc744 \uc798 \uc774\ud574\ud558\uace0 \uc801\uc808\ud788 \ub300\ucc98\ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc6b0\ub9ac\ub294 \uad50\uc721\uc758 \uc9c0\uc18d\uc801\uc778 \ubc1c\uc804\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc774 \uc810\uc810 \ub354 \ub2a5\ub3d9\uc801\uc774\uace0 \ucc45\uc784\uac10 \uc788\uac8c \uc628\ub77c\uc778\uc5d0\uc11c \ud589\ub3d9\ud558\ub3c4\ub85d \uc720\ub3c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uad50\uc721\uacfc \uc778\uc2dd\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\uc774 \uc2a4\uc2a4\ub85c \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud658\uacbd\uc744 \uad00\ub9ac\ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\uc6d0\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4. [\uc778\ud130\ub137 \uc548\uc804\uc744 \ucd09\uc9c4\ud558\ub294 \ube44\uc601\ub9ac \ub2e8\uccb4 \ud328\ubc00\ub9ac \uc628\ub77c\uc778 \uc138\uc774\ud504\ud2f0 \uc778\uc2a4\ud2f0\ud29c\ud2b8]\ub294 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uacfc \uc790\uc6d0\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc774 \uc548\uc804\ud558\uac8c \ub514\uc9c0\ud138 \ud658\uacbd\uc744 \ud0d0\uc0c9\ud558\uace0, \ube44\ud310\uc801 \uc0ac\uace0\ub97c \uae30\ub97c \uc218 \uc788\ub3c4\ub85d \ub3d5\ub294 \uac83\uc774 \ud6a8\uacfc\uc801\uc774\ub77c\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\uc774\uc640 \ud568\uaed8, \uc548\uc804\ud55c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc774 \ub9c8\ub828\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub514\uc9c0\ud138 \uad50\uc721\uc758 \uaca9\ucc28\ub97c \ud574\uc18c\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc9c0\uc5ed \uc0ac\ud68c\uc640 \ud559\uad50\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uac00 \uc5ed\ud560\uc744 \ucda9\uc2e4\ud788 \ud568\uc73c\ub85c\uc368 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubcf4\ub2e4 \uac74\uac15\ud558\uac8c \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \ud604\uc2e4 \uc138\uacc4\uc758 \ubb38\uc81c\ub97c \uc778\uc2dd\ud558\uace0 \ub300\ucc98\ud558\ub294 \ub2a5\ub825\uc744 \uae30\ub974\ub294 \ub370 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c\ub294 \ub514\uc9c0\ud138 \uc138\uacc4\uc5d0\uc11c\uc758 \uc790\uae30 \uc8fc\ub3c4\uc801 \ud559\uc2b5\uacfc \uc5ed\ub7c9 \uac1c\ubc1c\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uad50\uc721\uacfc \uc778\uc2dd \uc81c\uace0\ub97c \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uae0d\uc815\uc801, \ubd80\uc815\uc801 \uce21\uba74\uc744 \uc778\uc9c0\ud558\uace0, \uc548\uc804\ud55c \uc0ac\uc6a9 \ubc29\ubc95\uc744 \ubc30\uc6b0\ub3c4\ub85d \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc758 \uc5ed\ud560\uc744 \uac15\ud654\ud558\uc5ec \uc790\ub140\ub4e4\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubaa8\ub2c8\ud130\ub9c1\ud558\uace0 \uad00\ub9ac\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uacfc \uad00\ub828\ub41c \ubb38\uc81c \ud574\uacb0\uc740 \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud3ec\ud568\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uacbd\uacc4\ud558\uae30\ubcf4\ub2e4\ub294 \uc774\ub97c \ud1b5\ud574 \uccad\uc18c\ub144\uc774 \ud544\uc694\ud55c \uae30\uc220\uc744 \uc2b5\ub4dd\ud558\ub3c4\ub85d \uc720\ub3c4\ud574\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8\ub098 \ubcf4\ud638\uc790\uac00 \uccad\uc18c\ub144\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc9c1\uc811\uc801\uc73c\ub85c \uac00\uc774\ub4dc\ud558\uace0 \ubaa8\ub2c8\ud130\ub9c1\ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uad50\uc721\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\uac00 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uac74\uac15\ud558\uac8c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub514\uc9c0\ud138 \uad50\uc721\uacfc \ubd80\ubaa8\uc758 \uc5ed\ub7c9 \uac15\ud654\ub97c \ud1b5\ud574 \uc720\ud574 \ud658\uacbd\uc5d0 \ub300\ud55c \ub300\uc751\ub825\uc744 \ub192\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0\uc11c\uc758 \ucc45\uc784 \uc788\ub294 \ud589\ub3d9\uc744 \uad50\uc721\ud558\uba74\uc11c \uac1c\uc778\uc758 \uc790\uc728\uc131\uc744 \uc874\uc911\ud558\ub294 \uac83\uc774 \ub354 \ub098\uc740 \ub300\uc548\uc785\ub2c8\ub2e4. [\ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc640 \uac1c\uc778\uc815\ubcf4 \ubcf4\ud638\ub97c \uc9c0\uc6d0\ud558\ub294 \uae30\uc220 \uae30\uc5c5\uc778] \ub9c8\uc774\ud06c\ub85c\uc18c\ud504\ud2b8\ub294 \uad50\uc721\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc774 \uc815\ubcf4 \uacfc\ubd80\ud558\uc640 \uae30\uc220 \ubc1c\uc804\uc5d0 \uc790\ub9bd\uc801\uc73c\ub85c \ub300\ucc98\ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\ub294 \uac83\uc774 \uc911\uc694\ud558\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721 \uae30\uad00\uc774 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud65c\uc6a9\uc744 \uc9c0\ub3c4\ud558\uace0 \uad50\uc721\ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc0ac\ub4e4\uc774 \uccad\uc18c\ub144\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud65c\ub3d9\uc744 \ubaa8\ub2c8\ud130\ub9c1\ud558\uace0 \ub300\ud654\ub97c \ud1b5\ud574 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc9c0\ub3c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud65c\uc6a9\uc740 \uc0b6\uc758 \uc911\uc694\ud55c \ubd80\ubd84\uc774\uba70, \uc774\ub97c \uc81c\ud55c\ud558\ub294 \ub300\uc2e0 \uad50\uc721\uc801 \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \uc62c\ubc14\ub978 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uba3c\uc800, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\ub97c \uc9c0\uc6d0\ud558\ub294 \uccb4\uacc4\uc801 \uad50\uc721 \uc81c\ub3c4\ub97c \uac15\ud654\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4. '\ubbf8\uad6d \uac00\uc871 \uc5f0\uad6c \ud611\ud68c'(AFA)\ub294 \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uac00 \uc790\ub140\uc758 \ub514\uc9c0\ud138 \ud658\uacbd\uc744 \uc774\ud574\ud558\uace0 \uad00\ub9ac\ud558\ub294 \ub370 \ud544\uc694\ud55c \uad50\uc721\uc744 \ubc1b\ub294 \uac83\uc774 \uc911\uc694\ud558\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc11c\ub4dc\ud30c\ud2f0 \uae30\uc5c5\uacfc\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc758 \ud655\uc0b0\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uacfc \uad00\ub828\ub41c \ubd80\uc791\uc6a9\uc744 \ud574\uacb0\ud558\uae30 \uc704\ud574\uc11c\ub294 \uccad\uc18c\ub144\uacfc \ubd80\ubaa8, \uad50\uc721\uc790\uc5d0\uac8c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc744 \uc81c\uacf5\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uccad\uc18c\ub144\uc758 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc640 \ucc45\uc784 \uc788\ub294 \uc0ac\uc6a9\uc744 \ucd09\uc9c4\ud558\ub294 \uac83\uc774 \ub354 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc790\uc728\uc131\uacfc \ucc45\uc784\uac10\uc744 \ud0a4\uc6b0\ub294 \uac83\uc774 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uac74\uac15\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc2b5\uad00\uc744 \ud615\uc131\ud558\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\uadf8\ub7fc\uc5d0\ub3c4 \ubbf8\uc131\ub144\uc790\uc758 \uc815\uc2e0\uc801 \ubc0f \uc815\uc11c\uc801 \uac74\uac15\uc744 \uc704\ud574\uc11c\ub294 \uac1c\ubcc4 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\ub4e4\uc774 \uc0ac\uc6a9\uc790 \uad50\uc721\uc744 \uc6b0\uc120\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubaa8\ub4e0 \ubd80\ubaa8\uc640 \uad50\uc0ac\uac00 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc5d0 \uc775\uc219\ud558\uc9c0 \uc54a\ub354\ub77c\ub3c4, \uc9c0\uc5ed \uc0ac\ud68c \ubc0f \ud559\uad50\uc640\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \uc774\ub97c \ubcf4\uc644\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \uac15\ud654\ud558\uc5ec \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc640 \uc790\uae30 \uc870\uc808 \ub2a5\ub825\uc744 \uac00\ub974\uce58\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc2e4\uc9c8\uc801\uc778 \uad50\uc721\uacfc \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc2a4\uc2a4\ub85c \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\uc2b5\ub2c8\ub2e4","\uc0ac\ud68c\uc801, \ubb38\ud654\uc801 \ucc28\uc774\uac00 \uc874\uc7ac\ud558\ub294 \ud604\uc2e4\uc5d0\uc11c, \ubaa8\ub4e0 \uac00\uc815\uc5d0\uc11c \ub3d9\uc77c\ud55c \uc218\uc900\uc758 \ub514\uc9c0\ud138 \uad50\uc721\uc744 \uc81c\uacf5\ud558\uae30\ub294 \uc5b4\ub824\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uad50\uc721 \ubc0f \uc778\uc2dd \uc81c\uace0\ub97c \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ud6a8\uacfc\uc801\uc73c\ub85c \uc9c0\ub3c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc758 \ubc1c\ub2ec\uc774 \uac00\uc815\uc5d0\uc11c \ucda9\ubd84\ud788 \uc774\ub8e8\uc5b4\uc9c0\uc9c0 \uc54a\uc558\ub2e4\ub294 \uc810\uc740 \ud604\uc2e4\uc801\uc73c\ub85c \uac1c\uc120\uc758 \uc5ec\uc9c0\uac00 \uc788\uc2b5\ub2c8\ub2e4. [\uc778\ud130\ub137 \uacbd\uc81c\uc758 \uacbd\uc7c1\ub825 \uac15\ud654\ub97c \ubaa9\ud45c\ub85c \ud558\ub294] \uc804\uc790\ud504\ub860\ud2f0\uc5b4\uc7ac\ub2e8\uc740 \ub514\uc9c0\ud138 \uc548\uc804 \uad50\uc721\uc774 \uac00\uc815, \ud559\uad50, \uc9c0\uc5ed \uc0ac\ud68c \uc218\uc900\uc5d0\uc11c \ub3d9\uc2dc\uc5d0 \uc774\ub8e8\uc5b4\uc838\uc57c \ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc778\ud130\ub137 \uc548\uc804 \uad50\uc721 \ubc0f \uc0ac\uc6a9 \uc9c0\uce68\uc774 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\uc6a9\uc790 \uad50\uc721\uacfc \ud568\uaed8 \ubd80\ubaa8\uc758 \ucc38\uc5ec\ub97c \ucd09\uc9c4\ud558\uc5ec \ubbf8\uc131\ub144\uc790\uc758 \ub514\uc9c0\ud138 \uc548\uc804\uc744 \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uccad\uc18c\ub144\ub4e4\uc774 \ub514\uc9c0\ud138 \uc9c0\uc2dd\uacfc \ube44\ud310\uc801 \uc0ac\uace0 \ub2a5\ub825\uc744 \uae30\ub974\ub294 \ub370\ub294 \uc2e4\uc81c \uc0ac\uc6a9 \ud658\uacbd\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \uc790\ub140 \uac04\uc758 \uc18c\ud1b5\uc744 \ud1b5\ud55c \uc790\uc728\uc801\uc778 \uc628\ub77c\uc778 \uad00\ub9ac\uac00 \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc628\ub77c\uc778 \uc0c1\uc758 \ubd80\uc815\uc801\uc778 \uacbd\ud5d8\uc744 \ub300\ucc98\ud560 \uc218 \uc788\ub3c4\ub85d \uad50\uc721\ud560 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubd80\ubaa8\uc640 \uccad\uc18c\ub144\uc774 \ud568\uaed8 \uac74\uac15\ud55c \uc0ac\uc6a9 \uc2b5\uad00\uc744 \uac1c\ubc1c\ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\uc6d0\ud558\uae30 \uc704\ud574 \ub2e4\uc591\ud55c \uc790\uc6d0\uacfc \ub3c4\uad6c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc6b0\uc120, \uc774\ub7ec\ud55c \uc628\ub77c\uc778 \uc704\ud5d8\uc5d0 \ub300\ucc98\ud558\uae30 \uc704\ud574\uc11c\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ubd80\ubaa8\uac00 \ubaa8\ub4e0 \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0 \ub300\ud55c \uc9c0\uc2dd\uc744 \uac16\ucd94\uae30\ub294 \uc5b4\ub824\uc6b8 \uc218 \uc788\uc73c\ubbc0\ub85c, \uacf5\ub3d9\uccb4\uc640 \uc0ac\ud68c\uc801 \uc9c0\uc6d0\uc744 \ud1b5\ud574 \uc774\ub7ec\ud55c \ube48\ud2c8\uc744 \ubcf4\uc644\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c \uc5c6\uc774 \uccad\uc18c\ub144\ub4e4\uc774 \ucc45\uc784\uac10 \uc788\uac8c \uc778\ud130\ub137\uc744 \uc0ac\uc6a9\ud558\ub294 \ubc29\ubc95\uc744 \ud559\uc2b5\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4. [\uccad\uc18c\ub144 \ub300\uc0c1 \ub514\uc9c0\ud138 \uad50\uc721\uc744 \uc9c0\uc6d0\ud558\ub294 \uae30\uc220 \uae30\uc5c5\uc778] \uad6c\uae00\uc740 \uccad\uc18c\ub144\ub4e4\uc774 \uc628\ub77c\uc778\uc5d0\uc11c\uc758 \ucc45\uc784 \uc788\ub294 \ud589\ub3d9\uacfc \uc0ac\uc774\ubc84 \ubcf4\uc548\uc5d0 \uad00\ud55c \uad50\uc721\uc744 \ud1b5\ud574 \ub514\uc9c0\ud138 \uc138\uacc4\uc5d0\uc11c \uc548\uc804\ud558\uac8c \ud0d0\ud5d8\ud560 \uc218 \uc788\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\ub4e4\uc740 \ubd80\ubaa8\uc640 \ud568\uaed8 \ud611\ub825\ud558\ub294 \ud504\ub85c\uadf8\ub7a8\uc744 \uac15\ud654\ud558\uc5ec \ubd80\ubaa8\uac00 \uc790\ub140\uc758 \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \ub354 \ud6a8\uacfc\uc801\uc73c\ub85c \ubaa8\ub2c8\ud130\ub9c1\ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8\uc758 \uc801\uadf9\uc801\uc778 \ucc38\uc5ec\uc640 \uad00\uc5ec\ub294 \ubbf8\uc131\ub144\uc790\uc758 \uac74\uac15\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc720\ub3c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721\uc801 \uc811\uadfc\uc740 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc2a4\uc2a4\ub85c \uc628\ub77c\uc778 \uc0c1\uc758 \uc704\ud5d8 \uc694\uc18c\ub97c \uc778\uc2dd\ud558\uace0 \ub300\ucc98\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \ud0a4\uc6cc\uc904 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \uc788\uc5b4\uc11c \ubd80\ubaa8\uc640 \uad50\uc721 \uae30\uad00\uc758 \uc5ed\ud560\uc744 \uac15\ud654\ud568\uc73c\ub85c\uc368 \uccad\uc18c\ub144\ub4e4\uc774 \uc548\uc804\ud558\uac8c \ud50c\ub7ab\ud3fc\uc744 \ud65c\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4. \"Common Sense Media\"\ub294 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc744 \uc81c\uacf5\ud568\uc73c\ub85c\uc368 \uc628\ub77c\uc778\uc5d0\uc11c \uc548\uc804\ud558\uac8c \ud65c\ub3d9\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \ud0a4\uc6b0\ub294 \uac83\uc774 \uc911\uc694\ud558\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721 \uae30\uad00\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud55c\ub370, \uadf8\ub4e4\uc740 \uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc5b4\ub5bb\uac8c \ucc45\uc784 \uc788\uac8c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub294\uc9c0 \uad50\uc721\ud558\ub294 \ub370 \uc911\uc810\uc744 \ub450\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721 \uae30\uad00\uc744 \ud1b5\ud55c \uc9c0\ub3c4\uc640 \uc9c0\ub3c4\uac00 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\uac8c \ub9cc\ub4dc\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\uc758 \ubbf8\ub514\uc5b4 \ud65c\ub3d9\uc744 \uac10\uc2dc\ud558\uace0 \uad8c\uc7a5\ud560 \uc218 \uc788\ub294 \uc9c0\uc5ed \uc0ac\ud68c \uc911\uc2ec\uc758 \ud504\ub85c\uadf8\ub7a8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uac74\uac15\ud558\uac8c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub294 \ud658\uacbd\uc744 \uc870\uc131\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uc801\uc808\ud55c \uae30\uc220\uc801 \uc9c0\uc6d0\uc744 \uc81c\uacf5\ud558\uba74 \ubd80\ubaa8\ub098 \uad50\uc721\uc790\uac00 \uc790\ub140\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ub354 \ud6a8\uc728\uc801\uc73c\ub85c \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc815\ubcf4 \uacfc\ubd80\ud558\uc640 \uc815\uc2e0\uac74\uac15 \ubb38\uc81c\ub97c \uacaa\uc744 \uc218 \uc788\uae30 \ub54c\ubb38\uc5d0 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc744 \ud1b5\ud574 \ubb38\uc81c \ub300\uc751 \ub2a5\ub825\uc744 \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uccad\uc18c\ub144\ub4e4\uc774 \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud558\uae30 \uc704\ud574\uc11c\ub294 \ubd80\ubaa8\uc640 \uad50\uc0ac\uc758 \ubc00\uc811\ud55c \uad00\ucc30\uacfc \uc9c0\ub3c4\ub3c4 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uccad\uc18c\ub144\uc758 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \uc99d\uc9c4\uc2dc\ucf1c\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\uc758 \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","TikTok\uc740 \uc9e7\uc740 \ube44\ub514\uc624 \ucf58\ud150\uce20 \ud50c\ub7ab\ud3fc\uc744 \ud1b5\ud574 \uc804 \uc138\uacc4 \uc218\ub9ce\uc740 \ubbf8\uc131\ub144 \uc0ac\uc6a9\uc790\ub97c \ubcf4\uc720\ud558\uace0 \uc788\uc73c\uba70, \ubd80\ubaa8\uc640 \uc790\ub140\ub97c \uc704\ud55c \ub2e4\uc591\ud55c \uc548\uc804 \uae30\ub2a5\uacfc \ud29c\ud1a0\ub9ac\uc5bc\uc744 \uc81c\uacf5\ud568\uc73c\ub85c\uc368 \ucc45\uc784 \uc788\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ub3c5\ub824\ud560 \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uccad\uc18c\ub144\ub4e4\uc774 \ubcc0\ud654\ud558\ub294 \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0\uc11c \uc801\uc751\ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\uc6d0\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc81c\ud55c \uc5c6\uc774 \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uac00 \uae30\uc220\uc744 \ud65c\uc6a9\ud558\uc5ec \uc790\ub140\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uad00\ub9ac\ud560 \uc218 \uc788\ub294 \ud658\uacbd\uc744 \uc870\uc131\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc0ac\uc758 \uc801\uadf9\uc801\uc778 \uc5ed\ud560\uc774 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc548\uc804\ud558\uac8c \ub9cc\ub4e4 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud574 \ubd80\ubaa8\ub098 \uad50\uc721\uc790\uac00 \uac00\uc774\ub4dc\ub77c\uc778\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \uc5ec\uc9c0\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801\uc778 \ud2c0 \ub300\uc2e0 \uc815\ubd80 \uc8fc\ub3c4\uc758 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \ubaa8\ub4e0 \uac00\uc815\uc5d0\uac8c \uc628\ub77c\uc778 \uc548\uc804 \uad50\uc721\uc744 \uc81c\uacf5\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uad00\ub828 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc774 \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0\uc11c \uc790\uc2e0\uc744 \ubcf4\ud638\ud558\uace0 \uc801\uc808\ud788 \ub300\ucc98\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \uac16\ucd94\ub3c4\ub85d \ud574\uc57c \ud569\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uac00\uc815\uc5d0\uc11c \ucda9\ubd84\ud55c \uc9c0\ub3c4\ub97c \ubc1b\uc9c0 \ubabb\ud558\ub294 \uc0c1\ud669\uc744 \ub300\ube44\ud558\uc5ec, \ud559\uad50\uc5d0\uc11c \uc8fc\ub3c4\uc801\uc73c\ub85c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \ud504\ub85c\uadf8\ub7a8\uc744 \ub9c8\ub828\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \ud559\uad50\uc640 \uc9c0\uc5ed \uc0ac\ud68c\uc5d0\uc11c\uc758 \ud3ec\uad04\uc801\uc778 \ub514\uc9c0\ud138 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubd80\ubaa8\ub2d8 \ubfd0\ub9cc \uc544\ub2c8\ub77c \uc0ac\ud68c \uc804\uccb4\uac00 \uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ucc45\uc784\uac10 \uc788\uac8c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\uce68\uc744 \uc81c\uacf5\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc5b4\ub9b0 \uc0ac\uc6a9\uc790\ub4e4\uc758 \uad50\uc721\uc744 \uac15\ud654\ud558\uc5ec \ucc45\uc784 \uc788\ub294 \ub514\uc9c0\ud138 \uc0ac\uc6a9 \ubb38\ud654\ub97c \uc870\uc131\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub514\uc9c0\ud138 \uc2dc\ubbfc\uc73c\ub85c\uc11c\uc758 \uad50\uc721\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc544\ub3d9\uc758 \uc815\uc2e0 \uac74\uac15\uc5d0 \ub300\ud55c \uc6b0\ub824\uac00 \uc788\ub354\ub77c\ub3c4, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud559\uc2b5\uacfc \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc704\ud55c \uc911\uc694\ud55c \ud50c\ub7ab\ud3fc\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uac00\uc815\uacfc \ud559\uad50 \uad50\uc721\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc740 \uc548\uc804\ud558\uace0 \ucc45\uc784\uac10 \uc788\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ubc30\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uad50\uc721\uacfc \ubd80\ubaa8\uc758 \uc9c0\ub3c4\ub97c \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc740 \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0\uc11c\uc758 \uc704\ud5d8\uc744 \uc778\uc2dd\ud558\uace0 \ub300\ucc98\ud558\ub294 \ub2a5\ub825\uc744 \uae30\ub97c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721\uacfc \ubd80\ubaa8\uc758 \uc5ed\ud560\uc774 \uac15\uc870\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\ub4e4\uc740 \ubd80\ubaa8 \ubc0f \uad50\uc0ac\ub4e4\uacfc\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\uc758 \uc548\uc804\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc9c0\uc6d0\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud558\ub294 \ud6a8\uacfc\uc801\uc778 \ubc29\ubc95\uc740 \uad50\uc721\uc744 \ud1b5\ud55c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uac15\ud654\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub514\uc9c0\ud138 \uc2dc\ub300\uc758 \uc8fc\uccb4\ub85c\uc11c \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc790\uc5f0\uc2a4\ub7ec\uc6b4 \uc0ac\uc6a9\ubc95\uc744 \uc775\ud788\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc548\uc804\ud558\uace0 \uac74\uac15\ud558\uac8c \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\uc6d0\ud558\ub294 \ub370 \uc911\uc810\uc744 \ub450\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc774\ubbf8 \uc874\uc7ac\ud558\ub294 \ub2e4\uc591\ud55c \ub514\uc9c0\ud138 \ub3c4\uad6c\ub97c \ud1b5\ud574 \ud3c9\ub4f1\ud55c \uad50\uc721 \uae30\ud68c\ub97c \ud6a8\uc728\uc801\uc73c\ub85c \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubbf8\uc131\ub144\uc790 \uc2a4\uc2a4\ub85c\uac00 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc2dc \uacbd\uacc4\uc2ec\uc744 \uac16\uace0 \ubb38\uc81c\ub97c \uc778\uc9c0\ud560 \uc218 \uc788\ub3c4\ub85d \ud558\ub294 \uc140\ud504 \ub9ac\uade4\ub808\uc774\uc158(Self-regulation) \uad50\uc721\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","TikTok\uc744 \uc18c\uc720\ud55c ByteDance\ub294 \ubd80\ubaa8\uc640 \ud50c\ub7ab\ud3fc \uc6b4\uc601\uc790\uac00 \ud611\ub825\ud558\uc5ec \uc801\uc808\ud55c \uac00\uc774\ub4dc\ub77c\uc778\uacfc \ud234\uc744 \uc81c\uacf5\ud568\uc73c\ub85c\uc368, \uccad\uc18c\ub144\ub4e4\uc774 \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud65c\uc6a9\ud560 \uc218 \uc788\uc744 \uac83\uc774\ub77c\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub514\uc9c0\ud138 \ubb38\ud574\ub825\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uccad\uc18c\ub144\uc740 \ub514\uc9c0\ud138 \ud658\uacbd \uc18d\uc5d0\uc11c\uc758 \ucc45\uc784\uac10 \uc788\ub294 \uc0ac\uc6a9\uc744 \ubc30\uc6b8 \uae30\ud68c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\ub4e4\uc774 \ub514\uc9c0\ud138 \ud50c\ub7ab\ud3fc\uc758 \uc704\ud5d8\uc744 \uc778\uc2dd\ud558\uace0 \uc774\ub97c \ud5e4\uccd0\ub098\uac08 \uc218 \uc788\ub294 \uc5ed\ub7c9\uc744 \uac16\ucd94\ub3c4\ub85d \ub3c4\uc640\uc8fc\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc548\uc804 \uae30\ub2a5\uc744 \ud65c\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\ub294 \ud504\ub85c\uadf8\ub7a8\uc774 \ub9c8\ub828\ub420 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\ub4e4\uc774 \uc2a4\uc2a4\ub85c \ucc45\uc784\uac10 \uc788\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ud558\ub294 \uac83\uc774 \uc911\uc694\ud55c \uad50\uc721\uc801 \ubaa9\ud45c\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uae30\uc220\uc801 \uc9c4\ubcf4\ub294 \ube60\ub974\uac8c \ubcc0\ud654\ud558\ub294 \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0 \uc801\uc751\ud558\uace0 \ub300\uc751\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc740 \uc628\ub77c\uc778\uc0c1\uc5d0\uc11c \ub354\uc6b1 \ud6a8\uacfc\uc801\uc73c\ub85c \uc790\uc2e0\uc744 \ubcf4\ud638\ud558\uace0 \uc758\uc0ac\uc18c\ud1b5\ud558\ub294 \ubc29\ubc95\uc744 \ud559\uc2b5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc815\ubcf4 \ud310\ubcc4 \ub2a5\ub825\uc744 \ud0a4\uc6b8 \uc218 \uc788\uc73c\uba70, \uc774\ub294 \uc798\ubabb\ub41c \uc815\ubcf4 \ud655\uc0b0\uc5d0 \ub300\uc751\ud558\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220\uc801\uc73c\ub85c \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uac00 \ub354 \uc27d\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uad00\ub9ac\ud560 \uc218 \uc788\ub3c4\ub85d \ud558\ub294 \ub3c4\uad6c\ub97c \uac1c\ubc1c \ubc0f \uc81c\uacf5\ud574\uc57c \ud569\ub2c8\ub2e4. '\uc138\uacc4 \uc804\uc790 \ud504\ub860\ud2f0\uc5b4 \uc7ac\ub2e8'(EFF)\uc740 \ubd80\ubaa8\ub4e4\uc774 \uc811\uadfc\ud560 \uc218 \uc788\ub294 \uad00\ub9ac \ub3c4\uad6c\uac00 \uc911\uc694\ud558\uba70, \uc774\ub97c \ud1b5\ud574 \uc790\ub140\ub4e4\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ub354 \uc798 \ubaa8\ub2c8\ud130\ub9c1\ud560 \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uac00 \uc790\uc2e0\uc758 \uc790\ub140\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc9c1\uc811 \uad00\ub9ac\ud560 \uc218 \uc788\ub3c4\ub85d \ub3c4\uc640\uc8fc\ub294 \uc9c0\uc6d0\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud55c \ubd80\uc815\uc801 \uc601\ud5a5\uc774 \uc6b0\ub824\ub420 \uacbd\uc6b0, \ubd80\ubaa8\uc640 \uccad\uc18c\ub144\uc774 \ud568\uaed8 \uc124\uc815\ud560 \uc218 \uc788\ub294 \uc0ac\uc6a9\uc790 \ud658\uacbd \uc81c\uc5b4\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc0ac\uc6a9\uc790 \ubcf4\ud638 \uae30\ub2a5\uc744 \uac15\ud654\ud558\uace0 \ubd80\ubaa8\uc640\uc758 \ucee4\ubba4\ub2c8\ucf00\uc774\uc158\uc744 \ucd09\uc9c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc758 \ud53c\ub4dc\ubc31\uacfc \uac00\uc871 \uac04\uc758 \ub300\ud654\uac00 \uccad\uc18c\ub144\uc758 \uc62c\ubc14\ub978 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc9c0\uc6d0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uacc4\uc18d\ud574\uc11c \uccad\uc18c\ub144\ub4e4\uc774 \uc9c1\uba74\ud560 \uc218 \uc788\ub294 \uc0c8\ub85c\uc6b4 \uc704\ud5d8\uc5d0 \ub300\ube44\ud558\uc5ec \uc811\uadfc\uc131\uc744 \uc870\uc815\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc62c\ubc14\ub978 \uad50\uc721\uacfc \uc9c0\uce68\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\uac00 \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\ub294 \uac83\uc774 \ub354 \uc911\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uac74\uac15\ud55c \uc628\ub77c\uc778 \uc2b5\uad00\uc744 \ud615\uc131\ud558\ub3c4\ub85d \ub3d5\ub294 \uac83\uc774 \uad81\uadf9\uc801\uc778 \ud574\uacb0\ucc45\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4 \uc2a4\uc2a4\ub85c\uac00 \ub514\uc9c0\ud138 \ubb38\ud654\ub97c \uc774\ud574\ud558\uace0 \ucc45\uc784\uac10 \uc788\uac8c \uc0ac\uc6a9\ud558\ub294 \ub2a5\ub825\uc744 \ud0a4\uc6b0\uac8c \ub420 \uae30\ud68c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ubaa8\ub4e0 \uac00\uc815\uc774 \ub3d9\uc77c\ud55c \uad50\uc721\uc801 \uae30\ud68c\ub97c \uc81c\uacf5\ud560 \uc218 \uc5c6\ub294 \uc0c1\ud669\uc5d0\uc11c, \uacf5\uacf5\uae30\uad00\uacfc \ud559\uad50\uac00 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ud3ec\ud568\ud55c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc744 \uac15\ud654\ud574\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uccad\uc18c\ub144\ub4e4\uc740 \ub514\uc9c0\ud138 \uc138\uacc4\uc5d0\uc11c\uc758 \ube44\ud310\uc801 \uc0ac\uace0\ub97c \ud1b5\ud574 \ubc29\uc5b4 \ub2a5\ub825\uc744 \ud0a4\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4. [\uccad\uc18c\ub144 \ubbf8\ub514\uc5b4 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \uc6b4\uc601\ud558\ub294] \ub514\uc9c0\ud138 \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc \ud611\ud68c\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uad50\uc721\uc744 \ud1b5\ud574 \uc628\ub77c\uc778 \uc704\ud5d8\uc744 \uc778\uc2dd\ud558\uace0 \uc774\uc5d0 \ub300\ube44\ud560 \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\uc5d0\uac8c \ud544\uc694\ud55c \ub514\uc9c0\ud138 \uc548\uc804 \uad50\uc721\uc744 \uc704\ud55c \uacf5\uacf5 \ubc0f \ubbfc\uac04 \ud611\ub825\uc774 \ub354\uc6b1 \ud65c\ubc1c\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220\uc758 \ubc1c\uc804\uc73c\ub85c \uc778\ud55c \ubaa8\ub2c8\ud130\ub9c1 \uc2dc\uc2a4\ud15c\uacfc \uad50\uc721 \ud50c\ub7ab\ud3fc\uc774 \uad6c\ucd95\ub41c\ub2e4\uba74, \uc9c0\uc5ed\uc801, \uacbd\uc81c\uc801 \uaca9\ucc28\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc548\uc804\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\ubc95\uc744 \ud559\uc2b5\ud560 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uc810\uc9c4\uc801\uc774\uace0 \uccb4\uacc4\uc801\uc778 \ub514\uc9c0\ud138 \uad50\uc721\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc740 \ub514\uc9c0\ud138 \uc0ac\ud68c\uc5d0\uc11c\uc758 \uc18c\uc591\uc744 \uac16\ucdb0\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc5d0\uac8c \uc2e4\uc9c8\uc801\uc778 \ub3c4\uad6c\uc640 \ub9ac\uc18c\uc2a4\ub97c \uc81c\uacf5\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4. \"National PTA\"\ub294 \ud559\ubd80\ubaa8\ub4e4\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \uc81c\uacf5\ud558\uace0 \uc790\ub140\uc758 \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \ubaa8\ub2c8\ud130\ub9c1\ud558\uace0 \uc9c0\ub3c4\ud560 \uc218 \uc788\ub294 \ub2e4\uc591\ud55c \ub9ac\uc18c\uc2a4\ub97c \uc81c\uacf5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uad81\uadf9\uc801\uc73c\ub85c \ubaa8\ub4e0 \uccad\uc18c\ub144\uc774 \uad50\uc721\uc744 \ud1b5\ud574 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \uade0\ub4f1\ud558\uac8c \ubc30\uc6b8 \uc218 \uc788\ub3c4\ub85d \uc815\ucc45\uc801\uc778 \uc9c0\uc6d0\uc774 \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub514\uc9c0\ud138 \ubb38\ud574\ub825\uc740 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \ud544\uc218\uc801\uc778 \uae30\uc220\uc785\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \uae30\uc220 \ubc1c\uc804\uc744 \uc774\uc6a9\ud558\uc5ec \ubd80\ubaa8\ub098 \ubcf4\ud638\uc790\uac00 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubaa8\ub2c8\ud130\ub9c1\ud558\uace0 \uad00\ub9ac\ud560 \uc218 \uc788\ub294 \ub3c4\uad6c\ub4e4\uc774 \uc774\ubbf8 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uccad\uc18c\ub144\ub4e4\uc774 \ud50c\ub7ab\ud3fc \uc0ac\uc6a9\uc5d0 \uc788\uc5b4\uc11c \uc2a4\uc2a4\ub85c \ucc45\uc784\uac10\uc744 \uac16\ub3c4\ub85d \ud558\ub294 \ubb38\ud654 \uc870\uc131\uc774 \uc911\uc694\ud569\ub2c8\ub2e4. \"YouTube\"\ub294 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \ucc45\uc784\uac10 \uc788\ub294 \ucf58\ud150\uce20 \uc18c\ube44 \ubc0f \ucc3d\uc791\uc744 \uc7a5\ub824\ud558\uae30 \uc704\ud574 \ub2e4\uc591\ud55c \uad50\uc721 \ucea0\ud398\uc778\uc744 \uc9c4\ud589\ud558\uace0 \uc788\ub2e4\uace0 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ud559\uad50\uc640 \uac00\uc815\uc740 \uc678\ubd80 \uae30\uad00\uc758 \uc9c0\uc6d0\uc744 \ubc1b\uc74c\uc73c\ub85c\uc368 \ube60\ub974\uac8c \ubcc0\ud654\ud558\ub294 \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0 \ub300\ud55c \uc801\uc751\ub825\uc744 \ub192\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721 \uae30\uad00\uc758 \uc5ed\ud560\uc744 \uac15\ud654\ud558\uc5ec \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc9c0\ub3c4\ud558\uace0 \ubaa8\ub2c8\ud130\ub9c1\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub354\uc6b1 \uc911\uc694\ud55c \uac83\uc740 \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uac00 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uac10\ub3c5\ud558\uace0 \uc9c0\ub3c4\ud558\ub294 \uc5ed\ud560\uc744 \ub9e1\uc544\uc57c \ud560 \uac83\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc758 \uc5ed\ud560\uc744 \ud655\ub300\ud558\uc5ec \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721\uacfc \uac10\ub3c5\uc744 \uccb4\uacc4\ud654\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub2e4\uc74c\uc73c\ub85c, \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0\uc11c\uc758 \uae30\uc220\uc801 \uc2b5\ub4dd\uc740 \ud544\uc218\uc801\uc774\uba70, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc77c\ucc0d\ubd80\ud130 \uae30\uc220\uc5d0 \uc775\uc219\ud574\uc9c8 \uae30\ud68c\ub97c \ub9c9\uc544\uc11c\ub294 \uc548 \ub429\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uc5ec\ub7ec\ubd84\uc774 \uc6b0\ub824\ud560 \uc218 \uc788\ub294 \ubbf8\uc131\ub144\uc790\uc758 \uc548\uc804 \ubb38\uc81c\uc5d0 \ub300\ud574 \uc9c1\uc811 \ub300\uc751\ud558\uc790\uba74, \uccad\uc18c\ub144\ub4e4\uc774 \uc774\ubbf8 \uc774\ub7ec\ud55c \ud50c\ub7ab\ud3fc\uc744 \ud1b5\ud574 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc640 \uc628\ub77c\uc778 \uc548\uc804 \uae30\uc220\uc744 \ubc30\uc6b0\uace0 \uc788\ub2e4\ub294 \uc810\uc744 \uace0\ub824\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc774 \uc2a4\uc2a4\ub85c \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0 \ub354 \ub2a5\uc219\ud574\uc9d0\uc73c\ub85c\uc368, \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ubcf4\ub2e4 \ud6a8\uacfc\uc801\uc774\uace0 \ud604\uc2e4\uc801\uc778 \uc9c0\ub3c4\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ubbf8\uc131\ub144\uc790\uc5d0 \ub300\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc9c0\uc18d\uc801\uc778 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uccad\uc18c\ub144\uc740 \uaddc\uc81c\ub97c \ud1b5\ud55c \uc81c\ud55c\ubcf4\ub2e4\ub294 \ucc45\uc784\uac10\uc744 \uac00\uc9c4 \ub514\uc9c0\ud138 \uc2dc\ubbfc\uc73c\ub85c \uc131\uc7a5\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uac00 \uc8fc\ub3c4\ud558\ub294 \uc9c0\uc18d\uc801\uc774\uba70 \uc77c\uad00\ub41c \uad50\uc721\uacfc \ubaa8\ub2c8\ud130\ub9c1\uc740 \ubbf8\uc131\ub144\uc790\uac00 \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud558\ub294 \ub370 \ub9e4\uc6b0 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220\uc801 \ub3c4\uad6c\uc640 \ucee4\ubba4\ub2c8\ud2f0\ub97c \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc774 \uc2a4\uc2a4\ub85c \ucc45\uc784\uc744 \uc9c0\uace0 \uac74\uac15\ud55c \uc628\ub77c\uc778 \uc2b5\uad00\uc744 \uac16\ucd94\ub3c4\ub85d \uc548\ub0b4\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc740 \uc704\ud5d8\uc744 \uc778\uc2dd\ud558\uace0 \ub300\ucc98\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \uae30\ub97c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220\uacfc \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub294 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \ud544\uc218\uc801\uc778 \uc5ed\ub7c9\uc73c\ub85c \uc790\ub9ac\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uacfc \uad00\ub828\ub41c \ubb38\uc81c\ub97c \uc798 \uad00\ub9ac\ud558\ub3c4\ub85d \uad50\uc721\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0 \ud544\uc694\ud55c \uae30\uc220\uc801 \ub2a5\ub825\uc744 \ud568\uc591\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \ubc15\ud0c8\ud574\uc11c\ub294 \uc548 \ub429\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \uac1c\uc778\uacfc \uac00\uc871\uc758 \uc120\ud0dd\uc774\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\ud68c \uc804\ubc18\uc758 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \uac15\ud654\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ubaa8\ub4e0 \ubd80\ubaa8\ub098 \uad50\uc721\uc790\uac00 \uc62c\ubc14\ub974\uac8c \uc9c0\ub3c4\ud560 \uc218 \uc788\ub294 \uc0c1\ud669\uc774 \uc544\ub2d0 \uc218 \uc788\ub2e4\ub294 \uc810\uc740 \ub9de\uc9c0\ub9cc, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc811\uadfc \uac00\ub2a5\ud55c \uad50\uc721 \uc790\uc6d0\uc744 \uc81c\uacf5\ud558\ub294 \uac83\uc774 \ubc14\ub78c\uc9c1\ud569\ub2c8\ub2e4. '\uc720\uc5d4 \uad50\uc721\uacfc\ud559\ubb38\ud654\uae30\uad6c(UNESCO)'\ub294 \uad50\uc721\uc758 \uc811\uadfc\uc131\uc744 \ub192\uc774\ub294 \uac83\uc774 \uccad\uc18c\ub144\uc758 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \ud5a5\uc0c1\uc5d0 \ud544\uc218\uc801\uc774\ub77c\uace0 \uc5b8\uae09\ud569\ub2c8\ub2e4","\uacbd\uc81c\uc801 \uc601\ud5a5 \uc774\uc678\uc5d0\ub3c4 \uc7a5\uae30\uc801\uc778 \uad00\uc810\uc5d0\uc11c \uac74\uac15\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \ubb38\ud654\uc758 \ud655\ub9bd\uc740 \uad50\uc721\uacfc \ud568\uaed8 \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4. [\uc804 \uc138\uacc4\uc801\uc73c\ub85c \ud070 \uc0ac\uc6a9\uc790 \uae30\ubc18\uc744 \uac00\uc9c4 \ucf58\ud150\uce20 \ud50c\ub7ab\ud3fc] \uc720\ud29c\ube0c\ub294 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721 \uc9c0\uc6d0\uc744 \ud1b5\ud574 \uc0ac\uc6a9\uc790\ub4e4\uc774 \uac74\uac15\ud55c \ubc29\ubc95\uc73c\ub85c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud65c\uc6a9\ud560 \uc218 \uc788\uac8c \ub3d5\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\ub4e4\uc774 \ubaa8\ub4e0 \ub514\uc9c0\ud138 \uc774\uc288\uc5d0 \ub300\uc751\ud558\uae30 \uc5b4\ub824\uc6cc\ub3c4 \uac00\uc774\ub4dc\ub77c\uc778\uacfc \uc870\uc9c1\uc758 \uc9c0\uc6d0\uc744 \ud1b5\ud574 \ubcf4\ub2e4 \ud6a8\uacfc\uc801\uc73c\ub85c \uc790\ub140\ub97c \uc9c0\ub3c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4. [\uccad\uc18c\ub144\uc744 \uc704\ud55c \ub514\uc9c0\ud138 \uad50\uc721\uc744 \uc120\ub3c4\ud558\ub294 \uae30\uc220 \uad50\uc721 \ud50c\ub7ab\ud3fc\uc778] Khan Academy\ub294 \ubd80\ubaa8\uc640 \uc790\ub140\uc5d0\uac8c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721 \uc790\ub8cc\ub97c \uc81c\uacf5\ud568\uc73c\ub85c\uc368 \ub514\uc9c0\ud138 \uc2dc\ub300\uc758 \ubd80\ubaa8 \uc5ed\ud560\uc744 \uc9c0\uc6d0\ud55c\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\ub4e4\uc740 \ubd80\ubaa8\uc640 \uad50\uc721\uae30\uad00\uacfc\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uac15\ud654 \ud504\ub85c\uadf8\ub7a8\uc744 \ub3c4\uc785\ud558\uc5ec \uccad\uc18c\ub144 \ubcf4\ud638\uc5d0 \uc55e\uc7a5\uc11c\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc62c\ubc14\ub974\uac8c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \uad50\uc721\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc744 \ud1b5\ud574 \ubb38\uc81c\ub97c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc62c\ubc14\ub978 \ub514\uc9c0\ud138 \uc2dc\ubbfc\uad50\uc721\uc744 \uc81c\uacf5\ud558\ub294 \uac83\uc774 \ub354\uc6b1 \uc911\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, TechNet\uc740 \ub514\uc9c0\ud138 \uad50\uc721\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc774 \uc548\uc804\ud55c \uc778\ud130\ub137 \uc0ac\uc6a9\ubc95\uc744 \ud559\uc2b5\ud558\ub294 \uac83\uc774 \uc911\uc694\ud558\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub192\uc740 \uc218\uc900\uc758 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubaa8\ub4 825\uac1c\ubc1c\uae30\uad6c(OECD)'\ub294 \uc815\ubd80\uc640 \uae30\uc5c5 \uac04\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \ub514\uc9c0\ud138 \ud658\uacbd\uc758 \uc548\uc804\uc131\uc744 \ub192\uc77c \uc218 \uc788\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ud50c\ub7ab\ud3fc\uc758 \uc790\uc728\uc801\uc778 \uaddc\uc81c\uac00 \ubc95\uc801\uc778 \uc81c\ud55c\ubcf4\ub2e4 \uc720\uc5f0\ud558\uace0 \uc2e0\uc18d\ud55c \ub300\uc751\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ud50c\ub7ab\ud3fc\uc740 \uc704\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ub2e4\uc591\ud55c \uc548\uc804 \uc7a5\uce58\ub97c \ub9c8\ub828\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220 \uc0b0\uc5c5\uc740 \uc774\ub7ec\ud55c \ubb38\uc81c\ub4e4\uc5d0 \ub300\ucc98\ud558\uae30 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ubc1c\uc804\uc744 \uc774\ub8e8\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220 \ud601\uc2e0\uc744 \ud1b5\ud55c \ubb38\uc81c \ud574\uacb0\uc5d0 \uc9d1\uc911\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ud50c\ub7ab\ud3fc \uc790\uccb4\uc758 \uc548\uc804\uc131\uc744 \ub192\uc774\ub294 \ub370 \uc9d1\uc911\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uae30\ubcf8\uc801\uc778 \ubc95\uc801 \uc548\uc804\ub9dd\ubcf4\ub2e4 \ud50c\ub7ab\ud3fc\uc774 \ucc45\uc784\uc744 \uc9c0\ub3c4\ub85d \ud558\ub294 \uac83\uc774 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc548\uc744 \ud1b5\ud574 \ubb38\uc81c\ub97c \uc5b5\uc81c\ud558\ub824\uace0 \ud558\uae30\ubcf4\ub2e4, \ud50c\ub7ab\ud3fc\uacfc\uc758 \ud611\ub825\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220\uc801 \ub3c4\uad6c\ub97c \ud1b5\ud55c \uac10\ub3c5\uc774 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uae30\uc220 \ud601\uc2e0\uc744 \ud1b5\ud574 \uad50\uc721 \uc811\uadfc\uc131\uc744 \ub192\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 d569\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721 \uc2dc\uc2a4\ud15c\uc758 \uc9c0\uc6d0\uc744 \uc704\ud55c \uacf5\ub3d9\uccb4\uc801 \ub178\ub825\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc9c0\uc5ed \uc0ac\ud68c\uc640 \ud559\uad50\uac00 \ud611\ub825\ud558\uc5ec \ud3ec\uad04\uc801\uc778 \uc9c0\uc6d0 \ub124\ud2b8\uc6cc\ud06c\ub97c \uad6c\ucd95\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8 \ubc0f \uad50\uc721\uc790\uc640\uc758 \ud611\ub825\uc774 \ub354\uc6b1 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ud559\uad50\uc640 \uc0ac\ud68c \uae30\uad00\uc744 \ud1b5\ud55c \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801\uc73c\ub85c \uc81c\ud55c\ud558\ub294 \uac83\ubcf4\ub2e4 \ub2e4\uc591\ud55c \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \ubd80\ubaa8\uc640 \uad50\uc0ac\uc5d0\uac8c \uae30\uc220\uc801 \uc5ed\ub7c9\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubcf4\ud638\uc758 \ucc45\uc784\uc740 \ubd80\ubaa8\uc640 \ucee4\ubba4\ub2c8\ud2f0\uc5d0\ub3c4 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ubcf4\ud638\uc790\uc640 \uad50\uc0ac\uc758 \uc5ed\ud560 \uac15\ud654\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc9c0\uc18d\uc801\uc778 \ub300\ud654\ub97c \ud1b5\ud574 \ubd80\ubaa8\uc640 \uad50\uc721\uc790 \uac04\uc758 \ud611\ub825\uc744 \uc99d\uc9c4\ud558\uc5ec \uc77c\uad00\ub41c \uc9c0\uce68\uc744 \uc124\uc815\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc758 \uc5ed\ud560\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \ud575\uc2ec\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721 \uae30\uad00\uc758 \uc9c0\ub3c4\uac00 \uac15\ud654\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uad50\uc721\uacfc \ubcf4\uc870\ub97c \ud1b5\ud574 \ubd80\ubaa8\ub4e4\uacfc \uad50\uc721\uc790\ub4e4\uc774 \ub354 \uc798 \uc900\ube44\ub420 \uc218 \uc788\ub3c4\u 1\uc5d0 \uae0d\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce69\ub2c8\ub2e4","\uc14b\uc9f8, \uc80a\uc740 \uc0ac\uc6a9\uc790\ub4e4\uc5d0\uac8c \uc790\uc728\uc131\uc744 \uc8fc\ub294 \uac83\uc774 \uadf8\ub4e4\uc758 \uc628\ub77c\uc778 \ud589\ub3d9\uc744 \ub354 \uc131\uc219\ud558\uac8c \ub9cc\ub4ed\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc758 \uc7a5\uc744 \ub9c8\ub828\ud558\uc5ec \uccad\uc18c\ub144\uc758 \uc815\uc11c\uc801 \uac74\uac15\uc744 \uc9c0\uc6d0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uacf5\uc801, \uc0ac\uc801 \ud1a0\ub860\uc758 \uc7a5\uc774 \ub418\uc5b4 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc0ac\ud68c\uc801\uc73c\ub85c \uc911\uc694\ud55c \uc774\uc288\uc5d0 \ucc38\uc5ec\ud560 \uc218 \uc788\uac8c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \ub2e4\uc591\ud55c \uc758\uacac\uc744 \uc811\ud558\uace0 \ube44\ud310\uc801 \uc0ac\uace0\ub97c \uae30\ub97c \uc218 \uc788\ub294 \ud50c\ub7ab\ud3fc\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc790\uc2e0\ub4e4\uc758 \ubaa9\uc18c\ub9ac\ub97c \ud45c\ud604\ud558\uace0, \ub354 \ud070 \uc0ac\ud68c\uc801 \ubb38\uc81c\uc5d0 \ub300\ud55c \ucc38\uc5ec\ub97c \ub3c5\ub824\ud558\ub294 \ud50c\ub7ab\ud3fc\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc790\uae30 \ud45c\ud604\uc758 \uc7a5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4. '\uad6d\uc81c\uc5f0\ud569\uc544\ub3d9\uae30\uae08(UNICEF)'\uc5d0 \ub530\ub974\uba74, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc790\uc2e0\uc758 \ubaa9\uc18c\ub9ac\ub97c \ub0b4\uace0 \ub3c5\ucc3d\uc131\uc744 \ud45c\ud604\ud560 \uc218 \uc788\ub294 \ud50c\ub7ab\ud3fc\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \ucc3d\uc791\uacfc \ud45c\ud604\uc758 \uacf5\uac04\uc744 \uc81c\uacf5\ud558\uba70, \uc774\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc790\uc2e0\uc758 \uc7ac\ub2a5\uc744 \ubc1c\ud718\ud558\uace0 \ucc3d\uc758\uc131\uc744 \ud0a4\uc6b0\ub294 \ub370\uc5d0 \uc720\uc6a9\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc790\uc2e0\uc758 \ucc3d\uc758\uc131\uacfc \ud45c\ud604\ub825\uc744 \ubc1c\ud718\ud560 \uc218 \uc788\ub294 \uacf5\uac04\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ucc3d\uc758\uc131\uacfc \ud45c\ud604\ub825\uc744 \ubc1c\ud718\ud560 \uc218 \uc788\ub294 \uc7a5\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud55c \uae0d\uc815\uc801\uc778 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc740 \ubbf8\uc131\ub144\uc790\ub4e4 \uac04\uc758 \uc911\uc694\ud55c \uc5f0\uacb0\uace0\ub9ac\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc80a\uc740\uc774\ub4e4\uc5d0\uac8c \uc911\uc694\ud55c \uc790\uae30 \ud45c\ud604\uc758 \uc7a5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc5d0\uac8c \ucc3d\uc758\ub825\uacfc \uc790\uae30 \ud45c\ud604\uc758 \uc7a5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc774 \uc790\uae30 \uad00\ub9ac\ub97c \ubc30\uc6b0\uace0 \uac10\uc815\uc801\uc73c\ub85c \uc131\uc7a5\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ucc3d\uc758\ub825\uacfc \ud45c\ud604\ub825\uc744 \uc99d\uc9c4\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uccad\uc18c\ub144\ub4e4\uc758 \uc2e4\uc81c \uacbd\ud5d8\uacfc \uadf8\uc5d0 \ub300\ud55c \ud53c\ub4dc\ubc31\uc744 \ubc18\uc601\ud558\uc5ec \uc815\uce58 e4\uc5d0\uac8c \uc911\uc694\ud55c \ud50c\ub7ab\ud3fc\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc774\uc6a9\uc740 \ucc3d\uc758\ub825\uacfc \uc790\uae30 \ud45c\ud604\uc744 \ucd09\uc9c4\ud558\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uad00\uacc4 \uad6c\ucd95\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc0ac\ud68c\uc801 \ud65c\ub3d9\uacfc \ucc38\uc5ec\ub97c \uacbd\ud5d8\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0\uc11c\uc758 \ucc3d\uc758\uc801\uc778 \ud45c\ud604 \uae30\ud68c\ub294 \uccad\uc18c\ub144\uc758 \uc790\uae30\uacc4\ubc1c\uacfc \ubbf8\ub798 \uc9c4\ub85c \ud0d0\uc0c9\uc5d0 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \ud615\uc131\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \uacf5\uac04\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \ucc3d\uc758\uc131\uacfc \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc99d\uc9c4\uc2dc\ud0b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uad00\uacc4 \ud615\uc131\uacfc \uc720\uc9c0\ub97c \ub3d5\ub294 \uc911\uc694\ud55c \ub9e4\uac1c\uccb4\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc740 \uc0ac\ud68c\uc801 \uc5f0\uacb0\ub9dd\uc744 \ud615\uc131\ud558\uace0 \uc720\uc9c0\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc5bb\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e 01 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \ubb38\uc81c\ub97c \uc774\ud574\ud558\uace0 \uc2a4\uc2a4\ub85c \ub300\ucc98\ud558\ub3c4\ub85d \ub3d5\ub294 \uac83\uc774 \ubcf4\ub2e4 \uc9c0\uc18d\uc801\uc778 \ud574\uacb0\ucc45\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\ud68c\uc801 \ucc45\uc784\uc758\uc2dd\uc744 \ub192\uc774\ub294 \uac83\uc774 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\uc5d0 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uac1c\uc778 \uc815\ubcf4 \ubcf4\ud638\uc5d0 \uad00\ud55c \ubb38\uc81c\ub3c4 \ubbf8\uc131\ub144\uc790\ub97c \uc9c0\ub3c4\ud568\uc73c\ub85c\uc368 \ub354 \uc548\uc804\ud558\uac8c \ub2e4\ub8f0 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \ud2c0\ubcf4\ub2e4\ub294 \ub2e4\uc591\ud55c \uc0ac\ud68c\uc801 \uc790\uc6d0\uacfc\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\uc758 \ud1a0\ub300\ub97c \ud615\uc131\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uad50\uc721\uc774 \uc989\uac01\uc801\uc778 \ubcf4\ud638\ub97c \uc81c\uacf5\ud558\uc9c0 \uc54a\ub354\ub77c\ub3c4, \uc9c0\uc18d\uc801\uc778 \uc9c0\uc6d0\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\uac00 \uc548\uc804\ud55c \uc120\ud0dd\uc744 \ud560 \uc218 \uc788\ub3c4\ub85d \uc900\ube44\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc0ac\uc6a9\uc744 \ubd80\ubaa8\ub098 \uc131\uc778\uc774 \uc9c0\ub3c4\ud558\ub294 \uac83\uc740 \uac1c\ubcc4 \uac00\uc815\uc758 \ucc45\uc784\uc774\uba70, \uc774\ub294 \ubc95\uc801 \ud1b5\uc81c\ub85c \ud574\uacb0\ub420 \ubb38\uc81c\uac00 \uc544\ub2d9\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640\uc758 \uc18c\ud1b5\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \ubbf8\uc131\ub144\uc790\uac00 \uc9c1\uba74\ud560 \uc704\ud5d8 \uc694\uc18c\ub97c \uc904\uc774\ub294 \ub370 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub2e4\uc591\ud55c \uad50\uc721\uc801 \ud504\ub85c\uadf8\ub7a8\uc740 \ubbf8\uc131\ub144\uc790\uac00 \uc9c1\uba74\ud560 \uc218 \uc788\ub294 \uc704\ud5d8 \uc694\uc18c\ub97c \uc778\uc2dd\ud558\uace0 \ub300\uc751\ud558\ub294 \ub370 \ud06c\uac8c \ub3c4\uc6c0\uc744 \uc904 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\ud68c\uc801 \uacf5\ub3d9\uccb4\uc758 \ucc38\uc5ec\ub97c \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub97c \uc548\uc804\ud558\uac8c \ubcf4\ud638\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub294 \uad50\uc721 \ubc0f \ubd80\ubaa8\uc758 \uc9c0\ub3c4\uc640 \uad00\ub9ac\ub85c \ucda9\ubd84\ud788 \uac1c\uc120\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\uc5d0\uac8c \uc815\ubcf4 \uac80\uc99d\uc758 \uc911\uc694\uc131\uc744 \uac00\ub974\uce58\ub294 \uac83\uc774 \ud6a8\uacfc\uc801\uc778 \uc608\ubc29\ucc45\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubaa8\ub4e0 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ub3d9\uc77c\ud55c \uaddc\uc81c\ub97c \uc801\uc6a9\ud558\ub294 \uac83\ubcf4\ub2e4, \uac1c\uc778\uc758 \ubc1c\ub2ec \ub2e8\uacc4\uc640 \ud658\uacbd\uc5d0 \ub9de\ucd98 \ub9de\ucda4\ud615 \uc9c0\ub3c4\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uad50\uc721\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\uc758 \uc790\uc728\uc801\uc778 \ud310\ub2e8 \ub2a5\ub825\uc744 \ud0a4\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\uc5d0\uac8c \ucc45\uc784\uac10\uc744 \uc2ec\uc5b4\uc8fc\ub294 \uac83\uc740 \ubc95\uc801 \uaddc\uc81c\ubcf4\ub2e4 \uad50\uc721\uacfc \uc790\uc728\uc801\uc778 \uacbd\ud5d8\uc5d0\uc11c \ube44\ub86f\ub429\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\uc758 \uc815\uc2e0 \uac74\uac15\uacfc \uad00\ub828\ub41c \ubb38\uc81c\ub294 \uc81c\ud55c\ubcf4\ub2e4\ub294 \ud50c\ub7ab\ud3fc \ucc28\uc6d0\uc758 \ucc45\uc784 \uac15\ud654\uc640 \uc0ac\uc6a9\uc790 \ubcf4\ud638 \uae30\ub2a5 \uac1c\uc120\uc774 \uc6b0\uc120\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc138\ubd80\uc801\uc778 \uaddc\uc81c\ubcf4\ub2e4\ub294 \ud50c\ub7ab\ud3fc \ub0b4\uc758 \ub2e4\uc591\ud55c \uae30\ub2a5\uc744 \uac15\ud654\ud558\uc5ec \uccad\uc18c\ub144\uc758 \uc815\uc2e0 \uac74\uac15\uc744 \ubcf4\ud638\ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc9c0\uc5ed \uc0ac\ud68c\uc640 \ud559\uad50\uac00 \ud568\uaed8\ud558\ub294 \uc9c0\uc18d\uc801\uc778 \uad50\uc721 \ud655\uc7a5\uc740 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\uc5d0 \ud070 \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \ucee4\ubba4\ub2c8\ud2f0 \uae30\ubc18\uc758 \uc9c0\uc6d0 \uccb4\uacc4 \uad6c\ucd95\uc774 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\uc5d0 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uaddc\uc81c\uac00 \uc544\ub2cc \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c \uad6c\ucd95\uc774 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\uc758 \uadfc\ubcf8\uc801\uc778 \ud574\uacb0\ucc45\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \uc0ac\ud68c\uc801 \uc9c0\uc6d0\uacfc \uad50\uc721\uc744 \ud1b5\ud574 \uac1c\uc120\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc815\ubd80\uc758 \uacfc\ub3c4\ud55c \uac1c\uc785\ubcf4\ub2e4\ub294 \uc790\uc728 \uaddc\uc81c\uac00 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\uc5d0 \ub354 \uc720\uc5f0\ud558\uac8c \uc791\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc608\ubc29\uc801 \uc870\uce58\ub97c \ud1b5\ud574 \uccad\uc18c\ub144 \uc0ac\uc6a9\uc790\uc758 \uc548\uc804\uc744 \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc801\uc808\ud55c \uad50\uc721\uacfc \ubcf4\ud638 \uc870\uce58\ub97c \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc704\ud5d8 \uc694\uc18c\ub97c \uc0ac\uc804\uc5d0 \uc778\uc2dd\ud558\uace0 \ub300\ucc98\ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc77c\uc815\ud55c \uaddc\uc81c\uac00 \uc544\ub2cc \uc790\uc728\uc801 \uc0ac\uc6a9\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud568\uc73c\ub85c\uc368, \ubbf8\uc131\ub144\uc790\ub294 \ucc45\uc784\uac10\uc744 \ubc30\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc815\uc2e0 \uac74\uac15\uc5d0 \ub300\ud55c \uc6b0\ub824\ub294 \uaddc\uc81c\uac00 \uc544\ub2cc \ud3ec\uad04\uc801\uc778 \uad50\uc721\uacfc \uc9c0\uc6d0\uc758 \ubb38\uc81c\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uad50\uc721\uacfc \uc9c0\uc6d0\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ubc95\uc801 \uc870\uce58\ubcf4\ub2e4\ub294 \uc2e4\uc2dc\uac04 \uc9c0\uc6d0 \uccb4\uacc4\ub97c \uac15\ud654\ud558\uc5ec \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud558\ub294 \uac83\uc774 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc62c\ubc14\ub978 \ud310\ub2e8 \ub2a5\ub825\uc744 \ud0a4\uc6b0\ub294 \ub370\ub294 \ubc95\uc801 \uc81c\uc7ac\ubcf4\ub2e4\ub294 \uc778\uc2dd \ubcc0\ud654\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\uad50\uc721\uacfc \uc0ac\ud68c\uc801 \uc9c0\uc6d0\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc704\ud5d8\ud55c \uc0c1\ud669\uc5d0\uc11c \uc2a4\uc2a4\ub85c\ub97c \ubcf4\ud638\ud560 \uc218 \uc788\ub294 \uc5ed\ub7c9\uc744 \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc911\ub3c5 \ubb38\uc81c\ub294 \uc870\uae30 \uad50\uc721\uacfc \uc9c0\uc6d0\uc744 \ud1b5\ud574 \ud574\uacb0\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc548\uc804\uc744 \uc704\ud55c \uc81c\ub3c4\uc801 \uc7a5\uce58\ub294 \uc0ac\uc6a9\uc790\uc758 \ucc45\uc784 \uc758\uc2dd\uc744 \ud0a4\uc6b0\ub294 \uac83\uc774 \ubaa9\uc801\uc774\uc5b4\uc57c \ud558\uba70, \uc9c0\ub098\uce5c \ubc95\uc801 \uc81c\ud55c\uc774 \uc544\ub2cc \uc2a4\uc2a4\ub85c \uc870\uc808\ud560 \uc218 \uc788\ub294 \ud658\uacbd\uc744 \uc870\uc131\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801\uc778 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uccad\uc18c\ub144\uc758 \ub2a5\ub3d9\uc801\uc778 \ub300\uc751 \ub2a5\ub825\uc744 \ud0a4\uc6b0\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \uc704\ud55c \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc0ac\ud68c \uc548\uc804\ub9dd\uc744 \uac15\ud654\ud558\uc5ec \ubd80\uc871\ud55c \uac00\uc815\uc758 \uc9c0\uc6d0\uc744 \ubcf4\uc644\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc790\uae30 \uc2dc\uac04\uc744 \uad00\ub9ac\ud558\ub294 \ub2a5\ub825\uc774 \ubd80\uc871\ud55c \ubbf8\uc131\ub144\uc790\ub4e4\uc744 \uc704\ud55c \uc5f0\ub839\ubcc4 \uc9c0\uce68\uacfc \ucf54\uce6d \ud504\ub85c\uadf8\ub7a8\uc774 \ub9c8\ub828\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\uc758 \ucc3d\uc758\uc131\uacfc \uc790\uae30 \ud45c\ud604\uc744 \uc9c0\uc6d0\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc778 \ubaa8\ub2c8\ud130\ub9c1\uacfc \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c\uc774 \ubcf4\uc644\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ube44\ud310\uc801 \uc0ac\uace0\ub97c \ud0a4\uc6b8 \uc218 \uc788\ub3c4\ub85d \uad50\uc721\ud558\ub294 \uac83\uc740 \uadf8\ub4e4\uc758 \uc548\uc804\uacfc \uc9c1\uacb0\ub429\ub2c8\ub2e4","\uccab\uc9f8, \uccad\uc18c\ub144\uc758 \uc815\uc2e0 \uac74\uac15\uc5d0 \ub300\ud55c \uc9c0\uc6d0\ucc45\uc774 \ub354\uc6b1 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uaddc\uc81c\ubcf4\ub2e4\ub294 \uc9c0\uc6d0\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\uac00 \ubb38\uc81c \uc0c1\ud669\uc5d0 \ud6a8\uacfc\uc801\uc73c\ub85c \ub300\ucc98\ud560 \uc218 \uc788\ub294 \uc5ed\ub7c9\uc744 \uae38\ub7ec\uc8fc\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uad50\uc721\uacfc \uc9c0\uc6d0\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub354 \ub098\uc544\uac00, \ubc95\uc801\uc778 \uaddc\uc81c\ubcf4\ub2e4 \ubbf8\uc131\ub144\uc790\ub4e4 \uc2a4\uc2a4\ub85c\uac00 \ubb38\uc81c\uc5d0 \uc9c1\uba74\ud588\uc744 \ub54c \ub300\ucc98\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \uae30\ub974\ub3c4\ub85d \ub3c4\uc640\uc8fc\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uccad\uc18c\ub144\uc758 \uc790\uae30 \ud1b5\uc81c\ub825\uacfc \uad00\ub828\ub41c \ubb38\uc81c\ub294 \ub2e8\uc21c\ud55c \uc0ac\uc6a9 \uc81c\ud55c\ubcf4\ub2e4 \ub354 \uae4a\uc740 \uad50\uc721\uc801 \uc811\uadfc\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uc77c\ub960\uc801\uc778 \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uac1c\uc778\uc758 \ud310\ub2e8\ub825\uc744 \ud0a4\uc6b0\ub294 \ubc29\ud5a5\uc73c\ub85c \uc811\uadfc\ud574\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \uccad\uc18c\ub144\ub4e4\uc744 \uc704\ud55c \ub9de\ucda4\ud615 \uc9c0\uc6d0 \ud504\ub85c\uadf8\ub7a8 \ubc0f \uc0c1\ub2f4 \uc11c\ube44\uc2a4\uc758 \ud65c\uc131\ud654\ub97c \ud1b5\ud574 \uc704\ud5d8 \uc694\uc18c\uc5d0 \ub300\ud55c \ubcf4\ud638\ub97c \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ud544\uc694\ud55c \uac83\uc740 \ud658\uacbd\uc5d0 \ub300\ud55c \ubcf4\ud638 \uc7a5\uce58\uac00 \uc544\ub2c8\ub77c \uc2a4\uc2a4\ub85c \uc704\ud5d8\uc744 \uc778\uc2dd\ud558\uace0 \ub300\ucc98\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \uae30\ub974\ub294 \uac83\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \ubc95\uc801 \uc870\uce58 \ub300\uc2e0, \uc815\ucc45\uc801 \uc9c0\uc6d0\uacfc \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \ubcf4\ub2e4 \uc9c1\uc811\uc801\uc778 \ub3c4\uc6c0\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubcf4\ud638 \uc7a5\uce58\uc640 \uad50\uc721\uc774 \uacb0\ud569\ub420 \ub54c \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc81c\uacf5\ub418\ub294 \uc774\uc911 \ubcf4\ 40 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \uad50\uc721\uc744 \ud1b5\ud574 \uadf9\ubcf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc911\ub3c5 \ubb38\uc81c\ub098 \uc798\ubabb\ub41c \uc815\ubcf4 \ub178\ucd9c \ubb38\uc81c\ub294 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uad50\uc721\uc744 \ud1b5\ud574 \ucda9\ubd84\ud788 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \ud2b9\uc815 \uc0ac\uc6a9 \uc81c\ud55c\ubcf4\ub2e4 \uade0\ud615 \uc7a1\ud78c \uc0ac\uc6a9\uacfc \uad50\uc721\uc744 \ud1b5\ud574 \ub354 \ud6a8\uacfc\uc801\uc73c\ub85c \ub300\ucc98\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ub3c4\ud55c \uc0ac\uc6a9\uc744 \ub9c9\uae30 \uc704\ud574\uc11c\ub294 \uade0\ud615 \uc7a1\ud78c \uc0dd\ud65c \uc2b5\uad00\uc744 \ud615\uc131\ud558\uac8c \ud558\ub294 \uac83\uc774 \ud575\uc2ec\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc644\uc804\ud55c \uc81c\ud55c\ubcf4\ub2e4\ub294 \uad50\uc721\uacfc \uc9c0\ub3c4\uc758 \uac15\ud654\uac00 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801\uc778 \uc81c\uc57d \ub300\uc2e0\uc5d0 \uc815\uc2e0 \uac74\uac15\uc744 \uc99d\uc9c4\uc2dc\ud0a4\ub294 \ubc29\ubc95\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uad50\uc721\uc744 \ud1b5\ud55c \uc0ac\uc6a9 \uc2b5\uad00 \uac1c\uc120\uc774 \uc7a5\uae30\uc801\uc73c\ub85c \uae0d\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce69\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \ubcf4\ud638\uc790 \ucc38\uc5ec\uc758 \ud655\ub300\uac00 \ub354 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc774 \uc544\ub2c8\ub77c \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc\ub97c \ub192\uc774\ub294 \uac83\uc774 \uc7a5\uae30\uc801\uc73c\ub85c \ub354\uc6b1 \ud6a8\uacfc\uc801\uc778 \ubcf4\ud638\ub9c9\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc81c\ud55c\ubcf4\ub2e4\ub294 \ucc38\uc5ec\ub97c \ud1b5\ud55c \uac74\uac15\ud55c \uc2b5\uad00 \ud615\uc131\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc548\uc744 \ud1b5\ud55c \uc81c\ud55c\ubcf4\ub2e4 \uad50\uc721\uc801 \uc811\uadfc\uc774 \ub354\uc6b1 \uc9c0\uc18d \uac00\ub2a5\ud558\uace0 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\ubcf4\ub2e4 \uacf5\uacf5 \uc778\uc2dd\uc744 \ub192\uc774\ub294 \ub370 \uc8fc\ub825\ud558\ub294 \uac83\uc774 \ub354\uc6b1 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub098\uc774\uc5d0 \ub530\ub978 \uc131\uc219\ud55c \ud310\ub2e8\ub825 \ubd80\uc871\uc774\ub77c\ub294 \ubb38\uc81c\ub294 \uc2e4\uc81c\ub85c \uad50\uc721\uacfc \uc9c0\ub3c4\uc5d0 \uc758\ud574 \ud6a8\uacfc\uc801\uc73c\ub85c \ubcf4\uc644\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc815\uc2e0\uc801 \uac74\uac15 \ubb38\uc81c\uc5d0 \ub300\ud55c \ud574\uacb0\ucc45\uc740 \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uad50\uc721\uc801 \uc811\uadfc\uc774 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801\uc778 \uc81c\ud55c\ubcf4\ub2e4\ub294 \ub2e4\uc591\ud55c \uc0ac\ud68c\uc801 \ud504\ub85c\uadf8\ub7a8\uacfc \uc9c0\uc6d0\uc744 \ud1b5\ud574 \ub354 \uade0\ub4f1\ud55c \uad50\uc721 \uae30\ud68c\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uaddc\uc81c\ubcf4\ub2e4\ub3c4 \uc0ac\uc6a9\uc790 \uad50\uc721\uacfc \uc778\uc2dd \uc81c\uace0\uac00 \ub354 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \uc644\ud654\ud558\uae30 \uc704\ud574\uc11c\ub294 \uad50\uc721\uacfc \uc9c0\ub3c4\uac00 \ucd5c\uc120\uc758 \ubc29\uc548\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4 \uad50\uc721\uc744 \ud1b5\ud55c \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc \uac15\ud654\uac00 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ubbf8\uc131\ub144\uc790\uac00 \uc720\ud574\ud55c \ucf58\ud150\uce20\uc5d0 \ub178\ucd9c\ub418\uc9c0 \uc54a\ub3c4\ub85d \ubcf4\ud638\ud558\ub294 \ubc29\ubc95\uc740 \uae08\uc9c0\ubcf4\ub2e4\ub294 \uad50\uc721\uc744 \ud1b5\ud574 \ud6a8\uacfc\uc801\uc73c\ub85c \ub2ec\uc131\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc801\uadf9\uc801\uc778 \ubc95\uc801 \uaddc\uc81c\ubcf4\ub2e4 \uad50\uc721\uacfc \ub300\ucc98 \ub2a5\ub825 \ud568\uc591\uc774 \uc7a5\uae30\uc801\uc73c\ub85c \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ubbf8\uc131\uc219\ud55c \ud310\ub2e8\ub825\uc73c\ub85c \uc778\ud55c \uc704\ud5d8\uc740 \uad50\uc721\uc744 \ud1b5\ud574 \ucda9\ubd84\ud788 \uc644\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ud504\ub77c\uc774\ubc84\uc2dc \uce68\ud574 \ubb38\uc81c \uc5ed\uc2dc \uc0ac\uc6a9 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uad50\uc721\uacfc \ubcf4\ud638 \uac15\ud654\ub85c \uc811\uadfc\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc77c\uc2dc\uc801\uc778 \uaddc\uc81c\ubcf4\ub2e4\ub294 \uc608\ubc29\uc801 \uad50\uc721\uc774 \uc2e4\uc9c8\uc801\uc778 \ubcc0\ud654\ub97c \uac00\uc838\uc62c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uaddc\uc81c \ub300\uc2e0 \uad50\uc721\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \uc548\uc804\uc131 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub294 \ub354 \ud6a8\uacfc\uc801\uc778 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubcf4\ud638\uc758 \uac00\uc7a5 \ud6a8\uacfc\uc801\uc778 \ubc29\ubc95\uc740 \uc81c\ud55c\uc774 \uc544\ub2cc \uad50\uc721\uacfc \uc801\uc808\ud55c \uc9c0\uce68 \uc81c\uacf5\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc790\uc728\uc801 \uad00\ub9ac \ub2a5\ub825\uc744 \ubc30\uc591\ud558\ub294 \uac83\uc774 \uc7a5\uae30\uc801\uc73c\ub85c \ub354 \uae0d\uc815\uc801\uc778 \uacb0\uacfc\ub97c \uac00\uc838\uc635\ub2c8\ub2e4","\uaddc\uc81c\ubcf4\ub2e4\ub294 \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc9c0\ub098\uce5c \uc2dc\uac04 \ud65c\uc6a9 \ubb38\uc81c\ub294 \uc0dd\ud65c \uc2b5\uad00\uc758 \uad50\uc721\uacfc \uade0\ud615 \uc7a1\ud78c \ub77c\uc774\ud504\uc2a4\ud0c0\uc77c\uc74
