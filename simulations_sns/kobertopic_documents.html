c18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc815\ubcf4 \uc2b5\ub4dd\uacfc \ucc3d\uc758\uc801 \ud45c\ud604\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4. [\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc744 \uc9c0\uc6d0\ud558\ub294 \uc778\ud130\ub137 \ud611\ud68c]\ub294 \uccad\uc18c\ub144\uc774 \ub514\uc9c0\ud138 \ud658\uacbd\uc744 \ud0d0\uc0c9\ud558\uba70 \ub3c5\ucc3d\uc131\uc744 \ubc1c\ud718\ud558\uace0 \ub2e4\uc591\ud55c \uc815\ubcf4\uc5d0 \uc811\uadfc\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uac00\uc9c8 \ud544\uc694\uac00 \uc788\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uccad\uc18c\ub144\uc758 \ud45c\ud604\uc758 \uc790\uc720\uc640 \uad8c\ub9ac\ub97c \uc874\uc911\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \uc720\ud574\ud55c \ucf58\ud150\uce20 \ubb38\uc81c\ub294 \uaddc\uc81c\ub97c \ud1b5\ud574\uc11c\ubcf4\ub2e4\ub294 \uad50\uc721\uc744 \ud1b5\ud55c \uc608\ubc29\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub514\uc9c0\ud138 \uc2dc\ubbfc\uad50\uc721\uc740 \uaddc\uc81c\ubcf4\ub2e4\ub294 \ucc45\uc784 \uc788\ub294 \uc0ac\uc6a9\uc744 \ucd09\uc9c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccad\uc18c\ub144 \ubb38\uc81c\ub294 \uae30\uc220\uc801 \ud574\uacb0 \uc678\uc5d0\ub3c4 \ub2e4\uc591\ud55c \uc0ac\ud68c\uc801 \uc9c0\uc6d0 \ubc29\uc548\uc744 \ub3d9\uc6d0\ud574\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc628\ub77c\uc778 \uc0c1\uc758 \uad34\ub86d\ud798 \ubb38\uc81c\ub294 \uc804\uccb4\uc801\uc778 \uc0ac\ud68c\uc640 \ud50c\ub7ab\ud3fc\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud559\uc5c5 \ubc0f \uc0ac\ud68c\uc801 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uba3c\uc800, \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc640 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ub4f1\uc758 \ubb38\uc81c\ub294 \uc785\ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uad50\uc721\uacfc \uac74\uc804\ud55c \uc0ac\uc6a9 \uc2b5\uad00\uc744 \ud1b5\ud574 \ub354 \ud6a8\uacfc\uc801\uc73c\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc548\ubcf4\ub2e4\ub294 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc774 \ud544\uc694\uc131\uc744 \ud1a0\ub300\ub85c \ub354\uc6b1 \ud6a8\uacfc\uc801\uc778 \uc548\uc804\ub9dd\uc744 \uad6c\ucd95\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220\uc801 \ud574\uacb0\ucc45\uacfc \ubd80\ubaa8 \ubc0f \ud559\uad50\uc758 \ud611\ub825\uc774 \ub354 \uc720\uc5f0\ud558\uace0 \uc2e4\uc6a9\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud574 \uad50\uc721\uc744 \ud1b5\ud574 \ucc45\uc784\uac10 \uc788\ub294 \uc0ac\uc6a9 \ubc29\ubc95\uc744 \uac00\ub974\uce58\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\ud68c \uc804\uccb4\uc758 \ucc45\uc784 \uc758\uc2dd\uc744 \uac15\ud654\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \uc9c0\uc6d0\uacfc \uc790\uc6d0\uc744 \uc81c\uacf5\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc774 \uc874\uc7ac\ud558\ub354\ub77c\ub3c4, \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc744 \ud1b5\ud574 \uadf8 \uc704\ud5d8\uc744 \uc778\uc2dd\ud558\uace0 \ub300\ucc98\ud558\ub3c4\ub85d \uad50\uc721\ud558\ub294 \uac83\uc774 \ub354 \uc911\uc694\ud569\ub2c8\ub2e4","\ubb34\ubc94\uc704\ud55c \uaddc\uc81c\ub85c \uc778\ud55c \ubd80\uc791\uc6a9\uc744 \ud53c\ud558\uae30 \uc704\ud574\uc11c\ub294 \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0\uc11c\uc758 \uc758\uc0ac\uacb0\uc815\ub825\uc744 \ud0a4\uc6cc\uc8fc\ub294 \uc815\ucc45\uc801 \uc9c0\uc6d0\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640\uc758 \ud611\ub825\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc774\ub978 \uc0ac\uc6a9\uc774 \ubc18\ub4dc\uc2dc \ubd80\uc815\uc801\uc778 \uc601\ud5a5\ub9cc\uc744 \ubbf8\uce58\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\ub458\uc9f8, \uc815\ubd80\uc758 \uaddc\uc81c\ubcf4\ub2e4 \ub354 \ub098\uc740 \uc811\uadfc\uc740 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uc2a4\uc2a4\ub85c \uaddc\uc81c\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \ud0a4\uc6b0\uac8c \ud558\ub294 \uac83\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc758 \uc704\ud5d8\uc740 \uc77c\ubc18\uc801\uc778 \uaddc\uc81c\ubcf4\ub2e4\ub294 \uad6c\uccb4\uc801\uc778 \uc815\ucc45\uacfc \ub3c4\uad6c\ub97c \ud1b5\ud574 \uad00\ub9ac\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ud45c\ud604\uc758 \uc790\uc720\ub97c \ubcf4\uc7a5\ud574\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc774 \uc544\ub2cc \ucc28\ubcc4\ud654\ub41c \uc811\uadfc\ubc95\uc740 \uc0ac\ud68c \uc804\ubc18\uc5d0 \uac78\uccd0 \ub354 \ub113\uc740 \uc218\uc6a9\uacfc \uc774\ud574\ub97c \uc774\ub04c\uc5b4 \ub0bc \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640\uc758 \uc18c\ud1b5\uacfc \uc9c0\ub3c4\uac00 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \ubd80\uc791\uc6a9\uc744 \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uccad\uc18c\ub144\ub4e4\uc740 \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0 \ub9de\ub294 \ub2a5\ub825\uc744 \ubc30\uc6cc\uc57c \ud558\uba70, \uc774\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud3ec\ud568\ud55c \ub2e4\uc591\ud55c \uc628\ub77c\uc778 \ud50c\ub7ab\ud3fc\uc5d0\uc11c\uc758 \uacbd\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uccad\uc18c\ub144\ub4e4\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc774 \ubc18\ub4dc\uc2dc \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce58\uc9c0 \uc54a\ub294\ub2e4\ub294 \uc810\uc744 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubcf4\ud638\uc640 \uad50\uc721\uc758 \uade0\ud615\uc740 \uae30\uc220\uc758 \uc62c\ubc14\ub978 \uc0ac\uc6a9\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uadf8\ub9ac\uace0, \uccad\uc18c\ub144\ub4e4\uc740 \ucda9\ub3d9\uc801\uc778 \uacb0\uc815\uc744 \ub0b4\ub9b4 \uac00\ub2a5\uc131\uc774 \uc788\uc9c0\ub9cc, \uc774\ub294 \uc131\uc7a5 \uacfc\uc815\uc758 \uc77c\ubd80\ub85c \uc774\ud574\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc5c5\uacfc\uc758 \ud611\ub825\uc744 \ud1b5\ud55c \ubd80\ubaa8 \uc9c0\uc6d0 \ud504\ub85c\uadf8\ub7a8\uc774 \ubcf4\ub2e4 \uc2e4\uc9c8\uc801\uc778 \ub3c4\uc6c0\uc744 \uc904 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uae30\uc220\uc801 \ud574\uacb0\ucc45\uc774 \ubbf8\uc131\ub144\uc790\uc758 \uc548\uc804\uc744 \ubcf4\ub2e4 \uc720\uc5f0\ud558\uace0 \ud6a8\uacfc\uc801\uc73c\ub85c \ubcf4\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub2e4\uc591\ud55c \uc628\ub77c\uc778 \uc548\uc804 \ub3c4\uad6c\uc640 \ud504\ub85c\uadf8\ub7a8\uc744 \uc81c\uacf5\ud558\uba70 \ud50c\ub7ab\ud3fc \uc0ac\uc6a9\uc790\uc758 \uc548\uc804\uc744 \uc911\uc694\uc2dc\ud558\ub294 \ud398\uc774\uc2a4\ubd81(\ud604\uc7ac \uba54\ud0c0)\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc774\uc6a9 \uc2dc \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \uc704\ud5d8 \uc694\uc18c\ub294 \uc0ac\uc6a9 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc801\uadf9\uc801\uc778 \uad50\uc721 \ubc0f \uad00\ub9ac \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \ucda9\ubd84\ud788 \ud574\uacb0\ud560 \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc815\ubcf4 \uaca9\ucc28\ub97c \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\ub294 \ud604\ub300 \uc0ac\ud68c\uc758 \uc911\uc694\ud55c \uc18c\ud1b5 \ub3c4\uad6c\uc778 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uae0d\uc815\uc801\uc778 \uc815\uc2e0 \uac74\uac15 \ud61c\ud0dd\uc744 \ubc1b\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \ucee4\ubba4\ub2c8\ud2f0 \uc911\uc2ec\uc758 \ud574\uacb0\ucc45\uc774 \ub354\uc6b1 \uc2e4\uc9c8\uc801\uc778 \ubcf4\ud638\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uaddc\uc81c\uac00 \uc544\ub2c8\ub77c \ud50c\ub7ab\ud3fc\uc758 \ucc45\uc784\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubc0f \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub294 \ub354 \ud6a8\uacfc\uc801\uc778 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \ub2a5\ub3d9\uc801\uc778 \ucc38\uc5ec\uac00 \uc694\uad6c\ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ud559\uc5c5 \uc131\uacfc \uc800\ud558 \ubb38\uc81c\ub294 \uc2dc\uac04 \uad00\ub9ac\uc640 \uc790\uae30 \uaddc\uc728\uc744 \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubd80\ubaa8\uc758 \uc5ed\ud560\uc774\ub098 \uc774\ud574 \ubd80\uc871 \ubb38\uc81c\ub97c \ubcf4\uc644\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc9c0\uc5ed \uc0ac\ud68c\uc640 \ud559\uad50\uc758 \uc801\uadf9\uc801\uc778 \ucc38\uc5ec\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c \ub300\uc2e0 \ud3ec\uad04\uc801\uc778 \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c\uc744 \uad6c\ucd95\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uac00 \uc2ec\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd08\ub798\ud560 \uc218 \uc788\ub2e4\ub294 \uc810\uc740 \uc778\uc2dd\ud558\uace0 \uc788\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ubb38\uc81c\uc5d0 \ub300\ud55c \ub300\ucc98 \ub610\ud55c \uad50\uc721\uacfc \ud50c\ub7ab\ud3fc \uad00\ub9ac\uc758 \uac15\ud654\ub85c \ucda9\ubd84\ud788 \uac00\ub2a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9ce\uc740 \ubd80\ubaa8\uac00 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \uc774\ud574\ud558\uc9c0 \ubabb\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc774\ub97c \ubcf4\uc644\ud558\uae30 \uc704\ud574 \uad50\uc721\uacfc \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c\uc774 \ub9c8\ub828\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \uc790\uc6d0\uacfc \uc815\ubcf4\ub97c \uc81c\uacf5\ud558\ub294 \uac15\ub825\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubd80\uc815\uc801\uc778 \uce21\uba74\uc744 \uc644\ud654\ud558\uae30 \uc704\ud55c \uae30\uc220 \ubc1c\uc804\uc774 \ud65c\ubc1c\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc62c\ubc14\ub978 \uc628\ub77c\uc778 \ud658\uacbd\uc744 \uc870\uc131\ud558\ub294 \uac83\uc740 \uaddc\uc81c\uac00 \uc544\ub2c8\ub77c \uacf5\ub3d9\uccb4\uc758 \ub178\ub825\uc73c\ub85c \uc2e4\ud604\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc815\ubcf4 \uc811\uadfc\uc131\uacfc \uc790\uae30 \ud45c\ud604\uc758 \uc790\uc720\ub97c \ubcf4\uc7a5\ud574\uc57c \ud569\ub2c8\ub2e4","\ub610\ud55c, \ud559\uc5c5 \uc131\ucde8\ub3c4\uc5d0 \ub300\ud55c \ubd80\uc815\uc801\uc778 \uc601\ud5a5\ubcf4\ub2e4\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ud559\uc2b5 \uae30\ud68c\ub97c \ud655\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uae0d\uc815\uc801 \uce21\uba74\uc740 \uae08\uc9c0\ubcf4\ub2e4\ub294 \ud65c\uc6a9\uc744 \ud1b5\ud574 \ud655\ub300\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \uad50\uc721\uacfc \uc9c0\ub3c4\uac00 \uc7a5\uae30\uc801\uc73c\ub85c \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud558\ub294 \ub370 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ud45c\ud604\uc758 \uc790\uc720\ub294 \ubaa8\ub4e0 \uc5f0\ub839\uce35\uc5d0 \ubcf4\uc7a5\ub418\uc5b4\uc57c \ud558\ub294 \uae30\ubcf8 \uad8c\ub9ac\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc2ec\ub9ac\uc801, \uc815\uc11c\uc801 \uc601\ud5a5\uc5d0 \ub300\ud55c \uc5f0\uad6c\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub904\uc9c0\uace0 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \uc5f0\uad6c\ub294 \uc0ac\ud68c\uc801\uc73c\ub85c \uc911\uc694\ud55c \ub17c\uc758\ub97c \ubd88\ub7ec\uc77c\uc73c\ucf1c \uc2e4\uc81c\ub85c \ubb38\uc81c\ub97c \ud574\uacb0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc744 \uc81c\uc548\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \uadf8\ub4e4\uc758 \ub514\uc9c0\ud138 \ubb38\ud574\ub825 \ubc0f \ube44\ud310\uc801 \uc0ac\uace0\ub97c \uae30\ub974\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uac00\uc9dc \ub274\uc2a4\uc640 \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc5d0 \ub300\ud55c \ub300\uc751\ucc45\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub2e8\uc21c\ud55c \uaddc\uc81c\uac00 \uc544\ub2cc \uc885\ud569\uc801\uc778 \uc815\ucc45 \uc811\uadfc\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc815\uc11c\uc801\uc73c\ub85c \ubd88\uc548\uc815\ud55c \uccad\uc18c\ub144\ub4e4\uc744 \uc704\ud55c \uc801\uc808\ud55c \uc9c0\uc6d0\uacfc \uc0c1\ub2f4 \uc81c\uacf5 \uc5ed\uc2dc \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc911\ub3c5 \ubb38\uc81c\ub294 \uc811\uadfc \uc81c\ud55c\ubcf4\ub2e4\ub3c4 \uc2b5\uad00 \uad00\ub9ac\uc640 \uc2dc\uac04 \uad00\ub9ac \uad50\uc721\uc744 \ud1b5\ud574 \ub354 \ud6a8\uacfc\uc801\uc73c\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \ubc1c\uc804\uc2dc\ud0a4\ub294 \uc911\uc694\ud55c \uc218\ub2e8\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc798\ubabb\ub41c \uc815\ubcf4\ub098 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc5d0 \ub300\ud55c \ub178\ucd9c \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub824\uba74 \ube44\ud310\uc801 \uc0ac\uace0 \ub2a5\ub825\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc624\ud788\ub824 \uc815\uc2e0 \uac74\uac15 \uc9c0\uc6d0\uc758 \uc5ed\ud560\ub3c4 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uaddc\uc81c\uac00 \uc544\ub2c8\ub77c \ubcf4\ub2e4 \ub9ce\uc740 \uc0ac\uc6a9 \ubc29\uc2dd\uc744 \uc774\ud574\ud558\uace0 \uac01\uac01\uc5d0 \ub9de\ub294 \uc801\uc808\ud55c \uad50\uc721\uc744 \ud1b5\ud574 \uc8fc\uccb4\uc801\uc778 \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \uc720\ub3c4\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uae30\uc220 \uac1c\ubc1c\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4. [\uc18c\uc15c \ubbf8\ub514\uc5b4 \ub124\ud2b8\uc6cc\ud06c\uc640 \uad11\uace0 \ud50c\ub7ab\ud3fc\uc744 \uc6b4\uc601\ud558\ub294 \ud398\uc774\uc2a4\ubd81]\uc740 \uccad\uc18c\ub144\ub4e4\uc774 \ub514\uc9c0\ud138 \ud50c\ub7ab\ud3fc\uc744 \ud1b5\ud574 \ub2e4\uc591\ud55c \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uacbd\ud5d8\ud558\uace0 \uc758\uc0ac\uc18c\ud1b5 \ub2a5\ub825\uc744 \ubc1c\uc804\uc2dc\ud0ac \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ud544\uc694\ud55c \uac83\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc774 \uc544\ub2cc \uc548\uc804\ud55c \uc0ac\uc6a9\uc744 \uc704\ud55c \uad50\uc721\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub2e4\uc591\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\ub4e4\uc774 \uad50\uc721\uc801 \ucf58\ud150\uce20\ub97c \uc81c\uacf5\ud558\uae30 \uc2dc\uc791\ud558\uba74\uc11c, \uc624\ub77d \ubaa9\uc801\uc758 \uc0ac\uc6a9\uacfc \uad50\uc721\uc801 \uc0ac\uc6a9\uc744 \uc544\uc6b0\ub974\ub294 \uade0\ud615 \uc7a1\ud78c \uc811\uadfc\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790 \ucc38\uc5ec\uac00 \ub354 \ud070 \ud6a8\uacfc\ub97c \ubc1c\ud718\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","National Association of Broadcasters\ub294 \ub514\uc9c0\ud138 \ubc0f \uc804\ud1b5 \ubbf8\ub514\uc5b4\uc758 \uc774\uc775\uc744 \ub300\ud45c\ud558\uba70, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud65c\ub3d9\uc774 \ubbf8\ub514\uc5b4 \ubd84\uc57c\uc5d0\uc11c\uc758 \uc7a5\uae30\uc801\uc778 \uad00\uc2ec\uacfc \ucc38\uc5ec\ub97c \uc720\ub3c4\ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc790\uccb4\uac00 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc5d0 \ub300\ud55c \uc801\uadf9\uc801\uc778 \uc870\uce58\ub97c \ucde8\ud558\ub3c4\ub85d \ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uacf5\ub3d9\uccb4\uc640 \uc9c0\uc5ed \uc0ac\ud68c\uc758 \ucc38\uc5ec\ub294 \ub354 \ud070 \ubcf4\ud638\ub9c9\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\ub300 \uc0ac\ud68c\uc758 \uc911\uc694\ud55c \uc18c\ud1b5 \uc218\ub2e8\uc774\uba70, \uc774\ub97c \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc740 \uc790\uc2e0\uc758 \ubaa9\uc18c\ub9ac\ub97c \ub0bc \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uac16\uc2b5\ub2c8\ub2e4. [\uccad\uc18c\ub144\uc758 \ub514\uc9c0\ud138 \ucc38\uc5ec\ub97c \ucd09\uc9c4\ud558\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc778] \uc778\uc2a4\ud0c0\uadf8\ub7a8\uc740 \uccad\uc18c\ub144\ub4e4\uc774 \uc628\ub77c\uc778\uc5d0\uc11c \uc790\uc2e0\uc758 \uad00\uc2ec\uc0ac\uc640 \ucc3d\uc758\uc131\uc744 \ud45c\ud604\ud560 \uc218 \uc788\ub294 \uc7a5\uc744 \uc81c\uacf5\ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uac00 \ubbf8\uce58\ub294 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \uc904\uc774\uae30 \uc704\ud574\uc11c\ub294 \uc0ac\uc6a9 \uc2dc\uac04\uc744 \ub2e8\uc21c\ud788 \uc81c\ud55c\ud558\ub294 \uac83\ubcf4\ub2e4 \uac74\uac15\ud55c \uc0ac\uc6a9 \uc2b5\uad00\uc744 \uae30\ub974\ub294 \uad50\uc721\uacfc \uac00\uc815 \ub0b4\uc5d0\uc11c\uc758 \uc801\uadf9\uc801\uc778 \ub300\ud654\uac00 \ub354\uc6b1 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc790\uae30 \ud45c\ud604\uc758 \uc7a5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc548\uc740 \uc801\uc815 \uc218\uc900\uc758 \uc548\uc804\ub9dd\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc774\ub294 \uadfc\ubcf8\uc801\uc778 \ub514\uc9c0\ud138 \ud658\uacbd\uc758 \uc774\ud574\ub97c \ub192\uc774\ub294 \uad50\uc721\uacfc \ubcd1\ud589\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub354\uc6b1\uc774, \ub2e4\uce35\uc801 \uc811\uadfc\uc740 \uc0ac\ud68c\uc801 \ud611\ub825\uc744 \uac15\uc870\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uaddc\uc81c\ubcf4\ub2e4\ub294 \ubd80\ubaa8\ub098 \ubcf4\ud638\uc790, \uc9c0\uc5ed \uc0ac\ud68c\uc758 \uc801\uadf9\uc801\uc778 \ucc38\uc5ec\uac00 \ubb38\uc81c \ud574\uacb0\uc5d0 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uaddc\uc81c\ub294 \ucd5c\ud6c4\uc758 \uc218\ub2e8\uc73c\ub85c, \ud50c\ub7ab\ud3fc\uacfc \uc9c0\uc5ed \uc0ac\ud68c\uac00 \uba3c\uc800 \ubb38\uc81c\ub97c \ud574\uacb0\ud560 \uae30\ud68c\ub97c \uac00\uc838\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \uac19\uc740 \ubb38\uc81c\ub294 \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc0ac\ud68c\uc801 \uc778\uc2dd \uac1c\uc120\uc744 \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc77c\uad00\ub41c \ubc95\uc801 \uac15\uc81c\ubcf4\ub2e4 \uac1c\uc778\uc758 \ube44\ud310\uc801 \uc0ac\uace0\uc640 \uc120\ud0dd\uc758 \uc911\uc694\uc131\uc744 \uac15\uc870\ud574\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc815\uc2e0 \uac74\uac15 \uc9c0\uc6d0\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \ucc3d\uad6c\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8\ub4e4\uc774 \uc790\ub140\uc758 \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \uc644\uc804\ud788 \uc774\ud574\ud558\uac70\ub098 \ubaa8\ub2c8\ud130\ub9c1\ud558\uae30 \uc5b4\ub835\ub2e4\ub294 \uc810\uc744 \ud574\uc18c\ud558\uae30 \uc704\ud574, \ubcf4\ub2e4 \ud3ec\uad04\uc801\uc774\uace0 \uc138\ubc00\ud55c \uc9c0\uc6d0\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc9c0\uc5ed \uc0ac\ud68c\uc758 \ucc38\uc5ec\uc640 \uc9c0\uc6d0\uc774 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc911\ub3c5 \uc218\uc900\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \ud328\ud134\uc5d0 \ub300\ud574, \uaddc\uc81c\ubcf4\ub2e4\ub294 \uce58\ub8cc\uc640 \uc0c1\ub2f4\uc744 \ud1b5\ud55c \uc811\uadfc\uc774 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\uc7ac\ubcf4\ub2e4\ub294 \ucee4\ubba4\ub2c8\ud2f0 \uae30\ubc18\uc758 \uc9c0\uc6d0\uc774 \ub354 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc774 \uc544\ub2cc \ubcf4\ub2e4 \ud3ec\uad04\uc801\uc778 \uc9c0\uc6d0\uc774 \uccad\uc18c\ub144\uc758 \uc815\uc2e0 \uac74\uac15\uacfc \uc548\uc804\uc744 \ub354 \uc798 \uc9c0\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801\uc778 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uad50\uc721\uc744 \ud1b5\ud55c \ubb38\uc81c \ud574\uacb0\uc774 \ub354 \uc9c0\uc18d\uc801\uc774\uace0 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc5d0\uac8c \uc62c\ubc14\ub978 \uc0ac\uc6a9 \uc9c0\uce68\uacfc \uad50\uc721\uc744 \uc81c\uacf5\ud568\uc73c\ub85c\uc368 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccad\uc18c\ub144\ub4e4\uc774 \ub514\uc9c0\ud138 \uc138\uc0c1\uc5d0\uc11c\uc758 \ucc38\uc5ec\ub97c \ud1b5\ud574 \uc11c\ub85c \uc18c\ud1b5\ud558\uace0 \ud611\ub825\ud558\ub294 \ub2a5\ub825\uc744 \uae30\ub974\ub294 \uac83\uc740 \ub9e4\uc6b0 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc62c\ubc14\ub978 \uc0ac\uc6a9 \ubc29\ubc95\uc744 \uad50\uc721\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc640 \uc798\ubabb\ub41c \uc815\ubcf4\uc5d0 \ub300\uc751\ud558\ub294 \ubc29\ubc95\uc744 \uad50\uc721\ud558\ub294 \uac83\uc774 \ucc28\ub2e8\ubcf4\ub2e4 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uad50\uc721\uacfc \uae30\uc220\uc740 \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4 \uc624\ud788\ub824 \ub354 \uc9c1\uc811\uc801\uc778 \ubcf4\ud638 \uc218\ub2e8\uc774 \ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc774 \uc544\ub2cc \ubcf4\ud638\uc790\uc758 \uc801\uc808\ud55c \uc9c0\ub3c4\uc640 \uc9c0\uc6d0\uc744 \ud1b5\ud574, \ubbf8\uc131\ub144\uc790\ub4e4\uc740 \uc628\ub77c\uc778 \uc0c1\uc5d0\uc11c \uc811\ud558\ub294 \uc815\ubcf4\ub97c \ube44\ud310\uc801\uc73c\ub85c \ud3c9\uac00\ud558\uace0 \uc801\uc808\ud788 \ub300\ucc98\ud558\ub294 \ub2a5\ub825\uc744 \uac1c\ubc1c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc815\ubd80\uc758 \uc815\ucc45\uc801 \uc9c0\uc6d0\uc774 \uc774\ub97c \ub354\uc6b1 \ubcf4\uc644\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubbf8\uc131\ub144\uc790 \uc785\uc7a5\uc5d0\uc11c\uc758 \uc758\uacac\uacfc \ubaa9\uc18c\ub9ac\ub97c \uc874\uc911\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc774 \ud544\uc694\ud558\ub2e4\ub294 \uc8fc\uc7a5\ubcf4\ub2e4\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud68c\uc0ac\ub4e4\uc774 \uc790\uccb4\uc801\uc73c\ub85c \ub354 \uac15\ub825\ud55c \ubcf4\ud638 \uc7a5\uce58\ub97c \ub9c8\ub828\ud558\ub3c4\ub85d \uc720\ub3c4\ud558\ub294 \uac83\uc774 \ub354\uc6b1 \uc2e4\ud6a8\uc131 \uc788\ub294 \uc811\uadfc\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc608\ubc29 \uad50\uc721\uc740 \ud55c\uacc4\uac00 \uc788\ub354\ub77c\ub3c4 \uc9c0\uc18d\uc801\uc778 \uad50\uc721\uacfc \uc9c0\uc9c0\ub9dd \uad6c\ucd95\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc774 \uc2a4\uc2a4\ub85c \ubb38\uc81c\ub97c \uc778\uc2dd\ud558\uace0 \ub300\ucc98\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \ud0a4\uc6b0\ub294 \uac83\uc774 \uc7a5\uae30\uc801\uc73c\ub85c \uc720\uc775\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4 \uccad\uc18c\ub144\uc774 \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\ub294 \ub370 \ub354 \uc88b\uc740 \ubc29\ubc95\uc740 \uae30\uc220\uc801 \ubcf4\ud638 \uc7a5\uce58\ub97c \uac15\ud654\ud558\ub294 \uac83\uc785\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc704\ud5d8\uc740 \uad50\uc721\uc744 \ud1b5\ud574 \ud6a8\uacfc\uc801\uc73c\ub85c \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc774\ub098 \uc911\ub3c5 \uac19\uc740 \ubb38\uc81c\ub294 \uaddc\uc81c\ubcf4\ub2e4\ub294 \uc608\ubc29 \uad50\uc721\uc744 \ud1b5\ud574 \ud6a8\uacfc\uc801\uc73c\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \uac00\uc815 \ud658\uacbd\uc774\ub098 \uad50\uc721\uc801 \uc9c0\uc6d0\uc774 \ubd80\uc871\ud55c \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c\ub294 \ubc95\uc548\ubcf4\ub2e4\ub3c4 \uc9c1\uc811\uc801\uc778 \uc0ac\ud68c\uc801 \uc9c0\uc6d0\uacfc \uc0c1\ub2f4 \uc11c\ube44\uc2a4\uac00 \ub354 \ud070 \ub3c4\uc6c0\uc744 \uc904 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubc0f \ubd80\uc815\ud655\ud55c \uc815\ubcf4 \ub178\ucd9c\uc5d0 \ub300\ud55c \uc6b0\ub824\uc5d0 \ub300\uc751\ud558\uc790\uba74, \uc774\ub7ec\ud55c \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub294 \ub370 \uc788\uc5b4\uc11c \uc911\uc694\ud55c \uac83\uc740 \ud50c\ub7ab\ud3fc\uc758 \uc801\uadf9\uc801\uc778 \ubaa8\ub2c8\ud130\ub9c1\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uaddc\uc81c\uac00 \uc5c6\uc774\ub3c4 \ub2e4\uc591\ud55c \uc774\ud574\uad00\uacc4\uc \ubc95\ub960\uc5d0 \uc758\ud55c \uc77c\ub960\uc801\uc778 \ub098\uc774 \uc81c\ud55c\uc774\ub098 \uc0ac\uc6a9 \uc2dc\uac04 \uaddc\uc81c\uac00 \uac00\ub2a5\ud560\uc9c0\ub77c\ub3c4, \uc774\ub294 \uc77c\uad00\uc131\uc774 \uacb0\uc5ec\ub420 \uc218 \uc788\uace0 \uac1c\uc778\uc758 \ub2e4\uc591\uc131\uc744 \uace0\ub824\ud558\uc9c0 \ubabb\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uaddc\uc81c\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ucc3d\uc758\ub825\uacfc \uc790\uc728\uc131\uc744 \uc81c\ud55c\ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc774\ub7ec\ud55c \ubc95\uc548\uc740 \ud5cc\ubc95\uc0c1 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uce68\ud574\ud560 \uc18c\uc9c0\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uacbd\uc81c \ucc38\uc5ec \ubc0f \ub514\uc9c0\ud138 \uacbd\uc81c \uc774\ud574\ub825\uc744 \uc800\ud574\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc548\uc744 \ud1b5\ud55c \uc81c\ud55c\uc740 \uae30\uc220 \ubc1c\uc804\uc758 \uc18d\ub3c4\ub97c \ub530\ub77c\uc7a1\uc9c0 \ubabb\ud558\uba70 \uc624\ud788\ub824 \ubb38\uc81c\ub97c \uc545\ud654\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801\uc778 \uc81c\ud55c\uc740 \uc790\uce6b \uc624\ud788\ub824 \uc5ed\ud6a8\uacfc\ub97c \ucd08\ub798\ud560 \uc218\ub3c4 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \ucc3d\uc758\uc801 \ubc1c\ub2ec\uc744 \uc800\ud574\ud560 \uc218 \uc788\ub294 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc5b5\uc555\ud558\ub294 \uc774\ub7f0 \ubc95\uc548\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uad8c\ub9ac\uc640 \uc790\uae30 \ud45c\ud604 \ub2a5\ub825\uc744 \uc81c\ud55c\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ubc95\uc801\uc778 \uc81c\ud55c\uc774 \ucd08\uae30\uc5d0 \uc989\uac01\uc801\uc778 \ud6a8\uacfc\ub97c \uc904 \uc218 \uc788\uaca0\uc9c0\ub9cc, \uadf8 \uc790\uccb4\ub85c \uadfc\ubcf8\uc801\uc778 \ubb38\uc81c \ud574\uacb0\uc5d0 \ud544\uc218\uc801\uc778 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4. '\uc720\ub7fd\ud3c9\uc758\ud68c(Council of Europe)'\ub294 \ub514\uc9c0\ud138 \uad8c\ub9ac\uc640 \uac1c\uc778\uc758 \uc790\uc720\uc758 \uade0\ud615\uc744 \uc720\uc9c0\ud560 \ud544\uc694\uc131\uc744 \uc5b8\uae09\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uc624\ud788\ub824 \ubbf8\uc131\ub144\uc790\uc640 \uac00\uc871 \uac04\uc758 \uac08\ub4f1\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc73c\uba70, \uc774\ub85c \uc778\ud574 \uc790\uc2e0\ub4e4\uc758 \ud589\ub3d9\uc744 \uc228\uae30\ub824\ub294 \uacbd\ud5a5\uc774 \uc0dd\uae38 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc744 \ud1b5\ud55c \ubcf4\ud638\ub294 \uc77c\uc2dc\uc801\uc77c \uc218 \uc788\uc73c\uba70, \uc2e4\uc81c\ub85c \uccad\uc18c\ub144\ub4e4\uc774 \uc9c1\uba74\ud558\ub294 \uc704\ud5d8\uc744 \ud574\uacb0\ud558\ub294 \ub370 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ubc95\uc801 \uc81c\ud55c\uc740 \uc624\ud788\ub824 \ubbf8\uc131\ub144\uc790\ub4e4\uc744 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uae0d\uc815\uc801 \uc0ac\uc6a9\uc5d0\uc11c \uc18c\uc678\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc774\ub7ec\ud55c \ubc95\uc548\uc740 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc774\ub7ec\ud55c \ubc95\uc548\uc740 \ubbf8\uc131\ub144\uc790\uc758 \ud45c\ud604\uc758 \uc790\uc720\ub97c \ubd80\ub2f9\ud558\uac8c \uce68\ud574\ud560 \uc704\ud5d8\uc774 \ud07d\ub2c8\ub2e4","\ub610\ud55c, \ubc95\uc801 \uaddc\uc81c\ub294 \uccad\uc18c\ub144\ub4e4\uc758 \ucc3d\uc758\uc131\uacfc \uc131\uc7a5 \uc7a0\uc7ac\ub825\uc744 \uc81c\ud55c\ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uad50\uc721\uc801 \uae30\ud68c\ub97c \uc81c\ud55c\ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubb34\uc870\uac74\uc801\uc778 \ubc95 \uc81c\ud55c\uc740 \uae30\uc220 \ubc1c\uc804\uacfc \uc0ac\ud68c\uc801 \ubcc0\ud654\uc5d0 \uc720\uc5f0\ud558\uac8c \ub300\uc751\ud558\uc9c0 \ubabb\ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ud45c\ud604\uc758 \uc790\uc720\ub97c \uce68\ud574\ud560 \uc18c\uc9c0\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc644\uc804\ud55c \uae08\uc9c0\ub294 \uc5ed\ud6a8\uacfc\ub97c \ubd88\ub7ec\uc77c\uc73c\ud0ac \uc218 \uc788\uc73c\uba70, \ubd88\ubc95\uc801\uc778 \uc811\uadfc\uc744 \uc870\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ubc95\uc801 \uaddc\uc81c\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ub290\ub07c\ub294 \uac1c\uc778\uc758 \uc790\uc720\uc640 \uad8c\ub9ac\ub97c \uce68\ud574\ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc77c\ub960\uc801\uc73c\ub85c \uae08\uc9c0\ud558\ub294 \uac83\uc740 \ubbf8\uc131\ub144\uc790\uc758 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4. '\ubbf8\uad6d \uc2dc\ubbfc \uc790\uc720 \uc5f0\ub9f9'(ACLU)\uc740 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc5b5\uc555\ud558\ub294 \ubc95\uc801\uc778 \uaddc\uc81c\ub294 \uadf8 \uc790\uccb4\ub85c \ubd88\uade0\ud615\uc801\uc774\uba70, \uccad\uc18c\ub144\ub4e4\uc758 \uac1c\uc778 \uad8c\ub9ac\ub97c \uc81c\ud55c\ud558\ub294 \uacb0\uacfc\ub97c \ucd08\ub798\ud560 \uc218 \uc788\ub2e4\uace0 \uacbd\uace0\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc774\ub7f0 \ubc95\uc548\uc740 \uae30\uc220 \uc0b0\uc5c5\uc758 \uc131\uc7a5\uacfc \ud601\uc2e0\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uac1c\uc778\uc758 \uc790\uc720\uc640 \uc120\ud0dd\uad8c\uc744 \uacfc\ub3c4\ud558\uac8c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc644\ubcbd\ud55c \ud574\uacb0\ucc45\uc774 \uc874\uc7ac\ud558\uc9c0 \uc54a\ub354\ub77c\ub3c4 \ubc95\ub960\uc801 \uc81c\ud55c\uc774 \uc624\ud788\ub824 \ubd80\uc791\uc6a9\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uae30\uc220 \ubc1c\uc804\uacfc \uc0ac\ud68c \ubcc0\ud654\uc5d0 \uc720\uc5f0\ud558\uac8c \ub300\uc751\ud558\uc9c0 \ubabb\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801\uc778 \uc81c\ud55c\uc740 \uae30\uc220 \ubc1c\uc804 \uc18d\ub3c4\uc5d0 \ub9de\ucdb0 \uc720\uc5f0\ud558\uac8c \ub300\uc751\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ubc95\uc801 \uc7a5\uce58\uac00 \uac15\uc870\ud558\ub294 \uc9c0\ub098\uce5c \uaddc\uc81c\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ub2a5\ub3d9\uc801\uc778 \ucc38\uc5ec\uc640 \uc790\uae30 \uc8fc\ub3c4\uc801 \ud559\uc2b5\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc548 \ub3c4\uc785\uc73c\ub85c \uc778\ud55c \ub2e8\uacc4\uc801\uc778 \ud3d0\ud574\uac00 \uc0ac\ud68c \uc804\ubc18\uc5d0 \uc601\ud5a5\uc744 \uc904 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubaa8\ub4e0 \uac00\uc815\uc774 \ub3d9\uc77c\ud55c \ubc95\uc801 \uc81c\ud55c\uc744 \ub611\uac19\uc774 \uacbd\ud5d8\ud558\ub294 \uac83\uc740 \uc27d\uc9c0 \uc54a\uc73c\uba70, \uc774\ub294 \uc624\ud788\ub824 \ubd80\ubaa8\uc640 \uc790\ub140 \uac04\uc758 \uc2e0\ub8b0\ub97c \uc57d\ud654\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc81c\ud55c\uc740 \uc624\ud788\ub824 \uccad\uc18c\ub144\uc758 \ud638\uae30\uc2ec\uc744 \uc99d\uac00\uc2dc\ud0a4\uace0 \uae08\uc9c0\ub41c \uc694\uc18c\uc5d0 \ub300\ud55c \ubb34\ubd84\ubcc4\ud55c \uc811\uadfc\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uaddc\uc81c\uac00 \uae30\uc220 \ubc1c\uc804\uc744 \ub530\ub77c\uc7a1\ub294 \uac83\uc740 \ubcf8\uc9c8\uc801\uc73c\ub85c \ud55c\uacc4\uac00 \uc788\uae30 \ub54c\ubb38\uc5d0, \uaddc\uc81c\uac00 \uc544\ub2cc \ud611\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubb34\uc791\uc815 \uc81c\ud55c\ud558\ub294 \uac83\uc740 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\uac00 \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud574 \ud544\uc694\ud560 \uc218 \uc788\ub2e4\ub294 \uc810\uc740 \uc778\uc815\ud558\uc9c0\ub9cc, \uc9c0\ub098\uce5c \uc81c\ub3c4\uc801 \uc81c\ud55c\uc740 \ubd80\uc791\uc6a9\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae08\uc9c0\ub294 \uccad\uc18c\ub144\uc758 \uc790\uae30 \ud45c\ud604\uacfc \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc131\uc744 \uc904\uc77c \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uad50\uc721\uc801\uc778 \uae30\ud68c\ub97c \ubc15\ud0c8\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801\uc778 \uc81c\ud55c\uc740 \uad00\ub150\uc801\uc778 \ubcf4\ud638 \uc774\uc0c1\uc758 \uc2e4\uc6a9\uc801\uc778 \ub300\uc548\uc744 \uc694\uad6c\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubc95\uc801\uc73c\ub85c \uc81c\ud55c\ud558\uba74 \uc815\ubcf4\uc758 \uc811\uadfc\uc131\uc5d0 \uc81c\uc57d\uc774 \uc0dd\uae38 \uc218 \uc788\uc2b5\ub2c8\ub2e4. [\ub514\uc9c0\ud138 \ud50c\ub7ab\ud3fc\uacfc \uc628\ub77c\uc778 \uad11\uace0\ub97c \ud1b5\ud574 \uc218\uc775\uc744 \ucc3d\ucd9c\ud558\ub294] \ud398\uc774\uc2a4\ubd81\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\uac00 \ub2e4\uc591\ud55c \uc815\ubcf4\uc640 \uad50\uc721 \uc790\ub8cc\uc5d0 \uc811\uadfc\ud560 \uae30\ud68c\ub97c \uc81c\uacf5\ud55c\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\ub300 \uccad\uc18c\ub144\ub4e4\uc774 \uc0ac\ud68c\ud654\ud558\uace0 \uc5f0\uacb0\ub418\ub294 \uc911\uc694\ud55c \uacf5\uac04\uc774\uba70, \uc774\ub97c \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uadf8\ub4e4\uc758 \uc0ac\ud68c\uc801 \ubc1c\ub2ec\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \ud310\ub2e8\ub825 \ubd80\uc871\uc744 \uc774\uc720\ub85c \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uad50\uc721\uc801 \uae30\ud68c\ub97c \ube7c\uc557\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc870\uce58\ub294 \ubaa8\ub4e0 \uc704\ud5d8 \uc694\uc18c\ub97c \uc81c\uac70\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uaddc\uc81c\ub294 \uc720\uc5f0\ud558\uc9c0 \ubabb\ud558\uace0 \uac1c\ubcc4 \uc0c1\ud669\uc5d0 \uc801\ud569\ud558\uc9c0 \uc54a\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc644\uc804\ud788 \uae08\uc9c0\ud558\uba74 \uccad\uc18c\ub144\ub4e4\uc758 \uc790\uae30 \ud45c\ud604\uacfc \uc131\uc7a5\uc744 \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uba3c\uc800, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \ubc95\uc801 \uc81c\ud55c\uc740 \uc624\ud788\ub824 \uccad\uc18c\ub144\ub4e4\uc774 \uad6c\uccb4\uc801\uc774\uace0 \uc2e4\uc9c8\uc801\uc778 \uc0ac\uc6a9 \ubc29\uc2dd\uc744 \ubc30\uc6b8 \uae30\ud68c\ub97c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uacfc \uc81c\ub3c4\ub9cc\uc73c\ub85c\ub294 \uc5ed\ub3d9\uc801\uc778 \uc628\ub77c\uc778 \ud658\uacbd\uc744 \uc2e4\uc2dc\uac04\uc73c\ub85c \ub300\uc751\ud558\uae30\uc5d0 \ubd80\uc871\ud569\ub2c8\ub2e4","\ub610\ud55c, \ubc95\uc801 \uaddc\uc81c\ub85c \uc778\ud55c \uacfc\uc789 \ubcf4\ud638\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ucc45\uc784\uac10\uc744 \ubc30\uc6b0\uace0 \uc62c\ubc14\ub978 \uacb0\uc815\uc744 \ub0b4\ub9ac\ub294 \ub2a5\ub825\uc744 \ud0a4\uc6b0\ub294 \uac83\uc744 \ubc29\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc790\uc728\uc131\uacfc \ubb38\uc81c \ud574\uacb0 \ub2a5\ub825 \ubc1c\ub2ec\uc744 \ubc29\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc81c\ud55c\uc740 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc804\uba74\uc801\uc778 \uc81c\ud55c\uc740 \ubb38\uc81c \ud574\uacb0\ubcf4\ub2e4\ub294 \uc624\ud788\ub824 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc548\uc804\uc5d0 \ub300\ud55c \uacbd\uacc4\uc2ec\uc744 \ubb34\ub514\uac8c \ud560 \uac00\ub2a5\uc131\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \ubcf4\ud638\uc790\uac00 \uc544\ub2cc \ubc95\uc5d0 \uc758\ud574 \uacb0\uc815\ub418\uc5b4\uc120 \uc548 \ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uccad\uc18c\ub144\uc758 \uae30\uc220\uc801 \uaca9\ub9ac\uc640 \uc0ac\ud68c\uc801 \ub3c4\ud0dc\ub97c \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \ubcf4\ud638 \uc7a5\uce58\ub294 \ubbf8\uc131\ub144\uc790\uc758 \ub514\uc9c0\ud138 \ud658\uacbd \uc801\uc751\uacfc \uc790\uc728\uc131\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc774 \ubc95\uc548\uc774 \uc2dc\ud589\ub418\uba74 \uad50\uc721\uc801 \uae30\ud68c\uc758 \uc0c1\uc2e4\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c \ubc95\uc548\uc740 \uccad\uc18c\ub144\uc758 \uc790\uc728\uc131\uacfc \ucc45\uc784\uac10\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ub3c4\ud55c \ubc95\uc801 \uaddc\uc81c\ub294 \ubb38\ud654\uc640 \uc0ac\ud68c\uc801 \ubc30\uacbd\uc774 \ub2e4\ub978 \ub2e4\uc591\ud55c \ucee4\ubba4\ub2c8\ud2f0\uc758 \ud2b9\uc131\uc744 \ubb34\uc2dc\ud560 \uac00\ub2a5\uc131\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uaddc\uc81c\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ucc3d\uc758\uc801\uc778 \ud65c\uc6a9\uacfc \uae30\uc220 \ubc1c\uc804\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uadf8\ub4e4\uc758 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc81c\ud55c\uc801\uc778 \ubc95\uc548\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc7a0\uc7ac\uc801\uc778 \uc774\uc775\uc744 \uac00\ub85c\ub9c9\uc744 \uc218 \uc788\ub294 \uc5ed\ud6a8\uacfc\ub97c \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\ub294 \uac83\uc740 \ubbf8\uc131\ub144\uc790\uc758 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc5b5\uc555\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc811\uadfc \uc81c\ud55c\uc740 \uad50\uc721\uc801 \uae30\ud68c\ub97c \ube8f\uc744 \uac83\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \uad50\uc721\uc801 \uc5ed\ud560\uc744 \uc57d\ud654\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc758 \ubd80\uc791\uc6a9\uc73c\ub85c \uc815\ub2f9\ud55c \uc815\ubcf4 \uc811\uadfc\uc774 \ucc28\ub2e8\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc804\uba74 \uae08\uc9c0\ud558\ub294 \uac83\uc740 \uc2e4\ud6a8\uc131\uc774 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \ubbf8\ub798\uc758 \ub514\uc9c0\ud138 \uc0ac\ud68c \ucc38\uc5ec\ub97c \uc704\ud611\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uba3c\uc800, \uc774\ub7ec\ud55c \ubc95\uc548\uc740 \uccad\uc18c\ub144\ub4e4\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc131\uacfc \uac1c\uc778\uc801 \ubc1c\uc804\uc744 \ubc29\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uc790\uae30 \ud45c\ud604\uc744 \uc704\ud55c \uc911\uc694\ud55c \ud50c\ub7ab\ud3fc\uc774 \uc81c\ud55c\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ub2e8\uc21c\ud788 \uc81c\ud55c\ud558\ub294 \uac83\uc740 \ub514\uc9c0\ud138 \uaca9\ucc28\ub97c \uc2ec\ud654\uc2dc\ud0a4\uace0, \uae30\uc220\uc801 \uc774\ud574\ub3c4\ub97c \ub5a8\uc5b4\ub728\ub9b4 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uae30\uc220 \ud601\uc2e0\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc73c\uba70, \uc774\ub294 \uc624\ud788\ub824 \uccad\uc18c\ub144\ub4e4\uc744 \uc704\ud55c \ubcf4\ub2e4 \ud6a8\uacfc\uc801\uc778 \ubcf4\ud638 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ubc29\ud574\uac00 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4. [\ub514\uc9c0\ud138 \ud601\uc2e0\uacfc \uc81c\ud488 \uac1c\ubc1c\uc5d0 \uc804\ub150\ud558\ub294] \ud398\uc774\uc2a4\ubd81\uc758 \ubaa8\uae30\uc5c5 \uba54\ud0c0\ub294 \uae30\uc220\uacfc \uc778\uacf5\uc9c0\ub2a5\uc744 \uc774\uc6a9\ud55c \uc0c8\ub85c\uc6b4 \ubcf4\ud638 \uc7a5\uce58 \uac1c\ubc1c\uc774 \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \ub354 \ud601\uc2e0\uc801\uc774\uace0 \uc720\uc5f0\ud55c \ud574\uacb0\ucc45\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801\uc778 \uaddc\uc81c\ub294 \uc77c\uad00\ub41c \uc2e4\ud589\uacfc \uad00\ub9ac\uc758 \uc5b4\ub824\uc6c0 \ub54c\ubb38\uc5d0 \uc2e4\ud6a8\uc131\uc744 \uc783\uae30 \uc27d\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uad50\uc721\uc758 \ubd88\uade0\ud615 \ubb38\uc81c\ub97c \ud574\uacb0\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801\uc778 \uc81c\ud55c\uc740 \uc624\ud788\ub824 \uccad\uc18c\ub144\ub4e4\uc758 \ubc18\ubc1c\uc744 \ucd08\ub798\ud558\uc5ec \uaddc\uc81c\ub97c \ud68c\ud53c\ud558\ub824\ub294 \ud589\ub3d9\uc744 \uc720\ubc1c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ud45c\ud604\uc758 \uc790\uc720\uc640 \ucc3d\uc758\ub825 \ubc1c\ud718\ub97c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc0c1\uc758 \uc704\ud5d8 \uc694\uc18c\ub4e4\uc740 \ub2e4\uc591\ud55c \ud615\ud0dc\ub85c \ub098\ud0c0\ub098\uba70, \ubc95\uc801\uc778 \uc81c\ud55c\ub9cc\uc73c\ub85c\ub294 \uc774\ub97c \ud6a8\uacfc\uc801\uc73c\ub85c \uad00\ub9ac\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ubaa8\ub4e0 \uac00\uc815\uc774 \ub3d9\uc77c\ud55c \uc218\uc900\uc758 \uc9c0\ub3c4\ub97c \uc81c\uacf5\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc810\uc740 \uc778\uc815\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uccad\uc18c\ub144\uc758 \uac1c\uc778 \uad8c\ub9ac\uc640 \ud504\ub77c\uc774\ubc84\uc2dc\uc5d0 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce60 \uac00\ub2a5\uc131\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uad8c\ub9ac\ub97c \uce68\ud574\ud560 \uc704\ud5d8\uc774 \uc788\uc73c\uba70, \uc774\ub294 \ub354 \ud070 \uc0ac\ud68c\uc801 \ubb38\uc81c\ub97c \uc57c\uae30\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubc95\uc801 \uc81c\ud55c\uc740 \ud544\uc694\ud560 \ub54c\ub3c4 \uc788\uc9c0\ub9cc, \uc774\ub294 \uccad\uc18c\ub144\ub4e4\uc758 \uc790\uae30 \uaddc\uc81c \ub2a5\ub825\uc744 \uc800\ud558\uc2dc\ud0a4\uace0 \ubc95\uc744 \ud53c\ud558\ub824\ub294 \uc2dc\ub3c4\ub97c \ubd80\ucd94\uae38 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\ub294 \uc624\ud788\ub824 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ud638\uae30\uc2ec\uc744 \uc99d\uac00\uc2dc\ucf1c \uc6d0\ud558\ub294 \uc815\ubcf4\uc640 \ucf58\ud150\uce20\uc5d0 \ub300\ud55c \uc811\uadfc\uc744 \ub354\uc6b1 \ubaa8\uc0c9\ud558\uac8c \ub9cc\ub4e4 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc774\ub7ec\ud55c \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\uc758 \ud45c\ud604\uc758 \uc790\uc720\ub97c \ubd80\ub2f9\ud558\uac8c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uaddc\uc81c\uc758 \uc77c\uad00\uc131\uacfc \ud6a8\uacfc\uc131\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc758 \uc81c\uc815\uc774 \ud56d\uc0c1 \uade0\uc77c\ud55c \uad50\uc721\uc758 \ubd80\uc7ac\ub97c \ubcf4\uc644\ud560 \uc218 \uc788\ub2e4\ub294 \ubcf4\uc7a5\uc740 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc0c1\ud669\uc5d0 \ub9de\ub294 \uaddc\uc81c\ub97c \ub3c4\uc785\ud558\uba74 \uccad\uc18c\ub144\uc758 \uc790\uc720\ub85c\uc6b4 \ud45c\ud604\uacfc \ubc1c\uc804\uc744 \ubc29\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\ub294 \ubc95\uc548\uc740 \uc790\uc728\uc131\uacfc \ucc45\uc784\uac10\uc744 \uae30\ub974\ub294\ub370 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce69\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc774 \uc218\uba74\uc5d0 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\ub2e4\ub294 \uc810\ub3c4 \uc9c0\uc801\ub418\uc9c0\ub9cc, \uc2dc\uac04 \uad00\ub9ac\uc640 \uc790\uae30 \uaddc\uc81c\uac00 \uc9c4\uc815\uc73c\ub85c \uc911\uc694\ud55c \uc694\uc18c\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uaddc\uc81c\ub294 \ubbf8\uc131\ub144\uc790\uc758 \ubc1c\ub2ec \uae30\ud68c\ub97c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccad\uc18c\ub144\ub4e4\uc774 \ucc98\ud55c \ub2e4\uc591\ud55c \uc0ac\ud68c\uc801 \ud658\uacbd\uc744 \uace0\ub824\ud560 \ub54c, \uc77c\uad04\uc801\uc778 \ubc95\uc801 \uc81c\ud55c\uc740 \uac1c\ubcc4\uc801\uc778 \uc694\uad6c\ub97c \uac04\uacfc\ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubc95\uc801\uc73c\ub85c \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uc815\ubcf4\uc640 \uc790\uc720\ub85c\uc6b4 \ud45c\ud604\uc758 \uad8c\ub9ac\uc5d0 \ubd80\uc815\uc801 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ubbf8\uc131\ub144\uc790\uc5d0 \ub300\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc774 \uc624\ud788\ub824 \uadf8\ub4e4\uc774 \ud544\uc694\ud55c \uc9c0\uc6d0\uc744 \ubc1d\ud788\uace0 \uc801\uc808\ud788 \uac1c\uc785\ud560 \uae30\ud68c\ub97c \ub193\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801\uc778 \uc81c\uc57d\uc740 \uc784\uc2dc \ubc29\ud3b8\uc5d0 \ubd88\uacfc\ud558\uba70 \uc9c0\uc18d \uac00\ub2a5\ud55c \ud574\uacb0\ucc45\uc744 \uc81c\uacf5\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \ud604\uc2e4\uc801\uc778 \uc9d1\ud589 \uac00\ub2a5\uc131\uc774 \ub0ae\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uc790\uc728\uc131\uc744 \ud559\uc2b5\ud558\ub294 \uae30\ud68c\ub97c \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uc644\ubcbd\ud55c \ud574\uacb0\ucc45\uc774 \uc544\ub2c8\uba70 \uc2e4\uc81c\ub85c\ub294 \uc6b0\ud68c\uc801 \uc811\uadfc\uc744 \uc720\ubc1c\ud558\uc5ec \uc624\ud788\ub824 \ub354 \ud070 \ud63c\ub780\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \ud1b5\ud574 \uae0d\uc815\uc801 \uc601\ud5a5\uc744 \ubc1b\uc744 \uc218 \uc788\ub294 \uae30\ud68c\uac00 \ubc95\uc801 \uc81c\ud55c\uc73c\ub85c \uc778\ud574 \uc0ac\ub77c\uc9c8 \uc218\ub3c4 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uadf8\ub4e4\uc758 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uae08\uc9c0\ud558\ub294 \uac83\uc740 \ud604\uc2e4\uc801\uc774\uc9c0 \uc54a\uc73c\uba70 \ubd80\uc791\uc6a9\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ucc3d\uc758\uc131\uacfc \uc790\uae30 \ud45c\ud604\uc758 \uc7a5\uc774 \uc0ac\ub77c\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c
