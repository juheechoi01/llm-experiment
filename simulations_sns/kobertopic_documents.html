\ub7ec\uc2dc \uad50\uc721\uc744 \ud1b5\ud574 \uc644\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubaa8\ub4e0 \ud658\uacbd\uc5d0\uc11c \uad50\uc721\uc774 \ucda9\ubd84\ud788 \uc774\ub8e8\uc5b4\uc9c0\uc9c0 \uc54a\uc744 \uc218 \uc788\ub2e4\ub294 \uc810\uc744 \uc778\uc9c0\ud558\uba74\uc11c\ub3c4, \ubc95\ub960\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uad50\uc721 \uc811\uadfc\uc131\uc744 \ud5a5\uc0c1\uc2dc\ud0a4\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uacf5\ub3d9\uccb4\uc758 \ucc38\uc5ec\uc640 \uc9c0\uc6d0\uc774 \ubc95\uc801\uc778 \uc81c\ud55c\ubcf4\ub2e4 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc790\uc728\uc801\uc73c\ub85c \uac74\uac15\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc2b5\uad00\uc744 \ud615\uc131\ud560 \uc218 \uc788\ub3c4\ub85d \uafb8\uc900\ud55c \uad50\uc721\uacfc \ud504\ub85c\uadf8\ub7a8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc758 \uc9c0\ub3c4 \ubd80\uc871\uc744 \ubcf4\uc644\ud558\uae30 \uc704\ud55c \uc9c0\uc5ed \uc0ac\ud68c\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc544\ub3d9\uacfc \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \uc989\uac01\uc801\uc778 \ub300\uc751\ucc45\uc740 \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4 \uae30\uc220\uc801 \uc194\ub8e8\uc158\uc744 \ud65c\uc6a9\ud558\uc5ec \ube60\ub974\uac8c \uc2dc\ud589\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc815\ubcf4 \uc81c\uacf5\uacfc \uc790\ubc1c\uc801 \ucc38\uc5ec\uac00 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc548\uc804\ud55c \uc778\ud130\ub137 \uc0ac\uc6a9 \uad50\uc721\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uac15\ub825\ud55c \ubc95\uc801 \uc81c\ud55c \ub300\uc2e0\uc5d0 \uc628\ub77c\uc778 \uc548\uc804 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc804 \uc138\uacc4\uc801\uc778 \ube44\uc601\ub9ac \uad50\uc721 \uc7ac\ub2e8\uc778 Khan Academy\ub294 \ubaa8\ub4e0 \uac00\uc815\uacfc \uad50\uc721\uae30\uad00\uc5d0 \uc628\ub77c\uc778 \uad50\uc721 \uc790\uc6d0\uc744 \ubb34\ub8cc\ub85c \uc81c\uacf5\ud558\uba74\uc11c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc758 \uc811\uadfc\uc131\uc744 \ub192\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uacfc\ub3c4\ud55c \uc0ac\uc6a9\uc73c\ub85c \uc778\ud55c \ubd80\uc791\uc6a9\uc740 \uad50\uc721\uacfc \uc9c0\uc18d\uc801\uc778 \ub300\ud654\ub85c \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uccad\uc18c\ub144\uc758 \uac1c\uc778\uc801 \ubc1c\uc804\uacfc \uc790\uae30 \ud45c\ud604\uc758 \uad8c\ub9ac\ub97c \ubcf4\ud638\ud574\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud558\ub294 \ubc95\uc744 \ubc30\uc6b8 \uae30\ud68c\ub97c \uc81c\uacf5\ud558\ub294 \uac83\uc774 \ub354\uc6b1 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uccad\uc18c\ub144\uc774 \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\ub098 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc5d0 \ub178\ucd9c\ub418\ub294 \uc704\ud5d8\uc744 \ubcf4\ub2e4 \ud6a8\uacfc\uc801\uc73c\ub85c \ud574\uacb0\ud558\ub824\uba74, \uac15\ub825\ud55c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4 \uc0ac\ud68c \uc804\ubc18\uc758 \ud611\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \uc801\uadf9\uc801\uc778 \uc5ed\ud560\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uacf5\uc801 \uc790\uc6d0\uc744 \ud65c\uc6a9\ud55c \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \uae30\uc220\uc5d0 \ub300\ud55c \uc811\uadfc\uc131\uc744 \ub192\uc5ec\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc774\ub97c \uaddc\uc81c\ud558\uae30\ubcf4\ub2e4\ub294 \ud6a8\uacfc\uc801\uc778 \uc9c0\uc6d0\uacfc \uad50\uc721\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uacfc \ub514\uc9c0\ud138 \uc18c\ud1b5 \uae30\uc220\uc744 \uac1c\ubc1c\ud558\ub294 \uc911\uc694\ud55c \ud50c\ub7ab\ud3fc\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\uae30\ubcf4\ub2e4\ub294 \uc548\uc804\ud55c \uc0ac\uc6a9\uc744 \uc704\ud55c \uad50\uc721\uacfc \uc9c0\ub3c4\uac00 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uac10\ub3c5 \ubd80\uc871\uc740 \uc815\ubd80\uc640 \uacf5\ub3d9\uccb4\uac00 \ud611\ub825\ud558\uc5ec \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uacfc\ub3c4\ud55c \uc0ac\uc6a9\uc740 \uc9c1\uc811\uc801\uc778 \uaddc\uc81c\ubcf4\ub2e4 \uc790\uc544 \uad00\ub9ac\uc5d0 \ub300\ud55c \uad50\uc721\uc744 \ud1b5\ud574 \ud6a8\uacfc\uc801\uc73c\ub85c \ub2e4\ub8f0 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \ud5a5\uc0c1\uc5d0 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\uc6a9\uc790 \uc0ac\uc774\uc758 \ud53c\ub4dc\ubc31\uc744 \ud0c4\ub825\uc801\uc73c\ub85c \uad00\ub9ac\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc744 \ubc1c\uc804\uc2dc\ud0a4\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc2dc\uac04\uacfc \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \uac1c\uc778\uc801\uc778 \ucc45\uc784\uacfc \uade0\ud615 \uc7a1\ud78c \uc0dd\ud65c \uc2b5\uad00\uc744 \ud1b5\ud574 \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ubd80\ubaa8\uc640 \ud559\uad50, \uadf8\ub9ac\uace0 \ucee4\ubba4\ub2c8\ud2f0\uac00 \ud568\uaed8 \ud611\ub825\ud558\uc5ec \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c\uc744 \uc81c\uacf5\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uba3c\uc800, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc704\ud5d8\uc131\uc744 \uc644\ud654\ud558\ub824\uba74 \uc0ac\uc6a9\uc790 \uad50\uc721\uacfc \uae30\uc220\uc801 \ubcf4\ud638\uac00 \uc911\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uad50\uc721\uc744 \ud1b5\ud55c \ucc45\uc784 \uc788\ub294 \uc0ac\uc6a9\uc744 \uc7a5\ub824\ud558\ub294 \uac83\uc774 \ud6e8\uc52c \ubc14\ub78c\uc9c1\ud55c \uc811\uadfc\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc790\uc728\uc131\uacfc \ucc45\uc784\uac10\uc744 \uae30\ub974\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc548\uc804 \uae30\uc900\uc744 \ubc95\uc801\uc73c\ub85c \uc81c\uc815\ud558\ub294 \ub300\uc2e0, \uae30\uc220\uacfc \uad50\uc721\uc744 \ud1b5\ud574 \uc9c0\uc18d \uac00\ub2a5\ud55c \uc548\uc804 \ud658\uacbd\uc744 \uad6c\ucd95\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc790\uc728\uc131\uacfc \ucc45\uc784\uac10\uc744 \ud0a4\uc6b0\ub294 \uad50\uc721\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc758 \uc548\uc804\ud55c \uc0ac\uc6a9\uc744 \uc7a5\ub824\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc798\ubabb\ub41c \uc815\ubcf4\uc5d0 \ub300\ud55c \ube44\ud310\uc801 \uc0ac\uace0\ub97c \ubc1c\uc804\uc2dc\ud0a4\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \uad50\uc721\uc801 \uc790\uc6d0\uc740 \ub2e8\uc9c0 \ubc95\uc801 \uaddc\uc81c\uac00 \uc544\ub2cc \ub2e4\uac01\uc801\uc778 \uc811\uadfc\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc640 \uad50\uc721\uae30\uad00\uc774 \ud611\ub825\ud558\uc5ec \ubcf4\ud638 \uc870\uce58\uc640 \uad50\uc721\uc744 \ub3d9\uc2dc\uc5d0 \uac15\ud654\ud558\ub294 \uac83\uc774 \ubc14\ub78c\uc9c1\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uad50\uc721\uc774 \uc62c\ubc14\ub978 \uc811\uadfc\ubc95\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \uc5ed\ud560\uc744 \uac15\ud654\ud574\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub97c \ub2e4\ub8e8\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc778 \uc5f0\uad6c\uc640 \ud611\ub825\uc744 \ud1b5\ud574 \uc0ac\uc6a9\uc790 \ubcf4\ud638 \uae30\ub2a5\uc744 \uac1c\uc120\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uc815\ubd80\uc640 \uad50\uc721 \uae30\uad00\uc758 \uc2e4\uc9c8\uc801\uc778 \uac1c\uc785\uc740 \uae08\uc9c0 \uc870\uce58\ubcf4\ub2e4\ub294 \uc608\ubc29 \uc870\uce58\ub85c \uadf8 \ud6a8\uacfc\ub97c \ubc1c\ud718\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\ud68c\uc640 \uae30\uc220 \uae30\uc5c5\uc774 \ud611\ub825\ud558\uc5ec \uccad\uc18c\ub144 \ubcf4\ud638 \uc815\ucc45\uc744 \uac1c\ubc1c\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \ud45c\ud604\uc758 \uc790\uc720\uc640 \uc790\uc728\uc131\uc740 \ubcf4\ud638\ub418\uc5b4\uc57c \ud558\uba70, \uc774\ub294 \ubcf8\uc778\uc758 \ud310\ub2e8\ub825\uc744 \uae30\ub974\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \ub2e4\uc591\ud55c \uc0ac\ud68c\uc801 \uc548\uc804\ub9dd\uc774 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \uc608\ubc29\ud558\ub294 \ub370 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ud45c\ud604\uc758 \uc790\uc720\ub294 \ud574\ub85c\uc6b4 \ucf58\ud150\uce20\ub098 \ubd80\uc801\uc808\ud55c \uad50\ub958\uc5d0 \ub300\ud55c \uacbd\uac01\uc2ec\uc744 \ub192\uc784\uc73c\ub85c\uc368 \ubcf4\ud638\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\ud68c\uc801\uc778 \ubb38\uc81c\uc5d0 \ub300\ud55c \ubc95\uc801\uc778 \ub300\uc751\ubcf4\ub2e4\ub294, \uae30\uc220 \uae30\uc5c5\uacfc \uc0ac\ud68c\uac00 \ud611\ub825\ud558\uc5ec \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \uc2dc\uc2a4\ud15c\uacfc \ub3c4\uad6c\ub97c \uac1c\ubc1c\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ud604\uc2e4\uc801\uc774\uace0 \ucc45\uc784 \uc788\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uad50\uc721\uc740 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub294 \ub370 \ub354\uc6b1 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\uc774 \uc544\ub2c8\ub77c \ud1b5\ud569\uc801\uc778 \uad50\uc721\uacfc \uae30\uc220\uc801 \uc811\uadfc\uc744 \ud1b5\ud574 \ubcf4\ud638\ub97c \uac15\ud654\ud574\uc57c \ud55c\ub2e4\ub294 \uac83\uc774 \ud575\uc2ec\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc815\uc2e0 \uac74\uac15\uacfc \uad00\ub828\ub41c \ubb38\uc81c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc790\uccb4\uc758 \uc81c\ud55c\uc774 \uc544\ub2cc, \uc62c\ubc14\ub978 \uc0ac\uc6a9 \ubc29\ubc95\uc5d0 \ub300\ud55c \uad50\uc721\uc744 \ud1b5\ud574 \ub354 \ud6a8\uacfc\uc801\uc73c\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ucee4\ubba4\ub2c8\ud2f0\uc640 \uc815\ubd80\uc758 \ud611\ub825\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc815\uc2e0 \uac74\uac15 \uad00\ub9ac\uc5d0 \uae30\uc5ec\ud560 \uc218 \uc788\ub294 \ub2e4\uc591\ud55c \uc790\uc6d0\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc624\ud788\ub824 \uccad\uc18c\ub144\ub4e4\uc758 \uc815\uc2e0 \uac74\uac15\uc744 \uc704\ud55c \uae0d\uc815\uc801\uc778 \uc9c0\uc6d0\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \uacf5\uac04\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc815\ubd80 \ucc28\uc6d0\uc758 \uc9c0\uc6d0 \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc744 \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uacfc\ub3c4\ud55c \uc0ac\uc6a9\uacfc \ubd80\uc791\uc6a9\uc744 \uc608\ubc29\ud558\uae30 \uc704\ud574 \uad50\uc721\uacfc \uc9c0\ub3c4 \uac15\ud654\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc790\uc2e0\uc758 \ubaa9\uc18c\ub9ac\ub97c \ud45c\ud604\ud558\uace0 \uc0ac\ud68c\uc801 \uc774\uc288\uc5d0 \ucc38\uc5ec\ud560 \uc218 \uc788\ub294 \uacbd\ub85c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ubfd0\ub9cc \uc544\ub2c8\ub77c, \uccad\uc18c\ub144\ub4e4\uc774 \uc790\uc728\uc131\uacfc \ucc45\uc784\uac10\uc744 \uae30\ub974\ub294 \uc911\uc694\ud55c \uae30\ud68c\uc774\uae30\ub3c4 \ud569\ub2c8\ub2e4","\ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0 \ub300\ud55c \uc62c\ubc14\ub978 \uc815\ubcf4\ub97c \uc81c\uacf5\ud558\uace0, \uc628\ub77c\uc778\uc5d0\uc11c\uc758 \ucc45\uc784 \uc788\ub294 \ud589\ub3d9\uacfc \uc548\uc804\ud55c \uc0ac\uc6a9\ubc95\uc744 \uad50\uc721\ud574\uc57c \ud569\ub2c8\ub2e4","\ud589\uc815\uc801 \uaddc\uc81c\ubcf4\ub2e4\ub294 \uacf5\ub3d9\uccb4\uc758 \uc5ed\ud560 \uac15\ud654\uac00 \ub354 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uad50\uc721\uc801 \uae30\ud68c\ub97c \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc774 \uc815\ubcf4 \uac80\uc99d \ub2a5\ub825\uc744 \ud0a4\uc6b8 \uc218 \uc788\ub3c4\ub85d \ud574\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc704\ud5d8\uc744 \uad00\ub9ac\ud558\ub294 \ub370 \uc788\uc5b4 \uad50\uc721\uc774 \ud6a8\uacfc\uc801\uc77c \uac83\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801\uc778 \ubcf4\ud638 \uc7a5\uce58\ub294 \ucd5c\ud6c4\uc758 \uc218\ub2e8\uc774\uc5b4\uc57c \ud558\uba70, \uad11\ubc94\uc704\ud55c \uad50\uc721 \ubc29\uce68\uacfc \ud568\uaed8 \uc0ac\uc6a9\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc815\ucc45\uc801 \uc9c0\uc6d0\uc744 \ud1b5\ud574 \ubcf4\ud638\uc790\ub97c \uc704\ud55c \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uacfc \uc790\uc6d0 \uc81c\uacf5\uc744 \ud655\ucda9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0\uc11c \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \ubd80\uc791\uc6a9\uc740 \uad50\uc721\uacfc \ub300\ud654\ub97c \ud1b5\ud574 \uc608\ubc29\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc774\ub098 \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc758 \ubb38\uc81c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uae08\uc9c0\ud558\uae30\ubcf4\ub2e4\ub294 \uc62c\ubc14\ub978 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc744 \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc790\uccb4\uc758 \uac1c\uc120\ub3c4 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc815\ucc45\uc801 \uc9c0\uc6d0\uacfc \ubc95\ub960 \uccb4\uacc4\uc758 \uac1c\uc120\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721\uacfc \uc790\uc728\uc801\uc778 \uaddc\uc81c\uac00 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uac1c\uc778\uc815\ubcf4 \ubcf4\ud638 \ubb38\uc81c\uc5d0 \ub300\ud574\uc11c\ub294 \uc0ac\uc6a9\uc790 \uad50\uc721\uacfc \ud50c\ub7ab\ud3fc\uc758 \ucc45\uc784\uc131\uc774 \ub354\uc6b1 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc678\ubd80 \uaddc\uc81c\ubcf4\ub2e4\ub294 \uc9c0\uc5ed \uc0ac\ud68c\uc640 \uad50\uc721 \uc2dc\uc2a4\ud15c\uc744 \ud1b5\ud55c \uc9c0\uc18d\uc801\uc778 \uc9c0\uc6d0\uacfc \ud611\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8 \ubc0f \ubcf4\ud638\uc790\uc640 \uccad\uc18c\ub144 \uac04\uc758 \ub300\ud654\uc640 \uad50\uc721\uc774 \uac00\uc7a5 \ud575\uc2ec\uc801\uc778 \ubcf4\ud638 \uc218\ub2e8\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc640 \uad00\ub828 \uae30\uc220\uc744 \ud568\uc591\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \uae30\uc220\uc744 \ud1b5\ud574 \ud574\uacb0 \uac00\ub2a5\ud55c \uce21\uba74\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\ud68c \uc804\uccb4\uc801\uc778 \ud611\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\ud68c\uc801 \uc9c0\uc6d0 \ubc0f \uacf5\ub3d9\uccb4\uc758 \uc5ed\ud560\uc744 \uac15\ud654\ud574\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc9c1\uc811 \uccb4\ud5d8\ud558\uba74\uc11c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \ubc30\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \ub9de\ucda4\ud615 \uc194\ub8e8\uc158\uc744 \ud1b5\ud574 \uac01 \uac00\uc815\uc758 \uc0c1\ud669\uc5d0 \ub9de\ub294 \uad00\ub9ac \ubc29\uc2dd\uc744 \ucc3e\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ud1b5\ud574 \uc624\ud788\ub824 \uc815\uc2e0 \uac74\uac15\uc744 \uc9c0\uc9c0\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc740 \uc790\uae30 \ud45c\ud604\uc758 \uae30\ud68c\ub97c \ucc3e\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\uc774\ubc84 \ubd88\ub9c1\uacfc \uac19\uc740 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5 ucc45\uc784 \uc788\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721\uc740 \ubbf8\uc131\ub144\uc790\uc758 \uc911\uc694\ud55c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \ud5a5\uc0c1\uc2dc\ud0b5\ub2c8\ub2e4","\uccab\uc9f8, \uccad\uc18c\ub144\uc774 \uc0ac\uc774\ubc84 \ud3ed\ub825\uc774\ub098 \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc5d0 \ub178\ucd9c\ub420 \uc704\ud5d8\uc740 \uc874\uc7ac\ud558\uc9c0\ub9cc, \uc774\ub294 \uad50\uc721\uacfc \uc62c\ubc14\ub978 \uc0ac\uc6a9 \uc9c0\uce68\uc744 \ud1b5\ud574 \ucda9\ubd84\ud788 \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801\uc778 \uc81c\ud55c\ubcf4\ub2e4 \ud1b5\ud569\ub41c \uacf5\ub3d9\uccb4\uc758 \ub178\ub825\uc774 \ub354 \uc9c0\uc18d\uac00\ub2a5\ud558\uace0 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ube44\uacf5\uc2dd\uc801\uc778 \uc0ac\ud68c\uc801 \ud559\uc2b5 \uacbd\ud5d8\ub3c4 \uc313\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ud310\ub2e8 \ub2a5\ub825\uc758 \uc131\uc219\uc740 \uacbd\ud5d8\uc744 \ud1b5\ud574 \uae38\ub7ec\uc9d1\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uac1c\uc778\uacfc \uac00\uc871\uc758 \ucc45\uc784\uc740 \uc815\ubd80\uc758 \uacfc\ub3c4\ud55c \uaddc\uc81c\ubcf4\ub2e4 \ub354 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uccad\uc18c\ub144\uc740 \uae30\uc220\uc801 \ud658\uacbd \uc18d\uc5d0\uc11c \uc801\uc751\ud558\ub294 \ubc95\uc744 \ubc30\uc6cc\uc57c \ud569\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \ud50c\ub7ab\ud3fc \uac04 \ud611\ub825\uc744 \ud1b5\ud55c \ud45c\uc900\ud654\ub41c \uc548\uc804 \uc870\uce58\uac00 \ub354 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4. [\uc628\ub77c\uc778 \uad11\uace0\uc640 \ub514\uc9c0\ud138 \ub9c8\ucf00\ud305\uc744 \ub2e4\ub8e8\ub294] \ub124\ud2b8\uc6cc\ud06c \uc560\ub4dc\ubc84\ud0c0\uc774\uc9d5 \uc778\ub2c8\uc154\ud2f0\ube0c(Network Advertising Initiative, NAI)\ub294 \uc5ec\ub7ec \ud50c\ub7ab\ud3fc\ub4e4\uc774 \ud611\ub825\ud558\uc5ec \ub370\uc774\ud130 \ubcf4\ud638\uc640 \uc720\ud574 \ucf58\ud150\uce20 \ud544\ud130\ub9c1\uc744 \ud45c\uc900\ud654\ud560 \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc815\ubcf4 \uad50\ud658\uacfc \ud559\uc2b5 \uae30\ud68c\uc758 \uc8fc\uc694 \ucc3d\uad6c\ub85c \uae30\ub2a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721 \uae30\uad00\uc774 \ud568\uaed8\ud558\ub294 \ub2a5\ub3d9\uc801\uc778 \ucc38\uc5ec\uac00 \ub354\uc6b1 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc644\uc804\ud788 \uc81c\ud55c\ud558\ub294 \uac83\ubcf4\ub2e4 \ud6a8\uacfc\uc801\uc778 \uad50\uc721\uacfc \uc9c0\ub3c4\ub97c \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc720\ud574\ud55c \ucf58\ud150\uce20\uc640 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc744 \uc778\uc2dd\ud558\uace0 \ub300\ucc98\ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\ub294 \uac83\uc774 \ubc14\ub78c\uc9c1\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uaddc\uc81c\uac00 \uc5c6\ub294 \ub300\uc2e0 \uac00\uc815\uacfc \ud559\uad50\uac00 \ud611\ub825\ud558\uc5ec \ubcf4\ub2e4 \uc2e4\uc9c8\uc801\uc778 \ubcf4\ud638\ub9dd\uc744 \uad6c\ucd95\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud50c\ub7ab\ud3fc\ub4e4\uc774 \ubcf4\ub2e4 \uc801\uadf9\uc801\uc73c\ub85c \uc720\ud574 \ucf58\ud150\uce20\uc758 \uc2dd\ubcc4\uacfc \ucc28\ub2e8\uc5d0 \ub098\uc11c\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uad50\uc721\uacfc \ubd80\ubaa8\uc758 \uc5ed\ud560\uc774 \ubd84\uba85\ud788 \ub2e4\ud558\uc9c0 \ubabb\ud558\ub294 \uacbd\uc6b0\ub97c \uc704\ud574 \uae30\uc220\uc801 \ubcf4\ud638 \uc7a5\uce58\ub97c \ubcf4\uc644\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc704\ud5d8 \uc694\uc18c\ub97c \uad00\ub9ac\ud558\uae30 \uc704\ud574\uc11c\ub294 \uad50\uc721\uacfc \uaddc\uc81c\uac00 \uacb0\ud569\ub41c \uc811\uadfc \ubc29\uc2dd\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ud559\uc5c5\uc5d0 \ubbf8\uce58\ub294 \uc601\ud5a5\uc744 \uc904\uc774\uae30 \uc704\ud574\uc11c \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc774 \ud568\uaed8 \uc5ed\ud560\uc744 \ud574\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc704\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud574\uc11c\ub294 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubb38\uc81c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubb38\uc81c\uc77c \ubfd0 \uc544\ub2c8\ub77c \uc0ac\ud68c \uc804\ubc18\uc758 \ubb38\uc81c\ub85c \ubcfc \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubc95\uc801\uc778 \uc81c\ud55c\uc774 \uc544\ub2cc \uc790\uc728\uc801\uc778 \ucc45\uc784\uac10\uc744 \ud0a4\uc6b0\ub294 \ud658\uacbd\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \uc5ed\ud560\uc774 \uac15\uc870\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub05d\uc73c\ub85c, \uac1c\uc778\uc758 \uc8fc\ub3c4\uc131\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721 \uae30\uad00\uc758 \uac15\ud654\ub41c \uac00\uc774\ub4dc\ub77c\uc778 \ubc0f \ubaa8\ub2c8\ud130\ub9c1\uc774 \ubc95\uc801 \uc7a5\uce58\uc758 \ud544\uc694\uc131\uc744 \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uae34\uae09 \ub300\ucc45\uc73c\ub85c \uc2e4\ud589 \uac00\ub2a5\ud55c \uac83\uc740 \uac15\ub825\ud55c \uc628\ub77c\uc778 \ubcf4\ud638 \uc2dc\uc2a4\ud15c\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc9c0\uc5ed \uc0ac\ud68c \ucc28\uc6d0\uc5d0\uc11c\uc758 \uc9c0\uc6d0 \ub124\ud2b8\uc6cc\ud06c \uad6c\ucd95\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0 \uacfc\ub3c4\ud558\uac8c \ube60\uc9c0\ub294 \ubb38\uc81c\ub294 \uc81c\ud55c\uc774 \uc544\ub2c8\ub77c \uad50\uc721\uc744 \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc801 \ub3c4\uad6c\uc640 \ud568\uaed8 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc758 \uc9c0\ub3c4\uac00 \ubcd1\ud589\ub420 \ub54c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc704\ud5d8\uc131\uc744 \ud6a8\uc728\uc801\uc73c\ub85c \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \uac19\uc740 \ubb38\uc81c\ub294 \uaddc\uc81c\ubcf4\ub2e4\ub294 \uc608\ubc29 \uad50\uc721\uacfc \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c\uc744 \ud1b5\ud574 \ub354 \ud6a8\uacfc\uc801\uc73c\ub85c \ub2e4\ub8f0 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc790\ub140\uc5d0\uac8c \uc2e4\uc9c8\uc801\uc778 \uac00\uc774\ub4dc\ub97c \uc81c\uacf5\ud560 \uc218 \uc5c6\ub294 \ubd80\ubaa8\ub4e4\uc758 \uc0c1\ud669\uc744 \ub3d5\uae30 \uc704\ud574, \ucee4\ubba4\ub2c8\ud2f0 \uae30\ubc18\uc758 \ud504\ub85c\uadf8\ub7a8\uacfc \uc790\uc6d0\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc81c\ub3c4\uc801 \ubcf4\ud638\uc640 \uac1c\uc778\uc801 \ucc45\uc784\uc758 \uade0\ud615\uc744 \ub9de\ucd94\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc774\ubbf8 \uc874\uc7ac\ud558\ub294 \uae30\uc220\uc801 \ub3c4\uad6c\ub4e4\uc744 \ud65c\uc6a9\ud574 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud65c\ub3d9\uc744 \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uacb0\uad6d, \uad50\uc721\uacfc \uc9c0\ub3c4\ub97c \ud1b5\ud574 \uc790\uc728\uc131\uacfc \ucc45\uc784\uac10\uc744 \uac16\ucd98 \ubbf8\uc131\ub144\uc790\ub97c \uc721\uc131\ud558\ub294 \uac83\uc774 \ub354 \ubc14\ub78c\uc9c1\ud55c \ubc29\ud5a5\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub97c \ud574\uacb0\ud560 \uc218 \uc788\ub294 \uc790\uc6d0\ub3c4 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uad81\uadf9\uc801\uc73c\ub85c\ub294 \uacf5\ub3d9\uccb4\uc801 \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c\uc744 \uad6c\ucd95\ud558\uc5ec \uccad\uc18c\ub144\ub4e4\uc774 \ud544\uc694\ud560 \ub54c \ub3c4\uc6c0\uc744 \ubc1b\uc744 \uc218 \uc788\ub294 \ud658\uacbd\uc744 \ub9cc\ub4dc\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uba74 \uc0c1\ud638\uc791\uc6a9\uc744 \uc57d\ud654\uc2dc\ud0a8\ub2e4\ub294 \uc6b0\ub824\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\uc2e4 \uc138\uacc4\uc5d0\uc11c \uc774\ub8e8\uc5b4\uc9c0\ub294 \ub9cc\ub0a8\uc744 \ubcf4\uc644\ud558\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801\uc778 \uc81c\ud55c \ub300\uc2e0 \uacf5\ub3d9\uccb4 \uae30\ubc18\uc758 \ubcf4\ud638\uccb4\uacc4\ub97c \uac15\ud654\ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc544\uc608 \ucc28\ub2e8\ud558\ub294 \uac83\ubcf4\ub2e4 \uade0\ud615 \uc7a1\ud78c \uc0ac\uc6a9\uc744 \uc7a5\ub824\ud558\ub294 \uac83\uc774 \ubc14\ub78c\uc9c1\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc0ac\ud68c\uc801 \ud569\uc758\uc640 \ubc95\uc801 \uc7a5\uce58\ubcf4\ub2e4\ub294 \uacf5\ub3d9\uccb4\uc758 \ud611\ub825\uacfc \ucc38\uc5ec\uac00 \ubd80\uc791\uc6a9\uc744 \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ubc95\uc801 \uc81c\ud55c\uc774 \uc544\ub2cc \ucee4\ubba4\ub2c8\ud2f0\uc758 \ucc38\uc5ec\uac00 \ubbf8\uc131\ub144\uc790\uc758 \uc548\uc804\uc744 \ub354\uc6b1 \ud6a8\uacfc\uc801\uc73c\ub85c \ubcf4\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uc0ac\ud68c\uc640 \uae30\uc5c5\uc774 \ud611\ub825\ud558\uc5ec \uccad\uc18c\ub144 \uce5c\ud654\uc801 \ucf58\ud150\uce20\uc640 \uc11c\ube44\uc2a4\ub97c \uac1c\ubc1c\ud558\ub294 \ub178\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uacb0\uc815\uad8c\uacfc \ucc45\uc784\uac10\uc744 \ubd80\uc5ec\ud558\ub294 \uac83\uc774 \uc624\ud788\ub824 \uc7a5\uae30\uc801\uc73c\ub85c \ub354 \ud6a8\uacfc\uc801\uc778 \ubcf4\ud638\ucc45\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc744 \uc81c\uacf5\ud558\ub294 \uc81c\ub3c4\uc801 \uc9c0\uc6d0\uc774 \uac15\ud654\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uae08\uc9c0\ud558\uae30\ubcf4\ub2e4\ub294 \uc548\uc804\ud55c \uc0ac\uc6a9 \ubc29\ubc95\uc5d0 \ub300\ud55c \uad50\uc721\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc80a\uc740 \uc138\ub300\uac00 \uc0c8\ub85c\uc6b4 \uae30\uc220\uc744 \uc775\ud788\uace0 \ub514\uc9c0\ud138\ud654\ub41c \ud658\uacbd\uc5d0\uc11c \uc0b4\uc544\uac08 \uc218 \uc788\ub3c4\ub85d \ub3c4\uc640\uc90d\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc624\ud788\ub824 \uc815\uc2e0 \uac74\uac15 \uc9c0\uc6d0\uc758 \ub3c4\uad6c\uac00 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\ub294 \uac83\ubcf4\ub2e4\ub294 \uc774\ub97c \uc548\uc804\ud558\uac8c \ud65c\uc6a9\ud560 \uc218 \uc788\ub294 \uc9c0\uc2dd\uacfc \ub3c4\uad6c\ub97c \uc81c\uacf5\ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc218\uc900 \ub192\uc740 \uc0ac\uc6a9\uc790 \uad50\uc721\uc774 \ubcf4\uc644\ucc45\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc815\uc2e0 \uac74\uac15\uc5d0 \ubd80\uc815\uc801 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\uc9c0\ub9cc, \uc804\uccb4\uc801\uc778 \ub9e5\ub77d\uc5d0\uc11c\ub294 \uc774\ub97c \uc801\uc808\ud788 \uad00\ub9ac\ud558\uace0 \uadf9\ubcf5\ud560 \uc218 \uc788\ub294 \ubc29\uc548\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc740 \uccad\uc18c\ub144\uc774 \uc2a4\uc2a4\ub85c\ub97c \ubcf4\ud638\ud558\ub294\ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0 \ud544\uc218\uc801\uc778 \uae30\uc220\uc744 \uc2b5\ub4dd\ud558\ub3c4\ub85d \ub3d5\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \ubd80\uc791\uc6a9\uc744 \uc644\ud654\ud558\ub294 \ub370 \uc788\uc5b4 \uae30\uc220\uc801 \ubcf4\ud638 \uc870\uce58\uc640 \uad50\uc721\uc774 \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4 \ub354 \uc720\uc5f0\ud558\uace0 \uc801\uc751\uc801\uc778 \ud574\uacb0\ucc45\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc911\uc694\ud55c \uac83\uc740 \uc0ac\uc774\ubc84 \uacf5\uac04\uc5d0\uc11c\uc758 \uc704\ud5d8 \uc694\uc18c\ub97c \uad00\ub9ac\ud558\uba74\uc11c\ub3c4 \uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc5bb\uc744 \uc218 \uc788\ub294 \uae0d\uc815\uc801 \uacbd\ud5d8\uc744 \uc800\ud574\ud558\uc9c0 \uc54a\ub294 \ubc29\uc548\uc744 \ucc3e\ub294 \uac83\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uad50\uc721\uc801 \uc790\uc6d0\uacfc \ud559\uc2b5 \uae30\ud68c\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uaddc\uc81c\ubcf4\ub2e4 \ubbf8\uc131\ub144\uc790\uc758 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub97c \uc9c0\uc6d0\ud558\ub294 \ud504\ub85c\uadf8\ub7a8\uc774 \ub354 \uc2e4\uc9c8\uc801\uc778 \ud574\uacb0\ucc45\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8\uc758 \uc9c0\ub3c4\ub97c \ud1b5\ud55c \ucc45\uc784 \uc788\ub294 \uc0ac\uc6a9 \uad50\uc721\uc774 \ub354 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\uc2e4 \uc138\uacc4\uc758 \ub300\uc778 \uad00\uacc4\uc640 \ud559\uc5c5\uc5d0 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce60 \uac00\ub2a5\uc131\ub3c4 \uc788\uc9c0\ub9cc, \uc801\uc808\ud55c \uc0ac\uc6a9\ubc95\uc744 \uc775\ud788\ub294 \uac83\uc774 \ub354 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uc5d0\uac8c\ub3c4 \uac1c\uc778\uc758 \ucc45\uc784\uac10\uc744 \uc2ec\uc5b4\uc8fc\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ubc95\uc801 \uc81c\uc7ac\ub85c \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud558\ub294 \uac83\ubcf4\ub2e4 \ud50c\ub7ab\ud3fc \uc790\uccb4\uc758 \uc790\uc728\uc131\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \uc7a5\uae30\uc801\uc73c\ub85c \ub354 \ud6a8\uc728\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uacfc \uc815\ubcf4 \uc2b5\ub4dd\uc758 \uc911\uc694\ud55c \ub3c4\uad6c\uac00 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ucee4\ubba4\ub2c8\ud2f0 \uae30\ubc18\uc758 \ucc38\uc5ec\uc640 \uc5ed\ub7c9 \uac15\ud654\uac00 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\ub97c \ub300\uc0c1\uc73c\ub85c \ud55c \uc815\ubcf4 \uc81c\uacf5 \ubc0f \uc9c0\uc6d0 \uccb4\uacc4\uac00 \ub9c8\ub828\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uadf9\ub2e8\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc0ac\ud68c\uc801 \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c\uacfc\uc758 \uc5f0\uacc4\uac00 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \uc5ed\ud560\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud558\uba70 \uc81c\ub3c4\uc801 \uc9c0\uc6d0\uc744 \ud1b5\ud574 \ubcf4\uc644\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uc815\ubcf4\uc5d0 \ub300\ud55c \uc811\uadfc\uc131\uacfc \ud45c\ud604\uc758 \uc790\uc720\ub294 \uc911\uc694\ud55c \uac00\uce58\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\ud68c\uc801 \uc548\uc804\ub9dd\uc740 \ubc95\uc801 \uaddc\uc81c \uc5c6\uc774\ub3c4 \uae30\uc220\uc801 \uc7a5\uce58\uc640 \uacf5\ub3d9\uccb4\uc758 \ub178\ub825\uc744 \ud1b5\ud574 \uad6c\ucd95\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc624\ud504\ub77c\uc778 \uc0ac\ud68c \ud65c\ub3d9\uc774 \uc904\uc5b4\ub4e0\ub2e4\ub294 \uc6b0\ub824\ub294 \uade0\ud615 \uc7a1\ud78c \uc2dc\uac04 \uad00\ub9ac\ub85c \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc815\ubd80\ub294 \uad50\uc721\uacfc \uc778\uc2dd \uac1c\uc120\uc744 \uc9c0\uc6d0\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \uac1c\uc785\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub098\uc774\uac00 \uc5b4\ub9b0 \ubbf8\uc131\ub144\uc790\ub97c \ub300\uc0c1\uc73c\ub85c \ud558\ub294 \ub9de\ucda4\ud615 \uad50\uc721\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uccad\uc18c\ub144\uc758 \uc790\uc728\uc131\uacfc \uc790\uae30 \uc8fc\ub3c4\uc801 \ud559\uc2b5 \uae30\ud68c\ub97c \uc81c\uacf5\ud558\ub294 \uac83\uc774 \uc7a5\uae30\uc801\uc73c\ub85c \ub354 \ud070 \ud6a8\uacfc\ub97c \ubc1c\ud718\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \uc801\uc808\ud55c \uad50\uc721\uacfc \uc9c0\ub3c4\uac00 \ud568\uaed8\ud560 \ub54c \uae0d\uc815\uc801\uc778 \uacb0\uacfc\ub97c \uac00\uc838\uc635\ub2c8\ub2e4","\uc14b\uc9f8, \uccad\uc18c\ub144\ub4e4\uc774 \uc548\uc804\ud558\uac8c \uc778\ud130\ub137\uc744 \uc0ac\uc6a9\ud558\ub294 \ubc29\ubc95\uc744 \uad50\uc721\ud558\ub294 \uac83\uc774 \ub354\uc6b1 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \ud45c\ud604\uc758 \uc790\uc720\uc640 \uc790\uae30 \uacc4\ubc1c\uc758 \uae30\ud68c\ub97c \ubcf4\uc7a5\ud574\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \uc5ed\ud560\ub3c4 \uac15\uc870\ub420 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0\uc11c\uc758 \uc704\ud5d8 \uc694\uc18c\ub294 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \ucda9\ubd84\ud788 \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uccad\uc18c\ub144\uc744 \uc9c0\uc6d0\ud558\ub294 \uc9c0\uc5ed \uc0ac\ud68c \ub124\ud2b8\uc6cc\ud06c\uc758 \uad6c\ucd95\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc774\ubc84 \ud3ed\ub825\uacfc \uac1c\uc778\uc815\ubcf4 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \ud575\uc2ec\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721\uacfc \ubaa8\ub2c8\ud130\ub9c1\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uad50\uc721\uc801 \uc790\uc6d0\uc5d0 \uc27d\uac8c \uc811\uadfc\ud560 \uc218 \uc788\ub2e4\ub294 \uc810\uc5d0\uc11c \uae0d\uc815\uc801\uc778 \ud559\uc5c5\uc801 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\ub97c \uc704\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \ub514\uc790\uc778\uacfc \uc815\ucc45 \uac1c\uc120\uc774 \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801\uc778 \uc81c\ud55c \uc5c6\uc774\ub3c4 \ud2b9\uc815 \uae30\ub2a5\uacfc \ucf58\ud150\uce20\uc5d0 \ub300\ud55c \uc120\ud0dd\uc801\uc778 \uc811\uadfc \uaca9\ub9ac\ub294 \uac00\ub2a5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uccad\uc18c\ub144\ub4e4\uc774 \uc2a4\uc2a4\ub85c \ubb38\uc81c\ub97c \ud30c\uc545\ud558\uace0 \ub300\ucc98\ud560 \uc218 \uc788\ub294 \uc5ed\ub7c9\uc744 \ud0a4\uc6b0\ub294 \uad50\uc721\uc758 \uac15\ud654\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \uc790\uc6d0\uc758 \uc811\uadfc\uc131\uc744 \ub192\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \uc5ed\ud560\uc744 \uac15\ud654\ud558\ub294 \uac83\uc740 \uc911\uc694\ud55c \ubcf4\ud638 \uc7a5\uce58\uac00 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4 \uae30\uc220\uc801 \uc811\uadfc\uc774 \uccad\uc18c\ub144 \ubcf4\ud638\uc5d0 \ub354 \uc801\uc808\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc801\uc808\ud55c \ud658\uacbd\uc744 \uc81c\uacf5\ud558\uae30 \uc704\ud574\uc11c\ub294 \ud50c\ub7ab\ud3fc \uc81c\uacf5\uc5c5\uccb4\uc640 \uc0ac\uc6 ud55c \ubb38\uc81c\ub294 \uaddc\uc81c\ubcf4\ub2e4\ub294 \uad50\uc721\uacfc \uae30\uc220\uc801 \ubcf4\ud638 \uc870\uce58\ub97c \ud1b5\ud574 \ucda9\ubd84\ud788 \ud574\uacb0 \uac00\ub2a5\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ubd80\ubaa8\uc640 \uac00\uc871\uc758 \uc5ed\ud560\uc740 \ubb34\uc2dc\ud560 \uc218 \uc5c6\uc73c\uba70, \uc774\ub294 \uae30\uc220\uc801 \uc870\uce58\ub97c \ubcf4\uc644\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c, \uc815\uc2e0 \uac74\uac15\uc5d0 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\ub294 \ucf58\ud150\uce20\uc5d0 \ub300\ud574\uc120 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uacfc\uc758 \ud611\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud559\uc2b5\uacfc \ucc3d\uc758\uc131 \ubc1c\ud718\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud558\ub294 \uc911\uc694\ud55c \uc790\uc6d0\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc790\uc728\uc801\uc774\uace0 \ucc45\uc784\uac10 \uc788\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ucd09\uc9c4\ud558\uae30 \uc704\ud55c \uad50\uc721\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uaddc\uc81c\uac00 \uc544\ub2cc \uae30\uc220\uc801 \uc870\uce58\uac00 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\uc5d0 \ub354 \uc9c1\uc811\uc801\uc774\uace0 \uc2e4\uc9c8\uc801\uc785\ub2c8\ub2e4","\uba3c\uc800, \uae30\uc220\uc801 \ud601\uc2e0\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0\uc11c \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub97c \uc644\ud654\ud558\ub294 \ub370 \uc911\ub300\ud55c \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc0ac\uc6a9 \uc2dc\uac04\uacfc \uc911\ub3c5\uc744 \uad00\ub9ac\ud558\ub294 \uac83\uc740 \uad50\uc721\uacfc \uc790\uae30 \uc870\uc808 \ub2a5\ub825\uc744 \ud1b5\ud574 \uac00\ub2a5\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc720\ud574\ud55c \ucf58\ud150\uce20\ub098 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc5d0 \ub300\ucc98\ud560 \ub2a5\ub825\uc744 \uac16\ucd94\ub294 \ub370 \uc2dc\uac04\uc774 \uac78\ub9b0\ub2e4\ub294 \uc810\uc740 \uc0ac\uc2e4\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc628\ub77c\uc778 \uc0c1\ud638\uc791\uc6a9\uc758 \ubd80\uc815\uc801 \uce21\uba74\uc744 \uc904\uc774\uae30 \uc704\ud574, \uc0ac\uc6a9\uc790\uc758 \ucc45\uc784 \uc788\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc774\uc6a9\uc744 \uc7a5\ub824\ud558\uace0 \uad50\uc721\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0 \ud544\uc218\uc801\uc778 \uae30\uc220 \uc2b5\ub4dd \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubcf4\ud638\uc790\uc640 \uccad\uc18c\ub144 \uac04\uc758 \uc5f4\ub9b0 \ub300\ud654\uc640 \uc2e0\ub8b0 \uad00\uacc4\uac00 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uae30\uc220\uc801 \ud658\uacbd\uc5d0\uc11c\uc758 \uc8fc\uccb4\uc131\uc744 \ubc30\uc6b8 \uae30\ud68c\ub97c \uc81c\uacf5\ud574\uc57c \ud569\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc704\ud5d8\uc131\uacfc \uad00\ub828\ud574 \ubc1c\uc0dd\ud558\ub294 \ubb38\uc81c\ub4e4\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc9c1\uc811\uc801\uc778 \ubc95\uc801 \uaddc\uc81c\ubcf4\ub2e4\ub294 \uae30\uc220 \ubc0f \uad50\uc721\uc744 \ud1b5\ud55c \ubb38\uc81c \ud574\uacb0\uc774 \ub354\uc6b1 \ud6a8\uc728\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc790\uccb4\uc758 \uac1c\uc120\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc790\uccb4\uc758 \uae30\uc220\uc801 \uac1c\uc120\uacfc \ucc45\uc784 \uc99d\ub300\uac00 \ud6a8\uacfc\uc801\uc778 \ubb38\uc81c \ud574\uacb0\ucc45\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc790\uae30 \ud45c\ud604\uc758 \uc7a5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubc95\uc73c\ub85c \uaddc\uc81c\ud558\uc9c0 \uc54a\uace0\ub3c4 \ud6a8\uacfc\uc801\uc73c\ub85c \uad00\ub9ac\ud560 \uc218 \uc788\ub294 \ubc29\uc548\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc758 \ucc45\uc784\uac10\uc744 \uac15\ud654\ud558\uace0 \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \uba85\ud655\ud55c \uc9c0\uce68\uc744 \ub9c8\ub828\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \ubd88\ub9c1\uacfc \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20 \ub178\ucd9c \uac19\uc740 \uc704\ud5d8 \uc694\uc18c\ub294 \ubd80\ubaa8\uc640 \uad50\uc721\uae30\uad00\uc758 \uc801\uadf9\uc801\uc778 \ucc38\uc5ec\ub97c \ud1b5\ud574 \uad00\ub9ac\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc9c0\uc5ed \uc0ac\ud68c\uc640\uc758 \ud611\ub825\uc774 \ub354\uc6b1 \uc9c0\uc18d \uac00\ub2a5\ud558\uace0 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uac1c\uc778\uc758 \ucc45\uc784\uac10\uacfc \uc790\uae30\uc870\uc808 \ub2a5\ub825\uc758 \ubc1c\ub2ec\uc744 \ucd09\uc9c4\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \uc811\uadfc\ud558\ub294 \uac83\uc774 \ub354 \uac74\uc124\uc801\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubc95\uc801\uc778 \uc81c\ud55c \ub300\uc2e0 \uc62c\ubc14\ub978 \uad50\uc721\uacfc \uc9c0\ub3c4\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\uadf8\ub9ac\uace0 \ubaa8\ub4e0 \uc704\ud5d8 \uc694\uc18c\ub97c \uc5b5\uc81c\ud558\uae30 \uc704\ud574 \uae30\uc220\uc801 \ud544\ud130\ub9c1 \uc678\uc5d0 \uc0ac\uc6a9\uc790\uc758 \uad50\uc721\uc744 \uac15\ud654\ud558\ub294 \uac83\ub3c4 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc774 \uc544\ub2c8\ub77c \uad50\uc721\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \uccad\uc18c\ub144\uc758 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub294 \ub354 \ubc14\ub78c\uc9c1\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubd80\uc791\uc6a9\uc5d0 \ub300\ud55c \uc6b0\ub824\ub97c \ud574\uc18c\ud558\ub824\uba74 \uaddc\uc81c\ubcf4\ub2e4\ub294 \uae30\uc220\uc801 \ud574\uacb0\ucc45\uacfc \uad50\uc721\uc801 \uc811\uadfc\uc774 \ub354 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubaa8\ub4e0 \ubd80\ubaa8\ub098 \ubcf4\ud638\uc790\uac00 \ucda9\ubd84\ud55c \uad50\uc721\uacfc \uac10\ub3c5 \ub2a5\ub825\uc744 \uac00\uc9c0\uc9c0 \ubabb\ud560 \uc218 \uc788\uc74c\uc744 \uc778\uc815\ud558\uc9c0\ub9cc, \uae30\uc220 \uae30\uc5c5\uc740 \ub354 \uc9c1\uad00\uc801\uc774\uace0 \uc811\uadfc \uac00\ub2a5\ud55c \uc548\uc804 \uae30\ub2a5\uacfc \uad50\uc721 \uc790\uc6d0\uc744 \uc81c\uacf5\ud568\uc73c\ub85c\uc368 \uc774\ub97c \uc9c0\uc6d0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uae30\uc220\uc801 \uc5ed\ub7c9\uc774 \ubd80\uc871\ud55c \ubd80\ubaa8\uc640 \uad50\uc0ac\ub97c \uc704\ud55c \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c\uc744 \uad6c\ucd95\ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc815\ubd80\uc640 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud68c\uc0ac \uac04\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \ub354 \ub098\uc740 \ud574\uacb0\ucc45\uc744 \ubaa8\uc0c9\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc5d0 \ub300\ud55c \uc6b0\ub824\ub294 \ucda9\ubd84\ud788 \uc774\ud574\ud560 \uc218 \uc788\uc73c\ub098, \uc774\ub7ec\ud55c \ubb38\uc81c\ub294 \ubc95\uc801\uc778 \uc81c\ud55c \ubcf4\ub2e4\ub294 \uad50\uc721\uacfc \uc9c0\uce68 \uac15\ud654\ub97c \ud1b5\ud574 \ud574\uacb0\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uad50\uc721\uacfc \ubb38\ud654 \ubcc0\ud654\uac00 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc628\ub77c\uc778 \ucee4\ubba4\ub2c8\ud2f0\uc640 \uc804\ubb38\uac00 \ub124\ud2b8\uc6cc\ud06c\ub97c \ud1b5\ud574 \uc9c0\uc18d\uc801\uc778 \uc9c0\uc6d0\uc744 \ubc1b\uc744 \uc218 \uc788\ub294 \ud50c\ub7ab\ud3fc\uc744 \uad6c\ucd95\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \uc0ac\ud68c \uc804\ubc18\uc758 \ucc45\uc784 \uc788\ub294 \ucc38\uc5ec\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uae08\uc9c0 \ub300\uc2e0 \uc62c\ubc14\ub978 \uc0ac\uc6a9\ubc95 \uad50\uc721\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \ud3ed\ub825\uacfc \uac1c\uc778\uc815\ubcf4 \ub178\ucd9c \uac19\uc740 \ubb38\uc81c\uc5d0 \ub300\ud574\uc120 \uaddc\uc81c\uac00 \uc544\ub2cc \uad50\uc721\uc801 \uc811\uadfc\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc644\uc804\ud788 \uae08\uc9c0\ud558\uae30\ubcf4\ub2e4 \ucc45\uc784 \uc788\ub294 \uc0ac\uc6a9\uc744 \uac00\ub974\uce58\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc6a9\uc790 \ubcf4\ud638\ub294 \uad6c\uccb4\uc801\uc778 \ucf58\ud150\uce20 \uad00\ub9ac\uc640 \uc0ac\uc6a9\uc790 \uad50\uc721\uc744 \ud1b5\ud574 \uac1c\uc120\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub514\uc9c0\ud138 \uad8c\ub9ac\uc640 \uc628\ub77c\uc778 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc801\uadf9\uc801\uc73c\ub85c \uc9c0\uc9c0\ud558\uba70, \uc628\ub77c\uc778 \uc138\uacc4\uc758 \ud3ec\uad04\uc801\uc778 \uc811\uadfc\uc744 \uc639\ud638\ud558\ub294 \uc804\ubbf8\uc2dc\ubbfc\uc790\uc720\uc5f0\ud569(ACLU)\uc740 \ubc95\uc801\uc778 \uc81c\ud55c\uc774 \uc544\ub2cc \uac1c\uc778\uacfc \uac00\uc871\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc870\uc808\ud560 \uc218 \uc788\ub294 \uad8c\ub9ac\ub97c \uac00\uc838\uc57c \ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc774 \ubc18\ub4dc\uc2dc \ubd80\uc815\uc801\uc778 \uacb0\uacfc\ub9cc\uc744 \ucd08\ub798\ud558\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\ub458\uc9f8, \uc9c0\uc5ed \uc0ac\ud68c\uc758 \uc5ed\ud560\ub3c4 \ub9e4\uc6b0 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc989\uac01\uc801\uc778 \ubc95\uaddc \uc81c\uc815\ubcf4\ub2e4\ub294 \uc9c0\uc5ed \uc0ac\ud68c\uc640 \ud559\uad50\ub97c \ud1b5\ud55c \ud3ec\uad04\uc801 \uc9c0\uc6d0\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc624\ud788\ub824 \uad50\uc721\uacfc \uc9c0\uce68\uc744 \ud1b5\ud574 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uae0d\uc815\uc801\uc778 \uc0ac\uc6a9\ubc95\uc744 \uac00\ub974\uce58\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc790\uccb4\uc758 \uc9c0\uc18d\uc801\uc778 \uac1c\uc120\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc911\uc694\ud55c \uac83\uc740 \ucc45\uc784 \uc788\ub294 \uc0ac\uc6a9 \uc2b5\uad00\uc744 \ud615\uc131\ud558\ub294 \uac83\uc774\uba70, \uc774\ub294 \uc77c\ubc29\uc801\uc778 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc8fc\uccb4\uc801\uc778 \ud559\uc2b5\uc744 \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc774 \ucc45\uc784\uc744 \ub2e4\ud558\uc9c0 \uc54a\ub294 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \uacf5\uacf5\uacfc \ubbfc\uac04\uc758 \ud611\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ud50c\ub7ab\ud3fc\ub4e4\uc774 \uc548\uc804\ub9dd \uac15\ud654\uc5d0 \uc9d1\uc911\ud568\uc73c\ub85c\uc368 \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20 \ub178\ucd9c \ubb38\uc81c\ub97c \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud55c \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc740 \ubbf8\uc131\ub144\uc790 \uc815\uc2e0 \uac74\uac15\uc5d0\ub3c4 \uae0d\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ubb38\uc81c \uc0c1\ud669\uc5d0\uc11c\ub3c4 \uc9c0\uc6d0\ubc1b\uc744 \uc218 \uc788\ub294 \uc2dc\uc2a4\ud15c\uc744 \uad6c\ucd95\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub530\ub978 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \uad50\uc721\uacfc \uc801\uc808\ud55c \uc0ac\uc6a9 \uc9c0\uce68\uc744 \ud1b5\ud574 \uc608\ubc29\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc874 \ud50c\ub7ab\ud3fc\ub4e4\uc740 \uc548\uc804 \uc7a5\uce58\uc640 \ubaa8\ub2c8\ud130\ub9c1\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\uc744 \ubcf4\ud638\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8 \ubc0f \ubcf4\ud638\uc790\uc758 \uc801\uadf9\uc801\uc778 \uad00\uc5ec\uac00 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\uc5d0 \uac00\uc7a5 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubb38\uc81c\uc5d0 \ub300\ud574\uc11c\ub3c4 \ud50c\ub7ab\ud3fc\uc740 \uc774\ubbf8 \ud6a8\uacfc\uc801\uc778 \ud574\uacb0\ucc45\uc744 \uc81c\uc2dc\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc640 \uc704\ud5d8\uc744 \ud0d0\uc9c0\ud558\uace0 \ub300\uc751\ud560 \uc218 \uc788\ub294 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc758 \uac15\ud654\uac00 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubb38\uc81c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc804\uba74 \uc81c\ud55c\uc774 \uc544\ub2c8\ub77c \uc801\uc808\ud55c \ub300\ucc98\uc640 \uc9c0\uc6d0\uc744 \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc815\ubcf4 \uc911\ub3c5\uc744 \uc608\ubc29\ud558\uace0 \uc2dc\uac04 \uad00\ub9ac\ub97c \ub3d5\uae30 \uc704\ud55c \ub3c4\uad6c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4. [\ub514\uc9c0\ud138 \uc6f0\ube59 \uac1c\uc120\uc744 \ubaa9\ud45c\ub85c \ud558\ub294] \ud2f1\ud1a1\uc740 \uc0ac\uc6a9 \uc2dc\uac04 \ud488\uc9c8\uc744 \ub192\uc774\ub824\ub294 \uc758\ub3c4\ub85c \ud654\uba74 \uc2dc\uac04 \uad00\ub9ac \uae30\ub2a5\uc744 \ub3c4\uc785\ud558\uc5ec \uc0ac\uc6a9\uc790\uac00 \uc790\uc2e0\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc2a4\uc2a4\ub85c \uc870\uc808\ud558\ub3c4\ub85d \uc7a5\ub824\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uae30\ubcf8\uc801\uc778 \uad50\uc721\uacfc \uc778\uc2dd \uc81c\uace0\uac00 \ub354 \uc120\ud638\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc704\ud5d8\uc5d0 \ub300\ud55c \uc778\uc2dd\uc744 \ub192\uc774\uace0 \uacf5\ub3d9\uccb4 \ucc28\uc6d0\uc5d0\uc11c \uc9c0\uc6d0 \uccb4\uacc4\ub97c \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc911\uc694\ud55c \ub514\uc9c0\ud138 \uc18c\ud1b5 \uc218\ub2e8\uc73c\ub85c \uc790\ub9ac \uc7a1\uc558\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uccad\uc18c\ub144\uc740 \uc790\uc728\uc131\uc744 \uac00\uc9c0\uace0 \ucc45\uc784\uc744 \ubc30\uc6cc \ub098\uac08 \uae30\ud68c\uac00 \uc8fc\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc815\ubd80\uc640 \uacf5\uacf5\uae30\uad00\uc740 \uc790\uc6d0\uc744 \ubcf4\ub2e4 \ud6a8\uacfc\uc801\uc73c\ub85c \ubc30\ubd84\ud558\uc5ec \ucee4\ubba4\ub2c8\ud2f0 \uae30\ubc18\uc758 \ubcf4\ud638 \uccb4\uacc4\ub97c \uc9c0\uc6d0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc774\ubc84 \uac70\ubc84\ub10c\uc2a4 \ucc45\uc784 \uae30\uad6c\ub294 \uc704\ud5d8 \uc694\uc18c\uac00 \uc788\ub294 \ud50c\ub7ab\ud3fc \uc0ac\uc6a9\uc744 \uc644\uc804\ud788 \uae08\uc9c0\ud558\uae30\ubcf4\ub2e4\ub294 \uad50\uc721\uacfc \uc0ac\uc6a9\uc790 \uc218\uce59\uc744 \ud1b5\ud574 \uc548\uc804\ud55c \uc0ac\uc6a9 \ubc29\uc548\uc744 \uc81c\uacf5\ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uc728\uc801\uc774\ub77c\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uacfc\ub3c4\ud55c \uc0ac\uc6a9 \ubb38\uc81c\ub294 \uc0ac\uc6a9\uc790 \uad50\uc721\uacfc \ud50c\ub7ab\ud3fc\uc758 \uac1c\uc120\uc744 \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\ub4e4\uc740 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \ud1b5\ud574 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uae0d\uc815\uc801, \ubd80\uc815\uc801 \uce21\uba74\uc744 \ud30c\uc545\ud558\ub294 \uc5ed\ub7c9\uc744 \uae30\ub97c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\ud68c \uc804\uccb4\uc758 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uc5ed\ub7c9 \uac15\ud654\ub97c \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc774 \ub2e4\uc591\ud55c \ud658\uacbd\uc5d0\uc11c\ub3c4 \uc548\uc804\uc744 \uc720\uc9c0\ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\uc6d0\ud574\uc57c \ud569\ub2c8\ub2e4","\uc138 \ubc88\uc9f8\ub85c, \uc720\ud574\ud55c \ucf58\ud150\uce20 \ub178\ucd9c\uc758 \uc704\ud5d8\uc740 \ub124\ud2b8\uc6cc\ud06c\uc640 \ud50c\ub7ab\ud3fc \uc790\uccb4\uc758 \uac1c\uc120\uc744 \ud1b5\ud574 \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc7a5\uae30\uc801\uc778 \uad00\uc810\uc5d0\uc11c \uc9c0\uc18d\uc801\uc778 \uad50\uc721\uc740 \uc0ac\ub78c\ub4e4\uc758 \ud589\ub3d9\uc744 \ubcc0\ud654\uc2dc\ud0a4\uace0 \uc548\uc804\ud55c \uc778\ud130\ub137 \ud658\uacbd\uc744 \uc870\uc131\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\uc5d0\uac8c \uc62c\ubc14\ub978 \uc0ac\uc6a9\ubc95\uc744 \uad50\uc721\ud568\uc73c\ub85c\uc368 \uc2a4\uc2a4\ub85c \uac74\uac15\uc744 \uc9c0\ud0ac \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \ubc30\uc591\ud574\uc57c \ud569\ub2c8\ub2e4","\ub514\uc9c0\ud138 \ud658\uacbd\uc5d0\uc11c\uc758 \ubd80\uc791\uc6a9\uc744 \uc644\ud654\ud558\ub294 \ub370 \uc788\uc5b4 \uac00\uc7a5 \ud6a8\uacfc\uc801\uc778 \ubc29\ubc95\uc740 \ubd80\ubaa8\ub098 \ubcf4\ud638\uc790\uc758 \uc5ed\ud560\uc744 \uac15\uc870\ud558\uace0, \uc774\ub97c \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud558\ub294 \ub370 \uc788\uc5b4 \ucc45\uc784\uac10\uc744 \ud0a4\uc6b0\ub3c4\ub85d \ub3d5\ub294 \uac83\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc774 \uccad\uc18c\ub144\ub4e4\uacfc \uac1c\ubc29\uc801\uc774\uace0 \uc9c0\uc18d\uc801\uc778 \ub300\ud654\ub97c \uc720\uc9c0\ud558\ub294 \uac83\uc774 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\uc5d0 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ub514\uc9c0\ud138 \uc2dc\ub300\uc758 \uae30\uc220\uc801 \ub2a5\ub825\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc7a5\uce58\uc785\ub2c8\ub2e4","\ubaa8\ub4e0 \ubd80\ubaa8\ub098 \uccad\uc18c\ub144\uc774 \ud50c\ub7ab\ud3fc\uc758 \uc548\uc804 \uae30\ub2a5\uc744 \uc81c\ub300\ub85c \uc774\ud574\ud558\uc9c0 \ubabb\ud560 \uc218 \uc788\ub2e4\ub294 \uc810\uc740 \uc778\uc815\ud574\uc57c \ud558\uc9c0\ub9cc, \uc774\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \ubcf4\ub2e4 \uc801\uadf9\uc801\uc778 \uc811\uadfc \ubc29\uc2dd\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ube44\ud310\uc801 \uc0ac\uace0\uc640 \uc815\ubcf4 \ud574\uc11d \ub2a5\ub825\uc744 \ubc1c\uc804\uc2dc\ud0a4\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uad50\uc721\uacfc \uc81c\ud55c \uc870\uce58\ub97c \uc870\ud654\ub86d\uac8c \ubcd1\ud589\ud558\uc5ec \uc790\uc728\uc131\uacfc \ubcf4\ud638\ub97c \ub3d9\uc2dc\uc5d0 \uc81c\uacf5\ud574\uc57c \ud569\ub2c8\ub2e4","\ubc95\uacfc \uad50\uc721\uc774 \ud568\uaed8 \uc6c0\uc9c1\uc774\ub294 \uac83\ubcf4\ub2e4, \ucee4\ubba4\ub2c8\ud2f0\uc640 \uc0ac\ud68c \uc804\uccb4\uac00 \ucc38\uc5ec\ud558\ub294 \ud3ec\uad04\uc801\uc778 \uc811\uadfc\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc815\uc2e0\uc801 \uac74\uac15 \uc9c0\uc6d0\uc5d0 \uc788\uc5b4\uc11c\ub3c4 \uae0d\uc815\uc801\uc778 \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4. \"BetterHelp\"\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uad11\uace0\ub97c \ud1b5\ud574 \uc815\uc2e0 \uac74\uac15 \uc9c0\uc6d0 \ud504\ub85c\uadf8\ub7a8\uc5d0 \uccad\uc18c\ub144\ub4e4\uc774 \uc27d\uac8c \uc811\uadfc\ud560 \uc218 \uc788\ub3c4\ub85d \ud558\uba70, \uc774\ub97c \ud1b5\ud574 \ud544\uc694\ud560 \ub54c \uc0c1\ub2f4 \ubc0f \uc9c0\uc9c0\ub97c \ubc1b\uc744 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc0ac\ud68c\uc801 \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c\uc744 \uac15\ud654\ud558\ub294 \uc811\uadfc\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\ud68c\uc801 \uc790\uc728 \uaddc\uc81c\uc640 \uacf5\ub3d9\uccb4\uc758 \uc5ed\ud560\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc131\uc758 \ub9e4\uac1c\uccb4\ub85c \uc791\uc6a9\ud558\uba70, \uc774\ub294 \uccad\uc18c\ub144\uc758 \uc815\uc2e0 \uac74\uac15\uc5d0\ub3c4 \uae0d\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \uc790\uc6d0\uc758 \uc811\uadfc\uc131\uc744 \ub192\uc774\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc790\uadf9\uc801\uc778 \ucf58\ud150\uce20\ub97c \ud53c\ud558\ub294 \ub2a5\ub825\uc740 \ubc95\uc801\uc778 \uc81c\ud55c\uc774 \uc544\ub2c8\ub77c \uad50\uc721\uc744 \ud1b5\ud574 \uae38\ub7ec\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc131\uc7a5 \uacfc\uc815\uc5d0\uc11c \ud45c\ud604\uc758 \uc790\uc720\ub294 \uc911\uc694\ud55c \uad8c\ub9ac\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \uac1c\uc778\uc815\ubcf4 \uc720\ucd9c\uc758 \uc704\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ubd80\ubaa8\uc640 \uad50\uc0ac, \uadf8\ub9ac\uace0 \ud50c\ub7ab\ud3fc\uc774 \ud568\uaed8 \ucc38\uc5ec\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \uc790\uc6d0\uc73c\ub85c\uc11c\uc758 \uae30\ub2a5\ub3c4 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc644\ud654\ub41c \ud658\uacbd \uc870\uc131\uc744 \uc704\ud55c \uad00\ub9ac\ub294 \uc790\uc728 \uaddc\uc81c\uc640 \uacf5\ub3d9\uccb4\uc758 \ub178\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \uc720\ud574 \ucf58\ud150\uce20 \ub178\ucd9c \ubb38\uc81c\ub294 \uc608\ubc29\uacfc \ub300\uc751 \uc2dc\uc2a4\ud15c\uc744 \ud1b5\ud55c \ud574\uacb0\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790 \uc790\uc2e0\uc5d0\uac8c \ube44\ud310\uc801 \uc0ac\uace0\uc640 \ubb38\uc81c \ud574\uacb0 \ub2a5\ub825\uc744 \ubc30\uc591\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc815\ubd80\uc640 \ubbfc\uac04 \uae30\uc5c5\uc758 \ud611\ub825\uc73c\ub85c \uc0ac\ud68c \uc804\ubc18\uc5d0 \uac78\uce5c \ub514\uc9c0\ud138 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \ud655\ub300\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uad6d\uac00\uac00 \uc9c0\uc5ed \uc0ac\ud68c\uc640 \ud611\ub825\ud558\uc5ec \uac00\uc871\uacfc \ud559\uad50 \uc911\uc2ec\uc758 \uc9c0\uc6d0 \ub124\ud2b8\uc6cc\ud06c\ub97c \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uc704\ud5d8 \uc0c1\ud669\uc744 \ud574\uacb0\ud558\uae30 \uc704\ud574\uc11c\ub294 \uae08\uc9c0\uac00 \uc544\ub2cc \uc801\uadf9\uc801\uc778 \uac10\uc2dc\uc640 \ubcf4\ud638 \uccb4\uacc4\ub97c \uac16\ucd94\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud55c \ub2e4\uc591\ud55c \uacbd\ud5d8\uc744 \uccad\uc18c\ub144\uc5d0\uac8c\uc11c \uc81c\ud55c\ud558\uc9c0 \uc54a\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uad6d\uac00\uac00 \uad50\uc721\uacfc \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc \ud504\ub85c\uadf8\ub7a8\uc744 \uac15\ud654\ud558\uc5ec \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc2a4\uc2a4\ub85c\ub97c \ubcf4\ud638\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \ubc30\uc591\ud558\ub294 \uac83\uc774 \ub354 \uc9c0\uc18d\uac00\ub2a5\ud55c \ud574\uacb0\ucc45\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc815\ucc45\uc801\uc778 \uc9c0\uc6d0\uc744 \ud1b5\ud574 \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc5d0\uac8c \ud544\uc694\ud55c \uae30\uc220\uc801 \ub3c4\uad6c \ubc0f \uad50\uc721 \uc790\ub8cc\ub97c \uc81c\uacf5\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uac1c\uc778\uc815\ubcf4 \uc720\ucd9c\uacfc \uad00\ub828\ud574\uc11c\ub3c4, \uc0ac\uc6a9\uc790\uc758 \uc778\uc2dd\uacfc \ucc45\uc784 \uc788\ub294 \uc0ac\uc6a9\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc0ac\uc6a9\uc790\uc758 \uc815\uc2e0 \uac74\uac15\uc744 \uc9c0\uc6d0\ud558\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \uae30\ub2a5\uacfc \uad50\uc721\uc744 \ud1b5\ud574 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uace0\uc790 \ub178\ub825\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc628\ub77c\uc778\uc0c1\uc758 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \ubcf4\ub2e4 \ud6a8\uacfc\uc801\uc778 \ubc29\ubc95\uc740 \uad50\uc721\uacfc \uc778\uc2dd \uc81c\uace0\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uc81c\ub3c4\uc801 \uc81c\ud55c\ubcf4\ub2e4 \ubd80\ubaa8 \ubc0f \uc9c0\ub3c4\uc790\uc640\uc758 \ud611\ub825\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \uc0ac\uc774\ubc84 \ub530\ub3cc\ub9bc\uc774\ub098 \ud504\ub77c\uc774\ubc84\uc2dc \ubb38\uc81c\uc5d0 \ub300\ud55c \uc6b0\ub824\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc790\uccb4\uc758 \uc0ac\uc6a9 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc0ac\uc6a9 \ubc29\ubc95\uc5d0 \ub300\ud55c \uad50\uc721\uc73c\ub85c \ud574\uacb0\ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\ub3c4 \uc810\uc9c4\uc801\uc73c\ub85c \uad00\ub9ac \ub2a5\ub825\uc744 \ubc30\uc6b8 \uc218 \uc788\ub3c4\ub85d \ub3d5\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uad50\uc721\uacfc \uac10\ub3c5\uc758 \ud6a8\uacfc\ub294 \uc774\ubbf8 \uc785\uc99d\ub41c \uc811\uadfc \ubc29\uc2dd\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uacfc\uc758 \ud611\ub825\uc744 \ud1b5\ud55c \uc9c0\uc18d\uc801\uc778 \uc81c\ub3c4 \uac1c\uc120\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc704\ud5d8\ud55c \ucf58\ud150\uce20 \ub178\ucd9c \ubc0f \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubb38\uc81c\ub294 \ubc95\uc548\uc73c\ub85c \ud574\uacb0\ud558\uae30\ubcf4\ub2e4\ub294 \uad50\uc721\uacfc \uae30\uc220\uc801 \uc9c0\uc6d0\uc744 \ud1b5\ud574 \ub354 \ud6a8\uacfc\uc801\uc73c\ub85c \ub300\ucc98\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc774 \uc81c\ud55c \uc870\uce58\ubcf4\ub2e4 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc2dc\uac04 \uad00\ub9ac\uc640 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uacfc \uc9c1\uc811\uc801\uc778 \uc5f0\uad00\uc774 \uc788\uae30\ubcf4\ub2e4\ub294 \uac1c\uc778\uc758 \uc0dd\ud65c \uad00\ub9ac \ub2a5\ub825\uacfc \uad00\ub828\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uae08\uc9c0\ud558\ub294 \uac83\ubcf4\ub2e4\ub294 \uc62c\ubc14\ub978 \uc0ac\uc6a9\uc744 \uad50\uc721\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \uac1c\uc778 \uc815\ubcf4 \uc720\ucd9c\uacfc \uad00\ub828\ud558\uc5ec \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\ub4e4\uc5d0 \ub300\ud55c \uaddc\uc81c\uac00 \uac15\ud654\ub420 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc758 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uacfc \uc815\uccb4\uc131 \ud615\uc131\uc5d0 \uc788\uc5b4 \uc911\uc694\ud55c
