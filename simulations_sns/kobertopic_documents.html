c774\ub7ec\ud55c \ubc95\uc548\uc740 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ub2e4\uc591\ud55c \uc0ac\ud68c\uc801 \ubb38\uc81c\ub97c \uc774\ud574\ud558\uace0 \ucc38\uc5ec\ud560 \uae30\ud68c\ub97c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \uccad\uc18c\ub144\uc758 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc800\ud574\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc9c0\ub098\uce5c \uaddc\uc81c\ub294 \uccad\uc18c\ub144\ub4e4\uc758 \ub514\uc9c0\ud138 \uc8fc\uad8c\uacfc \uae30\uc220\uc801 \uc5ed\ub7c9 \uac15\ud654\ub97c \ubc29\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uc5d0 \ub300\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \uc2e4\uc81c \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30\ubcf4\ub2e4 \ub2e8\uc9c0 \ud68c\ud53c\ud558\ub294 \uac83\uc73c\ub85c, \uc7a5\uae30\uc801\uc73c\ub85c \ub354 \ud070 \ubb38\uc81c\ub97c \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uaddc\uc81c\uc758 \ud544\uc694\uc131\uc744 \uc778\uc2dd\ud558\uba74\uc11c\ub3c4, \uccad\uc18c\ub144\uc758 \uc790\uc720\ub85c\uc6b4 \ud45c\ud604\uc744 \uc81c\uc57d\ud560 \uc218 \uc788\ub294 \uacfc\ub3c4\ud55c \ubc95\uc801 \uc81c\ud55c\uc740 \ud53c\ud574\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc798\ubabb\ub41c \uc815\ubcf4\ub098 \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc5d0 \ub178\ucd9c\ub418\ub294 \uc704\ud5d8\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \uadf8\uac83\uc744 \ud53c\ud558\ub824\ub294 \uc2dc\ub3c4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ube44\ud310\uc801 \uc0ac\uace0\ub97c \ubc1c\uc804\uc2dc\ud0ac \uae30\ud68c\ub97c \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\ud68c\uc801 \ubb38\uc81c\uc758 \ubc95\uc801 \ud574\uacb0\uc740 \uc885\uc885 \uc81c\ud55c\ub41c \ud6a8\uacfc\ub9cc\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\uc640 \ubd80\ubaa8 \uac04\uc758 \uc18c\ud1b5\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \ubaa8\ub4e0 \uccad\uc18c\ub144\uc758 \uc0c1\ud669\uc5d0 \ub9de\uc9c0 \uc54a\uc73c\uba70, \uc790\uc728\uc131\uacfc \ucc45\uc784\uc744 \ud559\uc2b5\ud560 \uae30\ud68c\ub97c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc778\ud130\ub137 \uc0ac\uc6a9 \uc2dc\uac04 \uc870\uc808 \ubd80\uc871\uc740 \uac00\uc815\uacfc \ud559\uad50 \ucc28\uc6d0\uc758 \uc9c0\ub3c4\ub85c \ud574\uacb0\ub420 \uc218 \uc788\ub294 \ubb38\uc81c\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc81c\ud55c\uc774 \ubc18\ub4dc\uc2dc \uc548\uc804\ud55c \ud658\uacbd\uc744 \uc81c\uacf5\ud558\uc9c0 \uc54a\ub294\ub2e4\ub294 \uac83\uc744 \uc778\uc815\ud574\uc57c \ud569\ub2c8\ub2e4","\ub354 \ub098\uc544\uac00, \ubc95\uc801 \uaddc\uc81c\ub294 \uc544\ub3d9 \ubcf4\ud638\uc758 \uba85\ubaa9\uc73c\ub85c \uc77c\uad00\uc131\uc774 \uacb0\uc5ec\ub420 \uc218 \uc788\uc73c\uba70, \uad50\uc721 \uaca9\ucc28\ub97c \ub354 \uae4a\uac8c \ub9cc\ub4e4 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc640 \uc815\uc2e0 \uac74\uac15 \uc0ac\uc774\uc758 \uc5f0\uad00\uc131\uc740 \ubcf5\uc7a1\ud558\uba70 \uc77c\uad04\uc801\uc778 \uc81c\ud55c\uc740 \uc801\uc808\ud55c \ud574\uacb0\ucc45\uc774 \uc544\ub2d9\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ucc45\uc784\uac10 \uc788\ub294 \uc628\ub77c\uc778 \ud589\ub3d9\uc744 \ubc30\uc6b0\uace0 \uc2e4\ucc9c\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \ucc28\ub2e8\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uad00\uacc4 \ud615\uc131\uc5d0 \uc788\uc5b4 \uc911\uc694\ud55c \ub3c4\uad6c\ub85c\uc11c \uc791\uc6a9\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub97c \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uadf8\ub4e4\uc758 \uc0ac\ud68c\uc801 \ubc1c\ub2ec\uc5d0 \ubd80\uc815\uc801 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc548 \ub3c4\uc785\uc740 \ub610\ud55c \ub514\uc9c0\ud138 \uacbd\uc81c\uc640 \ud06c\ub9ac\uc5d0\uc774\ud130 \uc0dd\ud0dc\uacc4\uc5d0 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubc95\uc801 \uc81c\uc7ac\ub294 \uae30\uc220\uc758 \uae09\uc18d\ud55c \ubc1c\uc804 \uc18d\ub3c4\ub97c \ub530\ub77c\uac00\uc9c0 \ubabb\ud560 \uac00\ub2a5\uc131\uc774 \ud07d\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc758 \uaddc\uc81c \uac15\ud654\ub294 \uadf8 \uc790\uccb4\ub85c \uccad\uc18c\ub144\ub4e4\uc758 \ucc38\uc5ec\uc640 \uc131\uc7a5\uc744 \uc81c\ud55c\ud560 \uac00\ub2a5\uc131\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \ubc95\uc801 \uc81c\ud55c\uc740 \uc624\ud788\ub824 \ubbf8\uc131\ub144\uc790 \uc0ac\uc774\uc5d0\uc11c \uae08\ub2e8 \ud604\uc0c1\uc744 \uc720\ubc1c\ud558\uace0 \ud638\uae30\uc2ec\uc744 \uc790\uadf9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\uba74 \uc624\ud788\ub824 \uccad\uc18c\ub144\ub4e4\uc774 \uc911\uc694\ud55c \uae30\uc220\uacfc \uc0ac\ud68c\uc801 \uae30\uc220\uc744 \ubc30\uc6b0\uc9c0 \ubabb\ud560 \uac00\ub2a5\uc131\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc774 \uc81c\uacf5\ud558\ub294 \uc989\uac01\uc801\uc778 \ubcf4\ud638\ub294 \uc2e4\uc81c\ub85c \ud6a8\uacfc\uc801\uc774\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uccad\uc18c\ub144\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc9c0\ub098\uce58\uac8c \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uc624\ud788\ub824 \ubb38\uc81c \ud574\uacb0\uc5d0 \uc5ed\ud6a8\uacfc\ub97c \ub0b3\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc81c\ud55c\uc801\uc778 \ubc95\uc548\uc740 \uc2e4\uc9c8\uc801 \ubb38\uc81c\ubcf4\ub2e4\ub294 \uacfc\ub3c4\ud55c \uaddc\uc81c\uc640 \uac10\uc2dc\uc5d0 \uc9d1\uc911\ud558\uac8c \ub420 \uac00\ub2a5\uc131\uc774 \ub192\uc2b5\ub2c8\ub2e4","\ubd80\ubaa8\uc640 \uc790\ub140 \uac04\uc758 \uc774\uc0c1\uc801\uc778 \uc18c\ud1b5\uc774 \ud604\uc2e4\uc801\uc73c\ub85c \uc5b4\ub824\uc6b8 \uc218 \uc788\ub2e4\ub294 \uc810\uc740 \uc778\uc9c0\ud558\uc9c0\ub9cc, \ubc95\uc801 \uaddc\uc81c\uac00 \ubaa8\ub4e0 \ubb38\uc81c\ub97c \ud574\uacb0\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4. [\uc778\ud130\ub137 \uc0b0\uc5c5\uc758 \ubc1c\uc804\uacfc \ud68c\uc6d0\uc0ac \ube44\uc988\ub2c8\uc2a4 \uc131\uacf5\uc744 \uc9c0\uc6d0\ud558\ub294] \uc5d4\ud130\ub137\ud611\ud68c\ub294 \uaddc\uc81c\ubcf4\ub2e4\ub294 \uc0ac\uc6a9\uc790 \uad50\uc721\uacfc \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uac1c\uc120\uc744 \ud1b5\ud574 \ub354 \ub9ce\uc740 \uc9d1\uc5d0\uc11c \uc62c\ubc14\ub978 \uc778\ud130\ub137 \uc0ac\uc6a9 \uc2b5\uad00\uc774 \ud615\uc131\ub420 \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc9c1\uc811\uc801\uc73c\ub85c \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uadf8\ub4e4\uc758 \ud559\uc2b5\uacfc \uc815\ubcf4 \uc811\uadfc\uc5d0 \uac78\ub9bc\ub3cc\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub514\uc9c0\ud138 \uae30\uc220 \ud559\uc2b5 \uae30\ud68c\ub97c \ucc28\ub2e8\ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc81c\uc7ac\ub294 \uadf8 \uc790\uccb4\ub85c \uc2e4\ud6a8\uc131\uc744 \uac00\uc9c0\uc9c0 \ubabb\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc758 \ub3c4\uc785\uc740 \uccad\uc18c\ub144\uc758 \uc790\uae30 \ud45c\ud604\uacfc \ucc38\uc5ec \uae30\ud68c\ub97c \uc704\ucd95\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uac70\uc758 \uae08\uc9c0\ud558\ub2e4\uc2dc\ud53c \ud558\uba74 \uc624\ud788\ub824 \ube44\ud310\uc801 \uc0ac\uace0\uc640 \ub9ac\ud130\ub7ec\uc2dc \ub2a5\ub825 \ud5a5\uc0c1\uc758 \uae30\ud68c\ub97c \ubc15\ud0c8\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \uccad\uc18c\ub144\ub4e4\uc774 \ub514\uc9c0\ud138 \uc138\uacc4\uc5d0\uc11c \ud544\uc694\ud55c \uae30\uc220\uc744 \uc775\ud790 \uae30\ud68c\ub97c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uaddc\uc81c\ub294 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc81c\ud55c\ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc81c\ud55c\uc801\uc778 \uc811\uadfc\uc740 \uccad\uc18c\ub144\uc758 \uc790\uc728\uc131\uc744 \uc81c\ud55c\ud560 \uc218 \uc788\uc73c\uba70, \uc774\ub294 \uc624\ud788\ub824 \ubc18\ubc1c\uc2ec\uc744 \uc720\ubc1c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0\uc11c\uc758 \ud65c\ub3d9\uc744 \uc644\uc804\ud788 \ucc28\ub2e8\ud558\ub294 \uac83\uc740 \uc624\ud788\ub824 \ubc18\ubc1c\uc2ec\uc744 \ud0a4\uc6cc \ube44\ubc00\uc2a4\ub7fd\uace0 \ubd80\uc801\uc808\ud55c \uc0ac\uc6a9\uc744 \ubd80\ucd94\uae38 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \uccad\uc18c\ub144\uc758 \ub514\uc9c0\ud138 \uc18c\ud1b5 \ub2a5\ub825\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc644\uc804\ud55c \uc81c\ud55c\uc740 \uccad\uc18c\ub144\ub4e4\uc758 \uc0ac\ud68c\uc801 \ubc0f \uc2ec\ub9ac\uc801 \ubc1c\ub2ec \uae30\ud68c\ub97c \ubc15\ud0c8\ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\ub294 \ubc95\uc548\uc740 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uce68\ud574\ud560 \uc6b0\ub824\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c \uc790\uccb4\uac00 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \uc77c\ub960\uc801\uc778 \ubc29\uc2dd\uc744 \uc801\uc6a9\ud558\ub294 \uac83\uc740 \uc2e4\uc9c8\uc801\uc778 \ubb38\uc81c \ud574\uacb0\uc5d0 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \ud544\uc218\uc801\uc778 \uc18c\ud1b5 \ubc0f \uc815\ubcf4 \uad50\ud658\uc758 \uc218\ub2e8\uc774\uae30 \ub54c\ubb38\uc5d0 \uc774\ub97c \uc81c\ud55c\ud558\ub294 \uac83\uc740 \ubbf8\uc131\ub144\uc790\uc758 \ud559\uc2b5 \ubc0f \uc0ac\ud68c\uc801 \uc131\uc7a5\uc5d0 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9 \ubc0f \uc758\uc0ac\uc18c\ud1b5 \ub2a5\ub825\uc758 \ubc1c\uc804\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud55c \ub514\uc9c0\ud138 \uae30\uc220 \ub2a5\ub825 \ud5a5\uc0c1 \uae30\ud68c\ub97c \uc783\uac8c \ub420 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uccad\uc18c\ub144\uc758 \uc790\uc728\uc131\uc744 \uc800\ud558\uc2dc\ud0ac \uc218 \uc788\uc73c\uba70, \uc774\ub294 \uc624\ud788\ub824 \uc5ed\ud6a8\uacfc\ub97c \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ubc95\uc801 \uc81c\ud55c\uc740 \uac1c\ubcc4\uc801 \uc0c1\ud669\uc744 \ucda9\ubd84\ud788 \uace0\ub824\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uacfc\ub3c4\ud55c \uaddc\uc81c\ub294 \uccad\uc18c\ub144\ub4e4\uc758 \uc815\ubcf4 \uc811\uadfc\uacfc \ud559\uc2b5 \uae30\ud68c\ub97c \uc81c\ud55c\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc77c\ubd80 \uc81c\ud55c\uc774 \uc788\ub2e4\uace0 \ud574\uc11c \ubaa8\ub4e0 \ubb38\uc81c\ub97c \uc608\ubc29\ud560 \uc218 \uc788\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc644\uc804\ud788 \uae08\uc9c0\ud558\uac70\ub098 \uacfc\ub3c4\ud558\uac8c \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uc624\ud788\ub824 \ubd80\uc791\uc6a9\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uaddc\uc81c\ub294 \ucc3d\uc758\uc131\uacfc \ud45c\ud604\uc758 \uae30\ud68c\ub97c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uaddc\uc81c\uc758 \uc2e4\ud6a8\uc131\uc744 \ubcf4\uc7a5\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc644\uc804\ud788 \uc81c\ud55c\ud558\uba74, \uadf8\ub4e4\uc758 \uc790\uc720\uc640 \ud45c\ud604\uc758 \uae30\ud68c\ub97c \ube7c\uc557\uac8c \ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uc7a0\uc7ac\uc801\uc73c\ub85c \ubbf8\uc131\ub144\uc790\uac00 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc720\uc775\ud55c \uce21\uba74\uc744 \uacbd\ud5d8\ud560 \uae30\ud68c\ub97c \uc81c\ud55c\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubc95\uc801 \uc81c\ud55c\uc774 \uae30\uc220\uc801 \uc6b0\ud68c \ubc29\ubc95\uc744 \ucc3e\uae30 \uc26c\uc6b4 \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0\uc11c \uc2e4\ud6a8\uc131\uc744 \uac00\uc9c0\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc744 \ud1b5\ud574 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uc2e4\ud6a8\uc131\uc774 \ubd80\uc871\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc548\uc774 \uc2dc\ud589\ub418\uba74 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc640 \uad00\ub828 \uae30\uc220 \ubc1c\uc804\uc5d0 \ub300\ud55c \uae30\ud68c\ub97c \uc81c\ud55c\ud558\uac8c \ub429\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubc95\uc801\uc73c\ub85c \uc81c\ud55c\ud558\uba74 \uc5ed\ud6a8\uacfc\uac00 \ubc1c\uc0dd\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220\uc801 \ubcf4\ud638 \uc7a5\uce58\uac00 \uc644\ubcbd\ud558\uc9c0 \uc54a\ub2e4\uba74 \uc774\ub97c \uc0ac\uc6a9\ud558\uc9c0 \uc54a\uaca0\ub2e4\ub294 \ub17c\ub9ac\ub294 \uc624\ud788\ub824 \ub354 \ud070 \uc704\ud5d8\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc900\uc5c4\ud55c \uaddc\uc81c\ub294 \uccad\uc18c\ub144\uc758 \uc790\uc728\uc131\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc73c\uba70, \uc774\ub294 \uc131\uc219\ud55c \ub514\uc9c0\ud138 \uc2dc\ubbfc\uc73c\ub85c \uc131\uc7a5\ud558\ub294 \ub370 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\uc774 \uae30\ubcf8\uc801\uc778 \ubcf4\ud638\ub97c \uc81c\uacf5\ud55c\ub2e4\ub294 \uc8fc\uc7a5\uc740 \uc77c\uacac \ud0c0\ub2f9\ud574 \ubcf4\uc77c \uc218 \uc788\uc9c0\ub9cc, \uc2e4\uc9c8\uc801\uc73c\ub85c\ub294 \uc0ac\ud68c\uc801 \ubd88\uade0\ud615\uc744 \ud574\uacb0\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \ucee4\ubba4\ub2c8\ucf00\uc774\uc158 \uae30\ud68c\uac00 \uac10\uc18c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\uc740 \ubaa8\ub4e0 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ub3d9\uc77c\ud55c \ubc29\uc2dd\uc73c\ub85c \uc801\uc6a9\ub420 \uc218 \uc788\uc9c0\ub9cc, \uc774\ub294 \ub2e4\uc591\ud55c \ud658\uacbd\uacfc \uc0c1\ud669\uc5d0 \ucc98\ud55c \uac1c\uac1c\uc778\uc758 \ud544\uc694\ub97c \ucda9\ubd84\ud788 \ubc18\uc601\ud558\uc9c0 \ubabb\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uaddc\uc81c\ub294 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc81c\ud55c\ud560 \uc704\ud5d8\uc774 \uc788\uc73c\uba70, \uc774\ub294 \uc77c\ubc18\uc801\uc73c\ub85c \uad8c\ub9ac \uce68\ud574\ub85c \uc774\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uc81c\ud55c\uc801\uc778 \ubc29\ucc45\uc740 \ubb38\uc81c\ub97c \uc644\ud654\ud558\ub294 \ub300\uc2e0 \uccad\uc18c\ub144\uc758 \uc790\ub9bd\uc131\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0 \ub300\ud55c \ubc95\uc801 \uc81c\ud55c\uc740 \uc2e4\uc81c\ub85c \ubb38\uc81c\uc758 \uadfc\ubcf8\uc801\uc778 \uc6d0\uc778\uc744 \ud574\uacb0\ud558\uc9c0 \ubabb\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uba3c\uc800, \uc81c\ud55c\ub41c \uc811\uadfc\uc740 \uc624\ud788\ub824 \uae30\uc220 \uaca9\ucc28\ub97c \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc774 \uc804\uc801\uc73c\ub85c \uc81c\ud55c\ub418\uba74 \ubbf8\uc131\ub144\uc790\ub4e4\uacfc \uc0ac\ud68c\uc801 \uc5f0\uacb0\ub9dd\uc758 \ub2e8\uc808\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc790\uc720\ub85c\uc6b4 \ud45c\ud604\uacfc \uc815\ubcf4 \ud68d\ub4dd \ub2a5\ub825\uc744 \uc9c0\ub098\uce58\uac8c \uc5b5\uc81c\ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\uc758 \uc0ac\ud68c\uc801 \uae30\uc220 \ubc1c\ub2ec\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc77c\uad04\uc801\uc778 \ubc95\uc801 \uc81c\ud55c\uc740 \uc0ac\ud68c \uc804\uccb4\uac00 \uc544\ub2cc \uac1c\uc778\uc758 \uc0c1\ud669\uc744 \uace0\ub824\ud558\uae30 \uc5b4\ub835\uace0, \ubaa8\ub4e0 \uc544\uc774\ub4e4\uc5d0\uac8c \uc801\uc808\ud558\uac8c \uc801\uc6a9\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\ub294 \uc815\ucc45\uc740 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc774 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ubbf8\uce58\ub294 \uc9c0\ub3c4\ub97c \uc57d\ud654\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uac15\uc81c\uc801\uc778 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ubd88\ubc95\uc801\uc778 \ubc29\ubc95\uc744 \ud1b5\ud574 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uac00\ub2a5\uc131\uc744 \ub192\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ub9ce\uc740 \uc815\ubcf4\ub97c \uc5bb\uace0 \uacbd\ud5d8\uc744 \uc313\uc744 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \ubc15\ud0c8\ud558\uac8c \ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801\uc778 \uc811\uadfc\uc774 \uc798\ubabb\ub41c \ubcf4\uc548\uac10\uc744 \uc2ec\uc5b4\uc904 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ubc95\uc801 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uacf5\ud3c9\ud55c \uc811\uadfc\uc744 \ubcf4\uc7a5\ud558\uc9c0 \ubabb\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc774\ub7ec\ud55c \ubc95\uc548\uc740 \ubbf8\uc131\ub144\uc790 \uac04\uc758 \uc911\uc694\ud55c \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc758 \uae30\ud68c\ub97c \ube7c\uc557\uac8c \ub429\ub2c8\ub2e4","\uba3c\uc800, \uc774\ub7ec\ud55c \ubc95\uc548\uc740 \uccad\uc18c\ub144\uc758 \ub514\uc9c0\ud138 \uad00\ub828 \uae30\uc220 \uc2b5\ub4dd \uae30\ud68c\ub97c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801\uc778 \uc81c\ud55c\uc740 \uae30\uc220\uc758 \ubc1c\uc804\uc744 \uace0\ub824\ud558\uc9c0 \ubabb\ud558\ub294 \uacbd\ud5a5\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\uc758 \ub514\uc9c0\ud138 \ubb38\ud574\ub825 \ubc1c\ub2ec\uc744 \ubc29\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc81c\ud55c\uc801\uc778 \ubc95\uc548\uc740 \uc778\ud130\ub137 \ud50c\ub7ab\ud3fc\uc758 \uacbd\uc81c\uc801 \uc131\uc7a5\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc5d0 \uc758\ud55c \uc548\uc804\ub9dd\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc8fc\uccb4\uc131\uacfc \ub2a5\ub3d9\uc131\uc744 \uc57d\ud654\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uacf5\uc801\uc778 \uba54\uc2dc\uc9c0\ub97c \ud1b5\ud574 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc548\uc804\uc131\uc758 \ud544\uc694\uc131\uc744 \uac15\uc870\ud558\ub294 \uac83\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ubc95\uc801 \uc81c\ud55c\uc740 \uc624\ud788\ub824 \uccad\uc18c\ub144\uc5d0\uac8c \ub3c4\uc804 \uacfc\uc81c\ub97c \uc81c\uc2dc\ud558\uac8c \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \uac00\uc871\uacfc \ud559\uad50\uc758 \uc5ed\ud560\uc744 \uc57d\ud654\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc548\uc744 \ud1b5\ud55c \uc77c\uad04\uc801 \uc81c\ud55c\uc740 \ubb38\ud654\uc801 \ub2e4\uc591\uc131\uacfc \uc0c1\ud669\uc758 \ucc28\uc774\ub97c \ubc30\uc81c\ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\ub85c\ub294 \ubaa8\ub4e0 \ubcc0\uc218\ub97c \ud6a8\uacfc\uc801\uc73c\ub85c \ub2e4\ub8e8\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uac15\ub825\ud55c \ubc95\uc801 \uc7a5\uce58\ub294 \uc2e4\uc81c\ub85c \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ubc95\uc744 \ud68c\ud53c\ud558\uac8c \ud558\uac70\ub098 \ube44\uacf5\uc2dd\uc801\uc778 \uacbd\ub85c\ub97c \ud1b5\ud574 \ubb38\uc81c\ub97c \uc545\ud654\uc2dc\ud0ac \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc911\uc694\ud55c \ud559\uc2b5 \ubc0f \uc131\uc7a5 \uae30\ud68c\ub97c \uc81c\uacf5\ud558\uae30 \ub54c\ubb38\uc5d0, \uc774\ub97c \uc81c\ud55c\ud558\uba74 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uae08\uc9c0\ud558\ub294 \uac83\uc740 \uc624\ud788\ub824 \ubbf8\uc131\ub144\uc790\uc758 \uc815\ubcf4 \uc811\uadfc\uc131\uc744 \uc800\ud574\ud558\uace0 \uc778\ud130\ub137 \uae30\uc220\uc744 \uc62c\ubc14\ub974\uac8c \uc0ac\uc6a9\ud558\ub294 \ubc95\uc744 \ubc30\uc6b8 \uae30\ud68c\ub97c \uc557\uc544\uac08 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \ubc1c\uc804\uc2dc\ud0a4\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\uc774\uba70, \uc774\ub97c \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uae30\uc220\uc0ac\ud68c\uc5d0\uc11c\uc758 \uacbd\uc7c1\ub825\uc744 \uc800\ud558\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc774\ub7ec\ud55c \ubc95\uc548\uc740 \ubbf8\uc131\ub144\uc790\uc758 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \ubb38\uc81c\uc758 \uadfc\ubcf8\uc801 \ud574\uacb0\uc774 \uc544\ub2c8\ub77c \uba74\ud53c\uc801 \ub300\uc751\ucc45\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ub514\uc9c0\ud138 \ud559\uc2b5\uacfc \uc18c\ud1b5 \uae30\ud68c\ub97c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uccad\uc18c\ub144\uc758 \ud45c\ud604\uc758 \uc790\uc720\uc640 \uc815\ubcf4 \uc811\uadfc\uc744 \uc81c\ud55c\ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \ubc95\uc801 \uaddc\uc81c\ub294 \uac01 \uac00\uc815\uc758 \ub2e4\uc591\ud55c \uc0c1\ud669\uc744 \uace0\ub824\ud558\uc9c0 \ubabb\ud560 \uc218 \uc788\uc73c\uba70, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ucc98\ud55c \ub2e4\uc591\ud55c \ud658\uacbd\uc5d0 \ub9de\ucd98 \ub9de\ucda4\ud615 \uad50\uc721\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \ud2c0\uc740 \ucd5c\uc18c\ud55c\uc758 \ubcf4\ud638 \uc7a5\uce58\ub85c \uae30\ub2a5\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc790\uc6d0\uc758 \ubd80\uc871\uacfc \uc815\ucc45\uc758 \ubbf8\ube44\ub85c \uc778\ud574 \uc5ec\ub7ec \uac00\uc9c0 \ud55c\uacc4\ub97c \ub4dc\ub7ec\ub0bc \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc548\uc774 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc77c\ub960\uc801\uc73c\ub85c \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uac1c\uc778\uc758 \uc790\uc720\uc640 \ud45c\ud604\uc758 \uad8c\ub9ac\ub97c \uce68\ud574\ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \uac1c\uc778\uc758 \uad8c\ub9ac\uc640 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\uc758 \uc704\ud5d8 \ub178\ucd9c\uc744 \ubb3c\ub9ac\uc801\uc73c\ub85c \uc904\uc77c \uc218\ub294 \uc788\uc9c0\ub9cc, \uadfc\ubcf8\uc801\uc778 \ud574\uacb0\ucc45\uc774 \ub418\uc9c0\ub294 \uc54a\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\uba74 \ub514\uc9c0\ud138 \uacbd\uc81c\uc758 \ud575\uc2ec\uc778 \uccad\uc18c\ub144 \uc18c\ube44\uc790 \ubc0f \ucc3d\uc791\uc790 \uae30\ubc18\uc774 \uc57d\ud654\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ubd80\ubaa8\ub4e4\uc774 \uc790\ub140\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ud56d\uc0c1 \uac10\ub3c5\ud560 \uc218 \uc5c6\ub2e4\ub294 \uac83\uc740 \ud604\uc2e4\uc801 \ub3c4\uc804\uc785\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ubbf8\uc131\ub144\uc790\uc758 \uc790\uc720\ub85c\uc6b4 \ud45c\ud604\uacfc \uc815\ubcf4 \uc811\uadfc \uad8c\ub9ac\ub97c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc815\ubcf4 \uc811\uadfc\uacfc \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uadf8\ub4e4\uc758 \uc131\uc7a5\uacfc \ubc1c\ub2ec\uc5d0 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uacbd\uc81c\uc801 \uc190\uc2e4\uc758 \uac71\uc815\uc774 \ub2e8\uc21c\ud55c \uc774\uae30\uc2ec\uc73c\ub85c \ubcf4\uc77c \uc218 \uc788\uc9c0\ub9cc, \uc774\ub294 \uc7a5\uae30\uc801\uc73c\ub85c \ubbf8\uc131\ub144\uc790\uc758 \uc0dd\ud65c \ud658\uacbd\uc5d0\ub3c4 \uc601\ud5a5\uc744 \ubbf8\uce69\ub2c8\ub2e4. [\uc778\uc2a4\ud0c0\uadf8\ub7a8\uc744 \uc18c\uc720\ud558\uace0 \ub9ce\uc740 \uc0ac\uc6a9\uc790 \uc218\uc775\uc744 \ucc3d\ucd9c\ud558\ub294] \uba54\ud0c0\ub294 \ubbf8\uc131\ub144\uc790 \uc0ac\uc6a9\uc790\uac00 \uc904\uc5b4\ub4e6\uc73c\ub85c\uc368 \ubc1c\uc0dd\ud558\ub294 \uacbd\uc81c\uc801 \uc5ec\ud30c\ub294 \uacb0\uad6d \uc804\uccb4 \uc0b0\uc5c5\uc5d0 \uc601\ud5a5\uc744 \ubbf8\uce58\uba70, \ub2e4\uc591\ud55c \uad50\uc721 \ubc0f \uc548\uc804 \ud504\ub85c\uadf8\ub7a8\uc758 \uae30\ud68c\ub97c \ucd95\uc18c\uc2dc\ud0ac \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801\uc778 \uc81c\ud55c\uc740 \uccad\uc18c\ub144\uc758 \ucc3d\uc758\uc131\uacfc \uac1c\uc131\uc744 \uc5b5\uc555\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220\uacfc \uc815\ubcf4\uc758 \ube44\ub300\uce6d\uc5d0 \ub300\ud55c \ubb38\uc81c\uac00 \ub354\uc6b1 \uc2ec\ud654\ub420 \uac83\uc785\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\uba74 \uadf8\ub4e4\uc758 \ud45c\ud604\uc758 \uc790\uc720\uc640 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9 \uae30\ud68c\ub97c \uc5b5\uc555\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc9c0\ub098\uce5c \uaddc\uc81c\ub294 \uc624\ud788\ub824 \uccad\uc18c\ub144\uc758 \ubd88\ub9cc\uacfc \ubc18\ubc1c\uc744 \ucd09\ubc1c\ud560 \uc218 \uc788\uc73c\uba70 \uc774\ub294 \ubb38\uc81c\ub97c \uc545\ud654\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uc18c\uc18d\uac10\uc744 \ubc15\ud0c8\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc815\ubcf4 \uc811\uadfc\uacfc \uc790\uae30 \ud45c\ud604\uc758 \uc790\uc720\uac00 \uce68\ud574\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc804\uba74\uc801\uc778 \ubc95\uc801 \uae08\uc9c0\ub294 \ubbf8\uc131\ub144\uc790\uc758 \ubc1c\ub2ec \uae30\ud68c\ub97c \ub193\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uc5ed\ud6a8\uacfc\ub97c \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uac15\uc81c\ub294 \uccad\uc18c\ub144\uc758 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \ubc1c\uc804\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc815\ubcf4 \uc811\uadfc\uc758 \ubd88\uade0\ud615\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc644\uc804\ud788 \uc81c\ud55c\ud558\ub294 \uac83\uc740 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubc95\uc801 \uaddc\uc81c\uac00 \uac15\uc81c\uc801\uc73c\ub85c \uc2dc\ud589\ub418\uc5b4\ub3c4 \uc2e4\uc81c\ub85c\ub294 \uc27d\uac8c \ubb34\uc2dc\ub420 \uc218 \uc788\uc73c\uba70, \uc9d1\ud589\uc758 \uc5b4\ub824\uc6c0\uacfc \uc2e4\uc9c8\uc801\uc778 \ubcf4\ud638 \uc81c\uacf5\uc758 \ud55c\uacc4\ub97c \uac00\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uacfc\ub3c4\ud55c \ubc95\uc801 \uc81c\ud55c\uc740 \uc624\ud788\ub824 \ubc18\ubc1c\uc744 \ucd08\ub798\ud558\uace0 \ubd88\ubc95\uc801\uc778 \uc0ac\uc6a9\uc744 \uc99d\uac00\uc2dc\ud0ac \uac00\ub2a5\uc131\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubb34\uc791\uc815 \uc81c\ud55c\ud558\ub294 \ubc95\uc801 \uc870\uce58\ub294 \uc624\ud788\ub824 \uccad\uc18c\ub144\ub4e4\uc758 \ubb38\uc81c \ud574\uacb0 \ub2a5\ub825\uc744 \uc800\ud558\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\uc774 \ubaa8\ub4e0 \uc544\uc774\uc5d0\uac8c \ub3d9\ub4f1\ud55c \ubcf4\ud638\ub97c \uc81c\uacf5\ud55c\ub2e4\uace0 \ubcf4\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \uc911\uc694\ud55c \uc18c\ud1b5\uc758 \uc218\ub2e8\uc73c\ub85c \uc790\ub9ac \uc7a1\uace0 \uc788\uc73c\uba70, \uc774\ub97c \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uc544\ub3d9\uacfc \uccad\uc18c\ub144\uc758 \uc758\uc0ac\uc18c\ud1b5 \ub2a5\ub825\uc744 \uc800\ud558\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc81c\ud55c\uc801\uc778 \uc815\ucc45\uc740 \ubbf8\uc131\ub144\uc790\uc758 \uad8c\ub9ac\uc640 \uc131\uc7a5\uc758 \uae30\ud68c\ub97c \uc81c\ud55c\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uc81c\ud55c\uc740 \uac1c\uc778\uc758 \ucc45\uc784\uacfc \ubd80\ubaa8\uc758 \uc5ed\ud560\uc744 \ub300\uc2e0\ud574\uc11c\ub294 \uc548 \ub429\ub2c8\ub2e4","\uccab\uc9f8, \uac74\uac15 \ubb38\uc81c\ub098 \uc815\uc2e0\uc801 \uc2a4\ud2b8\ub808\uc2a4 \ubb38\uc81c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\ub9cc\uc73c\ub85c \ud574\uacb0\ub420 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ubc95\uc801 \uc81c\ud55c\uc740 \uc2e4\uc81c\ub85c \uccad\uc18c\ub144\uc774 \uacaa\ub294 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc774\ub098 \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20 \ub178\ucd9c \ubb38\uc81c\ub97c \uadfc\ubcf8\uc801\uc73c\ub85c \ud574\uacb0\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\ub960\ub85c \uac15\uc694\ub41c \uc81c\ud55c\uc740 \uc608\uae30\uce58 \ubabb\ud55c \ubd80\uc791\uc6a9\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\uba74 \uc815\ubcf4 \uc811\uadfc\uc758 \uae30\ud68c\ub97c \uc783\uac8c \ub420 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \ub514\uc9c0\ud138 \uad50\uc721\uacfc \uc0ac\ud68c\uc801 \uae30\uc220 \ubc1c\ub2ec\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccad\uc18c\ub144\ub4e4\uc774 \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\ub098 \uc0ac\uc774\ubc84 \ubd88\ub9c1\uc5d0 \ub178\ucd9c\ub420 \uc218 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc \uaddc\uc81c\ub294 \uadfc\ubcf8\uc801\uc778 \ud574\uacb0\ucc45\uc774 \uc544\ub2d9\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc644\uc804\ud788 \uc81c\ud55c\ud558\ub294 \uac83\uc740 \uae30\uc220 \uaca9\ucc28\ub97c \uc2ec\ud654\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc548\uc740 \uc77c\uad04\uc801\uc778 \uc81c\ud55c\uc744 \ud1b5\ud574 \ubcf5\uc7a1\ud55c \uc0ac\ud68c\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc774\ub7ec\ud55c \ubc95\uc548\uc740 \uc2e4\uc81c\ub85c \uc9d1\ud589\ud558\uae30\uac00 \uc5b4\ub824\uc6b0\uba70 \ube44\ud6a8\uc728\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801\uc778 \uc81c\ud55c\uc740 \uc2e4\uc81c \ubb38\uc81c\uc758 \uadfc\ubcf8\uc801\uc778 \ud574\uacb0\ucc45\uc774 \ub418\uc9c0 \ubabb\ud560 \uac00\ub2a5\uc131\uc774 \ud07d\ub2c8\ub2e4","\uc14b\uc9f8, \uadf9\ub2e8\uc801\uc778 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \uc624\ud788\ub824 \uccad\uc18c\ub144\ub4e4\uc774 \ube44\uacf5\uc2dd \uacbd\ub85c\ub97c \ud0d0\uc0c9\ud558\uac8c \ub9cc\ub4e4 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ub3c4\ud55c \ubc95\uc801 \uaddc\uc81c\ub294 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \ubd88\ud544\uc694\ud55c \ubc18\ubc1c\uc2ec\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0 \ub300\ud55c \ubb34\ubd84\ubcc4\ud55c \uc0ac\uc6a9\uc774 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ucd08\ub798\ud560 \uc218 \uc788\ub2e4\ub294 \uc810\uc5d0\ub294 \ub3d9\uc758\ud558\uc9c0\ub9cc, \ubb38\uc81c\uc758 \ud575\uc2ec\uc740 \uc0ac\uc6a9\uc758 \uc9c8\uacfc \ud328\ud134\uc774\uc9c0 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc790\uccb4\uc758 \uc874\uc7ac\uac00 \uc544\ub2d9\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc644\uc804\ud788 \uae08\uc9c0\ud558\uac70\ub098 \uc5c4\uaca9\ud788 \uc81c\ud55c\ud558\uba74 \uccad\uc18c\ub144\ub4e4\uc740 \ub2e4\ub978 \ubc29\uc2dd\uc73c\ub85c\ub3c4 \uc720\uc0ac\ud55c \ubb38\uc81c\uc5d0 \ub178\ucd9c\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc77c\uad00\ub41c \uaddc\uc81c\uac00 \uc624\ud788\ub824 \ud601\uc2e0\uacfc \ubc1c\uc804\uc744 \uc800\ud574\ud560 \uc18c\uc9c0\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\ub294 \uac83\uc740 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uaddc\uc81c\ub97c \ud1b5\ud55c \uc548\uc804\ub9dd\uc740 \ubbf8\uc131\ub144\uc790\uc758 \uc790\uc728\uc131\uacfc \ucc45\uc784\uac10\uc744 \uc800\ud558\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220\uc758 \uc644\uc804\ud55c \ucc28\ub2e8\uc740 \ud604\uc2e4\uc801\uc774\uc9c0 \uc54a\uc73c\uba70, \uc624\ud788\ub824 \ubd80\uc791\uc6a9\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uaddc\uc81c\ub294 \ub2e8\ud3b8\uc801\uc77c \uc218 \uc788\uc73c\uba70 \ubaa8\ub4e0 \uc0c1\ud669\uc5d0 \uc801\uc6a9\ub418\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uccad\uc18c\ub144\uc758 \uc790\ubc1c\uc801\uc778 \ucc45\uc784\uac10 \ubc1c\uc804\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc73c\uba70, \uc774\ub294 \uc624\ud788\ub824 \uaddc\uc81c \uc5c6\ub294 \ud658\uacbd\uc5d0\uc11c \uc2a4\uc2a4\ub85c \uaddc\uce59\uc744 \uc124\uc815\ud558\uace0 \ub530\ub974\ub294 \uacbd\ud5d8\uc744 \uc81c\uacf5\ud568\uc73c\ub85c\uc368 \ubc1c\uc804\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uc624\ud788\ub824 \uc5ed\ud6a8\uacfc\ub97c \ucd08\ub798\ud560 \uac00\ub2a5\uc131\uc774 \ud07d\ub2c8\ub2e4","\ub610\ud55c, \uacfc\ub3c4\ud55c \uc81c\uc7ac\ub294 \ubbf8\uc131\ub144\uc790\uc758 \ud638\uae30\uc2ec\uacfc \ubc18\ud56d\uc2ec\uc744 \uc720\ubc1c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc815\ubcf4\uc640 \uc0ac\uace0 \ud655\uc7a5\uc744 \uc704\ud55c \uae30\ud68c\ub97c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc744 \ub3c4\uc785\ud560 \uacbd\uc6b0 \uc624\ud788\ub824 \uccad\uc18c\ub144\uc758 \ub3c5\ub9bd\uc801\uc778 \uc0ac\uace0\uc640 \ucc45\uc784\uac10\uc744 \uae30\ub97c \uae30\ud68c\ub97c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4. [\ub514\uc9c0\ud138 \uc0ac\uc6a9\uc790 \ubcf4\ud638\ub97c \uc704\ud574 \ub85c\ube44\ud558\ub294 \ub137\ucd08\uc774\uc2a4]\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc2a4\uc2a4\ub85c \uc548\uc804\ud55c \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \uad00\ub9ac\ud558\uba74\uc11c \ucc45\uc784\uac10\uc744 \ubc30\uc6b8 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud558\ub294 \uac83\uc774 \ud544\uc694\ud558\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uacfc\ub3c4\ud55c \ubc95\uc801 \uc81c\ud55c\uc740 \ud559\uc0dd\ub4e4\uc774 \uc2a4\uc2a4\ub85c \ud559\uc5c5\uc744 \uc870\uc808\ud558\uace0 \uade0\ud615\uc744 \ub9de\ucd9c \uae30\ud68c\ub97c \ubc15\ud0c8\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ud45c\ud604\uc758 \uc790\uc720\ub97c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud45c\ud604\uc758 \uc790\uc720\uc640 \ucc3d\uc758\uc131 \ubc1c\ud604\uc774 \uc81c\ud55c\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uba3c\uc800, \ubc95\uc801 \uc81c\ud55c\uc740 \uad50\uc721\uc801\uc778 \uae30\ud68c\ub97c \uc81c\ud55c\ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801\uc778 \uc81c\ud55c\uc740 \uc624\ud788\ub824 \ubb38\uc81c\uc758 \ud574\uacb0\ucc45\uc774 \uc544\ub2cc \uc0c8\ub86d\uace0 \ubcf5\uc7a1\ud55c \ubb38\uc81c\ub97c \uc57c\uae30\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uaddc\uc81c\ub294 \uc624\ud788\ub824 \ub354 \ub9ce\uc740 \ubd88\ubc95\uc801 \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \uc870\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\ud68c\uc801 \uace0\ub9bd\uc758 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ub2e8\uc808\uc740 \ubbf8\uc131\ub144\uc790\uc758 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \ubc1c\ub2ec\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uacfc\ub3c4\ud55c \ubc95\uc801 \uc81c\ud55c\uc740 \uccad\uc18c\ub144\ub4e4\uc758 \ubb38\ud654\uc801 \ucc38\uc5ec\uc640 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uc5b5\uc555\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc774\ub7ec\ud55c \uc81c\ud55c\uc740 \ud45c\ud604\uacfc \ucc3d\uc758\uc131\uc758 \uc911\uc694\ud55c \ud50c\ub7ab\ud3fc\uc744 \ucc28\ub2e8\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uac8c\ub2e4\uac00, \ubc95\uc548\uc774 \uc2dc\ud589\ub420 \uacbd\uc6b0, \uccad\uc18c\ub144\ub4e4\uc740 \ub354 \uc548\uc804\ud55c \ud658\uacbd\uc744 \uc81c\uacf5\ubc1b\uae30\ubcf4\ub2e4\ub294 \uc0c8\ub85c\uc6b4 \uc81c\uc57d\uc73c\ub85c \uc778\ud574 \ud50c\ub7ab\ud3fc\uc744 \uc774\ud0c8\ud560 \uac00\ub2a5\uc131\uc774 \ud07d\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc758 \ucc45\uc784 \uc788\ub294 \ud589\ub3d9\uc744 \ub3c5\ub824\ud558\ub294 \ub370 \ubc95\uc548\uc774 \uc5b4\ub290 \uc815\ub3c4 \uae30\uc5ec\ud560 \uc218 \uc788\uaca0\uc9c0\ub9cc, \uc774\ub294 \uad81\uadf9\uc801\uc73c\ub85c \uc9c0\uc18d \uac00\ub2a5\ud55c \ud574\uacb0\ucc45\uc774 \ub418\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc644\uc804\ud55c \uae08\uc9c0\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \ub54c \ub9c8\uc8fc\uce60 \uc218 \uc788\ub294 \uc2e4\uc81c \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc774\ub7ec\ud55c \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\uc758 \ud45c\ud604\uc758 \uc790\uc720\uc640 \ub514\uc9c0\ud138 \uc2dc\ub300\uc758 \uc811\uadfc\uc131\uc744 \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0 \ub300\uc751\ud558\ub294 \ub2a5\ub825\uc744 \ubc1c\ub2ec\uc2dc\ud0ac \uae30\ud68c\ub97c \ub193\uce58\uac8c \ub429\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0 \ub300\ud55c \uacfc\ub3c4\ud55c \ubc95\uc801 \uc81c\ud55c\uc740 \uc815\ubcf4 \uc811\uadfc\uc758 \ubd88\ud3c9\ub4f1\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uaddc\uc81c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc758 \ud601\uc2e0\uacfc \ubc1c\uc804\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uccad\uc18c\ub144\ub4e4\uc758 \ucc3d\uc758\uc131\uacfc \uc790\uc728\uc131\uc744 \uc704\ucd95\uc2dc\ud0ac \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc804\uba74\uc801\uc73c\ub85c \uc81c\ud55c\ud558\uac70\ub098 \uae08\uc9c0\ud558\ub294 \uac83\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc790\uc728\uc801\uc778 \ud310\ub2e8\uacfc \ucc45\uc784\uac10\uc744 \uae30\ub974\ub294 \uae30\ud68c\ub97c \ubc15\ud0c8\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uccad\uc18c\ub144\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uacfc\ub3c4\ud558\uac8c \uc81c\ud55c\ud560 \uacbd\uc6b0, \uacbd\ud5d8\uacfc \uae30\uc220 \uc2b5\ub4dd\uc758 \uae30\ud68c\ub97c \ube7c\uc557\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","Digital Media Association(DiMA)\ub294 \ub2e4\uc591\ud55c \uc628\ub77c\uc778 \ud50c\ub7ab\ud3fc\uc744 \ub300\ud45c\ud558\uba70, \uc774\ub7ec\ud55c \uc81c\ud55c\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\uc758 \uad11\uace0 \uc218\uc775\uacfc \ud50c\ub7ab\ud3fc\uc758 \uc0ac\uc6a9\uc790 \uc131\uc7a5\uc5d0 \uc545\uc601\ud5a5\uc744 \ubbf8\uce60 \uac83\uc774\ub77c\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc548\uc774 \ud56d\uc0c1 \ud6a8\uacfc\uc801\uc774\ub77c\ub294 \ubcf4\uc7a5\uc740 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uccad\uc18c\ub144\uc758 \uc790\uc728\uc131\uacfc \ucc45\uc784\uac10\uc744 \ub0ae\ucd9c \uc6b0\ub824\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc774 \ubd80\uc815\uc801\uc778 \uacb0\uacfc\ub9cc\uc744 \ucd08\ub798\ud55c\ub2e4\uace0 \ub2e8\uc815\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uaddc\uc81c\uac00 \uae30\uc220 \ubc1c\uc804\uc758 \uc18d\ub3c4\ub97c \ub530\ub77c\uac00\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubc95\uc801 \uaddc\uc81c\ub294 \uae30\uc220 \ubc1c\uc804\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc73c\uba70, \uc790\uc720\ub85c\uc6b4 \ub514\uc9c0\ud138 \ud601\uc2e0\uc744 \ub9c9\uc744 \uc218\ub3c4 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0 \ud544\uc694\ud55c \uae30\uc220 \ud65c\uc6a9 \ub2a5\ub825\uc744 \uc800\ud558\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4. [\uccad\uc18c\ub144 \uc0ac\uc6a9\uc790\uc758 \uc99d\uac00\ub85c \ud61c\ud0dd\uc744 \ubcf4\ub294 \uae30\uc220 \uad00\ub828 \ube44\uc601\ub9ac \ub2e8\uccb4\uc778] Common Sense Media\ub294 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uac00 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \ud544\uc218\uc801\uc774\uba70, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc774\ub97c \ubc1c\uc804\uc2dc\ud0a4\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud55c\ub2e4\uace0 \uc124\uba85\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uba85\ud655\ud55c \uae30\uc900\uc744 \uc124\uc815\ud558\uae30 \uc5b4\ub824\uc6b0\uba70, \uccad\uc18c\ub144\uc758 \uc628\ub77c\uc778 \uc790\uc720\uc640 \uad8c\ub9ac\ub97c \uc9c0\ub098\uce58\uac8c \uce68\ud574\ud560 \uc218 \uc788\ub294 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc81c\ud55c\uc801\uc778 \uc870\uce58\ub294 \uc624\ud788\ub824 \uccad\uc18c\ub144\uc758 \uc815\ubcf4 \uaca9\ucc28\ub97c \uc2ec\ud654\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \ud45c\ud604\uc758 \uc790\uc720\uc5d0\ub3c4 \ub300\ud55c \ub3c4\uc804\uc774 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c
