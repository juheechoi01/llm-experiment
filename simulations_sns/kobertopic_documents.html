iation\"\uc740 \uc790\uc0ac \ud68c\uc6d0\uc0ac\ub4e4\uc774 \uccad\uc18c\ub144 \ubcf4\ud638\uc5d0 \uc55e\uc7a5\uc11c\uace0 \uc788\uc73c\uba70, \uc9c0\uc18d\uc801\uc73c\ub85c \uc0c8\ub85c\uc6b4 \uc548\uc804 \uae30\ub2a5\uc744 \uac1c\ubc1c\ud558\uc5ec \uc704\ud5d8\uc744 \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc774\ubbf8 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \uc704\ud55c \ub2e4\uc591\ud55c \uc548\uc804 \uae30\ub2a5\uacfc \ucf58\ud150\uce20 \ud544\ud130\ub9c1 \uc2dc\uc2a4\ud15c\uc744 \ub3c4\uc785\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uba3c\uc800, \uc628\ub77c\uc778 \ud50c\ub7ab\ud3fc\ub4e4\uc740 \uc790\uccb4\uc801\uc73c\ub85c \uc720\ud574 \ucf58\ud150\uce20\ub97c \ucc28\ub2e8\ud558\uace0 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638 \uae30\ub2a5\uc744 \uac15\ud654\ud558\ub824\ub294 \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\ub4e4\uc740 \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \uae30\uc220\uc801 \uc870\uce58\ub97c \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \uc790\uccb4\uc801\uc778 \uc870\uce58\uc640 \uae30\uc220\uc744 \ubc1c\uc804\uc2dc\ud0a4\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc790\uccb4\uc801\uc73c\ub85c \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \uc704\ud55c \uae30\uc220\uc801 \uc7a5\uce58\ub97c \uac15\ud654\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \uc9c4\ubcf4\ub41c \uc548\uc804 \uae30\ub2a5\uacfc \ub3c4\uad6c\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\uc740 \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \ub2e4\uc591\ud55c \uc548\uc804 \uc870\uce58\ub97c \uc774\ubbf8 \uc2dc\ud589\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uaddc\uc81c\ubcf4\ub2e4 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4. [\uccad\uc18c\ub144 \ucc38\uc5ec\uc640 \uad11\uace0 \ud50c\ub7ab\ud3fc \ud65c\uc131\ud654\uc5d0 \uacbd\uc81c\uc801\uc73c\ub85c \uc758\uc874\ud558\ub294 \uae30\uc5c5] \ud398\uc774\uc2a4\ubd81(Facebook)\uc740 \ucee4\ubba4\ub2c8\ud2f0 \uac00\uc774\ub4dc\ub77c\uc778\uc744 \uac15\ud654\ud558\uace0, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc548\uc804\ud558\uac8c \ud50c\ub7ab\ud3fc\uc744 \uc774\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ub2e4\uc591\ud55c \uae30\ub2a5\uc744 \ub3c4\uc785\ud588\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc774\ubbf8 \uccad\uc18c\ub144\uc758 \uc548\uc804\uacfc \uc911\ub3c5 \uc608\ubc29\uc744 \uc704\ud574 \ub2e4\uc591\ud55c \uae30\uc220\uc801 \uc870\uce58\ub97c \ub3c4\uc785\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc790\uccb4\uac00 \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud574 \uc801\uadf9\uc801\uc778 \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uae30\uc5c5\ub4e4\uc740 \uccad\uc18c\ub144 \uc0ac\uc6a9\uc790\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud55c \uc801\uadf9\uc801\uc778 \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\uc774 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \ub354\uc6b1 \uac15\ub825\ud788 \ucc45\uc784\uc9c0\ub3c4\ub85d \uc720\ub3c4\ud560 \uc218 \uc788\ub294 \ube44\ubc95\uc801 \uad8c\uace0\uc640 \ud611\ub825 \uccb4\uc81c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","Facebook\uc740 \uc8fc\uc694 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc744 \uc6b4\uc601\ud558\uba70, \uae30\uc220\uc801 \ub3c4\uad6c\uc640 \uc54c\uace0\ub9ac\uc998 \uae30\ubc18\uc758 \ud544\ud130\ub9c1 \uc2dc\uc2a4\ud15c\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc548\uc804\ud55c \uc628\ub77c\uc778 \ud658\uacbd\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc0ac\ud68c\uc801 \uc9c0\uc6d0 \uccb4\uacc4\uc640 \ud611\ub825\ud558\uc5ec \uccad\uc18c\ub144\ub4e4\uc774 \uc548\uc804\ud55c \ud658\uacbd\uc5d0\uc11c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ud558\ub294 \uac83\uc774 \ud575\uc2ec\uc785\ub2c8\ub2e4","\ubcf4\ud638\uc790\uc640\uc758 \uc18c\ud1b5\uc744 \uac15\ud654\ud558\uc5ec \ubbf8\uc131\ub144\ub4e4\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc9c0\ud0a4\uace0 \uc9c0\uc6d0\ud560 \uc218 \uc788\ub294 \uae30\ubc18\uc744 \ub9c8\ub828\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uccad\uc18c\ub144 \ubcf4\ud638 \ubc0f \uc548\uc804\ud55c \uc0ac\uc6a9 \ud658\uacbd \uc870\uc131\uc744 \uc704\ud55c \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc758 \uc790\uc728\uc801 \uad00\ub9ac\ub294 \uccad\uc18c\ub144 \ubcf4\ud638\uc5d0 \ud6a8\uc728\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\ud68c\uc801 \ucc28\uc6d0\uc758 \ucea0\ud398\uc778\uacfc \uc815\ucc45\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\uc758 \uc548\uc804\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ucd09\uc9c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ud50c\ub7ab\ud3fc \uc790\uccb4\uc758 \ucc45\uc784 \uc788\ub294 \uc6b4\uc601\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\uc758 \uc548\uc804\uc744 \ucd09\uc9c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4. [\ub300\uaddc\ubaa8 \uc0ac\uc6a9\uc790 \uae30\ubc18\uc744 \uac00\uc9c4 \uc778\uc2a4\ud0c0\uadf8\ub7a8]\uc740 \uc5f0\ub839\uc5d0 \uc801\ud569\ud55c \ucf58\ud150\uce20 \uc815\ucc45\uacfc \ud568\uaed8, \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \ub9de\ucda4\ud615 \ub3c4\uad6c \uc81c\uacf5\uc5d0 \uc911\uc810\uc744 \ub450\uace0 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ud50c\ub7ab\ud3fc\ub4e4\uc740 \uccad\uc18c\ub144\ub4e4\uc774 \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ub2e4\uc591\ud55c \ubcf4\ud638 \uc7a5\uce58\ub97c \uad6c\ucd95\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc758 \ucc45\uc784 \uac15\ud654\uc640 \ud568\uaed8 \uae30\uc220\uc801\uc778 \ubcf4\ud638 \uc7a5\uce58\ub97c \ud65c\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4. '\uad6d\uc81c \uc0ac\uc774\ubc84 \ubcf4\uc548 \ud559\ud68c'(ICSS)\ub294 \ud50c\ub7ab\ud3fc \uc790\uccb4\uc5d0\uc11c \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \uae30\uc220\uc801 \ubcf4\ud638 \uc7a5\uce58\ub97c \uac16\ucd94\uc5b4\uc57c \ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uae30\uc220\uc801 \ubcf4\ud638\uc7a5\uce58\ub294 \ubbf8\uc131\ub144\uc790\ub97c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc2dc \uc2e4\uc9c8\uc801\uc73c\ub85c \ubcf4\ud638\ud560 \uc218 \uc788\ub294 \ub3c4\uad6c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uccad\uc18c\ub144 \uc0ac\uc6a9\uc790\ub97c \uc704\ud55c \uc548\uc804 \uae30\ub2a5\uc744 \ub354\uc6b1 \uac15\ud654\ud558\ub294 \ub370 \uc8fc\ub825\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc9c0\uc18d\uc801\uc778 \ubcf4\ud638 \uae30\ub2a5 \ubc1c\uc804\uc744 \ud1b5\ud574 \uccad\uc18c\ub144 \uc548\uc804\uc744 \ub354\uc6b1 \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc774\ubbf8 \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud55c \uc790\uccb4\uc801\uc778 \uc548\uc804 \uae30\ub2a5\uc744 \uc81c\uacf5\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\uc758 \ucc45\uc784\uc744 \uac15\ud654\ud558\uc5ec \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \uc99d\uc9c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \ubd80\uc815\uc801\uc778 \ucf58\ud150\uce20\ub85c\ubd80\ud130 \uccad\uc18c\ub144\uc744 \ubcf4\ud638\ud558\uae30 \uc704\ud55c \uae30\ub2a5\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4. [\ub514\uc9c0\ud138 \ucf58\ud150\uce20\ub97c \ub2e4\ub8e8\ub294 \uae00\ub85c\ubc8c \uae30\uc5c5 \uad6c\uae00]\uc740 \uc0ac\uc6a9\uc790 \uacbd\ud5d8\uc744 \uc548\uc804\ud558\uac8c \uc720\uc9c0\ud558\uae30 \uc704\ud574 \uac15\ud654\ub41c \ucf58\ud150\uce20 \ud544\ud130\ub9c1\uacfc \uc778\uacf5\uc9c0\ub2a5 \uae30\uc220\uc744 \ud65c\uc6a9\ud574 \uccad\uc18c\ub144\uc774 \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc5d0 \ub178\ucd9c\ub418\uc9c0 \uc54a\ub3c4\ub85d \ucc28\ub2e8\ud558\ub294 \uc870\uce58\ub97c \uc2dc\ud589\ud558\uace0 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc790\uccb4\uac00 \ubbf8\uc131\ub144\uc790\ub97c \uc704\ud574 \ubcf4\ub2e4 \uac15\ub825\ud55c \uc548\uc804 \uc7a5\uce58\ub97c \ub9c8\ub828\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc9c0\uc5ed \uc0ac\ud68c \ucc28\uc6d0\uc5d0\uc11c \uccad\uc18c\ub144\uc744 \uc704\ud55c \uc628\ub77c\uc778 \ubcf4\ud638 \uc13c\ud130 \uac19\uc740 \uc9c0\uc6d0 \uc870\uc9c1\uc744 \uc124\ub9bd\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc790\uccb4\uc5d0\uc11c \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \uc815\ucc45\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4. \"TikTok\"\uc740 \uccad\uc18c\ub144 \uc0ac\uc6a9\uc790\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud574 \uc54c\uace0\ub9ac\uc998\uc744 \uac1c\uc120\ud558\uace0 \ucf58\ud150\uce20 \ud544\ud130\ub9c1 \ubc0f \uc0ac\uc6a9 \uc2dc\uac04 \uc81c\ud55c \uae30\ub2a5\uc744 \uac15\ud654\ud558\ub294 \ub4f1 \ub2e4\uc591\ud55c \uc870\uce58\ub97c \ucde8\ud558\uace0 \uc788\ub2e4\uace0 \ubc1c\ud45c\ud588\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uacfc\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \uc704\ud55c \uc2dc\uc2a4\ud15c\uc744 \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uccad\uc18c\ub144\uc758 \uc548\uc804\uc744 \uac15\ud654\ud558\ub294 \ub2e4\uc591\ud55c \ubcf4\ud638 \uc7a5\uce58\ub97c \ub3c4\uc785\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc774\ubbf8 \ubbf8\uc131\ub144\uc790 \ubcf4\ud638\ub97c \uc704\ud55c \uc5ec\ub7ec \uae30\uc220\uc801 \uc7a5\uce58\ub97c \uc81c\uacf5\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub354 \ub098\uc544\uac00, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc790\uccb4\uc5d0\uc11c\ub3c4 \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \uae30\ub2a5\ub4e4\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \uc694\uad6c\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc548\uc804\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \ud658\uacbd\uc744 \uc870\uc131\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \ubbf8\uc131\ub144\uc790\ub97c \uc704\ud55c \uac15\ub825\ud55c \ubcf4\ud638 \uae30\ub2a5\uc744 \uacc4\uc18d \uac1c\ubc1c\ud558\uace0 \uc801\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc5d0\uac8c \uc911\uc694\ud55c \uc548\uc804\ub9dd \uc81c\uacf5\uc790\uc785\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc790\uccb4\uac00 \uc774\ubbf8 \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \ub2e4\uc591\ud55c \uae30\ub2a5\uacfc \uaddc\uc81c\ub97c \ub0b4\uc7ac\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud574 \uc5ec\ub7ec \uae30\ub2a5\uc744 \uc2ec\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \uc790\uccb4\uac00 \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud55c \ub178\ub825\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uba3c\uc800, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uc704\ud55c \uc989\uac01\uc801\uc774\uace0 \uac15\ub825\ud55c \uc548\uc804 \uc870\uce58\ub97c \ucde8\ud560 \ub2a5\ub825\uc744 \uc774\ubbf8 \ubcf4\uc720\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc774\ubbf8 \ub2e4\uc591\ud55c \uc548\uc804 \uae30\ub2a5\uacfc \ub3c4\uad6c\ub97c \uc81c\uacf5\ud558\uba70, \ubd80\ubaa8\uc640 \uccad\uc18c\ub144\uc774 \uc774\ub7ec\ud55c \uae30\ub2a5\uc744 \uc801\uc808\ud788 \uc0ac\uc6a9\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uac15\ud654\ud558\uae30 \uc704\ud55c \uc790\uc728 \uaddc\uc81c\ub97c \ud655\ub300\ud574\uc57c \ud569\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"16_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","16_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"rzGdP+wvmD9oE5U\u002firWHP6tqiT\u002f5qow\u002fxHGJP0LSkD8+BJg\u002fZMCFPzydnT8d0oQ\u002f6mCRP0gKkD+bPIM\u002fPZyOP4E8kD\u002fqi4U\u002f21uWP1fbjz9keJA\u002fRruTP7M0kD8NqYc\u002fpuuLP7VNh c \ubcf4\uc644\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc774\ubc84 \ubd88\ub9c1\uacfc \uc0ac\uc0dd\ud65c \uce68\ud574 \ubb38\uc81c\ub294 \uad50\uc721\uc744 \ud1b5\ud574 \ud6a8\uacfc\uc801\uc73c\ub85c \ub300\ucc98\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uac00\uc9dc \ub274\uc2a4\uc640 \uc720\ud574\ud55c \ucf58\ud150\uce20 \ubb38\uc81c\ub294 \uc0ac\uc6a9\uc790 \uad50\uc721\uc744 \ud1b5\ud574 \ud574\uacb0 \uac00\ub2a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ud50c\ub7ab\ud3fc\uc774 \ub2e8\ub3c5\uc73c\ub85c \ubaa8\ub4e0 \ubb38\uc81c\ub97c \ud574\uacb0\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc810\uc740 \uc778\uc815\ud558\uc9c0\ub9cc, \uc0ac\uc6a9\uc790\ub4e4\uc774 \ucc45\uc784\uac10\uc744 \uac00\uc9c0\uace0 \ub514\uc9c0\ud138 \uc138\uc0c1\uc744 \ud0d0\ud5d8\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud574\uc57c \ud569\ub2c8\ub2e4. [\uc804 \uc138\uacc4\uc801\uc73c\ub85c \uc218\uc775\uc744 \ucc3d\ucd9c\ud558\ub294 \ub300\ud615 \uae30\uc220 \uae30\uc5c5\uc778] \uc720\ud29c\ube0c\ub294 \uc0ac\uc6a9\uc790\ub4e4\uc774 \uc2a4\uc2a4\ub85c \ucf58\ud150\uce20\ub97c \ud310\ub2e8\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \ud0a4\uc6b0\ub294 \uac83\uc774 \uc911\uc694\ud558\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubc0f \uc720\ud574\ud55c \ucf58\ud150\uce20\uc5d0 \ub300\ud55c \uc6b0\ub824\ub294 \uad50\uc721\uc744 \ud1b5\ud574 \ub354 \uc798 \ud574\uacb0\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\uc774\ubc84 \ub530\ub3cc\ub9bc \ubb38\uc81c\ub294 \uae30\uc220\uc801 \uac10\uc2dc\uc640 \ubd80\ubaa8\uc758 \uc801\uadf9\uc801\uc778 \ucc38\uc5ec\ub97c \ud1b5\ud574 \ub354\uc6b1 \ud6a8\uacfc\uc801\uc73c\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc640 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub294 \ub370\ub294 \ud6a8\uacfc\uc801\uc778 \uad50\uc721\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc640 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc758 \ubb38\uc81c\ub294 \ub9de\ucda4\ud615 \uc548\uc804 \uad50\uc721\uc744 \ud1b5\ud574 \ub354\uc6b1 \ud6a8\uacfc\uc801\uc73c\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \uc720\ud574 \ucf58\ud150\uce20\uc5d0 \ub300\ud55c \uc704\ud5d8\uc740 \uc801\uc808\ud55c \uad50\uc721\uacfc \uc9c0\ub3c4 \uac15\ud654\ub85c \ub354 \ud6a8\uacfc\uc801\uc73c\ub85c \uad00\ub9ac\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \ubd88\ub9c1\uacfc \uc720\ud574 \ucf58\ud150\uce20\uc758 \ubb38\uc81c\ub294 \uae30\uc220\uc801 \ub3c4\uad6c\uc640 \uad50\uc721\uc744 \ud1b5\ud574 \ucda9\ubd84\ud788 \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubd80\uc815\uc801\uc778 \uce21\uba74\uc740 \uad50\uc721\uacfc \uae30\uc220\uc744 \ud1b5\ud55c \ub300\uc751\ucc45\uc73c\ub85c \ub354 \ud6a8\uacfc\uc801\uc73c\ub85c \ud574\uacb0\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc744 \ud1b5\ud55c \uc720\ud574\ud55c \ucf58\ud150\uce20 \ub178\ucd9c \ubb38\uc81c\ub294 \uad50\uc721\uacfc \uae30\uc220\uc801 \uc870\uce58\ub97c \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\ub4e4\uc740 \uc548\uc804\ud55c \ud658\uacbd\uc744 \uc81c\uacf5\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc81c\uc57d \ub300\uc2e0 \uad50\uc721\uacfc \uae30\uc220\uc744 \ud1b5\ud574 \ubb38\uc81c\ub97c \ud574\uacb0\ud560 \uc218 \uc788\ub294 \uac00\ub2a5\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uac00 \uc9c1\uba74\ud560 \uc218 \uc788\ub294 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc774\ub098 \ubd80\uc815\uc801\uc778 \ub0b4\uc6a9\uc758 \ubb38\uc81c\ub294 \uad50\uc721\uc744 \ud1b5\ud574 \ub9ce\uc774 \uac1c\uc120\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0\uc11c \ubc1c\uc0dd\ud558\ub294 \ubb38\uc81c\ub4e4\uc740 \uad50\uc721\uacfc \uae30\uc220\uc801 \ubcf4\ud638 \uc7a5\uce58\ub85c \uc644\ud654\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20 \ub178\ucd9c\uc740 \uad50\uc721\uacfc \uac10\ub3c5\uc744 \ud1b5\ud574 \ucda9\ubd84\ud788 \ub300\ucc98\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20 \ub178\ucd9c \ubb38\uc81c\ub294 \uadfc\ubcf8\uc801\uc778 \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uad50\uc721\uc73c\ub85c \ub2e4\ub8f0 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubc0f \uc720\ud574 \ucf58\ud150\uce20 \ub178\ucd9c \ubb38\uc81c\ub294 \uad50\uc721\uacfc \uae30\uc220\uc801 \ubcf4\uc644\uc744 \ud1b5\ud574 \ud6a8\uacfc\uc801\uc73c\ub85c \uad00\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \uc815\uc2e0\uc801 \uac74\uac15 \ubb38\uc81c\ub294 \uc2ec\uac01\ud55c \uc8fc\uc81c\uc774\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc778\uc2dd \uac1c\uc120\uacfc \uad50\uc721\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20 \ub178\ucd9c \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574\uc11c\ub294 \uad50\uc721\uacfc \uc9c0\ub3c4\uac00 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc628\ub77c\uc778 \uc704\ud5d8\uc5d0 \ub300\ud55c \uad50\uc721\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20 \ub178\ucd9c \ubb38\uc81c\ub294 \uad50\uc721\uc801\uc778 \uc811\uadfc\uc744 \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20 \ub178\ucd9c \ubc0f \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubb38\uc81c\ub294 \uad50\uc721\uacfc \uc9c0\ub3c4\ub97c \ud1b5\ud574 \ub354 \uc798 \ud574\uacb0\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc0ac\uc774\ubc84\ubd88\ub9c1 \ubc0f \uae30\ud0c0 \uc704\ud5d8 \uc694\uc18c\uc5d0 \ub300\ud55c \uad50\uc721\uacfc \uc778\uc2dd\uc744 \ub192\uc774\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc758 \ubb38\uc81c\ub294 \uad50\uc721\uacfc \ubd80\ubaa8\uc758 \uad00\ub9ac\ub85c \ucda9\ubd84\ud788 \uc644\ud654\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uae30\uc220\uc801 \uc194\ub8e8\uc158\uc744 \ub3c4\uc785\ud558\uc5ec \uccad\uc18c\ub144 \uc0ac\uc6a9\uc790\uc758 \uacc4\uc815\uc744 \ud2b9\ubcc4\ud788 \uad00\ub9ac\ud558\ub294 \ubc29\ubc95\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc774\ub098 \uc720\ud574 \ucf58\ud150\uce20\uc5d0 \ub300\ud55c \ubb38\uc81c\ub294 \uad50\uc721\uacfc \uc790\uc728 \uaddc\uc81c\ub97c \ud1b5\ud574 \ub354 \ud6a8\uacfc\uc801\uc73c\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc704\ud5d8\uc744 \uc644\ud654\ud558\ub294 \ub370\ub294 \uad50\uc721\uacfc \uae30\uc220\uc774 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \uccad\uc18c\ub144 \ubcf4\ud638\ub294 \uae30\uc220 \ud601\uc2e0\uc744 \ud1b5\ud574 \uac15\ud654\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4. [\uc18c\uc15c \ubbf8\ub514\uc5b4 \ubd84\uc11d \ub3c4\uad6c\ub97c \uc81c\uacf5\ud558\ub294] \ud638\uce20\uc704\ud2b8\ub294 \uc778\uacf5\uc9c0\ub2a5\uacfc \uba38\uc2e0\ub7ec\ub2dd \uae30\uc220\uc744 \ud65c\uc6a9\ud558\uc5ec \uc720\ud574 \ucf58\ud150\uce20 \uc2dd\ubcc4\uacfc \ucc28\ub2e8\uc744 \uc790\ub3d9\ud654\ud568\uc73c\ub85c\uc368 \ubcf4\ub2e4 \uc2e0\uc18d\ud558\uace0 \ud6a8\uc728\uc801\uc778 \ubb38\uc81c \ud574\uacb0\uc774 \uac00\ub2a5\ud558\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc720\ud574 \ucf58\ud150\uce20 \uc811\uadfc\uacfc \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubb38\uc81c\ub294 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20 \ub178\ucd9c\uc5d0 \ub300\ud55c \ubb38\uc81c\ub294 \ud544\ud130\ub9c1 \uae30\uc220\uacfc \ubd80\ubaa8\uc758 \uc9c0\ub3c4 \ud558\uc5d0 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \uc720\ud574 \ucf58\ud150\uce20\uc758 \ubb38\uc81c\ub294 \uad50\uc721\uc744 \ud1b5\ud574 \ub354 \ud6a8\uacfc\uc801\uc73c\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc640 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubb38\uc81c\ub3c4 \uad50\uc721\uc744 \ud1b5\ud574 \uc608\ubc29\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc0ac\uc6a9\uc790\uc758 \uad50\uc721\uacfc \ud50c\ub7ab\ud3fc\uc758 \ucc45\uc784 \uc788\ub294 \ud589\ub3d9\uc774 \uc911\uc694\ud569\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"17_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","17_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"ZotrQEmNTkD8NHzARgFtQAguT0Ci+2FAJchsQBe0bEAIu1dAZetqQKTPakA2oWtAiP1sQP6qa0CSx21ApiVYQO8RYEAmo1FAsTloQAlPXkAQGGxARkhtQPUvbEAv4mdAv11sQDpnXUAr8GxAcxltQJtta0AaEGhAUxZfQJZGbEAozVlAiAVoQOq5a0BsS2VAb8trQLaba0Btk \uc15c \ubbf8\ub514\uc5b4 \ud65c\ub3d9\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4. [\ub514\uc9c0\ud138 \ubbf8\ub514\uc5b4 \uc0b0\uc5c5\uc758 \uc774\uc775\uc744 \ub300\ubcc0\ud558\ub294 \ud14c\ud06c\ub137]\uc740 \uc80a\uc740 \uc774\uc6a9\uc790\ub4e4\uc774 \ucc38\uc5ec\ud558\ub294 \ud65c\ubc1c\ud55c \ud50c\ub7ab\ud3fc\uc740 \ubbf8\ub798\uc758 \uae30\uc220 \ubc1c\uc804\uacfc \uacbd\uc81c\uc801 \uc131\uc7a5\uc744 \uc8fc\ub3c4\ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uccad\uc18c\ub144 \uc0ac\uc6a9\uc790\uac00 \uc911\uc694\ud55c \uc0ac\uc6a9\uc790\uce35\uc774\ub77c\ub294 \uc810\uc5d0\uc11c \uacbd\uc81c\uc801 \uc774\uc775\uc744 \uc9c1\uba74\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uccad\uc18c\ub144\ub4e4\uc758 \uc8fc\uccb4\uc801\uc778 \ucc38\uc5ec\ub97c \uc720\ub3c4\ud558\uc5ec \ub2a5\ub3d9\uc801\uc778 \ub514\uc9c0\ud138 \uc2dc\ubbfc\uc758\uc2dd\uc744 \ud0a4\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220 \ud601\uc2e0\uc744 \ud65c\uc6a9\ud558\uc5ec \ubbf8\uc131\ub144\uc790\uc758 \uac74\uac15\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ucd09\uc9c4\ud574\uc57c \ud569\ub2c8\ub2e4","\uacbd\uc81c\uc801\uc778 \uad00\uc810\uc5d0\uc11c \ubcfc \ub54c, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \uad11\uace0 \uc2dc\uc7a5\uc5d0 \ud65c\ub825\uc744 \ubd88\uc5b4\ub123\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uae30\uc220\uc801 \ub2a5\ub825\uacfc \ubbf8\ub514\uc5b4 \ubb38\ud574\ub825\uc744 \ud0a4\uc6b0\ub294 \uac83\uc740 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uae30\uc220\uc801 \uc5ed\ub7c9\uc744 \uac1c\ubc1c\ud558\uace0 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \uac15\ud654\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uae30\uc5c5\uc740 \ub514\uc9c0\ud138 \uacbd\uc81c\uc758 \uc131\uc7a5\uc5d0 \uc788\uc5b4 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc73c\uba70, \uccad\uc18c\ub144 \uc0ac\uc6a9\uc790\ub294 \uc774 \uc131\uc7a5\uc758 \uc911\uc694\ud55c \ubd80\ubd84\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc5c5\uacc4\ub294 \ud601\uc2e0\uc744 \ud1b5\ud574 \uccad\uc18c\ub144 \ubcf4\ud638\ub97c \uac15\ud654\ud560 \uc218 \uc788\ub2e4\uace0 \ubbff\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0b0\uc5c5\uc740 \uccad\uc18c\ub144 \uc0ac\uc6a9\uc790\uc758 \uac1c\uc785\uc744 \ud1b5\ud574 \uacbd\uc81c\uc801 \ud61c\ud0dd\uc744 \uc5bb\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0b0\uc5c5\uc740 \uacbd\uc81c\uc801\uc73c\ub85c \uc911\uc694\ud55c \ubd80\ubb38\uc73c\ub85c \uc790\ub9ac\uc7a1\uace0 \uc788\uc73c\uba70, \ubbf8\uc131\ub144\uc790\uc758 \ucc38\uc5ec\ub294 \uc774 \ubd80\ubb38 \ubc1c\uc804\uc5d0\ub3c4 \ud070 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \uacbd\uc81c\uc801 \uae30\ud68c\ub97c \ucc3d\ucd9c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc740 \ub514\uc9c0\ud138 \uc5ed\ub7c9\uc744 \ud0a4\uc6b0\uace0 \ud604\uc2e4 \uc138\uacc4\uc5d0\uc11c\uc758 \uacbd\uc7c1\ub825\uc744 \ub192\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ud1b5\ud574 \ub514\uc9c0\ud138 \uc5ed\ub7c9\uc744 \ud0a4\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uacbd\uc81c\ub294 \ub9ce\uc740 \uccad\uc18c\ub144\ub4e4\uc774 \ubbf8\ub798\uc758 \uc9c1\uc5c5 \uae30\ud68c\ub97c \ud0d0\uc0c9\ud560 \uc218 \uc788\ub294 \uacf5\uac04\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ub514\uc9c0\ud138 \uae30\uc220 \ub2a5\ub825 \ud5a5\uc0c1\uc5d0 \uc788\uc5b4 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uc911\uc694\uc131\uc744 \uac04\uacfc\ud574\uc11c\ub294 \uc548 \ub429\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ube60\ub974\uac8c \ubcc0\ud654\ud558\ub294 \ub514\uc9c0\ud138 \uacbd\uc81c\uc5d0 \ucc38\uc5ec\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc778\ud130\ub137 \uc0b0\uc5c5\uc758 \uc131\uc7a5\uc740 \ub514\uc9c0\ud138 \uacbd\uc81c \uc804\ubc18\uc5d0 \uac78\uccd0 \uae0d\uc815\uc801\uc778 \ud30c\uae09 \ud6a8\uacfc\ub97c \uac00\uc838\uc62c \uc218 \uc788\uc73c\uba70, \uc774\ub97c \uc704\ud574 \uccad\uc18c\ub144\uc758 \ucc38\uc5ec\ub294 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc628\ub77c\uc778 \ud658\uacbd\uc5d0\uc11c\uc758 \ubb38\uc81c\ub294 \uae30\uc220 \ubcc0\ud654\uc5d0 \uc758\ud574 \uacc4\uc18d \uc9c4\ud654\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc80a\uc740 \uc0ac\uc6a9\uc790\ub4e4\uc5d0\uac8c \uacbd\uc81c\uc801 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uccad\uc18c\ub144\uc740 \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0\uc11c\uc758 \uacbd\ud5d8\uc744 \ud1b5\ud574 \ube44\ud310\uc801\uc73c\ub85c \uc0ac\uace0\ud558\ub294 \ub2a5\ub825\uc744 \ubc1c\ub2ec\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc758 \ub514\uc9c0\ud138 \ubb38\ud574\ub825\uacfc \ucc3d\uc758\ub825 \uac1c\ubc1c\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubbf8\uc131\ub144\uc790\uac00 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uacbd\uc81c\uc801\uc778 \uae30\ud68c\ub97c \uc5bb\uc744 \uc218 \uc788\ub294 \uac00\ub2a5\uc131\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc0c8\ub85c\uc6b4 \uae30\uc220\uc744 \uc775\ud788\uace0 \ub514\uc9c0\ud138 \ubb38\ud574\ub825\uc744 \ub192\uc774\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ub514\uc9c0\ud138 \uc5ed\ub7c9 \uac1c\ubc1c\uc5d0 \ud070 \uae30\uc5ec\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","Creator Economy Council\ub294 \ucc3d\uc791\uc790\ub4e4\uc774 \uc790\uc2e0\uc758 \ucf58\ud150\uce20\ub97c \ud1b5\ud574 \uc218\uc775\uc744 \ucc3d\ucd9c\ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\uc6d0\ud558\ub294 \ub2e8\uccb4\ub85c, \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ucc38\uc5ec\uac00 \ucc3d\uc791\uc790 \uacbd\uc81c\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \ucc45\uc784\uac10 \uc788\ub294 \ub514\uc9c0\ud138 \uc2dc\ubbfc\uc73c\ub85c \uc131\uc7a5\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ud604\ub300 \uc0ac\ud68c\uc758 \uc8fc\uc694 \uae30\uc220\uc801 \ud750\ub984\uc5d0 \ub4a4\ucc98\uc9c0\uc9c0 \uc54a\ub3c4\ub85d \ub3c4\uc640\uc90d\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uacbd\uc81c\uc801\uc73c\ub85c\ub3c4 \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc0c8\ub85c\uc6b4 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc628\ub77c\uc778 \uc0c1\ud638\uc791\uc6a9\uc740 \uccad\uc18c\ub144\ub4e4\uc774 \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0\uc11c \ud544\uc694\ud55c \uae30\uc220\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uccad\uc18c\ub144\uc758 \ub514\uc9c0\ud138 \ubc0f \ubbf8\ub514\uc5b4 \ubb38\ud574\ub825\uc744 \uc99d\uc9c4\uc2dc\ud0a4\ub294 \uac83\uc774 \uc7a5\uae30\uc801\uc77 8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\ub294 \uac83\ubcf4\ub2e4, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uac00 \uadf8\ub4e4\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uac10\ub3c5\ud558\uace0 \ub300\ud654\ud558\ub294 \uac83\ub3c4 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubd80\uc815\uc801 \uc601\ud5a5\uc744 \ud574\uacb0\ud558\uae30 \uc704\ud574\uc11c\ub294 \uace0\ub9bd\ub41c \ubc95\uc801 \uaddc\uc81c\ubcf4\ub2e4 \uad50\uc721\uacfc \ubd80\ubaa8\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ubc95\uc801\uc73c\ub85c \uc81c\ud55c\ud558\ub294 \ub300\uc2e0 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uac00 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc9c0\ub3c4\ud558\uace0 \uac10\ub3c5\ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uc804\ubc18\uc801\uc778 \uaddc\uc81c\ubcf4\ub2e4\ub294 \ubd80\ubaa8\uc640 \uad50\uc721\uae30\uad00\uc758 \uc5ed\ud560\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc911\ub3c5 \ubb38\uc81c\ub294 \uc624\ud788\ub824 \ubbf8\uc131\ub144\uc790\uc640 \ubd80\ubaa8 \uac04\uc758 \uad50\uc721\uacfc \uc790\ubc1c\uc801\uc778 \uc2b5\uad00 \uac1c\uc120\uc744 \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uad50\uc721\uc744 \ud1b5\ud55c \uc790\uc81c\ub825 \ud6c8\ub828\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\ub4e4\uc740 \uc815\ubd80\uc758 \uaddc\uc81c\uc5d0 \uc758\uc874\ud558\uae30\ubcf4\ub2e4\ub294 \uc790\ub140\ub4e4\uacfc \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uac1c\ubc29\uc801\uc778 \ub300\ud654\ub97c \ud1b5\ud574 \ubb38\uc81c\ub97c \ud574\uacb0\ud574\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubc95\uc548\ubcf4\ub2e4\ub294 \uc815\ucc45\uc801 \ucc28\uc6d0\uc5d0\uc11c \uae30\uc5c5\uacfc\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\uc5d0\uac8c \uc548\uc804\ud55c \uc628\ub77c\uc778 \ud658\uacbd\uc744 \uc870\uc131\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uaddc\uc81c\uac00 \uc544\ub2cc \uad50\uc721\uc744 \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uc548\uc804\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \ubc29\ubc95\uacfc \ub370\uc774\ud130 \ud504\ub77c\uc774\ubc84\uc2dc \uc911\uc694\uc131\uc744 \uac00\ub974\uce58\ub294 \uac83\uc774 \ub354 \uc911\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\uba74 \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \uc5ed\ud560\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \uc608\ubc29\ud558\ub294 \ub370 \uc788\uc5b4 \uccad\uc18c\ub144\uc758 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \uad50\uc721\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc790\ub140\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uac10\ub3c5\uc740 \uc8fc\ub85c \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \ucc45\uc784\uc774\uba70, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uac00\uc871 \ub0b4\uc758 \ub300\ud654\uc640 \uac00\uc774\ub4dc\uac00 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc628\ub77c\uc778 \uc548\uc804 \uad50\uc721\uc758 \uac15\ud654\uac00 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ub514\uc9c0\ud138 \ud658\uacbd \uc774\ud574\ub3c4\ub97c \ub192\uc774\ub294\ub370 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubd80\ubaa8\ub098 \ubcf4\ud638\uc790\uac00 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ubcf4\ud638 \uc7a5\uce58\ub97c \ucda9\ubd84\ud788 \ud65c\uc6a9\ud558\uc9c0 \ubabb\ud558\ub294 \uacbd\uc6b0\uc5d0\ub294 \uad50\uc721\uacfc \uc778\uc2dd \uac1c\uc120\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc801\uc808\ud55c \uade0\ud615\uacfc \uaddc\uc81c\ub97c \uc704\ud574 \ud544\uc694\ud55c \uac83\uc740 \uc644\uc804\ud55c \uae08\uc9c0\uac00 \uc544\ub2c8\ub77c \ubd80\ubaa8\ub098 \ubcf4\ud638\uc790\uc758 \uc9c0\ub3c4\ud558\uc5d0 \uccad\uc18c\ub144\ub4e4\uc774 \uc548\uc804\ud558\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ub3d5\ub294 \uac83\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uccad\uc18c\ub144\uc758 \uc815\uc2e0 \uac74\uac15 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574\uc11c\ub294 \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uac00\uc871\uacfc\uc758 \uc18c\ud1b5\uacfc \uad50\uc721\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4. [\uccad\uc18c\ub144\uc758 \uc815\uc2e0 \uac74\uac15\uc5d0 \uc8fc\ubaa9\ud558\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc5f0\uad6c \uae30\uad00\uc778] Social Media Research Foundation\uc740 \uccad\uc18c\ub144\uc774 \uacaa\ub294 \ub9ce\uc740 \ubb38\uc81c\ub4e4\uc740 \uad50\uc721\uacfc \uae0d\uc815\uc801\uc778 \uac00\uc871 \uc0c1\ud638\uc791\uc6a9\uc744 \ud1b5\ud574 \uc644\ud654\ub420 \uc218 \uc788\ub2e4\uace0 \uc124\uba85\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uae08\uc9c0\ud558\ub294 \ub300\uc2e0, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc628\ub77c\uc778\uc5d0\uc11c \uc548\uc804\ud558\uac8c \ud65c\ub3d9\ud560 \uc218 \uc788\ub3c4\ub85d \uad50\uc721\ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ubc95\uc801\uc778 \uaddc\uc81c\ubcf4\ub2e4\ub294 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc774 \uccad\uc18c\ub144\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc801\uadf9\uc801\uc73c\ub85c \uc9c0\ub3c4\ud558\ub294 \ubc29\ubc95\uc774 \uc7a5\ub824\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub610\ud55c, \uc624\ud504\ub77c\uc778 \ud65c\ub3d9\ub9cc\uc73c\ub85c \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uae30\uc220\uacfc \ucc3d\uc758\ub825\uc744 \ucda9\ubd84\ud788 \uae30\ub97c \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud560 \uc218 \uc788\uc73c\ub098, \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0\uc11c\uc758 \uacbd\ud5d8\uc740 \uadf8\uc640\ub294 \ub2e4\ub978 \uc911\uc694\ud55c \uac00\uce58\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uaddc\uc81c\ubcf4\ub2e4\ub294 \uccad\uc18c\ub144\uc758 \uc790\uae30 \uad00\ub9ac \ub2a5\ub825\uc744 \ud0a4\uc6b0\ub294 \ub370 \uc9d1\uc911\ud574\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc9c1\uc811\uc801\uc778 \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uc548\uc804\ud55c \ub514\uc9c0\ud138 \ud658\uacbd\uc744 \uc81c\uacf5\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubc95\uc801\uc73c\ub85c \uc81c\ud55c\ud558\ub294 \uac83\ubcf4\ub2e4\ub294 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\ub4e4\uc774 \uc790\ub140\uc758 \uc62c\ubc14\ub978 \uc628\ub77c\uc778 \uc2b5\uad00\uc744 \ud615\uc131\ud558\ub3c4\ub85d \ub3d5\ub294 \uac83\uc774 \ub354 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc62c\ubc14\ub978 \uad50\uc721\uacfc \uc9c0\ub3c4\uac00 \uc5c6\ub2e4\uba74 \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc758 \uc704\ud5d8\uc131\uc744 \ub192\uc77c \uc218 \uc788\ub2e4\ub294 \uc6b0\ub824\uac00 \uc788\uc9c0\ub9cc, \ubbf8\uc131\ub144\uc790\ub97c \uad50\uc721\ud558\uace0 \uc62c\ubc14\ub978 \uc628\ub77c\uc778 \ud589\ub3d9\uc744 \uac00\ub974\uce58\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0\uc11c \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubc1b\uc744 \uc218 \uc788\ub2e4\ub294 \uc6b0\ub824\ub294 \ud0c0\ub2f9\ud558\uc9c0\ub9cc, \ubc95\uc801\uc778 \uc81c\ud55c\uc774 \uc544\ub2cc \uad50\uc721 \uac15\ud654\uac00 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc801\uc778 \uc81c\ud55c\uc774 \uc544\ub2cc \ubd80\ubaa8\uc640 \uad50\uc0ac\uc758 \uc9c0\ub3c4\uc640 \uad50\uc721\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc608\ubc29\uc801 \ucc28\uc6d0\uc5d0\uc11c\uc758 \uac1c\uc785\uc740 \uc9c0\ub098\uce5c \uaddc\uc81c\ubcf4\ub2e4 \uccad\uc18c\ub144\uc758 \ub514\uc9c0\ud138 \ubb38\ud654 \ucc38\uc5ec \uae30\ud68c\ub97c \ub113\ud788\ub294 \ubc29\ud5a5\uc73c\ub85c \uc9c4\ud589\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubaa8\ub4e0 \ubd80\ubaa8\uac00 \uc644\ubcbd\ud558\uac8c \uc790\ub140\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud65c\ub3d9\uc744 \uac10\ub3c5\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc810\uc744 \uc778\uc815\ud558\uba74\uc11c\ub3c4, \uc0ac\ud68c\uc801 \uc9c0\uc6d0 \uad6c\uc870\ub97c \ud1b5\ud574 \uc774\ub97c \ubcf4\uc644\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\ub294 \ub300\uc2e0, \ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \uc628\ub77c\uc778 \uc548\uc804 \uad50\uc721\uc744 \uc81c\uacf5\ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ubd80\uc815\uc801 \uce21\uba74\uc744 \uad00\ub9ac\ud558\ub294 \uac83\uc740 \ubc95\uc801\uc778 \uc81c\uc57d\ubcf4\ub2e4\ub294 \uac00\uc871\uacfc \uad50\uc721 \uae30\uad00\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c \ub300\uc2e0 \uacf5\uacf5 \ucea0\ud398\uc778\uacfc \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \ubbf8\uc131\ub144\uc790\uc640 \ubd80\ubaa8\uc5d0\uac8c \uc18c\uc15c \ubbf8\ub514\uc5b4\uc640 \uad00\ub828\ub41c \uad50\uc721\uacfc \uc815\ubcf4\ub97c \uc81c\uacf5\ud558\ub294 \uac83\uc774 \ubc14\ub78c\uc9c1\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubbf8\uc131\ub144\uc790\ub97c \ubcf EAVJKxApDqoQA=="},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc758 \ud544\uc218\uc801\uc778 \ubd80\ubd84\uc744 \ucc28\uc9c0\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc640 \uc815\ubcf4 \ud0d0\uc0c9 \ub2a5\ub825\uc744 \ud0a4\uc6b0\ub294 \ub370 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud55c \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \ubc0f \ucc45\uc784\uac10 \uc788\ub294 \uc0ac\uc6a9\uc758 \uc911\uc694\uc131\uc744 \uac04\uacfc\ud574\uc11c\ub294 \uc548 \ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub113\ud788\uace0 \ucc45\uc784 \uc788\ub294 \uc0ac\uc6a9\uc744 \ucd09\uc9c4\ud558\uae30 \uc704\ud55c \uc9c0\uc5ed\uc0ac\ud68c\uc640 \ud611\ub825 \ud504\ub85c\uadf8\ub7a8\uc774 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \ud544\uc694\ud55c \ub514\uc9c0\ud138 \uc5ed\ub7c9\uc744 \uae30\ub974\ub294\ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ub514\uc9c0\ud138 \ud658\uacbd\uc5d0\uc11c\uc758 \uac74\uac15\ud55c \ucc38\uc5ec\ub97c \ucd09\uc9c4\ud560 \uc218 \uc788\ub294 \ub3c4\uad6c\ub85c \uc791\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \ud5a5\uc0c1\uc744 \ub3d5\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uacbd\uc81c\uc801\uc73c\ub85c \uc911\uc694\ud55c \uad11\uace0 \ud50c\ub7ab\ud3fc\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0c8\ub85c\uc6b4 \uacbd\uc81c\uc801 \uae30\ud68c\ub97c \ucc3d\ucd9c\ud558\ub294 \uc911\uc694\ud55c \ud50c\ub7 4\uc6a9\uc740 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\ub97c \ud0a4\uc6b0\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \ub514\uc9c0\ud138 \uacbd\uc81c \ucc38\uc5ec\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0 \ud544\uc218\uc801\uc778 \uae30\uc220\uc801 \uc5ed\ub7c9\uc744 \uac15\ud654\ud558\ub294 \ub370 \ub3c4\uc6c0\uc744 \uc90d\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \uc0ac\uc6a9\ud568\uc73c\ub85c\uc368 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc640 \ube44\ud310\uc801 \uc0ac\uace0 \ub2a5\ub825\uc744 \ud0a4\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \ubc1c\uc804\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc2e4\uc81c \ub300\uba74 \uad00\uacc4\uc640 \ub514\uc9c0\ud138 \uc0c1\ud638\uc791\uc6a9\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ucc45\uc784\uac10 \uc788\ub294 \uc0ac\uc6a9\uc740 \ub514\uc9c0\ud138 \uc2dc\ub300\uc758 \ud544\uc218 \uc5ed\ub7c9\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uacbd\uc81c\uc801\uc778 \uad00\uc810\uc5d0\uc11c\ub3c4 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubcf4\ud638\uc801\uc778 \ub514\uc9c0\ud138 \uad50\uc721\uacfc \uc778\uc2dd\uc744 \ud568\uaed8 \uc81c\uace0\uc2dc\ud0ac \uc218 \uc788\ub294 \ub3c4\uad6c\ub85c \ud65c\uc6a9\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"20_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","20_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4", 44 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubaa8\ub4e0 \uac00\uc815\uc5d0\uc11c \uad50\uc721\uc758 \uc77c\uad00\uc131\uc744 \ubcf4\uc7a5\ud558\uc9c0 \ubabb\ud558\ub294 \ubb38\uc81c\ub294 \ud559\uad50\uc640 \uc0ac\ud68c\uc758 \uc9c0\uc6d0 \ud655\ub300\ub97c \ud1b5\ud574 \ubcf4\uc644\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubaa8\ub4e0 \uccad\uc18c\ub144\uc5d0\uac8c \uc989\uac01\uc801\uc778 \ubcc0\ud654\ub97c \uc81c\uacf5\ud55c\ub2e4\ub294 \uae30\ub300\ub294 \ube44\ud604\uc2e4\uc801\uc77c \uc218 \uc788\uc73c\uba70, \uad50\uc721\uacfc \ubd80\ubaa8\uc758 \uc5ed\ud560\uc774 \uc7a5\uae30\uc801\uc73c\ub85c \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uad50\uc721\uc774 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc744 \uc218 \uc788\ub2e4\ub294 \uc6b0\ub824\ub294 \uc788\uc9c0\ub9cc, \uc9c0\uc5ed \uc0ac\ud68c\uc640 \ud559\uad50\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \ubcf4\uc644\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubc95\uc548 \ub3c4\uc785\uc774 \uccb4\uacc4\uc801\uc774\uace0 \ud1b5\ud569\uc801\uc778 \uad50\uc721\uacfc \uc548\ub0b4\ub97c \uc81c\uacf5\ud560 \uac83\uc774\ub77c\ub294 \uae30\ub300\ub294 \uc788\uc744 \uc218 \uc788\uc9c0\ub9cc, \uc774\ub294 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \ucc45\uc784\uac10\uc744 \uc57d\ud654\uc2dc\ud0ac \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uacfc\ub3c4\uae30\uc801\uc778 \ubcf4\ud638 \uc7a5\uce58\ub85c\uc11c \ubc95\uc548\uc774 \uc544\ub2cc, \ubd80\ubaa8\uc640\uc758 \ud611\ub825\uc744 \uac15\ud654\ud558\ub294 \uc815\ucc45\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uac00 \ubd80\uc871\ud55c \uc9c0\uce68\uc744 \uc81c\uacf5\ud558\ub294 \ub370 \uc5b4\ub824\uc6c0\uc774 \uc788\ub2e4\ub294 \uc810\uc740 \uc815\ubd80\uc640 \uc9c0\uc5ed\uc0ac\ud68c \ucc28\uc6d0\uc5d0\uc11c\uc758 \uc9c0\uc6d0 \ud504\ub85c\uadf8\ub7a8\uc73c\ub85c \ubcf4\uc644\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc815\ubd80\uc758 \uaddc\uc81c\ubcf4\ub2e4\ub294 \ubd80\ubaa8\uc640 \uac1c\uc778\uc758 \uc120\ud0dd\uad8c\uc744 \uac15\uc870\ud558\ub294 \uac83\uc774 \ub354 \uc801\uc808\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uac00\uc871\uacfc \ud559\uad50\uc758 \uc9c0\uc6d0\uc774 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc744 \uc218 \uc788\ub2e4\ub294 \uc6b0\ub824\ub294 \uc774\ud574\ud558\uc9c0\ub9cc, \ubc95\ub960\uc801 \uc81c\ud55c \ub300\uc2e0 \uc9c0\uc5ed \uc0ac\ud68c\uc758 \uc9c0\uc6d0\uacfc \ubbfc\uac04\ub2e8\uccb4\uc758 \ud504\ub85c\uadf8\ub7a8\uc744 \uac15\ud654\ud558\ub294 \uac83\uc774 \ub354 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc0ac\uac00 \ubaa8\ub4e0 \uc0c1\ud669\uc744 \ud1b5\uc81c\ud560 \uc218 \uc5c6\ub294 \ud604\uc2e4\uc744 \uac10\uc548\ud558\ub354\ub77c\ub3c4, \ubc95\uc801\uc778 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uc0ac\ud68c \uc804\ubc18\uc758 \uc778\uc2dd\uc744 \ub192\uc774\uace0 \uacf5\ub3d9\uccb4\uc758 \ub178\ub825\uc744 \uac15\ud654\ud558\ub294 \ubc29\uc2dd\uc774 \ubcf4\ub2e4 \uc9c0\uc18d \uac00\ub2a5\ud55c \ud574\uacb0\ucc45\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \ubd80\ubaa8\ub97c \uc704\ud55c \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uacfc \uc9c0\uc6d0 \uccb4\uacc4\ub97c \uac15\ud654\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ubaa8\ub4e0 \uac00\uc815\uc5d0\uc11c \uae30\uc220\uc801 \uc7a5\ube44\ub97c \uc27d\uac8c \ud65c\uc6a9\ud558\uc9c0 \ubabb\ud560 \uacbd\uc6b0\uc5d0\ub3c4, \ucee4\ubba4\ub2c8\ud2f0 \uae30\ubc18\uc758 \uad50\uc721\uacfc \uc790\uc6d0 \uc9c0\uc6d0\uc744 \ud1b5\ud574 \ubcf4\ud638\uac00 \uac00\ub2a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubaa8\ub4e0 \uac00\uc815\uc774 \ub3d9\uc77c\ud55c \uad50\uc721\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud560 \uc218 \uc5c6\ub2e4\uba74, \ubc95\uc801 \uc81c\ud55c \ub300\uc2e0 \ucee4\ubba4\ub2c8\ud2f0 \uc911\uc2ec\uc758 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc774 \ud544\uc694\ud55c \ud574\ubc95\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ubaa8\ub4e0 \ubd80\ubaa8\uac00 \ub3d9\uc77c\ud55c \uc218\uc900\uc758 \uad00\uc2ec\uacfc \uc9c0\ub3c4\ub97c \uc81c\uacf5\ud560 \uc218\ub294 \uc5c6\uc9c0\ub9cc, \uc9c0\uc5ed\uc0ac\ud68c\uc640 \ud559\uad50\uac00 \uc774\ub7f0 \ucc28\uc774\ub97c \ubcf4\uc644\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uac01 \uac00\uc815\uc774 \ucda9\ubd84\ud55c \uad50\uc721\uc744 \uc81c\uacf5\ud560 \uc218 \uc5c6\ub294 \uc0c1\ud669\uc5d0\uc11c\ub3c4, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \uacf5\ub3d9\uccb4\uc758 \uc9c0\uc6d0\uacfc \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \ub3c4\uc6c0\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubaa8\ub4e0 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uac00 \ucda9\ubd84\ud55c \uad50\uc721\uc744 \uc81c\uacf5\ud560 \uc218 \uc5c6\ub294 \uacbd\uc6b0\uc5d0\ub3c4, \uc785\ubc95\uc73c\ub85c \ud574\uacb0\ud558\uae30\ubcf4\ub2e4\ub294 \uacf5\ub3d9\uccb4\uc801\uc778 \uc9c0\uc6d0\uccb4\uacc4\ub97c \uac15\ud654\ud558\ub294 \uac83\uc774 \ubc14\ub78c\uc9c1\ud569\ub2c8\ub2e4","\ubaa8\ub4e0 \uac00\uc815\uc774 \ub3d9\uc77c\ud55c \uc218\uc900\uc758 \uad50\uc721\uc744 \uc81c\uacf5\ud558\uae30 \uc5b4\ub824\uc6b4 \uac83\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc, \uc774\ub7ec\ud55c \uaca9\ucc28\ub97c \ud574\uc18c\ud558\uae30 \uc704\ud574 \ud559\uad50\uc640 \uc9c0\uc5ed\uc0ac\ud68c\uac00 \uc801\uadf9\uc801\uc73c\ub85c \ub098\uc124 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ubaa8\ub4e0 \uac00\uc815\uc774\ub098 \ud559\uad50\uac00 \ucda9\ubd84\ud55c \uad50\uc721\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \uc5ec\uac74\uc744 \uac16\ucd94\uace0 \uc788\uc9c0 \uc54a\uc744 \uc218 \uc788\ub2e4\ub294 \ubb38\uc81c\uc810\uc740 \uc9c0\uc5ed\uc0ac\ud68c\uc758 \uc801\uadf9\uc801\uc778 \ucc38\uc5ec\ub97c \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc8fc\uc694 \ubb38\uc81c\ub294 \ubd80\ubaa8\uc640 \ud559\uad50\uac00 \uc801\uc808\ud55c \uad50\uc721\uc744 \uc81c\uacf5\ud560 \uc5ec\uac74\uc744 \uac16\ucd94\uc9c0 \ubabb\ud558\ub294 \uac83\uc774\uc9c0\ub9cc, \uadfc\ubcf8\uc801\uc778 \ud574\uacb0\ucc45\uc740 \uad50\uc721 \uc2dc\uc2a4\ud15c\uc744 \uac1c\uc120\ud558\ub294 \uac83\uc785\ub2c8\ub2e4","\uac00\uc815\uacfc \ud559\uad50\uc5d0\uc11c \ucda9\ubd84\ud55c \uc9c0\uce68\uacfc \uad50\uc721\uc744 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud558\ub294 \uacbd\uc6b0\uac00 \uc788\uc744 \uc218 \uc788\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ubb38\uc81c\ub294 \uc815\ucc45\uc801 \ucc28\uc6d0\uc5d0\uc11c \uad50\uc721 \uc2dc\uc2a4\ud15c \uac1c\uc120\uc744 \ud1b5\ud574 \ud574\uacb0\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \ubd80\ubaa8\uc5d0\uac8c\uc11c \uc790\ub140 \ubcf4\ud638\uc758 \ucc45\uc784\uc744 \ube7c\uc557\uae30\ubcf4\ub2e4\ub294 \uc9c0\uc6d0\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \ub098\uc544\uac00\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ubaa8\ub4e0 \uac00\uc815\uc5d0\uc11c \ubd80\ubaa8\uc640 \uccad\uc18c\ub144 \uc0ac\uc774\uc758 \ud611\ub825\uc774 \ud604\uc2e4\uc801\uc774\uc9c0 \uc54a\uc744 \uc218 \uc788\uc74c\uc744 \uc778\uc815\ud558\ub354\ub77c\ub3c4, \ucee4\ubba4\ub2c8\ud2f0 \uae30\ubc18\uc758 \uc9c0\uc6d0\uacfc \ud611\ub825\uc740 \ubc95\uc801 \uc81c\uc7ac \uc5c6\uc774\ub3c4 \uac00\uc815 \uad50\uc721\uc744 \ubcf4\uc644\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc81c\ud55c \uc870\uce58\ubcf4\ub2e4\ub294 \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\ub97c \uc704\ud55c \uc9c0\uc6d0 \uccb4\uacc4 \uac15\ud654\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc815\ubd80 \ucc28\uc6d0\uc758 \uaddc\uc81c\ubcf4\ub2e4\ub294 \uac00\uc815\uacfc \ud559\uad50\uc5d0\uc11c\uc758 \uc801\uadf9\uc801\uc778 \uc9c0\ub3c4\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc721 \uae30\uad00\uc758 \uc900\ube44 \ubd80\uc871\uc740 \uc0ac\ud68c\uc801 \ud611\ub825\uacfc \uc9c0\uc6d0\uc744 \ud1b5\ud574 \ubcf4\uc644\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"21_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","" \ud150\uce20 \ub178\ucd9c\uc740 \ub9e4\uc6b0 \uc911\uc694\ud55c \ubb38\uc81c\uc785\ub2c8\ub2e4","\uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20 \ub178\ucd9c \ubb38\uc81c\ub294 \ubd80\uc815\ud560 \uc218 \uc5c6\ub294 \ud604\uc2e4\uc774\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ubb38\uc81c\uc5d0 \ub300\ud55c \ub300\uc751\ucc45\uc740 \uc774\ubbf8 \ub9ce\uc740 \uae30\uc5c5\ub4e4\uc5d0 \uc758\ud574 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \uac19\uc740 \ubd80\uc815\uc801\uc778 \uc694\uc18c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc790\uccb4\ubcf4\ub2e4 \uadf8 \uc0ac\uc6a9 \ubc29\uc2dd\uc5d0 \ubb38\uc81c\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0c1\uc758 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubb38\uc81c\ub294 \ud50c\ub7ab\ud3fc\uc758 \ucc45\uc784 \uc788\ub294 \uc815\ucc45\uacfc \uaddc\uc81c\ub85c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4. [\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc \ud2b8\uc704\ud130]\ub294 \uc774\uc6a9\uc790\ub4e4\uc774 \ubcf8\uc778\uc5d0\uac8c \uc720\ud574\ud558\uac70\ub098 \uad34\ub86d\ud798\uc744 \uc8fc\ub294 \ucf58\ud150\uce20\ub098 \uc0ac\uc6a9\uc790\uc5d0 \ub300\ud574 \uc2e0\uace0\ud560 \uc218 \uc788\ub294 \uae30\ub2a5\uc744 \uac15\ud654\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \ubb38\uc81c\ub97c \uc870\uc18d\ud788 \ud574\uacb0\ud558\uae30 \uc704\ud55c \uc804\ub2f4 \ud300\uc744 \uc6b4\uc601\ud558\uace0 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc774\ub098 \uac1c\uc778 \uc815\ubcf4 \uc720\ucd9c \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30\ubcf4\ub2e4 \ub354 \uc740\ubc00\ud55c \ubc29\uc2dd\uc73c\ub85c \uc9c4\ud589\ub418\ub3c4\ub85d \ud560 \uac00\ub2a5\uc131\uc774 \ud07d\ub2c8\ub2e4","\uc6b0\uc120, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \ubd80\uc791\uc6a9\uc73c\ub85c \uc9c0\uc801\ub418\ub294 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uc774\ub098 \ubd88\uac74\uc804\ud55c \ucf58\ud150\uce20 \ub178\ucd9c \ubb38\uc81c\ub294 \ud50c\ub7ab\ud3fc \uc790\uccb4\uc758 \uac15\ud654\ub41c \ubcf4\uc548 \uc870\uce58\uc640 \uc0ac\uc6a9\uc790 \ubcf4\ud638 \uc815\ucc45\uc744 \ud1b5\ud574\uc11c\ub3c4 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc628\ub77c\uc778 \uad34\ub86d\ud798\uacfc \uc815\ubcf4 \uacfc\ub2e4 \ub178\ucd9c \ubb38\uc81c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc790\uccb4\ub9cc\uc758 \ubb38\uc81c\uac00 \uc544\ub2d9\ub2c8\ub2e4","\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\ub4e4\uc774 \uc644\ubcbd\ud55c \ud574\uacb0\ucc45\uc774 \ub420 \uc218 \uc5c6\ub2e4\ub294 \uc810\uc744 \uc778\uc815\ud558\uba74\uc11c\ub3c4, \uadf8\ub4e4\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uae30\uc220\uc744 \ubc1c\uc804\uc2dc\ud0a4\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc911\ub3c5\uc774\ub098 \uc0ac\uc774\ubc84 \ubd88\ub9c1 \ub4f1\uc758 \ubb38\uc81c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc790\uccb4\ubcf4\ub2e4\ub294 \uadf8 \uc0ac\uc6a9 \ubc29\ubc95\uc5d0 \uae30\uc778\ud558\ub294 \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud50c\ub7ab\ud3fc\uc758 \uae30\uc220\uc801 \uc870\uce58\uac00 \uc5ec\uc804\ud788 \ud6a8\uacfc\uc801\uc774\uc9c0 \uc54a\ub2e4\ub294 \uc6b0\ub824\uc5d0 \ub300\ud574 Twitter\ub294 \uc9c0\uc18d\uc801\uc778 \uc54c\uace0\ub9ac\uc998 \uac1c\uc120\uacfc \uc778\uacf5\uc9c0\ub2a5\uc744 \ud1b5\ud574 \uc720\ud574 \ucf58\ud150\uce20 \ud0d0\uc9c0\ub97c \uac15\ud654\ud558\ub294 \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \uac19\uc740 \ubb38\uc81c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uacfc\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uacfc \uc218\uba74 \ubd80\uc871 \ub610\ub2
