b354\ub77c\ub3c4, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \ub9cc\ud55c \uc644\uc804\ud55c \ub300\uc548\uc774 \uc5c6\ub294 \uc0c1\ud669\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uaddc\uc81c \ud558\uc5d0 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0\ub294 \uc0c1\ub2f9\ud55c \uc2dc\uac04\uacfc \ube44\uc6a9\uc774 \uc18c\uc694\ub418\uae30 \ub54c\ubb38\uc5d0, \uadf8\ub3d9\uc548 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubd88\uac00\ud53c\ud55c \ubd80\ubd84\uc744 \uacc4\uc18d\ud574\uc11c \ucc44\uc6cc\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc81c\uc57d\uc0ac\ub4e4\uc740 \uc724\ub9ac\uc801\uc778 \ubc29\ubc95\uc744 \uc801\uadf9\uc801\uc73c\ub85c \ud0d0\uc0c9\ud558\uba70 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\ucda9\ud558\uac70\ub098 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc744 \uc9c0\uc18d\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc778\uac04\uacfc \ub3d9\ubb3c \ubaa8\ub450\uc758 \ubcf5\uc9c0\ub97c \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc740 \uc2dc\uac04\uc774 \ud544\uc694\ud558\ubbc0\ub85c \ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \ub370\uc774\ud130\ub97c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uacb0\uad6d \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\uae30 \uc704\ud55c \uc911\uc694\ud55c \uc218\ub2e8 \uc911 \ud558\ub098\ub85c \ub0a8\uc544\uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uad6d\uac00\uc801 \ubc0f \uad6d\uc81c\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc0ac\uc6a9\uc744 \uc904\uc774\uace0 \ub300\uccb4 \ubc29\ubc95\uc744 \uc801\uadf9\uc801\uc73c\ub85c \ud65c\uc6a9\ud558\ub3c4\ub85d \uc7a5\ub824\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85 \ubcf4\ud638\ub77c\ub294 \ub354 \ud070 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \uc9c0\ub294 \uacfc\uc815\uc758 \uc77c\ubd80\ub85c \uac04\uc8fc\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559 \uae30\uc220\uc758 \ubc1c\uc804\uc774 \ube44\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc815\ub2f9\uc131\uc744 \ub192\uc77c \uac00\ub2a5\uc131\uc774 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub354 \ud655\uc2e4\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uacb0\uad6d, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95\uc744 \ucc3e\uc73c\ub824\ub294 \ub178\ub825\uc740 \uc9c0\uc18d\ub418\uaca0\uc9c0\ub9cc, \ud604\uc7ac \ub2e8\uacc4\uc5d0\uc11c\ub294 \uc804\uc801 \ub300\uccb4 \ubc29\ubc95\uc73c\ub85c \uc790\ub9ac\uc7a1\ud788\uae30\uc5d0\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc5ec\ub7ec \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \ucda9\uc871\ud560 \uc218 \uc5c6\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ud658\uacbd\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub192\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc801\uc6a9\ud558\uc5ec \uc9c4\ud589\ub418\uba70, \ubd88\ud544\uc694\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc774 \uacc4\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc0dd\uba85\uacfc\ud559 \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc778 \uc694\uc18c\uc774\uba70, \uc2e0\uc57d \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\uad81\uadf9\uc801\uc73c\ub85c, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubd88\uac00\ud53c\ud558\uac8c \ud544\uc694\ud55c \uacbd\uc6b0\uac00 \ub9ce\uc73c\uba70, \uc778\ub958\uc758 \uac74\uac15 \uac1c\uc120\uacfc \uc0dd\uba85 \uc5f0\uc7a5\uc744 \uc704\ud574 \ud544\uc218\uc801\uc778 \uc218\ub2e8\uc73c\ub85c \uc791\uc6a9\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc815\ub2f9\uc131\uc740 \ucd5c\uc885 \ubaa9\ud45c\uc778 \uc778\uac04 \uc0dd\uba85 \ubcf4\ud638\uc5d0 \uc788\uc2b5\ub2c8\ub2e4","\uadf8\ub807\uc9c0\ub9cc, \ub354 \ub098\uc740 \ub300\uc548 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc9c0\uc9c0\ud558\ub294 \uc785\uc7a5\uc5d0\uc11c\ub3c4 \uc911\uc694\ud55c \uacfc\uc81c\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ube44\ub3d9\ubb3c\uc801 \ubc29\ubc95\uc744 \ubc1c\uc804\uc2dc\ud0a4\ub294 \uac83\uc740 \uc911\uc694\ud558\ub098, \ud604\uc7ac\ub85c\uc11c\ub294 \uc774\ub4e4\uc774 \ubaa8\ub4e0 \uc5f0\uad6c\uc5d0 \uc801\uc6a9\ud560 \uc218 \uc788\ub294 \ub2e8\uacc4\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud3b8\ub9ac\ud568\uc5d0\uc11c \uc720\uc9c0\ub418\ub294 \uac83\uc774 \uc544\ub2c8\ub77c, \uaddc\uc81c\uc640 \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \ucca0\uc800\ud788 \uad00\ub9ac\ub418\uace0 \uc788\uc744 \ubfd0\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574\uc11c\ub294 \uc778\uac04\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud558\uba74\uc11c \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc774\ub8f0 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \ubc29\ubc95\uc774 \ubd80\uc871\ud55c \uac83\uc740 \uc0ac\uc2e4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \ubd80\uc815\ud558\ub294 \uc758\uacac\uc774 \uc788\ub354\ub77c\ub3c4, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\ub2ec\ud558\uc9c0 \uc54a\uc558\ub2e4\ub294 \uc810\uc744 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ub354 \ub09 bc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370\uc5d0 \uc788\uc5b4\uc11c \uc911\uc694\ud55c \uc131\uacfc\ub97c \uac70\ub450\uc5c8\uc2b5\ub2c8\ub2e4","\ub354\ubd88\uc5b4, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uc9c8\ud658\uc758 \uba54\ucee4\ub2c8\uc998\uc744 \ubc1c\uacac\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uadf8\uac04 \ub180\ub77c\uc6b4 \uc758\ud559\uc801 \ubc1c\uc804\uc744 \uc774\ub04c\uc5b4\ub0c8\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc758\ud574 \uc5bb\uc5b4\uc9c4 \uc9c0\uc2dd\uc740 \ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370\uc5d0\ub3c4 \uc911\uc694\ud55c \uae30\ucd08 \uc790\ub8cc\uac00 \ub429\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uae30\ucd08\uc801\uc778 \uc0dd\ubb3c\ud559\uc801 \uae30\uc804\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc778 \ub3c4\uad6c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \ub9e4\uc6b0 \uc720\uc0ac\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \ubcf4\uc77c \uc218 \uc788\ub294 \uc911\uc694\ud55c \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uac8c\ub2e4\uac00, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uac8c \ub418\ub294 \uc0dd\ub9ac\uc801 \ubc18\uc751\uacfc \uce58\ub8cc \ud6a8\uacfc\uc5d0 \ub300\ud55c \uc815\ud655\ud55c \ub370\uc774\ud130\ub294 \uc9c8\ubcd1 \uce58\ub8cc\uc758 \ud544\uc218\uc801\uc778 \ubd80\ubd84\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \ud070 \uae30\uc5ec\ub97c \ud574\uc654\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\ub300 \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \uc788\uc5b4\uc11c \uc989\uac01\uc801\uc778 \ud6a8\ub2a5\uacfc \uc548\uc815\uc131\uc744 \ud3c9\uac00\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\ub85c \uc790\ub9ac \uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc744 \uc774\uc6a9\ud55c \uc804\uc784\uc0c1 \ubc0f \uc784\uc0c1 \uc804 \uc5f0\uad6c\ub97c \uc804\ubb38\uc73c\ub85c \ud558\ub294 Envigo\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud2b9\uc815 \uc9c8\ud658\uc5d0 \ub300\ud55c \uce58\ub8cc\ubc95\uacfc \uc57d\ubb3c\uc758 \uc791\uc6a9 \uba54\ucee4\ub2c8\uc998\uc744 \uc2ec\ub3c4 \uc788\uac8c \uc5f0\uad6c\ud560 \uc218 \uc788\ub294 \ub3c5\ubcf4\uc801\uc778 \ubc29\ubc95\uc774\ub77c\uace0 \uc124\uba85\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc5ed\uc0ac\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95\uc758 \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud574 \uc654\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \uc758\ub8cc \ubc1c\uc804\uc758 \ud575\uc2ec \uae30\ub465\uc73c\ub85c \uc791\uc6a9\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0\uc11c \uc0dd\uccb4 \ub0b4\uc758 \uc0c1\ud638\uc791\uc6a9\uc744 \ub354 \uba85\ud655\ud558\uac8c \uc774\ud574\ud560 \uc218 \uc788\uac8c \ud574\uc90d\ub2c8\ub2e4","\uc778\uac04\uacfc \ub3d9\ubb3c \ubaa8\ub450\uc5d0\uac8c \uc720\uc775\ud55c \uc5f0\uad6c \uacb0\uacfc\ub97c \ub0b4\uae30 \uc704\ud574\uc11c\ub294 \ub2e8\uacc4\uc801 \uc811\uadfc\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\ub300 \uc758\ud559\uc5d0\uc11c \uc9c8\ubcd1\uc744 \uc774\ud574\ud558\uace0 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \uc788\uc5b4 \uc5c6\uc5b4\uc11c\ub294 \uc548 \ub420 \uc5ed\ud560\uc744 \ud574\uc654\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95 \uc5f0\uad6c\uc758 \ud61c\ud0dd\uc73c\ub85c \uc791\uc6a9\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \ubaa8\ub378\uc740 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\uc131\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc788\uc5b4 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc778\uac04 \uc0dd\ub9ac\uc640 \uac00\uc7a5 \uc720\uc0ac\ud55c \ubaa8\ub378\uc744 \uc81c\uacf5\ud558\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uac00 \uce58\uba85\uc801\uc778 \uc9c8\ubcd1\uc744 \uc774\ud574\ud558\uace0 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud574 \ub098\uac00\ub294 \uc911\uc694\ud55c \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85-threatening \uc9c8\ubcd1\uacfc \uc2f8\uc6b0\ub294 \uc778\ub958\uc758 \uc911\uc694\ud55c \uc218\ub2e8 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uc758\uc57d\ud488\uc758 \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ud544\uc218 \ubd88\uac00\uacb0\ud55c \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\ub294 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uc2ec\uac01\ud558\uac8c \uc704\ud611\ud560 \uc218 \uc788\ub294 \uc9c8\ubcd1\uc744 \uc911\uc810\uc801\uc73c\ub85c \ub2e4\ub8e8\uba70, \uc5ec\uae30\uc5d0\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uacfc\ud559\uc801 \ubc1c\uacac\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1 \uba54\ucee4\ub2c8\uc998 \uc774\ud574\uc5d0 \ud544\uc694\ud55c \ud544\uc218 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uc9c8\ubcd1\uc758 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc774\uba70, \uc774\ub294 \ud2b9\ud788 \ucd08\ucc3d\uae30 \uc5f0\uad6c \ub2e8\uacc4\uc5d0\uc11c \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uae30\ucd08 \uacfc\ud559\uc758 \uc774\ud574\ub97c \uc2ec\ud654\uc2dc\ud0a4\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\uac70 \uc218 \ub9ce\uc740 \uc758\ud559\uc801 \ubc1c\uacac\uc758 \ud575\uc2ec\uc801 \uc5ed\ud560\uc744 \ud574 \uc654\uc2b5\ub2c8\ub2e4","\uc2e0\uc57d \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud558\ub294 Envigo\ub294 \ub300\uccb4 \uae30\uc220\uc774 \ub298\uc5b4\ub0a8\uc5d0 \ub530\ub77c \uadf8 \uc5ed\ud560\uc774 \uc810\uc9c4\uc801\uc73c\ub85c \ubcf4\uc644\ub420 \uc218 \uc788\ub2e4\uace0 \ubd05\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e4\uc81c\ub85c \uc778\uccb4\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub113\ud788\ub294 \ub370 \ud544\uc218\uc801\uc778 \uc5f0\uad6c \uae30\ubc18\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud655\ubcf4\ub41c \ub370\uc774\ud130\ub294 \ubcf4\ub2e4 \uc9c1\uc811\uc801\uc778 \uc784\uc0c1 \uc801\uc6a9 \uac00\ub2a5\uc131\uc744 \ud655\uc778\ud558\ub294 \ub370 \uc720\ub9ac\ud558\uac8c \uc791\uc6a9\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\ub294\ub370 \uc911\uc694\ud55c \ub2e8\uc11c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc778\uac04\uacfc \ub3d9\ubb3c\uc758 \uc0dd\uba85\uc744 \uc870\ud654\ub86d\uac8c \uace0\ub824\ud558\ub294 \uc5f0\uad6c \ubc29\ubc95\uc744 \ud0d0\uc0c9\ud558\ub294 \uac83\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubd88\uac00\ud53c\ud558\ub2e4\ub294 \uc8fc\uc7a5\uc740 \ub3d9\ubb3c \ubaa8\ub378\uc774 \uc81c\uacf5\ud558\ub294 \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc758 \uc801\ud569\uc131\uc5d0\uc11c \ucd9c\ubc1c\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85\uc758 \ubcf8\uc9c8\uc744 \uc774\ud574\ud558\ub294 \ub370 \uae30\uc5ec\ud558\uba70, \uc774\ub294 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\ub85c \uc774\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c\ub294 \uc0c1\ud638 \ubcf4\uc644\uc801\uc774\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uae4a\uc774 \uc788\ub294 \uc774\ud574\ub97c \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\ub9ac\uc640 \uc720\uc0ac\ud55c \ubaa8\ub378\uc744 \uc81c\uacf5\ud558\uc5ec \uc5f0\uad6c\uc758 \uc2e4\ud6a8\uc131\uc744 \ub192\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1\uc758 \uc0dd\ubb3c\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc788\uc5b4 \uc911\uc694\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub294 \uacfc\ud559\uc801 \ubc1c\uc804\uc744 \uc704\ud55c \uc911\uc694\ud55c \uae30\ucd08\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uae30\uc220\uc758 \ubc1c\uc804\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud6a8\uacfc\uc131\uacfc \uc778\ub3c4\uc801 \ucc98\uc6b0\uac00 \ub354\uc6b1 \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub2e4\uc591\ud55c \uc9c8\ubcd1 \uce58\ub8cc\ub97c \uc704\ud55c \uc5f0\uad6c\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc774\ub7ec\ud55c \ubc1c\uc804\uc744 \ub4b7\ubc1b\uce68\ud558\ub294 \uc911\uc694\ud55c \uc694\uc18c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \ub610\ud55c \ub2e4\uc591\ud55c \uc9c8\ud658\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub192\uc774\ub294\ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \uc9c8\ubcd1 \uc5f0\uad6c\uc758 \uacfc\ud559\uc801 \uc5c4\uaca9\uc131\uacfc \uc2e0\ub8b0\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc704\ud55c \ud544\uc218 \ub2e8\uacc4\ub85c \uc778\uc815\ubc1b\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uc774\ud574\uc5d0 \uc911\uc694\ud55c \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc758 \uc0ac\uc804 \ub2e8\uacc4\ub85c\uc11c \uc794\uc874\ud558\uba70 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uac74\uac15\uc5d0 \uc9c1\uc811\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce58\ub294 \uc2e0\uc57d\uacfc \uce58\ub8cc\ubc95\uc758 \uac1c\ubc1c\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub05d\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9e4\uc6b0 \uc911\ub300\ud55c \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc694\ud55c \uc911\uc694\ud55c \ub2e8\uacc4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c\uc2e4\ud5d8\uc758 \ub300\uccb4\ubc95 \uac1c\ubc1c\uc744 \uc704\ud574 \ub2e4\ubc29\uba74\uc73c\ub85c \uc5f0\uad6c\uac00 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc784\uc0c1\uc801 \ucc28\uc6d0\uc5d0\uc11c \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubb38\uc81c\ub97c \ud30c\uc545\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \ub3d9\uc77c\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \ubaa8\uc0ac\ud560 \uc218 \uc788\ub294 \uc801\uc808\ud55c \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud658\uc790\ub4e4\uc5d0\uac8c \uc9c1\uc811\uc801\uc778 \ud61c\ud0dd\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc784\uc0c1 \uc2dc\ud5d8\uc73c\ub85c\uc758 \uc804\ud658\uc744 \uc704\ud55c \ud544\uc218 \uac00\uad50 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\ub978 \uae30\uc220\ub85c \uba3c\uc800 \uac80\uc99d\ud55c \uacb0\uacfc\ub97c \uc2e0\ub8b0\uc131 \uc788\uac8c \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1 \ud1f4\uce58 \ubc0f \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \uc2dc\uac04\uc801\uc778 \uce21\uba74\uc5d0\uc11c \uc18d\ub3c4\ub97c \ub192\uc774\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\uc591\ud55c \uc9c8\ubcd1\uc758 \ubcd1\ub9ac\ud559\uc801 \uae30\uc804\uc744 \uc774\ud574\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\ub294 \ub370\uc774\ud130\ub294 \uc2e0\uc57d \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \uc911\uc694\ud55c \uc608\uce21 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub2e4\uc74c\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uacf5\uc9c0\ub2a5 \ubc0f \uae30\ud0c0 \ube44\uce68\uc2b5\uc801 \ub300\uccb4 \ubc29\ubc95\uacfc \uacb0\ud569\ud558\uc5ec \uadf8 \ud6a8\uc6a9\uc131\uc744 \uadf9\ub300\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \ud658\uacbd\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uc9c8\ubcd1 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\uace0 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1 \uc5f0\uad6c\uc758 \ud655\uace0\ud55c \uae30\ucd08\ub97c \uc81c\uacf5\ud558\uba70, \uc774\ub97c \ud1b5\ud574 \ub9e4\uc6b0 \uc720\uc758\ubbf8\ud55c \uacfc\ud559\uc801 \uc131\uacfc\ub97c \uc5bb\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2e4\ud5d8\uc758 \ubc1c\ub2ec\uc744 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubcd1\ud589\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ub97c \uc704\ud55c \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub9ce\uc740 \uace0\ub3c4\ud654\ub41c \uce58\ub8cc\ubc95\uacfc \uc57d\ubb3c\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uac1c\ubc1c\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc758 \uae30\ucd08\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uac8c\ub2e4\uac00, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \ud6a8\uc728\uc131\uc744 \ub192\uc774\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ubc29\ubc95\uc774 \uac1c\ubc1c\ub420 \ub54c\uae4c\uc9c0 \uc911\ub300\ud55c \uc9c8\ubcd1 \uc5f0\uad6c\uc758 \ud544\uc218\uc801\uc778 \uc911\uac04 \ub2e8\uacc4\ub85c \ud544\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \ub9e4\uc6b0 \uc720\uc0ac\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc5f0\uad6c\uc640 \uae30\uc220 \ubc1c\uc804\uc744 \uc704\ud55c \uc7ac\uc815\uc801 \ud22c\uc790\uc640 \uc9c0\uc6d0\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc644\uc804\ud55c \ub300\uccb4\ub97c \ud5a5\ud55c \ub178\ub825\uacfc \ubcd1\ud589\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\ub294 \ub370\uc774\ud130\ub294 \ud604\uc7ac\ub85c\uc11c\ub294 \uc2e0\uc57d \uac1c\ubc1c\uc758 \ud544\uc218\uc801\uc778 \uae30\ubc18\uc73c\ub85c \uc790\ub9ac \uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc57d\ubb3c \uac1c\ubc1c\uc740 \uc9c8\ud658\uc73c\ub85c \uace0\ud1b5\ubc1b\ub294 \ub9ce\uc740 \ud658\uc790\ub4e4\uc5d0\uac8c \ud76c\ub9dd\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uce58\ub8cc\ubc95\uc758 \ubc1c\uacac\uacfc \ubc1c\uc804\uc5d0 \uc9c0\ub300\ud55c \uc601\ud5a5\uc744 \ubbf8\ucce4\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc874\uc7ac\ub294 \ub2e4\uc591\ud55c \uc9c8\ubcd1 \uce58\ub8cc \uc5f0\uad6c\uc5d0 \ud2b9\uc815\ud55c \uc9c4\uc804\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacfc\ud559\uc801 \uc2e0\ub8b0\uc131\uc744 \ubcf4\uc644\ud558\uae30 \uc704\ud55c \ub178\ub825\uc740 \uacc4\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1\uc758 \uc774\ud574\uc640 \uce58\ub8cc \uac1c\ubc1c\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub05d\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95\uc744 \uc778\uac04\uc5d0\uac8c \uc2e4\uc81c \uc801\uc6a9\ud558\ub294 \ub370 \uc788\uc5b4 \ud544\uc218\uc801\uc778 \uc2e4\uc6a9\uc801 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub294 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \uc911\uc694\ud55c \ubc1c\ud310\uc774 \ub429\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc5f0\uad6c\uc5d0 \ub300\ud55c \uc9c0\uc6d0\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubcd1\ud589\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc788\uc5b4\uc11c \uc11c\ub85c \ubcf4\uc644\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \uc788\uc5b4 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4\uc640 \uc720\uc0ac\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \ubd84\uc11d\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \uc218\ub2e8\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uacbd\uc6b0\uc5d0\uc11c \uc778\ub958\uc5d0\uac8c \uc911\uc694\ud55c \uc758\uc57d\ud488 \uac1c\ubc1c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc9c4\ud589\ud558\uba74\uc11c\ub3c4 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\uc6b0\uc120\uc73c\ub85c \uace0\ub824\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c4 \uc815\ubcf4\ub97c \ud65c\uc6a9\ud558\uc5ec \uc2e0\uc57d \uac1c\ubc1c\uc758 \uc131\uacf5\ub960\uc744 \ub192\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4\uc5d0\uc11c \uc608\uc0c1\ud560 \uc218 \uc5c6\ub294 \ubcc0\uc218\ub97c \uc0ac\uc804\uc5d0 \ud30c\uc545\ud560 \uc218 \uc788\uac8c \ud574\uc90d\ub2c8\ub2e4","\uacfc\ud559 \uc5f0\uad6c \ubc1c\uc804\uc758 \uc911\uc694\ud55c \uae30\ubc18\uc73c\ub85c\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubb34\uc2dc\ud560 \uc218 \uc5c6\ub294 \uae30\uc5ec\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub9ce\uc740 \uce58\ub8cc \ubd84\uc57c\uc5d0\uc11c \uc911\uc694\ud55c \ubc1c\uacac\uc744 \uc774\ub04c\uc5b4\ub0b4\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\ub85c \uc790\ub9ac \uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc0dd\uba85 \uacf5\ud559\uc758 \ud601\uc2e0\uc801\uc778 \ubc1c\uc804\uc740 \ubd80\ubd84\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8 \ub355\ubd84\uc5d0 \uac00\ub2a5\ud588\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc989\uac01\uc801\uc778 \uc784\uc0c1\uc801 \uc801\uc6a9 \uac00\ub2a5\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc989\uac01\uc801\uc778 \uce58\ub8cc \uac1c\uc785\uc774 \ud544\uc694\ud55c \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud574 \uc2e0\uc18d\ud55c \uce58\ub8cc\ubc95\uc744 \uc5f0\uad6c\ud558\uace0 \uac1c\ubc1c\ud558\ub294 \ub370 \uc788\uc5b4 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\ubc1c\ud558\uace0 \uc7a5\ub824\ud574\uc57c \ud55c\ub2e4\ub294 \uc810\uc5d0 \ub3d9\uc758\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uc548 \uae30\uc220\uc774 \ubc1c\uc804\ud558\ub294 \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc778 \ube44\uad50 \uae30\uc900\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uac00\uc7a5 \uc720\uc758\ubbf8\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d\uc774 \uc2dc\uc7a5\uc5d0 \ucd9c\uc2dc\ub418\uae30\uae4c\uc9c0 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uae30\uc220 \uac1c\ubc1c\uc740 \uacc4\uc18d\ub418\uace0 \uc788\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ubcd1\ud589\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubd88\uac00\ud53c\ud558\ub2e4\ub294 \uc8fc\uc7a5\uc740 \uacfc\ud559\uc801 \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \ubaa8\ub378\uc774 \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc0f \ubcd1\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \ubcf4\uc5ec\uc8fc\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub9ce\uc740 \uacbd\uc6b0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \ud68d\uae30\uc801\uc778 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85\uc744 \uc704\ud611\ud558\ub294 \uc9c8\ubcd1\uc758 \uce58\ub8cc\ubc95\uc744 \ubc1c\uacac\ud558\ub294 \ub370 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc758 \uc911\uc694\ud55c \uae30\ucd08 \ub2e8\uacc4\ub97c \ub2f4\ub2f9\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uae30\uc220 \ubc1c\uc804\uc744 \uc704\ud574\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\uac00 \uc911\uc694\ud55c \ucc38\uace0 \uc790\ub8cc\uac00 \ub429\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \uacfc\uc815\uc785\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uacfc\uc815\uc744 \ud3ec\ud568\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub97c \uc774\ud574\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc885\ud569\uc801\uc778 \ubaa8\ub378\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc2e4\ud5d8 \ub3d9\ubb3c \ubcf5\uc9c0\ub294 \uc5f0\uad6c\uc790\ub4e4\uc5d0\uac8c\ub3c4 \uc911\uc694\ud55c \uc6b0\uc120\uc21c\uc704\uc774\uba70, \uc774\ub294 \uc5f0\uad6c\uc758 \ud488\uc9c8\uacfc \uc2e0\ub8b0\uc131\uc744 \ub192\uc785\ub2c8\ub2e4","\ub610\ud55c, \uc911\uc99d \uc9c8\ud658\uc758 \ubcf5\uc7a1\uc131\uc744 \uc774\ud574\ud558\uace0 \uadf9\ubcf5\ud558\uae30 \uc704\ud574 \uc0dd\uccb4 \ubaa8\ub378 \uc5f0\uad6c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \uac1c\ubc1c\ud558\uae30 \uc704\ud55c \uc5f0\uad6c\uac00 \uc9c0\uc18d\uc801\uc73c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\ub2e4\ub294 \uc810\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc5ec\ub7ec \uc911\uc99d \uc9c8\ud658\uc758 \ud601\uc2e0\uc801 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud574 \uc654\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ud2b9\uc815 \ub3d9\ubb3c\ub4e4\uc774 \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ub9ac\ud559\uc801 \ud2b9\uc9d5\uc744 \uacf5\uc720\ud558\uace0 \uc788\uc5b4 \uce58\ub8cc\ubc95 \uc5f0\uad6c\uc5d0 \uc801\ud569\ud55c \ubaa8\ub378\uc774 \ub429\ub2c8\ub2e4","\ub354 \ub098\uc544\uac00, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \uc2e4\ud5d8 \uacb0\uacfc\uac00 \uc2e4\uc81c \uc0dd\ubb3c\uccb4\uc5d0\uc11c \uc5b4\ub5bb\uac8c \ubc1c\ud604\ub420\uc9c0\ub97c \uc608\uce21\ud558\ub294 \ub370 \ud575\uc2ec\uc801\uc778 \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0\uc11c\ub294 \uc815\ud655\ud558\uace0 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ub370\uc774\ud130\uac00 \ud544\uc218\uc801\uc774\uba70, \uc774\ub294 \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc8fc\ub85c \uc5bb\uc5b4\uc9d1\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\ub9ac\ud559\ 18 \uc788\ub294 \ub3c5\ucc3d\uc801\uc778 \uc5f0\uad6c \uc218\ub2e8\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac \uc778\ub958\uac00 \uc9c1\uba74\ud55c \ub9ce\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\ubc95\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ubc1c\uacac\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub9ce\uc740 \uc758\ud559\uc801 \uc9c4\ubcf4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uac00\ub2a5\ud574\uc84c\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc5bb\ub294 \uc790\ub8cc\ub294 \uc778\uac04 \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \ub9e4\uc6b0 \uc911\uc694\ud55c \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uacfc\uc815\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c, \uc911\uc99d \uc9c8\ud658\uc758 \uacbd\uc6b0 \uc870\uae30 \ub2e8\uacc4\uc5d0\uc11c\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc784\uc0c1 \uc2dc\ud5d8 \uc131\uacf5\ub960\uc744 \ud06c\uac8c \ub192\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc778\uac04\uc5d0\uac8c \uc720\uc6a9\ud558\uace0 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc744 \ubc1c\uacac\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc6b0\ub9ac\ub294 \uc704\ud5d8\ud55c \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uacfc\uc815\uc744 \uc774\ud574\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc5bb\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ucd9c\ud604\uc744 \ud06c\uac8c \uc55e\ub2f9\uae41\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\ub97c \uc704\ud55c \uc758\ud559\uc801 \uc9c4\ubcf4\uc640 \ub3cc\ud30c\uad6c\ub97c \ub9c8\ub828\ud558\ub294 \ub370 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5 c744 \uc2e4\uc81c \uce58\ub8cc\ubc95\uc73c\ub85c \uc804\ud658\ud558\uae30 \uc704\ud55c \uacb0\uc815\uc801 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uc758\uc57d\ud488\uacfc \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\ub300\ud55c \uc9c8\ud658\uc758 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc788\uc5b4\uc11c \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uc778\ub958\uc758 \uc774\ud574\ub97c \ud655\ub300\ud558\ub294 \ub370 \ud544\uc694\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2ec\uac01\ud55c \uc9c8\ubcd1\uc744 \uce58\ub8cc\ud560 \uc218 \uc788\ub294 \ud601\uc2e0\uc801\uc778 \uc758\uc57d\ud488 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\ub300\ud55c \uc758\ud559\uc801 \ubc1c\uacac\uc73c\ub85c \uc774\uc5b4\uc9c8 \uc218 \uc788\ub294 \uc911\uc694\ud55c \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub9ce\uc740 \uce58\ub8cc\ubc95\uc758 \ucd08\uae30 \uc131\uacf5\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc758\uc874\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c0\uc18d\uc801\uc778 \uae30\uc220 \ubc1c\uc804\uc5d0 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc73c\uba70, \uc774 \uacfc\uc815\uc5d0\uc11c \uc5bb\uc740 \ub370\uc774\ud130\ub294 \ub354 \ub098\uc740 \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1 \uc5f0\uad6c\ub97c \uc704\ud574 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc758\uc57d\ud488 \uac1c\ubc1c\uc758 \uc131\uacf5\ub960\uc744 \ub192\uc785\ub2c8\ub2e4","\ub05d\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \uc788\uc5b4 \ud544\uc218\uc801\uc778 \uc608\uce21 \uc218\ub2e8\uc785\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\ub294 \ub370 \uc788\uc5b4 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc911\uc99d \uc9c8\ud658\uc758 \ubcf5\ud569\uc131\uc744 \ub2e4\ub8e8\uae30 \uc704\ud574 \ud544\uc694\ud55c \ud604\uc2e4\uc801\uc778 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \ubaa8\ub378\uc740 \uc9c8\ubcd1\uc758 \uc9c4\ud589\uacfc\uc815\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc804\uc784\uc0c1 \uc2dc\ud5d8 \ub2e8\uacc4\uc5d0\uc11c \uc5f0\uad6c\uc758 \ud0c0\ub2f9\uc131\uc744 \ud655\uc778\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc778\uac04\uc758 \uc9c8\ubcd1\uacfc \uce58\ub8cc \uba54\ucee4\ub2c8\uc998\uc744 \uc2e4\uc9c8\uc801\uc73c\ub85c \uc608\uce21\ud558\uace0 \uac80\uc99d\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud558\ub294 \uc5f0\uad6c \ubc29\uc2dd\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c\uc640 \uac1c\ubc1c\uc758 \uc9c0\uc18d \uac00\ub2a5\uc131\uc744 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc5d0\uc11c \uc2e0\uc911\ud788 \uc120\ud0dd\ub418\uace0 \uc0ac\uc6a9\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc778\uac04 \uc0dd\ub9ac\uc640 \uac00\uc7a5 \uc720\uc0ac\ud55c \uc5f0\uad6c \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc774\ubbf8 \ub9ce\uc740 \uce58\ub8cc\ubc95\uc774 \uac1c\ubc1c\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\ubb3c\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uacfc \uc9c8\ubcd1\uc758 \uc9c4\ud589 \uacfc\uc815\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uc911\uc694\ud55c \uc758\ud559\uc801 \ubc1c\uacac\uc758 \uae30\ubc18\uc774 \ub3fc \uc654\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uacfc\ud559\uc801 \ud601\uc2e0\uc740 \ub300\uc548\uc801\uc778 \ubc29\ubc95\uc758 \uc5f0\uad6c\uc640 \ubc1c\uc804\uc5d0\ub3c4 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uac1c\ubc1c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc790\uc6d0\uc758 \ud22c\uc790\ub294 \ubaa8\ub4e0 \uacfc\ud559\uc801 \ubc29\ubc95\uc5d0\uc11c \ud544\uc694\ud558\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4\ubc95 \ubaa8\ub450\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\uc591\ud55c \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \uae4a\uac8c \ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uc2e0\uc57d \uac1c\ubc1c\uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0\uc11c\uc758 \ube44\uc57d\uc801\uc778 \uc9c4\uc804\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc0f \ubcd1\ub9ac\uc801 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc218\ub9ce\uc740 \uce58\ub8cc\ubc95\uacfc \ubc31\uc2e0\uc758 \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud574\uc654\uc73c\uba70, \uc911\uc99d \uc9c8\ud658\uc73c\ub85c \uace0\ud1b5\ubc1b\ub294 \uc0ac\ub78c\ub4e4\uc5d0\uac8c \uc0c8\ub85c\uc6b4 \ud76c\ub9dd\uc744 \uc81c\uc2dc\ud569\ub2c8\ub2e4","\uba3c\uc800, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc778 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc788\uc5b4\uc11c \ub3c5\ubcf4\uc801\uc778 \uc608\uce21 \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\uc131\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \uc218\ud589\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc758\ud559 \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uce58\ub8cc\ubc95\uacfc \uc758\uc57d\ud488 \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud574\uc654\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \ub9e4\uc6b0 \uc911\uc694\ud55c \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub300\uccb4 \uae30\uc220 \ud22c\uc790\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc73c\ub85c \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95 \ubc1c\uacac\uc5d0\uc11c \uc911\uc694\ud55c \ub3cc\ud30c\uad6c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc801\uc6a9\ub420 \uc218 \uc788\ub294 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc778 \ub370\uc774\ud130\uc640 \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc0c8\ub85c\uc6b4 \uae30\uc220\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\uace0 \uc788\uc73c\uba70, \ud1b5\ud569\uc801\uc778 \uc5f0\uad6c \uc811\uadfc \ubc29\uc2dd\uc744 \ud1b5\ud574 \ub354 \uc815\ud655\ud55c \uacb0\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \ubaa8\ub378\uc740 \uc9c8\ubcd1\uc758 \uc9c4\ud589 \uacfc\uc815\uacfc \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub610\ud55c, \ube44\ub3d9\ubb3c\uc801 \uc5f0\uad6c \ubc29\ubc95\uc758 \uac1c\ubc1c\uacfc \ud65c\uc6a9\uc774 \uc801\uadf9\uc801\uc73c\ub85c \ucd94\uad6c\ub418\uace0 \uc788\ub2e4\ub294 \uc810\uc5d0\uc11c\ub3c4 \uc9c4\uc804\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uc2e0\uc57d \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ub9e4\uc6b0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85\uacfc \uc9c1\uacb0\ub41c \uc911\uc694\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc911\uc694\ud55c \uc0dd\ubb3 6a9\ud558\uae30 \uc804\uc5d0 \uc57d\ubb3c \ubc0f \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \ud3c9\uac00\ud558\ub294 \uc911\uc694\ud55c \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e4\uc81c\ub85c \uc778\uac04\uc5d0\uac8c \uc801\uc6a9\ud560 \ub54c \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \uc704\ud5d8\uc744 \ubbf8\ub9ac \ud0d0\uc9c0\ud558\uace0 \ud574\uacb0\ud558\ub294 \ub370 \ud070 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \uac80\uc99d\ud558\ub294 \ub370 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\uc591\ud55c \uc758\uc57d\ud488\uacfc \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \uc785\uc99d\ud558\ub294 \ub370 \ud575\uc2ec\uc801\uc778 \ub3c4\uad6c\ub85c \uc4f0\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc744 \ub300\uc0c1\uc73c\ub85c \ud55c \uc784\uc0c1 \uc2dc\ud5d8\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \uc911\uc694\ud55c \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\uc81c\uc758 \uc704\ud5d8\uc131\uc744 \ubbf8\ub9ac \ud30c\uc545\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \uc0ac\uc804\uc5d0 \uac80\uc99d\ud558\ub294 \uc911\uc694\ud55c \uc808\ucc28\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \ub300\uc0c1 \uc2dc\ud5d8\uc73c\ub85c \uc9c1\uc811 \ub118\uc5b4\uac00\uae30 \uc804\uc5d0 \ud544\uc218\uc801\uc778 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \uac80\uc99d\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc2e4\ud5d8\uc801 \ub370\uc774\ud ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc9c1\uc811 \uc2e4\ud5d8\ud560 \uc218 \uc5c6\ub294 \uce58\ub8cc\uc81c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \uba3c\uc800 \ud3c9\uac00\ud560 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uac74\uac15\ud558\uace0 \uc548\uc804\ud55c \uc758\ud559\uc801 \ubc1c\uc804\uc744 \ubcf4\uc7a5\ud558\uae30 \uc704\ud55c \uac80\uc99d \uacfc\uc815\uc73c\ub85c, \uc784\uc0c1 \uc2dc\ud5d8\uc5d0 \uc55e\uc11c \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc5d0\uc11c \uc778\uac04\uc5d0\uac8c \uc801\uc6a9\ud558\uae30 \uc804\uc5d0 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ud3c9\uac00\ud558\ub294\ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc608\uce21\ub825\uc774 \ub192\uc740 \ub370\uc774\ud130 \uc81c\uacf5\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc548\uc815\uc131\uacfc \uc720\ud6a8\uc131\uc744 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uac80\uc99d\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \uacc4\uc18d\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uc57d\ubb3c\uc758 \uc548\uc804\uc131\uc744 \uac80\uc99d\ud558\ub294\ub370 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\ub85c \uc790\ub9ac\uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc874\ud558\ub294 \uacfc\ud559\uc801 \ubc29\ubc95 \uc911\uc5d0\uc11c \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\uc5ec \uce58\ub8cc\ubc95 \uac1c\ubc
