1 \ubc18\uc751\uc744 \uc774\ud574\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc544\uc9c1 \ud544\uc694\ud55c \uc774\uc720\ub294 \ud2b9\uc815 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uacfc\uc815\uc744 \uc644\uc804\ud558\uac8c \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc774\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\uc7ac\uc758 \uacfc\ud559\uae30\uc220\ub85c\ub294 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\ub294 \ub370 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc720\uc6a9\ud558\uba70 \ub2e4\ub978 \ubc29\ubc95\uc73c\ub85c\ub294 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uacfc\uc815\uc744 \uc5f0\uad6c\ud558\uae30 \uc704\ud55c \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uacfc\uc815\uc5d0 \ub300\ud55c \uae4a\uc740 \uc774\ud574\ub97c \uc81c\uacf5\ud558\uae30 \ub54c\ubb38\uc5d0 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uace0\ub824\ud560 \ub54c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc0dd\uccb4 \ubc18\uc751\uc744 \ubaa8\ub378\ub9c1\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc5f0\uad6c\ud558\uae30 \uc704\ud55c \ud544\uc218 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc8fc \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \uc5f0\uad6c\ud560 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"21_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","21_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"ixUaQVFzGkHUeBpBE60aQQ3jGEGj7hpB7y8aQb62FUHtzRVBQJcaQTrjFUHpQhtB1xkXQTVXGkFfFxtBl1gXQZObGkG9DhlBe4kaQas5GUHPixlBQnoaQV7tGkH2QBhBG5wZQbJpGkHI3RVB\u002fIQaQWoLGUESlhVBu0EaQa8AFUGgdxdBdUkUQSDwGkHUhhpBV7sVQUTYFUHpNRdBCrEaQULEGkFo6BhB"},"y":{"dtype":"f4","bdata":"ToEyQVwnM0EWHDNB8G0zQZcKMEGHujNBjL0yQcnZLUG4wy1B2nEzQT4FLkEE3zJBLPcuQW8nM0FXFTNBkW4vQY4oM0FNRDFBDSgzQSHKMUGeZjJBzV0zQaNcM0GXZTBB2dMsQZk9M0Gi+y1B\u002fVkzQVxIMUFYsS1BP+AyQW5nLUGOxS9B0O8sQWzYMUEkwyNBVuYtQT3mLUH4JC9BvLIzQXREM0EIwjBB"},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\uccab\uc9f8, \uc778\uacf5 \uc7a5\uae30\uc640 \ucef4\ud4e8\ud130 \ubaa8\ub378\uc740 \uc644\uc804\ud55c \ub300\uc548\uc774 \ub420 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ube44\ub85d \uc778\uacf5 \uc7a5\uae30\uc640 \ucef4\ud4e8\ud130 \ubaa8\ub378\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uadf8\ub4e4\uc740 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubcf5\uc7a1\uc131\uacfc \uc0dd\ubb3c\ud559\uc801 \ubcc0\ub3d9\uc131\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4. [\ub3d9\ubb3c\uc2e4\ud5d8 \uae30\ubc18 \uc5f0\uad6c \ubc0f \uc2e0\uc57d \uac1c\ubc1c\uc744 \uc218\ud589\ud558\ub294] \ub85c\uc288\ub294 \ub300\uccb4 \uae30\uc220\uc774 \uc720\uc6a9\ud558\uac8c \ud65c\uc6a9\ub420 \uc218\ub294 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud604\uc7ac\ub85c\uc11c\ub294 \uc778\uac04 \uc0dd\ub9ac\uc758 \ubcf5\uc7a1\uc131\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc138\ud3ec \ubc30\uc591 \ubc0f \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uac19\uc740 \ub300\uccb4 \ubc29\ubc95\uc740 \uc2e4\uc81c \uc0dd\uba85\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc2dc\uc2a4\ud15c\uc744 \uc644\ubcbd\ud788 \uad6c\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc774\ub098 \uc778\uacf5 \uc7a5\uae30 \ub4f1 \ub300\uccb4 \uae30\uc220\uc740 \uc544\uc9c1 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc644\uc804\ud788 \ubaa8\ubc29\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \uae30\uc220 \ubc1c\uc804\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\ub294 \uac83\uc740 \ubd84\uba85\ud558\uc9c0\ub9cc, \uc778\uacf5 \uc7a5\uae30\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac\uc758 \uc778\uacf5 \uc9c0\ub2a5\uacfc \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1 \uae30\uc220\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uae4c\uc9c0 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uc778\uacf5 \uc7a5\uae30 \ubaa8\ub378\uc774\ub098 \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158 \ub4f1\uc758 \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc, \uc774\ub4e4\ub9cc\uc73c\ub85c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, 3D \uc138\ud3ec \ubc30\uc591, \uc624\uac00\ub178\uc774\ub4dc, \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158 \ub4f1 \ub300\uccb4 \ubc29\ubc95\uc740 \uc5f0\uad6c\uc758 \uc911\uc694\ud55c \ubd80\ubd84\uc774\uc9c0\ub9cc, \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uba38\ubb34\ub974\uace0 \uc788\uc5b4 \ud55c\uacc4\ub97c \uac16\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc778\uacf5 \uc7a5\uae30\uc640 \ucef4\ud4e8\ud130 \ubaa8\ub378\uc740 \ub9ce\uc740 \ubc1c\uc804\uc744 \uc774\ub8e8\uc5c8\uc9c0\ub9cc, \uc774\ub4e4\uc740 \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc758 \ubcf5\uc7a1\uc131 \uc804\uccb4\ub97c \ubc18\uc601\ud558\uae30\uc5d0\ub294 \uc5ec\uc804\ud788 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub2e4\uc74c\uc73c\ub85c, \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uac19\uc740 \ub300\uccb4 \uae30\uc220\uc740 \uc778\uac04 \uc0dd\uba85\uacfc \uc9c1\uc811 \uc5f0\uacb0\ub41c \uc2e4\ud5d8\uc801 \ubcf5\uc7a1\uc131\uc744 \ucda9\ubd84\ud788 \ub098\ud0c0\ub0b4\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uacfc \uc778\uacf5 \uc138\ud3ec \ubaa8\ub378\uc740 \ud2b9\uc815 \uc5f0\uad6c\uc5d0 \uc720\uc6a9\ud560 \uc218 \uc788\uc9c0\ub9cc, \uadf8 \uc790\uccb4\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\ub300 \uae30\uc220\uc758 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uacfc\uc815\uc5d0 \ub300\ud55c \uc885\ud569\uc801\uc778 \uc774\ud574\ub97c \uc81c\uacf5\ud558\uba70, \uc774\ub294 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc774\ub098 \uc778\uacf5 \uc7a5\uae30 \ubaa8\ub378\uc774 \ub2ec\uc131\ud558\uae30 \uc5b4\ub824\uc6b4 \uc601\uc5ed\uc785\ub2c8\ub2e4","\uc138\ud3ec \uae30\ubc18 \uc2e4\ud5d8\uacfc \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1 \uac19\uc740 \ub300\uc548\uc801 \uc811\uadfc\ubc95\uc740 \ucd08\uae30 \uc5f0\uad6c \ub2e8\uacc4\uc5d0\uc11c \uc720\uc6a9\ud558\uc9c0\ub9cc, \uc778\uccb4 \ub0b4\uc5d0\uc11c\uc758 \uc2e4\uc81c \uc57d\ubb3c \ubc18\uc751\uc744 \uc815\ud655\ud788 \uc608\uce21\ud558\ub294 \ub370 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc778\uacf5 \uc7a5\uae30 \ubaa8\ub378\uacfc \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uc774 \ubc1c\uc804\ud558\uba74\uc11c \ub300\uccb4 \ubc29\ubc95\uc774 \ub2e4\uc591\ud574\uc84c\uc73c\ub098, \uc774\ub7ec\ud55c \uae30\uc220\uc740 \uc544\uc9c1\uae4c\uc9c0 \ub3d9\ubb3c \ubaa8\ub378\uc758 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uc778\uacf5 \uc7a5\uae30\ub294 \uae09\uc18d\ud788 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc774\ub4e4\uc740 \uc544\uc9c1 \uc644\uc804\ud55c \ub300\uccb4 \uc218\ub2e8\uc774 \ub418\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uc138\ud3ec \ubc30\uc591\uacfc \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1 \ub4f1 \ub300\uccb4 \uae30\uc220\uc740 \uc911\uc694\ud55c \ubc1c\uc804\uc744 \uc774\ub8e8\uc5b4 \uc654\uc9c0\ub9cc, \uc774\ub4e4\uc774 \uae30\uc874\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub3c4 \ubc1c\uc804\ub41c \uae30\uc220\ub4e4\uc774 \uc778\uac04 \uc870\uc9c1\uc744 \ud65c\uc6a9\ud55c \uc2e4\ud5d8 \ubc0f \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc73c\ub85c \ub300\uccb4\ub420 \uc218 \uc788\ub2e4\ub294 \uc8fc\uc7a5\uc5d0\ub294 \ub3d9\uc758\ud558\uc9c0\ub9cc, \uc774\ub7ec\ud55c \uae30\uc220\ub4e4\uc774 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc815\ub3c4\uc758 \ubaa8\ub4e0 \uc0dd\ub9ac\ud559\uc801 \uce21\uba74\uc744 \ud3ec\uad04\ud558\uc9c0\ub294 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc774\ub098 \uc778\uacf5 \uc7a5\uae30 \uac19\uc740 \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\ub098, \uc774\ub4e4 \ubc29\ubc95\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\uc778\uacf5 \uc7a5\uae30\uc640 \uc138\ud3ec \ubc30\uc591 \uae30\uc220\uc758 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\uadf8\ub2e4\uc74c\uc73c\ub85c, \uc778\uacf5\uc9c0\ub2a5\uacfc \uc778\uacf5 \uae30\ubc18 \uae30\uc220\uc740 \uc2e0\uc57d \uac1c\ubc1c\uc758 \ucd08\uae30 \uc5f0\uad6c\uc5d0 \ub3c4\uc6c0\uc774 \ub418\uc9c0\ub9cc, \uc804\uc784\uc0c1 \ub2e8\uacc4\uc5d0\uc11c \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud558\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220\uc758 \ubc1c\uc804\uc740 \ub180\ub77c\uc6b4 \uc18d\ub3c4\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc9c0\ub9cc, \uc5ec\uc804\ud788 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uc138\ud3ec \ubc30\uc591\uc740 \uc81c\ud55c\ub41c \uc608\uce21\ub825\uc744 \uac00\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ube44\ub85d \uc778\uacf5 \uc870\uc9c1\uc774\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1 \ub4f1\uc758 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc774\ub4e4 \uae30\uc220\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\ub85c \ubaa8\ub4e0 \ubcf5\uc7a1\ud55c \uc0dd\uba85\uccb4\uc758 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc778\uccb4\uc870\uc9c1 \uce69\uc774\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378\uc740 \uc544\uc9c1 \ub3d9\ubb3c \ubaa8\ub378\uc758 \ubcf5\uc7a1\uc131\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uacfc \uc778\uacf5 \uc138\ud3ec \ubaa8\ub378 \ub4f1\uc758 \ub300\uc548\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc774\ub4e4 \uae30\uc220\uc740 \uc544\uc9c1 \ubaa8\ub4e0 \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\ubcbd\ud558\uac8c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc138\ud3ec \uc2e4\ud5d8\uc774\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uac19\uc740 \ub300\uc548\uc801 \ubc29\ubc95\uc774 \uc874\uc7ac\ud55c\ub2e4\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc, \uc774\ub4e4 \ubc29\ubc95\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\uc778\uacf5 \uc870\uc9c1 \ubc0f \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uac19\uc740 \ub300\uccb4 \ubc29\ubc95\uc774 \uc77c\ubd80 \uc5f0\uad6c\uc5d0 \uae30\uc5ec\ud560 \uc218 \uc788\uc73c\ub098, \uc774\ub4e4 \ubc29\ubc95\ub9cc\uc73c\ub85c\ub294 \uc0dd\uccb4 \ub0b4 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uacfc\uc815\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc2e4\ud5d8\uc2e4 \uc138\ud3ec \uc2e4\ud5d8\uacfc \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc774\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uae30\uc5d0\ub294 \uc544\uc9c1 \uc5ec\ub7ec \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\ub4e4\uc778 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1, \uc778\uacf5 \uc870\uc9c1 \ubc0f \uc138\ud3ec \ubb38\ud654 \uae30\uc220\uc740 \uc5f0\uad6c\uc5d0 \uae30\uc5ec\ud560 \uc218 \uc788\uc9c0\ub9cc, \ubaa8\ub4e0 \uc0dd\ub9ac\uc801 \ubc18\uc751\uacfc \ubcf5\uc7a1\ud55c \uc9c8\ubcd1 \uc9c4\ud589 \uacfc\uc815\uc744 \uc644\uc804\ud788 \ubcf5\uc81c\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc778\uacf5 \uc7a5\uae30\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uac19\uc740 \ub300\uccb4 \uae30\uc220\uc774 \uc2e4\uc81c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc774\ub294 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ud604\uc7ac \uae30\uc220 \uc218\uc900\uc73c\ub85c\ub294 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc774\ub098 \uc778\uacf5 \uc7a5\uae30\ub9cc\uc73c\ub85c \uc778\uac04 \uc0dd\uccb4 \ub0b4 \ubcf5\uc7a1\ud55c \uc0c1\ud638\ubc18\uc751\uc744 \uc644\ubcbd\ud788 \uc608\uce21\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc778\uacf5\uc9c0\ub2a5 \ubaa8\ub378\ub9c1\uc774\ub098 \uc758\ud559 \uc2dc\ubbac\ub808\uc774\uc158\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc758 \uae30\uc220\ub85c, \uc2e4\uc81c \uc0dd\ubb3c\ud559\uc801 \ud658\uacbd\uc5d0\uc11c \ubc1c\uc0dd\ud558\ub294 \ub2e4\uc591\ud55c \ubcc0\uc218\uc640 \ubcf5\ud569\uc801\uc778 \uc0dd\ubb3c\ud559\uc801 \uacfc\uc815\uc744 \uc644\ubcbd\ud788 \uc7ac\ud604\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uacf5\ud559 \uae30\uc220\uc774\ub098 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \ub354\uc6b1 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ud574\ub2f9 \uae30\uc220\ub4e4\uc774 \ub3d9\ubb3c \uc0dd\ubb3c\ud559\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud558\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uc778\uacf5\uc9c0\ub2a5\uacfc 3D \ubc14\uc774\uc624\ud504\ub9b0\ud305 \uae30\uc220\uc740 \uc5f0\uad6c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc911\uc694\ud55c \ub3c4\uad6c\ub85c \ud65c\uc6a9\ub418\uc9c0\ub9cc, \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc644\uc804\ud788 \ubaa8\ubc29\ud558\uae30\uc5d0\ub294 \uc5ec\uc804\ud788 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559\uacc4\uc5d0\uc11c \uc138\ud3ec \ubc30\uc591\uacfc \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1 \uac19\uc740 \ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc, \uc774\ub7ec\ud55c \uae30\uc220\uc774 \uc544\uc9c1 \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \ucda9\ubd84\ud55c \ub300\uc548\uc774 \ub418\uc9c0\ub294 \ubabb\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uc778\uac04 \uc138\ud3ec \uae30\ubc18\uc758 \uc2e4\ud5d8\uc740 \uc0dd\uccb4 \ub0b4 \ubcf5\uc7a1\ud55c \uc0c1\ud638\uc791\uc6a9\uc744 \uc644\ubcbd\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \uc778\uacf5\uc9c0\ub2a5\uacfc \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc740 \ud68d\uae30\uc801\uc778 \ub300\uc548\uc73c\ub85c \uc8fc\ubaa9\ubc1b\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1\uae4c\uc9c0 \ubaa8\ub4e0 \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \ubaa8\uc0ac\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, 3D \ubc14\uc774\uc624\ud504\ub9b0\ud305\uc774\ub098 \uc778\uacf5\uc9c0\ub2a5\uc744 \ud65c\uc6a9\ud55c \ud604\ub300\uc801 \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc774\ub7ec\ud55c \uae30\uc220\ub4e4\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubaa8\ub4e0 \uc5ed\ud560\uc744 \uc218\ud589\ud560 \uc218\uc900\uc5d0 \uc774\ub974\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc778\uacf5 \uc7a5\uae30\uc640 \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158 \uac19\uc740 \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc774\ub4e4\uc774 \ub3d9\ubb3c\uc758 \uc0dd\ub9ac\uc801 \ubcf5\uc7a1\ud568\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"22_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","22_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"GGpRQI3saEBoZVBAISxRQOY7a0CSMk9AGK5RQEzRVEB4L1pAIVpNQHe+Z0CExsBA7PxNQB5XZUDNuVJA0WhpQFVwakC9cGlAplBVQMP4UUD2jFJAuPhQQLbxXUAAq1FAkpNoQLgZWUBbL2tASXlZQGt7a0DD809ADU9RQKrnG0B821VAw6lSQD0cTUAbBlFAipNtQLQsZEB7IF1A"},"y":{"dtype":"f4","bdata":"NNf8QAf+AEGngvxA9BX9QK0PAUHSBfxAwzX8QBNq\u002fUBVDf9AmEj7QHjkAEFrswZBRgX7QEWEAEH10fxA6\u002fMAQS8DAUH5\u002fQBB4un9QONO\u002fEBeyvxASyP8QLExAEGzPfxAceUAQRVj\u002fkCoZQFB6Zn+QCwoAUH1TvxABVz8QFs150D4wv1Aoc38QH8l+0DDaPtAKogBQV16AEHWWP5A"},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc73c\uba74 \uc77c\ubd80 \uce58\ub8cc \ubc29\ubc95\uc758 \uac1c\ubc1c\uc774 \ubd88\uac00\ub2a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc5c8\ub2e4\uba74, \uc6b0\ub9ac\ub294 \uc911\uc99d \uc9c8\ud658\uc73c\ub85c \uace0\ud1b5\ubc1b\ub294 \ub9ce\uc740 \ud658\uc790\ub4e4\uc744 \uc704\ud55c \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\ub294 \ub370 \uc9c4\uc804\uc744 \uc774\ub8e8\uae30\uac00 \uc5b4\ub824\uc6e0\uc744 \uac83\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc740 \ubd88\uac00\ub2a5\ud588\uc744 \uac83\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\ub2e8\uc740 \uc5f0\uad6c \uac1c\ubc1c\uc758 \uc18d\ub3c4\ub97c \ud604\uc800\ud788 \uc800\ud558\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \ub300\uccb4 \ubc29\ubc95\ub9cc\uc73c\ub85c\ub294 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc758 \uc804 \uacfc\uc815\uc5d0\uc11c \ud544\uc694\ud55c \uc815\ubcf4\ub97c \ucda9\ubd84\ud788 \uc81c\uacf5\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc73c\uba74 \uc778\uac04\uc744 \ub300\uc0c1\uc73c\ub85c \ud558\ub294 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc774 \ub9e4\uc6b0 \uc5b4\ub824\uc6cc\uc9d1\ub2c8\ub2e4","\uc14b\uc9f8, \uc5f0\uad6c \ubc29\ubc95\uc758 \ud601\uc2e0\uc744 \uc9c0\ud5a5\ud558\ub354\ub77c\ub3c4, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc989\uac01\uc801 \uc911\ub2e8\uc774 \uac00\uc838\uc62c \ubd80\uc791\uc6a9\uc744 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc5d0 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c \uc5c6\uc774\ub294 \ud604\ub300 \uc758\ud559\uc758 \ub9ce\uc740 \ubc1c\uc804\uc774 \uc774\ub8e8\uc5b4\uc9c0\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc2e4\ud5d8\uc774 \uc5c6\uc73c\uba74 \uc778\uac04\uc5d0\uac8c \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \uc5b4\ub824\uc6c0\uc774 \ubc1c\uc0dd\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc804\uba74\uc801\uc73c\ub85c \uae08\uc9c0\ud558\uba74 \uc911\uc99d \uc9c8\ud658 \ubc0f \ud76c\uadc0\ubcd1\uc5d0 \ub300\ud55c \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc774 \ud070 \uc9c0\uc7a5\uc744 \ubc1b\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc784\uc0c1\uc5d0 \uc9c4\uc785\ud560 \uacbd\uc6b0 \uae30\uc220\ub85c\ub294 \ub098\ud0c0\ub098\uc9c0 \uc54a\ub294 \uc608\uce21 \ubd88\uac00\ub2a5\ud55c \uacb0\uacfc\uc758 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc989\uac01\uc801\uc778 \uc911\ub2e8\uc740 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uc704\ud611\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc778\uccb4\uc5d0 \ub300\ud55c \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \ubbf8\ub9ac \uc608\uce21\ud558\uae30 \uc5b4\ub824\uc6b4 \ubd80\ubd84\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc758\ud559 \uc5f0\uad6c\uc758 \ubc1c\uc804\uc5d0 \ud544\uc218\uc801\uc778 \uc694\uc18c\ub85c, \ud604\uc7ac\ub294 \uc774\ub97c \ub300\uccb4\ud560 \uc644\uc804\ud55c \ubc29\ubc95\uc774 \uc5c6\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc73c\uba74 \uc5f0\uad6c\uc790\ub4e4\uc740 \uc2e0\uc57d \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ucd08\uae30 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ud3c9\uac00\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \ub2e8\uacc4\ub97c \uc783\uac8c \ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc774\ub294 \ud604\ub300\uc758\ud559\uc758 \ub9ce\uc740 \uc9c4\uc804\uc774 \ubd88\uac00\ub2a5\ud588\uc744 \uac83\uc785\ub2c8\ub2e4","\ucd08\uae30 \ub2e8\uacc4\uc758 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\ub294 \uc0c1\ud669\uc5d0\uc11c, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc758\uc874\uc744 \uc644\uc804\ud788 \ubc30\uc81c\ud558\ub294 \uac83\uc740 \uc5f0\uad6c\uc758 \uc18d\ub3c4\uc640 \uc815\ud655\uc131\uc744 \uc800\ud558\ud560 \uac00\ub2a5\uc131\uc774 \ud07d\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\ub294 \uacbd\uc6b0, \ud658\uc790\ub4e4\uc5d0\uac8c \uc0c8\ub85c\uc6b4 \uce58\ub8cc\uc81c\ub97c \uc81c\uacf5\ud558\ub294 \uc18d\ub3c4\uac00 \ud06c\uac8c \uc800\ud558\ub420 \uc218 \uc788\uc73c\uba70, \uc774\ub294 \uc911\uc99d \uc9c8\ud658\uc744 \uc553\uace0 \uc788\ub294 \ud658\uc790\ub4e4\uc758 \uace0\ud1b5\uc744 \uc774\uc5b4\uac08 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud5c8\uc6a9\ud558\uc9c0 \uc54a\uc744 \uacbd\uc6b0, \uc778\uac04 \uc784\uc0c1 \uc2dc\ud5d8\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c\uc758 \uc548\uc804\ud55c \uc804\ud658\uc774 \uc5b4\ub824\uc6cc\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9ce\uc740 \uc911\uc694\ud55c \uc758\ud559\uc801 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub294 \ubd88\uac00\ub2a5\ud588\uc744 \uac83\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\ub2e4\uba74 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uc911\uc694\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc774 \uc9c0\uccb4\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc804\uba74 \uae08\uc9c0\ud560 \uacbd\uc6b0, \uc2e0\uc57d\uc758 \uc548\uc804\uc131\uacfc \uc720\ud6a8\uc131\uc744 \uac80\uc99d\ud560 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \ud070 \ucc28\uc9c8\uc774 \ubc1c\uc0dd\ud558\uac8c \ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \uae08\uc9c0\ud558\ub294 \uac83\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc758 \uc9c4\uc804\uc744 \ub2a6\ucd9c \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uc704\ud55c \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c\uc758 \ub3d9\ubb3c \uc2e4\ud5d8 \uc911\ub2e8\uc740 \ub354 \ub9ce\uc740 \uace0\ud1b5\uacfc \uc8fd\uc74c\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud56d\uc0c1 \ub300\uccb4\ub420 \uc218 \uc5c6\ub2e4\ub294 \uc810\uc5d0\uc11c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc804\uba74\uc801\uc73c\ub85c \uae08\uc9c0\ud558\ub294 \uac83\uc740 \uc778\uac04 \uac74\uac15\uc758 \uc704\ud5d8\uc744 \uc99d\uac00\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc2e4\ud5d8\ub3d9\ubb3c\uc744 \uc0ac\uc6a9\ud558\uc9c0 \uc54a\uace0\ub294 \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \ub300\uc548\uc744 \ud1b5\ud574 \uc2e0\uc57d\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ub3d9\uc77c\ud558\uac8c \ud3c9\uac00\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc5f0\uad6c\ub97c \uc81c\ud55c\ud55c\ub2e4\uba74, \uc774\ub294 \uc2e0\uc18d\ud558\uac8c \uc0c8 \uce58\ub8cc\ubc95\uc744 \ud655\ubcf4\ud558\ub294 \ub370 \uc9c0\uc7a5\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc73c\uba74 \ub9ce\uc740 \uc0c8\ub85c\uc6b4 \uc57d\ubb3c\uacfc \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \uc720\ud6a8\uc131\uc744 \uc785\uc99d\ud558\uae30\uac00 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc774\ub294 \uc9c8\ubcd1 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc774 \uc2ec\uac01\ud558\uac8c \uc800\ud574\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc5c8\ub2e4\uba74 \ud604\uc7ac\uc758 \uc0dd\uc758\ud559\uc801 \ubc1c\uc804\uc740 \ubd88\uac00\ub2a5\ud588\uc744 \uac83\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc758 \uc18d\ub3c4\uac00 \ub290\ub9ac\uac70\ub098 \ubd88\ud655\uc2e4\ud55c \uc0c1\ud669\uc5d0\uc11c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \uc911\uc9c0\ud55c\ub2e4\uba74 \uc911\uc694\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc774 \uc9c0\uc5f0\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ubc30\uc81c\ud560 \uacbd\uc6b0, \uc2e4\ud5d8\uc758 \uc2e0\ub8b0\uc131\uacfc \uc548\uc804\uc131\uc744 \ub2f4\ubcf4\ud560 \uc218 \uc5c6\ub294 \ubb38\uc81c\uc5d0 \uc9c1\uba74\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc5f0\uad6c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\ub294 \uacbd\uc6b0, \uc2e4\ud5d8\uc744 \uc9c4\ud589\ud558\uae30 \uc2e4\uc81c\ub85c\ub294 \ud070 \uc704\ud5d8\uc774 \uc218\ubc18\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc989\uac01\uc801\uc778 \uc911\ub2e8\uc740 \uc5f0\uad6c \uc9c4\uc804\uc758 \uc2ec\uac01\ud55c \uc9c0\uc5f0\uc744 \ucd08\ub798\ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc644\uc804\ud558\uac8c \ubc30\uc81c\ub41c\ub2e4\uba74 \uc5f0\uad6c\uc758 \uc9c4\ud589\uacfc \ud6a8\uc728\uc131\uc5d0 \uc0c1\ub2f9\ud55c \uc81c\uc57d\uc774 \uc0dd\uae38 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \uac83\uc740 \ub9e4\uc6b0 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \uae08\uc9c0\ud558\uba74 \ud604\ub300 \uc758\ud559 \ubc1c\uc804\uc774 \ud06c\uac8c \uc800\ud574\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc5c8\ub2e4\uba74 \uc218\ub9ce\uc740 \u 3c\ub85c \ub354 \ud22c\uba85\ud558\uace0 \ucc45\uc784 \uc788\uac8c \uc218\ud589\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub354\ubd88\uc5b4, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ub192\uc77c \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uce21\uba74\uc5d0 \ub300\ud55c \ub17c\uc758\ub294 \uacc4\uc18d\ub418\uc5b4\uc57c \ud558\uba70, \uc774\ub97c \ud1b5\ud574 \ub354\uc6b1 \ubc1c\uc804\ub41c \uac1c\uc120 \ubc29\uc548\ub3c4 \ucc3e\uc544\ub0bc \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc724\ub9ac\uc801 \uc811\uadfc\uc740 \ub3d9\ubb3c \uc2e4\ud5d8 \ubc29\ubc95\uc758 \uc9c0\uc18d\uc801\uc778 \uac1c\uc120\uacfc \ubc00\uc811\ud788 \uc5f0\uacb0\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uc724\ub9ac\uc801 \ucc98\uc6b0 \uac1c\uc120\uc744 \uc704\ud55c \ub178\ub825\uc740 \uacc4\uc18d\ub418\uace0 \uc788\uc73c\uba70, \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc5d0 \ub300\ud55c \ud22c\uba85\uc131\uc774 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ub300\uccb4 \uc2e4\ud5d8\ubc95\uc758 \ubc1c\uc804\uacfc \ud65c\uc6a9\uc744 \ud1b5\ud574 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ub192\uc77c \uc218 \uc788\ub294 \uac00\ub2a5\uc131\uc774 \ucee4\uc9c0\uace0 \uc788\ub2e4\ub294 \uc810\uc740 \ubd84\uba85\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uce21\uba74\uc744 \uac1c\uc120\ud558\uae30 \uc704\ud55c \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc7a5\uae30\uc801\uc73c\ub85c \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \ub2e4\ud558\uace0 \uc778\ub958\uc758 \uc9c4\ubcf4\ub97c \uc774\ub8e8\uae30 \uc704\ud55c \ud544\uc218\uc801\uc778 \ubaa9\ud45c\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c\uc758 \uc0dd\uba85\uc744 \uc874\uc911\ud558\uba70 \uae30\uc220\uc744 \ubc1c\uc804\uc2dc\ud0a4\ub294 \ub178\ub825\uc740 \uc9c0\uc18d\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \ub098\uc544\uac00\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790\uac00 \uc9c4\ud589\ub428\uc5d0 \ub530\ub77c \ub3d9\ubb3c \uc2e4\ud5d8 \uc790\uccb4\ub3c4 \ub354\uc6b1 \uc724\ub9ac\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc73c\ub85c \uc218\ud589\ub420 \uc218 \uc788\ub294 \ubc29\ud5a5\uc73c\ub85c \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uace0\ub824\uc5d0 \ube44\ucd94\uc5b4 \ubcfc \ub54c, \ub9ce\uc740 \uc5f0\uad6c \uae30\uad00\uc774 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uac1c\uc120\ud558\uae30 \uc704\ud55c \ub178\ub825\uc744 \uc9c0\uc18d\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uad00\uc810\ub3c4 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\uace0 \uc788\ub294 \uc0ac\ub840\uac00 \ub9ce\uc774 \ubc1c\uc0dd\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub530\ub974\ub294 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \uae30\uc220\uc801 \ubc1c\uc804\uc740 \uc2e4\ud5d8 \uc790\uccb4\uc758 \ud658\uacbd\uacfc \uc870\uac74\uc744 \uac1c\uc120\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uae30\uc5c5\ub4e4\uc740 \ub300\uccb4 \uae30\uc220\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcd1\ud589 \ud65c\uc6a9\ud558\uc5ec \uc5f0\uad6c\uc758 \uc815\ud655\uc131\uacfc \uc724\ub9ac\uc131\uc744 \ub192\uc774\ub824\uace0 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc5f0\uad6c\uc790\ub4e4\uc740 \uc774\ubbf8 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uacfc \uc724\ub9ac\uc801 \uae30\uc900 \uac1c\uc120\uc5d0 \uc9d1\uc911\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub2f9\uc7a5 \ubc30\uc81c\ud560 \uc218 \uc5c6\ub294 \ud604\uc2e4\uc801 \uc774\uc720\uc640\uc758 \uade0\ud615\uc744 \uc720\uc9c0\ud558\uae30 \uc704\ud55c \uac83\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc5f0\uad6c\uc790\ub4e4\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uc5ec \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \uae30\uc900\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub05d\uc73c\ub85c, \uc9c0\uc18d\uc801\uc778 \ud22c\uc790\uc640 \uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud574 \ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud568\uacfc \ub3d9\uc2dc\uc5d0, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uacfc \uc548\uc804\uc131\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ud574\ub098\uac00\ub294 \ubc29\ud5a5\uc73c\ub85c \ub098\uc544\uac00\uc57c \ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc724\ub9ac\uc5d0 \ub300\ud55c \uc758\uc2dd\uc774 \ub192\uc544\uc9c0\ub294 \ub9cc\ud07c, \uc5c5\uacc4\ub294 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc758 \ubc1c\uc804\uc744 \uc801\uadf9\uc801\uc73c\ub85c \ucd94\uad6c\ud558\uace0 \uc788\ub294 \uac83\ub3c4 \uc0ac\uc2e4\uc785\ub2c8\ub2e4","\ub610\ud55c, \uc9c0\uc18d\uc801\uc778 \uc724\ub9ac\uc801 \uac1c\uc120\uc774 \uc2dc\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uc744 \uac15\ud654\ud558\ub294 \ub370\uc5d0\ub3c4 \uc9c0\uc18d\uc801\uc778 \ud22c\uc790\uac00 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801\uc778 \uc9c EA="},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\ud604\uc7ac \uae30\uc220\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \uc644\uc804\ud788 \uad6c\ud604\ud558\ub294 \uac83\uc774 \ubd88\uac00\ub2a5\ud558\uba70, \uc774\ub7ec\ud55c \uc0c1\ud669\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub05d\uc73c\ub85c, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ud55c\uacc4 \ub54c\ubb38\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc644\uc804\ud55c \ub300\uc548\uc774 \ub9c8\ub828\ub418\uc9c0 \uc54a\uc558\ub2e4\ub294 \uc810\uc5d0\uc11c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc740 \uc5ec\uc804\ud788 \ub192\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uae30\uc220\uc774 \ud604\uc7ac\ub85c\uc11c\ub294 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uc9c0 \ubabb\ud558\uae30 \ub54c\ubb38\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc5ec\uc804\ud788 \ud55c\uacc4\uac00 \uc788\ub2e4\ub294 \uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub9ce\uc740 \uacbd\uc6b0, \ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \ub9cc\ud07c \ucda9\ubd84\ud788 \ubc1c\ub2ec\ub418\uc9c0 \uc54a\uc558\uae30 \ub54c\ubb38\uc5d0 \uc911\uc99d \uc9c8\ud658\uc758 \uc5f0\uad6c\uc5d0\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc740 \ud604\uc7ac \uc0c1\ud669\uc5d0\uc11c \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \ubc1c\ub2ec\ud558\uc9c0 \uc54a\uc558\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub300\uc548\uc801 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\ub2ec\ub418\uc9c0 \uc54a\uc558\uae30 \ub54c\ubb38\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud55c \uc774\uc720\ub294 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \uc544\uc9c1 \uc874\uc7ac\ud558\uc9c0 \uc54a\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac\ub85c\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc989\uc2dc \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc740 \ubd80\uc871\ud558\uba70, \ub300\uc548\uc774 \uac1c\ubc1c\ub418\uae30 \uc804\uae4c\uc9c0\ub294 \ud544\uc218\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc73c\ub85c \ub0a8\uc544\uc788\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \ubd80\uc871\uc73c\ub85c \uc778\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc774\ub77c\ub294 \uc810\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud558\uc9c0 \uc54a\ub2e4\ub294 \uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1\uae4c\uc9c0 \ub9ce\uc740 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uc874\uc7ac\ud558\uc9c0 \uc54a\ub294\ub2e4\ub294 \uc810\uc5d0\uc11c \ud544\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \uc544\uc9c1 \uc644\uc804\ud788 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc740 \uc0c1\ud669\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc5c6\uc5b4\uc11c\ub294 \uc548 \ub420 \uc694\uc18c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804 \uc18d\ub3c4\uc640 \ud55c\uacc4\ub97c \uac10\uc548\ud560 \ub54c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2f9\uc7a5\uc5d0 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \ub9cc\ud55c \uc644\uc804\ud55c \ubc29\ubc95\uc774 \uc544\uc9c1 \uc874\uc7ac\ud558\uc9c0 \uc54a\uae30 \ub54c\ubb38\uc5d0 \ud604\uc7ac\ub85c\uc11c\ub294 \ud544\uc218\uc801\uc778 \uc5f0\uad6c \uc218\ub2e8\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc774 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac \uc6b0\ub9ac\uc758 \uacfc\ud559\uc801 \uc694\uad6c\ub97c \ucda9\uc871\uc2dc\ud0a4\uc9c0 \ubabb\ud558\ub294 \uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uc548\uc801\uc73c\ub85c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \uc544\uc9c1 \uc81c\ud55c\uc801\uc774\uae30 \ub54c\ubb38\uc5d0 \ub2f9\ubd84\uac04 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc758 \ud55c\uacc4\uac00 \uc874\uc7ac\ud558\uae30 \ub54c\ubb38\uc5d0 \uc544\uc9c1\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud55c \ub54c\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc740 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc758 \ud55c\uacc4\uc131\uc5d0 \uc758\ud574 \ub4b7\ubc1b\uce68\ub429\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ucda9\ubd84\ud55c \ub300\uc548\uc774 \uc544\uc9c1 \uc5c6\ub2e4\ub294 \uc810\uc5d0\uc11c \uc2e4\uc9c8\uc801\uc778 \ud544\uc694\uc131\uc774 \ud07d\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\ub978 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\ub2ec\ud558\uc9c0 \uc54a\uc558\uae30 \ub54c\ubb38\uc5d0 \ubd88\uac00\ud53c\ud55c \ b3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc0c8\ub85c\uc6b4 \uae30\uc220 \uac1c\ubc1c\uc774 \uc9c4\ud589 \uc911\uc774\uae34 \ud558\ub098, \uc544\uc9c1 \uc138\uacc4\uc801 \uaddc\uaca9\uc5d0 \ucda9\ubd84\ud788 \ub9de\uc9c0 \uc54a\uc73c\uba70 \uc5ec\ub7ec \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \ud604\uc7ac \uad6c\ud604 \uac00\ub2a5\ud55c \ubaa8\ub4e0 \ub300\uccb4 \ubc29\ubc95\uc774 \uc0ac\uc6a9\ub41c \uc774\ud6c4\uc5d0\ub3c4, \uc5ec\uc804\ud788 \ud574\uacb0\ub418\uc9c0 \uc54a\ub294 \ubb38\uc81c\ub4e4\uc774 \uc874\uc7ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub3c4 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud560 \uc0c8\ub85c\uc6b4 \ub300\uc548\uc744 \ucc3e\ub294 \uc5f0\uad6c\uac00 \ud65c\ubc1c\ud558\uac8c \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uae30\uc874 \uc2e4\ud5d8 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc558\ub2e4\ub294 \uc810\uc5d0\uc11c \ud544\uc694\uc131\uc744 \uac00\uc9d1\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220\uc758 \ubc1c\uc804\uc744 \ud1b5\ud574 \uac00\ub2a5\ud55c \ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uace0 \uc788\uc9c0\ub9cc, \uc9c0\uae08 \ub2f9\uc7a5 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc804\uc801 \uae08\uc9c0\ub294 \ud604\uc2e4\uc801\uc73c\ub85c \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220 \ubc1c\uc804\uc774 \ube60\ub974\uac8c \uc9c4\ud589\ub418\uace0 \uc788\uc9c0\ub9cc, \uadf8\ub7fc\uc5d0\ub3c4 \ud604\uc7ac\uc758 \ud55c\uacc4\uc810\uc744 \uace0\ub824\ud560 \ub54c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc740 \uc5ec\uc804\ud788 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c\uc744 \uc0ac\uc6a9\ud558\uc9c0 \uc54a\ub294 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc644\uc804\ud788 \ubc1c\uc804\ud558\uae30 \uc804\uae4c\uc9c0\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \ud544\uc694\ud558\ub2e4\ub294 \ud604\uc2e4\ub3c4 \ubb34\uc2dc\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc73c\ub85c \uc81c\uc2dc\ub418\ub294 \uae30\uc220\ub4e4\uc740 \uc5ec\uc804\ud788 \ub9ce\uc740 \uc81c\ud55c\uc810\uc744 \uac00\uc9c0\uace0 \uc788\uc73c\uba70, \uc644\uc804\ud55c \ub300\uccb4 \uc218\ub2e8\uc774 \ub418\uae30 \uc704\ud574\uc11c\ub294 \ucd94\uac00\uc801\uc778 \uc5f0\uad6c \uac1c\ubc1c\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \ub300\uccb4 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \uac1c\ubc1c\ub418\uae30 \uc804\uae4c\uc9c0\ub294 \uae30\uc874\uc758 \ubc29\ubc95\uc778 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc9c0\uc18d\ud558\ub294 \uac83\uc774 \ud604\uc2e4\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uae30\uc220\uc774 \ubbf8\ub798\uc5d0 \ubc1c\uc804\ud558\ub354\ub77c\ub3c4 \ud604\uc2dc\uc810\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uacfc \ud65c\uc6a9\uc740 \uacc4\uc18d \uc774\ub8e8\uc5b4\uc838\uc57c \ud558\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \uc774\ub974\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc758 \ubc1c\uc804 \uac00\ub2a5\uc131\uc744 \uace0\ub824\ud558\uba74\uc11c\ub3c4 \ud604\uc7ac \uc0c1\ud0dc\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uae30 \ub54c\ubb38\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc740 \uafb8\uc900\ud788 \uc9c4\ud589\ub418\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc5f0\uad6c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \ubc1c\ub2ec\ud558\uc9c0 \uc54a\uc740 \uc0c1\ud669\uc5d0\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ube44\ub85d \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95 \uac1c\ubc1c\uc774 \uc7a5\uae30\uc801\uc73c\ub85c \uc911\uc694\ud558\ub2e4 \ud560\uc9c0\ub77c\ub3c4, \ud604\uc7ac \uc0c1\ud669\uc5d0\uc11c\ub294 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ube44\ub3d9\ubb3c \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \uc9c0\uc6d0\uc774 \ud544\uc694\ud558\uc9c0\ub9cc, \uc0ac\ub78c\ub4e4\uc774 \uc9c1\uba74\ud55c \uae34\uae09\ud55c \uc758\ub8cc\uc801 \ud544\uc694\ub97c \uc989\uac01\uc801\uc73c\ub85c \ud574\uacb0\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c \uc804\uae4c\uc9c0\ub294 \uc2e0\uc18d\ud55c \ub300\uc751\uc774 \uac00\ub2a5\ud558\uac8c \ud574\uc90d\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uc2dc\ud5d8\ubc95\uc774 \uc544\uc9c1 \ucda9\u 0 \uc218 \uc788\uc744 \ub9cc\ud07c \ucda9\ubd84\ud788 \uc131\uc219\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8 \ub300\uccb4 \uc5f0\uad6c\uc5d0 \ub354 \ub9ce\uc740 \ud22c\uc790\uac00 \ud544\uc694\ud558\ub2e4\ub294 \uc8fc\uc7a5\uc5d0\ub294 \ub3d9\uc758\ud558\uc9c0\ub9cc, \uadf8\ub7ec\ud55c \ub300\uccb4 \ubc29\uc548\uc774 \ubaa8\ub4e0 \uc5f0\uad6c\uc5d0\uc11c \uc989\uac01\uc801\uc73c\ub85c \uac00\ub2a5\ud558\uc9c0 \uc54a\ub2e4\ub294 \ud604\uc2e4\uc801 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub354 \ub098\uc740 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc704\ud55c \uc790\uc6d0 \ud22c\uc785\uc774 \uc808\uc2e4\ud558\ub2e4\ub294 \uc810\uc5d0\ub294 \uc774\uacac\uc774 \uc5c6\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc774\ub7ec\ud55c \ubc29\ubc95\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc9c0\uc18d\uc801 \ud22c\uc790\uac00 \ud544\uc694\ud558\uc9c0\ub9cc, \uadf8\ub3d9\uc548 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc5ed\ud560\uc774 \ubd88\uac00\ud53c\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc804\uc801\uc73c\ub85c \uc758\uc874\ud558\uae30\uc5d0\ub294 \uc544\uc9c1 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc758 \ubc1c\uc804\uc744 \uac00\uc18d\ud654\ud574\uc57c \ud55c\ub2e4\ub294 \uc8fc\uc7a5\uc5d0 \ub3d9\uc758\ud558\uc9c0\ub9cc, \ud604\uc2dc\uc810\uc5d0\uc11c \uc774\ub7ec\ud55c \ubc29\ubc95\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubcf5\uc7a1\uc131\uacfc \uc815\ud655\uc131\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc5d0 \ub300\ud55c \ud22c\uc790\uc640 \uac1c\ubc1c\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \ubaa8\ub378\uc774 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \ud1b5\ud569\uc801 \ub370\uc774\ud130\ub97c \uc644\ubcbd\ud788 \ub300\uccb4\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc758 \ubc1c\uc804 \uac00\ub2a5\uc131\uc740 \ubd84\uba85\ud788 \uc911\uc694\ud558\uc9c0\ub9cc, \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc815\ub3c4\uc758 \uc2e0\ub8b0\uc131\uacfc \ud3ec\uad04\uc131\uc744 \ubcf4\uc7a5\ud558\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c \uac15\ud654\ub97c \ud1b5\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc77c \uc218 \uc788\uc9c0\ub9cc, \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \uc544\uc9c1 \uc5c6\uc2b5\ub2c8\ub2e4","\ubb34\uace0\ud55c \uc0dd\uba85\uc744 \ubcf4\ud638\ud558\ub294 \uac83\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac \ub300\uccb4 \ubaa8\ub378\uc740 \uc544\uc9c1 \ubaa8\ub4e0 \uc5f0\uad6c\uc758 \uacbd\uc6b0\ub97c \ud3ec\uad04\uc801\uc73c\ub85c \ub300\uccb4\ud560 \ub9cc\ud07c \ubc1c\uc804\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ubc1c\uc804\uc744 \ud1b5\ud574 \ub3d9\ubb3c \uc2e4\ud5d8 \uc758\uc874\ub3c4\ub97c \uc904\uc774\ub824\ub294 \ub178\ub825\uc740 \ubd84\uba85\ud788 \ud544\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc774\ub7ec\ud55c \ubc29\ubc95\ub4e4\uc774 \ubaa8\ub4e0 \uc5f0\uad6c\ub97c \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ub2e8\uacc4\uc5d0 \uc774\ub974\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ubc1c\uc804\uc774 \ud544\uc694\ud558\ub2e4\ub294 \uc810\uc740 \ub9de\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \ub9cc\ud07c \ud6a8\uacfc\uc801\uc774\uace0 \ucda9\ubd84\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \uc5c6\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uc740 \ubb3c\ub860 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc644\uc804\ud55c \ub300\uc548\uc774 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uace0 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\ub4e4\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\ub294 \uac83\uc740 \uae0d\uc815\uc801\uc774\ub098, \uc774\ub7ec\ud55c \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \ubaa8\ub4e0 \uc5f0\uad6c \uc0c1\ud669\uc5d0 \uc801\uc6a9\ub420 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \uac1c\ubc1c\uacfc \uac1c\uc120\uc740 \ub9e4\uc6b0 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\uae4c\uc9c0 \uc774\ub7ec\ud55c \ubc29\ubc95\ub4e4\uc740 \uc804\ud1b5\uc801\uc778 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubaa8\ub4e0 \uae30\ub2a5\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \ub300\uccb4 \uae30\uc220\uc774 \uc801\uadf9 \uc5f0\uad6c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc774\ub97c \uc11c\ub450\ub974\ub294 \uac83\ub9cc\uc774 \ub2f5\uc740 \uc544\ub2d9\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc758\uc874\uc131\uc744 \uc904\uc774\ub294 \uac83\uc774 \ud544\uc694\ud558\ub2e4\ub294 \uc810\uc5d0\uc11c \uacf5\uac10\ud558\uc9c0\ub9cc, GlaxoSmithKline(GSK)\uc640 \uac19\uc740 \uc2e0\uc57d \uac1c\ubc1c \uae30\uc5c5\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc774\ub7ec\ud55c \ub300\uccb4 \ubc29\ubc95\uc774 \uc644\uc804\ud788 \uc2e4\ud6a8\uc131\uc744 \ubc1c\ud718\ud558\uc9c0 \uc54a\ub294\ub2e4\uace0 \uc9c0\uc801\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc758 \ubc1c\uc804\uc774 \uc911\uc694\ud558\ub2e4\ub294 \uc8fc\uc7a5\uc740 \ub9de\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\ubcbd\ud788 \ub300\uccb4\ud560 \ubc29\ubc95\uc774 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \ubd84\uba85\ud788 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc874\ud558\ub294 \uae30\uc220\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc0c1\ud0dc\ub294 \uc544\ub2d9\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220\uc758 \ubc1c\uc804\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc544\uc9c1\uae4c\uc9c0\ub294 \uc81c\ud55c\ub41c \ubd80\ubd84\uc801\uc73c\ub85c \uc2e4\ud604\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc2e4\uc815\uc785\ub2c8\ub2e4","\uba3c\uc800, \ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc774 \uc911\uc694\ud55c \uac83\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc, \ud604\uc7ac \uc644\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc740 \uc874\uc7ac\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc0c1\ud669\uc785\ub2c8\ub2e4","\ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc73c\ub85c\uc758 \uc804\ud658\uc740 \ubb3c\ub860 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc774 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc740 \uc0c1\ud669\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc5d0 \ub354 \ub9ce\uc740 \uc790\uc6d0\uacfc \ub178\ub825\uc744 \ud22c\uc785\ud558\ub294 \uac83\ub3c4 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc0c1\ud669\uc774\ubbc0\ub85c \uc5f0\uad6c\ub97c \ud3ec\uae30\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud55c \ub300\uccb4 \ubc29\ubc95\uc5d0 \ub300\ud55c \ud22c\uc790\uc640 \uc5f0\uad6c\uac00 \uc911\uc694\ud558\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ub178\ub825\uc774 \ubaa8\ub4e0 \uc5f0\uad6c\uc5d0 \uc989\uac01\uc801\uc73c\ub85c \uc801\uc6a9\ub420 \uc218 \uc788\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\ube44\ub3d9\ubb3c \uc2e4\ud5d8 \ubc29\ubc95\ub3c4 \uc5f0\uad6c\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uc0c1\ud669\uc744 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"28_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","28_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"kpXdQPCC20DCttpAag\u002fcQGzs1kDGUN1AyJHQQL\u002fK2kDJcdRAMWPRQGiQ0ECzrM9Akm\u002fRQFIf1kBt6ddAkqPQQKIS0UCuSM9AXQnRQH7l10DU6MtAGb\u002fQQLfI1UDBy9FAiXDTQKu51UDzRd1A+C3RQAtF00AT5tRA"},"y":{"dtype":"f4","bdata":"rtEEQRdIBkG1\u002fQNB6b4DQRNEBUFKjANB5gkCQaLMA0HfFgZBkzYHQZdEA0GOIwRBBNgDQcdMBkFE2QVBhTcDQQkaBkHdSQhBbEADQS8dBkEkugdBJ3QBQRIDCEFzfgZB1RoHQe+KBUFWmANBLjEDQVvNBkFuEgVB"},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc218\ub9ce\uc740 \uc0dd\uba85\uc744 \uad6c\ud558\uace0, \uc778\uac04\uc5d0\uac8c \ub3c4\uc6c0\uc744 \uc8fc\uae30 \uc704\ud574 \ubd88\uac00\ud53c\ud55c \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\uae30 \uc704\ud55c \ub3c4\uad6c\ub85c\uc11c \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud574\uc654\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c,  \ub300\uc2e0\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac\uc758 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uad8c\ub9ac\uc5d0 \ub300\ud55c \uc6b0\ub824\uc5d0 \ub300\ud574\uc11c, Charles River Laboratories\ub294 \ud604\uc7ac \ub3d9\ubb3c \ub300\uccb4 \uc2dc\ud5d8\uc774\ub098 \uc778\uacf5 \uc7a5\uae30 \ub4f1\uc774 \uc644\ubcbd\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uc2e4\ud5d8\uc758 \ub300\uc548\uc73c\ub85c \uc81c\uc2dc\ub418\ub294 \ub9ce\uc740 \ubc29\ubc95\ub4e4\uc774 \uc5ec\uc804\ud788 \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \uc788\uc5b4 \ub3d9\ubb3c \ubaa8\ub378\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ud604\uc7ac\uc758 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \uc5ec\uc804\ud788 \uc2e4\ud5d8 \ub3d9\ubb3c\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac \uac1c\ubc1c\ub41c \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \uc644\ubcbd\ud558\uac8c \ub3d9\ubb3c \ubaa8\ub378\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac\uc758 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \ub3d9\ubb3c \ubaa8\ub378\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac\uc758 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud6a8\uc728\uc131\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubaa8\ub4e0 \uc5f0\uad6c\uc801 \uac00\uce58\ub97c \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \uae30\uc220\ub85c\ub294 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubaa8\ub4e0 \uc0c1\ud669\uc5d0\uc11c da9\ubd84\ud788 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc558\ub2e4\ub294 \uc810\uc744 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\uc758 \uc911\uc694\uc131\uc740 \ub204\uad6c\uc5d0\uac8c\ub098 \uacf5\uac10\ud560 \uc218 \uc788\ub294 \uc8fc\uc81c\uc774\uc9c0\ub9cc, \ud604\uc2e4\uc801\uc73c\ub85c \ud604\uc874\ud558\ub294 \uae30\uc220\ub85c\ub294 \ubaa8\ub4e0 \uc9c8\ubcd1 \uc5f0\uad6c\ub97c \ub300\uccb4\ud558\uae30\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc724\ub9ac\uc801 \ubb38\uc81c \ud574\uacb0\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc73c\ub098, \ud604 \uc2dc\uc810\uc5d0\uc11c \uc804\uccb4\uc801\uc778 \uc2e0\ub8b0\uc131\uc744 \ubcf4\uc7a5\ud558\uae30\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubc18\ub300\uc5d0 \ub300\ud55c \uac00\uc7a5 \ud070 \ubc18\ub860\uc740 \ub300\uc548\uc758 \ubd80\uc7ac\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \ud56d\uc0c1 \uace0\ub824\ub418\uc5b4\uc57c \ud558\ub294 \uc911\uc694 \uc0ac\uc548\uc774\uc9c0\ub9cc, \ud604\uc7ac \uac1c\ubc1c\ub41c \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc73c\ub85c\ub294 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \ub2e4\ub8f0 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc2e4\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc989\uac01 \uc911\ub2e8\ud558\ub294 \uac83\uc740 \uac00\ub2a5\ud558\uc9c0 \uc54a\uc9c0\ub9cc, \uacfc\ud559\uc801 \ubc1c\uc804\uacfc \uc724\ub9ac\uc801 \uace0\ucc30\uc740 \ub3d9\uc2dc\uc5d0 \uc9c4\ud589\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc744 \uc9c0\uc6d0\ud558\ub294 \uac83\uc740 \ubd84\uba85\ud788 \uc911\uc694\ud558\uc9c0\ub9cc, \uadf8 \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uac00\uce58\ub97c \ud3c4\ud558\ud574\uc11c\ub294 \uc548 \ub429\ub2c8\ub2e4","\ud604\uc7ac\uc758 \uae30\uc220 \ubc1c\uc804 \uc18d\ub3c4\uac00 \uc724\ub9ac\uc801 \uae30\ub300\ub97c \ucda9\uc871\uc2dc\ud0a4\uc9c0 \ubabb\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \ubd80\uc778\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub2f9\uba74\ud55c \ub3c4\ub355\uc801 \ubb38\uc81c\ub97c \uc778\uc815\ud558\uba74\uc11c\ub3c4, \ud604\uc7ac\ub85c\uc11c\ub294 \uc774\ub7ec\ud55c \ub300\uccb4 \ubc29\ubc95\uc774 \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \uc801\uc6a9\ub420 \uc218 \uc5c6\ub2e4\ub294 \ud604\uc2e4\ub3c4 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \ubc29\ubc95\uc758 \ub9c8\ub828\uc740 \uc2dc\uac04\uc774 \uac78\ub9ac\uc9c0\ub9cc, \uae30\uc874 \uc5f0\uad6c\ub97c \ubcf4\uc644\ud558\uace0 \uc778\uac04\uacfc \ub3d9\ubb3c\uc758 \uc724\ub9ac\uc801 \ub300\uc6b0\ub97c \ub354 \uac15\ud654\ud558\ub294 \uc7a5\uae30\uc801 \ubc29\ud5a5\uc73c\ub85c \uc774\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uc6b0\ub824\ub294 \uc815\ub2f9\ud558\ub098, \ud604\uc7ac \uc0c1\ud0dc\uc5d0\uc11c \ub300\uccb4 \ubc29\ubc95\uc73c\ub85c \ubaa8\ub4e0 \uc5f0\uad6c \uc694\uad6c\ub97c \ucda9\uc871\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc5f0\uad6c\ub294 \uc724\ub9ac\uc801\uc73c\ub85c \uc801\uc808\ud55c \ub300\uc548\uc774 \ud604\uc7ac\ub85c\uc11c\ub294 \ubd80\uc871\ud558\ub2e4\ub294 \uc810\uc744 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc778\ub958\uc758 \uacfc\ud559\uc801 \ubc1c\uc804\uc740 \ud544\uc5f0\uc801\uc73c\ub85c \uc724\ub9ac\uc801 \ub17c\uc758\ub97c \uc694\uad6c\ud558\uc9c0\ub9cc, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubd88\ud544\uc694\ud558\uac8c \ub9cc\ub4dc\ub294 \uac83\uc774 \uc544\ub2d9\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ube44\ub85d \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc81c\uae30\ud558\uc9c0\ub9cc, \ub2e4\ub978 \ub300\uccb4 \ubc29\ubc95\uc774 \ud604\uc7ac\ub85c\uc11c\ub294 \uc644\uc804\ud55c \ub300\uc548\uc774 \ub418\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc57c\uae30\ud560 \uc218 \uc788\ub2e4\ub294 \uc810\uc740 \uc778\uc815\ud558\uc9c0\ub9cc, \ud604\uc7ac\uae4c\uc9c0 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc81c\ud55c\uc801\uc774\uba70 \uc2e4\ud5d8\uc758 \ubaa8\ub4e0 \uc870\uac74\uc744 \ucda9\uc871\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c \uc548\uc804\ud558\uace0 \uc724\ub9ac\uc801\uc778 \ubc29\ubc95\uc744 \uc0ac\uc6a9\ud55c \uc5f0\uad6c\uc758 \ud544\uc694\uc131\uc740 \uc99d\uac00\ud558\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uac00\uc9c0\ub294 \uc2e4\uc9c8\uc801\uc778 \uc911\uc694\uc131\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \uc774\ub974\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac \ubb38\uc81c\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\uc758 \ub300\uccb4 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \uc2e0\ub8b0\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc810\ub3c4 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \uc911\uc694\ud55c \uace0\ub824 \uc0ac\ud56d\uc774\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubaa8\ub4e0 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc758 \uc694\uad6c\ub97c \ucda9\uc871\uc2dc\ud0a4\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc724\ub9ac\uc801\uc73c\ub85c \ubb38\uc81c\uac00 \uc788\ub2e4\ub294 \ube44\ud310\uc774 \uc788\uc9c0\ub9cc, \uc774\ub7ec\ud55c \uc2e4\ud5d8\uc740 \uc0b0\ubc1c\uc801\uc778 \ub300\uccb4 \ubc29\ubc95\uc73c\ub85c\ub294 \uc5bb\uc744 \uc218 \uc5c6\ub294 \uadc0\uc911\ud55c \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\ub294 \ub3d
