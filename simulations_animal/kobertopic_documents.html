\uc2e4\ud5d8\uc758 \uc0ac\uc6a9\uc744 \uc904\uc774\uae30 \uc704\ud55c \ub178\ub825\uc774 \uafb8\uc900\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\ub3c4\ub97c \uc904\uc774\uae30 \uc704\ud55c \ub300\uccb4 \uc5f0\uad6c\ub294 \ud604\uc7ac\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \ub370\uc774\ud130\uc640 \uc0c1\ud638 \ubcf4\uc644\uc801\uc785\ub2c8\ub2e4","\uae30\uc220\uc774 \ubc1c\uc804\ud568\uc5d0 \ub530\ub77c \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\ub294 \ubc29\ubc95\ub3c4 \uc9c0\uc18d\uc801\uc73c\ub85c \ubaa8\uc0c9\ub418\uc5b4\uc57c \ud55c\ub2e4\ub294 \uc810\uc5d0 \ub3d9\uc758\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud55c \ub178\ub825\uc740 \uafb8\uc900\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, \ud2b9\uc815 \uc0c1\ud669\uc5d0\uc11c\ub294 \ub300\uccb4 \ubc29\ubc95\uc744 \uc6b0\uc120\uc801\uc73c\ub85c \ud65c\uc6a9\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \ub098\uc544\uac00\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub354\uc6b1\uc774, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \ubc1c\uc804\ub418\uc9c0 \uc54a\uc740 \uc0c1\ud669\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc7a0\uc7ac\uc801\uc73c\ub85c \uce58\uba85\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\ub294 \uc2e4\ud5d8\uc744 \ub300\uc2e0\ud560 \uc218 \uc788\ub294 \ud604\uc2e4\uc801\uc778 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub610\ud55c, \ud604\uc7ac \uae30\uc220\uc758 \ubc1c\uc804\uc73c\ub85c \uc778\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uce21\uba74\uc744 \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\ub4e4\uc774 \uc5f0\uad6c\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \ub9c8\ub828\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc6b0\uc120, \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uacfc \uc801\uc6a9\uc744 \ud1b5\ud574 \ub3d9\ubb3c \uc2e4\ud5d8 \ubc94\uc704\ub97c \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc740 \ud604\uc7ac\ub3c4 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc0ac\uc6a9\uc744 \uc904\uc774\uae30 \uc704\ud55c \ub300\uc548 \uae30\uc220\uc758 \ubc1c\uc804\uc740 \uacfc\ud559\uacc4 \ub0b4\uc5d0\uc11c \uc801\uadf9\uc801\uc73c\ub85c \uc7a5\ub824\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uc740 \uc9c0\uc18d\uc801\uc778 \ud22c\uc790\uc640 \uc5f0\uad6c\ub97c \ud1b5\ud574 \ub354\uc6b1 \ube60\ub974\uac8c \ubc1c\uc804\ud560 \uc218 \uc788\uc73c\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8 \uc758\uc874\ub3c4\ub97c \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ubc29\ubc95\uc744 \uc801\uadf9\uc801\uc73c\ub85c \ubaa8\uc0c9\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \uc774\ub97c \uc904\uc774\uace0\uc790 \ud558\ub294 \ub2e4\uc591\ud55c \ub178\ub825\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220\uc758 \ubc1c\uc804\uc744 \ud1b5\ud574 \uc758\ud559 \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc0ac\uc6a9\uc744 \uc904\uc774\ub824\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ucd94\uc9c4\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\ud654\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c\uc790\ub4e4\uc774 \ub300\uccb4 \ubc29\ubc95\uc744 \uc801\uadf9\uc801\uc73c\ub85c \uac1c\ubc1c\ud558\uace0 \ud655\uc7a5\ud558\ub294 \uac83\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc904\uc774\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc5d0 \ub300\ud55c \ud22c\uc790\uc640 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc77c \uc218 \uc788\ub294 \uc911\uc694\ud55c \uc694\uc18c\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uac10\uc18c\uc2dc\ud0ac \uc218 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub450 \uc811\uadfc \ubc29\uc2dd\uc774 \ud568\uaed8 \uc0ac\uc6a9\ub420 \ub54c \uac00\uc7a5 \ud6a8\uacfc\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \uc5f0\uad6c\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc7a5\uae30\uc801\uc73c\ub85c \uc904\uc774\ub294 \ubc29\ud5a5\uc73c\ub85c \ub098\uc544\uac00\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc810\ucc28\uc801\uc73c\ub85c \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud560 \uac83\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc810\ucc28\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\ub824\ub294 \ub178\ub825\uc740, \ub2e4\uc591\ud55c \uc9c8\ud658\uc5d0 \ub300\ud55c \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \uac00\ub2a5\uc131\uc744 \uc5f4\uc5b4\uc8fc\uba74\uc11c\ub3c4, \ud604\uc7ac\uc758 \uc758\ub8cc\uc801 \ud544\uc694\ub97c \ub3d9\uc2dc\uc5d0 \ucda9\uc871\uc2dc\ucf1c\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ud604\uc7ac \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\uc131\uc744 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc9c0\ub9cc, \uc9c0\uc18d\uc801\uc778 \uc5f0\uad6c\uc640 \uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud574 \uad81\uadf9\uc801\uc73c\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8 \uc758\uc874\ub3c4\ub97c \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud560 \uac83\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc758\uc874\uc131\uc744 \uc904\uc774\uae30 \uc704\ud574\uc11c\ub294 \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790 \uc18d\ub3c4\uac00 \ub354\uc6b1 \uac00\uc18d\ud654\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc9c0\uc18d \uac00\ub2a5\ud55c \uc5f0\uad6c\ub97c \uc704\ud55c \ub300\uccb4 \ubc29\ubc95\ub4e4\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\ub3c4\ub97c \uc810\ucc28 \uc904\uc77c \uc218 \uc788\ub3c4\ub85d \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc758\ud559 \uc5f0\uad6c\uc758 \uc9c4\ubcf4\ub97c \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ube44\uc911\uc744 \uc904\uc774\ub824\ub294 \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\ub2e4\ub294 \uc810\ub3c4 \uc8fc\ubaa9\ud574\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uacbd\uc6b0 \uc778\uac04 \ub300\uc0c1 \uc2e4\ud5d8\uc758 \uc704\ud5d8\uc744 \uc904\uc774\ub294 \ud544\uc218\uc801\uc778 \uac80\uc99d \uc218\ub2e8\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc5d0 \ub530\ub77c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \uac83\uc740 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc704\ud5d8\ud55c \uc2dc\ud5d8\uc744 \uc778\uac04\uc5d0\uac8c \uc801\uc6a9\ud558\ub294 \uac83\uc744 \ubc29\uc9c0\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d \uac1c\ubc1c\uc758 \ucd08\uae30 \uc2e4\ud328\ub97c \ub9c9\uc544\uc90d\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uac00\uc838\uc62c \uc218 \uc788\ub294 \uc704\ud5d8\uc744 \uc0ac\uc804\uc5d0 \uc904\uc774\ub294 \uc911\uc694\ud55c \uc218\ub2e8\uc774 \ub429\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \uc911\uc694\ud558\uba70, \uc774\ub97c \uc704\ud574 \ud601\uc2e0\uc801\uc778 \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\ub3c4 \uc801\uadf9\uc801\uc73c\ub85c \ucd94\uc9c4\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \ubc1c\uc804\uc758 \ud544\uc694\uc131\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\ub3c4\ub97c \uc904\uc774\uace0\uc790 \ud558\ub294 \uacfc\ud559\uc790\ub4e4\uacfc \uad00\ub828 \uc0b0\uc5c5\uc758 \ubaa9\ud45c\uc640 \ub9de\ubb3c\ub824 \uc788\uc2b5\ub2c8\ub2e4","\ub354\ubd88\uc5b4, \ub300\uc548\uc801 \ubc29\ubc95\ub4e4\uc774 \uac1c\ubc1c\ub428\uc5d0 \ub530\ub77c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc0ac\uc6a9\uc744 \uc904\uc774\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc758 \uac1c\ubc1c\uacfc \ud655\uc7a5\uc744 \uc704\ud574 \uad11\ubc94\uc704\ud55c \uc790\uc6d0\uc774 \ud22c\uc785\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc7a5\uae30\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\uc131\uc744 \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud560 \uac83\uc785\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc73c\ub85c\ub294 \uc5bb\uc744 \uc218 \uc5c6\ub294 \uc608\uce21 \ubd88\uac00\ub2a5\ud55c \ubd80\uc791\uc6a9\uc744 \ubc1c\uacac\ud558\ub294 \ub370 \uc6d0\ucc9c\uc801 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud55c \ub178\ub825\uc740 \uc774\ubbf8 \uc5ec\ub7ec \uc5f0\uad6c \uae30\uad00\uc5d0\uc11c \uc801\uadf9\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \ucd94\uc9c4\ub420 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uace0 \uac1c\uc120\ud558\ub294 \ub178\ub825\uc774 \ubcd1\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc2e4\ud5d8 \ub3d9\ubb3c\uc744 \uc904\uc774\uae30 \uc704\ud55c \ucca8\ub2e8 \uae30\uc220 \ud22c\uc790\ub3c4 \ubcd1\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \ud69f\uc218\ub97c \uc904\uc774\uae30 \uc704\ud55c \ub178\ub825\uc774 \uc774\ubbf8 \uc9c4\ud589 \uc911\uc774\uba70, \uc774\ub294 \uc5f0\uad6c \ucee4\ubba4\ub2c8\ud2f0\uc5d0\uc11c \uc911\uc694\ud558\uac8c \ub2e4\ub904\uc9c0\uace0 \uc788\ub294 \ubb38\uc81c\uc785\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\ub3c4\ub97c \uc904\uc774\uae30 \uc704\ud55c \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc774 \uac00\uc18d\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc774 \uc904\uc5b4\ub4e4 \uc218 \uc788\ub3c4\ub85d \uc9c0\uc18d\uc801\uc73c\ub85c \ub300\uc548\uc801 \ubc29\ubc95\uc744 \ubaa8\uc0c9\ud558\ub294 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\ub294 \uc778\uac04\uc5d0\uac8c \uc815\ubc00\ud55c \uc608\uce21 \uc815\ubcf4\ub97c \uc81c\uacf5\ud558\uc5ec \uc784\uc0c1 \uc2dc\ud5d8 \ub2e8\uacc4\uc758 \uc704\ud5d8\uc744 \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc9c1\uc811\uc801\uc778 \uc704\ud5d8\uc744 \uc904\uc774\ub294 \uc548\uc804\uc7a5\uce58\ub85c\uc11c \uae30\ub2a5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ucd95\uc18c\uc640 \ub354\ubd88\uc5b4 \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\ub3c4 \ubcd1\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \ub300\uc0c1 \uc2e4\ud5d8\uc744 \ub300\uc2e0\ud558\ub294 \uc548\uc804\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uae30\uc220\uc758 \ubc1c\uc804\uacfc \ud568\uaed8 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \uc810\ucc28 \uc801\uc6a9 \uac00\ub2a5\ud574\uc9c0\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uadf8 \ub3d9\uc548\uc5d0\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uac00\uc9c0\ub294 \uc2e4\uc9c8\uc801 \ud544\uc694\uc131\uc744 \uac10\uc548\ud560 \ub54c \uc774\ub7ec\ud55c \uc5f0\uad6c\ub294 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uc704\ud55c \ud76c\uc0dd\uc73c\ub85c \uac04\uc8fc\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc744 \uc0ac\uc6a9\ud558\uc9c0 \uc54a\uace0 \uc131\uacf5\uc801\uc778 \uc5f0\uad6c\ub97c \uc774\ub8e8\ub294 \uc0ac\ub840\uac00 \uc99d\uac00\ud558\uace0 \uc788\ub294 \ub9cc\ud07c, \uc774\ub97c \ud1b5\ud574 \uc5bb\uc740 \uae0d\uc815\uc801\uc778 \uacb0\uacfc\uac00 \ubbf8\ub798\uc758 \uc5f0\uad6c \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ud070 \uc601\ud5a5\uc744 \ubbf8\uce60 \uac83\uc73c\ub85c \uae30\ub300\ub429\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uc758\ud559\uc801 \ubc1c\uacac\uc744 \uc2dc\uc7a5\uc5d0 \ub0b4\ub193\uae30\uae4c\uc9c0\uc758 \uc2dc\uac04\uc744 \ub2e8\ucd95\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc704\ud5d8\ud560 \uc218 \uc788\ub294 \ucd08\uae30 \uc2e4\ud5d8 \ub2e8\uacc4\ub97c \ub300\uc2e0 \uc218\ud589\ud560 \uc218 \uc788\ub294 \ud6a8\uc728\uc801\uc778 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc758 \ubd88\ud655\uc2e4\uc131\uc744 \uac10\uc18c\uc2dc\ud0a4\ub294 \ub370 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc5f0\uad6c\uac00 \ub3d9\ubc18\ub418\uba74 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc774 \uc904\uc5b4\ub4e4 \uac00\ub2a5\uc131\uc774 \ub192\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc7a5\uae30\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uac10\uc18c\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\uae30 \uc704\ud55c \uae30\uc220 \ud22c\uc790\uc640 \ubcd1\ud589\ud558\uc5ec \ud604 \uc2dc\uc810\uc5d0\uc11c \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\uae30 \uc704\ud55c \uc2e4\uc9c8\uc801 \uc790\ub8cc\ub97c \uc81c\uacf5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc815\ubd80\uc640 \uae30\uad00\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\ub3c4\ub97c \uc904\uc774\uace0 \ub300\uccb4 \ubc29\ubc95\uc744 \uc7a5\ub824\ud558\uae30 \uc704\ud574 \uc815\ucc45\uacfc \uc790\uc6d0\uc744 \ub354\uc6b1 \uc9d1\uc911\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc810\uc9c4\uc801\uc73c\ub85c \ub300\uccb4 \ubc29\ubc95\uacfc \ubcf4\uc644 \uae30\uc220\uc774 \uac1c\ubc1c\ub418\uace0 \ucc44\ud0dd\ub428\uc5d0 \ub530\ub77c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\ub3c4\ub294 \uc904\uc5b4\ub4e4\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc801\uadf9\uc801\uc73c\ub85c \uc9c0\uc9c0\ud558\uba70 \ucd94\uc9c4\ud558\ub294 \uac83\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uac10\uc18c\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220 \ubc1c\uc804\uacfc \uc790\uc6d0 \ud22c\uc790\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc904\uc5ec \ub098\uac00\uaca0\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\uc131\uc740 \ubd80\uc778\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \ub300\uc0c1 \uc5f0\uad6c\uc5d0\uc11c \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \uc704\ud5d8\uc744 \uc904\uc774\ub294 \ub370 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uace0 \ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub178\ub825\uc740 \uc774\ubbf8 \ud65c\ubc1c\ud788 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uac8c\ub2e4\uac00 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc7a0\uc7ac\uc801\uc73c\ub85c \uc704\ud5d8\ud560 \uc218 \uc788\ub294 \uc5f0\uad6c\uac00 \uc778\uac04\uc5d0\uac8c \ubbf8\uce58\ub294 \ud53c\ud574\ub97c \uc0ac\uc804\uc5d0 \ubc29\uc9c0\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uacfc\ud559 \uacf5\ub3d9\uccb4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8 \uc0ac\uc6a9\uc744 \uc904\uc774\uae30 \uc704\ud574 \uc0c1\ub2f9\ud55c \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubd88\uac00\ud53c\ud55c \uacbd\uc6b0\uc5d0\ub3c4 \uac00\ub2a5\ud55c \ud55c \uadf8 \ube48\ub3c4\ub97c \ucd5c\uc18c\ud654\ud558\uace0 \uac1c\uc120\ud558\ub824\ub294 \ub178\ub825\uc774 \uc8fc\ubaa9\ubc1b\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubd80\ub2f4\uc744 \uc904\uc774\uace0, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \ucd09\uc9c4\ud558\ub294 \ub178\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ucc28\uc774\uac00 \uc2e4\ud5d8 \uacb0\uacfc\uc758 \uc801\uc6a9 \uac00\ub2a5\uc131\uc744 \uc81c\ud55c\ud560 \uc218 \uc788\ub2e4\ub294 \uc810\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc, \uc774\ub294 \uc2e0\uc911\ud55c \uc885 \uc120\ud0dd\uacfc \uc2e4\ud5d8 \uc124\uacc4\ub85c \ucd5c\uc18c\ud654\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud55c \uccb4\uacc4\uc801\uc774\uace0 \uad6d\uc81c\uc801\uc778 \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc9c4\ud589 \uc911\uc778 \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\uba74\uc11c\ub3c4 \uc0c8\ub85c\uc6b4 \ubc29\ubc95\uc744 \ubcd1\ud589\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"10_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","10_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"Qw0GQbx7BkEapwVBrDgLQSnIBUHLGz1BInIGQZINBkE95zpB6e4KQXM8BkGORApBddMJQYN4BkFtxAVBobkGQfyZB0FTTQpBsL0KQTpCC0G4wgdBdOsJQb2TBkHNRwxBdT0IQRn3CkGaqwZBKCg+QTtZCkEcKTpBWM05QZB\u002fPkFXXgdBaTkKQTPeBUFNGApBCLk5QSrdBUE9ED1B6OIJQbBVBUGttwlBnJwFQU5oPkHBTz9BvAMHQcKuP0HOxQxB1X4MQShmC0GkCz5Bb4o+QYKXCkGirQpBAHAHQdDECEGQNwpBvKIKQc3b\u002f0ALrD5BI8IFQcIBPUEDjAVBR\u002fwJQYeaDEHwKwpBDhgGQSsmB0HbChRB"},"y":{"dtype":"f4","bdata":"FDm+QANwvkBOR75A9Ca+QKNkvkCzROVA7hW+QNSTvkCNsuFA73G9QLLovkCX3LtADQi\u002fQNYyvkDsg75A6y2\u002fQIcsvkDMi79AXiC\u002fQKnpwkAIe75A1Ee\u002fQNKswEAFHsRAcXi5QDciwEAIGMBAzS3mQECrvkDDA+RAhzLkQE1j5UA9ib5Afd+9QCBUvkDBEMBAvyjkQAdCv0D4UeFAaHXAQJ3KvkD0M8BAX56+QC+I5kBQJehAKAi+QFdS6UB6WMVAJ5nDQC9BxECGF+ZA313mQAi8wEBYwMBA+MK1QNitt0D3QMBAPw6\u002fQAcXuUBzxOZAts2+QB3h5ECmDr5Agna\u002fQICXu0DTR8BAcUy\u002fQP7VvkDHV8dA"},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac \uae30\uc220\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc, \uc774\ub7ec\ud55c \uae30\uc220\ub4e4\uc774 \uc544\uc9c1 \ub3d9\ubb3c \ubaa8\ub378\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \ub9cc\ud07c \uc131\uc219\ud558\uc9c0 \uc54a\uc558\ub2e4\ub294 \uc810\ub3c4 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc644\ubcbd\ud55c \uc778\uccb4 \ubaa8\ub378\uc744 \uc81c\uacf5\ud558\uc9c0\ub294 \uc54a\uc9c0\ub9cc, \ud604\ub300 \uacfc\ud559\uc5d0\uc11c\ub294 \uc774\ubcf4\ub2e4 \ub354 \uc88b\uc740 \ub300\uc548\uc744 \uc81c\uc2dc\ud558\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uba3c\uc800, \ub300\uc548\uc801\uc778 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc644\ubcbd\ud55c \ubc29\ubc95\uc740 \uc544\uc9c1 \uc874\uc7ac\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc740 \uacc4\uc18d \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\ub098, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc644\uc804\ud55c \ub300\uc548\uc774 \ub418\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ud604\ub300 \uae30\uc220\uc758 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub9ce\uc740 \uacbd\uc6b0 \uc544\uc9c1 \ub3d9\ubb3c \ubaa8\ub378\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uae30\uc220\uc740 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \ub300\uccb4 \uae30\uc220\ub4e4\uc774 \uc9c4\uc804\uc744 \ubcf4\uc774\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ube44\ub85d \ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac \ub2e8\uacc4\uc5d0\uc11c\ub294 \ubaa8\ub4e0 \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uc548 \uc2e4\ud5d8\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uadf8 \uacb0\uacfc\uac00 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub370\uc774\ud130\ub97c \uc644\ubcbd\ud788 \uc7ac\ud604\ud560 \uc218 \uc788\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc740 \ubc1c\uc804 \uac00\ub2a5\uc131\uc744 \uac00\uc9c0\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc740 \uc9c4\ud589 \uc911\uc774\ub098, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\ud07c \ud3ec\uad04\uc801\uc778 \uacb0\uacfc\ub97c \uc81c\uacf5\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub9ce\uc740 \uc774\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \uc874\uc7ac\ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud558\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ub300\uccb4 \ubc29\ubc95\uc740 \uc5ec\uc804\ud788 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\ub9ce\uc740 \uacbd\uc6b0, \ud604\uc7ac \uac1c\ubc1c\ub41c \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \uc804\uccb4\uc801\uc778 \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \ubc29\ubc95\uc774 \uc77c\ubd80 \uc5f0\uad6c\uc5d0\uc11c\ub294 \uc874\uc7ac\ud560 \uc218 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \uc7ac\ud604\ud560 \uc218 \uc788\ub294 \ub300\uccb4 \ubc29\ubc95\uc774 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \ub300\uc2e0 \ub300\uccb4 \uae30\uc220\uc5d0 \uc9d1\uc911\ud558\uc790\ub294 \uc758\uacac\ub3c4 \uc788\uc9c0\ub9cc, \ud604\uc7ac \ub300\ubd80\ubd84\uc758 \ub300\uccb4 \uae30\uc220\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\ub85c, \ubaa8\ub4e0 \uc5f0\uad6c\uc5d0 \uc801\uc6a9\ud560 \ub9cc\ud07c \ucda9\ubd84\ud55c \uc2e0\ub8b0\ub3c4\uac00 \ud655\ubcf4\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uc778\uacf5\uc9c0\ub2a5\uacfc \uc778\uac04 \uc138\ud3ec \ubaa8\ub378\uacfc \uac19\uc740 \ud601\uc2e0\uc801\uc778 \ub300\uc548\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc774\ub4e4\uc740 \ud604\uc7ac \ub3d9\ubb3c \ubaa8\ub378\ub9cc\ud07c\uc758 \uc644\uc804\ud55c \ub370\uc774\ud130\uc640 \uc815\ud655\uc131\uc744 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \ub300\uc548 \ubc0f \uc2e4\ud5d8 \uac10\uc18c\ub97c \uc704\ud55c \uc5f0\uad6c\ub294 \uacc4\uc18d\ub418\uace0 \uc788\uc73c\ub098, \uc544\uc9c1 \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uae30\uc220\uc740 \uc874\uc7ac\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uc2e4\uc81c\ub85c \ub300\uccb4 \ubc29\ubc95\uc774 \uc874\uc7ac\ud558\uc9c0\ub9cc, \uc774\ub4e4\uc740 \ubaa8\ub4e0 \uc5f0\uad6c \ubc0f \uce58\ub8cc \uac1c\ubc1c \ub2e8\uacc4\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ube44\ub3d9\ubb3c \uc5f0\uad6c \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc774\ub7ec\ud55c \ubc29\ubc95\ub4e4\uc774 \ubaa8\ub4e0 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uae30\uc5d0\ub294 \uc5ec\uc804\ud788 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc740 \uc9c4\ud589 \uc911\uc774\uc9c0\ub9cc \ud604 \ub2e8\uacc4\uc5d0\uc11c\ub294 \uc5f0\uad6c\uc758 \ubcf5\uc7a1\uc131\uc744 \ucda9\ubd84\ud788 \ubc18\uc601\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uc548\uc801\uc778 \ubc29\ubc95\ub4e4\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uae34 \ud558\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uc0c1\ud669\uc5d0\uc11c \uc644\ubcbd\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c4 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\ub7ec \ub300\uc548\uc801 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\ub85c \ub300\uccb4\ub41c\ub2e4\ub294 \uc8fc\uc7a5\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \uc544\uc9c1\uae4c\uc9c0\ub294 \uadf8 \uc644\uc804\ud55c \ub300\uccb4\uac00 \uc5b4\ub824\uc6b4 \uc0c1\ud669\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ube44\ub85d \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc5f0\uad6c\ub97c \uc9c4\ud589\ud560 \uc218 \uc788\ub294 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \uc2e4\ud5d8\uc758 \ubaa8\ub4e0 \ubcf5\uc7a1\uc131\uacfc \ubcc0\uc218\ub97c \uc644\uc804\ud788 \uc7ac\uc5f0\ud560 \uc218 \uc5c6\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \uae30\uc220\uc744 \uac1c\ubc1c\ud558\ub824\ub294 \ub178\ub825\uc740 \uacc4\uc18d\ub418\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uacfc\ud559 \ubc0f \uae30\uc220 \uc218\uc900\uc5d0\uc11c\ub294 \ubaa8\ub4e0 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc5f0\uad6c\ub97c \uc9c0\uc6d0\ud558\uae30\uc5d0\ub294 \uc544\uc9c1 \ubd88\ucda9\ubd84\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc, \uc544\uc9c1\uae4c\uc9c0\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\ud07c\uc758 \uc815\ud655\ud55c \uc0dd\ub9ac\uc801 \uc0c1\ud638 \uc791\uc6a9\uc744 \ubaa8\uc0ac\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc774 \uc5c6\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ube44\ub85d \ub2e4\ub978 \ub300\uccb4 \ubc29\ubc95\ub3c4 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc740 \uc874\uc7ac\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc644\uc804\ud55c \ub300\uccb4\uac00 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc774 \uc9c4\uc804\ub418\uc5c8\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc774\ub4e4\uc774 \uc544\uc9c1\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud558\uac8c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc774\ub7ec\ud55c \ub300\uccb4 \uae30\uc220\ub9cc\uc73c\ub85c\ub294 \uc544\uc9c1\uae4c\uc9c0 \ubaa8\ub4e0 \uc5f0\uad6c\ub97c \ucda9\ubd84\ud788 \uc9c0\uc6d0\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc5f0\uad6c\ub418\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc120 \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\ud07c \uc815\ud655\ud558\uac8c \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc608\uce21\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc740 \ud55c\uc815\uc801\uc785\ub2c8\ub2e4","\ube44\ub3d9\ubb3c \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc911\uc99d \uc9c8\ud658\uc758 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ucda9\ubd84\ud788 \ubaa8\uc0ac\ud558\uae30\uc5d0\ub294 \ud604\uc7ac\ub85c\uc11c\ub294 \uae30\uc220\uc801 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\ub4e4\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uc5f0\uad6c\uc5d0 \uc801\uc6a9\ud560 \uc218 \uc788\ub294 \ucda9\ubd84\ud55c \ub2a5\ub825\uacfc \ubc94\uc704\ub97c \uac16\ucd94\uc9c0\ub294 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uae30\ub294 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc804\uba74\uc801\uc73c\ub85c \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc740 \uc544\uc9c1 \ubd80\uc871\ud558\uc9c0\ub9cc, \uc774\ub97c \uac1c\uc120\ud558\uace0 \ubcf4\uc644\ud558\uae30 \uc704\ud55c \uc5f0\uad6c\uac00 \uacc4\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \ubd80\uc871\ud55c \uc0c1\ud669\uc774\uba70, \uc774\uc5d0 \ub300\ud55c \uac1c\ubc1c\ub3c4 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uacfc \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc774\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \uc774\ub974\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0\ub294 \uc788\uc9c0\ub9cc, \uc644\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \ub9cc\ud07c \uc544\uc9c1 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uacfc\ud559\uacfc \uae30\uc220\uc740 \ube60\ub974\uac8c \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1\uae4c\uc9c0 \uce58\ub8cc \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \uc644\uc804\ud788 \ucc3e\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub9ce\uc740 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \uc2e4\ud5d8\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\uae30\uc5d0\ub294 \uc5ec\uc804\ud788 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc740 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \uae30\uc220 \ubc1c\uc804\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc9c0\ub9cc, \uadf8\ub7fc\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\ud07c \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc740 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc801\uc778 \ubc29\ubc95\ub4e4\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1\uae4c\uc9c0 \ubaa8\ub4e0 \uc5f0\uad6c \ubd84\uc57c\uc5d0 \uc801\uc6a9\ud560 \ub9cc\ud07c \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\uae4c\uc9c0 \uc5ec\ub7ec \ub300\uccb4 \ubc29\ubc95\uc774 \uac1c\ubc1c\ub418\uc5c8\uc9c0\ub9cc, \uc774\ub4e4 \ubaa8\ub450\uac00 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uc2e0\ud560 \uc815\ub3c4\ub85c \uc2e0\ub8b0\uc131\uacfc \ud6a8\uc6a9\uc131\uc744 \ubcf4\uc7a5\ud558\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc77c\ubd80 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ub4f1\uc7a5\ud588\uc9c0\ub9cc, \uc774\ub4e4\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ub2e8\uacc4\uc5d0 \uc774\ub974\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc644\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc740 \ubd80\uc871\ud569\ub2c8\ub2e4","\ub610\ud55c, \uae30\uc220\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \ucc3e\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc9c0\ub9cc, \ubaa8\ub4e0 \uc9c8\ud658\uc5d0 \ub300\ud55c \ubcf4\ud3b8\uc801\uc778 \ud574\uacb0\ucc45\uc744 \uc81c\uacf5\ud558\uc9c0\ub294 \uc54a\uc2b5\ub2c8\ub2e4","\ube44\ub85d \ub300\uccb4 \ubc29\ubc95\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ubc29\ubc95\ub4e4\uc774 \ubaa8\ub4e0 \uc0c1\ud669\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uae30\uc220\uacfc \ubaa8\ub378\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uadf8 \uc131\ub2a5\uacfc \uc2e0\ub8b0\ub3c4\uac00 \ub3d9\ubb3c \ubaa8\ub378\uc744 \ucda9\ubd84\ud788 \ub300\uccb4\ud560 \ub9cc\ud07c \uc785\uc99d\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uacfc \uc911\uc694\uc131\uc740 \uc778\uc815\ud558\uc9c0\ub9cc, \uadf8\uac83\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0\ub294 \uc544\uc9c1 \ub3c4\ub2ec\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc, \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0\ub294 \ub3c4\ub2ec\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ubaa8\ub4e0 \ub300\uccb4 \ubc29\ubc95\uc774 \ubc18\ub4dc\uc2dc \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \uace0\ubb34\uc801\uc774\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \ub9cc\ud07c \uc131\uc219\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc740 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc758 \ubc1c\uc804\uc744 \ucd09\uc9c4\ud558\uc9c0\ub9cc, \uadf8\uac83\uc774 \uace7 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc644\uc804\ud55c \ub300\uccb4\ub97c \uc758\ubbf8\ud558\uc9c0\ub294 \uc54a\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uae30\uc220\uc774 \ube60\ub974\uac8c \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc774\ub4e4 \ubc29\ubc95\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\ub294 \ub370\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uacfc \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc810\uc744 \uc774\ud574\ud574\uc57c \ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc73c\ub85c \uc778\ud574 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc774 \uae30\uc220\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubaa8\ub4e0 \uc7a5\uc810\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\ub098, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc644\ubcbd\ud55c \ub300\uccb4\uc7ac\uac00 \ub420 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac \uae30\uc220\ub85c \ubc1c\uc804\ub41c \ub300\uccb4 \uc2dc\ud5d8\ubc95\uc774 \uc874\uc7ac\ud558\uc9c0\ub9cc, \uc774\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ube44\ub85d \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uc5f0\uad6c\ub418\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \ubaa8\ub378\ub9cc\ud07c \uc2e0\ub8b0\uc131\uacfc \uc815\ud655\uc131\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \ubd80\uc871\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \uc810\uc810 \ubc1c\uc804\ud558\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\ub098, \uc774\ub7ec\ud55c \ubc29\ubc95\ub4e4\uc740 \ubaa8\ub4e0 \uc5f0\uad6c \uc601\uc5ed\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0\ub294 \uc544\uc9c1 \uc774\ub974\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \ubc29\ubc95\ub4e4\uc774 \ud604\uc7ac \uc5f0\uad6c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uae30\uc220\uc774 \ub4f1\uc7a5\ud558\uace0 \uc788\uc9c0\ub9cc, \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \ube60\ub974\uac8c \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc644\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0\ub294 \ub3c4\ub2ec\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0\ub294 \uc788\uc9c0\ub9cc, \ud604 \uc2dc\uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \ub9cc\ud07c\uc758 \uacfc\ud559\uc801 \uc815\ud655\uc131\uc744 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\ub4e4\uc774 \uacc4\uc18d \uac1c\ubc1c\ub418\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\ub098, \uc774\ub7ec\ud55c \ubc29\ubc95\ub4e4\ub9cc\uc73c\ub85c\ub294 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc5b4\ub3c4 \ud604\ub300 \uae30\uc220\ub85c \ucda9\ubd84\ud558\ub2e4\ub294 \uc8fc\uc7a5\uc5d0 \ubc18\ubc15\ud558\uc790\uba74, \ube44\ub85d \uc0c8\ub85c\uc6b4 \uae30\uc220\ub4e4\uc774 \ubc1c\uc804\ub418\uace0 \uc788\uc9c0\ub9cc, \uc774\ub7ec\ud55c \uae30\uc220\ub4e4\ub9cc\uc73c\ub85c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"11_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","11_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"\u002fgLDQNMgxUCekMFAsiq8QJY5wUDmxL5ARES7QBKewUCJgcFA4qa9QBsbv0ABuL1A76a9QNcOxkBEHL5AEvS7QNJ5vEDF+sRA2gu\u002fQPe6w0CodsJA3Bm8QFjWv0AQ9cBAW6bCQLXmvUDedLtAJI+9QILovECHVsBAUxbDQEtox0BqBL1ABYPAQJKOykBa1sdALkK9QNsYv0AWg8RAtlvHQIh1wkB82MBAIsq8QEacvUBRvbpAPwK+QI55xkDRV8BAE8TAQC\u002f0vEBVxMlAXfq7QP\u002fFv0CyfMJARU7FQKiHwUARMs1AOkfEQGsUv0BrRrpABwK8QK2Aw0B9Cb9AfCa6QLNtvEBi4r5Aoj3JQAOjw0BVscBA"},"y":{"dtype":"f4","bdata":"CpcLQXfJCUHPNwtBS6ANQZRVDEG0sQlBiSgNQYpLCkFn4gpBqSMOQbxEDUEyPQ1BOzcMQY0BDkHWXQxBm30OQf3WB0GKLgtBFqMMQS8lC0GZ1A1B68sNQRSNDkFMLw5Bj7UKQZNlDEExZg1BvQwOQS9cC0GokQtB0jwMQSqlCUFPUw1BiL0OQcB1B0EkmgpB3aAKQbiqC0G3TQdBdCsLQTuLB0FO8QhBCZcNQe\u002fgDEESPQ1B3g8NQUsuCEGFgg1BenIKQXVRDUGArAdBZk4NQYSuDkHQwApBamkHQRaMCkH+zglB0ocIQca3DkHEBgxB6RAOQfpvCkEeUAxB0QYNQbxpDEE26gxBcYYLQffYCEExugtB"},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\uc14b\uc9f8, \ub3d9\ubb3c\uc758 \uad8c\ub9ac\uc640 \uc778\uac04\uc758 \uad8c\ub9ac\ub97c \ub3d9\ub4f1\ud558\uac8c \uace0\ub824\ud558\ub294 \uac83\uc740 \uc774\uc0c1\uc801\uc774\uc9c0\ub9cc, \ud604\uc2e4\uc801\uc778 \uc5f0\uad6c \ubc0f \uac1c\ubc1c \ud658\uacbd\uc5d0\uc11c\ub294 \uc778\uac04\uc758 \uc0dd\uba85\uacfc \uac74\uac15\uc744 \uc6b0\uc120\uc2dc\ud574\uc57c \ud560 \uc0c1\ud669\uc774 \ub9ce\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ub9ce\uc740 \uc0ac\ub78c\ub4e4\uc774 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc6b0\ub824\ud558\uc9c0\ub9cc \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\uae30 \uc704\ud574\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc774\ub77c\ub294 \uc0ac\uc2e4\uc744 \uac04\uacfc\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\uc5d0 \ub300\ud55c \uc6b0\ub824\uac00 \uc788\uc9c0\ub9cc, \uc774\ub294 \uc0dd\uba85\uacf5\ud559 \ubd84\uc57c\uc758 \uc5f0\uad6c\uc640 \uc801\uc6a9\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uace0\ud1b5\uc744 \uc218\ubc18\ud55c\ub2e4\ub294 \ub17c\uc9c0\ub294 \uc778\ub958\uc758 \uc0dd\uba85\uacfc \uac74\uac15\uc744 \uc704\ud55c \ubd88\uac00\ud53c\ud55c \uc120\ud0dd\uc73c\ub85c\uc11c \uadf8 \uc815\ub2f9\uc131\uc744 \ucc3e\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc120 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ubcf4\uc7a5\ud558\uae30 \uc704\ud55c \ucd5c\uc120\uc758 \ub3c4\uad6c\uc774\uc9c0\ub9cc, \ub3d9\uc2dc\uc5d0 \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\ub3c4 \uac15\ud654\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uc6b0\ub824\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \uace0\ucc30\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\ub294 \ub370 \uc911\uc694\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub9ce\uc740 \uc0ac\ub78c\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ube44\uc724\ub9ac\uc801\uc774\ub77c\uace0 \uc8fc\uc7a5\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \ub2e8\uacc4\ub85c, \uacfc\ud559\uc801 \uc9c4\ubcf4\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub05d\uc73c\ub85c, \uc778\uac04\ubfd0\ub9cc \uc544\ub2c8\ub77c \ubaa8\ub4e0 \uc0dd\uba85\uccb4\uc758 \uac00\uce58\ub97c \uc874\uc911\ud558\uba74\uc11c\ub3c4, \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \ud544\uc694\ud55c \uc5f0\uad6c\ub97c \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubd88\uac00\ud53c\ud55c \uce21\uba74\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uadf9\uc2ec\ud55c \uace0\ud1b5\uc744 \uc904 \uc218 \uc788\ub2e4\ub294 \uc6b0\ub824\uac00 \uc788\uc9c0\ub9cc, \ubcf4\ub2e4 \uc548\uc804\ud55c \uce58\ub8cc \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ube44\ub85d \uc724\ub9ac\uc801 \uc6b0\ub824\uac00 \uc874\uc7ac\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \ubc29\ubc95\uc73c\ub85c, \uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uc9c0\ud0a4\ub294 \ub370 \ud544\uc694\ud55c \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc774\uc720 \uc911 \ud558\ub098\ub294 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uc744 \uac80\uc99d\ud558\ub294 \ub370 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \ub300\uc548\uc744 \ucda9\ubd84\ud788 \ud655\ubcf4\ud558\uc9c0 \ubabb\ud55c \uc0c1\ud669\uc5d0\uc11c, \uc2e4\ud5d8 \uacb0\uacfc\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \uc911\uc694\ud55c \uc218\ub2e8\uc785\ub2c8\ub2e4","\ub3d9\ubb3c\uc2e4\ud5d8\uc5d0 \ub300\ud55c \ube44\ud310 \uc911 \ud558\ub098\ub294 \uc724\ub9ac\uc801 \ubb38\uc81c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uc0dd\uba85\uacfc \uc724\ub9ac\uc801 \uac00\uce58\ub97c \uc874\uc911\ud558\uba74\uc11c\ub3c4 \uc778\ub958\uc758 \uc911\ub300\ud55c \uac74\uac15 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \uc5f0\uad6c\uac00 \uc9c0\uc18d\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ube44\uc724\ub9ac\uc131\uc744 \uc6b0\ub824\ud558\ub294 \uc2dc\uac01\uc774 \uc788\uaca0\uc9c0\ub9cc, \uc774\ub294 \uc778\ub958\uc5d0\uac8c \uc808\uc2e4\ud788 \ud544\uc694\ud55c \uc758\ud559\uc801 \ubc1c\uc804\uc758 \uc911\uc694\ud55c \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc724\ub9ac\uc801 \ub51c\ub808\ub9c8\ub97c \uc81c\uae30\ud558\uc9c0\ub9cc, \uc778\uac04 \uc0dd\uba85 \ubcf4\ud638\ub77c\ub294 \ub354 \ud070 \uc724\ub9ac\uc801 \ucc45\uc784\uac10\uc744 \uc218\ubc18\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uc6b0\ub824\uac00 \uc874\uc7ac\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc5f0\uc131\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc704\ud55c \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ub2f4\ub2f9\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c\uc758 \uc0dd\uba85\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uace0\ub824\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \uc911\uc99d \uc9c8\ud658\uc758 \uae34\uae09\uc131\uc73c\ub85c \uc778\ud574 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ube44\uc724\ub9ac\uc801\uc774\ub77c\ub294 \uc8fc\uc7a5\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc774\ub294 \uc911\ub300\ud55c \uc9c8\ubcd1\uc758 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uc6b0\ub824\ub294 \uc5f0\uad6c \ud601\uc2e0\uc744 \ucd09\uc9c4\ud558\ub294 \uacc4\uae30\uac00 \ub418\uae30\ub3c4 \ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uc5f0\uad6c\uc640 \uc724\ub9ac \uae30\uc900 \ub9c8\ub828\uc758 \uc911\uc694\uc131\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud6a8\uacfc\uc801\uc774\uace0 \uc548\uc804\ud55c \uc758\uc57d\ud488 \uac1c\ubc1c\uc5d0 \uc788\uc5b4\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\uc5d0 \ub300\ud55c \uc6b0\ub824\uac00 \uc874\uc7ac\ud558\uc9c0\ub9cc, \uc774 \uc2e4\ud5d8\uc740 \uc778\ub958 \uac74\uac15\uc744 \uc704\ud55c \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uba3c\uc800, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub300\uccb4\ub85c \ube44\uc724\ub9ac\uc801\uc774\ub77c\ub294 \uc8fc\uc7a5\uc5d0 \ub300\ud574\uc11c\ub294, \uc0b0\uc5c5 \ub300\uae30\uc5c5\uc778 \uae00\ub77d\uc18c\uc2a4\ubbf8\uc2a4\ud074\ub77c\uc778(GSK)\uc774 \ub3d9\ubb3c\uc2e4\ud5d8 \uae30\ubc18 \uc5f0\uad6c\ub97c \uae30\ubc18\uc73c\ub85c \uc2e0\uc57d \uac1c\ubc1c\uc744 \uc9c4\ud589\ud558\uba70 \uc774\ub97c \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\uac00 \uc778\uac04\uc744 \ub300\uc0c1\uc73c\ub85c \ud55c \uc784\uc0c1\uc2dc\ud5d8\uc73c\ub85c \ub118\uc5b4\uac00\ub294 \ub370\uc5d0 \uc788\uc5b4 \ud544\uc218\uc801\uc774\ub77c\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801\uc778 \ubb38\uc81c\ub97c \uc81c\uae30\ud558\ub294 \uc0ac\ub78c\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uace0\ud1b5\uc744 \ucd08\ub798\ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud558\uc9c0\ub9cc, \uc774 \ubc29\ubc95\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubc18\ub300\ud558\ub294 \uc0ac\ub78c\ub4e4\uc740 \ub3d9\ubb3c\uc758 \uad8c\ub9ac\uc640 \uc724\ub9ac\uc801\uc778 \uc6b0\ub824\ub97c \uc81c\uae30\ud558\uc9c0\ub9cc, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ub97c \ubaa9\ud45c\ub85c \ud558\ub294 \uc5f0\uad6c\uc5d0 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uba3c\uc800, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \ubd84\uba85 \uc911\uc694\ud558\uc9c0\ub9cc, \ub9ce\uc740 \uc5f0\uad6c\uae30\uad00\uc774 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\uba70 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \ub3d9\ubb3c\uc758 \uc724\ub9ac\uc801 \ucc98\uc6b0\uc5d0 \ub300\ud55c \uc6b0\ub824\ub294 \ud0c0\ub2f9\ud558\uc9c0\ub9cc, \uc5f0\uad6c\uc758 \uc9c4\uc804\uc744 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud604\uc7ac\ub85c\uc11c\ub294 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\ub77c\ub294 \uc0ac\uc2e4\uc744 \uc78a\uc5b4\uc11c\ub294 \uc548 \ub429\ub2c8\ub2e4","\ub9ce\uc740 \uc0ac\ub78c\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ube44\uc724\ub9ac\uc801\uc774\ub77c \uc8fc\uc7a5\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uc808\ub300\uc801\uc73c\ub85c \ud544\uc694\ud569\ub2c8\ub2e4","\ubb3c\ub860 \uc724\ub9ac\uc801\uc778 \uc6b0\ub824\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ub97c \uc704\ud55c \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uc2e0\uc57d \uac1c\ubc1c\uc744 \uac00\ub2a5\ud558\uac8c \ud558\ub294 \ud544\uc218\uc801\uc778 \uacfc\uc815\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc77c\uc73c\ud0a8\ub2e4\ub294 \ubc18\ub300 \uc758\uacac\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uce21\uba74\uc5d0 \ub300\ud55c \uac71\uc815\uc740 \uc774\ud574\ud560 \uc218 \uc788\uc9c0\ub9cc, \uacf5\uc911 \ubcf4\uac74\uc5d0 \ubbf8\uce58\ub294 \uae0d\uc815\uc801\uc778 \uc601\ud5a5\ub3c4 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\uc77c\ubd80\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ube44\uc724\ub9ac\uc801\uc774\ub77c\uace0 \uc8fc\uc7a5\ud560 \uc218 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uacfc\uc815\uacfc \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\uace0 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \ud3c9\uac00\ud558\ub294 \ub370 \uac00\uc7a5 \uc801\ud569\ud55c \ubc29\ubc95 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ubc18\ub300 \uc758\uacac\uc744 \ubcf4\uba74, \uc77c\ubd80\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc794\uc778\ud558\ub2e4\uace0 \uc8fc\uc7a5\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1 \uc778\uac04\uc5d0\uac8c \uc9c1\uc811 \uc0ac\uc6a9\ud560 \uc218 \uc5c6\ub294 \uce58\ub8cc\uc81c\uc640 \uc808\ucc28\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ubcf4\uc7a5\ud558\ub294 \uac00\uc7a5 \ud6a8\uacfc\uc801\uc778 \ubc29\ubc95 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4. [\ub3d9\ubb3c\uc2e4\ud5d8 \uae30\ubc18 \uc5f0\uad6c, \uc804\uc784\uc0c1 \uc2dc\ud5d8, \uc2e0\uc57d \uac1c\ubc1c, \ub610\ub294 \uad00\ub828 \uc11c\ube44\uc2a4\ub97c \uc218\ud589\ud558\ub294] Covance\ub294 \uc778\uccb4\uc5d0 \ud22c\uc5ec\ub418\uae30 \uc804 \ub2e8\uacc4\uc5d0\uc11c \uc2e0\uc57d\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \ub370 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc774\ub77c\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uace0\ub824\uc640 \ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \ubcf5\uc9c0\ub97c \uc704\ud55c \ud544\uc218 \uc694\uc18c\uc785\ub2c8\ub2e4","\uba3c\uc800, \uc77c\ubd80 \uc0ac\ub78c\ub4e4\uc740 \ub3d9\ubb3c \ubcf5\uc9c0\uc758 \uad00\uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubc18\ub300\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\ub294 \uc778\ub958\uc758 \uac74\uac15 \uc774\uc775\uc740 \ubb34\uc2dc\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \ubd80\ubd84\uc774 \uc788\uc73c\uba70, \uc774\ub294 \uc724\ub9ac\uc801 \uc5f0\uad6c \uc218\ud589\uc758 \uc77c\ubd80\ub85c \uac04\uc8fc\ub429\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \uc778\uc815\ub418\uc9c0\ub9cc, \uadf8\ub7fc\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ud604\uc7ac\ub85c\uc11c\ub294 \uc778\ub958\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ube44\uc724\ub9ac\uc801\uc774\ub77c\uace0 \uc8fc\uc7a5\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc774\ub294 \ub300\uc548\uc774 \uc5c6\ub294 \uc0c1\ud669\uc5d0\uc11c \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uc720\uc6a9\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \ub2f9\uc5f0\ud788 \uc911\uc694\ud558\uac8c \uc5ec\uaca8\uc838\uc57c \ud558\uc9c0\ub9cc, \ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc774 \ubd88\uc644\uc804\ud55c \uc2dc\uc810\uc5d0\uc11c\ub294 \ub3d9\ubb3c \ubaa8\ub378\uc774 \ud655\ubcf4\ud558\ub294 \uc548\uc804\uc131\uacfc \uc720\ud6a8\uc131 \ud3c9\uac00\uac00 \ud2b9\ud788 \uc911\ub300\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud765\ubbf8\ub86d\uc9c0 \uc54a\uac8c \ub4e4\ub9b4\uc9c0 \ubaa8\ub974\uc9c0\ub9cc \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \ubd80\ubd84\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uc5d0 \ub300\ud55c \uc6b0\ub824\uac00 \uc788\uc9c0\ub9cc, \uc774\ub294 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc724\ub9ac\uc801\uc774\uc9c0 \uc54a\ub2e4\uace0 \uc8fc\uc7a5\ud560 \uc218 \uc788\uc9c0\ub9cc, Ernst & Young\uc758 \ubcf4\uace0\uc11c\uc5d0 \ub530\ub974\uba74 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0ac\ub78c\ub4e4\uc774 \uc548\uc804\ud558\uac8c \uc57d\ubb3c\uc744 \uc0ac\uc6a9\ud560 \uc218 \uc788\ub3c4\ub85d \ud558\ub294 \uac00\uc7a5 \ud6a8\uacfc\uc801\uc778 \ubc29\ubc95 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uace0\ud1b5\uc5d0 \ub300\ud55c \uc6b0\ub824\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \ub9ce\uc740 \uacbd\uc6b0\uc5d0 \uc788\uc5b4 \ucd5c\uc885\uc801\uc73c\ub85c \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uc6b4\uc601\uc0c1\uc758 \ubc94\uc704 \ub0b4\uc5d0\uc11c \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc6b0\ub9ac\uc758 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \ubc97\uc5b4\ub09c \uac83\uc774\ub77c\ub294 \uc758\uacac\uc774 \uc788\uc9c0\ub9cc, \uc774\ub97c \ud1b5\ud574 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \uc778\uc0ac\uc774\ud2b8\ub97c \uc5bb\ub294\ub2e4\ub294 \uc810\uc744 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uc724\ub9ac\uc801 \uc6b0\ub824\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \uc778\uac04 \uac74\uac15\uc5d0 \uc9c1\uc811\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce58\ub294 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc794\uc778\ud558\ub2e4\ub294 \uc8fc\uc7a5\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc774\ub294 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc778\ub958 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uad6c\ud558\uae30 \uc704\ud55c \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \ubc18\ub300\ub860\uc790\ub4e4\uc740 \ub3d9\ubb3c \uc724\ub9ac \ubb38\uc81c\ub97c \uac15\uc870\ud558\uc9c0\ub9cc, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \uc5bb\ub294 \uc778\ub958\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ud559\ubb38\uc801 \uc9c4\ubcf4\ub97c \uace0\ub824\ud558\uc9c0 \uc54a\uc744 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc778\uac04 \uc0dd\uba85\uc744 \ubcf4\ud638\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uace0\ubbfc\uc740 \uae4a\uac8c \uace0\ub824\ub418\uc9c0\ub9cc, \uc774\ub294 \uae34\uae09\ud55c \uac74\uac15 \ubb38\uc81c\uc5d0 \ub300\ud55c \ud574\ub2f5\uc744 \ucc3e\uae30 \uc704\ud574 \ub54c\ub54c\ub85c \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub3c4\ub355\uc801 \ub51c\ub808\ub9c8\ub97c \uc77c\uc73c\ud0ac \uc218 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc, \uc774\ub7ec\ud55c \uc5f0\uad6c\ub294 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\uae30 \uc704\ud574 \ubd88\uac00\ud53c\ud55c \uc120\ud0dd\uc9c0\ub85c \uc5ec\uaca8\uc9d1\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc2e0\ub8b0\uc131 \ubb38\uc81c\ub294 \uc5f0\uad6c\uc758 \uc124\uacc4\uc640 \uc9c4\ud589 \ubc29\ubc95\uc5d0 \ud070 \uc601\ud5a5\uc744 \ubc1b\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubc18\ub300\ud558\ub294 \uc8fc\uc7a5\uc774 \uc788\uc744 \uc218 \uc788\uc9c0\ub9cc, \uc778\ub958 \uac74\uac15\uc744 \uc704\ud55c \uc5f0\uad6c\ub294 \uadf8\ub7f0 \uc724\ub9ac\uc801 \uace0\ubbfc\uacfc \ud604\uc2e4\uc801 \ud544\uc694 \uc0ac\uc774\uc5d0\uc11c \uade0\ud615\uc744 \ucc3e\uc544\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc794\uc778\ud558\ub2e4\ub294 \uc758\uacac\uc5d0 \ub300\uc751\ud558\uc790\uba74, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \ub3d9\ubb3c\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294\ub370 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc778\uac04 \uc0dd\uba85\uc758 \uc0dd\uc874\uacfc \uac74\uac15\uc744 \uc704\ud55c \ud544\uc218\uc801\uc778 \ud0d0\uad6c\uc774\uae30 \ub54c\ubb38\uc5d0 \uc724\ub9ac\uc801 \ub17c\uc758\ub294 \ubcf5\uc7a1\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uace0\ud1b5\uc744 \uc720\ubc1c\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uce58\ub8cc\ub97c \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ube44\ub85d \uc724\ub9ac\uc801\uc778 \ubb38\uc81c\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc218\ub9ce\uc740 \uc778\ub958\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uae30\uc5ec\ud574 \uc654\uc2b5\ub2c8\ub2e4","\ub9ce\uc740 \uc0ac\ub78c\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ube44\uc724\ub9ac\uc801\uc774\ub77c\uace0 \uc8fc\uc7a5\ud558\uc9c0\ub9cc, \uc774\ub294 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc77c\ubd80 \uc0ac\ub78c\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc724\ub9ac\uc801\uc73c\ub85c \ubd80\uc801\uc808\ud558\ub2e4\uace0 \uc8fc\uc7a5\ud558\uc9c0\ub9cc, \uc2e4\uc81c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uba3c\uc800, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \ub51c\ub808\ub9c8\uc640 \ub9de\ubb3c\ub9ac\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc368\ub294 \uc778\ub958\uc758 \uc0dd\uba85\uacfc \uac74\uac15\uc744 \uad6c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ube44\uc724\ub9ac\uc131\uc744 \uc9c0\uc801\ud558\uba74\uc11c\ub3c4 \ud604\uc7ac\uae4c\uc9c0\uc758 \uacfc\ud559\uc801 \ubc1c\uc804\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc784\uc744 \uc778\uc815\ud574\uc57c \ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \ubb38\uc81c\uc5d0 \ub300\ud55c \uc9c0\uc18d\uc801\uc778 \uad00\uc2ec\uacfc \ub300\uc548 \ubc29\ubc95\uc758 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \uc2b9\uc778 \ubc0f \uc758\uc57d\ud488 \uc548\uc804\uc131 \ud3c9\uac00 \uacfc\uc815\uc5d0\uc11c \uc5ec\uc804\ud788 \ubc95\uc801\uc73c\ub85c \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc77c\ubd80 \ubc18\ub300 \uc758\uacac\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ube44\uc724\ub9ac\uc801\uc774\ub77c\uace0 \uc8fc\uc7a5\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\uae30 \uc704\ud55c \ud544\uc218\uc801\uc778 \ub2e8\uacc4\ub85c \uc5ec\uaca8\uc9d1\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc644\ubcbd\ud55c \uae30\uc220\uc774 \ubd80\uc7ac\ud55c \uc2dc\uc810\uc5d0\uc11c, \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uace0\ub824\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc9c0\uc18d \uac00\ub2a5\uc131 \uc5ed\uc2dc \uc911\uc694\ud569\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"12_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","12_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"hiEqQTzjK0ECzSpBtt8wQQB5J0FIPCtBlTMtQf4SKkFpHzBBOe8sQYBOLUEL2SxBy2stQc24IUEYQilBDxosQaczK0GPeSpBpR8rQa8tLkHMzSpBZ44rQeSYK0G9ZCpBYzkrQWEuK0FeIStBt\u002fEqQfNsL0HCLCtBY9shQVuPK0Fx+CxBTfAsQXzuKkFLMy9BIHcpQcl9LkEtxi9B9ZopQR51KUE+EytB5WUtQbrELUHlJy5BvJotQQopMEEXcS5BGWctQYwcK0G1VC9B33EXQUQTK0HbIzBBVQArQRNJLUHhgjBBj8QvQSlzLUEv7S1BGpApQTOAK0FmWS9BzUElQRm7K0E="},"y":{"dtype":"f4","bdata":"DF2fQDIkskCe16lA8OSfQPz\u002ftUCt4KtABm2oQNreuUDneKBAHdi1QBf5pED7RbdAUYq3QPJGxUBDZ5tAxi2wQH6Bp0BehqpA3synQHy+sECev6tAoLqtQAbMoEAaI7tA1KiwQPjDsEBmHKlAnFGpQE91rkDkfq5AHwPFQJVcoUAy9LZA7pW3QOrBqkBq 58 \uc2b9\uc778\uc744 \uc5bb\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8 \ub370\uc774\ud130\ub294 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac\uc758 \uaddc\uc81c \uc2dc\uc2a4\ud15c\uc740 \uc5c4\uaca9\ud55c \uacfc\ud559\uc801 \uac80\uc99d \uae30\uc900 \ud558\uc5d0 \uc124\uc815\ub418\uc5b4 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \uae30\uc900\uc744 \ucda9\uc871\ud558\ub294 \ub370\uc5d0\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ud6a8\uacfc\uc801\uc778 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\ub294 \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc18d\ud55c \uc9c4\ud589\uacfc \uaddc\uc81c \uc2b9\uc778\uc744 \uc704\ud574 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \uaddc\uc81c \ub2f9\uad6d\uc758 \uc2b9\uc778\uc744 \ubc1b\uae30 \uc704\ud55c \ud544\uc218 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e4\ud5d8 \uc57d\ubb3c\uc758 \uc720\ud6a8\uc131\uc744 \ud655\uc778\ud558\uace0, \uad00\ub828 \uaddc\uc81c \uae30\uad00\uc758 \uc2b9\uc778\uc744 \ubc1b\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub294 \uc804 \uc138\uacc4 \uaddc\uc81c \uae30\uad00\ub4e4\uc774 \uc694\uad6c\ud558\ub294 \uc911\uc694\ud55c \uc548\uc804\uc131 \uac80\ud1a0 \uacfc\uc815\uc758 \ud55c \ubd80\ubd84\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc774 \uc2dc\uc7a5\uc5d0 \ucd9c\uc2dc\ub418\uae30 \uc804\uc5d0 \uaddc\uc81c \uc2b9\uc778 \uc808\ucc28\ub97c \uac70\uce58\ub294 \ub370 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \uc2b9\uc778\uc744 \ubc1b\uae30 \uc704\ud55c \ubd88\uac00\ud53c\ud55c \ub2e8\uacc4\uc774\uae30\ub3c4 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubc18\ub4dc\uc2dc \ud544\uc694\ud558\uba70 \uc724\ub9ac\uc801\uc73c\ub85c \uc218\ud589\ub420 \uc218 \uc788\ub294 \ub300\uc548\uc740 \uc774\ubbf8 \uc5ec\ub7ec \uc5f0\uad6c \uae30\uad00\uc5d0\uc11c \uaddc\uc81c\uc640 \uc9c0\uce68\uc744 \ud1b5\ud574 \ub9c8\ub828\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \uc2b9\uc778\uc744 \ubc1b\uae30 \uc704\ud574 \ud544\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uaddc\uc81c \uc694\uac74\uc744 \ucda9\uc871\ud558\ub294 \ub370 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc694\uc18c\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubc95\uc801 \ubc0f \uaddc\uc81c \uc2b9\uc778 \uacfc\uc815\uc5d0\uc11c \uc694\uad6c\ub418\ub294 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d \uac1c\ubc1c \uacfc\uc815 \uc804\ubc18\uc5d0 \uac78\uccd0 \uaddc\uc81c \uc694\uac74\uc744 \ucda9\uc871\uc2dc\ud0a4\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc758\uc57d\ud488\uc758 \uc2dc\uc7a5 \ud5c8\uac00\ub97c \ubc1b\uae30 \uc704\ud55c \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \uae30\uad00\uc5d0\uc11c \uc2e0\uc57d \uc2b9\uc778 \uacfc\uc815\uc744 \ud1b5\uacfc\ud558\uae30 \uc704\ud55c \ud544\uc218 \uc808\ucc28\ub85c \uc790\ub9ac \uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc2e4\ud5d8\uc740 \uaddc\uc81c \uc2b9\uc778\uc5d0 \ud544\uc694\ud55c \ucd5c\uc120\uc758 \ucd9c\ubc1c\uc810\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \uc2b9\uc778\uc5d0\uc11c \ud575\uc2ec\uc801 \uc5ed\ud560\uc744 \ud558\ubbc0\ub85c, \uc644\uc804\ud788 \ubc30\uc81c\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uae30\ubc18\uc73c\ub85c \ud55c \uc5f0\uad6c \ubc0f \uac1c\ubc1c\uc744 \uc218\ud589\ud558\ub294 Charles River Laboratories\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uaddc\uc81c \uc2b9\uc778 \uc808\ucc28\uc5d0\uc11c \uc694\uad6c\ub418\ub294 \uc8fc\uc694 \ub2e8\uacc4\ub77c\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \ub2f9\uad6d\uc758 \uc694\uad6c\uc0ac\ud56d\uc744 \ucda9\uc871\ud558\uae30 \uc704\ud55c \ud544\uc218\uc801\uc778 \uc694\uc18c\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub294 \uaddc\uc81c \uae30\uad00\uc758 \uc2b9\uc778 \uc808\ucc28\uc5d0\uc11c \ud544\uc218\ubd88\uac00\uacb0\ud55c \uc694\uc18c\ub85c \uc791\uc6a9\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \uc2b9\uc778\uc744 \uc704\ud55c \ud544\uc218 \uc808\ucc28\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \ub2f9\uad6d\uc758 \uc694\uad6c \uc0ac\ud56d\uc744 \ucda9\uc871\ud558\uae30 \uc704\ud55c \ud544\uc694\uc870\uac74\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \uae30\uad00\uc758 \uc2b9\uc778 \uc808\ucc28\ub97c \ud1b5\uacfc\ud558\uae30 \uc704\ud55c \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\uae4c\uc9c0 \uaddc\uc81c \uc2b9\uc778 \uacfc\uc815\uc5d0\uc11c \ud544\uc218\uc801\uc778 \ub2e8\uacc4\ub85c \uc790\ub9ac \uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uaddc\uc81c \uc2b9\uc778\uc5d0\uc11c\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\uc131\uc740 \uc5ec\uc804\ud788 \ud07d\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \uc2b9\uc778 \uacfc\uc815\uc5d0\uc11c \uc694\uad6c\ub429\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc0c8\ub85c\uc6b4 \uc758\uc57d\ud488\uc758 \uac1c\ubc1c \ubc0f \ a85\uc744 \uad6c\ud558\ub294 \ub370 \uae30\uc5ec\ud574 \uc654\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\ub294 \uc778\ub958 \uac74\uac15\uacfc \ubcf5\uc9c0 \uc99d\uc9c4\uc5d0 \ud06c\uac8c \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uae30\ubc18\uc73c\ub85c \ud55c \uc5f0\uad6c\ub294 \uc778\ub958\uc758 \uac74\uac15 \uac1c\uc120\ubfd0\ub9cc \uc544\ub2c8\ub77c \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\uc5d0\ub3c4 \uae30\uc5ec\ud560 \uc218 \uc788\ub294 \uac00\ub2a5\uc131\uc744 \uac00\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc548\uc804\uc744 \ubcf4\ud638\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc7a5\uae30\uc801\uc73c\ub85c \ub354 \ub9ce\uc740 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uae30\ubc18\uc774 \ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc911\ub300\ud55c \uacfc\ud559\uc801 \ubc1c\uacac\uc740 \ub9ce\uc740 \uc0dd\uba85\uc744 \uad6c\ud558\uace0 \uadf8\ub4e4\uc774 \uacaa\uc744 \uc218 \uc788\ub294 \uace0\ud1b5\uc744 \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc0dd\uba85 \uad6c\uc81c\uc640 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud574\uc654\uc73c\uba70, \uc774\ub294 \uc778\ub958 \uc804\uccb4\uc758 \ubcf5\uc9c0\ub97c \uc99d\uc9c4\uc2dc\ud0a4\ub294 \uacb0\uacfc\ub97c \uac00\uc838\uc654\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc9c4 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub294 \uc774\ubbf8 \uc778\ub958\uc5d0\uac8c \ub9ce\uc740 \ud61c\ud0dd\uc744 \uc548\uaca8\uc8fc\uc5c8\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uc9c0\uc2dd\uc774 \uc218\ub9ce\uc740 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \ud798\uc744 \uac00\uc9c4\ub2e4\ub294 \uc810\uc744 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc7a5\uae30\uc801\uc778 \uc778\ub958 \uac74\uac15 \uac1c\uc120\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc73c\ub85c\ubd80\ud130 \uc5bb\uc740 \ub370\uc774\ud130\ub294 \uc778\ub958 \uac74\uac15 \uc99d\uc9c4\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud568\uc73c\ub85c\uc368 \uacb0\uad6d \ud658\uc790\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc9c4 \ub9ce\uc740 \uc131\uacf5\uc801\uc778 \uce58\ub8cc\ubc95\ub4e4\uc774 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \ud06c\uac8c \uc5f0\uc7a5\ud560 \uc218 \uc788\uc5c8\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uac74\uac15\uacfc \uc9c8\ubcd1 \uce58\ub8cc\uc5d0\uc11c \ubd88\uac00\ud53c\ud55c \ud604\uc2e4\ub85c, \uc774\ub7ec\ud55c \uc811\uadfc\uc740 \ub2e4\uc591\ud55c \uc0dd\uba85\uccb4\uc758 \uc0dd\uc874\uacfc \ubcf5\uc9c0\ub97c \ub3c4\ubaa8\ud558\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85 \uacfc\ud559 \uc5f0\uad6c\uc758 \uc9c4\ubcf4\uc5d0 \uae30\uc5ec\ud558\uc5ec \uc804\uccb4\uc801\uc778 \uc778\ub958 \uac74\uac15 \uac1c\uc120\uc5d0 \uc774\ubc14\uc9c0\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud574\uc654\uc73c\uba70, \uc774\ub294 \uc778\uac04\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uad6c\ud558\ub294\ub370 \uc9c1\uc811\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce69\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \uae4a\uac8c \ud558\uace0 \uad81\uadf9\uc801\uc73c\ub85c \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub9ce\uc740 \uc9c8\ubcd1 \uce58\ub8cc\uc81c\uac00 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uac1c\ubc1c\ub418\uc5c8\uc73c\uba70, \uc774\ub294 \uc778\ub958\uc758 \uc0dd\uba85 \uc5f0\uc7a5\uacfc \uc0b6\uc758 \uc9c8 \ud5a5\uc0c1\uc5d0 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85\uc744 \uc9c1\uc811\uc801\uc73c\ub85c \uad6c\ud558\ub294 \ub9ce\uc740 \uc5f0\uad6c\ub97c \uac00\ub2a5\ucf00 \ud588\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uacb0\uad6d \uc778\uac04\uacfc \ub3d9\ubb3c \ubaa8\ub450\uc5d0\uac8c \ud61c\ud0dd\uc744 \uac00\uc838\uc62c \uc218 \uc788\ub294 \uacb0\uacfc\ub97c \ucd08\ub798\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85\uacfc \uac74\uac15\uc744 \uc704\ud55c \uc911\ub300\ud55c \uae30\uc5ec\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud574\uc654\uc73c\uba70, \uc774\ub7ec\ud55c \ud604\uc2e4\uc801 \ud544\uc694\uc131\uc744 \ubb34\uc2dc\ud574\uc11c\ub294 \uc548 \ub429\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uacbd\uc6b0 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uce58\ub8cc\uc758 \uae30\ubc18\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15 \uac1c\uc120\uc5d0 \uc788\uc5b4 \uc911\ub300\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc73c\uba70, \uc774 \uacfc\uc815\uc5d0\uc11c \uc0c8\ub85c\uc6b4 \uae30\uc220 \uac1c\ubc1c\ub3c4 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uac8c \ub41c \uce58\ub8cc\ubc95\uc774 \ub9ce\uc740 \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\uace0 \uc788\ub2e4\ub294 \uc0ac\uc2e4\uc740 \ube60\ub974\uac8c \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud574\uc57c \ud558\ub294 \uc0c1\ud669\uc5d0\uc11c \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uc2e4\uc9c8\uc801\uc778 \uae30\uc5ec\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uacbd\uc6b0 \uce58\ub8cc\ubc95\uc758 \uc131\uacf5\uc801\uc778 \uac1c\ubc1c\ub85c \uc774\uc5b4\uc838 \ub2e4\uc591\ud55c \uc9c8\ubcd1\uc73c\ub85c\ubd80\ud130 \uc778\ub958\ub97c \uad6c\ud558\ub294 \ub370 \uae30\uc5ec\ud574\uc654\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \ub9ce\uc740 \uc0ac\ub78c\ub4e4\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \ub3d9\ubb3c \ubaa8\ub450\uc758 \ubcf5\uc9c0\ub97c \uc99d\uc9c4\uc2dc\ud0a4\ub294 \uacb0\uacfc\ub97c \ub0b3\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc778\uac04\uc758 \uc0dd\uba85\uacfc \uac74\uac15\uc744 \uc704\ud574 \uacb0\uc815\uc801 \uc5ed\ud560\uc744 \ud574\uc654\ub2e4\ub294 \uac83\uc740 \ubd80\uc815\ud560 \uc218 \uc5c6\ub294 \uc0ac\uc2e4\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85\uc758 \uc9c8\uc744 \ub192\uc774\ub294 \ub370 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud574\uc654\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uc9c1\uc811\uc801\uc778 \uae30\uc5ec\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uad81\uadf9\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uac8c \ub418\ub294 \ud61c\ud0dd\uc740 \uc778\uac04\ubfd0\ub9cc \uc544\ub2c8\ub77c \ub3d9\ubb3c\uc5d0\uac8c\ub3c4 \ub3cc\uc544\uac08 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uacfc\ud559\uc801 \ubc1c\uacac\uc740 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uc9c0\ud0a4\ub294\ub370 \uc9c0\ub300\ud55c \uacf5\ud5cc\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c\uc744 \uc0ac\uc6a9\ud558\ub294 \uc5f0\uad6c\ub294 \uc778\uac04\uc758 \uc774\uc775\ubfd0 \uc544\ub2c8\ub77c \uc0dd\ud0dc\uacc4 \uc804\ubc18\uc758 \uac74\uac15\uc744 \uac1c\uc120\ud558\ub294 \ub370\uc5d0\ub3c4 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc758 \ucd5c\uc885 \ubaa9\ud45c\ub294 \uc778\uac04\uc744 \ud3ec\ud568\ud55c \ubaa8\ub4e0 \uc0dd\ubb3c\uc758 \ubcf5\uc9c0 \uac1c\uc120\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\ub294 \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uacb0\uacfc\uac00 \uc778\ub958 \uac74\uac15\uc5d0 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\ubfd0\ub9cc \uc544\ub2c8\ub77c \ub3d9\ubb3c \uc790\uccb4\uc5d0\uac8c\ub3c4 \uc774\ub85c\uc6b4 \uacb0\uacfc\ub97c \uac00\uc838\uc62c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\ub958\uc758 \uac74\uac15\uc744 \ud5a5\uc0c1\uc2dc\ud0a4\uae30 \uc704\ud574 \ud544\uc694\ud55c \uae30\ubc18 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\ub294 \ub9e4\uc6b0 \uc911\uc694\ud55c \uacfc\uc815\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c4 \uacb0\uacfc\ub294 \uc218\ub9ce\uc740 \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc778\uac04\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \u
