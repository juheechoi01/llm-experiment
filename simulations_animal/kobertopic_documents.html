"\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\ub294 \ub3d9\uc2dc\uc5d0 \uacfc\ud559 \ubc1c\uc804\uc744 \ucd94\uad6c\ud558\ub294 \uac83\uc740 \uc911\uc694\ud558\uba70, \uc5f0\uad6c \uae30\uad00\ub4e4\uc740 \uc774 \ub450 \uac00\uc9c0 \ubaa9\ud45c\ub97c \ub3d9\uc2dc\uc5d0 \ub2ec\uc131\ud558\uae30 \uc704\ud574 \uafb8\uc900\ud788 \ub178\ub825\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc6b0\ub9ac\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud544\uc218\uc801\uc77c \uacbd\uc6b0\uc5d0\ub9cc \uc0ac\uc6a9\ud558\ub3c4\ub85d \uc81c\ud55c\ud558\uace0, \uc2e4\ud5d8 \uc870\uac74\uc744 \uac1c\uc120\ud558\uc5ec \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub178\ub825\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\uba70, \uc774\ub294 \uc911\uc694\ud55c \uc774\ub2c8\uc154\ud2f0\ube0c\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \uac1c\uc120\ub41c \uc2e4\ud5d8 \uc124\uacc4\uc640 \uad00\ub9ac \ubc29\uc2dd\uc744 \ud1b5\ud574 \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\ub294 \uac83\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud558\ub294 \ub370 \uc788\uc5b4 \uc911\uc694\ud55c \uc694\uc18c\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\uc5d0 \ub300\ud55c \uc6b0\ub824\ub294 \uc774\ud574\ud560 \uc218 \uc788\uc73c\ub098, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uac15\ud654\ud558\uace0 \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub178\ub825\uc740 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc724\ub9ac \uae30\uc900\uc758 \uac15\ud654\uc640 \ud601\uc2e0\uc801\uc778 \ub300\uc548\uc758 \uac1c\ubc1c\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\ub3c4\ub97c \uc904\uc774\ub294 \ub370 \ud06c\uac8c \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uadf8\ub7fc\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc724\ub9ac\uc801\uc73c\ub85c \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud574 \uc5f0\uad6c\uc790\ub4e4\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc0c8\ub85c\uc6b4 \ubc29\ubc95\uc744 \ucc3e\uace0 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \ub178\ub825\uc774 \uc810\uc810 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ud45c\uc900\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc904\uc774\uae30 \uc704\ud55c \uaddc\uc81c\uc640 \uac1c\uc120\uc774 \uacc4\uc18d\ub418\uace0 \uc788\ub2e4\ub294 \uc810\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\ub294 \ub178\ub825\uc740 \ub9e4\uc6b0 \uc911\uc694\ud558\uba70, \uc774\ub97c \uc704\ud574 \uc5f0\uad6c\uc790\ub4e4\uc740 \uace0\ud1b5\uc744 \uc904\uc774\uace0 \uc724\ub9ac\uc801\uc778 \uc2e4\ud5d8 \uc870\uac74\uc744 \ud655\ub9bd\ud558\ub294 \ub370 \ub9ce\uc740 \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uac8c\ub2e4\uac00, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uace0\ub824\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\uc73c\uba70, \uacfc\ud559\uc790\ub4e4\uc740 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ucd5c\uc120\uc744 \ub2e4\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c \ucc44\ud0dd\ub418\ub294 \uc724\ub9ac\uc801 \uae30\uc900\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc73c\uba70, \ub3d9\ubb3c\uc5d0 \ub300\ud55c \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \uae30\uc220\uc774 \ub3c4\uc785\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uc9c0\uce68\uacfc \uaddc\uc815\uc740 \ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c \ubd88\ud544\uc694\ud55c \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud574 \uac15\ud654\ub418\uace0 \uc788\uc73c\uba70, \uae30\uc220\uc774 \ubc1c\uc804\ud558\uba74\uc11c \ub3d9\ubb3c \ubcf5\uc9c0\uc5d0 \ub300\ud55c \uac00\uce58\ub3c4 \ub354\uc6b1 \uc911\uc694\ud574\uc84c\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\ub4e4\uc774 \uacaa\ub294 \uace0\ud1b5\uacfc \uc2a4\ud2b8\ub808\uc2a4\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc5d0\uac8c \uac00\ud574\uc9c0\ub294 \uace0\ud1b5\uc744 \uc644\ud654\ud558\uae30 \uc704\ud55c \uacfc\ud559\uc801 \ub178\ub825\uacfc \uae30\uc220\uc801 \ubc1c\uc804\uc740 \uacc4\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc218\ub9ce\uc740 \uc778\uba85\uc744 \uad6c\ud558\uace0, \uace0\ud1b5\uc744 \ub35c\uc5b4\uc8fc\ub294 \uce58\ub8cc\ubc95\uc758 \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc778\uc2dd\ud55c \ub9ce\uc740 \uacfc\ud559\uc790\ub4e4\uc740 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \uac1c\uc120\ucc45\uc744 \ub9c8\ub828\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc5f0\uad6c\uc790\ub4e4\uc740 \uc724\ub9ac\uc801\uc778 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc810\uc810 \ub354 \uc815\uad50\ud558\uac8c \uc870\uc815\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uae30\uc220\uc758 \uc9c0\uc18d\uc801\uc778 \uac1c\ubc1c\uacfc \ubcd1\ud589\ud558\uc5ec, \ud604\uc7ac \uac00\ub2a5\ud55c \uac00\uc7a5 \uc778\ub3c4\uc801\uc778 \ubc29\ubc95\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uac1c\uc120\ud558\ub294 \ub178\ub825\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4. [\uc804\uc784\uc0c1 \uc2dc\ud5d8 \uc11c\ube44\uc2a4\ub97c \uc81c\uacf5\ud558\ub294] \ubc14\uc774\uc628\ub4c0\ub784\uc740 \ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c \uac00\ub2a5\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba70, \uac1c\uc120\ub41c \uad00\ub9ac\uc640 \uae30\uc220\uc744 \ud1b5\ud574 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\ub300\ud55c \uc904\uc774\ub294 \uac83\uc774 \uc911\uc694\ud558\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc774 \uacfc\ud559\uacc4 \uc804\ubc18\uc5d0\uc11c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uad6d\uc81c\uc801\uc778 \ud611\ub825\uc744 \ud1b5\ud574 \ub354\uc6b1 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \uacfc\ud559\uc790\ub4e4\uc740 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \uc778\uc2dd\ud558\uace0 \uc788\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc0ac\uc6a9\uc744 \ucd5c\ub300\ud55c \uc904\uc774\uae30 \uc704\ud574 \ub2e4\uc591\ud55c \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uba70 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ub300\uccb4 \uc2e4\ud5d8\ubc95\uc740 \uc5f0\uad6c \ud6a8\uc728\uc131\uc744 \ub192\uc774\uace0, \uc2e4\ud5d8 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uacfc \uace0\ud1b5 \uacbd\uac10\uc744 \uc704\ud574 \uc801\uadf9\uc801\uc778 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\uc18c\ud55c\uc758 \uace0\ud1b5\uc73c\ub85c \ucd5c\ub300\uc758 \ud559\ubb38\uc801 \uac00\uce58\ub97c \ucd94\uad6c\ud558\uace0\uc790 \ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc815\ucc45\uc801\uc778 \uc9c0\uc6d0\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud560 \uc218\ub3c4 \uc788\uc9c0\ub9cc, \ud604\uc7ac \ub9ce\uc740 \ubc95\uc801 \uc694\uad6c\uc0ac\ud56d\uc740 \ub3d9\ubb3c\uc2e4\ud5d8 \uacb0\uacfc\ub97c \ud3ec\ud568\ud574\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc73c\ub85c \uc778\ud55c \uc724\ub9ac\uc801\uc778 \ubb38\uc81c\ub97c \uc904\uc774\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \ub178\ub825\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801\uc778 \ubb38\uc81c\ub97c \uc778\uc2dd\ud558\uace0 \uadf8 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ub370 \uc788\uc5b4 \uc5f0\uad6c \ucee4\ubba4\ub2c8\ud2f0\ub294 \uc810\ucc28 \ub354 \uc548\uc804\ud558\uace0 \uc724\ub9ac\uc801\uc778 \uc811\uadfc \ubc29\ubc95\uc744 \ucc44\ud0dd\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc758 \uac15\ud654\ub97c \ud1b5\ud574 \ub3d9\ubb3c\uc5d0 \ub300\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uba74\uc11c\ub3c4 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\uace0 \uc0b6\uc758 \uc9c8\uc744 \uac1c\uc120\ud560 \uc218 \uc788\ub294 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uace0 \ub300\uccb4 \ubc29\ubc95\uc744 \ubc1c\uc804\uc2dc\ud0a4\uae30 \uc704\ud55c \uc801\uadf9\uc801\uc778 \ub178\ub825\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac \ub9ce\uc740 \uc5f0\uad6c \ud504\ub85c\uc81d\ud2b8\ub294 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\uc5ec \uace0\ud1b5\uc744 \uc904\uc774\ub294 \ubc29\ubc95\uc744 \uc801\uadf9\uc801\uc73c\ub85c \ud0d0\uc0c9\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ucd5c\uc18c\ud654\ub97c \ud1b5\ud55c \uae0d\uc815\uc801\uc778 \ubcc0\ud654\ub97c \uc704\ud55c \ub178\ub825\uc740 \uac00\uc18d\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \ubcf4\ub2e4 \uc778\uac04\uc801\uc778 \uc9c8\ud658 \uce58\ub8cc\ub97c \uac00\ub2a5\ud558\uac8c \ud568\uc73c\ub85c\uc368 \ubd88\ud544\uc694\ud55c \uc778\uac04\uc758 \uace0\ud1b5\uc744 \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131 \uac1c\uc120\uc740 \uafb8\uc900\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc7a5\uae30\uc801\uc73c\ub85c \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uace0\uc790 \ud558\ub294 \ub178\ub825\uc758 \uc77c\ud658\uc785\ub2c8\ub2e4","\uc5f0\uad6c\uc790\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uae30 \uc704\ud574 \ub178\ub825\ud558\uba70, \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uac00\ub2a5\ud55c \ub300\uccb4 \ubc29\ubc95\uc744 \ud65c\uc6a9\ud558\ub824\ub294 \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \uaddc\uc81c \ubc0f \uc9c0\uce68\uc758 \ubc1c\uc804\uc740 \uc774\ub7ec\ud55c \ucd5c\uc18c\ud654 \ub178\ub825\uc744 \ub354\uc6b1 \ucd09\uc9c4\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc778\uc815\ud558\ub418, \uc774\ub85c \uc778\ud55c \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub2e4\uc591\ud55c \ub178\ub825\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc5d0\uac8c \uac00\ud574\uc9c0\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \ub2e4\ud558\uae30 \uc704\ud574, \ub3d9\ubb3c \uc2e4\ud5d8 \ud658\uacbd \uac1c\uc120\uacfc \uc808\ucc28\uc758 \ud22c\uba85\uc131\uc744 \uac15\ud654\ud558\ub294 \ub178\ub825\uc774 \uacc4\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uac1c\uc120\ud558\uace0 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ub3d9\uc2dc\uc5d0 \uadf8 \uc911\uc694\uc131\uc744 \uc778\uc2dd\ud574\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ube44\uc911\uc744 \uc904\uc774\ub294 \uac83\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \uadf8 \uacfc\uc815\uc5d0\uc11c \uc724\ub9ac\uc801 \ucc45\uc784\uac10\uc744 \ud568\uaed8 \uac15\ud654\ud558\ub294 \uac83\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uacb0\uad6d, \ub3d9\ubb3c\uc774 \ub290\ub07c\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \uc724\ub9ac\uc801 \ub178\ub825\uacfc \uc0c8\ub85c\uc6b4 \uae30\uc220\uc758 \ub3c4\uc785\uc740 \uade0\ud615 \uc788\uac8c \uc9c4\ud589\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac \uc0c1\ud0dc\uc5d0\uc11c \ubaa8\ub4e0 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc644\uc804\ud788 \uc5c6\uc560\ub294 \uac83\uc740 \uc5b4\ub835\uc9c0\ub9cc, \uc0c1\ub2f9\ud55c \uac1c\uc120\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc740 \uafb8\uc900\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc778\uc2dd\ud558\uba70 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \ub300\uccb4\ud558\ub824\ub294 \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc644\uc804\ud788 \uc5c6\uc568 \uc218 \uc5c6\ub294 \uc810\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc, \ud604\ub300\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\ub300\ud55c \uace0\ud1b5\uc744 \uc904\uc774\ub294 \ubc29\ud5a5\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc6b0\ub824\ub97c \uc904\uc774\uae30 \uc704\ud55c \uacfc\ud559\uc790\ub4e4\uc758 \ucc45\uc784 \uc788\ub294 \uc5f0\uad6c \ud0dc\ub3c4\ub294 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub354 \ub098\uc544\uac00, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \uc9c4\ud589 \uc911\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uaddc\uc81c\ub97c \uac15\ud654\ud558\uc5ec \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uce21\uba74\uc744 \ubcf4\uc644\ud558\uae30 \uc704\ud574 \uc5f0\uad6c\uc790\ub4e4\uc740 \uc2e4\ud5d8 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud558\uba70 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ubc29\ubc95 \uac1c\ubc1c\uacfc \ubcd1\ud589\ud558\uc5ec, \uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ub2e4\uc591\ud55c \ubc29\uc548\uc774 \uc774\ubbf8 \ud65c\uc6a9\ub418\uace0 \uc788\uc73c\uba70, \ub04a\uc784\uc5c6\ub294 \uac1c\uc120\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uae30\uc220\uacfc \ubc29\ubc95\ub4e4\uc774 \uafb8\uc900\ud788 \uac1c\ubc1c\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc544\uc6b8\ub7ec, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc810\uc744 \uac10\uc548\ud560 \ub54c, \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c\uc758 \ub3d9\ubb3c \uc724\ub9ac \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc774 \ub354\uc6b1 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \ubc29\ubc95\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc778\uc2dd\ud558\uace0 \uc774\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c\ubcf5\uc9c0\uc5d0 \ub300\ud55c \uc724\ub9ac \uae30\uc900\uc740 \uc810\uc810 \ub354 \uac15\ud654\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uace0 \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uc744 \ub192\uc774\ub294 \ub370 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub05d\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ucc45\uc784\uacfc \uad00\ub828\ud558\uc5ec \uc5f0\uad6c\uc790\ub4e4\uc740 \uac00\ub2a5\ud55c \ud55c \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ub178\ub825\ud558\uace0 \uc788\uc73c\uba70, \uae30\uc220 \ubc1c\uc804\uc758 \uc131\uacfc\ub97c \uc5f0\uad6c\uc5d0 \ud1b5\ud569\ud558\uc5ec \uc724\ub9ac\uc801 \uc811\uadfc\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc744 \uc0ac\uc6a9\ud558\uc5ec \uc2e0\uc57d \uac1c\ubc1c\uc744 \uc9c4\ud589\ud558\ub294 Charles River Laboratories\ub294 \uc724\ub9ac\uc801 \uae30\uc900\uc758 \uc911\uc694\uc131\uc744 \uc778\uc815\ud558\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uac00\ub2a5\ud55c \ud55c \uace0\ud1b5 \uc5c6\uc774 \uc218\ud589\ud558\uae30 \uc704\ud55c \uac1c\uc120\ub41c \ud504\ub85c\ud1a0\ucf5c\uc744 \ub3c4\uc785\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub9ce\uc740 \ud68c\uc0ac\ub4e4\uc774 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud55c \uc724\ub9ac\uc801\uc778 \uc2e4\ud5d8 \ubc29\ubc95\uc744 \ucc44\ud0dd\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc2e4\ud5d8 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc788\uc5b4 \uc724\ub9ac\uc801 \uaddc\uc81c\ub294 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud558\uba70, \uc774\uc0b0\ud654, \uace0\ud1b5 \ucd5c\uc18c\ud654\ub97c \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \uac1c\uc120\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubaa8\ub4e0 \uc0dd\uba85\uccb4\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc774 \ud3ec\ud568\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uc5b4\ub5a4 \uacbd\uc6b0\uc5d0\uc11c\ub4e0 \uac00\ub2a5\ud55c \ucd5c\uc18c\ud55c\uc758 \uace0\ud1b5\uc744 \uc8fc\ub294 \uac83\uc774 \uc911\uc694\ud558\uba70, \uc774\ub97c \uc704\ud574 \uacfc\ud559\uc790\ub4e4\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc2e4\ud5d8 \ubc29\ubc95\uc744 \uac1c\uc120\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub9ce\uc740 \uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uace0 \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud574 \ucd5c\uc120\uc744 \ub2e4\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uc5d0\uac8c \ucd5c\uc18c\ud55c\uc758 \uace0\ud1b5\uc744 \uc8fc\ub294 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\ubc1c\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc5f0\uad6c\uc758 \uc724\ub9ac\uc131\uc744 \ud5a5\uc0c1\uc2dc\ud0a4\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ucd94\uc9c4\uc740 \ub3d9\ubb3c \uace0\ud1b5\uc744 \uc904\uc774\ub294 \ub370 \uc9c1\uc811\uc801\uc73c\ub85c \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub610\ud55c, \ud604\uc7ac \ub9ce\uc740 \uc5f0\uad6c\uc790\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc694\uc18c\ub97c \uac1c\uc120\ud558\uace0\uc790 \ub178\ub825\ud558\uace0 \uc788\uc73c\uba70, \uac00\ub2a5\ud55c \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc778\ub958\uc758 \uac74\uac15 \ubcf5\uc9c0\ub97c \uc704\ud574 \ubc18\ub4dc\uc2dc \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud55c \uacbd\uc6b0\uac00 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \uc5f0\uad6c\ub294 \ub3d9\ubb3c\uc758 \uc0b6\uc744 \uc874\uc911\ud558\ub294 \ub3d9\uc2dc\uc5d0 \ucd5c\ub300\ud55c \ube44\uc724\ub9ac\uc801\uc778 \uc694\uc18c\ub97c \uc904\uc774\ub294 \ub178\ub825\uc744 \ud3ec\ud568\ud569\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"9_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","9_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"8sFGQRYOS0FU+EJBU3BFQYq3RkE7mEVBULg+QcawSkH7EEVBt5pGQQGFPkFaPUVB\u002fllDQV+xQkEa60FBObtBQccRRUEFokNBQDBEQYTxRkHskUhBxAFLQVF5SkETqD1B7EVDQQDgR0GYj0FBsjdKQWObSkFfIEFBCCE+QXcbQEGTdERB5FdFQU9XS0HbC0tB8NtBQWcyS0G
