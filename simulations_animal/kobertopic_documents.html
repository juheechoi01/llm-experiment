        <script charset="utf-8" src="https://cdn.plot.ly/plotly-3.5.0.min.js" integrity="sha256-fHbNLP+GlIXN+efbQec78UkemUz3NJp7UmfGxC1tNxs=" crossorigin="anonymous"></script>                <div id="85e41a87-0ced-4a15-8de7-b76f18f0be28" class="plotly-graph-div" style="height:750px; width:1200px;"></div>            <script>                window.PLOTLYENV=window.PLOTLYENV || {};                                if (document.getElementById("85e41a87-0ced-4a15-8de7-b76f18f0be28")) {                    Plotly.newPlot(                        "85e41a87-0ced-4a15-8de7-b76f18f0be28",                        [{"hoverinfo":"text","hovertext":["\uc14b\uc9f8, \ube44\ub3d9\ubb3c\uc801 \ubc29\ubc95\uc758 \ubc1c\uc804\uc744 \uc704\ud55c \uc815\ucc45\uc801 \uc9c0\uc6d0\uacfc \uc5f0\uad6c\ub97c \uac15\ud654\ud558\uba74\uc11c\ub3c4, \ub2f9\uc7a5 \uc778\ub958\uc758 \uac74\uac15 \ubb38\uc81c \ud574\uacb0\uc744 \uc704\ud574 \ud544\uc694\ud55c \ub3d9\ubb3c \uc5f0\uad6c\uc758 \ubcd1\ud589\uc740 \ubd88\uac00\ud53c\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \uac83\uc740 \uc911\uc694\ud55c \uc724\ub9ac\uc801 \uc758\ubb34\uc774\uba70, \uc774\ub97c \uc704\ud574 \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\uc131\uc744 \uacc4\uc18d \uc778\uc2dd\ud558\uba74\uc11c\ub3c4, \uc5f0\uad6c\uc790\ub4e4\uc740 \ud56d\uc0c1 \ub300\uccb4 \uac00\ub2a5\uc131\uc744 \uc5fc\ub450\uc5d0 \ub450\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub610\ud55c, \ub9ce\uc740 \uacbd\uc6b0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubaa8\ub378\uc774 \ubd80\uc7ac\ud558\uac70\ub098 \uc81c\ud55c\uc801\uc774\ub77c\ub294 \uc810\uc5d0\uc11c \uc5ec\uc804\ud788 \ube44\ud560 \ub370 \uc5c6\ub294 \uac00\uce58\ub97c \uc9c0\ub2d9\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uaddc\uc81c\uc640 \uae30\uc900\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc815\ub418\uace0 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uac1c\ubc1c\ub418\uace0 \uc788\ub294 \ub300\uccb4 \ubc29\ubc95\uc758 \uc724\ub9ac\uc131\uacfc \ud6a8\uc728\uc131\uc744 \uc9c4\uc804\uc2dc\ud0a4\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc5bb\uc740 \ub370\uc774\ud130\ub97c \ud65c\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uacf5 \uc7a5\uae30\ub098 \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uc774 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud558\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub300\uccb4 \ubd88\uac00\ub2a5\ud558\ub2e4\ub294 \uc810\uc5d0\uc11c \uc911\ub300\ud55c \ubc18\ub860\uc744 \uc81c\uae30\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \ubc1c\uc0dd\ud558\ub294 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \uacfc\uac70\uc5d0 \ube44\ud574 \ub354 \ub9ce\uc740 \uc8fc\uc758\uc640 \uaddc\uc81c\ub97c \ud1b5\ud574 \ub098\uc544\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uacfc\ud559\uc801 \uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \uce21\uba74\uc740 \uc5f0\uad6c \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud558\ub294 \ubc29\uc2dd\uc73c\ub85c \uac1c\uc120\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ud604\uc7ac \uc874\uc7ac\ud558\ub294 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc774\ubbc0\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc644\uc804\ud55c \ub300\uccb4\uac00 \uc5b4\ub824\uc6b4 \uc810\uc744 \uc778\uc815\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\uae30\uc5d0\ub294 \ud604\uc7ac\ub85c\uc11c\ub294 \uae30\uc220\uc801 \uc81c\ud55c\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c \uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uae30\uc5ec\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc9c0\ub9cc, \uc774\ub7ec\ud55c \uae30\uc220\ub4e4\uc774 \uc644\uc804\ud788 \uc790\ub9ac\uc7a1\uae30\uae4c\uc9c0\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ub300\uccb4 \ubc29\ubc95\uc774 \ubd88\uc644\uc804\ud558\ub2e4\ub294 \uc810\uc744 \uba85\ud655\ud788 \uc774\ud574\ud560 \ud544\uc694\uac00 \uc788\uc73c\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uae30\uc5d4 \uc544\uc9c1 \ubd80\uc871\ud55c \uc0c1\ud0dc\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \ud575\uc2ec\uc801\uc778 \uc790\ub8cc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \uc544\uc9c1 \uc644\uc804\ud558\uc9c0 \uc54a\ub2e4\ub294 \uc810\uc785\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ube44\ub3d9\ubb3c \uc2dc\ud5d8 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\uc73c\uba70 \ubaa8\ub4e0 \uc9c8\ubcd1\uc774\ub098 \uc57d\ubb3c\uc758 \ubcf5\uc7a1\uc131\uc744 \ub2e4\ub8f0 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc778\ub958\uc758 \uac74\uac15\uc744 \uc9c0\ud0a4\uae30 \uc704\ud55c \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub294 \uc544\uc9c1 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc0ac\ub78c\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc804\uccb4\uc801\uc778 \uc724\ub9ac\uc801 \uad00\uc810\uc5d0\uc11c \ub3d9\ubb3c\uc758 \uc0ac\uc6a9\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uad6c\ud558\uae30 \uc704\ud574 \uc5ec\uc804\ud788 \ud544\uc694\ud55c \uc120\ud0dd\uc9c0 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\uae30 \uc704\ud55c \uc5f0\uad6c\ub294 \uc9c0\uc18d\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub97c \ud1b5\ud574 \uc7a5\uae30\uc801\uc73c\ub85c\ub294 \uc724\ub9ac\uc801\uc73c\ub85c \ub354 \ub098\uc740 \ubc29\ubc95\uc774 \uac1c\ubc1c\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc740 \ubd80\uc871\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc911\uc694\ud55c \uc5f0\uad6c \uc131\uacfc\ub97c \ub2ec\uc131\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \ubd80\uc815\ud560 \uc218 \uc5c6\uc73c\ub098, \uacfc\ud559\uc790\ub4e4\uc740 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uc9c0\uce68\uc744 \ub530\ub985\ub2c8\ub2e4","\uad81\uadf9\uc801\uc73c\ub85c, \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc904\uc774\uae30 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uc778\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uae30\uc5ec\ud588\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc5f0\uad6c \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uc874\uc911\ud558\ub294 \ub3d9\uc2dc\uc5d0 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ubc15\ucc28\ub97c \uac00\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc774 \uc5c6\uae30 \ub54c\ubb38\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uc911\uc694\ud558\uac8c \uace0\ub824\ud558\uba74\uc11c\ub3c4 \uc2e4\ud5d8\uc758 \uacfc\ud559\uc801 \ubaa9\uc801\uc744 \ub2ec\uc131\ud558\ub294 \uac83\uc774 \uc5f0\uad6c\uc790\uc758 \ucc45\uc784\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud574 \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uc774 \uac15\uc870\ub418\uace0\ub294 \uc788\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ubcc0\ud654\ub294 \uc2dc\uac04\uc774 \uac78\ub9ac\ub294 \uacfc\uc815\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc5f0\uad6c\uc758 \ud45c\uc900\uc744 \uc720\uc9c0\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc801\uc808\ud788 \ubcf4\uc7a5\ud558\uba70 \uc2e4\ud5d8\uc744 \uc9c4\ud589\ud560 \uc218 \uc788\ub294 \uc81c\ub3c4\uc801 \uc7a5\uce58\uac00 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \ub300\uccb4 \uc2dc\ud5d8\ubc95\uc774 \uc874\uc7ac\ud558\uc9c0\ub9cc, \uc544\uc9c1\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\ud07c \uacb0\uacfc\uc758 \uc2e0\ub8b0\uc131\uc744 \ubcf4\uc7a5\ud574 \uc904 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \uaddc\uc81c\uc640 \uac10\ub3c5\uc774 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uae30 \uc704\ud55c \uae30\uc220 \uac1c\ubc1c\uc5d0\ub294 \uc0c1\ub2f9\ud55c \uc2dc\uac04\uc774 \ud544\uc694\ud558\uba70, \uadf8 \ub3d9\uc548 \uc778\uac04 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc740 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \uac80\uc99d\ud560 \uc218 \uc788\ub294 \ucda9\ubd84\ud55c \ub300\uc548\uc774 \ub9c8\ub828\ub418\uc9c0 \uc54a\uc558\uc74c\uc744 \uace0\ub824\ud560 \ub54c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc9c0\uc18d\uc801\uc778 \uc0ac\uc6a9\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc704\ud55c \uae30\ubc18\uc774 \ub420 \uc218 \uc788\uc73c\uba70, \uc774\ub294 \ubbf8\ub798\uc758 \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \ud76c\uc0dd\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uac10\ub3c5 \ud558\uc5d0 \uc9c4\ud589\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc810\uc9c4\uc801\uc73c\ub85c \ub354 \uc724\ub9ac\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc694\ud55c \uc2dc\uac04\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc774\ub3c4 \uc131\uacfc\ub97c \ub0bc \uc218 \uc788\uc73c\ub9ac\ub77c\ub294 \uae30\ub300\uac00 \uc788\uc73c\ub098, \uc2e4\uc81c\ub85c \ub300\uccb4 \ubc29\ubc95\uc758 \ud6a8\uc6a9\uacfc \uc2e0\ub8b0\uc131\uc740 \ubd84\uc57c\uc5d0 \ub530\ub77c \ud06c\uac8c \ub2e4\ub974\uba70, \ud2b9\ud788 \uac01\uae30 \ub2e4\ub978 \uc0dd\uccb4 \ubc18\uc751\uc744 \uc608\uce21\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \ubbf8\ud761\ud55c \uc810\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uc758\ud559\uc801 \uc5f0\uad6c\uc5d0\uc11c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ucca0\uc800\ud788 \uc900\uc218\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uaddc\uc81c\ub97c \ud1b5\ud574 \ub354\uc6b1 \uc724\ub9ac\uc801\uc73c\ub85c \uc218\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc740 \uc774\ubbf8 \uc5c4\uaca9\ud558\uac8c \uc801\uc6a9\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \uae30\uc900\uc740 \uacc4\uc18d \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub300\uccb4 \uae30\uc220\ub9cc\uc73c\ub85c\ub294 \ud604\uc7ac \uc608\uc0c1\ud558\uc9c0 \ubabb\ud55c \uc0ac\ub840\ub97c \uc644\uc804\ud788 \uc608\uacac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uc548\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ud6a8\uacfc\uc801\uc774\uc9c0 \uc54a\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc644\uc804\ud788 \uc790\ub9ac \uc7a1\uae30\uae4c\uc9c0\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uc5d0 \ub300\ud55c \uc874\uc911\uacfc \uc724\ub9ac\uc801\uc778 \ub300\uc6b0\ub97c \uc720\uc9c0\ud558\ub294 \uac83\uc774 \ubb34\uc5c7\ubcf4\ub2e4 \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uace0\ud1b5 \uacbd\uac10\uc744 \uc704\ud574, GlaxoSmithKline\uc740 \uc5f0\uad6c\uc640 \ud601\uc2e0\uc5d0\uc11c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\uba70, \uac00\ub2a5\ud55c \ubaa8\ub4e0 \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc744 \uc6b0\uc120\uc801\uc73c\ub85c \uc801\uc6a9\ud558\uace0 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uaddc\uc81c\ub97c \ud1b5\ud574 \ucd5c\ub300\ud55c\uc758 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\uba70 \uc218\ud589\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc5f0\uad6c\ub294 \uc9c4\ud589\ub418\uace0 \uc788\uc9c0\ub9cc, \uadf8 \uc804\ud658\uc5d0\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uae30\uc220 \uac1c\ubc1c\uc774 \ud544\uc694\ud558\ub2e4\ub294 \uc810\uc5d0\ub294 \ub3d9\uc758\ud558\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uc0dd\uba85\uc744 \uc18c\uc911\ud788 \uc5ec\uae30\ub294 \ub3d9\uc2dc\uc5d0, \uadf8\ub4e4\uc758 \ud76c\uc0dd\uc73c\ub85c \ub9ce\uc740 \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\uc74c\uc744 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\uc5f0\uad6c \ubc29\ubc95\uc758 \ud601\uc2e0\uacfc \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ub3d9\uc2dc\uc5d0 \ucd94\uad6c\ud558\ub294 \uac83\uc740 \uc724\ub9ac\uc801\uc774\uace0 \uacfc\ud559\uc801\uc73c\ub85c \uade0\ud615 \uc7a1\ud78c \uc811\uadfc\uc744 \ud544\uc694\ub85c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c0\uae08\uae4c\uc9c0 \ubb34\uc218\ud788 \ub9ce\uc740 \uc778\ub958\uc758 \uc0dd\uba85\uc744 \uad6c\ud574\uc654\uae30\uc5d0, \uc774\ub97c \uc989\uac01\uc801\uc73c\ub85c \ub300\uccb4\ud560 \ubc29\ubc95\uc774 \ub098\uc624\uc9c0 \uc54a\ub294 \ud55c \uc2e0\uc911\ud55c \uc811\uadfc\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559 \uc5f0\uad6c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uc728\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \uc911\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc5f0\uad6c \ucee4\ubba4\ub2c8\ud2f0\uc640 \uad00\ub828 \uae30\uad00\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub178\ub825\uc744 \ub354\uc6b1 \uac15\ud654\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub294 \uc591\ub9bd \uac00\ub2a5\ud55c \ubaa9\ud45c\uc785\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\uc740 \uc778\uc815\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud604\uc7ac\ub85c\uc11c\ub294 \ud3ec\uad04\uc801\uc778 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \uc218\ub2e8\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc774 \ud604\uc7ac\ub85c\uc11c\ub294 \ucda9\ubd84\ud788 \uac80\uc99d\ub418\uc9c0 \uc54a\uc558\ub2e4\ub294 \uc810\uc5d0\uc11c \ubd80\ub2f4\uc2a4\ub7fd\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc2dc\uac04\uc774 \uac78\ub9ac\ub294 \ubb38\uc81c\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uae30\uc220\uc758 \ubc1c\uc804\uc774 \uacc4\uc18d\ub418\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\uc774 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \uc2ec\uce35\uc801\uc774\uace0 \ubcf5\ud569\uc801\uc778 \uc0dd\ub9ac\uc801 \ud1b5\ucc30\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc740 \uc874\uc7ac\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uc0dd\uba85 \uc5ed\uc2dc \uc911\uc694\ud55c \uac00\uce58\ub85c \uc778\uc2dd\ub418\uc5b4\uc57c \ud558\uba70, \uc774\ub97c \uc704\ud574 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uc874\uc911\ud558\uba74\uc11c \uc2e4\ud5d8\uc774 \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \uac00\ub2a5\uc131\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \uc544\uc9c1\uc740 \ubaa8\ub4e0 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc815\ud655\ud558\uac8c \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220\uc758 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \uc644\uc804\ud55c \ub300\uc548\uc774 \uc544\uc9c1 \uc900\ube44\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc724\ub9ac\uc801\uc778 \uad00\uc810\uc5d0\uc11c \ubcf4\ub354\ub77c\ub3c4, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c0\ub294 \uc778\ub958\uc758 \uac74\uac15\uc0c1\uc758 \uc774\uc810\uc740 \ubb34\uc2dc\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uae34\uae09\ud55c \uc778\ub958\uc758 \uac74\uac15 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub294 \ub370 \uacb0\uc815\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc73c\uba70, \uc9c0\uc18d\uc801\uc778 \uc5f0\uad6c\uac00 \uc694\uad6c\ub429\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uace0\ub824\ub294 \uacc4\uc18d \uac15\ud654\ub418\uace0 \uc788\uc73c\uba70, \uac01\uad6d\uc5d0\uc11c\ub294 \uc774\ub97c \uc704\ud55c \ud22c\uba85\ud558\uace0 \uc5c4\uaca9\ud55c \uac00\uc774\ub4dc\ub77c\uc778\uc744 \ub9c8\ub828\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \ubc29\ubc95\uc774 \ud604\uc2e4\uc801\uc73c\ub85c \ubaa8\ub4e0 \ucc28\uc6d0\uc5d0\uc11c \uac00\ub2a5\ud55c \uc0c1\ud669\uc740 \uc544\ub2d9\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uae30\uc220\uc740 \uc99d\uac00\ud558\ub294 \ucd94\uc138\uc774\ub098 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \uacb0\uacfc\uc758 \uc0dd\ub9ac\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \ud604\uc7ac\ub85c\uc11c\ub294 \uc644\uc804\ud788 \ubaa8\ubc29\ud558\uae30 \uc5b4\ub824\uc6b4 \ud604\uc2e4\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uad81\uadf9\uc801\uc73c\ub85c, \ubaa9\ud45c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc644\uc804\ud55c \ubc29\ubc95\uc744 \ucc3e\ub294 \uac83\uc774\uc9c0\ub9cc, \uc774\ub294 \uc624\ub79c \uc2dc\uac04\uc774 \uac78\ub9ac\ub294 \uacfc\uc815\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc758\uc874\ud558\uc5ec \uc778\ub958\uc5d0\uac8c \ubcf4\ub2e4 \uc548\uc804\ud55c \uc758\uc57d\ud488\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\ub2e4\ub294 \uc810\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub824\ub294 \ub178\ub825\uc740 \uafb8\uc900\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub354\uc6b1\uc774, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0ac\ub78c\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uc9c0\ud0a4\uae30 \uc704\ud55c \uc608\ubc29 \ubc0f \uce58\ub8cc \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \uc788\uc5b4 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \uac00\ubcbc\uc774 \uc5ec\uae38 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \uc0ac\uc548\uc774\uc9c0\ub9cc, \uc5f0\uad6c\uc790\ub4e4\uc740 \uc2e4\ud5d8\uc744 \uc218\ud589\ud560 \ub54c \ucd5c\ub300\ud55c\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba70 \ub3d9\ubb3c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\uace0 \ub178\ub825\ud569\ub2c8\ub2e4","\ub05d\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc758 \ubcd1\ud589\uc740 \uad81\uadf9\uc801\uc73c\ub85c \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub354 \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud560 \uac83\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uc6b0\ub824\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \ub354\uc6b1 \uc778\uac04\uc801\uc778 \uc870\uac74\uc744 \ub9c8\ub828\ud558\uace0\uc790 \ud558\ub294 \uc6c0\uc9c1\uc784\uc774 \uacc4\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc740 \uc544\uc9c1\uae4c\uc9c0 \uae30\uc220\uc801\uc73c\ub85c \ub300\uccb4\ub420 \uc218 \uc5c6\ub294 \ub370 \uadf8 \uc774\uc720\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \ubc1c\ub2ec\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uacfc \uc778\uccb4 \ubaa8\ud615 \uc5f0\uad6c\ub294 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc0b0\uc5c5\uacfc \uc5f0\uad6c \uae30\uad00\uc774 \ud611\ub825\ud558\uc5ec \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \uc790\uc6d0\uc744 \ud22c\uc785\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\ub9cc\uc73c\ub85c\ub294 \ud574\uacb0\ud560 \uc218 \uc5c6\ub294 \ud2b9\uc815\ud55c \uacfc\ud559\uc801 \ubb38\uc81c \ud574\uacb0\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc5f0\uad6c \uc790\uae08\uc744 \ub300\uccb4 \ubc29\ubc95\uc5d0 \uc9d1\uc911\ud558\ub294 \uac83 \uc5ed\uc2dc \uc911\uc694\ud558\uc9c0\ub9cc, \ub2e8\uae30\uc801\uc73c\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \uc2e4\uc81c\uc801\uc774\uace0 \uc2e4\uc9c8\uc801\uc778 \ub370\uc774\ud130\uc758 \ud544\uc694\uc131\uc744 \uac04\uacfc\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uc724\ub9ac\uc801 \ucc45\uc784 \uc218\ud589\uc5d0 \uc788\uc5b4\uc11c\ub3c4 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubc1c\uc804 \uc5c6\uc774 \ub300\uccb4 \uae30\uc220\uc774 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud558\uba70, \uadf8\ub3d9\uc548 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc5d0 \ub300\ud55c \ud544\uc694\ub294 \uacc4\uc18d\ud574\uc11c \uc99d\uac00\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uc758\ud559\uc801 \ub3cc\ud30c\uad6c\ub97c \uc81c\uacf5\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc724\ub9ac\uc801\uc73c\ub85c \uad00\ub9ac\ud558\uace0, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud558\ub294 \ubc95\uc801 \uae30\uc900\uc774 \uc874\uc7ac\ud558\uba70, \uc774\ub97c \uac15\ud654\ud558\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85\uc758 \uc9c8\uacfc \uc9c1\uacb0\ub418\ub294 \uc911\uc694\ud55c \ubb38\uc81c\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \uae30\uc220\uc774 \uc544\ubb34\ub9ac \ubc1c\uc804\ud558\ub354\ub77c\ub3c4 \uc544\uc9c1\uae4c\uc9c0\ub294 \uc784\uc0c1 \uc2dc\ud5d8\uc5d0 \ub3cc\uc785\ud558\uae30 \uc804\uc758 \uc548\uc804\uc131\uacfc \uc720\ud6a8\uc131 \uac80\uc99d \uacfc\uc815\uc5d0\uc11c\uc758 \ubcf4\uc644\uc801 \uc5ed\ud560\uc5d0 \uba38\ubb3c \uc218\ubc16\uc5d0 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud604 \uc2dc\uc810\uc5d0\uc11c \uacfc\ud559\uc801 \ud544\uc694\uc131\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc774\uc720\uac00 \uc788\uc73c\uba70, \uc774\ub294 \ub2e8\uc9c0 \uc778\uac04\uc758 \uc774\uc775\uc744 \uc704\ud568\uc774 \uc544\ub2d9\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc5f0\uad6c \uac1c\ubc1c \ub178\ub825\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub97c \ud1b5\ud574 \uc810\ucc28 \ub3d9\ubb3c \uc0ac\uc6a9\uc744 \uac10\uc18c\uc2dc\ud0ac \uac00\ub2a5\uc131\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2dc\ud5d8\ubc95\uc774 \uc911\uc694\ud558\uc9c0\ub9cc \ucda9\ubd84\uce58 \uc54a\ub2e4\ub294 \ubc18\ub860\uc73c\ub85c\uc368, \ud604 \uc2dc\uc810\uc5d0\uc11c \uc774\ub7ec\ud55c \ubc29\ubc95\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \uc774\ub974\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\ub3c4\ub97c \uc904\uc774\uae30 \uc704\ud55c \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc774 \ud65c\ubc1c\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\ub294 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0\ub3c4 \uae30\uc5ec\ud558\uba70 \uc7a5\uae30\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\ub3c4\ub97c \uc904\uc77c \uc218 \uc788\ub294 \uae38\uc744 \uc5f4\uc5b4\uc90d\ub2c8\ub2e4","\uc14b\uc9f8, \uc2e4\ud5d8 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uac1c\uc120\ud558\uace0 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uac00\uc774\ub4dc\ub77c\uc778\uc774 \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc758\uc57d\ud488\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \uc785\uc99d\ud558\ub294 \ub370 \ud544\uc218\uc801\uc774\uba70, \ub300\uccb4\ud560 \ub9cc\ud55c \ucda9\ubd84\ud788 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \ubd80\uc871\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uace0 \uc801\uc6a9\ud558\ub294 \uac83\uc5d0\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud558\uba70, \uc544\uc9c1\uc740 \uae30\uc874\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\ub2e4\ub294 \uc810\uc5d0\uc11c \uc724\ub9ac\uc801 \uc815\ub2f9\uc131\uc744 \uac00\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uae30\uc220\uc740 \uc544\uc9c1 \uc644\uc804\ud55c \ud574\ub2f5\uc744 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uacf5 \uc7a5\uae30\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub85c\ub294 \uc644\ubcbd\ud558\uac8c \uc7ac\ud604\ud560 \uc218 \uc5c6\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uba85\uccb4\uc758 \ubc18\uc751\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uc5d0\uac8c \uace0\ud1b5\uc744 \uc8fc\ub294 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \uc2ec\uac01\ud55c \ubcd1\uc758 \uce58\ub8cc\ub97c \ubc1c\uc804\uc2dc\ud0a4\uae30 \uc704\ud55c \ubd88\uac00\ud53c\ud55c \ubd80\ubd84\uc73c\ub85c \uac04\uc8fc\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uad6d\uc81c\uc801\uc778 \ub178\ub825\uc740 \uc774\ubbf8 \uc9c4\ud589\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc9c0\uc18d \uac00\ub2a5\ud55c \ubc1c\uc804\uc758 \uc77c\ud658\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559 \uae30\uc220 \ubc1c\uc804\uacfc \uc724\ub9ac\uc801 \uac00\uce58\ub97c \uc870\ud654\uc2dc\ud0a4\ub824\ub294 \ub178\ub825\uc774 \uacc4\uc18d\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc810\uc9c4\uc801\uc778 \ub300\uccb4\ub85c \uc774\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \uc544\uc9c1 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc558\uae30 \ub54c\ubb38\uc5d0, \ub300\uccb4 \ubc29\ubc95\ub9cc\uc73c\ub85c\ub294 \ud604\uc7ac \ubaa8\ub4e0 \uc5f0\uad6c\uc758 \uae30\ubcf8 \uc694\uad6c\ub97c \ucda9\uc871\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uc815\ubcf4\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \ub300\uccb4 \uae30\uc220 \ubc1c\uc804\uc5d0 \uae30\uc5ec\ud558\uba70, \uc774\ub7ec\ud55c \uc815\ubcf4\ub97c \ud1b5\ud574 \ud5a5\ud6c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc77c \uc218 \uc788\ub294 \uae30\ubc18\uc744 \ub9c8\ub828\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4. [\uc2e0\uc57d \uac1c\ubc1c \ubc0f \uad00\ub828 \uc11c\ube44\uc2a4\ub97c \uc218\ud589\ud558\ub294] \ubc14\uc774\uc624\uc820\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc73c\ub85c\ubd80\ud130 \uc5bb\uc740 \ub370\uc774\ud130\uac00 \ub300\uccb4 \uac00\ub2a5\ud55c \uae30\uc220 \uac1c\ubc1c\uc758 \uadc0\uc911\ud55c \ucc38\uace0 \uc790\ub8cc\ub85c \uc0ac\uc6a9\ub418\uba70, \uc774\ub294 \uacb0\uad6d \ub354 \ub098\uc740 \ub300\uc548\uc744 \ucc3e\ub294 \ub370 \uae30\uc5ec\ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \uc5ec\uc804\ud788 \ubd88\uc644\uc804\ud55c \uc0c1\ud0dc\uc774\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \uc774\ub974\uc9c0 \ubabb\ud588\ub2e4\ub294 \uc810\uc744 \uc9c0\uc801\ud558\uace0 \uc2f6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uacfc\ud559\uc801 \ubc1c\uc804\uc774 \uacb0\uad6d \ubaa8\ub4e0 \uc0dd\uba85\uccb4\uc758 \ucd5c\uc0c1\uc758 \ubcf5\uc9c0\ub97c \ubaa9\ud45c\ub85c \ud558\uace0 \uc788\ub2e4\ub294 \uc810\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uaddc\uc81c\uc640 \uad00\ub9ac\uac00 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \uc644\uc804\ud788 \uad6c\ud604\ub418\uc9c0 \uc54a\uc558\ub2e4\uace0 \ud574\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud3ec\uae30\ud560 \uc218 \uc5c6\ub294 \uc774\uc720\ub294 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc758 \uae34\uae09\uc131\uacfc \ud544\uc694\uc131 \ub54c\ubb38\uc785\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0\ub294 \uc2dc\uac04\uacfc \uc790\uc6d0\uc774 \ub9ce\uc774 \uc18c\uc694\ub418\uba70, \uc774\ub294 \uae30\uc874 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc7a5\uae30\uc801\uc778 \uc5f0\uad6c\uc640 \uac80\uc99d\uc774 \ud544\uc694\ud568\uc744 \uc758\ubbf8\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \ub300\uc548\uc744 \ucc3e\uae30 \uc704\ud55c \uc5f0\uad6c\uac00 \ucda9\ubd84\ud558\uc9c0 \uc54a\ub2e4\ub294 \uc9c0\uc801\uc740 \uc77c\uacac \ud0c0\ub2f9\ud558\uc9c0\ub9cc, \uadf8\ub85c \uc778\ud574 \uc911\uc99d \uc9c8\ud658\uc758 \uc2e0\uc57d \uac1c\ubc1c\uc774 \uc815\uccb4\ub418\ub294 \uac83\uc740 \ubd80\uc801\uc808\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uac1c\ubc1c\uc774 \ubd88\uac00\ub2a5\ud588\ub358 \uce58\ub8cc\ubc95\ub4e4\uc740 \uc5ec\uc804\ud788 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uacb0\uad6d, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uacfc \uc9c0\uc18d\uc801\uc778 \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c \ub178\ub825 \uc18d\uc5d0 \ud568\uaed8 \ubcd1\ud589\ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc704\ud5d8\uc744 \uc904\uc774\ub294 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uc548\uc801 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\ub2e4\ub294 \uc810\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc904\uc5b4\ub4e4\uace0 \ub300\uccb4 \ubc29\ubc95\uc774 \uac15\uc870\ub418\ub354\ub77c\ub3c4, \ud604\uc7ac \uc0ac\uc6a9 \uac00\ub2a5\ud55c \ub300\uccb4 \uae30\uc220\uc740 \uaddc\uc81c \ub2f9\uad6d\uc5d0\uac8c\uc11c \uacf5\uc2dd\uc801\uc778 \uc2b9\uc778\uc744 \uc5bb\uc744 \ub9cc\ud07c \uc2e0\ub8b0\ub3c4 \ub192\uc740 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\ub294 \ub370 \uc788\uc5b4 \uc544\uc9c1 \ubd88\ucda9\ubd84\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uac00\ub2a5\ud55c \ub2e4\ub978 \ubc29\ubc95\uc774 \uc5c6\ub2e4\ub294 \uc810\uc5d0\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uac80\uc99d\ub41c \uce58\ub8cc\ubc95\ub4e4\uc740 \uc774\ubbf8 \ub9ce\uc740 \uacbd\uc6b0\uc5d0 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud574\uc654\uc73c\uba70 \uc774\ub294 \ub300\uccb4 \ubc29\ubc95\uc774 \ub530\ub77c\uc624\uc9c0 \ubabb\ud558\ub294 \uc601\uc5ed\uc785\ub2c8\ub2e4","\uad81\uadf9\uc801\uc73c\ub85c, \ub354 \uc724\ub9ac\uc801\uc778 \ubc29\ud5a5\uc73c\ub85c \ub098\uc544\uac00\uae30 \uc704\ud574\uc11c\ub294 \uae30\uc220\uc801 \ub300\uc548\uc744 \uc5f0\uad6c \ubc0f \ubc1c\uc804\uc2dc\ud0a4\ub294 \ub3d9\uc2dc\uc5d0, \ud604 \ub2e8\uacc4\uc5d0\uc11c\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub3c4 \ud568\uaed8 \uc9c4\ud589\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uc548 \uac1c\ubc1c\uc744 \uc704\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790\ub294 \uafb8\uc900\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub178\ub825\uc774 \uc801\uadf9\uc801\uc73c\ub85c \ucd94\uc9c4\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac \uc2dc\uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc5f0\uad6c \ubc29\ubc95\ub4e4\uc774 \uc874\uc7ac\ud558\uc9c0\ub9cc, \uc774\ub4e4\uc774 \uc644\uc804\ud788 \uac80\uc99d\ub418\uc9c0 \uc54a\uc558\uace0 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ub2f4\ubcf4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubd88\ud544\uc694\ud558\ub2e4\ub294 \uc8fc\uc7a5\uc740 \uadf8 \uc2e4\ud5d8\uc774 \ubcf4\ud5d8\uc758 \uc5ed\ud560\uc744 \ud558\ub294 \uac83\uc744 \uac04\uacfc\ud569\ub2c8\ub2e4","\ub354 \ub098\uc544\uac00, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uc0dd\uba85\uacfc \uc9c1\uacb0\ub41c \uc911\uc694\ud55c \ubb38\uc81c \ud574\uacb0\uc5d0 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ube44\ub3d9\ubb3c \uc5f0\uad6c \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc2dc\uac04\uc774 \uac78\ub9ac\ub294 \ubcf5\uc7a1\ud55c \uacfc\uc815\uc774\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uadf8 \uc0ac\uc774\uc758 \uc911\uac04 \ub2e8\uacc4\ub85c\uc11c \uc5ed\ud560\uc744 \ud574\uc57c \ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \uad6d\uc81c\uc801 \ud611\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uac10\uc18c\uc640 \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc7a5\uae30\uc801\uc778 \ubaa9\ud45c\uc5ec\uc57c \ud558\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uacfc\ud559\uc801 \uacac\uace0\ud568\uacfc \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \ub370 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubd88\uac00\ud53c\ud558\ub2e4\uace0 \ud310\ub2e8\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc0ac\uc6a9\uc744 \uc704\ud55c \uaddc\uc815\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uc5bb\uc744 \uc218 \uc788\ub294 \uc815\ubcf4\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc704\ud5d8\uc131\uc744 \uc904\uc774\uace0 \ub354 \ub098\uc740 \ub300\uccb4 \ubc29\ubc95\uc744 \ud0d0\uc0c9\ud558\ub294 \uacfc\uc815\uc744 \uac00\uc18d\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc644\uc804\ud788 \ub300\uccb4 \uac00\ub2a5\ud55c \ubc29\ubc95\uc774 \uc544\uc9c1 \uc5c6\ub294 \uc0c1\ud669\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\uae30 \uc704\ud574 \ud544\uc694\ud55c \ubd80\ubd84\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud6a8\uacfc\ub97c \uacf5\uace0\ud788 \ud558\uba74\uc11c \uc724\ub9ac\uc801 \ucd95\uc18c \ubc29\uc548\uc744 \ubcd1\ud589\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc774\ubbf8 \uc904\uc774\uace0 \ub300\uccb4\ud558\ub824\ub294 \ub178\ub825\uc774 \uc9c4\ud589 \uc911\uc774\uba70, \uc774\ub294 \uc810\uc9c4\uc801\uc73c\ub85c \uc9c0\uc18d\ub420 \uac83\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ube44\ub85d \ub300\uccb4 \ubc29\ubc95\uc774 \uac1c\ubc1c \uc911\uc774\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc774\ub7ec\ud55c \ubc29\ubc95\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uc9c0 \ubabb\ud55c\ub2e4\ub294 \uc810\uc744 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \ud070 \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\uc131\uc744 \uac04\uacfc\ud560 \uc218 \uc5c6\ub294 \uc774\uc720\ub294 \ub300\uccb4 \ubc29\ubc95\uc774 \uc644\uc804\ud788 \uc790\ub9ac \uc7a1\uae30 \uc704\ud574 \uc544\uc9c1 \ub9ce\uc740 \uc2dc\uac04\uc774 \ud544\uc694\ud558\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4","\uad81\uadf9\uc801\uc778 \ubaa9\ud45c\ub294 \uc778\uac04\uacfc \ub3d9\ubb3c \ubaa8\ub450\uc758 \uc0dd\uba85\uacfc \uc548\uc804\uc744 \ubcf4\uc7a5\ud558\ub294 \uac83\uc785\ub2c8\ub2e4","\ub9ce\uc740 \uc5f0\uad6c\uc790\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc9c4\ud589\ud560 \ub54c \ucd5c\ub300\ud55c\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba70, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \uae30\uc220\uacfc \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uace0 \uc801\uc6a9\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559\uc801 \uc9c4\ubcf4\uc640 \ub3d9\ubb3c \uad8c\ub9ac\ub97c \uade0\ud615 \uc788\uac8c \uace0\ub824\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ud604\uc7ac \uac1c\ubc1c \uc911\uc778 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \ucda9\ubd84\ud55c \uc131\uacfc\ub97c \uc774\ub8e8\uae30 \uc804\uae4c\uc9c0\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uac16\ub294 \uc2e4\uc6a9\uc801 \uc774\uc775\uc774 \ucee4\uc11c \uc774\ub97c \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc74c\uc744 \uc778\uc9c0\ud574\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc810\uc9c4\uc801\uc778 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc758 \uac1c\ubc1c\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc73c\ub098 \uc2e4\uc9c8\uc801\uc73c\ub85c \uc751\uc6a9 \uac00\ub2a5\ud55c \uc218\uc900\uc5d0\ub294 \uc774\ub974\uc9c0 \ubabb\ud55c \uc0c1\ud669\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uc724\ub9ac\uc801 \uc811\uadfc\uc740 \ubc18\ub4dc\uc2dc \ud568\uaed8 \uac00\uc57c \ud558\uba70, \uc774\ub294 \ubc95\uc801 \uaddc\uc81c\uc640 \uc9c0\uce68 \uac15\ud654\ub85c \uc774\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ube44\uce68\uc2b5\uc801 \ubc29\ubc95\uacfc \uc778\uacf5\uc9c0\ub2a5 \uae30\uc220\uc774 \ubc1c\uc804\ud568\uc5d0 \ub530\ub77c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\ub2e4 \uc724\ub9ac\uc801\uc73c\ub85c \uc218\ud589\ud560 \uc218 \uc788\ub294 \uc5ec\uc9c0\uac00 \uc0dd\uacbc\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4 \uc801\uc6a9\uc758 \uc548\uc804\uc131\uacfc \uc720\ud6a8\uc131\uc744 \uac80\uc99d\ud558\ub294 \ub370 \uc788\uc5b4 \ubd88\uac00\ud53c\ud55c \ub2e8\uacc4\ub85c, \uc774\ub7ec\ud55c \uacfc\uc815\uc744 \uac70\uce58\uc9c0 \uc54a\uc73c\uba74 \uc5f0\uad6c \uacb0\uacfc\uc5d0 \ub300\ud574 \uc608\uae30\uce58 \ubabb\ud55c \ubd80\uc791\uc6a9\uc774 \ubc1c\uc0dd\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc73c\ub85c \uc778\ub958 \uc804\uccb4\uc5d0 \ud61c\ud0dd\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc704\ud55c \uc790\uc6d0 \ud22c\uc790\uc640 \ub178\ub825\uc740 \ucda9\ubd84\ud788 \uac15\uc870\ub420 \uac00\uce58\uac00 \uc788\uc9c0\ub9cc, \uadf8 \uacfc\uc815\uc774 \ubcd1\ud589\ub418\ub294 \ub3d9\uc548 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\ub2e8\ub420 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ucd5c\ub300\ud55c \uc900\uc218\ud574\ub3c4 \uace0\ud1b5\uc758 \uc874\uc7ac\ub97c \uc644\uc804\ud788 \uc81c\uac70\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc810\uc740 \uc778\uc815\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc73c\ub85c \uc815\ub2f9\ud654\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\ub300\ud55c \uc0dd\uba85\uc744 \uad6c\ud558\uae30 \uc704\ud55c \ud544\uc218\uc801\uc778 \ub2e8\uacc4\ub85c, \ud2b9\ud788 \uadf8 \ub300\uc548\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc740 \ubd84\uc57c\uc5d0\uc11c\ub294 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ube44\ub3d9\ubb3c\uc801 \uc2e4\ud5d8 \ubaa8\ub378 \uc5f0\uad6c\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub97c \ud1b5\ud574 \ubbf8\ub798\uc5d0\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc744 \ucd09\uc9c4\ud558\uae30 \uc704\ud55c \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc9c0\ub9cc, \uadf8\uac83\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\ubcbd\ud788 \ub300\uccb4\ud560 \uc218 \uc788\uc744 \ub54c\uae4c\uc9c0 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","Pharmaceutical Product Development (PPD)\uc640 \uac19\uc740 \uc804\uc784\uc0c1 \uc11c\ube44\uc2a4 \uc81c\uacf5 \uc5c5\uccb4\ub294 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uace0 \ucc44\ud0dd\ud558\ub294 \ub370 \uc801\uadf9\uc801\uc774\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc644\uc804\ud55c \ub300\uccb4\ub294 \uc544\uc9c1 \uc774\ub8e8\uc5b4\uc9c0\uc9c0 \uc54a\uc558\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacc4\uc18d\ud574\uc11c \uc911\uc694\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc778\uacf5 \uc7a5\uae30\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378 \ub4f1 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubd80\uc791\uc6a9\uc744 \uac10\uc18c\uc2dc\ud0a4\ub294 \uc911\uc694\ud55c \ubd80\ubd84\uc774\uc9c0\ub9cc, \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \uc774\ub97c \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubcc0\uc218\uc640 \ubcf5\uc7a1\ud55c \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\uae30\uc5d0\ub294 \ud604\uc7ac \uae30\uc220\ub85c\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c, \uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud55c \ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c\ub294 \uacc4\uc18d\ud574\uc11c \uc9c4\ud589\ub418\uace0 \uc788\uc9c0\ub9cc, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uad81\uadf9\uc801\uc73c\ub85c \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ub370\uae4c\uc9c0 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uac1c\ubc1c\ub41c \uc2e0\uc57d\uacfc \uce58\ub8cc\ubc95\uc740 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uc874\uacfc \uc9c1\uacb0\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uacfc\ud559\uc801 \ud544\uc694\uc131 \uc0ac\uc774\uc5d0\uc11c \uade0\ud615\uc744 \ub9de\ucd94\ub294 \uac83\uc774 \uc911\uc694\ud558\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uac10\uc18c \ubc29\ud5a5\uc744 \ubaa9\ud45c\ub85c \uc0bc\ub294 \uc815\ucc45\uacfc \uc5f0\uad6c\uac1c\ubc1c \ud22c\uc790\ub85c \ubc1c\uc804\ud574\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \ubc95\uc801 \uae30\uc900\uacfc \uaddc\uc815\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1\uae4c\uc9c0 \uc778\uac04 \uc9c8\ud658 \ubaa8\ub378\uc744 \uc815\ud655\ud788 \ubc18\uc601\ud560 \uc218 \uc788\ub294 \ub300\uccb4 \ubc29\ubc95\uc774 \ubd80\uc871\ud55c \ud604\uc2e4\uc5d0\uc11c \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\ub978 \uc0dd\uba85\uccb4\uc758 \uad8c\ub9ac\uc640 \uc778\ub958\uc758 \uc774\uc775 \uc0ac\uc774\uc5d0\uc11c \uade0\ud615\uc744 \ucc3e\uae30 \uc704\ud55c \ub178\ub825 \uc18d\uc5d0 \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc2e4\ud5d8 \uc124\uacc4\uc758 \uac1c\uc120\uacfc \ub354\ubd88\uc5b4 \uc5c4\uaca9\ud55c \uaddc\uc81c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc5f0\uad6c\uc790\ub4e4\uc740 \uac00\ub2a5\ud55c \ucd5c\uace0\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ub9cc\uc871\uc2dc\ud0a4\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \ub178\ub825\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798 \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc740 \ub9e4\uc6b0 \uc911\uc694\ud55c \uace0\ub824 \uc0ac\ud56d\uc774\uc9c0\ub9cc, \ud604\uc7ac\uc758 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uc5f0\uad6c \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc81c\uc2dc\ud560 \uc218 \uc788\ub294 \uacb0\uacfc\ub97c \uc644\ubcbd\ud558\uac8c \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \ud604\uc7ac\uc758 \uae30\uc220\ub85c \ucda9\ubd84\ud55c \uc5f0\uad6c \uacb0\uacfc\ub97c \uc5bb\ub294 \uac83\uc740 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uacfc\ud559\uc801 \uc9c4\ubcf4\ub294 \uc724\ub9ac\uc801 \ubc1c\uc804\uacfc \ud568\uaed8 \uc774\ub8e8\uc5b4\uc838\uc57c \ud558\uba70, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub3c4 \uc9c8\ubcd1 \uc5f0\uad6c\ub97c \uc218\ud589\ud560 \uc218 \uc788\ub3c4\ub85d \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc7a5\ub824\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95 \uac1c\ubc1c\uc758 \uc18d\ub3c4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc815\ub3c4\ub85c \ube60\ub974\uac8c \uc774\ub8e8\uc5b4\uc9c0\uc9c0 \uc54a\uace0 \uc788\uc5b4, \ud604\uc7ac\uc758 \uc5f0\uad6c \ubc0f \uac1c\ubc1c \uaddc\ubaa8\ub97c \uac10\ub2f9\ud558\uae30 \uc704\ud55c \uc548\uc804\uc7a5\uce58\ub85c\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc720\uc9c0\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\ub294 \uac83\uc744 \ucd5c\uc885 \ubaa9\ud45c\ub85c \ud558\ub294 \uac83\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \uadf8 \uacfc\uc815\uc5d0\uc11c \uc778\uac04\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \ubcf4\ud638\ud558\uae30 \uc704\ud55c \ud604\uc7ac\uc758 \uc2e4\uc6a9\uc801 \ud574\uacb0\ucc45\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \ud65c\uc6a9\ud574\uc57c \ud55c\ub2e4\ub294 \uc810\uc744 \uc778\uc2dd\ud574\uc57c \ud569\ub2c8\ub2e4","\uba3c\uc800, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc904\uc774\uae30 \uc704\ud55c \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc740 \uc9c4\ud589 \uc911\uc774\ub098, \ud604\uc2e4\uc801\uc73c\ub85c \ubaa8\ub4e0 \uc0c1\ud669\uacfc \uc9c8\ubcd1\uc744 \ud3ec\uad04\ud560 \uc218 \uc788\ub294 \ub2a5\ub825\uc744 \uac16\ucd94\uae30\uc5d0\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc6b0\ub9ac\ub294 \ub3d9\ubb3c\uc744 \uc0ac\uc6a9\ud558\ub294 \ub3d9\uc548 \ubc1c\uc0dd\ud558\ub294 \uc724\ub9ac\uc801 \ub51c\ub808\ub9c8\ub97c \uc798 \uc774\ud574\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\uc744 \uc778\uc815\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud61c\ud0dd\uc744 \uc5bb\uc740 \uc778\ub958\uc758 \uac74\uac15\uc740 \uacfc\uc18c\ud3c9\uac00\ub420 \uc218 \uc5c6\ub294 \ud604\uc2e4\uc785\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ubc1c\uc804\ub41c \uc0ac\ud68c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uace0 \ub300\uccb4 \ubc29\ubc95\uc744 \uac15\uad6c\ud558\uae30 \uc704\ud55c \uc790\uc6d0\uc744 \uc774\ubbf8 \ud22c\uc790\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559 \uae30\uc220\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uadf8\ub7fc\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \ubcf5\ud569\uc801\uc778 \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c \uc774\ud574\ub294 \uc544\uc9c1 \uc644\uc804\ud558\uac8c \ub300\uccb4\ud558\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900\uc758 \uc9c0\uc18d\uc801\uc778 \uac1c\uc120\uc740 \uc911\uc694\ud55c \uacfc\uc81c\uc774\uba70, \ub3d9\uc2dc\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\ub2e4\uba74 \uc5bb\uae30 \uc5b4\ub824\uc6b4 \uc911\uc694\ud55c \uc0dd\ub9ac\ud559\uc801 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc73c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc911\uc694\ud55c \ubaa9\ud45c\uc774\uba70 \ub3d9\ubb3c \ubcf5\uc9c0 \ud5a5\uc0c1\uc744 \uc704\ud55c \ub178\ub825\uacfc \ud3ec\uad04\uc801\uc778 \uc811\uadfc\uc744 \uc694\uad6c\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ube44\ub3d9\ubb3c \ub300\uc548 \uc2e4\ud5d8\uc740 \uc544\uc9c1\uae4c\uc9c0 \ub3d9\ubb3c\uc758 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uad81\uadf9\uc801\uc73c\ub85c \ub300\uccb4 \uae30\uc220\uc774 \ub354 \ubc1c\uc804\ud558\uc5ec \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\ub294 \ub0a0\uc774 \uc62c \uc218\ub294 \uc788\uc9c0\ub9cc, \uc804\ud658 \uacfc\uc815\uc744 \uc11c\ub450\ub974\ub294 \uac83\uc740 \uc704\ud5d8\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ud604\uc7ac\uc758 \uae30\uc220\uc801 \ud55c\uacc4\ub97c \uace0\ub824\ud560 \ub54c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \ub2e8\uacc4\ub85c, \ub2e4\ub978 \ub300\uc548\uc774 \uc874\uc7ac\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc2e4\ud5d8\uc774 \uc724\ub9ac\uc801\uc73c\ub85c \ubbfc\uac10\ud55c \ubd80\ubd84\uc774\uc9c0\ub9cc, \uc774\ub97c \ucd5c\uc18c\ud654\ud558\uace0 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220 \uac1c\ubc1c\uc5d0\ub294 \uc774\ubbf8 \ub9ce\uc740 \ub178\ub825\uc774 \uae30\uc6b8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\uc7ac\uc758 \uae30\uc220\ub85c \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uba85\uacfc\ud559 \uc5f0\uad6c\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc758\uc874\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc5f0\uad6c\uc758 \uc644\uc131\ub3c4\ub97c \uc720\uc9c0\ud558\uae30 \uc704\ud55c \ud544\uc5f0\uc801 \uc120\ud0dd\uc785\ub2c8\ub2e4","\ube44\ub85d \uacfc\ud559\uc801 \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud574\uc654\uc73c\ub098, \uc774\ub4e4\uc740 \uc544\uc9c1 \ub3d9\ubb3c \ubaa8\ub378\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0\ub294 \uae34 \uc2dc\uac04\uacfc \ub9c9\ub300\ud55c \uc790\uc6d0\uc774 \ud544\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uacfc\ud559 \uc218\uc900\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4\uac00 \uc644\ubcbd\ud788 \uac00\ub2a5\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\ub2e4\uc218\uc758 \ub300\uccb4 \ubc29\ubc95\uc774 \uac1c\ubc1c \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\uc73c\uba70, \ucda9\ubd84\ud55c \uac80\uc99d\uc744 \uac70\uce5c \uc0c1\ud669\uc774 \uc544\ub2d9\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uc548\uc801\uc778 \uc2e4\ud5d8 \ubc29\ubc95\uc778 \uc778\uacf5 \uc7a5\uae30\ub098 \uc138\ud3ec \ubaa8\ub378\uc774 \uae30\uc220 \ubc1c\uc804\uc5d0 \uae30\uc5ec\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ub2e8\uacc4\uc5d0 \uc774\ub974\uc9c0\ub294 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc624\ub298\ub0a0\uc758 \uc724\ub9ac \uae30\uc900\uc5d0 \ub530\ub77c \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uace0\ub824\ud558\ub294 \ubc29\uc2dd\uc73c\ub85c \uc2e4\ud5d8\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub3c4 \uc5f0\uad6c\ub97c \uc9c4\ud589\ud560 \uc218 \uc788\ub294 \uacbd\uc6b0\uac00 \uc788\uc9c0\ub9cc, \uc0dd\uccb4 \uc218\uc900\uc5d0\uc11c\uc758 \uc815\ud655\ud55c \ubc18\uc751 \uac80\uc99d\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\uc131\uc744 \uc904\uc774\uae30 \uc704\ud574\uc11c\ub294 \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0 \ub300\ud55c \ud22c\uc790\uc640 \uc5f0\uad6c\uac00 \ud655\ub300\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559\uacc4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \ub300\uccb4\ud558\uae30 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc744 \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uc5f0\uad6c \uc0ac\uc774\uc5d0\uc11c \uade0\ud615\uc744 \ucc3e\uae30 \uc704\ud55c \ub178\ub825\uc774 \uacc4\uc18d \uc9c4\ud589 \uc911\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85 \uacbd\uc2dc\uc5d0 \ub300\ud55c \uc6b0\ub824\ub97c \uc81c\uae30\ud560 \uc218 \uc788\uc73c\ub098, \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\uc744 \ud1b5\ud574 \uc774\ub7ec\ud55c \uacbd\ud5a5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uba74\uc774 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uc5f0\uad6c\ub294 \ud604\ub300 \uacfc\ud559\uc5d0\uc11c \uc5c4\uaca9\ud788 \uc870\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ubc30\uc81c\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc0c1\ud669\uc5d0\uc11c \uac00\uc7a5 \uc911\uc694\ud55c \uac83\uc740 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\uc6b0\uc120\uc73c\ub85c \uace0\ub824\ud558\ub294 \uc5f0\uad6c \ud658\uacbd\uc744 \uc870\uc131\ud558\ub294 \uac83\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc778 \uc724\ub9ac\uc801 \ub51c\ub808\ub9c8\uc758 \ud574\uacb0\ucc45\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc77c\ubd80 \uacbd\uc6b0\uc5d0\uc11c \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \uac80\uc99d\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc2e4\ud604 \uac00\ub2a5\ud55c \ub300\uccb4 \ubc29\uc548\uc774 \uc788\ub2e4\uba74 \uc7a5\uae30\uc801\uc73c\ub85c \uc804\ud658\ud558\ub294 \uac83\uc774 \ubcf4\ub2e4 \uc724\ub9ac\uc801\uc77c \uc218 \uc788\uc73c\ub098, \ud604\uc7ac \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9e4\uc6b0 \uc911\uc694\ud55c \ub3c4\uad6c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8 \uc790\uccb4\uc758 \uc724\ub9ac\uc131\uc5d0 \ub300\ud55c \ub17c\uc758\ub294 \uacc4\uc18d\ub418\uc5b4\uc57c \ud558\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uadf8 \ud544\uc694\uc131\uc744 \ubd80\uc815\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc2e4\ud5d8 \ub3d9\ubb3c\uc758 \uace0\ud1b5 \ubb38\uc81c\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \uac10\uc2dc\ub418\uace0 \uc788\uc73c\uba70, \uace0\ud1b5\uc744 \uacbd\uac10\ud558\uae30 \uc704\ud55c \ud601\uc2e0\uc801\uc778 \ubc29\ubc95\ub4e4\ub3c4 \ub3c4\uc785\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc2e4\uc9c8\uc801\uc73c\ub85c \uc904\uc774\uae30 \uc704\ud574 \ucd5c\uc2e0 \uacfc\ud559 \uae30\uc220\uc744 \ub3d9\uc6d0\ud558\uc5ec \ud604\uc7ac \uac00\ub2a5\ud55c \ucd5c\uc120\uc758 \ubc29\uc2dd\uc744 \uad6c\ud604\ud574\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c\ub97c \ud1b5\ud574 \uc5f0\uad6c\uc758 \uc9c8\uacfc \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ubcf4\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uba3c\uc800, \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uac15\ud654\ub418\uc9c0 \uc54a\uc73c\uba74 \ub3d9\ubb3c \ubcf4\ud638\uc5d0 \ud55c\uacc4\uac00 \uc788\ub2e4\ub294 \uc810\uc740 \ubd84\uba85\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \ubaa8\ub378\uc744 \uc0ac\uc6a9\ud558\ub294 Merck & Co","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc73c\ub85c \ucc45\uc784 \uc788\ub294 \uc758\ub8cc \uac1c\ubc1c\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uad81\uadf9\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\uae30 \uc704\ud55c \uacfc\ud559\uc801 \uc9c4\ubcf4\ub294 \uc810\uc9c4\uc801\uc774\uba70, \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub2e4\uc591\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uac74\uac15\uacfc \uc548\uc804\uc5d0 \ub300\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\ub294 \uac80\uc99d\ub41c \ubc29\ubc95\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uadfc\ubcf8\uc801\uc778 \ubcc0\ud654\ub97c \ucd94\uad6c\ud568\uacfc \ub3d9\uc2dc\uc5d0 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc9c0\uc18d\uc801\uc778 \uac1c\uc120\uc740 \ubcd1\ud589\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac\uc758 \uacfc\ud559 \ubc0f \uae30\uc220\ub85c\ub294 \ub300\uccb4 \ubc29\ubc95\ub9cc\uc73c\ub85c\ub294 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc7ac\ud604\ud558\uae30 \uc5b4\ub835\uae30 \ub54c\ubb38\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubaa8\ub4e0 \uc5f0\uad6c\uc758 \ud544\uc218 \ub2e8\uacc4\ub85c \uc0ac\uc6a9\ub418\uc9c0\ub294 \uc54a\uc73c\uba70, \uc5f0\uad6c\uae30\uad00\uc740 \ucd5c\uc18c\ud55c\uc758 \uace0\ud1b5\uc744 \uc8fc\uae30 \uc704\ud574 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc724\ub9ac\uc801 \uc9c0\uce68\uc740 \ub3d9\ubb3c\uc5d0\uac8c \uacfc\ub3c4\ud55c \uace0\ud1b5\uc744 \uc8fc\uc9c0 \uc54a\ub3c4\ub85d \ubcf4\uc7a5\ud558\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uaddc\uc81c\ud558\uba70 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uace0\ub824\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc2dc\uac04\uc774 \ud544\uc694\ud558\uba70, \uadf8\ub3d9\uc548 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud558\uba74\uc11c \uc9c4\ud589\ub420 \uc218 \uc788\ub294 \uaddc\uc81c\uc640 \uc9c0\uce68\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uacfc \uc778\ub3c4\uc801 \ucc98\uc6b0\ub97c \uace0\ub824\ud55c \uc2e4\ud5d8 \uc9c0\uce68\uc744 \uc5c4\uaca9\ud788 \ub530\ub974\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \uaddc\uc81c \ub2f9\uad6d\uacfc \uc0b0\uc5c5\uccb4 \uc0ac\uc774\uc5d0\uc11c \ud45c\uc900\ud654\ub41c \uac80\uc99d \ubc29\ubc95\uc73c\ub85c \ub0a8\uc544\uc788\uae30 \ub54c\ubb38\uc5d0, \uc644\uc804\ud55c \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc73c\ub85c\uc758 \uc804\ud658\uc774 \uc989\uc2dc \uc774\ub8e8\uc5b4\uc9c0\uc9c0 \uc54a\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\ubc95\ub4e4\uc774 \uc774\ubbf8 \ub9c8\ub828\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc804\uc801\uc73c\ub85c \uc5c6\uc568 \uc218\ub294 \uc5c6\uc9c0\ub9cc, \uacfc\ud559\uc801 \uc9c4\ubcf4\uc640 \uc778\ub958\uc758 \uc0dd\uba85 \ubcf4\ud638\ub77c\ub294 \ub300\uc758 \uc544\ub798 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc704\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc774 \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc778 \uc774\uc720 \uc911 \ud558\ub098\ub294, \uc544\uc9c1\uae4c\uc9c0 \uc5b4\ub5a0\ud55c \ub300\uccb4 \ubc29\ubc95\ub3c4 \uc644\ubcbd\ud558\uac8c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc5ed\ud560\uc744 \ub300\uc2e0\ud560 \uc218 \uc5c6\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4","\ub450 \ubc88\uc9f8\ub85c, \uc5f0\uad6c\uc790\ub4e4\uc774 \uc724\ub9ac\uc801 \uc6d0\uce59\uc744 \uc874\uc911\ud558\uba74\uc11c\ub3c4 \ud544\uc218\uc801\uc778 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud560 \uc218 \uc788\ub294 \ubc29\uc548\uc744 \uacc4\uc18d \ubaa8\uc0c9\ud558\uace0 \uc788\ub2e4\ub294 \uc810\uc5d0\uc11c \uc6b0\ub9ac\ub294 \ud76c\ub9dd\uc744 \uac00\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc784\uc0c1 \uc2dc\ud5d8\uc758 \uc548\uc804\uc131\uc744 \ub192\uc774\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\ub7c9\uc758 \uacfc\ud559\uc801 \ub370\uc774\ud130 \uc0dd\uc131\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ubd88\ud544\uc694\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub9c9\uae30 \uc704\ud55c \ub178\ub825\uc774 \ud575\uc2ec\uc801\uc774\ub77c\ub294 \uc810\uc744 \uc778\uc2dd\ud558\uace0 \uc774\ub7ec\ud55c \uacfc\uc815\uc5d0\uc11c \uacf5\uc815\ud558\uace0 \uc815\ud655\ud55c \ud3c9\uac00\uac00 \uc774\ub8e8\uc5b4\uc838\uc57c \ud55c\ub2e4\ub294 \uac83\uc740 \uc758\uc2ec\uc758 \uc5ec\uc9c0\uac00 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85 \uc724\ub9ac\ub97c \uc874\uc911\ud558\ub294 \ub3d9\uc2dc\uc5d0 \uc778\uac04 \uc0dd\uba85\uc744 \ubcf4\ud638\ud558\ub294 \uade0\ud615\uc744 \ub9de\ucd9c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uc9c0\ud0a4\uae30 \uc704\ud574 \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ubaa9\uc801\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc131\uc744 \ubd80\uc5ec\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \uc694\uc18c\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uc5b4 \uc654\uace0, \uc774\ub294 \uc5f0\uad6c\uc5d0 \uc788\uc5b4 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud55c \uc911\uc694\ud55c \uc218\ub2e8\uc774 \ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uae30\ubc18\uc73c\ub85c \ud55c \uc5f0\uad6c\uc640 \uc2e0\uc57d \uac1c\ubc1c\uc5d0 \uad00\uc5ec\ud558\ub294 Labcorp Drug Development\ub294 \ud604\uc7ac\uc758 \ub300\uccb4 \ubc29\ubc95\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uae30\uc5d0\ub294 \uae30\uc220\uc801 \ud55c\uacc4\uac00 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uba3c\uc800, \ud604\ud589 \ub3d9\ubb3c \uc2e4\ud5d8 \uaddc\uc81c\ub294 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uace0\uc790 \ud558\ub294 \ub178\ub825\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ub2f9\uc7a5 \uc0dd\uba85\uc744 \uad6c\ud574\uc57c \ud558\ub294 \uae09\ubc15\ud55c \uc0c1\ud669\uc5d0\uc11c\ub294 \ud604\uc7ac \uac00\uc7a5 \ud6a8\uacfc\uc801\uc774\uace0 \uc548\uc804\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\uc131\uc744 \uac04\uacfc\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uace0\ub3c4\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc774 \ub3d9\ubb3c \uc2e4\ud5d8 \uc5f0\uad6c\uc5d0\uc11c \uc9c0\ucf1c\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc794\uc778\ud558\ub2e4\ub294 \uc8fc\uc7a5\uc774 \uc788\uc744 \uc218 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc644\ubcbd\ud55c \ubc29\ubc95\uc774 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uc548\uc801 \uc5f0\uad6c \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ud568\uaed8 \ub300\uccb4 \ubc29\ubc95\uc744 \ubcd1\ud589\ud558\uc5ec \uac1c\ubc1c\ud558\ub294 \uc811\uadfc\uc740 \uc778\uac04\uacfc \ub3d9\ubb3c \ubaa8\ub450\uc758 \uc0dd\uba85\uc744 \uc874\uc911\ud558\ub294 \uade0\ud615 \uc7a1\ud78c \uc804\ub7b5\uc744 \uc81c\uc2dc\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uaddc\uc81c\uc640 \uac10\ub3c5\uc774 \uac01 \uae30\uad00\ubcc4\ub85c \uc0c1\uc774\ud558\uac8c \uc774\ud589\ub420 \uc218 \uc788\ub2e4\ub294 \uc758\ubb38\uc5d0 \ub300\ud574, \uc2e4\ud5d8 \uae30\uc900\uc758 \uac15\ud654\uc640 \uc77c\uad00\ub41c \uac10\ub3c5 \uccb4\uacc4 \uad6c\ucd95\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc218\ub2e8\uc774 \ucda9\ubd84\ud788 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \ubcf4\uc7a5\ud558\uc9c0 \ubabb\ud55c\ub2e4\ub294 \uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc778\uac04\uacfc \ub3d9\ubb3c\uc774 \ud568\uaed8 \uacf5\uc0dd\ud560 \uc218 \uc788\ub294 \uc0ac\ud68c\ub97c \uad6c\ucd95\ud558\ub294 \uac83\uc740 \ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ud601\uc2e0 \uae30\uc220\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ub2ec\ub824 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \ubc29\ubc95\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \uc5c4\uaca9\ud55c \uaddc\uc815\uacfc \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc124\uc815\ud568\uc73c\ub85c\uc368 \uc644\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uc2e4\ud5d8\ubc95\uc774 \uc911\uc694\ud558\ub2e4\ub294 \uc810\uc5d0 \ub3d9\uc758\ud558\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \ud55c\uacc4 \uc548\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uac1c\ubc1c\ud560 \uc218 \uc788\ub294 \uce58\ub8cc\ubc95\uc5d0\ub294 \uc81c\ud55c\uc774 \ub530\ub985\ub2c8\ub2e4","\ub354 \ub098\uc544\uac00, \ub3d9\ubb3c\uc5d0 \ub300\ud55c \uc0dd\uba85\uccb4\ub85c\uc11c\uc758 \uc874\uc911\uc740 \uacfc\ud559\uacc4 \ub0b4\ubd80\uc5d0\uc11c\ub3c4 \uc911\uc694\ud55c \uac00\uce58\ub85c \uc790\ub9ac \uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uba74\uc11c\ub3c4 \uc548\uc804\uc131\uc744 \ud655\ubcf4\ud560 \ubc29\ubc95 \ubaa8\uc0c9\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1 \uc0ac\ub78c\uc744 \ub300\uc0c1\uc73c\ub85c \uc218\ud589\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \uc9c8\ubb38\uc5d0 \ub300\ud55c \ub2f5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uacfc\ud559\uc790\ub4e4\uc740 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uc9c0\uce68\uc744 \uc900\uc218\ud558\uba70 \uc5f0\uad6c\ub97c \uc9c4\ud589\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \ubcf4\ub2e4 \ube60\ub978 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uacfc\ud559\uc801 \ubc29\ubc95\ub860\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\uacfc \uaddc\uc81c\uac00 \uc804 \uc138\uacc4\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \uc720\uc6a9\ud55c \uc774\uc720\ub294 \ud604\uc7ac\uc758 \uae30\uc220\ub85c \ub3d9\ubb3c\uc758 \uc0dd\uccb4 \ub0b4 \ud658\uacbd\uc744 \uc644\ubcbd\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub2e4\ub294 \ub370 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ucda9\ubd84\ud55c \uacfc\ud559\uc801 \uadfc\uac70\uc640 \uc5f0\uad6c\uac00 \ub4b7\ubc1b\uce68\ub41c\ub2e4\uba74 \uad81\uadf9\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uac70\ub098 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \ub098\uc62c \uc218 \uc788\uc9c0\ub9cc, \uadf8 \uacfc\uc815\uc5d0\uc11c\ub3c4 \uc0c1\ub2f9\ud55c \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc778\uac04 \uc0dd\uba85 \uc5f0\uc7a5\uc744 \uc704\ud558\uc5ec \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \uac1c\ubc1c\ub418\uae30\uae4c\uc9c0\ub294 \uc0c1\ub2f9\ud55c \uc2dc\uac04\uacfc \ub178\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \uae30\uc220\uc5d0 \ud22c\uc790\uc640 \uc5f0\uad6c\uac00 \ud544\uc694\ud558\ub2e4\ub294 \uc810\uc740 \ubd84\uba85\ud558\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ubcc0\ud654\uac00 \uc774\ub8e8\uc5b4\uc9c8 \ub54c\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \uc720\uc77c\ud55c \uacbd\ub85c\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ud6a8\uacfc\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \ub3c4\uc785\ub418\uae30 \uc804\uae4c\uc9c0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uadf8 \uc911\uc694\uc131\uacfc \ud544\uc694\uc131\uc744 \uac00\uc9c0\uace0 \uaddc\uc81c \ub2f9\uad6d\uc758 \uc694\uad6c\uc0ac\ud56d\uc744 \ucda9\uc871\uc2dc\ucf1c\uc57c \ud569\ub2c8\ub2e4","\ud6a8\uacfc\uc801\uc778 \ub300\uccb4 \ubc29\ubc95\uc744 \ucc3e\uae30 \uc704\ud55c \uc5f0\uad6c\uac00 \uc9c0\uc18d\ub418\uace0 \uc788\uc73c\uba70, \uc5f0\uad6c\uc790\ub4e4\uc740 \ud56d\uc0c1 \ucd5c\ucca8\ub2e8 \uae30\uc220\uc744 \ud65c\uc6a9\ud558\uc5ec \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \ucd5c\uc18c\ud654\ud558\ub824\uace0 \ub178\ub825\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ud604\ub300\uc758 \uc5f0\uad6c \ud658\uacbd\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uce21\uba74\uc774 \ucca0\uc800\ud788 \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uc548 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc544\uc9c1 \ubaa8\ub4e0 \ubd84\uc57c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\ub2e4\ub294 \ud604\uc2e4\uc801\uc778 \uc81c\ud55c\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub294 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc548\uc804\uc744 \ud5a5\uc0c1\uc2dc\ud0a4\ub294 \ub370 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud55c \uc0ac\ub840\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc8fc\ub294 \uc2e4\uc9c8\uc801\uc778 \ud6a8\uacfc\ub294 \uc544\uc9c1 \ub300\uccb4 \uae30\uc220\ub85c\ub294 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ubd80\ubd84\uc774 \ub9ce\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c\uac00 \uc544\ub2c8\ub77c \ud544\uc694\ub85c \uc778\ud574 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uaddc\uc81c\uc640 \uae30\uc900 \ud558\uc5d0\uc11c \uc2e4\uc2dc\ub418\uc5b4\uc57c \ud558\uba70, \uc774\ub294 \uc774\ubbf8 \uc5ec\ub7ec \uc724\ub9ac \uc704\uc6d0\ud68c\uc640 \ubc95\uc801 \uaddc\uc81c\ub97c \ud1b5\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc774 \uc810\uc810 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc644\uc804\ud788 \uc790\ub9ac\uc7a1\uae30\uae4c\uc9c0 \uc2dc\uac04\uacfc \uc790\uc6d0\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc9c0\uc18d\uc801\uc778 \uc5f0\uad6c \ud22c\uc790\uc640 \uae30\uc220 \uac1c\ubc1c\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\ub3c4\ub97c \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \uc724\ub9ac\uc801\uc778 \uae30\uc900\uc744 \ucda9\uc871\ud558\uba74\uc11c\ub3c4 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uae30\uc220 \uac1c\ubc1c\uacfc \ud655\uc0b0\uc744 \ud1b5\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc904\uc774\ub294 \ubc29\ud5a5\uc73c\ub85c \ub098\uc544\uac00\ub294 \uac83\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \ud55c\uacc4\ub97c \ub118\uc5b4\uc11c\ub294 \uac83\uc740 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uad00\ub828 \uae30\uad00\ub4e4\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ucd5c\ub300\ud55c \uc900\uc218\ud558\uba74\uc11c \uc5f0\uad6c\ub97c \uc9c4\ud589\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\ub300 \uacfc\ud559 \uae30\uc220\uc758 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc0c8\ub86d\uace0 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95\uc744 \ubc1c\uacac\ud558\ub294 \ub370 \ud544\uc218\uc801\uc778 \uc694\uc18c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc6b0\ub9ac\uc758 \ubaa9\ud45c\ub294 \ub3d9\ubb3c\uacfc \uc778\uac04 \ubaa8\ub450\uc758 \ubcf5\uc9c0\ub97c \ud5a5\uc0c1\uc2dc\ud0a4\ub294 \uac83\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uac00\uc9c4 \uacfc\ud559\uc801 \uc7a5\uc810\uc744 \uace0\ub824\ud560 \ub54c \uc724\ub9ac\uc801 \ub300\uc548\uc744 \ucc3e\ub294 \ub3d9\uc2dc\uc5d0 \uc778\uac04\uc758 \uc0dd\uba85 \ubcf4\ud638\ub97c \uc704\ud55c \uc2e4\ud5d8\ub3c4 \ubcd1\ud589\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uae30\uc220 \ubc1c\uc804\uacfc \uc724\ub9ac\uc801 \ucc45\uc784\uc740 \uc0c1\ud638 \ubc30\ud0c0\uc801\uc774\uc9c0 \uc54a\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8 \ubd84\uc57c\uc5d0\uc11c\ub3c4 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ucca0\uc800\ud788 \uc900\uc218\ud558\uba70 \uc9c4\ud589\ud574\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc778\uacf5\uc9c0\ub2a5\uacfc \uac19\uc740 \uae30\uc220\ub4e4\uc774 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uae30 \uc804\uae4c\uc9c0\ub294 \ud2b9\ud788 \uc911\uc99d \uc9c8\ud658\uc744 \uc704\ud55c \uc2e0\uc57d\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \uac80\uc99d\ud558\ub294 \ub370 \uc788\uc5b4 \uc2e4\uc81c \ub3d9\ubb3c \ubaa8\ub378\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \uc218\ub2e8\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc544\uc9c1\uae4c\uc9c0 \ub3d9\ubb3c\uc744 \uc0ac\uc6a9\ud558\uc9c0 \uc54a\uace0\ub294 \uc0dd\ubb3c \uc758\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc774 \uc804\uba74\uc801\uc73c\ub85c \uc0c1\uc6a9\ud654\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9e4\uc6b0 \uaddc\uc81c\ub41c \ud658\uacbd\uc5d0\uc11c \uc9c4\ud589\ub418\uba70, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uae30\uc900\uacfc \uc9c0\uce68\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc778\ub958\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uc5f0\uad6c\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubd88\uac00\ud53c\ud558\uac8c \ud544\uc694\ud55c \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\ube44\ub85d \ub3d9\ubb3c\uc5d0\uac8c \uc77c\uc815\ud55c \uace0\ud1b5\uc774 \uac00\ud574\uc9c8 \uc218 \uc788\u
