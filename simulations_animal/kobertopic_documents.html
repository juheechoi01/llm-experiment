uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uacfc \ud568\uaed8 \ub2e4\uc591\ud55c \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc774 \uc5f0\uad6c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc774\ub4e4 \uc911 \ub9ce\uc740 \uacbd\uc6b0\uac00 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uba38\ubb3c\ub7ec \uc788\uac70\ub098 \uc81c\ud55c\uc801\uc778 \uc801\uc6a9 \ubc94\uc704\ub97c \uac00\uc9d1\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \uc2e4\uc9c8\uc801\uc778 \ub178\ub825\uc774 \ubd80\uc871\ud558\ub2e4\ub294 \uc810\uc5d0 \ub300\ud574\uc11c, \ub354 \ub9ce\uc740 \ud22c\uc790\uc640 \uc5f0\uad6c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \ubaa8\ub4e0 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0 \ud544\uc694\ud55c \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc778\uc704\uc801\uc73c\ub85c \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ub300\uc548\uc801 \uc2e4\ud5d8 \ubc29\ubc95\uc73c\ub85c\ub294 \ubaa8\ub4e0 \uc2e4\ud5d8 \ub2e8\uacc4\ub97c \ucda9\uc871\ud558\uae30\uc5d0\ub294 \uc5ec\uc804\ud788 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uacfc \ud655\uc7a5\uc744 \uc704\ud574 \ub9ce\uc740 \ub178\ub825\uc774 \uae30\uc6b8\uc5ec\uc9c0\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \ubaa8\ub4e0 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \uacfc\uc815\uc744 \uc644\ubcbd\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc5c6\ub294 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\ub4e4\uc774 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\ub824\uba74 \uc0c1\ub2f9\ud55c \uc2dc\uac04\uacfc \uc790\uc6d0\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uacfc \uc778\uacf5\uc7a5\uae30\ub294 \uc5f0\uad6c\uc5d0\uc11c \uc911\uc694\ud55c \ubc1c\uc804\uc744 \uc774\ub8e8\uace0 \uc788\uc9c0\ub9cc, \uc774\ub4e4\uc758 \uc81c\ud55c\uc801\uc778 \uc801\uc6a9 \ubc94\uc704\ub85c \uc778\ud574 \ubaa8\ub4e0 \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub300\uc548 \uae30\uc220\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ubcf4\uc644 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc73c\uba70, \uc644\uc804\ud55c \ub300\uccb4\uac00 \ub418\uae30 \uc704\ud574\uc11c\ub294 \ub354 \ub9ce\uc740 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uc644\ubcbd\ud558\uc9c0 \uc54a\ub2e4\ub294 \uc0ac\uc2e4\uc744 \uac10\uc548\ud560 \ub54c, \uc6b0\ub9ac\ub294 \uc774\ub4e4 \uac00\ub2a5\uc131\uc744 \ud0d0\uc0c9\ud558\uace0 \ubc1c\uc804\uc2dc\ud0a4\uae30 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ud22c\uc790\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac\uc758 \ub300\uccb4 \uae30\uc220\ub85c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uba85\uccb4\uc758 \uc0c1\ud638\uc791\uc6a9\uc744 \uc644\uc804\ud558\uace0 \uc815\ud655\ud558\uac8c \uc7ac\ud604\ud558\ub294 \ub370 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uc548 \uac1c\ubc1c \uacfc\uc815\uc5d0\ub294 \uc2dc\uac04\uc774 \uac78\ub9ac\uba70, \ub2f9\uc7a5 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ub97c \uc704\ud574 \uc5f0\uad6c\ub97c \uba48\ucd9c \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \uc801\uc808\ud558\uac8c \uc0ac\uc6a9\ub418\uae30 \uc704\ud574\uc11c\ub294 \uc544\uc9c1 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804 \uac00\ub2a5\uc131\uc744 \ub192\uc774 \uc0ac\uba74\uc11c\ub3c4 \uc544\uc9c1\uc740 \ubd88\uc644\uc804\ud55c \uc0c1\ud0dc\uc784\uc744 \uc778\uc9c0\ud574\uc57c \ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\uc120\uc774 \uc911\uc694\ud55c \ubaa9\ud45c\uc774\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uadf8 \uae30\uc220\uc774 \uc5ec\uc804\ud788 \uc5ec\ub7ec \uc9c8\ud658 \uc5f0\uad6c\uc758 \ubcf5\uc7a1\uc131\uc5d0 \ubbf8\uce58\uc9c0 \ubabb\ud558\ub294 \uacbd\uc6b0\ub3c4 \ub9ce\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc740 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \uc778\uac04 \uc0dd\ub9ac\ud559\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \ubc18\uc601\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uae30\uc220\ub85c \uc778\uac04 \uc0dd\ub9ac\ud559\uc758 \uc644\uc804\ud55c \ubaa8\ubc29\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc5ec\uc804\ud788 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\uc73c\uba70 \ubaa8\ub4e0 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \uc801\uc6a9\ud558\uae30\uc5d0\ub294 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uae30\uc220\uc740 \uc911\uc694\ud55c \ubc1c\uc804\uc744 \uc774\ub8e8\uc5c8\uc73c\ub098, \uadf8 \uc790\uccb4\ub85c\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ud604\ub300 \uacfc\ud559\uc774 \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc744 \uc81c\uc2dc\ud558\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\ub098, \uc774\ub7ec\ud55c \ubc29\ubc95\uc774 \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \uc801\ud569\ud558\uc9c0\ub294 \uc54a\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc758 \ubc1c\uc804\uc774 \ub354\ub514\ub2e4\ub294 \uc9c0\uc801\uc740 \uc0b0\uc5c5\uacfc \uacfc\ud559\uacc4\uac00 \uc774\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc73c\ub85c \ub178\ub825\ud558\ub294 \uac00\uc6b4\ub370, \ud604\uc7ac\uc758 \uae30\uc220\uc801 \ud55c\uacc4 \ub54c\ubb38\uc785\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uace0 \ud22c\uc790\ud560 \ud544\uc694\ub294 \uc788\uc9c0\ub9cc \uc774\ub294 \uadfc\ubcf8\uc801\uc778 \ud55c\uacc4\ub97c \uac00\uc9d1\ub2c8\ub2e4","\ub610\ud55c, \uc774\ub7ec\ud55c \ubc1c\uc804\ub41c \uae30\uc220\uc744 \uc801\uc6a9\ud558\ub294 \ub370\ub294 \uc2dc\uac04\uacfc \ube44\uc6a9\uc774 \uc18c\uc694\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc744 \ud1b5\ud55c \ubc1c\uc804\uc774 \uc9c4\ud589 \uc911\uc774\uc9c0\ub9cc, \uc544\uc9c1 \uc644\uc804\ud55c \ub300\uc548\uc744 \uc81c\uacf5\ud558\uc9c0\ub294 \uc54a\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \uc5ec\uc804\ud788 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\uc9c0\ub9cc, \uafb8\uc900\ud788 \uc99d\uac00\ud558\ub294 \uad00\uc2ec\uacfc \uc5f0\uad6c\ub97c \ud1b5\ud574 \uc810\uc810 \ub354 \ub9ce\uc740 \uc2e4\ud5d8\uc774 \ub300\uccb4 \uae30\uc220\ub85c \uc804\ud658\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc740 \uc8fc\ubaa9\ud560 \ub9cc\ud558\uc9c0\ub9cc \uc5ec\uc804\ud788 \ub9ce\uc740 \uc81c\ud55c\uc810\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc774 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc744 \uc81c\uacf5\ud558\uace0 \uc788\uc9c0\ub9cc, \uc774\ub294 \ub35c \uae4a\uc774 \uc788\ub294 \uc774\ud574\ub97c \uc81c\uacf5\ud560 \uc218\ubc16\uc5d0 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \uc7a5\uae30 \ubaa9\ud45c\ub85c \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac \uc2dc\uc810\uc5d0\uc11c \uc774\ub7ec\ud55c \ubc29\ubc95\ub4e4\uc774 \ubaa8\ub4e0 \uc5f0\uad6c \ub2e8\uacc4\uc5d0 \uc801\uc6a9\ub418\uae30\uc5d0\ub294 \uc544\uc9c1 \ud55c\uacc4\uac00 \uc788\uc73c\uba70, \uc2e4\ud5d8\uc758 \ubcf5\uc7a1\uc131\uc740 \ub2e4\ub2e8\uacc4\uc758 \uc5f0\uad6c\ub97c \uc694\uad6c\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\ub4e4\uc774 \uc788\uc9c0\ub9cc \ub300\ubd80\ubd84 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \ube44\uc57d\uc801\uc774\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uc5f0\uad6c \uc601\uc5ed\uc5d0 \uc644\ubcbd\ud788 \uc801\uc6a9\ud560 \uc218\ub294 \uc5c6\ub294 \uc0c1\ud0dc\uc785\ub2c8\ub2e4","\ud604\uc7ac \ubc1c\uc804\ud55c \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\uc73c\uba70, \uadf8 \uc790\uccb4\ub85c \uc644\uc804\ud55c \ud574\uacb0\ucc45\uc774 \ub418\uae30\uc5d0\ub294 \ubd80\uc871\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc744 \uc5f0\uad6c\ud558\uace0 \ud22c\uc790\ud558\ub294 \uac83\uc774 \uc911\uc694\ud558\uc9c0\ub9cc, \ub2f9\uc7a5 \uadf8 \uae30\uc220\ub9cc\uc73c\ub85c\ub294 \ud574\uacb0\ud558\uc9c0 \ubabb\ud558\ub294 \uc5f0\uad6c \uc601\uc5ed\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ubc29\ubc95\uc774 \ubaa8\ub4e0 \uc5f0\uad6c\uc640 \uc2e4\ud5d8\uc5d0 \uc801\uc6a9 \uac00\ub2a5\ud558\uc9c0\ub294 \uc54a\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc740 \uc8fc\ub85c \ud2b9\uc815 \ubd84\uc57c\ub098 \ucd08\uae30\uc5d0 \ubd88\uc644\uc804\ud558\uac8c \uad6c\ud604\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ud604\uc7ac\uc758 \uae30\uc220 \ubc1c\uc804\uc740 \ub300\uccb4 \ubc29\ubc95\uc744 \uc81c\uc548\ud558\uc9c0\ub9cc \uc644\uc804\ud55c \ub300\uccb4\ub294 \uc544\uc9c1 \uc774\ub974\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \uacc4\uc18d \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \ubaa8\ub450 \uc815\ud655\ud788 \ubaa8\uc0ac\ud558\ub294 \ub370\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub300\uccb4 \ubc29\ubc95\uc5d0 \ub300\ud55c \ud22c\uc790\uc640 \uac1c\ubc1c\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \uc774\ub97c \ud1b5\ud55c \uc5f0\uad6c\uac00 \ubaa8\ub4e0 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \uba54\ucee4\ub2c8\uc998\uc744 \uc644\uc804\ud788 \uc774\ud574\ud558\uac70\ub098 \ud574\uacb0\ud558\ub294 \ub370\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \ubc29\ubc95 \uc5f0\uad6c\uac00 \uc9c0\uc18d\uc801\uc73c\ub85c \ud22c\uc790\ub418\uace0 \uc788\ub294 \uc0c1\ud669\uc5d0\uc11c\ub3c4, \ud604\uc2dc\uc810\uc5d0\uc11c \uc644\uc804\ud55c \ud574\uacb0\ucc45\uc774 \uc5c6\ub2e4\ub294 \uac83\uc744 \uc778\uc815\ud574\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \uc5ed\ub7c9\uc73c\ub85c\ub294 \uc911\uc99d \uc9c8\ud658\uc758 \ubcf5\uc7a1\uc131\uc744 \uad6c\ud604\ud558\ub294 \ub300\uccb4 \ubc29\ubc95\uc774 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \uac1c\ubc1c\ub418\uc5b4\uac00\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ubd88\uc644\uc804\ud55c \uc0c1\ud0dc\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac\uc758 \uae30\uc220 \ub300\uc548\ub4e4\uc740 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\uc804\ud788 \uc2dc\ubbac\ub808\uc774\uc158\ud558\uae30\uc5d0\ub294 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc774\ub7ec\ud55c \ubc29\ubc95\ub9cc\uc73c\ub85c\ub294 \uc2e4\uc81c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ud604\uc7ac \ub300\uc548 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc788\uc73c\ub098, \uadf8 \ud6a8\uacfc\uc131\uacfc \uc815\ud655\uc131\uc774 \ucda9\ubd84\ud788 \uc785\uc99d\ub418\uc9c0 \uc54a\uc558\uc744 \ubfd0 \uc544\ub2c8\ub77c \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \uc801\uc6a9\ub420 \uc218 \uc788\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c\uc640 \ubc1c\uc804\uc5d0 \uc9d1\uc911\ud574\uc57c \ud55c\ub2e4\ub294 \uc810\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \uc774\ub294 \uc2dc\uac04\uc774 \uac78\ub9ac\uace0 \ub2e8\uacc4\uc801 \uc811\uadfc\uc774 \ud544\uc694\ud55c \ubb38\uc81c\uc785\ub2c8\ub2e4","\ud604\uc7ac \uace0\ub3c4\ud654\ub41c \uacfc\ud559 \uae30\uc220\ub3c4 \ud2b9\uc815 \ud658\uacbd \ud558\uc5d0\uc11c\ub9cc \uc720\ud6a8\ud560 \uc218 \uc788\ub294 \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2dc\ud5d8\ubc95\uc740 \uae30\ubcf8\uc801\uc778 \uc0dd\ubb3c\ud559\uc801 \ud604\uc0c1\uc774\ub098 \ub2e8\uc21c\ud55c \uc2dc\uc2a4\ud15c\uc744 \ubaa8\uc0ac\ud560 \uc218 \uc788\ub294 \uacbd\uc6b0\uac00 \ub9ce\uc9c0\ub9cc, \uc804\uccb4 \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud558\uac8c \uc7ac\ud604\ud558\uc9c0\ub294 \ubabb\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc774 \ub290\ub9b0 \uc774\uc720\ub294 \uc5ec\ub7ec \ubcf5\ud569\uc801\uc778 \uc694\uc778\uc5d0 \uae30\uc778\ud558\uba70, \uc774\ub294 \ub2e8\uae30\uc801\uc73c\ub85c \uc27d\uac8c \ud574\uacb0\ub420 \uc218 \uc788\ub294 \ubb38\uc81c\uac00 \uc544\ub2d9\ub2c8\ub2e4","\ub354 \ub098\uc544\uac00, \ud604\uc7ac\uc758 \ub300\uccb4 \ubc29\ubc95\ub4e4\ub85c\ub294 \ud574\uacb0\ud558\uae30 \uc5b4\ub824\uc6b4 \ubcf5\uc7a1\ud55c \uc9c8\ud658 \uc5f0\uad6c\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \uc2e4\uc81c \uc0dd\uccb4 \ub0b4 \ud658\uacbd\uc744 \uc644\ubcbd\ud788 \uc7ac\ud604\ud560 \uc218 \uc788\ub294 \uc2dc\uc2a4\ud15c\uc774 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c\uc640 \ubc1c\uc804\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \uc989\uac01\uc801\uc778 \ub300\uccb4\ub85c \uc774\ub8e8\uc5b4\uc9c0\uae30\ub294 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uce58\ub8cc\uc81c\uac00 \uc2e4\uc81c \uc0ac\ub78c\ub4e4\uc5d0\uac8c \uc5bc\ub9c8\ub098 \ud6a8\uacfc\uc801\uc77c\uc9c0 \uc608\uce21\ud560 \uc218 \uc788\ub294 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubaa8\ub378\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc740 \uc0c1\ud669\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \uc788\uc5b4 \ud604\uc7ac\uc758 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc73c\ub85c\ub294 \ucda9\ubd84\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac \ub300\uccb4 \uae30\uc220\uc740 \uc778\uac04\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ube44\ub85d \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc73c\ub098, \ud604\uc7ac\ub85c\uc11c\ub294 \uc544\uc9c1 \uc0dd\ubb3c\ud559\uc801\uc73c\ub85c \ubcf5\uc7a1\ud55c \uacfc\uc815\uc744 \uc644\uc804\ud788 \ubcf5\uc81c\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc2e0\uc57d \uac1c\ubc1c\uc758 \uae34\uae09\uc131\uacfc \uc911\uc694\uc131\uc744 \uac10\uc548\ud560 \ub54c, Astellas Pharma\ub294 \ud604\uc7ac \uc774\uc6a9 \uac00\ub2a5\ud55c \ub300\uccb4 \ubc29\ubc95\ub4e4\ub85c\ub294 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ube60\ub978 \uac1c\ubc1c\uc744 \uc704\ud55c \ucda9\ubd84\ud55c \ub370\uc774\ud130\ub97c \ud655\ubcf4\ud558\uae30 \uc5b4\ub835\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ud604\uc7ac \uae30\uc220 \uc218\uc900\uc5d0\uc11c\ub294 \ubaa8\ub4e0 \uc5f0\uad6c\uc5d0 \ub300\ud55c \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc744 \uc644\uc804\ud788 \uad6c\ud604\ud560 \uc218 \uc5c6\ub294 \uc0c1\ud669\uc785\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ud604\uc7ac\uc758 \uae30\uc220\uc801 \ud55c\uacc4 \ub54c\ubb38\uc5d0 \uc544\uc9c1 \ubaa8\ub4e0 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0\uc11c \ud544\uc694\ud55c \ubaa8\ub4e0 \ub370\uc774\ud130\ub97c \ud655\ubcf4\ud560 \uc218 \uc788\ub294 \ub300\uccb4 \ubc29\ubc95\uc774 \uc874\uc7ac\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \uae30\uc220\uc740 \uc544\uc9c1 \uac1c\ubc1c \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\ub294 \uacbd\uc6b0\uac00 \ub9ce\uace0, \ub300\uc911\ud654\ub418\uae30\uae4c\uc9c0 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc758 \ubc1c\uc804\uc744 \ucd09\uc9c4\ud574\uc57c \ud558\uc9c0\ub9cc, \ud604\uc7ac\uae4c\uc9c0\uc758 \uae30\uc220\ub85c\ub294 \uc81c\ud55c\uc801\uc774\ub77c\ub294 \uc810\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uc548\uc801 \uc5f0\uad6c \ubc29\ubc95\ub4e4\uc774 \ud2b9\uc815\ud55c \uce21\uba74\uc5d0\uc11c\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uc5f0\uad6c\uc758 \uacbd\uc6b0\uc5d0 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \uc7a0\uc7ac\ub825\uc744 \uc778\uc815\ud558\uba74\uc11c\ub3c4, \ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \ubaa8\ub4e0 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uacfc\uc815\uc744 \ub300\uccb4\ud558\ub294 \ub370 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \ud655\uc2e4\ud788 \ubc1c\uc804\ud558\uace0 \uc788\uc73c\ub098, \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \ubaa8\uc0ac\ud558\uae30\uc5d0\ub294 \uae30\uc220\uc801 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \uae30\uc220\uc758 \ubc1c\uc804\uc740 \uc774\ubbf8 \uc5f0\uad6c\uacc4\uc5d0\uc11c \uc801\uadf9\uc801\uc73c\ub85c \ucd94\uc9c4\ub418\uace0 \uc788\uc9c0\ub9cc, \uacfc\ud559\uc801 \uc9c4\ubcf4 \uc18d\ub3c4\uac00 \uc989\uac01\uc801\uc778 \ub300\uccb4\ub97c \ubcf4\uc7a5\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2dc\ud5d8\ubc95\uc740 \uc911\uc694\ud55c \uc9c4\uc804\uc744 \uc774\ub8e8\uace0 \uc788\uc9c0\ub9cc, \uc5c5\uacc4 \ub0b4\uc5d0\uc11c\ub294 \uc5ec\uc804\ud788 \ud55c\uacc4\uac00 \uc788\ub2e4\uace0 \ud3c9\uac00\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub354 \ub9ce\uc740 \ud22c\uc790\uac00 \uc774\ub8e8\uc5b4\uc838\uc57c \ud55c\ub2e4\ub294 \uacac\ud574\uc5d0 \ub3d9\uc758\ud558\uc9c0\ub9cc, \uadf8\uac83\ub9cc\uc73c\ub85c\ub294 \ub2f9\uc7a5\uc758 \ub300\uccb4\uac00 \uc5b4\ub824\uc6b4 \uc2e4\uc815\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \uae30\uc220\ub4e4\ub9cc\uc73c\ub85c\ub294 \uc644\uc804\ud55c \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ube44\ub85d \ub2e4\uc591\ud55c \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc774\ub4e4\uc740 \ud2b9\uc815 \uc0c1\ud669\uacfc \ubaa8\ub378\uc5d0\uc11c\ub9cc \uc720\ud6a8\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc544\uc9c1 \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc758 \ubaa8\ub4e0 \ubcf5\uc7a1\uc131\uacfc \ubcc0\ud654\ub97c \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc5f0\uad6c\uc758 \ud544\uc694\ub97c \ucda9\uc871\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc774\ub4e4 \uae30\uc220\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\uc73c\uba70 \uac01\uae30 \ud55c\uacc4\ub97c \uac00\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ube44\ub85d \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uacfc\ud559\uc801, \uae30\uc220\uc801 \uc81c\uc57d\uc73c\ub85c \uc778\ud574 \uc644\uc804\ud55c \ub300\uccb4\ub294 \uc544\uc9c1 \uac00\ub2a5\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \ud55c\uacc4\uc5d0\uc11c\ub294 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \ub300\ud55c \ub300\uc548\uc801 \ubc29\ubc95\uc774 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ud604\uc7ac \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\ub4e4\uc774 \uac1c\ubc1c \uc911\uc774\uc9c0\ub9cc, \uc774\ub4e4\uc774 \ubaa8\ub4e0 \uc5f0\uad6c\uc5d0 \uc801\uc6a9\ub418\uae30\uc5d0\ub294 \ud55c\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub2e4\ub978 \ubc29\ubc95\ub4e4\uc774 \ud6a8\uacfc\uc801\uc73c\ub85c \uac1c\ubc1c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc644\uc804\ud55c \ub300\uccb4\ub294 \uc5ec\uc804\ud788 \ubd88\uac00\ub2a5\ud55c \uc0c1\ud669\uc785\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uacfc \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ub9ce\uc544\uc84c\uc9c0\ub9cc, \uc774\ub4e4\uc774 \ud56d\uc0c1 \ucda9\ubd84\ud788 \uc778\uac04 \uc0dd\ub9ac\ud559\uc744 \ubaa8\ubc29\ud558\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\ud604\uc7ac \uac1c\ubc1c \uc911\uc778 \ub300\uc548\uc801 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc740 \uc77c\ubd80 \ubd84\uc57c\uc5d0\uc11c \uc131\uacf5\uc744 \uac70\ub450\uace0 \uc788\uc9c0\ub9cc, \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ub0b4 \ud658\uacbd\uc744 \uc644\uc804\ud558\uac8c \uc7ac\ud604\ud558\uae30\uc5d0\ub294 \uc544\uc9c1 \ubd88\ucda9\ubd84\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0 \ub300\ud55c \ud22c\uc790\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \uc9c0\uae08 \ub2f9\uc7a5 \uc911\uc99d \uc9c8\ud658\uc5d0 \ud544\uc694\ud55c \uae34\uae09\ud55c \ud574\ub2f5\uc744 \uc81c\uacf5\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ucc98\uc74c \uc81c\uc548\ub41c \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\ub4e4\uc740 \uc5ec\uc804\ud788 \uc81c\ud55c\ub41c \ud658\uacbd\uc5d0\uc11c\ub9cc \ud65c\uc6a9\ub420 \uc218 \uc788\uae30 \ub54c\ubb38\uc5d0, \uc644\uc804\ud55c \ub300\uccb4\uac00 \uc544\ub2c8\ub77c \ubcf4\uc870\uc801\uc778 \uc5ed\ud560\ub85c \uc4f0\uc774\ub294 \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \ube60\ub974\uac8c \ubc1c\uc804\ud558\uace0 \uc788\uae30\ub294 \ud558\uc9c0\ub9cc, \uc544\uc9c1\uae4c\uc9c0 \ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uacfc\uc815\uc744 \uc644\uc804\ud558\uac8c \ubaa8\ubc29\ud560 \uc218 \uc788\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\ub610\ud55c, \uae30\uc220 \ubc1c\uc804\uc5d0 \ub530\ub77c \ub300\uccb4 \uc2e4\ud5d8 \uae30\ubc95\uc774 \ubc1c\uc804\ud558\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\uc9c0\ub9cc, \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ub0b4 \uc0c1\ud638\uc791\uc6a9\uc744 \uc644\uc804\ud788 \uc774\ud574\ud558\ub294 \ub370\ub294 \uc5ec\uc804\ud788 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub9ce\uc740 \ub300\uc548 \ubc29\ubc95\ub4e4\uc774 \ubc1c\uc804 \uc911\uc774\uc9c0\ub9cc, \uc774\ub4e4 \ubc29\ubc95\uc740 \uc5ec\uc804\ud788 \ubcf4\uc644\ucc45\uc73c\ub85c \uc791\uc6a9\ud560 \ubfd0 \uc804\uba74\uc801\uc778 \ub300\uccb4\ub85c\ub294 \ubd80\uc871\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc704\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790\uac00 \uc911\uc694\ud558\uc9c0\ub9cc, \uc774\ub294 \uc7a5\uae30\uc801\uc778 \uad00\uc810\uc5d0\uc11c \uc811\uadfc\ud574\uc57c \ud558\ub294 \ubb38\uc81c\uc785\ub2c8\ub2e4","\uc544\uc9c1\uae4c\uc9c0 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub9cc\uc73c\ub85c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \ucda9\ubd84\ud788 \uc7ac\ud604\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uc778\uacf5\uc7a5\uae30\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378\uc740 \uc544\uc9c1 \uc2e4\ud5d8\uc2e4 \ub2e8\uacc4\uc5d0\uc11c \uc81c\ud55c\ub41c \uc131\uacf5\uc744 \uac70\ub450\uace0 \uc788\uc73c\uba70, \uc0c1\uc5c5\uc801 \ubc0f \uc784\uc0c1\uc801 \uac80\uc99d\uc774 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc740 \uc0c1\ud0dc\uc785\ub2c8\ub2e4","\ub610\ud55c, \ud604\uc7ac \ub300\uccb4 \uc2e4\ud5d8\uae30\ubc95\uc73c\ub85c\ub294 \uc0dd\uccb4 \ub0b4 \ubcf5\uc7a1\ud55c \uc0c1\ud638\uc791\uc6a9\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub610\ud55c \uc0c8\ub85c\uc6b4 \ub300\uccb4 \uae30\uc220\uc740 \uc5f0\uad6c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc720\uc6a9\ud558\uac8c \uc0ac\uc6a9\ub420 \uc218 \uc788\uc9c0\ub9cc, \uc774 \uae30\uc220\ub9cc\uc73c\ub85c\ub294 \uc2e0\uc57d\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \uc885\ud569\uc801\uc73c\ub85c \uac80\uc99d\ud558\ub294 \ub370 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \uac1c\ubc1c\ub41c \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \uc885\uc885 \ud2b9\uc815 \uc2e4\ud5d8\uc5d0\uc11c\ub9cc \ud6a8\uacfc\uc801\uc774\uba70, \ubaa8\ub4e0 \uc0dd\uccb4 \ubc18\uc751\uc744 \ud3ec\uad04\uc801\uc73c\ub85c \ud30c\uc545\ud558\uae30\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ud604\uc7ac\ub85c\ub294 \ube44\uc724\ub9ac\uc801 \ubc29\ubc95\uc5d0 \uc758\uc874\ud558\uc9c0 \uc54a\uace0 \ub3d9\ub4f1\ud55c \uc218\uc900\uc758 \uc5f0\uad6c \uacb0\uacfc\ub97c \uc5bb\ub294 \uac83\uc774 \uc544\uc9c1 \uc5b4\ub824\uc6b4 \uc2e4\uc815\uc785\ub2c8\ub2e4","\ub610\ud55c, \ud604\uc7ac \ub300\uccb4 \uae30\uc220\ub4e4\uc774 \ubd88\uc644\uc804\ud558\ub2e4\ub294 \uc810\uc740 \uae30\uc220 \ubc1c\uc804\uc758 \ud544\uc694\uc131\uc744 \uac15\uc870\ud558\ub294 \uacc4\uae30\uac00 \ub429\ub2c8\ub2e4","\ud604\uc7ac\uae4c\uc9c0 \uac1c\ubc1c\ub41c \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc740 \uc8fc\ub85c \ud2b9\uc815 \uc870\uac74\uc5d0\uc11c\ub9cc \ud6a8\uacfc\uc801\uc774\uba70, \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc774\ub098 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1 \uc0c1\ud0dc\ub97c \uc7ac\ud604\ud558\ub294 \ub370 \uc788\uc5b4 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\ubb38\uc81c \ud574\uacb0\uc744 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ub300\uccb4 \ubc29\ubc95 \uc5f0\uad6c\ub294 \ud65c\ubc1c\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac \uae30\uc220\uc758 \ud55c\uacc4\ub85c \uc778\ud574 \uc644\uc804\ud55c \ub300\uccb4\ub294 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\uadf8\ub2e4\uc74c\uc73c\ub85c, \ube44\uc784\uc0c1 \uc2dc\ud5d8\uc758 \ub300\uc548\uc774 \ub418\ub294 \uae30\uc220\uc740 \ucda9\ubd84\ud788 \ubc1c\uc804\ub418\uc9c0 \uc54a\uc558\uc73c\uba70 \ub300\uaddc\ubaa8 \uc2e4\ud5d8\uc5d0 \uc801\uc6a9\ud558\uae30\uc5d0\ub294 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uba38\ubb34\ub974\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c \ud22c\uc790\uc640 \uc5f0\uad6c\ub294 \ud544\uc218\uc801\uc774\uc9c0\ub9cc, \ud604\uc7ac \uc2dc\uc810\uc5d0\uc11c\ub294 \uc774\ub7ec\ud55c \ub300\uccb4 \ubc29\ubc95\uc774 \ubaa8\ub4e0 \uacfc\ud559\uc801 \uc694\uad6c\ub97c \ucda9\uc871\uc2dc\ud0ac \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac \ub300\uc548\uc801 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc740 \ubcf5\uc7a1\ud55c \uc0dd\uba85\uccb4 \ubc18\uc751\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud558\uae30\uc5d0\ub294 \uc5ec\uc804\ud788 \ubd80\uc871\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc740 \uc810\uc9c4\uc801\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc73c\ub098, \ud604\uc7ac\uc758 \uacfc\ud559 \uae30\uc220\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uacfc \uc9c8\ubcd1 \ubaa8\ub378\uc744 \uc628\uc804\ud788 \uc2dc\ubbac\ub808\uc774\uc158\ud558\uac70\ub098 \uc7ac\ud604\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \uc774\ub974\uc9c0\ub294 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \ubc29\ubc95 \ud0d0\uc0c9\uc740 \uc7a5\uae30\uc801\uc778 \ud574\uacb0\ucc45\uc774 \ub420 \uc218 \uc788\uc9c0\ub9cc, \uc778\uac04 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \ubcf4\ud638\ud558\ub294 \ud604\uc7ac\uc758 \ubaa9\uc801\uc73c\ub85c\ub294 \ubd88\ucda9\ubd84\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ucd94\uc9c4\ub418\uc5b4\uc57c \ud558\uc9c0\ub9cc, \ud604 \uc2dc\uc810\uc5d0\uc11c \ubaa8\ub4e0 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \uacfc\uc815\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc5ec\uc804\ud788 \ubcf4\uc870\uc801\uc778 \uc5ed\ud560\uc5d0 \uba38\ubb3c\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac \uc874\uc7ac\ud558\ub294 \ub300\uccb4 \uae30\uc220\ub85c\ub294 \ubaa8\ub4e0 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc2dc\ubbac\ub808\uc774\uc158\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \uc790\uc6d0\uc774 \ud22c\uc790\ub418\uc5b4\uc57c \ud558\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uae30\uc220\uc801 \ud55c\uacc4\ub85c \uc778\ud574 \uc989\uac01\uc801\uc778 \ub300\uccb4\ub294 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\ud601\uc2e0\uc801\uc778 \ub300\uccb4 \ubc29\ubc95\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc74c\uc5d0\ub3c4 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubaa8\ub4e0 \uc5f0\uad6c \ubd84\uc57c\uc5d0\uc11c \uc801\uc6a9\ub420 \uc218 \uc788\ub294 \uc218\uc900\uc740 \uc544\ub2d9\ub2c8\ub2e4","\ub300\uc548 \uae30\uc220\uc5d0 \ub300\ud55c \uc9c0\uc6d0\uacfc \ubc1c\uc804\uc740 \uc911\uc694\ud55c \uacfc\uc81c\uc774\uc9c0\ub9cc, \ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \uc778\uccb4\uc640 \uc720\uc0ac\ud55c \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \uc774\ud574\ud560 \uc218 \uc5c6\ub294 \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\uc6b0\ub9ac\ub294 \uae30\uc220 \ubc1c\uc804\uc5d0 \ub530\ub77c \ub354 \uc724\ub9ac\uc801\uc778 \uc5f0\uad6c \ubc29\uc2dd\uc744 \ucc44\ud0dd\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ubc29\uc2dd\uc774 \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \uc694\uad6c\ub97c \uc644\ubcbd\ud788 \ucda9\uc871\ud560 \uc218 \uc5c6\ub294 \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\ud604\ub300 \uae30\uc220\ub85c \ubc1c\uc804\ud55c \ub300\uccb4 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc5f0\uad6c\uac00 \uc9c4\ud589\ub418\uace0 \uc788\uc9c0\ub9cc, \uc774\ub4e4\uc740 \uc544\uc9c1 \uc644\uc804\ud55c \ub300\uc548\uc774 \ub420 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub610\ud55c \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uacfc \uac80\uc99d\uc5d0\ub294 \uc0c1\ub2f9\ud55c \uc2dc\uac04\uacfc \ub178\ub825\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \ud22c\uc790\uc640 \ub178\ub825\uc740 \ubd84\uba85\ud788 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac \uc778\ub958\uac00 \uc9c1\uba74\ud55c \uc911\uc99d \uc9c8\ud658\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \uc774\ud574\ud558\uace0 \ubaa8\ubc29\ud558\uae30\uc5d0\ub294 \uc2dc\uac04\uc774 \ub354 \ud544\uc694\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc740 \ud604\uc7ac \uc5f0\uad6c\uc5d0 \ub300\ud55c \ubcf4\uc644\uc801 \ub3c4\uad6c\ub85c \uc0ac\uc6a9\ub420 \uc218 \uc788\uc9c0\ub9cc, \uadf8 \uc790\uccb4\ub85c\ub294 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uba3c\uc800, \ud604\uc7ac \uc874\uc7ac\ud558\ub294 \ub300\uccb4 \uae30\uc220\ub4e4\uc740 \ucd08\uae30 \uc5f0\uad6c \ub2e8\uacc4\uc5d0\uc11c \ub9ce\uc740 \uc815\ubcf4\ub97c \uc904 \uc218 \uc788\uc9c0\ub9cc, \uc804\uccb4 \uc0dd\uba85\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0c1\ud638\uc791\uc6a9\uc744 \uc644\uc804\ud788 \uc7ac\ud604\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \uc99d\uac00\ud558\uace0 \uc788\uc9c0\ub9cc, \uc774\ub4e4\uc774 \ubaa8\ub4e0 \uc5f0\uad6c \ubd84\uc57c\uc758 \uc694\uad6c\uc0ac\ud56d\uc744 \ucda9\uc871\ud558\uc9c0\ub294 \ubabb\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac \uc774\uc6a9 \uac00\ub2a5\ud55c \ub300\uccb4 \ubc29\ubc95\ub9cc\uc73c\ub85c\ub294 \ubaa8\ub4e0 \uc9c8\ubcd1 \uc5f0\uad6c\ub97c \uc218\ud589\ud558\uae30\uc5d0 \ud55c\uacc4\uac00 \uc874\uc7ac\ud558\ub294 \uac8c \ud604\uc2e4\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc644\uc804\ud55c \ub300\uccb4\uac00 \uc544\uc9c1 \uc774\ub8e8\uc5b4\uc9c0\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uadf8 \ud55c\uacc4\ub3c4 \ubd84\uba85\ud788 \uc874\uc7ac\ud55c\ub2e4\ub294 \uc810\uc744 \uc778\uc2dd\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\uba3c\uc800, \ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc740 \ud2b9\uc815 \uc2e4\ud5d8 \ubd84\uc57c\uc5d0\uc11c\ub9cc \uc801\uc6a9 \uac00\ub2a5\ud558\uba70, \ubaa8\ub4e0 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0 \uc751\uc6a9\ud558\uae30\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc5ec\uc804\ud788 \uc81c\ud55c\uc801\uc774\uba70, \uc644\uc804\ud55c \uc0dd\uba85\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \ubaa8\ubc29\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\uc744 \uc778\uc815\ud558\uba74\uc11c\ub3c4 \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \ud55c\uacc4\ub97c \uc774\ud574\ud574\uc57c \ud569\ub2c8\ub2e4","\ub610\ud55c, \uc0c8\ub85c\uc6b4 \uae30\uc220\uc758 \ubc1c\uc804\uc744 \uc704\ud55c \uc5f0\uad6c\uac1c\ubc1c\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\ub098, \uc989\uac01\uc801\uc778 \ub300\uccb4 \uae30\uc220\ub85c \uc804\ud658\ud558\uae30\uc5d0\ub294 \uc5ec\uc804\ud788 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc5d0\uc758 \ud22c\uc790\uc640 \ud601\uc2e0\uc774 \ubc18\ub4dc\uc2dc \ud544\uc694\ud558\uc9c0\ub9cc, \uc774\ub294 \uc2e0\uc57d \uac1c\ubc1c\uacfc \uc5f0\uad6c\uc5d0 \ud544\uc694\ud55c \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \uc694\uad6c\ub97c \uc644\uc804\ud788 \ub300\uccb4\ud558\uc9c0\ub294 \ubabb\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \uc131\uacf5 \uc0ac\ub840\uac00 \uc77c\ubd80 \uc874\uc7ac\ud558\uc9c0\ub9cc, \uc774\ub294 \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \uc801\uc6a9\ub420 \uc218 \uc5c6\ub294 \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc911\uc694\ud55c \uacfc\uc81c\uc774\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc644\uc804\ud55c \ub300\uccb4\ub bb3c \uc2e4\ud5d8\uc740 \uc81c\uc57d \uc0b0\uc5c5\uc758 \uaddc\uc81c \uc694\uac74\uc744 \ucda9\uc871\ud558\uc5ec \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc2dc\uc7a5 \uc9c4\uc785\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uae30\uc220 \ubc1c\uc804\uc73c\ub85c \uc778\ud574 \ub300\uccb4 \ubc29\ubc95\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud568\uaed8 \ubc1c\uc804\ud560 \uc218 \uc788\ub294 \ud658\uacbd\uc774 \uc870\uc131\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uae30\uc220 \ubc1c\uc804\uc5d0 \ub530\ub978 \ud61c\ud0dd\uc744 \ucd5c\ub300\ud55c \ud65c\uc6a9\ud558\uae30 \uc704\ud574\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8 \ub610\ud55c \uc810\uc9c4\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uae30\ucd08 \uacfc\ud559 \ubc1c\uc804\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc778\ub958\uc758 \uac74\uac15\uacfc \uc9c8\ubcd1 \uce58\ub8cc\uc5d0 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc774\uc720\ub294 \uacfc\ud559\uc801 \ubc1c\uacac\uacfc \ud601\uc2e0\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \uac00\ub2a5\ucf00 \ud55c\ub2e4\ub294 \uc810\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc5ed\ud560\uc740 \uc544\uc9c1 \ub300\uccb4\ub420 \uc218 \uc5c6\ub294 \uc0c1\ud0dc\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uaddc\ubaa8 \uc778\uad6c\ub97c \ub300\uc0c1\uc73c\ub85c \ud558\ub294 \uc5f0\uad6c\ub85c \ubc1c\uc804\ud558\uae30 \uc704\ud55c \ud544\uc218\uc801 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\ub294 \uacfc\ud559\uc801 \ubc1c\uacac\uacfc \ud601\uc2e0\uc744 \uc704\ud55c \ud655\uace0\ud55c \uae30\ubc18\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub97c \uae30\ubc18\uc73c\ub85c \u 8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ubc1c\uc804\ud558\ub294 \ub300\uccb4 \uae30\uc220\uc744 \uac80\uc99d\ud558\ub294 \ub370\ub3c4 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uae30\uc220\uc758 \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc5d0 \ub300\ud55c \uc9c0\uc6d0\uc740 \uc99d\uac00\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\ucda9\ud558\uac70\ub098 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc744 \ub9c8\ub828\ud558\uae30 \uc704\ud574 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\ub300\ud55c \ub3cc\ud30c\uad6c\ub97c \ub9c8\ub828\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ud601\uc2e0\uc744 \uac00\uc18d\ud654\ud558\ub294 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 3R \uc6d0\uce59\uc774 \uc2e4\uc81c \uc5f0\uad6c \ud604\uc7a5\uc5d0\uc11c \uc798 \uc2dc\ud589\ub418\uace0 \uc788\ub2e4\ub294 \uc810\uc740 \uc5ec\ub7ec \ud3c9\uac00\ub97c \ud1b5\ud574 \ud655\uc778\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc0c8\ub85c\uc6b4 \uc758\uc57d\ud488 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\ub85c \ub0a8\uc544\uc788\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc7a5\uae30\uc801\uc778 \uacfc\ud559\uc801 \ubc1c\uc804\uc744 \uc774\ub04c\uc5b4\ub0c5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc758 \ud544\uc218\uc801\uc778 \uc77c\ubd80\ub85c, \ube60\ub978 \uce58\ub8cc\uc81c \uac1c\ubc1c\uacfc \ud601\uc2e0\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ud568\uaed8 \ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c \uc5ed\uc2dc \ud65c\ubc1c\ud788 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c4 \ub370\uc774\ud130\ub294 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \uc2e4\ud5d8\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370\uc5d0\ub3c4 \uae30\ucd08\uac00 \ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \ub355\ubd84\uc5d0 \ud604\uc7ac \ub9ce\uc740 \uce58\uba85\uc801\uc778 \uc9c8\ud658\uc758 \uc774\ud574\uc640 \uce58\ub8cc\uac00 \uac00\ub2a5\ud574\uc84c\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc2e4\uc81c \uc5f0\uad6c \uc9c4\ud589\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc774 \ub3d9\uc2dc\uc5d0 \uc774\ub8e8\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uae34\uae09\ud55c \uc778\uac04\uc758 \uac74\uac15 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud558\uba70, \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\uae30 \uc704\ud55c \uc5f0\uad6c\uc5d0\ub294 \uc2e4\uc6a9\uc801\uc778 \uc811\uadfc\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \uc9c4\ubcf4\ub97c \uc704\ud574 \ud544\uc218\uc801\uc778 \uc694\uc18c\ub85c \uc791\uc6a9\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \uc5f0\uad6c \ud658\uacbd\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub9ce\uc740 \uc9c8\ubcd1\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574\uc11c\ub9cc \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc774 \ubc1c\uacac\ub418\uc5b4 \uc654\uc73c\uba70, \uc774\ub294 \uc5ec\uc804\ud788 \uc778\ub958 \uac74\uac15\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc5f0\uad6c\uc758 \uc815\ud655\uc131\uacfc \ud6a8\uacfc\ub97c \ub192\uc774\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc73c\ub85c \uc0ac\uc6a9\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc218\ub9ce\uc740 \uce58\uba85\uc801 \uc9c8\ubcd1 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc758 \ud575\uc2ec\uc774\uc5c8\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\uc591\ud55c \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\uc591\ud55c \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uce58\ub8cc\uc81c \uac1c\ubc1c \uc18d\ub3c4\ub97c \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \ub098\uc628 \uc131\uacfc\ub4e4\uc774 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \uc9c1\uc811\uc801\uc73c\ub85c \uae30\uc5ec\ud558\uace0 \uc788\ub2e4\ub294 \uc810\uc744 \uac04\uacfc\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\uae4c\uc9c0\uc758 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud070 \uae30\uc5ec\ub97c \ud574 \uc654\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559\uacc4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\uac70\ub098 \ub300\uccb4\ud558\uae30 \uc704\ud55c \uc5f0\uad6c\ub97c \uc801\uadf9\uc801\uc73c\ub85c \uc9c4\ud589\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc744 \uc704\ud55c \uacfc\ud559\uc801 \ub178\ub825\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uade0\ud615\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \ub2e4\uc591\ud55c \uc9c8\ubcd1 \uadf9\ubcf5\uc5d0 \ud544\uc218\uc801\uc778 \uc5ed\uc0ac\ub97c \uac00\uc9c0\uace0 \uc788\uc73c\uba70, \uacc4\uc18d \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc778\ub958\ub294 \ub9ce\uc740 \uc9c8\ubcd1\uc758 \ube44\ubc00\uc744 \ud480\uac8c \ub418\uc5c8\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \uc704\ud574 \uac00\uc7a5 \uc2e4\uc6a9\uc801\uc778 \uc218\ub2e8\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uac00\uc7a5 \uc798 \uc608\uce21\ud560 \uc218 \uc788\ub294 \ubc29\ubc95 \uc911 \ud558\ub098\ub85c \ud3c9\uac00\ub429\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c\uc758 \ud6a8\uacfc\ub97c \uc2e4\ud5d8\uc801\uc73c\ub85c \uac80\uc99d\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \uc5ec\uc804\ud788 \uc911\uc694\ud55c \ub3c4\uad6c\ub85c \uc0ac\uc6a9\ub418\uba70, \uadf8 \uacb0\uacfc\ub85c \uc778\ub958 \uac74\uac15\uc5d0 \uae30\uc5ec\ud55c \uc131\uacf5 \uc0ac\ub840\ub4e4\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc7ac\ud655\uc778\ud558\uace0 \uadf8 \ud544\uc694\uc131\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \ud3c9\uac00\ud558\ub294 \uac83\uc740 \uacfc\ud559\uc758 \ubc1c\uc804\uc5d0 \ud544\uc218\uc801\uc778 \uc694\uc18c\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \uae38\uc744 \uc5f4\uc5b4\uc90d\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc774\uc720\ub294 \ub9ce\uc740 \uc9c8\ubcd1 \ubaa8\ub378\uc774 \uc218\uc2ed \ub144\uac04\uc758 \uc5f0\uad6c\ub97c \ud1b5\ud574 \ucd5c\uc801\ud654\ub418\uc5c8\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub9ce\uc740 \uc9c8\ubcd1 \uc5f0\uad6c \ubc0f \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc5c6\uc5b4\uc11c\ub294 \uc548 \ub420 \ubd80\ubd84\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\uc218\uc758 \uc9c8\ud658\uc5d0 \ub300\ud55c \uc774\ud574\ub3c4\ub97c \ud5a5\uc0c1\uc2dc\ud0a4\uace0 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub9ce\uc740 \uc81c\uc57d\uc0ac\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uac00\ub2a5\ud558\uba74 \uc904\uc774\uae30 \uc704\ud55c \uc0c8\ub85c\uc6b4 \ubc29\ubc95\ub4e4\uc744 \ub3d9\uc2dc\uc5d0 \ud0d0\uad6c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc774\ub8e8\ub294 \ub370 \uc911\ucd94\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc73c\ub85c\ubd80\ud130 \uc5bb\uc740 \ub370\uc774\ud130\ub97c \uae30\ubc18\uc73c\ub85c \ub300\uccb4 \ubc29\ubc95 \uc5ed\uc2dc \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc81c\ud55c\uc801\uc774\uace0 \uc2e0\uc911\ud55c \uc0ac\uc6a9\uc740 \uacfc\ud559\uc801 \uc5f0\uad6c \ubc1c\uc804 \uc5c6\uc774 \ubd88\uac00\ub2a5\ud55c \ud601\uc2e0\uacfc \uc9c8\ubcd1\uc758 \uadf9\ubcf5\uc744 \uac00\ub2a5\ucf00 \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uae30\uc220 \ubc1c\uc804\uacfc \ub3d9\ubb3c \ubcf5\uc9c0 \uc99d\uc9c4\uc744 \uc704\ud55c \uac1c\uc120\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"3_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","3_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4"," d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \uc81c\uacf5\ud558\ub294 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uc218\ub2e8\uc785\ub2c8\ub2e4","\uacb0\ub860\uc801\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc644\ubcbd\ud55c \ubc29\ubc95\uc774 \uac1c\ubc1c\ub418\uae30 \uc804\uae4c\uc9c0\ub294 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \uc788\uc5b4\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc774\uba70, \uc774\ub294 \uacfc\ud559\uc801 \uc9c4\ubcf4\uc640 \uc778\ub958 \ubcf5\uc9c0 \ud5a5\uc0c1\uc744 \uc704\ud574 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\uc5b4\uac08 \uac83\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc0c8\ub85c\uc6b4 \uc5f0\uad6c \ubc29\ubc95\uc744 \ubaa8\uc0c9\ud558\ub294 \ub370 \ub04a\uc784\uc5c6\ub294 \ub178\ub825\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc744 \ubc1c\uc804\uc2dc\ud0a4\uae30 \uc704\ud55c \uc5f0\uad6c\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\ub824\ub294 \ub178\ub825\uc740 \ud65c\ubc1c\ud788 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uc548\uc774 \uac1c\ubc1c\ub420 \ub54c\uae4c\uc9c0\ub294 \uc2e4\uc6a9\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc73c\ub85c \ub0a8\uc544\uc788\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ud604 \uc2dc\uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\uc6d0\uc801\uc774\uace0 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc788\uc5b4 \uc5ec\uc804\ud788 \uc720\uc77c\ud55c \ubc29\ubc95\uc744 \uc81c\uacf5\ud558\uba70, \uc774\ub294 \uc5f0\uad6c\uc758 \uadfc\ubcf8\uc801\uc778 \uc2e0\ub8b0\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc744 \uc704\ud55c \ub178\ub825\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uba74\uc11c\ub3c4, \ud604\uc7ac \uc911\uc99d \uc9c8\ud658\uc758 \ubcf5\uc7a1\uc131\uc744 \uc5f0\uad6c\ud558\ub294 \ub370\uc5d0\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc790\uc6d0\uc744 \ub300\uccb4 \ubc29\ubc95\uc5d0 \uc9d1\uc911\ud558\ub294 \uac83\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ub3d9\uc2dc\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\ub3c4 \ubcd1\ud589\ud558\uc5ec \ud65c\uc6a9\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc9c0\uae08 \uc774 \uc2dc\uc810\uc5d0\uc11c \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uacc4\uc18d \uc9c0\uc6d0\ud558\uba74\uc11c\ub3c4, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc5ed\ud560\uc744 \ubd80\uc815\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\ub4e4\uc774 \ubaa8\ub4e0 \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \uc989\uac01 \ub3c4\uc785\ub418\uae30 \uc704\ud574\uc11c\ub294 \uc544\uc9c1 \ub9ce\uc740 \uae30\uc220\uc801 \ubc1c\uc804\uacfc \uac80\uc99d\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\uc131\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub300\uccb4 \uae30\uc220\uc5d0 \ub300\ud55c \ud22c\uc790\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \uc99d\uac00\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ubc1c\ub2ec\ud588\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \ubaa8\ub378\uc740 \ud2b9\uc815 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\uc131\uc744 \uc774\ud574\ud558\uace0 \uc804\uccb4\uc801\uc778 \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub9ce\uc740 \uae30\uad00\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ud601\uc2e0\uc801\uc778 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ubc15\ucc28\ub97c \uac00\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ud604\uc7ac\uc758 \ub3d9\ubb3c \uc2e4\ud5d8 \uaddc\uc81c\ub97c \uac15\ud654\ud558\uace0 \ub300\uccb4 \ubc29\ubc95 \uc5f0\uad6c\uc5d0 \ub300\ud55c \ud22c\uc790\ub97c \ud655\ub300\ud558\uba74 \ubbf8\ub798\uc5d0 \ub354 \ud070 \ubcc0\ud654\uac00 \uc788\uc744 \uac83\uc785\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2ec\uac01\ud55c \ubd80\uc791\uc6a9\uc744 \uc0ac\uc804\uc5d0 \uac80\uc99d\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\uae30\uc220\uacfc \uacfc\ud559\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\uace0 \ub300\uccb4\ud558\uae30 \uc704\ud574 \ub2e4\uc591\ud55c \uc811\uadfc\ubc95\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\ubc1c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud558\uace0 \ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ub300\ud55c \ud22c\uc790\ub294 \uacc4\uc18d\ud574\uc11c \uc774\ub8e8\uc5b4\uc838\uc57c \ud558\uc9c0\ub9cc, \uc774\ub97c \uc704\ud574 \uc774\ubbf8 \ub2e4\uc591\ud55c \uc5f0\uad6c\uac00 \uc9c4\ud589 \uc911\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc5d0 \ub300\ud55c \uc790\uc6d0\uacfc \uc9c0\uc6d0\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc99d\uac00\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \uaddc\uc81c \uae30\uc900\uc744 \ucda9\uc871\ud558\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc6b0\ub9ac\uac00 \ub300\uc548\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370\uc5d0 \ud22c\uc790\ub97c \uc99d\uac00\uc2dc\ud0a4\uace0 \uc788\uc9c0\ub9cc, \uc2ec\uac01\ud55c \uc9c8\ud658 \uc5f0\uad6c\uc5d0\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc644\uc804\ud788 \uc81c\uac70\ud560 \uc218 \uc5c6\ub294 \uc0c1\ud669\uc5d0\uc11c, \uc774\ubbf8 \ub3d9\ubb3c \uc2dc\ud5d8\uc758 \ubc94\uc704\ub97c \ub118\uc5b4\uc11c \ub300\uccb4 \uc5f0\uad6c \ubc29\uc2dd\uc774 \uc810\ucc28 \ud655\ub300\ub418\uace0 \uc788\ub294 \ucd94\uc138\uc785\ub2c8\ub2e4","\uacb0\ub860\uc801\uc73c\ub85c, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc73c\ub85c \ub0a8\uc544 \uc788\uc73c\uba70, \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \uc644\uc804\ud788 \ubc1c\uc804\ub418\uae30 \uc804\uae4c\uc9c0\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\uac00 \uc9c0\uc18d\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc81c\ud55c\ub41c \uc131\uacf5\ub960\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ud604\uc7ac\ub85c\uc11c\ub294 \uacfc\ud559\uc801 \ubc1c\uacac\uc758 \uc8fc\uc694\ud55c \ub3c4\uad6c\ub85c \uc5ec\uc804\ud788 \uc778\uc815\ubc1b\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \ud544\uc218\uc801\uc774\uc9c0\ub9cc, \uadf8\ub7ec\ud55c \ubc1c\uc804\uc774 \uc774\ub8e8\uc5b4\uc9c0\uae30 \uc804\uae4c\uc9c0 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uacfc\ud559\uc801 \uc5f0\uad6c\ub294 \ub69c\ub837\ud55c \uc131\uacfc\ub97c \ub0b4\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uc548\uc801 \ubc29\ubc95\ub860\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc784\uc0c1\uc801\uc73c\ub85c \uc911\uc694\ud558\uace0 \uc2e4\uc9c8\uc801\uc778 \uacb0\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uae30\uc220\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc838\uc57c \ud558\uc9c0\ub9cc, \uc774\ub7ec\ud55c \uae30\uc220\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc0c1\ud669\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \uc218\ud589\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uae30\uc220\uc744 \uac1c\ubc1c\ud558\ub294 \uac83\uc740 \uacfc\ud559 \uc5f0\uad6c\uc758 \uc8fc\uc694 \ubaa9\ud45c \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uae30\uc5c5\ub4e4\uc740 \ub2e8\uacc4\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ub2e4\uc591\ud55c \uae30\uc220\uc744 \uac1c\ubc1c\ud558\ub824 \ud558\uace0 \uc788\uc73c\uba70, \uc77c\ubd80\ub294 \uc2e4\uc9c8\uc801\uc778 \ucd08\uae30 \uc131\uacfc\ub97c \ubcf4\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc744 \uc774\uc6a9\ud55c \uc5f0\uad6c\ub294 \uc5ec\uc804\ud788 \ud604\uc7ac \uae30\uc220 \uc218\uc900\uc5d0\uc11c\ub294 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\uae30 \uc704\ud55c \uc5f0\uad6c\uc5d0 \ub9c9\ub300\ud55c \ud22c\uc790\uac00 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uacfc\ud559\uacc4\uc758 \uc911\uc694\ud55c \uacfc\uc81c\uac00 \ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub300\uccb4 \ubc29\ubc95\uc774 \uc874\uc7ac\ud558\ub354\ub77c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc0c8\ub85c\uc6b4 \uc9c8\ubb38\uc744 \ud574\uacb0\ud558\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\ubb3c\ub860, \uacfc\ud559\uacfc \uae30\uc220\uc758 \uc9c4\ubcf4\ub294 \uc9c0\uc18d\ud574\uc11c \uc0c8\ub85c\uc6b4 \ub300\uc548\uc744 \ubaa8\uc0c9\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub97c \ud1b5\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\uac70\ub098 \ubd80\ubd84\uc801\uc73c\ub85c \ub300\uccb4\ud558\uace0\uc790 \ud558\ub294 \ub178\ub825\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \uc0c1\ud638\uc791\uc6a9\uacfc \ubc18\uc751\uc740 \uc544\uc9c1\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574\uc11c\ub9cc \uc815\ud655\ud558\uac8c \ud30c\uc545\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uba87\uba87 \ub300\uccb4 \ubc29\ubc95\uc774 \uac1c\ubc1c\ub418\uc5c8\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc5f0\uad6c \ubc0f \uac1c\ubc1c \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc73c\ub85c \uc778\uc815\ubc1b\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc5f0\uad6c\uc5d0\uc11c \uc911\ub300\ud55c \uc5ed\ud560\uc744 \ud558\uc9c0\ub9cc, \ub3d9\uc2dc\uc5d0 \ub300\uc548\uc744 \uc801\uadf9\uc801\uc73c\ub85c \uac1c\ubc1c\ud558\uace0 \uc788\ub294 \uac83\uc774 \ud604\uc2e4\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub3c4 \uc720\uc758\ubbf8\ud55c \uacb0\uacfc\ub97c \uc5bb\uae30 \uc704\ud55c \ubc29\ubc95 \ud0d0\uc0c9\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ud604\uc7ac\uc758 \uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc2e4\ud5d8\uc5d0 \uc788\uc5b4 \ub3d9\ubb3c \ubaa8\ub378\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uae30\uc220 \uac1c\ubc1c\uc744 \uc9c0\uc6d0\ud558\uba70 \ub300\uccb4 \ubc29\ubc95\uc774 \uc131\uc7a5\ud558\uace0 \uc788\uae34 \ud558\uc9c0\ub9cc, \ud604 \uc2dc\uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\uc815 \uc5f0\uad6c\uc5d0\uc11c \uc5c6\uc5b4\uc11c\ub294 \uc548 \ub420 \uc694\uc18c\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc744 \uac1c\ubc1c\ud558\uace0\uc790 \ud558\ub294 \ub178\ub825\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\uc815 \uc5f0\uad6c\uc5d0\uc11c \ud0c0\ub2f9\uc131\uacfc \uc2e0\ub8b0\uc131\uc744 \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc804\ud1b5\uc801\uc778 \ubc29\ubc95\uc5d0 \uc548\uc8fc\ud558\uae30\ubcf4\ub2e4\ub294, \ub9ce\uc740 \uae30\uad00\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\ucca8\ub2e8 \ub2e4\ub978 \ubc29\ubc95\ub4e4\uacfc \ud568\uaed8 \ud1b5\ud569\ud558\uc5ec \uc0ac\uc6a9\ud558\ub294 \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \uad81\uadf9\uc801\uc73c\ub85c \uac1c\ubc1c\ub41c\ub2e4\uba74, \uc774\ubbf8 \uc5c5\uacc4\ub294 \uc774\ub97c \ucc44\ud0dd\ud560 \uc900\ube44\uac00 \ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \uacb0\uacfc\uc758 \uc778\uac04 \uc801\uc6a9 \uac00\ub2a5\uc131\uc5d0 \ub300\ud574 \uc758\ubb38\uc774 \uc81c\uae30\ub420 \uc218 \uc788\uc73c\ub098, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \ud3c9\uac00\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ub9e4\uac1c\uccb4\ub85c \uc790\ub9ac\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\ub2e4\ub294 \uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc7ac\ud655\uc778\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc784\uc744 \uace0\ub824\ud560 \ub54c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc989\uac01\uc801\uc778 \ub300\uccb4\ubb3c\ub85c \uac04\uc8fc\ub418\uae30\ubcf4\ub2e4\ub294 \ubcf4\uc644\uc801\uc778 \uc811\uadfc\uc73c\ub85c \ubcf4\uc544\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uc5f0\uad6c\uc758 \ubaa9\uc801\uc744 \ub2ec\uc131\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubd88\uac00\ud53c\ud55c \uc0c1\ud669\uc774 \ub9ce\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uc11c\ube44\uc2a4\ub97c \uc81c\uacf5\ud558\ub294 Covance Inc.\ub294 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \uae30\uc220\uc744 \ud1b5\ud574 \uc77c\ubd80 \uc2e4\ud5d8\uc774 \ub3d9\ubb3c\uc5d0 \uc758\uc874\ud558\uc9c0 \uc54a\uac8c \ub418\uc5c8\uc744 \ub54c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \ud544\uc694\ud558\ub2e4\uace0 \uc124\uba85\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uacfc \uc801\uc6a9\uc740 \uc2dc\uac04\uc774 \ud544\uc694\ud558\uba70, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \uac00\uc7a5 \uc815\ud655\ud55c \uacb0\uacfc\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\ub294 \uc218\ub2e8\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uad00\ucc30\ud558\uace0 \uce58\ub8cc\ubc95\uc758 \ud6a8\uacfc\ub97c \uac80\uc99d\ud558\ub294 \uc720\uc77c\ud55c \uc218\ub2e8\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\uc774 \ubcf4\uc7a5\ud558\ub294 \uc0dd\ub9ac\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc758 \uae4a\uc740 \uc774\ud574\ub294 \uc5ec\uc804\ud788 \uac00\uce58\uac00 \ud07d\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \ubc29\ubc95\uc758 \uc911\uc694\uc131\uc744 \uc778\uc2dd\ud558\uc5ec \uc5f0\uad6c\uac1c\ubc1c\uc744 \uc7a5\ub824\ud558\uace0 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc740 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud6a8\uacfc\uc801\uc774\uace0 \ud544\uc218\uc801\uc778 \uc77c\ubd80 \uc5f0\uad6c \ub2e8\uacc4\uc5d0\uc11c \uc81c\uac70\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e4\uc81c\ub85c \ud544\uc218\uc801\uc778 \uc5f0\uad6c\uc5d0\uc11c \ubd88\uac00\ud53c\ud558\uac8c \uc0ac\uc6a9\ub420 \uc218\ubc16\uc5d0 \uc5c6\ub294 \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\uc778\uac04 \uc870\uc9c1\uacfc \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc758 \uc0ac\uc6a9\uc774 \uc99d\uac00\ud568\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ud604 \uc2dc\uc810\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc774\ub77c\ub294 \uc810\uc744 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc774 \uc5c6\ub294 \uc0c1\ud669\uc5d0\uc11c \uc720\uc77c\ud558\uac8c \uc815\ud655\ud55c \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\uc815 \uacfc\ud559\uc801 \ubc1c\uacac\uc5d0 \uc788\uc5b4 \uc720\uc77c\ud55c \ubc29\ubc95\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub2e4\ub978 \ub300\uc548\uc774 \uc874\uc7ac\ud560 \uc218 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc788\uc5b4 \uc5ec\uc804\ud788 \uac00\uc7a5 \ud6a8\uacfc\uc801\uc778 \ubc29\ubc95\uc785\ub2c8\ub2e4","\uc808\ucda9\uc548\uc73c\ub85c \ub300\uccb4\uc801 \uc804\ub7b5\uc744 \ubcd1\ud589\ud560 \ub54c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc5ed\ud560\uc740 \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uacbd\uc6b0 \uc720\uc77c\ud558\uac8c \ud6a8\uc728\uc801\uc774\uace0 \ud6a8\uacfc\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc874\ud558\ub294 \uac00\uc7a5 \uc608\uce21 \uac00\ub2a5\uc131\uc774 \ub192\uc740 \ubaa8\ub378\ub85c, \ub2e4\ub978 \ubc29\ubc95\ub4e4\uc774 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud558\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc0c1\uad00\uad00\uacc4\ub97c \ud0d0\uc0c9\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \uc218\ub2e8\uc774\uae30\ub3c4 \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uae30\uc220 \ubc1c\uc804\uc740 \uacc4\uc18d\ud574\uc11c \uc601\uad6c\uc801\uc778 \uc194\ub8e8\uc158\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uac00\ub2a5\uc131\uc744 \ubaa8\uc0c9\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804 \uc911\uc774\uc9c0\ub9cc, \uc644\uc804\ud55c \ud574\uacb0\ucc45\uc774 \ub420 \ub54c\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc5f0\uad6c \uc218\ub2e8\uc73c\ub85c \ub0a8\uc2b5\ub2c8\ub2e4","\uad81\uadf9\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc0c8\ub85c\uc6b4 \uae30\uc220\uc774 \uac1c\ubc1c\ub418\uae30 \uc804\uae4c\uc9c0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc81c\ud55c\uc801\uc73c\ub85c\ub098\ub9c8 \uacc4\uc18d \ud5c8\uc6a9\ub418\uc5b4\uc57c \ud558\uba70, \ub3d9\uc2dc\uc5d0 \ub300\uccb4 \uc2e4\ud5d8\ubc95\uc758 \ubc1c\uc804\uc744 \uc7a5\ub824\ud558\uace0 \uc774\ub97c \uc801\uadf9\uc801\uc73c\ub85c \ud1b5\ud569\ud558\ub294 \uc815\ucc45\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ud604\uc7ac \uae30\uc220 \ubc1c\uc804 \uc18d\ub3c4\ub97c \uace0\ub824\ud558\ub354\ub77c\ub3c4, \ud2b9\uc815 \uc9c8\ud658\uc5d0 \ub300\ud574\uc11c\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc720\uc77c\ud558\uac8c \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ub370\uc774\ud130 \uc81c\uacf5\uc6d0\uc774 \ub429\ub2c8\ub2e4","\ube44\ub85d \ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\ub2e4\uace0 \ud558\ub354\ub77c\ub3c4, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud2b9\uc815 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uacfc\uc815\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \ud6a8\uacfc\uc801\uc73c\ub85c \uc790\ub9ac\uc7a1\uae30\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc5f0\uad6c\uc758 \ud544\uc218\uc801 \uc694\uc18c\ub85c \ub0a8\uc544\uc788\uc2b5\ub2c8\ub2e4","\ub300\uc548\uc801\uc778 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubd88\uac00\ub2a5\ud558\uac70\ub098 \uc801\uc808\ud558\uc9c0 \uc54a\uc744 \ub54c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5f0\uad6c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\uba85\uccb4\uc758 \ubc18\uc751\uc744 \uc5f0\uad6c\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95 \uac00\uc6b4\ub370 \ud558\ub098\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc644\uc804\ud788 \ubc30\uc81c\ud560 \uc218 \uc5c6\uc9c0\ub9cc, \ub300\uccb4 \ubc29\ubc95 \uc5f0\uad6c\uc640 \uac1c\ubc1c\uc740 \uacc4\uc18d \ud655\ub300\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc5ec\uc804\ud788 \ud55c\uacc4\uac00 \uc788\uae30 \ub54c\ubb38\uc5d0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc5f0\uad6c\uc758 \uc911\uc694\ud55c \ub3c4\uad6c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud575\uc2ec\uc801\uc778 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ud604\uc7ac \ub300\uc548\ub4e4\uc758 \ud55c\uacc4\ub97c \uadf9\ubcf5\ud558\uae30 \uc704\ud574 \uae30\uc220 \ubc1c\uc804\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcd1\ud589\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uadf8\ub7ec\ub098 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ubcf5\uc7a1\ud55c \uc804\uc2e0 \ubc18\uc751\uc744 \uc774\ud574\ud558\uace0 \uc608\uce21\ud558\ub294 \uc720\uc77c\uc758 \ubc29\ubc95\uc73c\ub85c, \uc774\ub294 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ucd94\uac00\uc801\uc778 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\uc744 \uc778\uc815\ud558\uba74\uc11c\ub3c4, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\uc758 \uae30\uc220 \uc218\uc900\uc73c\ub85c \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0\uc11c \uc5c6\uc5b4\uc11c\ub294 \uc548 \ub420 \uc694\uc18c\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\ub3c4 \uafb8\uc900\ud788 \ubc1c\uc804\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ubbf8\ub798\uc5d0\ub294 \ub354 \ub9ce\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uac00\ub2a5\uc131\uc744 \uc5f4\uc5b4\uc90d\ub2c8\ub2e4","\ub458\uc9f8, \uc5f0\uad6c\uc758 \ud6a8\uc728\uc131\uacfc \uc778\ub958 \ud61c\ud0dd\uc744 \uace0\ub824\ud560 \ub54c, \uc644\uc804\ud55c \ub300\uccb4 \ubc29\ubc95\uc774 \uac1c\ubc1c\ub418\uae30 \uc804\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \uc9c4\ucc99\uc744 \uc704\ud574 \ubd88\uac00\ud53c\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub300\uccb4 \ubc29\ubc95\uc774 \uc874\uc7ac\ud558\ub354\ub77c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubd88\uac00\ud53c\ud55c \uc774\uc720\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \uc788\ub294 \uacbd\uc6b0\uc5d0\ub3c4, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub3c5\ud2b9\ud55c \uc911\uc694\uc131\uc744 \uac00\uc9d1\ub2c8\ub2e4","\ub354\uc6b1\uc774, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc801 \ubc29\ubc95\uc744 \uac00\uc18d\ud654\ud558\uace0 \uac1c\ubc1c\ud558\uae30 \uc704\ud55c \ub178\ub825\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc9c0\ub9cc, \uc774 \uacfc\uc815\uc5d0\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc\uc758 \uc870\ud654\ub85c\uc6b4 \ubcd1\ud589\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud558\ub2e4\ub294 \ud604\uc2e4\uc801\uc778 \uc774\uc720\ub294 \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\uc7a5\uae30\uc801\uc73c\ub85c \ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc744 \uc704\ud574\uc11c\ub294 \uc9c0\uc18d\uc801\uc778 \uc5f0\uad6c\uc640 \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc774\uc9c0\ub9cc, \uc774 \uacfc\uc815\uc5d0\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc815\ubcf4\uc640 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\uc5ec \uadf8 \ubc1c\uc804\uc744 \ub3d5\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\ub7ec \ub2e8\uacc4\uc758 \uc2e0\uc57d \uac1c\ubc1c\uc5d0\uc11c \uc0dd\uccb4 \ubc18\uc751\uc744 \ud3c9\uac00\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc73c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc744 \ucc3e\uae30 \uc704\ud55c \uc5f0\uad6c\uc790\ub4e4\uc758 \ub178\ub825\uc774 \uacc4\uc18d\ub418\uace0 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud2b9\uc815 \uc5f0\uad6c\uc5d0\uc11c \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \ud544\uc218\uc694\uc18c\ub85c \uac04\uc8fc\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac\uc758 \uae30\uc220\ub85c \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ud2b9\uc218\ud55c \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \uc5f0\uad6c\ud558\ub294 \ub370 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4. [\ub3d9\ubb3c\uc2e4\ud5d8 \uae30\ubc18 \uc5f0\uad6c \ubc0f \uc2e0\uc57d \uac1c\ubc1c\uc744 \uc218\ud589\ud558\ub294] \ud654\uc774\uc790\ub294 \ud2b9\uc815\ud55c \uc0dd\uccb4 \ubc18\uc751\uc740 \uc5ec\uc804\ud788 \ub3d9\ubb3c \ubaa8\ub378\uc744 \ud1b5\ud574\uc11c\ub9cc \ubaa8\ub4e0 \uad00\ub828 \uc694\uc778\uc744 \ucda9\uc2e4\ud788 \uc7ac\ud604\ud560 \uc218 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8 \ub2e8\uacc4\ub294 \ub300\uccb4 \uae30\uc220\ub85c \ud574\uacb0\ud560 \uc218 \uc5c6\ub294 \uc804\uccb4 \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc758 \ubc18\uc751\uc744 \uac80\uc99d\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubd88\uac00\ud53c\ud558\ub2e4\ub294 \uc810\uc740 \uc778\uc815\ud558\uc9c0\ub9cc, \uc774\uc640 \ub3d9\uc2dc\uc5d0 \ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uace0 \uace0\ub3c4\ud654\ud558\ub294 \uc791\uc5c5\uc740 \uc801\uadf9 \uc7a5\ub824\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc810\uc9c4\uc801\uc73c\ub85c \ub300\uccb4\ud560 \ud601\uc2e0\uc801\uc778 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc9c0\uc9c0\ud558\uba74\uc11c\ub3c4, \ud604\uc2e4\uc801\uc73c\ub85c \ub9ce\uc740 \uc804\uc784\uc0c1 \uc2dc\ud5d8\uc5d0\uc11c \ub3d9\ubb3c \ubaa8\ub378\uc774 \ud544\uc694\ud558\ub2e4\ub294 \uc810\uc744 \uc778\uc2dd\ud574\uc57c \ud569\ub2c8\ub2e4","\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \ud601\uc2e0\uc801\uc778 \uae30\uc220\uacfc \ubc29\ubc95\uc744 \uc5f0\uad6c\ud558\uace0 \uac1c\ubc1c\ud558\ub294 \uac83\ub3c4 \uc911\uc694\ud569\ub2c8\ub2e4","\uae30\uc220\uc740 \ub04a\uc784\uc5c6\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc73c\uba70, \uc7a5\uae30\uc801\uc73c\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc0c8\ub85c\uc6b4 \ubc29\ubc95\uc774 \ub4f1\uc7a5\ud560 \uac00\ub2a5\uc131\uc774 \ub192\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\ub294 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc810\uc810 \ub354 \ubc1c\uc804\ud558\uace0 \uc788\ub2e4\ub294 \uac83\uc740 \uc0ac\uc2e4\uc785\ub2c8\ub2e4","\uadf8\ub7ec\ub098 \uc7a5\uae30\uc801\uc778 \uad00\uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uae30\uc220 \uac1c\ubc1c\uc5d0 \ub300\ud55c \ud22c\uc790\ub294 \uc801\uadf9\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub300\uccb4 \ubc29\ubc95\uc774 \uc810\ucc28 \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud2b9\uc815 \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc7a5\uae30\uc801\uc73c\ub85c \ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud560 \ud544\uc694\uac00 \uc788\uc9c0\ub9cc, \uc989\uac01\uc801\uc778 \uc758\ub8cc \ud601\uc2e0\uc774 \ud544\uc694\ud55c \uc2dc\uc810\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uacc4\uc18d \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uae30\uc220\uacfc \ubc29\ubc95\uc740 \uba40\uc9c0 \uc54a\uc740 \ubbf8\ub798\uc5d0 \uac1c\ubc1c\ub420 \uc218 \uc788\uc9c0\ub9cc, \uadf8\ub54c\uae4c\uc9c0 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \uc788\uc5b4\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \uacc4\uc18d \uc218\ud589\ud560 \uac83\uc785\ub2c8\ub2e4","\uc6b0\ub9ac\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc774\uc9c0 \uc54a\uc740 \ub300\uc548\ub4e4\ub85c \ucda9\ubd84\ud788 \ub300\uccb4\ub420 \uc218 \uc788\ub2e4\ub294 \uc8fc\uc7a5\uc744 \uc9c1\uc2dc\ud574\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uae30\uc220\uc774 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc740 \ud604 \uc2dc\uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218 \ubd88\uac00\uacb0\ud55c \uc5ed\ud560\uc744 \uc218\ud589\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"4_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","
