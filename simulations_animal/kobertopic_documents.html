\uc8fc\uc7a5\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uc724\ub9ac \uae30\uc900\uc774 \uc774\ubbf8 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uc548\uc801 \uc5f0\uad6c\ubc29\ubc95\uc774 \ubcd1\ud589\ub418\ub294 \ub3d9\uc548, \ucd5c\uc801\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc2e4\ud589\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0 \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \uc911\uc694\ud558\uba70, \uac00\ub2a5\ud55c \ub300\uc548 \ubc29\ubc95\uc744 \uc0ac\uc6a9\ud558\ub294 \uac83\uc774 \ubc14\ub78c\uc9c1\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\uc5ec \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68 \ud558\uc5d0 \uc2e4\ud589\ub429\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc0ac\uc6a9\uc740 \uc5c4\uaca9\ud788 \uaddc\uc81c\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uad00\ub9ac\uac00 \uc2dc\ud589\ub418\uace0 \uc788\ub2e4\ub294 \uc810\uc744 \uc8fc\ubaa9\ud574\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\uc5d0 \ub300\ud55c \ubc18\ub860\uc73c\ub85c, Exemplar BioSolutions\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc778 \uc804\uc784\uc0c1 \uc2dc\ud5d8\uc758 \uc77c\ubd80\ub77c\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uaddc\uc81c\ub97c \ud1b5\ud574 \uc2e0\uc911\ud558\uac8c \uc218\ud589\ub418\uc5b4\uc57c \ud558\uba70, \uc774\ub294 \uc5f0\uad6c\uc790\ub4e4\uc5d0\uac8c \ucc45\uc784\uac10\uc744 \ubd80\uc5ec\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc9c0\ud0a4\uba70 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud558\ub294 \uac83\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\ub300\ud55c\uc758 \uc724\ub9ac\uc801 \uace0\ub824\uc640 \ud568\uaed8 \uc9c4\ud589\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uc874\uc911\ud558\ub3c4\ub85d \uc5c4\uaca9\ud558\uac8c \uaddc\uc81c\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c\uc5d0\uac8c \ubd88\ud544\uc694\ud55c \uace0\ud1b5\uc744 \uc8fc\uc9c0 \uc54a\uae30 \uc704\ud574 \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c\ub294 \ud56d\uc0c1 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uacfc \uaddc\uc81c\uac00 \uc801\uc6a9\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \uc5c4\uaca9\ud55c \uaddc\uc815\uacfc \uad00\ud589\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uaf2d \ud544\uc694\ud55c \uacbd\uc6b0\uc5d0\ub9cc \uc9c4\ud589\ub420 \uc218 \uc788\ub3c4\ub85d \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uc724\ub9ac\uc801 \uae30\uc900\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc758 \ud544\uc218\uc801\uc778 \uc724\ub9ac\uc801 \uc758\ubb34\ub97c \uc900\uc218\ud558\ub294 \uacfc\uc815\uc785\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uad8c\ub9ac\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uac00\uc774\ub4dc\ub77c\uc778\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc73c\uba70, \uc774\ub294 \uc5f0\uad6c\uc790\uac00 \ucc45\uc784\uac10 \uc788\uac8c \ud589\ub3d9\ud558\ub3c4\ub85d \ud558\ub294 \uae30\ubcf8 \uc6d0\uce59\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798 \uc5c4\uaca9\ud788 \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uacfc \uaddc\uc81c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uacfc\ud559\uc801\uc778 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc774\ub8e8\uc5b4\uc9c0\ub294 \uacf5\uc778\ub41c \uc5f0\uad6c \uae30\uad00\uc5d0\uc11c\ub294 \ubc18\ub4dc\uc2dc \ub3d9\ubb3c\uc758 \uc724\ub9ac\uc801 \ub300\uc6b0\uc640 \ubcf5\uc9c0 \uae30\uc900\uc744 \uc900\uc218\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900 \uc544\ub798\uc5d0\uc11c \uc2dc\ud589\ub418\uace0 \uc788\uc73c\uba70, \uadf8 \uc911\uc694\uc131\uc5d0 \ub300\ud55c \uae4a\uc774 \uc788\ub294 \ud3c9\uac00\uac00 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68 \ud558\uc5d0 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\ud558\uace0 \uc724\ub9ac\uc801\uc778 \uae30\uc900 \ud558\uc5d0 \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc778 \uac00\uc774\ub4dc\ub77c\uc778\uc744 \uc900\uc218\ud558\uba74\uc11c \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uad8c\ub9ac\uc640 \uc724\ub9ac\uc801 \uace0\ub824\uac00 \uc911\uc694\ud55c \ub9cc\ud07c, \ub9ce\uc740 \uc81c\uc57d\uc0ac\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud560 \ub54c \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc9c0\ud0a4\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc774\uc288\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \ub178\ub825\ub3c4 \ubcd1\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798\uc5d0\uc11c \uc218\ud589\ub429\ub2c8\ub2e4","\ub610\ud55c, \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\ub294 \uac00\uc6b4\ub370 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc218\ud589\ub418\uba70, \uc774\ub294 \uc5f0\uad6c\uc758 \uc2e0\ub8b0\uc131\uacfc \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \uc720\uc9c0\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uc774\ub8e8\uc5b4\uc9c0\uba70, \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\uc5d0 \ub300\ud55c \uc6b0\ub824\ub97c \ud574\uacb0\ud558\ub824\ub294 \ub178\ub825\uc774 \uc9c4\ud589 \uc911\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ucd5c\uc801\uc758 \uade0\ud615\uc744 \ucc3e\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c4\uaca9\ud55c \uaddc\uc81c \ud558\uc5d0 \uc2dc\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ubb3c\ub860, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uce21\uba74\uc740 \ub9e4\uc6b0 \uc911\uc694\ud558\uba70, \uc774\ub7ec\ud55c \uc2e4\ud5d8\uc774 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uaddc\uc815\uc744 \uc900\uc218\ud558\ub294 \uac83\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \ubc95\uc801 \uaddc\uc81c \ud558\uc5d0 \uc2e4\ud589\ub418\uc5b4\uc57c \ud55c\ub2e4\ub294 \uc810\uc5d0\uc11c \uc724\ub9ac\uc801 \uc218\uc6a9\uc131\uc744 \uac00\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uad8c\ub9ac\uc640 \uc724\ub9ac\uc801 \ub300\uc6b0\ub294 \uc5c4\uaca9\ud55c \uaddc\uc815\uc5d0 \uc758\ud574 \ubcf4\ud638\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc724\ub9ac\uc801\uc73c\ub85c \uc218\ud589\ub420 \uc218 \uc788\ub2e4\ub294 \uc810\uc744 \uac15\uc870\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \uace0\ub824\ud558\uba70 \uc2e4\ud5d8\uc744 \uc9c4\ud589\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc774\ub77c\ub294 \ud604\uc2e4\uc801 \uc870\uac74\uacfc \uacc4\uc18d\ud574\uc11c \uade0\ud615\uc744 \ub9de\ucd94\uc5b4 \ub098\uac00\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\uc640 \uad00\ub828\ud574\uc11c, \uc2e4\ud5d8\uc758 \ud544\uc218\uc131\uacfc \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \ubcd1\ud589\ud560 \uc218 \uc788\ub294 \ubc29\uc548\uc774 \ub9c8\ub828\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \ubc95\uc801, \uc0ac\ud68c\uc801 \uccb4\uacc4\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uba3c\uc800, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubc18\ub4dc\uc2dc \ub300\uccb4 \ubc29\ubc95\uc774 \uc5c6\uc744 \ub54c\uc5d0\ub9cc \uc0ac\uc6a9\ub418\ub294 \ucd5c\ud6c4\uc758 \uc218\ub2e8\uc774\uc5b4\uc57c \ud558\uba70, \uc774 \uacfc\uc815\uc5d0 \ub300\ud55c \uc5c4\uaca9\ud55c \uac10\ub3c5\uacfc \uac00\uc774\ub4dc\ub77c\uc778\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc57c\uae30\ud55c\ub2e4\ub294 \uc6b0\ub824\ub294 \uc5f0\uad6c \uacfc\uc815\uc5d0\uc11c \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uacfc \uaddc\uc81c\uc758 \uc801\uc6a9\uc744 \ud1b5\ud574 \ub2e4\ub904\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0 \uc5c4\uaca9\ud558\uac8c \uad00\ub9ac\ub418\uc5b4\uc57c \ud558\uba70, \ub9ce\uc740 \uae30\uad00\ub4e4\uc774 \uc774\ub97c \uc900\uc218\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uacfc \uc724\ub9ac\uc801 \uace0\ub824\ub294 \ubaa8\ub450 \uc911\uc694\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub824\uba74 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \ud22c\uba85\uc131\uc774 \ud544\uc218\uc801\uc774\uba70, \uc774\ub294 \uc774\ubbf8 \ub9ce\uc740 \uc5f0\uad6c\uc5d0\uc11c \uc900\uc218\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc778 \uad00\uc810\uc5d0\uc11c\ub3c4 \ud544\uc694\ud55c \uc120\ud0dd\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud558\uac8c \uaddc\uc81c\ub418\uc5b4 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc815\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uad00\uc810\uc5d0\uc11c \ucd5c\ub300\ud55c\uc758 \uc8fc\uc758\uc640 \uad00\ub9ac \ud558\uc5d0 \uc218\ud589\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \ub9ce\uc740 \uae30\uc5c5\ub4e4\uc774 \uc5c4\uaca9\ud55c \ub3d9\ubb3c \ubcf5\uc9c0 \uae30\uc900\uc744 \uc900\uc218\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub530\ub77c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \ucca0\uc800\ud788 \uc9c0\ucf1c\uc838\uc57c \ud55c\ub2e4\ub294 \uc6b0\ub824\uc5d0 \ub300\ud574, \uc774\ub294 \uacfc\ud559\uacc4 \ub0b4\uc5d0\uc11c \uc5c4\uaca9\ud558\uac8c \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uc804\uc784\uc0c1 \uc2dc\ud5d8 \uc911 \ud558\ub098\uc774\uba70, \ubc95\uc801 \uaddc\uc81c\uc640 \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0 \uc5c4\uaca9\ud788 \uad00\ub9ac\ub429\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc0ac\uc6a9\uc744 \ubcf4\uc7a5\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc815\uacfc \uc9c0\uce68\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ud604\uc7ac\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\uac70\uc640 \ub2ec\ub9ac \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uaddc\uc81c\ub97c \uc900\uc218\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc778\uc815\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\ub294 \ub3d9\uc2dc\uc5d0 \uc0dd\uba85 \uacfc\ud559 \uc5f0\uad6c\uc758 \ud544\uc694\uc131\uacfc \ubb34\uac8c\ub97c \uace0\ub824\ud560 \ub54c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc744 \ubcd1\ud589\ud558\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uba3c\uc800, \ub3d9\ubb3c \uad8c\ub9ac\ub97c \uace0\ub824\ud558\ub294 \uac83\uc740 \ub9e4\uc6b0 \uc911\uc694\ud558\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc774\ub7ec\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba70 \uc9c4\ud589\ub429\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uaddc\uc81c\ub97c \ud1b5\ud574 \uc218\ud589\ub418\uc5b4 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\ud638\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559 \ucee4\ubba4\ub2c8\ud2f0 \ub0b4\uc5d0\uc11c \uc778\uc815\ubc1b\ub294 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uacfc \uaddc\uce59 \ud558\uc5d0 \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubc95\uc801 \uaddc\uc81c\ub294 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud55c \uad6c\uccb4\uc801\uc778 \uc9c0\uce68\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uc724\ub9ac\uc801 \ub300\uc6b0\ub294 \ub9e4\uc6b0 \uc911\uc694\ud558\uba70, \uc774\ub97c \uace0\ub824\ud558\uc5ec \uc5f0\uad6c\uac00 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uacfc\ud559\uc790\ub4e4\uc740 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud55c \uad6c\uccb4\uc801\uc778 \uc2e4\ud5d8 \uc724\ub9ac \uae30\uc900\uc744 \uc5c4\uaca9\ud788 \uc900\uc218\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc740 \uc5c4\ubc00\ud55c \uac80\ud1a0\uc640 \uc724\ub9ac\uc801 \ud3c9\uac00\ub97c \ud1b5\ud574 \uacb0\uc815\ub429\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uace0\ubbfc\uc5d0 \ub300\uc751\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uaddc\uc81c\uc640 \ub300\uccb4 \uc5f0\uad6c\uc758 \uac1c\ubc1c\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uad8c\ub9ac\ub97c \uc874\uc911\ud558\uba70 \uc2e4\ud5d8\uc744 \uc9c4\ud589\ud558\ub294 \ub370 \uc788\uc5b4 \uc724\ub9ac\uc801 \uae30\uc900\uc758 \uc5c4\uaca9\ud55c \uc801\uc6a9\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c, \uad6d\uc81c \uacfc\ud559\uc801 \ud569\uc758\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5f0\uad6c\uc758 \uae30\ubcf8\uc801\uc778 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ucda9\uc871\ud55c\ub2e4\ub294 \ub370\uc5d0 \ub3d9\uc758\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc724\ub9ac\uc801\uc73c\ub85c \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud55c \uaddc\uc815\uacfc \uc9c0\uce68\uc774 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \uc2e4\ud5d8 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\uc7a5\ud558\ub294 \uc5c4\uaca9\ud55c \uaddc\uc815\uacfc \uac00\uc774\ub4dc\ub77c\uc778\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc778 \uc724\ub9ac\uc801 \ud3c9\uac00 \uacfc\uc815\uc744 \uac70\uce69\ub2c8\ub2e4","\ubaa8\ub4e0 \uc0dd\uba85\uc5d0 \ub300\ud55c \uc874\uc911\uacfc \uc724\ub9ac\uc801 \ucc45\uc784\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc218\ud589\ub418\ub294 \ubc29\ubc95\uc5d0 \uc788\uc5b4\uc11c\ub3c4 \uc911\uc694\ud55c \uc694\uc18c\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc644\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uac00\uc774\ub4dc\ub77c\uc778\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \ubb38\uc81c\ub97c \uace0\ub824\ud558\uba74, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uaddc\uc81c\uc640 \uac10\ub3c5 \ud558\uc5d0 \uc9c4\ud589\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uad8c\ub9ac\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud55c \uaddc\uc815\uacfc \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc774 \uac15\ud654\ub418\uace0 \uc788\uc73c\uba70, \uc5f0\uad6c\uc790\ub4e4\uc740 \uc774\ub7ec\ud55c \uaddc\uc815\uc744 \uc900\uc218\ud558\uba70 \ucd5c\ub300\ud55c \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucca0\uc800\ud558\uac8c \uaddc\uc81c\ub41c \ud658\uacbd\uc5d0\uc11c \uc774\ub8e8\uc5b4\uc9c0\uba70, \ub300\uccb4 \uae30\uc220\uc774 \uc644\ubcbd\ud574\uc9c8 \ub54c\uae4c\uc9c0 \ud544\uc694\ud55c \uacfc\ub3c4\uae30\uc801 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \uc5c4\uaca9\ud55c \uaddc\uc815\uacfc \uc724\ub9ac\uc801 \uae30\uc900\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc724\ub9ac\uc801\uc778 \uce21\uba74\uc5d0\uc11c\ub294 \ucd5c\ub300\ud55c\uc758 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud55c \uc2e4\ud5d8\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc900 \uc900\uc218\ub294 \uc5f0\uad6c\uc758 \ud0c0\ub2f9\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc694\uc18c\uc785\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\ud558\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc9c4\ud589\ud568\uc73c\ub85c\uc368, \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uacfc \uc815\ub2f9\uc131\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uac80\ud1a0\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc5f0\uad6c\uc758 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68 \ud558\uc5d0 \uc774\ub8e8\uc5b4\uc838\uc57c \ud55c\ub2e4\ub294 \uc810\uc744 \uac15\uc870\ud558\uace0 \uc2f6\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\uc81c \uac1c\ubc1c \uacfc\uc815\uc758 \uc911\uc694\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc720\uc9c0\ud558\ub294 \ub370 \ub3c4\uc6c0\uc744 \uc8fc\ub294 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uccb4\uacc4\uc801\uc778 \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uaddc\uc81c\ub97c \ud1b5\ud574 \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0 \ubb38\uc81c\ub294 \uc5b4\ub5a4 \ud615\ud0dc\ub85c\ub4e0 \uc2e4\ud5d8\uc5d0\uc11c \ubc18\ub4dc\uc2dc \uace0\ub824\ub418\uc5b4\uc57c \ud558\uba70, \uc774\ub97c \uc704\ud55c \uaddc\uc81c\uc640 \uac00\uc774\ub4dc\ub77c\uc778\uc740 \uc5c4\uaca9\ud788 \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc8 CZzDdAbiKEQBAOQ0Bj0D5AKRpUQA=="},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\uae30\uc220\uc758 \ubc1c\uc804\uacfc \ud568\uaed8 \uc5f0\uad6c\uc758 \ud6a8\uc728\uc131\uc744 \ub192\uc774\uae30 \uc704\ud574\uc11c\ub294 \ub2e4\uc591\ud55c \uc811\uadfc \ubc29\uc2dd\uc744 \ub3d9\uc2dc\uc5d0 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c\ub294 \ub354 \ub9ce\uc740 \uc9c0\uc6d0\uacfc \uc790\uc6d0\uc744 \ud544\uc694\ub85c \ud558\uace0 \uc788\uc73c\uba70, \uc774\ub97c \uc704\ud574 \uac01\uc885 \ud504\ub85c\uadf8\ub7a8\uacfc \ud22c\uc790\ub3c4 \uc810\ucc28 \ud655\ub300\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uba3c\uc800, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc744 \ubaa8\uc0c9\ud574\uc57c \ud55c\ub2e4\ub294 \ud544\uc694\uc131\uc5d0 \ub3d9\uc758\ud558\uba70, \uc2e4\uc81c\ub85c \uc804 \uc138\uacc4\uc801\uc73c\ub85c \ub300\uccb4 \uc2e4\ud5d8\ubc95 \uac1c\ubc1c\uc774 \ud65c\ubc1c\ud788 \uc9c4\ud589 \uc911\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc774 \uac00\uc18d\ud654\ub418\uace0 \uc788\ub294 \ub9cc\ud07c, \uc6b0\ub9ac\ub294 \ud604\uc7ac \ud544\uc694\ud55c \uade0\ud615\uc744 \ucc3e\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \ubaa9\ud45c\ub85c \ud558\ub294 \uc5f0\uad6c\uc640 \uc790\uc6d0 \ud22c\uc790\ub294 \uc774\ubbf8 \uc911\uc694\ud558\uac8c \uc778\uc2dd\ub418\uace0 \uc788\uc73c\uba70, \uacfc\ud559\uc790\ub4e4\uc740 \ud604\uc7ac\uc5d0\ub3c4 \uc9c0\uc18d\ud574\uc11c \uc774\ub97c \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub05d\uc73c\ub85c, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95 \uac1c\ubc1c\uc740 \uacc4\uc18d\ud574\uc11c \ucd09\uc9c4\ub418\uc5b4\uc57c \ud558\uc9c0\ub9cc, \ub2f9\uc7a5 \ud601\uc2e0\uc801\uc778 \uacb0\uacfc\ub97c \uc5bb\uae30 \uc704\ud574\uc11c\ub294 \ud604\uc2e4\uc801\uc778 \uc811\uadfc\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \ud22c\uc790\uac00 \uc774\ubbf8 \uc99d\uac00\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uacfc\ud559\uacc4\uc5d0\uc11c\ub3c4 \ud65c\ubc1c\ud788 \ub17c\uc758\ub418\uace0 \uc788\ub294 \uc8fc\uc81c\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc2e4\ud5d8 \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, \ud5a5\ud6c4\uc5d0\ub294 \ub354\uc6b1 \ud6a8\uacfc\uc801\uc778 \ub300\uc548\uc774 \uac1c\ubc1c\ub420 \uc218 \uc788\uc744 \uac83\uc785\ub2c8\ub2e4","\uacfc\ud559 \uae30\uc220 \ubc1c\uc804\uc740 \ub300\uccb4 \ubc29\ubc95\uc744 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\ubc1c\ud558\uace0 \uac1c\uc120\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc2e4\uc9c8\uc801 \ub300\uc548 \ub9c8\ub828\uc744 \uc704\ud55c \ud22c\uc790 \uc99d\uac00\uc758 \ud544\uc694\uc131\uc5d0 \ub300\ud574, Merck & Co., Inc.\ub294 \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uacfc \uae30\uc220 \ud5a5\uc0c1\uc744 \uc704\ud55c \uc5f0\uad6c \uc790\uae08\uc744 \ub300\ud3ed \ud655\ucda9\ud558\uace0 \uc788\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790\ub3c4 \ud65c\ubc1c\ud558\uac8c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud574 \ub300\uccb4 \ubc29\ubc95\uc744 \ucc3e\ub294 \uac83\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac \uac00\uc7a5 \uc911\uc694\ud55c \uac83\uc740 \uc774\ubbf8 \uac1c\ubc1c\ub418\uc5b4 \uc0ac\uc6a9 \uac00\ub2a5\ud55c \uce58\ub8cc\uc81c\ub97c \ud1b5\ud574 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uac83\uc785\ub2c8\ub2e4","\ub610\ud55c, \uacfc\uac70\uc758 \uc131\uacf5 \uc0ac\ub840\ub294 \ud604\uc7ac\uc640 \ubbf8\ub798\uc758 \ubaa8\ub4e0 \uc5f0\uad6c\uc5d0 \uadc0\uc911\ud55c \uae30\uc900\uc810\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \ud22c\uc790\uc640 \uc5f0\uad6c\ub294 \uacc4\uc18d\ub418\uc5b4\uc57c \ud558\uba70, \uc774\ub294 \uc810\uc9c4\uc801\uc73c\ub85c \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc744 \ucc3e\uae30 \uc704\ud55c \uc5f0\uad6c\ub4e4\uc774 \uc774\ubbf8 \uc9c4\ud589 \uc911\uc774\uba70, \uc9c0\uc18d\uc801\uc778 \ubc1c\uc804\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uc548\uc801\uc778 \uc2e4\ud5d8 \ubc29\ubc95\uc5d0 \ub300\ud55c \ud22c\uc790\ub294 \ub3d9\uc2dc\uc5d0 \ub354\uc6b1 \uac15\ud654\ub418\uc5b4\uc57c \ud55c\ub2e4\uace0 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uc548\uc801 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \ub3d9\uc2dc\uc5d0 \ubcd1\ud589\ub418\uc5b4\uc57c \ud558\uba70, \uc774\ub294 \ud601\uc2e0\uc758 \ub2e8\uacc4\uc801 \uc774\ud589\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub300\uccb4 \ubc29\ubc95\uc758 \uc720\ud6a8\uc131\uc744 \uac80\uc99d\ud558\ub294 \uacfc\uc815 \uc5ed\uc2dc \ud544\uc694\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc9c0\uc18d \uac00\ub2a5\ud55c \uc5f0\uad6c \ubc29\ubc95\uc73c\ub85c \uc804\ud658\ud558\uae30 \uc704\ud574\uc11c\ub294 \ud604\uc7ac\uc758 \uacfc\ud559\uc801 \uae30\ubc18\uc744 \ud65c\uc6a9\ud558\ub294 \uac83\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc6b0\ub9ac\ub294 \ub300\uccb4 \uae30\uc220\uc744 \uc704\ud55c \uc5f0\uad6c\uc640 \ud601\uc2e0\uc744 \ucd09\uc9c4\ud558\uace0 \uc788\uc9c0\ub9cc, \uadf8 \uacfc\uc815\uc5d0\uc11c \ud604\uc7ac \ud544\uc694\ud55c \uc5f0\uad6c\ub97c \uc911\ub2e8\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \ud22c\uc790\ub294 \uc774\ubbf8 \ud65c\ubc1c\ud788 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc911\uc99d \uc9c8\ud658\uacfc \uc2f8\uc6b0\uae30 \uc704\ud55c \uae30\uc220\uc801 \ubc1c\uc804\uc5d0 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uacfc\ud559\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ub354 \ub098\uc740 \ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uae30\uc220\ub85c \uc804\ud658\ud558\ub824\ub294 \ub178\ub825\uc740 \uc774\ubbf8 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ub2e8\uacc4\uc801\uc73c\ub85c \uc9c4\ud589\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub05d\uc73c\ub85c, \ub300\uccb4 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790\ub3c4 \ud544\uc694\ud55c \ub9cc\ud07c, \ubcd1\ud589\uc801\uc73c\ub85c \uc9c4\ud589\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ub2e4\ubcc0\ud654\uc640 \ud601\uc2e0\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uac00\ub2a5\ud55c \uc5f0\uad6c \ubc29\ubc95\uc758 \uac1c\ubc1c\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc774\ubbf8 \ub9ce\uc740 \uc81c\uc57d \ud68c\uc0ac\ub4e4\uc774 \ub300\uccb4 \uae30\uc220 \uc5f0\uad6c\uc5d0 \uc790\uc6d0\uc744 \ud22c\uc790\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uaddc\uc81c \uacfc\uc815\uc5d0\uc11c\uc758 \ubcc0\ud654\ub3c4 \uc911\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc7a5\uae30\uc801\uc73c\ub85c \uc2e4\ud5d8 \uc5f0\uad6c\uc758 \ud328\ub7ec\ub2e4\uc784\uc744 \ubcc0\ud654\uc2dc\ud0a4\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uc2e0\uc57d \uac1c\ubc1c\uc758 \uacbd\uc81c\uc801 \uc774\uc775\ub3c4 \ubb34\uc2dc\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ud601\uc2e0\uc801\uc778 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc704\ud55c \ud22c\uc790\ub294 \ubc94\uc704\uac00 \ud655\ub300\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, Johnson & Johnson\uacfc \uac19\uc740 \ub300\ud615 \uc81c\uc57d \uae30\uc5c5\uc740 \uc774\ub7ec\ud55c \ud601\uc2e0\uc801\uc778 \ubc29\ubc95\uc744 \ucc3e\uc544\ub0b4\uae30 \uc704\ud574 \ub9ce\uc740 \uc790\uc6d0\uc744 \ud22c\uc790\ud558\uace0 \uc788\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95 \ubd84\uc57c\uc5d0 \ub354 \ub9ce\uc740 \uc790\uc6d0\uc744 \ud22c\uc790\ud558\uc5ec \ubc1c\uc804\uc2dc\ud0a4\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uc2e4\ud5d8\ubc95\uc744 \uac1c\ubc1c\ud560 \ub54c\uae4c\uc9c0 \uae30\uc874\uc758 \uc5f0\uad6c\ub97c \uc911\ub2e8\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\uc6b0\ub9ac\ub294 \uc774\ub7ec\ud55c \ub178\ub825\uc744 \uc9c0\uc6d0\ud558\uae30 \uc704\ud574 \ub300\uccb4 \ubc29\ubc95 \uc5f0\uad6c\uc5d0 \ub300\ud55c \uc790\uc6d0\uc744 \uc99d\uac00\uc2dc\ud0a4\uace0, \uc9c0\uc18d\uc801\uc778 \ud601\uc2e0\uc744 \uc7a5\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ub610\ud55c, \uc778\uac04\uc758 \uc0dd\uccb4 \ubc18\uc751\uc744 \uc608\uce21\ud558\ub294 \uae30\uc220 \uac1c\ubc1c\ub3c4 \ubcd1\ud589\ub418\uc5b4\uc57c \ud558\uc9c0\ub9cc, \uc774\ub294 \uc7a5\uae30\uc801\uc778 \uad00\uc810\uc5d0\uc11c\uc758 \ubaa9\ud45c\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559\uc801 \uc9c4\ubcf4\uc758 \uac00\uc18d\ud654\ub97c \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubcc0\ud654\uc640 \ubc1c\uc804\uc740 \ubc18\ub4dc\uc2dc \uc2e4\ud5d8\uc801 \uac80\uc99d\uc744 \ud544\uc694\ub85c \ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \ud22c\uc790\ub294 \ubd84\uba85\ud788 \uc911\uc694\ud558\uba70, \uc774\ub294 \uacfc\ud559\uc801 \uc9c4\ubcf4\uc758 \uc911\uc694\ud55c \ucd95\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uafb8\uc900\ud788 \ucd94\uc9c4\ub418\uace0 \uc788\uc73c\uba70 \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc744 \ud1b5\ud574 \ud5a5\uc0c1\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uacfc\ud559\uc801\uc778 \ud328\ub7ec\ub2e4\uc784 \ubcc0\ud654\ub294 \uc2e0\uc911\ud55c \uac80\ud1a0\uc640 \ub2e4\uac01\ub3c4\ub85c\uc758 \uc774\ud574\ub97c \ud544\uc694\ub85c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uacfc\uc758 \ubcd1\ud589\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uae30\uc220\uc758 \uac1c\ubc1c\uc740 \uc5f0\uad6c\uc790\ub4e4\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uad00\uc2ec\uc744 \uae30\uc6b8\uc774\ub294 \uc601\uc5ed\uc785\ub2c8\ub2e4","\ub354\ubd88\uc5b4, \uc7a5\uae30\uc801\uc73c\ub85c \ub300\uc548\uc801 \ubc29\ubc95\uc744 \ud1b5\ud574 \uc5f0\uad6c\ub97c \ucd09\uc9c4\ud558\ub294 \ubc29\ud5a5\uc740 \uc5f0\uad6c \ud601\uc2e0\uc758 \uc911\uc694\ud55c \uc694\uc18c\ub85c, \ud574\ub2f9 \ubd84\uc57c\uc5d0\uc11c\ub3c4 \uc801\uadf9\uc801\uc778 \ubc1c\uc804\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud574 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc5d0 \ud544\uc694\ud55c \ud601\uc2e0\uc801\uc778 \ub300\uccb4 \ubc29\ubc95\uc744 \uc5f0\uad6c\ud558\ub294 \uac83\uc740 \uc911\uc694\ud55c \uacfc\uc81c\uc785\ub2c8\ub2e4","\ubb3c\ub860, \uacfc\ud559 \uae30\uc220\uc758 \ubc1c\uc804\uc73c\ub85c \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \uc810\ucc28 \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc758 \uac1c\ubc1c\uacfc \ud655\uc7a5\uc740 \uacc4\uc18d\ud574\uc11c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ubbf8\ub798\uc758 \uc5f0\uad6c \ubc29\ud5a5\uc5d0 \uae0d\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce60 \uac83\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc704\ud55c \ud22c\uc790\uc640 \uc5f0\uad6c\uac00 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc774 \uac00\uc18d\ud654\ub418\uc5b4\uc57c \ud55c\ub2e4\ub294 \uc810\uc5d0 \ub3d9\uc758\ud569\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc758 \uc18d\ub3c4\ub97c \uace0\ub824\ud558\uc5ec \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub9ce\uc740 \ub178\ub825\uc744 \uae30\uc6b8\uc5ec\uc57c \ud55c\ub2e4\ub294 \uc810\uc740 \ub3d9\uc758\ud560 \ub9cc\ud569\ub2c8\ub2e4","\uba3c\uc800, \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0 \ub354\uc6b1 \ub9ce\uc740 \uc790\uc6d0\uc744 \ud22c\uc785\ud558\ub294 \uac83\uc740 \uc911\uc694\ud55c \uacfc\uc81c\uc774\uba70, \uc774\ub294 \uacfc\ud559\uacc4\uac00 \uc774\ubbf8 \ub178\ub825 \uc911\uc778 \ubd80\ubd84\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc911\uc694\ud55c \uac83\uc740 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \ubc1c\uc804\uc744 \ub3d9\uc2dc\uc5d0 \ucd94\uad6c\ud558\ub294 \uac83\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc5f0\uad6c \ubc29\ubc95\ub860\uc758 \uc5ed\ud560\uc744 \uc218\ud589\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc5f0\uad6c\uc790\ub4e4\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc0c8\ub85c\uc6b4 \uae30\uc220\uacfc \ub300\uccb4 \ubc29\ubc95\uc744 \ubaa8\uc0c9\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \ub178\ub825\uc740 \uacfc\ud559\uc758 \ubc1c\uc804\uacfc \ud568\uaed8 \ub354\uc6b1 \uac15\ud654\ub420 \uac83\uc785\ub2c8\ub2e4","\ub354 \ub098\uc544\uac00, \uc6b0\ub9ac\uac00 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \uc2ec\ud654\ud558\uace0 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub824\uba74 \uc2e4\ud5d8\uc758 \uc2e4\ud6a8\uc131\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc788\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc740 \uacc4\uc18d\ud574\uc11c \uc9c4\uc804\ub418\uace0 \uc788\uc73c\uba70 \uc774\ub294 \uc7a5\uae30\uc801\uc778 \ud574\uacb0\ucc45\uc744 \ub9c8\ub828\ud558\uae30 \uc704\ud55c \uc911\uc694\ud55c \uacfc\uc815\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc774 \ud544\uc694\ud558\ub2e4\ub294 \uc810\uc5d0 \ub3d9\uc758\ud558\uba70, \uc81c\uc57d \ubc0f \uc0dd\uba85\uacf5\ud559 \uae30\uc5c5\ub4e4\uc774 \uc774\ub7ec\ud55c \ubc29\ud5a5\uc73c\ub85c \uc9c0\uc18d\uc801\uc778 \ud22c\uc790\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc548\uc804\ud558\uace0 \ud6a8\uacfc\uc801\uc778 \ub300\uccb4 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790\ub294 \uc774\ubbf8 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc704\ud55c \ud544\uc218\uc801\uc778 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc5d0 \uc788\uc5b4 \ubc29\ud5a5\uc131\uacfc \ud601\uc2e0\uc758 \uc911\uc694\uc131\uc740 \ubaa8\ub450\uac00 \uc778\uc9c0\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc744 \uc704\ud55c \ud544\uc694\uc131\uc744 \uac15\uc870\ud558\ub294 \uac83\uc740 \uc911\uc694\ud558\ub098, \uc989\uac01\uc801\uc778 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uac1c\ubc1c\uc758 \ud544\uc694\uc131\uc744 \ubb34\uc2dc\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \ud22c\uc790\uc640 \uc5f0\uad6c\ub294 \uafb8\uc900\ud788 \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559 \uc5f0\uad6c\uc758 \uc9c4\ubcf4\ub294 \uc804\uccb4 \uc778\ub958\uc758 \uc774\uc775\uc744 \uc99d\uc9c4\uc2dc\ud0b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc704\ud55c \uc808\ucc28\ub97c \uac00\uc18d\ud654\ud558\uace0 \ub2e4\uc591\ud55c \uc790\uc6d0\uc744 \uc9d1\uc911\ud574\uc57c \ud569\ub2c8\ub2e4","\ub610\ud55c, \uc0c8\ub85c\uc6b4 \uc5f0\uad6c \ubc29\ubc95\ub860\uc5d0 \ub300\ud55c \ud0d0\uc0c9\uacfc \ubc1c\uc804\uc740 \ubbf8\ub798\uc758 \uc5f0\uad6c\ub97c \uc704\ud55c \ub354 \uc724\ub9ac\uc801\uc774\uace0 \uc9c0\uc18d \uac00\ub2a5\ud55c \ub3c4\uad6c\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559\uc801 \uc5f0\uad6c\ub294 \uc810\uc9c4\uc801\uc778 \uc9c4\ubcf4\ub97c \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uace0 \uc2e4\ud5d8\uc5d0 \uc801\uc6a9\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc7a5\uae30\uac04\uc758 \uc5f0\uad6c\uc640 \uac80\uc99d\uc774 \ud544\uc694\ud558\uba70, \uc774\ub97c \uc9c0\uc6d0\ud558\uae30 \uc704\ud55c \ud22c\uc790\uc640 \ub178\ub825\ub3c4 \ubcd1\ud589\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\ub354 \uc724\ub9ac\uc801\uc774\uace0 \ud601\uc2e0\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc744 \ucc3e\ub294 \uac83\uc740 \ub9e4\uc6b0 \uc911\uc694\ud558\uba70, \uc774\ub7ec\ud55c \ubc29\ud5a5\uc131\uc740 \uc81c\uc57d\uc5c5\uacc4\uc5d0\uc11c\ub3c4 \ub3d9\uc77c\ud558\uac8c \ucd94\uad6c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc740 \ud655\uc2e4\ud788 \uacfc\uac70\ubcf4\ub2e4 \ubc1c\uc804\ud574\uc654\uc73c\uba70 \uc55e\uc73c\ub85c\ub3c4 \ubc1c\uc804 \uac00\ub2a5\uc131\uc774 \ud07d\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc0b0\uc5c5\uacc4\uc5d0\uc11c\ub294 \ub300\uccb4 \uac00\ub2a5\ud55c \uc5f0\uad6c \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\ub824\ub294 \ub178\ub825\ub3c4 \uacc4\uc18d\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc810\uc9c4\uc801\uc73c\ub85c \ubc1c\uc804 \uc911\uc5d0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc794\uc778\ud558\ub2e4\ub294 \uc8fc\uc7a5\uc774 \uc788\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc774\ubbf8 \uc2e4\uc9c8\uc801\uc778 \uac1c\uc120\uacfc \ubcd1\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc5d0 \ub300\ud55c \ud22c\uc790\ub294 \uc99d\uac00\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc9c0\uc18d\uc801\uc778 \ubcc0\ud654\ub97c \uc704\ud55c \uc911\uc694\ud55c \ubc29\ud5a5\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc810\uc9c4\uc801\uc778 \uacfc\uc815\uc774\uba70, \ud6a8\uacfc\uc801\uc778 \uacfc\ud559\uc801 \uac80\uc99d\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ub4 \uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0\uc11c \ub2e4\ub978 \ubc29\ubc95\uc73c\ub85c\ub294 \uc5bb\uc744 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \ub300\uc548\uc744 \ucc3e\ub294 \ub178\ub825\uacfc \ud568\uaed8 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\ub7ec \uc9c8\ud658\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \uae4a\uac8c \ud558\uace0 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc744 \ubc1c\uacac\ud558\ub294 \ub370 \uc9c0\uc18d\uc801\uc73c\ub85c \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\ub300\ud55c \uc9c8\ubcd1 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc6b0\uc120, \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1\uae4c\uc9c0 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc0c8\ub85c\uc6b4 \uacfc\ud559\uc801 \uc811\uadfc\ubc95\uc744 \ubc1c\uacac\ud558\uace0 \uc774\ub97c \ud14c\uc2a4\ud2b8\ud558\ub294 \uc911\uc694\ud55c \ub2e8\uacc4\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \ub3c4\uad6c\ub77c\ub294 \uc810\uc5d0\uc11c \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc720\uc77c\ud55c \ub300\uc548\uc740 \uc544\ub2c8\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uc778\uac04\uc5d0\uac8c \uc9c1\uc811\uc801\uc73c\ub85c \uc801\uc6a9\ud560 \uc218 \uc788\ub294 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\uae30 \uc704\ud55c \uac00\uc7a5 \ud604\uc2e4\uc801\uc778 \uc635\uc158 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc740 \uc0c1\ud638 \ubc30\ud0c0\uc801\uc778 \ubaa9\ud45c\uac00 \uc544\ub2c8\ub77c \ub3d9\uc2dc\uc5d0 \ucd94\uc9c4\ub420 \uc218 \uc788\ub294 \uac83\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uadf8\ub7fc\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub9ce\uc740 \uc9c8\ubcd1\uc758 \uae30\ucd08 \uc5f0\uad6c \ubc0f \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \ubd80\ubd84\uc785\ub2c8\ub2e4","\ub530\ub77c\uc11c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc0ac\uc6a9\uc740 \ud2b9\ud788 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1 \uc5f0\uad6c\uc640 \ucd08\uae30 \uac1c\ubc1c \ub2e8\uacc4\uc5d0\uc11c\ub294 \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \uc0c1\ud638 \ubc30\ud0c0\uc801\uc774 \uc544\ub2cc \ubcf4\uc644\uc801\uc73c\ub85c \uc791\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc804\uc784\uc0c1 \uc2dc\ud5d8 \ubc0f \uc5f0\uad6c \uac1c\ubc1c\uc744 \uc9c4\ud589\ud558\ub294 Covance Inc.\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub300\uc2e0\ud560 \uc218 \uc5c6\ub294 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc77c\ubd80 \uc9c8\ud658\uc758 \uc5f0\uad6c\uc5d0\uc11c \uc544\uc9c1\uae4c\uc9c0 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc73c\uba70, \ub3d9\ubb3c\uacfc \uc778\uac04 \uac04\uc758 \uc0dd\ub9ac\uc801 \ucc28\uc774\ub97c \uadf9\ubcf5\ud558\ub824\ub294 \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1\uae4c\uc9c0 \ub2e4\ub978 \ub300\uc548 \ubc29\ubc95\ubcf4\ub2e4 \ud6a8\uc728\uc801\uc778 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\ub294 \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ub370\uc774\ud130\uc640 \uacb0\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uacb0\uad6d, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \uc5f0\uad6c \ub370\uc774\ud130\ub294 \ub2e4\ub978 \ub300\uccb4\ubc95\uc73c\ub85c\ub294 \ud604\uc7ac \ub3c4\ub2ec\ud560 \uc218 \uc5c6\ub294 \uc601\uc5ed\uc744 \uac1c\ucc99\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \uc5f0\uad6c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\uc815 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc9c1\uc811\uc801\uc778 \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc5f0\uad6c\ud558\ub294 \ub370 \uc788\uc5b4 \uc5ec\uc804\ud788 \ub3c5\ubcf4\uc801\uc778 \uc704\uce58\uc5d0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub9ce\uc740 \uc911\uc99d \uc9c8\ud658\uc740 \ud2b9\uc815 \ub3d9\ubb3c \ubaa8\ub378\uc5d0\uc11c\ub9cc \uadf8 \ubcd1\ub9ac\ud559\uc801\uc778 \ud2b9\uc131\uc774 \uc798 \ub4dc\ub7ec\ub0a9\ub2c8\ub2e4","Gilead Sciences\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub300\uccb4 \ubc29\ubc95\uc73c\ub85c\ub294 \uc5bb\uc744 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\uba70, \uc774\ub294 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc758 \uae30\ucd08\ub77c\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c0\uae08 \uc2dc\uc810\uc5d0\uc11c\ub294 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc5f0\uad6c \ub3c4\uad6c\ub85c \uc5ec\uaca8\uc9d1\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub2e4\uc218\uc758 \uc9c8\ubcd1 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \uac80\uc99d\ub41c \ud6a8\uacfc\ub97c \ubc1c\ud718\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uae30\uc220\ub4e4\uc774 \ub118\uc5b4\uc57c \ud560 \uacfc\ud559\uc801 \ud55c\uacc4\ub97c \ubcf4\uc644\ud569\ub2c8\ub2e4","\ub300\uc548\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc744 \uac15\ud654\ud558\ub294 \ub178\ub825\uc744 \ubcd1\ud589\ud558\uba74\uc11c\ub3c4, \ud604\uc7ac\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uc9c8\ubcd1 \uce58\ub8cc \ubc1c\uc804\uc5d0 \ud544\uc218\uc801\uc778 \uc694\uc18c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc9c8\ubcd1 \uc5f0\uad6c\uc758 \uc911\uc694\ud55c \ub300\uccb4\uac00 \ubd88\uac00\ub2a5\ud55c \ub3c4\uad6c\ub85c \uc5ec\uaca8\uc9d1\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc0dd\ub9ac\uc801 \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1\uc758 \ubcd1\ub9ac\ud559\uc801 \uc774\ud574\uc640 \uce58\ub8cc\ubc95\uc758 \ud0c0\ub2f9\uc131\uc744 \uac80\uc99d\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \ud0c0\uc758 \ucd94\uc885\uc744 \ubd88\ud5c8\ud558\ub294 \ud6a8\uacfc\ub97c \ubc1c\ud718\ud569\ub2c8\ub2e4. [\uc2e0\uc57d \uac1c\ubc1c \ubc0f \uad00\ub828 \uc11c\ube44\uc2a4\ub97c \uc218\ud589\ud558\ub294] \uc0ac\ub178\ud53c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \ubb34\uc870\uac74\uc801\uc778 \ub300\uccb4\uac00 \uc544\ub2cc \ubcf4\uc644\uc801\uc778 \uc790\uc6d0\uc73c\ub85c \uc0ac\uc6a9\ub418\uba70, \uadf8 \uacb0\uacfc\ub85c \uc5bb\uc5b4\uc9c0\ub294 \uc5f0\uad6c \uc131\uacfc\uac00 \uc778\uac04 \uc9c8\ud658 \uce58\ub8cc\uc5d0 \uc9c1\uc811\uc801\uc73c\ub85c \uae30\uc5ec\ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \ud604\uc2e4\uc801\uc73c\ub85c \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \uacfc\ud559\uc801 \ub370\uc774\ud130 \uc81c\uacf5 \uc218\ub2e8\uc785\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc2e4\uc9c8\uc801\uc778 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\ub978 \ub300\uccb4 \ubc29\ubc95\ubcf4\ub2e4 \ub354 \ube60\ub974\uac8c \uc815\ubcf4\ub97c \uc81c\uacf5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uba3c\uc800, \ub9ce\uc740 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c\uc2e4\ud5d8\uc740 \ub2e8\uc21c\ud788 \uce58\ub8cc\ubc95 \uac1c\ubc1c \uc774\uc0c1\uc758 \uc758\ubbf8\ub97c \uac00\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc2e0\uc57d \uac1c\ubc1c\uacfc \uac19\uc740 \ubcf5\uc7a1\ud55c \uc5f0\uad6c\uc5d0 \ud544\uc694\ud55c \uc0dd\ub9ac\ud559\uc801, \uc57d\ub9ac\ud559\uc801 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ud2b9\uc815 \uc9c8\ud658 \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0\uc11c \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ub370\uc774\ud130 \uc81c\uacf5 \uc218\ub2e8\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \uc5f0\uad6c \ubc29\ubc95\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc778\uac04 \uc9c8\ubcd1 \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uba74\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \uc5f0\uad6c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub9ce\uc740 \ubc18\ub300\uac00 \uc874\uc7ac\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0\uc11c \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0\uc11c \uc5bb\uc744 \uc218 \uc5c6\ub294 \uc2e4\uc81c\uc801\uc778 \uc0dd\uccb4 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uacfc\ud559\uc801 \uc815\ud655\uc131\uacfc \uc2e0\ub8b0\uc131\uc5d0\uc11c \ub3c5\ubcf4\uc801\uc778 \uc704\uce58\uc5d0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc218\uc9d1\ub41c \ub370\uc774\ud130\uc758 \uc2ec\uce35\uc801\uc778 \uc0dd\ub9ac\uc801, \ubcd1\ub9ac\uc801 \uc815\ubcf4\ub294 \uc544\uc9c1 \ub2e4\ub978 \ubc29\ubc95\ub4e4\uc774 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud558\ub294 \uc218\uc900\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \uc218\ub2e8\uc774\ub77c\ub294 \uc810\uc5d0\uc11c \ud2b9\ud788 \uc911\uc694\ud569\ub2c8\ub2e4","\uc544\uc6b8\ub7ec, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9e4\uc6b0 \uc81c\ud55c\ub41c \uacbd\uc6b0\uc5d0 \uc0ac\uc6a9\ub418\uba70, \ub9ce\uc740 \uc9c8\ubcd1\uc758 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \ud6a8\uacfc\uc801\uc778 \uacb0\uacfc\ub97c \ub3c4\ucd9c\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95 \ubc1c\uacac\uc744 \uac00\uc18d\ud654\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \uc784\uc0c1\uc2dc\ud5d8 \uc774\uc804 \ub2e8\uacc4\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \uc815\ubcf4\ub294 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ud575\uc2ec\uc801\uc778 \uc790\ub8cc\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uba70, \uae30\uc874\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc81c\ud55c\ub41c \uc601\uc5ed\uc5d0\uc11c\ub9cc \uc801\uc6a9 \uac00\ub2a5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e8\uc21c\ud788 \uc804\ud1b5\uc801 \ubc29\ubc95\uc774 \uc544\ub2c8\ub77c, \ud2b9\uc815\ud55c \uc758\ud559\uc801 \ub3cc\ud30c\uad6c\ub97c \ucc3e\ub294 \ub370 \uc788\uc5b4\uc11c \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \ubc29\ubc95\ub860\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0ac\ub78c\uc5d0\uac8c \uc9c1\uc811 \uc5f0\uad6c\ub97c \uc218\ud589\ud560 \uc218 \uc5c6\ub294 \uc0c1\ud669\uc5d0\uc11c \uc778\uac04 \uc9c8\ubcd1 \uce58\ub8cc\uc758 \uae30\ucd08\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \ub300\uc548 \ubc29\ubc95\uc73c\ub85c\ub294 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ub3c5\ud2b9\ud55c \uc5f0\uad6c\uc801 \uac00\uce58\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ud544\uc218\uc801\uc778 \uc5f0\uad6c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4\ud560 \uc218\ub2e8\uc774 \uc5c6\ub294 \uc0c1\ud669\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85\uc758 \uc874\uc18d\uc744 \uc704\ud611\ud558\ub294 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\ud55c \uacfc\ud559\uc801 \uae30\ubc18\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc2e4\ud5d8 \uc815\ubc00\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \uc218\ub2e8\uc785\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c\uc758 \ucd08\uae30 \uac1c\ubc1c \ub2e8\uacc4\uc5d0\uc11c \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc778 \uc815\ubcf4\uc6d0\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc9c8\ud658\uacfc \uad00\ub828\ub41c \uc911\uc694\ud55c \uc815\ubcf4\ub97c \uc81c\uacf5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uadf9\ubcf5\uc744 \uc704\ud55c \ub3cc\ud30c\uad6c\ub97c \ub9c8\ub828\ud558\ub294 \ub370 \uc788\uc5b4 \uc5ec\uc804\ud788 \ub9e4\uc6b0 \uc911\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\uc758 \uacfc\ud559 \uae30\uc220 \uc218\uc900\uc73c\ub85c\ub294 \ubd88\uac00\ud53c\ud55c \uba74\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub354\ubd88\uc5b4 \uc778\uac04 \uc9c8\ud658 \ubaa8\ub378\uc744 \uc774\ud574\ud558\uace0 \uac1c\ubc1c\ud558\ub294 \ub370 \uc788\uc5b4, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub300\uccb4 \ubd88\uac00\ud55c \uacfc\ud559\uc801 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub354\uc6b1\uc774, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc815\ud655\ud558\uace0 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc73c\ub85c \uc644\uc804\ud788 \ub300\uccb4\ub418\uae30 \uc5b4\ub824\uc6b4 \uad6c\uccb4\uc801\uc774\uace0 \uc815\ubc00\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc\uc758 \uc0dd\ub9ac\ud559\uc801 \uc720\uc0ac\uc131\uc73c\ub85c \uc778\ud574 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \uc218\ub2e8\uc785\ub2c8\ub2e4","\uc2e0\uc57d \uac1c\ubc1c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uae00\ub77d\uc18c\uc2a4\ubbf8\uc2a4\ud074\ub77c\uc778(GSK)\uc740 \ub3d9\ubb3c\uc2e4\ud5d8 \uae30\ubc18 \uc5f0\uad6c\ub97c \ud1b5\ud55c \uc2e0\uc57d \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \uc5bb\uc740 \ub370\uc774\ud130\uac00 \uc5ec\uc804\ud788 \uc778\uac04\uc744 \ub300\uc0c1\uc73c\ub85c \ud55c \uc784\uc0c1\uc2dc\ud5d8 \uc774\uc804 \ub2e8\uacc4\uc5d0\uc11c \ud544\uc218\uc801\uc774\ub77c\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc9c8\ubcd1 \uc774\ud574 \ubc0f \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc774\ubbf8 \uc785\uc99d\ub41c \uc720\uc6a9\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04\uc758 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0\uc11c \ud544\uc218\ubd88\uac00\uacb0\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc774 \uc5c6\ub2e4\ub294 \uc8fc\uc7a5\uc740 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc758 \ud604\uc2e4\uc744 \ubc18\uc601\ud55c \uac83\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc120 \uc2ec\uac01\ud55c \uc9c8\ubcd1 \uc5f0\uad6c\uc640 \uce58\ub8cc \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95\uc758 \uac1c\ubc1c\uc740 \uc5ec\uc804\ud788 \ub3d9\ubb3c \ubaa8\ub378\uc744 \ud544\uc694\ub85c \ud569\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658 \uc \uc5c4\uaca9\ud55c \uc9c0\uce68\uacfc \uaddc\uc81c\uac00 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uace0\ud1b5\uc758 \ubb38\uc81c\ub97c \uc644\ud654\ud558\uae30 \uc704\ud574 \ucca0\uc800\ud55c \uc724\ub9ac\uc801 \uac80\ud1a0\uc640 \uac10\ub3c5\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uadf8\ub9ac\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc5c4\uaca9\ud788 \uc720\uc9c0\ub418\uace0 \uc788\uc73c\uba70, \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\uc640 \ud3b8\uc548\ud568\uc744 \ucd5c\uc6b0\uc120\uc73c\ub85c \uace0\ub824\ud558\ub294 \uc870\uce58\ub4e4\uc774 \uc2dc\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub3d9\ubb3c\uc5d0\uac8c \uac00\ud574\uc9c0\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0 \uc218\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \ucca0\uc800\ud55c \uc724\ub9ac\uc801 \uaddc\uc81c\ub294 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0, \uc778\uac04\uc758 \uac74\uac15\uacfc \uc724\ub9ac\ub97c \ub3d9\uc2dc\uc5d0 \uc9c0\ud0a4\uae30 \uc704\ud574 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c\uc758 \uace0\ud1b5\uacfc \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uaddc\uc815\uacfc \uc9c0\uce68\uc774 \uc774\ubbf8 \ub2e4\uc218 \uc874\uc7ac\ud558\uba70, \uc5f0\uad6c\uc790\ub4e4\uc740 \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \uc778\uc2dd\ud558\uace0 \ucd5c\ub300\ud55c \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\uc7a5\ud558\ub824\ub294 \ub178\ub825\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc73c\ub85c \uc778\ud55c \uc724\ub9ac\uc801\uc778 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574, \uc2e4\ud5d8\uacfc\uc815\uc5d0\uc11c \uc815\ud574\uc9c4 \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uaddc\uc81c\ub97c \uc5c4\uaca9\ud788 \uc900\uc218\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc2e4\ud5d8 \uacfc\ud559\uc5d0\uc11c\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc815\uacfc \uc808\ucc28\uac00 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uaddc\uc81c\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc801\uadf9\uc801\uc778 \uc218\ub2e8\uc73c\ub85c \uc791\uc6a9\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc724\ub9ac\uc801 \uc815\ub2f9\ud654\ub97c \uc704\ud574 \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uad00\ub9ac\uac00 \ub3d9\uc6d0\ub429\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc2e0\uc57d \uac1c\ubc1c \uacfc\uc815\uc5d0\uc11c \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uaddc\uc81c\ub97c \ud1b5\ud574 \ub3d9\ubb3c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uaddc\uc81c\uc640 \uc9c0\uce68\uc774 \uc5c4\uaca9\ud558\uac8c \uc2dc\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc5c4\uaca9\ud788 \uc9c0\ud0a4\uace0 \uc788\uc73c\uba70, \ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud568\uc5d0 \ub530\ub77c \uc810\uc810 \ub354 \ub9ce\uc740 \ube44\uce68\uc2b5\uc801 \ubc29\ubc95\uc774 \ub3c4\uc785\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900 \uc544\ub798 \uc218\ud589\ub418\uba70, \uc2e4\ud5d8 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c \uc124\uacc4 \uc2dc \ucd5c\uc18c\ud55c\uc758 \uace0\ud1b5\uacfc \uace0\ud1b5 \uc800\uac10\uc744 \uc704\ud55c \ucca0\uc800\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\uc744 \uc900\uc218\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uc218\ud589\ub418\uba70, \ubd88\ud544\uc694\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \uc808\ucc28\uac00 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\ud558\uc5d0 \uc218\ud589\ub418\uc5b4 \uadf8 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \ub098\uc544\uac00\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uc724\ub9ac \uae30\uc900\uc774 \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubcf5\uc9c0\uc5d0 \ub300\ud55c \uc6b0\ub824\ub97c \uc904\uc774\uae30 \uc704\ud574 \uc5c5\uacc4\ub294 \uc5f0\uad6c \uacfc\uc815\uc5d0\uc11c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc5c4\uaca9\ud788 \uc900\uc218\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uac00\uc774\ub4dc\ub77c\uc778\uacfc \uaddc\uc81c\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ud604\uc7ac \uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc5d0 \ub530\ub77c \uc2e4\ud5d8\uc744 \uc9c4\ud589\ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uc5d0\uac8c \ub07c\uce58\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ub178\ub825\uc774 \ucda9\ubd84\ud558\uc9c0 \uc54a\ub2e4\ub294 \uc6b0\ub824\ub294 \uc774\ud574\ud560 \uc218 \uc788\uc9c0\ub9cc, \ud604\uc7ac \uacfc\ud559\uc801 \uc5f0\uad6c\uc5d0\uc11c\ub294 \uac00\ub2a5\ud55c \ud55c \uace0\ud1b5\uc744 \uc904\uc774\ub294 \uc724\ub9ac\uc801 \uc9c0\uce68\uc744 \uc5c4\uaca9\ud788 \uc801\uc6a9\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\ud589 \ubc95\uaddc\uc640 \uad6d\uc81c \uae30\uc900\uc5d0 \ub530\ub77c \uac00\ub2a5\ud55c \ud55c \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \uc6b4\uc601\ub429\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uc5f0\uad6c \uae30\uad00\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ucd5c\ub300\ud55c \uc5c4\uaca9\ud558\uac8c \uc900\uc218\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uace0\ud1b5\uc758 \ucd5c\uc18c\ud654\uc5d0 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798 \uc218\ud589\ub418\uba70, \uc774\ub7ec\ud55c \uc808\ucc28\ub294 \ubd88\ud544\uc694\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc744 \ud3ec\ud568\ud569\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uacfc \uaddc\uc81c\ub4e4\uc774 \uc774\ubbf8 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9e4\uc6b0 \uc870\uc2ec\uc2a4\ub7fd\uace0 \ud1b5\uc81c\ub41c \ud658\uacbd\uc5d0\uc11c \uc774\ub8e8\uc5b4\uc9c0\uba70, \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \uc9c0\uce68\uacfc \uaddc\uc81c\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ubaa8\ub4e0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc5c4\uaca9\ud788 \ub530\ub974\uace0 \uc788\uc73c\uba70, \uac00\ub2a5\ud55c \ud55c \uace0\ud1b5\uc744 \uc81c\uac70\ud558\uace0\uc790 \ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucca0\uc800\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \ub192\uc740 \uac10\uc2dc \uc544\ub798 \uc9c4\ud589\ub418\uba70, \ub3d9\ubb3c\uc744 \uc0ac\uc6a9\ud558\ub294 \ub300\uc2e0 \uac00\ub2a5\ud55c \ubc94\uc704 \ub0b4\uc5d0\uc11c \ub300\uccb4 \ubc29\ubc95\uc744 \uc6b0\uc120\ud558\uc5ec \uc0ac\uc6a9\ud558\ub3c4\ub85d \uaddc\uc81c\ub429\ub2c8\ub2e4","\uc804\ubc18\uc801\uc778 \uc724\ub9ac\uc801 \uae30\uc900\uc740 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub3c4\ub85d \uc124\uacc4\ub418\uc5b4 \uc788\uc73c\uba70, \ubaa8\ub4e0 \uc2e4\ud5d8\uc740 \uc774\ub7ec\ud55c \uae30\uc900\uc744 \uc5c4\uaca9\ud788 \uc900\uc218\ud574\uc57c \ud569\ub2c8\ub2e4","\ub610\ud55c, \uc2e4\ud5d8\uc5d0\uc11c \ub3d9\ubb3c\ub4e4\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc740 \uc810\uc810 \ub354 \uc5c4\uaca9\ud558\uac8c \uc124\uc815\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0 \uc218\ud589\ub418\uc5b4 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\ub294 \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uad00\ub9ac\uac00 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\ub294 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uac00\uc774\ub4dc\ub77c\uc778\uc774 \uc801\uc6a9\ub418\uc5b4 \ubd88\ud544\uc694\ud55c \ud76c\uc0dd\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0 574\uacb0\ud558\uae30 \uc704\ud574, \ub9ce\uc740 \uc5f0\uad6c \uae30\uad00\uc740 \uac00\ub2a5\ud55c \ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc744 \ub530\ub985\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uce21\uba74\uc5d0\uc11c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc2e4\uc2dc\ud568\uc5d0 \uc788\uc5b4 \uc5c4\uaca9\ud55c \uaddc\uc81c\uac00 \uc801\uc6a9\ub418\uace0 \uc788\uc73c\uba70, \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ud604\uc874\ud558\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uac00\uc774\ub4dc\ub77c\uc778\uacfc \uaddc\uc81c\ub294 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\ub300\ud55c \uc644\ud654\ud558\uae30 \uc704\ud55c \ub3c4\uad6c\ub85c\uc11c \uae30\ub2a5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uadf8\ub9ac\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c\uc758 \uc724\ub9ac\uc801\uc778 \ubb38\uc81c\ub294 \uad6d\uc81c\uc801 \uae30\uc900\uacfc \uaddc\uc81c\uc5d0 \uc758\ud574 \uc5b4\ub290 \uc815\ub3c4 \ud1b5\uc81c\ub418\uace0 \uc788\uc73c\uba70, \uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \ubc29\ubc95\uc744 \uc801\uc6a9\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc874\uc911 \ubc1b\uc544\uc57c \ud560 \uac00\uce58\ub85c\uc11c\uc758 \uc0dd\uba85\uc5d0 \ub300\ud55c \uc6b0\ub824\ub97c \ubc18\uc601\ud558\uc5ec, Eli Lilly and Company\ub294 \uc5f0\uad6c \uacfc\uc815\uc5d0\uc11c \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uacfc \uad00\ub9ac \uc9c0\uce68\uc744 \uc900\uc218\ud55c\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ud604\ub300\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uadd 00\ud55c \uacbd\uac10\ud558\uae30 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \uc138\uacc4\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc5f0\uad6c \uc724\ub9ac\uc758 \ud575\uc2ec \uc694\uc18c\ub85c \uc790\ub9ac \uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c \uac00\ub2a5\ud55c \ucd5c\ub300\ud55c \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud574 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc744 \ub530\ub974\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uac00\ub2a5\ud55c \ub3d9\ubb3c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uac10\ub3c5 \ud558\uc5d0 \uc9c4\ud589\ub429\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \ub3d9\ubb3c\uc774 \uacaa\uc744 \uc218 \uc788\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\uacfc \uaddc\uc815\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ud604\uc874\ud558\ub294 \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uaddc\uc81c\ub294 \ub3d9\ubb3c\uc5d0\uac8c \uac00\ud574\uc9c8 \uc218 \uc788\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ub370 \uc911\uc810\uc744 \ub450\uace0 \uc788\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc2e4\uc2dc\ud558\ub294 \uc5f0\uad6c\uc6d0\ub4e4\uc740 \ucd5c\uace0 \uc218\uc900\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\ub3c4\ub85d \uad50\uc721\ubc1b\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud568\uc5d0 \uc788\uc5b4 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uaddc\uc815\uacfc \uac00\uc774\ub4dc\ub77c\uc778\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ube44\ub85d \uc724\ub9ac\uc801 \uc6b0\ub824\uac00 \uc788\uae34 \ud558\uc9c0\ub9cc, \uacfc\ud559\uc790\ub4e4\uc740 \ub3d9\ubb3c\ub4e4\uc5d0\uac8c \ucd5c\uc18c\ud55c\uc758 \uace0\ud1b5\uc744 \uc8fc\uae30 \uc704\ud574 \uc5c4\uaca9\ud55c \uc9c0\uce68\uacfc \uaddc\uc81c\ub97c \uc900\uc218\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c\uc640 \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc73c\uba70, \uc774\ub294 \ubd88\ud544\uc694\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc724\ub9ac\uc801 \uad00\uc810\uc5d0\uc11c \ubcfc \ub54c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc9c0\uce68 \ud558\uc5d0 \uc218\ud589\ub418\uba70 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \ub178\ub825\uc744 \ubcd1\ud589\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub354 \ub098\uc544\uac00, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \ucd5c\ub300\ud55c \ub3d9\ubb3c\uc758 \uace0\ud1b5\uacfc \uc2a4\ud2b8\ub808\uc2a4\ub97c \uc904\uc774\ub294 \ubc29\ud5a5\uc73c\ub85c \uc9c4\ud589\ub429\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uad00\uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc81c\uac00 \uc774\ubbf8 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778 \ud558\uc5d0\uc11c \uc0dd\uba85 \uc874\uc911\uacfc \ucd5c\uc18c\ud55c\uc758 \uace0\ud1b5\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc624\ub298\ub0a0\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uaddc\ubc94\uc744 \uc5c4\uaca9\ud788 \uc900\uc218\ud558\uc5ec \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uaddc\uc815\uc744 \ud1b5\ud574 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub3c4\ub85d \uc124\uacc4\ub429\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9c9\ub300\ud55c \uc724\ub9ac\uc801 \uace0\ub824\uc640 \uaddc\uc81c \uc544\ub798 \uc9c4\ud589\ub418\uba70, \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc774 \ub04a\uc784\uc5c6\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\ud558\uc5d0 \uc2e4\uc2dc\ub418\uc5b4\uc57c \ud558\uba70, \uc5f0\uad6c\uc790\ub4e4\uc740 \ucd5c\ub300\ud55c \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uace0 \ubcf5\uc9c0\ub97c \ubcf4\uc7a5\ud558\ub824\uace0 \ub178\ub825\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc778\uac04\uc758 \uac74\uac15\uacfc \uce58\ub8cc \uc5f0\uad6c\ub97c \uc704\ud574 \uc218\ud589\ub418\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc801\uc808\ud788 \uad00\ub9ac\ub418\uace0 \uaddc\uc81c\ub418\uc5b4\uc57c \ud558\uba70, \uadf8\ub7ec\ud55c \uacfc\uc815\uc5d0\uc11c \uc0dd\uba85\uc5d0 \ub300\ud55c \uc874\uc911\uc744 \uc78a\uc5b4\uc11c\ub294 \uc548 \ub429\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"8_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","8_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"oe88QQKwNkFN5TtBTz88Qc0vQUFv0UFB\u002f9U7QaVVOEGXtDpBDThAQUH4MkGnuTpBtzg6QaOSPkFI9j1Behk+Qa4iPkH6LjtBn7o3QRpfOUF8XzZBBjs+QcKyPUHPeEBBapw+Qfa9O0HgpzNBpXg6QUO1PEH4azRBfVk9QbvYOkHtYkFB65A1QcVCOkGzfUNBICQ0QXsURUGpFzdBBIVDQeedQEG4r0BBfmo8QS7lPUFoyTxBOoxBQWhBREF6sjRBoNI7QUcVO0GmSkNBhKs7QTrUO0Fwpz5BveZDQX3qQUEYfTtBX3E9QV6vO0FU4UNBtMs7QTq4PEFCE0BBA+pD
