cab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15 \uc99d\uc9c4\uc5d0 \ud06c\uac8c \uae30\uc5ec\ud574\uc654\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uc804\uccb4\uc5d0 \ud070 \uc758\ub8cc\uc801 \uc774\uc775\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \uc778\ub958\uac00 \uc9c1\uba74\ud55c \uc911\ub300\ud55c \uac74\uac15 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub294 \ub370 \uacb0\uc815\uc801\uc778 \uae30\uc5ec\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uac00 \uc9c1\uba74\ud55c \uc804 \uc138\uacc4\uc801 \ubcf4\uac74 \uc704\uae30\ub97c \ud574\uacb0\ud558\ub294 \ub370 \ud070 \uc5ed\ud560\uc744 \ud574\uc654\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub9ce\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\uc81c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ucc98\uc74c \uadf8 \ud6a8\ub2a5\uc774 \uc778\uc815\ub41c \ud6c4, \uc778\ub958\uc758 \uac74\uac15\uc744 \ud5a5\uc0c1\uc2dc\ud0a4\ub294 \ub370 \uae30\uc5ec\ud55c \ubc14 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uac74\uac15 \ud5a5\uc0c1\uc744 \uc704\ud55c \ud544\uc218\uc801\uc778 \uae30\ubc18\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uad81\uadf9\uc801\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud5c8\uc6a9\uc740 \uc778\ub958\uc758 \uac74\uac15\uacfc \ubcf5\uc9c0\ub97c \uc99d\uc9c4\uc2dc\ud0a4\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c4 \uacb0\uacfc\ub4e4\uc740 \uc778\ub958\uc758 \uac74\uac15\uc5d0 \uc9c1\uc811\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce69\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc2e0\uae30\uc220 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\uc744 \ubb34\uc2dc\ud558\ub294 \uac83\uc774 \uc544\ub2c8\ub77c, \uc624\ud788\ub824 \uadf8 \uac1c\ubc1c\uc744 \uc9c0\uc6d0\ud558\uba74\uc11c\ub3c4 \ud604\uc7ac \uc778\ub958\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\uace0 \uac74\uac15\uc744 \uc99d\uc9c4\ud558\ub294 \ub370\uc5d0 \ud6a8\uacfc\uc801\uc778 \uc218\ub2e8\uc744 \ub454\ub2e4\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uac74\uac15\uc744 \uc704\ud55c \uc911\uc694\ud55c \ubc1c\uacac\uc5d0 \uae30\uc5ec\ud568\uc73c\ub85c\uc368 \uadf8 \uc815\ub2f9\uc131\uc744 \uac16\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc774\ubbf8 \ub9ce\uc740 \ubd84\uc57c\uc5d0\uc11c \uc778\ub958\uc758 \uac74\uac15 \uc99d\uc9c4\uc744 \uc704\ud55c \uc911\uc694\ud55c \ubc1c\uacac\ub4e4\uc744 \uc774\ub04c\uc5b4 \ub0c8\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc5bb\uc5b4\uc9c0\ub294 \uacb0\uacfc\ub294 \uc2e0\uc57d \uac1c\ubc1c\uc5d0 \uc788\uc5b4\uc11c \uc911\uc694\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\uc5ec, \uc804\ubc18\uc801\uc778 \uacf5\uc911 \ubcf4\uac74\uc5d0 \ub9e4\uc6b0 \uae0d\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ubbf8\uce69\ub2c8\ub2e4","\ub3d9\ubb3c\uc2e4\ud5d8\uc740 \uc778\ub958 \uac74\uac15 \uc99d\uc9c4\uc758 \ubc1c\ud310\uc744 \ub9c8\ub828\ud569\ub2c8\ub2e4","\uacb0\uad6d, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uadf8 \uc790\uccb4\ub85c \uacfc\ud559\uc801 \uc9c4\ubcf4\uc640 \uc778\ub958\uc758 \uac74\uac15 \uc99d\uc9c4\uc744 \uc704\ud55c \ud544\uc218\uc801\uc778 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ubc29\ubc95\ub4e4\uc774 \uc778\ub958\uc758 \uac74\uac15\uc5d0 \ud070 \uae30\uc5ec\ub97c \ud574\uc654\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\uace0 \uac74\uac15\uc744 \ud5a5\uc0c1\uc2dc\ud0a4\ub294 \ub370 \uc788\uc5b4 \ud544\uc5f0\uc801\uc778 \uacfc\uc815\uc73c\ub85c \uc778\uc815\ubc1b\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\ubb34\ub9ac\ud558\uc790\uba74, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacf5\uc911 \ubcf4\uac74\uc758 \uc9c4\uc804\uc744 \ucd09\uc9c4\ud558\ub294 \ub370 \ud575\uc2ec \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uc0b6\uc758 \uc9c8\uc744 \ud06c\uac8c \ud5a5\uc0c1\uc2dc\ud0a4\ub294 \ub370 \uae30\uc5ec\ud574 \uc654\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uc9c0\uc2dd\uc740 \uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85 \uc5f0\uc7a5\uc5d0 \uc2e4\uc9c8\uc801\uc778 \uae30\uc5ec\ub97c \ud574\uc654\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uac8c \ub418\ub294 \uacfc\ud559\uc801 \uc774\uc775\uc740 \uc778\ub958 \uac74\uac15\uc5d0 \ud06c\uac8c \uae30\uc5ec\ud558\uba70, \uc774\ub294 \ub3d9\ubb3c\uacfc \uc778\uac04 \ubaa8\ub450\uc5d0\uac8c \uac04\uc811\uc801 \uc774\uc775\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uac74\uac15 \ud5a5\uc0c1\uc5d0 \uc911\ub300\ud55c \uae30\uc5ec\ub97c \ud574\uc654\uc2b5\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uacfc\ud559\uc801 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\uba70, \uc774\ub294 \uc778\ub958\uc758 \uac74\uac15 \uac1c\uc120\uc744 \uc704\ud55c \uc5f0\uad6c\uc5d0 \uc911\ub300\ud55c \uae30\uc5ec\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \uc778\ub958\uc758 \uac74\uac15 \uac1c\uc120\uc5d0 \uc788\uc5b4 \ub3c5\ubcf4\uc801\uc778 \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15 \uac1c\uc120\uc744 \uc704\ud574 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\uc5d0 \uae30\uc5ec\ud558\ub294 \ub9cc\ud07c \ub3d9\ubb3c \ubcf5\uc9c0 \uac1c\uc120\uc5d0 \ub178\ub825\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uc804\uc744 \ucd09\uc9c4\ud558\uace0 \uc778\ub958\uc758 \uac74\uac15 \uc99d\uc9c4\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\ub294 \uc218\ub9ce\uc740 \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\uace0 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \uae4a\uac8c \ud558\uba70, \uc774\ub294 \uc804\uccb4 \uc0ac\ud68c\uc758 \uac74\uac15 \uc99d\uc9c4\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uac74\uac15 \uc99d\uc9c4\uc744 \uc704\ud574 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc804 \uc138\uacc4\uc801\uc778 \uacf5\uc911 \ubcf4\uac74\uc758 \ud5a5\uc0c1\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc7a5\uae30\uc801\uc73c\ub85c \uc778\uac04\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc5d0 \ub300\ud55c \uc911\uc694 \uc815\ubcf4\ub4e4\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uac8c\ub2e4\uac00, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uac74\uac15\uc5d0 \uae30\uc5ec\ud574 \uc628 \uc785\uc99d\ub41c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc778\uac04\uc758 \uc0dd\uba85\uacfc \uac74\uac15\uc744 \uc9c0\uc6d0\ud558\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\ub85c \uc791\uc6a9\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c4 \uacb0\uacfc\ub294 \uc5ec\uc804\ud788 \ub2e4\uc218\uc758 \uacfc\ud559\uc801 \ubc1c\uacac\uacfc \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \uadfc\uac04\uc774 \ub418\uba70, \uc774\ub294 \uc778\uac04\uc758 \uac74\uac15\uc744 \ube60\ub974\uac8c \uac1c\uc120\ud558\ub294 \ub370 \uc911\ucd94\uc801\uc778 \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uc911\ub300\ud55c \uac74\uac15 \ubb38\uc81c \ud574\uacb0\uc5d0 \uae30\uc5ec\ud574 \uc654\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc0ac\ud68c \uc804\ubc18\uc758 \uac74\uac15 \uc99d\uc9c4\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uc804\uccb4\uc758 \uac74\uac15 \uac1c\uc120\uc5d0 \uae30\uc5ec\ud574 \uc654\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uc911\uc694\ud55c \uc5f0\uad6c \uacb0\uacfc\ub97c \ub3c4\ucd9c\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uac74\uac15 \uac1c\uc120\uc5d0 \uc911\ub300\ud55c \uae30\uc5ec\ub97c \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15 \uc99d\uc9c4\uc5d0 \uae30\uc5ec\ud574 \uc654\uc73c\uba70, \uc55e\uc73c\ub85c\ub3c4 \uae30\uc5ec\ud560 \uc218 \uc788\ub294 \uac00\ub2a5\uc131\uc774 \ub192\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15\uc744 \uac1c\uc120\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud574\uc654\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c4 \uacb0\uacfc\ub294 \uc778\ub958\uc758 \uac74\uac15\uc744 \uc704\ud574 \uadc0\uc911\ud55c \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uace0\ud1b5\ub9cc\uc744 \ucd08\ub798\ud558\ub294 \uac83\uc774 \uc544\ub2c8\ub77c \uc778\ub958\uc758 \uac74\uac15\uc744 \ud68d\uae30\uc801\uc73c\ub85c \uac1c\uc120\ud560 \uc218 \uc788\ub294 \uadfc\ubcf8\uc801\uc778 \ubc1c\uacac\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \ubcf5\uc9c0\ub97c \uc911\ub300\ud558\uac8c \uac1c\uc120\ud558\ub294 \ub370 \uae30\uc5ec\ud574\uc654\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uac74\uac15 \uac1c\uc120\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9 01 \uc9c4\ubcf4\uc640 \ub3d9\ubb3c\uc758 \uad8c\ub9ac \ubcf4\ud638\ub294 \uc0c1\ucda9\ub418\ub294 \ubaa9\ud45c\uac00 \uc544\ub2d9\ub2c8\ub2e4","Secondly, animal testing provides critical insights that are unattainable through other means","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc774\uc720 \uc911 \ud558\ub098\ub294 \uc815\ud655\ud55c \uc608\uce21\ub825\uc744 \uc81c\uacf5\ud55c\ub2e4\ub294 \uc810\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\uac00 \ud56d\uc0c1 \uc778\uac04\uc5d0\uac8c \uc801\uc6a9\ub418\uc9c0 \uc54a\ub354\ub77c\ub3c4, \uc774\ub294 \uc0dd\ubb3c\ud559\uc801 \uc5f0\uad6c\uc758 \uc790\uc5f0\uc2a4\ub7ec\uc6b4 \ud55c\uacc4 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc0dd\ub9ac\ud559\uc801 \ucc28\uc774\uc5d0 \ub530\ub77c \uacb0\uacfc\uc758 \ucc28\uc774\uac00 \ubc1c\uc0dd\ud560 \uc218\ub294 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \ud544\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc740 \uc778\uac04\uacfc \ub2e4\ub97c \uc218 \uc788\uc9c0\ub9cc, \uc5ec\uc804\ud788 \uc784\uc0c1 \uc2dc\ud5d8 \uc774\uc804 \uc5f0\uad6c\uc5d0\uc11c \uc720\uc6a9\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ube44\ub85d \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\uac00 \ud56d\uc0c1 \uc778\uac04\uc5d0\uac8c \ub3d9\uc77c\ud558\uac8c \uc801\uc6a9\ub418\uc9c0 \uc54a\uc744 \uc218 \uc788\uc9c0\ub9cc, \uadf8\uac83\uc774 \uc81c\uacf5\ud558\ub294 \ub370\uc774\ud130\ub294 \uc5ec\uc804\ud788 \ub9e4\uc6b0 \uac00\uce58\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uc778\uac04\uc758 \ucc28\uc774\uc810\uc744 \uc778\uc815\ud558\ub354\ub77c\ub3c4, \uc774\ub7ec\ud55c \uc5f0\uad6c\uac00 \uc5ec\uc804\ud788 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc0dd\ub9ac\ud559\uc801 \ucc28\uc774\uac00 \ubb38\uc81c\uc774\uae34 \ud558\uc9c0\ub9cc, \ub9ce\uc740 \uacbd\uc6b0 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uacfc \uc778\uac04 \uac04\uc758 \uc0dd\ubb3c\ud559\uc801 \ucc28\uc774\uac00 \uc788\ub354\ub77c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc5f0\uad6c\uc5d0 \ud575\uc2ec\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ucc28\uc774\ub85c \uc778\ud574 \ubc1c\uc0dd\ud558\ub294 \ubb38\uc81c\uac00 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04\uc758 \uc0dd\ub9ac\uc640 \uac00\uc7a5 \uc720\uc0ac\ud55c \ud658\uacbd\uc5d0\uc11c \uc2e4\ud5d8\uc744 \uc218\ud589\ud560 \uc218 \uc788\ub294 \ubc29\ubc95 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\uc778\uac04\uacfc \ub3d9\ubb3c\uc758 \uc0dd\ub9ac\ud559\uc801 \ucc28\uc774\uc5d0 \ub300\ud55c \uc6b0\ub824\uac00 \uc788\uc9c0\ub9cc, \ub9ce\uc740 \uacbd\uc6b0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub294 \uc778\uac04 \uc0dd\ub9ac\ud559\uacfc \uad00\ub828\uc131\uc774 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uc758 \uc0dd\ub9ac\ud559\uacfc \uc778\uac04\uc758 \ucc28\uc774\ub85c \uc778\ud574 \ubc1c\uc0dd \uac00\ub2a5\ud55c \uc624\ub958\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0\uc11c \ubc97\uc5b4\ub098\uae30 \uc5b4\ub824\uc6b4 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub610\ud55c, \uc778\uac04\uacfc \ub3d9\ubb3c\uc758 \uc0dd\ub9ac\ud559\uc801 \ucc28\uc774\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc758\uc874\uc774 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc800\ud574\ud55c\ub2e4\uace0 \ubcf4\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\uac00 \uc778\uac04\uc5d0\uac8c \ud56d\uc0c1 \ub3d9\uc77c\ud558\uac8c \uc801\uc6a9\ub418\ub294 \uac83\uc740 \uc544\ub2c8\uc9c0\ub9cc, \uc774\ub294 \uc5ec\uc804\ud788 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uc0dd\uccb4 \uc2e4\ud5d8 \ud658\uacbd\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ube44\ub85d \ub3d9\ubb3c\ub4e4\uc774 \uace0\ud1b5\uc744 \ub290\ub07c\uc9c0\ub9cc, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc758 \uacbd\uc6b0 \ud604\uc2dc\uc810\uc5d0\uc11c\ub294 \ub3d9\ubb3c \ubaa8\ub378\uc774 \uc778\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \uc720\uc77c\ubb34\uc774\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc778\uac04\uacfc \ub3d9\ubb3c\uc758 \uc0dd\ub9ac\uc801 \ucc28\uc774\uc5d0 \ub300\ud55c \ud55c\uacc4\ub97c \uc778\uc815\ud558\uace0, \uc774\ub97c \ubcf4\uc644\ud558\uae30 \uc704\ud55c \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc778\uac04\uc5d0\uac8c \ud56d\uc0c1 \uc9c1\uc811 \uc801\uc6a9\ub418\uc9c0 \uc54a\ub294\ub2e4\uace0 \ud560\uc9c0\ub77c\ub3c4, \uc774\ub294 \uc5ec\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \ub370\uc774\ud130 \uc18c\uc2a4\uc785\ub2c8\ub2e4","\uacfc\ud559\uc801 \uc5f0\uad6c\uc758 \ucc3d\uc758\uc131\uacfc \ud601\uc2e0\uc740 \ubc18\ub4dc\uc2dc \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4\uc640 \uc0c1\ucda9\ud558\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uacbd\uc6b0 \ub300\uccb4 \uae30\uc220\uc774 \uc81c\uacf5\ud560 \uc218 \uc5c6\ub294 \uc724\ub9ac\uc801, \uacfc\ud559\uc801 \ud45c\uc900\uc744 \ucda9\uc871\ud569\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8 \uacb0\uacfc\uac00 \ud56d\uc0c1 \uc778\uac04\uc5d0\uac8c \uc9c1\uc811\uc801\uc73c\ub85c \uc801\uc6a9\ub418\uc9c0 \uc54a\ub294\ub2e4\ub294 \uc8fc\uc7a5\uc740 \ubd80\ubd84\uc801\uc73c\ub85c \ub9de\uc744 \uc218 \uc788\uc9c0\ub9cc, \uc774\ub294 \uc2e4\ud5d8\uc758 \uac00\uce58\ub97c \uc804\uc801\uc73c\ub85c \ubb34\uc2dc\ud558\ub294 \uac83\uc740 \uc544\ub2d9\ub2c8\ub2e4","\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e8\uc21c\ud788 \uc778\uac04\uc758 \uc774\uc775\ub9cc\uc744 \ucd94\uad6c\ud558\ub294 \uac83\uc774 \uc544\ub2d9\ub2c8\ub2e4","\uc77c\ub2e8, \ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc0dd\ub9ac\ud559\uc801 \ucc28\uc774\ub85c \uc778\ud574 \ub3d9\ubb3c \uc2e4\ud5d8 \uacb0\uacfc\uac00 \ud56d\uc0c1 \uc778\uac04\uc5d0\uac8c \ubc14\ub85c \uc801\uc6a9\ub418\uc9c0 \uc54a\uc744 \uc218 \uc788\ub2e4\ub294 \uc810\uc740 \uc778\uc815\ub429\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uc778\uac04 \ubc18\uc751\uc758 \ucc28\uc774\ub97c \uc778\uc2dd\ud558\uba74\uc11c\ub3c4, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uacbd\uc6b0\uc5d0 \uc778\uac04 \uc0dd\ub9ac\uc640 \uc720\uc0ac\ud55c \uacb0\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uc778\uac04 \uc0ac\uc774\uc758 \ucc28\uc774\ub97c \uc644\uc804\ud788 \ud574\uc18c\ud560 \uc218\ub294 \uc5c6\uc9c0\ub9cc, \uc774\ub294 \uc2e4\ud5d8 \uacb0\uacfc\uac00 \ubb34\uc758\ubbf8\ud568\uc744 \uc758\ubbf8\ud558\uc9c4 \uc54a\uc2b5\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uacfc \uc778\uac04 \uc0ac\uc774\uc758 \ucc28\uc774\ub85c \uc778\ud574 \ud56d\uc0c1 \uc9c1\uc811\uc801\uc778 \uc801\uc6a9\uc774 \uac00\ub2a5\ud558\uc9c0\ub294 \uc54a\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uadf8 \uc790\uccb4\ub85c \uac12\uc9c4 \uc7a0\uc7ac\uc801\uc778 \ubb38\uc81c\uc810\uc744 \uc2dd\ubcc4\ud560 \uc218 \uc788\ub294 \uac80\uc99d \ub3c4\uad6c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc778\uac04 \uc0dd\ub9ac\ud559\uacfc \uc644\uc804\ud788 \uc77c\uce58\ud558\uc9c0 \uc54a\uc744 \uc218 \uc788\uc9c0\ub9cc, \uc774\ub294 \ub300\ubd80\ubd84\uc758 \ucd08\uae30 \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc778 \uc2e0\ub8b0\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc0dd\ub9ac\uc801 \ucc28\uc774\uc5d0 \ub530\ub978 \ubd88\ud655\uc2e4\uc131\uc744 \uc778\uc815\ud558\uba74\uc11c\ub3c4, \ub3d9\ubb3c \ubaa8\ub378\uc740 \uc5ec\uc804\ud788 \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc788\uc5b4 \uac00\uc7a5 \uc720\uc6a9\ud55c \ub3c4\uad6c \uc911 \ud558\ub098\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc5d0\uc11c \uc5bb\uc740 \ub370\uc774\ud130\uac00 \uc644\uc804\ud788 \uc778\uac04\uc5d0\uac8c \uadf8\ub300\ub85c \uc801\uc6a9\ub420 \uc218\ub294 \uc5c6\uc73c\ub098, \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5f0\uad6c \uc804\ud658\uc810\uc758 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud56d\uc0c1 \uc778\uac04\uc5d0\uac8c \uc644\uc804\ud788 \uc77c\uce58\ud558\uc9c0 \uc54a\ub294 \uacbd\uc6b0\uac00 \uc788\uc9c0\ub9cc, \uc5ec\uc804\ud788 \ub9ce\uc740 \uc0c1\ud669\uc5d0\uc11c \uc778\uac04 \uc9c8\ud658 \ubaa8\ub378\uc5d0 \uac00\uc7a5 \uac00\uae4c\uc6b4 \uc774\ud574\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ucc28\uc774\uc5d0 \ub530\ub978 \ud55c\uacc4\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc0dd\uccb4 \ubc18\uc751\uc744 \uc608\uce21\ud558\ub294 \ub370 \ud544\uc218\uc801\uc778 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c\uacfc \uc778\uac04 \uc0ac\uc774\uc758 \uc0dd\ub9ac\ud559\uc801 \ucc28\uc774\ub85c \uc778\ud55c \ubb38\uc81c\ub97c \ubcf4\uc644\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc5f0\uad6c\ub294 \uc2e0\uc911\ud558\uac8c \ubd84\uc11d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ub300\uccb4 \ubc29\ubc95\ubcf4\ub2e4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc2e4\uc9c8\uc801\uc778 \ud6a8\uc728\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccab \ubc88\uc9f8\ub85c, \ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc0dd\ubb3c\ud559\uc801 \ucc28\uc774\uac00 \uc788\uc5b4\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04 \uc0dd\ub9ac\uc640 \uc9c8\ubcd1\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc720\uc6a9\ud55c \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ube44\ub85d \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \uc874\uc7ac\ud558\uc9c0\ub9cc, \uc774\ub7ec\ud55c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub9ce\uc740 \uc0c1\ud669\uc5d0\uc11c \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c\uacfc \uc778\uac04 \uc0ac\uc774\uc758 \uc720\uc0ac\uc131\uc5d0 \ub530\ub978 \uc548\uc804\uc131 \ubb38\uc81c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub9ce\uc740 \uc5f0\uad6c\uae30\uad00\uc774 \ub3d9\ubb3c \ub370\uc774\ud130\ub97c \ud1b5\ud574 \uc911\uc694\ud55c \ucd08\uae30 \ub2e8\uacc4\ub97c \uac70\uce58\uace0 \uc788\ub2e4\ub294 \uc810\uc5d0\uc11c \uadf8 \uac00\uce58\ub97c \uc778\uc815\ud569\ub2c8\ub2e4","\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc5bb\uc740 \uacb0\uacfc\uac00 \ud56d\uc0c1 \uc778\uac04\uc5d0\uac8c \uc9c1\uc811 \uc801\uc6a9\ub418\uc9c0 \uc54a\ub294\ub2e4\ub294 \ub2e8\uc810\uc774 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c\uc740 \uc778\uac04\uacfc \uc0dd\ub9ac\ud559\uc801\uc73c\ub85c \uac00\uc7a5 \uc720\uc0ac\ud55c \ubaa8\ub378 \uc911 \ud558\ub098\ub97c \uc81c\uacf5\ud558\uba70, \uc774\ub294 \uc5ec\uc804\ud788 \uc778\uac04\uc5d0 \ub300\ud55c \ucd08\uae30 \uc548\uc804\uc131\uc744 \ud310\ub2e8\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4. [\uc2e0\uc57d \uac1c\ubc1c \ubc0f \uc0c1\uc5c5\uc801 \uc11c\ube44\uc2a4\uc5d0 \uc885\uc0ac\ud558\ub294] Covance\ub294 \uc774\ub7ec\ud55c \uc608\uce21 \uac00\ub2a5\ud55c \uc704\ud5d8\uc744 \uac10\uc218\ud558\uba70, \ub3d9\ubb3c \ubaa8\ub378\uc744 \ud1b5\ud574 \uc2e0\uc57d\uc758 \uc548\uc804\uc131\uacfc \ud6a8\ub2a5\uc744 \ud3c9\uac00\ud558\ub294 \uac83\uc774 \ud544\uc218\uc801\uc774\ub77c\uace0 \uc124\uba85\ud569\ub2c8\ub2e4","\uc778\uac04\uacfc \ub3d9\ubb3c \uac04\uc758 \uc0dd\ub9ac\uc801 \ucc28\uc774\uac00 \uacb0\uacfc\uc758 \uc815\ud655\ub3c4\uc5d0 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\ub2e4\ub294 \uc6b0\ub824\uac00 \uc788\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ucc28\uc774\ub97c \uc774\ud574\ud558\uace0 \uadf9\ubcf5\ud558\ub294 \uac83\uc774 \uacfc\ud559\uc758 \ubc1c\uc804\uc744 \uacac\uc778\ud569\ub2c8\ub2e4","\ubb3c\ub860, \ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc0dd\ubb3c\ud559\uc801 \ucc28\uc774\ub85c \uc778\ud574 \ud56d\uc0c1 \uc644\ubcbd\ud55c \uc608\uce21\uc744 \ud560 \uc218\ub294 \uc5c6\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc778\uac04\uacfc \ub3d9\ubb3c\uc758 \uc0dd\ubb3c\ud559\uc801 \ucc28\uc774\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc77c\uad00\ub41c \uc608\uce21\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc778\uac04\uc5d0\uac8c \uc801\uc6a9 \uac00\ub2a5\ud55c \uacb0\uacfc\ub97c \uc81c\uacf5\ud558\uc9c0 \ubabb\ud560 \uc218\ub3c4 \uc788\ub2e4\ub294 \uc6b0\ub824\ub294 \ub9e4\uc6b0 \uc911\uc694\ud55c \uc9c0\uc810\uc774\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub9ce\uc740 \ub370\uc774\ud130\uc758 \uc815\ud655\uc131\uacfc \uc2e0\ub8b0\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc6b0\uc120, \ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc0dd\ub9ac\ud559\uc801 \ucc28\uc774\ub85c \uc778\ud574 \ubaa8\ub4e0 \uacb0\uacfc\uac00 \ub3d9\uc77c\ud558\uac8c \ub098\ud0c0\ub098\uc9c0 \uc54a\uc744 \uc218 \uc788\ub2e4\ub294 \uc810\uc740 \uc778\uc815\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc644\uc804\ud788 \ub300\uccb4\ub418\ub294 \ube44\uce68\uc2b5\uc801 \ubc29\ubc95\uc774 \uc544\uc9c1 \ubd80\uc871\ud55c \uc0c1\ud669\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uc801 \uc2e4\ud5d8\ubcf4\ub2e4 \uc724\ub9ac\uc801\uc778 \uce21\uba74\uc5d0\uc11c \uc0c1\ub300\uc801\uc73c\ub85c \ub35c \uc704\ud5d8\ud569\ub2c8\ub2e4","\uc778\uac04\uacfc \ub3d9\ubb3c\uc758 \uc0dd\ub9ac\uc801 \ucc28\uc774\uac00 \uc2e4\ud5d8 \uacb0\uacfc\uc5d0 \uc601\ud5a5\uc744 \uc904 \uc218\ub294 \uc788\uc9c0\ub9cc, \uc5f0\uad6c\uc790\ub4e4\uc740 \uc774\ub7ec\ud55c \ucc28\uc774\ub97c \uace0\ub824\ud558\uc5ec \uc2e4\ud5d8\uc744 \uc124\uacc4\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc0dd\ub9ac\ud559\uc801 \ucc28\uc774\ub97c \uace0\ub824\ud558\ub354\ub77c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc0dd\uccb4 \ubc18\uc751\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud55c \ub2e8\uc11c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc744 \ub300\uc0c1\uc73c\ub85c \uc2dc\ud5d8\ud558\ub294 \uac83\ubcf4\ub2e4 \uc724\ub9ac\uc801 \ubd80\ub2f4\uc774 \ub35c\ud558\uba74\uc11c\ub3c4 \uc804\uc2e0\uc801 \ubc18\uc751\uc744 \uad00\ucc30\ud560 \uc218 \uc788\uc5b4, \uadf8 \uc790\uccb4\ub85c \uc911\uc694\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc778\uac04\uc758 \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\ubcbd\ud558\uac8c \uc608\uce21\ud558\uc9c0 \ubabb\ud560 \uc218 \uc788\uc9c0\ub9cc, \uc774\uac83\uc774 \uacfc\ud559\uc801 \uc5f0\uad6c\uc5d0\uc11c \ud544\uc218\uc801\uc778 \uc774\uc720\ub294 \uc5ec\uc804\ud788 \uac00\uc7a5 \uadfc\uc811\ud55c \ubaa8\ub378\uc744 \uc81c\uacf5\ud55c\ub2e4\ub294 \uc810\uc785\ub2c8\ub2e4","\ub458\uc9f8, \ube44\ub85d \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc644\ubcbd\ud558\uc9c0 \uc54a\uc744 \uc218 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \uac00\uc7a5 \ud604\uc2e4\uc801\uc778 \uc5f0\uad6c \ubc29\ubc95\uc785\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uacfc \uc778\uac04 \uac04\uc758 \ucc28\uc774\ub85c \uc778\ud574 \ub300\uccb4 \uc2dc\ud5d8\ubc95\uc744 \uac1c\ubc1c\ud574\uc57c \ud55c\ub2e4\ub294 \uc758\uacac\uc740 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ucc28\uc774\uac00 \ubd84\uba85 \uc874\uc7ac\ud558\uc9c0\ub9cc, \uc774\ub7ec\ud55c \ucc28\uc774\ub97c \uc774\ud574\ud558\uace0 \uadf9\ubcf5\ud558\ub294 \ub370 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uacfc \uc778\uac04 \uac04 \uc0dd\ubb3c\ud559\uc801 \ucc28\uc774 \ub54c\ubb38\uc5d0 \uc9c1\uc811\uc801\uc778 \uc804\uc774\uac00 \uc5b4\ub835\uaca0\uc9c0\ub9cc, \ub3d9\ubb3c \ubaa8\ub378\uc744 \ud1b5\ud574 \uc5bb\ub294 \ucd08\uae30 \ub370\uc774\ud130\ub294 \ub9e4\uc6b0 \uc911\uc694\ud569\ub2c8\ub2e4","\ub610\ud55c, \uc0dd\ub9ac\uc801 \ucc28\uc774\uac00 \uc788\ub354\ub77c\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc608\uce21 \uac00\ub2a5\uc131\uc744 \ub192\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc778\uac04\uacfc \ub3d9\ubb3c \uc0ac\uc774\uc758 \uc720\uc0ac\uc131 \ubb38\uc81c\uc5d0 \ub300\ud574, \uc0dd\uba85\uccb4 \uac04 \ucc28\uc774\uac00 \uc5f0\uad6c \uacb0\uacfc\uc758 \uc808\ub300\uc801\uc778 \uc2e0\ub8b0\uc131\uc744 \ubcf4\uc7a5\ud558\uc9c0 \uc54a\uc744 \uc218 \uc788\uc9c0\ub9cc, \ub9ce\uc740 \uacbd\uc6b0 \uc720\uc758\ubbf8\ud55c \uacb0\uacfc\ub97c \uac00\uc838\uc635\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uacb0\uacfc\uac00 \ubc14\ub85c \uc778\uac04\uc5d0\uac8c \uc801\uc6a9\ub418\uc9c0 \uc54a\uc744 \uc218 \uc788\uc9c0\ub9cc, \uc774\ub294 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \ucd08\uae30 \uac00\uc774\ub4dc\ub77c\uc778\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"17_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","17_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"JEcXQZf9E0FvtBZBegMUQQSgF0GLzxVBjaUVQfRcGEGgXBZBzOYXQccWGEF48xdBhwEXQcxUGEFn6RRBBGAWQT9AFkFlSxhBEOkTQbQEF 4 \uc900\uc218\ud558\uba74\uc11c \uc778\ub958\uc758 \uac74\uac15\uc744 \uc99d\uc9c4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc744 \ucc3e\uc544\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc0ac\uc6a9\uc740 \uc0c8 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \uc911\uc694\ud55c \uacfc\uc81c\ub85c \ub0a8\uc544\uc788\uc73c\uba70 \uc774\ub97c \uc704\ud55c \ud22c\uc790\uc640 \uad00\uc2ec\uc774 \uc99d\ub300\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \uac15\ud654\ud558\ub294 \ubc29\uc548\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uce21\uba74\ub3c4 \uac1c\uc120\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ubcf4\ub2e4 \uc778\ub3c4\uc801\uc778 \ubc29\ubc95\uc73c\ub85c \uc218\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \uc0dd\uba85\uccb4\ub97c \ub300\uc0c1\uc73c\ub85c \ud55c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801, \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\uba74\uc11c \uc218\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc7a5\uae30\uc801\uc73c\ub85c \uacfc\ud559\uc801, \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \ub2e4\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uac1c\uc120 \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uaddc\uc81c \uac15\ud654\ub294 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ubcf4\uc7a5\ud558\uba74\uc11c\ub3c4 \uc5f0\uad6c\uc758 \uc9c8\uc744 \ud5a5\uc0c1\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559\uc790\ub4e4\uc740 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud574 \ucd5c\uc120\uc744 \ub2e4\ud558\uace0 \uc788\uc73c\uba70 \uc774\ub97c \ud1b5\ud574 \uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\uace0\uc790 \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc5f0\uad6c\uc758 \uc9c4\ubcf4\uc640 \ub3d9\uc2dc\uc5d0 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ud5a5\uc0c1\uc2dc\ud0a4\ub294 \ub178\ub825\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc774\uc81c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\ub294 \ubc29\ud5a5\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\ud558\uace0 \uc724\ub9ac\uc801\uc73c\ub85c \uad00\ub9ac\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc5f0\uad6c\uc724\ub9ac\ub294 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uc9c0\uc18d\uc801\uc73c\ub85c \ud5a5\uc0c1\uc2dc\ud0a4\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc5f0\uad6c\uc724\ub9ac\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uace0\ub824\ud558\uba74\uc11c \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc73c\uba70, \ub450 \uc694\uc18c\ub294 \uc0c1\ud638 \ubc30\ud0c0\uc801\uc774\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc5f0\uad6c \uc724\ub9ac\ub97c \uc900\uc218\ud558\ub294 \uc81c\ub3c4\uc801 \uc7a5\uce58\uac00 \ub9c8\ub828\ub418\uc5b4 \uc788\uc5b4 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ubcf4\uc7a5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc9c1\uc811\uc801\uc778 \uc778\uac04 \uc0dd\uba85\uacfc \uc548\uc804\uc744 \ubcf4\ud638\ud558\ub294\ub370 \uae30\uc5ec\ud558\uba70, \uc774\ub294 \uc724\ub9ac\uc801 \ub51c\ub808\ub9c8 \uc18d\uc5d0\uc11c\ub3c4 \uc911\uc694\ud55c \uace0\ub824\uc0ac\ud56d\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud1b5\uc81c\uc640 \uaddc\uc81c\ub97c \uac15\ud654\ud574 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc904\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\uc7ac\uc758 \uc5f0\uad6c \ud658\uacbd\uc5d0\uc11c \uad50\uc721\uacfc \uc758\uc2dd\uc744 \uac15\ud654\ud558\uc5ec \uc5f0\uad6c\uc790\ub4e4\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \ub354\uc6b1 \ucca0\uc800\ud788 \uc778\uc2dd\ud560 \uc218 \uc788\ub3c4\ub85d \ud574\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \ubcf5\uc9c0\uc5d0 \ub300\ud55c \ub178\ub825\uc740 \uacc4\uc18d\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc724\ub9ac\uc801\uc778 \ubb38\uc81c \ud574\uacb0\uc5d0\ub3c4 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\ub294 \uac83\uc73c\ub85c \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud558\uba74\uc11c \uc5f0\uad6c\uc758 \ud544\uc694\uc131\uc744 \ucda9\uc871\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \uc644\ud654\ud558\uae30 \uc704\ud574 \uacfc\ud559\uc790\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc744 \uafb8\uc900\ud788 \uacbd\uc8fc\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc220\uc801 \uac1c\uc120\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uacfc\ud559\uacc4\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\uc5d0 \ub300\ud55c \uc778\uc2dd\uc744 \ub192\uc774\uace0 \uc774\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \uc790\uc6d0\uc744 \uacbd\uc8fc\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uacfc \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uad00\ud589\uc740 \uc11c\ub85c \uc0c1\ucda9\ub418\uc9c0 \uc54a\uace0, \uc624\ud788\ub824 \uc0c1\ud638 \ubcf4\uc644\uc801\uc73c\ub85c \uc791\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc9c0\uc18d\uc801\uc778 \uae30\uc220 \ud601\uc2e0\uacfc \ud568\uaed8 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uae30\uc900\ub3c4 \ubc1c\uc804\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ub3d9\ubb3c \ubcf5\uc9c0 \uce21\uba74\uc5d0\uc11c \uae0d\uc815\uc801\uc778 \ubcc0\ud654\ub97c \uc774\ub04c\uc5b4 \ub0b4\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\ud589 \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uaddc\uc81c\uc758 \uac1c\uc120\uc740 \ub3d9\ubb3c \ubcf5\uc9c0\uc640 \uacfc\ud559\uc801 \ud0d0\uad6c \uac04\uc758 \uade0\ud615\uc744 \ub9de\ucd94\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\uc5ec \uc2e4\ud5d8 \uc808\ucc28\uac00 \uacc4\uc18d \uac1c\uc120\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \uc724\ub9ac\uc801 \uace0\ub824\ub294 \uc5f0\uad6c\uc790\ub4e4\uc5d0\uac8c \uc911\uc694\ud55c \ucc45\uc784\uc73c\ub85c \uc790\ub9ac\uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc911\uc2dc\ud558\uba70 \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uc2e4\ud5d8\uc744 \uc218\ud589\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\ub294 \uc5f0\uad6c \uacf5\ub3d9\uccb4\uc758 \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \uae30\uc220\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc73c\ub85c \uc0ac\uc6a9\ub420 \uc218 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \uc870\ud569\uc740 \uc724\ub9ac\uc801 \ub51c\ub808\ub9c8\ub97c \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uaddc\uc81c\uc640 \ub3d9\ubb3c \ubcf5\uc9c0\uc758 \uce21\uba74\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801\uc774\uace0 \uacfc\ud559\uc801\uc778 \ub3d9\ubb3c \uc2e4\ud5d8 \uac00\uc774\ub4dc\ub77c\uc778 \uc900\uc218\ub294 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uace0\ub824\ud55c \uc5f0\uad6c\ub97c \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \uae30\uc900\uacfc \uaddc\uc815\uc774 \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\uc5ec \uc2e4\ud589\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uac1c\uc120\uc740 \uc778\uac04 \uc0ac\ud68c \uc804\ubc18\uc758 \uc724\ub9ac\uc801 \uc131\uc7a5\uc744 \ucd09\uc9c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900\uc758 \uc9c0\uc18d\uc801\uc778 \uac15\ud654\uc640 \uc2e0\uc911\ud55c \uc801\uc6a9\uc73c\ub85c \uc778\uac04\uacfc \ub3d9\ubb3c \ubaa8\ub450\uc758 \uc774\uc775\uc744 \ucd5c\uc6b0\uc120\uc73c\ub85c \uace0\ub824\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ud55c\uacc4\ub97c \uc778\uc2dd\ud558\uace0 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc99d\uc9c4\ud558\ub824\ub294 \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ucca8\ub2e8 \ubc1c\uc804\uc740 \ubcf4\ub2e4 \uc724\ub9ac\uc801\uc774\uace0 \uc815\ubc00\ud55c \uc5f0\uad6c \ubc29\ubc95\ub860\uc744 \uac1c\ubc1c\ud558\ub294 \uac83\uc744 \ucd09\uc9c4\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uad00\ub9ac\ub97c \uac1c\uc120\ud558\ub824\ub294 \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \uc774\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c\uc2e4\ud5d8 \uc724\ub9ac \ubb38\uc81c\uc5d0 \ub300\ud55c \uc778\uc2dd\uc774 \ub192\uc544\uc9d0\uc5d0 \ub530\ub77c, \uc5f0\uad6c\uae30\uad00\ub4e4\uc740 \ub3d9\ubb3c \uc724\ub9ac\ub97c \uace0\ub824\ud55c \uc5f0\uad6c \ud658\uacbd\uc744 \uc870\uc131\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc9c0\uc18d\uc801\uc778 \uac1c\uc120\uacfc \uc724\ub9ac\uc801 \uae30\uc900 \uac15\ud654\ub85c \ub3d9\ubb3c \uc2e4\ud5d8 \ud658\uacbd\uc774 \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \uc5f0\uad6c \uc811\uadfc\uc744 \uac15\ud654\ud558\uba74\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcd1\ud589\ud558\ub294 \uac83\uc774 \uc2e4\uc6a9\uc801\uc778 \uc808\ucda9\uc548\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ud568\uaed8 \uace0\ub824\ud558\ub294 \ucc45\uc784 \uc788\ub294 \uacfc\ud559\uc801 \uc811\uadfc\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \uc724\ub9ac\uc801 \uae30\uc900 \uac15\ud654\ub294 \uc0c1\ud638\ubc30\ud0c0\uc801\uc778 \uac83\uc774 \uc544\ub2c8\ub77c \uc0c1\ud638 \ubcf4\uc644\uc801\uc73c\ub85c \uc791\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ub51c\ub808\ub9c8\uc5d0 \ub300\ud55c \uc778\uc2dd\uc774 \ub192\uc544\uc9c0\uba74\uc11c, \uc5f0\uad6c \uae30\uad00\ub4e4\uc740 \ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c\uc640 \ubcd1\ud589\ud558\uc5ec \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ub354\uc6b1 \uc5c4\uaca9\ud788 \uc900\uc218\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ud604\ud589 \uacfc\ud559\uacc4\uc758 \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc744 \ud1b5\ud574 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucda9\ubd84\ud788 \ubcf4\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub3d9\ubb3c\uc5d0\uac8c \uc8fc\ub294 \uace0\ud1b5\uc744 \uc904\uc774\uace0 \uc5f0\uad6c\uc758 \uc9c8\uc744 \ub192\uc774\uae30 \uc704\ud55c \uc2e4\uc9c8\uc801\uc778 \ub178\ub825\uc774 \uc774\ubbf8 \uc874\uc7ac\ud558\uba70, \uc774 \uacfc\uc815\uc740 \uacc4\uc18d\ud574\uc11c \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \ubb38\uc81c \ud574\uacb0\uc744 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc778\uc815\ud558\uba74\uc11c\ub3c4 \ub3d9\uc2dc\uc5d0 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \uc801\uadf9 \ud22c\uc790\ud558\ub294 \uac83\uc740 \uacb0\uad6d \ub3d9\ubb3c\uacfc \uc778\uac04 \ubaa8\ub450\ub97c \uc704\ud55c \ucd5c\uc120\uc758 \uc811\uadfc \ubc29\uc2dd\uc785\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"18_\uc5c6\uc74c__","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","18_\uc5c6\uc74c__"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"bdH6QOd1B0GyZfpA14sEQXfiAEFK\u002fv5A5REBQT2t\u002fUAdMgRBdoj9QKEJAEGm7vxAP1L8QDTBAUFb3PpAvYsFQYRqAEFC\u002fvpAwGAEQY4K\u002fUDw5AJBhtAFQV5vBEHXvABBh6oAQUUhBUGhmf1AFiL+QEXkA0EdlP1AfUn9QLLI\u002fUBZmAFBBysHQRDf+0AXPf1A7mz9QKgGAkGNIQVBNyQBQR63\u002fEC1kwBBW8sDQcmI+0BunP1AspAEQbZA\u002fkA3g\u002f1Apk4BQR+3AEFiv\u002f9AFbwEQdMBAUF+GPZAegoCQWbiAEE="},"y":{"dtype":"f4","bdata":"QVNKQKD1OED9LFBANaM1QBu3OkAuB0VABwU4QAujTEAIoEJAtsdGQG24TUCI\u002fU1A+3hJQCzoNED2vEdAr7c+QJtsQEDaMklAcPU4QJ2CPECs3i5AY78cQDiqQ0DKDDdAy6s4QIDzIUD2s0tAz\u002fZGQEA2RUBKrUVASeZOQHU7RkB03D9A19g4QPQfP0D9P0pANihPQA\u002foPUAYLUFA1bVDQDoJSUAP\u002fzdAKlswQMUpUECGdkZAcBVDQIzkRUDb6kZAV2JAQGyMP0D2lEJAJvNCQKmcOEBeFVJAmFg+QHI\u002fQUA="},"type":"scattergl"},{"hoverinfo":"text","hovertext":["\uccab\uc9f8, \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ub118\uc5b4\uc11c\ub294 \uadfc\ubcf8\uc801\uc778 \ud574\uacb0\ucc45\uc744 \ucc3e\uae30 \uc704\ud574 \uacfc\ud559\uacc4\uac00 \uc801\uadf9\uc801\uc73c\ub85c \ub178\ub825\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc724\ub9ac\uc801 \uace0\ubbfc\uacfc \uae30\uc220 \ubc1c\uc804\uc740 \ubcd1\ud589\ub420 \uc218\ubc16\uc5d0 \uc5c6\ub294 \uacfc\uc815\uc785\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \ubb38\uc81c\ub294 \uc9c0\uc18d\uc801\uc73c\ub85c \ub17c\uc758\ub418\uace0 \uc788\uc73c\uba70, \uc5f0\uad6c \uc9c4\ucc99\uacfc \uc724\ub9ac \uae30\uc900\uc758 \uade0\ud615\uc744 \ub9de\ucd94\uae30 \uc704\ud574 \ucca0\uc800\ud55c \uac10\ub3c5\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uae30\uc220 \ubc1c\uc804\uacfc \uc0dd\uccb4 \ub300\uccb4 \ubaa8\ub378\uc758 \uc5f0\uad6c\uac00 \ubcd1\ud589\ub420 \uacbd\uc6b0 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \ub2e4\ud558\ub294 \ub3d9\uc2dc\uc5d0 \uc5f0\uad6c\uc758 \uc815\ud655\uc131\uc744 \ud5a5\uc0c1\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uc5f0\uad6c\uc758 \uc9c4\ubcf4\ub294 \uc724\ub9ac\uc801 \ucc45\uc784\uacfc \uc798 \uc870\ud654\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \ube44\uc724\ub9ac\uc801\uc778 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud55c \uaddc\uc815\uacfc \uc9c0\uce68\uc774 \uac15\ud654\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub97c \ubc14\ud0d5\uc73c\ub85c \ucc45\uc784 \uc788\ub294 \uc5f0\uad6c\uac00 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \uae30\uc220\uc744 \uac1c\ubc1c\ud558\ub294 \ub178\ub825\uc740 \uacc4\uc18d\ub418\uace0 \uc788\uc5b4\uc57c \ud558\uc9c0\ub9cc, \uadf8 \uacfc\uc815\uc5d0\uc11c\ub3c4 \ubc18\ub4dc\uc2dc \uc2e4\ud5d8\uc758 \uc815\ud655\uc131\uacfc \uc548\uc804\uc131\uc744 \ucd5c\uc6b0\uc120\uc73c\ub85c \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\ub458\uc9f8, \uc911\uc99d \uc9c8\ud658\uc758 \uae09\ubc15\uc131\uc740 \uc5f0\uad6c\uc5d0\uc11c \ub2e4\uc18c\uc758 \uc724\ub9ac\uc801 \ub51c\ub808\ub9c8\ub97c \uc815\ub2f9\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uc6b0\ub824\ub294 \uc911\uc694\ud558\uc9c0\ub9cc, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uac1c\ubc1c\uc758 \uc2dc\uae09\uc131\uc740 \ub2e4\ub978 \uad00\uc810\uc5d0\uc11c \uc811\uadfc\ud574\uc57c \ud569\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \uce21\uba74\uc744 \ubcf4\uc644\ud558\uae30 \uc704\ud55c \uc81c\ub3c4\uc801 \uc7a5\uce58\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\uc778\ub958\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \ubcf4\ud638\ud558\uae30 \uc704\ud55c \uc5f0\uad6c\ub294 \ub2e4\uc591\ud55c \uc774\ud574\uad00\uacc4\uc640 \uc724\ub9ac\uc801 \uace0\ubbfc\uc744 \ud3ec\ud568\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \uce21\uba74\uc744 \uace0\ub824\ud55c \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc740 \ubd84\uba85 \ud544\uc694\ud558\uba70 \uc9c4\ud589 \uc911\uc785\ub2c8\ub2e4","\ub458\uc9f8, \uc778\uac04 \uc548\uc804\uc131\uc744 \ud655\ubcf4\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ube44\uc724\ub9ac\uc131 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \uac1c\uc120\uacfc \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c \uc5ed\uc2dc \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub904\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uaddc\uc81c\uc640 \uc2dc\ud5d8\uc758 \uae30\uc900\uc740 \uacfc\ud559\uc801\uc774\uba70 \uc548\uc804\uc131\uc758 \uce21\uba74\uc5d0\uc11c \ud655\ub9bd\ub41c \uac83\uc774\ubbc0\ub85c, \uc774\ub97c \ubb34\uc2dc\ud558\uae30\ubcf4\ub2e4\ub294 \uc810\uc9c4\uc801\uc778 \ub300\uccb4\ub97c \uc704\ud55c \ucd08\uc11d\uc73c\ub85c \uc0bc\uc544\uc57c \ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \ubb38\uc81c \ud574\uacb0\uacfc \ub300\uccb4 \uae30\uc220 \ubc1c\uc804\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc778 \uacfc\uc81c\ub85c\uc11c, \uad81\uadf9\uc801\uc73c\ub85c\ub294 \uc5f0\uad6c\ub97c \ubcf4\ub2e4 \uc778\uac04\uc801\uc774\uace0 \uc9c0\uc18d \uac00\ub2a5\ud55c \ubc29\ud5a5\uc73c\ub85c \uc774\ub04c \uac83\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc724\ub9ac\uc801 \ub300\uc548\uc744 \ubaa8\uc0c9\ud558\ub294 \uac83\uc740 \uc758\ub8cc \uc5f0\uad6c\uc758 \uc9c0\uc18d \uac00\ub2a5\uc131\uc744 \ud655\ubcf4\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc6b0\ub9ac\ub294 \ud56d\uc0c1 \uacfc\ud559\uc801 \uc9c4\ubcf4\uc640 \uc724\ub9ac\uc801 \uace0\ub824 \uc0ac\uc774\uc758 \uade0\ud615\uc744 \ucc3e\uc544\uc57c \ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uc9c0\uc18d \uac00\ub2a5\ud55c \uacfc\ud559 \ubc1c\uc804\uc744 \uc704\ud574\uc11c\ub294 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\uace0, \uc5f0\uad6c \uacfc\uc815 \uc804\ubc18\uc5d0 \uac78\uccd0 \ud22c\uba85\uc131\uc744 \uc720\uc9c0\ud558\ub294 \uac83\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uccab\uc9f8\ub85c, \uc0dd\uba85\uad8c\uc5d0 \ub300\ud55c \ub51c\ub808\ub9c8\ub294 \uc778\uc2dd\ub418\uc5b4\uc57c \ud558\uba70 \uc5f0\uad6c\uc790\ub4e4\uc740 \uc774\ub97c \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uc219\uace0\uc640 \ub300\uccb4 \ubc29\ubc95 \uc5f0\uad6c\ub97c \uc9c0\uc18d\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uccab\uc9f8, \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574 \uc0b0\uc5c5\uacc4\ub294 3R(\ub300\uccb4, \uac10\ucd95, \uac1c\uc120) \uc6d0\uce59\uc744 \uc801\uadf9\uc801\uc73c\ub85c \uc801\uc6a9\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc774 \ubaa8\ub4e0 \uacf3\uc5d0\uc11c \uc644\ubcbd\ud558\uac8c \uc9c0\ucf1c\uc9c0\uc9c0 \uc54a\ub294\ub2e4\ub294 \uc6b0\ub824\ub294 \ud0c0\ub2f9\ud558\uc9c0\ub9cc, \ubaa8\ub2c8\ud130\ub9c1\uacfc \uaddc\uc81c \uc2dc\uc2a4\ud15c\uc774 \uc774\ub97c \uac1c\uc120\ud574 \ub098\uac00\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc740 \ub354\uc6b1 \uc5c4\uaca9\ud788 \uc801\uc6a9\ub418\uace0 \uc788\uc73c\uba70, \uc774\uc5d0 \ub300\ud55c \uc9c0\uc18d\uc801\uc778 \uac80\ud1a0\uac00 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uaddc\uc81c \uc694\uac74\uacfc \uc804\ud1b5\uc801\uc778 \uc811\uadfc \ubc29\uc2dd\uc740 \ubcc0\ud654\ub97c \uc218\uc6a9\ud560 \ud544\uc694\uac00 \uc788\uc9c0\ub9cc, \uac00\uc7a5 \uc911\uc694\ud55c \uac83\uc740 \uc778\uccb4\uc5d0 \ub300\ud55c \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uc608\uce21\ub825\uc744 \ud655\ubcf4\ud558\ub294 \uac83\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc5f0\uad6c\uc758 \ud544\uc218\uc131\uc744 \ubcf4\ub2e4 \uba74\ubc00\ud788 \uac80\ud1a0\ud558\ub294 \uc808\ucc28\uac00 \uc774\ubbf8 \uc874\uc7ac\ud558\uba70, \uc774\ub294 \uacfc\ud559\uc801 \uc815\ud655\uc131\uacfc \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \ub3d9\uc2dc\uc5d0 \uace0\ub824\ud558\uae30 \uc704\ud55c \uac83\uc785\ub2c8\ub2e4","\uc14b\uc9f8, \uc0ac\ud68c\ub294 \uc724\ub9ac\uc801 \uc5f0\uad6c \ubc29\ubc95\uc758 \ud0d0\uc0c9\uacfc \uacfc\ud559 \ubc1c\uc804 \uc0ac\uc774\uc5d0\uc11c \uade0\ud615\uc744 \ucc3e\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \uc790\uc6d0 \ud22c\uc790\ub294 \uacfc\ud559 \ubc1c\uc804\uacfc \uc724\ub9ac\uc801 \uace0\ub824 \ubaa8\ub450\uc5d0 \ubd80\ud569\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc640 \uacfc\ud559\uc801 \ud544\uc694 \uc0ac\uc774\uc758 \uade0\ud615\uc740 \uc9c0\uc18d\uc801\uc778 \uc5f0\uad6c\uc640 \ub17c\uc758\ub97c \ud1b5\ud574 \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uad81\uadf9\uc801\uc73c\ub85c \uacfc\ud559\uc790\ub4e4\uc740 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \ub2e4\ud558\uba74\uc11c \uc9c0\uc18d \uac00\ub2a5\ud55c \ubc1c\uc804\uc744 \uc774\ub8e8\uae30 \uc704\ud574 \ub178\ub825\ud574\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc778\uac04 \uc911\uc2ec\uc801 \uc0ac\uace0\ubfd0\ub9cc \uc544\ub2c8\ub77c \uc778\ub958 \uc804\uccb4\uc758 \uac74\uac15\uacfc \uc0dd\uba85\uc744 \uace0\ub824\ud55c \uade0\ud615 \uc7a1\ud78c \uc5f0\uad6c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\uc14b\uc9f8, \uaddc\uc81c \ubcc0\ud654\ub294 \uc138\uacc4 \uac01\uad6d\uc758 \ud1b5\uc77c\ub41c \ub178\ub825\uc774 \ud544\uc694\ud558\uba70, \ub2e8\uae30\uc801\uc73c\ub85c \uc720\uc804\ub420 \uc218 \uc788\ub294 \ubb38\uc81c\uac00 \uc544\ub2d9\ub2c8\ub2e4","\ube44\uc724\ub9ac\uc131\uacfc \uc778\uac04 \uc801\uc6a9 \uac00\ub2a5\uc131 \ubb38\uc81c\uc5d0 \ub300\ud55c \ub300\uc548\uc774 \ucda9\ubd84\ud788 \uc81c\uacf5\ub418\uc9c0 \uc54a\ub294 \uacbd\uc6b0, \uc804\uc784\uc0c1 \ub2e8\uacc4\uc5d0\uc11c\uc758 \uc548\uc804\uc131 \ud655\ubcf4 \ucc45\uc784\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud569\ub2c8\ub2e4","\ub458\uc9f8\ub85c, \uaddc\uc81c \uae30\uad00\uc758 \uc694\uad6c\ub294 \uc2e0\uc57d\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc744 \ud655\ubcf4\ud558\uae30 \uc704\ud55c \ud655\uace0\ud55c \uae30\ubc18\uc774\uba70, \uac11\uc791\uc2a4\ub808 \ubc14\ub00c\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ubb3c\ub860 \uc724\ub9ac\uc801\uc778 \uc811\uadfc\uc740 \ubaa8\ub4e0 \uc5f0\uad6c\uc5d0 \uc788\uc5b4\uc11c \ub9e4\uc6b0 \uc911\uc694\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \ubb38\uc81c \ud574\uacb0\uc744 \uc704\ud55c \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \ud544\uc694\ud558\ub2e4\ub294 \uc810\uc5d0 \uc774\uacac\uc740 \uc5c6\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801\uc778 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uace0\uc790 \ud558\ub294 \ub178\ub825\uc740 \ub04a\uc784\uc5c6\uc774 \uc9c4\ud589\ub418\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc2e4\ud5d8 \uc124\uacc4\uc758 \ud544\uc218 \uc694\uc18c\ub85c \uc790\ub9ac \uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \uc7a5\uae30\uc801\uc73c\ub85c \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uba70 \uc724\ub9ac\uc801 \ubb38\uc81c \ud574\uc18c\uc5d0 \uae30\uc5ec\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub450 \uc811\uadfc\ubc95\uc744 \ubcd1\ud589\ud558\ub294 \uac83\uc774 \uac00\uc7a5 \ud6a8\uacfc\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc778\uac04 \uc0dd\uba85\uc744 \uc704\ud55c \uc5f0\uad6c\ub77c\ub294 \ucc45\uc784\uc744 \ubb34\uc2dc\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub610\ud55c, \uc724\ub9ac\uc640 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc870\ud654\ub86d\uac8c \uc774\ub8e8\uae30 \uc704\ud574\uc11c\ub294 \ub2e8\uacc4\uc801\uc778 \uc811\uadfc\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\uc911\uc99d \uc9c8\ud658\uacfc \uad00\ub828\ub41c \uc5f0\uad6c\uc5d0\uc11c\ub294 \uc778\uac04\uc758 \uc0dd\uba85 \uc874\uc911\uc744 \uc6b0\uc120\uc2dc\ud560 \uc218\ubc16\uc5d0 \uc5c6\uc2b5\ub2c8\ub2e4","\uc14b\uc9f8, \ub300\uc548 \uc5f0\uad6c \ubc29\ubc95 \ubc1c\uc804\uc744 \uc704\ud55c \uc801\uadf9\uc801\uc778 \ud22c\uc790\uc640 \uc5f0\uad6c\ub294 \uc7a5\ub824\ub418\uc5b4\uc57c \ud558\uba70, \uc774\ub294 \uc7a5\uae30\uc801\uc73c\ub85c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uac15\ud654\ud558\ub294 \ub370 \uae30\uc5ec\ud560 \uac83\uc785\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc724\ub9ac\uc640 \uacfc\ud559\uc758 \uade0\ud615\uc744 \uc704\ud574 \ub354 \ub9ce\uc740 \ub178\ub825\uc774 \ud544\uc694\ud558\ub2e4\ub294 \uc810\uc5d0 \ub3d9\uc758\ud569\ub2c8\ub2e4","\ub458\uc9f8, \uae30\uc220\uc758 \ubc1c\uc804\uc744 \ud1b5\ud55c \ub300\uccb4\ubc29\ubc95 \uac1c\ubc1c\uc740 \uc694\uc6d0\ud55c \uacfc\uc815\uc774\uba70, \uadf8\ub3d9\uc548 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \ubcf4\uc7a5\ud574\uc57c \ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uacfc \uaddc\uc81c \uc2b9\uc778 \uc808\ucc28\uc758 \uc870\ud654\ub97c \uc704\ud574, Pfizer Inc.\ub294 \uc815\ubd80 \ubc0f \uaddc\uc81c \uae30\uad00\uacfc\uc758 \ud611\ub825\uc744 \uac15\ud654\ud558\uace0 \uc788\ub2e4\uace0 \ub9d0\ud569\ub2c8\ub2e4","\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc5f0\uad6c \uc724\ub9ac\uc640 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc870\ud654\ub86d\uac8c \uc774\ub8e8\uae30 \uc704\ud574\uc11c\ub294 \uc804\ubc18\uc801\uc778 \uc5f0\uad6c\uacc4\uc758 \ud611\ub825\uacfc \ucc45\uc784\uac10 \uc788\ub294 \uc811\uadfc\uc774 \uc694\uad6c\ub429\ub2c8\ub2e4","\uba3c\uc800, \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc758 \ud6a8\uacfc\ub294 \uc548\uc804\ud558\uace0 \uc2e0\ub8b0\uc131 \uc788\ub294 \ub370\uc774\ud130\ub97c \ud544\uc694\ub85c \ud569\ub2c8\ub2e4","\uadf8\ub7ec\ub098, \uc724\ub9ac\uc801 \ucc45\uc784\uc744
