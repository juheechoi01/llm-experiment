03eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\ud45c\ud604\uc758 \uc790\uc720\ub294 \uccad\uc18c\ub144\uc5d0\uac8c\ub3c4 \uc911\uc694\ud55c \uad8c\ub9ac\uc785\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ud50c\ub7ab\ud3fc \uc6b4\uc601\uc790\uc758 \uc801\uadf9\uc801 \ucc38\uc5ec\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\uc120\uc81c\uc801 \uad50\uc721 \ud504\ub85c\uadf8\ub7a8\uc774 \uc7a5\uae30\uc801\uc778 \ud574\uacb0\ucc45\uc785\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\uac1c\uc778\uc758 \uc120\ud0dd\uacfc \ucc45\uc784\uc774 \uac15\uc870\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uae30\uc220\uacfc \ubc95\uc774 \uc544\ub2cc \uc778\uac04 \uc911\uc2ec\uc758 \ud574\uacb0\ucc45\uc744 \uc911\uc2dc\ud574\uc57c \ud569\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc2a4\uc2a4\ub85c \uc704\ud5d8 \uc694\uc18c\ub97c \uc778\uc2dd\ud560 \uc218 \uc788\ub3c4\ub85d \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc \ubc0f \ube44\ud310\uc801 \uc0ac\uace0 \uad50\uc721\uc744 \uac15\ud654\ud558\ub294 \uac83\ub3c4 \uc911\uc694\ud569\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uc624\ud788\ub824 \uad50\uc721\uc744 \ud1b5\ud574 \ucc45\uc784 \uc788\ub294 \uc628\ub77c\uc778 \uc0ac\uc6a9 \ubb38\ud654\ub97c \uc870\uc131\ud574\uc57c \ud569\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\ubbf8\uc131\ub144\uc790\ub4e4\uc5d0\uac8c \ucc45\uc784\uac10 \uc788\ub294 \uc778\ud130\ub137 \uc0ac\uc6a9\ubc95\uc744 \uad50\uc721\ud558\ub294 \uac83\uc740 \uc624\ud788\ub824 \uae0d\uc815\uc801\uc778 \uacb0\uacfc\ub97c \uac00\uc838\uc62c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\ubc95\uc801 \uc81c\ud55c\uc740 \uc885\uc885 \uc5ed\ud6a8\uacfc\ub97c \uac00\uc838\uc62c \uc218 \uc788\uc5b4, \uaddc\uc81c\uac00 \uc544\ub2cc \uad50\uc721\uacfc \ub300\ud654\ub97c \ud1b5\ud574 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\ub294 \uac83\uc774 \uc62c\ubc14\ub978 \uc811\uadfc\uc785\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc801\uc808\ud55c \uc0ac\uc6a9 \ubc29\ubc95\uacfc \uc704\ud5d8 \uc778\uc2dd \uad50\uc721\uc744 \ud1b5\ud574, \ubbf8\uc131\ub144\uc790\ub4e4\uc740 \uc774\ub7ec\ud55c \ub3c4\uad6c\ub97c \uc548\uc804\ud558\uac8c \ud65c\uc6a9\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\uac1c\uc778\uc758 \uc0ac\uc0dd\ud65c \ubcf4\ud638\uc5d0 \ub300\ud55c \uc778\uc2dd\uc744 \ub192\uc774\ub294 \uac83\uc774 \uc0ac\uc0dd\ud65c \uce68\ud574 \ubb38\uc81c\ub97c \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uae0d\uc815\uc801\uc774\uace0 \uc548\uc804\ud55c \uc628\ub77c\uc778 \ud658\uacbd\uc744 \uc870\uc131\ud568\uc73c\ub85c\uc368 \ubd80\uc815\uc801\uc778 \uc601\ud5a5\uc744 \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ucee4\ubba4\ub2c8\ud2f0 \uae30\ubc18\uc758 \uc9c0\uc6d0 \uc2dc\uc2a4\ud15c\uc740 \ubc95\uc548 \uc5c6\uc774\ub3c4 \ubbf8\uc131\ub144\uc790\ub97c \ubcf4\ud638\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\uc81c\ud55c\ud558\ub294 \ub300\uc2e0, \uae0d\uc815\uc801\uc774\uace0 \uc548\uc804\ud55c \uc628\ub77c\uc778 \ud658\uacbd\uc744 \uc870\uc131\ud560 \uc218 \uc788\ub294 \uae30\uc220\ub4e4\uc744 \ud65c\uc6a9\ud574\uc57c \ud569\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\uc815\ubcf4\uc5d0 \ub300\ud55c \uc811\uadfc\uc131\uc744 \uc81c\ud55c\ud558\uc9c0 \uc54a\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc790\uc728\uc131\uacfc \ucc45\uc784\uac10\uc744 \uae30\ub974\ub294 \ub370 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc81c\uc7ac\uac00 \uc544\ub2cc \uad50\uc721\uc744 \ud1b5\ud574 \uae0d\uc815\uc801\uc73c\ub85c \ud65c\uc6a9\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\uc9c0\uc5ed \uc0ac\ud68c\uc640 \ud559\uad50\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uad50\uc721 \ucea0\ud398\uc778\uc744 \uac15\ud654\ud558\uc5ec \ub354 \uc548\uc804\ud55c \ud658\uacbd\uc744 \ub9cc\ub4e4 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\ub9dd \uad6c\ucd95 \ubc0f \uc720\uc9c0\uc5d0 \ub3c4\uc6c0\uc744 \uc90d\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\ubcf4\ub2e4\ub294 \ubd80\ubaa8 \ubc0f \uad50\uc0ac\uc640\uc758 \ub300\ud654\uc640 \uad50\uc721\uc774 \uc0ac\uc774\ubc84 \uad34\ub86d\ud798 \ubb38\uc81c \ud574\uacb0\uc5d0 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\ 3e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\ub610\ud55c, \ubc95\uc548\uc740 \uae30\uc220\uc758 \ube60\ub978 \ubc1c\uc804 \uc18d\ub3c4\ub97c \ub530\ub77c\uc7a1\uc9c0 \ubabb\ud560 \uac83\uc785\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\ubbf8\uc131\ub144\uc790\uc758 \uc790\uae30 \ud45c\ud604\uacfc \ucc3d\uc758\ub825 \ubc1c\ud718\ub97c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0 \ud544\uc218\uc801\uc778 \uae30\uc220\uc744 \ud559\uc2b5\ud560 \uae30\ud68c\ub97c \uc5b5\uc81c\ud569\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ubc95\uc801 \uc81c\ud55c\uc740 \uc720\uc5f0\uc131\uc774 \ub5a8\uc5b4\uc9c0\uba70 \ubcc0\ud654\ud558\ub294 \uae30\uc220 \ud658\uacbd\uc5d0 \ubc1c \ube60\ub974\uac8c \ub300\uc751\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ubc95\uc801 \uaddc\uc81c\ub294 \uc624\ud788\ub824 \uae30\uc220\uc758 \ubc1c\uc804\uacfc \uc801\uc751\uc744 \ub2a6\ucd94\uace0, \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \ud544\uc694\ud55c \uae30\uc220\uc744 \uc2b5\ub4dd\ud560 \uae30\ud68c\ub97c \ub193\uce58\uac8c \ub9cc\ub4ed\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\ubc95\uc801 \uc81c\ud55c\uc740 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud65c\uc6a9\uc5d0\uc11c \uae0d\uc815\uc801\uc778 \uce21\uba74\uc744 \uac04\uacfc\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud560 \uacbd\uc6b0 \uc624\ud788\ub824 \ube44\ubc00\uc2a4\ub7fd\uace0 \uc704\ud5d8\ud55c \uacbd\ub85c\uc5d0\uc11c \uc774\ub97c \uc0ac\uc6a9\ud560 \uac00\ub2a5\uc131\uc774 \ub192\uc544\uc9d1\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\uc81c\ud55c\uc801\uc778 \ubc95\uc548\uc740 \uccad\uc18c\ub144\uc758 \uae30\uc220\uc801 \ub2a5\ub825 \ubc1c\uc804\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\ubc95\uc801\uc778 \uae08\uc9c0\ub294 \uccad\uc18c\ub144\uc758 \uc790\uc728\uc131\uacfc \ucc45\uc784\uac10 \ubc1c\ub2ec\uc5d0 \ubd80\uc815\uc801 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uac1c\uc778\uc758 \ubc1c\ub2ec\uc744 \ud68d\uc77c\uc801\uc73c\ub85c \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ubc95\uc801 \uaddc\uc81c\uc758 \uacbd\uc9c1\uc131\uc740 \uc624\ud788\ub824 \ubbf8\uc131\ub144\uc790\uc758 \uc801\uc751\uacfc \ubc1c\ub2ec\uc744 \uc81c\ud55c\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\ub458\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc81c\ud55c\ud558\ub294 \ubc95\uc548\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \ud45c\ud604\uc758 \uc790\uc720\ub97c \uce68\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uae08\uc9c0\ud558\ub294 \uac83\uc740 \ubcf4\ud638\uc790\uac00 \uc790\ub140\ub4e4\uc5d0\uac8c \ubbf8\ub514\uc5b4 \ub9ac\ud130\ub7ec\uc2dc\ub97c \uac00\ub974\uce60 \uae30\ud68c\ub97c \ubc15\ud0c8\ud558\ub294 \uacb0\uacfc\ub97c \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc81c\ud55c\uc801\uc778 \ubc95\uc548\uc740 \uc790\uc728\uc131\uacfc \ucc45\uc784\uac10\uc744 \ud0a4\uc6b8 \uae30\ud68c\ub97c \ubc15\ud0c8\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8\ub85c, \ub9cc\uc57d \uc815\ubd80\uac00 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ubc95\uc801\uc73c\ub85c \uc81c\ud55c\ud55c\ub2e4\uba74, \uae30\uc220\uc801 \ud68c\ud53c \ubc29\ubc95\ub4e4\uc744 \uc0ac\uc6a9\ud558\ub294 \uc0ac\ub840\ub4e4\uc774 \uc99d\uac00\ud560 \uac83\uc785\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ub458\uc9f8\ub85c, \ubc95\uc801 \uc81c\ud55c\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0 \ub300\ud55c \ubd80\uc815\uc801\uc778 \uc778\uc2dd\uc744 \uc2ec\uc5b4\uc904 \uc218 \uc788\uc5b4, \uccad\uc18c\ub144\ub4e4\uc774 \uc774\ub97c \uc720\uc775\ud558\uac8c \uc0ac\uc6a9\ud558\ub294 \ubc29\ubc95\uc744 \ubc30\uc6b0\uc9c0 \ubabb\ud558\uac8c \ub9cc\ub4e4 \uc218 \uc788\uc2b5","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubc95\uc801 \uc81c\uc7ac\ub97c \ud1b5\ud574 \ubaa8\ub4e0 \uc544\uc774\ub4e4\uc774 \ub3d9\ub4f1\ud55c \ubcf4\ud638\ub97c \ubc1b\uac8c \ud558\ub824\ub294 \uc2dc\ub3c4\ub294 \uc790\uc6d0\uc758 \ubd88\ucda9\ubd84 \ubb38\uc81c\ub85c \uc778\ud574 \uc5ed\uc124\uc801\uc73c\ub85c \ubd88\ud3c9\ub4f1\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\ub610\ud55c, \ubbf8\uc131\ub144\uc790\ub4e4\uc758 \uae30\uc220 \ud65c\uc6a9 \ub2a5\ub825\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc0ac\ud68c\uc801 \uace0\ub9bd\uac10\uc744 \ucd08\ub798\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uccab\uc9f8, \uaddc\uc81c\ub294 \ubb38\uc81c \ud574\uacb0\ubcf4\ub2e4 \ud68c\ud53c\ub85c \uc774\uc5b4\uc9c8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uccad\uc18c\ub144\uc758 \uae30\uc220 \uc5ed\ub7c9\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ub458\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uccad\uc18c\ub144\uc758 \ubaa9\uc18c\ub9ac\ub97c \ubb34\uc2dc\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ uacb0 \ubc29\uc548\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uae30\uc220\uc744 \ubc1c\ub2ec\uc2dc\ud0a4\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\uac00 \ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc911\ub3c5 \ubb38\uc81c \ud574\uacb0 \ubc29\uc548\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uccab\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uc9c0\uc9c0\ub9dd \ud615\uc131\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\u003cb\u003e\uc911\ub3c5 \ubb38\uc81c \ud574\uacb0 \ubc29\uc548\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \uc911\uc694\ud55c \uc18c\ud1b5 \uc218\ub2e8\uc73c\ub85c \uc790\ub9ac \uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc911\ub3c5 \ubb38\uc81c \ud574\uacb0 \ubc29\uc548\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \uc911\uc694\ud55c \uc18c\ud1b5 \uc218\ub2e8\uc785\ub2c8\ub2e4","\u003cb\u003e\uc911\ub3c5 \ubb38\uc81c \ud574\uacb0 \ubc29\uc548\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc815\ubcf4 \uc811\uadfc\uc758 \uc911\uc694\ud55c \ucc3d\uad6c\uc785\ub2c8\ub2e4","\u003cb\u003e\uc911\ub3c5 \ubb38\uc81c \ud574\uacb0 \ubc29\uc548\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uc0ac\ud68c\uc801 \uc5f0\uacb0 \ubc0f \uc815\ubcf4 \uc811\uadfc\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\uc911\ub3c5 \ubb38\uc81c \ud574\uacb0 \ubc29\uc548\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uad00\uacc4\ub97c \ud615\uc131\ud558\ub294 \uc911\uc694\ud55c \ud50c\ub7ab\ud3fc\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\uc911\ub3c5 \ubb38\uc81c \ud574\uacb0 \ubc29\uc548\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\ub610\ud55c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uc9c0\uc6d0\uc758 \uc7a5\uc785\ub2c8\ub2e4","\u003cb\u003e\uc911\ub3c5 \ubb38\uc81c \ud574\uacb0 \ubc29\uc548\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc0ac\ud68c\uc801 \uad00\uacc4\ub97c \ud615\uc131\ud558\uace0 \uc720\uc9c0\ud558\ub294 \ub370 \uc788\uc5b4\uc11c \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\uc911\ub3c5 \ubb38\uc81c \ud574\uacb0 \ubc29\uc548\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ud1b5\ud55c \uae0d\uc815\uc801 \uacbd\ud5d8\uc740 \ubd80\uc815\uc801 \uce21\uba74\uc744 \uc0c1\uc1c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc911\ub3c5 \ubb38\uc81c \ud574\uacb0 \ubc29\uc548\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\u003cb\u003e\uc911\ub3c5 \ubb38\uc81c \ud574\uacb0 \ubc29\uc548\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \uc0ac\ud68c\uc801 \ucc45\uc784\uc744 \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc911\ub3c5 \ubb38\uc81c \ud574\uacb0 \ubc29\uc548\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\u003cb\u003e\uc911\ub3c5 \ubb38\uc81c \ud574\uacb0 \ubc29\uc548\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud55c \ub124\ud2b8\uc6cc\ud0b9\uc740 \uc0ac\ud68c\uc801 \uc5f0\ub300\ub97c \uac15\ud654\ud569\ub2c8\ub2e4","\u003cb\u003e\uc911\ub3c5 \ubb38\uc81c \ud574\uacb0 \ubc29\uc548\u003c\u002fb\u003e\u003cbr\u003e n 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \ubc95\uc801 \uaddc\uc81c\ub294 \uad50\uc721\uc801 \uaca9\ucc28\ub97c \uc545\ud654\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc14b\uc9f8, \uad6d\uac00\uc801\uc778 \ubc95\ub960 \uac15\ud654\ub97c \ud1b5\ud574 \uc5bb\uc744 \uc218 \uc788\ub294 \uc774\uc775\uc774 \uc81c\ud55c\uc801\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9 \uc81c\ud55c\uc740 \uacbd\uc81c\uc801 \uae30\ud68c\ub97c \ub193\uce58\uac8c \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ubc95\uc548\uc740 \uc624\ud788\ub824 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc811\uadfc\uc744 \uc81c\ud55c\ud568\uc73c\ub85c\uc368 \uadf8\ub4e4\uc774 \ub2e4\ub978 \ube44\uacf5\uc2dd\uc801 \uacbd\ub85c\ub97c \ud1b5\ud574 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0 \uc811\uadfc\ud558\uac8c \ud560 \uc704\ud5d8\uc774 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uccab\uc9f8, \uc774\ub7ec\ud55c \ubc95\uc548\uc740 \ubbf8\uc131\ub144\uc790\uc758 \uc815\ubcf4 \uc811\uadfc \uae30\ud68c\ub97c \uc81c\ud55c\ud569\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud328\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ubc95\uc801 \uc81c\ud55c\uc740 \uc624\ud788\ub824 \uae30\uc220 \ud601\uc2e0\uc744 \uc800\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubc95\uc548\uc758 \uae30\uc220 \ubcc0\ud654 \uc801\uc751 \uc2e4\ud 3c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\ub4e4\uc758 \ucc38\uc5ec\ub97c \ud1b5\ud574 \ubcf4\ub2e4 \uc548\uc804\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud658\uacbd\uc744 \uc870\uc131\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uccab \ubc88\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc758 \uc704\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud574 \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ubd80\ubaa8\uc640 \uad50\uc0ac\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4. 'Parenting for a Digital Future'\ub294 \uccad\uc18c\ub144\uc774 \uc628\ub77c\uc778 \ud658\uacbd\uc5d0\uc11c \uae0d\uc815\uc801\uc778 \uacbd\ud5d8\uc744 ","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc14b\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc81c\ud55c\uc774 \uc544\ub2c8\ub77c \ubd80\ubaa8\uc640 \uc0ac\ud68c\uac00 \ucc38\uc5ec\ud558\ub294 \uacf5\ub3d9\uc758 \uac10\uc2dc\uc640 \uc9c0\uc6d0\uc774 \ud544\uc694\ud569\ub2c8\ub2e4. '\uac00\uc871 \uc628\ub77c\uc778 \uc548\uc804 \uc5f0\uad6c\uc18c'\ub294 \ubd80\ubaa8\uc640\uc758 \ub300\ud654 \ubc0f \uad50","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ubd80\ubaa8\uc758 \uc5ed\ud560\uacfc \ucc45\uc784\uc774 \ud575\uc2ec\uc801\uc774\ub77c\ub294 \uc810\uc5d0\uc11c, \"National PTA\"\ub294 \ubd80\ubaa8\uac00 \uc790\ub140\uc758 \uc778\ud130\ub137 \uc0ac\uc6a9\uc744 \uac10\ub3c5\ud558\uace0 \uad50\uc721\ud560 \ucc45\uc784\uc744 \ub2e4\ud55c\ub2e4\uba74 \ubc95\uc801\uc778 \uc81c\ud55c","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\ub294 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud65c\uc6a9\uc5d0 \uc801\uadf9\uc801\uc73c\ub85c \ucc38\uc5ec\ud574\uc57c \ud569\ub2c8\ub2e4","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003eThe Children's Partnership\ub294 \ub514\uc9c0\ud138 \ub9ac\ud130\ub7ec\uc2dc\uc5d0 \ucde8\uc57d\ud55c \uac00\uc815\uc744 \uc9c0\uc6d0\ud558\uae30 \uc704\ud574 \uc9c0\uc5ed \uc0ac\ud68c \uae30\ubc18\uc758 \ud504\ub85c\uadf8\ub7a8\uc744 \ud1b5\ud574 \ubd80\ubaa8\uc640 \uad50\uc0ac\ub4e4","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ubcf4\ud638\uc790\uc640 \uc790\ub140 \uac04\uc758 \uc18c\ud1b5\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\uc801\uc808\ud55c \uc0ac\uc6a9\uc744 \uc704\ud55c \uae30\uc220\uc801 \ubcf4\ud638 \uc7a5\uce58 \ubc0f \ubd80\ubaa8\uc758 \ubaa8\ub2c8\ud130\ub9c1\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4 \uacbd\ud5d8\uc740 \ubcf4\ud638\uc790\uc758 \uc801\uadf9\uc801\uc778 \ucc38\uc5ec\ub85c \uc548\uc804\ud558\uac8c \ub9cc\ub4e4 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\ubd80\uc801\uc808\ud55c \ucf58\ud150\uce20\uc758 \ub178\ucd9c\uc740 \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uc758 \uc801\uadf9\uc801\uc778 \uac1c\uc785\uacfc \uc9c0\uce68\uc73c\ub85c \ucda9\ubd84\ud788 \ud574\uacb0 \uac00\ub2a5\ud569\ub2c8\ub2e4","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\uc81c\ud55c \ub300\uc2e0 \ubd80\ubaa8\uc640 \uad50\uc721\uae30\uad00\uc774 \ubbf8\uc131\ub144\uc790\uc758 \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \uc801\uadf9\uc801\uc73c\ub85c \ubaa8\ub2c8\ud130\ub9c1\ud558\uace0 \uc9c0\ub3c4\ud558\ub294 \uac83\uc774 \uc548\uc804\uc744 \ubcf4\uc7a5\ud558\ub294 \ub354 \ub098\uc740 \ubc29\ubc95\uc785\ub2c8\ub2e4","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\ubbf8\uad6d \uc778\ud130\ub137 \ubc0f \uad50\uc721 \uc5f0\uad6c \uae30\uad00\uc778 Pew Research Center\ub294 \ubd80\ubaa8\uc640 \uccad\uc18c\ub144 \uac04\uc758 \uc18c\ud1b5\uc744 \ub192\uc774\ub294 \uac83\uc774 \ub514\uc9c0\ud138 \uc138\uacc4\uc5d0\uc11c \uc548\uc804\uc744 \ubcf4\uc7a5\ud558\ub294 ","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003eApple Inc.\ub294 \ud559\ubd80\ubaa8\uc640 \uccad\uc18c\ub144\uc744 \uc704\ud574 \ub2e4\uc591\ud55c \uc548\uc804 \ub3c4\uad6c\uc640 \uc815\ubcf4 \uc790\uc6d0\uc744 \uc81c\uacf5\ud568\uc73c\ub85c\uc368, \ubd80\ubaa8\uac00 \uc790\ub140\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \ub354 \ud6a8\uacfc\uc801\uc73c\ub85c \uad00\ub9ac","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\ubbf8\uc131\ub144\uc790\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uae0d\uc815\uc801\uc778 \uad00\uacc4\ub97c \ud615\uc131\ud560 \uc218 \uc788\uc73c\uba70, \ubbf8\uad6d \ubd80\ubaa8 \uad50\uc0ac \ud611\ud68c(National Parent Teacher Associ","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub458\uc9f8, \uc720\ud574\ud55c \ucf58\ud150\uce20\ub85c\ubd80\ud130\uc758 \ubcf4\ud638\ub294 \ubd80\ubaa8\uc640 \uc790\uc728\uc801 \ud1b5\uc81c \uccb4\uacc4\ub97c \uac15\ud654\ud568\uc73c\ub85c\uc368 \uac00\ub2a5\ud574\uc9d1\ub2c8\ub2e4","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc740 \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\ub97c \uc704\ud55c \uac10\ub3c5 \ub3c4\uad6c\ub97c \uac15\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ubd80\ubaa8 \ubc0f \ubcf4\ud638\uc790\uc758 \uc5ed\ud560\uc774 \uac15\ud654\ub418\uc5b4\uc57c \ud558\uba70, \uc774\ub4e4\uc774 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc62c\ubc14\ub85c \uc9c0\ub3c4\ud560 \uc218 \uc788\ub3c4\ub85d \ub3c4\uc640\uc8fc\uc5b4\uc57c \ud569\ub2c8\ub2e4; \ubbf8\uc131\ub144\uc790\uc758 \uc548\uc804\ud55c ","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc14b\uc9f8, \ubd80\ubaa8\uc640 \ubcf4\ud638\uc790\uac00 \ubbf8\uc131\ub144\uc790\uc758 \uc628\ub77c\uc778 \ud65c\ub3d9\uc744 \uc801\uadf9\uc801\uc73c\ub85c \uac10\ub3c5\ud558\ub294 \uac83\ub3c4 \ubd80\uc815\uc801 \uc601\ud5a5\uc744 \uc904\uc774\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc14b\uc9f8\ub85c, \ubd80\ubaa8\uc640 \uad50\uc721\uc790\uac00 \ubbf8\uc131\ub144\uc790\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud65c\ub3d9\uc744 \uc801\uc808\ud788 \uac10\ub3c5\ud560 \uc218 \uc788\ub3c4\ub85d \ub3c4\uc640\uc8fc\ub294 \uc571\uacfc \ub3c4\uad6c\uac00 \uac1c\ubc1c\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4. '\ub0b4\uc154\ub110 PTA(Nat","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uccab\uc9f8, \uc0ac\uc774\ubc84 \uad34\ub86d\ud798\uacfc \uac19\uc740 \ubb38\uc81c\ub294 \uad50\uc721\uacfc \ubd80\ubaa8\uc758 \uc9c0\ub3c4\uac00 \uc911\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 1\u003cbr\u003e\uccab\uc9f8, \ubc95\uc548 \ub300\uc2e0 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc548\uc804\ud55c \uc18c\uc15c \ubbf8\ub514\uc5b4 \uacbd\ud5d8\uc744 \ud560 \uc218 \uc788\ub3c4\ub85d \uc9c0\uc6d0\ud558\ub294 \uac83\uc740 \ubd80\ubaa8\uc758 \uc9c0\ub3c4 \ubc0f \ud559\uad50\uc758 \uc5ed\ud560\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \ubd80\ubaa8\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc744 \uc9c0\ub3c4\ud560 \uc218 \uc788\ub294 \ub3c4\uad6c\uc640 \uc790\uc6d0\uc744 \uc5bb\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\uac00 \ubbf8\uc131\ub144\uc790\uc758 \uc218\uba74 \ud328\ud134\uc774\ub098 \ud559\uc5c5 \uc131\ucde8\uc5d0 \ubbf8\uce58\ub294 \uc601\ud5a5\uc740 \ubd80\ubaa8\uc640 \uad50\uc0ac\uc758 \uc801\uc808\ud55c \uc9c0\ub3c4\uc640 \uad00\ub9ac\ub85c \ud6a8\uacfc\uc801\uc73c\ub85c \uc870\uc808\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubd80\ubaa8\uc640 \uad50\uc721\uc790\uc758 \uc5ed\ud560 \uac15\uc870\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uc9c0\ub098\uce5c \uc1 ad50\uc721\uc801 \uae30\ub2a5\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uccab\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ud604\ub300 \uc0ac\ud68c\uc5d0\uc11c \uad50\uc721 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uad50\uc721\uc801 \uae30\ub2a5\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc758 \ub3c4\uad6c\ub85c \uc0ac\uc6a9\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uad50\uc721\uc801 \uae30\ub2a5\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801\uc778 \uc790\uc6d0\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4. \"International Society for Technology in Education (ISTE","\u003cb\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uad50\uc721\uc801 \uae30\ub2a5\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \uc790\uc6d0\uc5d0 \ub300\ud55c \uc811\uadfc\uc744 \ud655\ub300\ud569\ub2c8\ub2e4","\u003cb\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uad50\uc721\uc801 \uae30\ub2a5\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uad50\uc721\uc801 \uae30\ub2a5\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801\uc778 \ub3c4\uad6c\ub85c \uc0ac\uc6a9\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \uad50\uc721\uc801 \uae30\ub2a5\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uad50\uc721\uc801 \uc790\uc6d0\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\uc758 \ 0\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\ub9dd \ud615\uc131\uacfc \uc758\uc0ac\uc18c\ud1b5 \ub2a5\ub825 \ud5a5\uc0c1\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uccad\uc18c\ub144\ub4e4\uc758 \uc2ec\ub9ac\uc801, \uc815\uc11c\uc801 \ubc1c\ub2ec\uc5d0 \uc788\uc5b4 \ub2e4\uc591\ud55c \uc18c\uc15c \uacbd\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uccab \ubc88\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc5d0\uac8c \uad50\uc721\uc801 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\ub450 \ubc88\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\ub458\uc9f8, \ub514\uc9c0\ud138 \uc2dc\ub300\uc5d0 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uc815\uccb4\uc131 \ud615\uc131\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\ub458\uc9f8\ub85c, \uccad\uc18c\ub144\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc911\uc694\ud55c \uc0ac\ud68c\uc801 \uc5f0\uacb0\ub9dd\uc744 \ud615\uc131\ud569\ub2c8\ub2e4. '\uc804\uad6d\ud559\uad50\uc2ec\ub9ac\ud559\uc790\ud611\ud68c'\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \ub610\ub798\uc640\uc758 \uae0d\uc815","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \ubaa9\uc18c\ub9ac\ub97c \uc81c\uacf5\ud558\uba70, \ub354 \ud070 \uc0ac\ud68c \ubb38\uc81c\uc5d0 \ub300\ud55c \ucc38\uc5ec\ub97c \uc7a5\ub824\ud569\ub2c8\ub2e4. '\uccad\uc18c\ub144\ud3b8\uc9d1\uc790\ub300\ud68c'\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc628\ub77c\uc778 \ud50c\ub7ab\ud3fc","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub458\uc9f8\ub85c, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\ub4e4\uc5d0\uac8c \uae0d\uc815\uc801\uc778 \uc790\uc544 \ud615\uc131\uc744 \ub3c4\uc6b8 \uc218 \uc788\ub294 \ud50c\ub7ab\ud3fc\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4. '\ubbf8\uad6d\uc2ec\ub9ac\ud559\ud68c'\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uccad\uc18c\ub144\ub4e4\uc774 \uc790","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\ub610\ub798 \uc555\ub825 \ubb38\uc81c\ub294 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0\uc11c\uc758 \uae0d\uc815\uc801 \uad00\uacc4 \uad6c\ucd95\uc744 \ud1b5\ud574 \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \uccad\uc18c\ub144\uc758 \uc18c\uc15c \ubbf8\ub514\uc5b4 \uc0ac\uc6a9\uc740 \ub514\uc9c0\ud138 \uae30\uc220\uc758 \uc219\ub828\ub3c4\ub97c \ud5a5\uc0c1\uc2dc\ud0a4\ub294 \ub370 \uae30\uc5ec\ud569\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\ub458\uc9f8, \uccad\uc18c\ub144\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uac10\uc815\uc801 \uc9c0\uc6d0\uc744 \ubc1b\uc744 \uc218 \uc788\uc73c\uba70, \uc774\ub294 \uc6b0\uc6b8\uc99d\uc774\ub098 \ubd88\uc548 \uac19\uc740 \uc815\uc2e0\uc801 \ubb38\uc81c\ub97c \uc644\ud654\ud558\ub294 \ub370 \ub3c4\uc6c0\uc744 \uc904 \uc218 \uc788\uc2b5\ub2c8","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uad50\uc721\uc801 \uc790\uc6d0\uc73c\ub85c \ud65c\uc6a9\ub429\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uc2ec\ub9ac\uc801 \uc9c0\uc6d0\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \ud559\uc2b5 \ub3c4\uad6c\ub85c\uc11c \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc99d\uc9c4\uc2dc\ud0b5\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc5d0\uac8c \ud544\uc218\uc801\uc778 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uacfc \uc815\uccb4\uc131 \ud655\ub9bd\uc758 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4; \ubbf8\uad6d\uccad\uc18c\ub144\uc5f0\uad6c\uc18c(National Institute of A","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc5d0\uac8c \uc815\uc2e0 \uac74\uac15 \uad00\ub828 \uc790\uc6d0\uc744 \ud0d0\uc0c9\ud560 \uc218 \uc788\ub294 \uacbd\ub85c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4; \ub9c8\uc74c\uac74\uac15\uc5f0\uad6c\uc18c(Institute for Mind Health","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc5f0\ub300\uc640 \ucc38\uc5ec\ub97c \uc99d\uac00\uc2dc\ud0b5\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\ub458\uc9f8, \uc628\ub77c\uc778 \ud50c\ub7ab\ud3fc\uc740 \uccad\uc18c\ub144\uc758 \ucc3d\uc758\uc801 \ud45c\ud604\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uad50\uc721 \ubc0f \uc815\ubcf4 \uc811\uadfc\uc131\uc744 \uc99d\uc9c4\ud569\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc5d0\uac8c \ub514\uc9c0\ud138 \uae30\uc220 \uc5ed\ub7c9\uc744 \ud0a4\uc6b8 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e\uccad\uc18c\ub144\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\uc5d0\uc11c \ub610\ub798\ub4e4\uacfc\uc758 \uc0c1\ud638\uc791\uc6a9\uc744 \ud1b5\ud574 \uae0d\uc815\uc801\uc778 \uc0ac\ud68c\uc801 \uad00\uacc4\ub97c \ud615\uc131\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\uac00 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \ud559\uc2b5\uc744 \uc9c0\uc6d0\ud55c\ub2e4\ub294 \uc810\uc740 \ubd84\uba85\ud569\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc790\uc2e0\uc744 \ud45c\ud604\ud558\ub294 \ub370 \ud544\uc694\ud55c \uae30\ud68c\ub97c \ubc15\ud0c8\ud558\uc9c0 \uc54a\ub294 \uac83\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uacfc \uc9c0\uc6d0\uc758 \ud50c\ub7ab\ud3fc\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4. '\ud2f4\uc2a4\ud3ec\ub7fc(TeensForRum)'\uc774\ub77c\ub294 \ubbf8\uc131\ub144\uc790 \uad8c\uc775 \ubcf4\ud638 \ub2e8\uccb4\ub294 \uccad\uc18c\ub144\ub4e4\uc774 \uc18c\uc15c \ubbf8","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc774 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uc720\uc9c0\ud560 \uc218 \uc788\ub3c4\ub85d \ub3c4\uc640\uc90d\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uc99d\uc9c4\uc2dc\ud0a4\ub294 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 1\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc815\uc2e0 \uac74\uac15\uc5d0 \uae0d\uc815\uc801 \uc601\ud5a5\uc744 \ubbf8\uce60 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc815\uc11c\uc801 \uc9c0\uc6d0\uc744 \uc704\ud55c \ud50c\ub7ab\ud3fc\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\ub9ce\uc740 \ubbf8\uc131\ub144\uc790\ub4e4\uc774 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uc720\uc9c0\ud558\uace0 \ubc1c\uc804\uc2dc\ud0ac \uc218 \uc788\uc2b5\ub2c8\ub2e4; \ud398\uc774\uc2a4\ubd81(Facebook)\uc740 \uccad\uc18c\ub144\ub4e4\uc774 \ud50c\ub7ab\ud3fc\uc744 \uc0ac\uc6a9\ud574 \uc804 ","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uccab\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \ucc3d\uc758\uc131\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 3\u003cbr\u003e\uc14b\uc9f8, \uccad\uc18c\ub144\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uac15\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc5f0\uacb0\uc131\uacfc \ucc38\uc5ec\ub97c \uc99d\uc9c4\uc2dc\ud0b5\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\uc9c0\uc5ed \uc0ac\ud68c\uc758 \ucc38\uc5ec\uc640 \uc9c0\uc6d0\uc740 \uccad\uc18c\ub144\uc758 \ub514\uc9c0\ud138 \uc0ac\uc6a9\uc744 \uae0d\uc815\uc801\uc73c\ub85c \uc774\ub04c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\ub458\uc9f8, \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc99d\uc9c4\uc2dc\ud0b5\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 2\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacb0\uc744 \uc9c0\uc6d0\ud569\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Pt 1\u003cbr\u003e\uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \uccad\uc18c\ub144\uc758 \uc0ac\ud68c\uc801 \uc5f0\uacc4\ub97c \uc9c0\uc6d0\ud558\ub294 \uc911\uc694\ud55c \ud50c\ub7ab\ud3fc\uc785\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\ub610\ud55c, \uccad\uc18c\ub144\ub4e4\uc740 \uc18c\uc15c \ubbf8\ub514\uc5b4\ub97c \ud1b5\ud574 \uc9c4\ub85c \ud0d0\uc0c9\uacfc \uac19\uc740 \uae0d\uc815\uc801\uc778 \uacbd\ud5d8\uc744 \uc313\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uac10\uc815\uc801 \uc9c0\uc9c0 \ub124\ud2b8\uc6cc\ud06c\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 2\u003cbr\u003e(2) \uc18c\uc15c \ubbf8\ub514\uc5b4\ub294 \ub610\ud55c \uccad\uc18c\ub144\uc5d0\uac8c \uae0d\u urn 3  Pt 2\u003cbr\u003e\ud6a8\uacfc\uc801\uc778 \ubcf4\uc548 \uc870\uce58\ub294 \uad6d\uac00 \uac04\uc758 \ud611\ub825\uc744 \ud1b5\ud55c \uae00\ub85c\ubc8c \uc2a4\ud0e0\ub2e4\ub4dc \uc124\uc815\uc73c\ub85c \uac00\ub2a5\ud569\ub2c8\ub2e4","\u003cb\u003e\ubcf4\uc548 \uae30\ub2a5 \ubc0f \uc0ac\uc6a9\uc790 \ubcf4\ud638\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ud50c\ub7ab\ud3fc\uc740 \uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud574 \ub354 \ub098\uc740 \uc548\uc804 \uc870\uce58\ub97c \uc2dc\ud589\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubcf4\uc548 \uae30\ub2a5 \ubc0f \uc0ac\uc6a9\uc790 \ubcf4\ud638\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\ub458\uc9f8, \ud50c\ub7ab\ud3fc\uc740 \ub354\uc6b1 \uc0ac\uc6a9\uc790 \uce5c\ud654\uc801\uc774\uace0 \uc811\uadfc \uac00\ub2a5\ud55c \ubcf4\ud638 \uae30\ub2a5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ubcf4\uc548 \uae30\ub2a5 \ubc0f \uc0ac\uc6a9\uc790 \ubcf4\ud638\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 3\u003cbr\u003e\uc14b\uc9f8, \uc2e4\uc9c8\uc801\uc778 \ud53c\ud574\ub97c \ubc29\uc9c0\ud558\uae30 \uc704\ud55c \ubc95\uc801 \uc870\uce58\ub97c \uac15\ud654\ud558\ub294 \uac83\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ubcf4\uc548 \uae30\ub2a5 \ubc0f \uc0ac\uc6a9\uc790 \ubcf4\ud638\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u003cbr\u003e\uae30\uc220\uc801\uc778 \ubcf4\ud638 \uc218\ub2e8\uc758 \uac15\ud654\ub97c \ud1b5\ud574 \uc704\ud5d8\uc744 \uc904\uc77c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubcf4\uc548 \uae30\ub2a5 \ubc0f \uc0ac\uc6a9\uc790 \ubcf4\ud638\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Pt 3\u003cbr\u003e\uc815\ubd80\uc640 \uae30\uc5c5 \uac04\uc758 \ud611\ub825\uc744 \ud1b5\ud574 \ud50c\ub7ab\ud3fc \uc790\uccb4\uc5d0\uc11c \uc548\uc804\ud55c \ud658\uacbd\uc744 \uc870\uc131\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ubcf4\uc548 \uae30\ub2a5 \ubc0f \uc0ac\uc6a9\uc790 \ubcf4\ud638\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Pt 2\u00
