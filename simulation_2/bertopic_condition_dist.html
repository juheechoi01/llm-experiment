uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\ube44\ub85d \uc724\ub9ac\uc801 \uad00\uc810\uc5d0\uc11c \ub17c\ub780\uc758 \uc5ec\uc9c0\uac00 \uc788\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uc804\uacfc \uc9c8\ubcd1 \uce58\ub8cc\uc5d0 \uae30\uc5ec\ud568\uc73c\ub85c\uc368 \uc778\ub958 \uc804\uccb4\uc758 \ubcf5\uc9c0\ub97c \uc99d\uc9c4\uc2dc\ud0a4\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub3c4 \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \ubaa8\ubc29\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\ud604\ub300\uc758 \uacfc\ud559 \uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc778\uacf5 \uc7a5\uae30\ub098 \uc138\ud3ec \uae30\ubc18 \uc2e4\ud5d8\uc740 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc7ac\ud604\ud558\uae30\uc5d0 \uc544\uc9c1 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\uacfc\ud559\uc801 \uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \uc9c4\ubcf4\uc640 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ub3d9\uc2dc\uc5d0 \ucda9\uc871\uc2dc\ud0a4\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \ud568\uaed8 \ubc1c\uc804\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\uae30\uc220 \ubc1c\uc804\ub9cc\uc73c\ub85c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\ud604\uc7ac \uae30\uc874 \uae30\uc220\ub85c\ub294 \ub3d9\ubb3c\uacfc \uac19\uc740 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\ub3d9\ubb3c \uc5f0\uad6c\ub294 \uc544\uc9c1 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \ubc29\ubc95\uc758 \ud558\ub098\ub85c \uc790\ub9ac \uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \uae30\uc900\uc810 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc0c1\ud638\ubcf4\uc644\uc801\uc73c\ub85c \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\ub2e4\ubc29\uba74\uc73c\ub85c \uc0ac\uc6a9 \uac00\ub2a5\ud55c \ub300\uccb4 \ubc29\ubc95\uc758 \uc815\ud655\uc131\uacfc \ud3ec\uad04\uc131\uc740 \uc5ec\uc804\ud788 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\uadf8\ub7ec\ub098 \ud604 \uc2dc\uc810\uc5d0\uc11c \ub300\uccb4 \ubc29\ubc95\ub9cc\uc73c\ub85c \uc804\ud658\ud558\ub294 \uac83\uc740 \uc5f0\uad6c\uc758 \uc815\ud655\uc131\uacfc \uc548\uc804\uc131\uc744 \ub2f4\ubcf4\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTu c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85 \ubcf4\ud638\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\uba85\uc758 \uc911\uc694\ud55c \ubcf4\ud638 \uc7a5\uce58\ub85c\uc11c \uae30\ub2a5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uc774\uc758 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uae34\uae09\ud55c \uce58\ub8cc \ud544\uc694\uc5d0 \ub300\ud55c \uc989\uac01\uc801\uc778 \ud574\uacb0\ucc45\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1\uc758 \uc0dd\ub9ac\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud55c \uae30\ucd08 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \uc644\uc804\ud788 \uc790\ub9ac\uc7a1\uae30\uae4c\uc9c0 \uc0c1\ub2f9\ud55c \uc2dc\uac04\uc774 \uc18c\uc694\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc678\ubd80 \uc790\uadf9\uc5d0 \ub300\ud55c \ub2e4\uc591\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ud1b5\ud569\ud558\uc5ec \uad00\ucc30\ud560 \uc218 \uc788\uac8c \ud574\uc90d\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uc720\ud6a8\uc131\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uc911\uc694\ud55c \uce58\ub8cc\ubc95\uacfc \uc57d\ubb3c\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uae34\uae09\ud558\uace0 \uc911\ub300\ud55c \uc9c8\ubcd1 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0\uc11c \ube60\ub978 \uacb0\uc815\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uacac\uacfc \uc758\ub8cc \ud601\uc2e0\uc744 \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0\ub3c4 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc0dd\uba85 \uacfc\ud559 \uc804\ubc18\uc5d0 \uac78\uccd0 \uc911\uc694\ud55c \uacfc\ud559\uc801 \uc9c0\uc2dd\uc774 \ucd95\uc801\ub429\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \uac1c\ubc1c \uc18d\ub3c4\ub97c \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \ubaa8\ub4e0 \ubd84\uc57c\uc5d0\uc11c \uc2e4\ud6a8\uc131\uc744 \uac16\ucd94\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub458\uc9f8, \uae30\uc220\uacfc \ubc29\ubc95\uc758 \uac1c\ubc1c\uc774 \uacc4\uc18d\ub418\ub294 \uac00\uc6b4\ub370, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \ub300\uccb4\ubc95\uc774 \ud655\ubcf4\ub418\uae30 \uc804\uae4c\uc9c0\ub294 \uc911\ub2e8\ud560 \uc218 \uc5c6\ub294 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4 \uc801\uc6a9 \uc5f0\uad6c\uc758 \uc704\ud5d8\uc744 \ucd5c\uc18c\ud654\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ucc28\uc774\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \ub2e8\uc11c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc778 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \uc544\uc9c1\ub3c4 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\ub294 \uacb0\uacfc\ub294 \uc9c1\uc811\uc801\uc778 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \ud61c\ud0dd\uc73c\ub85c \uc5f0\uacb0\ub429\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc9c0\uc591\ud558\ub824\ub294 \ub178\ub825\uac 5d8\uc740 \uc9c4\ubcf4\uc801\uc778 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc14b\uc9f8, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc644\uc804\ud55c \ubc29\ubc95\uc774 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uce58\ub8cc\ubc95\uc758 \ubd80\uc791\uc6a9\uc744 \ubbf8\ub9ac \uc2dd\ubcc4\ud558\uace0 \uad00\ub9ac\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\uc14b\uc9f8, \uacfc\ud559\uc801 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc810\uc9c4\uc801\uc73c\ub85c \ub300\uccb4\ud558\ub824\ub294 \ubc29\ud5a5\uc73c\ub85c \uc9c4\ud654\ud558\uace0 \uc788\uc73c\ub098, \uc544\uc9c1 \uc2e4\ud6a8\uc801 \ub300\uccb4\ubc95\uc774 \uc644\uc804\ud788 \ud655\ubcf4\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \ubaa8\ub378\uc740 \ud2b9\uc815 \uc9c8\ud658\uc758 \ubcd1\ub9ac\ud559\uc801 \uae30\uc804\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc6b0\ub9ac\uac00 \uc5bb\uc740 \uc758\ub8cc\uc801 \uc774\uc810\uc740 \uc218\ub9ce\uc740 \uc778\uba85\uad6c\uc870\ub85c \uc774\uc5b4\uc84c\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \ubcd1\ud589\uc740 \uc11c\ub85c\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud558\uace0 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc624\ub79c \uae30\uac04 \uac80\uc99d\ub41c \ub3d9\ubb3c \uc2e4\ud5d8 \uacb0\uacfc\ub294 \uc758\ud559 \ubc1c\uc804\uc758 \uc911\uc694\ud55c \uacc4\uae30\uac00 \ub418\uc5b4 \uc654\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc2e4\ud5d8 \uc870\uac74\uacfc \uc815\ud655\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\uc14b\uc9f8, \uaddc\uc81c\uc640 \uac10\ub3c5\uc744 \ud1b5\ud574 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc758\uc874\uc744 \uc904\uc774\uae30 \uc704\ud55c \uae00\ub85c\ubc8c \ubc0f \uacfc\ud559\uacc4\uc758 \ub178\ub825\uc774 \uc9c0\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc2e4\ud5d8 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\ub2ec\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc14b\uc9f8, \uacfc\ud559\uc801 \uc9c4\ubcf4\uc5d0 \uae30\uc5ec\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \uc644\uc804\ud55c \ub300\uc548\uc774 \ub418\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c \ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \uc758\uc874\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95\uc774 \ube60\ub974\uac8c \uc2dc\uc7a5\uc5d0 \ub098\uc62c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\uc14b\uc9f8, \ud604\uc2e4\uc801\uc778 \ub300\uc548\uc774 \ubd80\uc871\ud55c \uc0c1\ud0dc\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uac00\uc7a5 \ubbff\uc744 \uc218 \uc788\ub294 \uc5f0\uad6c \ubc29\ubc95\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\ub300\uc548\uc774 \uc544\uc9c1 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucda9\ubd84\ud55c \uc2e0\ub8b0\uc131\uc744 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc6b0\ub9ac\ub294 \uc778\uac04\uc758 \uac74\uac15\uc744 \ud5a5\uc0c1\uc2dc\ud0a4\ub294 \ub370 \uc911\uc694\ud55c \ubc1c\uacac\uc744 \ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uacfc \ud65c\uc6a9\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ubcd1\ud589\ud574\uc11c \uc9c4\ud589\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \ubaa8\ub378\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub9ce\uc740 \uc8fc\uc694 \uc758\ud559\uc801 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc5f0\uad6c\ub97c \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc84c\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\uc14b\uc9f8, \uc778\ub958\uc758 \uc9c8\ubcd1 \uce58\ub8cc\ub294 \ud604\uc7ac\uae4c\uc9c0 \ub9ce\uc740 \ubd80\ubd84 \ub3d9\ubb3c \uc5f0\uad6c\uc5d0 \uc758\uc874\ud574 \uc654\uace0, \uadf8 \uacfc\uc815\uc5d0\uc11c \ucd95\uc801\ub41c \ub370\uc774\u int 1\u003cbr\u003e\ub300\uccb4 \uae30\uc220\ub4e4\uc774 \ube60\ub974\uac8c \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc0dd\ub9ac\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc7ac\ud604\ud558\uae30\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub300\uccb4 \uae30\uc220\uc774 \ud604\uc7ac\ub85c\uc120 \ubaa8\ub4e0 \uc5f0\uad6c\ub97c \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\ub300\uccb4 \uae30\uc220\uc740 \ud604\uc7ac \uc5f0\uad6c\uc758 \ubaa8\ub4e0 \uc601\uc5ed\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc73c\uba70, \ud2b9\ud788 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uacfc \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\ub294 \ub370\uc5d0\ub294 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \uc81c\ud55c\uc810\uc740 \uc5ec\uc804\ud788 \uc874\uc7ac\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc5f0\uad6c\uc758 \ud55c\uacc4\ub97c \uc80 uc778\uc815\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \ud604\uc7ac \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \uad6c\uc870\ub97c \uc644\uc804\ud788 \uc7ac\ud604\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \ubd80\uc871\ud558\uae30 \ub54c\ubb38\uc774\ub77c\uace0 \ubcf4\uace0\ud569\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc9c4\ud589 \uacfc\uc815\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 1\u003cbr\u003e\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc774\ub77c\ub294 \uc810\uc774 \uc911\uc694\ud569\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\ub3d9\ubb3c \ubaa8\ub378\uc740 \ud604\uc7ac \uc778\uac04 \uc9c8\ud658\uc758 \ubcf5\uc7a1\uc131\uc744 \uc5f0\uad6c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc815\ud655\uc131\uc744 \ub192\uc774\ub294 \uc911\uc694\ud55c \uc694\uc18c\ub85c \ubb34\uc2dc\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\ud658\uc790 \uc774\uc775 \uc99d\uc9c4\uc740 \uc724\ub9ac\uc801 \uc0b6\uacfc \uc0dd\uba85\uc758 \uc874\uc911\uc744 \ud3ec\ud568\ud569\ub2c8\ub2e4","\u003cb\u003eNoise (\ubbf8\ubd84\ub958)\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\uccab \ubc88\uc9f8\ub85c, \ub300\uccb4 \ubc29\ubc95\uc774 \uc9c4\ubcf4\ud558\uc600\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \uacfc\ud559\uc801 \ud0c0\ub2f9\uc131\uc744 \ubcf4\uc99 u003cbr\u003e\uc2e4\ud5d8 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \uac1c\uc120\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4. '\uc601\uad6d \uc5f0\uad6c \ucc38\uc870\uadf8\ub8f9'(UK Research Reference Group)\uc740 \ub3d9\ubb3c \ubcf5\uc9c0 \uae30\uc900\uc744 \uc5c4\uaca9\ud788 \uc900\uc218\ud558\uba74\uc11c\ub3c4 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \ucd09\uc9c4\ud558\uae30 \uc704\ud55c \ubc29\uc548\uc744 \ub9c8\ub828\ud558\uace0 \uc788\uc73c\uba70, \uc774\ub294 \uc724\ub9ac\uc801\uc778 \uc2dc\ud5d8 \ud658\uacbd\uc744 \uad6c\ucd95\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8 \uc724\ub9ac \uad00\ub9ac \uac15\ud654\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\uc6b0\uc120, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud55c \uacbd\uc6b0\uc5d0\ub3c4 \ucd5c\ub300\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud574\uc57c \ud55c\ub2e4\ub294 \ub178\ub825\uc740 \uba85\ud655\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8 \uc724\ub9ac \uad00\ub9ac \uac15\ud654\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\ub9c8\uc9c0\ub9c9\uc73c\ub85c, \uc9c0\uc18d\uc801\uc778 \uc724\ub9ac\uc801 \ub17c\uc758\uc640 \uae30\uc900 \uac15\ud654\ub294 \uacc4\uc18d \uc720\uc9c0\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8 \uc724\ub9ac \uad00\ub9ac \uac15\ud654\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc704\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uac15\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8 \uc724\ub9ac \uad00\ub9ac \uac15\ud654\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uaddc\uc81c\ub97c \ud1b5\ud574 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud569\ub2c8\ub2e4"," 2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\ub300\uc548\uc801 \ubc29\ubc95\ub4e4\uc774 \uc544\uc9c1 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4; \uc601\uad6d\uc758 \ubbf8\uc0dd\ubb3c\ud559\ud68c(Microbiology Society)\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud604\uc7ac\ub85c\uc11c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc5f0\uad6c\ud558\uae30\uc5d0 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95 \uc911 \ud558\ub098\ub77c\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\ub300\uc548\uc801 \ubc29\ubc95\uc774 \uc99d\uac00\ud558\uace0 \uc788\uc9c0\ub9cc \uc544\uc9c1 \ubd88\ucda9\ubd84\ud569\ub2c8\ub2e4; \ubbf8\uad6d \ubc14\uc774\uc624\uc0b0\uc5c5\ud611\ud68c(Biotechnology Innovation Organization)\ub294 \ub300\uc548\uc801 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc774 \uc874\uc7ac\ud558\uc9c0\ub9cc, \ud2b9\uc815 \uc0dd\ub9ac\uc801 \ubc18\uc751 \uc5f0\uad6c\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc9c0\uc801\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\ud601\uc2e0\uc801\uc778 \ub300\uc548 \uac1c\ubc1c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud604\uc7a5\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4; \ubbf8\uad6d \uc554 \uc5f0\uad6c \ud611\ud68c(American Association for Cancer Research)\ub294 \ub3d9\ubb3c \uc2e4\ud5d8 \ub370\uc774\ud130\uac00 \uc2e0\uc57d \uac1c\ubc1c \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc5ed\ud560\uc744 \ud55c\ub2e4\uace0 \ubcf4\uace0\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ub300\uc548\uc801 \ubc29\ubc95\uc5d0 \ub300\ud55c \ud1b5\ucc30\uc744 \uc5bb\uc2b5\ub2c8\ub2e4; \ub9c9\uc2a4 \ud50c\ub791\ud06c \uc5f0\uad6c\uc18c(Max Planck Institute)\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \uc9c0\uc2dd\uc744 \ubc14\ud0d5\uc73c\ub85c \ub300\uc548\uc801 \uc2e4\ud5d8 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \uae30\uc5ec\ud558\uace0 \uc788\uc74c\uc744 \uac15\uc870\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \ub300\uaddc\ubaa8 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\uc778\uacf5\uc9c0\ub2a5 \uc2dc\ubbac\ub808\uc774\uc158\uc774\ub098 \uc138\ud3ec \ubc30\uc591\uacfc \uac19\uc740 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacc4\uc18d\ud574\uc11c \uc0c8\ub85c\uc6b4 \ub300\uc548\uc744 \ubaa8\uc0c9\ud558\uba70 \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\ub300\uc548\uc801 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \ub9ce\uc740 \uac00\ub2a5\uc131\uc744 \uc81c\uc2dc\ud558\uc9c0\ub9cc, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5ec\uc804\ud788 \ud544\uc694 \ubd88\uac00\uacb0\ud55c \ub2e8\uacc4\uc784\uc744 \ubcf4\uc5ec\uc90d\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\ub294 \uc790\ub8cc\ub294 \uadf8\ub807\uc9c0 \uc54a\uc73c\uba74 \ubd88\uac00\ub2a5\ud55c \ubc1c\uacac\ub4e4\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub354\ubd88\uc5b4, \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \uc5f0\uad6c\ud558\ub294 \uacfc\uc815 \uc790\uccb4\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \uc5bb\uc5b4\uc9c4 \ub370\uc774\ud130\uc5d0 \uc758\uc874\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc5f0\uad6c \uc218\ub2e8\uc785\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud558\ub824\ub294 \uc5f0\uad6c\uc640 \ub178\ub825\uc774 \uc9c4\ud589 \uc911\uc774\uc9c0\ub9cc, \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc5c6\uc2b5\ub2c8\ub2e4"],"x":[8.3701171875,9.199675559997559,9.699124336242676,8.224091529846191,8.55921459197998,9.001673698425293,7.773741722106934,9.64702320098877,9.910738945007324,8.947564125061035,9.283578872680664,9.752126693725586,7.709547996520996,9.29832935333252,9.043577194213867,9.473248481750488,9.608846664428711,7.613633632659912,9.517921447753906,8.069026947021484,10.192038536071777,8.476284980773926,9.616461753845215,8.920980453491211,7.920872688293457,10.38701343536377,8.165828704833984,8.18012809753418,8.959054946899414,10.489562034606934,9.183353424072266,9.761909484863281,9.920703887939453,9.451762199401855,9.228257179260254,10.450603485107422,7.857650279 c608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\ub2e4\uba74 \uc5f0\uad6c \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc911\uc694\ud55c \uc548\uc804\uc131\uacfc \ud6a8\ub2a5 \uc2dc\ud5d8\uc774 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\uc9c8\ubcd1 \ud1f4\uce58\ub97c \uc704\ud55c \uc2e4\uc9c8\uc801\uc778 \uc9c4\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc838 \uc654\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \ub300\uc0c1 \uc2e4\ud5d8 \uc804\uc5d0 \uc704\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\uc2e0\uc57d \uac1c\ubc1c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \uac80\uc99d\ud558\uae30 \uc704\ud574\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uce58\ub8cc\ubc95\uc758 \ubc1c\uacac\uc744 \uac00\uc18d\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uc9c8\ubcd1 \uc774\ud574\ub97c \ud655\ub300\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc784\uc0c1 \uc2dc\ud5d8 \uc804\uc5d0 \uc57d\ubb3c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \ud655\uc2e4\ud558\uac8c \ud655\uc778\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc758\uc57d \uc5f0\uad6c\uc5d0 \uc911\ucd94\uc801\uc778 \uc5ed\ud560\uc744 \uc218\ud589\ud558\uba70, \ub9ce\uc740 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub113\ud788\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1\uae4c\uc9c0 \ub300\uccb4 \uae30\ubc95\ub4e4\uc774 \ud574\uacb0\ud560 \uc218 \uc5c6\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc911\ub2e8\ud558\uba74 \uc5f0\uad6c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uc728\uc131\uc744 \ubcf4\uc7a5\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc57d\ubb3c\uacfc \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub354\ubd88\uc5b4, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ud601\uc2e0\uc801\uc778 \uce58\ub8cc\ubc95\uc774 \uac1c\ubc1c\ub418\uc5c8\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\uc131\uc740 \ub9ce\uc740 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uc788\uc73c\uba70, \uc774\ub7ec\ud55c \uc5f0\uad6c\ub294 \ud658\uc790\ub4e4\uc5d0\uac8c \uc2e4\uc9c8\uc801\uc778 \uce58\ub8cc \uae30\ud68c\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uac00 \uc9c1\uba74\ud55c \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub192\uc774\ub294 \ub370 \uacb0\uc815\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \ub9cc\ud55c \ub300\uc548\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc558\uc73c\uba70, \uc774\ub7ec\ud55c \uc5f0\uad6c \uc5c6\uc774\ub294 \uce58\ub8cc\ubc95\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc\uc131\uc5d0 \ub300\ud55c \uc815\ubc00\ud55c \ud3c9\uac00\uac00 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub610\ud55c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9ce\uc740 \uc9c8\ubcd1\uc758 \uc9c4\ud589 \ubc0f \uce58\ub8cc\uc5d0 \ub300\ud574 \uc2ec\ub3c4 \uc788\ub294 \uc774\ud574\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc73c\uba74, \uc778\uac04\uc5d0\uac8c \uc9c1\uc811\uc801\uc778 \uc704\ud5d8\uc744 \uc218\ubc18\ud558\ub294 \uc2e4\ud5d8 \ub2e8\uacc4\ub97c \ub2e8\ucd95\ud560 \uc218 \uc5c6\uac8c \ub429\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud558\uc5ec \uc5bb\uc5b4\ub0b8 \uacb0\uacfc\ub294 \uc6b0\ub9ac\uc5d0\uac8c \uce58\ub8cc\uc81c\uac00 \ub420 \uac00\ub2a5\uc131 \uc788\ub294 \ubb3c\uc9c8\uc744 \uc2e0\uc18d\ud558\uac8c \uc2dd\ubcc4\ud558\ub294 \ub370 \ub3c4\uc6c0\uc744 \uc90d\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc548\uc804\uc131 \uac80\uc0ac\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uadc0\uc911\ud55c \uc0dd\ubb3c\ud559\uc801 \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d \uac1c\ubc1c\uc758 \uae30\ubcf8\uc801\uc778 \ub2e8\uacc4\ub85c, \uc548\uc804\uc131\uacfc \ud6a8\uacfc\ub97c \uac80\uc99d\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub610\ud55c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc548\uc804\uc131 \ubc0f \ud6a8\uacfc \uac80\uc99d\uc744 \uc704\ud55c \ucd5c\uc120\uc758 \ubc29\ubc95\uc785\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\uc778\uac04\uc758 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc774\ud574\ud558\ub294 \ub370 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uac00\uc7a5 \uc720\uc6a9\ud55c \ubc29\ubc95\uc73c\ub85c \ud65c\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 1\u003cbr\u003e\uba3c\uc800, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc608\uce21 \ubd88\uac00\ud55c \uc778\uac04 \uc2dc\ud5d8\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4. '\uc874\uc2a4 \ud649\ud0a8\uc2a4 \uc758\uacfc\ub300\ud559'(Johns Hopkins University School of Medicine)\ub3c4 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc911\uc694\uc131\uc744 \uac15\uc870\ud558\uba70, \uc774\ub294 \uc784\uc0c1\uc2dc\ud5d8 \ub2e8\uacc4 \uc774\uc804\uc5d0 \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \uc704\ud5d8\uc744 \uc0ac\uc804\uc5d0 \ud0d0\uc9c0\ud558\uc5ec \uc778\uac04 \ub300\uc0c1 \uc2e4\ud5d8\uc758 \uc548\uc804\uc744 \ub2f4\ubcf4\ud558\ub294 \ub370 \ubc18\ub4dc\uc2dc \ud544\uc694\ud558\ub2e4\uace0 \uc5b8\uae09\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uac10\ucd95\uc744 \uc9c0\ud5a5\ud558\uba74\uc11c\ub3c4 \ud6a8\uacfc\uc801\uc778 \uce58\ub8cc\uc81c\ub97c \ubc1c\uacac\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud569\ub2c8\ub2e4. '\ud30c\ub9c8\uc2dc\uc544 \ucf54\ud37c\ub808\uc774\uc158'(Pharmacia Corporation)\uc740 \uc724\ub9ac\uc801\uc778 \uc2e4\ud5d8 \uae30\uc900\uc744 \uac15\ud654\ud558\uace0 \uc788\uc73c\uba70, \uac00\ub2a5\ud55c \uacbd\uc6b0 \ub300\uccb4 \ubc29\ubc95\uc744 \ubaa8\uc0c9\ud558\uc9c0\ub9cc, \ub9ce\uc740 \uacbd\uc6b0\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uac00\uc7a5 \uc720\ud6a8\ud55c \ubc29\ubc95\uc774\ub77c\uace0 \ubcf4\uace0\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc5f0\uad6c\ud560 \ub54c \ub3d9\ubb3c \ubaa8\ub378\uc774 \uac00\uc7a5 \uc801\uc808\ud55c \ubc29\uc2dd\uc785\ub2c8\ub2e4. '\ubbf8\uad6d \uc2dd\ud488\uc758\uc57d\uad6d'(FDA)\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\uc81c\uc758 \uc548\uc804\uc131\uacfc \ud6a8\uacfc \uac80\uc99d\uc744 \uc704\ud55c \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud55c \uba87\uba87 \uc774\uc720 \uc911 \ud558\ub098\ub85c \uae30\uc220\uc758 \ud55c\uacc4\ub97c \uba85\ud655\ud788 \uc5b8\uae09\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 1\u003cbr\u003e\uba3c\uc800, \uc778\ub958\uc758 \uac74\uac15\uc744 \uac1c\uc120\ud560 \uc218 \uc788\ub294 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc778 \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc784\uc0c1 \uc2dc\ud5d8 \uc774\uc804 \ub2e8\uacc4\uc758 \uc911\uc694\ud55c \ ub192\uc785\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\ud604 \ub2e8\uacc4\uc5d0\uc11c\ub294 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1\uc758 \ub2e4\ucc28\uc6d0\uc801 \uc5ed\ud559\uc744 \uc5f0\uad6c\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubd88\uac00\uacb0\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\uc624\ub79c \uc2dc\uac04\uc5d0 \uac78\uccd0 \uac80\uc99d\ub41c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\ub958\uc5d0 \uc2e4\uc9c8\uc801\uc778 \uce58\ub8cc\uc81c\ub97c \uc81c\uacf5\ud558\ub294 \uc911\ucd94\uc801 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \uc911\uc694\ud55c \uc608\ube44 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4. \"\uc601\uad6d \uc57d\ub9ac\ud559\ud68c(British Pharmacological Society)\"\ub294 \ub3d9\ubb3c \ubaa8\ub378\uc744 \ud1b5\ud574 \ucd08\uae30 \uc548\uc804 \ubc0f \uc57d\ubb3c \ub300\uc0ac \uc815\ubcf4\ub97c \ud655\ubcf4\ud568\uc73c\ub85c\uc368 \uc778\uac04 \uc784\uc0c1 \uc2dc\ud5d8\uc758 \uc704\ud5d8\uc744 \uc904\uc77c \uc218 \uc788\ub2e4\uace0 \uc9c4\uc220\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\ub9ce\uc740 \ud604\uc7ac\uc758 \uce58\ub8cc\ubc95\uc774 \ub3d9\ubb3c \uc2e4\ud5d8 \ub355\ubd84\uc5d0 \ubc1c\uacac\ub418\uc5c8\uc2b5\ub2c8\ub2e4. \"\uc554 \uc5f0\uad6c\uc18c(Cancer Research UK)\"\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc554\uc744 \ud3ec\ud568\ud55c \uce58\uba85\uc801 \uc9c8\ud658 \uce58\ub8cc\uc5d0 \ud544\uc218\uc801\uc778 \ub370\uc774\ud130 \uc81c\uacf5\uc6d0\uc774\ub77c\uace0 \uc124\uba85\ud558\uba70, \uc774\ub294 \ub9ce\uc740 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \ub370 \uae30\uc5ec\ud588\ub2e4\ub294 \uc810\uc744 \uac15\uc870\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud558\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4. \"\uc138\uacc4 \ubcf4\uac74 \uae30\uad6c(WHO)\"\ub294 \ud604\uc7ac\uc758 \uacfc\ud559 \uc218\uc900\uc5d0\uc11c\ub294 \ub3d9\ubb3c\uc758 \uc0dd\uccb4 \ub0b4 \ubc18\uc751\uc774 \uc778\uac04 \uc9c8\ubcd1\uc758 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\ub2e4\uace0 \ub9d0\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8 \ub355\ubd84\uc5d0 \uc778\uac04 \uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uc911\ub300\ud55c \uce58\ub8cc\ubc95\ub4e4\uc774 \uac1c\ubc1c\ub418\uc5c8\uc2b5\ub2c8\ub2e4. \"\uba54\uc774\uc694 \ud074\ub9ac\ub2c9(Mayo Clinic)\"\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc5c8\ub2e4\uba74 \ud604\uc7ac\uc758 \ub9ce\uc740 \uc758\ub8cc \ud601\uc2e0\uacfc \uce58\ub8cc \uc131\uacfc\uac00 \ubd88\uac00\ub2a5\ud588\uc744 \uac83\uc774\ub77c\uace0 \uc9c0\uc801\ud558\uba70, \uc774\ub294 \ub9ce\uc740 \ubaa9\uc228\uc744 \uad6c\ud558\ub294 \ub370 \uae30\uc5ec\ud588\ub2e4\uace0 \uc124\uba85\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\uc2e0\uc57d \uac1c\ubc1c\uc758 \uc18d\ub3c4\ub97c \uc904\uc774\uc9c0 \uc54a\uace0 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub97c \uc774\ub8e8\ub824\uba74 \uc810\uc9c4\uc801\uc778 \uc804\ud658\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\uc778\uac04 \uc0dd\uba85 \uad6c\ucd9c\uc758 \uac00\uc7a5 \ube60\ub978 \uae38\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc758\uc57d\ud488 \uac1c\ubc1c\uc785\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc9c8\ubcd1\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc5d0 \ub300\ud55c \uc774\ud574\ub97c \ub3d5\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774\ub294 \uc0c1\ub2f9\uc218\uc758 \uc911\uc694\ud55c \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc774 \uc9c0\uc5f0\ub429\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uac74\uac15\uc5d0 \uc9c1\uc811\uc801\uc778 \uae30\uc5ec\ub97c \ud569\ub2c8\ub2e4; \uc790\uc5f0\uacfc\ud559\uacc4\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub294 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc784\uc744 \uac15\uc870\ud558\ub294 \uac83\uc740 \ubbf8\uad6d \uad6d\ub9bd\ubcf4\uac74\uc6d0(National Institutes of Health)\uc785\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc704\ud5d8\uc744 \ucd5c\uc18c\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4; \ubbf8\uad6d \uc2dd\ud488\uc758\uc57d\uad6d(Food and Drug Administration)\uc740 \uc0c8\ub85c\uc6b4 \uc57d\ubb3c\uc758 \ud6a8\uacfc\uc640 \uc548\uc804\uc131\uc744 \uac80\uc99d\ud558\uae30 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud544\uc218 \ub2e8\uacc4\ub85c \uaddc\uc815\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uccb4\uc5d0 \ub300\ud55c \uc911\uc694\ud55c \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4; \uc138\uacc4\ubcf4\uac74\uae30\uad6c(World Health Organization)\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\uac00 \uc778\uac04 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0\uc11c \uc0dd\ubb3c\ud559\uc801 \uae30\ucd08 \uc774\ud574\ub97c \ub192\uc774\ub294 \ub370 \uc911\uc694\ud558\ub2e4\uace0 \uac15\uc870\ud569\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 1\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uc758\uc57d\ud488 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc778\ub958\ub294 \uc911\ub300\ud55c \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uce58\ub8cc\ubc95\uc744 \ubc1c\uacac\ud560 \uc218 \uc788\uc5c8\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\uc0dd\uba85\uc5d0 \uc911\ub300\ud55c \uc9c8\ubcd1 \uce58\ub8cc\uc81c\uac00 \uac00\ub2a5\ud574\uc9c0\ub3c4\ub85d \ub3d5\uc2b5\ub2c8\ub2e4","\u003cb\u003e\uc608\ube44 \ub370\uc774\ud130 \uc81c\uacf5\uc758 \uc911\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8 \uc5c6\uc774 \uac1c\ubc1c\ub41c \uc57d\ubb3c\uc758 \uacbd\uc6b0 \uc778\uac04\uc5d0\uc11c \uc608\uc0c1\uce58 \ubabb\ud55c \ubd80\uc791\uc6a9\uc774 \ub098\ud0c0\ub0a0 \uc704\ud5d8\uc774 \uc788\uc73c\uba70, \uc774\ub294 \uc778\uac04\uacfc \ub3d9\ubb3c \ubaa8\ub450\uc758 \uc548\uc804\uc744 \uc704\ud611\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \uc0dd\uba85\uc758 \uc874\uc18d\uc744 \uc704\ud55c \ud601\uc2e0\uc801 \uc5f0\uad6c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub458\uc9f8, \uc778\uccb4\uc5d0 \ub300\ud55c \uc815\ud655\ud55c \uc608\uce21\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \ub300\uc548 \uae30\uc220\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc81c\ud55c\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958 \uac74\uac15 \uac1c\uc120\uc758 \ud575\uc2ec\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \uc0dd\ubb3c\ud559\uc801 \ucc28\uc774\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \ubaa8\ub378\uc740 \uc5ec\uc804\ud788 \uae30\uc874 \ub300\uccb4 \ubc29\ubc95\ubcf4\ub2e4 \ub192\uc740 \uc2e0\ub8b0\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub458\uc9f8, \ube44\ub85d \ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc73c\ub098, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc8fc\ub294 \uc815\ud655\uc131\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \uc0dd\uba85 \uacf5\ud559 \ubd84\uc57c\uc758 \uc9c4\ubcf4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ud06c\uac8c \uc758\uc874\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ucca8\ub2e8 \uae30\uc220\uc774 \ud568\uaed8 \uc0ac\uc6a9\ub420 \ub54c \uc131\uacf5 \uac00\ub2a5\uc131\uc774 \ub192\uc544\uc9d1\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \ud1b5\ud574 \uc9c8\ubcd1\uc758 \uc9c4\ud589\uacfc \uce58\ub8cc \ubc18\uc751\uc744 \uc815\ud655\ud788 \ubaa8\uc0ac\ud558\ub294 \ub370 \uc720\uc6a9\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub458\uc9f8, \uc2e0\ub8b0\uc131 \uc788\ub294 \ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc774 \uc544\uc9c1 \uc644\uc804\ud558\uc9c0 \uc54a\ub2e4\ub294 \uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc720\uc77c\ud55c \uc2e4\uc6a9\uc801\uc778 \uc120\ud0dd\uc9c0\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub458\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\uac00 \uc874\uc7ac\ud558\uae30\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc548\uc804\uc131\uc744 \ud3c9\uac00\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub458\uc9f8\ub85c, \ub300\uccb4 \ubc29\ubc95\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \uc81c\ud55c\uc801\uc774\uba70 \ubaa8\ub4e0 \uacbd\uc6b0\uc5d0 \ud6a8\uacfc\uc801\uc774\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub458\uc9f8\ub85c, \ub9ce\uc740 \ud601\uc2e0\uc801\uc778 \uc5f0\uad6c\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \ubaa8\ub378\uc5d0 \uc758\uc874\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc744 \ub300\uc0c1\uc73c\ub85c \ud55c \uc784\uc0c1\uc2dc\ud5d8\uc758 \uc548\uc804\uc131\uc744 \ud655\ubcf4\ud558\ub294 \ub370 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uae09\ubcc0\ud558\ub294 \uc9c8\ubcd1\uc5d0 \ub300\ud55c \uc989\uac01\uc801\uc778 \ub300\uc751\uc5d0 \ud544\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uac1c\ubc1c\ub41c \uce58\ub8cc\ubc95\uc740 \uc218\ub9ce\uc740 \uc0dd\uba85\uc744 \uad6c\ud574\uc654\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub458\uc9f8, \ud604\uc7ac \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc644\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub458\uc9f8, \uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \uc989\uac01\uc801\uc778 \ub300\uccb4\ub294 \uc5b4\ub824\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub458\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4\ubc95 \ud55c\uacc4\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub458\uc9f8, \uc5f0\uad6c\uc758 \ubc29\ud5a5\uc131\uc744 \ubcc0\ud654\uc2dc\ud0a4\ub294 \ub3d9\uc548\uc5d0\ub3c4 \uc989\uac01\uc801\u r\u003eTurn 3  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \ubcd1\ud589 \uc5f0\uad6c\uac00 \ub354\uc6b1 \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \ud22c\uc790\uac00 \uc99d\uac00\ud558\uace0 \uc788\uc9c0\ub9cc, \uc644\uc804\ud55c \ub300\uccb4\uac00 \ub418\uae30\uae4c\uc9c0\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e4\uc9c8\uc801\uc778 \uac74\uac15 \uac1c\uc120\uacfc \uc0dd\uba85 \uc5f0\uc7a5\uc744 \uac00\ub2a5\ucf00 \ud588\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \uc81c\uac70\ud558\ub824\ub294 \uc2dc\ub3c4\ub294 \uc5f0\uad6c \uac1c\ubc1c\uc758 \uc18d\ub3c4\ub97c \ub2a6\ucd9c \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub300\uccb4 \uae30\uc220\uc774 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uc9c0 \ubabb\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \ucc3e\uae30 \uc704\ud55c \uc5f0\uad6c\uac00 \uc9c4\ud589\ub418\uace0 \uc788\ub294 \uac83\uc740 \uc0ac\uc2e4\uc774\ub098, \uc774\ub294 \uc5ec\uc804\ud788 \uc2dc\uac04\uc774 \uac78\ub9bd\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc774 \uc544\uc9c1 \uc644\uc804\ud788 \uc774\ub8e8\uc5b4\uc9c0\uc9c0 \uc54a\uc558\uae30\uc5d0 \ud544\uc218\uc801\uc778 \uc5f0\uad6c \uc218\ub2e8\uc73c\ub85c \uae30\ub2a5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \ubaa8\ub378\uc740 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1\uc758 \uc774\ud574\uc640 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\uc14b\uc9f8\ub85c, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\uc591\ud55c \uc9c0\ud45c\uc5d0\uc11c \uc911\uc694\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc57d \uac1c\ubc1c\uc758 \uc131\uacf5\ub960\uc744 \ub192\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc911\ub2e8\ud558\uba74 \uce58\ub8cc\ubc95 \uac1c\ubc1c \uc18d\ub3c4\uac00 \ud06c\uac8c \uc800\ud558\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\uc815 \uc9c8\ubcd1\uc758 \uc885\ud569\uc801\uc778 \uc774\ud574\ub97c \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \ud604\uc7ac\ub85c\uc11c\ub294 \ubd88\ucda9\ubd84\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5f0\uad6c \uacb0\uacfc\ub85c \uc774\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\uc14b\uc9f8, \uc5f0\uad6c\ub294 \uacc4\uc18d \uc9c4\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc758\ub8cc \ud601\uc2e0\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc5ec\ub7ec \uc911\uc694\ud55c \uc774\ud574\uad00\uacc4\uc790\ub4e4\uc5d0\uac8c \uc2e0\ub8b0\ubc1b\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\uc14b\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \ub3d9\uc2dc\uc5d0 \ubc1c\uc804\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc758 \ud544\uc694\uc131\u003c\u002fb\u003e\u003cbr 00\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc774 \ubaa8\ub4e0 \uacb0\uacfc\ub97c \ubcf4\uc7a5\ud560 \uc218 \uc5c6\ub294 \uacbd\uc6b0\uac00 \ub9ce\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc9c0\ub9cc, \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ubd80\ubd84\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub300\uccb4 \uae30\uc220\uc774 \uc874\uc7ac\ud55c\ub2e4\uace0 \ud574\ub3c4, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\ud07c\uc758 \ud3ec\uad04\uc801\uc778 \uac80\uc99d\uc744 \uc81c\uacf5\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\ub300\uccb4 \uae30\uc220\uc774 \uacc4\uc18d \ubc1c\uc804\ud558\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95\uc758 \ucd08\uae30 \ubc1c\uc804 \ub2e8\uacc4\uc5d0\uc11c \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \ubcf4\uc77c \uc218 \uc788\ub294 \ucd5c\uc801\uc758 \ubc29\ubc95\uc73c\ub85c \ub0a8\uc544 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc774 \uc810\uc9c4\uc801\uc73c\ub85c \uac1c\ubc1c\ub418\uace0\ub294 \uc788\uc9c0\ub9cc, \uc774\ub294 \uc544\uc9c1\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \uc774\ub974\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc774 \uae30\uc874\uc758 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc0ac\uc2e4\uc744 \uace0\ub824\ud574\uc57c \ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0\ub294 \uc2dc\uac04\uacfc \uc790\uc6d0\uc774 \ub9ce\uc774 \ud544\uc694\ud558\uba70, \ud604\uc7ac\ub85c\uc11c\ub294 \uadf8\uac83\ub4e4\uc774 \ucda9\ubd84\ud55c \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\ub300\uccb4 \uae30\uc220\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc5f0\uad6c\uc758 \uc694\uad6c\ub97c \ucda9\uc871\uc2dc\ud0a4\uae30\uc5d0 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud568\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc989\uac01\uc801\uc778 \uc778\uac04 \uc801\uc6a9\uc5d0 \ub300\ud55c \uc2e0\ub8b0\uc131\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ubcf5\ud569\uc801\uc778 \uc0dd\ub9ac\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc644\uc804\ud788 \ubaa8\uc0ac\ud558\uae30\uc5d4 \ubd80\uc871\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc9c0\uc18d\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \ubaa8\ubc29\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc744 \uc704\ud574 \uc5f0\uad6c\uc640 \ud22c\uc790\ub97c \uac15\ud654\ud558\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\ub97c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4. '\ub85c\uc288 \ud640\ub529'(Roche Holding)\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uae30 \uc704\ud55c \uc5f0\uad6c \uac1c\ubc1c\uc758 \uc911\uc694\uc131\uc744 \uc778\uc9c0\ud558\uace0 \uc788\uc73c\uba70, \uadf8\ub7fc\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ud604\uc7ac \uae30\uc220\ub85c\ub294 \uc644\uc804\ud55c \ub300\uccb4\uac00 \ubd88\uac00\ub2a5\ud558\ub2e4\ub294 \uc810\uc744 \uc5ec\ub7ec \ucc28\ub840 \uac15\uc870\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\uace0 \uc788\uc9c0\ub9cc \ucda9\ubd84\ud55c \ub300\uccb4 \uae30\uc220\uc774 \uc544\uc9c1 \uac1c\ubc1c\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc2dc\uac04\uc774 \ud544\uc694\ud558\uace0, \uadf8 \ub3d9\uc548 \uc77c\ubd80 \ub2e8\uacc4\uc5d0\uc11c\ub294 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95 \uc5f0\uad6c\uc640 \ud568\uaed8 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uae34\uae09\ud558\uac8c \uc694\uad6c\ub418\ub294 \uc784\uc0c1\uc801 \ub3cc\ud30c\uad6c \ub9c8\ub828\uc5d0 \uc911\ub300\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\ub300\uccb4 \uae30\uc220 \uc5f0\uad6c\ub9cc\uc73c\ub85c\ub294 \ud574\uacb0\ud558\uc9c0 \ubabb\ud558\ub294 \ub9ce\uc740 \ub09c\uc81c\ub97c \uc9c0\uc18d\uc801\uc73c\ub85c \uadf9\ubcf5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\ub3c4 \uacc4\uc18d \uc5f0\uad6c\ub418\uace0 \uc788\uc9c0\ub9cc, \uc544\uc9c1\uc740 \ucd08\uae30 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub300\uccb4 \uae30\uc220 \uc790\uccb4\uac00 \ub9ce\uc740 \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0 \ucda9\ubd84\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\ub294 \ub370 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \uc2e0\ub8b0\ud560 \uc218 \uc5c6\ub2e4\ub294 \uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc774 \uc644\uc804\ud558\uac8c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc774\uc720\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \ucda9\ubd84\ud788 \uad6c\ud604\ud558\uc9c0 \ubabb\ud558\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 3\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub85c \uc778\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc694\ud55c \uacbd\uc6b0\uc5d0\ub9cc \uc0ac\uc6a9\ub418\uc5b4\uc57c \ud558\uba70, \uc774\ub294 \uaddc\uc81c \uae30\uad00\ub4e4\uc774 \uc5c4\uaca9\ud788 \uac10\ub3c5\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \uc5f0\uad6c\uc640 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacf5\uc874\ud558\uba70 \uc0c1\ud638 \ubcf4\uc644\uc801\uc73c\ub85c \uc0ac\uc6a9\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4. '\uad6d\uc81c \uc0dd\uba85\uacfc\ud559\uc5f0\uad6c\uc18c (ILAR)'\ub294 \ud604\ub300 \uc0dd\uba85\uacfc\ud559 \uc5f0\uad6c\uc5d0\uc11c\ub294 \ub2e4\uc591\ud55c \ubc29\ubc95\ub860\uc774 \ud1b5\ud569\ub418\uc5b4\uc57c \ud558\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uadf8\ub7ec\ud55c \ub2e4\uac01\uc801\uc778 \uc811\uadfc\uc758 \ud55c \ucd95\uc73c\ub85c\uc11c \uacc4\uc18d \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud560 \uc218 \uc788\ub2e4\uace0 \ubcf4\uace0\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc740 \uc911\uc694\ud55c \ubaa9\ud45c\uc774\uc9c0\ub9cc, \ud604\uc7ac\ub85c\uc11c\ub294 \ubaa8\ub4e0 \uc0dd\ub9ac\uc801 \ubc0f \ubcd1\ub9ac\uc801 \ud604\uc0c1\uc744 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4. '\ud558\ubc84\ub4dc \uba54\ub514\uceec \uc2a4\ucfe8'\uc740 \ud604\uc7ac\uc758 \ub300\uccb4 \uae30\uc220\uc774 \uad11\ubc94\uc704\ud55c \uc0dd\uccb4 \ub0b4 \ud658\uacbd\uc744 \uc644\ubcbd\ud788 \ubaa8\uc0ac\ud558\uc9c0 \ubabb\ud55c\ub2e4\uace0 \ud558\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud2b9\ud788 \ubcf5\uc7a1\ud55c \uc9c8\ubcd1 \uc5f0\uad6c\uc5d0\uc11c \uc5ec\uc804\ud788 \ud544\uc218\uc801\uc774\ub77c\ub294 \uc810\uc744 \uac15\uc870\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 3\u003cbr\u003e\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc740 \ubcf4\uc870 \uc218\ub2e8\uc73c\ub85c \ubc1c\uc804 \uc911\uc774\uba70, \uad81\uadf9\uc801\uc73c\ub85c \ub354 \uc548\uc804\ud55c \uc2e4\ud5d8 \ud658\uacbd\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uacfc \uc5f0\uad6c\uac00 \ud544\uc694\ud569\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc740 \uc644\uc804\ud558\uc9c0 \uc54a\uc544 \ubaa8\ub4e0 \uc5f0\uad6c\uc5d0\uc11c \uc0ac\uc6a9\ub420 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc5d0 \ub300\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790\ub294 \uacc4\uc18d\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\ub9cc\uc73c\ub85c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ucda9\ubd84\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 3\u003cbr\u003e\ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 2\u003cbr\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \uac1c\ubc1c\uc740 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub370\uc774\ud130\ub97c \uae30\ubc18\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc758 \uacf5\uc874\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 2\u003cbr\u003e\ub300\uccb4 \uae30\uc220\ub4e4\ub85c\ub294 \ubcf5\uc7a1\ud55c \uc57d\ubb3c\uc758 \uc804\uc2e0\uc801 \ubc18\uc751\uc744 \ucda9\ubd84\ud788 \uac80\uc99d\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u0
