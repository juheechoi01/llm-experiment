b2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 1\u003cbr\u003e\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4\uc5d0 \ubbf8\uce60 \uac00\ub2a5\uc131\uc744 \uc608\uce21\ud558\ub294 \ub370 \ub9e4\uc6b0 \uc720\uc6a9\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \uc2dc\uac04\uc774 \uac78\ub9ac\uace0 \uc788\uc73c\uba70, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc989\uac01\uc801\uc73c\ub85c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uadf9\ub3c4\ub85c \uc81c\ud55c\ub41c \ud658\uacbd\uc5d0\uc11c\ub9cc \ud5c8\uc6a9\ub418\uba70, \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ucd5c\ub300\ud55c \ubcf4\uc7a5\ud558\uae30 \uc704\ud574 \uc9c0\uc18d\uc801\uc778 \uac1c\uc120\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc758 \ubc1c\uc804\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uae30\uc5d0 \uc544\uc9c1 \ubd80\uc871\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \ubc1c\uc804\ud558\uc9c0 \ubabb\ud55c \uc774\uc720\ub294 \uc774\ubbf8 \ub9ce\uc740 \uc5f0\uad6c\uac00 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc74c\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ud604\uc7ac \uae30\uc220\uc758 \ud55c\uacc4\uac00 \uc874\uc7ac\ud558\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 1\u003cbr\u003e\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\uccab\uc9f8, \ub300\uccb4 \uae30\uc220\ub9cc\uc73c\ub85c\ub294 \uc544\uc9c1 \ubd88\uc644\uc804\ud55c \ubd80\ubd84\uc774 \ub9ce\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\uccab \ubc88\uc9f8\ub85c, \ud604\uc7ac\ub85c\uc11c\ub294 \uc77c\ubd80 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 1  Point 1\u003cbr\u003e\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc5f0\uad6c \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uc5f0\uad6c\ubc95\uc774 \ud604\uc7ac\ub85c\uc11c\ub294 \uc81c\uacf5\ud560 \uc218 \uc5c6\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \uc774\ud574\ub97c \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 3  Point 1\u003cbr\u003e\uccab\uc9f8, \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \ube44\ub3d9\ubb3c \ubaa8\ub378\ub85c\ub294 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \ubd84\uc11d\ud569\ub2c8\ub2e4","\u003cb\u003e\ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\u003c\u002fb\u003e\u003cbr\u003eTurn 2  Point 1\u003cbr\u003e\uccab\uc9f8, \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \ub3d9\ubb3c \uc804\uccb4\uc758 \ubcf5\uc7a1\ud55c \uc0
