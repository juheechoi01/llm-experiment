        <script charset="utf-8" src="https://cdn.plot.ly/plotly-3.5.0.min.js" integrity="sha256-fHbNLP+GlIXN+efbQec78UkemUz3NJp7UmfGxC1tNxs=" crossorigin="anonymous"></script>                <div id="8a75ecc5-7960-4e5a-82c8-e9a197a506ea" class="plotly-graph-div" style="height:750px; width:1200px;"></div>            <script>                window.PLOTLYENV=window.PLOTLYENV || {};                                if (document.getElementById("8a75ecc5-7960-4e5a-82c8-e9a197a506ea")) {                    Plotly.newPlot(                        "8a75ecc5-7960-4e5a-82c8-e9a197a506ea",                        [{"hoverinfo":"text","hovertext":["\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc5f0\uad6c\ud558\ub294 \ub370 \uc788\uc5b4 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \ud604\uc2e4\uc801 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub9ce\uc740 \uc0dd\uba85\uacf5\ud559 \ud68c\uc0ac\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ucd5c\ucca8\ub2e8 \uae30\uc220 \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uac00\ub2a5\ud55c \ub300\uccb4 \uae30\uc220\ubcf4\ub2e4 \uc0dd\uba85 \uad6c\uc81c\uc5d0 \uc788\uc5b4 \ub354 \uc9c1\uc811\uc801\uc778 \uacb0\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub300\uc548\uc801\uc778 \ubc29\ubc95\uc774 \uc544\uc9c1 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c \uc9c4\ud589\uc5d0 \uc788\uc5b4 \ub300\uccb4 \ubc29\ubc95\uc774 \ud56d\uc0c1 \uc6b0\uc120 \uace0\ub824\ub429\ub2c8\ub2e4","\ub300\uc548 \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \uac80\uc99d\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uc548\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc644\uc804\ud55c \ub300\uccb4\ubb3c\uc774 \uc544\ub2d9\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uace0\ub824\ub97c \ubc14\ud0d5\uc73c\ub85c \uc9c4\ud589\ub429\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \ub300\uc548 \ubc29\ubc95\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ub300\uc548\uc740 \uc544\uc9c1 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc9c8\ud658 \uce58\ub8cc\uc758 \uc548\uc804\uc131 \ubc0f \ud6a8\ub2a5\uc744 \ud655\uc778\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uac1c\uc120\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uc9c0\uce68\uc5d0 \ub530\ub77c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc548\uc804\ud558\uace0 \uc778\ub3c4\uc801\uc73c\ub85c \uc218\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uc758\ud559\uc801 \uc9c4\ubcf4\ub294 \ub2e4\ub978 \uc0dd\uba85\uccb4\uc758 \uad8c\ub9ac\ub97c \uace0\ub824\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc644\uc804\ud55c \ub300\uccb4 \ubc29\ubc95\uc774 \ub9c8\ub828\ub418\uae30 \uc804\uae4c\uc9c0 \uc778\ub958\uc5d0\uac8c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc0dd\ub9ac\uc801 \ubc18\uc751 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc5f0\uad6c\uc790\ub4e4\uc740 \ub300\uccb4 \ubc29\ubc95\uc744 \uac1c\ubc1c\ud558\uace0 \uc788\uc9c0\ub9cc, \ubc14\ub85c \uc801\uc6a9\ud558\uae30\uc5d4 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\uc758 \ub300\uccb4 \ubc29\ubc95\uc73c\ub85c\ub294 \ub2ec\uc131\ud560 \uc218 \uc5c6\ub294 \uc911\uc694\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac\ub85c\uc11c\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc644\uc804\ud788 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc694\ud55c \ub300\uccb4 \uae30\uc220\uc774 \ubd80\uc871\ud569\ub2c8\ub2e4","\ud6a8\uacfc\uc801\uc778 \ub300\uc548\uc774 \uc544\uc9c1 \ucda9\ubd84\ud558\uc9c0 \uc54a\uae30\uc5d0 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc644\uc804\ud55c \ub300\uccb4\ub294 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\uc778\uacf5 \uc7a5\uae30 \uce69\uc774\ub098 \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uc740 \ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc778\uac04 \uc138\ud3ec\uc640 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc9d1\uc911\uc801\uc778 \ud22c\uc790\uc640 \uc5f0\uad6c\ub294 \ub300\uccb4 \uae30\uc220\uc758 \ubc1c\uc804\uc744 \ucd09\uc9c4\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc704\uc6d0\ud68c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ubd88\uac00\ud53c\ud560 \ub54c\ub9cc \uc218\ud589\ub418\ub3c4\ub85d \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c\ub41c \ud658\uacbd\uc5d0\uc11c \uc774\ub8e8\uc5b4\uc838 \ub3d9\ubb3c\uc758 \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud569\ub2c8\ub2e4","\ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\uacfc \uc778\uacf5\uc7a5\uae30\ub294 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \ubcc0\uc218\ub97c \uace0\ub824\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\uc5f0\uad6c \ud658\uacbd\uc740 \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub97c \uc778\uc2dd\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uacfc \ud568\uaed8 \uc0ac\uc6a9\ub420 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801 \uc811\uadfc\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \uaddc\uc81c \uad6c\uc870\uc640 \ud569\uce58\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubaa8\ub4e0 \uac00\ub2a5\ud55c \ub300\uc548\uc774 \ubd80\uc871\ud55c \ud604\uc7ac \uc0c1\ud669\uc5d0\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc778\uacf5\uc9c0\ub2a5\uacfc \uc624\uac00\ub178\uc774\ub4dc\ub294 \uc544\uc9c1 \uc0c1\uc5c5\uc801 \uc2e4\ud589 \uac00\ub2a5\uc131\uc774 \ubd80\uc871\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \uae30\uc900\uc744 \ucda9\uc871\uc2dc\ud0a4\uae30 \uc704\ud574 \ud544\uc694\ud569\ub2c8\ub2e4","\uc9c0\uc18d\uc801\uc73c\ub85c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uac1c\uc120\ud558\ub294 \ub178\ub825\uc740 \uc774\ubbf8 \uc9c4\ud589 \uc911\uc785\ub2c8\ub2e4","\uc778\uac04\uc758 \uc0dd\uba85\uacfc \uac74\uac15\uc744 \ubcf4\ud638\ud558\ub294 \ub370 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\ub978 \uc0dd\uba85\uccb4\uc758 \uad8c\ub9ac\uc640 \uc778\uac04\uc758 \uac74\uac15\uc744 \uc870\ud654\uc2dc\ud0b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc5b4\uc9c4 \ub370\uc774\ud130\ub294 \ud604\uc7ac\uc758 \uae30\uc220\ub85c\ub294 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc778\uc0ac\uc774\ud2b8\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc5f0\uad6c\uc640 \ud22c\uc790\ub294 \uc774\ubbf8 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0\ub3c4 \uc801\uadf9\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uc5c4\uaca9\ud558\uac8c \uaddc\uc81c\ub418\uba70, \uc9c0\uc18d\uc801\uc778 \uac1c\uc120\uc744 \ub3c4\ubaa8\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc744 \ucc3e\uae30 \uc704\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790\ub294 \uafb8\uc900\ud788 \uc99d\uac00\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ucd5c\uc2e0 \uae30\uc220\ub85c\ub3c4 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \uc815\ud655\ud55c \uc0dd\uccb4 \ubc18\uc751 \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub3c4\uc801\uc778 \ubc29\ubc95\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ube44\uce68\uc2b5\uc801\uc774\uace0 \ub300\uccb4 \uac00\ub2a5\ud55c \ubc29\ubc95\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\uc9c0\ub9cc, \uc804\uccb4\uc801\uc778 \ub300\uccb4\ub294 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\uc2e4\ud5d8 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \ubd88\uacfc\ud558\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\ud07c \uafb8\uc900\ud55c \uc131\uacf5\ub960\uc744 \ubcf4\uc7a5\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c\ub41c \ud658\uacbd\uc5d0\uc11c \uc218\ud589\ub418\uc5b4 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uc9c0\ud0b5\ub2c8\ub2e4","\uc758\uc57d\ud488 \uc548\uc804\uc131 \uac80\uc99d\uc5d0 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc774\ub7ec\ud55c \uc5f0\uad6c\ub294 \uacb0\uacfc\uc801\uc73c\ub85c \uc778\ub958\uc640 \ub3d9\ubb3c \ubaa8\ub450\uc5d0 \ud61c\ud0dd\uc744 \uc904 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uc548\uc801 \ubc29\ubc95\uc740 \ud604\uc7ac \ub2e8\uacc4\uc5d0\uc11c \uc644\uc804\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\ub9ce\uc740 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\uc2dd\uc744 \ucc3e\uae30 \uc704\ud574 \uc774\ubbf8 \uc0c1\ub2f9\ud55c \uc5f0\uad6c\uc640 \ud22c\uc790\uac00 \uc9c4\ud589 \uc911\uc5d0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uaddc\uc81c \ud558\uc5d0 \uc774\ub8e8\uc5b4\uc838 \uc724\ub9ac\uc801 \ubb38\uc81c\ub97c \ucd5c\uc18c\ud654\ud558\ub824\uace0 \ub178\ub825\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc9c0\uc18d\uc801\uc778 \uae30\uc220 \uac1c\ubc1c\uc744 \ud1b5\ud574 \ub3d9\ubb3c \uc2e4\ud5d8 \uc758\uc874\ub3c4\ub97c \uc904\uc774\uaca0\ub2e4\ub294 \uc758\uc9c0\ub294 \uc774\ubbf8 \uc874\uc7ac\ud558\uc9c0\ub9cc, \uc804\uba74\uc801\uc778 \uc804\ud658\uc740 \uc544\uc9c1 \uc2dc\uae30\uc0c1\uc870\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\ub824\ub294 \uc9c0\uc18d\uc801\uc778 \ub178\ub825\uc774 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\ub294 \ub300\uccb4 \uae30\uc220\uc774 \ubc1c\uc804\ud558\uba74 \ub354\uc6b1 \uc724\ub9ac\uc801\uc778 \uc5f0\uad6c \ud658\uacbd\uc774 \uc870\uc131\ub420 \uac83\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uae30\uc220\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud569\ub2c8\ub2e4","\ub300\uc548 \ubc29\ubc95\uc740 \uc544\uc9c1 \ud55c\uacc4\ub97c \uac00\uc9c0\uace0 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \uc9c4\uc9c0\ud558\uac8c \uace0\ub824\ub418\uba70, \uc5f0\uad6c\ub294 \uc774\ub97c \ud53c\ud558\uae30 \uc704\ud55c \ubc29\ubc95\ub3c4 \uc911\uc810\uc801\uc73c\ub85c \uac1c\ubc1c\ud569\ub2c8\ub2e4","\uc9c0\uc18d \uac00\ub2a5\ud55c \ubc29\ud5a5\uc73c\ub85c\uc758 \uc804\ud658\uc740 \uc810\uc9c4\uc801\uc73c\ub85c \uc774\ub8e8\uc5b4\uc838\uc57c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \ubb38\uc81c\ub294 \uc5c4\uaca9\ud55c \uaddc\uc815\uacfc \uac10\ub3c5\uc744 \ud1b5\ud574 \ucd5c\uc18c\ud654\ub429\ub2c8\ub2e4","\uaddc\uc81c\ub97c \uc900\uc218\ud558\uba70 \uc2e4\uc2dc\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc5c5\ub4e4\uc740 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0 \ub300\ud55c \ud22c\uc790\ub97c \ud655\ub300\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc644\uc804\ud55c \ub300\uc548 \uac1c\ubc1c\uc744 \ud5a5\ud55c \uc5f0\uad6c\uac00 \uacc4\uc18d \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \uae30\uad00\uc758 \uc694\uad6c \uc0ac\ud56d\uc744 \ucda9\uc871\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc2e0\uae30\uc220\uc758 \ubc1c\uc804\uc740 \uc911\uc694\ud558\uc9c0\ub9cc, \uadf8\ub7fc\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\ub9cc\uc774 \ubcf5\uc7a1\ud55c \uc0dd\uba85\uccb4 \uac04\uc758 \uc0c1\ud638\uc791\uc6a9\uc744 \uba85\ud655\ud788 \uad00\ucc30\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uc548 \uae30\uc220\uc740 \uc544\uc9c1 \ucda9\ubd84\ud788 \ubc1c\uc804\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\ub300\uc548\uc801 \ubc29\ubc95\uc758 \ubc1c\uc804\uc5d0\ub294 \uc2dc\uac04\uc774 \uac78\ub9ac\uba70, \uc989\uac01\uc801\uc778 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc744 \uc704\ud574\uc120 \ud604\uc874\ud558\ub294 \ubc29\ubc95\uc744 \ubcd1\ud589\ud560 \ud544\uc694\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uad8c\ub9ac\ub97c \uc874\uc911\ud558\uba70 \uc2e4\ud5d8\uc744 \uc218\ud589\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5f0\uad6c\ube44 \ud22c\uc790 \ud6a8\uc728\uc131\uc744 \ub192\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \uae30\uc220\uacfc \uc724\ub9ac \uc0ac\uc774\uc758 \uade0\ud615\ub41c \ud574\ub2f5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \ucc28\uc774\ub97c \uadf9\ubcf5\ud560 \uc218 \uc788\ub294 \uacfc\ud559\uc801 \ubc29\ubc95\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud604\uc7ac \ub300\uccb4 \uae30\uc220\ub85c \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uaddc\uc81c\ub294 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \ubcf4\ud638\ud558\ub294 \ub3d9\uc2dc\uc5d0 \uc0dd\uba85\uc744 \uc0b4\ub9b4 \uac00\ub2a5\uc131\uc744 \ud0d0\uad6c\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uaddc\uc81c \uae30\uad00\uc758 \ud544\uc218 \uc870\uac74\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud569\ub2c8\ub2e4","\uc778\uacf5 \uc7a5\uae30 \ubaa8\ub378\uc774\ub098 \ucef4\ud4e8\ud130 \uc2dc\ubbac\ub808\uc774\uc158\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\uc778\uac04 \uc138\ud3ec\ub098 \ucef4\ud4e8\ud130 \ubaa8\ub378\ub9c1\ub9cc\uc73c\ub85c\ub294 \ucda9\ubd84\ud558\uc9c0 \uc54a\uc740 \uacbd\uc6b0\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \ub370\uc774\ud130\ub294 \uaddc\uc81c \uae30\uad00\uc758 \ud544\uc218 \uc694\uad6c\uc0ac\ud56d\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ucda9\ubd84\ud55c \ub300\uc548\uc774 \uc5c6\ub294 \ubd84\uc57c\uc5d0\uc11c \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc544\uc9c1 \ub300\uccb4\ud560 \uc218 \uc5c6\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c \ubd84\uc11d\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc5f0\uad6c\uc790\ub4e4\uc740 \ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc5d0\ub3c4 \uc801\uadf9\uc801\uc73c\ub85c \ucc38\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc740 \ub2e4\uac01\ub3c4\ub85c \uac80\ud1a0\ub41c \ud6c4 \uc2e0\uc911\ud558\uac8c \uacb0\uc815\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \ubc29\ubc95\uc740 \uc544\uc9c1 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc758\uc874\ub3c4\ub97c \uc904\uc774\uae30 \uc704\ud55c \ud22c\uc790\uc640 \uc5f0\uad6c\ub294 \uacc4\uc18d \ud655\uc7a5\ub418\uace0 \uc788\uc9c0\ub9cc, \uc644\uc804\ud55c \ub300\uccb4\ub97c \uc704\ud574\uc11c\ub294 \ub9ce\uc740 \uc2dc\uac04\uc774 \ud544\uc694\ud569\ub2c8\ub2e4","\ud604\uc7ac \uc874\uc7ac\ud558\ub294 \uacfc\ud559\uc801 \ud55c\uacc4\ub97c \uc989\uc2dc \ud574\uacb0\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uc548\uc801 \ubc29\ubc95\uc774 \ucda9\ubd84\ud558\uc9c0 \uc54a\ub354\ub77c\ub3c4, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc720\uc77c\ud558\uac8c \uac00\ub2a5\ud55c \uc2e4\ud5d8\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc904\uc774\uace0 \ub300\uccb4 \uae30\uc220\uc744 \uc0ac\uc6a9\ud558\ub294 \uc5f0\uad6c\uc5d0\ub3c4 \ub9ce\uc740 \ud22c\uc790\uac00 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0ac\ub78c\uc758 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uc2e0\uc57d \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc785\ub2c8\ub2e4","\ud604\uc7ac\uc758 \uacfc\ud559\uc801 \uc9c4\ubcf4\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc774\ub294 \ub2ec\uc131\ud558\uae30 \uc5b4\ub835\uc2b5\ub2c8\ub2e4","\ub300\uc548 \ubc29\ubc95\uc740 \uc544\uc9c1 \ubd88\uc644\uc804\ud569\ub2c8\ub2e4","\ucef4\ud4e8\ud130 \ubaa8\ub378\uacfc \uc138\ud3ec\ubc30\uc591\uc740 \ub3d9\ubb3c\uacfc \uc778\uac04\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \ucda9\ubd84\ud788 \uc7ac\ud604\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc740 \uc5ec\uc804\ud788 \uae30\uc220\uc801 \ud55c\uacc4\ub97c \uac00\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c\uc790\ub4e4\uc740 \uacc4\uc18d\ud574\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc744 \ubaa8\uc0c9\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uacfc\ud559\uc801 \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ucd08\uae30 \ub2e8\uacc4\uc5d0 \uc788\uc5b4 \uc2e0\ub8b0\uc131\uacfc \uc815\ud655\uc131\uc5d0 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4. \ubc14\uc774\uc624\ud14c\ud06c \ud68c\uc0ac\ub4e4\uc740 \uc774\ub7ec\ud55c \uae30\uc220\ub4e4\uc774 \ub3c4\uc785\ub418\uae30\uae4c\uc9c0 \uc2e4\uc9c8\uc801\uc778 \uc5f0\uad6c \uacb0\uacfc \ub3c4\ucd9c\uc5d0 \uc2dc\uac04\uc774 \uac78\ub9b4 \uac83\uc774\ub77c\uace0 \uc9c0\uc801\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub300\uc548 \uc5f0\uad6c \ubc29\ubc95\uc774 \uc81c\uacf5\ud558\uc9c0 \ubabb\ud558\ub294 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\uc801 \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubd88\ud655\uc2e4\ud55c \ub300\uccb4 \uae30\uc220\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud569\ub2c8\ub2e4","\uc5f0\uad6c\uc790\ub4e4\uc740 \ub300\uccb4 \ubc29\ubc95 \uc5f0\uad6c\uc5d0 \ud798\uc4f0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucca0\uc800\ud55c \uaddc\uc81c\ub97c \ud1b5\ud574 \uadf8 \uc0ac\uc6a9\uc744 \uc815\ub2f9\ud654\ud569\ub2c8\ub2e4","\uc5f0\uad6c\uc758 \uc9c4\ubcf4\ub294 \uad81\uadf9\uc801\uc73c\ub85c \uc778\uac04\uacfc \ub3d9\ubb3c \ubaa8\ub450\uc5d0\uac8c \uc774\uc775\uc774 \ub429\ub2c8\ub2e4","\ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub300\uccb4 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \ub370\uc774\ud130\ub294 \uaddc\uc81c \uae30\uad00\uc5d0 \uc758\ud574 \uc694\uad6c\ub429\ub2c8\ub2e4","\ub300\uc548\uc801 \ubc29\ubc95\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \ubc18\uc601\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uc548\uc801 \ubc29\ubc95\ub4e4\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uacb0\uacfc\ub294 \uaddc\uc81c \uae30\uad00\uc758 \uc2b9\uc778\uacfc \ud3c9\uac00\uc5d0 \uc911\uc694\ud55c \uae30\uc900\uc774 \ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \uc0c1\ud638 \ubcf4\uc644\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\uc591\ud55c \uc9c8\ud658 \uc5f0\uad6c\uc758 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \ubc18\uc601\ud558\uc5ec \uc5c4\uaca9\ud788 \uaddc\uc81c\ub429\ub2c8\ub2e4","\ud604\uc874\ud558\ub294 \ub300\uccb4 \ubc29\ubc95\uc758 \ud55c\uacc4\ub97c \ubcf4\uc644\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc778 \uac10\ub3c5 \ud558\uc5d0 \uc9c4\ud589\ub418\uba70, \uc5f0\uad6c\ub294 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\uc5ec \uc2dc\ud589\ub429\ub2c8\ub2 8cc \uc5f0\uad6c\uc5d0\uc11c \ud544\uc694\ud55c \ubc95\uc801 \uae30\uc900\uc744 \ucda9\uc871\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uacc4\uc18d\ud574\uc11c \ub9de\ucd94\uace0 \uac1c\uc120 \uc911\uc785\ub2c8\ub2e4","\ubaa8\ub4e0 \uc5f0\uad6c\uc5d0\ub294 \uc724\ub9ac\uc801 \ucc45\uc784\uc774 \uac15\uc870\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798 \uc5c4\uaca9\ud788 \uaddc\uc81c\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68 \ud558\uc5d0 \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900 \ud558\uc5d0 \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc73c\ub85c \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc5d0 \ub530\ub77c \uc9c4\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \uc548\uc804 \uae30\uc900\uc5d0 \ub530\ub77c \uc5c4\uaca9\ud788 \uad00\ub9ac\ub418\uc5b4 \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uaddc\uc81c \uc544\ub798\uc5d0\uc11c \uc2e4\uc2dc\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uacfc \uaddc\uc815\uc744 \uc900\uc218\ud558\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uacfc\ud559\uc801 \ubc1c\uacac\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4. \uc81c\uc57d\uc5c5\uacc4\ub294 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uace0\ub824\ud558\uc5ec \uc2e4\ud5d8\uc744 \uc124\uacc4\ud558\uace0 \uc788\uc73c\uba70, \uac00\ub2a5\ud55c \uacbd\uc6b0 \ub300\uccb4 \ubc29\ubc95\uc744 \ubaa8\uc0c9\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uad6c\uc870\uc801\uc774\uace0 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uac10\ub3c5 \uc544\ub798 \uc2dc\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68 \ud558\uc5d0 \uc218\ud589\ub429\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba74\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc9c4\ud589\ub429\ub2c8\ub2e4","\uc0dd\uba85\uc744 \uad6c\ud558\ub294 \uc5f0\uad6c\ub294 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \ub3d9\ubc18\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc73c\ub85c \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \ud328\ub7ec\ub2e4\uc784 \ub0b4\uc5d0\uc11c \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0 \ub300\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uacfc \uaddc\uc81c\uac00 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc694\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc744 \ub530\ub985\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc77c\uc815 \uc218\uc900\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uc5ec \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub9e4\uc6b0 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778 \ub0b4\uc5d0\uc11c \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798 \uc218\ud589\ub429\ub2c8\ub2e4","\uc5f0\uad6c \uc9c4\ud589 \uc2dc \uc724\ub9ac\uc801 \uae30\uc900\uacfc \ucc45\uc784\uc774 \uc5c4\uaca9\ud788 \uad00\ub9ac\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc740 \uc5c4\uaca9\ud788 \uad00\ub9ac\ub429\ub2c8\ub2e4","\ubaa8\ub4e0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucca0\uc800\ud55c \uc724\ub9ac\uc801 \uac80\ud1a0\ub97c \ud1b5\ud574 \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc2dc\ud589\uc740 \uac00\ub2a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0 \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uaddc\uc81c\uc640 \uac10\ub3c5\uc740 \ub3d9\ubb3c\uc758 \uc0dd\uba85\uad8c\uc744 \ubcf4\ud638\ud558\ub294 \uae30\uc900\uc744 \ud655\ub9bd\ud569\ub2c8\ub2e4","\ubc95\uc801\uc73c\ub85c\ub3c4 \uad00\ub9ac\ub41c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud569\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ub3d9\ubb3c \uc2e4\ud5d8 \uaddc\uc81c\ub294 \uc724\ub9ac\uc801 \ucc45\uc784\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubc95\uc801 \ubc0f \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0 \uc5c4\uaca9\ud558\uac8c \uad00\ub9ac\ub429\ub2c8\ub2e4","\ucd5c\uc120\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba70 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc218\ud589\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc5d0 \ub530\ub77c \uc218\ud589\ub418\uba70 \ud544\uc694\ud55c \uacbd\uc6b0\uc5d0\ub9cc \uc0ac\uc6a9\ub429\ub2c8\ub2e4","\uc5f0\uad6c \uc724\ub9ac \uae30\uc900\uc774 \uc5c4\uaca9\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc778 \uc9c0\uce68\uc744 \uc900\uc218\ud558\uc5ec \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uc808\ucc28\uc5d0 \ub530\ub77c \uc0ac\ub824 \uae4a\uac8c \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\uaddc\uc81c \uae30\uad00\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac \uae30\uc900\uc744 \uc5c4\uaca9\ud788 \uad00\ub9ac\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900 \uc544\ub798\uc5d0\uc11c \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801\uc774\uba70 \ud1b5\uc81c\ub41c \ud658\uacbd\uc5d0\uc11c \uc774\ub8e8\uc5b4\uc9d1\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc7a5\uae30\uc801\uc73c\ub85c \ub354 \ud070 \uc724\ub9ac\uc801 \ubaa9\ud45c\ub97c \uc704\ud574 \uc0ac\uc6a9\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ud544\uc694\uc131\uc744 \uc778\uc815\ud558\uba74\uc11c\ub3c4 \uc724\ub9ac\uc801 \uc9c4\ubcf4\ub97c \ub3d9\uc2dc\uc5d0 \ucd94\uc9c4\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud569\ub9ac\uc801\uc73c\ub85c \ud1b5\uc81c\ub41c \uc870\uac74 \ud558\uc5d0 \uc2dc\ud589\ub418\uba70, \uc5f0\uad6c\uc758 \uc9c4\ubcf4\uc5d0 \uc720\ub9ac\ud55c \uadfc\uac70\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68 \ud558\uc5d0 \uc2dc\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc744 \ud1b5\ud55c \uc5f0\uad6c\ub294 \uc724\ub9ac\uc801 \ud504\ub808\uc784\uc6cc\ud06c \ub0b4\uc5d0\uc11c \uc774\ub8e8\uc5b4\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\ub294 \ucca0\uc800\ud55c \uc724\ub9ac \uae30\uc900\uc774 \uc801\uc6a9\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \uc544\ub798 \uc218\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc81c\uc57d\uc774 \uc5c4\uaca9\ud558\uac8c \uad00\ub9ac\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ucd5c\uc0c1\uc758 \uc724\ub9ac\uc801 \uae30\uc900 \uc18d\uc5d0\uc11c \uc218\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc724\ub9ac\uc801 \uc0ac\uc6a9\uc740 \uacfc\ud559 \uc5f0\uad6c\uc758 \ubc1c\uc804\uc5d0 \ud544\uc218\uc801\uc778 \uade0\ud615\uc744 \uc774\ub8f9\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68 \uc544\ub798 \uc9c4\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\ub294 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\uc774 \uc801\uc6a9\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc0ac\uc6a9\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\uc5d0 \uc758\ud574 \uaddc\uc81c\ub429\ub2c8\ub2e4","\uac15\ub825\ud55c \uaddc\uc8 774 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ub9ce\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c\uc758 \ud6a8\uacfc\uc640 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud558\ub294 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\uc885\ud569\uc801\uc778 \uc724\ub9ac\uc801 \uac80\ud1a0\uc640 \uaddc\uc81c \uc544\ub798\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc744 \uc548\uc804\ud558\uac8c \uc9c4\ud589\ud560 \uc218 \uc788\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc911\uc99d \uc9c8\ud658\uc758 \uae30\ucd08 \uc0dd\ubb3c\ud559\uc744 \uc774\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc911\uc99d \uc9c8\ud658\uc73c\ub85c \uace0\ud1b5\ubc1b\ub294 \uc778\uac04 \ud658\uc790\ub4e4\uc758 \uc0b6\uc758 \uc9c8\uc774 \ud06c\uac8c \uac1c\uc120\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uae30\ucd08\uc801 \uc774\ud574\ub97c \ub3c4\uc640 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\ube44\ub85d \ub300\uccb4 \ubc29\ubc95\uc774 \ubc1c\uc804\ud558\uace0 \uc788\uc5b4\ub3c4, \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \ud544\uc218\uc801\uc778 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud558\ub294 \ub370 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc694\ud55c \uacbd\uc6b0\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uacfc \uad00\ub828\ub41c \uae34\uae09\ud55c \uc5f0\uad6c\uc758 \uc9c4\ucc99\uc744 \uc704\ud55c \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uc790\ub8cc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc \ubc1c\uc804\uc744 \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc758 \ud575\uc2ec \uc790\ub8cc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \uc5c6\uc5b4\uc11c\ub294 \uc548 \ub420 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc758 \ube60\ub978 \uc9c4\ubcf4\ub97c \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc5c6\uc5c8\ub2e4\uba74 \ud2b9\uc815 \uc9c8\ud658 \uce58\ub8cc\ubc95\uc758 \ubc1c\uc804\ub3c4 \ub2a6\uc5b4\uc84c\uc744 \uac81\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc885\uc885 \uc0dd\uba85\uacfc \uc9c1\uacb0\ub418\ub294 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95\uc758 \ud544\uc218\uc801\uc778 \uac1c\ubc1c \ub2e8\uacc4\ub85c, \ub2e4\ub978 \ubc29\ubc95\ub4e4\ub85c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc5d0\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\ubc95\uc744 \uac1c\ubc1c\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ud2b9\uc815 \uc911\uc99d \uc9c8\ud658\uc758 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc744 \uc704\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc5d0\uac8c \uc548\uc804\ud55c \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c\ub97c \uac1c\ubc1c\ud558\ub294 \uac00\uc7a5 \ud6a8\uacfc\uc801\uc778 \ubc29\ubc95\uc785\ub2c8\ub2e4. \uc774 \uc810\uc740 \ub2e4\uc218\uc758 \ubc14\uc774\uc624\ud14c\ud06c \ud68c\uc0ac\ub4e4\uc774 \uac15\uc870\ud558\ub294 \ubc14\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \ubcd1\ub9ac\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4. \uc774\ub294 \uc758\ub8cc \uc5f0\uad6c \ub2e8\uccb4\ub4e4\uc774 \uc9c0\uc18d\uc801\uc73c\ub85c \uc9c0\uc9c0\ud558\ub294 \uc5f0\uad6c \ubc29\ubc95\ub860\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc0dd\uccb4 \ub0b4 \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uc7a5\uae30\uc801\uc778 \uc601\ud5a5 \ubd84\uc11d\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc5d0 \ub300\ud55c \uc0c8\ub85c\uc6b4 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc758 \ud544\uc218\uc801\uc778 \ub2e8\uacc4\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c\uc758 \uc548\uc804\uc131\uc744 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \ud655\uc778\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc758 \ud544\uc218 \uacfc\uc815\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc5f0\uad6c\uc758 \ud6a8\uacfc\ub97c \ub192\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2ec\uac01\ud55c \uc9c8\ud658\uc758 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uc774\ud574\uc5d0 \ud544\uc218\uc801\uc778 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\uc9c0\uae08\uae4c\uc9c0 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc218\ub9ce\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \uacb0\uc815\uc801 \uae30\uc5ec\ub97c \ud574 \uc654\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc758 \uc6d0\uc778\uacfc \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e0\uc18d\ud55c \uc9c8\ud658 \uc774\ud574\uc640 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc744 \uac00\ub2a5\ud558\uac8c \ud569\ub2c8\ub2e4","\ud604\uc2dc\uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub2e4\uc218\uc758 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \uc788\uc5b4\uc11c \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud55c \uacfc\ud559\uc801 \ubc1c\uacac\uc740 \ub2f9\uc7a5 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc5d0 \uae34\uae09\ud55c \ud544\uc694\uc131\uc744 \ucda9\uc871\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \uc788\uc5b4 \uac00\uc7a5 \ud604\uc2e4\uc801\uc774\uace0 \ud6a8\uacfc\uc801\uc778 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uac1c\ubc1c\uc758 \ucd08\uae30 \ub2e8\uacc4\uc5d0\uc11c \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc \uc81c\uc7ac \uac1c\ubc1c\uc758 \uc911\uc694 \uae30\uc5ec\uc790\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc758 \uc548\uc804\uc131\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658\uc73c\ub85c \uace0\ud1b5\ubc1b\ub294 \ud658\uc790\uc758 \uc0dd\uba85\uc744 \uad6c\ud560 \uc218 \uc788\ub294 \uc7a0\uc7ac\ub825\uc744 \uc9c0\ub2d9\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\ub958\uc758 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc5d0 \ud544\uc218\uc801\uc778 \uc774\ud574\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc5d0 \ud544\uc694\ud55c \ud601\uc2e0\uc801\uc778 \uc758\uc57d\ud488 \uac1c\ubc1c\uc744 \uac00\uc18d\ud654\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc81c \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \uc911\uc99d \uc9c8\ud658 \uc5f0\uad6c\uc5d0 \uc788\uc5b4 \uc5ec\uc804\ud788 \ud55c\uacc4\ub97c \uac00\uc9d1\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\uc5d0\uc11c \ud601\uc2e0\uc801\uc778 \ub3cc\ud30c\uad6c\ub97c \ub9c8\ub828\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc911\uc99d \uc9c8\ud658 \uce58\ub8cc\ubc95 \uac1c\ubc1c\uc5d0 \ud544\uc218\uc801\uc778 \ub3c4\uad6c\uc785\ub2c8\ub2e4",null],"marker":{"opacity":0.5,"size":5},"mode":"markers+text","name":"7___","text":["","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","","7___"],"textfont":{"size":12},"x":{"dtype":"f4","bdata":"CCZUQZbhVEH0vlNBo75PQWAxUEGFlFVBk+BTQRPlUkFDBVJB7MNTQa+NVUE6slVBM7dUQegHUUGWHlBBNo1QQb c \ud55c \uc904\uc5b4\ub4ed\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uaddc\uc815\uc744 \ub530\ub985\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uc758 \uace0\ud1b5\uc744 \uc904\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc0ac\uc6a9\uc740 \ucca0\uc800\ud55c \uac80\uc99d\uc744 \ud1b5\ud574 \ucd5c\uc18c\ud654\ub429\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \uc5f0\uad6c\ub294 \uacc4\uc18d \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ub370 \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc774 \uc801\uc6a9\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0\uc790 \ud558\ub294 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc5c4\uaca9\ud788 \ub530\ub985\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ucd5c\uc18c\ud654\ud558\ub824\ub294 \ub178\ub825\uc744 \uc774\ubbf8 \ub2e4\uac01\uc801\uc73c\ub85c \uae30\uc6b8\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uc0ac\uc6a9\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc724\ub9ac \uae30\uc900\uc744 \uc900\uc218\ud558\uba74\uc11c \uc815\ud655\uc131\uc744 \ud655\ubcf4\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubd88\ud544\uc694\ud55c \uace0\ud1b5\uc744 \uc720\ubc1c\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uaddc\uc81c\ub97c \ud1b5\ud574 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \uc724\ub9ac\uc801 \uae30\uc900\uacfc \ubc95\uc801 \uaddc\uc81c\uac00 \uc774\ubbf8 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3c4\ub355\uc801 \ubb38\uc81c\ub294 \ucd5c\uc18c\ud654\ub97c \ubaa9\ud45c\ub85c \ud558\uc5ec \ud574\uacb0\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ube44\uc724\ub9ac\uc801 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\ubc95\ub4e4\uc774 \uacc4\uc18d \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uc808\ucc28\uc640 \uaddc\uc81c\uac00 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubd80\uc815\uc801 \uc601\ud5a5\uc744 \ucd5c\uc18c\ud654\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900 \ud558\uc5d0 \uc218\ud589\ub418\uba70, \ub3d9\ubb3c \uc0ac\uc6a9\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uad6d\uc81c\uc801 \uae30\uc900\uc774 \ub9c8\ub828\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ub178\ub825\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc774 \uc5c4\uaca9\ud788 \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uac00\ub2a5\ud55c \ubaa8\ub4e0 \ubc29\ubc95\uc73c\ub85c \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc601\ud5a5\uc744 \ucd5c\uc18c\ud654\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc758 \uac15\ud654\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc73c\ub85c \uc778\ud55c \ud53c\ud574\ub97c \ucd5c\uc18c\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uc5ec \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubc18\ub4dc\uc2dc \uc724\ub9ac\uc801 \uac00\uc774\ub4dc\ub77c\uc778\uc744 \ucda9\uc2e4\ud788 \ub530\ub974\uba70 \uc2e4\uc2dc\ub418\uba70, \uc5f0\uad6c\uc758 \uc9c4\ubcf4\ub85c \uc778\ud574 \uac00\ub2a5\ud55c \ud55c \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba70 \ucd5c\uc18c\ud55c\uc758 \uace0\ud1b5\uc744 \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uae30\uc900\uc740 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub3c4\ub85d \ubcf4\uc7a5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \uc904\uc774\uae30 \uc704\ud55c \uaddc\uc81c\uac00 \uc774\ubbf8 \uac15\ud654\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uba85 \uc724\ub9ac\uc801 \ucd5c\uc18c\ud55c\uc758 \uace0\ud1b5\uc744 \ubcf4\uc7a5\ud558\ub294 \ub300\uccb4 \uc5f0\uad6c\uac00 \ubd80\uc871\ud569\ub2c8\ub2e4","\ubc95\uc801 \uaddc\uc81c\uc640 \uc0b0\uc5c5 \uae30\uc900\uc740 \ub3d9\ubb3c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uc5ec \uc724\ub9ac\uc801 \uc5f0\uad6c\ub97c \uc774\ud589\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc740 \ucd5c\uc18c\ud654\ud558\uba70 \uc2e4\ud589\ub429\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uace0\ud1b5\uc744 \uacbd\uac10\uc2dc\ud0a4\ub294 \ubc29\ud5a5\uc73c\ub85c \uacc4\uc18d \ubc1c\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubc18\ub4dc\uc2dc \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \uaddc\uc815\uc744 \ub530\ub985\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \ubc29\ubc95\ub4e4\uc774 \uac1c\ubc1c\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc5d0 \ub300\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\ub294 \uc5c4\uaca9\ud55c \uc724\ub9ac\uc801 \uae30\uc900\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uaddc\uc81c\ub294 \uc5c4\uaca9\ud558\uac8c \uad00\ub9ac\ub418\uace0 \uc788\uc73c\uba70, \uac00\ub2a5\ud558\ub2e4\uba74 \ucd5c\uc18c\ud55c\uc758 \uace0\ud1b5\uc744 \ub3d9\ubb3c\uc5d0\uac8c \ubd80\uacfc\ud558\ub294 \ubc29\uc2dd\uc73c\ub85c \ubc1c\uc804\ub429\ub2c8\ub2e4","\uc5f0\uad6c\uc790\ub4e4\uc740 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud574 \ucd5c\uc120\uc744 \ub2e4\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc5d0\uc11c \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uae30\uc220\uacfc \ubc29\ubc95\uc774 \uc9c4\ubcf4\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uacfc\uc815\uc5d0\uc11c \uace0\ud1b5 \ucd5c\uc18c\ud654\uac00 \ud544\uc218\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubc18\ub4dc\uc2dc \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc744 \uc900\uc218\ud558\uba70 \uc9c4\ud589\ub418\uba70, \uc774\ub97c \ud1b5\ud574 \uac00\ub2a5\ud55c \ucd5c\uc18c\ud55c\uc758 \uace0\ud1b5\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c\uc5d0\uac8c \uac00\ud574\uc9c0\ub294 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc724\ub9ac\uc801 \uc9c0\uce68\uc774 \uc5c4\uaca9\ud558\uac8c \uc801\uc6a9\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uc5c4\uaca9\ud55c \uc724\ub9ac \uae30\uc900\uc774 \uc900\uc218\ub429\ub2c8\ub2e4","\uacfc\ud559\uc801 \uc5f0\uad6c\ub294 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uba70 \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud569\ub2c8\ub2e4","\ub9ce\uc740 \ub3d9\ubb3c\uc774 \uace0\ud1b5\uc744 \uacaa\uace0 \uc788\ub2e4\ub294 \uc6b0\ub824\ub97c \uc904\uc774\ub294 \ubc29\ud5a5\uc73c\ub85c \uac1c\uc120\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc724\ub9ac\uc801 \uae30\uc900\uc744 \uc900\uc218\ud558\uc5ec \uc218\ud589\ub418\uace0 \uc788\uc73c\uba70, \ubd88\ud544\uc694\ud55c \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud569\ub2c8\ub2e4","\uc724\ub9ac\uc801 \uc9c0\uce68\uacfc \uaddc\uc81c\ub294 \ub3d9\ubb3c \ubcf4\ud638\ub97c \uac15\ud654\ud569\ub2c8\ub2e4","\uc5f0\uad6c\uc5d0\uc11c \ub3d9\ubb3c\uc758 \uace0\ud1b5\uc744 \ucd5c\uc18c\ud654\ud558\uae30 \uc704\ud55c \uae30\uc220\uacfc \ud504\ub85c\uc138\uc2a4\uac00 \uc9c0\uc18d\uc801\uc73c\ub85c \uac1c\uc120\ub4 bb3c \uc2e4\ud5d8\uc740 \uc2e4\uc81c \uc0dd\uccb4 \ub0b4 \ubc18\uc751\uc744 \uad00\ucc30\ud560 \uc218 \uc788\uac8c \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4\uc640 \uc720\uc0ac\ud55c \ubc18\uc751\uc744 \ud1b5\ud574 \ubcf4\ub2e4 \ud604\uc2e4\uc801\uc778 \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc57d\ub9ac\ud559\uc801 \uc694\uc18c\ub97c \ud3c9\uac00\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc804\uccb4 \uc0dd\ubb3c \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc2e4\uc81c \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \ud655\uc778\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \uc218\ub2e8\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uccb4 \ub0b4 \uc5f0\uad6c\uc758 \ubcf5\ud569\uc131\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \ubaa8\ubc29\ud558\ub294 \ub370 \uc788\uc5b4 \ub300\uccb4 \ubd88\uac00\ub2a5\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uad6c\uccb4\uc801\uc778 \uc0dd\ub9ac\uc801 \uba54\ucee4\ub2c8\uc998\uc744 \uc774\ud574\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud558\uc9c0 \uc54a\uc73c\uba74 \uc77c\ubd80 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \ud604\uc0c1\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud55c\uacc4\uac00 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \ubc18\uc751\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc5ec\uc804\ud788 \uc5c6\uc5b4\uc11c\ub294 \uc548 \ub420 \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8 \uacb0\uacfc\ub294 \uac00\uc7a5 \uc9c1\uc811\uc801\uc778 \uc778\uccb4 \uc801\uc6a9 \uac00\ub2a5\uc131\uc744 \uc9c0\ub2d9\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc778\uac04\uc758 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\uccb4 \ub0b4 \ubc18\uc751\uc744 \uc9c1\uc811 \uad00\ucc30\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\ubb3c\ud559\uc801 \uacfc\uc815\uc744 \uc774\ud574\ud558\ub294 \ub370 \ub3c5\ud2b9\ud55c \uc774\uc810\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\uccb4\uc678 \uc138\ud3ec \uc2e4\ud5d8\uacfc \uc7a5\uae30 \uce69\uc740 \uc544\uc9c1 \ucd08\uae30 \uc5f0\uad6c \ub2e8\uacc4\uc5d0 \uc788\uc73c\uba70, \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4 \ubc18\uc751\uc744 \uc608\uce21\ud560 \uc218 \uc788\ub294 \uac00\uc7a5 \uc815\ud655\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0dd\ubb3c\ud559\uc801 \ubcf5\uc7a1\uc131\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud575\uc2ec\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uccb4\uc5d0\uc11c \ubc1c\uc0dd\ud560 \uc218 \uc788\ub294 \ud6a8\uacfc\uc640 \ubd80\uc791\uc6a9\uc744 \ubbf8\ub9ac \ud3c9\uac00\ud560 \uc218 \uc788\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc2dc\uc2a4\ud15c\uc744 \uc774\ud574\ud558\ub294 \ub370 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0d uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc774 \uc544\ub2d9\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud558\uc9c0\ub9cc, \ud604\uc7ac \uc5f0\uad6c \ud6a8\uc728\uc131\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc6b0\uc704\ub97c \uc810\ud569\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95\uc774 \uc544\uc9c1 \ubaa8\ub4e0 \uc0dd\ubb3c\ud559\uc801 \uba54\ucee4\ub2c8\uc998\uc744 \ud3ec\uad04\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \ubc1c\uc804\uc774 \uc911\uc694\ud558\uc9c0\ub9cc, \ud604\uc2dc\uc810\uc5d0\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ub300\uccb4 \ubd88\uac00\ub2a5\ud569\ub2c8\ub2e4","\ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uc5f0\uad6c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8 \uace0\ud1b5\uc744 \uc904\uc774\ub294 \ub370 \uae30\uc5ec\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \ubc29\ubc95 \uac1c\ubc1c\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \ubc1c\uc0dd\ud55c \ubc1c\uacac\uacfc \ud1b5\ucc30\uc5d0 \uae30\ubc18\ud569\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\uc5d0\ub294 \uc2dc\uac04\uc774 \ud544\uc694\ud558\uba70, \ud604\uc7ac\ub85c\uc11c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uac00\uc7a5 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc785\ub2c8\ub2e4","\ub300\uccb4 \uc2dc\ud5d8\ubc95\uc758 \ud55c\uacc4\ub85c \uc778\ud574 \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \ud544\uc218\uc801\uc785\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc740 \uc544\uc9c1 \ubaa8\ub4e0 \uc5f0\uad6c\ub97c \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ub300\uccb4 \uae30\uc220\uc758 \ud65c\uc6a9 \uac00\ub2a5\uc131\ \uc758 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \ub9cc\ud07c \ucda9\ubd84\ud788 \ubc1c\uc804\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uacfc\ud559\uacfc \uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ud604 \uc2dc\uc810\uc5d0\uc11c \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \ud544\uc218\uc801\uc778 \uc5f0\uad6c \ub3c4\uad6c\ub85c \uc790\ub9ac\uc7a1\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ub300\uccb4 \uae30\uc220\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ub300\uc548\uc774 \ub420 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ube44\ub3d9\ubb3c \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc740 \uc544\uc9c1 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\uc758 \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac\ub85c\uc11c\ub294 \ub300\uccb4 \uc2e4\ud5d8 \ubc29\ubc95\uc774 \ucda9\ubd84\ud788 \ub300\uccb4 \uc5ed\ud560\uc744 \ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uae30\uc220\uc740 \uc2e4\ud5d8\ub3d9\ubb3c\uc758 \ubaa8\ub4e0 \uc5ed\ud560\uc744 \ub300\uc2e0\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uae30\uc220\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\ub300 \uacfc\ud559\uc758 \ub300\uccb4 \ubc29\ubc95\uc740 \uc5ec\uc804\ud788 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubcf5\uc7a1\uc131\uacfc \uc815\ud655\uc131\uc744 \ub300\uccb4\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ud604\uc7ac \ubaa8\ub4e0 \ub300\uccb4 \ubc29\ubc95\ub4e4\uc774 \ubcf5\uc7a1\ud55c \uc0dd\uccb4 \ubc18\uc751\uc744 \uc644\ubcbd\ud788 \ubaa8\uc0ac\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc740 \uc644\uc804\ud788 \uc2e0\ub8b0\ud560 \uc218 \uc788\ub294 \uc218\uc900\uc5d0 \ub3c4\ub2ec\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \ub3d9\ubb3c \uc2e4\ud5d8\uc774 \uc81c\uacf5\ud558\ub294 \ub370\uc774\ud130\uc758 \uc2e0\ub8b0\uc131\uacfc \uc7ac\ud604\uc131\uc740 \ub300\uccb4 \uc2dc\ud5d8 \ubc29\ubc95\uc774 \uc544\uc9c1 \ub530\ub77c\uc62c \uc218 \uc5c6\ub294 \uc218\uc900\uc785\ub2c8\ub2e4","\uacc4\uc18d\ub41c \ubc1c\uc804\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ud604\uc7ac \uae30\uc220\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uc5f0\uad6c \ubc29\ubc95\uc73c\ub85c\ub294 \ubaa8\ub4e0 \ubcf5\uc7a1\ud55c \uc0dd\ubb3c\ud559\uc801 \uc0c1\ud638\uc791\uc6a9\uc744 \uc644\ubcbd\ud788 \ubc18\uc601\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \uae30\uc220\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubcf5\uc7a1\uc131\uc744 \uc644\ubcbd\ud788 \ub300\uccb4\ud558\uc9c0 \ubabb\ud569\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \ubc29\ubc95\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub300\uccb4 \uae30\uc220\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubaa8\ub4e0 \uc5ed\ud560\uc744 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc7ac \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uae30\uc220\uc740 \uc5ec\uc804\ud788 \ubd80\uc871\ud569\ub2c8\ub2e4","\ud604\uc7ac\uc758 \uacfc\ud559\uc801 \ubc1c\uc804\uc73c\ub85c\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \uc644\uc804\ud788 \ub300\uccb4\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4","\ud604\uc874\ud558\ub294 \ub300\uccb4 \uae30\uc220\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc758 \ubcf4\uc870 \uc218\ub2e8\uc73c\ub85c \uc0ac\uc6a9\ub418\uc9c0\ub9cc, \ubaa8\ub4e0 \ubcf5\uc7a1\ud55c \uc0dd\ub9ac 574 \ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \ubc29\ubc95\uc740 \ubcd1\ud589\ub418\uc5b4\uc57c \ud569\ub2c8\ub2e4","\uc5ec\ub7ec \uc81c\uc57d \ud68c\uc0ac\ub294 \ud611\ub825\uc744 \ud1b5\ud574 \ub300\uccb4 \ubc29\ubc95\uc744 \ud65c\uc131\ud654\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\uae30\uc220 \ubc1c\uc804\uc744 \ud1b5\ud574 \ub354 \ub098\uc740 \ub300\uccb4 \uc2e4\ud5d8\uc774 \uac1c\ubc1c\ub418\ub354\ub77c\ub3c4, \ud604\uc7ac \uc778\ub958\uc758 \uac74\uac15\uc744 \uc720\uc9c0\ud558\uace0 \uac1c\uc120\ud558\ub294 \ub370 \uc788\uc5b4 \ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc911\uc694\ud55c \uc5ed\ud560\uc744 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uac10\uc18c\ub97c \uc704\ud55c \ub300\uccb4 \uae30\uc220 \uac1c\ubc1c\ub3c4 \ubcd1\ud589\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\uae30 \uc704\ud55c \uae30\uc220 \uc5f0\uad6c\uac00 \ub354\uc6b1 \ud65c\uc131\ud654\ub418\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uacfc \ub300\uccb4 \uae30\uc220\uc740 \ud568\uaed8 \ubc1c\uc804\ud574\uc57c \ud569\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \uae30\uc220\uc758 \uac1c\ubc1c\uacfc \ubc1c\uc804\uc740 \ud655\uc2e4\ud788 \ud544\uc694\ud558\uba70, \uc774\ub294 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ubcf4\uc644\ud558\uac70\ub098 \ub300\uccb4\ud558\uae30 \uc704\ud55c \ud558\ub098\uc758 \uc7a5\uae30\uc801 \ubaa9\ud45c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc758 \uc9c0\uc18d\uc801\uc778 \ubc1c\uc804\uc740 \ub300\uccb4 \uae30\uc220 \ubc1c\uc804\uc744 \ucd09\uc9c4\ud569\ub2c8\ub2e4","\uc0c8\ub85c\uc6b4 \ub300\uccb4 \ubc29\ubc95\uc744 \ubcd1\ud589\ud574 \uc5f0\uad6c\uac00 \uc9c4\ud589\ub429\ub2c8\ub2e4","\uc774 \uc0b0\uc5c5\uc740 \ub3d9\ubb3c \ubcf5\uc9c0\ub97c \uac1c\uc120\ud560 \uc218 \uc788\ub294 \uae30\uc220\uc758 \uac1c\ubc1c\uc744 \uc7a5\ub824\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc0c8\ub85c\uc6b4 \uae30\uc220\uc758 \uac1c\ubc1c \ubc0f \uac80\uc99d 4 \uc0dd\ub9ac\ud559\uacfc \ube44\uc2b7\ud55c \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc5bb\uc740 \ub370\uc774\ud130\ub294 \uc778\uac04 \uc0dd\ub9ac\ud559\uc5d0 \ub300\ud55c \uc911\uc694\ud55c \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\ubb3c\ud559\uacfc \uc77c\uce58\ud558\ub294 \uc911\uc694\ud55c \ub370\uc774\ud130\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4. \ub2e4\uad6d\uc801 \uc81c\uc57d\uc0ac\ub4e4\uc740 \ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc778\uac04\uacfc \uc720\uc0ac\ud55c \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uad00\ucc30\ud558\uace0, \uc774\ub97c \ubc14\ud0d5\uc73c\ub85c \uc784\uc0c1 \uc2dc\ud5d8\uc758 \uc131\uacf5\ub960\uc744 \ub192\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4","\ub3d9\ubb3c \ubaa8\ub378\uc740 \uc778\uac04\uc758 \uc0dd\ub9ac\uc801 \ubc18\uc751\uc744 \uc608\uce21\ud560 \uc218 \uc788\ub294 \uc911\uc694\ud55c \ub3c4\uad6c\uc785\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\ub9ac\ud559\uacfc \uc720\uc0ac\ud55c \ubaa8\ub378\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc5ec\uc804\ud788 \uc131\uacf5\uc801\uc778 \uc778\uac04 \uc5f0\uad6c\uc758 \uc911\uc694\ud55c \uae30\ubc18\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\ub9ac\uc640 \uc720\uc0ac\uc131\uc744 \ud1b5\ud574 \uc815\ud655\ud55c \uacb0\uacfc\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04\uacfc\uc758 \ucc28\uc774\ub97c \uace0\ub824\ud568\uc5d0\ub3c4 \uc911\ub300\ud55c \uc608\uce21 \uc815\ubcf4\ub97c \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc740 \uc778\uac04 \uc0dd\ub9ac\ud559\uc5d0 \ub300\ud55c \uc911\uc694\ud55c \ud1b5\ucc30\uc744 \uc81c\uacf5\ud569\ub2c8\ub2e4","\ub3d9\ubb3c \uc2e4\ud5d8\uc744 \ud1b5\ud574 \uc778\uac04\uc5d0\uac8c \uce58\uba85\uc801\uc77c \uc218 \uc788\ub294 \ubd80\uc791\uc6a9\uc744 \ubbf8\ub9ac \ubc1c\uacac\ud56
